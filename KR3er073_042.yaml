body:
  text: 卷之四十二謨集痘疹詮麻疹全述原一景嶽子曰痘之與疹原非一種雖痘之變態多證而疹之收斂稍易然疹之甚者其勢凶危亦不減於痘最為可畏蓋疹毒痘毒本無異也第古人重痘而忽疹多不詳及使後人無所宗法余實悵之自得羅田萬氏之刻見其理透法精鄙念斯慰今悉從其訓備述於此雖其中稍有裁訂亦不過正其疑似詳具未詳耳使此後患疹者幸獲迷津之指南亦以見萬氏之功為不少矣名義二疹者痘之末疾惟二經受證脾與肺也內應於手足太陰外合於皮毛肌肉是皆天地間沴戾不正之氣故曰疹也然其名目有異在蘇松曰沙子在浙江曰醋子在江右湖廣曰麻在山陝曰膚瘡曰粳瘡曰赤瘡在北直曰疹子名雖不同其證則一但疹在痘前者痘後必復疹惟痘後出疹者方為結局疹逆順三萬氏曰疹以春夏為順秋冬為逆以其出於脾肺二經一遇風寒勢必難出且多變證故於秋冬為不宜耳夫天行不正之氣致為人之瘍疹然古人於痘疹二字始終歸重於痘並不分別疹為何物豈可以二證歸於一證耶想當時重痘不重疹故爾略之致使後人不得心法因而害事者往往有之今以吾家四代傳流以及今日心得之法開載於後用此應病定不差矣敢有毫釐隱匿天其鑑之疹脈四凡出疹自熱起至收完但看右手一指脈洪大有力雖有別證亦不為害此定存亡之要法也景嶽曰按此即陽證得陽脈之義若細軟無力則陽證得陰脈矣一元氣既弱安能勝此邪毒是即安危之基也故凡診得陰脈者印當識為陰證而速救元神宜用傷寒溫補托法參酌治之若執以麻疹為陽毒而概用清寒則必不免矣疹證五疹雖非痘之比然亦由胎毒蘊於脾肺故發於皮毛肌肉之間但一時傳染大小相似則未有不由天行癘氣而發者此其源雖內發而證多屬表故其內為胎毒則與痘證同外有表邪則與傷寒類其為毒也總由君相二火燔灼太陰而脾肺受之故其為證則有咳嗽噴嚏面腫腮赤目胞浮腫眼淚汪汪鼻流清涕呵欠悶頓乍涼乍熱手足稍冷夜臥驚悸或噁心嘔噦或以手掐面日唇鼻者是即出疹之候便宜用解毒散邪等藥不使留停於中庶無他患且凡是疹證必其面亦中指冷而多嗽又必大熱五六日而後見紅點遍身此其所以與痘與傷寒有異也一痘欲盡發而不留疹欲盡出則無病邪氣鬱遏則留而不去正氣損傷則困而不伸毒歸五臟變有四證歸脾則泄瀉不止歸心則煩熱不退而發驚歸肺則咳嗽血出歸腎則牙齦爛而疳蝕程氏曰麻疹初出類傷風寒頭疼咳嗽熱甚目赤頰紅一二日內即出者輕必須解表忌見風寒葷腥厚味如犯之恐生痰涎變為驚搐必致危矣如初起吐瀉交作者順乾嘔霍亂者逆欲出不出者危亡立至徐氏曰痘自里而出於臟故重疹自表而出於腑故輕景嶽曰痘疹之屬有四腫曰痘曰疹曰麻曰斑也痘則陸續漸出自小而大或稀或密部位顆粒有辨也疹則一齊發出大者如蘇子次者如芥子小者如蠶子而成粒成片者是也麻則最細而碎如蚊迹模糊者是也斑則無粒惟成片紅紫如雲如錦者是也大都疹與麻斑同類即發斑傷寒之屬而痘則本非其類也蓋痘毒本於肝腎出自中下二焦是以終始不妨於食而全賴水穀為主所以能會則吉不能食則凶故治痘者不可不顧脾胃麻疹之毒則由表邪不解而內犯太陰陽明病在上中二焦所以多不能食故治麻疹者但宜解散火邪邪散則自能食矣是痘疹之治當各有所重者如此疹期六出疹之候初熱一日至次日雞鳴時其熱即止止存五心微熱漸見咳嗽鼻流清涕或腹中作痛飲食漸減到申酉之間其熱復來如此者四日用手滿接髮際處甚熱其面上熱少減二三分咳嗽連聲面燥腮赤眼中多淚噴嚏頻發或忽然鼻中出血至五日其熱不分晝夜六日早時其疹出在兩頰下細細紅點至午時兩手背並腰下及渾昏密密俱有紅點七日普遍掀發其鼻中清涕不流噴嚏亦不行七日晚兩頰顏色漸淡此驗出疹之要法凡疹熱六日而出一定之規也若醫人無識用藥太早耗散元氣及至出時變害多矣或嗽而變喘或出一二日即隱或作大瀉或合目而喘此醫人用藥不當之害也吾家治法定不在五日內用藥必待見疹方用徐徐升表然用藥亦有次第凡一劑必作十餘次飲之況疹在皮膚之間苦作一次服則藥性催之太急每致譫語煩躁故當慎之景嶽曰按此萬氏之法謂醫人用藥太早恐致耗散元氣故必待見點而後施治及作一次服恐藥性催之太急皆惟恐無益而反以致害此固其心得之法也然以愚見則醫有高下藥有宜否但使見有確真發無不當則於未出之前或解或補必有得預防之力以潛消其毒者既出之後亦必有善調之方而不致催急者此在善與不善或不嫌早與不早也嘗見庸流之誤治者多是誠不服藥為中醫也此萬氏之説所以不可不遵凡疹熱五六日必出矣醫人用藥見不能散父母見藥不效醫人見熱嗽不能除或以別證治之主家又或更醫此世之所以誤者多矣麻疹初熱七麻疹發熱之初與傷寒相似惟疹子則面頰赤咳嗽噴嚏鼻流清涕目中有淚呵欠喜睡或吐瀉或手掐眉目面赤為異耳但見此候即是疹子便宜謹避風寒戒葷腥厚味古法用升麻葛根湯以表散毒邪余制透邪煎代之更佳或柴歸飲亦妙但使皮膚通暢腠理開豁則疹毒易出不可作傷寒妄加汗下也妄汗則增熱而為衄血咳血為口瘡咽痛為目赤腫為煩躁乾渴為大小便不通妄下則裡虛為滑泄為滯下經曰必先歲氣母伐天和言不可妄汗妄下也凡疹初熱疑似之間切不可輕易用藥總有他證必待五日腮下見疹方可用升表之劑嗽多連打嚏噴鼻流清涕或流鼻血飲食減少好飲涼水只宜調理飲食戒麵食葷腥一疹子初發熱時未見出現咳嗽百十餘聲不已上氣喘急面目胞腫時臥時起此火毒內蒸肺葉焦舉宜甘桔湯合白虎湯加牛蒡子薄荷主之如疹出之時咳嗽口乾心煩者此毒在心肺發未盡也瀉白散加天花連翹玄參黃連主之一疹子欲出未出之時宜早為發散以解其毒則無餘患若不預解使之盡出多致毒蓄於中或為壯熱日久枯瘁或成驚癇成為瀉痢或為咳血喘促或作疳蝕而死此雖一時戾氣之染然未有不由於人事之未盡也疹出沒八一疹子出沒常以六時為準假如子後出午後即收午後出子後即收乃陽生陰成陰生陽成造化自然之數也凡此旋出旋收者輕若一出連綿三四日不收者乃陽毒太甚宜大青湯或用荊芥牛蒡子甘草玄參石膏桔梗主之若逡巡不出者乃風寒外束皮膚閉密也宜荊防敗毒散主之一疹已出而覆沒者乃風寒所逼而然若不早治毒必內攻以致癢𤹀而死急用升麻湯加荊芥牛蒡子甘草熱服則疹必復出而安矣一發熱六七日以後明是疹子卻不見出此必皮膚堅厚腠理閉密或為風寒所襲或曾有吐瀉皆能伏也急用托裡散表之劑如麻黃湯去杏仁加蟬蛻升麻外用胡荽酒之類如一向未更衣者必毒甚於內伏而不出局方涼膈散加牛蒡子主之一疹子只怕不能得出若出盡則毒便解故治疹者於發熱之時當察時令寒暄酌而治之如時證大寒以桂枝葛根湯或麻黃湯發之時證大熱以升麻葛根湯或合人參白虎湯發之不寒不熱以荊防敗毒散發之如兼疫癘之氣以人參敗毒散發之如盡一劑不出再作本湯服之外用胡荽酒又以苧麻蘸酒遍身戛之務令亟出如三四作更不出加腹中脹痛氣喘昏悶則死證也景嶽曰按此萬氏之法極得隨時制宜之善已盡發表之義矣然發表之義亦最不易即如營衛不足而疹有不能出者其證甚多若徒知發之而不知滋之則營衛有弱者非惟不能發而且恐窮其源矣此其或在脾胃或在血氣必得其神庶乎有濟如傷寒三表之法實亦有關於此一疹毒出盡則邪氣解散正氣自然和平如發熱煩悶或嘔吐或泄瀉此毒邪壅遏尚未出盡也煩熱者黃連解毒湯嘔泄者柴胡橘皮湯並外用胡荽酒及苧麻戛法如前待疹子出盡則煩熱自去嘔吐自止矣一疹有既收而餘毒未盡至三日之外又復發出或至五六次不已者此因發熱之時不避風寒致令邪氣鬱於肌肉之間留連不散雖曾解散終屬未暢耳若兼雜證亦當隨證治之疹形色九凡看麻疹初出之法多於耳後項上腰腿先見其頂尖而不長其形小而勻淨者吉也若色見通紅則疹發於心紅者火之正色也若疹色淡白者心血不足也養血化斑湯主之或四物湯加防風色大紅焰或微紫者血熱也或出太甚者並宜大青湯主之或四物湯去川芎加柴胡黃芩乾葛紅花牛蒡子連翹涼血滋陰而熱自除所謂養陰退陽之義亦五死一生之證也若黑色者則熱毒尤甚而十死一生之證此尤不可不明察之而混為施治也凡疹初出色赤者毒盛之勢也但大便調咳嗽多右手一指脈輕重取皆有力雖勢重不礙但當隨證調理若嗽少右手一指脈無力雖三日後收其渾身疹瘡變為紫色壅結於皮膚之間若用解利之藥其色漸轉紅色嗽多流涕頗思飲食者生若投二三劑難變者難療也疹涕十凡疹出至二三日必兩鼻俱干待收完看毒氣輕者清涕即來就思飲食此不必服藥若清涕來遲不思飲食者須要清肺解毒必俟清涕出方可不用藥疹吉凶十一或熱或退五六日而後出者輕透發三日而漸沒者輕淡紅滋潤頭面勻淨而多者輕頭面不出者重紅紫黯燥者重咽喉腫痛不食者重冒風沒早者重移熱大腸變痢者重黑黯乾枯一出即沒者不治鼻扇口張目無神者不治鼻清糞黑者不治氣喘心前吸者不治總論治法十二一疹喜清涼而惡濕痘喜溫暖而惡涼此固其大法也然亦當有得其宜者如疹子初出亦須和暖則易出所以發苗之初只要發出得盡則疹毒便解非若痘之苗而秀秀而實而後毒解也痘子成熟之時若太溫熱則反潰爛不收是痘之後亦喜清涼也故治痘疹者無過熱無過寒必溫涼適宜使陰陽和平是為得之一痘宜內實可用補劑疹忌內實只惟解散惟初熱發表時略相似耳既出之後痘宜補氣以生血疹宜補陰以制陽何也蓋疹熱甚則陰分受其熬煎而血多虛耗陰津被克故治以清火滋陰為主而不可少動其氣若燥悍之劑首尾皆深忌也世知痘證所繫之重而不知疹之殺人尤甚方書多忽而不備良可太息也矣一斑疹之毒皆出於火內經曰赫曦之紀其病瘡瘍故或遇二火司天或司運之歲肺金受制感而發者居多輕則如蚊迹之狀或壘腫於皮膚間名曰癮疹重者如朱點紅暈或片片如錦紋名曰斑疹大抵色赤者吉色黑者凶其證似傷寒發熱凡三四日而出七八日而靨也凡此之類皆屬邪熱治之之法惟辛涼解利而已即若吐瀉亦斷不可用溫補也如豆蔻乾薑之類切勿輕用而初發之時尤不可大汗只宜升麻葛根透邪煎之屬微表之耳故用宜斟酌有不可一概取必也一標出不紅現而發熱轉甚或頭痛身痛煩躁者升麻湯或透邪煎一色赤稠密身痛煩躁者升麻湯加紫草連翹一寒熱並作頭痛背強者升麻湯加羌活防風連翹一頭項面腫升麻湯加牛蒡子荊芥若脈強火盛熱渴者宜清降其火以白虎湯加減用之一自汗煩渴氣壅脈數者化斑湯一身熱煩渴泄瀉者柴苓湯或四苓散如夏月益元散一熱甚小便赤澀譫語驚恐者導赤散四苓散加辰砂夏月益元散加辰砂一咳嗽甚者二母散麥門冬湯清肺湯一喘者小柴胡湯去人參加五味子一熱甚鼻衄或便血溺血熱甚者黃連解毒湯血甚者犀角地黃湯一傷食嘔吐六君子湯加藿香乾葛或減去人參熱甚嘔吐者解毒湯小便不利而嘔吐者四苓散一二日不通者導赤散一大便祕結發熱身痛者大柴胡湯腹脹氣喘者前胡枳殼湯一咽喉不利甘桔湯兼風熱咳嗽者加防風一寒熱往來似瘧小柴胡湯如兼咳嗽去人參一靨後身熱不除者升麻湯或去升麻加黃芩黃連各酒炒用一下痢赤白腹痛者黃芩芍藥湯或加枳殼身熱腹痛者解毒湯一餘毒未盡變生癰疽瘡癤者升麻湯加防風荊芥牛蒡子景嶽曰按以上萬氏治疹諸條皆極詳妥然其中惟瀉痢氣喘二證則最多疑似蓋二證之由疹毒固當如其治矣然有不因疹毒者如俗醫但見是疹無不概用寒涼不知有可涼者有不可涼者其有脾氣本弱而過用寒藥或以誤會生冷致傷脾胃而為泄瀉者亦多有之此一證也雖曰由疹而發而實非疹毒之病矣但察其別無熱證熱脈而兼之色白氣餒者便須速救脾氣急從溫補宜溫胃飲五君子煎胃關煎之類主之若執謂疹毒不可溫則無不危矣此醫之當知本也又如氣喘一證大有虛實蓋十喘九虛若察其本非火證又非外邪而或以大瀉或以大汗而致喘者必皆氣脫之候此非六氣煎或貞元飲必不可也凡此二者皆不可不加細察而或者以氣促作氣喘則萬萬大誤矣又痘瘡總論中有因人因證之辨與此麻疹實同一理所當參閲故不可以麻疹之邪悉認為實火而不知虛火之為害也徐東皋曰痘難疹易之説此俗談耳其有胃氣原弱所感入深又或因瀉利而發有不快或發之未透而隨現隨隱久之邪氣漸入於胃必瀉泄不已出而復出加之喘促則必危矣凡若此者又豈可以易言哉所以但有出疹若見虛弱急當先補脾胃其有欲出不出急當托裡發表以助之且首尾供不可瀉一如痘證同也疹禁忌十三凡疹瘡發表之後紅影出於肌膚切戒風寒生冷如一犯之則皮膚閉密毒氣壅滯遂變渾身青紫而毒反內攻煩躁腹痛氣喘悶亂諸證作矣欲出不出危亡立至醫家病家皆不可不慎一疹瘡之證全在調治禁忌如雞魚炙爆鹽醋五辛之類直過七七之後方可食之惟宜食淡不可縱口致生他疾也若誤會雞魚則終身皮膚粟起如雞皮之狀或遇天行出疹之時又令重出誤食豬肉則每歲凡遇出疹之月多有下利誤食鹽醋致令咳嗽則每歲出疹之月必多咳嗽誤食五辛之物則不時多生驚熱此痘疹之家皆所當慎也疹發熱十四瘡疹非熱不出凡疹子欲出必遍身發熱或煩躁或頭眩或身體拘急及既出則身便涼諸證悉解此一層疹子隨即收者極輕者也如疹子既出而熱甚不減此毒盛者也宜大青湯解其毒便澀者宜黃連解毒湯合白虎湯或大連翹飲解其里大便不通者局方涼膈散加牛蒡子主之疹喘嗽十五凡疹證多嗽此頓出頓入之勢也但有疹毒須假嗽多而散故疹後旬日之內尚宜有嗽切不可見嗽多而治嗽也宜慎之疹證屬肺與脾胃肺受火邪則嗽多嗽多則頓出頭面並及四肢大腸受火邪則上連脾胃而為泄瀉若早瀉則嗽必減而變為喘蓋喘嗽二者皆屬於肺然嗽實喘虛得嗽者出得喘者入入則閣眼多痰胸滿腹脹色白而毒不盡出證則危矣此疹之宜嗽不宜喘而最不宜於泄瀉也疹吐瀉十六凡疹子初起發熱吐利純是熱證不可作寒論此乃火邪內逼上焦則多吐下焦則多利中焦則吐利並作自利者宜黃芩湯吐利者宜黃芩湯加半夏二錢生薑三片自利裡急後重宜黃連解毒湯合益元散凡疹出一二日或三四日忽然大瀉嗽多者用升表之藥加以分利治之苦瀉而兼喘復見悶亂搖頭者凶一麻疹現後大便下膿血或因泄瀉而變成膿血者或徑自利者但看瘡疹出多而色紅又多嗽者只宜表疹俟其收後方宜解毒兼治其痢一疹子初起最忌泄瀉然亦有始終泄瀉而不妨者稟之強弱異也苦因瀉嗽減而變為喘者則危矣詳前喘嗽條一身熱煩渴泄瀉者柴苓湯四苓散如熱甚或夏月益元散一疹後作痢亦有看手咬指甲撕口唇皮及咬人等證當以解毒分利藥治之若所下稠涎紅白相兼者務要用解毒之藥若晝夜由三五十次漸減至二三次成漸多嗽右手一指脈漸起清涕復來者方可望生若痢變煤色或成屋漏色或如青菜色肛門如筒喘促音啞飲食不進午後腮紅皆不治景嶽曰自古方書凡發揮未盡及用治未當者間亦有之而惟於泄瀉一證則尤其為最何也蓋古人以池瀉為熱者什九故多用河間黃芩芍藥湯為主治而不知凡屬泄瀉最多脾腎虛寒也即如出疹一證雖有由疹毒而瀉者然果系實熱多不作瀉但致瀉者卒由脾胃之弱若但知清火解毒則脾必日敗而漸成屋漏青菜色及氣促絶食不治之證矣病而至此豈猶熱耶總屬誤耳故凡治泄瀉者即雖是疹亦必察其有無熱邪如無熱證熱脈即當於痘瘡泄瀉條求法治之庶最危者猶可望其生也故余於諸法之外而獨言其要者有如此疹飲食十七凡出疹者多有五六日不飲食此胃為邪氣所侵亦為邪氣所養故不食亦不妨切不可著意治之只宜治疹疹瘡出盡毒氣漸解即思飲食尤不可與麵食雖用粥飲每次只可少與候氣清神爽身全不熱漸漸加添但宜少而頻也凡出疹之先平昔過用麵食者或正出時吃麵食者成胃氣漸開即思麵食而用早者因動胃火以致清涕不來身體作熱兩眼看手咬指摳鼻撕口唇皮及撕眼札毛者此皆疹後食復之病也當清肺解毒加消導之劑治之疹飲水十八凡患疹之人不拘大小自起至收必皆喜飲涼水此不必禁但宜少不宜多宜頓不宜頓則毒氣隨之漸解疹渴十九凡疹子渴喜飲水純是火邪肺焦胃干心火內亢故也初熱發渴者升麻葛根湯加天花粉麥門冬渴甚者人參白虎湯合黃連解毒湯主之疹汗衄二十凡疹子發熱或自汗或鼻衄者不須止之此亦散越之義汗者毒從汗散衄者毒從衄解但不可太過如汗太多人參白虎湯或合黃連解毒湯衄太多者玄參地黃湯疹躁妄狂亂二十一凡疹有初熱而見煩擾譫妄狂亂者宜升麻葛根湯調辰砂益元散主之一疹收之後餘熱未盡日夜煩躁譫語狂亂者辰砂益元散用燈心湯調下或四苓散加燈草黃連黃芩調水飛硃砂五分主之疹咽痛二十二痘疹咽痛亦是常候乃火毒上熏而然也勿以喉痹同論妄用針刺蓋此非喉痹癰腫原無惡血可去也痘疹喉病只是咽乾作痛宜草桔湯加牛蒡子或射干鼠黏子湯細細咽之更以玉鑰匙吹之疹唇口瘡二十三凡出疹之先或有胃火及出疹之後餘毒不散此熱毒收於牙齦上下故並唇口生瘡遇有此證每日用溫米泔水洗十餘吹急用解毒之藥治之若或失治多變走馬疳也疹腹痛二十四凡疹初熱一日至五六日之間多有腹痛之證此大腸之火鬱於皮竅之中故作腹痛俱不可認作傷食用消導之藥或以手揉俱能致害但解疹毒毒散則腹痛自止最宜慎之疹後諸證二十五凡疹後餘毒未盡隨當解之若停留日久不解則必致喘嗽或喉中痰響或為四肢冷痹或目無光彩面色青白或鼻孔如煙筒或嗽聲不出若右手一指脈輕取散亂重按全無則成難治之證矣一疹子收後身有微熱者此虛熱也不須治之待血氣和暢其熱自退苦熱勢太甚或日久不減宜用柴胡麥門冬散甚則黃連解毒湯或合人參白虎湯一疹後熱不退而發枯毛豎肉消骨立漸漸羸瘦為骨蒸勞瘵之證者宜萬氏柴胡四物湯主之或蘆薈肥兒丸加當歸連翹治之遲則變證為睡則露睛口鼻氣冷手足厥逆遂成慢脾風瘛瘲不治之證矣一疹後熱不除忽作搐者不可以急驚風同論宜導赤散加人參麥門冬送七味安神丸小便清者可治短少者難治如見多痰或用抱龍丸或以四物湯加麥門冬棗仁淡竹葉甘草龍膽草黃連茯苓辰砂石菖蒲之類治之或以此藥為末用蒸餅豬心血為丸服亦可一疹退後多有咳嗽之證若微嗽不已者此餘毒未盡也用清肺飲加生甘草牛蒡子主之苦嗽甚氣逆發而不已者此肺中伏火金虛葉焦也宜清肺飲或清肺湯合人參白虎湯六一散之類主之若身熱頓嗽甚至飲食俱嗆出或咳出血皆熱毒乘肺而然宜多用門冬清肺湯或加連翹或清金降火湯主之若咳甚而面浮目腫胸高喘急血出口鼻面色青赤昏躁搖頭者死證也又有肺氣本虛為毒所逼而發喘不已但無嗽血嗆會等證者宜用清肺飲倍加人參治之不可拘於肺熱之説而純用清肺解毒之藥也一疹後餘熱未盡或熱甚而失血者四物湯加茵陳木通犀角以利小便使熱氣下行則愈若血在上者去川芍一疹後餘毒入胃久而不散以致牙齦黑爛肉腐血出臭氣衝人者名為走馬疳用馬鳴散主之甚者急用人中白蘆薈使君子龍膽草黃連五靈脂浸蒸餅為丸滾水服之以清胃火若面頰浮腫環口青黑齒脫唇崩鼻壞者死證也一疹退之後飲食如常動止如故乃卒然心腹絞痛遍身汗出如水者此因元氣虛弱失於補養外雖無病裡實虛損偶然為惡氣所中謂之中惡此朝發夕死之證附麻疹二十六痘之外有疹疹子外又有麻疹麻疹者亦疹之類即斑疹也但正疹則熱至五六日而後一齊湧出出皆粒粒成瘡非若麻疹之皮紅成片也且麻疹之出則不拘三四日以火照之遍身塗朱之狀此將出之兆出則細碎皮紅成片如蚊蚤之迹者即麻疹也亦或有六日始出出而又沒沒而又出不過一周時許世俗謂一日三出三日九出後方齊出透徹然亦有不拘者只三日間從面至胸背手足雖隨出隨沒然只要出透以遢身紅潤者為美重者遍身膨脹眼亦封閉色有赤白微黃不同只要紅活最嫌黑陷及面目胸腹稠密纏鎖咽喉者為逆發不出而喘者即死所謂麻者以遍身細碎如麻無有空處故也然又有遍身但紅而絶無斑點者是又謂之火丹亦其類也故痘家有夾疹夾麻夾丹等證總皆熱毒所致俱當詳辨也一麻疹初起呵欠發熱惡寒咳嗽嚏噴流涕宜升麻葛根湯加蘇葉蔥白以解肌切忌大汗若潮熱甚者加芩連地骨皮譫語者調辰砂益元散咳嗽加麻黃杏仁麥門冬石膏咳甚熱甚者用涼膈散加桔梗地骨皮泄瀉者宜四苓散便紅合犀角地黃湯吐血衄血用犀角地黃湯加山梔小便赤加木通寒熱似瘧小柴胡湯一麻疹已出煩躁作渴者解毒湯合白虎湯喘而便閉者前胡根殼湯加五味子便祕甚者小承氣湯譫語溺閉者導赤散小便如泔者四苓散加車前木通譫語如狂者解毒湯調辰砂益元散大小便血者犀角地黃湯合解毒湯吐血衄血解毒湯加炒山梔童便泄瀉解毒湯或四苓散喘兼泄瀉溺赤澀者柴苓湯煩熱大渴作瀉者白虎湯加蒼朮豬苓熱盛乾嘔者解毒湯傷食嘔吐四君子湯夏月因熱作嘔四苓散加人參一麻證初起及已出已沒一切雜證俱與痘疹大同但始終藥宜清涼雖曰麻喜清涼痘喜溫暖不易常道然虛則補實則瀉寒則溫熱則涼方是醫家玄妙故治麻亦有血虛而用四物湯氣虛而用四君子湯傷冷則溫中理中之藥皆當因證而用也一麻證收後餘毒內改凡尋衣摸床譫言妄語神昏志亂者死如熱輕而餘毒未除必先見諸氣色若有所見須預防之始終以升麻葛根湯為主或四味消毒飲或六味消毒飲解毒湯隨證選用仍忌魚腥蔥蒜等物水痘二十七凡出水痘先十數點一日後其頂尖上有水泡二日三日又出漸多四日渾身作癢瘡頭皆破微加壯熱即收矣但有此疾須忌發物七八日乃痊一水痘亦有類傷寒之狀身熱二三日而出者或咳嗽面赤眼光如水或噴嚏或流涕但與正痘不同易出亦易靨治以清熱解毒為主麻疹論列方二十八四君子湯補一五君子煎新熱六六君子湯補五四物湯補八六氣煎新因二一人參敗毒散散三六化斑湯寒三白虎湯寒二大柴胡湯攻七小柴胡湯散十九甘桔湯因一七五解毒湯痘五一黃連解毒湯寒一麻黃湯散一升麻湯痘一三九升麻葛根湯散三十透邪煎新因二三托裡散痘四局方涼膈散攻十九柴歸飲新因十五清肺飲痘八七清肺湯痘一四五柴胡橘皮湯痘二九仲景黃苓湯寒百五二母散痘百五十射干鼠黏子湯痘七七麥門冬湯痘一四二導赤散寒一二二萬氏柴胡四物湯痘一四三四苓散和一八七柴苓湯和一九二養血化班湯痘十八小承氣湯攻二益元散寒百十二門冬清肺湯痘一四七大清湯痘一五三瀉白散寒四二清金降火湯痘一四九柴胡麥門冬散痘二四貞元飲新補十九柴胡麥門冬散痘二四胃關煎新熱九大連翹飲寒七八玄參地黃湯痘八六七味安神丸小七二玉鑰匙因一九三馬鳴散痘一三八胡荽酒痘百十八四味消毒飲痘四八犀角地黃湯寒七九蘆薈肥兒丸小百十四六味消毒飲痘四九前胡枳殼湯痘九四桂枝葛根湯痘三七黃芩芍藥湯寒百丸備用方具列痘疹方末所當詳閲
