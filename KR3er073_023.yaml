body:
  text: 卷之二十三心集雜證謨積聚經義百病始生篇岐伯曰風雨寒熱不得虛邪不能獨傷人卒然遇疾風暴雨而不病者蓋無虛故邪不能獨傷人此必因虛邪之風與其身形兩虛相得乃客其形是故虛邪之中人也留而不去傳舍於腸胃之外募原之間留著於脈稽留而不去息而成積或著孫脈或著絡脈或著經脈或著輸脈或著於伏沖之脈或著於膂筋或著於腸胃之募原上達於緩筋邪氣淫泆不可勝論其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能句積而止之故往來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜脹滿雷引故時切痛其著於陽明之經則挾臍而居飽食則益大飢則益小其著於緩筋也似陽明之積飽食則痛飢則安其著於腸胃之募原也痛而外連於緩筋飽食則安飢則痛其著於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者飢則積見飽則積不見按之不得其著於輸之脈者閉塞不通津液不下孔竅乾壅帝曰積之始生至其已成奈何岐伯曰積之始生得寒乃生厥乃成積也帝曰其成積奈何岐伯曰厥氣生足悗悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則併合凝聚不得散而積成矣卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊里而不散津液澀滲著而不去而積皆成矣奇病論帝曰病脅下滿氣逆二三歲不已是為何病岐伯曰病名息積此不妨於食不可灸刺積為導引服藥藥不能獨治也邪氣臟腑形篇曰心脈微緩為伏梁在心下肝脈微急為肥氣在脅下若覆杯腎脈微急為奔豚五臟生成論曰赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清水而臥平人氣象論曰寸口脈沉而橫曰脅下有積腹中有橫積痛胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也結而橫有積矣大奇論曰腎脈小急肝脈小急心脈小急不鼓皆為瘕三陽急為瘕刺熱篇曰頰下迎顴為大瘕氣厥論曰小腸移熱於大腸為慮瘕骨空論曰任脈為病女子帶下瘕聚衛氣篇曰新積痛可移者易已也積不痛難已也腹中論帝曰病有少腹盛上下左右皆有根此為何病可治不岐伯曰病名伏梁裹大膿血居腸胃之外不可治治之每切按之致死帝曰何以然岐伯曰此下則因陰必下膿血上則迫胃脘生膈俠胃脘內癰此久病也難治居齊上為逆居齊下為從勿動亟奪帝曰人有身體髀股胻皆腫環齊而痛是為何病岐伯曰病名伏梁此風根也其氣溢於大腸而著於肓肓之原在齊下故環齊而痛也不可動之動之為水溺澀之病六元正紀大論帝曰婦人重身毒之何如岐伯曰有故無殞亦無殞也大積大聚其可犯也衰其大半而止過者死論證共四條積聚之病凡飲食血氣風寒之屬皆能致之但曰積曰聚當詳辨也蓋積者積壘之謂由漸而成者也聚者聚散之謂作止不常者也由此言之是堅硬不移者本有形也故有形者曰積或聚或散者本無形也故無形者曰聚諸有形者或以飲食之滯或以膿血之留凡汁沫凝聚旋成癥塊者皆聚之類其病多在血分血有形而靜也諸無形者或脹或不脹或痛或不痛凡隨觸隨發時來時往者皆聚之類其病多在氣分氣無形而動也故難經以積為陰氣聚為陽氣其義即此凡無形之聚其散易有形之積其破難臨此證者但當辨其有形無形在氣在血而治積治聚自可得其梗概矣一飲食之積凡暫積者不過以飲食偶傷必在腸胃之內故可行可逐治無難也惟飲食無節以漸留滯者多成痞積於左脅膈膜之外蓋以胃之大絡名曰虛里出於左乳下其動應衣此陽明宗氣所出之道也若飢飽無倫飲食疊進以致陽明胃氣一有所逆則陰寒之氣得以乘之而脾不及化故余滯未消乃並腸外汁沫搏聚不散漸成癥積矣然其初起甚微人多不覺及其既久則根深蒂固而藥餌難及今西北小兒多有此疾而尤於食麵之鄉為最正以面性多滯而留疾於皮裡膜外所以不易治也即如婦人血癥氣痞或上或下者亦多在腸胃之外募原之間故當以漸消磨求法治之慎毋孟浪欲速妄行攻擊徒致胃氣受傷而積仍未及反以速其危也一風寒外感之邪亦能成積如經曰虛邪之中人也留而不去傳舍於腸胃之外募原之間留著於脈息而成積又曰病名伏梁此風根也由此觀之凡今人以瘧後成痞者是即風寒之屬類可推矣但瘧由風寒固易知也而諸積於風若不相涉不知飲食之滯非寒未必成積而風寒之邪非食未必成形故必以食遇寒以寒遇食或表邪未清過於飲食邪食相搏而積斯成矣經曰虛邪之風與其身形兩虛相得乃客其形信乎致積之由多由於此即血癥氣痞之由亦無出於此然積以寒留留久則寒多為熱風以致積積成則證已非風故治此者亦但當治其所留不可發散以再傷其真氣也惟慎疾者能知所由而慮之於始則可為保脾之良策一癥痞之積凡或上或下或左或右本無定所大都血積多在下而氣積食積則上自胃脘下自小腹凡有留滯無處不可停蓄余嘗治一食癥結痛者乃在小腹下右角尖處自後屢見此證方知食道之行必由小腹下右以入廣腸此實人所不知也別有食停治按在心腹痛門可考故凡治積聚者必當詳審所因庶得其確嘗見丹溪之論曰痞塊在中為痰飲在右為食積在左為血塊其不能作塊或聚或散者氣也塊乃有形之物痰與食積死血而成也愚謂可聚可散者此氣聚無疑也若以左為血積右為食積中為痰飲則鑿矣即如小兒多有患痞者必在左肋之下此無非縱食所致豈因其在左即為血積而可攻其血乎若為左血右食則右豈無血而左豈無食乎不可以為法也此仍有論在諸風門論丹溪條下當並閲之論治共十一條經曰堅者削之留者攻之結者散之客者除之上之下之摩之浴之薄之劫之開之發之適事為故凡積聚之治如經之云者亦既盡矣然欲總其要不過四法曰攻曰消曰散曰補四者而已詳列如下一凡積堅氣實者非攻不能去如祕方化滯丸化鐵丹遇仙丹感應丸大硝石丸三花神佑丸赤金豆百順丸之類皆攻劑之峻者也又如三稜丸勝紅丸阿魏丸助氣丸紅丸子溫白丸之屬皆攻劑之次者也一凡不堪攻擊止宜消導漸磨者如和中丸草豆蔻丸保和丸大小和中飲之類是也若積聚下之不退而元氣未虧者但當以行氣開滯等劑融化而潛消之一無形氣聚宜散而愈者如排氣飲神香散指迷七氣湯十香丸四磨飲之屬是也一凡積痞勢緩而攻補俱有未便者當專以調理脾胃為主如潔古之枳朮丸乃其宜也余復因其方而推廣之近制芍藥枳朮丸兼肝脾以消膨脹除積聚止腹痛進飲食用收緩功其效殊勝於彼再如大健脾丸木香人參生薑枳朮丸皆調補脾胃之妙劑所當擇用者也一凡脾腎不足及虛弱失調之人多有積聚之病蓋脾虛則中焦不運腎虛則下焦不化正氣不行則邪滯得以居之若此輩者無論其有形無形但當察其緩急皆以正氣為主凡虛在脾胃者宜五味異功散或養中煎溫胃飲歸脾湯之類主之虛在肝腎者宜理陰煎腎氣丸暖肝煎之類酌而用之此所謂養正積自除也其或虛中有滯者則不妨少加佐使一治積之要在知攻補之宜而攻補之宜當於孰緩孰急中辨之凡積聚未久而元氣未損者治不宜緩蓋緩之則養成其勢反以難制此其所急在積速攻可也若積聚漸久元氣日虛此而攻之則積氣本遠攻不易及胃氣切近先受其傷愈攻愈虛則不死於積而死於攻矣此其所重在命不在乎病所當察也故凡治虛邪者當從緩治只宜專培脾胃以固其本或灸或膏以疏其經但使主氣日強經氣日通則積痞自消斯緩急之機即萬全之策也不獨治積諸病亦然一凡堅硬之積必在腸胃之外募原之間原非藥力所能猝至宜用阿魏膏琥珀膏或水紅花膏三聖膏之類以攻其外再用長桑君針法以攻其內然此堅頑之積非用火攻終難消散故莫妙於灸余在燕都嘗治愈痞塊在左脅者數人則皆以灸法收功也一積久成疳乃其經絡壅滯致動肝脾陽明之火故為頰腫口糜牙齦臭爛之證此其在外當用膏藥艾火以破堅頑在內當用蘆薈等丸以清疳熱一婦人血癥氣聚論治詳婦人門述古共六條難經曰病有積有聚何以別之然積者陰氣也聚者陽氣也故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成也積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚也又曰肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳痎瘧連歲不已心之積名曰伏梁起臍上大如臂上至心下久不愈令人病煩心脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚肺之積名曰息賁在右脅下覆大如杯久不已令人灑淅寒熱喘咳發肺壅腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣仲景曰積者臟病也終不移聚者腑病也發作有時展轉痛移為可治諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央各以其部處之愚按仲景此説固詳而善雖亦疑其太鑿然於理則通故述於此亦可以資意見若以余之歷驗則凡病證癖者脈必沉緊而疾如內經曰微急小急者即其脈也若診見和緩則胃氣本無恙終非癖塊之脈許學士曰大抵治積或以所惡者攻之或以所喜者誘之則易愈如硇砂水銀治肉積神麯麥芽治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治涎積礞石巴豆治食積各從其類也若用群隊之藥分其藥勢則難取效須要認得分明是何積聚兼見何證然後增減斟量使之不爾反有所損要在臨時通變也潔古云壯人無積虛人則有之脾胃怯弱氣血兩衰四時有感皆能成積若遽以磨堅破結之藥治之疾須去而人已衰矣乾漆硇砂三稜大黃牽牛之類用時則暫快藥過則依然氣愈消疾愈大竟何益哉故治積者當先養正則積自除譬如滿座皆君子縱有一小人自無容地而去但令其真氣實胃氣強積自消矣實中有積大毒之劑治之尚不可過況虛而有積者乎此治積之一端也邪正盛衰固宜詳審張子和曰積之始成也或因暴怒喜悲思恐之氣或傷酸甘辛鹹之味或停溫涼寒熱之飲或受風寒暑濕燥火之邪其初甚微可呼吸按導方寸大而去之故不難也若久而延之留滯不去遂成五積徐東皋曰養正積除此積之微者也如脾胃失於健運而氣積食積之不疏導者惟養脾胃之正氣而滯積自疏矣若夫大積大聚如五積之久而成癥病堅固不移者若非攻擊悍利之藥豈能推逐之乎惟虛弱之人必用攻補兼施之法也針灸法長桑君針積塊癥瘕法先於塊上針之甚者又於塊首一針塊尾一針訖以艾灸之立應一法曰凡灸痞者須灸痞根無有不效其法在脊背十三椎下當脊中點墨記之此非灸穴卻於墨之兩旁各開三寸半以指揣摸覺微有動脈即點穴灸之大約穴與臍平多灸左邊或左右俱灸此即痞根也或患左灸右患右灸左亦效一灸穴法中脘期門章門脾俞三焦俞通谷此諸痞所宜灸者積痞在上者宜灸上脘中脘期門章門之類積塊在下者宜灸天樞章門腎俞氣海關元中極水道之類凡灸之法宜先上而後下臍腹之壯用宜稍大皆先灸七壯或十四壯以後漸次增加愈多愈妙以上諸穴皆能治痞宜擇而用之然猶有不可按穴者如痞之最堅處或頭或尾或突或動處但察其脈絡所由者皆當按其處而通灸之火力所到則其堅聚之氣自然以漸解散有神化之妙也第灸痞之法非一次便能必效務須或彼或此擇其要者至再至三連次陸續灸之無有不愈者積聚論列方排氣飲新和六養中煎新熱四溫胃飲新熱五歸脾湯補三二枳朮丸和七九芍藥枳朮丸新和十六四磨飲和五二十香丸新和十五木香人參枳朮丸和八二理陰煎新熱三神香散新和二十暖肝煎新熱十五五味異功散補四腎氣丸補百二十保和丸小三五指迷七氣湯和五一溫白丸攻六一和中丸和八七祕方化滯丸攻五八助氣丸攻六七三稜丸攻六十大健脾丸和八五勝紅丸攻六六三因紅丸子攻九六大和中飲新和七感應丸攻五四遇仙丹攻五一小和中飲新和八赤金豆新攻二神佑丸攻四八草豆蔻丸和一六七百順丸新攻六阿魏丸攻六四阿魏膏外三一二大硝石丸攻五六琥珀膏外三一七三聖膏攻三八化鐵丹攻五九水紅花膏外三一九蘆薈等丸寒一六八後論外備用方消食丸和九十行滯枳實丸和八四食癖木香檳榔丸攻五十火盛積堅曲術丸和百十宿食法制陳皮和七十香砂枳朮丸和八十氣積白朮丸和三七八息積陳曲丸熱一六三冷積瀉痢曲糵枳朮丸和八一食積流氣丸和一五五逐寒滯桃仁煎攻三九血瘕枳實導滯丸攻五七濕熱食積安脾散熱六七冷積三稜散攻三六積痞雄黃聖餅子攻六九去積三稜丸攻三七六十血癥食積神保丸攻五三寒積痛穿山甲散攻四十血癥備急丸攻五二寒積消痞核桃攻八七守病丸攻六五紅丸子熱百九十寒食積尉痞方攻八八大異香散攻四四脹滿加減四物湯婦百十二血積痞滿經義太陰陽明論曰飲食不節起居不時者陰受之陰受之則入五臟入五臟則䐜滿閉塞生氣通天論曰味過於甘心氣喘滿味過於苦脾氣不濡胃氣乃厚臟氣法時論曰脾虛則腹滿腸鳴飧泄食不化厥論曰厥或令人腹滿何也曰陰氣盛於上則下虛下虛則脹滿異法方宜論曰臟寒生滿病陰陽應象大論曰濁氣在上則生䐜脹中滿者瀉之於內五臟生成篇曰腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明大惑論曰人有善飢而不嗜食者何氣使然曰胃氣熱則消穀故善飢胃氣逆上則胃脘寒故不嗜食也脈解篇曰太陰所謂病脹者陰盛而上走於陽明陽明絡屬心故上走心為噫也經脈篇曰胃病則賁響腹脹脾病則腹脹善噫心主病則胸脅支滿六元正紀大論曰太陰所至積飲痞膈為中滿霍亂吐下寒氣至則堅痞腹滿痛急下痢之病生矣水鬱之發善厥逆痞堅腹滿木鬱之發病膈咽不通飲食不下五常政大論曰備化之紀其病痞卑監之紀其病留滿痞塞敦阜之紀其病腹滿太陰司天胸中不利心下痞痛氣交變大論曰歲火不及民病脅支滿復則病鶩溏腹滿食飲不下歲水不及民病腹滿至真要大論曰大陽司天民病胸腹滿少陰之勝腹滿痛太陽之勝腹滿食減陽明之復甚則心痛痞滿太陽之復心痛痞滿論證痞者痞塞不開之謂滿者脹滿不行之謂蓋滿則近脹而痞則不必脹也所以痞滿一證大有疑辨則在虛實二字凡有邪有滯而痞者實痞也無物無滯而痞者虛痞也有脹有痛而滿者實滿也無脹無痛而滿者虛滿也實痞實滿者可散可消虛痞虛滿者非大加溫補不可此而錯用多致誤人論治共四條一虛寒之痞凡過於憂思或過於勞倦或飢飽失時或病後脾氣未醒或脾胃素弱之人而妄用寒涼克伐之劑以致重傷脾氣者皆能有之其證則無脹無悶但不知飢亦不欲食問其胸腹脹痞則曰亦覺有些而又曰不甚脹蓋本非脹也止因不欲食而自疑為脹耳察其脈則緩弱無神或弦多胃少察其形則色平氣怯是皆脾虛不運而痞塞不開也此證極多不得因其不食妄用消耗將至胃氣日損則變證百出矣治宜溫補但使脾腎氣強則痞滿開而飲食自進元氣自復矣又凡脾胃虛者多兼寒證何也蓋脾胃屬土土虛者多因無火土寒則氣化無權故多痞滿此即寒生於中也亦有為生冷外寒所侵而致中寒者然胃強則寒不能侮而寒能勝之總由脾氣之弱耳此義詳命門火候論中當並察之凡脾胃微虛而若滿非滿食少不化者宜四君子湯或異功散若心脾氣虛或氣有不順者歸脾湯或治中湯若三陰氣血俱虛治節不行而不便於溫者宜五福飲若中焦不暖或噯腐或吞酸而痞滿者非溫補不可宜溫胃飲五君子煎或理中湯聖朮煎或參薑飲若脾腎兼寒命門不暖則中焦不化或腹溏或胸腹喜暖畏寒或上下腹俱膨膨而小水黃澀者宜理陰煎甚者宜六味回陽飲此二藥最妙而實人所罕知也豫嘗治金孝廉以勞倦思慮致傷脾氣別無他證但絶口久不欲食遂悉用參朮歸熟附子薑桂甘草之屬半月始愈後因病後復不食如此自分必死仍用前藥大加薑附各至三錢而後愈又一婦人病後久不食自言病前曾食牛肉乞求去此余佯應之而培補如前方得全愈故凡病如此者只宜溫補不可行滯新按一飲食偶傷致為痞滿者當察其食滯之有無而治之凡食滯未消而作痞滿或兼疼痛者宜大和中飲或和胃飲加減治之或枳朮丸亦可甚者神香散此有治按在腫脹門若食滯既消脾氣受傷不能運行而虛痞不開者當專扶脾氣微者異功散養中煎甚者五福飲溫胃飲聖朮煎若命門母氣不足者治宜如前若偶食寒涼傷胃痞滿不開而不可補者宜和胃飲加山楂麥芽之類或用厚朴溫中湯一實滯之痞當察其所因而治之若濕勝氣滯而痞者宜平胃散或良方厚朴湯或五苓散若寒滯脾胃或為痛為痞而中氣不虛者厚朴溫中湯若脾寒氣滯而痞者和胃飲若怒氣暴傷肝氣未平而痞者解肝煎若大便氣祕上下不通而痞者河間厚朴湯若胃口停痰而痞者二陳湯或橘皮半夏湯胃寒氣滯停痰痞而兼嘔者加減二陳湯膠痰不開壅滯胃口者藥不易化須先用吐法而後隨證治之若大便祕結不通而痞滿不開者宜微利之一外邪之痞凡寒邪感人者必自表入里若邪淺在經未入於府則飲食如故稍深則傳入胸次漸犯胃口即不能飲食是亦痞之類也治此者但解外邪而或散或消或溫或補邪去則胃口自和痞滿自去此當於傷寒門求法治之又傷寒家曰陽證下之早者乃為結胸陰證下之早者因成痞氣此以邪在表而攻其里邪在陽而攻其陰不當下而妄下之以致邪氣乘虛陷結心下是誤治之害最危者也實者硬滿而痛是為結胸虛者滿而不痛是為痞氣宜審別治之治法詳結胸腹滿條中述古共三條丹溪曰痞滿與脹滿不同脹滿內脹而外亦形痞則內覺痞悶而外無脹急之形也蓋由脾氣不和中央痞塞皆土邪之所為也有因誤下里氣虛邪乘虛而入於心之分為痞者有不因誤下而得之如中氣虛弱不能運化精微而為痞者有飲食痰飲不能施化為痞者有濕熱太甚邪著心下為痞者東垣曰傷寒痞者從血中來從外之內從無形雜病痞者亦從血中來從內之外從有形有形以苦瀉之無形以辛散之玉機云痞滿之病人皆知氣不運也獨東垣以血病言之謂下多則亡陰而損血此前人之未論也世之用氣藥治痞而不效者蓋不知此理故也劉宗厚曰古方治痞用黃芩黃連枳實之苦以泄之厚朴生薑半夏之辛以散之人參白朮之甘溫以補之茯苓澤瀉之鹹淡以滲之隨其病之所在以調之也既痞有濕惟宜上下分消其氣果有內實之證庶可略與疏導世人苦於痞塞喜行利藥以求速效暫時通快痞若再作益以滋甚是皆不察夫下多亡陰之意也如結胸是實邪大陷胸湯主之痞是虛邪諸瀉心湯主之愚據劉公此論既云下多亡陰又云痞是虛邪誠然善矣然欲用諸瀉心湯以治虛邪能無失乎蓋未知塞因塞用別有神化之妙法而痞滿多在脾尤不可以瀉心也痞滿論列方二陳湯和一四君子湯補一五君子煎新熱六歸脾湯補三二治中湯熱十大和中飲新和七溫胃飲新熱五神香散新和二十理中湯熱一加減二陳湯和二聖朮煎新熱二五和胃飲新和五理陰煎新熱三六味回陽飲新熱二平胃散和十七養中煎新熱四橘皮半夏湯和十三異功散補四參薑飲新熱八良方厚朴湯和五四五苓散和一八二五福飲新補六河間厚朴湯和三三六解肝煎新和十一枳朮丸和七九厚朴溫中湯熱九十論外備用方四君子湯補一香砂六君湯補七人參養胃湯和二三四和胃啓脾丸和八六行滯大健脾丸和八五小半夏茯苓湯和九痰痞嘉禾散和百六十氣痞八味理中丸熱七虛寒沉香桂附丸熱百十一中寒越鞠丸和一五四火鬱胡椒理中湯熱六虛寒半夏丁香丸和百三十氣滯沉香降氣散和四十氣滯木香寬中散和五五行氣藿香正氣散和二十寒滯蘇子降氣湯和四一順氣葛花解酲湯和一二四貼痞琥珀膏外三一八尉痞方攻八八消痞核桃攻八七木香人參枳朮丸和八二水紅花膏外三一九消痞膏外三一六
