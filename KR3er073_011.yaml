body:
  text: 卷之十一從集雜證謨非風論正名共二條非風一證即時人所謂中風證也此證多見卒倒卒倒多由昏憒本皆內傷積損頽敗而然原非外感風寒所致而古今相傳咸以中風名之其誤甚矣故余欲易去中風二字而擬名類風又欲擬名屬風然類風屬風仍與風字相近恐後人不解仍爾模糊故單用河間東垣之意竟以非風名之庶乎使人易曉而知其本非風證矣一凡診諸病必先宜正名觀內經諸篇所言風證各有淺深臟腑虛實寒熱之不同前義已詳本皆歷歷可考也若今人之所謂中風者則以內經之厥逆悉指為風矣延誤至今莫有辨者雖丹溪云今世所謂風病大率與痿證混同論治此說固亦有之然何不云誤以厥逆為風也惟近代徐東皋有云痓厥類風凡尸厥痰厥氣厥血厥酒厥等證皆與中風相類此言若乎近之而殊亦未善也使果風厥相類則凡臨是證者曰風可也曰厥亦可也疑似未決將從風乎將從厥乎不知經所言者風自風厥自厥也風之與厥一表證也一里證也豈得謂之相類耶奈何後人不能詳察經義而悉以厥證為風既名為風安得不從風治既從風治安得不用散風之藥以風藥而散厥證所散者非元氣乎因致真陰愈傷真氣愈失是速其死矣若知為厥則原非外感自與風字無涉此名之不可不正證之不可不辨也但名得其正又何至有誤治之患諸厥證義詳後厥逆本門當與此門通閲論有邪無邪凡非風等證在古人諸書皆雲氣體虛弱榮衛失調則真氣耗散腠理不密故邪氣乘虛而入此言感邪之由豈不為善然有邪無邪則何可不辨夫有邪者即傷寒瘧痹之屬無邪者即非風衰敗之屬有邪者必或為寒熱走注或為腫痛偏枯而神志依然無恙也無邪者本無痛苦寒熱而肢節忽廢精神言語倏爾變常也有邪者病由乎經即風寒濕三氣之外侵也無邪者病出乎臟而精虛則氣去所以為眩運卒倒氣去則神去所以為昏憒無知也有邪者邪必乘虛而入故當先扶正氣但通經逐邪之品不得不用以為佐無邪者救本不暇尚可再為雜用以傷及正氣乎論肝邪凡五臟皆能致病而風厥等證何以獨重肝邪且其急暴之若此也蓋人之所賴以生者惟在胃氣以胃為水穀之本也故經云人無胃氣曰死脈無胃氣亦死夫肝邪者即胃氣之賊也一勝一負不相併立凡此非風等證其病為強直掉眩之類皆肝邪風木之化也其為四肢不用痰涎壅盛者皆胃敗脾虛之候也然雖曰東方之實又豈果肝氣之有餘耶正以五陽俱敗肝失所養則肝從邪化是曰肝邪故在陰陽類論以肝臟為最下者正謂其木能犯土肝能犯胃也然肝邪之見本由脾腎之虛使脾胃不虛則肝木雖強必無乘脾之患使腎水不虛則肝木得養又何有強直之虞所謂胃氣者即二十五陽也非獨指陽明為言也所謂腎水者即五臟六腑之精也非獨指少陰為言也然則真陽敗者真臟見真陰敗者亦真臟見凡脈證之見真臟者俱為危敗之兆所謂真臟者即肝邪也即無胃氣也此即非風類風之病之大本也論氣虛凡非風卒倒等證無非氣脫而然何也蓋人之生死全由乎氣氣聚則生氣散則死凡病此者多以素不能慎或七情內傷或酒色過度先傷五臟之真陰此致病之本也再或內外勞傷復有所觸以損一時之元氣或以年力衰邁氣血將離則積損為頽此發病之因也蓋其陰虧於前而陽傷於後陰陷於下而陽乏於上以致陰陽相失精氣不交所以忽爾昏憒卒然仆倒此非陽氣暴脫之候乎故其為病而忽為汗出者營衛之氣脫也或為遺尿者命門之氣脫也或口開不合者陽明經氣之脫也或口角流涎者太陰臟氣之脫也或四肢癱軟者肝脾之氣敗也或昏倦無知語言不出者神敗於心精敗於腎也凡此皆衝任氣脫形神俱敗而然故必於中年之後乃有此證何今人見此無不指為風痰而治從消散不知風中於外痰鬱於中皆實邪也而實邪為病何遽令人暴絶若此且既絶如此尚堪幾多消散而人不能悟良可哀也觀東垣云氣衰者多有此疾誠知要之言也奈後人不明其說但以東垣為主氣又豈知氣之為義乎故凡治卒倒昏沉等證若無痰氣阻塞必須以大劑參附峻補元氣以先其急隨用地黃當歸甘杞之類填補真陰以培其本蓋精即氣之根氣生於下即向生之氣也經曰精化為氣即此之謂舍是之外他無實濟之術矣雖然夫以養生失道而病令至此敗壞可知猶望復全誠非易也第治得其法猶可望其來復若誤治之則何堪再誤哉論痰之本凡非風之多痰者悉由中虛而然夫痰即水也其本在腎其標在脾在腎者以水不歸原水泛為痰也在脾者以食飲不化土不制水也不觀之強壯之人任其多飲多食則隨食隨化未見其為痰也惟是不能食者反能生痰此以脾虛不能化食而食即為痰也故凡病虛勞者其痰必多而病至垂危其痰益甚正以脾氣愈虛則全不能化而水液盡為痰也然則痰之與病病由痰乎痰由病乎豈非痰必由於虛乎可見天下之實痰無幾而痰之宜伐者亦無幾故治痰者必當溫脾強腎以治痰之本使根本漸充則痰將不治而自去矣治痰諸法見後及詳痰飲本門論經絡痰邪余嘗聞之俗傳云痰在周身為病莫測凡癱瘓瘛瘲半身不遂等證皆伏痰留滯而然若此痰飲豈非邪類不去痰邪病何由愈余曰汝知痰之所自乎凡經絡之痰蓋即津血之所化也使果營衛和調則津自津血自血何痰之有惟是元陽虧損神機耗敗則水中無氣而津凝血敗皆化為痰耳此果痰也果精血也豈以精血之外而別有所謂痰者耶若謂痰在經絡非攻不去則必並精血而盡去之庶乎可也否則安有獨攻其痰而津血自可無動乎津血復傷元氣愈竭隨去隨化痰必愈甚此所以治痰者不能盡而所盡者惟元氣也矧復有本無痰氣而妄指為痰以誤攻之者又何其昧之甚也故凡用治痰之藥如滾痰丸清氣化痰丸搜風順氣丸之類必其元氣無傷偶有壅滯而或見微痰之不清者乃可暫用分消豈云無效若病及元氣而但知治標則未有不日用而日敗者矣論治痰共四條治痰之法凡非風初病而痰氣不甚者必不可猜其為痰而妄用痰藥此大戒也若果痰涎壅盛填塞胸膈湯液俱不能入則不得不先開其痰以通藥食之道而開痰之法惟吐為捷如古方之獨聖散茶調散稀涎散之屬皆吐痰之劑也但恐元氣大虛不能當此峻利之物或但用新方之吐法為妥或用牛黃丸抱龍丸之類但使咽喉氣通能進湯飲即止不可盡攻其痰致令危困則最所當慎以故治痰之法又必察其可攻與否然後用之斯無誤也若其眼直咬牙肢體拘急面赤強徑有力者雖見昏沉亦為可治先用粗筋之類挖開其口隨以堅實筆乾擦住牙關乃用淡淡姜鹽湯徐徐灌之然後以中食二指探入喉中徐引其吐若指不能入則以鵝翎醮湯代指探吐亦可如是數次得吐氣通必漸蘇矣然後酌宜可以進藥此治實痰壅滯之法也一若死證已具而痰聲漉漉於喉間者吐亦無益不必吐也若痰氣盛極而不能吐者亦不治之證也又凡形氣大虛者忌用吐法是皆不可攻者也一凡形證已定而痰氣不甚則萬勿治痰但當調理氣血自可漸愈如果痰涎未清則治痰之法當分虛實若氣不甚虛而或寒或濕生痰者宜六安煎二陳湯主之因火為痰者宜清膈飲及竹瀝童便火甚者抽薪飲主之脾虛兼嘔而多痰者六君子湯或五味異功散陰氣不足多痰兼燥而咳者金水六君煎陰虛水泛為痰者六味丸八味丸酌而用之或為湯亦妙脾腎虛寒不能運化而為痰者不必兼治痰氣只宜溫補根本若中氣虛者理中湯或溫胃飲陰不足者理陰煎之類最佳一薛立齊曰若脾氣虧損痰客中焦閉塞清道以致四肢百骸發為諸病者理宜壯脾氣為主兼佐以治痰則中氣健而痰涎自化非補中益氣參朮二陳之類不能治最忌行氣化痰及倒倉之法論寒熱證共二條凡非風口眼歪斜有寒熱之辨在經曰足陽明之筋引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻此經以病之寒熱言筋之緩急也然而血氣無虧則雖熱未必緩雖寒未必急亦總由血氣之衰可知也嘗見有引內經之意而曰偏於左者以左寒而右熱偏於右者以右寒而左熱誠謬言也不知偏左者其急在左而右本無恙也偏右者亦然故無論左右凡其拘急之處即血氣所虧之處也以藥治者左右皆宜從補以艾治者當隨其急處而灸之蓋經脈既虛須借艾火之溫以行其氣氣行則血行故筋可舒而歪可正也凡諸灸法有言左灸右右灸左者此亦內經繆刺論之法從之亦無不可至若經言寒熱則凡如唇緩流涎聲重語遲含糊者是皆縱緩之類縱緩者多由乎熱而間亦有寒者氣虛故也歪斜牽引抽搐反張者皆拘急之類拘急者多由乎寒而間亦有熱者血虛故也蓋經所言者言理之常余所言者言病之變亦無非理也使讀經不明理必反害經意矣故臨此證者不可不加之詳審一非風瘛瘲等證亦有寒熱之辨觀之經曰寒則反折筋急熱則筋弛縱不收此固其常也然寒熱皆能拘急亦皆能弛縱此又不可不知如寒而拘急者以寒盛則血凝血凝則滯澀滯澀則拘急此寒傷其營也熱而拘急者以火盛則血燥血燥則筋枯筋枯則拘急此熱傷其營也又若寒而弛縱者以寒盛則氣虛氣虛則不攝不攝則弛縱此寒傷其衛也熱而弛縱者以熱盛則筋軟筋軟則不收不收則弛縱此熱傷其衛也以此辨之豈不明析且或寒或熱必有脈證可據但宜因證而治之若病無寒熱則當專治血氣無疑矣論治血氣共二條凡非風口眼歪斜半身不遂及四肢無力掉搖拘攣之屬皆筋骨之病也夫肝主筋腎主骨肝藏血腎藏精精血虧損不能滋養百骸故筋有緩急之病骨有痿弱之病總由精血敗傷而然即如樹木之衰一枝津液不到即一枝枯槁人之偏廢亦猶是也經曰足得血而能步掌得血而能握今其偏廢如此豈非血氣衰敗之故乎臨川陳先生曰醫風先醫血血行風自滅蓋謂肝邪之見本由肝血之虛肝血虛則燥氣乘之而木從金化風必隨之故治此者只當養血以除燥則真陰復而假風自散矣若用風藥則風能勝濕血必愈燥大非宜也一偏枯拘急痿弱之類本由陰虛言之詳矣然血氣本不相離故陰中有氣陰中亦有血何以辨之夫血非氣不行氣非血不化凡血中無氣則病為縱緩廢弛氣中無血則病為抽掣拘攣何也蓋氣主動無氣則不能動不能動則不能舉矣血主靜無血則不能靜不能靜則不能舒矣故筋緩者當責其無氣筋急者當責其無血無血者宜三陰煎或大營煎小營煎之類主之無氣者宜五福飲四君子湯十全大補湯之類主之其與痿證之不動痛風之不靜者義稍不同詳列本門非風諸證治法共十二條凡非風證未有不因表裡俱虛而病者也外病者病在經內病者病在臟治此之法只當以培補元氣為主若無兼證亦不宜攻補兼施徒致無益蓋其形體之壞神志之亂皆根本傷敗之病何邪之有能復其元則庶乎可望其愈一初病卒倒危急不醒但察其有無死證如無死證而形氣不脫又無痰氣但扶定掐其人中自當漸醒或以白湯薑湯徐徐灌之亦可待其蘇醒然後察證治之若無痰無氣而息微色白脈弱暴脫者急以獨參湯或淡薑湯灌之俱可若其有痰甚者以前治痰法吐之其痰不甚或以白湯調抱龍丸一丸以暫開其痰無痰聲者不可用若因氣厥昏沉而氣壅喘滿氣閉不醒者則用淡薑湯調蘇合丸一丸以暫開其氣若氣不壅滿者不可用其有久之不醒或牙關不能開者則以半夏或牙皂細辛之類為末少許吹入鼻中有嚏者可治無嚏者不可治或以皂莢為末捻紙燒煙衝入鼻中亦可一人於中年之後多有此證其衰可知經云人年四十而陰氣自半正以陰虛為言也夫人生於陽而根於陰根本衰則人必病根本敗則人必危矣所謂根本者即真陰也人知陰虛惟一而不知陰虛有二如陰中之水虛則多熱多燥而病在精血陰中之火虛則多寒多滯而病在神氣若水火俱傷則形神俱弊難為力矣火虛者宜大補元煎右歸飲右歸丸八味地黃丸之類主之庶可以益火之源水虛者宜左歸飲左歸丸六味地黃丸之類主之庶可以壯水之主若氣血俱虛速宜以大補元煎之類悉力挽回庶可療也凡多熱多火者忌辛溫及參朮薑桂之類皆不宜輕用多寒多濕者忌清涼如生地芍藥麥冬石斛之類皆非所宜若氣虛卒倒別無痰火氣實等證而或者妄言中風遽用牛黃丸蘇合丸之類再散其氣則不可救矣一非風有火盛而病者即陽證也火甚者宜專治其火以徙薪飲抽薪飲白虎湯之類酌而用之火微者宜兼補其陰以一陰煎二陰煎或加減一陰煎之類主之凡治火之法但使火去六七即當調治其本然陽盛者陰必病故治熱必從血分甚者用苦寒微者用甘涼欲其從乎陰也一非風有寒盛而病者即陰證也專宜益火寒微者宜溫胃飲八味地黃丸之類主之寒甚者宜右歸飲回陽飲理中湯四逆湯之類主之然寒勝者陽必病故治寒之法必從氣分而從乎陽也如陽脫寒甚者仍宜灸關元氣海神闕以回其陽氣一非風眩運掉搖惑亂者總由氣虛於上而然經曰上氣不足腦為之不滿頭為之苦傾目為之苦眩又曰上虛則眩此明訓也凡微覺此證即當以五福飲之類培其中氣虛甚者即宜用大補元煎或十全大補湯之類治之否則卒倒之漸所由至也丹溪曰無痰不作運豈眩運者必皆痰證耶此言最為不妥別有詳義見眩運門一非風麻木不仁等證因其血氣不至所以不知痛癢蓋氣虛則麻血虛則木麻木不已則偏枯痿廢漸至日增此魄虛之候也經曰痱之為病身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也此即其類而但有微甚之辨耳又經曰營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用肉如故也人身與志不相有曰死亦此類也故凡遇此證只宜培養血氣勿得誤認為痰一夏月卒倒忽患非風抽搐等證此火剋金熱傷氣而然即今人之所謂暑風也氣虛者宜用參耆或十味香薷飲亦可若水不制火而多煩渴者宜生脈散或人參竹葉石膏湯若火獨盛者宜瓜水緑豆飲或用芩連之屬暫解其熱若單由傷氣而無火者宜獨參湯或四君子湯若伏陰在內而陽虛氣脫者必用附子理中湯或六味回陽飲之類放膽用之勿謂夏月忌溫熱此不達之言也一肥人多有非風之證以肥人多氣虛也何以肥人反多氣虛蓋人之形體骨為君也肉為臣也肥人者柔勝於剛陰勝於陽者也且肉以血成總皆陰類故肥人多有氣虛之證然肥人多濕多滯故氣道多有不利若果痰氣壅滯則不得不先為清利宜於前治痰之法隨宜暫用若無痰而氣脫卒倒者必宜四君六君或十全大補湯大補元煎之類主之一非風煩熱自汗小水不利者不可以藥利之蓋津液外泄小水必少若再用滲利則陰水愈竭無以制火而躁煩益甚但使熱退汗止則小水自利也況自汗者多屬陽明之證亦忌利小便宜生脈散一陰煎之類主之火甚者宜加減一陰煎一非風遺尿者由腎氣之虛脫也最為危證宜參耆歸術之類補之是矣然必命門火衰所以不能收攝其有甚者非加桂附終無濟也一尸厥酒厥痰厥氣厥血厥之屬今人皆謂之中風而不知總屬非風也俱詳後厥逆本門論用藥佐使凡非風而有兼證者則通經佐使之法本不可廢蓋其脈絡不通皆由血氣血氣兼證各有所因如因於風者必閉郁因於寒者必凝澀因於熱者必乾涸因於濕者必壅滯因於虛者必不運行諸如此者皆能阻塞經絡此佐使之法所以亦有不同也凡風閉者宜散而通之如麻黃桂枝柴胡羌活細辛白芷之屬是也寒凝者宜熱而通之如蔥椒桂附乾薑之屬是也熱燥者宜涼而通之如芩連梔柏石膏知母之屬是也濕滯者宜溫利而通之如蒼朮厚朴茵陳萆薢五苓之屬是也血滯者宜活而通之如芎歸牛膝紅花桃仁大黃芒硝之屬是也氣滯者宜行而通之如木香香附烏沉枳藿之屬是也痰滯者宜開而通之如南星半夏牛黃天竺黃硃砂海石玄明粉之屬是也氣血虛弱者宜溫補而通之如參耆歸朮熟地枸杞杜仲牛膝之屬是也凡此通經之法若乎盡矣然虛實之異猶當察焉蓋通實者各從其類使無實邪而妄用通藥則必傷元氣反為害矣通虛者則或陰或陽尤當知其要也如參耆所以補氣而氣虛之甚者非姜附之佐必不能追散失之元陽歸地所以補精血而陰虛之極者非桂附之引亦不能復無根之生氣寒邪在經而客強主弱非桂附之勇則血脈不行寒邪不去痰濕在中而土寒水泛者非姜附之暖則脾腎不健痰濕不除此通經之法大都實者可用寒涼虛者必宜溫熱也但附子之性剛勇而熱凡陰虛水虧而多熱多燥者自非所宜若無燥熱但涉陽虛而諸藥有不及者非此不能達也古人云附子與酒同功義可知矣今人謂附子有毒多不敢用不知制用得宜何毒之有此誠奇品其毋忽之辨經臟諸證共五條凡非風等證當辨其在經在臟經病者輕淺可延臟病者深重可畏經病者病連肢體臟病者敗在神氣雖病在經者無不由中而表裡微甚則各有所主此經臟之不可不辨也然在經在臟雖有不同而曰陰曰陽則無不本乎氣血但知氣血之緩急知陰陽之虧勝則盡其善矣若必曰某臟某經必用某方某藥不知通變多失其真故凡鑿執之談每有說得行不得者正以心之所至口不能宣也必也知幾知微斯足稱神悟之品一經病之輕證皮毛枯澀汗出眩運鼻塞者肺之經病血脈不榮顏色憔悴者心之經病肌肉消瘦浮腫不仁肉瞤筋惕四肢不用者脾之經病筋力疲困拘急掉瘛脅肋脹痛者肝之經病口眼歪斜者足陽明及肝膽經病骨弱無力坐立不能者腎之經病一經病之危證皮腠冰冷滑汗如油畏寒之甚者肺之經病舌強不能言者心腎經病唇緩口開手撒者脾之經病眼瞀昏黑無見筋痛之極者肝腎經病耳聾絶無聞骨痛之極者腎之經病反張戴眼腰脊如折者膀胱經病一臟病之稍輕證咳嗽微喘短氣悲憂不已者病在肺臟言語無倫神昏多笑不寐者病在心臟腹滿少食吐涎嘔惡吞酸噯氣譫語多思者病在脾胃胸脅氣逆多驚多怒者病在肝膽少腹疼痛二便不調動氣上衝陰痿呻吟多恐者病在腎臟一臟病之危證氣大急大喘或氣脫失聲色灰白或紫赤者肺腎氣絶神脫色脫昏沉不醒色赤黑者心臟氣絶痰涎壅極吞吐不能厄逆不止腹脹之極色青黑者脾胃氣絶眼閉不開急躁擾亂懊憹囊縮色青灰白者肝臟氣絶聲喑不出寒厥不回二便閉不能通泄不能禁者腎臟氣絶不治證凡非風口開眼閉手撒遺尿吐沫直視聲如鼾睡昏沉不醒肉脫筋痛之極髮直搖頭上竄面赤如裝或頭重面鼻山根青黑汗綴如珠痰聲漉漉者皆不治一非風之脈遲緩可生急數弦大者死述古共二條是皆風門論治故列於此華元化曰風之厥皆由中於四時不從之氣故為病焉有癮疹者有偏枯者有失音者有歷節者有癲厥者有疼痛者有聾瞽者有瘡癩者有脹滿者有喘乏者有赤白者有青黑者有瘙癢者有狂妄者皆起於風也其脈浮虛者自虛而得之實大者自實而得之弦緊者汗出而得之喘乏者飲酒而得之癲厥者自勞而得之手足不遂語言謇澀者房中而得之癮疹者自卑濕而得之歷節疼痛者因醉犯房而得之聾瞽瘡癩者自五味飲食冒犯禁忌而得之千端萬狀莫離於五臟六腑而生矣薛立齊曰前證若因腎虛陰火而肝燥者宜用六味地黃丸生腎水滋肝血若因怒動肝火而血耗者用四物加柴梔丹皮茯苓以清肝火生肝血若因脾經鬱結而血耗者用歸脾四物二湯以補脾氣生肝血若脾氣虛而痰滯者用二陳加白朮柴胡健脾以化痰若因脾虛濕而風痰不利者用二陳加南星蒼朮防風勝濕以化痰若脾經鬱而滯者用歸脾湯加柴胡半夏若腎經敗液為痰者用六味丸灸法凡用灸法必其元陽暴脫及營衛血氣不調欲收速效惟艾火為良然用火之法惟陽虛多寒經絡凝滯者為宜若火盛金衰水虧多燥脈數發熱咽乾面赤口渴便熱等證則不可妄加艾火若誤用之必致血愈燥而熱愈甚是反速其危矣一凡灸法頭面上艾炷宜小不宜大手足上乃可粗也又須自上而下不可先灸下後灸上灸非風卒厥危急等證神闕用淨鹽炒乾納於臍中令滿上加厚姜一片蓋定灸百壯至五百壯愈多愈妙姜焦則易之或以川椒代鹽或用椒於下上蓋以鹽再蓋以姜灸之亦佳丹田氣海二穴俱連命門實為生氣之海經脈之本灸之皆有大效灸非風連臟氣塞涎上昏危不語等證百會風池大椎肩井曲池間使足三里灸口眼歪斜聽會灸眼客主人灸眼頰車灸口地倉灸口承漿灸口合谷灸手足不遂偏枯等證百會肩髃曲池風市環跳足三里絶骨即懸鐘華元化曰心風者宜灸心俞肺風者宜灸肺俞脾風者宜灸脾俞肝風者宜灸肝俞腎風者宜灸腎俞又治陽脫灸法見熱陳四十六非風論列方四君子湯補一六君子湯補五金水六君煎新和一大補元煎新補一五福飲新補六五味異功散補四大營煎新補十四小營煎新補十五十全大補湯補二十四物湯補八歸脾湯補三二補中益氣湯補三十二陰煎新補十一陰煎新補八加減一陰煎新補九三陰煎新補十一四逆湯熱十四十味香薷飲和一七一獨參湯補三五生脈散補五六六味回陽飲新熱二理中湯熱一理陰煎新熱三溫胃飲新熱五左歸飲新補二右歸飲新補三六味丸補百二十左歸丸新補四右歸丸新補五八味丸補一二一二陳湯和一六安煎新和二白虎湯寒二抽薪飲新寒三徙薪飲新寒四緑豆飲新寒十四抱龍丸小八五牛黃丸和三六五蘇合丸和三七一吐法新攻一獨聖散攻百六茶調散攻百七稀涎散攻四三人參竹葉石膏湯寒五論外備用方參附湯補三七朮附湯補四一神效黃耆湯補四八麻木人參膏補一六三地黃飲子補九九青州白丸子和百十二痰氣三生飲熱九四痰盛愈風丹和二七四血氣受邪易老天麻丸和二七五血虛受邪交加散和二五二血虛經閉三建湯熱四二陰厥神應養真丹和三一三癱瘓通關散因九八續斷丸和三百六腳病酒浸牛膝丸和三百八腰腳無力調元健步丸和三一一下步無力厥逆經義並附釋義脈解篇曰內奪而厥則為喑俳此腎虛也少陰不至者厥也詳本篇之言厥者以其內奪謂奪其五內之精氣也喑聲不能出也俳肢體偏廢也今人見此必皆謂之中風而不知由於內奪由於腎虛蓋聲出於肺而本乎腎形強在血而本乎精精氣之本皆主於腎故少陰不至則為厥又調經論曰志不足則厥本神篇曰腎氣虛則厥觀此諸論則非風之義可知矣故凡治此者當以前非風證治第三條等法主之調經論岐伯曰氣之所併為血虛血之所併為氣虛帝曰人之所有者血與氣耳今夫子乃言血併為虛氣併為虛是無實乎岐伯曰有者為實無者為虛今血與氣相失故為虛焉血與氣並則為實焉血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死氣併為血虛血併為氣虛此陰陽之偏敗也今其氣血並走於上則陰虛於下而神氣無根是即陰陽相離之候故致厥脫而暴死復反者輕不反者甚此正時人所謂卒倒暴僕之中風亦即痰火上壅之中風而不知實由於下虛也然上實者假實也其有甚者亦宜稍為清理下虛者若無實邪可據則速當峻補其下陽明脈解篇曰厥逆連臟則死連經則生觀本篇之連經連臟本以厥逆為言何其明顯平正蓋連經者病在肌表故輕而生連臟者病在根本故重而死既知此為厥逆則凡卒倒暴僕等證其非風也可知而河間諸公皆以中腑中臟為言則是風非風始混亂而莫辨矣大奇論曰脈至如喘名曰暴厥暴厥者不知與人言解精微論曰厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也詳此二論云脈至如喘者謂脈之急促如喘此血氣敗亂之候故致暴厥不言即今人所謂中風不語之屬也雲陽並於上陰並於下此即上熱下寒水火不交之候故為目無所見即中風昏眩之屬也不語者責在肺腎昏眩者責在肝脾暫見者氣復則蘇陰敗者最危之候俱當按法如前而救其本癲狂篇曰厥逆為病也足暴清胸若將裂腸若將以刀切之煩而不能食脈大小皆澀暖取足少陰清取足陽明清則補之溫則瀉之暴清即暴冷也若裂若切謂其懊憹痛楚莫可名狀此即所謂躁擾煩亂之中風也有火者多溫熱而脈洪大宜清陰中之火有痰者多喘壅而脈滑實宜開上焦之痰無火無痰多寒涼而脈澀弱宜補其元氣凡證有若此而兼之昏亂不醒者此真連臟之甚者也多不可治生氣通天論曰陽氣者煩勞則張精絶闢積於夏使人煎厥陽氣者大怒則形氣絶而血菀於上使人薄厥此云煎厥者即熱厥之類其因煩勞而病積於夏亦今云暑風之屬也若見抽搐痰涎卒倒者當即以前暑風之法治之薄厥者急迫相搏之謂因於大怒即氣厥血厥之屬治法如後通評虛實論曰凡治消疸僕擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也膈塞閉絶上下不通則暴憂之病也暴厥而聾偏塞閉不通內氣暴薄也不從內外中風之病故瘦留著也詳此膏粱之疾即酒色之傷脾腎之病也暴憂之病即悲憂傷肺之屬也內氣暴薄即鬱怒傷肝之屬也凡此皆內傷之病其有不從內而外中於風者則必留著經絡故為消瘦痛痹之病是可見內傷外感之辨其不可混言有如此逆順肥瘦篇曰夫衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸精其下者注少陰之大絡出於氣街循陰股內廉入膕中伏行骭骨內下至內踝之後屬而別其下者並於少陰之經滲三陰其前者伏行出跗屬下循跗入大指間滲諸絡而溫肌肉故別絡結則跗上不動不動則厥厥則寒矣詳此衝脈之義則上自頭下自足後自背前自腹凡五臟六腑十二經脈無所不稟故稱為五臟六腑十二經脈之海夫海為百川之宗凡諸經發源之處即皆有會合之義其於通身血氣盛衰皆歸乎此可知也然衝脈起於胞中即其經絡之所亦即其聚蓄之所故稱為血海亦稱為命門此即所謂根本之宅也若素縱情欲以致精氣之源傷敗於此則厥脫暴僕等病亦因於此不然則何以忽然仆倒而神形俱敗表裡俱殘全無知覺一至於此是豈一經一臟之病之所致歟於此察之則實由衝脈崩敗必無疑矣故凡治此者欲舍根蒂而求其濟吾知其必無是理也衝脈詳義具類經經絡類第二十七篇注中繆刺論曰邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥剃其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已仍有刺法詳二十七卷耳證門詳此尸厥一證乃外邪卒中之惡候凡四時不正之氣及山魔土煞五尸魘魅之屬皆是也犯之者忽然手足厥冷肌膚寒栗面目青黑精神不守或口噤妄言痰涎壅塞或頭旋運倒不省人事即名飛尸卒厥宜用針法具見本經若用艾灸則無如秦承祖灸鬼法及華陀灸陽脫法為妙凡用藥之法當知邪之所湊必因氣虛故在本經即以左角之血餘用補五絡之脫竭其義可知若此危急之際非用參附回陽等藥何以挽回若果邪氣壅盛胸膈不清則不得不先為開通然後調理宜不換金正氣散流氣飲蔥薑湯蘇合丸之類酌而主之方盛衰論雷公請問氣之多少何者為逆何者為從帝曰陽從左陰從右老從上少從下是以氣多少逆皆為厥問曰有餘者厥耶答曰一上不下寒厥到膝少者秋冬死老者秋冬生氣上不下頭痛癲疾求陽不得求陰不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿日是以少氣之厥令人妄夢其極至迷此言氣逆者即為厥也凡陰陽之氣陽從左而升陰從右而降故陽病者左為甚陰病者右為甚以升者不升降者不降而逆其升降之氣也又人之生氣必自下而升故老人之氣已衰於下而從上者為順少壯之氣先盛於下而從下者為順若以老人而神衰於上其所終之氣可知少壯而形衰於下其所始之氣可知皆逆候也及其為病而一上不下此其根本已虧故寒厥到膝少年以陽氣方盛而陽衰若此故秋冬當死老人以陽氣本衰而畏寒其常故秋冬無慮凡此厥逆之病謂其陽若非陽謂其陰若非陰五臟隔絶無徵可驗若不能終其日者蓋甚言其凋敝難為也再若人之妄夢而有至迷亂昏絶者此以心腎不交而精神散越故為厥逆有至如此亦總屬少陰根本之病厥論岐伯曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥帝曰熱厥之為熱也必起於足下者何也岐伯曰陽氣起於足五指之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也帝曰寒厥之為寒也必從五指而上於膝者何也曰陰氣起於五指之裡集於膝下而聚於膝上故陰氣勝則從五指至膝上寒其寒也不從外皆從內也寒厥何失而然也此人者質壯以秋冬奪於所用陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也熱厥何如而然也酒入於胃則絡脈滿而經脈虛陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四支也此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而憛悍腎氣日衰陽氣獨勝故手足為之熱也帝曰厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也岐伯曰陰氣盛於上則下虛下虛則腹脹滿陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也厥論帝曰願聞六經脈之厥狀病能也岐伯曰巨陽之厥則腫首頭重足不能行發為眴僕嘔血善衄陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見而妄言喘咳身熱善驚衄嘔血少陽之厥則暴聾頰腫而熱脅痛胻不可以運機關不利腰不可以行項不可以顧發腸癰不可治驚者死太陰之厥則腹滿䐜脹後不利不飲食食則嘔不得臥胻急攣心痛引腹少陰之厥則口乾溺赤腹滿心痛嘔變下泄清厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫胻內熱攣腰痛虛滿前閉譫言三陰俱逆不得前後使人手足寒三日死手太陰厥逆虛滿而咳善嘔沫手心主少陰厥逆心痛引喉身熱死不可治手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰手陽明少陽厥逆發喉痹嗌腫痙詳本論之寒厥熱厥雖皆以手足為言而實以陰陽之敗亂為言也故寒厥言奪於所用熱厥言因於數醉正以陰陽之氣無不起於手足故凡厥之將作則寒熱麻痹必先由手足而起及其甚也則變出百端或五臟六腑各有其證如此然則手足之厥特其形見之徵兆耳而見微知著自當因標而慮本也傷寒厥逆仲景曰傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也厥少熱多其病當愈寒多熱少陽氣退其病為進也詳此仲景之厥逆頗與內經有異蓋以手足言之在內經則有寒厥熱厥之分在仲景則單以逆冷者為厥再以邪正言之在內經則論在元氣故其變出百端而在氣在血俱有危證在仲景則論在邪氣故單據手足而所畏者則在陰進而陽退也觀成無己曰厥為陰之盛也義可知矣諸傷寒厥逆等證俱詳具傷寒門論證厥逆之證危證也蓋厥者盡也逆者亂也即氣血敗亂之謂也故內經特重而詳言之如雲卒厥暴厥者皆厥逆之總名也如雲寒厥熱厥者分厥逆之陰陽也如雲連經連臟者論厥逆之死生也再若諸經臟腑之辨亦既詳矣又近世猶有氣厥血厥痰厥酒厥臟厥蛔厥等證亦無非本之經義觀內經諸論已極明顯奈何後人猶不能察凡遇此證則悉認之為中風竟不知厥逆為何病而通作風治害孰甚焉余深悲之故於前非風門悉力辨正至於治此之法即當以前非風證治互相參用正所以治厥逆也其有未盡等證仍列如後條論治共七條一寒厥熱厥之治凡寒厥者必四肢清涼脈沉微不數或雖數而無力或畏寒喜熱引衣自覆或下痢清穀形證多惺惺雖此類皆屬寒證然似熱非熱之證猶多故凡以手足見厥而脈證俱無實熱者悉寒厥之無疑也熱厥者必先多熱證脈沉滑而數畏熱喜冷揚手掉足或煩躁不寧大便祕赤形證多昏冒凡治此二者即當以非風門治寒治熱之法主之至若傷寒厥證其陰其陽亦當以此法為辨但傷寒之厥辨在邪氣故寒厥宜溫熱厥可攻也內經之厥重在元氣故熱厥當補陰寒厥當補陽也二者之治不可不察一氣厥之證有二以氣虛氣實皆能厥也氣虛卒倒者必其形氣索然色清白身微冷脈微弱此氣脫證也宜參耆歸朮地黃枸杞大補元煎之屬甚者以回陽飲獨參湯之類主之氣實而厥者其形氣憤然勃然脈沉弦而滑胸膈喘滿此氣逆證也經曰大怒則形氣絶而血菀於上即此類也治宜以排氣飲或四磨飲或八味順氣散蘇合香丸之類先順其氣然後隨其虛實而調理之又若因怒傷氣逆氣旋去而真氣受損者氣本不實也再若素多憂鬱恐畏而氣怯氣陷者其虛尤可知也若以此類而用行氣開滯等劑則誤矣一血厥之證有二以血脫血逆皆能厥也血脫者如大崩大吐或産血盡脫則氣亦隨之而脫故致卒僕暴死宜先掐人中或燒醋炭以收其氣急用人參一二兩煎湯灌之但使氣不盡脫必漸蘇矣然後因其寒熱徐為調理此所謂血脫益氣也若不知此而但用血分等藥則幾微之氣忽爾散失陰無所主無生機矣其或有用寒涼以止血者必致敗絶陽氣適足以速其死耳血逆者即經所云血之與氣並走於上之謂又曰大怒則形氣絶而血菀於上之類也夫血因氣逆必須先理其氣氣行則血無不行也宜通瘀煎或化肝煎之類主之俟血行氣舒然後隨證調理一痰厥之證凡一時痰涎壅塞氣閉昏憒藥食俱不能通必先宜或吐或開以治其標此不得不先救其急也但覺痰氣稍開便當治其病本如因火生痰者宜清之降之因風寒生痰者宜散之溫之因濕生痰者宜燥之利之因脾虛生痰者自宜補脾因腎虛生痰者自宜補腎此痰之不必治也但治其所以痰而痰自清矣然猶有不可治痰者恐愈攻愈虛而痰必愈甚也諸治痰法見前非風門治痰條中一酒厥之證即經所云熱厥之屬也又經云酒風者亦此類也凡縱飲無節之人多有此病方其氣血正盛力能勝之不知酒害之何有及其將衰則酒之侮人斯可畏耳酒病極多莫知所出其為酒厥則全似中風輕者猶自知人重者卒爾運倒忽然昏憒或躁煩或不語或痰涎如湧或氣喘發熱或咳嗽或吐血但察其大便乾燥脈實喜冷者此濕熱上壅之證宜以抽薪飲之類疾降其火火之甚者仍以梨漿飲緑豆飲之屬更迭進之以解其毒此證大忌辛燥等物務使濕熱漸退神氣稍復然後用補陰等劑以善其後其有大便不實或無火證而脈見緩弱者則不宜清火但以二陳湯六君子湯或金水六君煎之類主之若因酒傷陰以致脾腎兩虛而為厥脫者非速救本源終無濟也凡患此者宜終身忌酒勿使沾唇可也若不知戒再犯必難為矣一色厥之證有二一曰暴脫一曰動血也凡色厥之暴脫者必以其人本虛偶因奇遇而悉力勉為者有之或因相慕日久而縱竭情欲者亦有之故於事後則氣隨精去而暴脫不返宜急掐人中仍令陰人摟定用口相對務使暖氣噓通以接其氣勿令放脫以保其神隨速用獨參湯灌之或速灸氣海數十壯以復陽氣庶可挽回第以臨時慌張焉知料理故每致不救然此以即病者言所見誠不多也其有不即病而病此者則甚多也又何以言之以其精去於頻而氣脫於漸故每於房欲二三日之後方見此證第因其病不在即故不以此為病兼之人多諱此而不知中年之後多有因此而病者是皆所謂色厥也奈時師不能察而每以中風斃之耳凡治此者單宜培補命門或水或火當以非風門治法第三條者主之又色厥之動血者以其血氣並走於上亦血厥之屬也但與大怒血逆者不同而治法亦有所異蓋此因欲火上炎故血隨氣上必其情欲動極而欲不能遂者有之或借曲糵以強遏鬱火者亦有之其證則忽爾暴吐或鼻衄不能禁止或厥逆或汗出或氣喘或咳嗽此皆以陰火上衝而然凡治此者必先制火以抑其勢宜清化飲四陰煎或加減一陰煎之類主之其有陰竭於下火不歸源別無煩熱脈證而血厥不止垂危者非鎮陰煎必不能救待其勢定然後因證酌治之一臟厥蛔厥二證皆傷寒證也並見傷寒門述古華元化陽厥論曰驟風暴熱雲物飛揚晨晦暮晴夜炎晝冷應寒不寒當雨不雨水竭土壞時歲大旱草木枯悴江河之涸此天地之陽厥也暴壅塞忽喘促四肢不收二腑不利耳聾目盲咽乾口焦喉舌生瘡鼻流清涕頰赤心煩頭昏腦重雙晴似火一身如燒素不能者乍能素不欲者乍欲登高歌笑棄衣奔走狂言妄語不辨親疏發躁無度飲水不休胸膈膨脹腹脅滿悶背疽肉爛煩潰消中食不入胃水不穿腸驟腫暴滿叫呼昏冒不省人事疼痛不知去處此人之陽厥也陽厥之脈舉按有力者生絶者死陰厥論曰飛霜走雹朝昏暮靄雲雨飄颻風露寒冷當熱不熱未寒而寒時氣淋淫泉生田野山摧地裂土壞河溢月晦日昏此天地之陰厥也暴啞卒寒一身拘急四肢拳攣唇青面黑目直口噤心腹滿痛頭頷搖鼓腰腳沉重語言謇澀上吐下瀉左右不仁大小便滑吞吐酸淥悲憂慘戚喜怒無常者此人之陰厥也陰厥之脈舉指弱按指大者生舉按俱絶者死一身悉冷額汗自出者亦死陰厥之病過三日勿治厥逆論列方獨參湯補三五大補元煎新補一六君子湯補五鎮陰煎新熱十三四陰煎新補十二六味回陰飲新熱二清化飲新因十三化肝煎新寒十四味回陽飲新熱一二陳湯和一排氣飲新和六金水六君煎新和一通瘀煎新因五四磨飲和五二加減一陰煎新補九蘇合香丸和三七一八味順氣散和二四四論外備用方星香湯和二四三痰氣厥四逆湯熱十四寒厥沉香桂附丸熱百十一厥冷三建湯熱四二陰寒姜附湯熱三二厥冷轉筋附子理中湯熱二虛寒大已寒丸熱百七十中寒養正丹熱一八八痰厥不降四逆散散二八熱厥傷風經義骨空論曰風者百病之始也風從外入令人振寒汗出頭痛身重惡寒治在風府調其陰陽不足則補有餘則瀉陰陽應象大論曰邪風之至疾如風雨太陰陽明論曰陽受風氣陰受濕氣傷於風者上先受之傷於濕者下先受之歲露論曰賊風邪氣乘虛傷人八正神明論曰正邪者身形若用力汗出腠理開逢虛風其中人也微故莫如其情莫見其形平人氣象論曰脈滑曰風風論曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰飲食其熱也則消肌肉故使人怢栗而不能食名曰寒熱評熱病論曰勞風法在肺下其為病使人強上冥視唾出若涕惡風而振寒此為勞風之病巨陽引精者三日中年者五日不精者七日咳出清黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也此節有說在咳嗽門論證傷風之病本由外感但邪甚而深者遍傳經絡即為傷寒邪輕而淺者止犯皮毛即為傷風皮毛為肺之合而上通於鼻故其在外則為鼻塞聲重甚者並連少陽陽明之經而或為頭痛或為憎寒發熱其在內則多為咳嗽甚則邪實在肺而為痰為喘有寒勝而受風者身必無汗而多咳嗽以陰邪閉郁皮毛也有熱勝而受風者身必多汗惡風而咳嗽以陽邪開泄肌腠也有氣強者雖見痰嗽或五六日或十餘日肺氣疏則頑痰利風邪漸散而愈也有氣弱者邪不易解而痰嗽日甚或延綿數月風邪猶在非用辛溫必不散也有以衰老受邪而不慎起居則舊邪未去新邪繼之多致終身受其纍此治之尤不易也蓋凡風邪傷人必在肩後頸根大杼風門肺俞之間由茲達肺最近最捷按而酸處即其徑也故凡氣體薄弱及中年以後血氣漸衰者邪必易犯但知慎護此處或晝坐則常令微暖或夜臥則以衣帛之類密護其處勿使微涼則可免終身傷風咳嗽之患此余身驗切效之法謹録之以告夫惜身同志者論治凡傷風咳嗽多痰或喘急嘔惡者宜六安煎加減治之為最妙二陳湯多加生薑亦可若外感風寒咳嗽多痰喘急而陰虛血氣不足痰有不活氣有不充則托送無力邪不易解宜金水六君煎其效如神若年衰胃弱者尤宜用之若傷風兼寒而咳嗽發熱者宜柴陳煎若時行風邪在肺咳嗽喘急多痰而陰寒氣甚邪不易解者宜小青龍湯或消風百解散或金沸草散若傷風初感寒熱往來涕唾稠黏胸膈不快咳嗽多痰者參蘇飲若傷風頭痛鼻塞聲重咳嗽者局方神朮散或川芎茶調散若感風兼濕而頭目不清鼻塞聲重者宜沖和散若風寒外閉肢節煩疼鼻塞聲重而內多伏火者局方羌活散若太陽經傷風發熱自汗惡風者桂枝湯傷風論列方六安煎新和二二陳湯和一金水六君煎新和一參蘇飲散三四沖和散散八十消風百解散散四六桂枝湯散九柴陳煎新散九局方神朮散散六五小青龍湯散八金沸草散散八一局方羌活散散八六川芎茶調散散六四論外備用方三拗湯散七八鼻塞咳嗽華蓋散散七九嗽
