body:
  text: 卷之十八理集雜證謨怔忡驚恐經義平人氣象論曰胃之大絡名曰虛里貫鬲絡肺出於左乳下其動應衣脈宗氣也詳前脾胃門陰陽應象大論曰心在志為喜肝在志為怒脾在志為思肺在志為憂腎在志為恐金匱真言論曰東方色青入通於肝其病發驚駭脈解篇曰陽明所謂甚則厥惡人與火聞木音則惕然而驚者陽氣與陰氣相搏水火相惡故惕然而驚也舉痛論曰驚則氣亂驚則心無所倚神無所歸慮無所定故氣亂矣六元正紀大論曰少陰所至為驚惑惡寒戰栗譫妄少陽所至為驚躁瞀昧暴病五常政大論曰委和之紀其發驚駭至真要大論曰少陽之復大熱將至驚瘛咳衄心熱煩躁陽明之復清氣大舉甚則入肝驚駭筋攣諸病胕腫疼酸驚駭皆屬於火陰陽別論曰二陽一陰發病主驚駭背痛大奇論曰肝脈鶩暴有所驚駭二陰急為癇厥二陽急為驚脈至如數使人暴驚三四日自已陰陽應象大論曰腎在志為恐恐傷腎思勝恐藏氣法時論曰肝虛則目䀮䀮無所見耳無所聞善恐如人將捕之舉痛論曰恐則氣下恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣本神篇曰恐懼者神蕩憚而不收心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬恐懼而不解則傷精精傷則骨酸痿厥精時自下邪氣臟腑病形篇曰愁憂恐懼則傷心壽夭剛柔篇曰憂恐忿怒傷氣本神篇曰肝氣虛則恐實則怒調經論曰神有餘則笑不休神不足則悲血有餘則怒不足則恐論怔忡怔忡之病心胸築築振動惶惶惕惕無時得寧者是也然古無是名其在內經則曰胃之大絡名曰虛里出於左乳下其動應衣宗氣泄也在越人仲景則有動氣在上下左右之辨云諸動氣皆不可汗下也凡此者即皆怔忡之類此證惟陰虛勞損之人乃有之蓋陰虛於下則宗氣無根而氣不歸源所以在上則浮撼於胸臆在下則振動於臍旁虛微者動亦微虛甚者動亦甚凡患此者速宜節欲節勞切戒酒色凡治此者速宜養氣養精滋培根本若或誤認為痰火而妄施清利則速其危矣外傷寒門論下條附有動氣辨宜能證之論驚恐驚有二證有因病而驚者有因驚而病者如東方色青入通於肝其病發驚駭及傷寒陽明證聞木音則惕然而驚之類此則或因歲火之盛或因歲木之衰或因風熱之相搏或因金木之相制是當察客邪以兼治其標若因驚而病者如驚則氣亂而心無所倚神無所歸慮無所定之類此必於聞見奪氣而得之是宜安養心神滋培肝膽當以專扶元氣為主治此固二者之辨然總之主氣強者不易驚而易驚者必肝膽之不足者也故雖有客邪亦當知先本後標之義又如驚則氣亂恐則氣下驚恐雖若同類而不知恐之傷人尤甚於驚何也蓋驚出於暫而暫者即可復恐積於漸而漸者不可解甚至心怯而神傷精卻則陰痿日消月縮不亡不已此非大勇大斷者必不能拔去其病根徒資藥力不易及也豫嘗治暴驚者十愈其八九治恐懼者十不得其一二論治共三條凡治怔忡驚恐者雖有心脾肝腎之分然陽統乎陰心本乎腎所以上不寧者未有不由乎下心氣虛者未有不因乎精此心肝脾腎之氣名雖有異而治有不可離者亦以精氣互根之宜然而君相相資之全力也然或宜先氣而後精或宜先精而後氣或兼熱者之宜清或兼寒者之宜暖此又當因其病情而酌用之故用方者宜圓不宜鑿也一心脾血氣本虛而或為怔忡或為驚恐或偶以大驚猝恐而致神志昏亂者俱宜七福飲甚者大補元煎命門水虧真陰不足而怔忡不已者左歸飲命門火虧真陽不足而怔忡者右歸飲三陰精血虧損陰中之陽不足而為怔忡驚恐者大營煎或理陰煎若水虧火盛煩躁熱渴而怔忡驚悸不寧者二陰煎或加減一陰煎若思郁過度耗傷心血而為怔忡驚悸者逍遙飲或益營湯若寒痰停蓄心下而怔忡者薑朮湯一心虛血少神志不寧而驚悸者養心湯或寧志丸或十四友丸若因驚失志而心神不寧者寧志膏或遠志丸心血不足肝火不清血熱多驚者硃砂安神丸心神虛怯微兼痰火而驚悸者八物定志丸心氣鬱滯多痰而驚者加味四七湯痰迷心竅驚悸者溫膽湯或茯苓飲子甚者硃砂消痰飲風熱生痰上乘心膈而驚悸者簡要濟衆方若大恐大懼以致損傷心脾腎氣而神消精卻飲食日減者必用七福飲理陰煎或大營煎或大補元煎之類酌宜治之然必宜洗心滌慮盡釋病根則庶可保全也怔忡論列方七福飲新補七大營煎新補十四大補元煎新補一左歸飲新補二右歸飲新補三加減一陰煎新補九寧志丸補百十四遠志丸補百十三八物定志丸補百十七寧志膏補百十五養心湯補七九硃砂安神丸寒一四二益營湯補九一溫膽湯和一五一硃砂消痰飲和百理陰煎新熱三二陰煎新補十加味四七湯和九八逍遙飲新因一薑朮湯熱八八簡要濟衆方和三五六十四友丸補百十八茯苓飲子和九四論外備用方歸脾湯補三二人參丸補百五固精安神人參養營湯補二一開心散補八二定志丸補百十六通心氣祕傳酸棗仁湯補八五補心氣心腎丸補百十二心腎俱虛歸神丹和三五九風痰虛驚加味四君子湯補二補脾肺酸棗仁湯補八四清心養心遠志飲子補八九溫補心氣平補鎮心丹補百十鎮心養心天王補心丹補百八除驚悸十味溫膽湯和一五三心虛遺精龍腦雞蘇丸和三七二虛火煩熱不寐經義邪客篇帝曰夫邪氣之客人也或令人目不瞑不臥出者何氣使然伯高曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝行於陽夜行於陰常從足少陰之分間行於五臟六腑今厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺陷不得入於陰陰虛故目不瞑帝曰善治之奈何伯高曰補其不足瀉其有餘調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已調其臥立至大惑論帝曰病不得臥者何氣使然岐伯曰衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑矣帝曰病目而不得視者何氣使然岐伯曰衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉矣帝曰人之多臥者何氣使然岐伯曰此人腸胃大而皮膚濕而分肉不解焉腸胃大則衛氣留久皮膚濕則分肉不解其行遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於陰也久其氣不清則欲瞑故多臥矣其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少瞑焉帝曰其非常經也卒然多臥者何氣使然岐伯曰邪氣留於上焦上焦閉而不通已食若飲湯衛氣留久於陰而不行故卒然多臥焉帝曰善治此諸邪奈何岐伯曰先其臟腑誅其小過後調其氣盛者瀉之虛者補之必先明知其形志之苦樂定乃取之口問篇帝曰人之欠者何氣使然岐伯曰衛氣晝日行於陽夜半則行於陰陰者主夜夜者臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣瀉足少陰補足太陽寒熱病篇曰陰蹺陽蹺陰陽相交陽入陰陰出陽交於目鋭眥陽氣盛則瞋目陰氣盛則瞑目衛氣行篇曰平旦陰盡陽氣出於目目張則氣上行於頭夜行於陰則復合於目故為一周營衛生會篇曰夜半為陰隴夜半後而為陰衰平旦陰盡而陽受氣矣日中為陽隴日西而陽衰日入陽盡而陰受氣矣夜半而大會萬民皆臥命曰合陰平旦陰盡而陽受氣如是無已與天地同紀帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然岐伯曰壯者之氣血盛則肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五臟之氣相搏其營氣衰少而衛氣內伐故晝不精夜不瞑水熱穴論曰故水病下為胕腫大腹上為喘呼不得臥者標本俱病評熱病論曰不能正偃者胃中不和也正偃則咳甚上迫肺也諸水病者故不得臥臥則驚驚則咳甚也太陰陽明論曰犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼逆調論曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也下經曰胃不和則臥不安此之謂也夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也帝曰人之不得偃臥者何也岐伯曰肺者臟之蓋也肺氣盛則脈大脈大則不得偃臥論證共三條不寐證雖病有不一然惟知邪正二字則盡之矣蓋寐本乎陰神其主也神安則寐神不安則不寐其所以不安者一由邪氣之擾一由營氣之不足耳有邪者多實證無邪者皆虛證凡如傷寒傷風瘧疾之不寐者此皆外邪深入之擾也如痰如火如寒氣水氣如飲食忿怒之不寐者此皆內邪滯逆之擾也舍此之外則凡思慮勞倦驚恐憂疑及別無所纍而常多不寐者總屬其陰精血之不足陰陽不交而神有不安其室耳知此二者則知所以治此矣一飲濃茶則不寐心有事亦不寐者以心氣之被伐也蓋心藏神為陽氣之宅也衛主氣司陽氣之化也凡衛氣入陰則靜靜則寐正以陽有所歸故神安而寐也而濃茶以陰寒之性大制元陽陽為陰抑則神索不安是以不寐也又心為事擾則神動神動則不靜是以不寐也故欲求寐者當養陰中之陽及去靜中之動則得之矣一凡治病者服藥即得寐此得效之徵也正以邪居神室臥必不寧若藥已對證則一匕入咽群邪頓退盜賊甫去民即得安此其治亂之機判於頃刻藥之效否即此可知其有誤治妄投者反以從亂反以助瘧必致煩惱懊憹更增不快知者見幾當以此預知之矣論治共二條一無邪而不寐者必營氣之不足也營主血血虛則無以養心心虛則神不守舍故或為驚惕或為恐畏或若有所繫戀或無因而偏多妄思以致終夜不寐及忽寐忽醒而為神魂不安等證皆宜以養營養氣為主治若思慮勞倦傷心脾以致氣虛精陷而為怔忡驚悸不寐者宜壽脾煎或歸脾湯若七情內傷血氣耗損或恐畏傷腎或驚懼傷膽神以精虧而無依無寐者宜五福飲七福飲或三陰煎五君子煎擇而用之若營衛俱傷血氣大壞神魂無主而晝夜不寐者必用大補元煎加減治之若勞倦傷心脾中氣不足清陽不升外感不解而寒熱不寐者補中益氣湯若思慮過度心虛不寐而微兼煩熱者養心湯或酸棗仁湯若焦思過度耗心血動心火而煩熱乾渴不寐者天王補心丹若心虛火盛煩亂內熱而怔忡不寐者安神丸若精血虛耗兼痰氣內蓄而怔忡夜臥不安者祕傳酸棗仁湯痰盛者十味溫膽湯凡人以勞倦思慮太過者必致血液耗亡神魂無主所以不寐即有微痰微火皆不必顧只宜培養氣血血氣復則諸證自退若兼顧而雜治之則十暴一寒病必難愈漸至元神俱竭而不可救者有矣豫治周公不寐醫按附後三消門一有邪而不寐者去其邪而神自安也故凡治風寒之邪必宜散如諸柴胡飲及麻黃桂枝紫蘇乾葛之類是也火熱之邪必宜涼如竹葉石膏湯及芩連梔柏之屬是也痰飲之邪宜化痰如溫膽湯六安煎導痰湯滾痰丸之屬是也飲食之邪宜消滯如大和中飲平胃散之屬是也水濕之邪宜分利如五苓散五皮散或加減金匱腎氣丸之屬是也氣逆之邪宜行氣如排氣飲四磨飲之屬是也陰寒之邪宜溫中如理陰煎理中湯之屬是也諸如此類亦略舉大概未悉其詳仍當於各門求法治之述古徐東皋曰痰火擾亂心神不寧思慮過傷火熾痰鬱而致不眠者多矣有因腎水不足真陰不升而心陽獨亢者亦不得眠有脾倦火鬱不得疏散每至五更隨氣上升而發躁便不成寐此宜用快脾解鬱清痰降火之法也有體氣素盛偶為痰火所致不得眠者宜先用滾痰丸次用安神丸清心涼膈之類有體素弱或因過勞或因病後此為不足宜用養血安神之類凡病後及婦人産後不得眠者此皆血氣虛而心脾二臟不足雖有痰火亦不宜過於攻治仍當以補養為君或佐以清痰降火之藥其不因病後而不寐者雖以痰火處治亦必佐以養血補虛之藥方為當也不寐論列方半夏湯和十四三陰煎新補十一補中益氣湯補三十五福飲新補六七福飲新補七天王補心丹補百八歸脾湯補三二壽脾煎新熱十六金匱腎氣丸補一二四理中湯熱一理陰煎新熱三十味溫膽湯和一五三養心湯補七九排氣飲新和六竹葉石膏湯寒六安神丸寒一四二四磨飲和五二五君子湯新熱六六安煎新和二溫膽湯和一五二大和中飲新和七平胃散和十七導痰湯和九一酸棗仁湯補八四五苓散和一八二滾痰丸攻七七祕傳酸棗仁湯補八五五皮散和六七六八大補元煎新補一論外備用方遠志湯補八八虛煩益營湯補九一心血耗傷茯苓補心湯補八三多煩聖愈湯補九十血虛酸棗仁湯補八六虛熱琥珀多寐丸補百十九清心養神三消乾渴經義陰陽別論曰二陽之病發於脾其傳為風消二陽結謂之消氣厥論曰心移寒於肺肺消肺消者飲一溲二死不治心移熱於肺傳為鬲消五變篇曰五臟皆柔弱者善病消疸本藏篇曰五臟脆者皆善病消疸易傷師傳篇曰中熱消疸則便寒胃中熱則消穀令人懸心善飢胃中熱腸中寒則疾飢小腹痛脹脈要精微論曰疸成為消中玉機真藏論曰肝傳之脾病名曰脾風發疸腹中熱煩心出黃通評虛實論曰凡治消疸僕擊偏枯痿厥氣滿發逆肥貴人則高粱之疾也帝曰消疸虛實何如岐伯曰脈實大病久可治脈懸小堅病久不可治邪氣臟腑病形篇曰心脈肺脈肝脈脾脈腎脈微小皆為消疸腹中論帝曰夫子數言熱中不可服高粱芳草石藥石藥發癲芳草發狂夫熱中消中者皆富貴人也今禁高粱是不合其心禁芳草石藥是病不愈願聞其説岐伯曰夫芳草之氣美石藥之氣悍二者其氣急疾堅徑故非緩心和人不可以服此二者夫熱氣剽悍藥氣亦然二者相遇內恐傷脾脾者土也而惡木服此藥者至甲乙日更論奇病論帝曰有病口甘者病名為何何以得之岐伯曰此五氣之溢也名曰脾疸夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也五邪篇曰邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢論證共二條三消之病三焦受病也上消者渴證也大渴引飲隨飲隨渴以上焦之津液枯涸古云其病在肺而不知心脾陽明之火皆能熏炙而然故又謂之膈消也中消者中焦病也多食善飢不為肌肉而日加削瘦其病在脾胃又謂之消中也下消者下焦病也小便黃赤為淋為濁如膏如脂面黑耳焦日漸消瘦其病在腎故又名腎消也此三消者古人悉認為火證然有實火者以邪熱有餘也有虛火者以真陰不足也使治消證而不辨虛實則未有不誤者矣一消證有陰陽尤不可不察如多渴者曰消渴善飢者曰消穀小便淋濁如膏者曰腎消凡此者多由於火火甚則陰虛是皆陽消之證也至於陰消之義則未有知之者蓋消者消爍也亦消耗也凡陰陽血氣之屬日見消敗者皆謂之消故不可盡以火證為言何以見之如氣厥論曰心移寒於肺為肺消飲一溲二死不治此正以元氣之衰而金寒水冷故水不化氣而氣悉化水豈非陽虛之陰證乎又如邪氣臟腑病形篇言五臟之脈細小者皆為消疸豈以微小之脈而為有餘之陽證乎此內經陰消之義固已顯然言之而但人所未察耳故凡治三消證者必當察其脈氣病氣形氣但見本元虧竭及假火等證必當速救根本以資化源若但知為火而專務清理未有不陰陽俱敗者矣論治共五條凡治消之法最當先辨虛實若察其脈證果為實火致耗津液者但去其火則津液自生而消渴自止若由真水不足則悉屬陰虛無論上中下急宜治腎必使陰氣漸充精血漸復則病必自愈若但知清火則陰無以生而日見消敗益以困矣一上消善渴中消善飢雖曰上消屬肺中消屬胃然總之火在中上二焦者亦無非胃火上炎而然但當微為分別以治之若二焦果由實火則皆宜白虎湯主之若渴多飢少病多在肺者宜人參白虎湯主之若水虧於下火炎於上有不得不清者宜玉女煎或加減一陰煎之類主之一云上焦渴是心火刑金所致宜降火清金以蘭香葉白葵花黃柏知母少加升麻以引清氣上升而渴自止此説亦可酌用一中消火證以善飢而瘦古法直以調胃承氣湯及三黃丸之類主之然既以善飢其無停積可知既無停積則止宜清火豈堪攻擊非有乾結不通等證而用此二劑恐非所宜若其果屬胃火別無虛證則三補丸玉泉散白虎湯及抽薪飲之類皆可擇而用也一下消證小便淋濁如膏如油或加煩躁耳焦此腎水虧竭之證古法用六味地黃丸之類主之固其宜矣然以余觀之則亦當辨其寒熱滑澀分而治之庶乎盡善若淋濁如膏兼熱病而有火者宜補而兼清以加減一陰煎或補陰丸大補陰丸或六味地黃丸加黃柏知母之類主之若下消而兼澀者宜補宜利以六味地黃丸之類主之若下焦淋濁而全無火者乃氣不攝精而然但宜壯水養氣以左歸飲大補元煎之類主之若火衰不能化氣氣虛不能化液者猶當以右歸飲右歸丸八味地黃丸之類主之若下焦無火而兼滑者當以固腎補陰為主宜祕元煎固陰煎及苓朮菟絲丸之類主之一三消證古人以上焦屬肺中焦屬胃下焦屬腎而多從火治是固然矣然以餘論之則三焦之火多有病本於腎而無不由乎命門者夫命門為水火之腑凡水虧證固能為消為渴而火虧證亦能為消為渴者何也蓋水不濟火則火不歸原故有火遊於肺而為上消者有火遊於胃而為中消者有火爍陰精而為下消者是皆真陰不足水虧於下之消證也又有陽不化氣則水精不布水不得火則有降無升所以直入膀胱而飲一溲二以致泉源不滋天壤枯涸者是皆真陽不足火虧於下之消證也陰虛之消治宜壯水固有言之者矣陽虛之消謂宜補火則人必不信不知釜底加薪氤氳徹頂稿禾得雨生意歸巔此無他皆陽氣之使然也亦生殺之微權也余因消證多虛難堪剝削若不求其斫喪之因而再伐生氣則消者愈消無從復矣故再筆於此用以告夫明者述古共六條巢氏病源曰夫消渴者渴不止小便多者是也由少年服五石諸丸散積經年歲石氣結於腎中使人下焦虛熱及至年衰血氣減少不能復製於石石勢獨盛則腎為之燥故上為飲水下為小便不禁也其病變多發癰疽此因熱氣留於經絡血澀不行故成癰膿陳無擇曰消渴屬心故煩心致心火散漫渴而引飲諸脈軟散皆氣實血虛也消中屬脾疸熱成則為消中消中復有三有因寒中陰勝陽郁久必為熱中經云脈洪大陰不足陽有餘則為熱中多食數溺為消中陰狂興盛不交精泄則為強中病至強中不亦危矣消腎屬腎壯盛之時不禁而縱欲房勞年長腎衰多服金石真氣既喪口乾精溢自泄不飲而利經云不渴而小便自利名曰腎消亦曰內消潔古老人曰能食能渴者白虎加人參湯不能食而渴者錢氏白朮散倍加乾葛治之上中既平不復傳下消矣前人用藥厥有旨哉東垣曰高消者舌上赤裂大渴引飲逆調論云心移熱於肺傳為膈消者是也以白虎加人參湯治之中消者善食而瘦自汗大便硬小便數叔和所謂口乾飲水多食飢虛疸成消中是也以調胃承氣湯三黃丸治之下消者煩躁引飲耳輪焦溺如膏所謂焦煩水易虧此腎消也以六味地黃丸治之總録所謂未傳能食者必發癰疽背瘡不能食者必傳中滿鼓脹皆謂不治之證丹溪曰消渴宜養肺降火生血為主三消者多屬不生津液宜四物湯為主上消者本方加五味子人參麥門冬天花粉煎入生藕汁生地黃汁人乳飲酒人加生葛汁中消者本方加知母石膏滑石以降胃火下消者本方加黃柏知母熟地黃五味子之類以滋腎水當飲澡絲湯代茶天花粉消渴神藥也三焦皆禁用半夏血虛亦忌用口乾咽燥大便難者亦不宜用汗多者不可用不已必用薑鹽制之徐東皋曰消渴雖有數者之不同其為病之肇端則皆膏粱肥甘之變酒色勞傷之過皆富貴人病之而貧賤者鮮有也凡初覺燥渴便當清心寡欲薄滋味減思慮則治可瘳若有一毫不謹總有名醫良劑必不能有生矣下消不寐新按省中周公者山左人也年逾四旬因案牘積勞致成羸疾神困食減時多恐懼自冬春達夏通宵不寐者凡半年有餘而上焦無渴不嗜湯水或有少飲則沃而不行然每夜必去溺二三升莫知其所從來且半皆如膏濁液尫羸至極自分必死及豫診之察其脈猶帶緩肉亦未脫知其胃氣尚存慰以無慮乃用歸脾湯去木香及大補元煎之屬一以養陽一以養陰出入間用至三百餘劑計人參二十斤乃得全愈此神消於上精消於下之證也可見消有陰陽不得盡言為火姑紀此一按以為治消治不寐者之鑑三消論列方白虎湯寒三玉女煎新寒十二玉泉散新寒十五四物湯補八歸脾湯補三二祕元煎新固一固陰煎新固二抽薪飲新寒三補陰丸寒百六十左歸飲新補二右歸飲新補三右歸丸新補五六味丸補百二十八味丸補一二一三補丸寒一六二三黃丸攻六八大補元煎新補一大補陰丸寒一五七人參白虎湯寒三加減一陰煎新補九錢氏白朮散小七苓朮菟絲丸新固五調胃承氣湯攻三論外備用方玉泉丸寒七五熱渴益元散寒百十二龍腦雞蘇散和三七二虛火煩渴生脈散補五六火府丹寒百二十消渴麥門冬飲子寒四八膈消渴鹿茸丸補一三三腎虛消渴小建中湯補二二燥渴人參養營湯補二一天花丸和百四消渴五味子湯補五九陰虛渴人參固本丸補百六陰虛渴天花散寒七三地骨皮散寒七四壯熱渴天王補心丹補百八乾渴醍醐膏和三五三消渴加減八味丸補一二二益陰腎氣丸補一二三陰虛渴茯苓澤瀉湯熱七四反胃消渴
