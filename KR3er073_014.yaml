body:
  text: 卷之十四性集雜證謨瘧疾經義瘧論帝曰夫咳瘧皆生於風其蓄作有時者何也岐伯曰瘧之始發也先起於毫毛伸缺乃作寒栗鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲帝曰何氣使然曰陰陽上下交爭虛實更作陰陽相移也陽並於陰則陰實而陽虛陽明虛則寒栗鼓頷也巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱外內皆熱則喘而渴故欲冷飲也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也此令人汗空疏腠理閉因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相搏是以曰作常曰其間日而作者何也岐伯曰其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作也帝曰其作日晏與日早者何氣使然曰邪氣客於風府循膂而下衛氣一日一夜大會於風府其明日日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脈其氣上行九日出於缺盆之中其氣日高故作日益早也其間日發者由邪氣內薄於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其日作者奈何曰此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至於手足而病衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也帝曰瘧先寒而後熱者何也曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之間秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧帝曰先熱而後寒者何也曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧其但熱而不寒者陰氣先絶陽氣獨發則少氣煩冤手足熱而欲嘔名曰疸瘧岐伯曰夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒栗也陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故復熱而渴夫瘧氣者並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之氣不常也病極則復夫病之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也帝曰攻之奈何早晏何如曰瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得並者也帝曰瘧不發其應何如曰瘧氣者必更盛更虛當氣之所在也病在陽則熱而脈躁在陰則寒而脈靜極則陰陽俱衰衛氣相離故病得休衛氣集則復病也帝曰時有間二日或至數日發或渴或不渴其故何也曰其間日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也瘧者陰陽更勝也或甚或不甚故或渴或不渴帝曰論言夏傷於暑秋必病瘧今瘧不必應者何也曰此應四時者也其病異形者反四時也其以秋病者寒甚以冬病者寒不甚以春病者畏風以夏病者多汗帝曰夫病溫瘧與寒瘧而皆安舍舍於何臟曰溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧帝曰疸瘧何如曰疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰疸瘧至真要大論帝曰火熱或惡寒發熱有如瘧狀或一日發或間數日發其故何也岐伯曰勝復之氣會遇之時有多少也陰氣多而陽氣少則其發日遠陽氣多而陰氣少則其發日近此勝復相搏盛衰之節瘧亦同法金匱真言論曰夏暑汗不出者秋成風瘧生氣通天論曰夏傷於暑秋為咳瘧魄汗未盡形弱而氣爍穴俞以閉發為風瘧論證共四條瘧疾之疾本由外感故內經論瘧無非曰風曰寒其義甚明而後世之論則泛濫不一總不過約言其末而反失其本所以議論愈多則病情愈昧矣有辨在後所當並察凡瘧因於暑人皆知之不知夏令炎熱此自正氣之宜然而人有畏熱者每多避暑就陰貪涼過度此因暑受寒所以致瘧經曰夏暑汗不出者秋成風瘧義可知也然又惟稟質薄弱或勞倦過傷者尤易感邪此所以受邪有淺深而為病有輕重也第以病因暑致故曰受暑而不知暑有陰陽瘧惟陰暑為病耳至其病變則有為寒證者有為熱證者有宜散者有宜斂者有宜溫者有宜清者其要在標本虛實四字知此四者而因證制宜斯盡善矣其有云傷暑而認暑為火者有云脾寒而執以為寒者皆一偏之見不足憑也凡瘧發在夏至後秋分前者病在陽分其病淺發在秋分後冬至前者病在陰分其病深發在子之後午之前者此陽分病也易愈發在午之後子之前者此陰分病也難愈病淺者日作病深者間日作若三日四日者以受邪日久而邪氣居於陰分其病尤深凡瘧病自陰而漸陽自遲而漸早者由重而輕也自陽而漸陰自早而漸遲由輕而重也凡感邪極深者其發必遲而多致隔日必使漸早漸近方是佳兆故治此疾者春夏為易秋冬為難論治共十二條凡瘧疾初作必多寒熱大抵皆屬少陽經病其於初起當專以散邪為主若果形氣無傷而脈證別無他故者但宜正柴胡飲或三柴胡飲主之少者一二劑多者三四劑無有不愈若氣體本弱而感邪為瘧即宜四柴胡飲為妙勿以初起而畏之弗用也一治瘧當辨寒熱寒勝者即為陰證熱勝者即為陽證蓋有素稟之寒熱有染觸之寒熱然必其表裡俱有熱邪方是火證若瘧至則熱瘧止則退而內無煩熱閉結等證則不得以火證論治若內外俱有火證而邪有不散者一柴胡飲主之若邪入陽明內熱之甚而邪有未散者宜柴胡白虎煎若邪入肝腎而熱極動血者宜柴芩煎一瘧有寒證如無虛邪而但以寒邪不能散或多中寒者宜二柴胡飲若以寒勝而兼氣虛邪有不解者宜四柴胡飲或補中益氣湯加乾薑官桂若寒甚熱少脈遲而兼背惡寒或多嘔惡泄瀉者必用麻桂飲或大溫中飲一中氣虛弱不能勝邪而邪不能解者病在脾肺氣分宜補中益氣湯五柴胡飲若陰虛血液不充而邪不能解者病在肝腎精分宜補陰益氣煎歸柴飲此證極多其效尤捷若發時其寒如冰其熱如烙而面赤如脂渴欲飲水而熱退即不渴者以六味地黃湯加柴胡芍藥肉桂大劑一服即可愈若元氣虛寒之甚陽不勝陰而邪不能解者大溫中飲若元氣虛甚或衰老積弱者則不必兼用攻邪只當以正氣為主但使元氣不敗則邪氣無有不服宜大補元煎或十全大補湯之類主之而又惟休瘧飲為最妙一瘧疾屢散之後取汗既多而病不能止者必以過傷正氣而正不勝邪則雖止微邪猶然不息但使元氣之虛者一振散者一收則無不頓然愈矣宜三陰煎五福飲或小營煎休瘧飲主之若有微寒者宜大營煎或理中湯若微有火者宜一陰煎若多汗不收者宜五陰煎之類主之一瘧疾久不能愈者必其脾腎俱虛元氣不復而然但察其脈證尚有微邪不解者當專以補中益氣湯為主若邪氣已盡而瘧有不止者則當專補元氣以八珍湯十全大補湯或大補元煎之類主之若腎陰不足而精不化氣者宜理陰煎最效若陰邪凝滯而久不愈者宜於前藥加薑桂附子一瘧作而嘔吐惡食者雖曰少陽之邪為嘔吐然實由木邪乘胃所致但解去外邪嘔當自止宜柴陳煎或正柴胡飲加半夏主之若脾胃氣虛而寒邪乘之則最多嘔惡之證宜溫胃飲理中湯養中煎之類主之若虛寒連及命門火不生土而作嘔者宜理陰煎右歸飲之類主之若兼食滯而作嘔者必多脹滿宜加陳皮砂仁山楂厚朴之類為佐若兼火邪者必多熱渴躁煩祕結宜以黃芩黃連之類為佐若火在陽明甚者宜加石膏若兼寒者必胃口怕寒或吞酸或噯腐或噁心得熱稍可者宜以薑桂附子吳茱萸之類為佐一瘧疾因勞輒復連綿不已者此脾腎虛證蓋腎主骨肝主筋脾主四肢氣弱不勝勞苦所以即發但補脾肝腎使其氣強則愈如十全大補湯八珍湯補中益氣湯皆可酌用一瘧疾發散已多每致陰虛水虧而煩熱多渴者宜以西瓜汁或雪梨漿或冷參湯俱可滋陰截瘧無熱者不可強用一瘧痢並作而臟平邪淺者宜胃苓湯加柴胡一二錢若寒濕傷脾而瘧痢並作者宜溫胃飲加柴胡或胃關煎加柴胡亦妙若濕熱傷脾下及肝腎而暴注熱渴或下純鮮血者宜柴芩煎一瘧邪未清而過食傷脾以致痞滿連綿不已者宜大小和中飲加柴胡若因食而成瘧痞者宜芍藥枳朮丸及大小和中飲之類調之若痞成難消者須灸章門水道等穴炷宜稍大多灸或連灸二三次方得全愈一古云治瘧之法凡將發之時與正發之際慎毋勉強施治即治亦無效必待陰陽並極勢平氣退之後然後察而治之或於未發二三時之先迎而奪之可也經曰夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也按此古法殊似不然豫近治瘧每迎其鋭而擊之最捷最妙是可見古法之有不必泥者論汗凡古人治瘧之法若其久而汗多腠理開泄陽不能固者必補斂之無汗則腠理致密邪不能解必發散之故曰有汗者要無汗扶正為主無汗者要有汗散邪為主此大法也蓋瘧本外邪非汗不能解若不知散解其邪而妄用劫劑多致胃氣受傷邪不能解必反難愈此宜以補劑為主加減取汗汗後再加補養可也若邪在陰分則下體最難得汗補藥力到自然汗出至足方是佳兆凡病此而邪有未解者大忌飽食亦以汗之難易為優劣也凡寒邪之自外而入者得汗即解如傷寒之類皆是也而惟時瘟時瘧之病則病有淺深之不同即如病瘟者雖有大汗而熱仍不退病瘧者屢發屢汗而瘧猶不止此其所感最深故不能以一二汗而即愈或通身如洗而猶不能透若此者但當察其強弱仍漸次再汗之方得邪解故不可謂汗後必無邪也此但當以脈之緊與不緊及頭身之痛與不痛寒熱之甚與不甚為辨耳然又有雖已得汗邪氣將解而不守禁忌或因於勞或因於欲或受生冷微邪或胃氣未清因而過食隨觸隨發此其舊邪未盡而新邪又至纏綿深固因致留連者亦必宜仍從汗解但其宜固宜散則猶當以酌虛實為首務論標本凡治瘧當知標本豫嘗言有標則治標無標則治本此最為治瘧之肯綮何以言之蓋標以邪氣言本以正氣言也夫邪正相爭所以病瘧凡瘧之初起本由邪盛此當治邪固無疑也若或表散已過或久而不愈則於邪正之間有不可不辨矣蓋有邪者證必猖熾脈必弦緊或頭疼頭痛未除或汗雖出而未透凡屬形證有餘者即其病雖已久亦必有表邪之未清也但覺有微邪此猶宜兼標為治若汗出已多邪解已透別無實證實脈可據而猶然不愈者必由正氣全虛或以質弱或以年衰故餘氣有未能卻而真陰有未能靜耳此當專治其本但使元氣既復則無有不愈設或不明標本無論有邪無邪而但知攻瘧則害者多矣豫為此說雖因瘧而發然諸病皆同此理明者當心志之論厭瘧凡厭瘧之法今世俗相傳多用之但其有效有不效人每疑之而其所以然者自有的確之妙則從來人所未知也蓋瘧以邪正相爭其感之淺者乃少陽膽經病也惟其邪本不甚則邪正互為勝負當此時也亦猶楚漢相持之勢但得一助之者為楚則楚勝為漢則漢勝故不論何物皆可用以為厭但使由之勿使知之其人恃有所助則膽氣略壯而邪即敗矣此即內經移精變氣之意也然必勢均力敵者乃可以一助而勝之正勝則愈也若果彼強我弱勢不易制者則厭必無益故惟邪輕日作者可厭而邪深間日者則不能厭此自理勢之使然無庸惑也論截瘧共四條凡截瘧之法方固不可然亦無必效之方若以愚見並及治驗則未嘗藉於截也蓋有邪者去邪則愈若散邪既透解表已過則但收拾元氣而氣復即愈惟能於邪正之間得其攻補之宜則無不自愈此截之最善者也至如截瘧諸方雖不可執亦不可無第有效於此而不效於彼者亦以人之氣血陰陽各有不同故耳故凡用截藥者亦當察人之強弱而酌以用之庶乎得效然亦惟輕者易截而重者不易截也茲録諸方於後亦可備於酌用截瘧常山飲氣血強壯者可用截瘧飲氣分不足者可用牛膝煎血分不足者可用截瘧丹時氣多濕者可用木賊煎濕痰邪實者可用何人飲休瘧飲血氣大虛欲急濟者可用小柴胡湯加常山二錢截瘧如神追瘧飲凡氣血未衰或屢散之後用之最效丹溪曰數發之後便宜截而除之久則發得中氣虛弱致病邪愈深而難治世有砒丹等截藥大毒不可輕用常山性暴悍善驅逐然能傷真氣病人稍虛怯者勿用楊仁齊曰或其人素虛者慎勿用常山等藥薛立齊曰若病勢正熾一二髮間未宜遽截恐邪氣不去正氣反傷耳若胃氣弱者用寒涼止截脾胃復傷必致連綿不已若非培養元氣決不能愈每見飲啖生冷物者病或少愈多致脾虛胃損反為難治若咽酸口酸且宜節飲食其病潮作時雖大渴亦只薑湯乘熱飲之此亦截瘧之良法凡欲截之若血氣俱虛用人參生薑各一兩煎服頓止不問新久並效論似瘧非瘧凡似瘧非瘧之病雖有往來寒熱而時作時止本非瘧之類也凡大病後或産後或虛損俱有此證經曰陽虛則外寒陰虛則內熱陰氣上入陽中則惡寒陽氣下入陰中則惡熱故凡無外邪而病為寒熱者必屬虛證但虛有陰陽之異而陽虛者必多寒陰虛者必多熱陽虛者宜補其陽如理中湯十全大補湯加薑桂附子之類此皆人所易知也惟陰虛之證則最不易辨蓋陰中之水虛者陰虛也陰中之火虛者亦陰虛也如其津液枯燥精血耗傷表裡上下俱多煩熱等證此陰中之水虛也治宜壯水以配陽如一陰煎六味地黃湯或加減一陰煎之類主之其有倏熱往來或面赤如脂而腹喜熱飲或上熱如烙而下冷如冰或喉口大熱而大便不實此其證雖若熱而脈必細微或雖洪大而浮空無力者是皆陽氣無根而孤浮於上此陰中之火虛也治宜益火之本使之歸源如海藏八味地黃丸或右歸飲之類主之假熱退則真寒見自可因證而治之也寒熱門論治尤詳所當並察論溫瘧溫瘧一證在內經曰溫瘧者得之冬中於風寒至春夏陽氣大發而為病此即正傷寒之屬也故仲景傷寒論有溫瘧一證即此是也此與夏傷暑而秋為瘧者本自不同當於傷寒門酌而治之論疸瘧疸瘧一證在內經曰肺素有熱氣盛於身發則陽氣盛而不衰故致消爍脫肉者命曰疸瘧蓋此以陽臟而病陽證也自與諸瘧不同而治此之法有三如熱邪內蓄而表邪未解者則當散以苦涼如熱因邪致表雖解而火獨盛者則當清以苦寒此皆治其有餘也若邪火雖盛而氣血已衰真陰日耗者急宜壯水固元若但知瀉火則陰日以亡必致不救論瘴瘧瘴瘧一證惟嶺南煙瘴之地有之蓋南方風濕不常人受其邪而致病者因名瘴瘧然瘴出地氣瘧由天氣但使內知調攝而外不受邪則雖居瘴地何病之有是可見瘴以地言而瘧即風寒外感之病也但其甚者則或至迷困喑啞乃與常瘧為稍異耳凡治此者亦總不離寒熱虛實及有邪無邪如前治瘧諸法而盡之矣外如大梁李待詔瘴瘧等證既明且確詳列瘴氣門不可不察述古共八條仲景曰瘧脈自弦弦數者多熱弦遲者多寒機要曰瘧有中三陽者有中三陰者其證各殊也在太陽經謂之寒瘧治多汗之在陽明經謂之熱瘧治多下之在少陽經謂之風瘧治多和之此三陽受病謂之暴瘧發在夏至後處暑前乃傷之淺者在陰經則不分三經總謂之濕瘧當從太陰經論之發在處暑後冬至前此乃傷之重者一古法云以清脾飲治秋時正瘧隨證加減大效若胃中有伏痰鬱結者以草果飲一服可愈丹溪曰邪氣深入陰分血分而成久瘧者必當用升發藥自臟而出之於腑然後自表作汗而解若用下藥則邪氣愈陷而難出矣傅氏曰瘧系外邪當以汗解或汗不得出鬱而成痰宜養胃化痰發汗邪氣得出自然和也劉宗厚曰或問俗以瘧為脾寒何也曰此亦有理蓋暑盛陽極人以伏陰在內脾困體倦腠理開發或因納涼於水閣木陰及泉水澡浴而微寒客於肌肉之間經所謂遇夏氣淒滄之水寒迫之是也或勞役飢飽內傷而即病作故指肌肉屬脾發則惡寒戰栗乃謂之脾寒耳實由風寒暑濕之邪鬱於腠理夏時毛竅疏通而不為病至秋氣收斂之際表邪不能發越故往來寒熱進退不已病勢如凌瘧人之狀所以名瘧即如四時傷寒十二經皆能為病古方治法多兼內傷取效脾胃和而精氣通則陰陽和解此實非脾病也然古人稱瘧不得為脾寒者正恐人專於溫脾之說不明造化之源而失病機氣宜之要故也立齊曰大凡瘧證皆因先傷於暑次感於風客於營衛之間腠理不密復遇風寒閉而不出舍於腸胃之外與營衛並行晝行於陽夜行於陰並則病作離則病止並於陽則熱並於陰則寒淺則日作深則間日在氣則早在血則晏其病熱多寒少心煩少睡者屬心名曰瘟瘧用柴苓湯但寒少熱腰疼足冷者屬腎名曰寒瘧用桂附二陳湯先寒而後大熱咳嗽者屬肺名曰疸瘧用參蘇飲熱長寒短筋脈揪縮者屬肝名曰風瘧宜小柴胡加烏藥香附寒熱相停嘔吐痰沫者屬脾名曰食瘧宜清脾飲若中氣虛而間日發者用補中益氣湯若寒熱大作不論先後此太陽陽明合病寒熱作則必戰經曰熱勝則動也發熱則必汗泄又曰汗出不愈知內熱也又曰凡日久虛瘧寒熱不多或無寒而微熱者若內因胃氣虛用四君加升麻當歸若脾血虛用四君加川芎當歸若中氣下陷用補中益氣加茯苓半夏大凡久瘧多屬元氣虛寒蓋氣虛則寒血虛則熱胃虛則惡寒脾虛則發熱陰火下流則寒熱交作或吐涎不食戰栗泄瀉手足逆冷皆脾胃虛弱但補益中氣則諸證悉愈凡人久瘧諸藥不效以補中益氣湯內加半夏用人參一兩煨姜五錢此不截之截也一服即愈若病久者須大補元氣為主蓋養正邪自除也徐東皋曰瘧疾多因風寒暑濕而得之乃天之邪氣所傷當以汗解故仲景河間悉用發表之藥但以寒熱多少分經絡而治辨古共四條陳無擇三因方云夫瘧備三因外則感四氣內則動七情飲食飢飽房室勞逸皆能致之經所謂夏傷暑秋咳瘧者此則因時而敘耳不可專以此論外所因證有寒瘧有溫瘧有疸瘧並同素問也有濕瘧者寒熱身重骨節煩疼脹滿自汗善嘔因汗出復浴濕舍皮膚及冒雨濕也有牝瘧者寒多不熱但慘戚振栗病以時作此則多感陰濕陽不能制陰也此五種瘧疾以外感風寒暑濕與衛氣相併而成除疸瘧獨熱溫瘧先熱牝瘧無熱外諸瘧皆先寒後熱內所因證病者以蓄怒傷肝氣鬱所致名曰肝瘧以喜傷心心氣耗散所致名曰心瘧以思傷脾氣鬱涎結所致名曰脾瘧以憂傷肺肺氣凝痰所致名曰肺瘧以失志傷腎所致名曰腎瘧所致之證並同素問此五種瘧疾以感氣不和鬱結痰飲所致不內外因有疫瘧者一歲之間長幼相似也有鬼瘧者夢寐不祥多生恐怖也有瘴瘧者乍熱乍寒乍有乍無南方多病也有胃瘧者飲食飢飽傷胃而成世謂食瘧也有勞瘧者經年不瘥前後復發微勞不任也亦有數年不瘥結成癥癖在腹脅名曰老瘧亦曰母瘧以上諸證各有方治宜推而用之愚謂瘧疾一證內經言已詳盡無可加矣而後世議論煩多反資疑二茲舉陳氏三因之說以見其概如所云濕瘧者因汗出復浴濕舍皮膚固一說也然浴以熱湯避彼風處則斷不致瘧惟冷水相加瘧斯成矣若然則仍是寒氣即內經所云夏遇淒滄水寒之證也然此猶近似但宜辨明寒熱耳至若牝瘧無熱則內經並無此說惟金匱要略曰瘧多寒者名曰牝瘧蜀漆散主之亦非曰無熱也若果全無發熱而止見寒栗此自真寒陽虛證耳別有本門又安得謂之瘧耶再如內因五臟之瘧在內經刺瘧論所言六經五臟之證不過為邪在何經之辨原非謂七情所傷便能成瘧而此云所致之證並同素問則素問無此說也且既云七情所傷則其虛實大有不同又豈皆痰飲所致耶再若不內外因凡鬼瘧夢寐之說此或以瘧邪亂神因致狂言似鬼者有之豈鬼崇果能為瘧乎至若胃瘧既云飲食則明是內傷且凡先因於瘧而後滯於食者有之未有不因外邪而單有食瘧者也夫病情必有標本標本誤認治豈無瘥竅計陳氏之言既以三因立論故不得不敷演其說而燁然若有可觀不知影響之談不但無益於病而且亂人意見致令臨證狐疑莫知所從而每至於害者皆此之類丹溪曰瘧有暑有風有濕有痰有食積久發者為老瘧不已者為瘧母風暑之瘧多因夏月在風涼處歇遂閉汗不能得泄暑舍於內故大法當汗之瘧而惡飲食者必從飲食上得之當以食治俗云脾寒乃因名而迷其實也苟因飲食所傷而得之未必是寒況其他乎嚴用和曰或乘涼飲冷當風臥濕飢飽失時致脾胃不和痰積中脘遂成此疾所謂無痰不成瘧也張子和曰內經既以夏傷於暑而為瘧何世醫皆以脾寒治之用薑附硫黃之類甚者歸之祟怪良可笑也又或因夏月飲食生冷之類指為食瘧此又非也豈知內經之論則不然皆夏傷於暑遇秋風寒而後作也邪熱淺則連日邪熱深則間日併入於裡則寒併入於表則熱若此論則了不相干於脾也治平之時其民夷靜雖用砒石辰砂有毒之藥以熱治熱亦能取效擾攘之時其民勞苦內火與外火俱動以熱攻熱轉為瀉痢吐血瘡瘍嘔吐之疾豈與夷靜之人同治哉豫嘗用張長沙汗吐下三法愈瘧病極多大忌錯作脾寒治之愚謂瘧疾之作本由風寒水濕之邪感而致病亦或有非風非水而衣薄受涼凡體怯者皆能為瘧及其病深則未免因經及臟因表及里故有不慎飲食而更甚者有不慎勞役而增病者總之無非外邪為之本豈果因食因痰有能成瘧者耶今觀朱丹溪之言亦以痰食並列嚴用和則悉歸之痰蓋皆因陳氏之說而殊失內經之正意矣故張子和亦以祟怪為笑以食瘧為非而云治平擾攘時當分治是皆有理確見也獨怪其以暑為火而且謂擾攘之時其民勞苦大忌錯作脾寒治之而嘗用汗吐下三法恐此言亦屬偏見也念余幸逢明盛固不知擾攘景象第以勞苦過傷之人其虛更甚又豈無三陽疲損等證而可俱謂之火及可盡用三法乎甚哉立言之難於此可見而時中之不易得也如此簡易方一方截瘧神效用常山末二錢烏梅肉四個研爛酒調臨發日早服一方不問新久瘧用常山一兩銼碎以好酒浸一宿瓦器煮乾為末每服二錢水一盞煎半盞去滓停冷五更服之不吐不瀉效一方治瘧神效用蒜不拘多少研極爛和黃丹少許以聚為度丸如芡實大候乾每服一丸新汲水空心面東吞下針灸法刺瘧論諸刺法具載本經大椎可灸三壯