地氣鬱蒸陰多閉固陽多發泄草木水泉皆稟惡氣人生其間元氣不固感而為病是為之瘴輕者寒熱往來正類咳瘧謂之冷瘴重者蘊熱沉沉晝夜如臥灰火中謂之熱瘴最重者一病便失音莫知其所以然謂之啞瘴冷瘴必不死熱瘴久而死啞瘴無不死此方書之說也然以愚意觀之所謂啞瘴者非傷寒失音之證乎又豈中風失語之證乎治得其道亦多可生安得謂之無不死耶若夫熱瘴乃是盛夏初秋茅生狹道人行其間熱氣蒸郁無林木以蔽日無水泉以解渴伏暑至重因而感疾或有飲酒而不節者或食煎灸而積熱者偶成此證其熱晝夜不止稍遲二三日則血凝而不可救矣南中謂之中箭亦謂之中草子然有挑草子法乃以針刺頭額及上下唇仍以楮葉擦舌皆令出血徐以草藥解其內熱應手而愈安得謂之久而死耶至於冷瘴或寒多熱少或寒少熱多亦有疊日間日之作及其愈也瘡發於唇驗其證即是外方之瘧本非重病然每因誤治而致禍亦不可以必不死而忽之但診其脈息極微見其元氣果虛即與附子湯而愈若誤投寒藥所謂承氣入胃陰盛乃亡若脈洪盛證候實熱宜服和解藥而徐治之若誤投熱藥所謂桂枝下咽陽盛則斃也要在切脈審證之虛實寒熱治之無不愈也人謂嶺南水泉草木地氣之毒故凡往來嶺南之人及宦而至者無不病瘴而至危殆者也又謂土人生長其間與水土之氣相習外人入南必一病但有輕重之異若久而與之俱化則免矣此說固若有理但備之以將養之法解之以平易之藥決保無病縱病亦易愈矣且瘴之為病土人反重外人反輕者多蓋土人淫而下元虛又浴於溪而多感冒恣食生冷酒饌全不知節所以重也然則病瘴者不可全咎風土之殊皆人自失節養有以致之耳君子之居是邦也當慎起居節飲食適寒溫晨酒夜食切忌大過或有不快即服正氣散一二劑則脾胃自壯氣血通暢微邪速散又何瘴之有嶺表十說吳興章傑一嶺表之俗食檳榔甚者日至十數枚蓋瘴瘧之作率因飲食過度氣滯痰結而檳榔最能下氣消食去痰故人皆狃於近利而暗於遠患此頗類北人之食酪酥多致膚理縝密一旦病疫當汗則塞而不得出嶠南地熱食檳榔故臟氣疏泄若一旦病瘴當攻發則虛羸而不能堪所以土人多瘠而色黃豈全是氣候所致蓋亦檳榔為患殆勿思耳二本草載三人觸霧晨行飲酒者獨不病故北人度嶺率相勉飲酒而遷客羈士往往醺酣以自適且嶺外酒價尤廉販伕役卒俱得肆飲咸謂可以闢瘴殊不知少則益而多則滋瘴之源也何以言之蓋南土暑濕嗜酒則多中濕毒兼以瘴瘧之作率因上膈痰飲而酒則尤能聚痰嶺外諺云莫飲卯時酒莫食申時飯誠攝生之要也可見酒之為物能闢瘴以生人亦能滋瘴以害人然則生也死也非酒也顧在人也三廣南每以暑毒為患者蓋一歲之間暑熱過半使人難避而易犯凡起居飲食少失節度則為暑毒所中道途之間尤多冒暑故土人於暑時相戒勿出且遐荒之境道路崎嶇而傳舍飲食皆不如欲所以自北初至者皆云不習水土而病及既還則又謂之回頭瘴大率得之道路勞倦冒犯暑氣與夫飲食居處失度也四嶺南寒暑之候不常尤難於調攝故凡居入與在路者冬夏之衣皆不可缺隨其氣候速宜增減緩則致病又嶺外海風異常稍中人則為病坐臥易衣時當慎也五嶺外雖以多暑為病而四時亦有傷寒瘟疫之疾其類不一土人不問何疾悉謂之瘴治療多誤或有一歲盛寒近類中州而土俗素無蠶績冬不衣綿居室疏漏戶扃不固忽遭歲寒則次年瘟疫必興醫者之治瘟疫亦當以本法治之而隨其風土氣候與夫人之強弱酌宜可也六瘴瘧之作多因伏暑傷冷所致縱非飲食冷物亦必寒邪感於外飲食傷於內也大抵伏暑淺而寒多者易治伏暑深而熱多者難治近時北醫至此用大柴胡湯治熱瘴須是本氣壯實者乃能堪之如土人久服檳榔臟氣既虛往往不能服寒藥又能當此峻劑乎然土人才見發黃便謂不治之疾良可哀也七北人之來嶺南婢僕多病瘴氣蓋勞役之人飲食乖度晝夜冒暑夜多臥地又凡事不能避忌故先受其斃既與之同休戚宜加意戒之八俚俗有病必召巫覡而祭鬼神士夫咸笑其信巫不信醫愚謂此可憫惻而不可以笑也夫民雖至愚然孰不思趨利避害況性命所繫曉然易見若醫者能愈人疾彼何為不用蓋嶺外良醫甚鮮藥類尤乏且山谷海嶼之民何從而得醫藥所以不免信巫也豈得已哉九瘴病不一而土人以啞瘴最為危急其狀初得之即失音不過一二日即致不救醫家多言為極熱所致或云內蘊熱而外為感寒所激近見北醫有用煎生附子一味愈此疾者得非以熱治熱或是發散寒氣耶豫嘗聞有飲溪澗水中毒令人失音則知凡失音者未必皆瘴也溪澗水毒灼然有之道路多無井泉而瀕江之民與夫山行者皆飲溪澗之水豈無邂逅遇毒者故途人所以多病此得非是歟十傳雲嶺外多毒草彘食之而人食其肉者亦毒人所以北人度嶺多戒食彘然而嶺南能致瘴毒者非止一端豈在是耶順泉云嶺南之彘在市井者食豆與酒糟在鄉村者食糠與碎米芋苗未有食草者若然則牛馬羊畜之肉悉皆不可食也可乎此其所以不足信也回頭瘴說舊傳出嶺之後復有回頭瘴者大概與在廣而發瘴及方入廣而不伏水土者不異蓋南方陽氣常泄陰氣常盛二氣相搏四時悉有寒熱之氣人感之即作寒熱之病寒則戰栗熱則怫鬱多由得汗而解此廣瘴之寒熱也今所謂回頭瘴及方入廣而不伏水土者亦不過陰陽相搏氣候不調而感疾耳嶺南天氣冬無霜雪春寒秋熱氣候不齊或一日而忽然更變與方外天氣大不相侔今回頭瘴者蓋是先受廣中之氣復感外方之氣冷熱相忤寒暄不調遂作陰陽相搏之疾須度時候之寒熱量元氣之厚薄如出嶺於孟冬時者廣尚多暄而少寒或轉北風或有暴冷若屆途之際宜服和解散神朮散之類和脾胃以逐風邪及至外方則天寒地凍將及境之際可服正氣散人參養胃湯之類絶舊瘴以御時寒可也然此四藥亦特筌蹄耳其實在保躬調養酌序消詳切不可以得出瘴地而恣欲此病之所由作也故所謂回頭瘴者豈虛語哉治瘴續說繼洪曰豫寓嶺南既久愈知瘴疾不易用藥若病人身熱而復寒謂之冷瘴不換金正氣散主之若身熱胸痞或嘔或噎大便不利者嘉禾散若病輕而覺有食積兼用些少感應丸無積者不可用若病重者不可妄用轉利惟當溫中固下若冬末春初因寒而作大熱者小柴胡湯夏月因暑氣者六和湯若身極熱而頭極痛脈數者為熱瘴宜用南人挑草子法亦不可不服藥第此證病深最為難治蓋涼藥多不可用惟宜熱藥須得法以用之如附子湯冷服者是也然此非工巧以處之則不可如身熱汗不多頭痛未解或且與和解散如腰以上極熱腰以下稍涼胸膈煩渴腰腿重疼或大便溏滑其脈數而按之不實此陽浮陰閉也惟李待詔生薑附子湯最妙凡初病者以生薑附子能發散耳若病經去汗既多虛煩潮上則惟恐其不斂不降宜用熟附乾薑沉香而冷服之若便利則不必沉香如煩甚則少加竹茹渴甚多加人參北五味咳逆加丁香淡竹葉若煩躁而有異象眩惑夜不安寢可略與溫膽湯惟大便利者不可服若煩渴大作宜奪命散或用冷湯倍加人參附子若煩熱大便自利或小便不澀不可以赤為熱或膝脛以下稍涼此乃病邪所激氣血俱虛表熱無以養中故水熱而內虛也可急服姜附湯之類及灸氣海足三里若至四肢厥冷兩足冷甚頭額虛汗或時咳逆脈數而促其證多危惟以三建湯之屬能斂心液能壯真陽可以更生也又有啞瘴即熱瘴之甚者醫書謂血得寒則凝泣得熱則淖溢故熱瘴面赤心熱舌破鼻衄皆瘴熱沸其血上湧所致故宜用挑草子法甚則血上塞其心竅故昏不能言或但噫噫作聲即啞瘴也治此者當散其血用局方黑神散立見神效其或涎迷心竅而舌強者亦有之卻非真啞瘴也及兼風痰之證者俱當審察而後用治本論有無稽之方俱削去不録藥宜預備居瘴地者雖曰節慎起居而防病之藥不可不為之備如人參附子乾薑當歸熟地紫金錠蘇合丸不換金正氣散之類皆不可須臾離也從宦茲土則政事多繁上下交際為商往來則經營貿易其勢不容於自逸稍覺不快即宜如法服藥以解之微邪易伏固不致病也惟其不能防微則勢必至於漸盛故曰不治已病治未病此之謂也瘴病脈候兩關脈洪大者熱瘴脈數甚者為熱瘴脈弦而緊者為瘴瘧脈浮而緊者宜解表脈浮緩者為傷風其病輕脈洪數而按之不實者為陽浮陰閉脈沉微而弱者為虛寒瘴病愈後將養法凡瘴病不發三日後方可洗手七日後可洗面半月後可梳頭一兩月後謹戒房事能戒百日尤好又瘴不發後須吃素粥三日經五日後方可以豬脾煮羹吃軟飯十日後略可吃酒少用肉羹但不可食諸般骨汁若犯之則再發凡牛羊豬犬雞鵝諸骨汁須並忌一月或兩月猶佳凡犯而再發必多困篤瘴氣論列方麻黃湯散一桂枝湯散九金沸草散散八一和解散和二三五神朮散散六五不換金正氣散和二一正氣散和二三平胃散和十七小柴胡湯散十九嘉禾散和百六十六和湯和一二七小青龍湯散八朮附湯補四一附子湯熱二二生薑附子湯熱三三七棗湯熱百十八姜附湯熱三二人參養胃湯和二三七三建湯熱四二冷湯熱百十九局方黑神散婦五十奪命散補三六溫膽湯和一二五承氣湯攻一感應丸攻五四紫金錠因二百二蘇合丸和三七一丹珠丸未考論外備用方敗毒散散三六聖散子散四二五味異功散補四保和湯和一四七散邪順氣檳榔煎和二三六陳氏家傳正氣散和二二屠蘇酒和二三七降椒酒和二三八理中湯熱一生薑煎熱百二十冷香湯熱八二養胃湯熱七十椒囊法熱一九二乾薑附子湯熱三四陰證發熱二味沉附湯熱百十八福建香茶餅因三百二瘟疫門諸方皆可酌用
