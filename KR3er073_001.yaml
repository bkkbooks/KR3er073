body:
  text: 卷之一入集傳忠錄上明理一萬事不能外乎理而醫之於理為尤切散之則理為萬象會之則理歸一心夫醫者一心也病者萬象也舉萬病之多則醫道誠難然而萬病之病不過各得一病耳譬之北極者醫之一心也萬星者病之萬象也欲以北極而對萬星則不勝其對以北極而對一星則自有一線之直彼此相照何得有差故醫之臨證必期以我之一心洞病者之一本以我之一對彼之一既得一真萬疑俱釋豈不甚易一也者理而已矣苟吾心之理明則陰者自陰陽者自陽焉能相混陰陽既明則表與里對虛與實對寒與熱對明此六變明此陰陽則天下之病固不能出此八者是編也列門為八列方亦為八蓋古有兵法之八門予有醫家之八陣一而八之所以神變化八而一之所以溯淵源故予於此錄首言明理以統陰陽諸論詳中求備用帥八門夫兵系興亡醫司性命執中心學孰先乎此是即曰傳中可也曰傳心亦可也然傳中傳心總無非為斯人斯世之謀耳故覆命為傳忠錄陰陽篇二凡診病施治必須先審陰陽乃為醫道之綱領陰陽無謬治焉有差醫道雖繁而可以一言蔽之者曰陰陽而已故證有陰陽脈有陰陽藥有陰陽以證而言則表為陽里為陰熱為陽寒為陰上為陽下為陰氣為陽血為陰動為陽靜為陰多言者為陽無聲者為陰喜明者為陽欲暗者為陰陽微者不能呼陰微者不能吸陽病者不能俯陰病者不能仰以脈而言則浮大滑數之類皆陽也沉微細澀之類皆陰也以藥而言則升散者為陽斂降者為陰辛熱者為陽苦寒者為陰行氣分者為陽行血分者為陰性動而走者為陽性靜而守者為陰此皆醫中之大法至於陰中復有陽陽中復有靜疑似之間辨須的確此而不識極易差訛是又最為緊要然總不離於前之數者但兩氣相兼則此少彼多其中便有變化一皆以理測之自有顯然可見者若陽有餘而更施陽治則陽愈熾而陰愈消陽不足而更用陰方則陰愈盛而陽斯滅矣設能明徹陰陽則醫理雖玄思過半矣一道產陰陽原同一氣火為水之主水即火之源水火原不相離也何以見之如水為陰火為陽象分冰炭何謂同源蓋火性本熱使火中無水其熱必極熱極則亡陰而萬物焦枯矣水性本寒使水中無火其寒必極寒極則亡陽而萬物寂滅矣此水火之氣果可呼吸相離乎其在人身是即元陰元陽所謂先天之元氣也欲得先天當思根柢命門為受生之竅為水火之家此即先天之北闕也舍此他求如涉海問津矣學者宜識之一凡人之陰陽但知以氣血臟腑寒熱為言此特後天有形之陰陽耳至若先天無形之陰陽則陽曰元陽陰曰元陰元陽者即無形之火以生以化神機是也性命系之故亦曰元氣元陰者即無形之水以長以立天癸是也強弱系之故亦曰元精元精元氣者即化生精氣之元神也生氣通天惟賴乎此經曰得神者昌失神者亡即為之謂今之人多以後天勞欲戕及先天今之醫只知有形邪氣不知無形元氣夫有形者跡也盛衰昭著體認無難無形者神也變幻倏忽挽回非易故經曰粗守形上守神嗟呼又安得有通神明而見無形者與之共談斯道哉一天地陰陽之道本貴和平則氣令調而萬物生此造化生成之理也然陽為生之本陰實死之基故道家曰分陰未盡則不仙分陽未盡則不死華元化曰得其陽者生得其陰者死故凡欲保生重命者尤當愛惜陽氣此即以生以化之元神不可忽也曩自劉河間出以暑火立論專用寒涼伐此陽氣其害已甚賴東垣先生論脾胃之火必須溫養然尚未能盡斥一偏之謬而丹溪復出又立陰虛火動之論制補陰大補等丸俱以黃柏知母為君寒涼之弊又復盛行夫先受其害者既去而不返後習而用者猶迷而不悟嗟乎法高一尺魔高一丈若二子者謂非軒歧之魔乎余深悼之故直削於此實冀夫盡洗積陋以蘇生命之厄誠不得不然也觀者其諒之察之勿以誹謗先輩為責也幸甚一陰陽虛實經曰陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒一經曰陽氣有餘為身熱無汗此言表邪之實也又曰陰氣有餘為多汗身寒此言陽氣之虛也仲景曰發熱惡寒發於陽無熱惡寒發於陰又曰極寒反汗出身必冷如冰此與經旨義相上下一經曰陰盛則陽病陽盛則陰病陽勝則熱陰盛則寒一陰根於陽陽根於陰凡病有不可正治者當從陽以引陰從陰以引陽各求其屬而衰之如求汗於血生氣於精從陽引陰也又如引火歸源納氣歸腎從陰引陽也此即水中取火火中取水之義一陰之病也來亦緩而去亦緩陽之病也來亦速而去亦速陽生於熱熱則舒緩陰生於寒寒則拳急寒邪中於下熱邪中於上飲食之邪中於中一考之中藏經曰陽病則旦靜陰病則夜寧陽虛則暮亂陰虛則朝爭蓋陽虛喜陽助所以朝輕而暮重陰虛喜陰助所以朝重而暮輕此言陰陽之虛也若實邪之候則與此相反凡陽邪盛者必朝重暮輕陰邪盛者必朝輕暮重此陽逢陽王陰得陰強也其有或晝或夜時作時止不時而動者以正氣不能主持則陰陽盛負交相錯亂當以培養正氣為主則陰陽將自和矣但或水或火宜因虛實以求之六變辨三六變者表裡寒熱虛實也是即醫中之關鍵明此六者萬病皆指諸掌矣以表裡言之則風寒暑濕火燥感於外者是也以裡言之則七情勞欲飲食傷於內者是也寒者陰之類也或為內寒或為外寒寒者多虛熱者陽之類也或為內熱或為外熱熱者多實虛者正氣不足也內出之病多不足實者邪氣有餘也外入之病多有餘六者之詳條列如下表證篇四表證者邪氣之自外而入者也凡風寒暑濕火燥氣有不正皆是也經曰清風大來燥之勝也風木受邪肝病生焉熱氣大來火之勝也金燥受邪肺病生焉寒氣大來水之勝也火熱受邪心病生焉濕氣大來土之勝也寒水受邪腎病生焉風氣大來木之勝也土濕受邪脾病生焉又曰冬傷於寒春必病溫春傷於風夏生飧泄夏傷於暑秋必咳瘧秋傷於濕冬生咳嗽又曰風從其沖後來者為虛風傷人者也主殺主害者凡此之類皆言外來之邪但邪有陰陽之辨而所傷亦自不同蓋邪雖有六化止陰陽陽邪化熱熱則傷氣陰邪化寒寒則傷形傷氣者氣通於鼻鼻通於臟故凡外受暑熱而病有發於中者以熱邪傷氣也傷形者淺則皮毛深則經絡故凡外受風寒而病為身熱體痛者以寒邪傷形也經曰寒則腠理閉氣不行故氣收矣炅則腠理開營衛通汗大泄故氣泄矣此六氣陰陽之辨也然而六邪之感於外者又惟風寒為最蓋風為百病之長寒為殺厲之氣人身內有臟腑外有經絡凡邪氣之客於形也必先舍於皮毛留而不去乃入於孫絡留而不去乃入於絡脈留而不去乃入於經脈然後內連五臟散於腸胃陰陽俱感五臟乃傷此邪氣自外而內之次也然邪氣在表必有表證既見表證則不可攻裡若誤攻之非惟無涉且恐裡虛則邪氣乘虛愈陷也表證既明則里證可因而解矣故表證之辨不可不為之先察一人身臟腑在內經絡在外故臟腑為里經絡為表在表者手足各有六經是為十二經脈以十二經脈分陰陽則六陽屬腑為表六陰屬臟為里以十二經脈分手足則足經之脈長而且遠自上及下遍絡四體故可按之以察周身之病手經之脈短而且近皆出入於足經之間故凡診傷寒外感者則但言足經不言手經也然而足之六經又以三陽為表三陰為里而三陽之經則又以太陽為陽中之表以其脈行於背背為陽也陽明為陽中之裡以其脈行於腹腹為陰也少陽為半表半裡以其脈行於側三陽傳遍而漸入三陰也故凡欲察表證者但當分前後左右而以足三陽經為主然三陽之中則又惟太陽一經包覆肩背外為周身之之綱維內連五臟六腑之肓腧此諸陽之主氣猶四通八達之衢也故凡風寒之傷人必多自太陽經始一足三陰之經皆自腳上腹雖亦在肌表之間然三陰主裡而凡風寒自表而入者未有不由陽經而入陰分也若不由陽經逕入三陰者即為直中陰經必連臟矣故陰經無可據之表證一寒邪在表者必身熱無汗以邪閉皮毛也一寒邪客於經絡必身體疼痛或拘急而酸者以邪氣亂營氣血脈不利也一寒邪在表而頭痛者有四經焉足太陽脈挾於頭頂足陽明脈上至頭維足少陽脈上行兩角足厥陰脈上會於巔皆能為頭痛也故惟太陰少陰皆無頭痛之證一寒邪在表多惡寒者蓋傷於此者必惡此所謂傷食惡食傷寒惡寒也一邪氣在表脈必緊數者營氣為邪所亂也一太陽經脈起目內眥上頂巔下項挾脊行腰膕故邪在太陽者必惡寒發熱而兼頭項痛腰脊強或膝腨痠疼也一陽明經脈起自目下循面鼻行胸腹故邪在陽明者必發熱微惡寒而兼目痛鼻乾不眠也一少陽為半表半裡之經其脈繞耳前後由肩井下脅肋故邪在少陽者必發熱而兼耳聾脅痛口苦而嘔或往來寒熱也以上皆三陽之表證但見表證則不可攻裡或發表或微解或溫散或涼散或溫中托裡而為不散之散或補陰助陰而為云蒸雨化之散嗚呼意有在而言難盡也惟慧者之心悟之一表證之脈仲景曰寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨節煩疼當發其汗也脈經注曰風為陽寒為陰衛為陽營為陰風則傷陽寒則傷陰各從其類而傷也故衛得風則熱營得寒則痛營衛俱病故致骨節煩疼當發汗解表而愈一浮脈本為屬表此固然也然有邪寒初感之甚者拘束衛氣脈不能達則必沉而兼緊此但當以發熱身痛等表證參合而察之自可辨也又若血虛動血者脈必浮大陰虛水虧者脈必浮大內火熾盛者脈必浮大關陰格陽者脈必浮大若此者俱不可一概以浮為表論必當以形氣病氣有無外證參酌之若本非表證而誤認為表則殺人於反掌之間矣一外感寒邪脈大者必病進以邪氣日盛也然必大而兼緊方為病進若先小而後大及漸大漸緩者此以陰轉陽為胃氣漸至將解之兆也一寒邪未解脈息緊而無力者無愈期也何也蓋緊者邪氣也力者元氣也緊而無力則邪氣有餘而元氣不足也元氣不足何以逐邪臨此證者必能使元陽漸充則脈漸有力自小而大自虛而實漸至洪滑則陽氣漸達表將解矣若日見無力而緊數日進則危亡之兆也一病必自表而入者方得謂之表證若由內以及外便非表證矣經曰從內之外者調其內從外之內者治其外從內之外而盛於外者先治其內而後治其外從外之內而盛於內者先治其外而後調其內此內外先後之不可不知也一傷風中風雖皆有風之名不可均作表證蓋傷風之病風自外入者也可散之溫之而已此表證也中風之病雖形證似風實由內傷所致本無外邪故不可以表證論治法具本條一發熱之類本為火證但當分辨表裡凡邪氣在表發熱者表熱而里無熱也此因寒邪治宜解散邪氣在裡發熱者必裡熱先甚而後及於表也此是火證治宜清涼凡此內外皆可以邪熱論也若陰虛水虧而為骨蒸夜熱者此虛熱也又不可以邪熱為例惟壯水滋陰可以治之一濕燥二氣雖亦外邪之類但濕有陰陽燥亦有陰陽濕從陰者為寒濕濕從陽者為濕熱燥從陽者因於火燥從陰者發於寒熱則傷陰必連於臟寒則傷陽必連於經此所以濕燥皆有表裡必須辨明而治之一濕證之辨當辨表裡經曰因於濕首如裹又曰傷於濕者下先受之若道路衝風冒雨或動作辛苦之人汗濕沾衣此皆濕從外入者也若嗜好酒漿生冷以致泄瀉黃疸腫脹之類此濕從內出者也在上在外者宜微從汗解在下在裡者宜分利之濕熱者宜清宜利寒濕者宜補脾溫腎一燥證之辨亦有表裡經曰清氣大來燥之勝也風木受邪肝病生焉此中風之屬也蓋燥勝則陰虛陰虛則血少所以或為牽引或為拘急或為皮腠風消或為臟腑乾結此燥從陽化營氣不足而傷乎內者也治當以養營補陰為主若秋令太過金氣勝而風從之則肺先受病此傷風之屬也蓋風寒外束氣應皮毛故或為身熱無汗或為咳嗽喘滿或鼻塞聲啞或咽喉乾燥此燥以陰生衛氣受邪而傷乎表者也治當以輕揚溫散之劑暖肺去寒為主里證篇五里證者病之在內在臟也凡病自內生則或因七情或因勞倦或因飲食所傷或為酒色所困皆為里證以此言之實屬易見第於內傷外感之間疑似之際若有不明未免以表作里以里作表乃致大害故當詳辨也一身雖微熱而濈濈汗出不止及無身體痠疼拘急而脈不緊數者此熱非在表也一證似外感不惡寒反惡熱而絕無表證者此熱盛於內也一凡病表證而小便清利者知邪未入里也一表證已具而飲食如故胸腹無礙者病不及里也若見嘔惡口苦或心胸滿悶不食乃表邪傳至胸中漸入於裡也若煩躁不眠乾渴譫語腹痛自利等證皆邪入於裡也若腹脹喘滿大便結硬潮熱斑黃脈滑而實者此正陽明胃腑裡實之證可下之也一七情內傷過於喜者傷心而氣散心氣散者收之養之過於怒者傷肝而氣逆肝氣逆者平之抑之過於思者傷脾而氣結脾氣結者溫之豁之過於憂者傷肺而氣沉肺氣沉者舒之舉之過於恐者傷腎而氣怯腎氣怯者安之壯之一飲食內傷氣滯而積者脾之實也宜消之逐之不能運化者脾之虛也宜暖之助之一酒濕傷陰熱而煩滿者濕熱為病也清之泄之酒濕傷陽腹痛瀉利嘔惡者寒濕之病也溫之補之一勞倦傷脾者脾主四肢也須補其中氣一色欲傷腎而陽虛無火者兼培其氣血陰虛有火者純補其真陰一痰飲為患者必有所本求所從來方為至治若但治標非良法也詳具本條一五臟受傷本不易辨但有諸中必形諸外故肝病則目不能視而色青心病則舌不能言而舌赤脾病則口不知味而色黃肺病則鼻不聞香臭而色白腎病則耳不能聽而色黑虛實篇六虛實者有餘不足也有表裡之虛實有氣血之虛實有臟腑之虛實有陰陽之虛實凡外入之病多有餘內出之病多不足實言邪氣實則當瀉虛言正氣虛則當補凡欲察虛實者為欲知根本之何如攻補之宜否耳夫疾病之實固為可慮而元氣之虛慮尤甚焉故凡診病者必當先察元氣為主而後求疾病若實而誤補隨可解救虛而誤攻不可生矣然總之虛實之要莫逃乎脈如脈之真有力真有神者方是真實證脈之似有力似有神者便是假實證矧脈之無力無神以至全無力全無神者哉臨證者萬毋忽此一表實者或為發熱或為身痛或為惡熱掀衣或為惡寒鼓慄寒束於表者無汗火盛於表者有瘍走注而紅痛者知營衛之有熱拘急而痠疼者知經絡之有寒一裡實者或為脹為痛或為痞為堅或為閉為結或為喘為滿或懊憹不寧或躁煩不眠或氣血積聚結滯腹中不散或寒邪熱毒深留臟腑之間一陽實者為多熱惡熱陰實者為痛結而寒氣實者氣必喘促而聲色壯厲血實者血必凝聚而且痛且堅一心實者多火而多笑肝實者兩脅少腹多有疼痛且復多怒脾實者為脹滿氣閉或為身重肺實者多上焦氣逆或為咳喘腎實者多下焦壅閉或痛或脹或熱見於二便一表虛者或為汗多或為肉戰或為怯寒或為目暗羞明或為耳聾眩運或肢體多見麻木或舉動不勝勞煩或為毛槁而肌肉削或為顏色憔悴而神氣索然一裡虛者為心怯心跳為驚惶為神魂之不寧為津液之不足或為飢不能食或為渴不喜冷或畏張目而視或聞人聲而驚上虛則飲食不能運化或多嘔惡而氣虛中滿下虛則二陰不能流利或便尿失禁肛門脫出而泄瀉遺精在婦人則為血枯經閉及墮胎崩淋帶濁等證一陽虛者火虛也為神氣不足為眼黑頭眩或多寒而畏寒陰虛者水虧也為亡血失血為戴陽為骨蒸勞熱氣虛者聲音微而氣短似喘血虛者肌膚乾澀而筋脈拘攣一心虛者陽虛而多悲肝虛者目䀮䀮無所見或陰縮筋攣而善恐脾虛者為四肢不用或飲食不化腹多痞滿而善憂肺虛者少氣息微而皮毛燥澀腎虛者或為二陰不通或為兩便失禁或多遺泄或腰脊不可俯仰而骨酸痿厥一諸痛之可按者為虛拒按者為實一脹滿之虛實仲景曰腹滿不減減不足言當下之腹滿時減復如故此為寒當與溫藥夫減不足言者以中滿之甚無時或減此實脹也故當下之腹滿時減者以腹中本無實邪所以有時或減既減而腹滿如故者以脾氣虛寒而然所以當與溫藥溫即兼言補也一內經諸篇皆惓惓以神氣為言夫神氣者元氣也元氣完固則精神昌盛無待言也若元氣微虛則神氣微去元氣大虛則神氣全去神去則機息矣可不畏哉脈要精微論曰夫精明者所以視萬物別黑白審長短以長為短以白為黑如是則精衰矣言而微終日乃復言者此氣奪也衣被不斂言語善惡不避親疏此神明之亂也倉廩不藏者是門戶不要也水泉不止是膀胱不藏也得守者生失守者死夫五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩垂府將壞矣腰者腎之府轉搖不能腎將憊矣膝者腳之府屈伸不能行則僂俯骨將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死此內經之言虛證也當察其意一虛者宜補實者宜瀉此易知也而不知實中復有虛虛中復有實故每以至虛之病反見盛勢大實之病反有羸狀此不可不辨也如病起七情或飢飽勞倦或酒色所傷或先天不足及其既病則每多身熱便閉戴陽脹滿虛狂假斑等證似為有餘之病而其因實由不足醫不察因從而瀉之必枉死矣又如外感之邪未除而留伏於經絡食飲之滯不消而積聚於臟腑或鬱結逆氣有不可散或頑痰瘀血有所留藏病久致羸似乎不足不知病本未除還當治本若誤用補必益其病矣此所謂無實實無虛虛損不足而益有餘如此死者醫殺之耳附華元化虛實大要論曰病有臟虛臟實腑虛腑實上虛上實下虛下實狀各不同宜深消息腸鳴氣走足冷手寒食不入胃吐逆無時皮毛憔悴肌肉皺皴耳目昏塞語聲破散行步喘促精神不收此五臟之虛也診其脈舉指而滑按之而微看在何部以斷其臟也又按之沉小微弱短澀軟濡俱為臟虛也飲食過多大小便難胸膈滿悶肢節疼痛身體沉重頭目悶眩唇口腫脹咽喉閉塞腸中氣急皮肉不仁暴生喘乏偶作寒熱瘡疽並起悲喜時來或自痿弱或自高強氣不舒暢血不流通此臟之實也診其脈舉按俱盛者實也又長浮數疾洪緊弦大俱曰實也看在何經而斷其臟也頭疼目赤皮熱骨寒手足舒緩血氣壅塞丹瘤更生咽喉腫痛輕按之痛重按之快食飲如故曰腑實也診其脈浮而實大者是也皮膚搔癢肌肉䐜脹食飲不化大便滑而不止診其脈輕手按之得滑重手按之得平此乃腑虛也看在何經而正其時也胸膈痞滿頭目碎痛飲食不下腦項昏重咽喉不利涕唾稠黏診其脈左右寸口沉結實大者上實也頰赤心忪舉動顫慄語聲嘶嗄唇焦口乾喘乏無力面少顏色頤頷腫滿診其左右寸脈弱而微者上虛也大小便難飲食如故腰腳沉重當作酸重臍腹疼痛診其左右尺中脈伏而澀者下實也大小便難飲食進退腰腳沉重如坐水中行步艱難氣上奔沖夢寐危險診其左右尺中脈滑而澀者下虛也病人脈微澀短小俱屬下虛也一本篇虛實證有未盡者俱詳載虛損門當互察之寒熱篇七寒熱者陰陽之化也陰不足則陽乘之其變為熱陽不足則陰乘之其變為寒故陰勝則陽病陰勝為寒也陽勝則陰病陽勝為熱也熱極則生寒因熱之甚也寒極則生熱因寒之甚也陽虛則外寒寒必傷陽也陰虛則內熱熱必傷陰也陽盛則外熱陽歸陽分也陰盛則內寒陰歸陰分也寒則傷形形言表也熱則傷氣氣言里也故火旺之時陽有餘而熱病生水旺之令陽不足而寒病起人事之病由於內氣交之病由於外寒熱之表裡當知寒熱之虛實亦不可不辨一熱在表者為發熱頭痛為丹腫斑黃為揭去衣被為諸痛瘡瘍一熱在裡者為瞀悶脹滿為煩渴喘結或氣急叫吼或躁擾狂越一熱在上者為頭痛目赤為喉瘡牙痛為諸逆衝上為喜冷舌黑一熱在下者為腰足腫痛為二便秘澀或熱痛遺精或溲混便赤一寒在表者為憎寒為身冷為浮腫為容顏青慘為四肢寒厥一寒在裡者為冷咽腸鳴為噁心嘔吐為心腹疼痛為惡寒喜熱一寒在上者為吞酸為膈噎為飲食不化為噯腐脹噦一寒在下者為清濁不分為鶩溏痛泄為陽痿為遺尿為膝寒足冷一病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也此表證之辨若內熱之甚者亦每多畏寒此當以脈證參合察之一真寒之脈必遲弱無神真熱之脈必滑實有力一陽臟之人多熱陰臟之人多寒陽臟者必平生喜冷畏熱即朝夕食冷一無所病此其陽之有餘也陰臟者一犯寒涼則脾腎必傷此其陽之不足也第陽強者少十惟二三陽弱者多十常五六然恃強者多反病畏弱者多安寧若或見彼之強而忌我之弱則與侏儒觀場醜婦效顰者無異矣寒熱真假篇八寒熱有真假者陰證似陽陽證似陰也蓋陰極反能躁熱乃內寒而外熱即真寒假熱也陽極反能寒厥乃內熱而外寒即真熱假寒也假熱者最忌寒涼假寒者最忌溫熱察此之法當專以脈之虛實強弱為主一假熱者水極似火也凡病傷寒或患雜證有其素稟虛寒偶感邪氣而然者有過於勞倦而致者有過於酒色而致者有過於七情而致者有原非火證以誤服寒涼而致者凡真熱本發熱而假熱亦發熱其證則亦為面赤躁煩亦為大便不通小便赤澀或為氣促咽喉腫痛或為發熱脈見緊數等證昧者見之便認為熱妄投寒涼下咽必斃不知身雖有熱而裡寒格陽或虛陽不斂者多有此證但其內證則口雖乾渴必不喜冷即喜冷者飲亦不多或大便不實或先硬後溏或小水清頻或陰枯黃赤或氣短懶言或色黯神倦或起倒如狂而禁之則止自與登高罵詈者不同此虛狂也或斑如蚊跡而淺紅細碎自與紫赤熱極者不同此假斑也凡假熱之脈必沉細遲弱或雖浮大緊數而無力無神此乃熱在皮膚寒在臟腑所謂惡熱非熱實陰證也凡見此內頹內困等證而但知攻邪則無有不死急當以四逆八味理陰煎回陽飲之類倍加附子填補真陽以引火歸源但使元氣漸復則熱必退藏而病自愈所謂火就燥者即此義也故凡見身熱脈數按之不鼓擊者此皆陰盛格陽即非熱也仲景治少陰證面赤者以四逆湯加蔥白主之東垣曰面赤目赤煩躁引飲脈七八至按之則散者此無根之火也以姜附湯加人參主之外臺秘要曰陰盛發躁名曰陰躁欲坐井中宜以熱藥治之一假寒者火極似水也凡傷寒熱甚失於汗下以致陽邪亢極鬱伏於內則邪自陽經傳入陰分故為身熱發厥神氣昏沉或時畏寒狀若陰證凡真寒本畏寒而假寒亦畏寒此熱深厥亦深熱極反兼寒化也大抵此證必聲壯氣粗形強有力或唇焦舌黑口渴飲冷小便赤澀大便秘結或因多飲藥水以致下痢純清水而其中仍有燥糞及矢氣極臭者察其六脈必皆沉滑有力此陽證也凡內實者宜三承氣湯擇而用之潮熱者以大柴胡湯解而下之內不實者以白虎湯之類清之若雜證之假寒者亦或為畏寒或為戰慄此以熱極於內而寒侵於外則寒熱之氣兩不相投因而寒慄此皆寒在皮膚熱在骨髓所謂惡寒非寒明是熱證但察其內證則或為喜冷或為便結或小水之熱澀或口臭而躁煩察其脈必滑實有力凡見此證即當以涼膈芩連之屬助其陰而清其火使內熱既除則外寒自伏所謂水流濕者亦此義也故凡身寒厥冷其脈滑數按之鼓擊於指下者此陽極似陰即非寒也一假寒誤服熱藥假熱誤服寒藥等證但以冷水少試之假熱者必不喜水即有喜者或服後見嘔便當以溫熱藥解之假寒者必多喜水或服後反快而無所逆者便當以寒涼藥解之十問篇九一問寒熱二問汗三問頭身四問便五問飲食六問胸七聾八渴俱當辨九因脈色察陰陽十從氣味章神見見定雖然事不難也須明哲毋招怨上十問者乃診治之要領臨證之首務也明此十問則六變具存而萬病形情俱在吾目中矣醫之為難難在不識病本而施誤治耳誤則殺人天道可畏不誤則濟人陰德無窮學者欲明是道必須先察此要以定意見以為階梯然後再採群書廣其知識又何誤焉有能熟之胸中運之掌上非止為人而為己不淺也慎之寶之一問寒熱問寒熱者問內外之寒熱欲以辨其在表在裡也人傷於寒則病為熱故凡病身熱脈緊頭疼體痛拘急無汗而且得於暫者必外感也蓋寒邪在經所以頭痛身疼邪閉皮毛所以拘急發熱若素日無疾而忽見脈證若是者多因外感蓋寒邪非素所有而突然若此此表證也若無表證而身熱不解多屬內傷然必有內證相應合而察之自得其真一凡身熱經旬或至月餘不解亦有仍屬表證者蓋因初感寒邪身熱頭痛醫不能辨誤認為火輒用寒涼以致邪不能散或雖經解散而藥未及病以致留蓄在經其病必外證多而里證少此非里也仍當解散一凡內證發熱者多屬陰虛或因積熱然必有內證相應而其來也漸蓋陰虛者必傷精傷精者必連臟故其在上而連肺者必喘急咳嗽在中而連脾者或妨飲食或生懊憹或為躁煩焦渴在下而連腎者或精血遺淋或二便失節然必倏熱往來時作時止或氣怯聲微是皆陰虛證也一凡怒氣七情傷肝傷臟而為熱者總屬真陰不足所以邪火易熾亦陰虛也一凡勞倦傷脾而發熱者以脾陰不足故易於傷傷則熱生於肌肉之分亦陰虛也一凡內傷積熱者在癥痞必有形證在血氣必有明徵或九竅熱於上下或臟腑熱於三焦若果因實熱凡火傷在形體而無涉於真元者則其形氣聲色脈候自然壯麗無弗有可據而察者此當以實火治之一凡寒證尤屬顯然或外寒者陽虧於表或內寒者火衰於中諸如前證但熱者多實而虛熱者最不可誤寒者多虛而實寒者間亦有之此寒熱之在表在裡不可不辨也二問汗問汗者亦以察表裡也凡表邪盛者必無汗而有汗者邪隨汗去已無表邪此理之自然也故有邪盡而汗者身涼熱退此邪去也有邪在經而汗在皮毛者此非真汗也有得汗後邪雖稍減而未得盡全者猶有餘邪又不可因汗而必謂其無表邪也須因脈證而詳察之一凡溫暑等證有因邪而作汗者有雖汗而邪未去者皆表證也總之表邪未除者在外則連經故頭身或有疼痛在內則連臟故胸膈或生躁煩在表在裡有證可憑或緊或數有脈可辨須察其真假虛實孰微孰甚而治之一凡全非表證則或有陽虛而汗者須實其氣陰虛而汗者須益其精火盛而汗者涼之自愈過飲而汗者清之可寧此汗證之有陰陽表裡不可不察也諸汗詳證載傷寒門三問頭身問其頭可察上下問其身可察表裡頭痛者邪居陽分身痛者邪在諸經前後左右陰陽可辨有熱無熱內外可分但屬表邪可散之而愈也一凡火盛於內為頭痛者必有內應之證或在喉口或在耳目別無身熱惡寒在表等候者此熱盛於上病在裡也察在何經宜清宜降高者抑之此之謂也若用輕揚散劑則火必上升而痛愈甚矣一凡陰虛頭痛者舉發無時是因酒色過度或遇勞苦或逢情欲其發則甚此為里證或精或氣非補不可也一凡頭痛屬裡者多因於火此其常也然亦有陰寒在上陽虛不能上達而痛甚者其證則惡寒嘔惡六脈沉微或兼弦細諸治不效余以桂附參熟之類而愈之是頭痛之有陽虛也一凡雲頭風者此世俗之混名然必有所因須求其本辨而治之一凡眩運者或頭重者可因之以辨虛實凡病中眩運多因清陽不升上虛而然如丹溪云無痰不作運殊非真確之論但當兼形氣分久暫以察之觀內經曰上虛則眩上盛則熱痛其義可知至於頭重尤屬上虛經曰上氣不足腦為之不滿頭為之苦傾此之謂也一凡身痛之甚者亦當察其表裡以辨寒熱其若感寒作痛者或上或下原無定所隨散而愈此表邪也若有定處而別無表證乃痛痹之屬邪氣雖亦在經此當以里證視之但有寒熱之異耳若因火盛者或肌膚灼熱或紅腫不消或內生煩渴必有熱證相應治宜以清以寒若並無熱候而疼痛不止多屬陰寒以致血氣凝滯而然經曰痛者寒氣多也有寒故痛也必溫其經使血氣流通其邪自去矣一凡勞損病劇而忽加身痛之甚者此陰虛之極不能滋養筋骨而然營氣憊矣無能為也四問便二便為一身之門戶無論內傷外感皆當察此以辨其寒熱虛實蓋前陰通膀胱之道而其利與不利熱與不熱可察氣化之強弱凡患傷寒而小水利者以太陽之氣未劇即吉兆也後陰開大腸之門而其通與不通結與不結可察陽明之實虛凡大便熱結而腹中堅滿者方屬有餘通之可也若新近得解而不甚乾結或旬日不解而全無脹意者便非陽明實邪觀仲景曰大便先硬後溏者不可攻可見後溏者雖有先硬已非實熱矧夫純溏而連日得後者又可知也若非真有堅燥痞滿等證則原非實邪其不可攻也明矣一凡小便人但見其黃便謂是火而不知人逢勞倦小水即黃焦思多慮小水亦黃瀉痢不期小水亦黃酒色傷陰小水亦黃使非有或淋或痛熱證相兼不可因黃便謂之火余見逼枯汁而斃人者多矣經曰中氣不足溲便為之變義可知也若小水清利者知里邪之未甚而病亦不在氣分以津液由於氣化氣病則小水不利也小水漸利則氣化可知最為吉兆一大便通水穀之海腸胃之門戶也小便通血氣之海衝任水道之門戶也二便皆主於腎本為元氣之關必真見實邪方可議通議下否則最宜詳慎不可誤攻使非真實而妄逐之導去元氣則邪之在表者反乘虛而深陷病因內困者必由泄而愈虧所以凡病不足慎勿強通最喜者小便得氣而自化大便彌固者彌良營衛既調自將通達即大腸秘結旬余何慮之有若滑泄不守乃非虛弱者所宜當首先為之防也五問飲食問飲食者一可察胃口之清濁二可察臟腑之陰陽病由外感而食不斷者知其邪未及臟而惡食不惡食者可知病因內傷而食飲變常者辨其味有喜惡而愛冷愛熱者可知素欲溫熱者知陰臟之宜暖素好寒冷者知陽臟之可清或口腹之失節以致誤傷而一時之權變可因以辨故飲食之性情所當詳察而藥餌之宜否可因以推也一凡諸病得食稍安者必是虛證得食更甚者或虛或實皆有之當辨而治也六問胸胸即膻中上連心肺下通臟腑胸腹之病極多難以盡悉而臨證必當問者為欲辨其有邪無邪及宜補宜瀉也夫凡胸腹脹滿則不可用補而不脹不滿則不可用攻此大法也然痞與滿不同當分輕重重者脹塞中滿此實邪也不得不攻輕者但不欲食不知飢飽似脹非脹中空無物乃痞氣耳非真滿也此或以邪陷胸中者有之或脾虛不運者有之病者不知其辨但見胃氣不開飲食不進問之亦曰飽悶而實非真有脹滿此在疑虛疑實之間若不察其真確未免補瀉倒施必多致誤則為害不小一凡今人病虛證者極多非補不可但用補之法不宜造次欲察其可補不可補之機則全在先察胸腹之寬否何如然後以漸而進如未及病再為放膽用之庶無所礙此用補之大法也一凡勢在危急難容稍緩亦必先問其胸寬者乃可驟進若元氣多虛而胸腹又脹是必虛不受補之證若強進補劑非惟無益適足以招謗耳此胸腹之不可不察也七問聾耳雖少陽之經而實為腎臟之官又為宗脈之所聚問之非惟可辨虛實亦且可知死生凡人之久聾者此一經之閉無足為怪惟是因病而聾者不可不辨其在熱論篇則曰傷寒三日少陽受之故為耳聾此以寒邪在經氣閉而然然以余所驗則未有不因氣虛而然者素問曰精脫者耳聾仲景曰耳聾無聞者陽氣虛也由此觀之則凡病是證其屬氣虛者什九氣閉者什一耳一聾有輕重輕者病輕重者病重若隨治漸輕可察其病之漸退也進則病亦進矣若病至聾極甚至絕然無聞者此誠精脫之證余經歷者數人矣皆至不治八問渴問渴與不渴可以察里證之寒熱而虛實之辨亦從以見凡內熱之甚則大渴喜冷冰水不絕而腹堅便結脈實氣壯者此陽證也一凡口雖渴而喜熱不喜冷者此非火證中寒可知既非火證何以作渴則水虧故耳一凡病人問其渴否則曰口渴問其欲湯水否則曰不欲蓋其內無邪火所以不欲湯真陰內虧所以口無津液此口乾也非口渴也不可以干作渴治一凡陽邪雖盛而真陰又虛者不可因其火盛喜冷便雲實熱蓋其內水不足欲得外水以濟水涸精虧真陰枯也必兼脈證細察之此而略差死生立判余嘗治垂危最重傷寒有如此者每以峻補之劑浸冷而服或以冰水參熟等劑相間迭進活人多矣常人見之咸以為奇不知理當如是何奇之有然必其乾渴燥結之甚者乃可以參附涼水並進若無實結不可與水九因脈色辨陰陽脈色者血氣之影也形正則影正形斜則影斜病生於內則脈色必見於外故凡察病者須先明脈色但脈色之道非數言可盡欲得其要則在乎陰陽虛實四者而已四者無差盡其善矣第脈法之辨以洪滑者為實為陽微弱者為虛為陰無待言也然仲景曰若脈浮大者氣實血虛也陶節庵曰不論脈之浮沉大小但指下無力重按全無便是陰證內經以脈大四倍以上為關格皆屬真虛此滑大之未必為陽也形色之辨以紅黃者為實熱青黑者為陰寒而仲景云面赤戴陽者為陰不足此紅赤之未必為實也總之求脈之道當以有力無力辨陰陽有神無神察虛實和緩者乃元氣之來強峻者乃邪氣之至病值危險之際但以此察元氣之盛衰邪正之進退則死生關係全在乎此此理極微談非容易姑道其要以見凡欲診病者既得病因又必須察脈色辨聲音參合求之則陰陽虛實方有真據否則得此失彼以非為是醫家之病莫此為甚不可忽也諸所未盡詳後卷脈神章十從氣味章神見凡制方用藥乃醫家開手作用第一要著而胸中神見必須發泄於此使不知氣味之用必其藥性未精不能取效何神之有此中最有玄妙勿謂其淺顯易知而弗加之意也余少年時每將用藥必逐件細嘗既得其理所益無限一氣味有陰陽陰者降陽者升陰者靜陽者動陰者柔陽者剛陰者怯陽者勇陰主精陽主氣其於善惡喜惡皆有妙用不可不察一氣味之升降升者浮而散散者沉而利宜升者勿降宜降者勿升一氣味之動靜靜者守而動者走走者可行守者可安一氣味之剛柔柔者純而緩剛者躁而急純者可和躁者可劫非剛不足以去暴非柔不足以濟剛一氣味之勇怯勇者直達病所可賴出奇怯者用以周全藉其平妥一氣味之主氣者有能為精之母主精者有能為氣之根或陰中之陽者能動血中之氣或陽中之陰者能顧氣中之精一氣味有善惡善者賦性馴良盡堪擇用惡者氣味殘狼何必近之一氣味有喜惡有素性之喜惡有一時之喜惡喜者相宜取效尤易惡者見忌不必強投見定雖然事不難也須明哲毋招怨明哲二字為見機自保也夫醫患不明明則治病何難哉而所患者在人情耳人事之變莫可名狀如我有獨見豈彼所知使彼果知當自為矣何藉於我而每有病臨危劇尚執淺見從旁指示曰某可用某不可用重之曰太過輕之言不及倘一不合意將必有後言是當見幾之一也有雜用不專者朝王暮李主見不定即藥已相投而渠不之覺忽惑人言舍此慕彼凡後至者欲顯己長必談前短及其致敗反以嫁讒是當見幾之二也有病入膏肓勢必難療而憐其苦求勉為舉手當此之際使非破格出奇何以濟急倘出奇無功徒駭人目事後亦招浮議是當見幾之三也其或有是非之場爭競之所幸災樂禍利害所居者近之恐涉其患是當見幾之四也有輕醫重巫可無可有徒用醫名以盡人事及尚有村鄙之夫不以彼病為懇反云為我作興籲誠可哂也此其相輕孰甚是當見幾之五也有議論繁雜者有親識要功者有內情不協者有任性反復者皆醫中所最忌是當見幾之六也凡此六者俱當默識而惟於縉紳之間尤當加意蓋恐其不以為功而反以為罪何從辨哉此雖曰吾盡吾心非不好生然勢有不我出者不得不見幾進止此明哲之自治所必不可少也論治篇十凡看病施治貴乎精一蓋天下之病變態雖多其本則一天下之方活法雖多對證則一故凡治病之道必確知為寒則竟散其寒確知為熱則竟清其熱一拔其本諸證盡除矣故內經曰治病必求其本是以凡診病者必須先探病本然後用藥若見有未的寧為少待再加詳察既得其要但用一味二味便可拔之即或深固則五六味七八味亦已多矣然雖用至七八味亦不過幫助之導引之而其意則一也方為高手今之醫者凡遇一證便若觀海望洋茫無定見則勢有不得不為雜亂而用廣絡原野之術蓋其意謂虛而補之則恐補之為害而複製之以消意謂實而消之又恐消之為害而複製之以補其有最可哂者則每以不寒不熱兼補兼瀉之劑確然投之極稱穩當此何以補其偏而救其弊乎又有以治風治火治痰治食之劑兼而用之甚稱周備此何以從其本而從其標乎若此者所謂以藥治藥尚未遑又安望其及於病耶即使偶愈亦不知其補之之力攻之之功也使其不愈亦不知其補之為害消之為害也是以白頭圭匕而庸庸沒齒者其咎在於無定見而用治之不精也使其病淺猶無大害若安危在舉動之間即用藥雖善若無膽量勇敢而藥不及病亦猶杯水車薪尚恐弗濟矧可以執兩端而藥有妄投者其害又將何如耽誤民生皆此輩也任醫者不可不深察焉故凡施治之要必須精一不雜斯為至善與其制補以消孰若少用純補以漸而進之為愈也與其制攻以補孰若微用純攻自一而再之為愈也故用補之法貴乎先輕後重務在成功用攻之法必須先緩後峻及病則已若用制不精則補不可以治虛攻不可以去實鮮有不誤人者矣余為是言知必有以為迂闊而譏之者曰古人用藥每多至一二十味何為精一豈古人之不爾若耶是不知相制相使之妙者也是執一不通而不知東垣之法者也余曰夫相制者制其毒也譬欲用人奇異之才而又慮其太過之害故必預有以防其微總欲得其中而已然此特遇不得已之勢間一有之初未有以顯見尋常之法用得其賢而復又自掣其肘者也至若相佐相使則恐其獨力難成而用以助之者亦非為欲進退牽制而自相矛盾者也觀仲景之方精簡不雜至多不過數味聖賢之心自可概見若必不得已而用行中之補補中之行是亦勢所當然如傷寒論之小柴胡湯以人參柴胡並用陶氏之黃龍湯以大黃人參並用此正精專妙處非若今醫之混用也能悟此理方是真見中活潑工夫至若東垣之方有十餘味及二十餘味者此其用多之道誠自有意學者欲效其法必須總會其一方之味總計其一方之性如某者多某者少某者為專主某者為佐使合其氣用自成一局之性使能會其一局之意斯得東垣之心矣若欲見頭治頭見腳治腳甚有執其三四端而一概混用以冀夫僥倖者尚敢曰我學東垣者哉雖然東垣之法非不善也然余則寧師仲景不敢宗東垣者正恐未得其清先得其隘其失者豈止一方劑也哉明者宜辨之一內經治法岐伯曰高者抑之下者舉之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者軟之脆者堅之衰者補之強者瀉之佐以所利和以所宜各安其氣必清必靜則病氣衰去歸其所宗此治之大體岐伯曰寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者益之溢者行之驚者平之上之下之摩之浴之薄者劫之開者發之適事為故帝曰何謂逆從岐伯曰逆者正治從者反治從少從多觀其事也帝曰反治何謂岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異岐伯曰病生於內者先治其陰後治其陽反者益甚病生於陽者先治其外後治其內反者益甚一治病用藥本貴精專尤宜勇敢凡久遠之病則當要其終始治從乎緩此宜然也若新暴之病虛實既得其真即當以峻劑直攻其本拔之甚易若逗留畏縮養成深固之勢則死生系之誰其罪也故凡真見裡實則以涼膈承氣真見裡虛則以理中十全表虛則耆朮建中表實則麻黃柴桂之類但用一味為君二三味為佐使大劑進之多多益善夫用多之道何在在乎必賴其力而料無害者即放膽用之性緩者可用數兩性急者亦可數錢若三五七分之說亦不過點名具數兒戲而已解紛治劇之才舉動固如是乎一治病之則當知邪正當權重輕凡治實者譬如耘禾禾中生稗禾之賊也有一去一有二去二耘之善者也若有一去二傷一禾矣有二去四傷二禾矣若識禾不的俱認為稗而計圖盡之則無禾矣此用攻之法貴乎察得其真不可過也凡治虛者譬之給餉一人一升十人一斗日餉足矣若百人一斗千人一斛而三軍之眾又豈擔石之糧所能活哉一餉不繼將並前餉而棄之而況於從中克減乎此用補之法貴乎輕重有度難從簡也一虛實之治大抵實能受寒虛能受熱所以補必兼溫瀉必兼涼者蓋涼為秋氣陰主殺也萬物逢之便無生長欲補元氣故非所宜涼且不利於補寒者益可知矣即有火盛氣虛宜補以涼者亦不過因火暫用火去即止終非治虛之法也又或有以苦寒之物謂其能補陰者則內經有曰形不足者溫之以氣精不足者補之以味夫氣味之相宜於人者謂之曰補可也未聞以味苦氣劣而不相宜於人者亦可謂之補也雖內經有曰水位之主其瀉以咸其補以苦等論然此特以五行歲氣之味據理而言耳矧其又云麥羊肉杏薤皆苦之類是則苦而補者也豈若大黃黃柏之類氣味苦劣若此而謂之能補無是理也嘗聞之王應震曰一點真陽寄坎宮固根鬚用味甘溫甘溫有益寒無補堪笑庸醫錯用功此一言蔽之也不可不察一補瀉之法補亦治病瀉亦治病但當知其要也如以新暴之病而少壯者乃可攻之瀉之攻但可用於暫未有衰久之病而屢攻可以無害者故攻不可以收緩功延久之病而虛弱者理宜溫之補之補乃可用於常未有根本既傷而舍補可以復元者故補不可以求速效然猶有其要則凡臨證治病不必論其有虛證無虛證但無實證可據而為病者便當兼補以調營衛精血之氣亦不必論其有火證無火證但無熱證可據而為病者便當兼溫以培命門脾胃之氣此吞瀉之要領苟不知此未有不至決裂敗事者一治法有逆從以寒熱有假真也此內經之旨也經曰逆者正治從者反治夫以寒治熱以熱治寒此正治也正即逆也以熱治熱以寒治寒此反治也反即從也如以熱藥治寒病而寒不去者是無火也當治命門以參熟桂附之類此王太僕所謂益火之源以消陰翳是亦正治之法也又如熱藥治寒病而寒不退反用寒涼而愈者此正假寒之病以寒從治之法也又如以寒藥治熱病而熱不除者是無水也治當在腎以六味丸之類此王太僕所謂壯水之主以鎮陽光是亦正治之法也又有寒藥治熱病而熱不愈反用參薑桂附八味丸之屬而愈者此即假熱之病以熱從治之法也亦所謂甘溫除大熱也第今人之虛者多實者少故真寒假熱之病為極多而真熱假寒之病則僅見耳一探病之法不可不知如當局臨證或虛實有難明寒熱有難辨病在疑似之間補瀉之意未定者即當先用此法若疑其為虛意欲用補而未決則以輕淺消導之劑純用數味先以探之消而不投即知為真虛矣疑其為實意欲用攻而未決則以甘溫純補之劑輕用數味先以探之補而覺滯即知有實邪也假寒者略溫之必見躁煩假熱者略寒之必加嘔惡探得其情意自定矣經曰有者求之無者求之又曰假者反之此之謂也但用探之法極宜精簡不可雜亂精簡則真偽立辨雜亂則是非難憑此疑似中之活法必有不得已而用之可也一醫診治法有曰見痰休治痰見血休治血無汗不發汗有熱莫攻熱喘生休耗氣精遺不澀泄明得箇中趣方是醫中傑行醫不識氣治病從何據堪笑道中人未到知音處觀其詩意皆言不治之治正內經求本之理耳誠格言也至於行醫不識氣治病從何據一聯亦甚有理夫天地之道陽主氣先天也陰成形後天也故凡上下之升降寒熱之往來晦明之變易風水之留行無不因氣以為動靜而人之於氣亦由是也凡有餘之病由氣之實不足之病因氣之虛如風寒積滯痰飲瘀血之屬氣不行則邪不除此氣之實也虛勞遺漏亡陽失血之屬氣不固則元不復此氣之虛也雖曰瀉火實所以降氣也雖曰補陰實所以生氣也氣聚則生氣散則死此之謂也所以病之生也不離乎氣而醫之治病也亦不離乎氣但所貴者在知氣之虛實及氣所從生耳近見有淺輩者凡一臨證不曰內傷外感則曰痰逆氣滯呵呵此醫家八字訣也有此八字何必八陣又何必端本澄源以求迂闊哉第人受其害恐不無可畏也附華氏治法華元化論治療曰夫病有宜湯者宜丸者宜散者宜下者宜吐者宜汗者宜灸者宜針者宜補者宜按摩者宜導引者宜蒸熨者宜暖洗者宜悅愉者宜和緩者宜水者宜火者種種之法豈惟一也若非良善精博難為取效庸下淺識每致亂投致使輕者令重重者令死舉世皆然且湯可以滌盪臟腑開通經絡調品陰陽祛分邪惡潤澤枯朽悅養皮膚養氣力助困竭莫離於湯也丸可以逐風冷破堅癥消積聚進飲食舒營衛定關竅從緩以參合無出於丸也散者能驅散風邪暑濕之氣攄陰寒濕濁之毒發散四肢之壅滯除剪五臟結伏開腸和胃行脈通經莫過於散也下則疏豁閉塞補則益助虛乏灸則起陰通陽針則行營引衛導引可逐客邪於關節按摩可驅浮淫於肌肉蒸熨闢冷暖洗生陽悅愉爽神和緩安氣若實而不下則使人心腹脹滿煩亂鼓腫若虛而不補則使人氣血消散肌肉耗亡精神脫失志意皆迷當汗而不汗則使人毛孔閉塞悶絕而終合吐而不吐則使人結胸上喘水食不入而死當灸而不灸則使人冷氣重凝陰毒內聚厥氣上衝分墜不散以致消減當針不針則使人營衛不行經絡不利邪漸勝真冒昧而昏宜導引而不導引則使人邪侵關節固結難通宜按摩而不按摩則使人淫歸肌肉久留不消宜蒸熨而不蒸熨則使人冷氣潛伏漸成痹厥宜暖洗而不暖洗則使人陽氣不行陰邪相害不當下而下則使人開腸蕩胃洞泄不禁不當汗而汗則使人肌肉消絕津液枯耗不當吐而吐則使人心神煩亂臟腑奔沖不當灸而灸則使人重傷經絡內蓄火毒反害中和致不可救不當針而針則使人血氣散失機關細縮不當導引而導引則使人真氣勞敗邪氣妄行不當按摩而按摩則使人肌肉䐜脹筋骨舒張不當蒸熨而蒸熨則使人陽氣偏行陰氣內聚不當暖洗而暖洗則使人濕著皮膚熱生肌體不當悅愉而悅愉則使人氣停意折健忘傷志大凡治療要合其宜脈狀病候少陳於後凡脈不緊數則勿發其汗脈不實數不可以下心胸不閉尺脈微弱不可以吐關節不急營衛不壅不可以針陰氣不盛陽氣不衰勿灸內無客邪勿導引外無淫氣勿按摩皮膚不痹勿蒸熨肌肉不寒勿暖洗神不凝迷勿愉悅氣不奔急勿和緩順此者生逆此者死耳氣味篇十一藥物眾多各一其性宜否萬殊難以盡識用者不得其要未免多誤兼之本草所注又皆概言其能凡有一長自難泯沒惟是孰為專主孰為兼能孰為利於此而不利於彼孰者宜於補而不宜於攻學者昧其真性而惟按圖以索驥所以用多不效益見用藥之難矣用藥之道無他也惟在精其氣味識其陰陽則藥味雖多可得其要矣凡氣味之辨則諸氣屬陽諸味屬陰氣本乎天氣有四曰寒熱溫涼是也味本乎地味有六曰酸苦甘辛鹹淡是也溫熱者天之陽寒涼者天之陰也辛甘淡者地之陽酸苦鹹者地之陰也陽主升而浮陰主沉而降辛主散其行也橫故能解表甘主緩其行也上故能補中苦主瀉其行也下故可去實酸主收其性也斂故可治泄淡主滲其性也利故可分清咸主軟其性也沉故可導滯用純氣者用其動而能行用純味者用其靜而能守有氣味兼用者和合之妙貴乎相成有君臣相配者宜否之機最嫌相左既曰合宜尤當知忌先避其害後用其利一味不投眾善俱棄故欲表散者須遠酸寒欲降下者勿兼升散陽旺者當知忌溫陽衰者沉寒毋犯上實者忌升下實者忌秘上虛者忌降下虛者忌泄諸動者再動即散諸靜者再靜即滅甘勿施於中滿苦勿施於假熱辛勿施於熱躁咸勿施於傷血酸木最能剋土脾氣虛者少設陽中還有陰象陰中復有陽訣使能燭此陰陽則藥理雖玄豈難透徹五味所入內經曰五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也
