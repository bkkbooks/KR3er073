body:
  text: 卷之四十謨集小兒則上總論一小兒之病古人謂之啞科以其言語不能通病情不易測故曰寧治十男子莫治一婦人寧治十婦人莫治一小兒此甚言小兒之難也然以余較之則三者之中又為小兒為最易何以見之蓋小兒之病非外感風寒則內傷飲食以至驚風吐瀉及寒熱疳癇之類不過數種且其臟氣清靈隨撥隨應但能確得其本而撮取之則一藥可愈非若男婦損傷積痼癡頑者之比余故謂其易也第人謂其難謂其難辨也余謂其易謂其易治也設或辨之不真則誠然難矣然辨之之法亦不過辨其表裡寒熱虛實六者洞然又何難治之有故凡外感者必有表證而無里證如發熱頭痛拘急無汗或因風搐搦之類是也內傷者止有里證而無表證如吐瀉腹痛脹滿驚疳積聚之類是也熱者必有熱證如熱渴躁煩祕結癰瘍之類是也寒者必有寒證如清冷吐瀉無熱無煩噁心喜熱者是也凡此四者即表裡寒熱之證極易辨也然於四者之中尤惟虛實二字最為緊要蓋有形色之虛實有聲音之虛實有脈息之虛實如體質強盛與柔弱者有異也形色紅赤與青白者有異也聲音雄壯與短怯者有異也脈息滑實與虛細者有異也故必內察其脈候外觀其形氣中審其病情參此數者而精察之又何虛實之難辨哉必其果有實邪果有火證則不得不為治標然治標之法宜精簡輕鋭適當其可及病則已毫毋犯其正氣斯為高手但見虛象便不可妄行攻擊任意消耗若見之不真不可謂姑去其邪諒亦無害不知小兒以柔嫩之體氣血未堅臟腑甚脆略受傷殘萎謝極易一劑之謬尚不能堪而況其甚乎矧以方生之氣不思培植而但知剝削近則為目下之害遠則遺終身之羸良可嘆也凡此者實求本之道誠幼科最要之肯綮雖言之若無奇異而何知者之茫然也故余於篇端首以為言然非有察察之見者固不足以語此此其所以不易也陰陽應象大論曰善診者察色按脈先別陰陽審清濁而知部分視喘息聽聲音而知所苦觀權衡規矩而知病所主按此論雖通言診法之要然尤於小兒為最切也初誕法二小兒初生飲食未開胃氣未動是誠清虛之腑此時開口調變極須得宜保嬰諸書皆云分娩之時口含血塊啼聲一出隨即咽下而毒伏於命門因致他日發為驚風發熱痘疹等證此説固似有理然嬰兒通體無非血氣所結而此亦血氣之餘何以毒遽如是即使咽之亦必從便而出何以獨留為害無足憑也惟是形體初成固當為之清除其法於未啼時用軟帛裹指挖去口中之血乃用後法並拭去口中穢惡以清臟腑此亦初誕之要法不可無也開口法凡小兒初誕宜以甘草細切少許用沸湯泡汁以淡為妙不宜太甜乃用軟帛蘸汁遍拭口中去其穢濁隨用胡桃肉去皮嚼極爛以稀絹或薄紗包如小棗內兒口中使吮其汁非獨和中且能養臟最佳法也若母氣素寒小兒清弱者只以淡薑湯拭口最能去胃寒通神明並可免吐瀉之患此法最妙人所未知也拭後仍用核桃法如前一法以牛黃半分同硃砂研勻蜜調如前與吮為佳極能闢痰邪去穢惡除熱安神然必母氣多熱小兒肥盛者可用清弱者不宜用一古法拭口多有用黃連者不知黃連大寒大苦而小兒以胃氣為主安得初生即可以苦劣之氣相犯致損胃氣則他日變嘔變瀉由此而起矣大非所宜一古法多用硃砂開口者按陳文中曰小兒初生便服硃砂輕粉白蜜黃連本欲下胎毒不知此皆傷脾敗陽之藥輕粉下痰損心硃砂下涎損神兒實者服之軟弱弱者服之易傷反致變生諸病是固不可不察也護養法三出保嬰撮要巢氏曰小兒初生肌膚未實宜用舊絮護其背不可太暖更宜數見風日則血氣剛強肌肉緻密若藏於重幃密室或厚衣過暖則筋骨軟脆不任風寒多易致病衣服當隨寒熱加減但令背暖為佳亦勿令出汗恐表虛風邪易傷乳哺亦不宜過飽陳氏所謂忍三分寒吃七分飽頻揉肚少洗澡要肚暖頭涼心胸涼皆至論也又須令乳母預慎六淫七情厚味炙爆則乳汁清寧兒不致疾否則陰陽偏勝血氣沸騰乳汁敗壞必生諸病若屢用藥餌則臟腑陰損多變敗證可不慎歟大抵保嬰之法未病則調和乳母既病則審治嬰兒亦必兼治其母為善小兒飲食有任意偏好者無不致病所謂爽口味多終作疾也極宜慎之嘗見王隱君曰余幼時酷嗜甘飴忽一日見飴中有蚯蚓伸頭而出自此不敢食飴至長始知長上為之此可為節戒之妙法初生兒看病法四初生兒以手捻其頭摸其頤頷不作聲者為無病總有病以手指探其口雖發聲而從容咂指者其病輕若即發聲不咂指而色或青紅兼紫者此落地受寒之甚也其病重須急辨其形色虛實而治之苦牙關緊閉不納乳或硬而不軟其病極重也此驚邪入足太陽經及足陽明經而然須急治之庶可平復一初生兒肥胖色嫩日覺好看者此其根本不堅甚非佳兆且亦最易感邪凡邪入腑者近在第二三日見之其證吐乳夜啼發哭腹鳴皆胎驚之證然猶淺而易治若邪之入臟者遠在六七日見之此臍風噤風撮口風之候其病深而難醫若大聲口噤舌大痰壅者不治蓋五六日間病傳心肺脾三經也此風氣甚盛而無所泄故形見於喉口於關聲音也其面額青紫黑色者不治爪甲青黑者不治臍青黑者亦不治凡父母肥者不可生肥兒父母瘦者亦不可生肥兒生而肥胖必當以藥斂之使其肥肉堅實面轉微黃之色則吉不然則凶生兒怯弱必須以藥扶助之若七日之內肌肉頓肥則必病矣過此以往漸肥者不足慮也治肥之法宜清痰濕解胎毒預防其風氣亦不可過用峻厲以傷脾氣又當看小兒元氣厚薄厚者十無一失薄者十無一生然其中有死者有不死者則以病之所生有真偽也凡怯弱者宜專培脾腎為主看小兒壽夭法五看小兒法以聽聲為先察色為次凡聲音清亮者生有回音者生澀者病散而無出聲者不壽忽然大聲而無病者須細看其身恐有瘡毒即須治之臍帶中無血者生臍帶銀白色者生短帶紫脹者於斷帶之後捻去紫血可保無虞額皮寬者壽卵縫通達黑色者壽初生下如水泡之狀者險面轉微黃之色者吉生下粉白花色者必主臍風而死生下皮寬肉瘦五六日頓肥者亦必有臍風之患生下皮肉不光者死泣不出聲者死泣而無淚者死舌如豬肝者死口角上有紫色如蝦鬚者死發粗長者生細軟不放者死陰物不起者死陰囊不收者死白者死赤者死無糞門者死臀肉不生者死股肉不生者不壽面無彩色者夭臍帶短大紫色者夭生下渾身銀白色者夭生下有齒者大凶致傷父母不然必傷自身生下來裹即撒尿者殺父母蕩家財在世一生勞苦脈法六凡小兒形體既具經脈已全所以初脫胞胎便有脈息可辨故通評虛實論曰乳子病熱脈懸小者手足溫則生寒則死乳子病風熱喘鳴肩息者脈實大也緩則生急則死此軒岐之診小兒未嘗不重在脈亦未嘗不兼證為言也自水鏡訣及全幼心鑑等書乃有三歲以上當察虎口寅卯辰風氣命三關之説其中之可取者惟曰脈從寅關起不至卯關者易治苦連卯關者難治若寅侵卯卯侵過辰者十不救一只此數語乃於危急之際亦可用辨吉凶至若紫為風紅為傷寒青為驚白為疳及青是四足驚赤是水驚黑是人驚黃是雷驚之類豈此一線之色果能辨悉如此最屬無稽烏足憑也即今幼科所尚無不以此為科套全不知脈而信口胡猜試問其心果亦有的確之見否茫然無虜而欲以人子為嘗試良可嘆也故凡診小兒既其言語不通尤當以脈為主而參以形色聲音則萬無一失矣然小兒之脈非比大人之多端但察其強弱緩急四者之脈是即小兒之肯綮蓋強弱可以見虛實緩急可以見邪正四者既明則無論諸證但隨其病以合其脈而參此四者之因則左右逢源所遇皆道矣再加以聲色之辨更自的確無疑又何遁情之有此最活最妙之心法也苦單以一脈鑿言一病則一病亦能兼諸脈其中真假疑似未免膠柱實有難於確據者然法不可廢最所當察故擇其得理者並附於左亦可以見其概錢仲陽曰小兒之脈氣不和則弦急傷食則沉緩虛驚則促急風則浮冷則沉細脈亂者不治薛氏曰凡看脈先定浮沉遲數陰陽冷熱沉遲為陰浮數為陽浮主風沉遲主虛冷實主有熱緊主癲癇洪主熱盛沉緩主虛瀉微遲有積有蟲遲澀主胃脘不和沉主乳食難化沉細主乳食停滯緊弦主腹中熱痛牢實主大便祕沉而數者骨中有熱弦長是肝膈有風緊數乃驚風為患四肢掣顫浮洪乃胃口有熱沉緊主腹痛有寒虛濡者有氣又主慢驚芤主大便利血聲音七聲由氣發氣實則聲壯氣虛則聲怯故欲察氣之虛實者莫先乎聲音如內經諸篇有曰言而微終日乃復言者此奪氣也有曰氣海有餘者氣滿胸中悗息面赤氣海不足則氣少不足以言有曰心氣虛則悲實則笑不休有曰手少陰虛則不能言有曰內奪而厥則為喑俳此腎虛也華元化曰陽候多語陰證無聲多語者易治無聲者難榮凡此皆聲音虛實之辨故彼聖人者聞聲知情無所不達此聲音之學所以不可忽也顏色八脈要精微論曰夫精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色精微象見矣其壽不久也玉版論要篇曰色夭面脫不治百日盡已色見上下左右各在其要上為逆下為從女子右為逆左為從男子左為逆右為從五色篇曰官五色奈何曰青黑為痛黃赤為熱白為寒是謂五官又曰以色言病之間甚奈何曰其色粗以明沉夭者為甚其色上行者病益甚其色下行如雲徹散者病方已經脈篇曰凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也凡察色之法大都青白者少熱氣病主陰邪黃赤者多熱氣病主陽盛青主風氣主肝邪主脾胃虛寒主心腹疼痛主暴驚傷心膽之氣主驚風當察兼色以分急慢白主氣虛甚則氣脫主無火主脾肺不足白兼青者主慢驚主大小腸泄瀉赤主火主痰熱主傷寒熱證主煩渴主急驚躁擾主閉桔主陽邪喘促主癰瘍痘疹黑屬水主陰寒主厥逆主痛極沉黑主危篤黃主積聚主痞塊主脾病主脹滿主脾疳黃兼白者主脾寒脾弱主氣虛神怯黃兼青者主脾虛泄瀉主慢脾風黃兼赤者主疳熱兩顴鮮紅或作或止者謂之面戴陽乃真陰虛弱此非陽證也不得以熱赤同論錢氏曰左頰為肝右頰為肺額上為心鼻上為脾下頦為腎隨證施治之藥餌之誤九小兒氣血未充而一生盛衰之基全在幼時此飲食之宜調而藥餌尤當慎也今舉世幼科既不知此大本又無的確明見而惟苟完目前故凡遇一病則無論虛實寒熱但用海底兜法而悉以散風消食清痰降火行滯利水之劑總不出二十餘味一套混用謬稱穩當何其誕也夫有是病而用是藥則病受之矣無是病而用是藥則元氣受之矣小兒元氣幾何能無陰受其損而變生不測耶此當今幼科之大病而醫之不可輕任者正以此也又見有愛子者因其清黃瘦弱每以為慮而詢之庸流則不云痰火必六食積動以肥兒丸保和丸之類使之常服不知肥兒丸以苦寒之品最敗元陽保和丸以消耗之物極損胃氣謂其肥兒也而適足以瘦兒謂其保和也而適足以違和耳即如抱龍丸之類亦不宜輕易屢用余嘗見一富翁之子每多痰氣或時驚叫凡遇疾作輒用此丸一投即愈彼時以為神丹如此者不啻十餘次及其長也則一無所知凝然一癡物而已豈非暗損元神所致那凡此克伐之劑所以最當慎用故必有真正火證疳熱乃宜肥兒丸及寒涼等劑真正貪積脹滿乃宜保和丸及消導等劑真正痰火喘急乃宜抱龍丸及化痰等劑即用此者亦不過中病即止非可過也若無此實邪可據而諸見出入之病則多由虧損元氣悉當加意培補方是保赤之主倘不知此而徒以肥兒保和等名乃欲藉為保障不知小兒之元氣無多病已傷之而醫復伐之其有不萎敗者鮮矣此外如大黃芒硝黑醜芫花大戟三稜篷術之類若作必不得已皆不可輕易投也小兒診治大法十凡小兒之病本不易察但其為病之源多有所因故凡臨證者必須察父母先天之氣而母氣為尤切如母多火者子必有火病母多寒者子必有寒病母之脾腎不足者子亦如之凡骨軟行遲齒遲語遲囟門開大疳熱脾泄之類多有由於母氣者雖父母之氣俱有所稟但母氣之應在近父氣之應在遠或以一強一弱而偏得一人之氣者是皆不可不察至若稍長而縱口縱欲或調攝失宜而自為病者此又當察其所由辨而治之如果先天不足而培以後天亦可致壽雖曰先天俱盛而或父母多欲或撫養失宜則病變百端雖強亦夭此中幾圓理微貴在知常知變也撮口臍風十一初生小兒撮口臍風者因胎中受熱或初生不慎為風寒所侵遂致聚唇撮口眼閉口噤啼聲如雅或聲不能出成舌上如粟或口吐白沫或喉痰潮響或氣息喘急甚者舌強面青腹脹青筋吊腸牽痛百日內病甚者多不治臍風者以斷臍之後為水濕風邪所侵因致腹脹臍腫四肢柔直啼不吮乳甚則發搐若臍邊青黑手拳口噤者是為內搐不可治凡治此之法痰盛者當先治痰火盛者當先清火若無火無痰者專當溫補脾胃凡斷臍不盈尺多患此者齒齦有泡如粟以綿裹指蘸溫水擦破口即開不用藥七日內患此有百無一生臍風果因浴拭外傷皮膚者用綿灰或枯礬末摻之即愈若因剪臍短少或因束縛不緊或因牽動風入臍中或因鐵器斷臍冷氣傳於脾絡以致前證者口內有小泡急掐破去其毒水以艾灸臍中亦有得生者治法多端無如灸法苦因乳母肝脾鬱怒或飲食生冷辛熱致兒為患者當治其母錢氏云撮口因浴後拭臍風邪所入而作用益黃散補之陳無擇云視其牙齦有泡擦破之口既開用真白殭蠶略烘為末蜜調塗口內保嬰集云小兒百日臍風馬於當作胎毒瀉足陽明之火用針挑破以桑樹白汁塗之田氏治噤風用天南星為末加片腦少許以指蘸薑汁擦於齦立開或用牛黃以竹瀝調服一字隨以豬乳滴於口中驚風十二驚風之要領有二一曰實證一曰虛證而盡之矣蓋急驚者陽證也實證也乃肝邪有餘而風生熱熱生痰痰熱客於心膈間則風火相搏故其形證急暴而痰火壯熱者是為急驚此當先治其標後治其本慢驚者陰證也虛證也此脾肺俱虛肝邪無制因而海脾生風無陽之證也故其形氣病氣俱不足者是為慢驚此當專顧脾腎以救元氣雖二者俱名驚風而虛實之有不同所以急慢之名亦異凡治此者不可不顧其名以思其義論驚風證治十三小兒驚風肝病也亦脾腎心肺病也蓋小兒之真陰未足柔不濟剛故肝邪易動肝邪動則木能生火火能生風風熱相搏則血虛血虛則筋急筋急則為掉眩反張搐搦強直之類皆肝木之本病也至其相移木邪侮土則脾病而為痰為吐瀉木盛金衰則肺病而為喘促為短氣木火上炎則心病而為驚叫為煩熱木火傷陰則腎病而為水涸為血燥為乾渴為汗不出為搐為痓此五臟驚風之大概也治此之法有要存焉蓋一日風二日火三日痰四日陽虛五日陰虛但能察此緩急則盡之矣所謂風者以其強直掉眩皆屬肝木風木同氣故云驚風而實作外感之證今人不明此義但為治風必須用散不知外來之風可散而血燥之風不可散也故凡如防風荊芥羌活獨活細辛乾葛柴胡紫蘇薄荷之類使果有外邪發熱無汗等證乃可暫用如無外邪則最所當忌此用散之不可不慎也所謂痰火者痰凝則氣閉火盛則陰虧此實邪之病本也若痰因火動則治火為先火以痰留則去痰為主火之甚者宜龍膽草山梔子黃連黃柏石膏大黃之屬火之微者宜黃芩知舟玄參石斛地骨皮木通天麻之屬痰之甚者宜牛黃膽星天竺黃南星半夏白芥子之屬痰之微者宜陳皮前胡海石貝母天花粉之屬此外如硃砂之色赤體重故能入心鎮驚內孕水銀故善透經絡墜痰降火雄黃之氣味雄悍故能破結開滯直達橫行冰片麝香乃開竅之要藥琥珀青黛亦清利之佐助而已又如殭蠶全蠍蟬蛻之屬皆云治風在殭蠶味鹹而辛大能開痰涎破結氣用佐痰藥善去肝脾之邪邪去則肝平是即治風之謂也全蠍生於東北色青屬木故善走厥陰加以鹽味鹹而降痰是亦同氣之屬故云治風較之殭蠶此其次矣蟬蛻性味俱薄不過取其清虛輕蛻之義非有實濟不足恃也凡驚風之實邪惟痰火為最而風則次之治實之法止於是矣然邪實者易制主敗者必危蓋陽虛則陰邪不散而元氣不復陰虛則營氣不行而精血何來所以驚風之重重在虛證不虛不重不竭不危此元精元氣相為並立有不容偏置者也故治虛之法當辨陰陽陽虛者宜燥宜剛陰虛者宜溫宜潤然善用陽者氣中自有水善用陰者水中自有氣造化相須之妙既有不可混又有不可離者如此設有謂此非小兒之藥此非驚風之藥者豈驚風之病不屬陰陽而小兒之體不由血氣乎若夫人者開口便可見心又烏足與論乾坤合一之道諸補之法具詳如下一驚風反張強直轉筋等病在經筋篇曰足少陰之筋病足下轉筋及所過而結者皆痛病在此者主癇瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰又曰經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸急驚風十四急驚之候壯熱痰壅竄視反張搐搦顫動於關緊急口中氣熱頰赤唇紅飲冷便結脈浮洪數此肝邪風熱陽盛陰虛證也治此之法當察緩急凡邪盛者不得不先治其標若痰甚喘急者宜抱龍丸琥珀散清膈煎梅花飲之類主之火盛而煩熱者宜涼驚丸抑青丸或黃連安神丸牛黃散及山梔黃連龍膽草之屬火盛燥熱而大便祕結者宜瀉表丸或以為湯煎服之或利驚丸亦可若外感風寒身熱為驚者當解其表宜抑肝散倍加柴胡或參蘇飲五積散星蘇散之類擇而用之若表邪未解而內亦熱者宜錢氏黃龍湯若驚氣漸退而以未清者宜安神鎮驚丸凡以上者皆急則治標之法但得痰火稍退即當調補血氣如後附薛氏之法或參用慢驚諸治以防虛敗此幼科最要之法前哲有云小兒易為虛實攻伐之藥中病即止不可過劑誠至言也大抵此證多屬肝膽脾腎陰虛血燥風火相搏而然苦不顧真陰過用祛風化痰之藥則脾益虛血益燥邪氣綿延必成慢驚矣此中陰虛之義皆人所不知當閲小兒補腎論始見其詳論載第二卷二五東垣曰急驚者風木旺也風木屬肝肝邪盛必傳克於脾欲治其肝當先實脾後瀉風木樓全善曰急驚屬木火土實木實則搐而有力及目上視動札頻睫土實則身熱面赤而不吐瀉偃睡合睛治法宜涼宜瀉而用涼驚利驚等丸亦有因驚而發者以致於關緊急壯熱等證此內有實熱外挾風邪當截風定搐若痰熱尚盛宜微下之痰熱既泄急宜調養胃氣搐定而痰熱少退即宜調補脾氣薛氏曰此肝經血虛火動生風蓋風生則陰血愈散陰火愈熾火動則肺金愈虧肝邪愈盛宜滋肝血養脾氣若屢服祛風化痰瀉火辛散之劑便宜認作脾虛血損急補脾土若風火相搏發熱抽搐目瞤筋攣痰盛者用四物鉤藤鉤以生肝血清肝火用四君子加當歸以補脾土生肺金若肝經血燥發熱驚搐目瞤筋攣痰盛者用六味丸以滋腎水四君子加芍藥以補脾土若肺金克肝木用地黃丸以益肝血加芍藥木香以平肺金若屢用驚藥而脾胃虛寒者須用六君子湯以補脾士丁香木香以培陽氣若脾土虛寒腎水反來侮土而致中寒腹痛吐瀉少食等證者用益黃散以補脾土而瀉水庶幾不致慢驚矣但治小兒當審察虛實凡證屬有餘者病氣也不足者元氣也故有餘當認為不足思患預防斯少失矣慢驚風十五慢驚之候多由吐瀉因致氣微神緩昏睡露睛痰鳴氣促驚跳搐搦或乍發乍靜或身涼身熱或肢體逆冷或眉唇青赤面色淡白但其脈遲緩或見細數此脾虛生風無陽證也小兒慢驚之病多因病後或以吐瀉或因誤用藥餌損傷脾胃所致然亦有小兒脾胃素弱或受風寒則不必病後及娛藥者亦有之總屬脾腎虛寒之證治慢驚之法但當速培元氣即有風痰之類皆作實邪不得妄行消散再傷陽氣則必致不救凡脾土微虛微瀉而內不寒者可平補之宜六神散四君子湯或五味異功散脾腎俱虛而臟平無寒者宜五福飲且陰血生於脾土又宜四君子加當歸棗仁脾氣陽虛微寒者宜溫胃飲理中湯五君子煎脾氣虛寒多痰者宜六君子湯或金水六君煎脾腎陰陽俱虛而寒者惟理陰煎為最妙脾腎虛寒之甚或吐瀉不止者宜附子理陰煎再甚者宜六味回陽飲或四味回陽飲量兒大小與之脾腎虛寒泄瀉不止者宜胃關煎薛氏曰保嬰集云急驚屢發屢用攻瀉則脾損陰消而變為慢驚者多矣當補脾養血佐以安心清肺制木之藥最為切當竊謂前證多因脾胃虧損肝木所勝外虛熱而內真寒也但用五味異功散加當歸佐以鉤藤飲以補脾土平肝木亦多得效如不應用六君加炮薑木香溫補脾土更不應急加附子以回陽若用逐風驅痰之藥反促其危也愚按附子溫中回陽為慢驚之聖藥也如元氣未脫用之無有不效氣脫甚者急宜炮用之保嬰撮要曰凡元氣虧損而至昏憒者急灸百會穴若待下痰不愈而後灸之則元氣脫散而不救矣此乃臟腑傳變已極總歸虛處惟脾受之無風可逐無驚可療因脾虛不能攝涎故津液妄泛而似痰者但當以溫補脾胃為主若不審其因泛用祛風化痰之劑則脾氣益傷陰血益損病邪益甚而危矣樓全善曰木虛則搐而無力火虛則身寒口中氣冷土虛則吐瀉睡而露睛治宜溫補脾胃用六君子湯五味異功散之類大驚卒恐十六小兒忽被大驚最傷心膽之氣口問篇曰大驚卒恐則氣血分離陰陽破散經絡厥絶脈道不通陰陽相逆經脈空虛血氣不次乃失其常此內經概言受驚之病有如此矧小兒血氣尢非大人之比若受大驚則其神氣失散潰亂不堪尚何實邪之有斯時也收復止氣猶恐不暇顧可復為清散耶即如硃砂琥珀之類不過取其鎮重之意亦作救本之法今幼科諸書皆以大驚之證例作急驚論治誤亦甚矣不知急驚慢驚一以風熱一以脾腎之虛皆不必由驚而得而此以驚恐致困者本心膽受傷神氣陡離之病所因不同所病亦異胡可以同日語也治大驚氣散之病當以收復神氣為主宜祕旨安神丸七福飲茯神湯團參散獨參湯之類加金銀等物煎服之驚啼十七小兒驚啼證本與驚風不同亦與大驚卒恐者有異蓋小兒肝氣未充膽氣最怯凡耳聞驟聲目視驟色雖非大驚卒恐亦能怖其神魂醒時受怖寐則驚惕或振動不寧或忽爾啼叫皆神怯不安之證總宜安神養氣為主如獨參湯團參散七福飲祕旨安神丸之類皆其所宜若微煩熱者宜生脈散熱甚者宜硃砂安神丸或導赤散驚哭多淚忽啼忽止者是驚惕啼叫無淚聲長不揚者是腹痛發搐十八搐抽搐也是即驚風之屬但暴而甚者謂之驚風微而緩者謂之發搐發搐不治則漸成驚風矣雖錢氏等書皆以時候之氣分五臟之證為論治然病變不測有難以時氣拘者是不若察見在之形證因臟腑之虛實隨宜施治者之為得也總之小兒之實證無他惟東方之實及中央之滯耳蓋東方木實則生火生風而為熱為驚中央土實則生濕生滯而為痰為積知斯二者則知所以治實矣若小兒之虛證則五臟皆有之如心虛則驚惕不安肺虛則氣促多汗脾虛則為嘔吐為暴泄為不食為痞滿倦臥為牙緊流涎為手足牽動肝虛則為筋急血燥為抽搐徑強為斜視目瞪腎虛則為二便不禁為津液枯稿為聲不出為戴眼為肢體厥逆為火不歸源知此五者則知所以治虛矣然此虛實之證固亦多有疑似者但以形色聲音脈息參而察之則無有不了然者諸治責之法當從急驚治虛之法當從慢驚及如後夜啼諸治法已盡其蘊當並察之總之諾言實者乃邪氣之實非元氣之實也故治此者切不可傷及元氣若病已久尤當專顧脾腎則根本完固諸無不愈矣錢仲陽曰驚癇發搐男左視無聲右視有聲女右視無聲左視有聲此相勝也蓋左為肝部右為肺部金木相勝故耳若握拳拇指在內女為順拇指在外男為順順則易治逆則難治薛氏曰寅卯辰時搐而發熱作渴飲冷便結屬肝膽經虛熱用柴芍參苓散作渴引飲自汗盜汗屬肝膽經血虛用地黃丸口吻流涎屬肝木克脾土用六君子湯巳午未時發搐若兼作渴飲水屬風火相搏以地黃丸補肝導赤散涼驚丸治心若作渴飲湯體倦不乳土虛而木王也用地黃丸以補腎六君五湯以補脾申酉戌時微搐而喘目微斜身似熱睡而露睛大便淡黃屬脾肺虛熱用異功散若手足逆冷或喘瀉不食屬脾肺虛寒用六君炮薑木香久病而元氣虛者用六君子六吠丸二藥主之亥子丑時微搐身熱目睛緊斜吐瀉不乳厥冷多睡屬寒水侮土用益黃散未應用六君薑桂傷風發搐口中氣熱呵欠手足動者名假搐用大青膏發散風邪傷風發搐口氣不熱肢體倦怠用異功散補脾土鉤藤飲清肝木若因風邪內郁發熱而變諸證者當理肺金清風邪若外邪既解而內證未除當理肺補脾若停食發搐嘔吐乳食者宜用消食丸若傷食後發搐身熱困睡嘔吐不思乳會者當先定搐後用白餅子下之若食既散而前證仍作或變他證者脾土傷而肝木乘之也用六君子加鉤藤鉤以健脾平肝若肺經虧損而致驚搐等證者當補脾肺以平肝心則驚搐自止矣如手足冷汗搐眉搐肚日夜不止名真搐當用人參湯川鳥全蠍等藥平其胃氣百日內發搐真者內生風二三次必死假者外生風雖頻發不死百日內搐亦有因乳母七情厚味所致者當兼治其母而以固胃為先不可徑治其兒也苦涎入心脾則不能言用涼心鎮驚下痰之藥逆搐者不治若吐瀉後變證者亦不治大凡發搐因風者則面青目赤因驚則叫呼搐搦因食則噯吐氣悶脾肺虛則生黏痰喉間作鋸聲此乃心火不能生脾土脾土不能生肺金以致肺不能主氣脾不能攝涎故涎氣泛上而喉中作聲耳若用祛風治痰之劑則氣散陰消而促其危矣夜啼十九小兒夜啼不安接保嬰等書云夜啼有二曰脾寒曰心熱也夜屬陰陰勝則脾臟之寒愈盛脾為至陰喜溫而惡寒寒則腹中作痛故曲腰而啼其候面青手腹俱冷不思乳食是也亦曰胎寒宜鉤藤飲寒甚者理中丸若曲腰啼叫哭而無淚者多系腹痛宜木香散或用溫胃飲加木香若脾腎寒甚而兼帶作痛者宜陳氏十二味異功散苦過用乳食停滯作痛邪實無虛而啼者宜保和丸和胃飲加減主之甚者宜消食丸若陰盛陽衰心氣不足至夜則神有不安而啼叫者宜四君子湯五味異功散或七福飲祕旨安神丸若面青手冷陽氣虛寒心神驚怯而啼者宜五君子煎或六味異功煎甚者宜七福飲加炮乾薑肉桂若兼泄瀉不乳脾腎虛弱也宜六神散甚者養中煎胃關煎若兼吐瀉少食脾胃虛寒也宜五君子煎溫胃飲或六味異功煎加炮木香若大便不化食少腹脹脾氣虛弱也宜五味異功散或五君子煎加木香若面色白黑睛少至夜分陰中陽虛而啼者此肝腎之不足也宜六味丸八味丸理陰煎若見燈見火愈啼者心熱也心屬火見火則煩熱內生兩陽相搏故仰身而啼其證面赤手腹俱暖口中氣熱是也火之微者宜生脈散導赤散火之甚者宜硃砂安神丸人參黃連散苦肝膽熱甚木火相搏者宜柴胡清肝散大都此證或因吐瀉內亡津液或稟賦腎陰不足不能滋養肝木或乳母恚怒肝火侮金當用六君子湯補脾土以生肺金地黃丸壯腎水以滋肝木若乳母鬱悶而致者用加味歸脾湯乳母暴怒者加味小柴胡湯乳母心肝熱搏者柴胡清肝散若因驚夜啼者宜從前驚啼論治發熱二十小兒發熱證其最要者有四一則外感發熱二則瘡毒發熱三則痘疹發熱四則疳積發熱凡此四者之外如飲食驚風陰虛變蒸之類雖亦有之然各有其説均當詳辨一發熱當辨虛實如實則面亦氣粗口燥唇瘡作渴喜冷飲水大小便難或掀衣露體煩啼暴叫聲洪脈強伸體而臥睡不露睛手足指熱皆為實證實以邪氣有餘或可散邪或宜清火虛則面色青白氣怯神倦恍惚軟弱口鼻微冷不喜寒涼飲湯安靜泄瀉多尿嘔惡驚惕上盛下泄抱腹喜按乍涼乍溫夜則虛汗臥則露睛屈體而臥手足指冷脈息緩弱皆為虛證虛以正氣不足最宜調補或兼解邪雖有發熱外證必不可妄用寒涼及任意消散克伐等劑外感發熱治法二十一凡小兒無故發熱多由外感風寒若寒邪在表未解者必有發熱頭痛成身痛無汗或鼻塞流涕畏寒拘急脈見緊數者是也凡暴感者極易解散一汗可愈但察其氣血平和別無實熱等證或但倦怠昏睡者則但以四柴胡飲或五柴胡飲為主酌兒大小而增減其劑此法先固其中次解其表庶元氣無傷而邪且易散最為穩當極妙之法有云小兒何虛乃堪此補及又有補住邪氣之説皆寸光昧理之談不可信也若胃氣微見虛寒者宜五君子煎加柴胡或以理陰煎加減用之最妙元氣頗強而能食者宜正柴胡飲兼內熱火盛而外邪未解者宜一柴胡飲或錢氏黃龍湯壯熱火盛往來寒熱者宜柴芩煎寒氣盛者宜二柴胡飲寒邪盛而中氣微虛者宜五積散傷寒見風身熱兼嗽而中氣不虛者宜柴陳煎若中氣不足而兼熱兼嗽者宜金水六君煎冬受寒邪至春夏而發熱者是為小兒正傷寒但取效稍遲然治法不能外此新按余之仲兒生於乙卯五月於本年初秋忽爾感寒發熱脈微緊然素知其臟氣屬陰不敢清解遂與芎蘇羌芷細辛生薑之屬冀散其寒一劑下咽不惟熱不退而反大瀉作連二日瀉不止而喘繼之愈瀉則愈喘斯時也將謂其寒氣盛耶何以用溫藥而反瀉將謂其火刑金耶豈以清瀉連日而尚堪寒涼將謂其表邪之未除耶則何以不利於疏散束手無策疑懼已甚且見其表裡俱劇大喘垂危又豈淺易之劑所能挽回因沉思良久漸有所得乃用人參二錢生薑五片煎汁半盞然未敢驟進恐再加喘必致不救因用茶匙挑與二三匙即懷之而旋走室中徐察其呼吸之進退然喘雖未減而亦不見其增甚乃又與三四匙少頃則覺其鼻息似乎少舒遂放膽與以半小鐘更覺有應自午及酉完此一劑適一醫至急呼曰誤矣誤矣焉有大喘如此而尚可用參者速宜以抱龍丸解之余諾之而不聽乃復以人參二錢五分如前煎湯自酉至子盡其劑劑完而氣息遂平齁齁大睡瀉亦止而熱亦退矣此所以知其然者觀其因瀉反喘豈非中虛設有實邪自當喘隨瀉減是可辨也向使誤聽彼醫易以清利中氣一脫即當置之死地必仍咎余之誤用參也孰是孰非何從辨哉余因紀此以見溫中散寒之功其妙有如此者外感發熱弗藥可愈二十二凡小兒偶然發熱者率由寒熱不調衣被單薄柔弱肌腠最易相感感則熱矣余之治此不必用藥但於其熟睡之頃夏以單被冬以綿被矇頭松蓋勿壅其鼻但以稍暖為度使其鼻息出入皆此暖氣少頃則微汗津津務令上下稍透則表裡通達而熱自退矣若冬月衣被寒涼汗不易出則輕摟著身赤體相貼而上覆其面則無有不汗出者此余近年養兒至妙之法百發百中者也若寒邪甚者兩三微汗之無有不愈然此法惟行於寅卯之際則汗易出而效尤速諸熱辨證二十三一小兒發熱若熱隨汗退者即外感證也其有取汗至再而熱不遏者必癰毒痘疹之候俟其形見當於本門求法治之若是瘡毒但當辨其陰證陽證陽證宜清火解毒陰證宜托裡助陽方治詳具外科若汗出熱不退別無癰腫而耳後紅筋燦然及眼如包淚或手指尖冷脈緊數者必是痘疹方治詳具痘疹門一小兒飲食內傷本無發熱之證蓋飲食傷臟則為脹為痛為吐為瀉本非肌表之病焉得發熱故調經論曰邪之生於陽者得之風雨寒暑生於陰者得之飲食居處陰陽喜怒此自不易之理也今人但見小兒發熱則多言傷食而妄行消導謬亦甚矣其或飲食內傷風寒外感表裡兼病而發熱者亦常有之然此當察其食之有停無停酌而治之亦非可混行消耗蓋恐內本無滯而妄加克伐則虧損中氣以致外邪難解則病必滋甚一小兒疳積發熱此誠飲食內傷所致然必成痞成疳陽明鬱積既久所以內外俱熱是非暴傷飲食者之比亦非肌表發熱者之比方治詳具疳積條一小兒有陰虛發熱之證及變蒸發熱之説凡陰虛發熱者此即小兒勞損證也亦名為童子勞此當於虛損門求法治之至若變蒸之説則辨在本條並當詳察錢仲陽曰潮熱者時間發熱過時即退來日依時而發此欲發驚也壯熱者常熱不已甚則發驚癇也風熱者身熱而口中氣熱乃風邪外感也溫熱者肢體微熱熱不已則發驚搐壯熱惡風寒為元氣不充表之虛熱也壯熱不惡風寒為外邪所客表之實熱也壯熱飲楊為津液短少里之虛熱也壯熱飲水為內火銷爍里之實熱也脈尺寸俱滿為重實尺寸俱弱為重虛脈洪大或緩而滑或數而鼓此熱盛拒陰雖形證似寒實非寒也熱而脈數按之不鼓此寒盛格陽雖形證似熱實非熱也發熱惡熱大渴不止煩躁肌熱不欲近衣其脈洪大按之無力或兼目痛鼻乾者此血虛發熱也當補其血如不能食而熱自汗出者氣虛也當補其氣內熱證二十四內熱與外熱不同內熱以五內之火熱由內生病在陰分故內熱者宜清涼不宜升散升散則內火愈熾火空則發也外熱以膚腠之邪風寒外襲病在陽分故外熱者宜解散不宜清降清降則表熱愈留外內合邪也此外熱內熱之治其不同者有如此欲分內外之辨則外熱者其至必驟內熱者其來必綏但察其絶無表證而熱在臟腑七竅三焦二陰筋骨肌肉之間者皆是內熱之證但內熱之證亦有虛實實者宜從正治虛者當從反治反正之間有冰炭之異非可混也凡實熱之在內者古法治分五臟宜從正治心熱者宜瀉心湯導赤散安神丸肝熱者瀉青丸柴胡飲子龍膽湯脾熱者瀉黃散肺熱者輕則瀉白散地骨皮散重則涼膈散腎熱者滋腎丸滋陰八味丸實熱則宜疏下虛熱則宜調補肢體熱輕則惺惺散重則人參羌活散大便祕者二黃犀角散四順清涼飲餘熱不退者地骨皮散大小便血者保陰煎血熱妄行者清化飲三焦火盛上下熱甚者抽薪飲小水熱痛者大分清飲陽明內熱煩渴頭痛二便祕結者玉泉散陽明火盛兼少陰水虧者玉女煎凡元氣虛而為熱者必真陰不足皆假熱證也宜從反治心脾肺氣虛假熱者五君子煎人參理中湯五臟氣血俱虛假熱者五福飲肝腎真陰不足假熱者輕則六味地黃湯甚則理陰煎肝腎血虛假熱者大營煎五物煎肝腎陰虛上熱下寒則陽無所附而格陽為熱者六味回陽飲或八味地黃湯肝經血虛生風而熱者四物加天麻鉤藤鉤汗後血虛而熱甚者六神散加粳米汗後氣虛而惡寒發熱者補中益氣湯汗後陰虛陽無所附而熱者四物湯加參耆汗後陽虛陰無所附而熱者四君子加芎歸久從溫補而潮熱不退脈見滑大者五福飲加地骨皮或加知母凡嬰兒諸熱有因別證而作者當從所重者而治之若乳下嬰兒當兼治其母以調之小兒上論列方二十五四君子湯補一五君子煎新熱六五味異功散補四六君子湯補五團參散小十六味異功煎新熱七四物湯補八五物煎新因三金水六君煎新和一五福飲新補六理中湯熱一人參理中湯熱一七福飲新補七溫胃飲新熱五四味回陽飲新熱一胃關煎新熱九理陰煎新熱二六味回陽飲新熱二獨參湯補三五生脈散補五六六味地黃丸補百二十養中煎新熱四茯神湯小六十八味地黃丸補一二一大營煎新補十四滋腎丸寒一六三滋陰八味丸新寒十七保陰煎新寒一清化飲新因十三補中益氣湯補三十益黃散和十九六神散小五一加味歸脾湯補三三小柴胡湯散十九柴胡飲子小三十柴胡清肝散寒五九一柴胡飲新散一二柴胡飲新散二人參黃連散小十七四柴胡飲新散四五柴胡飲新散五二黃犀角散小二九正柴胡飲新散六柴芩煎新散十錢氏黃龍湯小二五柴陳煎新散九五積散散三九四順清涼飲攻二五星蘇散小二四參蘇飲散三四硃砂安神丸寒一四二惺惺散小二三鉤藤飲小六六黃連安神丸寒一四二瀉白散寒四二瀉黃散寒五七祕旨安神丸小七一瀉心湯寒二七抑肝散小六七安神鎮驚丸小七六瀉青丸寒一五一抑青丸小九八東垣涼膈散痘八三抽薪飲新寒三龍膽湯小八二大分清飲新寒五玉泉散新寒十五玉女煎新寒十二地骨皮散小三一導赤散寒一二二大青膏小六八消食丸小三七清膈煎新寒九和胃飲新和五利驚丸小九七涼驚丸小九六抱龍丸小八五琥珀散小八一牛黃散小二七備用方梅花飲小八三白餅子小三九肥兒丸小百十一保和丸小三五木香散痘二一陳氏十二味異功散痘二二人參羌活散小二六具列小兒方中所當詳閲
