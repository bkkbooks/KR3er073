body:
  text: 卷之四十九大集本草正下水石草部石斛百四一此藥有二種力皆微薄圓細而肉實者味微甘而淡其力尤薄本草云圓細者為上且謂其益精強陰壯筋補虛健腳膝驅冷痹卻驚悸定心志但此物性味最薄焉能滋補如此惟是扁大而鬆形如釵股者頗有苦味用除脾胃之火去𩞄雜善飢及營中蘊熱其性輕清和緩有從容分解之妙故能退火養陰除煩清肺下氣亦止消渴熱汗而諸家謂其厚腸胃健陽道暖水臟豈苦涼之性味所能也不可不辨菖蒲百四二味辛微苦性溫散風寒濕痹除煩悶咳逆上氣止心腹痛霍亂轉筋癲癇客忤開心氣胃氣行滯氣通九竅益心智明耳目去頭風淚下出聲音溫腸胃暖丈夫水臟婦人血海禁止小便辟邪逐鬼及中惡卒死殺蟲療惡瘡瘙疥欲散癰毒宜搗汁服用渣貼之若治耳痛宜作末炒熱絹裹罯之亦解巴豆大戟等毒蒲黃百四三味微甘性微寒解心腹膀胱煩熱疼痛利小便善止典涼血活血消瘀血治吐血衄血痢血尿血通婦人經脈止崩中帶下月經不調妊婦胎漏墜胎血運血症兒枕氣痛及跌撲血悶療瘡瘍消舌腫排膿消毒亦下乳汁亦止泄精凡欲利者宜生用欲固者宜炒熟用澤瀉百四四味甘淡微咸氣微寒氣味頗厚沉而降陰也陰中微陽入足太陽少陽其功長於滲水去濕故能行痰飲止嘔吐瀉痢通淋瀝白濁大利小便瀉伏火收陰汗止尿血療難產疝痛腳氣腫脹引藥下行經云除濕止渴聖藥通淋利水仙丹第其性降而利善耗真陰久服能損目痿陽若濕熱壅閉而目不明者此以去濕故亦能明目海藻百四五反甘草海帶昆布性用略同味若咸性微寒陰也降也善降氣清熱消膈中痰壅故善消頸項癭瘤結核及癰腫症積利小便逐水氣治濕熱氣急腹中上下雷鳴療偏墜疝氣疼痛消奔豚水氣浮腫及百邪鬼魅熱毒骨碎補百四六味微苦性溫平乃足少陰厥陰肝腎藥也能活血止血補折傷療骨中斜毒風熱疼痛及痢後下虛或遠行或房勞或外感風濕以致兩足痿弱疼痛俱宜以四斤丸補陰藥之類佐而用之成炒熟研末用豬腰夾煨空心食之能治耳鳴及腎虛久痢牙疼竹木部竹瀝百四七味甘性微涼陰也降也治暴中風痰失音不語胸中煩熱止煩悶消渴丹溪曰凡風痰虛痰在胸膈使人癲狂及痰在經絡四肢皮裡膜外者非此不達不行淡竹葉百四八味甘淡氣平微涼陰中微陽氣味俱輕清上氣咳逆喘促消痰涎解熱狂退虛熱煩躁不眠壯熱頭痛止吐血專涼心經亦清脾氣卻風熱止煩渴生津液利小水解喉痹並小兒風熱驚癇淡竹茹百四九味甘微涼治肺痿唾痰唾血吐血衄血尿血胃熱嘔噦噎膈婦人血熱崩淋胎動及小兒風熱癲癇痰氣喘咳小水熱澀天竹黃百五十味甘辛性涼降也陰中有陽善開風痰降熱痰治中風失音痰滯胸膈煩悶癲癇清心火鎮心氣醒脾疏肝明眼目安驚悸療小兒風痰急驚客忤其性和緩最所宜用亦治金瘡並內熱藥毒官桂百五一味辛甘氣大熱陽中之陽也有小毒必取其味甘者乃可用桂性熱善於助陽而尤入血分四肢有寒疾者非此不能達桂枝氣輕故能走表以其善調營衛故能治傷寒發邪汗療傷風止陰汗肉桂味重故能溫補命門堅筋骨通血脈治心腹寒氣頭疼咳嗽鼻齆霍亂轉筋腰足臍腹疼痛一切沉寒痼冷之病且桂為木中之王故善平肝木之陰邪而不知善助肝膽之陽氣惟其味甘故最補脾士凡肝邪剋土而無火者用此極妙與參附地黃同用最降虛火及治下焦元陽虧乏與當歸川芎同用最治婦人產後血瘀兒枕腹痛及小兒痘疹虛寒作癢不起雖善墮胎動血用須防此二證若下焦虛寒法當引火歸元者則此為要藥不可誤執丁香百五二味大辛氣溫純陽入腎胃肺臟能發諸香辟惡去邪溫中快氣治上焦呃逆翻胃霍亂嘔吐解酒毒消痃癖奔豚陰寒心腹脹滿冷痛暖下焦腰膝寒疼壯陽道抑陰邪除胃寒瀉痢殺鬼疰蠱毒疳蝕諸蟲闢口氣堅齒牙及婦人七情五郁小兒吐瀉痘瘡胃寒灰白不發白檀香百五三味辛氣溫能散風熱闢穢惡邪氣消腫毒逐鬼魅煎服之可散冷氣止心腹疼痛定霍亂和胃氣開噎膈止嘔吐進飲食又治面生黑子每晚以熱水洗拭磨汁塗之甚良沉香百五四味辛氣微溫陽也可升可降其性暖故能抑陰助陽扶補相火其氣辛故能通天徹地條達諸氣除轉筋霍亂和噤口瀉痢調嘔逆胃翻喘急止心腹脹滿疼痛破症癖療寒痰和脾胃逐鬼疰惡氣及風濕骨節麻痹皮膚瘙癢結氣烏藥百五五氣味辛溫善行諸氣入脾胃肝腎三焦膀胱諸經療中惡鬼氣蠱毒開胸膈除一切冷氣止心腹疼痛喘急霍亂反胃脹滿溫腸胃行宿食止瀉痢除天行疫瘴氣厥頭痛膀胱腎氣攻衝心腹疝氣腳氣癰疽疥癩及婦人血氣小兒蟲積亦止小便頻數氣淋帶濁並貓犬百病俱可磨汁灌治之枸杞百五六味甘微辛氣溫可升可降味重而純故能補陰陰中有陽故能補氣所以滋陰而不致陰衰助陽而能使陽旺雖諺云離家千里勿食枸杞不過謂其助陽耳似亦未必然也此物微助陽而無動性故用之以助熟地最妙其功則明耳目壯神魂添精固髓健骨強筋善補勞傷尤止消渴真陰虛而臍腹疼痛不止者多用神效地骨皮百五七枸杞根也南者苦味輕微有甘辛北者大苦性劣入藥惟南者為佳其性辛寒善入血分肝腎三焦膽經退陰虛血熱骨蒸有汗止吐血衄血解消渴療肺腎胞中陰虛伏火煎湯漱口止齒血凡不因風寒而熱在精髓陰分者最宜此物涼而不峻可理虛勞氣輕而辛故亦清肺假熱者勿用厚朴百五八味苦辛氣大溫氣味俱厚陽中之陰可升可降有小毒用此者用其溫降散滯制用薑汁炒治霍亂轉筋消痰下氣止咳嗽嘔逆吐酸殺腸臟諸蟲宿食不消去結水破宿血除寒濕瀉痢能暖脾胃善走冷氣總之逐實邪瀉膨脹散結聚治胸腹疼痛之要藥倘本元虛弱誤服脫人真氣孕婦忌用墮胎須知棗仁百五九味微甘氣平其色赤其肉味酸故名酸棗其仁居中故性主收斂而入心多眠者生用不眠者炒用寧心志止虛汗解渴去煩安神養血益肝補中收斂魂魄杜仲百六十味甘辛淡氣溫平氣味俱薄陽中有陰其功入腎用薑汁或鹽水潤透炒去絲補中強志壯腎添精腰痛殊功足疼立效除陰囊寒濕止小水夢遺因其氣溫故暖子宮因其性固故安胎氣內熱火盛者亦當緩用山茱萸百六一味酸澀主收斂氣平微溫陰中陽也入肝腎二臟能固陰補精暖腰膝壯陰氣澀帶濁節小便益髓興陽調經收血若脾氣大弱而畏酸者姑暫止之或和以甘草煨姜亦可蘇木百六二味微甘微辛性溫平可升可降乃三陰經血分藥也少用則和血活血多用則行血破血主婦人月經不調心腹作痛血癖氣壅凡產後血瘀脹悶勢危者宜用五兩水煮濃汁服之亦消癰腫死血排膿止痛及打撲瘀血可敷若治破傷風宜為末酒服立效川椒百六三味辛性熱有小毒本純陽之物其性下行陽中有陰也主溫中下氣開通腠理散肌表寒邪除臟腑冷痛去胸腹留飲停痰宿食解鬱結溫脾胃止咳逆嘔吐逐寒濕風痛療傷寒溫瘧水腫濕疸除齒痛暖腰膝收陰汗縮小便溫命門止泄瀉下痢遺精脫肛殺蛔蟲鬼疰蠱毒蛇蟲諸毒久服之能通神明實腠理和血脈堅齒牙生鬚髮明耳目調關節耐寒暑若中其毒惟冷水麻仁漿可以解之胡椒百六四味辛性大熱純陽也善走氣分溫中下氣暖腸胃消宿食闢臭惡除寒食寒痰寒飲吐水止反胃嘔吐霍亂虛寒脹滿心腹疼痛去冷積陰毒壯腎氣治大腸寒滑冷痢殺一切蟲魚鱉蕈諸藥食陰凝之毒若治風蟲牙痛須同萆茇為末熔蠟為細丸塞孔中即愈金櫻子百六五味澀性平生者色青酸澀熟者色黃甘澀當用其將熟微酸而甘澀者為妙其性固澀澀可固陰治脫甘可補中益氣故善理夢遺精滑及崩淋帶漏止吐血衄血生津液安魂魄收虛汗斂虛火益精髓壯筋骨補五臟養血氣平咳嗽定喘急療怔忡驚悸止脾泄血痢及小水不禁此固陰養陰之佳品而人之忽之亦久矣此後成宜珍之槐蕊百六六味苦性寒清心肺脾肝大腸之火除五內煩熱心腹熱疼療眼目赤痛熱淚炒香嚼咽治失音喉痹止吐血衄血腸風下血婦人崩中漏下及皮膚風熱涼大腸殺疳蟲治癰疽瘡毒陰瘡濕癢痔漏解楊梅惡瘡下疳伏毒大有神效柏子仁百六七味甘平性微涼能潤心肺養肝脾滋腎燥安神魂益志意故可定驚悸怔忡益陰氣美顏色療虛損益血止汗潤大腸利虛秘亦去百邪鬼魅小兒驚癇總之氣味清香性多潤滑雖滋陰養血之佳劑若欲培補根本乃非清品所長枳殼百六八即枳實之遲收而大者較之枳實其氣略散性亦稍緩功與枳實大類但枳實性重多主下行削堅而此之氣輕故多主上行破氣通利關節健脾開胃平肺氣止嘔逆反胃霍亂咳嗽消痰消食破心腹結氣癥瘕痃癖開胸脅脹滿痰滯逐水腫水濕瀉痢腸風痔漏肛門腫痛因此稍緩故可用之束胎安胎炙熱可熨痔腫虛者少用恐傷元氣枳實百六九味苦微酸微寒氣味俱厚陰中微陽其性沉急於枳殼除脹滿消宿食削堅積化稠痰破滯氣平咳喘逐瘀血停水解傷寒結胸去胃中濕熱佐白朮亦可健脾佐大黃大能椎蕩能損真元虛羸勿用蔓荊子百七十味苦辛氣清性溫升也陽也入足太陽陽明厥陰經主散風邪利七竅通關節去諸風頭痛腦鳴頭沉昏悶搜肝風止目睛內痛淚出明目堅齒療筋骨間寒熱濕痹拘攣亦去寸白蟲五加皮百七一味辛性溫除風濕行血脈壯筋骨明目下氣治骨節四肢拘攣兩腳痹痛風弱五緩陰痿囊濕疝氣腹痛小便遺瀝女人陰癢凡諸浸酒藥惟五加皮與酒相合大能益人且味美也仙家重此謂久服可以長生故曰寧得一把五加不用金銀滿車雖未必然然亦必有可貴者川楝子百七二味苦性寒有小毒陰也能治傷寒瘟疫煩熱狂躁利小水瀉肝火小腸膀胱濕熱諸疝氣疼痛殺三蟲疥癩亦消陰痔丸散湯藥任意可用甄權言其不入湯使則失之矣苦楝根味大苦殺諸蟲尤善逐蛔利大腸治遊風熱毒惡瘡苦酒和塗疥癬甚良女貞子百七三味苦性涼陰也降也能養陰氣平陰火解煩熱骨蒸止虛汗消渴及淋濁崩漏便血尿血陰瘡痔漏疼痛亦清肝火可以明目止淚桑白皮百七四味甘微辛微苦氣寒氣味俱薄升中有降陽中有陰入手太陰肺臟氣寒味辛故瀉肺火以其味甘故緩而不峻止喘嗽唾血亦解渴消痰除虛勞客熱頭痛水出高原故清肺亦能利水去寸白殺腹臟諸蟲研汁治小兒天吊驚癇客忤及敷鵝口瘡大效作線可縫金瘡既瀉肺實又云補氣則未必然黃柏百七五味苦微辛氣寒陰中微陽降也善降三焦之火制各以類但其性多沉尤專肝腎故曰足少陰本經足太陽厥陰之引經也清胃火嘔噦蛔蟲除伏火骨蒸煩熱去腸風熱痢下血逐二便邪火結淋上可解熱渴口瘡喉痹癰瘍下可去足膝濕熱疼痛痿蹶此其性寒潤降去火最速丹溪言其制伏龍火補腎強陰然龍火豈沉寒可除水枯豈苦劣可補陰虛水竭得降愈亡撲減元陽莫此為甚水未枯而火盛者用以抽薪則可水既竭而枯熱者用以補陰實難當局者慎勿認為補劑予嘗聞之丹溪曰火有二君火者人火也心火也可以濕伏可以水滅可以直折黃連之屬可以制之相火者天火也龍雷之火也陰火也不可以水濕折之當從其性而伏之惟黃柏之屬可以降之按此議論若有高見而實矯強之甚大是誤人夫所謂從其性者即內經從治之說也經曰正者正治從者反治正治者謂以水制火以寒治熱也從治者謂以火濟火以熱治熱也亦所謂甘溫除大熱也豈以黃連便是正治黃柏便是從治乎即曰黃連主心火黃柏主腎火然以便血溺血者俱宜黃連又豈非膀胱大腸下部藥乎治舌瘡口瘡者俱宜黃柏又豈非心脾上部藥乎總之黃連黃柏均以大苦大寒之性而曰黃連為水黃柏非水黃連為瀉黃柏為補豈理也哉若執此說誤人多矣誤人多矣梔子百七六味苦氣寒味厚氣薄氣浮味降陰中有陽因其氣浮故能清心肺之火解消渴除熱鬱療時疾躁煩心中懊憹熱悶不得眠熱厥頭疼耳目風熱赤腫疼痛霍亂轉筋因其味降故能瀉肝腎膀胱之火通五淋治大小腸熱秘熱結五種黃疸三焦鬱火臍下熱鬱疝氣吐血衄血血痢血淋小腹損傷瘀血若用佐使治有不同加茵陳除濕熱疸黃加豆豉除心火煩躁加厚撲枳實可除煩滿加生薑陳皮可除嘔噦同玄胡索破熱滯瘀血腹痛此外如面赤酒皶熱毒湯火瘡瘍腫痛皆所宜用仲景因其氣浮而苦極易動吐故用為吐藥以去上焦痰滯丹溪謂其解鬱熱行結氣其性屈曲下行大能降火從小便泄去人所不知郁李仁百七七味苦辛陰中有陽性潤而降故能下氣消食利水道消面目四肢大腹水氣浮腫開腸中結氣滯氣關隔燥澀大便不逸破血積食癖凡婦人小兒實熱結燥者皆可用訶子百七八味苦酸澀氣溫苦重酸輕性沉而降陰也能消宿食膨脹止嘔吐霍亂定喘止嗽破結氣安久痢止腸風便血降痰下氣開滯澀腸通達津液療女人崩中胎漏帶濁經亂不常若久痢肛門急痛或產婦陰痛者宜和蠟燒煙燻之或煎湯熏洗亦可若痰嗽咽喉不利宜含數枚咽津殊效其有上焦元氣虛陷者當避其苦降之性側柏百七九味苦氣辛性寒善清血涼血止吐血衄血痢血尿血崩中赤白去濕熱濕痹骨節疼痛搗爛可敷火丹散痄腮腫痛熱毒及湯火傷止痛滅瘢炙搗可罯凍瘡燒汁塗發可潤而使黑辛夷百八十一名木筆一名迎春氣味辛溫乃手太陰足陽明之藥能解寒熱憎寒體噤散風熱利九竅除頭風腦痛眩冒瘙癢療面腫引齒疼痛若治鼻塞涕出鼻淵鼻鼽鼻瘡及痘後鼻瘡並宜為末入麝香少許以蔥白蘸藥點人數次甚良皂角百八一氣味辛鹹性溫有小毒善逐風痰利九竅通關節治頭風殺諸蟲精物消穀導痰除咳嗽心腹氣結疼痛脹滿開中風口噤治咽喉痹塞腫痛行肺滯通大腸秘結墮胎破堅症消腫毒及風癬疥癩燒煙燻脫肛腫痛可為丸散不入湯藥巴豆百八二味辛性熱有大毒可升可降善開關竅破症堅積聚逐痰飲殺諸惡毒蟲毒蠱毒通秘結消宿食攻臟腑停寒生冷壅滯心腹疼痛瀉痢驚癇諸水氣症氣下活胎死胎逐瘀血血積及消癰瘍疔毒惡瘡去瘜肉惡肉腐肉排膿消腫喉痹牙疼諸證然其性剛氣烈無處不到故稱為斬關奪門之將若誤用之則有推牆倒壁之虞若善用之則有戡亂調中之妙用者所當慎察密蒙花百八三味甘平性微寒入肝經潤肝燥專理目疾療青盲去赤腫多浪消目中赤脈膚翳羞明畏日及小兒瘡痘疳氣攻目風熱麋爛雲翳遮睛制用之法宜蜜酒拌蒸三次日乾用雷丸百八四味苦性寒有小毒殺三蟲逐蠱毒諸毒降胃中實熱痰火癲狂除百邪惡氣並一應血積氣聚大楓子百八五味辛性熱有毒能治風癬疥癩攻毒殺蟲亦療楊梅諸瘡蕪荑百八六味辛平性溫主心腹冷氣症積疼痛散肌膚風濕淫淫如蟲行殺三蟲去寸白及諸惡蟲毒療腸風痔漏惡瘡和豬脂搗塗熱瘡和蜜可治濕癬茯苓百八七味甘淡氣平性降而滲陽中陰也有赤白之分雖本草言赤瀉丙丁白入壬癸然總不失為泄物故能利竅去濕利竅則開心益智導濁生津去濕則逐水燥脾補中健胃祛驚癇厚腸臟治痰之本助藥之降以其味有微甘故曰補陽但補少利多故多服最能損目久弱極不相宜若以人乳拌曬乳粉既多補陰亦妙茯神百八八附根而生近故能入心經通心氣補健忘止恍惚驚悸雖本草所言如此然總不外於滲降之物與茯苓無甚相遠也豬苓百八九味微苦甘氣平陽牛陰也性善降滲入膀胱腎經通淋消水腫除濕利小便因其苦故能泄滯因其淡故能利竅亦解傷寒濕熱腳氣白濁亦治妊娠子淋胎腫桑寄生百九十味苦性涼主女子血熱崩中胎漏固血安胎及產後血熱諸疾去風熱濕痹腰膝疼痛長鬚眉堅發齒涼小兒熱毒癰疳瘡癩琥珀百九一味甘淡性平安五臟清心肺定魂魄鎮癲癇殺邪鬼精魅消瘀血痰涎解蠱毒破癥結通五淋利小便明目磨翳止血生肌亦合金瘡傷損松香百九二味苦辛溫治癰疽惡瘡頭瘍白痜風濕疥癬酒煮糊丸可治歷節風痛亦治婦人崩帶煎膏則活血生肌排膿止痛塞牙孔殺蟲敷刺入肉中自出加銅末研摻大治金瘡折傷乳香百九三味苦辛性溫微熱辟邪惡諸氣治霍亂通血脈止大腸血痢疼痛及婦人氣逆血滯心腹作痛消癰疽諸毒托裡護心活血定痛舒筋脈療折傷煎膏止痛長肉沒藥百九四味苦氣平能破血散血消腫止痛療金瘡杖瘡諸惡瘡痔漏癰腫破宿血癥瘕及墮胎產後血氣作痛凡治金刃跌墜損傷筋骨心腹血瘀作痛者並宜研爛熱酒調服則推陳致新無不可愈阿魏百九五味苦辛性熱有毒其氣辛臭乃能闢奪臭氣逐瘟疫瘴瘧傳屍鬼氣惡氣療霍亂隔噎頹疝心腹疼痛殺諸小蟲牙蟲破癥積消癖塊除蠱毒及一切蕈菜牛羊魚肉諸毒或散或丸隨意可服樟腦百九六味辛微苦性熱善通關竅破滯氣闢中惡邪氣治疥癬殺蟲除蠹著鞋中去腳氣燒煙燻衣筐席簟除蚤蝨壁蝨北方新生小貓極多跳蚤用此拌麵研勻摻擦之則盡落無遺亦妙方也龍腦百九七即冰片味微甘大辛敷用者其涼如冰而氣雄力銳性本非熱陽中有陰也善散氣散血散火散滯通竅辟惡逐心腹邪氣療喉痹腦痛鼻瘜齒痛傷寒舌出小兒風痰邪熱急驚痘疔黑陷凡氣壅不能開達者咸宜佐使用之亦通耳竅散目熱去目中赤膚翳障逐三蟲消五痔療一切惡瘡聚毒下疳痔漏疼痛亦治婦人氣逆難產研末少許新汲水服之則下以熱酒服之則能殺人凡用此者宜少而暫多則走散真氣大能損人血竭百九八味甘鹹微澀性平善破積血止痛生肌療金瘡折傷打損血瘀疼痛內傷血逆婦人血氣凝滯亦能生血補虛俱可為末酒服並治一切惡瘡癬疥久不合口然性能引膿不宜多用蘆薈百九九味大苦性大寒氣味俱厚能升能降除風熱煩悶清肺胃鬱火涼血清肝明目治小兒風熱急驚癲癇五疳熱毒殺三蟲及痔漏熱瘡軍用殺疳蛔吹鼻治腦疳鼻熱鼻癢鼻痔研末敷蟲牙同甘草敷濕癬殺蟲出黃水極妙乾漆二百味辛性溫有毒能療絕傷續筋骨殺三蟲去蛔蟲削年深堅結之積滯破日久凝聚之瘀血用須炒熟入藥不爾損人腸胃若外著其毒而生漆瘡者惟杉木湯紫蘇湯蟹湯浴之可解或用香油調鐵鏽塗之蘇合油二百一味甘辛性溫能辟邪惡諸氣殺鬼魅蠱毒蟲毒療癲癇溫瘧止氣逆疼痛亦通神明可除夢魘孩兒茶二百二味苦微澀性涼能降火生津清痰涎咳嗽治口瘡喉痹煩熱止消渴吐血衄血便血尿血濕熱痢血及婦人崩淋經血不止小兒疳熱口疳熱瘡濕爛諸瘡斂肌長肉亦殺諸蟲谷部麥芽二百三味甘微咸氣溫善於化食和中破冷氣消一切米麵諸果食積去心腹脹滿止霍亂除煩熱消痰飲破癥結寬腸下氣病久不食者可藉此穀氣以開胃元氣中虛者毋多用此以消腎亦善催生落胎單服二兩能消乳腫其耗散血氣如此而脾胃虛弱飲食不消方中每多用之何也故婦有胎妊者不宜多服神面二百四味甘氣平炒黃入藥善助中焦土臟健脾暖胃消食下氣化滯調中逐痰積破癥瘕運化水穀除霍亂脹滿嘔吐其氣腐故能除濕熱其性澀故又止瀉痢療女人胎動因滯治小兒腹堅因積若婦人產後欲回乳者炒研酒服二錢日二即止甚驗若閃挫腰痛者淬酒溫服最良白扁豆二百五味甘氣溫炒香用之補脾胃氣虛和嘔吐霍亂解河豚酒毒止瀉痢溫中亦能清暑治消渴欲用輕清緩補者此為最當薏仁二百六味甘淡氣微涼性微降而滲故能去濕利水以其去濕故能利關節除腳氣治痿弱拘攣濕痹消水腫疼痛利小便熱淋亦殺蛔蟲以其微降故亦治咳嗽唾膿利膈開胃以其性涼故能清熱止煩渴上氣但其功力甚緩用為佐使宜倍綠豆二百七味甘性涼能清火清痰下氣解煩熱止消渴安精神補五臟陰氣去胃火吐逆及吐血衄血尿血便血濕熱瀉痢腫脹利小水療丹毒風疹皮膚燥澀大便秘結消癰腫痘毒湯火傷痛解酒毒鴆毒諸藥食牛馬金石毒尤解砒霜大毒或用囊作枕大能明耳目並治頭風頭痛粟殼二百八味微甘性多澀泡去筋膜醋拌炒用甚固大腸久痢滑瀉必用須加甘補同煎久虛咳嗽劫藥欲用須辨虛實脫肛遺精懼所當用濕熱下痢乃非所宜麻仁二百九即黃麻也亦名大麻味甘平性滑利能潤心肺滋五臟利大腸風熱結燥行水氣通小便濕熱秘澀五淋去積血下氣除風濕頑痹關節血燥拘攣止消渴通乳汁產難催生經脈阻滯凡病多燥澀者宜之若下元不固及便溏陽痿精滑多帶者皆所忌用果部艾實二百十味甘氣平入脾腎兩臟能健脾養陰止湯治腰膝疼痛強志益神聰明耳目補腎固精治小便不禁遺精白濁帶下延年耐老或散丸或煮食皆妙但其性緩難收奇效杏仁二一一味苦辛微甘味厚於氣降中有升有毒入肺胃大腸經其味辛故能入肺潤肺散風寒止頭痛退寒熱咳嗽上氣喘急發表解邪療溫病腳氣其味苦降性最疾觀其澄水極速可知故能定氣逆上衝消胸腹急滿脹痛解喉痹消痰下氣除驚癇煩熱通大腸氣閉乾結亦殺狗毒佐半夏生薑散風邪咳嗽佐麻黃髮汁逐傷寒表邪同門冬乳酥煎膏潤肺治咳嗽極妙同輕粉研勻油調敷廣瘡腫毒最佳尤殺諸蟲牙蟲及頭面䵟斑㾴皰元氣虛陷者勿用恐其沉降太泄桃仁二一二味苦辛微甘氣平陰中有陽入手足厥陰經去皮尖用善治瘀血血閉血結血燥通血隔破血症殺三蟲潤大便逐鬱滯止鬼疰血逆疼痛膨脹療跌撲損傷若血枯經閉者不可妄用木瓜二一三味酸氣溫用此者用其酸斂酸能走筋斂能固脫入脾肺肝腎四經亦善和胃得木味之正故尤專入肝益筋走血療腰膝無力腳氣引經所不可缺氣滯能和氣脫能固以能平胃故除嘔逆霍亂轉筋降痰去濕行水以其酸收故可斂肺禁痢止煩滿止渴陳皮二一四味苦辛性溫散氣實痰滯必用留白者微甘而性緩去白者用辛而性速瀉脾胃痰濁肺中滯氣消食開胃利水通便吞酸噯腐反胃𩞄雜𩚚逆脹滿堪除嘔吐噁心皆效通達上下解酒除蟲表裡俱宜癰疽亦用尤消婦人乳癰並解魚肉諸毒青皮二一五味苦辛微酸味厚沉也陰中之陽苦能去滯酸能入肝又入少陽三焦膽腑削堅癖除脅痛解鬱怒劫疝疏肝破滯氣寬胸消食老弱虛羸戒之勿用檳榔二一六味辛澀微苦微甘氣微溫味厚氣薄降中有升陰中陽也能消宿食解酒毒除痰癖宣壅滯溫中快氣治腹脹積聚心腹疼痛喘急通關節利九竅逐五膈奔豚膀胱諸氣殺三蟲除腳氣療諸瘧瘴癘濕邪本草言其治後重如馬奔此亦因其性溫行滯而然若氣虛下陷者乃非所宜又言其破氣極速較枳殼青皮尤甚若然則廣南之人朝夕笑噬而無傷又豈破氣極速者總之此物性溫而辛故能醒脾利氣味甘兼澀故能固脾壯氣是誠行中有留之劑觀鶴林玉露云飢能使之飽飽能使之飢醉能使之醒醒能使之醉於此四句詳之可得其性矣其服食之法小者氣烈俱以入藥廣中人惟能用其大而扁者以米泔水浸而待用每一枚切四片每服一片外用細石灰以水調如稀糊亦預製待用用時以蔞葉一片抹石灰一二分入檳榔一片裹而嚼服蓋濱榔得石灰則滑而不澀石灰蔞葉得檳榔則甘而不辣服後必身面俱暖微汗微醉而胸腹豁然善解吞酸消宿食闢嵐瘴化痰醒酒下氣健脾開胃潤腸殺蟲消脹固大便止瀉痢又服法如無蔞葉即以肉桂或大茴香或陳皮俱可代用少抹石灰夾而食之然此三味之功多在石灰蔞葉以其能燥脾溫胃也然必得檳榔為助其功始見此物理相成之妙若有不可意測者一大約此物與煙性略同但煙性峻勇用以散表逐寒則煙勝於此檳榔稍緩用以和中暖胃則此勝於煙二者皆壯氣辟邪之要藥故滇廣中人一日不可少也又習俗之異在廣西用老檳榔滇中人用清嫩檳榔廣東人多在連殼醃檳榔亦各得其宜耳烏梅二一七味酸澀性溫平下氣除煩熱止消渴吐逆反胃霍亂治虛勞骨蒸解酒毒斂肺癰肺痿咳嗽喘急消癰疽瘡毒喉痹乳蛾澀腸止冷熱瀉痢便血尿血崩淋帶濁遣精夢泄殺蟲伏蛔解蟲魚馬汗硫黃毒和紫蘇煎湯解傷寒時氣瘴瘧大能作汗取肉燒存性研末敷金瘡惡瘡去腐肉弩肉死肌一夜立盡亦奇方也山楂二一八味甘微酸氣平其性善於消滯用此者用其氣輕故不甚耗真氣善消宿食痰飲吞酸去瘀血疼痛行結滯驅膨脹潤腸胃去積塊亦祛頹疝仍可健脾小兒最宜亦發瘡疹婦人產後兒枕痛惡露不盡者煎汁入沙糖服之立效煮汁洗漆瘡亦佳腸滑者少用之甜瓜蒂二一九一名苦丁香味苦性寒有毒陰中有陽能升能降其升則吐善湧濕熱頑痰積飲去風熱頭痛癲癇喉痹頭目眩暈胸膈脹滿並諸惡毒在上焦者皆可除之其降則瀉善逐水濕痰飲消浮腫水膨殺蠱毒蟲毒凡積聚在下焦者皆能下之蓋其性峻而急不從上出即從下出也若治鼻中瘜肉不聞香臭當同麝香細辛為末以綿裹塞鼻中日一換之當漸消縮大腹皮二百二十味微辛性微溫主冷熱邪氣下一切逆氣滯氣攻衝心腹大腸消痰氣吞酸痞滿止霍亂逐水氣浮腫腳氣瘴瘧及婦人胎氣惡阻脹悶並宜加姜鹽同煎凡用時必須酒洗炒過恐其有鴆鳥毒也吳茱萸二二一味辛苦氣味俱厚升少降多有小毒能助陽健脾治胸膈停寒脹滿痞寒化滯消食除吞酸嘔逆霍亂心腹蓄冷中惡絞痛寒痰逆氣殺諸蟲鬼魅邪疰及下焦肝腎膀胱寒疝陰毒疼痛止痛瀉血痢厚腸胃去濕氣腸風痔漏腳氣水腫然其性苦善降若氣陷而元氣虛者當以甘補諸藥制而用之菜部山藥二二二味微甘而淡性微澀所以能健脾補虛澀精固腎治諸虛百損療五勞七傷第其氣輕性緩非堪專任故補脾肺必主參術補腎水必君茱地澀帶濁須破故同研固遺泄仗菟絲相濟諸凡固本丸藥亦宜搗末為糊總之性味柔弱但可用為佐使乾姜二二三味辛微苦性溫熱生者能散寒發汗熟者能溫中調脾善通神明去穢惡通四肢關竅開五臟六腑消痰下氣除轉筋霍亂逐風濕冷痹陰寒諸毒寒痞脹滿腰腹疼痛撲損瘀血夜多小便孫真人曰嘔家聖藥是生薑故凡脾寒嘔吐宜兼溫散者當以生薑煨熟用之若下元虛冷而為腹疼瀉痢專宜溫補者當以乾薑炒黃用之若產後虛熱虛火盛而唾血痢血者炒焦用之若炒至黑炭已失姜性矣其亦有用以止血者用其黑澀之性已耳若陰盛隔陽火不歸元及陽虛不能攝血而為吐血衄血下血者但宜炒熟留性用之最為止血之要藥若陰虛內熱多汗者皆忌用姜大茴香二二四味辛氣溫入心腎二臟氣味香甜能升能降最暖命門改善逐膀胱寒滯疝氣腰疼亦能溫胃止吐調中止痛除霍亂反胃齒牙口疾下氣解毒兼理寒濕腳氣調和諸饌逐臭生香小茴香二二五氣味略輕治亦同前但大茴性更暖而此則稍溫耳白芥子二二六味大辛氣溫善開滯消痰療咳嗽喘急反胃嘔吐風毒流注四肢疼痛尤能祛闢冷氣解肌發汗消痰癖瘧痞除脹滿極速因其味厚氣輕故開導雖速而不甚耗氣既能除脅肋皮膜之痰則他近處者不言可知善調五臟亦熨散惡氣若腫毒乳癖痰核初起研末用醋或水調敷甚效蘿蔔子二二七味大辛氣溫氣味俱厚降也善於破氣消痰定喘除脹利大小便有推牆倒壁之功研水攙薄飲之立吐風痰盡出胃有氣食停滯致成鼓脹者非此不除同醋研敷大消腫毒中氣不足切忌妄用蔥二二八味辛性溫善散風寒邪氣通關節開腠理主傷寒寒熱天行時疾頭痛筋骨痠疼行滯氣除霍亂轉筋奔豚腳氣陰邪寒毒陽氣脫陷心腹疼痛及蟲積氣積飲食毒百藥毒利大小便下痢下血小兒盤腸內釣婦人溺血通乳汁散乳癰消癰疽腫毒搗罨傷寒結胸及金瘡折傷血瘀血出疼痛不止塗猘犬亦制蚯蚓毒蒜二二九味辛性溫有小毒善理中溫胃行滯氣闢肥膩開胃進食消寒氣寒痰面積食積魚肉諸積邪痹膨脹宿滯不安殺溪毒水毒蠱毒蛇蟲毒搗爛可灸癰疽塗疔腫敷蛇蟲沙風毒甚良韭萊二百三十味辛甘微澀性溫善溫中安五臟和胃氣健脾氣除濁氣開胃進食祛心腹病冷痃癖隔噎滯氣止消渴瀉痢膿血腹中冷痛壯腎氣暖腰膝療泄精帶濁俱宜常煮食之大能益人若欲消胃脘瘀血作痛及中風痰盛失音上氣喘急或中飲食藥毒或暴見吐血衄血尿血打撲瘀血婦人經滯血逆上衝心腹或被狂犬蛇蟲惡毒勢在危急者俱宜搗生韭汁服之或從吐出或從內消皆得愈也或用煎湯熏產婦血暈亦可洗腸痔脫肛韭子二三一味辛性溫陰中陽也宜炒黃用之主夢泄遺精尿血暖腰膝壯陽道治鬼交補肝腎命門止小便頻數遺尿及婦人白淫白帶陰寒小腹疼痛百含二三二味微甘淡氣平功緩以其甘緩故能補益氣血潤肺除嗽定魄安心逐驚止悸緩時疫咳逆解乳癰喉痹兼治癰疽亦解蠱毒潤大小便消氣逆浮腫仲景用之以治百合證者蓋欲藉其平緩不峻以收失散之緩功耳虛勞之嗽用之頗宜蒲公英二三三即黃花地丁味微苦氣平獨莖一花者是莖有極者非入陽明太陰少陽厥陰經同忍冬煎汁少加酒服潰堅消腫散結核瘰癧最佳破滯氣解食毒出毒刺俱妙若婦人乳癰用水酒煮飲以渣封之立消金石部金箔二三四味辛平性寒生者有毒氣沉質重降也陰也能鎮心神降邪火墜痰涎療風熱上壅吐血衄血神魂飛蕩狂邪躁擾及小兒驚風癲癇痰滯心竅上氣咳喘安魂魄定心志凡邪盛於上宜降宜清者皆所當用若陽虛氣陷滑泄清寒音具當闢之水銀二三五性辛寒有大毒能利水道去熱毒同黑鉛結砂則鎮墜痰涎同硫黃結砂則療劫危疾極善墮胎殺諸蟲及疥癬癩瘡凡有蟲者皆宜之亦善走經絡透骨髓逐楊梅瘋毒其他內證不宜輕用頭瘡亦不可用恐入經洛必緩筋骨百藥不治也李時珍曰水銀乃至陰之精稟沉著之性得凡火煅煉則飛騰靈變得人氣熏蒸則入骨鑽筋絕陽蝕腦陰毒之物無似之者而大明言其無毒本經言其久服神仙甄權言其還丹元母抱朴子以為長生之藥六朝以下貪生者服食致成廢篤而喪厥軀不知若干人矣方士固不足道本草其可妄言哉水銀但不可服食爾而其治病之功不可掩也輕粉二三六味微辛性溫燥有大毒升也陽也治痰涎積聚消水腫鼓脹直達病所尤治瘰癧諸毒倉去腐肉生新肉殺瘡癬疥蟲及鼻上酒齄風瘡瘙癢然輕粉乃水銀加鹽礬升煉而成其以金火之性燥烈流走直達骨髓故善損齒牙雖善劫痰涎水濕瘡毒涎從齒縫而出邪得劫而暫開病亦隨愈然用不得法則金毒竄入經絡留而不出而傷筋敗骨以致筋攣骨痛癰瘡疳漏遂成廢痼其害無窮嘗見丹家升煉者若稍失固濟則雖以鐵石為鼎亦必爆裂而矧以人之臟腑血氣乎陳文中曰輕粉下痰而損心氣小兒不可輕用傷脾敗陽必變他證初生者尤宜慎之銅青二三七即銅綠此銅之精華惟醋製者良磠制者毒也味酸澀性收斂善治風眼爛弦流淚合金瘡止血明目去膚赤瘜肉治惡瘡口鼻疳瘡若治走馬牙疳宜同滑石杏仁等分為末擦之立愈硃砂二三八味微甘性寒有大毒通稟五行之氣其色屬火也其液屬水也其體屬土也其氣屬木也其入屬金也故能通五臟其入心可以安神而走血脈入肺可以降氣而走皮入脾可逐痰涎而走肌肉入肝可行血滯而走筋膜人腎可逐水邪而走骨髓或上或下無處不到故可以鎮心逐痰祛邪降火治驚癇殺蟲毒祛蠱毒鬼魅中惡及瘡瘍疥癬之屬但其體重性急善走善降變化莫測用治有餘乃其所長用補不足及長生久視之說則皆謬妄不可信也若同參耆歸術兼硃砂以治小兒亦可取效此必其虛中挾實者乃宜之否則不可概用銀硃二三九乃水銀同硫黃升煉而成味辛溫有毒破積滯劫痰涎善療瘡癬惡瘡殺蟲毒蚤蝨惟燒煙燻之或以棗肉拌煙擦之其功尤捷蠶砂二百四十味甘性溫主五臟百病養神志安魂魄通血脈明耳目調和五臟主上盛下虛痰涎壅盛頭旋吐逆霍亂反胃心腹冷痛升降陰陽既濟水火久服通神明殺精魅惡鬼小兒驚吐其效如神研末糯米糊為丸棗湯服最為鎮墜神丹也或以陰陽水送下尤妙按胡演丹藥秘訣云升靈砂法用新鍋安逍遙爐上以蜜揩鍋底文火下燒入硫黃二兩熔化投水銀半斤以鐵匙急攪作青砂頭如有焰起噴醋解之待汞不見星取出細研盛入水火鼎內鹽泥固儕下以自然火升之乾水十二盞為度取出如束針紋者成矣硫黃二四一味苦微酸性熱有毒療心腹冷積冷痛霍亂咳逆上氣及冷風頑痹寒熱腰腎久冷腳膝疼痛虛寒久痢滑泄壯陽道補命門不足陽氣暴絕婦人血結小兒慢驚尤善殺蟲除疥癬惡瘡老人風秘用宜煉服亦治陰證傷寒厥逆煩躁腹痛脈伏將危者以硫黃為末艾湯調服二三錢即可得睡汗出而愈雄黃二四二味苦甘辛性溫有毒消痰涎治癲癇嵐瘴瘧疾寒熱伏暑瀉痢酒癖頭風眩暈化瘀血殺精物鬼疰蠱毒邪氣中惡腹痛及蛇虺百蟲獸毒疥癩疳蟲䘌瘡去鼻中瘜肉癰疽腐肉並鼠屢廣瘡疽痔等毒欲逐毒蛇無如燒煙燻之其畏遺尤速自然銅二四三味辛平性涼能療折傷散瘀血續筋骨排膿止疼痛亦鎮心神安驚悸宜研細水飛用或以酒磨服然性多燥烈雖其接骨之功不可泯而絕無滋補之益故用不可多亦不可專任也黃丹二四四味辛微咸微澀性重而收大能燥濕故能鎮心安神墜痰降火治雇亂吐逆咳嗽吐血鎮驚癇癲狂客忤除熱下氣止瘧止痢禁小便解熱毒殺諸蟲毒治金瘡火瘡濕爛諸瘡血溢止痛生肌長肉收陰汗解狐臭亦去翳障明目白礬二四五味酸澀性涼有小毒所用有四其味酸苦可以湧泄故能吐下痰涎治癲癇黃疸其性收澀可固脫滑故能治崩淋帶下腸風下血脫肛陰挺斂金瘡止血燒枯用之能止牙縫出血闢狐腋氣收陰汗腳汗其性燥可治濕邪故能止瀉痢斂浮腫湯洗爛弦風眼其性毒大能解毒定痛故可療癰疽疔腫鼻齆瘜肉喉痹瘰癧惡瘡疥癬去腐肉生新肉及虎犬蛇蟲蠱毒或丸或散或生或枯皆有奇效石脂二四六味甘澀性溫平脂有五色而今之入藥者惟赤白二種乃手足陽明足厥陰少陰藥也其味甘而溫故能益氣調中其性澀而重故能收濕固下調中則可療虛煩驚悸止吐血衄血壯筋骨厚腸胃除水濕黃疸癰腫瘡毒排膿長肉止血生肌之類是也固下則可治夢泄遺精腸風瀉痢血崩帶濁固大腸收脫肛痔漏陰瘡之類是也又治產難胞衣不出東垣曰胞衣不出惟澀劑可以下之即此是也然脂有五種雖在本經言各隨五色補五臟又云白入氣分赤入血分第五脂之性味略同似亦不必強分者且其性黏如膏故用固爐鼎甚良爐甘石二四七味甘澀性溫能止血消腫毒生肌斂瘡口去目中翳膜赤腫收濕爛同龍腦點治目中一切諸病宜用片子爐甘其色瑩白經火煅而鬆膩味澀者為上制宜炭火煅紅童便淬七次研粉水飛過曬用若煅後堅硬不松不膩者不堪也蓬砂二四八味鹹微甘陰也降也消痰涎止咳嗽解喉痹生津液除上焦濕熱噎膈癥瘕瘀血退眼目腫痛翳障口齒諸病骨哽惡瘡或為散丸或噙化咽津俱可水粉二四九即官粉亦名胡粉味辛性寒有毒善殺蟲墮胎治癰疽瘡毒濕爛諸瘡下疳瘻潰不收亦治疥癬狐臭黑鬚發雖亦能墜痰消食然惟外證所宜而內傷諸病似亦不宜用之密陀僧二百五十味鹹平有小毒能鎮心神消痰涎治驚癇咳嗽嘔逆反胃瘧疾下痢止血殺蟲消積聚治諸瘡腫毒鼻齄面䵟汗斑金瘡五痔闢孤臭收陰汗腳氣石寶二五一味甘辛氣大寒氣味俱薄體重能沉氣輕能升陰中有陽欲其緩者煅用欲其速者生用用此者用其寒散清肅善祛肺胃三焦之火而尤為陽明經之要藥辛能出汗解肌最逐溫暑熱證而除頭痛甘能緩脾清氣極能生津止渴而卻熱煩邪火盛者不食胃火盛者多食皆其所長陽明實熱牙疼太陰火盛痰喘及陽狂熱結熱毒發斑發黃火載血上大吐大嘔大便熱秘等證皆當速用胃虛弱者忌服陰虛熱者禁嘗若誤用之則敗陽作瀉必反害人滑石二五二味微甘氣寒性沉滑降中有升入膀胱大腸經能清三焦表裡之火利六腑之澀結分水道逐凝血通九竅行津液止煩渴除積滯實大腸治瀉痢淋秘白濁療黃疸水腫腳氣吐血衄血金瘡出血諸濕爛瘡腫痛通乳亦佳墮胎亦捷青礞石二五三味微甘微咸其性下行降也陰也乃肝脾之藥此藥重墜制以硝石其性更利故能消宿食症積頑痰治驚癇咳嗽喘急寶鑑言礞石為治痰利驚之聖藥若吐痰在水上以石末摻之痰即隨水而下則其沉墜之性可知楊土瀛謂其功能利痰然性非胃家所好而王隱君謂痰為百病母不論虛實寒熱概用滾痰丸通治百病豈理也哉是以實痰堅積乃其所宜燃久病痰多者必因脾虛人但知滾痰丸可以治痰而不知虛痰服此則百無一生矣朴硝二五四味苦鹹辛氣寒陰也降也有毒其性峻速咸能軟堅推逐陳積化金石藥毒去六腑壅滯脹急大小便不通破瘀血堅症實痰卻濕熱疫痢傷寒脹閉熱狂消癰腫排膿凡屬各經實熱悉可瀉除孕婦忌用最易墮胎虛損誤吞傷生反掌玄明粉二五五味辛微甘性冷沉也陰也降心火祛胃熱消痰涎平傷寒實熱狂躁去胸膈臟腑宿滯癥瘕通大便秘結陰火疼痛亦消癰疽腫毒海石二五六味鹹性微寒陽中陰也善降火下氣消食消熱痰化老痰除癭瘤結核解熱渴熱淋止痰嗽喘急消積塊軟堅症利水濕疝氣亦消瘡腫花蕊石二五七此藥色如硫黃黃石中間有淡白點故名也李時珍曰此藥舊無氣味今嘗試其氣平其味澀而酸蓋厥陰經血分藥也其功專於止血能使血化為水酸以收之也若治金瘡出血則不必制但刮末敷之則合仍不作膿及治一切損傷失血又療婦人惡血血暈下死胎落胞衣去惡血血去而胎胞自落也凡入丸散須用罐固濟火煅過研細水飛用之代赭石二五八味微甘性涼而降血分藥也能下氣降痰清火除胸腹邪毒殺鬼物精氣止反胃吐血衄血血痹血痢血中邪熱大人小兒驚癇狂熱入臟腸風痔漏脫精遺尿及婦人赤白帶下難產胞衣不用月經不止俱可為散調服亦冶金瘡生肌長肉磠砂二五九味鹹苦大辛性大熱有毒善消惡肉腐肉生肌敷金瘡生肉去目翳弩肉除痣魘疣贅亦善殺蟲毒水調塗之或研末摻之立愈本草言其消瘀血宿食破結氣止反胃肉食飽脹暖子官大益陽事但此物性熱大毒能化五金八石人之臟腑豈能堪此故用以治外則可用以服食則不宜也若中其毒惟生綠豆研汁飲一二升乃可解之青鹽二百六十味鹹微甘性涼能降火消痰明目除目痛益腎氣除五臟癥結心腹積聚吐血尿血齒牙疼痛出血殺毒蟲除疥癬諸蟲及斑蝥莞青諸毒此鹽不經火煉而成其味稍甘雖性與大鹽略同而滋益之功則勝之石灰二六一味辛溫有毒能止水瀉血痢收白帶白淫可倍加茯苓為丸服之此外如散血定痛傅癰毒消結核瘦瘤惡瘡腐肉白癜䵟斑瘜肉收脫肛陰挺殺痔漏諸蟲止金瘡血出生肌長肉或為末可摻或用醋調敷俱妙能解酒酸亦解酒毒禽獸部雞血二六二味鹹性平主療痿痹中惡腹痛解丹毒蠱毒蟲毒鹽滷毒及小兒驚風便結亦能下乳俱宜以熱血服之若馬咬人傷宜以熱血浸之雞冠血治白癜風經絡風熱塗囟頰治口喎不正卒灌之治縊死欲絕及小兒卒驚客忤和酒服發痘最佳塗諸瘡癬蜈蚣蜘蛛馬齧等毒若有百蟲入耳宜用熱血滴之鴨血二六三味鹹微涼善解諸毒凡中金銀丹石砒霜鹽滷毒者俱宜服此解之若野葛毒殺人至死熱飲之入口即解若溺水死者灌之即活蚯蚓咬瘡塗之即愈虎骨二六四味微辛氣平主百邪惡氣殺鬼精心腹諸痛止驚悸壯筋骨治肢體毒風拘攣走注疼痛闢傷寒溫瘧及惡瘡鼠痿犬咬諸毒頭骨作枕辟惡夢魘魅置戶上闢鬼祟寇宗奭曰風從虎者風木也虎金也木受金制安得弗從故可治風病攣急走注風毒癲厥驚癇諸病李時珍曰虎骨通可用凡辟邪療驚癇頭風溫瘧瘡疽當用頭骨治手足諸風當用脛骨治腰背諸風當用脊骨亦各從其類也吳球曰虎之一身筋節氣力皆出前足故以脛骨為勝象牙二六五味甘氣涼能清心腎之火可療驚悸風狂骨蒸痰熱鬼精邪氣癰毒諸瘡並宜生屑入藥煮服若諸物鯁刺喉中宜磨水飲之竹木刺入肌肉宜刮牙屑和水敷之即出鹿角膠二六六味甘鹹氣溫大補虛羸益血氣填精髓壯筋骨長肌肉悅顏色延年益壽療吐血下血尿精尿血及婦人崩淋赤白帶濁血虛無子止痛安胎亦治折跌損傷瘡瘍腫毒善助陰中之陽最為補陰要藥雇茸二六七味甘鹹氣溫破開塗酥炙黃脆入藥益元氣填真陰扶衰羸瘦弱善助精血尤強筋骨堅齒牙益神志治耳聾目暗頭腦眩運補腰腎虛冷腳膝無力夜夢鬼交遺精滑泄小便頻數虛痢尿血及婦人崩中漏血赤白帶下道家云惟有斑龍頂上珠能補玉堂關下血者即此是也若得嫩而肥大如紫茄者較之鹿角膠其功力為倍倍犀角二六八味苦辛微甘氣寒氣味俱輕升也陽也其性靈通長於走散較諸角為甚藥用黑色功力在尖專人陽明清胃火亦施他臟涼心定神鎮驚瀉肝明目能解大熱散風毒陽毒瘟疫熱煩磨汁治吐血衄血下血及傷寒蓄血發狂發黃發斑譫語痘瘡稠密內熱黑陷或不結痂亦散瘡毒癰瘍膿血腫痛殺妖狐精魅鬼疰百毒蠱毒鉤吻鴆羽蛇毒闢溪瘴山嵐惡氣其性升而善散故治傷寒熱毒閉表煩熱昏悶而汗不得解者磨尖攙入藥中取汗速如響應仲景云如無犀角以升麻代之者正以此兩物俱入陽明功皆升散今人莫得其解每致疑詞是但知犀角之解心熱而不知犀角之能升散尤峻速於升麻也倘中氣虛弱脈細無神及痘瘡血虛真陰不足等證凡畏汗畏寒畏散者乃所當忌或必不得已宜兼補劑用之羚羊角二六九味鹹性寒羊本火畜而此則屬木善走少陽厥陰二經故能清肝定風行血行氣闢鬼疰邪毒安魂魄定驚狂祛魘寐療傷寒邪熱一切邪毒中惡毒風卒死昏不知人及婦人子癇強痙小兒驚悸煩悶痰火不清俱宜為末蜜水調服或燒脆研末酒調服之若治腫毒惡瘡磨水塗之亦可牛黃二百七十味苦辛性涼氣平有小毒忌常山入心肺肝經能清心退熱化痰涼驚通關竅開結滯治小兒驚癇客忤熱痰口噤大人癲狂痰壅中風發痙辟邪魅中惡天行疫疾安魂定魄清神志不寧聰耳目壅閉療痘瘡紫色痰盛躁狂亦能墮胎孕婦少用阿膠二七一味甘微辛氣平微溫氣味頗厚陽中有陰制用蛤粉妙珠入肺肝腎三經其氣溫故能扶勞傷益中氣其性降故能化痰清肺治肺癰肺痿咳唾膿血止嗽定喘其性養血故能止吐血衄血便血尿血腸風下痢及婦人崩中帶濁血淋經脈不調其味甘緩故能安胎固漏養血滋腎實腠理止虛汗托補癰疽腫毒用惟鬆脆氣清者為佳堅硬臭劣者不美熊膽二七二味苦性寒能退熱清心療時氣黃疸平肝明目去翳障殺蛔蟯牙蟲風痛及小兒熱疳熱痰驚癇瘛瘲疳䘌熱痢俱宜以竹瀝化兩豆粒許服之甚良亦治鼻瘡熱瘡痔漏腫痛以湯化塗之少加冰片尤效欲辨其真惟取一粟許置水面如線而下一道不散者是也且凡是諸膽皆能水面闢塵惟此尤速乃亦可辨麝香二七三味苦辛性溫能開諸竅通經絡透肌骨解酒毒吐風痰消積聚癥瘕散諸惡濁氣除心腹暴痛脹急殺鬼物邪氣魘寐臟腑蟲積蛇蟲毒蠱毒瘴毒沙蝨毒及婦人難產尤善墮胎用熱水研服一粒治小兒驚癇客忤鎮心安神療鼻塞不聞香臭目疾可去翳膜除一切惡瘡痔漏腫痛膿水腐肉面䵟斑疹凡氣滯為病者俱宜用之若鼠咬蟲咬成瘡但以麝香封之則愈欲辨真假但置些須於火炭上有油滾出而成焦黑炭者肉類也此即香之本體若燃火而化白灰者木類也是即假攙蟲魚部龍骨二七四味甘平性收澀其氣入肝腎故能安神志定魂魄鎮驚悸澀腸胃逐邪氣除夜夢鬼交吐血衄血遺精夢泄收虛汗止瀉痢縮小便禁腸風下血尿血虛滑脫肛女子崩淋帶濁失血漏胎小兒風熱驚癇亦療腸癰臟毒內疽陰蝕斂膿斂瘡生肌長肉澀可去脫即此屬也制須酒煮焙乾或用水飛過同黑豆蒸熟曬乾用之海螵蛸二七五即烏賊魚骨味鹹性微溫足厥陰少陰肝腎藥也咸走血故專治血病療婦人經枯血閉血崩血淋赤白帶濁血癥氣瘕吐血下血臍腹疼痛陰蝕瘡腫亦治痰瘧消癭氣及丈夫陰中腫痛益精固精令人有子小兒下痢膿血亦殺諸蟲俱可研末飲服尤治眼中熱淚磨翳去障並宜研末和蜜點之為末可敷小兒疳瘡痘瘡臭爛膿濕下疳等瘡跌打出血湯火諸瘡燒灰存性酒服治婦人陰戶嫁痛同雞子黃塗小兒童舌鵝口同蒲黃末敷舌腫出血如泉同槐花末吹鼻止衄血同麝香吹耳治聤耳耳聾烏賊魚善補益精氣尤治婦人血枯經閉牡蠣二七六味微咸微澀氣平用此者用其澀能固斂咸能軟堅專入少陰腎臟隨藥亦走諸經能解傷寒溫瘧寒熱往來消瘀血化老痰去煩熱止驚癇心脾氣痛解喉痹咳嗽疝瘕積塊痢下赤白澀腸止便禁鬼交遺瀝止滑精帶下及婦人崩中帶漏小兒風痰虛汗同熟地固精氣禁遺尿同麻黃根斂陰汗同杜仲止盜汗同白朮燥脾利濕同大黃善消癰腫同柴胡治脅下硬痛同天花茶消上焦癭瘤瘰癧結核穿山甲二七七味鹹平性微寒能通經絡達腠理除山嵐瘴氣瘧疾風痹強直疼痛療小兒五邪驚啼婦人鬼魅悲泣下乳汁消癰腫排膿血除瘡疥痔漏通竅殺蟲佐補藥行經善發痘瘡或炮焦投入煎劑或燒灰存性酒服方寸匕亦可用傅惡瘡青魚膽二七八味苦性寒其色青故入肝膽二經能消赤目腫痛點暗目可吐喉痹痰涎塗熱瘡惡瘡亦消魚骨之鯁白花蛇二七九即蘄蛇也味甘鹹性溫有毒諸蛇鼻俱向下惟此蛇鼻向上而龍頭虎口黑質白花脅有方勝紋二十四個口有四長牙尾上有一佛指甲者是用宜去頭尾各三寸以防其毒春秋酒浸三宿夏一宿冬五宿火炙去盡皮骨取肉焙乾密封藏之久亦不壞諸蛇之性皆竄而此蛇尤速故善於治風能透骨髓走臟腑徹肌膚無所不到療中風濕痹骨節疼痛手足拘攣不能行立暴風瘙癢破傷風大風癩癬及小兒驚風搐搦瘰癧楊梅風毒惡瘡俱為要藥凡服蛇酒藥者切忌見風珍珠二百八十味微甘微咸能鎮心明目去翳磨障塗面可除䵟斑令人潤澤好顏色亦除小兒驚熱安魂魄為末可敷痘疔痘毒龜板二八一味微甘微咸性微寒陰也能治痰瘧破症堅祛濕痹傷寒勞投骨中寒熱消五痔陰蝕諸瘡下甲能補陰血清陰火續筋骨退勞熱療腰腳痠痛去瘀血止血痢漏下赤白利產難消癰毒燒灰可敷小兒頭瘡難燥婦人陰瘡臁瘡亦治脫肛龜板膏功用亦同龜板而性味濃厚尤屬純陰能退孤陽陰虛勞熱陰火上炎吐血衄血肺熱咳喘消渴煩擾熱汗驚悸譫妄狂躁之要藥然性稟陰寒善消陽氣凡陽虛假熱及脾胃命門虛寒等證皆切忌之毋混用也若誤用久之則必致敗脾妨食之患殭蠶二八二味辛鹹性溫有小毒辛能散咸能降毒能攻毒輕浮而升陽中有陰故能散風痰去頭風消結核瘰癧闢痰瘧破症堅消散風熱喉痹危證尤治小兒風痰急驚客忤發痘瘡攻痘毒止夜啼殺三蟲婦人乳汁不通崩中帶下為末可敷丹毒疔腫拔根極效滅頭面䵟斑及諸瘡瘢痕金瘡痔瘻小兒疳蝕牙齦潰爛重舌木舌及大人風蟲牙痛皮膚風疹瘙癢蟾蜍二八三俗名癩蝦蟆眉間有兩囊遍身有顆磊其中俱有蟾酥行極遲緩不能跳躍亦不解鳴者是也此物受土氣之精上應月魄賦性靈異穴土食蟲能制蜈蚣入足陽明胃經消癖氣積聚破堅症腫脹治五疳八痢及小兒勞瘦疳熱殺疳蟲消癰腫鼠瘻陰疽惡瘡若治破傷風宜同花椒剁爛入酒煮熟飲之通身汗出即愈亦解猘犬毒燒灰油調敷有蟲諸惡頑瘡極效又治瘟毒發斑危劇者去腸生搗一二枚絞汁飲之無不即瘥或燒灰湯送亦良蟾酥味辛麻性熱有毒主治發背癰疽疔腫一切惡毒若治風蟲牙痛及齒縫出血以紙捻醮少許點齒縫中按之即止水蛭二八四味鹹苦性微寒有毒能逐惡血瘀血破血症積聚通經閉和水道墮胎咂赤白遊疹癰疽腫毒及折傷跌撲瘀血不散制用之法當取田間齧人腹中有血者佳須曬乾細銼以微火炒黃熟方可用或以冬收豬脂煎令焦黃用之亦可不爾入腹則活最能生子害人若受其害惟以田泥水或黃土水飲數升則必盡下蓋此物得土氣即隨土而走也或以牛羊熱血二一升同豬脂飲之亦下也鱉甲二八五味鹹氣平此肝脾腎血分藥也能消癥瘕堅積療溫瘧除骨節間血虛勞熱婦人血症惡血漏下五色經脈不通治產難能墮胎及產後寒熱陰脫小兒驚癇斑痘煩喘亦消瘡腫腸癰撲損瘀血斂潰毒去陰蝕痔漏惡肉然須取活鱉大者去肉用醋煮乾炙燥用之若諸煮熟肋骨露出者不堪用蜈蚣二八六一名即蛆赤足者良味辛溫有毒能啖諸蛇殺諸蛇蟲魚鬼疰諸毒去三蟲攻瘰癧便毒痔瘻丹毒亦療小兒驚風臍風丹毒禿瘡然此蟲性毒故能攻毒不宜輕用若入藥餌須去頭足以火炙熟用之蟬蛻二八七味微甘微咸性微涼此物飲風吸露氣極清虛故能療風熱之證亦善脫化故可療痘瘡壅滯起發不快凡小兒驚癇壯熱煩渴天吊口噤驚哭夜啼及風熱目昏翳障疔腫瘡毒風疹癢痛破傷風之類俱宜以水煎服或為末以井花水調服一錢可治喑啞之病斑蝥二八八味辛性熱有大毒能攻鼠瘻瘰癧瘡疽破血積疝瘕墮胎元解疔毒猘犬毒沙蝨蠱母輕粉毒亦傅惡瘡去死肌敗肉制用之法須去翅足同糯米炒熟然後可用或同麩炒或同醋煮皆可若中其毒惟黑豆綠豆汁靛汁黃連濃茶蔥汁可以解之蜂房二八九味微甘微咸有毒療蜂毒腫毒合亂髮蛇蛻燒灰以酒服二方寸匕治惡疽附骨疽疔腫諸毒亦治赤白痢遺尿失禁陰痿煎水可洗狐尿瘡乳癰蜂螫惡瘡及熱病後毒氣衝目漱齒牙止風蟲牙痛炙研和豬脂塗瘰癧成瘻五靈脂二百九十味苦氣辛善走厥陰乃血中之氣藥也大能行血行氣逐瘀止痛凡男子女人有血中氣逆而腹脅刺痛或女人經水不通產後血滯男子疝氣腸風血痢冷氣惡氣心腹諸痛身體血痹脅肋筋骨疼痛其效甚捷若女人血崩經水過多赤帶不止宜半炒半生酒調服之亦治小兒氣逆癲癇殺蟲毒解藥毒行氣極速但此物氣味俱厚辛膻難當善逐有餘之滯凡血氣不足者服之大損真氣亦善動吐所當避也制用之法當用酒飛去砂石曬乾入藥全蠍二九一味甘辛有毒蠍生東方色青屬木足厥陰肝經藥也故治中風諸風開風痰口眼喎斜半身不遂語言蹇澀痎瘧耳聾疝氣風瘡癮疹小兒風痰驚癇是亦冶風之要藥文蛤二九二即五倍子味酸澀性微涼能斂能降故能降肺火化痰涎生津液解酒毒治心腹疼痛夢泄遺精療腫毒喉痹止咳嗽消渴嘔血失血腸風臟毒滑泄久痢痔瘻下血不止解蠱毒蟲毒婦人崩淋帶濁子腸不收小兒夜啼脫肛俱可為散服之若煎湯用可洗赤眼濕爛皮膚風濕癬癩腸痔脫肛為末可敷金瘡折傷生肌斂毒百藥煎二九三即五倍子釀造者味酸澀微甘功用與五倍子頗同但經釀造而成其氣稍浮其味稍甘而純故用以清痰解渴止嗽及收斂耗散諸病作丸噙化為尤佳及治下焦滑泄諸病亦更優也蝸牛二九四負殼而行者味鹹性寒有小毒能清火解熱生研汁飲消喉痹止消渴鼻衄通耳聾治腫毒痔漏療小兒風熱驚癇加麝香搗罨臍間大利小便亦敷脫肛及治蜈蚣蠆毒俱宜研爛敷之無殼者名蜒岫治熱瘡癰毒腫痛少入冰片研塗痔漏脫肛熱痛最良解蜈蚣毒尤捷蚯蚓二九五味鹹性寒沉也陰也有毒能解熱毒利水道主傷寒癉瘧黃疸消渴二便不遍殺蛇瘕三蟲伏屍鬼疰蠱毒射罔藥毒療癲狂喉痹風熱赤眼聤耳鼻瘜瘰癧陰囊熱腫脫肛去泥鹽化為水治天行瘟疫大熱狂躁或小兒風熱癲狂急驚飲汁最良亦可塗丹毒漆瘡炒為末服可去蛔蟲亦可敷蛇傷腫痛蜘蛛傷毒入蔥管化汁可治耳聾及蚰蜒入耳若中蚯蚓毒者惟以鹽湯浸洗或飲一杯皆可解之糞名六一泥可塗火瘡痄腮熱毒亦止消渴解瘟疫煩熱狂躁利小水通五淋熱閉疼痛桑螵蛸二九六即螳螂育子房也深秋作房黏著桑枝之上房長寸許大如拇指其內重重有隔每房有子如蛆卵子是也味甘微咸性平能益氣益精助陽生子療男子虛損陰痿夢遺疝瘕遺尿治女人血閉腰痛通五淋利水道炮熟空心食之可止小便不禁人部童便二九七味鹹氣寒沉也陰也咸走血故善清諸血妄行止嘔血咳血衄血血悶熱狂退陰火定喘促降痰滯解煩熱利大小兩便療陽暑中暍聲喑撲損瘀血暈絕難產胎衣不下及蛇犬諸蟲毒傷若假熱便溏胃虛作嘔者俱不可妄用紫河車二九八一名混沌衣味甘鹹性溫能補男婦一切精血虛損尤治癲癇失志精神短少怔忡驚悸肌肉羸瘦等證此舊說也但此物古人用少而始於陳氏本草自後丹溪復稱其功遂為時用予於初年亦惑於以人補人之說嘗制用之及用之再三則無所奇效且制用之法若生搗之則補不宜生若燉熟烘熟則亦猶肉餔之類耳又嘗見有以酒煮而食之者後必破腹泄瀉總亦因其性滑也近復有以純酒煮膏去柤收貯而日服其膏者較前諸法似為更善然其既離毛里已絕生氣既無奇效又胡忍食之以殘厥子之先天東方朔曰銅山西崩洛鐘東應此母子自然之理不可不信故並述此以勸人少用可也血餘二九九味微苦性溫氣盛升也陰中陽也在古藥性不過謂其治咳嗽消瘀血止五淋赤白痢疾療大小便不通及小兒驚癇治哽噎癰疽疔腫燒灰吹鼻可止衄血等證然究其性味之理則自陰而生自下而長血盛則發盛最得陰陽之生氣以火炮製其色甚黑大能壯腎其氣甚雄大能補肺此其陰中有陽靜中有動在陰可以培形體壯筋骨托癰痘在陽可以益神志闢寒邪溫氣海是誠精氣中最要之藥較之河車鹿角膠陰凝重著之輩相去遠矣凡補藥中自人參熟地之外首當以此為亞人中白三百味鹹性微涼能降火清痰消瘀血止吐血衄血退勞熱清肺癰肺痿心膈煩熱燒研為末大治諸濕潰爛下疳惡瘡口齒疳蝕蟲䘌腫痛湯火諸瘡及諸竅出血生肌長肉善解熱毒或生用為末亦可
