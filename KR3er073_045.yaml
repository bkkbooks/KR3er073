body:
  text: 卷之四十五烈集痘疹詮痘瘡下總論吐瀉四十一凡痘疹吐瀉有不必治者有當速治者如初熱時即見吐瀉但欲其不甚而隨止者吉蓋吐利中自有疏通之意邪氣賴以宣泄不必治也其有吐利之甚者則不得不治又有元氣本弱而見此證者使不速為調補必致脾氣困憊則痘出之後虛證疊見而救無及矣此痘前之吐利其當治不必治自有輕重之分也若見點之後則吐瀉大非所宜速當察其寒熱虛實而調治之一痘瘡吐瀉雖曰多屬脾經然亦有二焦五臟之辨蓋病在上焦但吐而不利病在下焦但利而不吐病在中焦則上吐下利故在上焦者當辨心肺之脾氣在下焦者當察肝腎之脾氣此五臟之氣各有相滋相制之機設不明此鮮不誤矣一痘瘡吐瀉大都中氣虛寒者十居七八然亦有邪實毒盛及飲食過傷而為吐瀉者此宜詳審脈證自有可辨若果有熱毒實邪則不可誤認虛寒輕用溫補恐反助邪以致餘毒癰腫或為潰爛難收等證嘔吐四十二痘瘡嘔吐大都虛寒者多實熱者少但當以溫養脾胃為主即或兼雜證者亦必有實邪可據方可因病而兼治之故不得輕用寒涼及消耗等藥一凡嘔吐之病病在上中二焦也切不可妄用下藥致犯下焦元氣則必反甚而危矣即或有大便不通者亦當調補胃氣從緩利導但得脾胃氣和則升降調而便自達此不可不知也一痘瘡別無風寒食滯脹滿疼痛等證而為嘔吐或乾嘔噁心者必脾胃虛寒也宜六味異功煎五君子煎參姜飲之類主之或溫胃飲理中湯皆可酌用一脾氣微寒微嘔而中焦不寒者宜五味異功散一胃口虛寒嘔吐而兼有痛滯者六味異功煎送神香散或調中湯亦佳一脾胃虛寒吐瀉並行者溫胃飲甚者陳氏十二味異功散一脾腎虛寒命門不暖而為吐瀉者必飲食不化水穀不分而下腹多痛非胃關煎或理陰煎不可一凡寒氣犯胃腹脹腹痛而為嘔吐者神香散益黃散或加炮姜若因飲水或食生冷瓜果而作嘔吐者五苓散加炮姜一飲食過傷停滯胃口胸膈脹滿而為嘔吐者宜和胃飲或大和中飲或神香散一痰飲停蓄胸膈而脹滿嘔吐者宜二陳湯或橘皮湯加炮姜一三焦火閉煩熱壅滯胃口而為嘔吐者此必陽明火證也宜橘皮湯加黃連甚者再加石膏或用竹葉石膏湯但此證甚少勿以虛火作實火也程氏曰凡痘瘡嘔吐之證須辨冷熱熱吐者宜六君子湯加薑汁炒芩連冷吐者宜六君子湯加丁香藿香白豆蔻一痘瘡嘔吐不已聲濁而長或乾噦者最是瘡家惡候泄瀉四十三痘瘡首尾皆忌泄瀉而後為尤甚惟初熱時有隨泄而隨止者為吉若自見黑點之後以致收靨毒氣俱已在表俱要元氣內充大便堅實庶能托載收成若略泄瀉則中氣虛弱變患百出矣若初出之後而見泄瀉則必難起難灌既起之後而見泄瀉一瀉則漿停瀉止則漿滿既灌之後而見泄瀉則倒陷倒靨內潰內敗等證無所不至此實性命所關最可畏也今多見妄藥誤治敗人脾氣以致莫救者猶云欲去其毒瀉瀉無害欺耶昧耶庸莫甚矣凡治痘疹泄瀉只在辨其寒熱熱者必濕滯之有餘寒者必元陽之不足但十瀉九虛而實熱者極少故凡見泄瀉嘔吐腹痛而別無實熱等證者無論痘前痘後俱速宜溫救脾腎此大要也當詳察之若失其真誤治則死一虛寒泄瀉凡證無大熱口不喜冷脈不洪數腹無熱脹胸無煩躁飲食減少而忽然自利者則悉屬虛寒切不可妄用寒涼之劑再傷脾土必致不救宜溫胃飲養中煎五君子煎或理中湯四君子湯之類隨宜用之若腹有微滯微脹而為泄瀉者宜六味異功煎或五味異功散加砂仁若泄瀉兼嘔兼痛而氣有不順者宜養中煎加丁香木香或四君子湯合二仙散若泄瀉而山根唇口微見青色或口鼻微寒手足不熱指尖微冷瀉色淡黃或兼青白睡或露睛此皆脾腎虛寒之證非速救命門終不見效宜胃關煎理陰煎主之或陳氏十二味異功散亦可若泄瀉勢甚用溫脾之藥不效者則必用胃關煎或理陰煎之類主之若久瀉滑脫不能止者宜胃關煎溫胃飲或陳氏十二味異功散送五德丸或肉豆蔻丸若胃本不虛但以寒濕傷脾或飲水而為泄瀉者宜佐關煎抑扶煎或益黃散加豬苓澤泄或五苓散俱佳一蓄熱泄瀉本不多見而間亦有之然必有熱證可據方可用清利之藥如脈見洪數身有大熱口有大渴喜冷惡熱煩躁多汗或中滿氣粗或痘色焮腫紅紫或口鼻熱赤小水澀痛之類皆熱證也且熱瀉者必暴而甚寒泄者必徐而緩皆可辨之然治熱之法當察火之微甚勿使藥過於病恐致傷脾則必反為害凡濕熱內蓄小水不利微熱不甚而為泄瀉者宜五苓散四苓散或小分清飲之類加木通主之若濕熱稍甚清濁不分而泄瀉者宜四苓散加姜炒黃連或合黃芩湯治之若食多脈盛氣壯而泄瀉者當從熱治宜黃芩湯加黃連若熱在下焦小水赤澀而泄瀉者宜大分清飲或合益元散若濕熱在脾泄瀉內熱而兼腹痛者宜香連丸若頰赤身熱頭痛咽疼口瘡煩躁而泄瀉者陽明火證也宜瀉黃散若濕熱在脾瀉而兼嘔者黃芩湯加半夏生薑或御藥大半夏湯加黃芩若內熱泄瀉而兼氣虛者四君子湯加芍藥黃連木香一發渴乃泄瀉之常候蓋水泄於下則津涸於上故凡患泄瀉者必多口乾口渴但干與渴不同渴者欲飲乾者不欲飲渴屬陽而干屬陰此其辨也然有渴欲飲水者此火證也有渴欲飲湯者此非火也有雖欲飲水而不能多者有口雖欲涼而胸腹畏寒者此皆非火證也然則病渴者尚有陰陽之辨而矧夫但干而不渴者此實以水虧而然若作火治鮮不為害故凡有久瀉津亡而作渴者當審其非熱而不可不壯其水也程氏曰泄瀉須分寒熱寒者小便清宜理中湯或參苓白朮散然白朮茯苓非泄瀉發泡者不宜用以其滲利故也按此說可見治痘者即滲利亦忌顧可妄為消伐以殘其氣血津液乎陳氏曰凡瀉頻津耗則血氣不榮瘡雖起發亦難收靨如身溫腹脹氣促咬牙煩躁譫妄者皆難治緣穀食去多津液枯竭故多死也速宜與十一味木香散或十二味異功散萬氏曰瘡未出而利者邪並於里實也宜從清毒瘡已出而利者邪達於表裡虛也宜治其虛凡痘瘡所忌惟內虛泄瀉若溫之固之而不愈者此不治之證寒戰咬牙四十四寒戰者陽中之氣虛也陽氣虛則陰乘之陽不勝陰故寒慄而戰也咬牙者陰中之氣虛也陰氣虛者腎元憊骨氣消索故切齒而鳴也總之虛在氣分則無非陰盛陽虛之病耳非大加溫補不可也心鑑云七日前見寒戰者表虛也咬牙者內虛也七日後見寒戰者氣虛極也咬牙者血虛極也氣虛者保元湯倍加肉桂以溫陽分血虛者保元湯加芎歸以益陰分余常用六氣煎或六物煎加桂附治之無不應手而止其有獨寒戰獨咬牙者亦一體治之或合二仙散用之亦妙一有寒邪在表身體大熱脈緊數無汗邪正相爭而為戰慄者此即似瘧之類但散其邪而戰自止宜柴葛桂枝湯之類主之一痘瘡灰白潰爛泄瀉而寒戰咬牙者此純陰無陽之證宜九味異功煎或陳氏十二味異功散亦可一痘色乾紫黑陷大小便不通煩躁大渴而寒戰咬牙者此純陽無陰火極似水之證也宜雙解散一養漿結靨之時有紅紫焮腫大小便秘煩渴喜水者乃表裡俱熱之證以瘡痛而振搖忍痛而咬牙也此非寒戰咬牙之屬如熱甚而便秘者宜四順清涼飲加連翹木通金銀花之類主之一筋惕肉瞤似戰者以經絡血氣為瘡所耗不能榮養肌肉主持筋脈故惕惕然肌肉自跳瞤瞤然肌肉自動本非寒戰之證也宜十全大補湯之類主之陳氏曰咬牙者齒槁也乃血氣不榮不可妄作熱治一寒戰咬牙而氣喘譫妄悶亂足冷者非倒陷即倒靨也不治煩躁四十五煩者擾擾而煩躁者煩劇而躁合言之則煩躁皆熱也分言之則煩在陽分躁在陰分煩淺而躁深也難知集曰火入於肺煩也火入於腎躁也痘疹煩躁大非所宜若吐利厥逆腹脹喘促譫妄狂亂昏不知人而煩躁者謂之悶亂乃不治之證一痘瘡以安靜為貴若忽然煩躁多哭切須詳審其故如別無逆證而忽然若此是必瘡痛而然待膿成則痛止而煩亦止矣不必治之其或飲食寒熱偶有所因而致然者但當隨證調理之則無不即安者一痘瘡煩躁兼喘者火毒在肺也宜人參白虎湯加梔子仁一煩躁多驚者火在心經也宜導赤散加梔子麥門冬或七味安神丸一痘毒未透熱伏於內而煩躁者宜六味消毒飲或兼萬氏奪命丹一熱甚於內而煩渴熱躁者宜導赤散或玄參地黃湯加木通麥門冬或萬氏牛黃清心丸或四味消毒飲一邪毒未解熱甚於表而煩躁者宜柴胡麥門冬散或羌活湯一痘瘡紅紫乾燥壯熱口渴譫妄者退火丹或萬氏牛黃清心丸或用良方犀角地黃湯一陰虛假熱自利煩躁者肝腎水虧也輕則五陰煎甚則九味異功煎或陳氏十二味異功散一吐利不食而煩躁者脾氣虛也輕則保元湯溫胃飲甚則九味異功煎或陳氏十二味異功散一瘡密膿成營血虧耗心煩不得眠者宜三陰煎加麥門冬如有微火者宜酸棗仁湯一晝則煩躁夜則安靜此陽邪盛於陽分也宜人參白虎湯或加梔子如晝則安靜夜則煩躁者此陰中之陽虛也宜三陰煎如有火邪亦可加梔子仁一大便乾結不通而煩躁腹脹者四順清涼飲當歸丸甚則承氣湯若大便秘結痘瘡陷伏而煩躁者百祥丸或承氣湯喘急四十六喘與氣促不同喘者氣粗而壅壅而急喘為肺邪有餘也促者氣促而短上下不相接續促為肺腎不足也此二者一實一虛反如冰炭若或誤治無不死也當詳辨之一寒邪在肺作喘者此外感之證必咳嗽多痰或鼻塞或身有微熱或胸滿不清治當疏散肺邪宜六安煎或二陳湯加蘇葉主之若寒邪外閉之甚者仍宜加麻黃北細辛之類若兼氣血不足而風寒在肺作喘者惟金水六君煎為最一痰因火動而為喘急者當以清痰降火為主若痰涎上壅者先治其痰宜抱龍丸清膈煎之類主之若火上刑肺肺熱葉舉大熱大喘者宜人參石膏湯若微熱作渴肺燥液衰而喘者宜人參麥門冬散若夏月熱甚火犯肺金而喘者仲景竹葉石膏湯或六味竹葉石膏湯若火伏三焦肺胃大腸俱熱胸腹脹大便秘結而喘者前胡枳殼湯一喘以氣虛者人多不能知之凡下瀉而上喘者必虛喘也凡小兒喘息覺在鼻尖而氣不長者必虛喘也此實氣促原非氣喘若見此證急須速補脾肺或救腎陰輕則參姜飲六氣煎甚則六味回陽飲若下為泄瀉而上為喘促者急用六味回陽飲或九味異功煎不可疑也若大便不瀉而或為多汗或為腹膨或見痰飲狂躁但以陰虛水虧氣短似喘而脈氣無神者急宜貞元飲加人參煨姜之類主之若治喘促用清痰降火等劑而愈甚者此必虛證也速宜改用溫補如前諸法猶有可救遲則恐無及矣一痘疹發喘乃惡候也若利止喘定者生其有瀉利不止或加脹滿或為狂躁或痘毒入肺口張息肩目閉足冷而喘甚者皆不治之證聲音四十七痘瘡最要聲音清亮若卒有失音者凶兆也先哲云瘡已出而聲不變者形病也其病輕瘡未出而聲先變者氣病也其病甚瘡出而聲不出者形氣俱病也凡此失音之證大為痘瘡所忌然亦有吉有凶須當詳辨治之一風寒外襲皮毛壅閉肺竅或致咳嗽而偶為失音者此惟外感之證宜解散之以加減參蘇飲或六安煎加薄荷桔梗主之或待風寒解散其聲自出此固無足慮也一火邪上炎肺金受制氣道壅閉而聲不出者宜導赤散合甘桔湯加炒牛蒡子主之或用甘桔清金散一上焦陽虛而聲音低小不出者此心肺不足之病蓋心主血肺主氣痘瘡稠密則血氣俱損故聲不能出宜六物煎加麥門冬或導赤通氣散主之一下焦陰虛而聲不出者其病在肝腎蓋腎為聲音之根若證由肝腎而痘瘡稠密則精血俱為耗竭水虧則肺涸故聲不能出速當滋陰益水以救其本宜大補元煎五福飲或十全大補湯之類酌宜用之一凡啼哭無聲而但見淚出語言無聲而但見口動者此皆毒氣歸腎而內敗也或聲啞如破如梗者此咽喉潰爛也皆難治之證一痘後餘毒失音其證有二一以咽痛不能言者此毒氣不淨也宜甘桔清金散加天花粉一以腎氣虛不能上達而聲不出者宜治如前或用四物湯加麥門冬白茯苓驚搐四十八驚者忽然驚惕而手足搐搦口眼歪斜每多忽作忽止其證多由風熱蓋心主火而惡熱肝主風而善動驚痘之火內生於心心移熱於肝風火相搏故發驚搐然未出之先發驚搐者多吉既出之後發驚搐者多凶何也蓋痘毒將散而溪谷開張竅理疏解因致牽引伸縮得疏散達之氣痘出而驚自止則其內毒無留於此可見故俗名驚痘最為吉也若既出之後則中之伏火亦宜散矣倘仍見驚搐則是外毒已出而內毒猶然未盡此其毒盛莫測乃可畏也故凡發驚搐者必隨發隨止者為吉不必治也苦連發不已此毒伏於心肝二臟速宜隨證治之不得誤以為吉證一治驚搐之法最當察其虛實酌其微甚如果有風熱實邪庶可解毒清火但得稍見清楚便當培養心脾以防虛敗之患若止見微邪則但當以調和氣血為主一驚搐證由風熱相搏故治宜平肝利小便蓋平肝則風去利小便則熱除風熱既平驚自愈矣若過用寒涼則氣斂而毒反陷伏痘出不透多致不救一心脾陽氣虛寒則神怯而易為驚搐六氣煎加棗仁硃砂一心脾血虛而驚搐者七福飲養心湯一肝膽氣虛多恐畏而驚搐者茯神湯一心血虛睡中驚搐或兼微痰者秘旨安毒丸一心虛火盛多熱躁而驚搐者寧神湯酸棗仁湯一痘既出其色紅紫而煩渴驚搐者良方犀角地黃湯若煩熱之甚而大便乾澀者多由陽明之火人參石膏湯加硃砂一心火獨盛而煩熱驚搐者硃砂安神丸或七味安神丸一心火盛小水不利而驚搐者導赤散加黃連硃砂或合硃砂益元散一痰涎壅盛氣急胸滿而驚搐者抱龍丸清膈煎或梅花飲琥珀散此宜暫用以開痰涎但得痰氣稍清即當酌虛實以調理血氣一肝膽實熱大便秘結而煩躁驚搐者瀉青丸或七味龍膽瀉肝湯一血熱見血而驚搐者局方犀角地黃湯熱甚者良方犀角地黃湯若熱甚而大便秘結者拔萃犀角地黃湯一風寒外感心脾陽虛而微熱不退或咳嗽惡寒而驚搐者惺惺散若虛在陰分汗不能出身熱不退而驚搐者柴歸飲若外有風邪內有熱邪表裡俱熱而驚搐者生犀散一風寒外感身熱無汗但有表邪別無虛證而驚搐者敗毒散或蘇葛湯寒邪閉甚者紅棉散然此皆表散之劑若兼虛邪不得單用此類昏睡四十九凡痘瘡將出未出而猝然昏睡者其痘必重當察其脈證虛實預為治之若痘後喜睡此毒氣已解元氣將復故邪退而神安乃否極泰來之象不須服藥妄治如見寂然氣虛但以調元湯保元湯六物煎之類察其寒熱漸以調之自然平復不可妄行消耗致傷其神反必害矣腰痛五十經曰腰者腎之府又曰太陽所至為腰痛蓋足太陽之脈夾脊絡腎而痘瘡之毒多出於腎循足太陽膀胱散行諸經乃邪之由里傳表也如初見熱而腰即痛或日以漸甚者此邪由膀胱直入於腎而毒有不能達也急宜解毒以泄少陰之邪以通太陽之經務令邪氣不得深入則痘雖稠密亦可愈也若不速治則邪必日陷而表裡俱甚營衛之脈不行臟腑之氣皆絕或為癢𤹀成為黑陷終莫能救矣一凡痘毒自陰傳陽自里傳外者為順自上傳下自外傳裡者為逆若毒由太陽傳入少陰則毒陷而不升伏於骨髓之中不能外達所以腰痛大凡瘡疹之毒歸腎則死故但見腰痛急宜治療若毒陷不起即宜發散解毒令其復出太陽而達乎陽道斯無害也宜人參敗毒散或五積散主之若腎氣虛陷不能傳送外達者必用理陰煎加細辛官桂杜仲獨活之類主之一治發熱便見腰痛者以熱麻油按痛處揉之可止仍急服前藥之類如小水不利者宜五苓散如火毒內盛而小水不利者宜四苓散加梔子木通腹痛五十一治腹痛證當以可按拒按及宜飽宜飢辨其虛實不得謂痛無補法而悉行消伐也又當因脈因證辨其寒熱不得妄用寒涼也大都寒滯者十居八九熱鬱者間或有之若虛不知補而寒因寒用則害莫甚矣一初見發熱痘瘡未出別無寒滯食滯而腹滿腹痛者此必起發不透痘毒內攻而然宜解表疏里以化毒湯加紫蘇厚朴之類主之或五積散加木香亦可若大便不遠腹脹而作痛者桂枝大黃湯酌宜用之一寒氣犯胃或食生冷而嘔惡吐瀉腹無服滿而但有疼痛者溫胃飲理中湯加肉桂木香或小建中湯隨宜用之若胃氣虛寒作痛而喜按者黃耆建中湯一寒犯中焦氣滯作脹而腹痛或泄瀉者和胃飲或抑扶煎加丁香木香或陳氏十一味木香散一脾腎虛寒下腹作痛瀉利不止者胃關煎一誤飲冷水涼茶寒濕留中小水不利而腹痛者五苓散或加木香或用小建中湯一飲食停滯中滿作痛者大小和中飲或保和丸加木香砂仁若大便不通而痛甚者赤金豆或承氣湯利之一發熱二三日後大便不通燥糞留滯而腹痛者當歸丸或用豬膽導法一濕熱下利煩熱大渴小水熱澀而腹痛者大小分清飲或黃芩湯加木香青皮砂仁一火毒內攻譫妄狂亂而煩熱腹痛者退火丹或硃砂益元散腹脹五十二痘瘡腹脹之證其要有二一以脾胃受傷一以邪氣陷伏蓋痘瘡將發毒由內生其證無不發熱或見微渴此其常也當此之時只宜溫平和解或兼托散憮抑遏無窮追無殘及元氣惟貴輕揚善導但令毒透肌表則苗秀而實無不善矣設不知此而見熱即退熱見毒即攻毒則未有妄用寒涼而不傷胃氣者未有但知攻毒而不傷元氣者胃氣傷則運行無力而脾寒所以作脹元氣傷則托送無力而毒陷所以作脹雖作脹之由猶不止此然惟此最多而人多不能察也諸未盡者俱詳如下一誤服涼藥或過食生冷而作脹者其人必不能食或大小便利或腹中雷鳴此皆脾胃中寒之證速宜溫中以疏逐冷氣冷氣散則脹自消矣宜益黃散加薑製厚朴或人參胃愛散加乾薑若胃寒兼虛瘡白神倦或氣促發厥者惟溫胃飲及陳氏十一味木香散俱為要藥若寒在脾腎下焦不化而作脹者非理陰煎不可一中氣本虛或過用消伐以致元氣無力不能托送痘毒而陷伏作脹者宜十宣散或合二妙散或神香散一痘毒陷伏於裡者必有熱證相雜如煩躁乾渴大小便秘而作脹者此只宜溫平快氣兼托之劑當用紫草飲子一寒邪外閉肌腠身熱無汗或氣喘鼻塞則痘毒不能外達而陷伏腹脹者宜五積散或加減參蘇飲一飲食過傷偶為停滯而腹脹者此不過一時之滯食去則脹消宜大和中飲或合二妙散神香散一腹脹而目閉口中如爛肉臭或大便泄瀉或利膿血者皆不治厥逆五十三厥逆者四肢不溫或甚至於冷也四肢為諸陽之本故常宜和暖若至厥逆則其陽虛可知如指尖微寒者亦陽氣衰也足心冷者乃陰邪勝也其有瘡頭焦黑煩渴悶頓大便熱結而厥逆者此陽毒內陷火極似水所謂熱深厥亦深也又有瘡本灰白大便不結而厥逆者此元氣虛憊陽衰而寒也凡痘疹之候頭常欲涼足常欲溫若頭溫足冷者多不治故厥逆為瘡家惡候一痘疹十指微寒者即宜五君子煎六氣煎或六物煎加薑桂溫之以防虛寒之變一痘疹瀉利氣虛而逆者胃關煎或陳氏十二味異功散一痘瘡始出手足便冷或其人先有吐利致傷脾胃脾胃氣虛則為厥逆宜六氣煎六物煎加薑桂主之甚者人參附子理陰煎一痘瘡起脹之時手足厥逆此陽氣欲絕之候必其自利或嘔吐脈見沉細微弱或浮大而虛速宜溫補元陽輕則六氣煎加肉桂甚則六味回陽飲或九味異功煎服藥後手足和暖者生厥不止者死一熱毒內甚而厥者必有煩熱便秘脹滿脈滑等證宜四順清涼飲或承氣湯一痘後厥逆者此其氣血已虛脾胃已困無怪其有厥也宜保元湯或六氣煎六物煎加附桂之類主之發渴五十四痘疹發渴者裡熱也以火起於內銷爍真陰所以發渴又其津液外泄化馬膿漿則營氣虛耗亦以致渴此痘瘡之常候也若微渴不甚不必治之惟大渴者乃由火盛然亦須察其虛實以為調理切不可因其作渴即以西瓜梨柿之類輕以與之恐脾肺受寒致生他患也外有乾渴論在泄瀉條中所當參閱痘瘡氣血內耗微熱微渴而喜湯者宜七味白朮散或五福飲加麥門冬五味子一脾肺多熱渴而喜冷者宜人參麥門冬散或生脈散一痘瘡多熱多躁口燥咽乾大渴引飲喜冷能食或大便乾結者此熱在肺胃二經宜人參白虎湯甚者再加黃連若痘後熱渴者此餘火未清也其治亦然一痘瘡自利不止腎陰虧損而作渴者病作少陰速宜陳氏十二味異功散或九味異功煎一大便秘結腹滿煩熱內火不清而作渴者四順清涼飲一痘瘡發熱時便見大渴唇焦舌燥此心火太炎腎水不升故血液枯耗也急宜解之苡葛根解毒湯程氏曰痘瘡初發之源乃壬癸水也水既流出其源必竭奚不作渴由此觀之可見治渴者必不可不滋腎水薛氏曰凡渴欲飲水者當審其熱之虛實若屬虛熱雖欲水而不多飲當用七味白朮散若系實熱索水喜飲者當以犀角磨水服其後亦無餘毒之患失血五十五經曰陽絡傷則血外溢陰絡傷則血內溢血外溢則衄血血內溢則便血瘡疹之火由內而發毒不能達則燔灼經絡而迫血妄行血隨火動從上而出則為衄為吐從下而出則為便為溺陰陽俱傷則上下俱出凡痘疹失血若從鼻出者則有陽明外達之意尚可望生若從他處則總屬陰分而火毒內陷乃悉為危證一痘疹發熱見血者多屬火證若衄血者宜玄參地黃湯或加茅根汁或加京墨汁同飲之衄止者生不止者不治溺血者大分清飲或八正散大便秘而見血者宜四順清涼飲一痘瘡已出未出之間凡諸血證俱宜用犀角地黃湯三方酌宜治之最佳血止後可進調元湯加木通一痘瘡十日之後忽膿血大作大便陡出者此為胃爛不治發泡五十六痘瘡發泡亦與黑陷相類雖一以外出一以外入形有不同而邪氣留結毒則一也或發水泡或發血泡或赤或紫或黑但見此證十無一生然亦有似泡而實非者不可不辨或其人身上原有破傷或瘡癤未痊或雖痊而瘢痕尚嫩一旦痘出則瘡瘢四圍痘必叢集此物從其類之理也因瘡作泡則其腐敗皮肉氣色本異宜與完膚有別不得即認為紫黑泡也至若治泡之法先以針刺破吮去惡血後用胭脂汁塗法又用百花膏敷之此瘡極易作癢起發之後宜常用茵陳熏法熏之勿令抓傷若不慎之則反覆灌爛淹延不愈變為疳蝕壞瘡以致不治者多矣潰爛五十七痘瘡膿熟或微有潰爛者亦常候也惟於未成膿之先即有潰者此名斑爛有當靨不靨而身多破爛不收者此名潰爛良由未出之先當發散而不發散則熱毒內藏必潰爛而兼喘促悶亂或不當發散而誤發散則表虛毒濫亦致遍身潰爛此皆不善表之故也又有陽毒內熾火盛脈實便結喜冷而失於清利以致陽明蓄熱肌肉潰爛者此不善解毒之故也故治此之怯表熱者仍宜清理火邪表虛者即宜補養營衛且脾主肌肉尤宜調脾進食務令大便得所以生肌解毒但解毒不至於過冷調養不至於太熱必得中和方為良法一表虛不收者必其衛氣不足別無熱證宜十全大補湯之類或去肉桂加防風荊芥穗多服自愈一火盛胃熱潰爛者宜大連翹飲之類若大便秘者以豬膽導之一痘瘡或發表太過或清解過當以致表裡俱虛陽氣不守則內為泄瀉外為潰爛急當救里宜陳氏十二味異功散或九味異功煎一潰爛膿水淋漓者以敗草散或蕎麥散襯之若斑爛作膿痛甚者以天水散和百花膏敷之一痘瘡衣以厚綿圍以厚被或向火偎抱或任其飲酒未七日而靨日期未足其收太急以致自面至腰潰爛平𤹀不作痂者蓋此非正靨乃倒靨也急宜解去衣被勿近火勿飲酒因立一方用黃耆白芷以排膿防風蟬蛻以疏表青皮桔梗以和中牛蒡子甘草以解毒服後潰瘡復脹則中外毒氣俱得無留而漸可收矣多汗五十八痘疹自汗者以陰中之火自里及表達於衛氣故皮膚為之緩腠理為之疏津液流行故多自汗但得痘疹身常潮潤實為美證此乃陰陽氣和血脈通暢蓋熱隨汗減毒隨汗散邪不能留則易出易解雖見熱甚而汗出之後身必清涼此即毒之消散也不必治之然只宜微汗不宜大汗若汗出過多則陽氣泄而衛氣弱恐致難救難靨或為癢𤹀寒戰之患此則速宜固表以斂其汗也又有汗出不止其熱反甚者此邪熱在表陰為陽擾之患速宜清火解毒陽邪退而汗自斂也若汗出如油或發潤如洗而喘不休者此肺脫之證不可治一別無邪熱但以衛氣虛肌表不固而多汗者調元湯倍加黃耆或白朮散一脾虛於中衛虛於外肌肉無主別無他證而汗不斂者人參建中湯一心氣虛神怯多驚而汗不固者團參散一或吐或瀉氣脫於中陽脫於外而汗出不收微者五福飲加炮薑棗仁甚至手足厥冷或嘔惡不止而汗不收者速宜人參理陰煎或六味回陽飲遲則恐致不救一陰中火盛或身有大熱而汗多不收者當歸六黃湯一睡中汗出不收者以陽入陰中而陰不能靜也當歸六黃湯一陽明熱盛火邪燔灼肌肉或身熱煩渴或二便熱澀而汗不收者人參白虎湯或加黃連一收靨痂脫之後自汗不止者此邪去而氣虛也宜十全大補湯或調止汗散或以滑石粉撲之夾疹五十九痘瘡止宜單出若與疹並出者謂之夾疹蓋痘疹之發皆有時氣而二者並見其毒必甚心鑑曰夾疹者即痘之兩感證也大為不順之候若痘本稀少而夾疹者名為麻夾痘其證則輕若痘本稠密而更加以疹彼此相混些碎莫辨其證則凶急宜以辛涼之劑解散為先而托裡次之但得疹毒漸消痘見壘落者乃為可治若痘疹相雜毒不少減者必危無疑一治夾疹之法先當察痘之稀密疹之微甚若疹輕熱微者但當以痘為主痘獲吉而疹無慮也若疹多熱甚者即當急解疹毒務令疹散而後痘可保也一痘瘡初出內有細密如蠶子者即夾疹證也若痘稀疹多者宜但解疹毒為主如表邪不解外熱甚內火不甚而夾疹者宜疏邪飲升麻葛根湯荊防敗毒散或十味羌活散如表裡俱熱毒盛而夾疹者柴葛煎解毒防風湯或十三味羌活散如內熱毒盛而夾疹者六味消毒飲或合黃連解毒湯如陽明火盛多熱多渴或煩躁而夾疹者白虎湯化斑湯或葛根麥門冬散以上諸治如法而疹散痘出者可治然後隨證調理之若疹不散毒不解者難治一痘疹俱多者毒必大盛雖治得其法疹毒已解亦必氣血重傷終難為力凡遇此者惟當以保養脾胃調和氣血為主庶克有濟一收靨後復出疹者此餘毒解散之兆不必治之夾斑六十痘疹夾斑與夾疹不同蓋疹則細碎有形斑則成片無形也凡痘瘡初出有片片紅腫如綿紋者有紅暈與地皮相平而全無興起之意者是皆夾斑證也斑以熱毒鬱於血分而浮於肌肉之間乃足陽明胃經所主或以寒邪陷入陽明鬱而成熱者亦致發斑俱宜涼血解毒但使斑退而痘見者吉否則皮膚斑爛瘡易搔癢而皮嫩易破也又有赤斑成塊其肉浮腫結硬者乃名丹瘤其毒尤其瘡未成就此必先潰不可治也一治斑之法大抵斑在起發之前者多用表散在灌膿之後者多用解利如遍身通紅者其治亦同一痘出夾斑輕者只以升麻葛根湯加石膏玄參甚者宜人參白虎湯合六味消毒飲一風寒外感表邪不解而夾斑者宜荊防敗毒散或加石膏玄參一斑色紫赤而大便秘結者宜四順清涼飲利之斑既已退即宜用四君子之類以固其脾庶可免其內陷程氏曰凡治夾斑急宜涼血解毒以羌活散加酒炒芍藥紫草紅花蟬蛻木通官桂糯米連進數服斑退後以保元湯加木香豆蔻煎服以解紫草之寒防其泄瀉如痘中夾疹治亦同此如稍遲則恐變成黑斑為難治矣一痘瘡結痂之後而見斑者此餘毒煎熬血分必致潰爛宜黃連解毒湯加當歸芍藥黃芩石膏甚則大連翹飲若熱毒熏蒸於內大便膿血臭穢而見斑者此胃爛之證不可治一發斑潰爛者以救苦滅瘢散敷之晝夜啼哭六十一凡小兒出痘而晝夜啼哭者當辨其虛實表裡而治之其有內未得出或外未得散而啼哭者此毒氣不解之使然也有陽邪火盛紅赤焮突而啼哭者此痘盤疼痛之使然也有心腎本虛邪熱乘陰而啼哭者此或以神志不攝或以煩熱不寧之使然也有飲食不節或偶停滯而啼哭者此胃氣不和腹痛腹脹之使然也知此之由而辨得其真則內未出者表之託之外未散者解之化之火之盛者清其熱神之虛者養其陰若痘毒本微而無故啼哭者多由飲食內傷或二便秘結此或去其停滯或通其壅閉務令表裡和暢營衛通行則神魂安泰而痘無不善矣或謂啼哭非痰即熱而不究其本則失之遠矣大小便閉六十二凡痘疹小便欲其清而長大便欲其潤而實則邪氣不伏正氣不病若小便利者大便必實雖二三日不更衣者無礙也若小便少則病必進小便秘則病必甚以火盛故也但初熱時大便不宜太實若二三日不行宜微潤之不然恐腸胃不通則營衛不行而瘡出轉密惟起發之後大便卻宜堅實若太實而四五日不行恐熱甚難靨亦宜微利之一痘疹小水不利而熱微者宜導赤散熱甚而小水不利者宜八正散一痘疹發熱時大便秘結不行而內外俱熱有不得不通以疏其毒者輕則柴胡飲子甚則三黃丸再甚則承氣湯一自起發後以至收靨凡大便不行而火不盛或虛弱不可通利者只宜用豬膽導法或以醬瓜一條如指許導之即出切不可輕用利藥一大小便俱不通而內熱甚者八正散或通關散酌宜用之一熱毒內盛而痘瘡乾黑倒陷煩躁便結者百祥丸或承氣湯然宜慎用毋輕易也一痘後餘熱不盡內陷膀胱而小水不利者導赤散或五苓散大便不通者四順清涼飲陳氏曰凡痘瘡四五日不大便用嫩豬脂一塊以白水煮熟切如豆粒與食之令臟腑滋潤亦使瘡痂易落切不可妄投宣泄之藥以致元氣內虛多傷兒也薛氏曰前證若因熱毒內蘊宜用射干鼠黏子湯解之或發熱作渴或口舌生瘡咽喉作痛並宜用之目證六十三目雖肝之竅而實五臟六腑之精氣皆上注於目故其赤脈屬心瞳子屬腎白珠屬肺黑珠屬肝裹約屬脾又太陽為上網陽明為下網少陰循外眥太陽出內眥此其部分各有所主故可因證以察其本也然痘瘡之病目而為障為翳者多由火炎於內而熱以生風風熱散於諸經因多紅赤腫痛之患故治此者亦當察其所屬而因證以調之也一戴眼證凡痘瘡灌膿之後或大汗大瀉之後多有目睛上吊或露白者謂之戴眼此精氣為膿血汗液所耗乃太陽少陰真陰虧竭大虛之證蓋太陽為上網血枯則筋急所以上吊也速宜大補氣血以六物煎六氣煎或十全大補湯之類主之其有以此為風熱而散之解之者是皆速其死也若七日以前見此者多不治或無魂失志不省人事者亦不治一痘瘡目赤腫痛翳障等證無不謂之風熱故古方亦多用清火散風等劑夫痘瘡之火由中生目為肝竅肝主風木而病在目故云風熱實以風生於火由內熱也所以凡治目赤目痛者不必治風但治其火火去則風自息矣何也蓋內生之風與外感之風不同外感之風升之散之則解散而去內生之風而再加升散則火愈熾而熱愈高矣常見治目多難救而寒涼反以傷脾者正以升降相雜而用藥有不精耳經曰高者抑之果何謂乎今如古方之治火眼凡用洗肝散及洗肝明目散芍藥清肝散之類總不如良方龍膽瀉肝湯而良方瀉肝湯又不如加味龍膽瀉肝湯之為得宜也一痘瘡眼中流浪赤痛或多眼眵此肝火之盛也宜清解之以加味龍膽瀉肝湯或抽薪飲加木賊蟬蛻之類主之若大便結閉不通者亦可少加大黃一痘瘡入眼腫痛或痘後生翳膜者宜蒺藜散蟬菊散或通神散外以秦皮散洗之一痘瘡目病熱少風多而昏暗澀痛眵淚羞明翳障者宜密蒙花散亦以秦皮散洗之一痘後眼閉淚出不敢見明者此內火不清而陽光爍之故畏明也宜洗肝明目散一痘後眼皮風毒赤爛或痛或癢燥澀羞明多眵淚者秦皮散洗之一痘瘡靨後精血俱耗而眼澀羞明光短倦開或生翳障者宜四物湯甚者六物煎加木賊蟬蛻白蒺藜一痘斑入眼在白珠上者不必治久當自去惟在黑珠上宜治之當清肝火一凡病目熱者最宜忌酒及椒薑牛羊雞鵝鴨一應熱物並雞鵝鴨蛋皆不可用以防連綿不愈之患一痘瘡熱毒傷目凡必用之藥如生地芍藥麥門冬山梔玄參草決明連翹黃芩黃運肝熱者龍膽草陽明實熱者石膏石斛腎火盛者黃柏知母三陰俱熱者地骨皮火浮不降者木通澤瀉翳障不去者木賊草蟬蛻白蒺藜氣虛者人參黃耆血虛者當歸熟地但火炎於上者不宜升陰虛於下者不宜泄是皆治眼之大法一痘瘡護眼法宜錢氏黃柏膏為佳從耳前眼皮上下顴面間日塗三四次可以護眼稀痘一用點藥者凡目中生痘或食發物或熱毒太盛上蒸目竅以致熱毒或生翳障切不可妄用一切點藥蓋其非毒即冷必致寒熱相激反以為害惟余之金露散乃為相宜可間用之以解熱毒之急徐氏曰痘之毒氣自里達表故有目病治宜活血解毒而已活血不至熱解毒不至寒但得血活毒散則目疾自愈痘癰痘毒六十四又痘母見前怪痘形證痘發癰毒者亦名痘母經曰痘前發母者凶痘後發母者半吉半凶大都毒發不透必發癰疽故蘊結於經絡之間然其壅結也猶無足慮而惟其不能消散及治之不得其法則乃為可慮然散之之法當知要領其在虛實之辨而已如痘癰之有大毒者不得不為解毒有大熱者不得不為清火俟火毒略清便當調理脾氣其有外雖見熱而內本不足者則當專用托法務令元氣完固飲食不減則毒無不化何害之有若不察根本強弱而但知攻毒清火則無不傷脾多致飲食日減營氣日削膿血不化毒日以陷而痘變百出矣所以痘瘡始末皆當以脾氣為主苟不知此則未有中氣虛敗而痘能保全者一痘癰初起壅盛疼痛元氣無損飲食如常者宜先用連翹歸尾煎或仙方活命飲以解其毒俟毒氣稍平即當用四君歸耆之類以補托元氣一凡用托裡之劑如癰毒內無大熱亦無便閉煩渴等證或素非強盛之質或以陰毒深陷形不焮突不紅腫不化膿痛有不甚者此其毒皆在內俱速宜用托裡之藥以六氣煎加金銀花甘草節防風荊芥白芷穿山甲牛蒡子之類如陽氣不足者仍可加肉桂附子用酒水各半煎服或全用酒煎亦可或托裡消毒散俱可酌用一凡內熱晡熱而飲食少思者多屬脾胃不足血氣虛弱宜六氣煎或溫胃飲加金銀花白芷若癰毒色白而作癢者氣虛也治同上若根赤而作癢者血虛血熱也宜四物湯加丹皮白芷若腫而不潰者血氣虛也托裡消毒散或加肉桂若潰而不收者脾氣虛也宜六氣煎或六物煎加肉桂一凡飲食如常而內外俱熱癰毒腫痛或煩渴或大小便俱熱澀者宜大連翹飲或仙方活命飲可間用之若飲食如常內熱作痛或兼口舌生瘡者宜間用射干鼠黏子湯一痘毒發癰有結硬實熱難解者宜排毒散一痘後發癰癤者乃痘中未盡之毒留於經鉻肢節而為癰腫也或解毒或清火各有所宜凡欲表裡兼解者宜柴胡麥門冬散欲潤腸解毒者宜消毒散及四順清涼飲欲涼血解毒者宜犀魚地黃湯欲清火利便解毒者宜大連翹飲疳蝕瘡六十五陳氏曰凡痘瘡已靨未愈之間五臟未實肌肉尚虛血氣未復被風邪所搏則津液澀滯遂成疳蝕宜用雄黃散綿繭散等藥治之久而不愈則多致不起薛氏曰前方乃解毒殺蟲之劑若毒發於外元氣未傷者用之多效若元氣傷損邪火上炎者用大蕪荑湯六味丸若赤痛者用小柴胡湯加生地黃若肝脾疳證必用四味肥兒丸及人參白朮散更佐以九味蘆薈丸萬氏曰凡痘後疳蝕瘡至毒壅肌肉內透筋骨外連皮膚時痛出血日久不痊者此毒在脾經甚為惡候乃不足之證也內服十全大補湯外用綿繭散貼之疳蝕出血者難治痘藥正品六十六人參益元氣生精血復元神補五臟凡痘瘡表散起脹灌漿收靨始終皆賴之黃耆固腠理補元氣內托陷下皆用之當歸生血養血活血止血痘瘡賴以調血凡虛者能補滯者能行欲其升散當佐以川芎欲其斂附當佐以芍藥熟地黃痘疹之病形質之病也形質之本在精血熟地以至靜之性以至甘至厚之味實精血形質中第一品純厚之藥凡痘瘡起發灌漿收斂之用以參耆配之其功乃倍且其得升柴則能發散得桂附則能回陽得參耆則入氣分得歸芍則入血分今見痘家傷寒家多不用此豈亦古人之未之及耶抑不知四物湯為何物耶生地黃涼血行血養血治痘瘡血熱血燥凡吐血衄血痘瘡紅紫及解毒藥中皆宜用之芍藥可升可降能清能斂治痘瘡血散不歸賴以收之使附氣分能瀉肝脾之火故止腹之熱痛亦能止汗川芎能升能散能引清氣上行頭角以起頭面之痘能佐參耆以行陽分而解肌表之邪此可為引導通行之使但性多辛散凡火在上而氣虛者當避之白朮健脾利水燥濕溫中能補氣故能發痘能固脾故能止瀉甘草味甘平得土氣之正故能補中和中而兼達四臟佐理陰陽惟其甘和而潤故能解剛暴之毒瀉枯涸之火麥門冬生津止渴清肺滋陰除煩熱解燥毒痘疹陰虛而多火者宜之糯米善滋脾胃益中氣助血生漿能制痘毒不能內攻扁豆健脾和中養胃止嘔柴胡發散熱邪瀉肝膽之火解肌開表退往來寒熱升麻升陽氣達肌表散風寒善走陽明防風散風熱解表邪舉陷氣佐黃耆能托裡祛毒乾葛解肌清熱涼散表邪故能止渴荊芥穗解風熱消瘡毒利肌表退腫清咽亦散頭目之風邪白芷散風邪逐寒濕止頭疼除搔癢化癰毒善走陽明故能起頭面之痘亦托肌肉之膿麻黃陰寒沉滯之邪非此不能散亦痘家之要藥而人多畏之由不能察也薄荷散風熱清頭目能利咽喉亦能解毒羌活散肌表之毒風利筋骨走經鉻故能止周身之痛官桂味甘辛能養營解表性溫熱能暖血行經凡痘瘡營衛不充而見寒滯者必用此以導達血氣且善行參耆熟地之功附子脾腎虛寒元陽大虧凡泄瀉嘔吐不能止寒戰厥逆不能除者非此不可以益火之源生薑辟惡氣散寒氣溫中氣開脾胃止嘔吐之要藥若欲理中寒止腹痛則炮乾薑尤勝陳皮和脾胃達陰陽開痰行氣和胃消脹可降可升山楂消食快胃解利宿滯開導六腑無辛香之耗故可為參術之導引木香調諸氣和胃行滯止瀉除胸腹痛亦能溫中若氣虛煩熱者不宜輕用丁香暖胃逐寒順氣止嘔且除腹痛寒滯者不可少也肉豆蔻固腸溫中行滯止瀉中寒滑泄者最宜之茯苓利水益脾去濕熱故能止瀉除煩以通津液澤瀉利水下行能去濕熱以消腫亦導諸藥以降火木通大利小水善泄心與小腸之火能使痘瘡濕熱之毒從小便而出凡內熱毒盛者宜之若熱退中虛者不可概用桔梗性味輕浮能載藥上升清火解毒故治喉痹鼠黏子性味清涼能潤肺散氣利咽退腫欲解痘疹熱毒此不可缺紫草味苦性寒能涼血活血制熱邪解痘毒滑利大便程氏曰大抵凡下紫草必下糯米五十粒以制其冷性庶不損胃氣而致泄瀉惟大熱便秘者不必糯米也蟬蛻散風清熱疏邪氣故能解痘瘡之毒風殭蠶散風消痰解毒尤利咽喉穿山甲性竄而利善通經脈直達病所凡痘有毒盛而鬱遏不能出者宜此達之然必藉血氣諸藥為之主而以此為佐引則可犀角解心火及肝脾之火凡痘中血熱吐衄及焦黑驚搐煩躁不寧等證皆可用之以解熱毒蜂蜜益脾生津潤燥可結痂亦可落痂硃砂鎮心氣除熱毒墜痰涎安驚悸定神魂凡心經痘毒及痰火上壅有餘之證皆宜用之琥珀安神定志利水鎮驚玄參能解血中之熱清遊火滋肝肺除痘疹之熱毒黃連解諸熱毒瀉心肝大腸之火滑石甘涼下降利水道清解六陽之煩熱石膏清肅大寒善降陽明之火凡屬陽明實熱而為頭痛目腫口瘡咽痛身熱煩渴狂躁便結者非此不能解連翹清三焦浮游之火解痘疹癰瘍之毒梔子利小水降脾肺膀胱之火使從小便中出龍膽草性寒而降大清肝腎之火上退眼目之赤痛下清足膝之熱腫黃芩性味輕浮能清肺金大腸之火大黃通壅滯逐瘀血退熱攻堅非有大實證則不可輕用痘家藥忌六十七人參黃耆皆補氣助陽之劑凡痘色白陷者宜用之若紅紫壯實者用之則愈熱而毒愈熾紅紫者轉為枯黑反甚矣白朮能燥濕專補氣分亦能閉氣多用則潤氣不行痘難成漿助陽生火亦難收斂茯苓豬苓澤瀉滲泄燥濕能令水氣下行多服則津液耗散凡陰虛於下而精血不足者當避之川芎性升氣散凡氣虛者不宜多用火浮於上而頭痛浮腫者忌之生地性寒腸胃虛寒者慎之升麻提氣上衝凡下虛上實氣壅煩躁者忌之柴胡清散而潤利汗多者不宜用脾泄者不宜多用紫草性寒利竅多服成泄瀉脾氣虛者忌之鼠黏子通肌滑竅多服恐內損中氣外致表虛蟬蛻能開肌竅多服恐泄元氣以致表虛麻黃開竅大泄肌表妄用恐表虛氣脫乾葛性涼解肌多用恐致表虛枳殼下氣寬腸多用則損中氣山楂散血解結多則傷血陷氣砂仁散氣動氣氣虛者不宜用烏梅酸斂宜散宜行者不宜用穿山甲銳性有餘補性不足若任用攻毒而不以王道為之帥則無異追窮寇而出孤注能善其終者鮮矣人牙性烈發表太過若妄用之則內動中氣外增潰爛訶子龍骨枯礬皆能阻塞肌竅欲通利者宜避之大黃耗削力雄血氣中虛者不可輕用黃連大苦大寒原非厚腸之物泄瀉無火者大忌之山梔黃芩黃柏石膏龍膽草滑石遠翹前胡天花粉之類皆大寒之物非有實火熱毒者不得妄行濫用附子乾薑肉桂吳茱萸之類性皆溫熱凡煩熱紫黑便結毒盛者皆不可輕用栝蔞仁開結陷氣滑腸凡虛痰虛火及中氣不足而為喘促脹滿大便不實者皆大忌之桑蟲亦名桑蠶不知創自何人用以發痘今浴醫以為奇品競相傳用余嚐遍考本草痘疹諸書皆所不載及審其性質不過為陰寒濕毒之蟲耳惟其有毒所以亦能發痘惟其寒濕所以最能敗脾且發痘者不從血氣而從毒藥痘雖起而中則敗矣此與揠苗者何異矧以濕毒侵脾弱稚何堪故每見多服桑蟲者毒發則唇膚俱裂脾敗則泄瀉不止前之既覆後可鑑矣其奈濛濛者率猶長夜之不醒何蓋其但見痘之死總未知敗在蟲毒也余欲呼之用斯代柝而並咎夫作俑者之可恨痘瘡下論列方六十八保元湯痘一調元湯痘二十全大補湯補二十調中湯小三五福飲新補六五味異功散補四養中煎新熱四七福飲新補七六味異功煎新熱七溫胃飲新熱五三陰煎新補十一九味異功煎新因二二胃關煎新熱九五陰煎新補十三六味回陽飲新熱二佐關煎新熱十理中湯熱一七味白朮散小七六氣煎新因二一理陰煎新熱三人參白朮散小七六物煎新因二十四君子湯補一參苓白朮散補五四四物湯補八六君子湯補五金水六君煎新和一六味丸補百二十五君子煎新熱六人參建中湯補二六貞元飲新補十九小建中湯補二二黃耆建中湯補二七生脈散補五六大補元煎新補一人參麥門冬散痘二三胃愛散痘十九酸棗仁湯補八四硃砂安神丸寒一四二團參散小十大和中飲新和七七味安神丸小七二參姜飲新熱八小和中飲新和八秘旨安神丸小七一益黃散和十九大分清飲新寒五加減參蘇飲痘三四養心湯小五九小分中飲新和十升麻葛根湯痘二六寧神湯小五七小柴胡湯散十九柴葛桂枝湯痘三六茯神湯小六十柴胡飲子痘四二柴胡麥門冬散痘二四止汗散小十一大連翹飲寒七八葛根麥門冬散痘一四一抑扶煎新熱十一紫草飲子痘六七解毒防風湯痘五六蘇葛湯痘二七大蕪荑湯痘五六前胡枳殼散痘九四柴葛煎新因十八肉豆蔻丸小五六仙方活命飲外一五積散散三九疏邪飲新因十六連翹歸尾煎新因三二柴歸飲新因十五敗毒散散三六荊防敗毒散痘三一雙解散痘四一羌活散痘三八十味羌活散痘三八二陳湯和一羌活湯痘四十十三味羌活散痘三九橘皮湯痘九二白虎湯寒二人參白虎湯寒三惺惺散小二三化斑湯寒三人參石膏湯寒三十宣散痘十四化毒湯痘五七黃連解毒湯寒一和胃飲新和五排毒散痘九八葛根解毒湯痘五三六安煎新和二消毒散痘四七托裡消毒散痘六清膈煎新寒九抽薪飲新寒三四味消毒飲痘四八黃芩湯寒百五退火丹痘八四六味消毒散痘四九生犀散小二八益元散寒百十二玄參地黃湯痘八六二妙散寒一三四天水散寒百十二當歸六黃湯寒六五瀉黃散寒五七導赤散寒一二二導赤通氣散痘八八二仙散痘二十神香散新和二十五苓散和八二射干鼠黏子湯痘七七五德丸新熱十八四苓散和一八七御藥大半夏湯和十一保和丸小三五八正散寒百十五九味蘆薈丸小百十五抱龍丸小八五甘桔湯因一七五甘桔清金散痘八九百祥丸痘九六承氣湯攻一四順清涼飲攻二五萬氏奪命丹痘八二赤金豆新攻二桂枝大黃湯痘四三琥珀散小八一三黃丸攻六八良方龍膽瀉肝湯寒六二梅花飲小八三香連丸寒百十三加味龍膽瀉肝湯寒六四瀉青丸寒一五一當歸丸痘九五七味龍膽瀉肝湯寒六三通關散痘八五洗膽散痘百七洗肝明目散痘百六通神散痘百十二蒺藜散痘百九芍藥清肝散寒六一蟬菊散痘百十密蒙花散因三十仲景竹葉石膏湯寒五秦皮散痘百十一茵陳熏法痘百十九六味竹葉石膏湯寒六雄黃散痘一三三胭脂塗法痘一二五局方犀角地黃湯寒七九蕎麥散痘一二四敗草散痘一二六良方犀角地黃湯寒八十百花膏痘一二三黃柏膏痘百十三拔萃犀角地黃湯寒八一紅綿散痘七二綿繭散痘一三四十一味木香散痘二一金露散新因四四救苦滅瘢散痘一二八十二味異功散痘二二萬氏牛黃清心丸小九四
