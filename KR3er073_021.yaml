body:
  text: 卷之二十一明集雜證謨吞酸經義至真要大論曰諸嘔吐酸暴注下迫皆屬於熱少陽之勝嘔酸善飢辨證共五條吐酸一證在河間言其為熱在東垣言其為寒夫理有一定奚容謬異若此豈理因二子可以易乎必二子於理有一悖耳此余之不能無言者乃以東垣為是而以河間為非也何以見之蓋河間之說實本內經經曰諸嘔吐酸暴注下迫皆屬於熱故河間病機悉訓為火而甚以主寒者為非不知內經此論乃以運氣所屬概言病應非以嘔吐注瀉皆為內熱病也如果言熱則何以又曰寒氣客於腸胃厥逆上出故痛而嘔也又曰太陽之復心胃生寒胸中不和唾出清水及為噦噫此言嘔吐之有寒也豈皆熱耶又曰太陽之勝寒入下焦傳為濡泄此言泄瀉之有寒也豈亦熱耶由此觀之則其此處言熱而彼復言寒豈非自相矛盾能無謬乎不知內經之理圓通詳悉無不周備故有此言其常而彼言其變者有此言其順而彼言其逆者有此篇未盡而足之他論者有總言所屬而詳言所病者此內經之玄所以不易窮也故凡善觀此者務宜悟其源流察其分合其博也必燭其為千為萬其約也必貫其總歸一理夫如是斯足稱明眼人矣倘不能會其巔末而但知管測一斑又烏足以盡其妙哉矧復有不明宗旨悖理妄談謬借經文證己偏見者尚難枚舉無暇辨也茲因二子之論故並及之而再悉於下觀者其加政焉一辨河間吐酸之論為非據河間曰酸者肝木之味也由火盛制金不能平木則肝木自甚故為酸也如飲食熱則易於酸矣或言吐酸為寒者誤也所以妄言為寒者但謂多傷生硬黏滑或傷冷物而為噫酸吞酸故俗醫主於溫和脾胃豈知經言人之傷於寒也則為病熱故凡內傷冷物者或即陰勝陽而為病寒者或寒熱相擊而致腸胃陽氣怫鬱而為熱者亦有內傷生冷而反病熱得大汗熱泄身涼而愈也若久喜酸而不已則不宜溫之宜以寒藥下之後以涼藥調之結散熱去則氣和也凡此皆河間之說余每見之未嘗不反復切嘆觀其所言病機則由火及金由金及木由木及脾所以為酸若發微談理果可轉折如此則指鹿為馬何患無辭惟其執以為熱故不得不委曲若此若余言其為寒則不然也夫酸本肝木之味何不曰火衰不能生土則脾氣虛而肝邪侮之故為酸也豈不於理更為明切而何以曲折強解有若是乎又若內經所言人之傷於寒也則為病熱此言傷寒證寒邪在表則為三陽之發熱及其傳裡則為陽明之內熱豈以內傷冷物而亦云病熱者耶又豈有內傷冷物而可以汗解者耶即以氣血強盛之人偶傷生冷久留不去而鬱為熱者此以郁久化熱或亦有之豈果因生冷而反熱耶矧內經本以外感言而河間引以證內傷謬亦甚矣此不惟大害軒岐之旨而致後人執以藉口其害又將何如也一辨東垣吐酸之論為是據發明曰內經言諸嘔吐酸皆屬於熱此上焦受外來客邪也胃氣不受外邪故嘔仲景以生薑半夏治之以雜病論之嘔吐酸水者甚則酸水浸其心其次則吐出酸水令上下牙酸澀不能相對以大辛熱藥療之必減也酸味者收氣也西方肺金旺也寒水乃金之子子能令母實故用大咸熱之劑瀉其子以辛熱為之佐而瀉肺之實病機作熱攻之誤矣蓋雜病醋心濁氣不降欲為中滿寒藥豈能治之乎此東垣之說也余謂其最為得理但其立言太諱如所云收氣及西方金旺水為金子等義人有未達每多忽之即在丹溪亦曰東垣不言外得風寒而作收氣立說欲瀉肺金之實又謂寒藥不可治酸而用安胃湯加減二陳湯俱犯丁香且無治熱濕鬱積之法為未合經意也因考丹溪治法則用茱蓮丸二陳湯且曰宜用炒吳茱萸順其性而折之乃反佐之法也必用黃連為君以治之此丹溪之意亦主於熱正與東垣相反而欲以芩連治吐酸則不可不辨也故余以東垣之說請為之疏焉夫所謂收氣者金氣也即秋氣也內經曰秋氣始於上蓋陰盛之漸必始於秋以陽氣之將退也寒肅之漸必始於上以陽氣之日降也其云金旺者非云肺氣之充實正言寒氣之有餘也其雲子令母實者以寒在上焦則收氣愈甚故治用鹹熱等劑以瀉其子亦無非扶陽抑陰之道最切當也丹溪未達其意而反以非之抑又何也即如丁香氣味辛爽無毒凡中焦寒滯氣有不順者最其所宜又何至以犯字相戒而使後人畏之如虎耶蓋丹溪但知丁香不可犯而不知黃連黃芩又豈吞酸證所宜輕犯者哉然說雖如此而說有未盡則云寒云熱猶不無疑謹再竟其說如下一吐酸證諸言為熱者豈不各有其說在劉河間則曰如飲食熱則易酸矣在戴原禮則曰如穀肉在器濕熱則易為酸也又有相傳者曰觀之造酒者涼作則甘過熱則酸豈非酸由熱乎諸說如此宛然可信而欲人不從不可得也凡諸似是而非者正以此類譬之射者但能不離於前後左右便云高手不知犯此四字尚足以言射乎而諸家之說亦猶是耳何以見之蓋察病者當察以理察理者當察以真即如飲食之酸由乎熱似近理矣然食在釜中使能化而不能酸者此以火力強而速化無留也若起置器中必久而後酸此停積而酸非因熱而酸也嘗見水漿冷積既久未有不酸者此豈熱耶因不行也又云造酒者熱作則酸亦似近理然必於二三日之後鬱熱不開然後成酸未有熱作及時而遂致酸者且人之胃氣原自天熱所以三餐入胃俱能頃刻消化此方是真陽火候之應若如造酒者必待竟日而後成則日不再餐胃氣能無憊乎若必如冷作之不酸方云無火則飲食之化亦須旬日此其胃中陽氣不已竭乎是可見胃氣本宜暖稍涼不可也酒甕本宜疏鬱悶不可也故酒甕之化亦安能如胃氣之速而胃氣之健又安可同酒甕之遲乎此其性理相懸奚啻十倍有不待辨也明矣且人之飲食在胃惟速化為貴若胃中陽氣不衰而健運如常何酸之有使火力不到則其化必遲食化既遲則停積不行而為酸為腐此酸即敗之漸也故凡病吞酸者多見飲食不快自食有不快必漸至中滿痞隔泄瀉等證豈非脾氣不強胃脘陽虛之病而猶認為火能無誤乎余向在燕都嘗治一縉紳患此而求治者余告以寒彼執為熱堅持造酒之說以相問難莫能與辯竟為芩連之屬所斃而終不能悟豈非前說之誤之也耶亦可哀矣余故曰人之察理貴察其真若見理不真而疑似固執以致釀成大害者無非此類此似是而非之談所以不可不辨也一吞酸之與吐酸證有三種凡喉間噯噫即有酸水如醋浸心嘈雜不堪者是名吞酸即俗所謂作酸也此病在上脘最高之處不時見酸而泛泛不寧者是也其次則非如吞酸之近不在上脘而在中焦胃脘之間時多嘔惡所吐皆酸即名吐酸而渥渥不行者是也又其次者則本無吞酸吐酸等證惟或偶因嘔吐所出或酸或苦及諸不堪之味此皆腸胃中痰飲積聚所化氣味每有濁惡如此此又在中脘之下者也但其順而下行則人所不覺逆而上出則喉口難堪耳凡此三者其在上中二脘者則無非脾胃虛寒不能運化之病治此者非溫不可其在下脘偶出者則寒熱俱有但當因證以治其嘔吐嘔吐止則酸苦無從見矣雖然此亦余之論證故不得不曲盡其說若以實理言之則凡胃強者何暇及於酸苦其有酸苦者必其停積不行而然此宜隨證審察若無熱證熱脈可據而執言濕中生熱無分強弱惟用寒涼則未有不誤者矣論治共七條一治吞酸吐酸當辨虛實之微甚年力之盛衰實者可治其標虛者必治其本一凡胃氣未衰年質壯盛或寒或食偶有所積而為酸者宜用行滯溫平之劑以二陳湯平胃散和胃飲之類主之中氣微寒者宜加減二陳湯或橘皮湯甚者宜溫胃飲氣微虛者宜藿香安胃散此皆治標之法也一脾胃氣虛及中年漸弱而飲食減少時見吞酸者惟宜溫補脾胃以理中湯溫胃飲聖朮煎之類主之切不可用清涼消耗等藥若虛在陰分下焦不暖而水邪上泛為酸者宜用理陰煎最妙一丹溪曰治酸必用吳茱萸順其性而折之乃反佐之法也不知此實正治非順性也蓋其性熱最能暖中下二焦其味辛苦最能勝酸澀之味謂之反佐見之過矣一用黃連為君以治吐酸乃丹溪之法也觀其治案有一人酸塊自胸直上咽喉甚惡以黃連濃煎冷候酸塊欲上與數點飲之即下蓋味苦沉降故酸得苦而即下此亦揚湯止沸之法耳若年壯氣強偶有所積及酒濕不行而酸楚上泛者或用此法未必即傷胃氣而亦可墜引下行即權宜用之亦無不可然終非治本之道也若氣體略有虛弱及內傷年衰之輩而患吐酸者必不可妄用芩連再殘陽氣雖暫得苦降之力而胃氣愈傷則病必日甚而無可為矣一嘔吐清水古法以二術二陳湯或六君子湯本皆正治之法然余嘗治水泛為飲者覺自臍下上衝而吐水不竭以理陰煎治之其妙如神故此三方皆宜酌用一凡肌表暴受風寒則多有為吞酸者此其由息而入則臟氣通於鼻由經而入則臟俞繫於背故凡寒氣一入則胃中陽和之氣被抑不舒所以滯濁隨見而即刻見酸此明系寒邪犯胃也今以訛相傳者皆云肌表得風寒則內熱愈郁而酸味刺心何其謬也夫因郁成熱者必以漸久而成或一日或二日然後鬱而為熱也今凡受寒吞酸者無不隨寒而酸見在即刻豈即刻便成鬱熱耶惟其非熱所以卻之之法亦惟肌表宜溫暖藥劑宜香燥此自寒者熱之之正治而說者必欲執言為熱故爾強解所謂道在邇而求諸遠凡屬謬妄者何非此類述古薛立齋曰吐酸吞酸大略不同吐酸者濕中生熱吞酸者虛熱內郁皆屬脾胃虛寒中傳末證故內經以為火者指其病形而言也東垣以為胃寒者指其病本而言也凡患此者先當辨其吞吐而治以固本元為主若服寒涼復傷胃氣則實實虛虛者矣復審其脾氣虛而飲食不能輸化濁氣不能下降者須用六君子湯補養脾胃為主少佐越鞠丸以清中故東垣先生云邪熱不殺穀若誤認為實熱而妄用寒涼必變敗證吞酸論列方二陳湯和一平胃散和十七六君子湯補五溫胃飲新熱五和胃飲新和五加減二陳湯和二聖朮煎新熱二五理中湯熱一理陰煎新熱三二術二陳湯和四橘皮湯和十一越鞠丸和一五四藿香安胃散熱七一論外備用方曲術丸和百十宿食沉香降氣散和四十氣滯半夏丁香丸和百三十寒滯茱連丸寒一五三濕熱安脾散熱六七胃寒丁香茯苓湯熱六三溫胃行滯倍術丸熱百四飲反胃論證反胃一證本屬火虛蓋食入於胃使果胃暖脾強則食無不化何至復出今諸家之論有謂其有痰者有謂其有熱者不知痰飲之留正因胃虛而完穀復出豈猶有熱觀王太僕曰內格嘔逆食不得入是有火也病嘔而吐食入反出是無火也此一言者誠盡之矣然無火之由則猶有上中下三焦之辨又當察也若寒在上焦則多為噁心或泛泛欲吐者此胃脘之陽虛也若寒在中焦則食入不化每食至中脘或少頃或半日復出者此胃中之陽虛也若寒在下焦則朝食暮吐或暮食朝吐乃以食入幽門丙火不能傳化故久而復出此命門之陽虛也故凡治此者使不知病本所在混行猜摸而妄祈奏效所以難也論治共七條一治反胃之法當辨其新久及所致之因或以酷飲無度傷於酒濕或以縱食生冷敗其真陽或因七情憂鬱竭其中氣總之無非內傷之甚致損胃氣而然故凡治此者必宜以扶助正氣健脾養胃為主但新病者胃氣猶未盡壞若果飲食未消則當兼去其滯若有逆氣未調則當兼解其鬱若病稍久或氣體稟弱之輩則當專用溫補不可標本雜進妄行峻利開導消食化痰等劑以致重傷胃氣必致不起也一虛在上焦微寒嘔惡者惟薑湯為最佳或橘皮湯亦可若氣虛為寒所侵而噁心嘔食者宜黃芽丸或橘皮乾薑湯之類主之若寒痰勝者宜小半夏湯或大半夏湯之類主之一虛在中焦而食入反出者宜五君子煎理中湯溫胃飲聖朮煎之類主之若胃虛甚者宜四味回陽飲或黃芽丸主之若兼寒痰者宜六君子湯或理中化痰丸之類主之或水泛為痰者宜金水六君煎主之若胃不甚寒而微虛兼滯者宜五味異功散主之一虛在下焦而朝食暮吐或食入久而反出者其責在陰非補命門以扶脾土之母則火無以化土無以生亦猶釜底無薪不能腐熟水穀終無濟也宜六味回陽飲或人參附子理陰煎或右歸飲之類主之此屢用之妙法不可忽也一反胃初起而氣體強壯者乃可先從清理如二陳湯橘皮半夏湯之類皆可清痰順氣平胃散不換金正氣散五苓散之類皆可去濕去滯半夏乾薑散仲景吳茱萸湯橘皮湯之類皆可去寒然此惟真有邪滯乃可用之若病稍久而胃氣涉虛者則非所宜一反胃證多有大便閉結者此其上出固因下之不通也然下之不通又何非上氣之不化乎蓋脾胃氣虛然後治節不行而無以生血血涸於下所以結閉不行此真陰枯槁證也必使血氣漸充臟腑漸潤方是救本之治若徒為目前計而推之逐之則雖見暫通而真陰愈竭矣故治此之法但見其陰虛兼寒者宜以補陽為主而大加當歸肉蓯蓉韭汁薑汁之屬陰虛兼熱者宜以補陰為主而加乳汁童便酥油蜂蜜豕膏諸血之屬然此等證治取效最難萬毋欲速非加以旬月功夫安心調理不能愈也其有糞如羊矢或年高病此者尤為難治一反胃由於酒濕傷脾者宜葛花解酲湯主之若濕多成熱而見胃火上衝者宜黃芩湯或半夏瀉心湯之類主之述古共三條仲景曰病人脈數數為熱當消穀引食而反吐者何也師曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿食不化名曰胃反脈緊而澀其病難治巢氏病源曰營衛俱虛氣血不足停水積飲在胃脘則臟冷臟冷則脾不磨脾不磨則宿食不化其氣逆而成反胃也則朝食暮吐暮食朝吐心下牢大如杯往來寒熱甚者食已即吐其脈緊而弦緊則為寒弦則為虛虛寒相搏故食已則吐名為反胃戴原禮曰翻胃證血虛者脈必數而無力氣虛者脈必緩而無力氣血俱虛者則口中多出沫但見沫大出者必死有熱者脈數而有力有痰者脈滑數二者可治血虛者四物為主氣虛者四君子為主熱以解毒為主痰以二陳為主簡易方一方用甘蔗汁二分薑汁一分和勻每服半碗或一碗日三服則止一方用人參見嘔吐門灸法上脘中脘下脘各二七壯天樞三七壯反胃論列方理中湯熱一溫胃飲新熱五橘皮乾薑湯熱五五聖朮煎新熱二五黃芽丸新熱二一五君子煎新熱六四味回陽飲新熱一六君子湯補五四君子湯補一六味回陽飲新熱二右歸飲新補三五味異功散補四人參附子理陰煎新熱三橘皮湯熱五六小半夏湯和八金水六君煎新和一二陳湯和一大半夏湯和十理中化痰丸熱九五苓散和一八二平胃散和十七橘皮半夏湯和十三豕膏新因二九黃芩湯和一九八半夏瀉心湯寒二八葛花解酲湯和一二四半夏乾薑散熱五三吳茱萸湯熱一三七不換金正氣散和二一論外備用方獨參湯補三五二汁飲和一二三丁香半夏丸和一九二胃寒大七香丸和一三一寒氣丁附散熱六二胃寒茯苓澤瀉湯熱七四反胃渴甘露湯熱七三安胃胃愛散熱七十虛寒丁香煮散熱六一胃寒噎膈經義陰陽別論曰一陽發病其傳為隔三陽結謂之隔邪氣臟腑病形篇曰脾脈微急為膈中食飲入而還出後沃沫大奇論曰胃脈沉鼓澀胃外鼓大心脈小堅急皆隔偏枯通評虛實論曰隔塞閉絕上下不通則暴憂之病也風論曰胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大血氣形志篇曰形苦志苦病生於咽嗌治之以甘藥本神篇曰憂愁者氣閉塞而不行舉痛論曰恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣思則心有所存神有所歸正氣留而不行故氣結矣上膈篇帝曰氣為上膈者食飲入而還出余已知之矣蟲為下膈下膈者食晬時乃出余未得其意願卒聞之岐伯曰喜怒不適食飲不節寒溫不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虛則邪氣勝之積聚以留留則癰成癰成則下管約其癰在管內者即而痛深其癰在外者則癰外而痛浮癰上皮熱帝曰刺之奈何曰微按其癰視氣所行先淺刺其傍稍內益深還而刺之毋過三行察其浮沉以為淺深已刺必熨令熱入中日使熱內邪氣益衰大癰乃潰伍以參禁以除其內恬憺無為乃能行氣後以鹹苦化谷乃下矣論證共四條噎膈一證必以憂愁思慮積勞積鬱或酒色過度損傷而成蓋憂思過度則氣結氣結則施化不行酒色過度則傷陰陰傷則精血枯涸氣不行則噎膈病於上精血枯涸則燥結病於下且凡人之臟氣胃司受納脾主運化而腎為水火之宅化生之本今既食飲停膈不行或大便燥結不通豈非運化失職血脈不通之為病乎而運行血脈之權其在上者非脾而何其在下者非腎而何矧少年少見此證而惟中衰耗傷者多有之此其為虛為實概可知矣故凡治此者欲舍根本而言捷徑又安望其有成功也一噎膈反胃二證丹溪謂其名雖不同病出一體若乎似矣然而實有不同也蓋反胃者食猶能入入而反出故曰反胃噎膈者隔塞不通食不能下故曰噎膈食入反出者以陽虛不能化也可補可溫其治猶易食不得下者以氣結不能行也或開或助治有兩難此其輕重之有不同也且凡病反胃者多能食病噎膈者不能食故噎膈之病病於胸臆上焦而反胃之病則病於中下二焦此其見證之有不同也所以反胃之治多宜益火之源以助化功噎膈之治多宜調養心脾以舒結氣此其證候既有不同故診治亦當分類也一噎膈證多有便結不通者內經曰三陽結謂之膈張子和曰三陽者大腸小腸膀胱也結謂熱結也小腸熱結則血脈燥大腸熱結則不圊膀胱熱結則津液涸三陽既結則前後閉澀下既不通必反上行所以噎食不下縱下而復出此陽火不下推而上行也愚按此說則大不為然夫結之為義內經原非言熱如本篇曰陰陽結邪多陰少陽曰石水又舉痛論曰思則氣結是豈以結為熱耶且熱則流通寒則凝結此自陰陽之至理故凡霜凝冰結惟寒冽有之而熱則無也此天道之顯然可見者人身陰陽之理無非是耳惟人不能知所以多誤也矧內經之言三陽結者乃止言小腸膀胱全與大腸無涉蓋三陽者太陽也手太陽小腸也足太陽膀胱也小腸屬火膀胱屬水火不化則陽氣不行而傳導失職水不化則陰氣不行而清濁不分此皆致結之由也子和不察而遂以三陽之結盡言為熱以致後世悉傳為火豈理也哉然人之病結者本非一端蓋氣能結血亦能結陽能結陰亦能結余非曰結必皆寒而全無熱也但陰結陽結證自不同有不可不辨耳夫陽結者熱結也因火盛爍陰所以乾結此惟表邪傳裡及陽明實熱者乃有之然熱結者必有煩渴發熱等證洪大滑實等脈最易辨也若下有結閉而上無熱證此陰結耳安得謂之熱耶蓋陰結者正以命門無火氣不化精所以凝結於下而治節不行此惟內傷血氣敗及真陰者乃有之即噎膈之屬是也夫噎膈之證人皆知為內傷也內傷至此其臟氣之健否為何如而猶云為熱豈必使元陽盡去而別有生生之道乎噫此余之所不解也不得不辨一噎膈證古人多認為寒自劉河間治膈氣噎食用承氣三湯張子和以三陽之結盡論為熱且云人之溢食初未遽然也或傷酒食或胃熱欲吐或冒風欲吐醫者不察本原投下香桂胡椒丁香之屬設如傷酒傷食正可攻逐豈可言虛便將熱補素熱之人三陽必結食必上潮醫氏猶云胃寒不納燔針灼艾三陽轉結歲月彌深遂成噎膈餘味此言不能無惑蓋噎膈由於枯槁本非實熱之證承氣三湯尚可用乎此河間之見有弗確也矧酒肉過多者未必遂成噎膈而噎膈之病又豈皆素熱之人乎此子和之見有未然也自後丹溪遂承二子之說而大辟局方之非謂氣之初病或飲食不謹或外冒風雨或內感七情或食味過厚偏助陽氣積成膈熱或資稟充實表密無汗或性急易怒肝火上炎以致津液不行氣為之病或痞或痛或噫腐氣或吞酸或嘈雜或膨滿不求原本便認為寒遽以辛香燥熱之劑投之數帖時暫得快以為神方厚味仍前不節七情反復相仍舊病被劫暫開濁液易於攢聚或半月或一月前病復作醫者不察猶執為冷翻思前藥隨手得快顒俟久服可以溫脾壯胃消積行氣以冀一旦豁然不思胃為水穀之海清和則能受脾為消化之器清和則能運今反得香熱之偏助劫之而愈復作復劫延綿至久而成噎膈展轉深痼良可哀憫此丹溪之說也使後人見之無不以為至論即余初年亦未嘗不加飲服而今則日見其非矣何也試觀所敘病原其有然者有不然者顧難縷指而辨也第以此證而力指為熱能無謬乎且既云燥熱之劑隨手得快則固非無效也夫燥熱已能奏效豈真火證而燥熱能效乎蓋脾土惡濕故燥之可也火能生土故熱之亦可也溫燥扶陽此自脾家正治而必欲非之以致後人之疑似屬矯矣若謂厚味七情仍前不節以致愈而復作此誰之咎也而亦可歸之藥誤乎又如脾胃清和能受能運之說此實至理誰不云然第余之所謂清和者則與丹溪不同抑又何也蓋丹溪所言者惟恐火之盛余之所言者惟恐陽之衰異同若此人將焉信請以天人之理證之何如夫天人之所同賴者惟此陽氣而已故經曰天氣清靜光明者也又曰陽氣者若天與日失其所則折壽而不彰故天運當以日光明由此言之則六合清和止此太陽為之用故陽氣勝則溫暖光明而萬類咸亨非清和乎陰氣勝則風霾晦暝而升沉閉塞非不清和乎且春夏萬物之盛非陽盛之化乎秋冬萬物之衰非陽衰之兆乎人之所賴以生者亦惟此耳故人於飲食朝入口而午化盡午入胃而暮化盡此其中焦之熱亦何異大烹之鼎必如是者才是清和是即平人之常乃正所為胃氣也使朝食而午不飢午食而晚不飢飲食化遲便是陽虧之候而矧乎全不能行全不能化者醫且猶云有火豈必並此化源盡行撲滅而後可亦堪嗟矣夫天下之理本無二三而或是或非何多朱紫余每欲言未嘗不知自反第於最疑處則不得不呈其醜又安得軒岐再起以為我一正哉嘗聞之康節先生曰欲為天下屠龍手肯讀人間非聖書其感慨深矣豈不信然豈不信然論治共七條凡治噎膈大法當以脾腎為主蓋脾主運化而脾之大絡布於胸膈腎主津液而腎之氣化主乎二陰故上焦之噎膈其責在脾下焦之閉結其責在腎治脾者宜從溫養治腎者宜從滋潤舍此二法他無捷徑矣然泰交之道天居地下故必三陽出土而後萬物由之可見脾土之母由下而升褚侍中曰外病療內上病救下辨病臟之虛實通病臟之子母斯言得矣不可忽也一治噎膈之法凡氣血俱虛者宜五福飲及十全大補湯脾虛於上者宜四君子湯脾虛兼寒者宜五君子煎脾肺營虛血燥者宜生薑汁煎陰虛於下者宜左歸飲大營煎陰中之陽虛者宜右歸飲加當歸或右歸丸八味地黃丸之類皆治本之法也一噎膈初起微虛者宜溫胃飲加當歸厚朴如果痰氣不清上焦多滯者宜二陳湯加厚朴或六安煎亦可如氣有不順或兼胸腹微痛者宜加減二陳湯暫解之凡初覺飲食微有不行而年不甚衰者宜速用大健脾丸或木香人參生薑枳朮丸以調脾氣為上策或芍藥枳朮丸亦可一噎膈便結者但察其無火無滯而止因血燥陰虛者宜五福飲或大營煎加酒洗肉蓯蓉二三錢同煎服或以豕膏漸潤其下而以調脾等劑治其上最為良法或多服牛羊乳酥之類以滋其精液使之漸潤毋欲速也如果氣血未至甚損而下焦脹閉之甚者則不得不為暫通輕則玉燭散人參利膈丸或搜風順氣丸甚則大黃甘草湯酌宜用之一用溫補以治噎膈人必疑其壅滯而且嫌迂緩不知中氣敗證此其為甚使非速救根本則脾氣何由再健設用溫補而噎塞愈甚則不得不曲為加減然必須千方百計務從元氣中酌其所宜庶可保全也若用補之後雖或未見功效但得全無窒礙便是藥病相投且此病最不易治既能受補必須多服方得漸效以收全功不可性急致疑一暴十寒以自誤也若急圖目前之快但使行滯開胃而妄用大黃芒硝三稜莪朮栝蔞桃仁滾痰丸之屬非惟不能見效必致胃氣日敗萬無生理矣此徒速其亡不可不省也一諸家治噎古法用人參黃耆以補元氣御米粟米以解毒實胃竹瀝以清痰散結乾薑以溫中生薑以去穢牛羊乳以養血潤液當歸以潤燥用此數者為主治其餘因證而增減之俱是良法凡肥胖之人鮮有噎證間或有之宜用二陳加人參白朮之類血虛瘦弱之人用四物合二陳加桃仁紅花韭汁童便牛羊乳之類七情鬱結而成噎膈者二陳合香附撫芎木香檳榔栝蔞砂仁之類飲酒人患噎膈以二陳加黃連砂仁砂糖之類胸膈有熱者加黃連黃芩桔梗栝蔞之類脾不磨者加神麯砂仁麥芽之類以助消導噎膈大便燥結之甚者必用大黃或用二陳湯加酒蒸大黃桃仁以潤之乃急則治標之法也或用四物湯加桃仁童便韭汁多飲牛羊乳為上策按古人治噎之法大略已盡於此雖其中有宜有不宜者亦並錄之以備採擇丹溪治法云用童便韭汁竹瀝薑汁牛羊乳氣虛入四君子血虛入四物有痰用二陳入氣血等藥中用之切不可用香燥藥宜薄滋味噎膈不治證凡年高患此者多不可治以血氣虛敗故也糞如羊矢者不可治大腸無血也吐痰如蟹沫者不可治脾氣敗也腹中疼痛𩞄雜如刀割者不可治營虛之極血竭於中也述古共五條巢氏病源曰陰陽不和則三焦隔絕三焦隔絕則津液不利故令氣塞不調是以成噎此由憂恚所致憂恚則氣結氣結則不宣流而使噎塞不通也張雞峰云噎膈是神思間病惟內觀自養者可治此言深中病情嚴氏云五膈五噎由喜怒太過七情傷於脾胃鬱而生痰痰與氣搏升而不降飲食不下蓋留於咽嗌者則成五噎結於胃膈者則為五膈其病令人胸膈痞悶嘔逆噎塞妨礙飲食治法宜調陰陽化痰下氣陰陽平勻氣順痰下則病無由作矣劉宗厚曰夫治此疾也咽嗌閉塞胸膈痞悶似屬氣滯然有服耗氣藥過多中氣不運而致者當補氣而自運大便燥結如羊屎似屬血熱然服通利藥過多致血液耗竭而愈結者當補血潤血而自行有因火逆衝上食不得入其脈洪大有力而數者或痰飲阻滯而脈結澀者當清痰泄熱其火自降有因脾胃陽火亦衰其脈沉細而微者當以辛香之藥溫其氣仍以益陰養胃為之主非如局方之惟務燥烈也若夫不守戒忌厚味房勞之人及年高無血者皆不能療也陳無擇三因方曰五膈者思憂喜怒悲也五噎者憂思氣勞食也思膈則中脘多滿噫則醋心飲食不消大便不利憂膈則胸中氣結津液不通飲食不下羸瘦短氣喜膈則五心煩熱口苦生瘡倦甚體痹胸痛引背食少入怒膈則胸膈逆滿噎塞不通嘔則筋急惡聞食氣悲膈則心腹脹滿咳嗽氣逆腹中雷鳴繞臍痛不能食憂噎胸中痞滿氣逆時嘔食不下思噎心悸喜忘目視䀮䀮氣噎心下痞噫噦不食胸背痛天陰手足冷不能自溫勞噎氣上膈胸中塞噎肢滿背痛食噎食急多胸中苦痛不得喘息灸法膏肓百壯以多為佳膻中七壯中脘七壯膈俞七壯心俞七壯天府七壯乳根七壯三里三七壯噎膈論列方四君子湯補一五君子煎新熱六十全大補湯補二十生薑汁煎補九四五福飲新補六八味地黃丸補一二一左歸飲新補二右歸飲新補三加減二陳湯和二右歸丸新補四大營煎新補十四人參利膈丸和一六六溫胃飲新熱五大健脾丸和八五芍藥枳朮丸新和十六四物湯補八六安煎新和二搜風順氣丸和三四三二陳湯和一豕膏新因二九人參生薑枳朮丸和八二玉燭散攻二四滾痰丸攻七七大黃甘草湯攻十三論外備用方神香散新和二十氣膈五膈散和一五六五噎散和一五九五膈寬中散和一五七十膈散和一五八利膈丸和一六五胸痹人參利膈丸和一六六大七香丸和一三一寒逆草豆蔻丸和一六七酒膈人參豆蔻湯和一六一嘉禾散和百六十痰氣紫蘇子飲和一六二補氣運脾湯和一六四中虛氣逆枇杷葉散和一六三五噎木香寬中飲和五五行氣胡椒理中湯熱六胃虛寒理中湯熱一中寒透膈湯攻三十逐痰滯青木香丸攻八六氣滯痰逆嘈雜論證嘈雜一證或作或止其為病也則腹中空空若無一物似飢非飢似辣非辣似痛非痛而胸膈懊憹莫可名狀或得食而暫止或食已而復嘈或兼噁心而漸見胃脘作痛此證有火嘈有痰嘈有酸水浸心而嘈大抵食已即飢或雖食不飽者火嘈也宜兼清火痰多氣滯似飢非飢不喜食者痰嘈也宜兼化痰酸水浸心而嘈者慼慼膨膨食少無味此以脾氣虛寒水穀不化也宜溫胃健脾又有誤用消伐等藥以致脾胃虧損血少嘈雜中虛則煩雜不飢脾弱則食不運化此宜專養脾胃總之嘈雜一證多由脾氣不和或受傷脾虛而然所以治此者不可不先顧脾氣然古人於此悉以痰火論治予恐專用寒涼則胃氣虛寒不健者反以日甚而漸至噁心噯氣反胃噎膈之類將由此而起矣論治共二條一痰火嘈雜等證如脾虛微火多痰而嘈雜者宜和中湯或三聖丸或術連丸若中焦火盛兼痰而嘈雜者宜軟石膏丸若宿食留飲痰滯不清而嘈雜者宜曲術丸若三焦火盛濕痰氣滯而嘈雜者宜三補丸加半夏蒼朮香附之類一脾胃虛寒嘈雜者必多吞酸或兼噁心此皆脾虛不能運化滯濁而然勿得認為火證妄用寒涼等藥若多痰飲或兼嘔惡而嘈雜者宜二陳湯或二術二陳湯若寒痰停蓄胸膈或為脹滿少食而為嘈雜者宜和胃二陳煎或和胃飲若脾胃虛寒停飲作酸嘈雜者宜溫胃飲或六君子湯若脾腎陰分虛寒水泛為飲作酸嘈雜者宜理陰煎或金水六君煎嘈雜論列方二陳湯和一和胃飲新和五六君子湯補五理陰煎新熱三和中湯寒五八金水六君煎新和一溫胃飲新熱五三聖丸寒一七一和胃二陳煎新和三曲術丸和百十術連丸寒一七二二術二陳湯和四三補丸寒一六二軟石膏丸寒一七三
