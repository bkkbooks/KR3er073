body:
  text: 卷之二十五心集雜證謨心腹痛經義舉痛論帝曰願聞人之五臟卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛帝曰其痛或卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與少腹相引而痛者或腹痛引陰股者或痛宿昔而成積者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者凡此諸痛各不同形別之奈何岐伯曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得炅則立止因重中於寒則痛久矣寒氣客於經脈之中與炅氣相薄則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而血氣亂故痛甚不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止寒氣客於俠脊之脈則深按之不能及故按之無益也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣寒氣客於背俞之脈則脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛矣熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通矣帝曰所謂言而可知者也視而可見奈何岐伯曰五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也帝曰捫而可得奈何岐伯曰視其主病之脈堅而血反陷下者皆可捫而得也賓按本篇論痛總計一十三條所言寒氣與炅氣相薄及熱氣留於小腸閉而不通者止二條為熱證而其他皆屬於寒則此證之概可知學者當思所辨矣終始篇曰病痛者陰也痛而以手按之不得者陰也深刺之痹論帝曰內舍五臟六腑何氣使然岐伯曰五臟皆有合病久而不去者內舍於其合也胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕痛者寒氣多也有寒故痛也骨空論曰䏚絡季脅引少腹而痛脹刺噫嘻調經論曰實者外堅充滿不可按之按之則痛虛者聶闢氣不足按之則氣足以溫之故快然而不痛平人氣象論曰寸口脈沉而弱曰寒熱及疝瘕少腹痛寸口脈沉而橫曰脅下有積腹中有橫積痛脈急者曰疝瘕少腹痛邪氣臟腑病形篇曰心脈微急為心痛引背食不下衛氣篇曰新積痛可移者易已也積不痛難已也厥病篇曰闕心痛與背相控善瘛如從後觸其心傴僂者腎心痛也厥心痛腹脹胸滿心尤痛甚胃心痛也厥心痛痛如以錐針刺其心心痛甚者脾心痛也厥心痛色蒼蒼如死狀終日不得太息肝心痛也厥心痛臥若徒居心痛間動則痛益甚色不變肺心痛也真心痛手足清至節心痛甚旦發夕死夕發旦死腸中有蟲瘕及蛟蛔心腸痛憹作痛腫聚往來上下行痛有休止腹熱喜渴涎出者是蛟蛔也以上皆有刺法詳在本經雜病篇曰心痛引腰脊欲嘔取足少陰心痛腹脹嗇嗇然大便不利取足太陰心痛引背不得息刺足少陰不已取手少陽心痛引小腹滿上下無常處便溲難刺足厥陰心痛但短氣不足以息刺手太陰心痛當九節刺之按已刺按之立已不已上下求之得之立已六元正紀大論曰不遠熱則熱至不遠寒則寒至寒至則堅痞腹滿痛急下痢之病生矣土鬱之發甚則心痛脅䐜嘔吐霍亂飲發注下金鬱之發心脅滿引少腹善暴痛不可反側水鬱之發民病寒客心痛木鬱之發民病胃脘當心而痛上支兩脅膈咽不通食飲不下火鬱之發民病骨痛腹中暴痛邪氣臟腑病形篇曰大腸病者腸中切痛而鳴濯濯冬日重感於寒即泄當臍而痛不能久立與胃同候取巨虛上廉胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通食飲不下取之三里也小腸病者小腹痛腰脊控睪而痛時窘之後取之巨虛下廉膀胱病者小腹偏腫而痛以手按之即欲小便而不得取委中央五邪篇曰邪在肝則兩脅中痛寒中惡血在內行善掣節時腳腫邪在脾胃則病肌肉痛陽氣不足陰氣有餘則寒中腸鳴腹痛邪在心則病心痛喜悲時眩僕以上俱有刺法在本經經脈篇曰脾足太陰之脈入腹屬脾絡胃其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫心下急痛得後與氣則快然如衰心手少陰之脈起於心中出屬心系是動則病嗌乾心痛渴而欲飲腎足少陰之脈其支者從肺出絡心是動則心如懸若飢狀舌乾咽腫煩心心痛心主手厥陰之脈起於胸中出屬心包絡是動則胸脅支滿煩心心痛膽足少陽之脈其直者從缺盆下腋循胸循脅裡是動則病口苦善太息心脅痛不能轉側論證共四條凡病心腹痛者有上中下三焦之別上焦者痛在膈上此即胃脘痛也內經曰胃脘當心而痛者即此時人以此為心痛不知心不可痛也若病真心痛者必手足冷至節爪甲青旦發夕死夕發旦死不可治也中焦痛者在中脘脾胃間病也下焦痛者在臍下肝腎大小腸膀胱病也凡此三者皆有虛實寒熱之不同宜詳察而治之一痛有虛實凡三焦痛證惟食滯寒滯氣滯者最多其有因蟲因火因痰因血者皆能作痛大都暴痛者多有前三證漸痛者多由後四證但蟲痛痰痛多在中焦火痛則三焦俱有之血痛則多在下焦然惟婦人則常有血證而男子則少也諸如此類但察其多滯多逆者方是實證如無滯逆則不得以實論也辨之之法但當察其可按者為虛拒按者為實久痛者多虛暴痛者多實得食稍可者為虛脹滿畏食者為實痛徐而緩莫得其處者多虛痛劇而堅一定不移者為實痛在腸臟中有物有滯者多實痛在腔脅經絡不幹中臟而牽連腰背無脹無滯者多虛脈與證參虛實自辨微實者宜調不宜攻大實者或上或下非攻不可純虛者或氣或血非大補不可一痛證有寒熱誤認之則為害不小蓋三焦痛證因寒者常居八九因熱者十惟一二觀內經舉痛等論義可知矣蓋寒則凝滯凝滯則氣逆氣逆則痛脹由生而熱則流通多不然也雖熱證亦常有痛然熱者必有明辨如內經所言腸中痛而疸熱焦渴則堅幹不得出閉而不通者此因燥結熱閉故能作痛然必有煩熱等證乃因於火最易見也今之醫家但見心腹痛證無問有無寒熱便云諸痛皆屬於火多用寒涼不知此說出自何典而彼此訛傳無墨無根妄亦甚矣又見丹溪治法云凡心腹痛者必用溫散此是鬱結不行阻氣不運故痛也此說誠是也然又引原病式云若欲行溫散寧無助火添病也由是古方多以山梔為主加熱藥為嚮導或用二陳湯加川芎蒼朮倍加梔子煎服痛甚者加炒乾姜反佐之若此議論治法余則大有不服夫致病之由熱者自熱寒者自寒病因火邪清利自愈固不必反佐也病因寒滯溫散自愈又何為反助火耶蓋寒者熱之熱者寒之此自正治之正理豈可不論經權不分從逆既宜梔子又宜乾薑概用反佐而治寒犯寒治熱犯熱乎因致後代醫流凡有見不真者每每藉此為成法而藉口反佐誤人於疑似之中者不少矣故余特為反佐論在前二卷中以盡其義宜均察也一痛證當辨有形無形無形者痛在氣分凡氣病而為脹為痛者必或脹或止而痛無常處氣聚則痛而見形氣散則平而無跡此無形之痛也但宜順氣氣順則痛自愈矣有形者痛在血分或為食積凡血癥食積而為脹痛者必痛有常所而脹無休息不往不來不離其處者是有形之痛也然或食或血察得所因乃可攻而去之此二者之當辨也論痛脈凡諸病之虛實辨之於脈者皆易惟心腹痛證則有大有小其脈多有難辨雖滑實有力者固多實邪虛弱無神者固多虛邪此其常也然暴痛之極者每多沉伏細澀最似極虛之候不知氣為邪逆氣逆則脈道不行而沉伏異常此正邪實之脈然於沉伏之中細察之必有梗梗然弦緊之意此必寒邪阻遏陽氣者多有是脈若火邪作痛則不然也凡見此者不得因其細極微極便認為虛脫妄用補劑必大誤矣辨此之法但當察其形氣以見平素之強弱問其病因以知新病久病及何所因而起大都暴病痛急而脈忽細伏者多實邪久病痛緩而脈本微弱者為虛邪再以前論虛實之法酌之以理參而診之則萬無一失矣論治共十五條凡心腹痛證必須先辨寒熱如無熱證熱脈則定非火邪不得妄用涼藥凡治心腹痛證古云痛隨利減又曰通則不痛此以閉結堅實者為言若腹無堅滿痛無結聚則此說不可用也其有因虛而作痛者則此說更如冰炭一凡痛在上焦者如因停滯既痛兼脹不易行散而痛極難忍者欲其滯去速效無如吐之之妙宜於新方吐法中擇而用之若無停積脹急而或寒或氣微有凝滯而作痛者但順其氣無有不愈一胃脘痛證多有因食因寒因氣不順者然因食因寒亦無不皆關於氣蓋食停則氣滯寒留則氣凝所以治痛之要但察其果屬實邪皆當以理氣為主宜排氣飲加減主之食滯者兼乎消導寒滯者兼乎溫中若止因氣逆則但理其氣病自愈矣其有諸藥不效氣結難解者惟神香散為妙若氣有滯逆隨觸隨發者宜用後簡易二方最妙一下焦小腹痛者或寒或熱或食或蟲或血或氣逆皆有之凡閉結者利之下之當各求其類而治之一寒滯之痛有因內寒者如食寒飲冷之類是也必兼寒兼食隨其宜而治之如上法可也有因外寒者或觸冒不時之寒邪或犯客令之寒氣或受暴雨沙氣之陰毒以致心腹攪痛或吐或瀉或上不能吐下不能瀉而為乾霍亂危劇等證總由寒氣犯臟或在上焦或在中下二焦凡痛急在上者用吐最妙在中在下者俱宜解寒行滯以排氣飲為主加減治之或不換金正氣散或和胃飲平胃散十香丸之類皆可擇用其有寒逆之甚者宜四逆湯理中湯之類主之又神香散可解三焦之滯當隨證作引以送之一血積之有腹痛者是即蓄血證也而血證之屬有四一傷寒有蓄血證成無己曰邪氣聚於下焦則津液不得通血氣不得行或溺或血留滯於下是生脹滿而硬痛也若從心下至少腹硬滿而痛小便利者則是蓄血之證此當分而治之其他證治詳義並見傷寒門一婦人有血痛證詳見婦人門一跌打損傷有瘀血腹痛證但去其瘀而痛自愈凡氣血和平者宜通瘀煎加減治之其有血滯便結邪實不通者宜桃仁承氣湯百順丸主之或血虛燥結便閉不通者宜玉燭散主之一食鬱既久而胃脘有瘀血作痛者生韭飲一氣血虛寒不能營養心脾者最多心腹痛證然必以積勞積損及憂思不遂者乃有此病或心脾肝腎氣血本虛而偶犯勞傷或偶犯寒氣及飲食不調者亦有此證凡虛痛之候每多連綿不止而亦無急暴之勢或按之揉之溫之尉之痛必稍緩其在心脾胸脅之間者則或為戚戚或為慌慌或似嘈非嘈或飢勞更甚或得食稍可或懊憹無跡莫可名狀或形色青黃或脈微氣弱是皆虛寒之證此非甘溫養血補胃和中不可也宜大小營煎理陰煎之類加減主之若氣虛者必大加人參陽衰者必佐以桂附乾薑丹溪曰諸痛不可補氣此惟邪實氣滯者當避之而曰諸痛皆然則謬矣不可執以為辭也一下虛腹痛必因虛挾寒或陽虛中寒者乃有之察無形跡而喜按喜暖者是也治宜補陰逐寒必宜理陰煎主之然男子則間或有之惟女人則因虛而痛者更多蓋女人有月經帶濁之病所以為異亦宜理陰煎大劑主之余用此以活人多矣若虛中挾滯而血有不行者惟決津煎為最妙諸未盡者詳婦人門凡治心腹痛證已經攻擊滌蕩愈而復作或再三用之而愈作愈甚或脈反浮弦虛大者皆為中虛之候此當酌其虛實而或兼治邪氣或專補正氣若用補無礙則當漸進切不可雜亂妄投以自掣其肘但當純用補藥使脾胃氣強得以運行則邪氣自不能犯又何疼痛之有一火邪熱鬱者皆有心腹痛證如火在上焦痛而兼脹者宜於行氣導滯藥中倍加山梔黃芩之屬以治之若有痛無脹者或宜加芍藥生地麥冬以佐之若火在下焦者宜大分清飲或茵陳飲之類主之然火在上者必有煩熱焦渴喜冷等證火在下者必有脹熱祕結淋澀等證務兼脈證察其真有火邪方可治以寒涼如無火證火脈則不得妄稱為火以誤治也一蟲痛證治詳見諸蟲門一痰飲停滯胸膈亦能作痛凡胸脅膨悶漉漉有聲或作醋酸心嘔惡或痛連脅背者皆其證也宜清膈煎二陳湯橘皮半夏湯局方四七湯及括痰丸潤下丸之類並皆治之又若東垣草豆蔻丸丹溪白螺丸亦皆治痰之劑若郁痰凝結消之不去者非用吐法不能除也一陰寒腹痛者凡男婦有因房室之後中寒而痛極者此陰寒也宜先用蔥姜搗爛炒熱或熱磚之屬尉其臍腹以解其寒極凝滯之氣然後用理陰煎或理中湯四逆湯之類加減治之其有痛極至危者須速灸神闕氣海等穴一凡胸腹之痛有無關於內而在筋骨皮肉之間者此邪之在經不可混作里證必須詳問的確但當分其或火或寒或氣或勞傷或血滯或血虛或有淫瘡邪毒留蓄在經辨其所因庶不致謬而治之亦易也一大人小兒或素因口腹不節致傷脾胃以後或寒或食凡有所觸即為腹痛屢發不已或為脹滿食減等證者惟芍藥枳朮丸為最妙宜加減用之一凡胸膈大痛連及脅背藥不能納到口即吐者此則無論諸藥皆可發吐因就其勢探而吐之則最易最捷吐出邪滯積痰痛可立止若邪猶未盡痛猶未止則再以前藥與之務盡其邪無不愈者述古共二條陳無擇云十二經絡外感六淫則其氣閉塞鬱於中焦氣與邪爭發為疼痛足厥陰心痛兩脅急引小腹連陰股相引痛手心主心痛徹背心煩掌中熱咽乾目黃赤脅滿足太陰心痛腹脹滿澀澀然大便不利膈悶咽塞手太陰心痛短氣不足以息季脅空痛遺矢無度胸滿煩心足少陰心痛煩極面黑心懸若飢胸滿腰脊痛背輸諸經心痛心與背相引心痛徹背背痛徹心諸腑心痛難以俯仰小腹上衝卒不知人嘔吐泄瀉此皆諸經諸俞諸腑涉邪所致病屬外所因若五臟內動汨以七情則其氣痞結聚於中脘氣與血搏發為疼痛肝心痛者色蒼蒼如死狀終日不得太息真心痛者如前經義脾心痛者如錐針刺其心腹蘊蘊然氣滿肺心痛者若從心間起動作痛益甚色不變腎心痛者與背相控善瘛如物從後觸其心身傴僂胃心痛者腹痛胸滿不下食食則不消皆臟氣不平喜怒憂鬱所致此屬內因飲食勞逸觸忤非類使臟氣不平痞膈於中食飲遁注變亂腸胃發為疼痛或飲啖生冷果實中冷不能消散結而為積還食還發名積心痛及有臟寒生蛔致心痛者所謂九種心痛曰飲曰食曰風曰冷曰熱曰悸曰蟲曰注曰去來痛者除風熱寒屬外所因余皆不內外因更有婦人惡血入心脾經發作疼痛尤甚於諸痛更有卒中客忤鬼擊尸疰使人心痛亦屬不內外因丹溪曰心痛即胃脘痛雖日數多不吃食不死若痛方止便吃物還痛必須三五服藥後方可漸漸吃物痛甚者脈必伏用溫藥附子之類不可用參朮脈弦者是食宜溫散蓋食得寒則凝得熱則化更用行氣或利藥助之無不愈脈滑者是痰痰因氣滯而聚阻礙道路氣不得通而痛宜導痰解鬱凡痛必用溫散以其鬱結不行阻氣不運故也腹痛以手可重按者屬虛宜參朮薑桂之類手不可按者是實宜用硝黃下之肥白人腹痛多是氣虛兼濕痰宜半夏人參二術之類飲食過傷而腹痛宜木香檳榔丸下之如氣虛之人傷飲食而腹痛宜調補胃氣並消導藥參朮山楂枳實麥芽木香神麯之類如腹中常有熱而痛此為積熱宜調胃承氣湯下之小腹實痛用青皮以行其氣小腹因寒而痛宜桂枝吳茱萸臍下忽大痛人中黑者多死心痛用山梔並劫藥止之若又復發前藥必不效可用玄明粉一服立止脈堅實不大便者下之食停小腹新按凡腹痛因食者或因滯物或因冷物皆能停積中脘須用前治食法加減治之此正法也然又有食停小腹者余嘗治一上舍年及三旬因午刻食水煮麵角將至初更食及小腹下至右角間遂停積不行而堅突如拳大如鵝卵其痛之劇莫可名狀余為治之察其明系面積顯而無疑然計其已入大腸此正通則不痛之證也乃與木香檳榔丸連下二三次其痛如故因疑藥力之緩猶未及病乃更投神佑丸以瀉之又不效余謂此必藥性皆寒故滯有不行也因再投備急丸雖連得大瀉而堅痛毫不為減斯時也余計窮矣因潛測其由不過因面豈無所以制之今既逐之不及使非借氣以行之不可也且計面毒非大蒜不殺氣滯非木香不行又其滯深道遠非精鋭之響導不能達乃用火酒磨木香令其嚼生蒜一瓣而以香酒送之一服後覺痛稍減三四服後痛漸止而食漸進方得全愈然雖痛止食進而小腹之塊仍在後至半年許始得消盡由是知欲消食滯即大黃巴豆猶有所不能及而推宜行氣為先也且知飲食下行之道乃必由小腹下右角間而後出於廣腸此自古無人言及者故並筆之用以廣人之聞見括痧新按向豫荊人年及四旬於八月終初寒之時偶因暴雨後中陰寒沙毒之氣忽於二鼓時上為嘔惡下為胸腹攪痛勢不可當時值暮夜藥餌不及因以鹽湯探吐之痛不為減遂連吐數次其氣愈升則其痛愈劇因而上塞喉嗌甚至聲不能出水藥毫不可入危在頃刻間矣余忽憶先年曾得祕傳括痧法乃擇一光滑細口瓷碗別用熱湯一鍾入香油一二匙卻將碗口蘸油湯內令其暖而且滑乃兩手覆執其碗於病者背心輕輕向下刮之以漸加重碗干而寒則再浸再刮良久覺胸中脹滯漸有下行之意稍見寬舒始能出聲頃之忽腹中大響遂大瀉如傾其痛遂減幸而得活瀉後得睡一飯頃復通身瘙癢之極隨發出疙瘩風餅如錢大者不計其數至四鼓而退愈後細窮其義蓋以五臟之系咸附於背故向下刮之邪氣亦隨而降凡毒氣上行則逆下行則順改逆為順所以得愈雖近有兩臂刮痢之法亦能治痛然毒深病急者非治背不可也至若風餅疙瘩之由正以寒毒之氣充塞表裡經臟俱閉故致危劇今其臟毒既解然後經氣得行而表裡俱散也可見寒邪外感之毒凡臟氣未調則表亦不解表邪未散則臟必不和此其表裡相關義自如此故治分緩急權衡在人矣繼後數日一魏姓者亦於二鼓忽患此證治不得法竟至五鼓痛極而斃遇與不遇此其所以為命也附按徐東皋云匡掌科夫人年三十餘病胃脘連胸脅痛日輕夜甚兩寸關脈弦滑有力諸醫以積滯凝寒用發散及攻下藥繼用鐵刷散四磨飲等方俱不效後用湯水皆吐而不納經月不食痛且益甚豫謂其為痰鬱明矣但痛久弱甚不敢行吐法奈何偶一醫謂五靈脂沒藥素用有效衆皆哂之曰此藥用之多矣豫謂再用亦無妨何哂之有彼用酒調病者到口便吐隨吐緑痰兩碗許痛即止遂納飲食此蓋痰在膈上攻下之亦不去必得吐法而後愈經曰有故無殞此之謂歟簡易方一胃脘當心而痛或氣或寒觸而屢發者用荔枝核燒微焦每荔枝核一錢加木香七分共為末以清湯下一錢許數服可以除根屢試神效者一胸膈胃脘大痛察有邪滯連用排氣飲及諸藥全不見效者但用牙皂角以微火燒煙甫盡即取起為末用燒酒調送七八分或一錢許其效如神亦余試效者兵部手集方治久心痛十年五年者隨手效用小蒜以釅醋煮熟頓服此後再不發治脾痛三方歌腹脹脾疼怎抵當椒姜之外有丁香三般等分羅為末調入白鹽與白湯水磨烏藥治脾疼每服須教一盞濃一片陳皮一蘇葉再煎濃服有神功心與脾疼有妙方良薑切碎等檳榔兩般同炒研為末米飲同調服亦良食療方治五臟冷痛心腹痛以胡椒二十一粒擂碎熱酒服之肘後方治心腹俱脹痛短氣欲死或已絶者用官桂三兩切碎以水一升二合煮八合去渣頓服無桂用姜亦可腹痛灸法內關中脘氣海神闕填椒鹽灸之水分隔俞脾俞胃俞心腹痛論列方吐法新攻一備急丸攻五二大分清飲新寒五四逆湯熱十四排氣飲新和六局方四七湯和九七大營煎新補十四小營煎新補十五木香檳榔丸攻四九通瘀煎新因五神香散新和二十桃仁承氣湯攻四潤下丸和百十七二陳湯和一調胃承氣湯攻三清膈煎新寒九茵陳飲新寒八括痰丸新和十九橘皮半夏湯和十三玉燭散攻二四十香丸新和十五芍藥枳朮丸新和十六平胃散和十七生韭飲和一五一白螺丸和百十五東垣草豆蔻丸和一六七和胃飲新和五理陰煎新熱三神佑丸攻四八不換金正氣散和二一決津煎新因二百順丸新攻六理中湯熱一論外備用方荔枝散新因二八氣痛赤金豆新攻二堅積木香順氣散和四三氣滯歸脾湯補三二遊山散和七六心脾痛調氣平胃散和十八參附湯補三七神佑丸攻五三寒積痛附子茴香散熱一四八暖胃和中人參散和一六二虛寒牙皂散新因二七結氣藿香安胃散熱七一寒嘔四磨飲和五二行氣強中湯熱九一生冷傷脾茱萸四逆湯熱十八小腹痛蘇合丸和三七一氣逆心痛鐵刷散熱百九寒濕積八味建中湯補二五烏藥散和七四血氣壅滯益黃散和十九寒滯指迷七氣湯和五一積痛平拈散和七五氣痛七氣湯和四七郁木香調氣散和四四氣滯八味湯熱一四一虛寒氣滯調痛散和七二氣逆丁香止痛散和七三心痛甚蟠蔥散熱百十寒滯祛痛散和七一心氣滯胡椒理中湯熱六肺胃虛寒胃愛散熱七十虛寒玄桂丸和七八瘀血痛厚朴溫中湯熱九十逐寒滯勝金散熱百八氣逆舒筋散和七七跌閃腹痛丁香茯苓湯熱六十三溫行滯大沉香丸熱百十三冷氣沉香桂附丸熱百十一寒氣附子理中湯熱三虛寒吳茱萸散熱一三九寒濕木香導氣丸因二七八小腹氣痛金匱大建中湯補二三寒痛大己寒丸熱百七十寒病小建中湯補二二事後中寒腹痛因二七八椒附丸熱百十二小腹痛溫胃湯熱十三寒傷脾冷香丸熱八二生冷脅痛經義藏氣法時論曰肝病者兩脅下痛引少腹令人善怒心病者胸中痛脅支滿脅下痛大奇論曰肝雍兩胠滿臥則驚不得小便邪客篇曰肝有邪其氣流於兩脅熱論篇曰傷寒三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾刺熱篇曰肝熱病者熱爭則狂言及驚脅滿痛手足躁不得安臥刺足厥陰少陽熱病先胸脅痛手足躁刺足少陽補足太陰舉痛論曰寒氣客於厥陰之脈則血泣脈急故脅肋與少腹相引痛矣玉機真藏論曰風寒客於人弗治則病入舍肺弗治肺即傳而行之肝名曰肝痹脅痛出食春脈不及則令人胸痛引背下則兩脅胠滿五臟生成篇曰青脈之至也長而左右彈有積氣在心下支胠名曰肝痹脈要精微論曰肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆五邪篇曰邪在肝則兩脅中痛寒中惡血在內行善掣節時腳腫取之行間以引脅下補三里以溫胃中取血脈以散惡血取耳間青脈以去其掣咳論曰肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿繆刺論曰邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺然骨之前出血如食頃而已邪客於足少陽之絡令人脅痛不得息咳而汗出刺足小指次指爪甲上與肉交者各一痏邪客於足太陽之絡令人拘攣背急引脅而痛刺之從項始數脊椎俠脊疾按之應手如痛刺之傍三痏立已骨空論曰䏚絡季脅引小腹而痛脹刺噫嘻邪氣臟腑病形篇曰肝脈微急為肥氣在脅下若覆杯胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通食飲不下取之三里也奇病論曰病脅下滿氣逆二三歲不已病名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也四時刺逆從論曰少陽有餘病筋痹脅滿厥論曰少陽之厥暴聾頰腫而熱脅痛胻不可以運腹中論曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四支清目眩時時前後血病名曰血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也治以烏賊魚骨丸脈解篇曰少陽所謂心脅痛者言少陽盛也盛者心之所表也九月陽氣盡而陰氣盛故心脅痛也五臟生成篇曰腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明經脈篇曰心所生病者目黃脅痛心主手厥陰心包絡也是動則病手心熱甚則胸脅支滿心中憺憺大動膽足少陽也是動則病口苦善太息心脅痛不能轉側本藏篇曰肝小則臟安無脅下之病肝大則逼胃迫咽迫咽則苦隔中且脅下痛肝高則上支賁切脅悗為息賁肝下則逼胃脅下空脅下空則易受邪肝堅則臟安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下痛也脾小則臟安脾大則苦湊䏚而痛不能疾行脾高則䏚引季脅而痛胸脅好者肝堅脅骨弱者肝脆脅骨偏舉者肝偏傾也標本病傳論曰夫病傳者心病先心痛一日而咳三日脅支痛五日閉塞不通身痛體重三日不已死肺病喘咳三日而脅支滿痛一日身重體痛五日而脹十日不已死肝病頭目眩脅支滿三日體重身痛五日而脹三日腰脊少腹痛脛酸三日不已死腎病少腹腰脊痛胻酸三日背膂筋痛小便閉三日腹脹三日兩脅支痛三日不已死諸病以次是相傳如是者皆有死期不可刺氣交變大論曰歲木太過風氣流行民病反脅痛而吐甚歲火太過炎暑流行甚則胸中痛脅支滿脅痛歲金太過燥氣流行肝木受邪民病兩脅下少腹痛胠脅不可轉側歲木不及燥乃大行民病中清胠脅痛歲火不及寒乃大行民病胸中痛脅支滿兩脅痛歲土不及復則收政嚴峻名木蒼凋胸脅暴痛下引少腹木不及其眚東其臟肝其病內舍胠脅外在關節火不及其眚南其髒心其病內舍膺脅外在經絡金不及其眚西其臟肺其病內舍膺脅肩背外在皮毛六元正紀大論曰厥陰所至為脅痛嘔泄金鬱之發民病咳逆心脅滿引少腹善暴痛不可反側木鬱之發民病胃脘當心而痛上支兩脅至真要大論曰歲厥陰在泉風淫所勝民病心痛支滿兩脅裡急飲食不下歲陽明在泉燥淫所勝民病心脅痛不能反側厥陰司天民病胃脘當心而痛上支兩脅膈咽不通飲食不下少陰司天熱淫所勝民病胸中煩熱右胠滿陽明司天民病左胠脅痛心脅暴痛不可反側厥陰之勝胃脘當心而痛上支兩脅太陰之勝病在胠脅陽明之勝清發於中左胠脅痛陽明之復清氣大來病生胠脅氣歸於左論證共三條脅痛之病本屬肝膽二經以二經之脈皆循脅肋故也然而心肺脾胃腎與膀胱亦皆有脅痛之病此非諸經皆有此證但以邪在諸經氣逆不解必以次相傳延及少陽厥陰乃致脅肋疼痛故凡以焦勞憂慮而致脅痛者此心肺之所傳也以飲食勞倦而致脅痛者此脾胃之所傳也以色欲內傷水道壅閉而致脅痛者此腎與膀胱之所傳也傳至本經則無非肝膽之病矣至於忿怒疲勞傷血傷氣傷筋或寒邪在半表半裡之間此自本經之病病在本經者直取本經傳自他經者必拔其所病之本辨得其真自無不愈矣一脅痛有內傷外感之辨凡寒邪在少陽經乃病為脅痛耳聾而嘔然必有寒熱表證者方是外感如無表證悉屬內傷但內傷脅痛者十居八九外感脅痛則間有之耳一脅痛有左右血氣之辨其在諸家之說有謂肝位於左而藏血肺位於右而藏氣故病在左者為血積病在右者為氣鬱脾氣亦繫於右故濕痰流注者亦在右若執此說則左豈無氣右豈無血食積痰飲豈必無涉於左乎古無是說此實後世之謬談不足憑也然則在氣在血何以辨之但察其有形無形可知之矣蓋血積有形而不移或堅硬而拒按氣痛流行而無跡或倏聚而倏散若食積痰飲皆屬有形之證第詳察所因自可辨識且凡屬有形之證亦無非由氣之滯但得氣行則何聚不散是以凡治此者無論是血是痰必皆兼氣為主而後隨宜佐使以治之庶得肯棨之法無不善矣論治共三條一外感證邪在少陽身發寒熱而脅痛不止者宜小柴胡湯三柴胡飲或河間葛根湯之類酌宜用之若外邪未解而兼氣逆脅痛者宜柴胡疏肝散主之若元氣本虛陰寒外閉邪不能解而脅痛畏寒者非大溫中飲不可一內傷肝膽氣逆不順而脅痛者宜排氣飲推氣散沉香降氣散木香調氣散之類主之若鬱結傷肝中脘不快痛連兩脅或多痰者宜香橘湯若暴怒傷肝氣逆脹滿胸脅疼痛者宜解肝煎若怒氣傷肝因而動火脅痛脹滿煩熱或動血者宜化肝煎若氣滯胸脅痛而兼喘者宜分氣紫蘇飲若男子憂鬱傷肝兩脅疼痛者宜枳實散若男婦肝腎氣滯自下而上痛連兩脅者宜木通散若悲哀煩惱肝氣受傷脈緊脅痛者枳殼煮散若因驚氣逆脅痛不已者桂枝散若食積作痛但痛有一條槓起者是也大和中飲或用保和丸若痰飲停伏胸脅疼痛者導痰湯加白芥子若肝火內郁二便不利兩脅痛甚者當歸龍薈丸或左金丸若從高跌墜血流脅下作痛者復元活血湯若婦人血滯脅腹連痛者芍藥散決津煎若肝脾血虛或鬱怒傷肝寒熱脅痛者逍遙散若肝腎虧損脅肋作痛頭眩心跳身痛或婦人經水不調經後作痛者補肝散一內傷虛損脅肋疼痛者凡房勞過度腎虛羸弱之人多有胸脅間隱隱作痛此肝腎精虛不能化氣氣虛不能生血而然凡人之氣血猶源泉也盛則流暢少則壅滯故氣血不虛則不滯虛則無有不滯者倘於此證不知培氣血而但知行滯通經則愈行愈虛鮮不殆矣惟宜左歸飲小營煎及大補元煎之類主之或有微滯者用補肝散亦可若憂思過度耗傷心脾氣血病有如前者宜逍遙飲三陰煎七福飲之類主之或歸脾湯亦可若以勞倦過傷肝脾氣血而病如前者宜大營煎大補元煎之類主之灸法治卒脅痛不可忍者用蠟繩橫度兩乳中半屈繩從乳斜趨痛脅下繩盡處灸三十壯更灸章門七壯丘墟三壯可針入五分脅痛論列方三陰煎新補十一七福飲新補七小柴胡湯散十九逍遙散補九二歸脾湯補三二三柴胡飲新散三逍遙飲新因一推氣散和三七七大溫中飲新散八枳實散和三七六導痰湯和九一柴胡疏肝散散百十香橘湯和三七四解肝煎新和十一當歸龍薈丸寒一六七桂枝散散百十一化肝煎新寒十復元活血湯外二百四十小營煎新補十五決津煎新因二左歸飲新補二河間葛根湯散百十二大營煎新補十四芍藥散婦百三十補肝散婦九二沉香降氣散和四十排氣飲新和六木通散攻百十一大補元煎新補一木香調氣散和四四左金丸寒一五四大和中飲新和七分氣紫蘇飲和三七五保和丸小三五枳殼煮散散百九論外備用方柴胡清肝散寒五九肝火梔子清肝散寒六十風熱桃仁承氣湯攻四瘀血神芎丸攻七三風痰神保丸攻五三寒氣食積大黃附子湯攻百十二寒積控涎丹攻八二痰白朮丸和三七八息積加味小柴胡湯散二一傷寒木香順氣散和四三肝氣腰痛經義脈要精微論曰腰者腎之府轉搖不能腎將憊矣腎脈搏堅而長其色黃而赤者當病折腰邪氣臟腑病形篇曰腎脈緩甚為折脊五癃津液別篇曰五穀之精液和合而為膏者內滲入於骨空補益腦髓而下流於陰股陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛酸本神篇曰腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸經脈篇曰足少陰之別名曰大鐘當踝後繞跟別走太陽實則閉癃虛則腰痛取之所別也膀胱足太陽也是動則病沖頭痛目似脫項如拔脊痛腰似折肝足厥陰也是動則病腰痛不可以俯仰脈解篇曰太陽所謂腫腰脽痛者正月太陽寅寅太陽也正月陽氣出在上而陰氣盛陽未得自次也故腫腰脽痛也少陰所謂腰痛者少陰者腎也十月萬物陽氣皆傷故腰痛也厥陰所謂腰脊痛不可以俯仰者三月一振榮華萬物一俯而不仰也骨空論曰督脈為病脊強反折腰痛不可以轉搖急引陰卵刺八髎與痛上八髎在腰尻分間刺腰痛篇曰足太陽脈令人腰痛以下共十七證各有刺法具詳本篇雜病篇曰腰痛痛上寒取足太陽陽明痛上熱取足厥陰不可以俯仰取足少陽終始篇曰刺諸痛者其脈皆實故曰從腰以上者手太陰陽明皆主之從腰以下者足太陰陽明皆主之病在上者下取之病在下者高取之病在頭者取之足病在腰者取之膕病痛者陰也痛而以手按之不得者陰也深刺之病在上者陽也病在下者陰也癢者陽也淺刺之熱論篇曰傷寒一日巨陽受之故頭項痛腰脊強刺瘧篇曰足太陽之瘧令人腰痛足厥陰之瘧令人腰痛腎瘧者令人灑灑然腰脊痛先腰脊痛者先刺郤中出血論證共三條腰痛證舊有五辨一曰陽虛不足少陰腎衰二曰風痹風寒濕著腰痛三曰勞役傷腎四曰墜墮損傷五曰寢臥濕地雖其大約如此然而猶未悉也蓋此證有表裡虛實寒熱之異知斯六者庶乎盡矣而治之亦無難也一腰痛證凡悠悠戚戚屢發不已者腎之虛也遇陰雨或久坐痛而重者濕也遇諸寒而痛或喜暖而惡寒者寒也遇諸熱而痛及喜寒而惡熱者熱也鬱怒而痛者氣之滯也憂愁思慮而痛者氣之虛也勞動即痛者肝腎之衰也當辨其所因而治之一腰為腎之府腎與膀胱為表裡故在經則屬太陽在臟則屬腎氣而又為衝任督帶之要會所以凡病腰痛者多由真陰之不足最宜以培補腎氣為主其有實邪而為腰痛者亦不過十中之二三耳論治共七條一腰痛之虛證十居八九但察其既無表邪又無濕熱而或以年衰或以勞苦或以酒色斫喪或七情憂鬱所致者則悉屬真陰虛證凡虛證之候形色必清白而或見黎黑脈息必和緩而或見細微或以行立不支而臥息少可或以疲倦無力而勞動益甚凡積而漸至者皆不足暴而痛甚者多有餘內傷稟賦者皆不足外感邪實者多有餘故治者當辨其所因凡腎水真陰虧損精血衰少而痛者宜當歸地黃飲及左歸丸右歸丸為最若病稍輕或痛不甚虛不甚者如青娥丸煨腎散補髓丹二至丸通氣散之類俱可擇用一腰痛之表證凡風寒濕滯之邪傷於太陽少陰之經者皆是也若風寒在經其證必有寒熱其脈必見緊數其來必驟其痛必拘急兼酸而多連脊背此當辨其陰陽治從解散凡陽證多熱者宜一柴胡飲或正柴胡飲之類主之若陰證多寒者宜二柴胡飲五積散之類主之其有未盡當於傷寒門辨治一濕滯在經而腰痛者或以雨水或以濕衣或以坐臥濕地凡濕氣自外而入者總皆表證之屬宜不換金正氣散平胃散之類主之若濕而兼虛者宜獨活寄生湯主之若濕滯腰痛而小水不利者宜胃苓湯或五苓散加蒼朮主之若風濕相兼一身盡痛者宜羌活勝濕湯主之若濕而兼熱者宜當歸拈痛湯蒼朮湯之類主之若濕而兼寒者宜濟生朮附湯五積散之類主之一腰痛有寒熱證寒證有二熱證亦有二凡外感之寒治宜溫散如前或用熱物尉之亦可若內傷陽虛之寒治宜溫補如前熱有二證若肝腎陰虛水虧火盛者治當滋陰降火宜滋陰八味煎或用四物湯加黃柏知母黃芩梔子之屬主之若邪火蓄結腰腎而本無虛損者必痛極必煩熱或大渴引飲或二便熱澀不通當直攻其火宜大分清飲加減主之一跌撲傷而腰痛者此傷在筋骨而血脈凝滯也宜四物湯加桃仁紅花牛膝肉桂玄胡乳香沒藥之類主之若血逆之甚而大便閉結不通者宜元戎四物湯主之或外以酒糟蔥姜搗爛罨之其效尤速一丹溪云諸腰痛不可用參補氣補氣則疼愈甚亦不可峻用寒涼得寒則閉遏而痛甚此言皆未當也蓋凡勞傷虛損而陽不足者多有氣虛之證何為參不可用又如火聚下焦痛極而不可忍者速宜清火何為寒涼不可用但虛中挾實不宜用參者有之雖有火而熱不甚不宜過用寒涼者亦有之若謂概不可用豈其然乎余嘗治一董翁者年逾六旬資稟素壯因好飲火酒以致濕熱聚於太陽忽病腰痛不可忍至求自盡其甚可知余為診之則六脈洪滑之甚且小水不通而膀胱脹急遂以大分清飲倍加黃柏龍膽草一劑而小水頓通小水通而腰痛如失若用丹溪之言鮮不誤矣是以不可執也新按一婦人以胎氣經水損陰為甚故尤多腰痛腳痠之病宜當歸地黃飲主之述古共三條陳無擇曰腎著之候其體重腰冷如水食飲如故小便自利腰已下冷重如帶五千錢治宜流濕兼用溫散藥腎著湯主之又滲濕湯亦治腎著丹溪治法曰腎虛腰痛用杜仲龜板黃柏知母枸杞五味之類豬脊髓丸服瘀血用補陰丸加桃仁紅花濕熱蒼朮杜仲黃柏川芎之類痰積作痛二陳加南星加快氣藥佐之使痰隨氣運腰曲不能伸者針人中立愈徐東皋曰腰者腎之外候一身所恃以轉移闔闢者也蓋諸脈皆貫於腎而絡於腰脊腎氣一虛腰必痛矣除墜傷之外不涉於虛其於風寒濕熱雖有外邪多有乘虛相犯而驅邪之中又當有以究其本也舉世之人每每醉以入房欲竭其精耗散其真務快其心恬不知養其不虛者幾希豫見房室勞傷腎氣腰脊兼痛久則髓減骨枯發為骨痿者有矣豈直腰痛已哉養生君子不可以不慎於斯也甫年少時常有腰痛及閃挫之病每服補腎湯丸僅得不甚而易愈尚不知房室之害也豫稟性淡於欲事自壬子以來多遊江湖間欲漸稀而腰痛亦稀至辛酉之後集此書兼視病家無暇而欲益寡腰覺強健而絶無痛作之因可見寡欲之功優於補劑多矣並書於此為君子告焉簡易方太平聖惠方治風冷寒痹腰痛用川烏頭三個生搗為末少加鹽水調攤於紙帛上貼痛處須臾止又方治卒患腰腳疼痛用杜仲一兩制水二鍾煎一鍾再用羊腎四枚細切去脂膜入藥湯煮熟次入韭白鹽花椒薑醬醋作羹空腹食之二三次即腰腳倍健針灸法灸腰痛不可俯仰令患人正立以竹杖柱地平臍點記乃以度背於脊中點記隨年壯灸之腎俞三壯或七壯崑崙三壯委中剌出血沉腳腰腫痛腰痛論列方青娥丸補一四三煨腎散和二八二大分清飲新寒五四物湯補八補髓丹補一四一當歸地黃飲新補二十補陰丸寒百六十二至丸熱一二八當歸拈痛湯寒百三十左歸丸新補四右歸丸新補五元戎四物湯攻二六二陳湯和一五積散散三九滋陰八味煎新寒十七平胃散和十七胃苓湯和百九十濟生朮附湯補四二五苓散和一八二腎著湯熱一二九羌活勝濕湯和一七八滲濕湯和一七四一柴胡飲新散一獨活寄生湯和二百七十蒼朮湯寒一三三二柴胡飲新散二不換金正氣散和二一通氣散婦一三一正柴胡飲新散六論外備用方麋茸丸補一三四加味青娥丸補一四四滋陰大補丸補一二六舒筋湯和七七跌閃胡桃湯和二八四腎虛調營活絡飲和二八二損傷瘀血芍藥散婦一三一婦人血滯生附湯熱二四寒濕沉香桂附丸熱百十一陽虛
