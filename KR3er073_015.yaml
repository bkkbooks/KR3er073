body:
  text: 卷之十五性集雜證謨寒熱經義陰陽應象大論曰積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也陽勝則熱陰勝則寒重寒則熱重熱則寒寒傷形熱傷氣風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄喜怒傷氣寒暑傷形冬傷於寒春必病溫春傷於風夏生飧泄夏傷於暑秋必咳瘧秋傷於濕冬生咳嗽陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏陰勝則身寒汗出身常清數栗而寒寒則厥厥則腹滿死能夏不能冬天之邪氣感則害人五臟水穀之寒熱感則害於六腑地之濕氣感則害皮肉筋脈天元紀大論曰神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水故在天為氣在地成形形氣相感而化生萬物矣五運行大論曰上下相構寒暑相臨氣相得則和不相得則病百病始生篇曰風雨寒熱不得虛邪不能獨傷人四氣調神論曰春氣之應養生之道也逆之則傷肝夏為寒變奉長者少夏氣之應養長之道也逆之則傷心秋為咳瘧奉收者少秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少金匱真言論曰長夏善病洞泄寒中氣交變大論曰歲木太過風氣流行脾土受邪歲火太過炎暑流行肺金受邪歲土太過雨濕流行腎水受邪歲金太過燥氣流行肝木受邪歲水太過寒氣流行邪害心火歲木不及燥乃大行生氣失應歲火不及寒乃大行長政不用歲土不及風乃大行化氣不令歲金不及炎火乃行生氣乃用歲水不及濕乃大行長氣反用宣明五氣篇曰心惡熱肺惡寒肝惡風脾惡濕腎惡燥是謂五惡經脈篇曰肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變大腸所生病者氣有餘則當脈所過者熱腫虛則寒栗不復胃所生病者氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛心主所生病者面赤目黃喜笑不休煩心心痛掌中熱膽所生病者足外反熱頭痛頷痛目鋭眥痛缺盆腋下腫痛馬刀俠癭汗出振寒瘧氣厥論曰腎移寒於脾癰腫少氣脾移寒於肝癰腫筋攣肝移寒於心狂隔中心移寒於肺肺消肺消者飲一溲二死不治肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹水水之病也脾移熱於肝則為驚衄肝移熱於心則死心移熱於肺傳為鬲消肺移熱於腎傳為柔痓腎移熱於脾傳為虛腸澼死不可治胞移熱於膀胱則癃溺血膀胱移熱於小腸膈腸不便上為口糜小腸移熱於大腸為慮瘕為沉大腸移熱於胃善食而瘦又謂之食㑊胃移熱於膽亦曰食㑊膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄衊瞑目故得之氣厥也壽夭剛柔篇曰風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒傷形乃應形風傷筋脈筋脈乃應咳論曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳刺志論曰氣虛身熱此謂反也氣盛身寒得之傷寒氣虛身熱得之傷暑氣實者熱也氣虛者寒也調經論曰血氣者喜溫而惡寒寒則泣不能流溫則消而去之帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚不收肌肉堅緊營血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛帝曰陰之生虛奈何曰喜則氣下悲則氣消消則脈空虛因寒飲食寒氣熏滿則血泣氣去故曰虛矣帝曰陽虛則外寒奈何曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗帝曰陰虛生內熱奈何曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱帝曰陽盛生外熱奈何曰上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱帝曰陰盛生內寒奈何曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則脈不通其脈盛大以泣故中寒刺節真邪論曰陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽陰陽別論曰三陽為病發寒熱脈要精微論曰風成為寒熱太陰陽明論曰故犯賊風虛邪者陽受之陽受之則入六腑入六腑則身熱不時臥上為喘呼風論曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其寒也則衰飲食其熱也則消肌肉故使人怢栗而不能食名曰寒熱風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出舉痛論曰寒則腠理閉氣不行故氣收矣炅則腠理開營衛通汗大泄故氣泄矣氣穴論曰營衛稽留衛散營溢氣竭血著外為發熱內為少氣疾瀉無怠以通營衛見則瀉之無問所會邪溢氣壅脈熱肉敗營衛不行必將為膿內銷骨髓外破大膕留於節腠必將為敗積寒留舍營衛不居卷肉縮筋肋肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也脈解篇曰陽明所謂灑灑振寒者陽明者午也五月盛陽之陰也陽盛而陰氣加之故灑灑振寒也經筋篇曰經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸淬刺者刺寒急也熱則筋縱不收無用燔針大惑論曰人之善飢而不嗜食者何氣使然岐伯曰精氣並於脾熱氣留於胃胃熱則消穀故善飢胃氣逆上則胃脘寒故不嗜食也逆調論帝曰人身非常溫也非常熱也為之熱而煩滿者何也岐伯曰陰氣少而陽氣勝故熱而煩滿也帝曰人身非衣寒也中非有寒氣也寒從中生者何曰是人多痹氣也陽氣少陰氣多故身寒如從水中出帝曰人有四肢熱逢風寒如炙如火者何也曰是人者陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽獨治獨治者不能生長也獨勝而止耳逢風而如炙如火者是人當肉爍也帝曰人有身寒湯火不能熱厚衣不能溫然不凍栗是為何病曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨骨不生則髓不能滿故寒甚至骨也所以不能凍栗者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍栗病名曰骨痹是人當攣節也評熱病篇曰邪氣之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出也小便黃者少腹中有熱也奇病論曰肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也論痛篇帝曰人之病或同時而傷或易已或難已其故何如少俞曰同時而傷其身多熱者易已多寒者難已五邪篇曰邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩背取之膺中外腧背三節五節之傍以手疾按之快然乃刺之取之缺盆中以越之邪在肝則兩脅中痛寒中惡血在內行善掣節時腳腫取之行間以引脅下補三里以溫胃中取血脈以散惡血取耳間青脈以去其掣邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調於三里五癃津液別篇曰天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下留於膀胱則為溺與氣通評虛實論帝曰乳子而病熱脈懸小者何如岐伯曰手足溫則生寒則死帝曰乳子中風熱喘鳴肩息者脈何如曰喘鳴肩息者脈實大也緩則生急則死脈要精微論曰粗大者陰不足陽有餘為熱中也沉細數散者寒熱也諸浮不躁者皆在陽則為熱其有躁者在手諸細而沉者皆在陰則為骨痛其有靜者在足陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒推而外之內而不外有心腹積也推而內之外而不內身有熱也論疾診尺篇曰尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也尺膚寒其脈小者泄少氣尺膚炬然先熱後寒者寒熱也尺膚先寒久大之而熱者亦寒熱也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後粗以下三四寸熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上白肉有青血脈者胃中有寒尺炬然熱人迎大者當奪血尺堅大脈小甚少氣悗有加立死診寒熱赤脈上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死邪氣臟腑病形篇曰憂愁恐懼則傷心形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行帝曰病之六變奈何岐伯曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱澀者多血少氣微有寒平人氣象論曰寸口脈沉而弱沉而喘曰寒熱緩而滑曰熱中尺寒脈細謂之後泄尺粗常熱者謂之熱中經絡論曰寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤皮部論曰其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也邪留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗五色篇曰五色奈何曰青黑為痛黃赤為熱白為寒是為五官人迎盛堅者傷於寒氣口盛堅者傷於食經脈篇曰凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也六元正紀大論帝曰夫子言用寒遠寒用熱遠熱願聞何謂遠岐伯曰熱無犯熱寒無犯寒從者和逆者病不可不敬畏而遠之所謂時興六位也帝曰余欲不遠寒不遠熱奈何曰發表不遠熱攻裡不遠寒帝曰不發不攻而犯寒犯熱何如曰寒熱內賊其病益甚帝曰願聞無病者何如曰無者生之有者甚之帝曰生者何如曰不遠熱則熱至不遠寒則寒至寒至則堅否腹滿痛急下痢之病生矣熱至則身熱吐下霍亂癰疽瘡瘍瞀郁注下瞤瘈腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋祕之病生矣帝曰治之奈何曰時必順之犯者治以勝也師傳篇岐伯曰夫治民與自治未有逆而能治之者也夫惟順而已矣百姓人民皆欲順其志也帝曰順之奈何曰入國問俗入家問諱上堂問禮臨病人問所便帝曰便病人奈何曰中熱消疸則便寒寒中之屬則便熱胃中熱則消穀令人懸心善飢臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢小腹痛脹至真要大論曰寒者熱之熱者寒之微者逆之甚者從之帝曰何謂逆從岐伯曰逆者正治從者反治從少從多觀其事也帝曰有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也八正神明論曰天溫日明則人血淖溢而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉是以天寒無刺天溫無凝月生無瀉月滿無補月郭空無治是謂得時而調之骨空論曰灸寒熱之法先灸項大椎以年為壯數次灸撅骨以年為壯數視背俞陷者灸之舉臂肩上陷者灸之兩季脅之間灸之外踝上絶骨之端灸之足小指次指間灸之腨下陷脈灸之外踝後灸之缺盆骨上切之堅痛如筋者灸之膺中陷骨間灸之掌束骨下灸之臍下關元三寸灸之毛際動脈灸之膝下三寸分間灸之足陽明跗上動脈灸之顛上一灸之犬所齧之處灸之三壯凡當灸二十九處傷食灸之不已者必視其經之過於陽者數刺其俞而藥之論證病有寒熱者由陰陽之有偏勝也凡陽勝則熱以陰之衰也陰勝則寒以陽之衰也故曰發熱惡寒者發於陽也無熱惡寒者發於陰也此寒熱之病有不同而陰陽之不可不察也又若外來之寒熱由風寒之外感內生之寒熱由臟氣之內傷此寒熱之因有不同而表裡之不可不察也雖曰陽證多熱陰證多寒然極熱者反有寒證極寒者亦有熱證此又真假之不可不察也雖曰外入之邪多有餘內出之邪多不足然陽盛生外熱陽虛生外寒陰盛生內寒陰虛生內熱此又虛實之不可不察也諸如此者有證可據有脈可診有因可問且經文盡發其深祕已列前條余有寒熱篇亦悉其證候具在首卷及傷寒門亦有寒熱辨但因此以詳求其理則可盡悉其要而辨治自無難也一寒熱真假篇義詳一卷及火證門論虛火條中一治法有逆從論在一卷論治篇中論諸寒證治共五條凡寒病之由於外者或由風寒以傷形或由生冷以傷臟其由於內者或由勞欲以敗陽或由稟賦之氣弱若寒自外入者必由淺及深多致嘔惡脹滿或為疼痛泄瀉寒由內生者必由臟及表所以戰栗憎寒或為厥逆拘攣總之熱者多實寒者多虛故凡治寒證者當兼察其虛而仍察其臟此不易之法也一凡陰毒寒邪直中三陰者此即傷寒類所謂直中陰經之陰證也其於倉卒受寒以致身冷戰栗或四體拘攣或心腸疼痛或口噤失音昏迷厥逆或吐瀉蜷臥脈來微細或沉緊無神者皆其證也切不可妄用風藥再散其氣但速宜溫中則寒邪自散輕則理中湯溫胃飲甚則四逆湯大溫中飲或附子理陰煎之類主之其有勢在危急唇青囊縮無脈者宜用華陀救陽脫方急治之或仍灸氣海關元二三十壯但得手足漸溫脈微出者乃可生也一方以胡椒研碎用滾酒泡服外用蔥鹽尉法一方用黑豆二合炒熱以酒烹入滾數沸去豆取酒服二碗即愈一寒中太陰則中脘疼痛宜理中湯溫胃飲寒中少陰則臍腹疼痛宜歸氣飲或五積散加吳茱萸寒中厥陰則少腹疼痛宜四逆湯歸氣飲暖肝煎其有寒中三陰而寒滯不散因致脹滿痛甚者宜暫用排氣飲或韓氏溫中湯先散其滯然後調補之或用五味沉附湯或暖肝煎俱可擇用一生冷內傷以致臟腑多寒或為疼痛或為嘔吐或為泄瀉等證治法隨見各門又或素稟陽臟每多恃強好食生冷茶水而變陽為陰者治亦同前一稟賦素弱多有陽衰陰勝者此先天之陽氣不足也或斫喪太過以致命門火衰者此後天之陽氣失守也其證則未冷先寒或手足清厥或身為寒栗或脾胃不健或肚腹不實或小水頻數或陽道不壯或每多恐畏或眼耳少神是皆陽虛生寒也治宜溫補元氣其微者宜五君子煎理陰煎六氣煎溫胃飲壽脾煎之類擇而用之其甚者宜大補元煎右歸飲右歸丸四味回陽飲六味回陽飲海藏八味地黃丸之類主之其有脾腎虛寒每多腹痛飧泄腎泄者宜九氣丹一氣丹並於泄瀉門求法治之論諸熱證治共四條凡熱病之作亦自有內外之辨如感風寒而傳化為熱或因時氣而火盛為熱此皆外來之熱即傷寒瘟疫時毒咳瘧之屬也至若內生之熱則有因飲食而致者有因勞倦而致者有因酒色而致者有因七情而致者有因藥餌而致者有因過暖而致者有因陰虛而致者有偶感而致者有積纍而致者雖其所因不同而病候無過表裡故在外者但當察經絡之深淺在內者但當察臟腑之陰陽凡此諸證在各門具有方論者茲不再贅且熱即火也故治熱之法即當於火證門通融用之其有未盡之義仍列於後一治熱之法凡微熱之氣宜涼以和之大熱之氣宜寒以制之鬱熱在經絡者宜疏之發之結熱在臟腑者宜通之利之陰虛之熱者宜壯水以平之無根之熱者宜益火以培之此其中有宜降者所謂高者抑之也有宜散者所謂下者舉之也有相類者所謂逆者正治也有相反者所謂從者反治也治熱之法不過如此而鮮有得其善者豈亦由學力之未至乎一五臟之熱證有可據者如肺氣上通於鼻而下主於皮毛心氣上通於舌而下主於血脈脾氣上通於口而下主於四肢胃氣上通於頭面牙齦而下主於肌肉肝氣上通於目而下主於筋節腎氣上通於喉耳而下主於二陰而六腑之氣亦可因表裡以察之此皆病在形體也凡有諸中者必形諸外故必有熱證可據方可以熱論治醫中關係惟此為最一治五臟之熱當察微甚如心經之微熱者宜二陰煎安神丸天王補心丹導赤散之類皆可隨證酌用其熱甚者如瀉心湯黃連解毒湯八正散直指黃芩湯及犀角地黃湯三方皆其類也肺經微熱者宜加減一陰煎正傳麥門冬湯瀉白散之類主之其熱甚者宜黃芩清肺飲黃芩知母湯之類主之肝經微熱者宜化肝煎保陰煎熱甚者宜加味龍膽瀉肝湯芍藥清肝散七正散脾胃微熱者清化飲黃芩芍藥湯陽明熱甚者白虎湯太清飲瀉黃散玉泉散腎經微熱者一陰煎滋陰八味丸熱甚者正氣湯丹溪大補陰丸腎虛兼胃火者玉女煎膀胱微熱者五淋散熱甚者大分清飲化陰煎三焦微熱者徙薪飲熱甚者抽薪飲大連翹飲涼膈散三補丸大金花丸之類擇宜用之凡清火退熱方論甚多此亦言其約耳欲盡其義當詳考寒陳二類論寒熱往來證治共三條凡寒熱往來之病其證有二蓋一以外邪不解而然一以陽盛陰虛而然此其一為表證一為里證所當辨治不可紊也一寒邪鬱伏經絡而為寒為熱此似瘧非瘧之類也治法雖宜表散然邪氣得以久留者必其元氣之虛而正不勝邪也故凡治此者皆當以兼補血氣為主若血分微虛形氣本不甚弱而邪有不解者三柴胡飲若火盛血燥而寒熱不已者一柴胡飲若因勞倦或氣體本弱或肝脾不足而邪有不淨者四柴胡飲或五柴胡飲或補中益氣湯若陽邪陷入陰分微兼內熱而邪有不解者補陰益氣煎若脾胃陽氣不健中氣不暖而邪有不解者溫胃飲若病久元氣大虛而寒熱不退者但當單培元氣不必兼散宜五福飲歸脾湯或大補元煎理陰煎之類察其陰陽擇而用之若果陽虛非用溫補不可一陰虛陽盛或陰陽俱虛而為寒熱往來者此以真陰不足總屬虛損之病也然其陰陽微甚亦所當辨如晝則熱而夜則靜者此陽邪王於陰分陽有餘也晝則靜而夜則熱者此陽邪陷入陰中陰不足也其有晝夜俱熱或兼煩躁多汗而本非外感者此證雖曰重陽而實則陰虛之極也又有下見溏泄或上見嘔惡而潮熱夜熱者此元氣無根陽虛之病也大都陽實者宜瀉其陽瀉陽者宜用苦寒陰虛者宜補其陰補陰者宜用甘涼惟陽虛一證則身雖有熱大忌寒涼此則人多不識也然陰虛則病熱而陰氣未竭者治之猶易陽虛則病寒而陽氣未竭者治之亦易若孤陽無陰而寒之不可孤陰無陽而熱之又不可斯所謂兩死之證也無能為力矣若陰虛陽盛而寒熱往來或夜熱不止者加減一陰煎若心經蘊熱火在陽分而煩熱往來者二陰煎若盜汗不止而夜熱者當歸六黃湯若陰虛血熱崩淋不止而夜熱者保陰煎若肝火不清時多鬱怒而為煩熱者徙薪飲若婦人多郁多怒而寒熱不止者加味逍遙散若三陰虧損血虛火盛而煩熱不止者地黃膏三才封髓丹若男婦小兒凡脾胃受傷陽虛火浮而為潮熱夜熱者必用理陰煎或溫胃飲或大補元煎之類方可保全此證最多此治最妙勿以此為奇談也述古華元化曰人之寒熱往來者其病何也此乃陰陽相勝也陽不足則先寒後熱陰不足則先熱後寒又上盛則發熱下盛則發寒皮寒而躁者陽不足皮熱而躁者陰不足皮寒而寒者陰盛也皮熱而熱者陽盛也熱發於下則陰中之陽邪也熱發於上則陽中之陽邪也寒起於上則陽中之陰邪也寒起於下則陰中之陰邪也頰赤多言而寒者陽中之陰邪也面青多言而熱者陰中之陽邪也面青多言而寒者陰中之陰邪也若不言者不可治也陰中之陰中者一生九死陽中之陽中者九生一死陰病難治陽病易醫診其脈候滑實在上則陽中之陽也滑實在下則陰中之陽也微弱在上則陽中之陰也微弱在下則陰中之陰也滑實在中則中熱微弱在中則中寒寒用熱取熱以寒攻逆順之法從乎天地本乎陰陽也從之者生逆之者死金匱大要論曰夜發寒者從夜發熱者逆晝發熱者從晝發寒者逆逆從之道亦在乎審明寒熱論列方四逆湯熱十四理中湯熱一四味回陽飲新熱一溫胃飲新熱五暖肝煎新熱十五六味回陽飲新熱二壽脾煎新熱十六化肝煎新寒十補中益氣湯補三十六氣煎新因二一歸氣飲新熱十四補陰益氣煎新補十六理陰煎新熱三五福飲新補六韓氏溫中湯熱八九歸脾湯補三二五積散散三九五味沉附湯熱百十六右歸飲新補三右歸丸新補五海藏八味丸補一二一一氣丹新熱二二九氣丹新熱二三滋陰八味丸新寒十七一陰煎新補八二陰煎新補十加減一陰煎新補九玉女煎新寒十二化陰煎新寒七當歸六黃湯寒六五白虎湯寒二瀉白散寒四二加味逍遙散補九三清化飲新因十三瀉黃散寒五七天王補心丹補百八玉泉散新寒十五太清飲新寒十三三才封髓丹寒一六六保陰煎新寒一瀉心湯寒二七華他陽脫方熱四六抽薪飲新寒三徙薪飲新寒四黃連解毒湯寒一七正散寒百十六八正散寒百十五黃芩芍藥湯寒百九五淋散寒百十七導赤散寒一二二芍藥清肝散寒六一正氣湯寒六六涼膈散攻十九黃芩知母湯寒五一三補丸寒一六二安神丸寒一四二黃芩清肺飲寒三八排氣飲新和六地黃膏寒九一直指黃芩湯寒百七大溫中飲新散八大補元煎新補一丹溪大補陰丸寒一五七五君子煎新熱六大分清飲新寒五正傳麥門冬湯寒四四大連翹飲寒七八大金花丸攻五五犀角地黃湯寒八十八一八二一柴胡飲新散一三柴胡飲新散三四柴胡飲新散四五柴胡飲新散五加味龍膽瀉肝湯寒六四論外備用方人參養營湯補二一加味歸脾湯補三三調中益氣湯補三一虛邪朮附湯補四一中寒參附湯補三七厥冷金匱大建中湯補二三中寒逍遙散補九二血虛發熱聖愈湯補九十虛熱八味大建中湯補二五陰寒人參固本丸補百六陰虛熱益陰腎氣丸補一二五七味白朮散補五五虛熱渴柴苓湯和一九二寒熱瀉藿香正氣散和二十風寒龍腦雞蘇丸和三七二陰虛煩熱四逆散散二八熱厥小柴胡湯散十九加減小柴胡湯散二二寒熱腹痛九味羌活湯散四四外邪寒熱退熱湯寒九三急勞大熱秦艽扶羸湯寒九二虛勞黃耆鱉甲煎寒九十虛勞地骨皮散寒七四熱渴局方大已寒丸熱百七十中寒十補丸熱一七三腎虛寒已寒丸熱一七二阻陽於下元戎大己寒丸熱一七一冷祕四逆湯熱十四寒厥附子湯熱二二背惡寒附子理中湯熱二寒厥溫胃湯熱十二溫中三建湯熱四二陰寒厥逆扶陽助胃湯熱百十五中寒保命柴胡四物湯補十二虛勞暑證經義熱論曰凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止生氣通天論曰因於暑汗煩則喘滿靜則多言體若燔炭汗出而散刺志論曰氣盛身寒得之傷寒氣虛身熱得之傷暑金匱真言論曰夏暑汗不出者秋成風瘧陰陽應象大論曰夏傷於暑秋必咳瘧論證共七條暑本夏月之熱病然有中暑而病者有因暑而致病者此其病有不同而總由於暑故其為病則有陰陽二證曰陰暑曰陽暑治猶冰炭不可不辨也陰暑者因暑而受寒者也凡人之畏暑貪涼不避寒氣則或於深堂大廈或於風地樹陰或以乍熱乍寒之時不謹衣被以致寒邪襲於肌表而病為發熱頭痛無汗惡寒身形拘急肢體痠痛等證此以暑月受寒故名陰暑即傷寒也惟宜溫散為主當以傷寒法治之也又有不慎口腹過食生冷以致寒涼傷臟而為嘔吐瀉痢腹痛等證此亦因暑受寒但以寒邪在內治宜溫中為主是亦陰暑之屬也陽暑者乃因暑而受熱者也在仲景即謂之中暍凡以盛暑烈日之時或於長途或於田野不辭勞苦以致熱毒傷陰而病為頭痛煩躁肌體大熱大渴大汗脈浮氣喘或無氣以動等證此以暑月受熱故名陽暑治宜察氣之虛實火之微甚或補或清以固其氣此與陰暑之治大有不同若或因暑之名而不分表裡不察陰陽則誤人不淺矣一陰暑證或在於表或在於里惟富貴安逸之人多有之總由恣情任性不慎風寒所致也陽暑證惟辛苦勞役之人多有之由乎觸冒暑熱有勢所不容已也然暑熱逼人者畏而可避可避則犯之者少陰寒襲入者快而莫知莫知則犯之者多故凡有病暑者陽暑不多見而陰暑居其八九今之人治暑者但見發熱頭痛等證則必曰此中暑也而所用無非寒涼其不達也亦甚矣一傷寒之病雖同為寒邪而名有不同也傷暑之名雖可同為暑邪而病有不同也傷寒之名有不同者在冬之寒即謂之正傷寒在春之溫即謂之溫病在夏之暑即謂之暑病是溫病暑病亦皆傷寒之別名耳經曰冬傷於寒春必溫病又曰凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑即此謂也傷暑之病有不同者其因暑而感寒者寒則傷形即傷寒也因暑而受熱者熱則傷氣即傷暑也是內傷外感俱有暑病之不同耳經曰氣盛身寒得之傷寒氣虛身熱得之傷暑即此謂也蓋氣盛身寒者謂身受寒邪而氣無恙也故曰傷寒氣虛身熱者謂身冒暑熱而熱傷氣也故曰傷暑此義人多不解而謂傷寒者必身寒則於理不通而大昧經旨矣一夏月盛暑之時必令身有微汗此養身之道最得時宜者也若必使快然無汗則未免陰勝於陽多致疾矣觀之經曰暑當與汗皆出勿止是言暑汗之勿宜止也又曰夏暑汗不出者秋成風瘧是言暑汗不出之為病也此夏月之汗宜否蓋可知矣一夏月伏陰續論在前第二卷傳忠録中一暑有八證脈虛自汗身熱背寒面垢煩渴手足微冷體重是也凡治此者宜調理元氣為主清利次之一中暑死者不可使得冷得冷便死只宜以溫暖之物護其臍中徐徐治之論治共五條一陰暑證凡暑月外感風寒以致陰邪抑遏陽氣而病為發熱頭痛肢體拘急痠疼無汗惡寒脈緊等症此即傷寒之屬治以解散為主宜正柴胡飲小柴胡湯或一二三四柴胡飲之類酌其寒熱虛實隨宜用之若脈見微細氣體虛弱不可發汗者但宜補中氣使元氣漸充則寒邪自散不必攻邪也或用補中益氣湯主之若邪感於外而火盛於內或陽明熱甚者宜柴胡白虎煎之類主之若寒邪在表未解而六脈微細背冷惡寒或嘔惡泄瀉內無熱證者此正伏陰在內而邪不易解雖在暑月亦速宜溫中如理陰煎理中湯大溫中飲麻桂飲之類皆宜速用不可疑也亦不可遲也若邪盛於外而中不甚虛者或以五積散以上諸證有不能盡者俱宜以傷寒門諸法察而治之一陰暑證凡內傷生冷致損胃氣而病為腹痛泄瀉嘔吐者治宜以溫中散寒為主若初受寒邪停積未散而脾氣未虛者先宜以抑扶煎五德丸之類主之若胃氣微虛者宜佐關煎五德丸主之若胃氣再虛者宜溫胃飲理中湯主之若吐瀉已甚脾腎兼傷而痛連小腹二陰或成痢者宜胃關煎理陰煎或九氣丹之類主之若表中寒邪內傷主冷表裡俱病者宜兼治之以和胃飲加柴胡或溫胃飲加柴胡或新方諸柴胡飲察虛實而用之古方用大順散為溫中之總治亦何足以盡之也一陽暑以酷熱傷人本為熱證然陽中又有陰陽此不可不辨凡暑熱中人者其氣必虛以火能剋金而熱傷氣也然熱者不可不清虛者不可不補但陽中之陽者宜兼乎清如身熱頭痛煩躁大渴大汗脈洪滑喜冷水大便乾結小水赤痛之類皆陽證也若氣不甚虛而但有火證者宜白虎湯或益元散主之或火盛之甚者惟玉泉散更妙若汗出脈虛浮煩渴有火而少氣者宜白虎加人參湯或仲景竹葉石膏湯宣明桂苓甘露飲之類主之若眩暈少氣雖煩渴而火不甚者宜生脈散主之以上諸法用治陽中之陽皆古法之善者若雖壯熱口渴而脈虛無力或重按全無及神困氣促者此脾胃氣虛元陽不足假火之證若誤用白虎等劑其危立至一凡中暑熱者人皆知為陽證而不知陽中有陰也蓋外中熱邪而內亦熱者此表裡俱熱方是陽證治宜清補如前若內本無熱而因熱傷氣但氣虛於中者便有伏陰之象故凡治暑熱之證最當辨其陰陽虛實若脈虛無力或為惡寒背寒或為嘔惡或為腹痛泄瀉或四肢鼻尖微冷或不喜涼茶涼水或息短氣促無力以動之類皆陽中之陰證也凡見此類但當專顧元氣惟宜獨參湯徐徐與之為最妙若兼微嘔惡寒者宜加煨薑與人參等分主之再其甚者則養中煎理中湯五君子煎或五福飲理陰煎之類皆當隨宜用之若虛寒之甚則舍時從證桂附皆所必用切不可因暑熱之名而執用寒涼解暑等劑再伐陽氣則變有不可測也若夏月於盛暑中過於勞倦因而中暑者其勞倦既已傷脾暑熱又以傷氣此本內傷大虛之候當專以調補為先然後察其有火無火或有邪無邪而兼治如前可也一夏月因暑致病而醫有不知伏陰誤投寒劑以致吐瀉腹痛或外熱內寒煩躁多渴狀若傷寒但察其脈微神困便是陰盛格陽之證速宜溫藥以救其內一夏月既傷暑熱復傷生冷外熱內寒者當專以內寒為主有滯者清其滯無滯者益其氣但溫中理脾脾氣既復而暑無不退也論香薷飲香薷飲乃夏月通用之藥餌常見富貴之家多有備此令老少時常服之用以防暑而不知人之宜此者少不宜此者多也若誤用之必反致疾何也蓋香薷一物氣香竄而性沉寒惟其氣竄所以能通達上下而去菀蒸之濕熱惟其性寒所以能解渴除煩而清搏結之火邪然必果屬陽臟果有火邪果脾胃氣強肥甘過度而宜寒畏熱者乃足以當之且賴其清涼未必無益若氣本不充則服之最能損氣火本非實而服之乃以敗陽凡素稟陰柔及年質將半飲食不健軀體素弱之輩不知利害而效尤妄用者未有不反助伏陰損傷胃氣而致為吐瀉腹痛及陰寒危敗等證若加黃連其寒尤甚厚朴破氣均非所宜用者不可不審述古共六條仲景曰其傷於四時之氣皆能為病冬時嚴寒中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也凡時行者春時應暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也曰太陽中熱者暍是也其人汗出惡寒身熱而渴白虎加人參湯主之太陽中暍者身熱疼痛而脈微弱此亦夏月傷冷水水行皮中所致也一物瓜蒂湯吐之太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛叢手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚潔古曰靜而得之為中暑動而得之為中熱中暑者陰證中熱者陽證陳無擇曰暑熱喜歸心心中之使人噎悶昏不知人入肝則眩暈頑痹入脾則昏睡不覺入肺則喘滿痿躄入腎則消渴凡中暍死者治之切不可用冷惟宜溫養道途中無湯即以熱土尉臍中仍使更溺其土取以罨於臍上概可見矣凡覺中暑急嚼生薑一大塊水送下如已迷悶嚼大蒜一大瓣水送下如不能嚼水研灌之立醒戴氏曰夏月卒倒不省人事名曰暑風王節齋曰治暑之法清心利小便最好暑傷氣宜補真氣為要又有惡寒或四肢逆冷甚者迷悶不省而為霍亂吐痢痰滯嘔逆腹痛瀉痢此則非暑傷人乃因暑而自致之病也以其因暑而得故亦謂之暑病治法不同若吐瀉脈沉微甚者不可用涼藥可用附子大順散或附子理中湯加芍藥若夏月多食冷物及過飲茶水致傷脾胃則吐瀉霍亂故治暑藥多宜溫脾消食治濕利小便醫者要識此意薛立齋曰按東垣先生云暑熱之時無病之人或避暑熱納涼於深堂大廈得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛煩熱無汗為房室陰寒之氣所遏使周身陽氣不得伸越以大順散熱藥主之若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛躁熱惡熱肌熱大渴汗泄懶動為天熱外傷肺氣以蒼朮白虎湯涼劑主之若人元氣不足用前藥不應宜補中益氣湯主之大抵夏月陽氣浮於外陰氣伏於內若人飲食勞倦內傷中氣或酷暑勞役外傷陽氣者多患之法當調補元氣為主而佐以解暑若中暑乃陰寒之證法當補陽氣為主少佐以解暑故先哲多用薑桂附子之類此推內經舍時從證之良法也今患暑證歿而手足指甲或肢體青黯此皆不究其因不溫補其內而泛用香薷飲之類所誤也又曰前證當分別中暑中暍脈虛脈沉無汗有汗發熱不熱作渴不渴或瀉不瀉飲寒飲熱辨其陰陽虛實不可泛投寒涼之劑蓋謂夏月伏陰在內古人用附子大順散之類溫補陽氣厥有旨哉何今人之老弱至夏月患食少體倦發熱作渴或吐瀉腹痛頭痛諸證反服香薷飲復傷元氣無不招引暑證以致不起至若清暑益氣湯內用澤瀉蒼朮黃柏之類必審其果有濕熱壅滯方可用之否則反致虧損其陰用當審察暑證論列方理中湯熱一理陰煎新熱三柴胡白虎煎新散十二益元散寒百十二玉泉散新寒十五竹葉石膏湯寒五養中煎新熱四溫胃飲新熱五四柴胡飲新散四胃關煎新熱九佐關煎新熱十大溫中飲新散八五德丸新熱十八九氣丹新熱二三五君子煎新熱六麻桂飲新散七香薷飲和一六九補中益氣湯補三十生脈散補五六小柴胡湯散十九清暑益氣湯和一六八白虎湯寒二五福飲新補六正柴胡飲新散六蒼朮白虎湯寒二和胃飲新和五一柴胡飲新散一白虎加人參湯寒三抑扶煎新熱十一二柴胡飲新散二附子大順散熱七八五積散散三九三柴胡飲新散三一物瓜蒂湯攻百五宣明桂苓甘露飲寒八論外備用方五物香薷飲和百七十十味香薷飲和一七一黃連香薷飲和一七二中熱縮脾飲和一七三暑毒吐瀉四物地榆散寒九六昏迷子和桂苓甘露飲寒九虛熱渴火證經義天元紀大論曰君火以明相火以位神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水故在天為氣在地為形形氣相感而化生萬物矣天地者萬物之上下也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之終始也寒暑燥濕風火天之陰陽也三陰三陽上奉之木火土金水火地之陰陽也生長化收藏下應之天以陽生陰長地以陽殺陰藏甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元五運行大論曰燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固矣六微旨大論曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之相火之下水氣承之君火之下陰精承之君位臣則順臣位君則逆所謂二火也至真要大論曰少陰司天為熱化在泉為苦化不司氣化居氣為灼化少陽司天為火化在泉為苦化司氣為丹化間氣為明化藏氣法時論曰五行者金木水火土也更貴更賤以知死生以決成敗而定五臟之氣間甚之時死生之期也陰陽應象大論曰水為陰火為陽壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣逆調論曰一水不能勝二火故不能凍栗病名曰骨痹是人當攣節也詳列寒熱門解精微論雷公請問哭泣之水所從生涕所從出也帝曰水之精為志火之精為神水火相感神志俱悲是以目之水生也帝曰厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也夫一水不勝五火故目眥盲是以衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也有以比之夫火疾風生乃能雨此之類也示從容論曰二火不勝三水是以脈亂而無常也寶命全形論曰木得金而伐火得水而滅土得木而達金得火而缺水得土而絶萬物盡然不可勝竭至真要大論帝曰願聞病機何如岐伯曰諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘛皆屬於火諸痛癢瘡皆屬於心諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸禁鼓栗如喪神守皆屬於火諸痙項強皆屬於濕諸逆衝上皆屬於火諸脹腹大皆屬於熱諸躁狂越皆屬於火諸暴強直皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之盛者瀉之虛則補之必先五勝疏其血氣令其調達而致和平此之謂也論君火相火之病經曰君火以明相火以位此就火德辨陰陽而悉其形氣之理也蓋火本陽也而陽之在上者為陽中之陽故曰君火陽之在下者為陰中之陽故曰相火此天地生成之道也其在於人則上為君火故主於心下為相火故出於腎主於心者為神明之主故曰君火以明出於腎者為發生之根故曰相火以位至其為病則以明者其化虛故君火之氣有晦有明以位者其化實故相火之病能焚能燎何也蓋化虛者無形者也故其或衰或王惟見於神明神惟貴足衰則可畏也化實者有形者也故其為熱為寒必著於血氣確有證據方可言火也此其一清一濁有當辨者如此然清濁雖二而氣稟則一故君火衰則相火亦敗此以無形者虧及有形者也相火熾則君火亦炎此以有形者病及無形者也夫生以神全病惟形見故火邪之為病必依於有位有形之相火所謂邪火者即所謂凡火也即所謂燎原之火也惟不得其正所以為病故別以邪火名之而實非可以君相併言也故在內經則又謂之畏火正以此火有形故可畏也夫病以有形之火須治以有形之物故形而火盛者可瀉以苦寒之物形而火衰者可助以甘溫之物此以形治形而治火之道止於是矣至若無形之火則生生息息窈窈冥冥為先天之化為後天之神為死生之母為玄牝之門又豈於形迹之間可能摹擬者哉故有形之火不可縱無形之火不可殘有能知火之邪正而握其盈虛伸縮之權者則神可全病可卻而生道在我矣即吾有形吾又何患論病機火證觀內經至真要大論所列病機凡言火者五言熱者四似皆謂之火也然諸病之見於諸篇者復有此言熱而彼言寒此言實而彼言虛者豈果本經之自為矛盾耶蓋諸篇所言在專悉病情故必詳必盡在本篇所言亦不過總言五運六氣之大約原非確指為實火實熱也故於篇末復以有無虛實四字總結於後此軒岐之明見萬世正恐後人誤以火熱二字悉認為真因而曉示如此此其火有虛實熱有真假從可知矣余以劉河間原病式之謬故於類經惟引經釋經不敢杜撰一言冀在解人之惑以救將來之誤耳前三卷中別有詳辨並類經詳注俱當互閲求正論虛火共三條凡虛火證即假熱證也余於首卷寒熱真假篇已言之詳矣然猶有未盡者如虛火之病源有二虛火之外證有四何也蓋一曰陰虛者能發熱此以真陰虧損水不制火也二曰陽虛者亦能發熱此以元陽敗竭火不歸源也此病源之二也至若外證之四則一曰陽戴於上而見於頭面咽喉之間者此其上雖熱而下則寒所謂無根之火也二曰陽浮於外而發於皮膚肌肉之間者此其外雖熱而內則寒所謂格陽之火也三曰陽陷於下而見於便溺二陰之間者此其下雖熱而中則寒所謂失位之火也四曰陽亢乘陰而見於精血髓液之間者此其金水敗而鉛汞干所謂陰虛之火也此外證之四也然證雖有四而本惟二或在陰虛或在陽虛而盡之矣第陰虛之火惟一曰金水敗者是也陽虛之火有三曰上中下者是也凡治此者若以陰虛火盛則治當壯水壯水之法只宜甘涼不宜辛熱若以陽虛發熱則治宜益火益火之法只宜溫熱大忌清涼第溫熱之效速每於一二劑間便可奏功甘涼之力緩非多服不能見效也然清涼之藥終不宜多多則必損脾胃如不得已則易以甘平其庶幾耳倘甘平未效則惟有甘溫一法斯堪實濟尚可望其成功否則生氣之機終非清涼所能致也此義最微不可不察一氣本屬陽陽氣不足則寒從中生寒從中生則陽無所存而浮散於外是即虛火假熱之謂也而假寒之證其義亦然是以虛火實火亦總由中氣之有虛實耳凡氣實於內而為寒者有如嚴冬陽伏於下而陰凝於上故冰雪滿地而井泉溫暖也氣虛於內而為熱者有如盛夏陰盛於中而陽浮於外故炎暑逼人而淵源清冷也天地間理原如此故不可見熱即云熱見寒即云寒而務察其寒熱之本一火有虛實故熱有假真而察之之法總當以中氣為之主而外證無足憑也故凡假熱之證本中寒也假寒之證本內熱也中寒者原是陰證內熱者原是陽證第以惑者不明故妄以寒證為假熱熱證為假寒而不知內熱者當遠熱內寒者當遠寒內有可據本皆真病又何假之有論五志之火經曰天有四時五行以生長收藏以生寒暑燥濕風人有五臟化五氣以生喜怒思憂恐是即所謂五志也此五志之化由乎五臟而五臟之化由乎五行故在心為喜心主火也在肝為怒肝主木也在脾為思脾主土也在肺為憂肺主金也在腎為恐腎主水也此五志各有分屬本不可以混言者也且人有此生即有此志使無此志生亦何為是生之與志本不能離亦不可離而人於食息之常孰不以五志為生亦孰不以五志為用而未聞以五志之動皆為火也第或以用志失宜則未免有傷臟氣故在內經則但言五臟之傷各有所屬五氣之傷各有所病亦未聞以五志之傷皆云火也而五火之説乃始於劉河間云五志所傷皆熱也丹溪述河間而衍之曰五志之動各有火起劉宗厚又述丹溪而衍之曰大怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀動中則火起於肺心為君主自焚則死矣自三子之説行則似乎五行悉化而為火理豈然乎余嘗察五志所傷之人但見其憔悴日增未見其俱為熱病也即因志動火者非曰必無但傷氣者十之九動火者十之一又豈五志皆能動火乎而矧以怒動肝氣者最易傷脾脾傷者不可以言火也醉飽能動胃火胃強者固自無恙脾弱而致病者不可以言火也房勞本動腎火精去而陽亢者可以火言精去而氣亦去者不可以言火也外如五志之傷則無非傷氣敗陽之證尚可謂之火乎無火治火則無有不敗者矣三卷中辨丹溪第二條下仍有一論當互閲之論火證共三條火為熱病是固然矣然火得其正即為陽氣此火之不可無亦不可衰衰則陽氣之虛也火失其正是以邪熱此火之不可有尤不可甚甚則真陰傷敗也然陽以元氣言火以病氣言故凡病在元氣者不得以火論何也蓋人之元氣止於充足焉得有餘既非有餘則何以言火所謂無形者其化虛即此是也惟病在形體者乃可以察火證蓋其不在氣即在血所謂有形者其化實即此是也故凡火之為病其在外者必見於皮肉筋骨其在內者必見於臟腑九竅若於形質之間本無熱證可據而曰此火也此熱也則總屬莫須有之妄談也矧如火證悉具而猶有虛實之殊真假之異其可不為詳辨乎若果有火病則火性急烈誠可畏也然實火止隨形質余因謂之凡火又謂之邪火火之為病病之標耳洗之滌之又何難哉惟虛火之病則本於元氣元氣既虛而再攻其火非梃即刃矣是以諸病之殺人而尤惟火病為最者正以凡火未必殺人而以虛作實則無不殺之矣不忍見也一凡五臟之火肺熱則鼻乾甚則鼻涕出肝熱則目眵濃心熱則言笑多脾熱則善飢善渴腎熱則小水熱痛凡此之類宜從清也諸所不盡詳一卷寒熱篇一凡察火證必須察其虛實雖其元氣本虛然必虛中挾實者乃為易治何以見之如或大便乾結或善飢多食或神氣精明或聲音強壯而脈見有力此皆虛中有實也俱可隨證清解之若或內外俱熱而反見溏泄或飲食少進或聲微氣短諸虛皆見而反不利溫補者此其胃氣已敗生意已窮非吉兆也論治火共五條治實火諸法凡微熱之氣惟涼以和之宜徙薪飲四陰煎二陰煎或加減一陰煎黃芩芍藥湯黃芩清肺飲之類酌宜用之大熱之氣必寒以除之宜抽薪飲白虎湯太清飲黃連解毒湯玉泉散三補丸之類主之火甚而兼脹滿閉結實熱者宜涼膈散八正散三黃丸大金花丸之類主之凡火盛虛煩乾渴或有熱毒難解者宜用緑豆飲或雪梨漿間藥朝夕飲之退火解毒最速且無所傷誠妙法也一鬱熱之火宜散而解之如外邪鬱伏為熱者宜正柴胡飲小柴胡飲或升陽散火湯之類主之若鬱熱在經而為癰疽為瘡疹者宜連翹歸尾煎或芍藥蒺藜煎或當歸蒺藜煎之類主之或於本門求法治之此皆火鬱發之之謂也一虛火之與假熱其氣皆虛本或相類然陰陽偏勝亦有不同如陰虛生熱者此水不足以濟火也治當補陰其火乃息宜一陰煎左歸飲左歸丸六味地黃丸之類主之此所謂壯水之主也如寒極生熱而火不歸原即陰盛隔陽假熱證也治宜溫補血氣其熱自退宜理陰煎右歸飲理中湯大補元煎六味回陽飲之類主之此所謂益火之源也又曰溫能除大熱也凡假熱之證以腎陰大虛則陽無所附而浮散於外故反多外熱此內真寒外假熱也若非峻補真陰何以復其元氣元氣不復則必由散而盡矣但外熱既甚多見口瘡舌裂喉乾咽痛煩渴喜冷等證而辛熱溫補之劑難以入口故薛立齋治韓州同之勞熱以加減八味丸料一斤內肉桂一兩煎五六碗用水浸冰冷與服此法最善余因效之嘗以崔氏八味丸料或右歸飲用治陰虛假熱傷寒及勞熱煩渴等證服後頓退而虛寒悉見乃進溫補無不愈者此真神妙法也一實火宜瀉虛火宜補固其法也然虛中有實者治宜以補為主而不得不兼乎清如加減一陰煎保陰煎天王補心丹丹溪補陰丸之類是也若實中有虛者治宜以清為主而酌兼乎補如清化飲徙薪飲大補陰丸之類是也凡此虛中之實實中之虛本無限則故不得謂熱者必無虛虛者必無熱但微虛者宜從微補微熱者宜從微清若熱倍於虛而清之不及漸增無害也若虛倍於熱而清之太過則伐及元陽矣凡治火者不可不知此義一瀉火諸藥黃連梔子瀉心肝大腸之火山梔仁降火從小便出其性能屈下行石膏瀉腸胃之火陽明經有實熱者非此不可黃芩清脾肺大腸之火黃柏瀉肝腎諸經之火知母清肺胃肝腎之火地骨皮退陰中之火善除骨蒸夜熱生地麥冬清肝肺涼血中之火天門冬瀉肺與大腸之火桑白皮川貝母土貝母解上焦肺胃之火柴胡乾葛解肝脾諸經之鬱火龍膽草瀉肝腎膀胱之火槐花清肝腎大腸之火能解諸毒芍藥石斛清脾胃之火滑石利小腸膀胱之火天花粉清痰止渴解上焦之火連翹瀉諸經之浮火玄參清上焦之浮火山豆根解咽喉之火膽星開心脾胃脘之痰火青黛蘆薈胡黃連瀉五臟之疳熱鬱火苦參瀉疳蝕之火木通下行瀉小腸之火澤瀉車前子利癃閉之火人中白清肝脾腎之陰火童便降陰中血分之浮火大黃朴硝瀉陽明諸經實熱之火人參黃耆白朮甘草除氣虛氣脫陽分散失之火熟地黃當歸枸杞山茱萸滋心腎不交陰分無根之火附子乾薑肉桂救元陽失位陰盛格陽之火凡此治火之法已若盡之然亦不過言其筌蹄耳而神而通之原不可以筆楮盡也述古啓玄子曰病之微小者猶人火也遇草而焫遇木而燔可以濕伏可以水折故逆其性氣以折之攻之病之大甚者猶龍火也得濕而焰得水而燔不知其性以水濕折之適足以光焰詣天物窮方止識其性者反常之理以火逐之則燔灼自消焰火撲滅矣火證論列方白虎湯寒二抽薪飲新寒三徙薪飲新寒四玉泉散新寒十五涼膈散攻十九清化飲新因十三三補丸寒一六二三黃丸攻六八八正散寒百十五緑豆飲新寒十四雪梨漿新寒十六太清飲新寒十三一陰煎新補八保陰煎新寒一理中湯熱一理陰煎新熱三左歸飲新補二左歸丸新補四右歸飲新補三大金花丸攻五五大補元煎新補一小柴胡湯散十九正柴胡飲新散六大補陰丸寒一五七六味地黃丸補百二十加減八味丸外三八六味回陽飲新熱二升陽散火湯散四一天王補心丹補百八丹溪補陰丸寒百六十黃連解毒湯寒一連翹歸尾煎新因三二芍藥蒺藜煎新因三五當歸蒺藜煎新因三四論外備用方凡寒陳所列古方新方俱可酌用神芎丸攻七二清涼飲子因百三
