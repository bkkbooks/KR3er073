白茯苓澤瀉茵陳青皮陳皮防己各五分梔子黃芩各八分黃連枳實各七分蒼朮白朮各一錢上水煎服東垣當歸拈痛湯治濕熱為病肢節煩疼肩背沉重胸膈不利手足遍身流注疼痛熱腫等證羌活黃芩炙甘草茵陳各五錢人參苦參升麻乾葛蒼朮各二錢防風歸身白朮知母豬苓澤瀉各一錢半上㕮咀每服一兩水煎空心服臨睡再服活人犀角散治腳氣衝心煩喘悶亂頭痛口乾坐臥不得犀角屑枳殼麩炒沉香各七錢半檳榔紫蘇莖葉麥門冬赤茯苓各一兩木香防風各半兩石膏生用研二兩上㕮咀每服八錢以水一鍾半煎八分去柤入淡竹瀝一合更煎一二沸不拘時溫服東垣清燥湯治六七月間濕熱成痿肺金受邪腰以下痿軟癱瘓不能動行走不正兩足欹側柴胡酒黃柏黃連麥冬各三分生地人參各一錢炙甘草豬苓白茯苓橘紅神麯澤瀉各五分白朮蒼朮各八分黃耆錢半知麻三分五味子九粒上㕮咀每服半兩水二盞煎一盞稍熱空心服蒼朮湯治濕熱腰腿疼痛蒼朮三錢柴胡二錢黃柏防風各一錢上用水煎空心服丹溪二妙散治濕熱在經筋骨疼痛如有氣加氣藥如血虛加補血藥如痛甚加薑汁熱辣服之黃柏炒蒼朮去皮炒制等分上為末搗生薑煎沸湯調服此二物皆有雄壯之氣如氣實者加少酒佐之此即集要二神湯各三錢半用水煎空心服一方以二妙為君加甘草羌活各二錢陳皮芍藥各一錢威靈仙酒炒五分為末服之佳加味二妙丸治兩足濕痹疼痛如火燎從兩足跗熱起漸至腰胯或麻痹痿軟皆是濕熱為病此方主之歸尾川牛膝川萆薢防己龜板酥炙各一兩蒼朮米泔浸炒四兩黃柏二兩酒浸曬乾酒煮麵糊為丸桐子大每服百丸空心薑鹽湯送下丹溪蒼朮黃柏丸治濕熱食積痰飲流注腳氣蒼朮鹽水炒黃柏鹽水炒防己南星川芎白芷犀角檳榔等分上為末酒糊丸服血虛加牛膝龜板肥人加痰藥正傳虎脛骨丸治兩足痿弱軟痛或如火焙從足踝下上衝腿膝等證因熱所成者經驗牛膝歸尾各二兩龜板酥炙虎脛骨酥炙防己各一兩蒼朮米泔浸一宿黃檗酒浸日曬各四兩上為細末麵糊為丸桐子大每服百餘丸空心薑鹽湯送下一方加炮附子五錢河間苦參丸治血虛風熱著痹苦參二兩取粉丹參炙沙參人參防風去叉五加皮蒺藜炒去刺烏蛇酒浸取肉蔓荊子龜板酥炙虎骨酥炙玄參各一兩上為細末用不蛀皂角一斤銼碎以水三升挪取汁於無油鐵器熬成膏加煉蜜四兩和丸桐子大每服十五丸至二十丸食後良久夜臥共三服荊芥薄荷酒下陳氏苦參丸方在外科治遍身瘙癢癬疥瘡瘍錢氏苦參丸方在痘疹治痘後潰爛瘡毒疥癩硃砂涼膈丸治上焦虛熱肺脘咽膈有氣如煙搶上黃連山梔各一兩人參茯苓各半兩硃砂三錢另研冰片五分另研上為細末煉蜜為丸桐子大硃砂為衣熟水送下五七丸日進三服食後東垣硃砂安神丸一名黃連安神丸治心神煩亂發熱怔忡不寐或寐中驚悸頭運等證生地硃砂另飛為衣當歸各一錢甘草五分黃連一錢半湯浸蒸餅為丸黍米大每服十五丸至二十丸津液咽之或食後用溫水涼水送下亦可錢氏安神丸治熱渴心悶脈實頰赤口燥麥冬馬牙硝白茯苓寒水石山藥甘草各五錢硃砂一兩龍腦一字上為末煉蜜丸芡實大每服一丸沙糖水化下祕旨安神丸方在小兒治心虛驚悸十味安神丸方在小兒治虛驚七味安神丸方在小兒治心熱多驚集驗龍腦安神丸治男婦小兒五積癲癇不論遠近發作無時但服此藥無不痊愈龍腦研麝香研牛黃研各三錢犀角屑人參茯神麥冬硃砂飛各二兩桑白皮炒地骨皮甘草炙各一兩馬牙硝二錢金箔三十五片為細末煉蜜丸彈子大金箔為衣寒用熱水熱用涼水不拘時化下一丸小兒半丸如病二三年者日進三服若男婦虛勞喘嗽發熱者用新汲水化下其喘滿痰嗽立止萬氏龍腦安神丸方在小兒治驚痰及痘中昏悶譫妄抑青丸治肝火黃連薑汁炒上單用一味為末粥丸溫水下錢氏抑青丸方在小兒治肝熱急驚搐搦瀉青丸治肝膽火並小兒急驚發搐眼赤睛疼龍膽草當歸川芎防風羌活山梔大黃等分煉蜜為丸桐子大每服五十丸瀉金丸治肺火用黃芩為末滴水丸白湯下丹溪茱連丸治濕熱吐酸黃連陳壁土炒二兩黃芩制同一兩陳皮蒼朮米泔浸吳茱萸煮少時浸半日曬乾各一兩或加桔梗茯苓各一兩上為末神麯糊丸緑豆大每服二三十丸食後津液送下左金丸治肝火脅肋刺痛或發寒熱或頭目作痛淋祕泄瀉一切肝火等證黃連六兩炒吳茱萸一兩湯泡片時炮乾用上為末粥丸梧子大白朮陳皮煎湯下三四五十丸大補丸治陰火黃柏鹽酒炒褐色米粥丸血虛四物湯送下氣虛四君子湯送下大造丸此方治陰虛血熱能使耳目聰明鬚髮烏黑有奪造化之功故名大造亦治心風失志虛勞水虧等證紫河車頭生壯盛者一具以米泔洗淨少加酒蒸極爛搗膏以山藥末收烘乾用或洗淨即以新瓦上焙乾用敗龜板自死者酥炙二兩黃柏鹽酒炒兩半杜仲酥炙兩半牛膝酒洗一兩二錢天門冬麥門冬各一兩二錢熟地二兩半用砂仁末六錢茯苓二兩一塊同稀絹包入好酒煮七次去茯苓不用夏加五味子七錢上除熟地黃另杵外共為末用酒煮米糊同熟地膏搗丸桐子大或蜜丸亦可每服八九十丸空心臨臥鹽湯薑湯任下冬月酒下婦人加當歸二兩去龜板男子遺精白濁婦人帶下加牡蠣一兩半丹溪大補陰丸降陰火補腎水黃柏鹽酒炒知母鹽酒炒各四兩熟地酒洗蒸搗爛龜板酥炙黃各六兩上為細末用豬脊髓蒸熟和煉蜜同搗為丸桐子大每服五六十丸空心薑鹽酒送下祕傳大補天丸治男婦虛損勞傷形體羸乏腰背疼痛遺精帶濁紫河車初胎者一具米泔洗淨入小砂罐內加水一碗煮沸候冷取起放竹籃中四圍用紙糊密烘乾為末入群藥和勻黃柏蜜炒知母乳炒龜板酥炙各三兩懷熟地五兩搗牛膝酒洗肉蓯蓉酒洗麥門冬山藥炒虎脛骨酥炙黃耆蜜炙茯神各兩半杜仲制何首烏制人參白芍藥冬月一兩枸杞各二兩生地酒洗沙鍋煮爛搗天門冬當歸酒洗北五味各一兩冬加乾薑半兩炒黑上為細末用豬脊髓三條蒸熟同煉蜜和搗為丸桐子大每服八十丸空心淡鹽湯下冬月酒下大補地黃丸治精血枯涸燥熱黃柏鹽酒炒熟地酒蒸各四兩當歸酒洗山藥炒枸杞各三兩知母鹽酒炒山茱萸白芍藥各二兩生地二兩半肉蓯蓉酒浸玄參各兩半上為末煉蜜丸桐子大每服七八十丸空心淡鹽湯送下丹溪補陰丸一名虎潛丸降陰火滋腎水黃柏制知母制熟地酒洗各三兩龜板酥炙四兩白芍酒炒當歸牛膝各二兩虎脛骨酥炙鎖陽酥炙陳皮各兩半上為細末酒煮羯羊肉為丸桐子大冬加乾薑半兩每服五六十丸姜鹽湯或酒下節齊補陰丸黃柏知母俱酒炒龜板各三兩熟地五兩鎖陽枸杞天冬白芍各二兩五味一兩乾薑五錢煉蜜入豬脊髓三條搗丸桐子大每服八九十丸空心淡鹽湯送下冬月用酒三補丸治三焦火熱黃連黃芩黃柏滴水丸桐子大白湯送下或淡鹽湯亦可東垣滋腎丸降腎火桂與火邪同體此寒因熱用法也凡不渴者病在下焦宜用之良方云或腎虛足熱小便不利肚腹腫脹皮膚脹裂眼睛突出此神劑也黃柏二兩酒拌陰乾知母同上肉桂二錢為細末熟水為丸百沸湯空心送下二百丸加味虎潛丸治諸虛不足腰腿疼痛行步無力壯元氣滋腎水熟地黃八兩人參黃耆炙當歸杜仲酥炙牛膝酒蒸鎖陽酒洗龜板酥炙菟絲子制茯苓破故紙炒黃柏蜜水炒知母酒炒虎骨酥炙各一兩山藥炒枸杞各二兩上煉蜜加豬脊髓酒蒸熟同搗丸桐子大每服百餘丸空心淡鹽湯或酒任下加味坎離丸生精養血升水降火川黃柏八兩分四分用清酒鹽水人乳蜜水各浸二兩曬乾炒褐色熟地八兩用茯苓四兩打碎砂仁二兩三味同入絹袋中好酒三瓶煮乾去茯苓砂仁止用地黃知母八兩鹽酒浸炒白芍酒浸一日曬乾當歸川芎各四兩上為末同鋪筐中日曬夜露三日為度煉蜜丸桐子大每服八九十丸空心鹽湯冬月溫酒任下三才封髓丹降心火益腎水天門冬熟地黃人參各一兩黃柏炒褐色三兩砂仁炒半兩甘草炙七錢上為末麵糊丸桐子大每服五七十丸以肉蓯蓉五錢切片酒浸一宿次日煎三四沸空心送下當歸龍薈丸治肝經實火大便祕結小便澀滯或胸膈作痛陰囊腫脹凡肝經實火皆宜用之及一切躁擾狂越驚悸不寧等證當歸龍膽草梔子仁黃連黃柏黃芩各一兩蘆薈大黃青黛各五錢木香二錢半麝香五分另研上為末神麯糊丸桐子大每服二三十丸薑湯白湯任下良方蘆薈丸治疳癖肌肉消瘦發熱潮熱飲食少思口乾作渴或肝火食積口鼻生瘡牙齦蝕爛等證蘆薈胡黃連黃連炒焦木香白蕪荑炒青皮各五錢當歸茯苓陳皮各兩半甘草炒七錢上為末米糊丸桐子大每服七八十丸米湯下大蘆薈丸方在小兒治小兒肝脾疳積發熱加減蘆薈丸方在小兒治證同前三聖丸治嘈雜神效白朮四兩炒橘紅炒一兩黃連炒五錢上為細末神麯糊丸緑豆大每服五六十丸薑湯下術連丸治嘈雜白朮四兩土炒黃連一兩薑汁炒上為末神麯糊丸黍米大每服百餘丸薑湯下軟石膏丸治嘈雜噯氣軟石膏煅半夏制南星制香附子炒梔子仁炒各等分上為細末米粥丸桐子大每服五七十丸薑湯下地榆丸治血痢下血極效地榆微炒當歸微炒阿膠糯米炒黃連去須訶子取肉炒木香曬乾烏梅肉各半兩上為細末煉蜜丸梧子大每服三五十丸空心或食前陳米飲吞下槐角丸治五種腸風下血並痔漏脫肛槐角炒黃芩地榆當歸防風枳殼麩炒上等分為細末米酒麵糊丸桐子大每服五六十丸空心清米飲送下極效一方有烏梅肉御藥阿膠丸治腸風下血黃連阿膠炒珠赤茯苓等分上將連茯為末阿膠用酒熬化和末衆手為丸食前米湯送三五十丸或共為末糊丸亦可聚金丸治酒毒大腸蓄熱下血黃芩防風各二兩黃連四兩半生半酒炒上為末醋糊丸梧子大每服七八十丸空心米飲下臟連丸治遠年近日腸風臟毒下血大鷹爪黃連半斤槐米二兩枳殼一兩防風粉草槐角香附牙皂木香各五錢上用陳倉米三合同香附一處為末外藥共為細末用豬大臟約長二尺洗淨裝入米附縛定量用水二大碗沙鍋炭火煮干即添水漫火煮爛如泥取起和藥搗勻丸桐子大每空心米飲下七八十丸忌面蒜生冷煎炙之物一料病痊局方酒蒸黃連丸治一切熱瀉便血並伏暑發熱解酒毒黃連半斤用淨酒二升浸以丸器置甑上蒸至爛取出曬乾上為末滴水丸每服五十丸食前溫水下黃連丸治腸紅便血痔瘡腫痛黃連吳茱萸等分上二味用滾湯同漉過罨一二日同炒揀開各另為末米糊丸桐子大每服二三錢糞前紅服茱萸丸糞後紅服黃連丸俱酒上此與左金丸稍同豬臟丸方在外科治大便痔漏下血保和丸方在小兒治飲食酒積停滯四順清涼飲方在攻陳治臟腑血熱煩渴祕結仲景白頭翁湯治熱痢下重者白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈再服一升
