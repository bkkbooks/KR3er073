body:
  text: 卷之五十七宇集古方八陳寒陳黃連解毒湯亦名解毒湯治火熱狂躁煩心口乾舌燥熱之甚者及吐下後熱不解脈洪喘急等證黃連黃芩黃柏梔子各等分上每服五錢水二鍾煎服仲景白虎湯治傷寒脈浮滑此表有熱里有邪宜用此以解內外之熱及一切中暑煩熱熱結斑黃狂躁大渴等證石膏一斤碎知母六兩甘草二兩糯米六合上四味以水一斗煮米熟去滓溫服一升日三服本方加蒼朮即名蒼朮白虎湯仲景白虎加人參湯此即人參白虎湯亦名化斑湯仲景法即於前白虎湯內加人參三兩用治服桂枝湯大汗出後大煩渴不解脈洪大者今近代止用人參二錢石膏五錢知母二錢甘草一錢糯米一撮以治赤斑口燥煩躁暑熱脈虛等證又河間名為人參石膏湯用治膈消煩熱但分兩加倍於今方活人白虎加桂枝湯治瘧但熱不寒及有汗者知母桂枝甘草炙粳米各一錢石膏一錢上咀水一鍾半煎八分溫服仲景竹葉石膏湯治陽明汗多而渴鼻衄喜水水入即吐及暑熱煩躁等證石膏一兩竹葉二十片半夏甘草各二錢麥冬人參各三錢粳米一撮此係今方分兩非仲景舊法水二鍾姜三片煎服一方云石膏二錢人參一錢其他以遞減之用者當酌宜也六味竹葉石膏湯治胃火盛而作渴石膏煅倍用之淡竹葉桔梗薄荷葉木通甘草各一錢水煎服竹葉黃耆湯治胃虛火盛作渴淡竹葉二錢人參黃耆生地黃當歸川芎麥冬芍藥甘草石膏煅黃芩炒各一錢水煎服按此方之用當去川芎為善外科仍有半夏宣明桂苓甘露飲治陽暑發熱煩躁水道不利等證滑石飛四兩石膏寒水石白朮各二兩茯苓澤瀉各一兩肉桂豬苓各五錢甘草二兩炙上為末每服三錢溫湯調下子和桂苓甘露飲治證同前脈虛而渴者當用此滑石一兩人參白朮茯苓甘草石膏寒水石乾葛澤瀉各一兩官桂木香藿香各一錢上為末每服三錢白湯調下千金甘露飲治男婦小兒胃中客熱口舌生瘡咽喉腫痛牙齦腫爛時出膿血及脾胃受濕瘀熱在內或醉飽多勞濕熱相搏致生膽病身面皆黃或身熱而腫大小便不調枇杷葉拭去毛生地黃熟地黃天門冬麥門冬黃芩石斛茵陳枳殼各一錢炙甘草五分上作一服水二鍾煎七分食後服本事方無麥冬茵陳有山豆根犀角屑治口齒證大有神效三黃石膏湯治疫癘大熱而躁石膏生三錢黃芩黃柏黃連各二錢豆豉半合麻黃八分梔子五枚打碎水二盞煎一盞連進三四盞則愈羌活升麻湯治暑月時行瘟熱病宜清熱解毒兼治內外者羌活升麻葛根人參白芍藥黃芩各一錢黃連石膏甘草生地黃知母各七分水二鍾姜三片棗一枚煎八分溫服東垣普濟消毒飲治疫癘憎寒壯熱頭面腫盛目不能開上喘咽喉不利口乾舌燥俗云大頭瘟病諸藥不效元泰和二年東垣制以濟人所活甚衆時人皆曰天方黃芩酒炒黃連酒炒各五錢人參三錢橘紅玄參生甘草桔梗柴胡各二錢薄荷葉連翹鼠黏子板藍根馬屁勃各一錢白殭蠶炒升麻各七分上為細末半用湯調時時服之半用蜜丸噙化服盡良愈或加防風川芎當歸薄荷細辛水二鍾煎一鍾食遠稍熱服如大便硬加酒蒸大黃一二錢以利之或熱腫甚者以砭針刺出其血芩連消毒飲治天行時疫大頭病發熱惡寒頸項腫脈洪痰痹等證柴胡桔梗羌活防風黃芩黃連連翹枳殼荊芥白芷川芎射干甘草水一鍾半姜三片煎服有痰者加竹瀝薑汁調服如祕結熱甚者先加大黃煎服利二三行後依本方加人參當歸調理河間六神通解散治發熱頭痛脈洪身熱無汗槌法有川芎羌活細辛三味麻黃甘草各一錢黃芩蒼朮各二錢石膏滑石各錢半豆豉十粒水二鍾加蔥姜同煮一鍾溫服仲景小陷胸湯治小結胸正在心下按之則痛脈浮滑者半夏三錢黃連錢半栝蔞仁二錢此非古數上先以水二鍾煎栝蔞至一鍾半乃入二藥同煎至八分溫服原方用黃連一兩半夏半升栝蔞實一枚水六升如法煮二升分三服雞子清飲治熱病五六日壯熱之甚大便祕結狂言欲走者雞子二枚取清芒硝細研寒水石細研各二三錢上以用新汲水一盞調藥末次下雞子清攪勻分二服按此法似不若以雪梨漿調二藥服之更妙仲景黃連阿膠湯治少陰傷寒二三日以上心中煩不得臥黃連四兩黃芩一兩芍藥二兩阿膠三兩雞子黃二枚上以水五升先煮前三味取二升去滓納膠煬盡小冷納雞子黃攪令相得溫服七合日三服梔子仁湯治發熱潮熱狂躁面赤咽痛梔子赤芍大青知母各一錢升麻柴胡黃芩石膏杏仁甘草各二錢豆豉百粒水煎溫服一方無豆豉又六味梔子仁湯在外科八仲景梔子豆豉湯治傷寒煩熱懊憹可為吐劑梔子十四枚擘香豉四合上用水四升先煮梔子得二升半內豉再煮取一升半去滓分二服溫進一服得吐者止後服仲景梔子厚朴湯治傷寒下後餘邪未清心煩腹滿起臥不安者梔子十四枚擘厚朴四兩姜炙枳實四兩炒以上三味用水三升半煮取一升半去滓分二服溫進一服得吐止後服仲景梔子乾薑湯治傷寒以丸藥大下之身熱不去微煩者若病人舊有微溏者不可用梔子十四枚擘乾薑三兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服仲景梔子柏皮湯治傷寒身黃髮熱者梔子十五枚甘草一兩黃柏二兩上三味以水四升煮取一升半去滓分溫再服解瘟疫熱毒瘟疫八九日後已經汗下不退口渴咽乾欲飲水者以蚯蚓糞名六一泥不拘多少擂新汲水飲之或用晚蠶砂亦可其熱甚者用新青布以冷水浸過略擠干置患人胸上以手按之良久布熱即易之須臾當汗出如水或作戰汗而解夏月極熱用此法他時不可用漏蘆丹麻湯方在外科治時毒頭面紅腫黃連香薷飲方在和陳治傷暑中熱局方瀉心湯治心火用川黃連去須為極細末每服一字或五分或一錢或湯或散臨臥服仲景甘草瀉心湯亦名半夏瀉心湯嘔而腸鳴心下痞者此方主之此方辛入脾而散氣半夏乾薑之辛以散結氣苦入心而泄熱黃連黃芩之苦以泄痞熱脾欲緩急食甘以緩之人參甘草大棗之甘以緩之也半夏半升洗黃連一兩乾薑黃芩甘草炙人參各三兩大棗十二枚擘上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服仲景生薑瀉心湯治傷寒汗解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑四兩切甘草炙人參黃芩各三兩乾薑一兩黃連一兩半夏半升洗大棗十二枚擘上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服此方無生薑即名半夏瀉心湯仲景大黃黃連瀉心湯治太陽傷寒汗下後色微黃心下痞按之濡其脈關上浮者大黃二兩黃連一兩上二味以微沸湯二升漬之須臾絞去滓分溫再服仲景附子瀉心湯治傷寒汗下後心下痞而復惡寒汗出者大黃一兩黃連黃芩各二兩附子一枚炮去皮破八片別煮取汁上前三味以麻沸湯二升漬之須臾絞去滓納附子汁分溫再服清心蓮子飲治熱在氣分口乾作渴小便淋濁或口舌生瘡咽疼煩躁黃芩麥冬地骨皮車前子炒甘草各錢半人參黃耆石蓮子柴胡茯苓各一錢上每服五錢水煎服良方加味通心飲治諸疝內熱脹痛及小便不利木通梔子仁黃芩瞿麥連翹枳殼川楝子甘草等分上咀每服五錢水一鍾半燈心二十根車前草五莖煎七分溫服清心湯治心受熱邪狂言叫罵動履失常黃連黃芩梔子連翹薄荷甘草芒硝大黃等分水一鍾半竹葉二十片煎八分溫服外科清心湯方在外科治瘡瘍腫痛發熱局方人參清肺湯治肺胃虛熱咳嗽喘急坐臥不安年久勞嗽唾痰人參杏仁去皮尖炒阿膠各一錢粟殼蜜炒一錢半炙甘草桑白皮知母地骨皮烏梅肉各五分水二鍾棗一枚煎八分食遠服人參平肺散治心火克肺金傳為咳嗽喘嘔痰涎壅盛胸膈痞滿咽喉不利人參天冬黃芩地骨皮陳皮青皮茯苓各八分知母一錢五味二十粒甘草炙五分桑白皮炒一錢半水二鍾姜三片煎八分食遠服黃芩清肺飲治肺熱小便不利宜用此清之梔子二錢黃芩一錢水煎服如不利加鹽豉二十粒清肺湯方在痘疹治麻疹咳嗽甚者東垣清肺飲子方在和陳治邪熱在氣分渴而小便不利萬氏清肺飲方在痘疹治痘疹肺熱喘嗽瀉白散治肺火大腸火喘急等證甘草一錢桑白皮地骨皮各二錢上為末水調服五味瀉白散方在因陳治眼目風熱翳膜外障正傳麥門冬湯治病後火熱乘肺咳嗽有血胸脅脹滿上氣喘急五心煩熱而渴天冬麥冬桑白皮各七分紫菀茸貝母各六分桔梗甘草各五分淡竹葉生地各一錢五味九粒水一鍾半棗一枚煎服類方麥門冬湯治肺熱氣衰血焦發落好怒唇口亦甚麥門冬遠志甘草煮去心人參黃芩生地黃茯神石膏煅各一兩甘草炙半兩上㕮咀每服一兩水煎服萬氏麥門冬湯方在痘疹治表邪麻疹火熱嗽甚家抄麥門冬飲治虛勞咳嗽午後嗽多者是也川芎當歸生地黃白芍藥麥門冬黃柏知母各一錢桑白皮八分五味子十五粒水二鍾姜一片棗一枚煎八分食後服宣明麥門冬飲子治膈消胸滿心煩氣多血少津液不足為消渴麥門冬生地黃人參五味子甘草炙茯神天花粉知母乾葛等分上咀每服一兩竹葉十四片水煎服二母散治肺熱咳嗽及疹後嗽甚者貝母去心童便洗知母等分乾生薑一片上水煎服或為末每服五分或一錢沸湯下陳氏二母散方在婦人治産後熱血上攻咳嗽喘促家抄黃芩知母湯治夏月火嗽有痰面赤煩熱黃芩知母桑白皮杏仁山梔天花粉貝母桔梗甘草等分水二鍾煎八分食遠服醫林桑白皮湯治肺氣有餘火炎痰盛作喘桑白皮半夏蘇子杏仁貝母山梔黃芩黃連各八分水二鍾姜三片煎八分溫服海藏紫菀散治嗽中有血虛勞久嗽肺痿紫菀阿膠知母貝母各錢半人參甘草茯苓桔梗各一錢五味子十二粒水二鍾煎八分食後服東垣清胃散治醇酒厚味或補胃熱藥太過以致牙痛不可忍牽引頭腦滿面發熱或齒齦潰爛喜冷惡熱此陽明之火也宜用此方生地錢半升麻當歸丹皮各一錢黃連錢半夏月倍之水煎服加味清胃散即前方加犀角連翹甘草祕驗清胃飲治一切風熱濕痰牙痛床腫血出動搖石膏梔子黃連黃芩當歸生地白芍蒼朮各一錢青皮八分細辛藿香荊芥穗各六分升麻五分丹皮甘草各四分水二鍾煎八分食後緩緩含飲之效錢氏瀉黃散治脾火山梔一兩石膏五錢藿香七錢防風四錢甘草三錢上㕮咀蜜酒拌略炒香為細末每服二錢水一鍾煎清汁飲和中湯治虛火嘈雜人參白朮茯苓陳皮半夏各一錢甘草五分黃連姜炒錢半大棗二枚水一鍾半加粳米一撮煎八分溫服薛氏柴胡清肝散治肝膽三焦風熱瘡瘍或怒火憎寒發熱或瘡毒結於兩耳兩脅前後或胸乳小腹下及股足等證柴胡黃芩炒各錢半山梔炒川芎人參各一錢甘草五分連翹桔梗各八分水一鍾半煎服梔子清肝散治肝膽三焦風熱耳內作癢或生瘡出水或脅肋胸乳作痛寒熱往來梔子柴胡丹皮各一錢當歸川芎芍藥牛蒡子炒茯苓各七分白朮甘草各五分上水煎服一方無白朮原機芍藥清肝散治眵多眊矂緊澀羞明赤脈貫晴臟腑祕結白朮川芎防風羌活桔梗滑石石膏芒硝各三分黃芩薄荷荊芥前胡炙甘草芍藥各二分半柴胡山梔知母各二分大黃四分水煎食遠熱服良方龍膽瀉肝湯亦名龍膽湯治肝經濕熱小便赤澀或脅脹口苦寒熱凡肝經有餘之證宜服之龍膽草酒拌炒人參天冬麥冬生甘草黃連炒山梔知母各五分黃芩七分柴胡一錢五味三分水一鍾半煎服七味龍膽瀉肝湯治肝火內炎如前諸證柴胡梢澤瀉車前子木通龍膽草歸梢生地各等分上㕮咀水二鍾煎一鍾空