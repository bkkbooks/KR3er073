body:
  text: 卷之二十六必集雜證謨頭痛經義五藏生成篇曰頭痛巔疾下虛上實過在足少陰巨陽甚則入腎心煩頭痛病在鬲中過在手巨陽少陰經脈篇曰膀胱足太陽也是動則病沖頭痛目似脫項如拔脈解篇曰陽明並於上上者則其孫絡太陰也故頭痛鼻鼽腹腫也通評虛實論曰頭痛耳鳴九竅不利腸胃之所生也著至教論曰三陽獨至者是三陽並至並至如風雨上為巔疾下為漏病脈要精微論曰來疾去徐上實下虛為厥巔疾推而下之下而不上頭項痛也平人氣象論曰寸口之脈中手短者曰頭痛脈要精微論曰厥成為巔疾顑痛剌手陽明與顑之盛脈出血顑痛刺足陽明曲周動脈見血立已不已按人迎於經立已項痛不可俯仰刺足太陽不可以顧刺手太陽也寒熱病篇曰陽迎頭痛胸滿不得息取之人迎足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間雜病篇曰厥挾脊而痛者至頂頭沉沉然目䀮䀮然腰脊強取足太陽膕中血絡奇病論帝曰人有病頭痛以數歲不已此安得之名為何病岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病名曰厥逆帝曰善厥病篇曰真頭痛頭痛甚腦盡痛手足寒至節死不治論證共二條凡診頭痛者當先審久暫次辨表裡蓋暫痛者必因邪氣久病者必兼元氣以暫病言之則有表邪者此風寒外襲於經也治宜疏散最忌清降有里邪者此三陽之火熾於內也治宜清降最忌升散此治邪之法也其有久病者則或發或愈或以表虛者微感則發或以陽勝者微熱則發或以水虧於下而虛火乘之則發或以陽虛於上而陰寒勝之則發所以暫病者當重邪氣久病者當重元氣此固其太綱也然亦有暫病而虛者久病而實者又當因脈因證而詳辨之不可執也一頭痛有各經之辨凡外感頭痛當察三陽厥陰蓋三陽之脈俱上頭厥陰之脈亦會於巔故仲景傷寒論則惟三陽有頭痛厥陰亦有頭痛而太陰少陰則無之其於辨之之法則頭腦額顱雖三陽俱有所會無不可痛然太陽在後陽明在前少陽在側此又各有所主亦外感之所當辨也至若內傷頭痛則不得以三陽為拘矣如本經所言下虛上實過在足少陰巨陽若厥病篇所論則足六經及手少陰少陽皆有之矣奇病論曰腦者陰也髓者骨之充也凡痛在腦者豈非少陰之病乎此內證外證之異所不可不察也厥病篇義詳類經論治共五條一外感頭痛自有表證可察蓋其身必寒熱脈必緊數或多清涕或兼咳嗽或兼脊背痠痛或兼項強不可以左右顧是皆寒邪在經而然散去寒邪其痛自止如川芎細辛蔓荊子柴胡之類皆最宜也若寒之甚者宜麻黃桂枝生薑蔥白紫蘇白芷之類隨其虛實而加減用之一火邪頭痛者雖各經皆有火證而獨惟陽明為最正以陽明胃火盛於頭面而直達頭維故其痛必甚其脈必洪其證必多內熱其或頭腦振振痛而兼脹而絶無表邪者必火邪也欲治陽明之火無如白虎湯加澤瀉木通生地麥冬之類以抑其至高之勢其效最速至若他經之火則芍藥天花芩連知柏龍膽梔子之類無不可擇而用之但治火之法不宜佐以升散蓋外邪之火可散而去內郁之火得升而愈熾矣此為忌也一陰虛頭痛即血虛之屬也凡久病者多有之其證多因水虧所以虛火易動火動則痛必兼煩熱內熱等證治宜壯水為主當用滋陰八味煎加減一陰煎玉女煎之類主之火微者宜六味地黃丸四物湯三陰煎左歸飲之類主之一陽虛頭痛即氣虛之屬也亦久病者有之其證必戚戚悠悠或羞明或畏寒或倦怠或食飲不甘脈必微細頭必沉沉遇陰則痛逢寒亦痛是皆陽虛陰勝而然治宜扶陽為主如理陰煎理中湯十全大補湯補中益氣湯之類皆可擇用或以五福飲五君子煎加川芎細辛蔓荊子之類以升達陽氣則最善之治也一痰厥頭痛諸古方書皆有此名目然以餘論之則必別有所因但以頭痛而兼痰者有之未必因痰頭痛也故兼痰者必見嘔惡胸滿脅脹或咳嗽氣粗多痰此則不得不兼痰治之宜二陳湯六安煎和胃飲平胃散加川芎細辛蔓荊子之類主之如多痰兼火者宜用清膈煎或二陳湯六安煎加黃芩天花粉之類主之火甚者加石膏亦可如多痰兼虛而頭痛者宜金水六君煎或六君子湯加芎辛之類酌而用之東垣治痰厥頭痛噁心煩悶頭旋眼黑氣短促上喘無力懶言心神顛倒目不能開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安臥如範天騋之妻因兩次下之而致頭痛者用半夏白朮天麻湯述古共三條活人書云頭痛者陽證也太陽證頭痛發熱惡寒無汗麻黃湯有汗桂枝湯若已發汗或未發汗頭痛如破者連須蔥白湯不止者葛根蔥白湯陽明證頭痛不惡寒反惡熱胃實也調胃承氣湯少陽頭痛小柴胡湯太陰少陰並無頭痛之證仲景只有厥陰一證吳茱萸湯東垣曰金匱真言論云東風生於春病在肝俞在頸項故春氣者病在頭又諸陽會於頭面如足太陽膀胱之脈起於目內眥上額交巔上入絡腦還出別下項病沖頭痛又足少陽膽之脈起於目鋭眥上抵頭角病則頭角額痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽有餘則瀉不足則補汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也心煩頭痛者病在耳中過在手巨陽少陰乃濕熱頭痛也如氣上不下頭痛巔疾者下虛上實也過在足少陰巨陽甚則入腎寒濕頭痛也如頭半寒痛者先取手少陽陽明後取足少陽陽明此偏頭痛也有真頭痛者甚則腦盡痛手足寒至節死不治有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛凡頭痛每以風藥治之者總其大體而言之也高巔之上惟風可到故味之薄者陰中之陽乃自地升天者也然亦有三陰三陽之異故太陽頭痛惡風脈浮緊川芎羌活獨活麻黃之類為主陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根白芷為主少陽經頭痛脈弦細往來寒熱柴胡為主太陰頭痛必有痰疾體重或腹痛為痰癖其脈沉緩蒼朮半夏南星為主少陰頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛為主厥陰頭項痛或吐痰沫厥冷其脈浮緩吳茱萸湯主之血虛頭痛當歸川芎為主氣虛頭痛人參黃耆為主氣血俱虛頭痛調中益氣湯少加川芎蔓荊子細辛其效如神半夏白朮天麻湯治痰厥頭痛藥也清空膏乃風濕熱頭痛藥也羌活附子湯治厥陰頭痛藥也如濕氣在頭者以苦吐之不可執方而治先師嘗病頭痛發時兩頰青黃眩運目不欲閉懶言身體沉重兀兀欲吐潔古曰此厥陰太陰合病名曰風痰以局方玉壺丸治之更灸俠溪穴即愈是知方者體也法者用也徒執體而不知用者弊體用不失可謂上工矣立齊曰久頭痛多主於痰痛甚者乃風毒上攻有血虛者有諸經氣滯者有氣虛者有四氣外傷者有勞役所傷者有可吐者有可下者當分虛實寒熱兼變而治之若夫偏正頭風久而不愈乃內挾痰涎風火郁遏經絡氣血壅滯甚則目昏緊小二便祕澀宜砭出其血以開鬱解表余嘗治尚寶劉毅齊但怒則兩太陽作痛先用小柴胡加茯苓山梔子後用六味丸以生腎水而再不發談侍御每頭痛必吐清水不拘冬夏吃薑便止余作中氣虛寒用六君子當歸黃耆炮姜而瘥商儀部勞則頭痛余作陽虛不能上升以補中益氣湯加蔓荊子而痊簡易方硝石散治風寒入腦頭痛不可當因九七一方用生蘿蔔汁仰臥注兩鼻孔數年之患一注即愈灸法神庭上星後頂百會風池以上諸穴隨灸一處可愈頭痛論列方麻黃湯散一桂枝湯散九葛根蔥白湯散三二白虎湯寒二四物湯補八蓮鬚蔥白湯散三三平胃散和十七和胃飲新和五補中益氣湯補三十二陳湯和一六安煎新和二十全大補湯補二十五福飲新補六小柴胡湯散十九玉女煎新寒十二清膈煎新寒九六味地黃湯補百二十五君子煎新熱六理中湯熱一滋陰八味煎新寒十七理陰煎新熱六六君子湯補五加減一陰煎新補九三陰煎新補十一吳茱萸湯熱一三七金水六君煎新和一左歸飲新補二羌活附子湯熱三五局方玉壺丸和百五調中益氣湯補三一調胃承氣湯攻三半夏白朮天麻湯和十五論外備用方川芎散散六二頭風川芎散散六三風熱藿香正氣散和二十寒滯十神湯散四十感冒神術湯散三七傷寒川芎茶調散散四六風邪上攻清空膏散七四年久風熱都梁丸散七七傷風羌活附子湯散五九冬月犯寒玉壺丸和百五風痰上清散散六九吹鼻羌活勝風湯散六一風熱愈風餅子散七五頭風菊花散散七一風熱旋覆花湯散八三風痰昏悶如聖散散七二搐鼻透頂散散七三氣逆痛點頭散散七三氣逆痛八般頭風散七六搐鼻芎芷散散六七風熱芎辛導痰湯散六八痰厥痛天香散散六六年久頭痛神芎丸攻七二腫病祕結茶調散寒七二風熱上攻石膏散寒六九陽明風熱雙玉散寒七一胃火荊芩散寒七十頭風芎術湯熱五十寒濕痛三生散熱九六痰厥痛吹鼻六神散因四二風熱硝石散因九七風熱吹鼻當歸酒補百四血虛痛黑錫丹熱一八九下元虛寒面病經義邪氣臟腑病形篇帝曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌冰其卒寒或手足懈怠然而其面不衣何也岐伯曰十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為晴其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇口而為味其氣之津液皆上熏於面而皮又厚其肉堅故天氣甚寒不能勝之也帝曰邪氣之中人也奈何岐伯曰邪之中人高也身半已上者邪中之也身半已下者濕中之也諸陽之會皆在於面中人也方乘虛時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經面熱者足陽明病五閲五使篇岐伯曰五官者五臟之閲也脈出於氣口色見於明堂五官以辨闕庭必張乃立明堂明堂廣大蕃蔽見外方壁高基引垂居外五色乃治平博廣大壽中百歲帝曰願聞五官岐伯曰鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也帝曰以官何候岐伯曰以候五臟故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短顴赤腎病者顴與顏黑帝曰其常色殆者何如岐伯曰五官不辨闕庭不張小其明堂蕃蔽不見又埤其牆牆下無基垂角去外如是者雖平常殆況加病哉五色篇雷公問於黃帝曰五色獨決於明堂乎帝曰明常者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲雷公曰官五色奈何帝曰青黑為痛黃赤為熱白為寒是謂五官雷公曰以色言病之間甚奈何帝曰其色粗以明沉夭者為甚其色上行者病益甚其色下行如雲徹散者病方已雷公曰病小愈而卒死者何以知之帝曰赤色出兩顴大如母指者病雖小愈必卒死黑色出於庭大如母指必不病而卒死雷公曰死有期乎帝曰察色以言其時庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也能別左右是謂大道男女異位故曰陰陽審察澤夭謂之良工沉濁為內浮澤為外黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁男子色在於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也女子在於面王為膀胱子處之病散為痛搏為聚方員左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔左為左右為右其色有邪聚散而不端面色所指者也其色上鋭首空上向下鋭下向在左右如法以五色命臟青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也五臟生成篇曰凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也脈要精微論曰夫精明五色者氣之華也詳後眼目門刺熱篇曰肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤太陽之脈色榮顴骨熱病也榮未交曰今且得汗待時而已與厥陰脈爭見者死期不過三日其熱病內連腎少陽之脈色也少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少陰脈爭見者死期不過三日頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上者鬲上也經脈篇曰心主所生病者面赤目黃喜笑不休煩心心痛掌中熱論證共三條形者氣之質色者神之華有諸中必形諸外故但知面中形色之常變則凡虛實寒熱凶吉死生之兆已可得其七八而再證以脈再察以因則病無遁情矣凡醫之所貴者在必能無差欲能無差在確有真見使不有獨見之明則何以隔垣能觀而通神明之理經曰神乎神耳不聞目明心開而志先慧然獨見口弗能言俱視獨見昭然獨明若風吹雲故曰神又曰粗守形上守神故上古使僦貸季理色脈而通神明是可見形中之色無難辨也而色中之神不易言也學者於此必能以神會神斯云神矣又安能以筆楮盡哉一面色之辨經言已詳諸所未盡猶當兼察也凡病人面赤本皆屬火若滿面微紅而氣盛者此火證無疑也若病人兩顴鮮赤如指如縷而餘地不赤者此陰虛也仲景曰面戴陽者下虛故也婦人尤多見之病人面紅不退者邪盛病進為難愈病人面白色者氣虛也或白兼淡黃而氣不足者必失血也病人面白有枯色者血氣俱敗也若證有痰火則尤為難治病人面青或兼白者必陽虛陰勝之病久病人面轉黃蒼此欲愈也病人面黃潤而微赤者必主濕熱病人面黃而兼青者此木邪犯土多不可治病人面色青蒼者多主疼痛病難愈而面色如煤不開者終不吉平人面色如灰塵眼下青黑者必有病至其病必重女人面色青者必肝強脾弱多怒少食或經脈不調女人顴頰鮮紅名曰帶桃花此陰中有虛火多淫而無子一面腫有虛實腫者為實浮者為虛實腫者或熱或痛乃因風火上炎此以邪之有餘也脈必緊數證必寒熱風則散之火則清之壅滯祕結則通之利之邪去而腫自消也虛浮者無痛無熱而面目浮腫此或以脾肺陽虛輸化失常或以肝腎陰虛水邪泛溢然浮而就上其形虛軟者多由乎氣腫而就下按而成窩者多由乎水治氣者須從脾肺虛則補之實則順之治水者須從脾腎虛則化之實則瀉之然水氣雖分上下而氣即水之母水即氣之質故有相因之化而亦有相因之治也凡虛浮在氣者雖曰氣虛然亦有虛實之異不可執也蓋虛而浮者多因於脾此或以勞倦或以色欲或以瀉痢或以中寒而脈必微弱氣必虛餒者是也實而脹者多因於胃或木火熾盛而濕熱上浮或縱酒縱食而陽明壅滯此其脈必滑數證必多熱者是也然此證雖浮而不痛不腫自與前證有異虛實既辨則或補或瀉或利或清所當詳酌而為之治也論治共三條一凡風熱腫痛此必痄腮時毒癰瘍之證論治俱詳外科當察治之或其甚者防風通聖散主之一面目虛浮有因色欲過度陰虛氣越而致者宜六味地黃湯或八味地黃湯或加減八味丸若因勞倦傷脾氣虛不斂而面目虛浮者宜參苓白朮散歸脾湯或十全大補湯若因飲酒過度濕熱上聚而面目浮腫者宜葛花解酲湯或七味白朮散若因瀉痢不止脾腎氣虛而面目浮腫者宜胃關煎或溫胃飲若因食飲不節陽明壅實二便祕結而頭面滿脹者宜廓清飲惟小兒多有此證甚者宜木香檳榔丸下之若陽明實熱胃火上浮或煩熱乾渴而頭面浮腫者宜抽薪飲或白虎湯或大分清飲利之一水腫而浮或眼下有如臥蠶者此水氣之為病也論治詳腫脹門一面鼻粉刺雀斑諸方俱列因陳八七之後面病論列方六味湯補百二十八味湯補一二一加減八味丸補一二二歸脾湯補三二溫胃飲新熱五葛花解酲湯和一二四胃關煎新熱九白虎湯寒二七味白朮散小七廓清飲新和十三大分清飲新寒五參苓白朮散補五四抽薪飲新寒三十全大補湯補二十防風通聖散攻十六木香檳榔丸攻五十論外備用方玉容散因三百四雀斑硫黃膏因三百五面瘡赤風面鼻諸方詳因陳六九至一百止口舌經義金匱真言論曰中央黃色入通於脾開竅於口藏精於脾故病在舌本陰陽應象大論曰中央生濕濕生土土生甘甘生脾脾主口在竅為口南方生熱熱生火火生苦苦生心心主舌在竅為舌脈度篇曰脾氣通於口脾和則口能知五穀矣心氣通於舌心和則舌能知五味矣五臟別論曰五味入口藏於胃以養五臟氣奇病論帝曰有病口甘者病名為何何以得之岐伯曰此五氣之溢也名曰脾疸詳三消門帝曰有病口苦取陽陵泉病名為何何以得之岐伯曰病名膽疸夫肝者中之將也取決於膽咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞四時氣篇曰膽液泄則口苦胃氣逆則嘔苦故曰嘔膽邪氣臟腑病形篇曰膽病者善太息口苦嘔宿汁心下淡淡恐人將捕之嗌中吤吤然數唾在足少陽之本末亦視其脈之陷下者灸之其寒熱者取陽陵泉十二經脈三百六十五絡其血氣皆上於面而走空竅其濁氣出於胃走唇舌而為味痿論曰肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿熱論篇曰傷寒四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾傷寒五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴氣厥論曰膀胱移熱於小腸鬲腸不便上為口糜五音五味篇曰衝脈任脈其浮而外者循腹右上行會於咽喉別而絡唇口五常政大論曰備化之紀其主口升明之紀其主舌五閲五使篇曰口唇者脾之官也舌者心之官也六節藏象論曰脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣五臟生成篇曰脾之合肉也其榮唇也奇病論曰足少陰之脈貫腎系舌本經脈篇曰手陽明還出挾口交人中足陽明還出挾口環唇足太陰連舌本散舌下足少陰挾舌本足太陰氣絶者則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也足厥陰氣絶則筋絶厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也診要經終論曰厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣口問篇曰人之自齧舌者何氣使然此厥逆走上脈氣輩至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣視主病者則補之經筋篇曰足陽明之筋引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻熱病篇曰熱病不可刺者有九六曰舌本爛熱不已者死論證共六條口舌之病有瘡者有臭者有干有渴者有為苦為酸而諸味不同者有重舌木舌而舌間出血及舌胎舌黑者在各方書多以口病為熱證然其中亦有似熱非熱及勞傷無火等證是不可盡歸於熱所當察也一口舌生瘡固多由上焦之熱治宜清火然有酒色勞倦過度脈虛而中氣不足者又非寒涼可治故雖久用清涼終不見效此當察其所由或補心脾或滋腎水或以理中湯或以蜜附子之類反而治之方可全愈此寒熱之當辨也一口苦口酸等證在原病式則皆指為熱謂肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸或口淡者亦胃熱也若據此說則凡以口之五味悉屬火證絶無虛寒之病矣豈不謬哉如口苦者未必悉由心火口淡者未必盡因胃熱蓋凡以思慮勞倦色欲過度者多有口苦舌燥飲食無味之證此其咎不在心脾則在肝腎心脾虛則肝膽邪溢而為苦肝腎虛則真陰不足而為燥即如口淡一證凡大勞大瀉大汗大病之後皆能令人口淡無味亦豈皆胃火使然耶故凡臨此者但察其別無火證火脈則不宜以勞傷作內熱而妄用寒涼此治有不容誤也一口渴口乾大有不同而人多不能辨蓋渴因火燥有餘干因津液不足火有餘者當以實熱論津液不足者當以陰虛論二者不分反同冰炭矣然渴雖云火而亦有數種當辨者如實熱之渴火有餘也亡陰之渴水不足也故凡於大瀉之後大汗之後大勞之後大病之後新産失血之後癰疽大潰之後過食鹹味之後皆能作渴凡此數者悉由亡陰亡液水虧枯涸而然本非熱證不得誤認為火總之渴而喜冷脈實便結者固火證也其有冷飲入腹則滯沃不行或口雖作渴而但喜熱飲及脈弱便溏者皆非火證矧復有口雖干苦而全然不欲茶湯者此干也非渴也尤屬陰虛之候若作渴治能無誤乎故治此之法凡火盛於上者宜清肺清胃水虧於下者宜補脾補腎若陽虛而陰無以生氣虛而精無以化者使非水火併濟則何益之有首卷十問中有渴論外科有作渴條當並察其治法一口臭雖由胃火而亦有非火之異蓋胃火之臭其氣濁穢亦必兼口熱口乾及別有陽明火證者是也若無火脈火證而臭如餿腐或如酸肨及胃口吞酸飲食噯滯等證亦猶陰濕留垢之臭自與熱臭者不同是必思慮不遂及脾弱不能化食者多有之此則一為陽證宜清胃火一為陰證宜調補心脾不得謂臭必皆熱以致生他病也醫統曰七情所郁及心經熱壅則舌腫滿不得息心熱則舌裂而瘡肝熱則舌木而硬脾熱則舌澀而胎肺熱則舌強熱甚則舌燥如鋸舌卷囊縮者不治厥陰絶也論治共七條一口瘡口苦凡三焦內熱等證宜甘露飲徙薪飲主之火之甚者宜涼膈散玄參散主之胃火盛者宜竹葉石膏湯三黃丸之類主之若心火肝火之屬宜瀉心湯龍膽瀉肝湯之類主之多酒濕熱口糜宜導赤散大分清飲五苓散之類主之若勞傷心脾兼火者宜二陰煎清心蓮子飲之類主之若思慮謀為不遂肝膽虛而口苦者宜七福飲理陰煎或五君子煎之類主之兼火者以黃芩龍膽草之類隨宜佐之凡口瘡六脈虛弱或久用寒涼不效者必系無根虛火宜理陰煎理中湯之類反治之或用官桂噙咽亦可一外治口瘡敷藥陰陽散緑雲散細辛黃柏散白吞黃柏散皆可選用或臨臥時以川黃柏銜口過宿亦妙若口舌生瘡糜爛者宜冰玉散主之疳爛者冰白散一口臭由於胃火者宜清胃飲升麻黃連丸或竹葉石膏湯加香薷主之或千金口臭方皆可內清其火此外如丁香丸聖惠口齒方福建香茶餅之類亦可暫解其穢一舌胎舌黑雖云火證然實火虛火皆能為之凡治此者但當察脈證以虛實為主而再以辨色之法參之庶可無誤蓋實熱之黑必兼紅紫乾渴或多芒刺若沉黑少紅而帶潤滑者本非實熱證也若其六脈細弱而形困氣倦則又最為虛候是必寒水乘心火不歸原之病此不救本而但知治標則萬無一生矣此之治法凡裡熱未甚而表散有未解者宜柴胡諸飲之類以解其表里邪熱甚者宜涼膈散犀角地黃湯之類以清其內此治實熱之法也若陰虛火盛而兼有表邪未解者宜補陰益氣煎之類兼表裡而治之若形氣之類以清其內此治實熱之法也若陰虛火盛而兼有表邪未解者宜補陰益氣煎之類兼表裡而治之若形氣病氣俱不足寒水乘心而虛陽不斂者必用理陰煎理中湯或大補元煎之類以單救其里自可保其無虞此治虛火之法也若舌有白胎語言謇澀者以薄荷白蜜同薑片蘸而揩擦之外傷寒門仍有辨舌正條當與本門參閲一舌上無故出血者謂之舌衄此心火之溢也宜金花煎聖金散黃柏散主之或用千金口臭方亦妙一重舌木舌以舌下腫出如舌故曰重舌又謂之子舌忽腫木而硬者謂之木舌皆上焦熱壅故也惟宜砭針刺去其血為上策及內服清胃降火之劑自愈若舌忽腫起如豬胞或硬如木石不能出聲脹滿塞口則閉悶殺人但看舌下有如螻蛄或如臥蠶者急於腫突處砭去其血仍用釜底煤不拘多少以鹽醋調厚敷之或用井花水調敷亦可脫去更敷如不甚者單以此敷之亦愈正傳治舌腫大塞口不通飲食經驗方用真蒲黃一味頻刷舌上其腫自退若能咽藥即以黃連一味煎濃汁細細呷之以瀉心經之火則愈醫統治一人舌腫滿口諸藥不效以梅花冰片為末敷之即消針灸法廉泉治舌下腫口瘡舌縱舌根急縮金津玉液上二穴可刺出血天突少商口舌論列方大補元煎新補一五君子煎新熱六犀角地黃湯寒七九大分清飲新寒五柴胡諸飲新散五方補陰益氣煎新補十六甘露飲寒十二陰煎新補十清心蓮子飲寒三二徙薪飲新寒四七福飲新補七龍膽瀉肝湯寒六二理中湯熱一理陰煎新熱三竹葉石膏湯寒六五花散和一八二導赤散寒一二二升麻黃連湯因百十七玄參散因百一瀉心湯寒二七細辛黃柏散因一二三三黃丸攻六八清胃飲寒五六白蠶黃柏散因一二四冰玉散新因四六涼膈散攻十九痘八三千金口臭方因一三三冰白散新因四七黃柏散因五十五金花煎因百十二聖惠口齒方因一三四聖金散因百十一陰陽散因百二十福建香茶餅因三百二緑雲散因一二二丁香丸因百十八論外備用方加減八味丸補一二二直指黃芩湯寒百七心肺熱硼砂丸因百十噙化
