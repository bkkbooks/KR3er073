body:
  text: 卷之十六理集雜證謨虛損經義上古天真論曰今時之人以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也陰陽應象大論曰年四十而陰氣自半也起居衰矣宣明五氣篇曰久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋評熱病論曰邪之所湊其氣必虛陰虛者陽必湊之本神篇曰五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣通評虛實論曰邪氣盛則實精氣奪則虛經脈別論曰勇者氣行則已怯者則著而為病口問篇曰邪之所在皆為不足故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩中氣不足溲便為之變腸為之苦鳴下氣不足則乃為痿厥心悗逆調論曰營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用肉如故也人身與志不相有曰死玉機真藏論曰五虛死五實死帝曰願聞五虛五實岐伯曰脈盛皮熱腹脹前後不通悶瞀此謂五實脈細皮寒氣少泄利前後飲食不入此謂五虛帝曰其時有生者何也曰漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也脈要精微論曰得守者生失守者死得強者生失強者死言而微終日乃復言者此奪氣也海論曰氣海有餘者氣滿胸中悗息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水穀之海有餘則腹滿水穀之海不足則飢不受穀食髓海有餘則輕勁多力自過其度髓海不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥衛氣篇曰下虛則厥上虛則眩本輸篇曰三焦者並太陽之正入絡膀胱約下焦實則癃閉虛則遺溺五癃津液別篇曰陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛酸調經論曰心藏神神有餘則笑不休神不足則悲肺藏氣氣有餘則喘咳上氣不足則息利少氣肝藏血血有餘則怒不足則恐脾藏肉形有餘則腹脹涇瘦不利不足則四肢不用腎藏志志有餘則腹脹飧泄不足則厥脈解篇曰內奪而厥則為喑俳此腎虛也決氣篇曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛酸耳數鳴血脫者色白夭然不澤其脈空虛此其候也奇病論曰身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也有癃者一日數十溲此不足也太陰脈細微如發者此不足也今外得五有餘內得二不足此其身不表不里亦正死明矣五禁篇帝曰何謂五奪岐伯曰形肉已奪是一奪也大奪血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新產及大血之後是五奪也此皆不可寫藏氣法時論曰肝虛則目䀮䀮無所見耳無所聞善恐懼如人將捕之心虛則胸腹大脅下與腰相引而痛脾虛則腹滿腸鳴飧泄食不化肺虛則少氣不能報息耳聾嗌乾腎虛則胸中痛大腹小腹痛清厥意不樂調經論曰氣之所併為血虛血之所併為氣虛有者為實無者為虛故氣並則無血血並則無氣今血與氣相失故為虛焉血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死帝曰陰之生實奈何岐伯曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實矣帝曰陰之生虛奈何曰喜則氣下悲則氣消消則脈虛空因寒飲食寒氣熏滿則血泣氣去故曰虛矣陽虛則外寒陰虛則內熱刺志論曰氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病脈實血實脈虛血虛此其常也反此者病氣虛身熱此謂反也谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛血少此謂反也脈少血多此謂反也夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也根結篇曰形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絕滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也本神篇曰故智者之養生也必順四時而適寒暑和喜怒而安居處節陰陽而調剛柔如是則僻邪不至長生久視論虛損病源共十一條凡勞傷虛損五臟各有所主而惟心臟最多且心為君主之官一身生氣所繫最不可傷而人多忽而不知也何也夫五臟之神皆稟於心故憂生於心肺必應之憂之不已而慼慼幽幽則陽氣日索營衛日消勞傷及肺弗亡弗已如經曰嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所並暴樂暴苦始樂後苦皆傷精氣精氣竭絕形體毀沮故貴脫勢雖不中邪精神內傷身必敗亡之類無非慮竭將來追窮已往而二陽並傷第其潛消暗爍於冥冥之中人所不覺而不知五臟之傷惟心為本凡值此者速宜舒情知命力挽先天要知人生在世喜一日則得一日憂一日則失一日但使靈明常醒尚何塵魔敢犯哉及其既病而用參耆歸朮益氣湯之類亦不過後天之末著耳知者當知所先也一喜因欲遂而發若乎無傷而經曰喜傷心又曰暴喜傷陽又曰喜樂者神憚散而不藏又曰肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏蓋心藏神肺藏氣二陽臟也故暴喜過甚則傷陽而神氣因以耗散或縱喜無節則淫蕩流亡以致精神疲竭不可救藥或偶爾得志則氣盈載滿每多驕恣傲慢自取敗亡而莫知其然者多矣然則喜為人所忽而猶有不可忽者如此一思本乎心經曰心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬此傷心則然也然思生於心脾必應之故思之不已則勞傷在脾經曰思傷脾又曰思則心有所存神有所歸正氣留而不行故氣結矣凡此為病脾氣結則為噎膈為嘔吐而飲食不能運食不運則血氣日消肌肉日削精神日減四肢不為用而生脹滿泄瀉等證此傷心脾之陽也夫人孰無思而苦思難釋則勞傷至此此養生者所當戒也然思本傷脾而憂亦傷脾經曰脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春蓋人之憂思本多兼用而心脾肺所以並傷故致損上焦陽氣而二陽之病發自心脾以漸成虛勞之證者斷由乎此一淫欲邪思又與憂思不同而損惟在腎蓋心耽欲念腎必應之凡君火動於上則相火應於下夫相火者水中之火也靜而守位則為陽氣熾而無制則為龍雷而涸澤燎原無所不至故其在腎則為遺淋帶濁而水液漸以乾枯炎上入肝則逼血妄行而為吐為衄或為營虛筋骨疼痛又上入脾則脾陰受傷或為發熱而飲食悉化痰涎再上至肺則皮毛無以扃固而亡陽喘嗽甚至喑啞聲嘶是皆無根虛火陽不守舍而光焰詣天自下而上由腎而肺本源漸槁上實下虛是誠剝極之象也凡師尼室女失偶之輩雖非房室之勞而私情繫戀思想無窮或對面千里所願不得則欲火搖心真陰日削遂致虛損不救凡五勞之中莫此為甚苟知重命慎毋蹈之一七情傷腎恐亦居多蓋恐畏在心腎則受之故經曰恐傷腎又曰恐則精卻又曰恐懼而不解則傷精精傷則骨酸痿厥精時自下余嘗診一在官少年因恐而致病病稍愈而陽痿及其病復終不可療又嘗見猝恐者必陰縮或遺尿是皆傷腎之徵也然恐固傷腎而怒亦傷腎經曰腎盛怒而不止則傷志志傷則喜忘其前言腰背不可以俯仰屈伸毛悴色夭死於季夏是知盛怒不惟傷肝而腎亦受其害也一怒生於心肝必應之怒不知節則勞傷在肝經曰怒傷肝又曰怒則氣逆甚則嘔血及飧泄故氣上矣蓋肝為陰中之陽臟故肝之為病有在陰者有在陽者如火因怒動而逼血妄行以致氣逆於上而脹痛喘急者此傷其陰者也又或氣以怒傷而木鬱無伸以致侵脾氣陷而為嘔為脹為泄為痛為食飲不行者此傷其陽者也然隨怒隨消者未必致病臟氣堅固者未必致病惟先天稟弱而三陰易損者使不知節則東方之實多致西方之敗也然怒本傷肝而悲哀亦最易傷肝經曰肝悲哀動中則傷魂魂傷則狂妄不精不精則不正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋蓋怒盛傷肝肝氣實也悲哀傷肝肝氣虛也但實不終實而虛則終虛耳虛而不顧則必至勞損而治當察其邪正也一驚氣本以入心而實通於肝膽經曰驚則心無所依神無所歸慮無所定故氣亂矣又曰東方色青入通於肝其病發驚駭此所以驚能動心而尤能傷及肝膽心為君主固不可傷而膽以中正之官實少陽生氣所居故十一臟陽剛之氣皆取決於膽若或損之則諸臟生氣因皆消索致敗其危立見嘗見微驚致病者惟養心安神神復則病自卻若驚畏日積或一時大驚損膽或致膽汁泄而通身發黃默默無言者皆不可救膽黃證論詳黃疸門一色欲過度者多成勞損蓋人自有生以後惟賴後天精氣以為立命之本故精強神亦強神強必多壽精虛氣亦虛氣虛必多夭其有先天所稟原不甚厚者但知自珍而培以後天則無不獲壽設稟賦本薄而且恣情縱欲再伐後天則必成虛損此而傷生咎將誰委又有年將未冠壬水方生保養萌芽正在此日而無知孺子遽搖女精余見苞萼未成而蜉蝣旦暮者多矣良可悲也此其責水在孺子而在父師使不先有明誨俾知保生之道則彼以童心豈識利害而徒臨期懇禱號呼悲慼將何濟於事哉一勞倦不顧者多成勞損夫勞之於人孰能免之如奔走食力之夫終日營營而未聞其勞者豈非勞乎但勞有不同耳蓋貧賤之勞作息有度無關榮辱習以為常何病之有惟安閒柔脆之輩而苦竭心力斯為害矣故或勞於名利而不知寒暑之傷形或勞於色欲而不知旦暮之疲睏或勞於遊蕩而忍飢竭力於呼盧馳驟之場或勞於疾病而剝削傷殘於無術庸醫之手或為詩書困厄每緣螢雪成災或以好勇逞強遂致絕筋乏力總之不知自量而務從勉強則一應妄作妄為皆能致損凡勞倦之傷雖曰在脾而若此諸勞不同則凡傷筋傷骨傷氣傷血傷精傷神傷皮毛肌肉則實兼之五臟矣嗚呼嗜欲迷人其害至此此其故則在但知有彼而忘其有我耳廣成子曰無勞女形無搖女精乃可以長生若此二言者人因其簡故多易之而不知養生之道於此八字而盡之矣顧可以忽之也耶一少年縱酒者多成勞損夫酒本狂藥大損真陰惟少飲之未必無益多飲之難免無傷而耽飲之則受其害者十之八九矣且凡人之稟賦臟有陰陽而酒之性質亦有陰陽蓋酒成於釀其性則熱汁化於水其質則寒若以陰虛者縱飲之則質不足以滋陰而性偏動火故熱者愈熱而病為吐血衄血便血尿血喘嗽躁煩狂悖等證此酒性傷陰而然也若陽虛者縱飲之則性不足以扶陽而質留為水故寒者愈寒而病為臌脹泄瀉腹痛吞酸少食亡陽暴脫等證此酒質傷陽而然也故縱酒者既能傷陰尤能傷陽害有如此人果知否矧酒能亂性每致因酒妄為則凡傷精竭力動氣失機及遇病不勝等事無所不至而陰受其損多罔覺也夫縱酒之時固不慮其害之若此及病至沉危猶不知為酒困之若此故余詳明於此以為縱酒者之先覺云泄瀉腫脹二門俱有酒論一疾病誤治及失於調理者病後多成虛損蓋病有虛實治有補瀉必補瀉得宜斯為上工余見世俗之醫固不知神理為何物而且並邪正緩急俱不知之故每致伐人元氣敗人生機而隨藥隨斃者已無從訴其有幸而得免而受其殘剝以致病後多成虛損而不能復振者此何以故也故凡醫有未明萬毋輕率是誠仁人積德之一端也至若失於調治致不能起則俗云小孔不補大孔叫冤苦亦自作之而自受之耳又何尤焉論證共四條凡虛損之由具道如前無非酒色勞倦七情飲食所致故或先傷其氣氣傷必及於精或先傷其精精傷必及於氣但精氣在人無非謂之陰分蓋陰為天一之根形質之祖故凡損在形質者總曰陰虛此大目也若分而言之則有陰中之陰虛者其病為發熱躁煩頭紅面赤唇乾舌燥咽痛口瘡吐血衄血便血尿血大便燥結小水痛澀等證有陰中之陽虛者其病為怯寒憔悴氣短神疲頭運目眩嘔惡食少腹痛飧泄二便不禁等證甚至咳嗽吐痰遺精盜汗氣喘聲喑筋骨疼痛心神恍惚肌肉盡削夢與鬼交婦人月閉等證則無論陰陽凡病至極皆所必至總由真陰之敗耳然真陰所居惟腎為主蓋腎為精血之海而人之生氣即同天地之陽氣無非自下而上所以腎為五臟之本故腎水虧則肝失所滋而血燥生腎水虧則水不歸源而脾痰起腎水虧則心腎不交而神色敗腎水虧則盜傷肺氣而喘嗽頻腎水虧則孤陽無主而虛火熾凡勞傷等證使非傷入根本何以危篤至此故凡病甚於上者必其竭甚於下也余故曰虛邪之至害必歸陰五臟之傷窮必及腎窮而至此吾末如之何也矣夫所貴乎君子者亦貴其知微而已一凡損傷元氣者本皆虛證而古方以虛損勞瘵各分門類則病若有異亦所宜辨蓋虛損之謂或有發見於一證或有困憊於暫時凡在經在臟但傷元氣則無非虛損病也至若勞瘵之有不同者則或以骨蒸或以干嗽甚至吐血吐痰營衛俱敗尫羸日甚此其積漸有日本末俱竭而然但虛損之虛有在陰分有在陽分然病在未深多宜溫補若勞瘵之虛深在陰中之陰分多有不宜溫補者然凡治虛證宜溫補者病多易治不宜溫補者病多難治此虛勞若乎有異而不知勞瘵之損即損之深而虛之甚者耳凡虛損不愈則日甚成勞矣有不可不慎也一虛損兩顴紅赤或唇紅者陰虛於下逼陽於上也仲景曰其面戴陽者下虛故也虛而多渴者腎水不足引水自救也喑唾聲不出者由腎氣之竭蓋聲出於喉而根於腎經曰內奪而厥則為喑俳此腎虛也虛而喘急者陰虛肺格氣無所歸也喉乾嚥痛者真水下虧虛火上浮也不眠恍惚者血不養心神不能藏也時多煩躁者陽中無陰柔不濟剛也易生嗔怒或筋急痠痛者水虧木燥肝失所資也飲食不甘肌肉漸削者脾元失守化機日敗也心下跳動怔忡不寧者氣不歸精也經曰胃之大絡名曰虛里出於左乳下其動應衣宗氣泄也盜汗不止者有火則陰不能守無火則陽不能固也虛而多痰或如清水或多白沫者此水泛為痰脾虛不能制水也骨痛如折者腎主骨真陰敗竭也腰脅痛者肝腎虛也膝以下冷者命門衰絕火不歸源也小水黃澀淋瀝者真陰虧竭氣不化水也足心如烙者虛火爍陰湧泉涸竭也一凡陽虛之人因氣虛也陽氣既虛即不能嚏仲景曰欲嚏不能此人肚中寒故凡以陽虛之證而忽見嚏者便有回生之兆論脈共三條虛損之脈凡甚急甚數甚細甚弱甚澀甚滑甚短甚長甚浮甚沉甚弦甚緊甚洪甚實者皆勞傷之脈然無論浮沉大小但漸緩則漸有生意若弦甚者病必甚數甚者病必危若以弦細而再加緊數則百無一生矣要略曰脈芤者為血虛沉遲而小者為脫氣大而無力為陽虛數而無力為陰虛脈大而芤者為脫血平人脈大為勞虛極亦為勞脈微細者盜汗寸弱而軟為上虛尺弱軟澀為下虛尺軟滑疾為血虛兩關沉細為胃虛脈經曰脈來軟者為虛緩者為虛微弱者為虛弦者為中虛細而弱小者氣血俱虛辨爪凡勞損之病本屬陰虛陰虛必血少而指爪為精血之餘故凡於診候之際但見其指爪干黃覺有枯槁之色則其髮膚營氣具在吾目中矣此於脈色之外便可知其有虛損之候而損之微甚亦可因之以辨也論治共七條病之虛損變態不同因有五勞七傷證有營衛臟腑然總之則人賴以生者惟此精氣而病為虛損者亦惟此精氣氣虛者即陽虛也精虛者即陰虛也凡病有火盛水虧而見營衛燥津液枯者即陰虛之證也有水盛火虧而見臟腑寒脾腎敗者即陽虛之證也此惟陰陽偏困所以致然凡治此者但當培其不足不可伐其有餘夫既緣虛損而再去所餘則兩敗俱傷矣豈不殆哉惟是陰陽之辨猶有不易謂其陰陽之中復有陰陽其有似陽非陽似陰非陰者使非確有真見最易惑人此不可不詳察也且復有陰陽俱虛者則陽為有生之本而所重者又單在陽氣耳知乎此則虛損之治如指諸掌矣一陽虛者多寒非謂外來之寒但陽氣不足則寒生於中也若待既寒則陽已敗矣而不知病見虛弱而別無熱證者便是陽虛之候即當溫補元氣使陽氣漸回則真元自復矣蓋陽虛之候多得之愁憂思慮以傷神或勞役不節以傷力或色欲過度而氣隨精去或素稟元陽不足而寒涼致傷等病皆陽氣受損之所由也欲補陽氣惟辛甘溫燥之劑為宜萬勿兼清涼寒滑之品以殘此發生之氣如生地芍藥天麥門冬沙參之屬皆非所宜而石斛玄參知柏芩連龜膠之類則又切不可用若氣血俱虛者宜大補元煎或八珍湯或十全大補湯五臟俱虛宜平補者五福飲命門陰分不足者左歸飲左歸丸命門陽分不足者右歸飲右歸丸氣分虛寒者六氣煎脾腎陰分虛寒諸變不一者理陰煎三焦陽氣大虛者六味回陽飲氣虛脾寒者一氣丹胃氣虛寒者溫胃飲理中湯血虛寒滯者五物煎一陰虛者多熱以水不濟火而陰虛生熱也此病多得於酒色嗜欲或憤怒邪思流蕩狂勞以動五臟之火而先天元陰不足者尤多此病凡患虛損而多熱多燥不宜熱食者便是陰虛之候欲滋其陰惟宜甘涼醇靜之物凡陰中有火者大忌辛溫如乾薑桂附破故紙白朮蒼朮半夏之屬皆不可輕用即如人參黃耆枸杞當歸杜仲之類是皆陰中有陽亦當酌宜而用之蓋恐陽旺則陰愈消熱增則水益涸耳然陰虛者因其水虧而水虧者又忌寒涼蓋苦劣之流斷非資補之物其有火盛之甚不得不從清涼者亦當兼壯水之劑相機間用而可止即止以防其敗斯得滋補之大法諸治如下一虛損夜熱或午後發熱或喜冷便實者此皆陰虛生熱水不制火也宜加減一陰煎若火在心腎而驚悸失志者宜二陰煎若外熱不已而內不甚熱則但宜補陰不可清火宜一陰煎或六味地黃湯其有元氣不足而虛熱不已者必用大補元煎庶乎久之自愈寒熱門論治尤詳所當參閱一虛損咳嗽雖五臟皆有所病然專主則在肺腎蓋肺為金臟金之所畏者火也金之化邪者燥也燥則必癢癢則必嗽正以腎水不能制火所以剋金陰精不能化氣所以病燥故為咳嗽喘促咽痛喉瘡聲啞等證凡治此者只宜甘涼至靜之劑滋養金水使肺腎相生不受火制則真陰漸復而嗽可漸愈火盛者宜四陰煎加減主之火微者宜一陰煎六味地黃湯或左歸飲兼受風寒而嗽者宜金水六君煎貝母丸治嗽最佳一虛損吐血者傷其陰也故或吐或衄所不能免但當察其有火無火及火之微甚而治之凡火之盛者以火載血上而脈證之間自有熱證可辨急則治標此不得不暫用芩連梔柏竹葉童便之屬或單以抽薪飲徙薪飲之類主之若陰虛而兼微火者宜保陰煎或清化飲或加減一陰煎主之血止即當養血不宜過用寒涼也若無實火而全屬傷陰則陰虛水虧血由傷動而為吐為衄者此宜甘純養陰之品以靜制動以和治傷使陰氣安靜得養則血自歸經宜一陰煎六味地黃湯或小營煎之類主之若陰虛連肺而兼嗽兼血者宜四陰煎加減主之若因勞役別無火證心脾腎三陰受傷而動血者宜五陰煎五福飲六味地黃丸之類主之若陰虛於下格陽於上六脈無根而大吐大衄者此火不歸源真陽失守而然宜右歸飲加減主之或八味地黃湯亦可此惟思慮勞倦過傷者多有此證若因勞倦而素易嘔瀉多有脾不攝血而為吐血下血者宜六味回陽飲大加白朮主之萬不可用涼藥若大吐大衄而六脈細脫手足厥冷危在傾刻而血猶不止者速宜用鎮陰煎其血自止若血脫至甚氣亦隨之因至厥逆昏憒者速當益氣以固生機宜六味回陽飲或四味四陽飲主之若再用寒涼即死總之失血吐血必其陰分大傷使非加意元氣培養真陰而或專用寒涼則其陰氣愈損血雖得止而病必日敗矣一虛損傷陰本由五臟雖五臟各有所主然五臟證治有可分者有不可分者如諸氣之損其治在肺神明之損其治在心飲食肌肉之損其治在脾諸血筋膜之損其治在肝精髓之損其治在腎此其可分者也然氣主於肺而化於精神主於心而化於氣肌肉主於脾而土生於火諸血藏於肝而血化於脾胃精髓主於腎而受之於五臟此其不可分者也及乎既甚則標本相傳連及臟腑此又方之不可執言也故凡補虛之法但當明其陰陽升降寒熱溫涼之性精中有氣氣中有精之因且凡上焦陽氣不足者必下陷於腎也當取之至陰之下下焦真陰不足者多飛越於上也可不引之歸源乎所以治必求本方為盡善然余用補之法則悉在新方八略八陣中惟細察之可得其概其有諸證未備者如遺精夢泄聲啞盜汗及婦人血枯經斷等證但於各門求之則無不俱有照應辨似損非損凡似損非損之證惟外感寒邪者乃有之蓋以外邪初感不為解散而誤作內傷或用清涼或用消導以致寒邪鬱伏久留不散而為寒熱往來或為潮熱咳嗽其證則全似勞損若用治損之法以治此證則滋陰等劑愈以留邪熱蒸既久非損成損矣余嘗治愈數人皆其證也欲辨此者但當詳察表裡而審其致病之由蓋虛損之證必有所因而外感之邪其來則驟若或身有疼痛而微汗則熱退無汗則復熱或見大聲咳嗽脈雖弦緊而不甚數或兼和緩等證則雖病至一兩月而邪有不解病終不退者本非勞損毋誤治也若寒熱往來不止者宜一二三四五柴胡飲酌宜用之或正柴胡飲亦可若兼咳嗽者柴陳煎若脾腎氣虛而兼咳嗽者金水六君煎或邪有未解而兼寒熱者仍加柴胡虛損危候凡虛損既成不補將何以復而有不能服人參熟地及諸補之藥者此為虛不受補何以望生若勞損吐血失血之後嗽不能止而痰多甚者此以脾肺虛極飲食無能化血而隨食成痰此雖非血而實血之類也經曰白血出者死故凡痰之最多最濁者不可治一左右者陰陽之道路其有不得左右眠而認邊難轉者此其陰陽之氣有所偏竭而然多不可治一凡病虛損者原無外邪所以病雖至困終不憒亂其有患虛證別無邪熱而譫妄失倫者此心臟之敗神去之兆也必死一勞嗽喑啞聲不能出或喘急氣促者此肺臟之敗也必死一勞損肌肉脫盡者此脾臟之敗也必死一筋為疲極之本凡病虛損者多有筋骨疼痛若痛有至極不可忍者乃血竭不能榮筋此肝臟之敗也必死一勞損既久再及大便泄瀉不能禁止者此腎臟之敗也必死述古共四條難經曰損脈之為病奈何然一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑三損損於肌肉肌肉消瘦飲食不能為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者至脈之病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死治損之法損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此治損之法也不能治其虛安問其餘故曰實實虛虛損不足而益有餘此中工之所害也賓按此上損下損之說其義極精然有未盡者猶宜悉也蓋凡思慮勞倦外感等證則傷陽傷於陽者病必自上而下也色欲醉飽內傷等證則傷陰傷於陰者病必自下而上也如經曰二陽之病發心脾有不得隱曲女子不月之類此即自上而下者也又經曰五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣此即自下而上者也蓋自上而下者先傷乎氣故一損損於肺則病在聲息膚腠二損損於心則病在血脈顏色三損損於胃則病在飲食不調四損損於肝則病為瘛瘲疼痛五損損於腎則病為骨痿二便不禁此先傷於陽而後及乎陰陽竭於下則孤陰無以獨存不可為也自下而上者先傷乎精故一損損於腎則病為泉源乾涸二損損於肝則病為血動筋枯三損損於脾則病為痰涎壅盛四損損於心則病為神魂失守五損損於肺則病為喘急短氣此先傷乎陰而後及乎陽陰竭於上則孤陽無以獨生不可為也故曰心肺損而神衰肝腎虛而形敝脾胃損而食飲不歸血氣凡明哲之士則當察所由而預防其漸又何虛損之可慮若待源流俱竭而後歸罪於藥之不效醫之不良此其愚也亦甚矣巢氏病源曰夫虛勞者五勞七傷六極是也一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞又有肺勞者短氣而面浮鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨臥目視不明心勞者忽忽喜忘大便苦難或時鴨溏口內生瘡脾勞者舌本苦直不得嚥唾腎勞者背難以俯仰小便不利色赤黃而有餘瀝莖內痛陰囊濕生瘡小腹滿急六極者一曰氣極令人內虛五臟不足邪氣多正氣少不欲言二曰血極令人無顏色眉發落忽忽喜忘三曰筋極令人數轉筋十指爪甲皆痛苦倦不能久立四曰骨極令人酸削齒苦痛手足煩疼不可以立不欲行動五曰肌極令人羸瘦無潤澤飲食不生肌肉六曰精極令人少氣吸吸然內虛五臟不足發毛落悲傷喜忘七傷者一曰大飽傷脾脾傷善噫欲臥面黃二曰大怒逆氣傷肝肝傷少氣目暗三曰強力舉重久坐濕地傷腎腎傷少精腰背痛厥逆下冷四曰形寒寒飲傷肺肺傷少氣咳嗽鼻鳴五曰憂愁思慮傷心心傷苦驚喜忘喜怒六曰風雨寒暑傷形形傷髮膚枯夭七曰大恐懼不節傷志志傷恍惚不樂又曰七傷者一曰陰寒二曰陰痿三曰裡急四曰精寒五曰精少陰下濕六曰精清七曰小便苦數臨事不舉王節齋曰人若色欲過度傷損精血必生陰虛火動之病睡中盜汗午後發熱咯咯咳嗽倦怠無力飲食少進甚則痰涎帶血或咳血吐血衄血身熱脈沉數肌肉消瘦此名勞瘵最為難治輕者用藥數十服重者期以歲年然必須病人惜命堅心定志絕房室息妄想戒惱怒節飲食以自培其根此謂內外交治庶可保全薛立齋曰勞瘵之證大抵屬足三陰虧損虛熱無火之證故晝發夜止夜發晝止不時而作當用六味地黃丸為主以補中益氣湯調補脾胃若脾胃先損者當以補中益氣湯為主以六味地黃溫存肝腎多有得生者若誤用黃柏知母之類則復傷脾胃飲食日少諸臟愈虛元氣下陷腹痞作瀉則不可救矣夫衄血吐血之類因虛火妄動血隨火而泛行或陽氣虛不能攝血歸經而妄行其脈弦洪乃無根之火浮於外也大抵此證多因火土太旺金水衰涸之際不行保養及三冬火氣潛藏不遠幃幕戕賊真元故至春末夏初患頭疼腳軟食少體熱而為注夏之病或少有老態不耐寒暑不勝勞役四時迭病此因氣血方長而勞心虧損精血未滿而早為斫喪故其見證難以名狀若左尺脈虛弱或細數是左腎之真陰不足也用六味丸右尺脈遲軟或沉細而數欲絕是命門之相火不足也用八味丸至於兩尺微弱是陰陽俱虛也用十補丸此皆滋其化源也仍須參前後發熱咳嗽諸證治之附按立齋治韓州同色欲過度煩熱作渴飲水不絕小便淋瀝大便閉結唾痰如湧面目俱赤滿舌生刺唇裂身熱或身如芒刺而無定處兩足心如烙左三部脈洪而無倫此腎陰虛陽無所附而發於外蓋大熱而甚寒之不寒是無水也當峻補其陰遂以加減八味丸料一斤用肉桂一兩以水頓煎六碗冰冷與服半餉熟睡至晚又溫飲一碗諸證悉退翼日畏寒足冷諸證仍至是無火也當補其陽急與八味丸四劑諸證俱退又治府庠王以道元氣素弱復以科場歲考積勞致疾至十二月病大作大熱淚出隨凝目赤露胸氣息沉沉欲絕脈洪大鼓指按之如無舌乾如刺此內真寒而外假熱也遂先服十全大補湯余曰服此藥其脈當收斂為善少頃熟睡覺而惡寒增衣脈頓微細如絲此虛寒之真象也余以人參一兩加熟附三錢水煎頓服而安夜間脈復脫乃以參二兩熟附五錢仍愈後以大劑參朮歸身灸甘草等藥調理而愈又治一童子年十四歲發熱吐血余謂宜補中益氣以滋化源不信乃用寒涼降火前證愈甚或謂曰童子未室何腎虛之有參朮補氣奚為用之余述丹溪先生曰腎主閉藏肝主疏泄二臟俱有相火而其繫上屬於心心為君火為物所感則相火翕然而起雖不交會而精已暗耗矣又褚氏精血篇曰男子精未滿而御女以通其精則五臟有不滿之處異日有難狀之疾正此謂也遂用補中益氣湯及地黃丸而痊虛損論列方大補元煎新補一五福飲新補六十全大補湯補二十左歸飲新補二左歸丸新補四補中益氣湯補三十右歸飲新補三右歸丸新補五四味回陽飲新熱一一陰煎新補八二陰煎新補十六味回陽飲新熱二四陰煎新補十二五陰煎新補十三六味地黃湯補百二十理中湯熱一理陰煎新熱三八味地黃湯補一二一五物煎新因三六氣煎新因二一加減八味丸補一二二溫胃飲新熱五小營煎新補十五金水六君煎新和一鎮陰煎新熱十三保陰煎新寒一加減一陰煎新補九一氣丹新補二二十補丸熱一七三八珍湯補十九抽薪飲新寒三徙薪飲新寒四柴陳煎新散九貝母丸新和十八正柴胡飲新散六諸柴胡飲新散一二三四五論外備用方附子理中湯熱二陽虛安腎丸熱一六七下元虛冷小安腎丸熱一六七下元虛冷黑錫丹熱一八九下元陽虛黃耆鱉甲煎寒九十虛勞煩熱大菟絲子丸固三六鱉甲地黃湯寒八九虛勞煩熱地黃膏寒九一滋陰退熱人參平肺湯因一八七腎虛聲啞退熱湯寒九三急勞大熱加味虎潛丸寒一六四補虛滋陰人參五味子湯外一五三劫勞散婦一二四三才封髓丹寒一六六滋陰降火方麥門冬湯寒四五氣熱血焦大補地黃丸寒一五九精枯血熱凡補陣所載古方新方俱宜酌用勞倦內傷經義調經論帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒太陰陽明論曰故犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼舉痛論曰勞則氣耗勞則喘息汗出外內皆越故氣耗矣痹論曰陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷本病論曰飲食勞倦即傷脾論證共五條勞倦一證即東垣所謂內傷證也凡疾病在人有不因外感而受病於內者則無非內傷而東垣乃獨以飲食失節勞役不足之病為內傷其故何也蓋外感內傷俱有惡寒發熱等證外感寒熱者即傷寒也內傷寒熱者即勞倦也傷寒以外邪有餘多宜攻散勞倦以內傷不足多宜溫補然此二者病多相類最易惑亂故東垣特用內傷二字以為外感之別蓋恐以勞倦之傷作傷寒之治則必致殺人矣此其大義所當先辨一內傷之證東垣以飲食勞倦為言然飲食之傷有二而勞倦之傷亦有二當辨如下一飲食內傷之證凡飢飽失時者太飢則倉廩空虛必傷胃氣太飽則運化不及必傷脾氣然時飢時飽而致病者其傷在飢故當以調補為主是即東垣之所謂也其有不因飢飽而惟以縱肆口腹遂致留滯不化者當以化滯消食為主方治當從飲食門以上飲食二證一以傷飢不足一以留滯有餘治當知辨也一勞倦內傷之證有因困倦而忽然發熱或怠惰嗜臥懶於言語其脈緩而大或浮或細而無外邪者此即時人之所謂勞發也單宜溫補為主有因積勞飢飽致傷脾腎則最易感邪而病為發熱頭痛脈緊惡寒類傷寒等證此內傷外感兼而有之是即所謂勞力感寒證也若以此為真傷寒則既由勞傷已因不足是傷寒正治之法不可用也若以此為非傷寒則甚至發斑發狂結胸譫語等證無不有之而不曰傷寒則人不服也觀東垣云大梁受圍之後死者多人豈俱感風寒者誠至言也第為兵革所困者明為利名所困者暗故今人多以勞倦而患傷寒者無非此類昧者不知而妄治殃人豈其天年之果盡耶誠可憫也以上勞倦二證皆為內傷而一以無邪一以有邪當辨而治也一凡飢飽勞倦皆能傷人蓋人以飲食為生飲食以脾胃為主今飢飽不時則胃氣傷矣又脾主四肢而勞倦過度則脾氣傷矣夫人以脾胃為養生之本根本既傷焉有不病而人不知慎病斯及矣故有以勞倦致動虛火而病者有以飢餒致傷中氣而病者或以勞倦之後加之忍飢或以忍飢之後加之勞倦然而兩者之中則尤以受飢為甚所以飢時不可臨病飢時不可勞形飢時不可受寒飢時不可任性飢時不可傷精飢時不可酬應知此數者是即卻病養生之道也凡犯此者豈惟貧賤者為然而富貴者尤多有之蓋有勢不容已則未免勞心竭力而邪得乘虛而入者皆內傷不足之證也奈時醫不能察無論虛實悉曰傷寒但知瀉火逐邪及汗吐下三法不知忘食忘勞既困於己再攻再削又困於醫標本俱竭其能生乎余目睹受此害者多矣恨不一時救正其如沿習成風釋疑未易故特演東垣大意囑筆於此用效長夜之燈也觀者其三思焉論治共四條凡因勞倦而無外感者或身雖微熱而脈見緩大無力全不緊數或懶言嗜臥或身常有汗此即勞發之證自與外感之頭疼脈緊筋骨痠痛者不同治宜以補養為主氣復則愈虛在陽分者宜四君子湯五君子煎虛在陰分者三陰煎五陰煎或大小營煎若脾胃中氣受傷者理中湯養中煎若血氣俱虛者五福飲八珍湯或十全大補湯一勞倦飢飽不時而致寒熱往來者以飢時臟氣餒勞時腠理開腠理開則邪易感臟氣餒則邪易入所以飢飽勞倦不慎者多令人為頭痛發熱惡寒等證雖曰此由內傷而實有外感雖有外感而實以內傷故東垣制補中益氣湯以參耆歸術而加之升柴以助生長之氣使胃氣上升則氣復於中而陽達於外此實和解之良法也第今人以勞倦傷陰而精血受病者為尤多則耆術之屬亦有不相宜者茲余複製補陰益氣煎凡陽虛於下水虧不能作汗而邪有不解者此方尤勝之愚有治脾三方並補中益氣湯論在後飲食門當參閱之一勞倦感邪以致傷寒發熱頭痛身痛凡脈緊邪盛者不得不從解散治之若虛本不甚而表邪不解者宜正柴胡飲若外邪兼火者一柴胡飲外邪兼寒者二柴胡飲若氣血微虛者三柴胡飲或四柴胡飲其有虛甚而邪不易解者宜理陰煎或大溫中飲所不可緩也一夏日暑熱之時或於道途或於田野過於勞倦而身體薄弱者最易傷暑此亦勞倦之屬論治詳暑證門陽暑條中辨脈東垣曰古人以脈上辨內外傷於人迎氣口人迎脈大於氣口為外傷氣口脈大於人迎為內傷此辨固是但其說有所未盡耳外感風寒皆有餘之證是從前客邪來也其病必見於左手左手主表乃行陽二十五度內傷飲食及飲食不節勞役所傷皆不足之病也必見於右手右手主裡乃行陰二十五度故外感寒邪則獨左手人迎脈浮緊按之洪大緊者後甚於弦是足太陽寒水之脈按之洪大而有力中見手少陰心火之脈丁與壬合內顯洪大乃傷寒脈也若外感風邪則人迎脈緩而大於氣口一倍或兩倍三倍內傷飲食則右寸氣口脈大於人迎一倍傷之重者過在少陰則兩倍太陰則三倍此內傷飲食之脈愚謂東垣發明內傷一證其功誠為不小凡其所論有的確不易者茲俱詳述於後或稍有疑似者姑已置之至若辨脈一條則有不容不辨者乃以左為人迎主表右為氣口主裡外感則左手人迎浮緊內傷則右手氣口脈大此其長中之短也夫人迎本陽明胃脈在結喉兩旁氣口本太陰肺脈兩手所同稱也迨晉之王叔和不知何所取義突謂左為人迎右為氣口左以候表右以候里而東垣宗之故亦以為言則大謬矣且內傷外感之分乃一表一里不容紊也如肝腎在左豈無里乎腸胃在右豈非表乎即如仲景之論傷寒亦但以浮大為表沉細為里歷溯仲景之前以至倉扁軒岐初未聞有以左右言表裡者迨自叔和之後則悉宗其謬而傳始訛矣即無論六經之表裡而但以親歷所見者言之如脈見緊數此寒邪外感也然未有左數而右不數者又如所云左大者為風邪右大者為飲食則尤其不然夫人生稟賦之常凡右脈大者十居八九左脈大者十居一二若果陽邪在表則大者更大豈以右脈本大而可認為食乎若飲食在臟則強者愈強豈以左脈本強而可認為寒乎不知此之大而緊則彼之小者亦必緊彼之小而緩則此之大者亦必緩若因其偏強而即起偏見則忘其本體者多矣故以大小言則脈體有不同可以左右分也若以遲疾言則息數本相應不可以左右分也矧左表右里之說既非經旨亦非病徵烏足信哉或曰然則內傷外感何以辨之曰六脈俱有表裡左右各有陰陽外感者兩手俱緊數但當以有力無力分陰證陽證內傷者左右俱緩大又必以有神無神辨虛邪實邪然必察左右之常體以參久暫之病因斯可得脈證之真不然則表裡誤認攻補倒施自叔和至今凡陰受其殃者不知幾多人矣此不得不為辨正以為東垣之一助也此別有辨在類經藏象類第十一篇所當互證述古共三條李東垣曰古之至人窮陰陽之造化究乎生死之際所著內經悉言人以胃氣為本蓋人受水穀之氣以生所謂元氣穀氣營氣衛氣清氣春升生髮之氣此六者以穀氣上行皆胃氣之別稱也使穀氣不得升浮生長之令不行則無陽以護其營衛不任風寒乃生寒熱皆脾胃之氣不足所致也然而與外感風寒之證頗同而理異內傷脾胃乃傷其氣外傷風寒乃傷其形傷外為有餘有餘者瀉之傷內為不足不足者補之汗之下之吐之克之皆瀉也溫之和之調之養之皆補也內傷不足之病苟誤認作外感有餘之病而反瀉之則虛其虛也難經曰實實虛虛損不足而益有餘如此死者醫殺之耳然則奈何曰惟當以甘溫之劑補其中升其陽甘寒以瀉其火則愈內經曰勞者溫之損者溫之蓋溫能除大熱大忌苦寒之劑瀉胃土耳今立補中益氣湯又曰夫喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困熱無氣以動懶於言語動作喘乏表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其熱火以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之是也金匱要略曰平人脈大為勞虛極亦為勞夫勞之為病其脈浮大手足煩熱春夏劇秋冬火差以黃耆建中湯治之此亦溫之之意也又曰脾胃受勞役之疾飲食又復失節耽病日久事息心安飽食太甚病乃大作故內傷飲食則亦惡風寒是營衛失守皮膚間無陽以滋養不能任風寒也皮毛之絕則心肺之本亦絕矣蓋胃氣不升元氣不至無以滋養心肺乃不足之證也計受病不一飲食失節勞役所傷因而飽食內傷者極多外傷者間而有之舉世醫者往往將元氣不足之證便作外傷風寒表實之證而反治心肺是重絕其表也安得不死乎若曰不然請以眾人之耳聞目見者證之曏者壬辰改元京師戒嚴迨三月下旬受敵者凡半月解圍之後都人之不受病者萬無一二既病而死者繼踵而不絕都門十有二所每日各門所送多者二千少者不下一千似此者幾三月此百萬人豈俱感風寒外傷者耶大都人在圍城中飲食失節勞役所傷不待言而知由其朝飢暮飽起居不時寒溫失所動經三兩月胃氣虧之久矣一旦飽食太過感而傷人而又調治失宜其死也無疑矣非惟大梁為然遠在真佑興定間如東平如太原如鳳翔解圍之後病傷而死無不皆然余在大梁凡所親見有發表者有以巴豆推之者有以承氣湯下之者俄而變結胸發黃又以陷胸湯丸及茵陳湯下之無不死者蓋初非傷寒以調治差誤變而似真傷寒之證皆藥之罪也往者不可追來者猶可及輒以生平已試之效著內外傷辨論一篇推明前哲之餘論歷舉近事之變故庶幾同志者審其或中觸類而長之免後人之橫夭耳東垣辨氣少氣盛曰外傷風寒者其氣壅盛而有餘內傷飲食勞役者其口鼻中氣皆短促不足以息何以分之蓋外傷風寒者心肺元氣初無減損又添邪氣助之使鼻氣壅塞不利面赤其鼻中氣不能出並從口出但發一言必前輕後重其聲壯厲而有力者乃有餘之驗也傷風則決然鼻流清涕其聲嗄其言響如從甕中出亦前輕而後重高揭而有力皆氣盛有餘之驗也內傷飲食勞役者心肺之氣先損為熱所傷熱既傷氣四肢無力以動故口鼻中皆短氣少氣上喘懶語人有所問十不欲對其一縱勉強答之其氣亦怯其聲亦低是其氣短少不足之驗也明白如此雖婦人女子亦能辨之豈有醫者反不能辨之乎東垣辨頭痛曰內證頭痛有時而作有時而止外證頭痛常常有之直須傳入裡實方罷此內外證之不同也勞倦論列方五福飲新補六養中煎新熱四八珍湯補十九理中湯熱一理陰煎新熱三大營煎新補十四小營煎新補十五四君子湯補一五君子煎新熱六大溫中飲新散八一柴胡飲新散一二柴胡飲新散二三柴胡飲新散三正柴胡飲新散六十全大補湯補二十補中益氣湯補三十補陰益氣煎新補十六三陰煎新補十一五陰煎新補十三論外備用方人參養營湯補二一當歸黃耆湯補九七熱渴脈虛關格經義六節藏象論曰人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰人迎與寸口俱盛四倍以上為關格關格之脈羸不能極於天地之精氣則死矣終始篇曰人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥陰一盛而躁在手心主脈口二盛病在足少陰二盛而躁在手少陰脈口三盛病在足太陰三盛而躁在手太陰脈口四盛且大且數者名曰溢陰溢陰為內關內關不通死不治人迎與太陰脈口俱盛四倍以上命曰關格關格者與之短期以上俱有刺法詳載類經針刺類禁服篇曰寸口主中人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者名曰平人人迎四倍者且大且數名曰溢陽溢陽為外格死不治必審按其寒熱以驗其臟腑之病寸口四倍者名曰內關內關者且大且數死不治必審察其本末之寒溫以驗其臟腑之病脈度篇曰五臟不和則七竅不通六腑不和則留結為癰故邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能榮也故曰關陽氣太甚則陰氣弗能榮也故曰格陰陽俱盛不得相榮故曰關格關格者不得盡期而死也論證共四條關格一證在內經本言脈體以明陰陽離絕之危證也如六節藏象論終始篇禁服篇及脈度經脈等篇言之再四其重可知自秦越人三難曰上魚為溢為外關內格入尺為覆為內關外格此以尺寸言關格已失本經之意矣又仲景曰在尺為關在寸為格關則不得小便格則吐逆故後世自叔和東垣以來無不以此相傳而竟置關格一證於烏有矣再至丹溪則曰此證多死寒在上熱在下脈兩寸俱盛四倍以上法當吐以提其氣之橫格不必在出痰也愚謂兩寸俱盛四倍又安得為寒在上耶且脈大如此則浮豁無根其虛可知又堪吐乎謬而又謬莫此甚矣夫內經云人迎四倍寸口四倍既非尺寸之謂而曰吐逆者特隔食一證耳曰不得小便者特癃閉一證耳二證自有本條其與關格何涉數子且然況其他乎又安望治此者之無謬哉一關格證在內經本以人迎察六腑之陽寸口察五臟之陰人迎盛至四倍以上此陽明經孤陽獨見水不濟火也故曰格陽格陽者陰格於陽也氣口盛至四倍以上此太陰經元陰無主氣不歸精也故曰關陰關陰者陽關於陰也若人迎寸口俱盛至四倍以上且大且數此其陽氣不藏故陰中無陽陰氣不升故陽中無陰陰陽相離故名關格也凡見此者總由酒色傷腎情欲傷精以致陽不守舍故脈浮氣露亢極如此此則真陰敗竭元海無根是亢龍有悔之象最危之候也一內經以人迎寸口並診關格今後世診法則但取寸口而不察人迎似於法有未盡然寸口為脈之大會而脈見於彼未有不見於此者所以但察氣口則人迎之脈亦可概見故凡見寸口弦大至極甚至四倍以上且大且數者便是關格之脈不得誤認為火證余嘗診此數人察其脈則如弦如革洪大異常故云四倍察其證則脈動身亦動凡乳下之虛里臍傍之動氣無不舂舂然振振然與脈俱應者察其形氣則上有微喘而動作則喘甚肢體而力而寤寐多慌張謂其為虛損則本無咳嗽失血等證謂其為痰火則又無實邪發熱等證此關格之所以異也然惟富貴之人及形體豐肥者多有此證求其所因則無非耽嗜少艾中年酒色所致是雖與勞損證若有不同而實即勞損之別名也此老成之人所以當知慎也有喘論在喘證門互閱可也一本經脈度篇所云陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣弗能榮也故曰格陰陽俱盛不能相榮故曰關格關格者不得盡期而死此舉脈證而兼言之也若以脈言則如前之四倍者是也若以證言則又有陰陽俱盛者以陽病極於陽分而陰病極於陰分也凡陽盛於陽者若乎當瀉而陰分見陰有不可瀉陰極於陰者若乎當補而陽分見陽又不可補病若此者陽自陽而陽中無陰陰自陰而陰中無陽上下否隔兩顧弗能補之不可瀉之又不可是亦關格之證也有死而已此與真寒假熱真熱假寒之證大有不同學者當辨其疑似論治共三條關格之脈必弦大至極夫弦者為中虛浮大者為陰虛此腎水大虧有陽無陰之脈也治此者宜以峻補真陰為主然又當察其虛中之寒熱陰中之陰陽分別處治斯盡善也一關格證凡兼陽臟者必多熱宜一陰煎左歸飲左歸丸之類主之兼陰臟者必多寒宜大營煎右歸飲右歸丸之類主之若不熱不寒臟氣本平者宜五福飲三陰煎及大補元煎之類主之一關格證所傷根本已甚雖藥餌必不可廢如精虛者當助其精氣虛者當助其氣其有言難盡悉者宜於古今補陣諸方中擇宜用之斯固治之之法然必須遠居別室養靜澄心假以歲月斯可全愈若不避絕人事加意調理而但靠藥餌則恐一暴十寒得失相半終無濟於事也凡患此者不可不知關格論列方五福飲新補六大營煎新補十四大補元煎新補一一陰煎新補八三陰煎新補十一左歸飲新補二左歸丸新補四右歸飲新補三右歸丸新補五
