body:
  text: 卷之五十一德集新方八陣補陣大補元煎治男婦氣血大壞精神失守危劇等證此迴天贊化救本培元第一要方本方與後右歸飲出入互思人參補氣補陽以此為主少則用一二錢多則用一二兩山藥炒二錢熟地補精補陰以此為主少則用二三錢多則用二三兩杜仲二錢當錢二三錢若泄瀉者去之山茱萸一錢如畏酸吞酸者去之枸杞二三錢炙甘草一二錢水二鍾煎七分食遠溫服如元陽不足多寒者於本方加附子肉桂炮姜之類隨宜用之如氣分偏虛者加黃耆白朮如胃口多滯者不必用如血滯者加川芎去山茱萸如滑泄者加五味故紙之屬左歸飲此壯水之劑也凡命門之陰衰陽勝者宜此方加減主之此一陰煎四陰煎之主方也熟地二三錢或加至一二兩山藥二錢枸杞二錢炙甘草一錢茯苓一錢半山茱萸一二錢畏酸者少用之水二鍾煎七分食遠服如肺熱而煩者加麥冬二錢血滯者加丹皮二錢心熱而躁者加玄參二錢脾熱易飢者加芍藥二錢腎熱骨蒸多汗者加地骨皮二錢血熱妄動者加生地二三錢陰虛不寧者加女貞子二錢上實下虛者加牛膝二錢以導之血虛而燥滯者加當歸二錢右歸飲此益火之劑也凡命門之陽衰陰勝者宜此方加減主之此方與大補元煎出入互用如治陰盛格陽真寒假熱等證宜加澤瀉二錢煎成用涼水浸冷服之尤妙熟地用如前山藥炒二錢山茱萸一錢枸杞二錢甘草炙一二錢杜仲薑製二錢肉桂一二錢製附子一二三錢水二鍾煎七分食遠溫服如氣虛血脫或厥或昏或汗或運或虛狂或短氣者必大加人參白朮隨宜用之如火衰不能生土為嘔噦吞酸者加炮乾薑二三錢如陽衰中寒泄瀉腹痛加人參肉豆蔻隨宜用之如小腹多痛者加吳茱萸五七分如淋帶不止加破故紙一錢如血少血滯腰膝軟痛者加當歸二三錢左歸丸治真陰腎水不足不能滋養營衛漸至衰弱或虛熱往來自汗盜汗或神不守舍血不歸原或虛損傷陰或遺淋不禁或氣虛昏運或眼花耳聾或口燥舌乾或腰痠腿軟凡精髓內虧津液枯涸等證俱速宜壯水之主以培左腎之元陰而精血自充矣宜此方主之大懷熟八兩山藥炒四兩枸杞四兩山茱萸肉四兩川牛膝酒洗蒸熟三兩精滑者不用菟絲子制四兩鹿膠敲碎炒珠四兩龜膠切碎炒珠四兩無火者不必用上先將熟地蒸爛杵膏加煉蜜丸桐子大每食前用滾湯或淡鹽湯送下百餘丸如真陰失守虛火炎上者宜用純陰至靜之劑於本方去枸杞鹿膠加女貞子三兩麥冬三兩如火爍肺金乾枯多嗽者加百合三兩如夜熱骨蒸加地骨皮三兩如小水不利不清加茯苓三兩如大便燥結去菟絲加肉蓯蓉三兩如氣虛者加人參三四兩如血虛微滯加當歸四兩如腰膝痠痛加杜仲三兩監水炒用如臟平無火而腎氣不充者加破故紙三兩去心蓮肉胡桃肉各四兩龜膠不必用上凡五液皆主於腎故凡屬陰分之藥無不皆能走腎有謂必須導引者皆見之不明耳右歸丸治元陽不足或先天稟衰或勞傷過度以致命門火衰不能生土而為脾胃虛寒飲食少進或嘔惡膨脹或番胃噎膈或怯寒畏冷或臍腹多痛或大便不實瀉痢頻作或小水自遺虛淋寒疝或寒侵溪谷而肢節痹痛或寒在下焦而水邪浮腫總之真陽不足者必神疲氣怯或心跳不寧或四體不收或眼見邪崇或陽衰無子等證俱速宜益火之原以培右腎之元陽而神氣自強矣此方主之大懷熟八兩山藥炒四兩山茱萸微炒三兩枸杞微炒四兩鹿角膠炒珠四兩菟絲子制四兩杜仲薑湯炒四兩當歸三兩便溏勿用肉桂二兩漸可加至四兩製附子自二兩漸可加至五六兩上丸法如前或丸如彈子大每嚼服二三丸以滾白湯送下其效尤速如陽衰氣虛必加人參以為之主或二三兩或五六兩隨人虛實以為增減蓋人參之功隨陽藥則入陽分隨陰藥則入陰分欲補命門之陽非加人參不能捷效如陽虛精滑或帶濁便溏加補骨脂酒炒三兩如飧泄腎泄不止加北五味子三兩肉豆蔻三兩麵炒去油用如飲食減少或不易化或嘔惡吞酸皆脾胃虛寒之證加乾薑三四兩炒黃用如腹痛不止加吳茱萸二兩湯泡半日炒用如腰膝痠痛加胡桃肉連皮四兩如陰虛陽痿加巴戟肉四兩肉蓯蓉三兩或加黃狗外腎一二付以酒煮爛搗入之五福飲凡五臟氣血虧損者此能兼治之足稱王道之最人參隨宜心熟地隨宜腎當歸二三錢肝白朮炒一錢半肺炙甘草一錢脾水二鍾煎七分食遠溫服或加生薑三五片凡治氣血俱虛等證以此為主或宜溫者加薑附宜散者加升麻柴葛左右逢源無不可也七福飲治氣血俱虛而心脾為甚者即前方加棗仁二錢遠志三五分制用一陰煎此治水虧火勝之劑故曰一陰凡腎水真陰虛損而脈證多陽虛火發熱及陰虛動血等證或瘧疾傷寒屢散之後取汗既多脈虛氣弱而煩渴不止潮熱不退者此以汗多傷陰水虧而然也皆宜用此加減主之生地二錢熟地三五錢芍藥二錢麥冬二錢甘草一錢牛膝一錢半丹參二錢水二鍾煎七分食遠溫服如火盛躁煩者入真龜膠二三錢化服如氣虛者間用人參一二錢如心虛不眠多汗者加棗仁當歸各一二錢如汗多煩躁者加五味子十粒或加山藥山茱萸如見微火者加女貞子一二錢如虛火上浮或吐血或衄血不止者加澤瀉一二錢茜根二錢或加川續斷一二錢以澀之亦妙加減一陰煎治證如前而火之甚者宜用此方生地芍藥麥冬各二錢熟地三五錢炙甘草五七分知母地骨皮各一錢水二鍾煎服如躁煩熱甚便結者加石膏二三錢如小水熱澀者加梔子一二錢如火浮於上者加澤瀉一二錢或黃芩一錢如血燥血少者加當歸一二錢二陰煎此治心經有熱水不制火之病故曰二陰凡驚狂失志多言多笑或瘍疹煩熱失血等證宜此主之生地二三錢麥冬二三錢棗仁二錢生甘草一錢玄參一錢半黃連或一二錢茯苓一錢半木通一錢半水二鍾加燈草二十根或竹葉亦可煎七分食遠服如痰勝熱甚者加九制膽星一錢或天花粉一錢五分三陰煎此治肝脾虛損精血不足及營虛失血等病故曰三陰凡中風血不養筋及瘧疾汗多邪散而寒熱猶不能止是皆少陽厥陰陰虛少血之病微有火者宜一陰煎無火者宜此主之當歸二三錢熟地三五錢炙甘草一錢芍藥酒炒二錢棗仁二錢人參隨宜水二鍾煎七分食遠服如嘔惡者加生薑三五片汗多煩躁者加五味子十四粒汗多氣虛者加黃耆一二錢小腹隱痛加枸杞二三錢如有脹悶加陳皮一錢如腰膝筋骨無力加杜仲牛膝四陰煎此保肺清金之劑故曰四陰治陰虛勞損相火熾盛津枯煩渴咳嗽吐衄多熱等證生地二三錢麥冬二錢白芍藥二錢百合二錢沙參二錢生甘草一錢茯苓一錢半水二鍾煎七分食遠服如夜熱盜汗加地骨皮一二錢如痰多氣盛加貝母二三錢阿膠一二錢天花粉亦可如金水不能相滋而乾燥喘嗽者加熟地三五錢如多汗不眠神魂不寧加棗仁二錢如多汗兼渴加北五味十四粒如熱甚者加黃柏一二錢鹽水炒用或玄參亦可但分上下用之如血燥經遲枯澀不至者加牛膝二錢如血熱吐衄加茜根二錢如多火便燥或肺乾咳咯者加天門冬二錢或加童便亦可如火載血上者去甘草加炒梔子一二錢五陰煎凡真陰虧損脾虛失血等證或見溏泄未甚者所重在脾故曰五陰忌用潤滑宜此主之熟地五七錢或一兩山藥炒二錢扁豆炒二三錢炙甘草一二錢茯苓一錢半芍藥炒黃二錢五味子二十粒人參隨宜用白朮炒一二錢水二鍾加蓮肉去心二十粒煎服大營煎治真陰精血虧損及婦人經遲血少腰膝筋骨疼痛或氣血虛寒心腹疼痛等證當歸二三錢或五錢熟地三五七錢枸杞二錢炙甘草一二錢杜仲二錢牛膝一錢半肉桂一二錢水二鍾煎七分食遠溫服如寒滯在經氣血不能流通筋骨疼痛之甚者必加製附子一二錢方效如帶濁腹痛者加故紙一錢炒用如氣虛者加人參白朮中氣虛寒嘔惡者加炒焦乾姜一二錢小營煎治血少陰虛此性味平和之方也當歸二錢熟地二三錢芍藥酒炒二錢山藥炒二錢枸杞二錢炙甘草一錢水二鍾煎七分食遠溫服如營虛於上而為驚恐怔忡不眠多汗者加棗仁茯神各二錢如營虛兼寒者去芍藥加生薑如氣滯有痛者加香附一二錢引而行之補陰益氣煎此補中益氣湯之變方也治勞倦傷陰精不化氣或陰虛內乏以致外感不解寒熱痎瘧陰虛便結不通等證凡屬陰氣不足而虛邪外侵者用此升散無不神效人參一二三錢當歸二三錢山藥酒炒二三錢熟地三五錢或一二兩陳皮一錢炙甘草一錢升麻三五分火浮於上者去此不必用柴胡一二錢如無外邪者不必用水二鍾加生薑三五七片煎八分食遠溫服舉元煎治氣虛下陷血崩血脫亡陽垂危等證有不利於歸熟等劑而但宜補氣者以此主之人參黃耆炙各三五錢炙甘草一二錢升麻五七分炒用白朮炒一二錢水一鍾半煎七八分溫服如兼陽氣虛寒者桂附乾薑隨宜佐用如兼滑脫者加烏梅二個或文蛤七八分兩儀膏治精氣大虧諸藥不應或以克伐太過耗損真陰凡虛在陽分而氣不化精者宜參朮膏若虛在陰分而精不化氣者莫妙於此其有未至大病而素覺陰虛者用以調元尤稱神妙人參半斤或四兩大熟地一斤上二味用好甜水或長流水十五碗浸一宿以桑柴文武火煎取濃汁若味有未盡再用水數碗煎柤取汁並熬稍濃乃入瓷罐重湯熬成膏入真白蜜四兩或半斤收之每以白湯點服若勞損咳嗽多痰加貝母四兩亦可貞元飲治氣短似喘呼吸促急提不能升咽不能降氣道噎塞勢劇垂危者常人但知為氣急其病在上而不知元海無根虧損肝腎此子午不交氣脫證也尤為婦人血海常虧者最多此證宜急用此飲以濟之緩之敢云神劑凡診此證脈必微細無神若微而兼緊尤為可畏倘庸眾不知妄云痰逆氣滯用牛黃蘇合及青陳枳殼破氣等劑則速其危矣熟地黃七八錢甚者一二兩炙甘草一二三錢當歸二三錢水二鍾煎八分溫服如兼嘔惡或惡寒者加煨姜三五片如氣虛脈微至極者急加人參隨宜如肝腎陰虛手足厥冷加肉桂一錢當歸地黃飲治腎虛腰膝疼痛等證當歸二三錢熟地三五錢山藥二錢杜仲二錢牛膝一錢半山茱萸一錢炙甘草八分水二鍾煎八分食遠服如下部虛寒加肉桂一二錢甚者仍加附子如多帶濁去牛膝加金櫻子二錢或加故紙一錢如氣虛者加人參一二錢枸杞二三錢濟川煎凡病涉虛損而大便閉結不通則硝黃攻擊等劑必不可用若勢有不得不通者宜此主之此用通於補之劑也最妙最妙當歸三五錢牛膝二錢肉蓯蓉酒洗去咸二三錢澤瀉一錢半升麻五七分或一錢枳殼一錢虛甚者不必用水一鍾半煎七八分食前服如氣虛者但加人參無礙如有火加黃芩如腎虛加熟地地黃醴治男婦精血不足營衛不充等患宜制此常用之大懷熟取味極甘者烘曬乾以去水氣八兩沉香一錢或白檀三分亦可枸杞用極肥者亦烘曬以去潤氣四兩上約每藥一斤可用高燒酒十斤浸之不必煮但浸十日之外即可用矣凡服此者不得過飲服完又加酒六七斤再浸半月仍可用歸腎丸治腎水真陰不足精衰血少腰痠腳軟形容憔悴遺泄陽衰等證此左歸右歸二丸之次者也熟地八兩山藥四兩山茱萸肉四兩茯苓四兩當歸三兩枸杞四兩杜仲鹽水炒四兩菟絲子制四兩煉蜜同熟地膏為丸桐子大每服百餘丸飢時或滾水或淡鹽湯送下贊化血餘丹此藥大補氣血故能烏鬚髮壯形體其於培元贊育之功有不可盡述者血餘八兩熟地八兩蒸搗枸杞當歸鹿角膠炒珠菟絲子制杜仲鹽水炒巴戟肉酒浸剝炒乾小茴香略炒白茯苓乳拌蒸熟肉蓯蓉酒洗去鱗甲胡桃肉各四兩何首烏小黑豆汁拌蒸七次如無黑豆或人乳牛乳拌蒸俱妙四兩人參隨便用無亦可上煉蜜丸服每食前用滾白湯送下二三錢許精滑者加白朮山藥各三兩便溏者去蓯蓉加補骨脂酒炒四兩陽虛者加附子肉桂養元粉大能實脾養胃氣糯米一升水浸一宿瀝乾漫火炒熟山藥炒芡實炒蓮肉各三兩川椒去目及閉口者炒出汗取紅末二三錢上為末每日飢時以滾水一碗入白糖三匙化開入藥末一二兩調服之或加四君山楂肉各一二兩更妙玄武豆羊腰子五十個枸杞二斤補骨脂一斤大茴香六兩小茴香六兩肉蓯蓉十二兩大便滑者去之青鹽八兩如無蓯蓉此宜十二兩大黑豆一斗圓淨者淘洗淨上用甜水二斗以砂鍋煮前藥七味至半乾去藥渣入黑豆勻火煮乾為度如有餘汁俱宜拌滲於內取出用新布攤晾曬乾瓷瓶收貯日服之其效無窮如無砂鍋即鐵鍋亦可若陽虛加製附子一二兩更妙蟠桃果治遺精虛弱補脾滋腎最佳芡實一斤炒蓮肉去心一斤膠棗肉一斤熟地一斤胡桃肉去皮二斤上以豬腰六個摻大茴香蒸極熟去筋膜同前藥末搗成餅每日服二個空心食前用滾白湯或好酒一二鐘下此方凡人參製附子俱可隨意加用王母桃培補脾腎功力最勝白朮用冬朮腿片味甘者佳苦者勿用以米泔浸一宿切片炒大懷熟蒸搗上二味等分何首烏九蒸巴戟甘草湯浸剝炒枸杞子上三味減半上為末煉蜜搗丸龍眼大每用三四丸飢時嚼服滾湯送下或加人參其功尤大休瘧飲此止瘧最妙之劑也若汗散既多元氣不復或以衰老或以弱質而瘧有不能止者俱宜用此此化暴善後之第一方也其有他證加減俱宜如法人參白朮炒當歸各三四錢何首烏制五錢炙甘草八分水一鍾半煎七分食遠服渣再煎或用陰陽水各一鍾煎一鍾柤亦如之俱露一宿次早溫服一鍾飯後食遠再服一鍾如陽虛多寒宜溫中散寒者加乾薑肉桂之類甚者或加製附子如陰虛多熱煩渴喜冷宜滋陰清火者加麥冬生地芍藥甚者加知母或加黃芩如腎陰不足水不制火虛煩虛餒腰柤腳軟或脾虛痞悶者加熟地枸杞山藥杜仲之類以滋脾腎之真陰如邪有未淨而留連難愈者於此方加柴胡麻黃細辛紫蘇之屬自無不可如氣血多滯者或用酒水各一鍾煎服或服藥後飲酒數杯亦可和陣金水六君煎治肺腎虛寒水泛為痰或年邁陰虛血氣不足外受風寒咳嗽嘔惡多痰喘急等證神效當歸二錢熟地三五錢陳皮一錢半半夏二錢茯苓二錢炙甘草一錢水二鍾生薑三五七片煎七八分食遠溫服如大便不實而多濕者去當歸加山藥如痰盛氣滯胸脅不快者加白芥子七八分如陰寒盛而嗽不愈者加細辛五七分如兼表邪寒熱者加柴胡一二錢六安煎治風寒咳嗽及非風初感痰滯氣逆等證陳皮一錢半半夏二三錢茯苓二錢甘草一錢杏仁一錢去皮尖切白芥子五七分老年氣弱者不用水一鍾半加生薑三五七片煎七分食遠服凡外感風邪咳嗽而寒氣盛者多不易散宜加北細辛七八分或一錢若冬月嚴寒邪甚者加麻黃桂枝亦可若風勝而邪不甚者加防風一錢或蘇葉亦可若頭痛鼻塞者加川芎白芷蔓荊子皆可若兼寒熱者加柴胡蘇葉若風邪咳嗽不止而兼肺胃之火者加黃芩一二錢甚者再加知母石膏所用生薑只宜一片凡寒邪咳嗽痰不利者加當歸二三錢老年者尤宜若氣血不足者當以金水六君煎與此參用凡非風初感痰勝而氣不順者加藿香一錢五分兼脹滿者加厚朴一錢暫開痰氣然後察其寒熱虛實而調補之若氣虛猝倒及氣平無痰者皆不可用此和胃二陳煎治胃寒生痰噁心嘔吐胸膈滿悶噯氣乾薑炒一二錢砂仁四五分陳皮半夏茯苓各一錢半甘草炙七分水一鍾半煎七分不拘時溫服苓朮二陳煎治痰飲水氣停蓄心下嘔吐吞酸等證豬苓一錢半白朮一二錢澤瀉一錢半陳皮一錢半夏二三錢茯苓一錢半炙甘草八分乾薑炒黃一二錢水一鍾半煎服如肝腎兼寒者加肉桂一二錢和胃飲治寒濕傷脾霍亂吐瀉及痰飲水氣胃脘不清嘔惡脹滿腹痛等證此即平胃散之變方也凡嘔吐等證多有胃氣虛者一聞蒼朮之氣亦能動嘔故以乾薑代之陳皮厚朴各一錢半乾薑炮一二錢炙甘草一錢水一鍾半煎七分溫服此方凡藿香木香丁香茯苓半夏扁豆砂仁澤瀉之類皆可隨宜增用之若胸腹有滯而兼時氣寒熱者加柴胡排氣飲治氣逆食滯脹痛等證陳皮一錢五分木香七分或一錢藿香一錢五分香附二錢枳殼一錢五分澤瀉二錢烏藥二錢厚朴一錢水一鍾半煎七分熱服如食滯者加山楂麥芽各二錢如寒滯者加焦乾薑吳茱萸肉桂之屬如氣逆之甚者加白芥子沉香青皮檳榔之屬如嘔而兼痛者加半夏丁香之屬如痛在小腹者加小茴香如兼疝者加荔枝核煨熟搗碎用二三錢大和中飲治飲食留滯積聚等證陳皮一二錢枳實一錢砂仁五分山楂二錢麥芽二錢厚朴一錢半澤瀉一錢半水一鍾半煎七八分食遠溫服脹甚者加白芥子胃寒無火或噁心者加炮乾薑一二錢疼痛者加木香烏藥香附之類多痰者加半夏小和中飲治胸膈脹悶或婦人胎氣滯滿等證陳皮一錢五分山楂二錢茯苓一錢半厚朴一錢五分甘草五分扁豆炒二錢水一鍾半加生薑三五片煎服如嘔者加半夏一二錢如脹滿氣不順者加砂仁七八分如火鬱於上者加焦梔子一二錢如婦人氣逆血滯者加紫蘇梗香附之屬如寒滯不行者加乾薑肉桂之屬大分清飲方在寒陣五小分清飲治小水不利濕滯腫脹不能受補等證此方主之茯苓二三錢澤瀉二三錢薏仁二錢豬苓二三錢枳殼一錢厚朴一錢水一鍾半煎七八分食前服如陰虛水不能達者加生地牛膝各二錢如黃疸者加茵陳二錢如無內熱而寒滯不行者加肉桂一錢解肝煎治暴怒傷肝氣逆脹滿陰滯等證如兼肝火者宜用化肝煎陳皮半夏厚朴茯苓各一錢半蘇葉芍藥各一錢砂仁七分水一鍾半加生薑三五片煎服如脅肋脹痛加白芥子一錢如胸膈氣滯加枳殼香附藿香之屬二術煎治肝強脾弱氣泄濕泄等證白朮炒二錢或三錢蒼朮米泔浸炒一二錢芍藥炒黃二錢陳皮炒一錢五分炙甘草一錢茯苓一二錢厚朴薑湯炒一錢木香六七分乾薑炒黃一二錢澤瀉炒一錢半水一鍾半煎七分食遠服廓清飲治三焦壅滯胸膈脹滿氣道不清小水不利年力未衰通身腫脹或肚腹單脹氣實非水等證枳殼二錢厚朴一錢半大腹皮一二錢白芥子五七分或一二錢蘿蔔子生搗一錢如中不甚脹能食者不必用此茯苓連皮用二三錢澤瀉二三錢陳皮一錢水一鍾半煎七分食遠溫服如內熱多火小水熱數者加梔子木通各一二錢如身黃小水不利者加茵陳二錢如小腹脹滿大便堅實不通者加生大黃三五錢如肝滯脅痛者加青皮如氣滯胸腹疼痛者加烏藥香附如食滯者加山楂麥芽掃蟲煎治諸蟲上攻胸腹作痛青皮一錢小茴香炒一錢檳榔烏藥各一錢半細榧肉三錢敲碎吳茱萸一錢烏梅二個甘草八分硃砂雄黃各五分俱為極細末上將前八味用水一鍾半煎八分去柤隨入後二味再煎三四沸攪勻徐徐服之如噁心作吐加炒乾姜一二錢或先啖牛肉脯少許俟一茶頃頓服之更妙十香丸治氣滯寒滯諸痛木香沉香澤瀉烏藥陳皮丁香小茴香香附酒炒荔核煨焦各等分皂角微火燒煙盡為末酒糊丸彈子大者磨化服丸桐子大者湯引下㿗疝之屬溫酒下芍藥枳朮丸治食積痞滿及小兒腹大脹滿時常疼痛脾胃不和等證此方較之枳朮丸其效如神白朮二兩麵炒赤芍藥二兩酒炒枳實一兩麵炒陳皮一兩荷葉湯煮黃老米粥為丸桐子大米飲或滾白湯任下百餘丸如臟寒加乾薑炒黃者五錢或一二兩如脾胃氣虛加人參一二兩蒼朮丸治寒濕在脾泄瀉久不能愈者雲苓四兩白芍藥炒黃四兩炙甘草一兩川椒去閉口者炒去汗小茴香炒各一兩厚朴三兩薑汁炒真茅山蒼朮八兩米泔浸一宿切炒如無即以好白朮代之破故紙酒浸二日曬乾炒香四兩上為末糯米糊為丸桐子大每食遠清湯送下七八十丸貝母丸消痰熱潤肺止咳或肺癰肺痿乃治標之妙劑貝母一兩為末用砂糖或蜜和丸龍眼大或噙化或嚼服之若欲劫止久嗽每貝母一兩宜加百藥煎蓬砂天竺黃各一錢佐之尤妙如無百藥煎即醋炒文蛤一錢亦可或粟殼亦可酌用若治肺癰宜加白礬一錢同貝母丸服如前最妙括痰丸治一切停痰積飲吞酸嘔酸胸脅脹悶疼痛等證半夏制二兩白芥子二兩乾薑炒黃一兩豬苓二兩炙甘草五錢陳皮四兩切碎用鹽二錢入水中拌浸一宿曬乾上為末湯浸蒸餅為丸綠豆大每服一錢許滾白湯送下如胸脅疼痛者加臺烏藥二兩神香散治胸脅胃脘逆氣難解疼痛嘔噦脹滿痰飲膈噎諸藥不效者惟此最妙丁香白豆蔻或砂仁亦可二味等分為末清湯調下五七分甚者一錢日數服不拘若寒氣作痛者薑湯送下攻陣吐法此方可代瓜蒂三聖散之屬凡邪實上焦或痰或食或氣逆不通等證皆可以此法吐之用蘿蔔子搗碎以溫湯和攪取淡湯徐徐飲之少頃即當吐出即有吐不盡者亦必從下行矣又法以蘿蔔子為末溫水調服一匙良久吐涎沫愈一法用鹽少許於熱鍋中炒紅色乃入以水煮至將滾未滾之際攪勻試其滋味稍淡乃可飲之每用半碗漸次增飲自然發吐以去病為度而止一法凡諸藥皆可取吐但隨證作湯劑探而吐之無不可也赤金豆亦名八仙丹治諸積不行凡血凝氣滯疼痛腫脹蟲積結聚癥堅宜此主之此丸去病捷速較之硝黃稜莪之類過傷臟氣者大為勝之巴霜去皮膜略去油一錢半生附子切略炒燥二錢皂角炒微焦二錢輕粉一錢丁香木香天竺黃各三錢硃砂二錢為衣上為末醋浸蒸餅為丸蘿蔔子大硃砂為衣欲漸去者每服五七丸欲驟行者每服一二十丸用滾水或煎藥或薑醋茶蜜茴香史君煎湯為引送下若利多不止可飲冷水一二口即止蓋此藥得熱則行得冷則止也如治氣濕實滯鼓脹先用紅棗煮熟取肉一錢許隨用七八丸甚者一二十丸同棗肉研爛以熱燒酒加白糖少許送下如治蟲痛亦用棗肉加服止用清湯送下太平丸治胸腹疼痛脹滿及食積氣積血積氣疝血疝邪實秘滯痛劇等證此方借些微巴豆以行群藥之力去滯最妙如欲其峻須用巴豆二錢陳皮厚朴木香烏藥白芥子草豆蔻三稜蓬朮煨乾薑牙皂炒斷煙澤瀉各三錢以上十一味俱為細末巴豆用滾湯泡去皮心膜稱足一錢用水一碗微火煮至半碗將巴豆撈起用乳缽研極細仍將前湯攙入研勻然後量藥多寡入蒸餅浸爛搗丸前藥如綠豆大每用三分或五分甚者一錢上隨證用湯引送下凡傷食停滯即以本物湯下婦人血氣痛紅花湯或當歸湯下氣痛陳皮湯疝氣茴香湯寒氣生薑湯欲瀉者用熱薑湯送下一錢未利再服利多不止用冷水一二口即止敦阜丸治堅頑食積停滯腸胃痛劇不行等證木香山楂麥芽皂角丁香烏藥青皮陳皮澤瀉各五錢巴霜一錢上共為末用生蒜頭一兩研爛加熟水取汁浸蒸餅搗丸綠豆大每服二三十丸隨便用湯引送下如未愈徐徐漸加用之獵蟲丸治諸蟲積脹痛黃瘦等病蕪荑雷丸桃仁乾漆炒煙盡雄黃微炒錫灰皂角燒煙盡檳榔使君子各等分輕粉減半細榧肉加倍湯浸蒸餅為丸綠豆大每服五七分滾白湯下陸續服之如蟲積堅固者加巴豆霜與輕粉同百順丸治一切陽邪積滯凡氣積血積蟲積食積傷寒實熱秘結等證但各為湯引隨宜送下無往不利川大黃錦紋者一斤牙皂角炒微黃一兩六錢上為末用湯浸蒸餅搗丸綠豆大每用五分或一錢或二三錢酌宜用引送下或用蜜為丸亦可散陣一柴胡飲一為水數從寒散也凡感四時不正之氣或為發熱或為寒熱或因勞因怒或婦人熱入血室或產後經後因冒風寒以致寒熱如瘧等證但外有邪而內兼火者須從涼散宜此主之柴胡二三錢黃芩一錢半芍藥二錢生地一錢半陳皮一錢半甘草八分水一鍾半煎七八分溫服如內熱甚者加連翹一二錢隨宜如外邪甚者加防風一錢佐之如邪結在胸而痞滿者去生地加枳實一二錢如熱在陽明而兼渴者加天花粉或葛根一二錢熱甚者加知母石膏亦可二柴胡飲二為火數從溫散也凡遇四時外感或其人元氣充實臟氣素平無火或時逢寒勝之令本無內熱等證者皆不宜妄用涼藥以致寒滯不散則為害非淺宜此主之陳皮一錢半半夏二錢細辛一二錢厚朴一錢半生薑三五七片柴胡一錢半或二三錢甘草八分水一鍾半煎七八分溫服如邪盛者可加羌活白芷防風紫蘇之屬擇而用之如頭痛不止者加川芎一二錢如多濕者加蒼朮如陰寒氣勝必加麻黃一二錢或兼桂枝不必疑也三柴胡飲三為木數從肝經血分也凡人素稟陰分不足或肝經血少而偶感風寒者或感邪不深可兼補而散者或病後產後感冒有不得不從解散而血氣虛弱不能外達者宜此主之柴胡二三錢芍藥一錢半炙甘草一錢陳皮一錢生薑三五片當歸二錢溏泄者易以熟地水一鍾半煎七八分溫服如微寒咳嘔者加半夏一二錢四柴胡飲四為金數從氣分也凡人元氣不足或忍飢勞倦而外感風寒或六脈緊數微細正不勝邪等證必須培助元氣兼之解散庶可保全宜此主之若但知散邪不顧根本未有不元氣先敗者察之慎之柴胡一二三錢炙甘草一錢生薑三五七片當歸二三錢瀉者少用人參二三錢或五七錢酌而用之水二鍾煎七八分溫服如胸膈滯悶者加陳皮一錢五柴胡飲五為土數從脾胃也脾土為五臟之本凡中氣不足而外邪有不散者非此不可此與四柴胡飲相表裡但四柴胡飲止調氣分此則兼培血氣以逐寒邪尤切於時用者也神效不可盡述凡傷寒瘧疾痘瘡皆所宜用柴胡一二三錢當歸二三錢熟地三五錢白朮二三錢芍藥錢半炒用炙甘草一錢陳皮酌用或不必用水一鍾半煎七分食遠熱服寒勝無火者減芍藥加生薑三五七片或炮乾薑一二錢或再加桂枝一二錢則更妙脾滯者減白朮氣虛者加人參隨宜腰痛者加杜仲頭痛者加川芎勞倦傷脾陽虛者加升麻一錢正柴胡飲凡外感風寒發熱惡寒頭疼身痛痎瘧初起等證凡血氣平和宜從平散者此方主之柴胡一二三錢防風一錢陳皮一錢半芍藥二錢甘草一錢生薑三五片水一鍾半煎七八分熱服如頭痛者加川芎一錢如熱而兼渴者加葛根一二錢如嘔惡者加半夏一錢五分如濕勝者加蒼朮一錢如胸腹有微滯者加厚朴一錢如寒氣勝而邪不易解者加麻黃一二三錢去浮沫服之或蘇葉亦可麻桂飲治傷寒瘟疫陰暑瘧疾凡陰寒氣勝而邪有不能散者非此不可無論諸經四季凡有是證即宜是藥勿謂夏月不可用也不必厚蓋但取津津微汗透徹為度此實麻黃桂枝二湯之變方而其神效則大有超出二方者不可不為細察官桂一二錢當歸三四錢炙甘草一錢陳皮隨宜用或不用亦可麻黃二三錢水一鍾半加生薑五七片或十片煎八分去浮沫不拘時服若陰氣不足者加熟地黃三五錢若三陽並病者加柴胡二三錢若元氣大虛陰邪難解者當以大溫中飲更迭為用大溫中飲凡患陽虛傷寒及一切四時勞倦寒疫陰暑之氣身雖熾熱時猶畏寒即在夏月亦欲衣披覆蓋或喜熱湯或兼嘔惡泄瀉但六脈無力肩背怯寒邪氣不能外達等證此元陽大虛正不勝邪之候若非峻補托散則寒邪日深必致不救溫中自可散寒即此方也服後畏寒悉除覺有躁熱乃陽回作汗佳兆不可疑之畏之此外凡以素稟薄弱之輩或感陰邪時疫發熱困倦雖未見如前陰證而熱邪未甚者但於初感時即速用此飲連進二三服無不隨藥隨愈真神劑也此方宜與理陰煎麻桂飲相參用熟地三五七錢冬白朮三五錢當歸三五錢如泄瀉者不宜用或以山藥代之人參二三錢甚者一兩或不用亦可炙甘草一錢柴胡二三四錢麻黃一二三錢肉桂一二錢乾薑炒熟一二錢或用煨生薑三五七片亦可水二鍾煎七分去浮沫溫服或略蓋取微汗如氣虛加黃耆二三錢如寒甚陽虛者加製附子一二錢頭痛加川芎或白芷細辛陽虛氣陷加升麻如肚腹泄瀉宜少減柴胡加防風細辛亦可嘗見傷寒之治惟仲景能知溫散如麻黃桂枝等湯是也亦知補氣而散如小柴胡之屬是也至若陽根於陰汗化於液從補血而散而云騰致雨之妙則仲景猶所未及故予制此方乃邪從營解第一義也其功難悉所當深察柴陳煎治傷風兼寒咳嗽發熱痞滿多痰等證柴胡二三錢陳皮一錢半半夏二錢茯苓二錢甘草一錢生薑三五七片水一鍾半煎七分食遠溫服如寒勝者加細辛七八分如風勝氣滯者加蘇葉一錢五分如冬月寒甚者加麻黃一錢五分氣逆多嗽者加杏仁一錢痞滿氣滯者加白芥子五七分柴芩煎治傷寒表邪未解外內俱熱瀉痢煩渴喜冷氣壯脈滑數者宜此主之及瘧痢並行內熱去血兼表邪發黃等證柴胡二三錢黃芩梔子澤瀉木通各二錢枳殼一錢五分水二鍾煎八分溫服如瘧痢並行鮮血純血者加芍藥二錢甘草一錢如濕勝氣陷者加防風一錢柴苓飲治風濕發黃發熱身痛脈緊表裡俱病小水不利中寒泄瀉等證柴胡二三錢豬苓茯苓澤瀉各二錢白朮二三錢肉桂一二三錢水一鍾半煎服如寒邪勝者加生薑三五片如汗出熱不退者加芍藥一二錢柴胡白虎煎治陽明溫熱表邪不解等證柴胡二錢石膏三錢黃芩二錢麥冬二錢細甘草七分水一鍾半加竹葉二十片煎服歸葛飲治陽明溫暑時證大熱大渴津液枯涸陰虛不能作汗等證當歸三五錢乾葛二三錢水二鍾煎一鍾以冷水浸涼徐徐服之得汗即解柴葛煎方在因陣十八治瘟毒表裡俱熱秘傳走馬通聖散治傷寒陰邪初感等證此方宜用於倉卒之時其有質強而寒甚者俱可用麻黃炙甘草各一兩雄黃二錢上為細末每服一錢熱酒下即汗或加川芎二錢秘傳白犀丹發散外感瘟疫癰毒等證白犀角麻黃去節山茨菇玄明粉血竭甘草各一錢雄黃八分上共為末用老薑汁拌丸如棗核大外以紅棗去核將藥填入棗內用薄紙裹十五層入砂鍋內炒令煙盡為度取出去棗肉每藥一錢入冰片一分麝香半分研極細瓷罐收貯用時以角簪蘸麻油黏藥點眼大角輕者只點眼角重者仍用些須吹鼻男先左女先右吹點皆同如病甚者先吹鼻後點眼點後蜷足坐起用被齊項暖蓋半炷香時自當汗出邪解如汗不得出或汗不下達至腰者不治又一製法將前藥用薑汁拌作二丸以烏金紙兩層包定外搗紅棗肉如泥包藥外約半指厚曬乾入砂鍋內再覆以砂盆用鹽泥固縫但留一小孔以候煙色乃上下加炭火先文後武待五色煙盡取出去棗肉每煅過藥一錢止加冰片二分不用麝香忌生冷麵食魚腥七情上藥凡傷寒瘟疫及小兒痘毒壅閉癰毒吼喘及陰毒冷氣攻心或婦人吹乳或眼目腫痛鼻壅閉塞並皆治之歸柴飲治營虛不能作汗及真陰不足外感寒邪難解者此神方也如大便多溏者以冬朮代當歸亦佳當歸一兩柴胡五錢炙甘草八分水一鍾半煎服或加生薑三五片或加陳皮一錢或加人參寒陣保陰煎治男婦帶濁遺淋色赤帶血脈滑多熱便血不止及血崩血淋或經期太早凡一切陰虛內熱動血等證生地熟地芍藥各二錢山藥川續斷黃芩黃柏各一錢半生甘草一錢水二鍾煎七分食遠溫服如小水多熱或兼怒火動血者加焦梔子一二錢如夜熱身熱加地骨皮一錢五分如肺熱多汗者加麥冬棗仁如血熱甚者加黃連一錢五分如血虛血滯筋骨腫痛者加當歸二三錢如氣滯而痛去熟地加陳皮青皮丹皮香附之屬如血脫血滑及便血久不止者加地榆一二錢或烏梅一二個或百藥煎一二錢文蛤亦可如少年或血氣正盛者不必用熟地山藥如肢節筋骨疼痛或腫者加秦艽丹皮各一二錢加減一陰煎方在補陣九治水虧火勝之甚者抽薪飲治諸凡火熾盛而不宜補者黃芩石斛木通梔子炒黃柏各一二錢枳殼錢半澤瀉錢半細甘草三分水一鍾半煎七分食遠溫服內熱甚者冷服更佳如熱在經絡肌膚者加連翹天花粉以解之熱在血分大小腸者加槐蕊黃連以清之熱在陽明頭面或躁煩便實者加生石膏以降之熱在下焦小水痛澀者加草龍膽車前以利之熱在陰分津液不足者加門冬生地芍藥之類以滋之熱在腸胃實結者加大黃芒硝以通之徙薪飲治三焦凡火一切內熱漸覺而未甚者先宜清以此劑其甚者宜抽薪飲陳皮八分黃芩二錢麥冬芍藥黃柏茯苓牡丹皮各一錢半水一鍾半煎七分食遠溫服如多鬱氣逆傷肝脅肋疼痛或致動血者加青皮梔子大分清飲治積熱閉結小水不利或致腰腿下部極痛或濕熱下利黃疸溺血邪熱蓄血腹痛淋閉等證茯苓澤瀉木通各二錢豬苓梔子或倍之枳殼車前子各一錢水一鍾半煎八分食遠溫服如內熱甚者加黃芩黃柏草龍膽之屬如大便堅硬脹滿者加大黃二三錢如黃疸小水不利熱甚者加茵陳二錢如邪熱蓄血腹痛者加紅花青皮各一錢五分清流飲治陰虛挾熱瀉痢或發熱或喜冷或下純紅鮮血或小水痛赤等證生地芍藥茯苓澤瀉各二錢當歸一二錢甘草一錢黃芩黃連各半錢枳殼一錢水一鍾半煎服如熱甚者加黃柏小水熱痛者加梔子化陰煎治水虧陰涸陽火有餘小便癃閉淋濁疼痛等證生地黃熟地黃牛膝豬苓澤瀉生黃柏生知母各二錢綠豆三錢龍膽草錢半車前子一錢水二鍾加食鹽少許用文武火煎八分食前溫服或冷服若水虧居多而陰氣大有不足者可遞加熟地黃即用至一二兩亦可茵陳飲治挾熱泄瀉熱痢口渴喜冷小水不利黃疸濕熱閉澀等證茵陳焦梔子澤瀉青皮各三錢甘草一錢甘菊花二錢用水三四鍾煎兩鍾不時陸續飲之治熱瀉者一服可愈清膈煎治痰因火動氣壅喘滿內熱煩渴等證陳皮錢半貝母二三錢微敲破膽星一二錢海石二錢白芥子五七分木通二錢水一鍾半煎七分溫服如火盛痰不降者加童便一小鐘如渴甚者加天花粉一錢如熱及下焦小水不利者加梔子一錢半如熱在上焦頭面紅赤煩渴喜冷者加生石膏二三錢如痰火上壅而小水不利者加澤瀉一二錢如痰火閉結大便不通而兼脹滿者加大黃數錢或朴硝一二錢酌宜用之化肝煎治怒氣傷肝因而氣逆動火致為煩熱脅痛脹滿動血等證青皮陳皮各二錢芍藥二錢丹皮梔子炒澤瀉各錢半如血見下部者以甘草代之土貝母二三錢水一鍾半煎七八分食遠溫服如大便下血者加地榆小便下血者加木通各一錢五分如兼寒熱加柴胡一錢如火盛加黃芩一二錢如脅腹脹痛加白芥子一錢脹滯多者勿用芍藥安胃飲治胃火上衝呃逆不止陳皮山楂麥芽木通澤瀉黃芩石斛水一鍾半煎七分食遠服如胃火熱甚脈滑實者加石膏玉女煎治水虧火盛六脈浮洪滑大少陰不足陽明有餘煩熱乾渴頭痛牙疼失血等證如神如神若大便溏泄者乃非所宜生石膏三五錢熟地三五錢或一兩麥冬二錢知母牛膝各錢半水一鍾半煎七分溫服或冷服如火之盛極者加梔子地骨皮之屬亦可如多汗多渴者加北五味十四粒如小水不利或火不能降者加澤瀉一錢五分或茯苓亦可如金水俱虧因精損氣者加人參二三錢尤妙太清飲治胃火煩熱狂斑嘔吐等證可與白虎湯出入酌用知母石斛木通各一錢半石膏生用五七錢水一鍾半煎七分溫服或冷服或加麥門冬綠豆飲凡熱毒勞熱諸火熱極不能退者用此最妙用綠豆不拘多寡寬湯煮糜爛入鹽少許或蜜亦可待冰冷或厚或稀或湯任意飲食之日或三四次不拘此物性非苦寒不傷脾氣且善於解毒除煩退熱止渴大利小水乃淺易中之最佳最捷者也若火盛口甘不宜厚味但略煮半熟清湯冷飲之尤善除煩清火玉泉散亦名一六甘露散治陽明內熱煩渴頭痛二便閉結溫疫斑黃及熱痰喘嗽等證此益元散之變方也其功倍之石膏六兩生用粉甘草一兩上為極細末每服一二三錢新汲水或熱湯或人參湯調下此方加硃砂三錢亦妙雪梨漿解煩熱退陰火此生津止渴之妙劑也用清香甘美大梨削去皮別用大碗盛清冷甘泉將梨薄切浸於水中少頃水必甘美但頻飲其水勿食其柤退陰火極速也滋陰八味丸治陰虛火盛下焦濕熱等證此方變丸為湯即名滋陰八味煎山藥四兩丹皮三兩白茯苓三兩山茱萸肉四兩澤瀉三兩黃柏鹽水炒三兩熟地黃八兩蒸搗知母鹽水炒三兩上加煉蜜搗丸梧桐子大或空心或午前用滾白湯或淡鹽湯送下百餘丸約陰丸治婦人血海有熱經脈先期或過多者或兼腎火而帶濁不止及男婦大腸血熱便紅等證當歸白朮炒芍藥酒炒生地茯苓地榆黃芩白石脂醋煅粹北五味丹參川續斷各等分上為末煉蜜丸服火甚者倍用黃芩兼肝腎之火甚者仍加知母黃柏各等分大腸血熱便紅者加黃連防風各等分服蠻煎此方性味極輕極清善入心肝二臟行滯氣開鬱結通神明養正除邪大有奇妙生地麥門冬芍藥石菖蒲石斛川丹皮極香者茯神各二錢陳皮一錢木通知母各一錢半水一鍾半煎七分食遠服如痰勝多郁者加貝母二錢痰盛兼火者加膽星一錢五分陽明火盛內熱狂叫者加石膏二三錢便結脹滿多熱者玄明粉二三錢調服或暫加大黃亦可氣虛神困者加人參隨宜約營煎治血熱便血無論脾胃小腸大腸膀胱等證皆宜用此生地芍藥甘草續斷地榆黃芩槐花荊芥穗炒焦烏梅二個水一鍾半煎七分食前服如下焦火盛者可加梔子黃連龍膽草之屬如氣虛者可加人參白朮如氣陷者加升麻防風熱陣四味回陽飲治元陽虛脫危在頃刻者人參一二兩製附子二三錢炙甘草一二錢炮乾薑二三錢水二鍾武火煎七八分溫服徐徐飲之六味回陽飲治陰陽將脫等證人參一二兩或數錢製附子二三錢炮乾薑二三錢炙甘草一錢熟地五錢或一兩當歸身三錢如泄瀉者或血動者以冬朮易之多多益善水二鍾武火煎七八分溫服如肉振汗多者加炙黃耆四五錢或一兩或冬白朮三五錢如泄瀉者加烏梅二枚或北五味二十粒亦可如虛陽上浮者加茯苓二錢如肝經鬱滯者加肉桂二三錢理陰煎此理中湯之變方也凡脾腎中虛等證宜剛燥者當用理中六君之類宜溫潤者當用理陰大營之類欲知調補當先察此此方通治真陰虛弱脹滿嘔噦痰飲噁心吐瀉腹痛婦人經遲血滯等證又凡真陰不足或素多勞倦之輩因而忽感寒邪不能解散或發熱或頭身疼痛或面赤舌焦或雖渴而不喜冷飲或背心肢體畏寒但脈見無力者悉是假熱之證若用寒涼攻之必死宜速用此湯照後加減以溫補陰分托散表邪連進數服使陰氣漸充則汗從陰達而寒邪不攻自散此最切於時用者也神效不可盡述熟地三五七錢或一二兩當歸二三錢或五七錢炙甘草一二錢乾薑炒黃色一二三錢或加肉桂一二錢水二鍾煎七八分熱服此方加附子即名附子理陰煎再加人參即名六味回陽飲治命門火衰陰中無陽等證若風寒外感邪未入深但見發熱身痛脈數不洪凡內無火證素稟不足者但用此湯加柴胡一錢半或二錢連進一二服其效如神若寒凝陰盛而邪有難解者必加麻黃一二錢放心用之或不用柴胡亦可恐其清利也此寒邪初感溫散第一方惟仲景獨知此義第仲景之溫散首用麻黃桂枝二湯余之溫散即以理陰煎及大溫中飲為增減此雖一從陽分一從陰分其跡若異然一逐於外一托於內而用溫則一也學者當因所宜酌而用之若陰勝之時外感寒邪脈細惡寒或背畏寒者乃太陽少陰證也加細辛一二錢甚者再加附子一二錢真神劑也或並加柴胡以助之亦可若陰虛火盛其有內熱不宜用溫而氣血俱虛邪不能解者宜去薑桂單以三味加減與之或只加人參亦可若治脾腎兩虛水泛為痰或嘔或脹者於前方加茯苓一錢半或加白芥子五分以行之若泄瀉不止及腎泄者少用當歸或並去之加山藥扁豆吳茱萸破故紙肉豆蔻附子之屬若腰腹有痛加杜仲枸杞若腹有脹滯疼痛加陳皮木香砂仁之屬養中煎治中氣虛寒為嘔為泄者人參一二三錢山藥炒二錢白扁豆炒二三錢炙甘草一錢茯苓二錢乾薑炒黃一二錢水二鍾煎七分食遠溫服如噯腐氣滯者加陳皮一錢或砂仁四分如胃中空虛覺餒者加熟地三五錢溫胃散治中寒嘔吐吞酸泄瀉不思飲食及婦人臟寒嘔惡胎氣不安等證人參一二三錢或一兩白朮炒一二錢或一兩扁豆二錢炒陳皮一錢或不用乾薑炒焦一二三錢炙甘草一錢當歸一二錢滑泄者勿用水二鍾煎七分食遠溫服如下寒帶濁者加破故紙一錢如氣滯或兼胸腹痛者加藿香丁香木香白豆蔻砂仁白芥子之屬如兼外邪及肝腎之病者加桂枝肉桂甚者加柴胡如脾氣陷而身熱者加升麻五七分如水泛為痰而胸腹痞滿者加茯苓一二錢如脾胃虛極大嘔大吐不能止者倍用參朮仍加胡椒二三分許煎熟徐徐服之五君子煎治脾胃虛寒嘔吐泄瀉而兼濕者人參二三錢白朮茯苓各二錢炙甘草一錢乾薑炒黃一二錢水一鍾半煎服六味異功煎治證同前而兼微滯者即前方加陳皮一錢此即五味異功散加乾薑也參姜飲治脾肺胃氣虛寒嘔吐咳嗽氣短小兒吐乳等證人參三五錢或倍之炙甘草三五分乾薑炮五分或一二錢或用煨生薑三五片水一鍾半煎七八分徐徐服之此方或陳皮或蓽茇或茯苓皆可酌而佐之胃關煎治脾腎虛寒作瀉或甚至久瀉腹痛不止冷痢等證熟地三五錢或一兩山藥炒二錢白扁豆炒二錢炙甘草一二錢焦乾姜一二三錢吳茱萸制五七分白朮炒一二三錢水二鍾煎七分食遠溫服瀉甚者加肉豆蔻一二錢麵炒用或破故紙亦可氣虛勢甚者加人參隨宜用陽虛下脫不固者加製附子一二三錢腹痛甚者加木香七八分或加厚朴八分滯痛不通者加當歸二三錢滑脫不禁者加烏梅二個或北五味子二十粒若肝邪侮脾者加肉桂一二錢佐關煎治生冷傷脾瀉痢未久腎氣未損者宜用此湯以去寒濕安脾胃此胃關煎之佐者也厚朴炒一錢陳皮炒一錢山藥炒二錢扁豆炒二錢炙甘草七分豬苓二錢澤瀉二錢乾薑炒一二錢肉桂一二錢水一鍾半煎服如腹痛甚者加木香三五分或吳茱萸亦可如瀉甚不止者或破故紙或肉豆蔻皆可加用抑扶煎治氣冷陰寒或暴傷生冷致成瀉痢凡初起血氣未衰脾腎未敗或脹痛或嘔惡皆宜先用此湯此胃關煎表裡藥也宜察虛實用之其有寒濕傷臟霍亂邪實者最宜用此厚朴陳皮烏藥各一錢五分豬苓二錢澤瀉二錢炙甘草一錢乾薑炮一二錢吳茱萸制五七分水一鍾半煎七分食遠溫服如氣滯痛甚者加木香五七分或砂仁亦可如血虛多痛者加當歸二錢如寒濕勝者加蒼朮一錢半四維散治脾腎虛寒滑脫之甚或泄痢不能止或氣虛下陷二陰血脫不能禁者無出此方之右人參一兩製附子二錢乾薑炒黃二錢炙甘草一二錢烏梅肉五分或一錢酌其味之微甚隨病人之意而用之或不用此即四味回陽飲也上為末和勻用水拌濕蒸一飯頃取起烘乾再為末每服一二錢溫湯調下鎮陰煎治陰虛於下格陽於上則真陽失守血隨而溢以致大吐大衄六脈細脫手足厥冷危在頃刻而血不能止者速宜用此使孤陽有歸則血自安也如治格陽喉痹上熱者當以此湯冷服熟地一二兩牛膝二錢炙甘草一錢澤瀉一錢半肉桂一二錢製附子五七分或一二三錢水二鍾速煎服如兼嘔惡者加乾薑炒黃一二錢如氣脫倦言而脈弱極者宜速速多加人參隨宜用之歸氣飲治氣逆不順呃逆嘔吐或寒中脾腎等證熟地三五錢茯苓二錢扁豆二錢乾薑炮丁香陳皮各一錢藿香一錢五分炙甘草八分水一鍾半煎七分食遠溫服中氣寒甚者加製附子肝腎寒者加吳茱萸肉桂或加當歸暖肝煎治肝腎陰寒小腹疼痛疝氣等證當歸二三錢枸杞三錢茯苓二錢小茴香二錢肉桂一二錢烏藥二錢沉香一錢或木香亦可水一鍾半加生薑三五片煎七分食遠溫服如寒甚者加吳茱萸乾薑再甚者加附子壽脾煎一名攝營煎治脾虛不能攝血等證凡憂思鬱怒積勞及誤用攻伐等藥犯損脾陰以致中氣虧陷神魂不寧大便脫血不止或婦人無火崩淋等證凡兼嘔惡尤為危候速宜用此單救脾氣則統攝固而血自歸源此歸脾湯之變方其效如神若犯此證而再用寒涼則胃氣必脫無不即斃者白朮二三錢當歸二錢山藥二錢炙甘草一錢棗仁錢半遠志制三五分乾薑炮一二三錢蓮肉去心炒二十粒人參隨宜一二錢急者用一兩水二鍾煎服如血未止加烏梅二個凡畏酸者不可用或加地榆一錢半亦可滑脫不禁者加醋炒文蛤一錢下焦虛滑不禁加鹿角霜二錢為末攪入藥中服之氣虛甚者加炙黃耆二三錢氣陷而墜者加炒升麻五七分或白芷亦可兼溏泄者加補骨脂一錢炒用陽虛畏寒者加製附子一二三錢血去過多陰虛氣餒心跳不寧者加熟地七八錢或一二兩三氣飲治血氣虧損風寒濕三氣乘虛內侵筋骨歷節痹痛之極及痢後鶴膝風痛等症當歸枸杞杜仲各二錢熟地三錢或五錢牛膝茯苓芍藥酒炒肉桂各一錢北細辛或代以獨活白芷炙甘草各一錢附子隨宜一二錢水二鍾加生薑三片煎服如氣虛者加人參白朮隨宜風寒勝者加麻黃一二錢此飲亦可浸酒大約每藥一斤可用燒酒六七升浸十餘日徐徐服之五德丸治脾腎虛寒飧泄鶩溏等證或暴傷生冷或受時氣寒濕或酒濕傷脾腹痛作泄或飲食失宜嘔惡痛泄無火等證補骨脂四兩酒炒吳茱萸制二兩木香二兩乾薑四兩炒北五味二兩或以肉豆蔻代之麵炒用或用烏藥亦可湯浸蒸餅丸桐子大每服六七十丸甚者百餘丸滾白湯或人參湯或米湯俱可下腹痛多嘔者加胡椒二兩更妙七德丸治生冷傷脾初患瀉痢腹脹疼痛凡年壯氣血未衰及寒濕食滯凡宜和胃者無不神效此即佐關煎之偏裨也臺烏藥吳茱萸制乾薑炒黃蒼朮炒各二兩木香茯苓各一兩補骨脂炒四兩神麯糊丸桐子大每服七八十丸或百丸滾白湯送下復陽丹治陰寒嘔吐泄瀉腹痛寒疝等證附子制炮姜胡椒北五味炒炙甘草各一兩白麵二兩炒熟上為末和勻入溫湯搗丸桐子大每服一錢隨證用藥引送下黃芽丸治脾胃虛寒或飲食不化或時多脹滿泄瀉吞酸嘔吐等證此藥隨身常用甚妙人參二兩焦乾姜三錢煉白蜜為丸芡實大常嚼服之一氣丹治脾腎虛寒不時易瀉腹痛陽痿怯寒等證此即參附湯之變方也人參製附子各等分煉白蜜丸如綠豆大每用滾白湯送下三五分或一錢凡藥餌不便之處或在途次隨帶此丹最妙九氣丹治脾腎虛寒如五德丸之甚者熟地八兩製附子四兩肉豆蔻麵炒二兩焦姜吳茱萸補骨脂酒炒蓽茇炒五味子炒各二兩粉甘草炒一兩煉白蜜為丸或山藥糊丸如桐子大每服六七十丸或百丸滾白湯下如氣虛者加人參或二兩或四兩尤妙甚溫臟丸治諸蟲積既逐而復生者多由臟氣虛寒宜健脾胃以杜其源此方主之人參隨宜用無亦可白朮米泔浸炒當歸各四兩芍藥酒炒焦茯苓川椒去合口者炒出汗細榧肉使君子煨取肉檳榔各二兩乾薑炮吳茱萸湯炮一宿炒各一兩上為末神麯糊為丸桐子大每服五七十丸或百丸飢時白湯下如臟寒者加製附子一二兩臟熱者加黃連一二兩聖朮煎治飲食偶傷或吐或瀉胸膈痞悶或脅肋疼痛或過用克伐等藥致傷臟氣有同前證而脈無力氣怯神倦者速宜用此不得因其虛痞虛脹而畏用白朮此中虛實之機貴乎神悟也若痛脹覺甚者即以此煎送神香散最妙若用治寒濕瀉痢嘔吐尤為聖藥白朮用冬朮味甘佳者五六七八錢炒或一二兩乾薑炒肉桂各一二錢陳皮酌用或不用水一鍾半煎七分溫熱服若治虛寒瀉痢嘔吐等證則人參炙甘草之類當任意加用若治中虛感寒則麻黃柴胡亦任意加用固陣秘元煎治遺精帶濁等病此方專主心脾遠志八分炒山藥二錢炒芡實二錢炒棗仁炒搗碎二錢白朮炒茯苓各錢半炙甘草一錢人參一二錢五味十四粒畏酸者去之金櫻子去核二錢水二鍾煎七分食遠服此治久遺無火不痛而滑者乃可用之如尚有火覺熱者加苦參一二錢如氣大虛者加黃耆一二三錢固陰煎治陰虛滑泄帶濁淋遺及經水因虛不固等證此方專主肝腎人參隨宜熟地三五錢山藥炒二錢山茱萸一錢半遠志七分炒炙甘草一二錢五味十四粒菟絲子炒香二三錢水二鍾煎七分食遠溫服如虛滑遺甚者加金櫻子肉二三錢或醋炒文蛤一錢或烏梅二個如陰虛微熱而經血不固者加川續斷二錢如下焦陽氣不足而兼腹痛溏泄者加補骨脂吳茱萸之類隨宜用之如肝腎血虛小腹痛而血不歸經者加當歸二三錢如脾虛多濕或兼嘔惡者加白朮一二錢如氣陷不固者加炒升麻一錢如兼心虛不眠或多汗者加棗仁二錢炒用菟絲煎治心脾氣弱凡遇思慮勞倦即苦遺精者宜此主之人參二三錢山藥炒二錢當歸錢半菟絲子制炒四五錢棗仁炒茯苓各錢半炙甘草一錢或五分遠志制四分鹿角霜為末每服加入四五匙上用水一鍾半煎成加鹿角霜末調服食前或加白朮一二錢惜紅煎治婦人經血不固崩漏不止及腸風下血等證白朮山藥炙甘草地榆續斷炒芍藥炒北五味十四粒荊芥穗炒烏梅二枚水一鍾半煎七分食遠服如火盛者加黃連黃芩如脾虛兼寒脾泄者加破故紙人參苓朮菟絲丸治脾腎虛損不能收攝以致夢遺精滑困倦等證白茯苓白朮米泔洗炒蓮肉去心各四兩五味二兩酒蒸山藥炒二兩杜仲酒炒三兩炙甘草五錢菟絲子用好水淘淨入陳酒浸一日文火煮極爛搗為餅焙乾為末十兩上用山藥末以陳酒煮糊為丸桐子大空心滾白湯或酒下百餘丸如氣虛神倦不能收攝者加人參三四兩尤妙固真丸治夢遺精滑菟絲子一斤淘洗淨用好酒浸三日煮極熟搗膏曬乾或用淨白布包蒸亦佳牡蠣煅四兩金櫻子去子蒸熟四兩茯苓酒拌蒸曬四兩上蜜丸空心好酒送下三錢或鹽湯亦可黏米固腸糕治脾胃虛寒或因食滯氣滯腹痛泄瀉久不止者多服自效用白糯米滾湯淘洗炒香熟為粉每粉一兩加乾薑末炒熟者二分半白糖二錢拌勻於飢時用滾水調服一二兩如有微滯者加陳皮炒末二分或砂仁末一分俱妙一法用陳老米粉亦妙此與古方固類四十九泄瀉經驗方大同小異並補陣養元粉略同玉關丸治腸風血脫崩漏帶濁不固諸藥難效者宜用此丸兼煎藥治之及瀉痢滑泄不能止者亦宜用此白麵炒熟四兩枯礬二兩文蛤醋炒黑二兩北五味一兩炒訶子二兩半生半炒上為末用熟湯和丸梧子大以溫補脾腎等藥隨證加減煎湯送下或人參湯亦可如血熱妄行者以涼藥送下鞏堤丸治膀胱不藏水泉不止命門火衰小水不禁等證熟地二兩菟絲子酒煮二兩白朮炒二兩北五味益智仁酒炒故紙酒炒附子制茯苓家韭子炒各一兩上為末山藥糊丸如桐子大每服百餘丸空心滾湯或溫酒下如兼氣虛必加人參一二兩更妙敦阜糕治久瀉久痢腸滑不固妙方及婦人帶濁最佳白麵炒黃二兩冬白朮炒黃一兩破故紙炒五錢上共為末臨服時加白糖隨宜用清滾湯食前調服如糕法如胃寒者每一兩加乾薑炒末五分或一錢如氣有不順或痛或嘔每末一兩加丁香一錢如滑泄不禁者每兩加慄殼末炒黃一錢若以作丸則宜三味等分用即名敦阜丸因陣逍遙飲治婦人思郁過度致傷心脾衝任之源血氣日枯漸至經脈不調者當歸二三錢芍藥錢半熟地三五錢棗仁二錢炒茯神錢半遠志制三五分陳皮八分炙甘草一錢水二鍾煎七分食遠溫服如氣虛者加人參一二錢如經水過期兼痛滯者加酒炒香附一二錢決津煎治婦人血虛經滯不能流暢而痛極者當以水濟水若江河一決而積垢皆去宜用此湯隨證加減主之此用補為瀉之神劑也如氣虛者宜少用香陳之類甚者不用亦可當歸三五錢或一兩澤瀉一錢半牛膝二錢肉桂一二三錢熟地二三錢或五七錢或不用亦可烏藥一錢如氣虛者不用亦可水二鍾煎七八分食前服如嘔惡者加焦姜一二錢如陰滯不行者非加附子不可如氣滯而痛脹者加香附一二錢或木香七八分如血滯血澀者加酒炒紅花一二錢如小腹不暖而痛極者加吳茱萸七八分如大便結澀者加肉蓯蓉一二三錢微者以山楂代之五物煎治婦人血虛凝滯蓄積不行小腹痛急產難經滯及痘瘡血虛寒滯等證神效此即四物湯加肉桂也當歸三五七錢熟地三四錢芍藥二錢酒炒川芎一錢肉桂一二三錢水一鍾半煎服兼胃寒或嘔惡者加乾薑炮用水道不利加澤瀉或豬苓氣滯者加香附或丁香木香砂仁烏藥陰虛疝痛者加小茴香血瘀不行臍下若覆杯漸成積塊者加桃仁或酒炒紅花痘瘡血虛寒勝寒邪在表者加細辛麻黃柴胡紫蘇之屬調經飲治婦人經脈阻滯氣逆不調多痛而實者當歸三五錢牛膝二錢山楂一二錢香附二錢青皮茯苓各一錢半水二鍾煎七分食遠服如因不避生冷而寒滯其血者加肉桂吳茱萸之類如兼脹悶者加厚朴一錢或砂仁亦可如氣滯者加烏藥二錢或痛在小腹者加小茴香一錢半通瘀煎治婦人氣滯血積經脈不利痛極拒按及產後瘀血實痛並男婦血逆血厥等證歸尾三五錢山楂香附紅花新者炒黃各二錢烏藥一二錢青皮錢半木香七分澤瀉錢半水二鍾煎七分加酒一二小鐘食前服兼寒滯者加肉桂一錢或吳茱萸五分火盛內熱血燥不行者加炒梔子一二錢微熱血虛者加芍藥二錢血虛澀滯者加牛膝血瘀不行者加桃仁三十粒去皮尖用或加蘇木玄胡索之類瘀極而大便結燥者加大黃一二三錢或加芒硝蓬朮亦可胎元飲治婦人衝任失守胎元不安不固者隨證加減用之或間日或二三日常服一二劑人參隨宜當歸杜仲芍藥各二錢熟地二三錢白朮錢半炙甘草一錢陳皮七分無滯者不必用水二鍾煎七分食遠服如下元不固而多遺濁者加山藥補骨胎五味之類如氣分虛甚者倍白朮加黃耆但耆術氣浮能滯胃口倘胸膈有飽悶不快者須慎用之如虛而兼寒多嘔者加炮姜七八分或一二錢如虛而兼熱者加黃芩一錢五分或加生地二錢去杜仲如陰虛小腹作痛加枸杞二錢如多怒氣逆者加香附無妨或砂仁亦妙如有所觸而動血者加川續斷阿膠各一二錢如嘔吐不止加半夏一二錢生薑三五片固胎煎治肝脾多火多滯而屢墮胎者黃芩二錢白朮一二錢當歸芍藥阿膠各錢半陳皮一錢砂仁五分水一鍾半煎服涼胎飲治胎氣內熱不安等證生地芍藥各二錢黃芩當歸各一二錢甘草生七分枳殼石斛各一錢茯苓錢半水一鍾半煎七分食遠溫服如熱甚者加黃柏一二錢滑胎煎胎氣臨月宜常服數劑以使易生當歸三五錢川芎七分杜仲二錢熟地三錢枳殼七分山藥二錢水二鍾煎八九分食煎溫服如氣體虛弱者加人參白朮隨宜用之如便實多滯者加牛膝一二錢殿胞煎治產後兒枕疼痛等證如神當歸五七錢或一兩川芎炙甘草各一錢茯苓一錢肉桂一二錢或五七分水一鍾煎八分熱服如脈細而寒或嘔者加乾薑炒黃色一二錢如血熱多火者去肉桂加酒炒芍藥一二錢如脈弱陰虛者加熟地三五錢如氣滯者加香附一二錢或烏藥亦可腰痛加杜仲一二錢脫花煎凡臨盆將產者宜先服此藥催生最佳並治產難經日或死胎不下俱妙當歸七八錢或一兩肉桂一二錢或三錢川芎牛膝各二錢車前子錢半紅花一錢催生者不用此味亦可水二鍾煎八分熱服或服後飲酒數杯亦妙若胎死腹中或堅滯不下者加朴硝三五錢即下若氣虛困劇者加人參隨宜若陰虛者必加熟地三五錢九蜜煎治產後陽氣虛寒或陰邪入臟心腹疼痛嘔吐不食四肢厥冷此與大岩蜜湯略同而稍勝之當歸熟地各三錢芍藥酒炒焦茯苓各錢半炙甘草乾薑炒肉桂北細辛各一錢吳茱萸制五分水二鍾煎服清化飲治婦人產後因火發熱及血熱妄行陰虧諸火不清等證芍藥麥冬各二錢丹皮茯苓黃芩生地各二三錢石斛一錢水一鍾半煎七分食遠溫服如覺骨蒸多汗者加地骨皮一錢半熱甚而渴或頭痛者加石膏一二三錢下熱便澀者加木通一二錢或黃柏梔子皆可隨證用之如兼外邪發熱加柴胡一二錢愚按丹溪云芍藥酸寒大伐發生之氣產後忌用之此亦言之過也夫芍藥之寒不過於生血藥中稍覺其清耳非若芩連輩之大苦大寒者也使芍藥猶忌如此則他之更寒者尤為不可用矣余每見產家過慎者或因太暖或因年力方壯而飲食藥餌太補過度以致產後動火者病熱極多若盡以產後為虛必須皆補豈盡善哉且芍藥性清微酸而收最宜於陰氣散失之證豈不為產後之要藥乎不可不辨也毓麟珠治婦人氣血俱虛經脈不調或斷續或帶濁或腹痛或腰痠或飲食不甘瘦弱不孕服一二斤即可受胎凡種子諸方無以加此人參白朮土炒茯苓芍藥酒炒各二兩川芎炙甘草各一兩當歸熟地蒸搗各四兩菟絲子制四兩杜仲酒炒鹿角霜川椒各二兩上為末煉蜜丸彈子大每空心嚼服一二丸用酒或白湯送下或為小丸吞服亦可如男子制服宜加枸杞胡桃肉鹿角膠山藥山茱萸巴戟肉各二兩如女人經遲腹痛宜加酒炒破故肉桂各一兩甚者再加吳茱萸五錢湯泡一宿炒用如帶多腹痛加破故一兩北五味五錢或加龍骨一兩醋煅用如子宮寒甚或泄或痛加製附子炮乾薑隨宜如多鬱怒氣有不順而為脹為滯者宜加酒炒香附二兩或甚者再加沉香五錢如血熱多火經早內熱者加川續斷地骨皮各二兩或另以湯劑暫清其火而後服此或以湯引酌宜送下亦可贊育丹治陽痿精衰虛寒無子等證妙方熟地八兩蒸搗白朮用冬朮八兩當歸枸杞各六兩杜仲酒炒仙茅酒蒸一日巴戟肉甘草湯炒山茱萸淫羊藿羊脂拌炒肉蓯蓉酒洗去甲韭子炒黃各四兩蛇床子微炒附子制肉桂各二兩上煉蜜丸服或加人參鹿茸亦妙柴歸飲治痘瘡初起發熱未退無論是痘是邪疑似之間均宜用此平和養營之劑以為先著有毒者可托有邪者可散實者不致助邪虛者不致損氣凡陽明實熱邪盛者宜升麻葛根湯如無實邪則悉宜用此增減主之當歸二三錢芍藥或生或炒一錢半柴胡一錢或錢半荊芥穗一錢炙甘草七分或一錢水一鍾半煎服或加生薑三片血熱者加生地陰虛者加熟地氣虛脈弱者加人參虛寒者加炮薑肉桂火盛者加黃芩熱渴者加乾葛腹痛者加木香砂仁嘔惡者加炮薑陳皮若治麻疹或以荊芥易乾葛陰寒盛而邪不能解者加麻黃桂枝疏邪飲治痘疹初起發熱凡血氣強盛無藉滋補者單宜解邪用此方為主以代升麻葛根湯及蘇葛湯等方最為妥當柴胡倍用芍藥倍用酒炒蘇葉荊芥穗炙甘草減半水一鍾半煎服無火者加生薑三片火盛內熱者加黃芩渴者加乾葛涼血養營煎治痘瘡血虛血熱地紅熱渴或色燥不起及便結溺赤凡陽盛陰虛等證悉宜用此生地黃當歸芍藥生甘草地骨皮紫草黃芩紅花水一鍾半煎服量兒大小加減用之渴加天花粉肌熱無汗加柴胡熱毒甚者加牛蒡子木通連翹之屬血熱毒不透者加犀角柴葛煎治痘疹表裡俱熱散毒養陰及瘟疫等證柴胡乾葛芍藥黃芩甘草連翹水一鍾半煎服搜毒煎解痘疹熱毒熾盛紫黑乾枯煩熱便結純陽等證紫草地骨皮牛蒡子杵黃芩木通連翹蟬蛻芍藥等分水一鍾半煎服渴者加天花粉麥門冬陽明熱甚頭面牙齦腫痛者加石膏知母大腸乾結實臍腹實脹者加大黃芒硝血熱妄行者加犀角童便小水熱閉者加山梔車前子兼表熱者加柴胡六物煎治痘疹血氣不充隨證加減用之神效不可盡述並治男婦氣血俱虛等證炙甘草當歸熟地或用生地川芎三四分不宜多芍藥俱隨宜加減人參或有或無隨虛實用之氣不虛者不必用上咀用水煎服如發熱不解或痘未出之先宜加柴胡以疏表或加防風佐之如見點後痘不起發或起而不貫或貫而漿薄均宜單用此湯或加糯米人乳好酒肉桂川芎以助營氣如氣虛癢塌不起加穿山甲炒用如紅紫血熱不起宜加紫草或犀角如脾氣稍滯者宜加陳皮山楂如胃氣虛寒多嘔者加乾薑炒用或加丁香如腹痛兼滯者加木香陳皮表虛氣陷不起或多汗者加黃耆氣血俱虛未起未貫而先癢者加肉桂白芷如元氣大虛寒戰咬牙泄瀉宜去芍藥加黃耆大附子乾薑肉桂六氣煎治痘瘡氣虛癢塌倒陷寒戰咬牙並治男婦陽氣虛寒等證黃耆炙肉桂人參白朮當歸炙甘草上咀水煎服加減法照前六物煎九味異功煎治痘瘡寒戰咬牙倒陷嘔吐泄瀉腹痛虛寒等證用代陳氏十二味異功散等方人參二三錢黃耆炙一二錢當歸熟地各二三錢炙甘草七分或一錢丁香三五分或一錢肉桂一錢乾薑炮一二錢製附子一二錢上量兒大小加減用水一鍾半煎七分徐徐與服之如泄瀉腹痛加肉豆蔻麵炒一錢或加白朮一二錢透邪煎凡麻疹初熱未出之時惟恐誤藥故云未出之先不宜用藥然解利得宜則毒必易散而勢自輕減欲求妥當當先用此方為主當歸二三錢芍藥酒炒一二錢防風七八分荊芥一錢炙甘草七分升麻三分水一鍾半煎服如熱甚脈洪滑者加柴胡一錢此外凡有雜證俱可隨宜加減牛膝煎截瘧大效凡邪散已透而血氣微虛者宜此主之牛膝二錢當歸陳皮各三錢上用好酒一鍾浸一宿次早加水一鍾煎至八分溫服何人飲截瘧如神凡氣血俱虛久瘧不止或急欲取效者宜此主之何首烏自三錢以至一兩隨輕重用之當歸二三錢人參三五錢或一兩隨宜陳皮二三錢大虛者不必用煨生薑三斤多寒者用三五錢水二鍾煎八分於發前二三時溫服之若善飲者以酒一鍾浸一宿次早加水一鍾煎服亦妙再煎不必用酒追瘧飲截瘧甚佳凡血氣未衰屢散之後而瘧有不止者用此截之已經屢驗何首烏一兩制當歸甘草半夏青皮陳皮柴胡各三錢上用井水河水各一鍾煎一鍾柤亦如之同露一宿次早溫服一鍾飯後食遠再服一鍾木賊煎凡瘧疾形實氣強多濕多痰者宜此截之大效半夏青皮各五錢木賊厚朴各三錢白蒼朮檳榔各一錢用陳酒二鍾煎八分露一宿於未發之先二時溫服牙皂散治胃脘痛劇諸藥不效者服此如神用牙皂燒存性以煙將盡為度研末用燒酒調服一錢許即效荔香散治疝氣痛極凡在氣分者最宜用之並治小腹氣痛等證神效又心腹久痛方如後荔枝核炮微焦大茴香等分炒上為末用好酒調服二三錢如寒甚者加制過吳茱萸減半用之凡心腹胃脘久痛屢觸屢發者惟婦人多有之用荔枝核一錢木香八分為末每服一錢清湯調服數服除根豕膏內經曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日已此必以豬板油煉淨服之也又萬氏方治肺熱暴喑用豬脂一斤煉過入白蜜一斤再煉少頃濾淨冷定不時挑服一匙即愈按此方最能潤肺潤腸凡老人痰嗽不利及大腸秘結者最宜用之又千金方治關格閉塞用豬脂薑汁各二升微火煎至三升加酒五合和煎分服之愚意先以當歸半斤濃煎取汁煉過豬脂一斤同煉去其水氣乃入白蜜一斤再煉少頃濾淨收貯不時挑服用治老人之秘結及噎膈閉結等證必無不妙如果陽氣不行者仍加生薑四兩同當歸煎入或宜酒者以酒送服亦可或氣有不利者加杏仁二兩去皮尖同前煎入皆妙或有滯者當以餳代蜜更妙是即內經所謂以辛潤之也罨傷寒結胸法凡病傷寒結胸其有中氣虛弱不堪攻擊內消者須以此法外罨之則滯行邪散其效如神蔥白頭生薑生蘿蔔此味加倍如無以子代之上用蔥姜各數兩蘿蔔倍之共搗一處炒熱用手巾或白布包作大餅罨胸前脹痛處此藥須分二包冷則輪換罨之無不即時開通汗出而愈但不宜太熱恐炮烙難受也又法以大蒜一二十頭搗爛攤厚紙或薄絹上貼於脹處少頃即散用治一切脹痛無不神妙連翹金貝煎治陽分癰毒或在臟腑肺膈胸乳之間者此方最佳甚者連用數服無有不愈金銀花貝母土者更佳薄公英夏枯草各三錢紅藤七八錢連翹一兩或五七錢用好酒二碗煎一碗服服後暖臥片時火盛煩渴乳腫者加天花粉若陽毒內熱或在頭項之間者用水煎亦可連翹歸尾煎治一切無名癰毒丹毒流注等毒有火者最宜用之連翹七八錢歸尾三錢甘草一錢金銀花紅藤各四五錢用酒煎服如前如邪熱火盛者加槐蕊二三錢桔梗杏仁煎此桔梗湯之變方也治咳嗽吐膿痰中帶血或胸膈隱痛將成肺癰者此方為第一桔梗杏仁甘草各一錢阿膠金銀花麥冬百合夏枯草連翹各二錢貝母三錢枳殼錢半紅藤三錢水二鍾煎八分食遠服如火盛兼渴者加天花粉二錢當歸蒺藜煎治癰疽瘡疹血氣不足邪毒不化內無實熱而腫痛淋漓者悉宜用之此與芍藥蒺藜煎相為奇正也當酌其詳當歸熟地芍藥酒炒何首烏各二錢炙甘草防風川芎荊芥穗白芷各一錢白蒺藜炒搗碎三錢或五錢上或水或酒用二鍾煎服然水不如酒或以水煎服後飲酒數杯以行藥力亦可陽虛不能化毒者加桂枝甚者再加乾薑附子氣虛不化者加黃耆人參毒陷不能外達者加穿山甲或皂刺芍藥蒺藜煎治通身濕熱瘡疹及下部紅腫熱痛諸瘡神效外以螵蛸粉敷之龍膽草梔子黃芩木通澤瀉各錢半芍藥生地各二錢白蒺藜連刺捶碎五錢甚者一兩水二鍾煎八分食遠服如火不甚者宜去龍膽梔子加當歸茯苓薏仁之屬如濕毒甚者加土茯苓五錢或一二兩降癰散治癰疽諸毒消腫止痛散毒未成者即消已成者斂毒速潰可愈若陽毒熾盛而疼痛勢凶者宜先用此方其解毒散毒之功神效最速若堅頑深固者宜用後方薄荷辛佳者用葉野菊花連根葉各一握土貝母半之茅根一握上乾者可為末鮮者可搗爛同貝母研勻外將茅根煎濃湯去柤用調前末乘熱敷患處仍留前剩湯燉暖不時潤於藥上但不可用冷湯冷則不散不行反能為痛約敷半日即宜換之真妙方也後方凡疽毒堅頑深固及結核痰滯宜用此方腦荷倍用生南星土貝母朴硝各等分石灰風化者亦倍用或倍倍用之上同為末用鹽滷調杵稠黏敷患處經宿干即易之不必留頭若膿成者留頭亦可或炒熱攤絹上隔絹貼之亦可或用麻油調或用熱茅根湯調亦可若欲止痛速效加麝香或冰片少許更妙百草煎治百般癰毒諸瘡損傷疼痛腐肉腫脹或風寒濕氣留聚走注疼痛等證無不奇效百草凡田野山間者無論諸品皆可取用然猶以山草為勝辛香者佳冬月可用乾者須預為收採之上不論多寡取以多煎濃湯乘熱熏洗患處仍用布帛蘸熨良久務令藥氣蒸透然後敷貼他藥每日二三次不拘但以頻數為善蓋其性之寒者可以除熱熱者可以散寒香者可以行氣毒者可以解毒無所不用亦無所不利湯得藥性則湯氣無害藥得湯氣則藥力愈行凡用百草以煎膏者其義亦此此誠外科中最要最佳之法亦傳之方外人者也若洗水鼓腫脹每次須用草二三十斤煎濃湯二三鍋用大盆盛貯以席簟遮風熏洗良久每日一次或二次內服廓清飲分利等劑妙甚螵蛸散治濕熱破爛毒水淋漓等瘡或下部腎囊足股腫痛下疳諸瘡無不神效又海藏治下疳方在外科下疳門海螵蛸不必浸淡人中白或人中黃硇砂亦可等分上為細末先以百草多煎濃湯乘熱熏洗後以此藥摻之如干者以麻油或熬熟豬油或蜜水調敷之若腫而痛甚者加冰片少許更妙若濕瘡膿水甚者加密陀僧等分或煅過官粉亦可或煅制爐甘石更佳腸癰秘方凡腸癰生於小肚角微腫而小腹隱痛不止者是若毒氣不散漸大內攻而潰則成大患急宜以此藥治之先用紅藤一兩許以好酒二碗煎一碗午前一服醉臥之午後用紫花地丁一兩許亦如前煎服服後痛必漸止為效然後服後末藥除根神妙當歸五錢蟬蛻殭蠶各二錢天龍大黃各一錢石䗶蚆五錢此草藥也老蜘蛛二個捉放新瓦上以酒盅蓋定外用火煅干存性上共為末每空心用酒調送一錢許日逐漸服自消槐花蕊治楊梅瘡下疳神方凡綿花瘡毒及下疳初感或毒盛經久難愈者速用新槐蕊揀淨不必炒每食前用清酒吞下三錢許早午晚每日三服服至二三升則熱毒盡去可免終身除毒之患亦無寒涼敗脾之慮此經驗神方也如不能飲即用滾水鹽湯俱可送下但不及酒送之效捷也飛丹散治寒濕風濕腳腿等瘡飛丹人中黃白更妙輕粉水粉各等分為末凡濕爛者可以乾摻外用油紙包蓋若干陷者以豬骨髓或豬油調貼之先以百草煎湯乘熱熏洗然後貼之日洗數次妙綿花瘡點藥杏仁取霜輕粉真者二味等分為末敷於瘡上二三日即痂脫而落又武定侯方用雄黃錢半杏仁三十粒去皮輕粉一錢同為末用雄豬膽汁調敷之二三日即愈百發百中天下第一方雞子黃連膏治火眼暴赤疼痛熱在膚腠淺而易解者用此點之數次可愈若熱由內發火在陰分者不宜外用涼藥非惟不能去內熱而且以閉火邪也用雞子一枚開一小竅單取其清盛以瓷碗外用黃連一錢研為粗末摻於雞子清上用箸徹底速打數百使成浮沫約得半碗許即其度矣安放少頃用箸撥開浮沫傾出清汁用點眼眥勿得緊閉眼胞擠出其藥必熱淚湧出數次即愈內加冰片少許尤妙若雞子小而清少者加水二三匙同打亦可金露散治赤目腫痛翳障諸疾天竺黃擇辛香者用海螵蛸不必浸洗月石各一兩硃砂飛爐甘石片子者佳煅淬童便七次飛淨各八錢上為極細末瓷瓶收貯每用時旋取數分研入冰片少許諸目疾皆妙若內外眥障取一錢許加珍珠八釐膽礬三釐內珍珠須放豆腐中蒸熟用若爛弦風眼每一錢加銅綠飛丹各八釐如赤眼腫痛每一錢加乳香沒藥各半分二辛煎治陽明胃火牙根口舌腫疼不可當先用此湯漱之漱後敷以二香散或仍服清胃等藥以治其本北細辛三錢生石膏一兩上二味用水二碗煎一碗乘熱頻漱之冰玉散治牙疳牙痛口瘡齒衄喉痹生石膏一兩月石七錢冰片三分殭蠶一錢上為極細末小瓷瓶盛貯敷之吹之冰白散治口舌糜爛及走馬牙疳等證人中白倍用之冰片少許銅綠用醋製者杏仁二味等分上為細末敷患處此方按之古法有以人中白七分與枯礬三分同用者又有以蜜炙黃柏與人中白等分仍加冰片同用者是皆可師之法諸當隨宜用之代匙散治喉痹月石石膏各一錢腦荷五分膽礬五分粉草三分殭蠶炒五分冰片一分皂角炙煙盡五分上為細末用竹管頻吹喉中加牛黃五分更佳三香散治牙根腫痛丁香川椒取紅等分冰片少許上為末敷痛處如無川椒以蓽茇代之亦可固齒將軍散治牙痛牙傷胃火糜腫久之牢牙固齒錦紋大黃炒微焦杜仲炒半黑各十兩青鹽四兩上為末每日清晨擦漱火盛者咽之亦可熏疥方硃砂雄黃銀硃各三分同研大楓子木鱉子各三個上將大楓木鱉先搗碎乃入前三味拌勻外以干艾鋪捲成筒約長二寸許足矣凡熏時須將全身疥痂悉行抓破熏之始效後五六日復熏一筒無不悉愈杖丹膏豬板油半斤黃占二兩輕粉三錢水銀三錢冰片三分先將水銀輕粉同研細俟豬油熬熟去滓先下黃占熔化後入末藥攪勻收貯以水浸二三時令出火毒用竹紙攤貼覺熱即換輕者即愈重者不過旬日銀硃煙治頭髮生蝨及諸瘡之有蟲者用銀硃四五分揩擦厚紙上點著置一干碗中上用一濕碗露縫覆之其煙皆著於濕碗之上乃用紙揩擦發中覆以氈帽則蟣蝨皆盡矣此煙以棗肉和捻作餅或作丸或擦於豬雞熟肝之間用點諸瘡癬之有蟲者及蟲蝕肛門者以綿裹棗丸納肛門中一宿無不神效須留綿帶在外以便出之雷火針治風寒濕毒之氣留滯經絡而為痛為腫不能散者五月五日取東引桃枝去皮兩頭削如雞子尖樣長一二寸許針時以針向燈上點著隨用紙三五層或布亦可貼蓋患處將熱針按於紙上隨即唸咒三遍病深者再燃再刺之立愈咒曰天火地火三昧真火針天天開針地地裂針鬼鬼滅針人人得長生百命消除萬病消滅吾奉太上老君急急如律令又雷火針新方乃以藥為針者其法更妙白芷獨活川芎細辛牙皂穿山甲炮倍用丁香枳殼松香雄黃乳香沒藥杜仲桂枝各一錢硫黃二錢麝香不拘熟艾二三兩上搗為粗末和勻取艾鋪底摻藥於上用上好皮紙捲筒先須用線絆約兩頭防其伸長然後加紙再捍務令極實粗如雞子尖樣是其度也乃用雞子清盡刷外層卷而裹之陰乾用法如前一方有巴豆仁八分斑蝥三錢去頭足翅用疥癬光治疥瘡搽上即愈癬瘡亦妙松香一錢水銀硫黃枯礬各二錢樟腦各二錢此或一錢麻油上先將松香水銀加麻油少許研如糊後入三味研細如膏擦之神效鵝掌風四方附錄豬胰一具去油勿經水花椒三錢上用好酒溫熱將二味同浸二三日取胰不時擦手微火烘之自愈又方用白砒三錢打如豆粒以麻油一兩熬砒至黑去砒用油擦手微火烘之不過二三次即愈又方用蔥五六根椎破再用花椒一把同入瓷瓦罐中入醋一碗後以滾湯衝入熏洗數次即愈又方用谷樹葉煎湯溫洗以火烘乾隨用柏白油擦之再以火烘乾少頃又洗又烘如此日行三次不過三五日即愈秘傳水銀膏擦治楊梅風毒潰爛危惡多年不愈者經驗神方黃柏黃連各一錢川大黃五分三味另研雄璜膽礬青黛兒茶銅青各三分輕粉枯礬各四分大楓子去油取淨霜五分黑者勿用珍珠一分半生用冰片一分半二味另研人言人壯者七釐弱者半分中者六釐上十四味為極細末分作三分每分約一錢八分番打麻另為末若瘡重而人壯能食者每分用五分人弱不起者每分用三分中者四分以末入前藥各分內研勻水銀人健者每分用一兩或八九錢中者或五六錢臥床不起而極弱者只可用三錢決不可再多矣上先將麻汞並前藥各一分俱入盞內再入真芝麻油少許用手指研開務使汞藥混為一家漸次增油久研以不見汞星為度大約如稀糊可矣一擦法用此藥擦手足四腕動脈處每藥一分務分擦三日每日早晚各擦一次每次以六七百數為度擦完用布包之擦藥時凡周身略有破傷處俱用無麝膏藥貼之膏藥須厚攤每二日一換換時不可經風常須避帳幔中冬月須用厚被暖炕他時亦須常暖南方則多用被褥蓋墊可也擦至七日毒必從齒縫中發出口吐臭涎若口齒破爛出血但用甘草蜂房煎湯候冷漱解不可嚥下輕者只以花椒湯漱之亦可擦處必皮破不可畏疼而少擦也忌鹽十餘日多更好並魚腥生冷沙氣發風等物一個月尤忌房事外如牛肉燒酒團魚之類須忌二三年惟蕎麥麵羊肉則終身忌之治楊梅瘡初發者五六日可愈但每分用汞四五錢足矣若治蛀乾疳瘡或咽喉潰爛或遍身牛皮瘡癬俱照前中治法若治久爛臁瘡爛處難擦則擦腳心俱照前中治法亦布包貼膏如前一自擦起之日即當服後敗毒散至七日後發口則止二十四味敗毒散隨前水銀膏當歸川芎生地熟地芍藥牛膝防風荊芥白芷防己忍冬桔梗羌活獨活白鮮皮薏仁連翹木通陳皮粉草黃柏知母梔子黃連上每帖加土茯苓乾者四兩鮮者須半斤用水六碗煎三碗分三次每日早午晚各服一碗上方後四味須察其人陰陽寒熱酌而用之按上水銀膏方凡用此者其於筋骨經絡無處不到既能追毒亦善殺蟲若用治大麻風證必有奇效但未經試故表諸此以俟後人試用之或於大風條擇煎劑之相宜者同用尤妙倘獲濟人其幸多矣臁瘡隔紙膏黃占五兩飛丹鉛粉各四兩輕粉乳香沒藥各二錢冰片三分麻油春夏二兩秋冬三兩上先將佔油煎五六沸下乳沒再二三服下輕粉隨下丹粉槐柳枝攪十餘沸取起冷定後下冰片攪勻瓶盛浸水中一宿出火毒先以苦茶洗瘡淨將膏用薄油紙刺孔厚攤間日番背面貼之三日一換三貼即可愈收瘡散治濕爛諸瘡肉平不斂及諸瘡毒內肉既平而口有不收者皆宜用此最妙滑石飛一兩赤石脂飛五錢粉甘草三錢上為末乾摻或用麻油調敷或加枯礬一錢癢者極宜若癢甚者必有蟲先用水銀三四錢同松香二錢研勻後拌前藥和勻敷之
