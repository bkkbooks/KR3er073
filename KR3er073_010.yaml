body:
  text: 卷之十從集雜證謨諸風經義九宮八風篇曰太一常以冬至之日居葉蟄之宮四十六日明日居天留四十六日明日居倉門四十六日明日居陰洛四十五日明日居天宮四十六日明日居玄委四十六日明日居倉果四十六日明日居新洛四十五日明日復居葉蟄之宮日冬至矣常如是無已終而復始太一移日天必應之以風雨以其日風雨則吉歲美民安少病矣先之則多雨後之則多旱太一在冬至之日有變占在君太一在春分之日有變占在相太一在中宮之日有變占在吏太一在秋分之日有變占在將太一在夏至之日有變占在百姓所謂有變者太一居五宮之日病風折樹木揚砂石各以其所主占貴賤因視風所從來而占之風從其所居之鄉來為實風主生長養萬物從其沖後來為虛風傷人者也主殺主害者謹候虛風而避之故聖人日避虛邪之道如避矢石然邪弗能害此之謂也是故太一入徙立於中宮乃朝八風以占吉凶也風從南方來名曰大弱風其傷人也內舍於心外在於脈氣主熱風從西南方來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絶則溢脈閉則結不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也內舍於大腸外在於兩肋腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為身濕風從東南方來名曰弱風其傷人也內舍於胃外在肌肉其氣主體重此八風皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩實一虛病則為淋露寒熱犯其雨濕之地則為痿故聖人避風如避矢石焉其有三虛而偏中於邪風則為擊僕偏枯矣歲露論黃帝問於少師曰余聞四時八風之中人也故有寒暑寒則皮膚急而腠理閉暑則皮膚緩而腠理開賊風邪氣因得以入乎將必須八正虛邪乃能傷人乎少師答曰不然賊風邪氣之中人也不得以時然必因其開也其入深其內極病其病人也卒暴因其閉也其入淺以留其病也徐以遲帝曰有寒溫和適腠理不開然有卒病者其故何也少師曰雖平居其腠理開閉緩急其故常有時也人與天地相參也與日月相應也故月滿則海水西盛人血氣積肌肉充皮膚致毛髮堅腠理郤煙垢著當是之時雖遇賊風其入淺不深至其月郭空則海水東盛人氣血虛其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘膲理薄煙垢落當是之時遇賊風則其入深其病人也卒暴帝曰其有卒然暴死暴病者何也少師曰三虛者其死暴疾也得三實者邪不能傷人也帝曰願聞三虛曰乘年之衰逢月之空失時之和因為賊風所傷是謂三虛故論不知三虛工反為粗帝曰願聞三實少師曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也帝曰願聞歲之所以皆同病者何因而然少師曰此八正之候也候此者常以冬至之日太一立於葉蟄之宮其至也天必應之以風雨者矣風雨從南方來者為虛風賊傷人者也其以夜半至也萬民皆臥而弗犯也故其歲民少病其以晝至者萬民懈惰而皆中於虛風故萬民多病虛邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虛風此兩邪相搏經氣結代者矣故逢其風而遇其雨者命曰遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和則民多病而死矣八正神明論帝曰星辰八正何候岐伯曰星辰者所以制日月之行也八正者所以候八風之虛邪以時至者也四時者所以分春秋冬夏之氣所在以時調之也八正之虛邪而避之勿犯也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟工候救之弗能傷也故曰天忌不可不知也虛邪者八正之虛邪氣也正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形陰陽應象大論曰風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡瀉冬傷於寒春必溫病春傷於風夏生飧泄天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎陽之汗以天地之雨名之陽之氣以天地之疾風名之邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也故天之邪氣感則害人五臟水穀之寒熱感則害於六腑地之濕氣感則害皮肉筋脈東方生風風生木木生酸酸生肝肝生筋筋生心神在天為風在地為木在體為筋在臟為肝在色為蒼在音為角在聲為呼在變動為握在竅為目在味為酸在志為怒風傷筋燥勝風風勝濕風論黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其病各異其名不同或內至五臟六腑不知其解願聞其說岐伯對曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉故使人怢栗而不能食名曰寒熱風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也癘者有營氣熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風或名曰寒熱以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風風中五臟六腑之俞亦為臟腑之風各入其門戶所中皆為偏風風氣循風府而上則為腦風風入系頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飧泄外在腠理則為泄風故風者百病之長也至其變化乃為他病也無常方然致有風氣也帝曰五臟風之形狀不同者何願聞其診及其病能岐伯曰肺風之狀多汗惡風色皏然白時咳短氣晝日則瘥暮則甚診在眉上其色白心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青脾風之狀多汗惡風身體怠惰四支不欲動色薄微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面痝然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑胃風之狀頸多汗惡風食飲不下鬲塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒玉機真藏論曰風者百病之長也今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也或痹不仁腫痛當是之時可湯尉及火灸刺而去之弗治病入舍於肺名曰肺痹發咳上氣弗治肺即傳而行之肝名曰肝痹一名曰厥脅痛出食當是之時可按若刺耳弗治肝傳之脾病名曰脾風發疸腹中熱煩心出黃當此之時可按可藥可浴弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱當此之時可按可藥弗治腎傳之心病筋脈相引而急病名曰瘛當此之時可灸可藥弗治滿十日法當死腎因傳之心心即復反傳而行之肺發寒熱病當三歲死此病之次也金匱真言論帝曰天有八風經有五風何謂岐伯曰八風發邪以為經風觸五臟邪氣發病所謂得四時之勝者春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂四時之勝也東風生於春病在肝俞在頸項南風生於夏病在心俞在胸脅西風生於秋病在肺俞在肩背北風生於冬病在腎俞在腰股中央為土病在脾俞在脊故春氣者病在頭夏氣者病在臟秋氣者病在肩背冬氣者病在四肢故春善病鼽衄仲夏善病胸脅長夏善病洞泄寒中秋善病風瘧冬善病痹厥夏暑汗不出者秋成風瘧調經論曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實實者外堅充滿不可按之按之則痛寒濕之傷人也皮膚不收肌肉堅緊榮血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛太陰陽明論曰故犯賊風虛邪者陽受之陽受之則入六腑入六腑則身熱不時臥上為喘呼故陽受風氣陰受濕氣故傷於風者上先受之傷於濕者下先受之生氣通天論曰風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害此因時之序也因於露風乃生寒熱是以春傷於風邪氣留連乃為洞泄夏傷於暑秋為咳瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必溫病四時之氣更傷五臟百病始生篇帝曰夫百病之始生也皆生於風雨寒暑清濕喜怒三部之氣所傷異類願聞其會岐伯曰三部之氣各不同或起於陰或起於陽請言其方喜怒不節則傷臟傷臟則病起於陰也清濕襲虛則病起於下風寒襲虛則病起於上是謂三部至其淫泆不可勝數岐伯曰風雨寒熱不得虛邪不能獨傷人卒然逢疾風暴雨而不病者蓋無虛故邪不能獨傷人此必因虛邪之風與其身形兩虛相得乃客其形其中於虛邪也因與天時與其身形參以虛實大病乃成氣有定舍因處為名上下中外分為三員是故虛邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛留而不去則傳舍於絡脈在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於經在經之時灑淅喜驚留而不去傳舍於輸在輸之時六經不通四肢則肢節痛腰脊乃強留而不去傳舍於伏沖之脈在伏沖之時體重身痛留而不去傳舍於腸胃在腸胃之時賁響腹脹多寒則腸鳴飧泄食不化多熱則溏出糜留而不去傳舍於腸胃之外募原之間留著於脈稽留而不去息而成積邪氣淫泆不可勝論帝曰治之奈何岐伯曰察其所痛以知其應有餘不足當補則補當瀉則瀉毋逆天時是謂至治邪氣臟腑病形篇曰諸陽之會皆在於面中人也方乘虛時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經虛邪之中身也灑淅動形正邪之中人也微先見於色不知於身若有若無若亡若存有形無形莫知其情刺節真邪論曰虛邪之中於人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間其氣外發腠理開毫毛搖氣往來行則為癢留而不去則痹衛氣不行則為不仁虛邪偏客於身半其入深內居營衛營衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕脈要精微論曰風成為寒熱久風為飧泄脈風成為癘來徐去疾上虛下實為惡風也故中惡風者陽受氣也壽夭剛柔篇曰病在陽者命曰風病在陰者命曰痹陰陽俱病命曰風痹風寒傷形憂恐忿怒傷氣通評虛實論曰不從內外中風之病故瘦留著也跖跛風寒濕之病也平人氣象論曰面腫曰風人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹刺志論曰脈大血少者脈有風氣水漿不入此之謂也陰陽別論曰二陽之病發心脾其傳為風消其傳為息賁者死不治二陽一陰發病主驚駭背痛善噫善缺名曰風厥三陽三陰發病為偏枯痿易四肢不舉五色篇曰黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁評熱病論帝曰有病身熱汗出煩滿煩滿不為汗解此為何病岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也帝曰治之奈何曰表裡刺之飲之服湯帝曰勞風為病何如岐伯曰勞風法在肺下其為病也使人強上冥視唾出若涕惡風而振寒此為勞風之病帝曰治之奈何曰以救俯仰巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死矣病能論帝曰有病身熱懈惰汗出如浴惡風少氣此為何病岐伯曰病名曰酒風治之以澤瀉術各十分麋銜五分合以三指撮為後飯骨空論曰風從外入令人振寒汗出頭痛身重惡寒治其風府調其陰陽不足則補有餘則瀉大風頸項痛刺風府風府在上椎大風汗出灸噫嘻噫嘻在背下俠脊傍三寸所四時氣篇曰癘風者素刺其腫上已刺以鋭針針其處按出其惡氣腫盡乃止常食方食無食他食熱病篇曰偏枯身偏不用而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也病先起於陽後起於陰者先取其陽後取其陰浮而取之風痙身反折先取足太陽及膕中及血絡出血中有寒取三里至真要大論曰厥陰司天其化以風風氣大來木之勝也土濕受邪脾病生焉諸風掉眩皆屬於肝諸暴強直皆屬於風氣交變大論曰歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹支滿上應歲星甚則忽忽善怒眩冒巔疾五常政大論曰厥陰司天風氣下臨脾氣上從而土且隆黃起水乃眚土用革體重肌肉萎食減口爽風行太虛雲物搖動目轉耳鳴六元正紀大論曰厥陰所至為風府為璺啓厥陰所至為風生終為肅木鬱之發太虛埃昏雲物以擾大風乃起髮屋折木木有變故民病胃脘當心而痛上支兩脅鬲咽不通食飲不下甚則耳鳴眩轉目不識人善暴僵仆太虛蒼埃天山一色或為濁色黃黑郁若橫云不起雨而乃發也其氣無常長川草偃柔葉呈陰松吟高山虎嘯岩岫怫之先兆也論古今中風之辨共三條夫風邪中人本皆表證考之內經所載諸風皆指外邪為言故並無神魂昏憒直視僵仆口眼歪斜牙關緊急語言謇澀失音煩亂搖頭吐沫痰涎壅盛半身不遂癱瘓軟弱筋脈拘攣抽搐瘛瘲遺尿失禁等說可見此等證候原非外感風邪總由內傷血氣也夫風自外入者必由淺而深由漸而甚自有表證既有表證方可治以疏散而今之所謂中風者則不然但見有卒倒昏迷神魂失守之類無論其有無表邪有無寒熱及有無筋骨疼痛等證便皆謂之中風誤亦甚矣雖熱病篇有偏枯一證曰身偏不用而痛此以痛痹為言非今之所謂中風也陰陽別論有曰三陰三陽發病為偏枯痿易四肢不舉此以經病為言亦非所謂風也繼自越人仲景亦皆以外感言風初未嘗以非風言風也逮至漢末華元化所言五臟之風則稍與內經不同而始有吐沫身直口噤筋急舌強不能言手足不遂等說然猶不甚相遠再自隋唐以來則巢氏病源孫氏千金等方以至宋元諸家所列風證日多日詳而是風非風始混亂莫辨而愈失其真矣故余悉採其要列證如前凡內經所不言者皆不得謂之風證即或稍有相涉亦必以四診相參必其真有外感實邪方可以風論治否則誤人不小也一難經曰傷寒有幾其脈有變否然傷寒有五有中風有傷寒有濕溫有熱病有溫病其所苦各不同詳此難經之雲中風者本五種傷寒之一又仲景曰太陽病發熱汗出惡風脈緩者名為中風由此觀之可見內經之凡言中風者本以外感寒邪為言也豈後世以內傷屬風等證悉認之為外感中風耶一仲景要略曰夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然寸口脈浮而緊緊則為寒浮則為虛寒虛相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎觀仲景之論中風者如此其所云半身不遂者此為痹乃指痛風之屬為言謂其由於風寒也再如邪在皮膚及在絡在經入腑入臟者此謂由淺而深亦皆以外邪傳變為言也惟喎僻吐涎二證在內經諸風並無言及而仲景創言之故自唐宋以來則漸有中經中血脈中腑中臟之說而凡以內傷偏枯氣脫卒倒厥逆等證悉認為中風而忘卻真風面目矣論中風屬風風有真風類風不可不辨凡風寒之中於外者乃為風邪如九宮八風篇之風占病候歲露論之虛風實風金匱真言論之四時風證風論之臟腑中風玉機真臟論之風痹風疸痹論賊風篇之風邪為痹瘧論歲露論之瘧生於風評熱病論之風厥勞風骨空論之大風熱病篇之風痙病能論之酒風咳論之感寒咳嗽是皆外感風邪之病也其有不由外感而亦各為風者如病機所云諸暴強直皆屬於風諸風掉眩皆屬於肝之類是皆屬風而實非外中之風也何以見之蓋有所中者謂之中無所中者謂之屬夫既無所中何謂之屬此以五運之氣各有所主如諸濕腫滿皆屬於脾諸寒收引皆屬於腎是皆以所屬為言而風之屬於肝者即此謂也蓋肝為東方之臟其藏血其主風肝病則血病而筋失所養筋病則掉眩強直之類無所不至而屬風之證百出此所謂皆屬於肝亦皆屬於風也夫中於風者即真風也屬於風者即木邪也真風者外感之表證也屬風者內傷之裡證也即厥逆內奪之屬也夫曰中曰屬此在內經固已顯然各有所謂即如年辰之屬鼠屬牛豈即為牛為鼠乎而後世不能明辨遂致方論混傳表裡誤治千古之弊莫此為甚第在內經則原無真中類中之分而王安道始有此論豫甚善之第惜其辨有未盡故復述之以詳其說凡欲明此義者但當於中風屬風表證里證四者之間默而思之當自見其真矣論河間中風說河間原病式曰凡人風病多因熱甚而風燥者為其兼化以熱為其主也俗云風者言末而忘其本也所以中風癱瘓者非謂肝木之風實甚而卒中之也亦非外中於風爾由乎將息失宜而心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無所知也多因喜怒思悲恐五志有所過極而卒中者皆為熱甚故也若病微則但僵仆氣血流通筋脈不攣緩者發過如故或熱氣太甚鬱結壅滯氣血不能宣通陰氣暴絶則陽氣後竭而死據河間此論謂非肝木之風亦非外中之風由乎將息失宜此獨得之見誠然善矣然皆謂為熱甚則不然也凡將息失宜五志過極本屬勞傷證也而勞傷血氣者豈皆火證又豈無陽虛病乎經曰喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽夫傷陰者水虧也傷陽者火虛也以虛作火鮮不危矣又河間曰其中腑者面加五色有表證脈浮而惡寒拘急不仁皆曰中腑也其治多易中臟者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀大小便閉結皆曰中臟也其治多難大抵中腑者多著四肢中臟者多滯九竅若風中腑者先以加減續命湯隨證發其表若忽中臟者則大便多祕澀宜以三化湯通其滯表裡證已定別無他證故以大藥和治之據此云脈浮惡寒拘急不仁等證本皆傷寒之類也何又名為中腑唇不收舌不轉失音耳聾等證本皆厥奪之類也何又名為中臟自中臟中腑之說並列為言而內傷外感之證斯無辨而混亂矣且續命湯三化湯之屬但可以散風寒攻實熱若所云將息失宜者豈尚堪治之以此論東垣中風說東垣發明曰陽之氣以天地之疾風名之此中風者非外來風邪乃本氣自病也凡人年逾四旬氣衰之際或憂喜忿怒傷其氣者多有此疾壯歲之時無有也若肥甚者則間有之亦是形盛氣衰而如此耳治法當和臟腑通經絡便是治風也據東垣年逾四旬氣衰之說其發明病機切中病情誠出諸賢之表者余深服之然憂喜忿怒傷氣者固有此疾而酒色勞倦傷陰者尤多此疾何以言之蓋氣生於陽形成於陰余嘗曰察陽者察其衰與不衰察陰者察其壞與不壞夫陽衰則氣去故神志昏亂陰虧則形壞故肢體廢弛此衰壞之謂也所以此病多在四旬之外正以其漸傷漸敗而至此始見其非外感而總由內傷可知也今以氣脫形壞之病顧可謂之風熱而散之攻之也否乎又東垣曰中血脈則口眼歪中腑則肢節廢中臟則性命危三治各不同中血脈者外有六經之形證則從小續命湯加減中腑者內有便溺之阻格宜三化湯等通利之外無六經之形證內無便溺之阻隔宜養血通氣大秦艽湯羌活愈風湯主之據東垣河間之說若有同者若有異者如雲中腑中臟本皆同也而東垣又云中血脈則稍異矣又如續命湯在河間則以治腑病東垣則以治血脈三化湯在河間用以治中臟而東垣用以治中腑則又異矣此或因證施治各有所宜姑無論也再如河間曰此非肝木之風亦非外中於風東垣亦曰非外來風邪乃本氣自病也夫皆曰非風而又皆曰中腑中臟不知所中者為何物則分明又指為風矣夫既曰將息失宜又曰氣衰所致本皆言其虛也而治法皆用汗下則分明又作實邪矣此等名目混亂涇渭不分若曰是若曰非而含糊於可否之間因致後學茫然莫知所宗正以議論日多不得其要反滋千古疑竇深可慨也至若續命三化等湯恐亦非神衰形壞之人所能堪者故凡讀書稽古之士宜加精究勿謂古人之法如此便可執而混用論丹溪中風說丹溪曰按內經以下皆謂外中風邪然地有南北之殊不可一途而論惟劉河間作將息失宜水不制火者極是由今言之西北二方亦有真為風所中者但極少耳東南之人多是濕土生痰痰生熱熱生風耳據丹溪引內經以下皆謂外中風邪之說不知內經之凡言風者皆以外感為言原非後世之所謂中風也觀難經五種傷寒之意可知矣而丹溪之言豈得內經之本意乎至若東南之人只是濕痰生熱熱生風此仍述河間熱甚之說而非風等證豈皆熱病即云為痰又豈無寒痰而何以痰即生熱熱即生風也且非風則已是風則南北俱有若云東南寒少未必殺人則可而云風少則不可也非痰則已是痰亦南北俱有若水土之外濕東南雖多而乳酪之內濕則西北尤多也雖痰之為物本為濕動然脾健則無脾弱則有而脾敗則甚是可見因病所以生痰非因痰所以生病也凡治失其本而欲望病愈者未之有也又丹溪曰半身不遂大率多痰在左屬死血與瘀血宜四物湯加桃仁紅花竹瀝薑汁在右屬痰屬氣虛宜二陳湯四君子湯加竹瀝薑汁據丹溪此說若乎近理故人多信之而不知其有不然也夫人身血氣本不相離焉得以左為血病右為痰氣耶蓋丹溪之意以為肝屬木而位左肝主血也肺屬金而位右肺主氣也脾屬土而寄位西南故亦在右而脾主濕與痰也然此以五行方位之序言其理耳豈曰西無木東無金乎且各經皆有左右五臟皆有血氣即如胃之大絡乃出於左乳之下則脾胃之氣亦出於左又豈左非脾右非肝左必血病右必痰氣乎然則何以辨之此惟內經以陰陽分血氣以左右言輕重則至當也經曰左右者陰陽之道路也又曰陰勝則陽病陽勝則陰病又曰女子右為逆左為從男子左為逆右為從夫陽病者即氣病也氣本乎陽而陰邪勝之則病也陰病者即血病也血本乎陰而陽邪勝之則病也從者病輕男病宜右女病宜左也逆者病重男病畏左女病畏右也以此辨之而再參以脈色察其病因則在氣在血或重或輕斯得其真矣若謂左必血病右必痰氣則未免非痰治痰非血治血而誅伐無過鮮不誤矣論真中風觀劉宗厚玉機微義云余嘗居涼州其地高阜四時多風少雨天氣常寒每見中風或暴死者有之蓋折風燥烈之甚也時洪武乙亥秋八月大風起自西北時甘州城外路死者數人余亦始悟經謂西北之折風傷人至病暴死之旨不誣丹溪之言有所本也籲醫之不明運氣地理造化病機之微而欲行通變之法者難矣哉據此一說是誠風之殺人也然風氣兼溫雖烈未必殺人惟帶寒威則殺人耳矧以西北地寒而塞風起於八月則寒隨風至寒必徹骨凡暴露之人雖曰中風而不知實中陰寒之毒也此在強者固能支持弱者焉得不死然亦以所遇之異故特紀若此方是真中風邪則亦百十年間始或僅遭一二而此證之不多見者從可知矣此外如賊風虛邪之傷人則歲歲有之處處有之是無非外感之病未聞有因外感而卒然昏憒致死也矧今人之所謂中風者或於寂然無風之時或於食飲嚴密之處素無外感而忽然運僕忽然偏廢此其是風非風又可知矣而盡以風治其能堪哉論續命等湯按歷代相傳治中風之方皆以續命等湯為主考其所自則始於金匱要略附方中有古今録驗續命湯然此必宋時校正之所增而非仲景本方也此自隋唐以來則孫氏千金方乃有小續命大續命西川續命排風等湯故後世宗之無不以此為中風主治矣夫續命湯以麻黃為君而以薑桂並用本發散外邪之佳方也至小續命大續命西川續命等湯則復加黃芩以兼桂附雖曰相制而水火冰炭道本不同即有神妙終非余之心服者其他無論獨怪乎河間東垣丹溪三子者既於中風門皆言此病非風矣而何於本門皆首列小續命湯而附以加減之法曰無汗惡寒麻黃續命湯有汗惡風無熱桂枝續命湯有汗身熱不惡寒白虎續命湯有汗身熱不惡風葛根續命湯無汗身涼附子續命湯若此諸法但用治外感則可用治內傷則不可而三子之卷卷不捨者皆此數方又何前後之言不相應耶再如大秦艽等湯在機要發明俱云治中風外無六經之形證內無便溺之阻隔如是血弱不能養筋宜養血而筋自榮以大秦艽湯羌活愈風湯主之夫秦艽湯雖有補血之藥而寒散之劑居其半夫既無六經之外邪而用散何為也既無阻隔之火邪而用寒何為也寒散既多又果能養血氣而壯筋骨乎秦艽湯且不可愈風湯則尤其不可者也吾不知用此法者果出何意論治中風共三條凡治風之法宜察淺深虛實及中經中臟之辨蓋中經者邪在三陽其病猶淺中臟者邪入三陰其病則甚若在淺不治則漸入於深在經不治則漸入於臟此淺深之謂也又若正勝邪者乃可直攻其邪正不勝邪者則必先顧其本此虛實之謂也倘不知此則未有不致敗者一大風大寒直中三陰致危者必用金匱續命湯去石膏治之若風寒在經而頭疼惡寒拘急身痛者宜麻黃湯麻桂飲隨證加減主之甚者亦宜續命湯若頭疼有汗惡風者宜桂枝湯或五積散若風邪在經熱多寒少而為偏枯疼痛發熱者宜大秦艽湯主之甚者愈風湯亦可一風寒諸病無非外感證也如輕淺在肺者則為傷風稍深在表裡之間者則為瘧疾留連經絡者則為寒熱往來遍傳六經徹內徹外者則為傷寒瘟疫久留筋骨者則為風痹痛風或為偏風風熱上壅者則為大頭時毒風濕相搏者則為大風癘風浮在肌膚者則為斑疹瘡毒感在嶺南者則為瘴氣凡此者皆外感風寒之病俱有門類方論具載各條舍此之外但無表證者均不得指為風也述古治權變許胤宗治唐柳太后病風脈沉欲脫云服湯藥無及矣即以黃耆防風煮湯數十斛置床下熏薄之是夕果語更藥之而愈王克明治盧州王守道風噤不能語以熾炭燒地熱灑以藥湯置病者於上須臾小蘇若此二者以病至垂危藥不能及亦治風之權變也諸風論列方麻黃湯散一桂枝湯散九麻桂飲新散七愈風湯散五六排風湯散百五五積散散三九續命湯散五一小續命湯散五二大續命湯散五三大秦艽湯和二四五論外備用方二丹丸補一五六養陰血黃耆丸補一五五虛風八風散和二百四十風邪上盛省風湯和二三九風痰清心散和二四九風痰琥珀壽星丸和百十三風痰滌痰湯和二四八風痰四白丹和二五四清氣消風順風勻氣散和二四二行氣疏風薏苡仁湯和二四七中風流注虎骨散和二百五十半身不遂防風通聖散攻十六風熱便結三化湯攻二九邪實中焦胃風湯散五七虛風面腫秦艽升麻湯散五五陽明中風地黃散散五八陰虛中風續命煮散散五四補虛散風十味銼散熱四九血弱身痛養正丹熱一八九痰涎上壅養血當歸地黃湯和二四六血少拘攣
