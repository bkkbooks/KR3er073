body:
  text: 卷之六道集脈神章下難經脈義獨取尺寸一一難曰十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之法何謂也然寸口者脈之大會手太陰之脈動也二難曰脈有尺寸何謂也從關至尺是尺內陰之所治也從關至魚際是寸口內陽之所治也故分寸為尺分尺為寸脈有輕重二五難曰脈有輕重何謂也然初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也故曰輕重也陰陽呼吸三四難曰脈有陰陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾受穀味也其脈在中浮者陽也沉者陰也故曰陰陽也心肺俱浮何以別之然浮而大散者心也浮而短澀者肺也腎肝俱沉何以別之然牢而長者肝也按之濡舉指來實者腎也脾者中州故其脈在中是陰陽之法也陰陽虛實四六難曰脈有陰盛陽虛陽盛陰虛何謂也然浮之損小沉之實大故曰陰盛陽虛沉之損小浮之實大故曰陽盛陰虛是陰陽虛實之意也脈分臟腑五九難曰何以別知臟腑之病耶然數者腑也遲者臟也數則為熱遲則為寒諸陽為熱諸陰為寒故以別知臟腑之病也根本枝葉六十四難曰上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無能為害所以然者人之有尺譬如樹之有根枝葉雖枯槁根本將自生脈有根本人有元氣故知不死仲景脈義辨脈法七問曰脈有陰陽何謂也答曰凡脈浮大數動滑此名陽也沉澀弱弦微此名陰也陰病見陽脈者生陽病見陰脈者死寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也尺脈弱名曰陰不足陽氣下陷入陰中則發熱也陽脈浮陰脈弱者則血虛血虛則筋急也其脈沉者榮氣之微也其脈浮而汗出如流珠者衛氣之衰也寸口脈浮為在表沉為在裡數為在腑遲為在臟若脈浮大者氣實血虛也寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗也夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人即䭇諸脈浮數當發熱而反灑淅惡寒若有痛處飲食如常者當發其癰脈數不時則生惡瘡也平脈法八師曰脈有三部道之根源榮衛流行不失衡銓腎沉心洪肺浮肝弦此自經常不失銖分出入升降刻漏周旋水下二刻一周循環當復寸口虛實見焉變化相乘陰陽相干風則浮虛寒則牢堅沉潛水滀支飲急弦動則為痛數則熱煩設有不應知變所緣三部不同病各異端太過可怪不及亦然邪不空見中必有奸審察表裡三焦別焉知其所舍消息診看料度臟腑獨見若神為子條記傳與賢人師曰呼吸者脈之頭也初持脈來疾去遲此出疾入遲名曰內虛外實也初持脈來遲去疾此出遲入疾名曰內實外虛也師持脈病人缺者無病也脈之呻者病也言遲者風也搖頭言者里痛也行遲者表強也坐而伏者短氣也坐而下一腳者腰痛也裡實護腹如懷卵物者心痛也問曰人病恐怖者其脈何狀曰脈形如循絲纍纍然其面白脫色也人愧者其脈何類曰脈浮而面色乍白乍赤也問曰脈有殘賊何謂也曰脈有弦緊浮滑沉澀此六者名為殘賊能為諸脈作病也問曰脈有災怪何謂也曰假令人病脈得太陽與形證相應因為作湯比還服湯如食頃病人乃大吐若下痢腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐痢答曰或有舊時服藥今乃發作故名災怪耳肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計其餘命死生之期期以月節克之也脈病人不病號曰行尸以無生氣卒眩僕不識人者短命則死人病脈不病名曰內虛以無穀神雖困無苦問曰緊脈從何而來曰假令亡汗若吐以肺裡寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下痢以胃中虛冷故令脈緊也寸口脈緩而遲緩則陽氣長其色鮮其顏光其聲商毛髮長遲則陰氣盛骨髓生血滿肌肉緊薄鮮硬陰陽相抱營衛俱行剛柔相搏名曰強也寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆寸口脈弱而遲弱者衛氣微遲者營中寒營為血血寒則發熱衛為氣氣微者心內飢飢而虛滿不能食也寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也寸口脈微而澀微者衛氣不行澀者營氣不足營衛不能相將三焦無所仰身體痹不仁營氣不足則煩疼口難言衛氣虛則惡寒數缺三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲酢古醋字寸口脈微而澀微者衛氣衰澀者營氣不足衛氣衰面色黃榮氣不足面色青營為根衛為葉營衛俱微則根葉枯槁而寒栗咳逆吐腥吐涎沫也寸口脈微尺脈緊其人虛損多汗知陰常在絶不見陽也寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無穀氣脾澀不通口急不能言戰而栗也問曰何以知乘腑何以知乘臟曰諸陽浮數為乘腑諸陰遲澀為乘臟金匱脈法九問曰寸口脈沉大而滑沉則為實滑則為氣實氣相搏氣血入臟即死入腑即愈此謂卒厥何謂也師曰唇口青身冷為入臟即死身和汗自出為入腑即愈問曰脈脫入臟即死入腑即愈何謂也師曰非為一病百病皆然譬如浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治病在外者可治入里者即死五邪中人各有法度風中於前寒中於暮濕傷於下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡夫男子平人脈大為勞極虛亦為勞男子脈浮弱而澀為無子精氣清冷脈得諸芤動微緊男子失精女子夢交男子平人脈虛弱細微者喜盜汗也脈沉小遲名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半産漏下男子則亡血失精滑氏脈義持脈十凡診脈先須識時脈胃脈與臟腑平脈然後及於病脈時脈謂春三月六部中俱帶弦夏三月俱帶洪秋三月俱帶浮冬三月俱帶沉胃脈謂中按得之脈見和緩凡人臟腑胃脈既平又應時脈乃無病者也反此為病持脈之要有三曰舉曰按曰尋輕手循之曰舉重手取之曰按不輕不重委曲求之曰尋初持脈輕手候之脈見皮膚之間者陽也腑也亦心肺之應也重手得之脈附於肉下者陰也臟也亦肝腎之應也不輕不重中而取之其脈應於血肉之間者陰陽相適中和之應脾胃之候也若委曲尋之而若隱若見則陰陽伏匿之脈也表裡虛實十一明脈須辨表裡虛實四字表陽也腑也凡六淫之邪襲於經絡而未入胃腑及臟者皆屬於表也里陰也臟也凡七情之氣鬱於心腹之內不能散越及飲食之傷留於腑臟之間不能通泄皆屬於里也虛者元氣之自虛精神耗散氣力衰竭也實者邪氣之實由正氣之本虛邪得乘之非元氣之自實也故虛者補其正氣實者瀉其邪氣經曰邪氣盛則實精氣奪則虛此大法也脈貴有神十二東垣曰不病之脈不求其神而神無不在也有病之脈則當求其神之有無謂如六數七極熱也脈中有力即有神矣當泄其熱三遲二敗寒也脈中有力即有神矣當去其寒若數極遲敗中不復有力為無神也將何所恃耶苟不知此而泄之去之神將何以依而為主故經曰脈者血氣之先氣血者人之神也善夫附諸家脈義矯世惑脈辨十三汪石山夫脈者本乎營與衛也而營行脈之中衛行於脈之外苟臟腑和平營衛調暢則脈無形狀之可議矣或者六淫外襲七情內傷則臟腑不和營衛乖謬而二十四脈之名狀層出而疊見矣是故風寒暑濕燥火此六淫也外傷六淫之脈則浮為風緊為寒虛為暑細為濕數為燥洪為火此皆可以脈而別其外感之邪也喜怒憂思悲恐驚者此七情也內傷七情之脈喜則傷心而脈緩怒則傷肝而脈急恐則傷腎而脈沉悲則氣消而脈短驚則氣亂而脈動此皆可以脈而辨其內傷之病也然此特舉其常而以脈病相應者為言也若論其變則有脈不應病病不應脈變出百端而難一一盡憑乎脈者矣試舉一二言之如張仲景云脈浮大邪在表為可汗若脈浮大心下硬有熱屬臟者攻之不令發汗此又非浮為表邪可汗之脈也又云促脈為陽盛宜用葛根黃芩黃連湯若脈促厥冷為虛脫非灸作溫不可此又非促為陽盛之脈也又曰遲脈為寒沉脈為里若陽明脈遲不惡寒身體濈濈汗出則用大承氣此又非諸遲為寒之脈矣少陰病始得之反發熱而脈沉宜麻黃細辛湯汗之此又非沉為在裡之脈矣凡此皆脈難盡憑之明驗也若只憑脈而不問證未免以寒為熱以表為里以陰為陽顛倒錯亂而夭人壽者多矣是以古人治病不專於脈而必兼於審證良有以也奈何世人不明乎此往往有病諱而不言惟以診脈而試醫之能否脈之而所言偶中便視為良醫而傾心付託其於病之根源一無所告藥之宜否亦無所審惟束手聽命於醫因循遂至於死尚亦不悟深可悲矣彼庸俗之人素不嗜學固無足怪奈近世士大夫家亦未免狃於此習是又大可笑也夫定靜安慮格物致知乃大學首章第一義而慮者謂慮事精詳格物者謂窮致事物之理致知者謂推極吾之所知凡此數事學者必當究心於此矣先正又言為人子者不可不知醫病臥於床委之庸醫比之不慈不孝夫望聞問切醫家大節目也苟於臨病之際惟以切而知之為能其餘三事一切置而不講豈得謂知醫乎豈得為處事精詳乎豈得為窮致事物之理而推極吾之所知乎且醫之良亦不專於善診一節凡動靜有常舉止不妄存心忠厚發言純篤察病詳審處方精專兼此數者庶可謂之良矣雖據脈言證或有少瘥然一脈所主非一病故所言未必盡中也若以此而遂棄之所謂以二卵而棄干城之將烏可與智者道哉姑以浮脈言之脈經云浮為風為虛為氣為嘔為厥為痞為脹為滿不食為熱為內結等類所主不下數十餘病假使診得浮脈彼將斷其為何病耶苟不兼之以望聞問而欲的知其為何病吾為戛戛乎其難矣古人以切居望聞問之後則於望聞問之間已得其病情矣不過再診其脈看病應與不應也若脈與病應則吉而易醫脈與病反則凶而難治以脈參病意蓋如此曷以診脈知病為貴哉夫脈經一書拳拳示人以診法而開卷入首便言觀形察色彼此參伍以決死生可見望聞問切醫之不可缺一也噫世稱善脈莫過叔和尚有待於彼此參伍況下於叔和者乎故專以切脈言病必不能不致於誤也安得為醫之良抑不特此世人又有以太素脈而言人貴賤窮通者此又妄之甚也豫嘗考其義矣夫太者始也初也如太極太乙之太素者質也本也如繪事後素之素此蓋言始初本質之脈也此果何脈耶則必指元氣而言也東垣曰元氣者胃氣之別名胃氣之脈蔡西山所謂不長不短不疏不數不大不小應手中和意思欣欣難以名狀者是也無病之人皆得此脈以此脈而察人之有病無病則可以此脈而察人之富貴貧賤則不可何也胃氣之脈難以形容莫能名狀將何以為貴賤窮通之診乎竊觀其書名雖太素而其中論述略無一言及於太素之義所作歌括率多俚語全無理趣原其初意不過托此以為徼利之媒後世不察遂相傳習莫有能辨其非者又或為之語曰太素云者指貴賤窮通稟於有生之初而言也然脈可以察而知之非謂脈名太素也豫曰固也然則太素之所診者必不出於二十四脈之外矣夫二十四脈皆主病言一脈見則主一病貧賤富貴何從而察之哉假如浮脈其診為風使太素家診之將言其為風耶抑言其為貴賤窮通耶二者不可得兼若言其為風則其所知亦不過病也若遺其病而言其為貴賤窮通則是近而病諸身者尚不能知安得謂之太素則遠而違諸身者必不能知之也蓋貴賤窮通身外之事與身之血氣了不相干安得以脈而知之乎況脈之變見無常而天之寒暑不一故四時各異其脈必不能久而不變是以今日診得是脈明日診之而或非春間診得是脈至夏按之而或否彼太素者以片時之尋按而斷一生之休咎殆必無是理然縱使億則屢中亦是捕風捉影倣佛形容安有一定之見哉噫以脈察病尚不知病之的而猶待乎望聞問況能知其他乎且脈兆於岐黃演於秦越而詳於叔和遍考素難脈經並無一字言及此者非隱之也殆必有不可誣者耳巢氏曰太素者善於相法特假太素以神其術耳誠哉言也足以破天下後世之惑矣又有善伺察者以言餂人陰得其實故於診按之際肆言而為欺妄是又下此一等無足論也雖然人稟天地之氣以生不能無清濁純駁之殊稟之清者血氣清而脈來亦清清則脈形圓淨至數分明吾診乎此但知其主富貴而已若曰何年登科何年升授何年招財何年得子吾皆不得而知矣稟之濁者血氣濁而脈來亦濁濁則脈形不清至數混亂吾診乎此但知其主貧賤而已若曰某時招悔某時破財某時損妻某時克子吾亦莫得而知矣又有形濁而脈清者此謂濁中之清質清而脈濁者此謂清中之濁又有形不甚清脈不甚濁但浮沉各得其位大小不失其等亦主平穩而無大得喪也其他言有所未盡義有所未備學者可以類推是則吾之所謂知人者十本於理而已矣豈敢妄為之說以欺人哉噫豫所以著為是論者蓋以世之有言太素脈者靡不翕然稱美不惟不能以理析又從而延譽於人縱使其言有謬又必陰與之委曲影射此所謂誤己而誤人者也果何益之有哉又有迎醫服藥者不惟不先言其所苦甚至再三詢叩終於默默至有隱疾而困醫者醫固為其所困不思身亦為醫所困矣此皆世之通患人所共有故豫不得不詳論之以致夫丁寧之意俾聾瞽者或有所開發焉孟子曰豫豈好辨哉豫不得已也太素可採之句十四吳昆太素之說固為不經然其間亦有可採者如曰脈形圓淨至數分明謂之清脈形散澀至數模糊謂之濁質清脈清富貴而多喜質濁脈濁貧賤而多憂質清脈濁此為清中之濁外富貴而內貧賤失意處多得意處少也質濁脈清此謂濁中之清外貧賤而內富貴得意處多失意處少也若清不甚清濁不甚濁其得失相半而無大得喪也富貴而壽脈清而長貧賤而夭脈濁而促清而促者富貴而夭濁而長者貧賤而壽此皆太素可採之句也然亦不能外乎風鑑故業太素者不必師太素但師風鑑風鑑精而太素之說自神矣至其甚者索隱行怪無所不至是又巫家之教耳孔子曰攻乎異端斯害也已矣正士豈為之太素大要十五彭用光論貴賤切脈之清濁論窮通切脈之滑澀論壽夭以浮沉論時運以衰旺論吉凶以緩急亦皆倣佛靈樞虛實攻補法天法地法人之奧旨凡人兩手清微如無脈者此純陰脈主貴有兩手俱洪大者此純陽脈主貴
