body:
  text: 卷之十七理集雜證謨飲食門經義平人氣象論曰平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也營衛生會篇曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外五味篇曰天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣平人絶谷篇曰腸胃之中常留谷二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水穀盡矣故平人不食飲七日而死者水穀精氣津液皆盡故也六節藏象論曰天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生刺節真邪論曰真氣者所受於天與穀氣並而充身也經脈別論曰食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也口問篇曰谷入於胃胃氣上注於肺營氣篇曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧病能論曰食入於陰長氣於陽陰陽應象大論曰水穀之寒熱感則害於六腑形不足者溫之以氣精不足者補之以味五臟別論曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣至真要大論曰五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也詳諸氣門治氣條中藏氣法時論曰肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之肝欲散急食辛以散之心欲軟急食鹹以軟之脾欲緩急食甘以緩之肺欲收急食酸以收之腎欲堅急食苦以堅之宣明五氣篇曰辛走氣氣病無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸九針論曰病在骨無食鹹病在血無食苦五味篇曰肝病禁辛心病禁咸脾病禁酸腎病禁甘肺病禁苦五味論曰酸走筋多食之令人癃咸走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心生氣通天論曰陰之所生本在五味陰之五宮傷在五味是故味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央是故謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道如法長有天命五臟生成篇曰多食鹹則脈凝泣而變色多食苦則皮稿而毛拔多食辛則筋急而爪枯多食酸則肉胝胸而唇揭多食甘則骨痛而發落刺法論曰欲令脾實氣無滯飽無久坐食無太酸無食一切生物宜甘宜淡靈蘭祕典論曰脾胃者食廩之官五味出焉痹論曰飲食自倍腸胃乃傷太陰陽明論曰飲食不節起居不時者陰受之陰受之則入五臟詳脾胃門本病論曰飲食勞倦則傷脾邪氣臟腑病形篇曰形寒寒飲則傷肺腎脈微緩為洞洞者食入還出刺志論曰谷盛氣盛谷虛氣虛此其常也反此者病谷入多而氣少此謂反也谷不入而氣多此謂反也谷入多而氣少者得之有所脫血濕居下也谷入少而氣多者邪在胃及與肺也脈解篇曰少陰所謂惡聞食臭者胃無氣故惡聞食臭也論證共五條凡飲食傷脾之證有寒傷有熱傷有暫病有久病有虛證有實證但熱者暫者實者人皆易知而寒者久者虛者人多不識如今人以生冷瓜果致傷胃氣而為瀉為痢為痛之類者人猶以為火證而治以寒涼者是不識寒證也有偶因停滯而為脹為痛者人皆知其實也然脾胃強壯者即滯亦易化惟其不能化者則最有中虛之證故或以不食亦知飢少食即作脹或以無飢無飽全然不思飲食或以胃虛兼嘔而腹滿膨膨或以火不生土而時食時吐或中氣不化則胸喉若有所哽而本非飲食之滯者或因病致傷胃氣則久不思食而本非中滿之病者且胃病於暫者多實脾病於久者多虛時醫於此無論邪正久暫鮮有不用開胃消導等劑是不知虛證也蓋脾胃之職原以化食為能今既不能化食乃其所能者病而尚可專意克伐以害其能乎且凡欲治病必須先藉胃氣以為行藥之主若胃氣實者攻之則去而疾常易愈此以胃氣強而藥力易行也胃氣虛者攻亦不去此非藥不去病也以胃虛本弱攻之則益弱而藥力愈不能行也若久攻之非惟藥不能行必致元氣愈傷病必愈甚盡去其能必於死矣矧體質貴賤尤有不同凡藜藿壯夫及新暴之病自宜消伐惟速去為善若以弱質弱病而不顧虛實概施欲速攻治之法則無不危矣一傷食者必惡食一素喜冷食者內必多熱素喜熱食者內必多寒故內寒者不喜寒內熱者不喜熱然熱者嗜寒多生中寒寒者嗜熱多生內熱此內經所謂久而增氣物化之常也氣增而久夭之由也故凡治病養生者又當於素稟中察其嗜好偏勝之弊一飲食致病凡傷於熱者多為火證而停滯者少傷於寒者多為停滯而全非火證大都飲食之傷必因寒物者居多而溫平者次之熱者又次之故治此者不可不察其所因一偶病之人多有非食而疑食者曰某日曾食某物或某肉某面其日即病醫者不論虛實但聞此言且見胃口不開必先治食夫未病之人誰有不食豈必預為停食而待病至者斯可信其無食乎及其病也則或因勞倦或因風寒或因七情病發不測而且無脹無滯與食何干藥不對病而妄行剝削必反增病此斯道中之莫須有也由此推之則凡無據無證而妄指胡猜者皆其類也良可慨矣論治共十一條凡治飲食暫傷者亦當辨虛實若停滯中焦或脹或痛者此實證也當先去其食宜大和中飲主之然去食莫先於理氣又惟排氣飲為佳若所停猶在上焦莫若用吐為捷法或用吐劑亦可若食停下焦痛極兼脹者須下而去之宜神佑丸或備急丸或赤金豆若偶傷生冷或油濁不堪等物以致吐瀉脹痛而邪氣實者宜抑扶煎若無寒氣者以本方去吳茱萸煎服或用排氣飲和胃飲俱佳若痛脹不解者宜神香散兼用之一飲食傷脾而吐瀉已甚者但察其無中滿無腹痛而惟嘔惡不能止此其食物必已盡去而以中氣受傷大虛而然或其人困倦不寧少氣多汗六脈豁大無神者宜理中湯五君子煎或溫胃飲之類主之若吐甚極虛者宜四味回陽飲瀉甚極虛者宜胃關煎凡大吐大瀉之後多為腹脹若但外脹而內不覺脹或惡聞食氣不欲飲食者皆脾氣大虛之候速宜用前溫補諸法調治之一凡少年小兒輩多有縱肆口腹以致胃氣不清或時微脹或時疼痛或膨膨然不思飲食此皆傷脾而然而實亦食滯使然也滯多者宜和胃飲滯少者宜枳朮丸或芍藥枳朮丸日漸服之仍節飲食自可全愈一凡失飢傷飽損及脾胃多令人胸膈痞悶不能消化飲食少思口中無味或噯氣吞酸神體困倦此皆脾氣受傷中虛而然宜木香人參枳朮丸或大健脾丸去黃連主之其虛甚者宜理中湯或溫胃飲若虛在下焦而陰中無陽不能生土者惟理陰煎加減主之為善一病後胃口不開飲食不進者有二證蓋一以濁氣未淨或餘火未清但宜以小和中飲加減主之一以脾胃受傷病邪雖去而中氣未復故或有數日不能食或旬日不能開或胸喉中若有所哽如梅核氣者此中本無停積但以陽氣未舒陰翳作滯胃氣太虛不能運化而然輕則溫胃飲甚則必加人參附子但使陽氣得行則胃口自開也一凡飲酒致傷者多宜除濕利水若或傷氣亦宜間用人參然其證有三不可不辨一以酒濕傷脾致生痰逆嘔吐胸膈痞塞飲食減少者宜葛花解酲湯胃苓湯五苓散之類主之一以酒熱傷陰或致發熱動血者宜黃芩芍藥湯清化飲徙薪飲之類主之一以酒質傷臟致生泄瀉不已若氣強力壯者惟五苓散胃苓湯之類皆可除濕止瀉若因濕生寒以瀉傷陰致損命門陽氣者非胃關煎及五德丸九氣丹之類不可一怒氣傷肝則肝木之氣必侵脾土而胃氣受傷致妨飲食此雖以肝氣之逆然肝氣無不漸散而脾氣之傷則受其困矣此所以不必重肝而重當在脾也故凡遇此證但當察其逆滯之有無如無脅痛脹滿等證則不必疏氣單宜以養脾益氣為主如五味異功散歸脾湯之屬是也或於補養藥中少加烏藥青皮白豆蔻以佐之亦可一凡時食時吐或朝食暮吐等證詳載反胃門一善食而瘦者多因有火然當察火之微甚微火者微清之如生地芍藥丹皮沙參麥冬石斛竹葉地骨皮黃芩知母細甘草之屬是也若火甚者或隨食隨飢隨飲隨渴或肌膚燥熱二便澀結則石膏黃連梔子黃柏龍膽草苦參之屬所不可免此當查其三焦五臟隨所在而治之然陽盛者陰必虛如一陰煎二陰煎四陰煎之屬皆當擇而用也一不能食而瘦者必其脾胃虛弱不能健運而然故或為噯氣吞酸痞滿不飢等證宜四君子湯歸脾湯若兼寒者宜五君子煎養中煎理中湯其命門火衰者宜右歸飲右歸丸八味地黃丸之類主之一凡喜茶葉喜食生米者多因胃有伏火所以能消此物余嘗以清火滋陰之藥愈此者數人蓋察其脈證有火象故隨用隨效也又有喜食炭者必其胃寒而濕故喜此燥澀之物亦當詳察脈證宜以健脾溫胃為主一食飲所傷治當從類如麥芽神麯能消米麵之積砂仁厚朴蘿蔔子阿魏能消肉食之積山楂枳實能消瓜果之積凡因濕者宜治以燥如半夏蒼朮草果澤瀉之屬因寒者宜治以熱如薑桂吳茱萸肉豆蔻之屬因熱者宜治以寒如芩連梔子青皮之屬氣滯者當行其氣宜木香烏藥香附白芥子之屬血滯者當行其血宜桃仁紅花蘇木玄胡之屬食聚積堅行散不易者宜巴豆大黃三稜蓬朮之屬凡治食積所停古法不過如此雖然此不過言其大概耳至若淺深虛實貴酌權宜凡欲攻有形須從乎味欲散凝滯須從乎氣未有氣行而食不隨者則此中之氣味通變又自有相濟之妙故不可以膠柱也一食停小腹治按詳心腹痛門當參閲之論脾胃三方共三條人賴脾胃為養生之本則在乎健與不健耳而健脾三方如潔古之枳朮丸東垣之平胃散及補中益氣湯俱當今之相傳以為準繩者也夫所謂平胃者欲平治其不平也此東垣為胃強邪實者設故其性味從辛從燥從苦而能消能散惟有滯有濕有積者宜之今見方家每以此為常服健脾之劑動輒用之而不察可否其誤甚矣一潔古枳朮丸以白朮為君脾得其燥所以能健然佐以枳實其味苦峻有推牆倒壁之功此實寓攻於守之劑惟脾氣不清而滯勝者正當用之若脾氣已虛非所宜也今人不察相傳為補脾之藥而朝吞暮餌或以小兒瘦弱而制令常服則適足以傷其氣助其瘦耳用宜酌也一補中益氣湯乃東垣獨得之心法蓋以脾胃屬土為水穀之海凡五臟生成惟此是賴者在賴其發生之氣運而上行故由胃達脾由脾達肺而生長萬物滋溉一身即如天地之土其氣皆然凡春夏之土能生能長者以得陽氣而上升升則向生也秋冬之土不生不長者以得陰氣而下降降則向死也今本方以升柴助生氣以參耆歸術助陽氣此東垣立方之意誠盡善矣第肺本象天脾本象地地天既交所以成泰然不知泰之前猶有臨臨之前猶有復此實三陽之元始故余再製補陰益氣煎正所以助臨復之氣庶乎得根本之道而足補東垣之未盡也又補中益氣湯之用原為補中扶陽而設然補陽之義則亦有宜否之辨用者不可不知如東垣用此以治勞倦內傷發熱等證雖曰為助陽也非發汗也然實有不散而散之意故於勞倦感寒或陽虛咳瘧及脾氣下陷等證則最所宜也若全無表邪寒熱而但有中氣虧甚者則升柴之類大非所宜何也蓋升柴之味皆兼苦寒升柴之性皆專疏散雖曰升麻入脾胃柴胡入肝膽能引清氣上升然惟有邪者固可因升而散之使或無邪能不因散而愈耗其中氣乎即曰此湯以補劑為主而惟藉升柴以引達清氣不知微虛者猶可出入大虛者必難假借當此之時即純用培補猶恐不及而再兼疏泄安望成功且凡屬補陽之劑無不能升正以陽主升也用其升而不用其散斯得補陽之大法此中自有玄機又奚必升柴之是賴乎故寇宗奭極言五勞七傷之大忌柴胡者是誠絶類之真見而李時珍復又非之余亦何容再辨哉然理有一定孰能越之茲余單揭其要曰能散者斷不能聚能泄者斷不能補而性味之苦寒者亦斷非扶陽之物只此便是斷按而紛紛之議或可判矣故於諸證之中凡其不宜用此者則有不可不察如表不固而汗不斂者不可用外無表邪而陰虛發熱者不可用陽氣無根而格陽戴陽者不可用脾肺虛甚而氣促似喘者不可用命門火衰而虛寒泄瀉者不可用水虧火亢而吐血衄血者不可用四肢厥逆而陽虛欲脫者不可用總之元氣虛極者毫不可泄陰陽下竭者毫不可升真火虧敗者毫不可用清涼今人但知補中益氣湯可以補虛一概尚之而不知病當緊急則此時幾微關係判於一舉指之間而纖微不可紊誤者正此類也余亦安能以筆盡哉述古共四條王太僕曰內格嘔逆食不得入是有火也病嘔而吐食入反出是無火也李東垣曰胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾實而邪氣盛也又有善食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削即食㑊也脾病則怠惰嗜臥四肢不收大便泄瀉脾既病則不能與胃行津液故亦從而病焉大抵脾胃虛弱陽氣不能生長是春夏之令不行五臟之氣不生脾病則下流乘腎土剋水則骨乏無力是為骨痿令人骨髓空虛足不能履地是陰氣重疊此陰盛陽虛之證大法云汗之則愈下之則死若用辛甘之藥滋胃當升當浮使生長之氣旺言其汗者非正發汗也為助陽也王節齋曰人之一身脾胃為主胃陽主氣脾陰主血胃司受納脾司運化一納一運化生精氣津液上升糟粕下降斯無病也人惟飲食不節起居不時損傷脾胃胃損則不能納脾損則不能化脾胃俱損納化皆難元氣斯弱百邪易侵而飽悶痞積關格吐逆腹痛瀉痢等證作矣故潔古制枳朮之丸東垣發脾胃之論使人常以調理脾胃為主後人稱為醫中王道厥有旨哉薛立齋曰凡傷食飽悶痞塞不消若脾胃素實止因倍食暴傷而患者宜用神麯山楂輩消耗之否則當慎也東垣曰脾胃之氣壯則多食而不傷過時而不飢若脾氣虛弱不能腐化者宜培補之若脾胃虛寒者宜溫養之若命門火衰者宜溫補之大凡食積痞塊證為有形所謂邪氣盛則實真氣奪則虛惟當養正則邪積自除矣雖云堅者削之客者除之若胃氣未虛元氣尚實乃可用也或病久虛羸或元氣素弱者亦當固本為主而佐以消導不然反致痞滿不食而益其病矣又曰若傷性熱之物者用二陳加黃連山楂傷濕面之物者用二陳加神麯麥芽傷米食用六君加谷蘖傷麵食者用六君加麥芽傷肉食者用六君加山楂傷魚腥者用六君加陳皮傷角黍炊飯者用六君倍加神麯若物已消而瀉未愈者此脾胃受傷也宜用六君子若飲食減少食而難化者屬脾胃虛寒也加炮薑木香肉果不應加五味吳茱萸補骨脂脾腎虛寒者須服八味丸否則多患脾虛中滿之證其神麯麥芽雖助戊土以腐熟水穀然麥芽一味余嘗以治婦人喪子乳房脹痛欲成癰者用一二兩炒熟煎服即消其破血散氣可知矣丹溪云麥芽消腎婦人良方云神麯善下胎皆克伐之功多而補益之功少亦不宜輕用今有能食難化而食後反飽者乃脾氣虛弱不能腐化水穀也若服清胃平胃等劑或加熱渴嘔吐或腹脹泄瀉等證者乃是脾胃復傷急用六君子加芍藥木香炮薑補之亦有屬脾氣鬱結者當解鬱健脾若用清涼降火以致中氣虛痞而不食或食而反出又以為噎膈用行氣化痰者必致不救也飲食論列方排氣飲新和六和胃飲新和五大和中飲新和七神香散新和二十抑扶煎新熱十一二陳湯和一小和中飲新和八平胃散和十七養中煎新熱四大健脾丸和八五理陰煎新熱三理中湯熱一四君子湯補一五苓散和一八二胃苓湯和百九十五君子煎新熱六歸脾湯補三二溫胃飲新熱五六君子湯補五右歸飲新補三右歸丸新補五五味異功散補四胃關煎新熱九一陰煎新補八補中益氣湯補三十二陰煎新補十四陰煎新補十二四味回陽飲新熱一五德丸新熱十八九氣丹新熱二三八味地黃丸補一二一徙薪飲新寒四清化飲新因十三芍藥枳朮丸新和十六枳朮丸和七九赤金豆新攻二葛花解酲湯和一二四神佑丸攻四八備急丸攻五二黃芩芍藥湯寒百九木香人參枳朮丸和八二論外備用方人參散和一二六虛寒啓脾丸和八六溫胃行滯養胃進食丸和八九茯苓飲和九三調胃進食法制陳皮和七十化滯調中湯和五九行滯健脾散和六三溫中和胃大正氣散和二四暖胃加味二陳湯和三食鬱和中丸和八八開胃消食丸和九十行滯藿香正氣散和二十寒滯曲術丸和二百一化食加味枳朮丸和八三龍腦雞蘇丸和三七二酒毒甘露湯熱七三和胃進食強中湯熱九二生冷傷脾參朮健脾湯和六四行滯溫胃化痰丸熱九八寒痰理中化痰丸熱九虛痰丁香茯苓湯熱六三溫胃進食八味理中丸熱七脾胃經義靈蘭祕典論曰脾胃者倉廩之官五味出焉營衛生會篇曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外熱論曰陽明者十二經脈之長也經脈別論曰食氣入胃散經於肝詳前飲食門六節藏象論曰天食人以五氣地食人以五味詳前飲食門脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣凡十一臟皆取決於膽也五味篇曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之搏而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣決氣篇帝曰余聞人有精氣津液血脈余意以為一氣耳今乃辨為六名余不知其所以然岐伯曰兩神相搏合而成形常先身生是謂精何謂氣岐伯曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣何謂津岐伯曰腠理發泄汗出溱溱是謂津何謂液岐伯曰谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液何謂血岐伯曰中焦受氣取汁變化而赤是謂血何謂脈岐伯曰壅遏營氣令無所避是謂脈黃帝曰六氣者有餘不足氣之多少腦髓之虛實血脈之清濁何以知之岐伯曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛酸耳數鳴血脫者色白夭然不澤其脈空虛此其候也帝曰六氣者貴賤何如岐伯曰六氣者各有部主也其貴賤善惡可為常主然五穀與胃為大海也邪客篇曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化以為血以營四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也平人絶谷篇曰平人胃滿則腸虛腸滿則胃虛更實更虛故氣得上下五臟安定血氣和則精神乃居故神者水穀之精氣也動輸篇曰胃為五臟六腑之海其清氣上注於肺肺氣從太陰而行之其行也以息往來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止五臟別論帝曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃而變見於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也平人氣象論曰平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂不得胃氣者肝不弦腎不石也胃之大絡名曰虛里貫鬲絡肺出於左乳下其動應衣脈宗氣也盛喘數絶者則病在中結而橫有積矣絶不至曰死乳之下其動應衣宗氣泄也玉機真藏論曰五臟者皆稟氣於胃胃者五臟之本也藏氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五臟各以其時自為而至於手太陰也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死脾脈者土也孤臟以灌溉四傍者也善者不可得見惡者可見其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中太過則令人四肢不舉其不及則令人九竅不通名曰重強脈弱以滑是有胃氣形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時為不可治必察四難而明告之陰陽別論曰所謂陰者真臟也所謂陽者胃脘之陽也別於陽者知病處也別於陰者知死生之期生氣通天論曰陰之所生本在五味陰之五宮傷在五味是故味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央是故謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道如法長有天命陽明脈解篇帝曰足陽明之脈病惡人與火聞木音則惕然而驚何也岐伯曰陽明者胃脈也胃者土也故聞木音而驚者土惡木也陽明主肉其脈血氣盛邪客之則熱熱甚則惡火陽明厥則喘而惋惋則惡人帝曰或喘而死者或喘而生者何也岐伯曰厥逆連臟則死連經則生帝曰病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也熱盛於身故棄衣而走也其妄言罵詈不避親疏而歌者陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也太陰陽明論帝曰太陰陽明為表裡脾胃脈也生病而異者何也岐伯曰陰陽異位更虛更實更逆更從或從內或從外所從不同故病異名也帝曰願聞其異狀也岐伯曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛故犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼故喉主天氣咽主地氣故陽受風氣陰受濕氣故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之傷於濕者下先受之帝曰脾病而四肢不用何也岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉帝曰脾與胃以膜相連耳而能為之行其津液何也岐伯曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰陽明者表也五臟六腑之海也亦為之行氣於三陽臟腑各因其經而受氣於陽明故為胃行其津液四肢不得稟水穀氣日以益衰陰道不利筋骨肌肉無氣以生故不用焉藏氣法時論曰脾病者身重善肌肉痿足不收行善瘈腳下痛虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者脾苦濕急食苦以燥之病在脾愈於秋秋不愈甚於春春不死持於夏起於長夏禁溫食飽食濕地濡衣脾欲緩急食甘以緩之苦瀉之甘補之五邪篇曰邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調於三里水熱穴論曰腎者胃之關也關門不利故聚水而從其類也本病論曰飲食勞倦即傷脾邪氣臟腑病形篇曰有所擊僕若醉入房汗出當風則傷脾病能論曰人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也經水篇曰足陽明五臟六腑之海也其脈大血多氣盛熱壯刺此者不深弗散不留不瀉也痿論帝曰論言治痿者獨取陽明何也岐伯曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長故屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也本輸篇曰下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬於胃是足陽明也玉版篇曰人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也迎而奪之而已矣論脾胃脾胃為水穀之海得後天之氣也何也蓋人之始生本乎精血之原人之既生由乎水穀之養非精血無以立形體之基非水穀無以成形體之壯精血之司在命門水穀之司在脾胃故命門得先天之氣脾胃得後天之氣也是以水穀之海本賴先天為之主而精血之海又必賴後天為之資故人之自生至老凡先天之有不足者但得後天培養之力則補天之功亦可居其強半此脾胃之氣所關於人生者不小且先天如朝廷後天如司道執政在先天布政在後天故人自有生以後無非後天為之用而形色動定一無胃氣之不可故經曰平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死又曰人以水穀為本人絶水穀則死脈無胃氣亦死正以人之胃氣即土氣也萬物無土皆不可故土居五行之中而主於四季即此義也由此推之則凡胃氣之關於人者無所不至即臟腑聲色脈候形體無不皆有胃氣胃氣若失便是凶候如五臟胃氣之病則凡氣短氣奪而聲啞喘急者此肺之胃敗也神魂失守昏昧日甚而畏寒異常者此心之胃敗也躁擾煩劇囊縮痙強而恐懼無已者此肝膽之胃敗也脹滿不能運飲食不能入肉脫痰壅而服藥不應者此脾之胃敗也關門不能禁水泉不能化熱蒸不能退骨痛之極不能解者此腎之胃敗也又如五色之有胃氣者無論青紅黑白皆宜兼蒼黃明潤若色赤如赭或如衃血色青如藍或如草滋色白如鹽或如枯骨色黃如枳實或如黃土色黑如炲或如地蒼而加之沉晦是皆五色之胃敗也又如脈象之有胃氣者經曰脈弱以滑是有胃氣脈實以堅謂之益甚脈逆四時為不可治故無論浮沉遲數皆宜兼見緩滑方是脈中之胃氣若見但弦但鉤但毛但石但代或弦搏之極而全無和氣或微渺之極而全無神氣總云真臟之見是皆五脈之胃敗也不獨此也即如情性氣質亦無不關於胃氣蓋土性厚重而輕薄者少胃氣土色蒼固而夭嫩者少胃氣是可知土氣為萬物之源胃氣為養生之主胃強則強胃弱則衰有胃則生無胃則死是以養生家必當以脾胃為先而凡脾胃受傷之處所不可不察也蓋脾胃之傷於外者惟勞倦最能傷脾脾傷則表裡相通而胃受其困者為甚脾胃之傷於內者惟思憂忿怒最為傷心心傷則母子相關而化源隔絶者為甚此脾胃之傷於勞倦情志者較之飲食寒暑為更多也故經曰二陽之病發於脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治再此之外則脾胃屬土惟火能生故其本性則常惡寒喜暖使非真有邪火則寒涼之物最宜慎用實所以防其微也若待受傷救之能無晚乎此脾胃之傷於寒涼生冷者又飲食嗜好之最易最多者也故昔有柳公度者善於攝生或問其致壽之術則曰我無他也但不以氣海熟生物暖冷物亦不以元氣佐喜怒耳此得善養脾胃之道所以便能致壽故凡欲察病者必須先察胃氣凡欲治病者必須常顧胃氣胃氣無損諸可無慮奈何今之醫家習矣不察初不知元氣胃氣為何物動輒止知攻病開口便云有火以致敗人胃氣絶人穀氣者不可勝紀殊不知病之與命孰為重輕正之與邪孰為緩急矧此中的確之用孰者宜先孰者宜後自有標本一定之理原非可以意湊猜摸者也世有庸流每借竊一二成語東扯西拽以似為是偏執惑亂欺人誤人倘不幸遇之而不能燭其真偽其亦命之使然乎悲乎悲乎論東垣脾胃論人以水穀為本故脾胃為養生之本惟東垣獨知其義發為脾胃論曰歷觀內經諸篇而參考之則元氣之充足皆由脾胃之氣無所傷而後能滋養元氣若胃氣之本弱飲食自倍則脾胃之氣既傷而元氣亦不能充此諸病之所由生也因引內經之義如生氣通天論曰蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也陽氣者煩勞則張故蒼天之氣貴清淨陽氣惡煩勞此病從脾胃生者一也又引五常政大論曰陰精所奉其人壽陽精所降其人夭陰精所奉謂脾胃既和穀氣上升春夏令行故其人壽陽精所降謂脾胃不和穀氣下流收藏令行故其人夭此病從脾胃生者二也又引六節藏象論曰脾胃大腸小腸三焦膀胱者倉廩之本營之居也此至陰之類通於土氣凡十一臟者皆取決於膽也夫膽者少陽春生之氣春氣生則萬化安故膽氣春升則餘臟從之膽氣不升則餐泄腸澼不一而起此病從脾胃生者三也又引本論曰天食人以五氣地食人以五味此之謂氣者上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣氣或乖錯人何以生此病從脾胃生者四也夫內傷脾胃乃傷其氣外感風寒乃傷其形傷其外為有餘有餘者瀉之傷其內為不足不足者補之內傷不足之病苟誤認作外感有餘之病而反瀉之則虛其虛也實實虛虛如此死者醫殺之耳然則奈何惟當以辛甘溫之劑補其中而升其陽甘寒以瀉其火則愈矣經曰勞者溫之損者溫之又曰溫能除大熱大忌苦寒之藥諸如此論皆東垣獨得之見也茲察其所謂蒼天貴清淨陽氣惡煩勞者此指勞倦之為病也所謂收藏令行故其人夭者此指陰盛陽衰之為病也所謂春氣升則萬物安者此指降則無生之為病也所謂氣或乖錯人何以生者此指陽氣受傷之為病也東垣此言其垂惠後世開導末學之功誠非小矣獨怪其前論中又有矛盾之談如曰飲食失節寒溫不適脾胃乃傷此固喜怒憂恐損耗元氣資助心火心不主令相火代之相火者下焦包絡之火元氣之賊也火與元氣不兩立火勝則乘其土位此所以為病若此數語則大見矛盾矣第觀其前四條則總慮陽氣之受傷也故曰大忌苦寒之藥此一節又云火勝之為病更當何法以治之且所云喜怒憂恐損傷元氣資助心火火勝則乘其土位此何説也夫元氣既損多見生陽日縮神氣日消何以反助心火脾胃屬土得火則生何謂火勝則乘其土位且人之元氣本貴清和寒固能病熱亦能病然熱傷元氣而因勞動火者固常有之此自不得不從清補若因勞犯寒而寒傷脾胃者尤酷尤甚此可概言為火乎第熱證顯而寒證隱故熱證易見而寒證不之覺也真熱證猶易辨而假熱證尤不易辨也矧元氣屬陽火其類也而熱為同氣邪猶可制陰為陽賊寒其仇也而生機被伐無不速亡故經云少火生氣未聞少寒生氣也又云避風如避箭未聞避熱如避箭也由此觀之則何不曰寒與元氣不兩立而反云火與元氣不兩立乎茲舉火字特以為言致令後生之妄言火者反盡忘東垣前四條之格言而單執不兩立之説用為治火之成按是東垣戒之而反以誨之此其白璧之瑕余實不能不為東垣惜也及再考東垣之方如補中益氣湯升陽益胃湯黃耆人參湯清暑益氣湯等方每用升柴此即其培養春生之意而每用芩連亦即其制伏火邪之意第以二三分之芩連固未必即敗陽氣而以五七分之參朮果即能斡旋元氣乎用是思及仲景見其立方之則用味不過三四品用數每至二三兩且人之氣血本大同疾病多相類而仲景之方大而簡東垣之方小而雜何其懸絶一至如此此其中要必有至道存焉賓以後學固不敢直判其孰是孰非而私心向往則不能不霄壤於其間也一脾胃三方有論在前飲食門論治脾胃脾胃有病自宜治脾然脾為土臟灌溉四傍是以五臟中皆有脾氣而脾胃中亦皆有五臟之氣此其互為相使有可分而不可分者在焉故善治脾者能調五臟即所以治脾胃也能治脾胃而使食進胃強即所以安五臟也今人止知參苓枳朮山楂麥芽神麯厚朴之類乃為脾胃之藥而不知風寒濕熱皆能犯脾飲食勞倦皆能傷脾如風邪勝者宜散之則麻黃桂枝柴胡乾葛之類皆是也寒邪勝者宜溫之則桂附乾薑丁香茱萸之類皆是也熱邪勝者宜寒之則芩連知柏梔子石膏之類皆是也濕邪勝者宜燥之則蒼朮白朮半夏豬苓之類皆是也飲食停積者宜行之則三稜蓬朮大黃芒硝之類皆是也勞倦內傷者宜補之則人參黃耆白朮杜仲之屬皆是也然臟腑雖分十一而同有陰陽同此血氣矧太陰常多血少氣陽明常多血多氣使此中之血瘀則承氣抵當之類總屬脾胃之藥使此中之血虛則四物五物理陰五福之類又孰非脾胃之藥乎再若五臟之邪皆通脾胃如肝邪之犯脾者肝脾皆實單平肝氣可也肝強脾弱舍肝而救脾可也心邪之犯脾者心火熾盛清火可也心火不足補火以生脾可也肺邪之犯脾者肺氣壅塞當泄肺以蘇脾之滯肺氣不足當補肺以防脾之虛腎邪之犯脾者脾虛則水能反克救脾為主腎虛則啓閉無權壯腎為先至若胃司受納脾主運化若能納而不化此脾虛之兆易見若既不能納又不能運此脾胃之氣俱已大虧即速用十全大補六味回陽等劑尤恐不及而尚欲以楂苓枳朮之類冀為脾胃之永賴乎是以脾胃受傷但使能去傷脾者即俱是脾胃之藥此中理奧機圓姑舉此以見其概而隨宜應變誠有非言能盡悉者且諸藥入口必先入胃而後行及諸經若妄用相妨相礙等物亦豈有既入其腑能不先犯脾胃而竟走他臟者乎倘不明此理而徒執一二成方曰此可攻邪此可健胃則其胸次可知矣述古共二條徐東皋曰百凡治病胃氣實者攻之則去而疾恆易愈胃氣虛者攻之不去蓋以本虛攻之則胃氣益弱反不能行其藥力而病所以自如也非藥不能去病亦以主氣不行藥力故也若峻攻之則元氣傷而病益甚若不知機攻盡元氣則死矣如虛熱者服寒涼之藥而熱反甚何也經曰服寒而反熱者奈何岐伯曰治其王氣是以反也若胃氣不虛雖有病者不攻自愈故中醫用藥亦常效焉觀夫藜藿野人之病嘗不藥自愈可知矣故曰治病不察脾胃之虛實不足以為太醫又曰漢張仲景著傷寒論專以外傷為法其中顧盼脾胃元氣之祕世醫鮮有知之者觀其少陽證小柴胡湯用人參則防邪氣之入三陰或恐脾胃稍虛邪乘而入必用人參甘草固脾胃以充元氣是外傷未嘗忘內因也至於陽毒升麻湯人參敗毒散化斑湯黃連湯白通湯理中湯炙甘草湯橘皮湯五味子湯栝蔞根湯建中湯等未嘗不用參耆以治外感可見仲景公之立方神化莫測或者只以外傷是其所長而內傷非所知也此誠不知公者也何今世之醫不識元氣之旨惟見王綸雜著戒用人參之謬説執泥不移樂用苦寒攻病之標致誤蒼生死於非命抑何限耶間有病家疑信相半兩勿之從亦但不速其死耳直以因循俟其元氣自盡終莫之救而致斃者可謂知乎況斯世斯時人物劇繁稟氣益薄兼之勞役名利之場甚至蹈水火而不知恤耽酒色以竭其真不謂內傷元氣吾弗信也觀其雜病稍用攻擊而脾胃遂傷甚則絶谷而死者皆可類推矣脾胃論列方理中湯熱一理陰煎新熱三十全大補湯補二十四物湯補八五福飲新補六建中等湯補二二後白通湯熱一四五五物煎新因三栝蔞根湯散百七化斑湯寒三橘皮湯和二九八六味回陽飲新熱二黃連湯寒百三炙甘草湯熱四四人參敗毒散散三六抵當湯攻三七五味子湯補五七陽毒升麻湯散百六承氣湯攻一小柴胡湯散十九論外備用方歸脾湯補三二二陳湯和一五味異功散補四煨腎丸補一四六能消穀平胃散和十七加味四君子湯補二胃苓湯和百九十四君子湯補一加味枳朮丸和八三啓脾丸和八六行滯六君子湯補五養胃進食丸和八九人參散和二百六十虛寒大健脾丸和八五藿香正氣散和二十寒滯安脾散熱六七虛寒不化大七香丸和一三一氣寒丁香茯苓湯熱六三溫胃行滯九寶丹熱一四三溫理脾胃大半夏湯和十一痰飲藿香安胃散熱七一脾虛氣滯太和餅小九參苓白朮散補五四木香人參枳朮丸和八二和中丸和八八溫脾胃參朮健脾丸和六四虛滯八味湯熱一四一虛寒氣滯溫胃湯熱十二暖胃和中眩運經義口問篇曰上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩衛氣篇曰下虛則厥下盛則熱上虛則眩上盛則熱痛海論曰髓海有餘則輕徑多力自過其度髓海不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥五藏生成篇曰徇蒙招尤目冥耳聾下實上虛過在足少陽厥陰甚則入肝脈要精微論曰浮而散者為眴僕決氣篇曰精脫者耳聾氣脫者目不明厥論曰巨陽之厥則腫首頭重足不能行發為眴僕經脈篇曰督脈實則脊強虛則頭重高搖之五陰氣俱絶則目系轉轉則目運目運者為志先死志先死則遠一日半死矣至真要大論曰諸風掉眩皆屬於肝太陽司天民病善悲時眩僕太陽之復頭痛善悲時眩僕食減氣交變大論曰歲木太過風氣流行脾土受邪民病飧泄食減甚則忽忽善怒眩冒巔疾六元正紀大論曰木鬱之發甚者耳鳴眩轉目不識人善暴僵仆論證共四條眩運一證虛者居其八九而兼火兼痰者不過十中一二耳原其所由則有勞倦過度而運者有飢飽失時而運者有嘔吐傷上而運者有泄瀉傷下而運者有大汗忘陽而運者有眴目驚心而運者有焦思不釋而運者有被毆被辱氣奪而運者有悲哀痛楚大叫大呼而運者此皆傷其陽中之陽也又有吐血衄血便血而運者有癰膿大潰而運者有金石破傷失血痛極而運者有男子縱欲氣隨精去而運者有婦女崩淋産後去血而運者此皆傷其陰中之陽也再若大醉之後濕熱相乘而運者傷其陰也有大怒之後木肆其強而運者傷其氣也有痰飲留中治節不行而運者脾之弱也此亦有餘中之不足也至若年老精衰勞倦日積而忽患不眠忽苦眩運者此營衛兩虛之致然也由此察之虛實可辨矣即如內經之言亦無非言虛而向後世諸家每多各逞億説其於病情經義果相合否指南若北後學能無誤乎因摘其尤者悉之如下一河間之論眩運獨取至真要大論一句曰諸風掉眩皆屬肝木風主動故也所謂風氣甚而頭目眩運者由風木旺必是金衰不能制木而木復生火風火皆屬陽陽主乎動兩動相搏則為之旋轉故火本動也焰得風則自然旋轉也此釋風木之義固然似矣然不知至真要大論之言乃言運氣臟氣所屬之理非所以悉眩運之病情也必若口問篇衛氣篇決氣篇經脈篇海論等義方為最切最近之論何河間一無引證而獨言風火二字以該眩運一證豈無失乎又若丹溪之論眩運曰痰在上火在下火炎上而動其痰也此證屬痰者多蓋無痰不能作眩雖因風者亦必有痰挾氣虛者亦宜治痰為主兼用補氣降火之藥若據此論則凡屬眩運無非痰證也何軒岐之言絶然不及痰飲而但曰上氣不足頭為之苦傾目為之眩曰上虛則眩曰督脈虛則頭重高搖之曰髓海不足則腦轉耳鳴而眩冒凡此者豈皆痰證耶又若余前章所列諸證無非眩運之由亦豈皆痰證耶故在丹溪則曰無痰不能作眩當以治痰為主而兼用他藥余則曰無虛不能作眩當以治虛為主而酌兼其標孰是孰非余不能必姑引經義以表其大意如此尚俟明者正之一頭痛之病上實證也頭眩之病上虛證也故內經分別甚明曰頭痛巔疾上實下虛又曰上實下虛為厥巔疾此以邪氣在上所以為痛故曰上實也至若眩運之病則曰上氣不足又曰上虛則眩未聞言上之實也而後世諸家如嚴用和楊仁齋輩有曰結而為飲隨氣上逆者有曰疲勞過度下虛上實者有曰腎家不能納氣使諸家氣逆奔而上者即如朱丹溪亦曰痰在上火在下凡此皆言上實也何與內經相反若此噫此實後人之不明耳夫眩運之證或為頭重或為眼黑或為腦髓旋轉不可以動求其言實之由不過為頭重者為上實而不知頭本不重於往日而惟不勝其重者乃甚於往日耳上力不勝陽之虛也豈上實乎又何氣不歸元及諸氣逆奔之有蓋上實者宜降宜抑上虛者最不宜再伐生氣此上實下虛之旨有不可不辨而誤則害矣一頭眩有大小之異總頭眩也於此察之可得虛實之情矣何以言之如今人之氣稟薄弱者無論少壯或於勞倦或於酒色之後或忽有耳鳴如磬或頭眩眼黑倏頃而止者乃人所常有之事至於中年之外多見眩僕卒倒等證亦人所常有之事但忽運而忽止者人皆謂之頭運眼花卒倒而不醒者人必謂之中風中痰不知忽止者以氣血未敗故旋見而旋止即小中風也卒倒而甚者以根本既虧故遽病而難復即大頭眩也且必見於中年之外而較之少壯益又可知於此察之則其是風非風是痰非痰而虛實從可悟矣何今人不識病機但見眩僕不語等證無不謂之風痰而非消即散吾恐幾微之氣有不堪再加鏟削矣深可悲也論治共三條一頭眩雖屬上虛然不能無涉於下蓋上虛者陽中之陽虛也下虛者陰中之陽虛也陽中之陽虛者宜治其氣如四君子湯五君子煎歸脾湯補中益氣湯如兼嘔吐者宜聖朮煎大加人參之類是也陰中之陽虛者宜補其精如五福飲七福飲左歸飲右歸飲四物湯之類是也然伐下者必枯其上滋苗者必灌其根所以凡治上虛者猶當以兼補氣血為最如大補元煎十全大補湯及諸補陰補陽等劑俱當酌宜用之一眩運證凡有如前論首條所載病源者當各因其證求而治之其或有火者宜兼清火有痰者宜兼清痰有氣者宜兼順氣亦在乎因機應變然無不當以治虛為先而兼治為佐也一古法之治眩運亦有當察者丹溪曰濕痰者多宜二陳湯火者加酒芩挾氣虛者相火也治痰為先挾氣藥降火如東垣半夏白朮天麻湯之類眩運不可當者以大黃酒炒為末茶湯調下火動其痰用二陳加黃芩蒼朮羌活散風行濕附録曰有早起眩運須臾自定日以為常者正元散下黑錫丹傷濕頭運腎著湯加川芎名除濕湯有痰青州白丸子愚謂古法之治眩運如半夏白朮天麻湯治脾痰也二陳湯加黃芩治熱痰也青州白丸子治風痰寒痰也腎著湯治濕痰也此外如大黃末之治眩運不可當惟痰火之壅者宜之黑錫丹之重墜惟氣實於上者宜之第恐眩運一證實痰實火者無幾而亦非上盛之病此古方之有宜否用者不可不審述古劉宗厚云眩運一證人皆稱為上盛下虛所致而不明言其所以然之故蓋所謂虛者血與氣也所謂實者痰涎風火也原病之由有氣虛者乃清氣不能上升或汗多亡陽而致當升陽補氣有血虛者乃因亡血過多陽無所附而然當益陰補血此皆不足之證也有因痰涎郁遏者宜開痰導郁重則吐下有因風火所動者宜清上降火若因外感而得者此皆有餘之證也世有所謂氣不歸元而用丹藥鎮墜沉香降氣之法蓋香竄散氣丹藥助火其不歸之氣豈能因此而復耶內經所謂治病必求其本氣之不歸求其本而用藥則善矣吐法新按先君壽峰公少壯時頗好酒因致酒病自四旬之外遂絶戒不飲後至七旬因除夜之樂飲一小杯而次早眩暈不能起先君素善吐法有記在痰飲門因吐去清痰而眩暈頓愈原其所由則一杯之酒何遽為痰不過以惡酒之臟而忽被酒氣則真陰清氣為之淆亂而然吐去痰飲酒氣可除吐能升氣清陽可復此非治痰而實以治亂耳故志此以見其義眩運論列方五福飲新補六七福飲新補七四君子湯補一四物湯補八左歸飲新補二五君子煎新熱六腎著湯熱一二九右歸飲新補三十全大補湯補二十二陳湯和一歸脾湯補三二補中益氣湯補三十正元散熱五一聖朮煎新熱二五大補元煎新補一青州白丸子和百十二黑錫丹熱三八九半夏白朮天麻湯和十五論外備用方參附湯補三七朮附湯補四一益氣補腎湯補百三氣虛玉液湯和九六痰運祛痰丸和百三風痰苓桂朮甘湯和三六虛痰運養正丹熱一八八痰涎上盛芎術湯熱五十寒濕眩運
