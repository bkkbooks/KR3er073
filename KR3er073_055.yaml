丸治心經積熱風痰壅滯頭目赤腫瘡癤咽痛胸膈不利大小便祕一切風熱等證大黃生黃芩各二兩黑醜頭末生滑石各四兩黃連川芎薄荷葉各半兩滴水丸桐子大每服五十丸食後溫水下局方無黃連三因小胃丹上可去胸膈之痰下可利腸胃之痰芫花大戟俱醋炒甘遂麵裹煨各一兩大黃酒拌蒸一兩半黃柏炒褐色二兩上為細末粥丸麻子大每服十丸溫水下清氣化痰丸南星半夏各八兩用皂角白礬生薑各三兩水十碗煮至五碗取湯浸星夏二日卻煮至無白點為度曬乾聽用橘紅檳榔各二兩木香沉香各一兩蒼朮米泔浸炒四兩上為末薑汁糊丸淡鹽湯白湯任下丹溪清氣化痰丸治上焦痰火壅盛咳嗽煩熱口渴胸中痞滿南星制三兩半夏制黃連黃芩各五兩栝蔞仁杏仁去皮尖茯苓各四兩枳實炒陳皮各六兩甘草上為細末薑汁煮糊丸桐子大每服五十丸薑湯下法制清氣化痰丸順氣快脾化痰消食南星去皮半夏各四兩用皂角白礬乾薑各四兩入水五碗煎至三碗去柤卻入南星半夏浸二日再煮至星夏俱無白點為度曬乾加後藥陳皮青皮蘇子炒神麯炒麥芽炒蘿蔔子炒另研杏仁去皮尖炒葛根山楂香附各二兩上為末湯泡蒸餅丸桐子大每服五七十丸臨臥食後茶湯下隱君滾痰丸治一切濕熱食積等痰窠囊老痰一方礞石止用五錢外加百藥煎五錢乃能收斂周身痰涎聚於一處然後利下所以甚效礞石硝煅金色一兩大黃酒蒸黃芩去朽者各半斤沉香五錢上為細末滴水為丸桐子大每服三五十丸量人強弱加減凡服滾痰丸之法必須臨臥就床用熱水一口許只送過咽即便仰臥令藥徐徐而下服後須多半日勿飲食起坐必使藥氣除逐上焦痰滯惡物過膈入腹然後動作方能中病或病甚者須連進二三次或壯人病實者須多至百丸多服無妨子和硃砂滾涎丸治五癇硃砂白礬生硝石赤石脂等分上為細末研蒜膏為丸緑豆大每服三五十丸食後荊芥湯下丹溪青礞石丸解食積去濕痰重在風化硝南星二兩切片用白礬末五錢水浸一二日曬乾又云一兩半夏一兩湯泡切片以皂角水浸一日曬乾黃芩薑汁炒茯苓枳實炒各一兩礞石二兩捶碎焰硝二兩同入小砂罐內瓦片蓋之鐵線縛定鹽泥固濟曬乾火煅紅候冷取出法制硝同萊蔔水煮化去卜綿濾令結復入臘月牛膽內風化之或只用風化硝一兩上為末神麯糊丸桐子大每服三五十丸白湯下又方半夏二兩白朮礞石各一兩黃芩五錢茯苓陳皮各七錢半風化硝二錢上為末丸同前節齋化痰丸潤燥開鬱降火消痰治老痰鬱痰結成黏塊凝滯喉間肺氣不清或吐咯難出皆因火邪炎上凝滯於心肺之分俱宜開鬱降火消痰緩而治之庶可效耳天門冬去心黃芩酒炒海粉另研栝蔞仁另研橘紅各一兩連翹香附淡鹽水浸炒桔梗各五錢青黛另研芒硝另研各三錢上為細末煉蜜入薑汁少許搗丸龍眼大噙嚼一丸清湯送下或丸如緑豆大淡薑湯送下五六十丸此等老痰大約飲酒人多有之酒氣上蒸肺與胃脘皆受火邪故結而成痰此方天冬黃芩瀉肺火海石芒硝咸以軟堅栝蔞潤肺消痰香附連翹開鬱降火青黛去鬱火故不用辛燥等藥醫林辰砂化痰丸治風化痰安神定志止嗽除堅辰砂另研明礬另研各五錢南星制一兩半夏曲三兩上為細末薑汁糊丸緑豆大硃砂為衣每服三十丸食後薑湯下三因控涎丹凡人忽患胸背手足腰胯疼痛牽引釣動時時走易不定不可忍者或手足冷痹氣脈不通是皆痰涎在心膈上下故為此證真白芥子紫大戟去皮甘遂麵裹煨各等分上為末糊丸桐子大臨臥淡薑湯或溫水下五七丸至十丸痰甚者量加之醫林烏巴丸治胸膈久為頑痰所害面色青白浮腫不思飲食遍身疼痛夜間氣壅不得睡往來寒熱手足冷痛不得轉側屢用痰藥墜之不下取之不出此是頑痰堅滯宜此藥利下之則愈未利再服烏梅肉二兩巴霜五粒去油上用水二碗砂鍋內將烏梅肉煮爛候水稍干入巴豆將竹片攪如稠糊取出搗為丸桐子大每服七丸九丸十丸十一丸或十五丸薑湯下不拘時御藥吐痰方治胸中有痰瘀癖者用白礬一兩水二升煮一升入蜜一合更煮少時溫服須臾即吐如未吐再飲熱水一盞吐痰為效人參利膈丸方在和陳治痰逆嗝噎聖藥和劑青木香丸治胸膈噎塞氣滯不行腸中水聲嘔噦痰逆不思飲食寬中和膈黑醜炒香取頭末十二兩破故炒蓽茇各四兩木香二兩檳榔用酸粟米飯裹濕紙包火煨令紙焦去飯四兩上為末滴水為丸緑豆大每服三四十丸茶湯熱水任下消痞核桃莪朮酒洗當歸酒洗白芥子急性子各四兩俱搗碎皮硝海粉各八兩大核桃百枚上先以群藥入砂鍋內寬水煮一二沸後入大核桃重五錢者百枚同煮一日夜以重一兩為度取起晾乾先用好膏藥一個摻阿魏一錢麝香半分量痞大小貼住以熱手磨擦每空心服前桃一個三日後二個以至三個服完後須四物湯之類數帖即愈尉痞方一層用麝香二三分摻肉上二層阿魏一二錢三層芒硝一二兩鋪蓋於上上先用蕎麥麵和成條量痞大小圍住鋪藥於內以青布蓋之隨燒熱磚四五塊輪流布上尉之覺腹中氣行寬快即是痞消之兆以手烘熱摩之亦妙內須服調養氣血之藥開結導飲丸方在和陳治飲食不消心下痞悶腿腳腫痛局方犀角丸除三焦熱邪及痰涎壅滯腸胃燥澀大小便難黃連去須犀角鎊各十兩人參二十兩大黃八十兩黑醜炒搗取頭末六十兩上為細末煉蜜丸梧子大每服十五丸至二十丸臨臥湯下更量虛實加減河間犀角丸治癲癇發作有時揚手擲足口吐痰涎不省人事暗倒屈伸犀角末半兩赤石脂三兩朴硝二兩白殭蠶薄荷各一兩上為末麵糊丸梧子大每服二三十丸溫水下日三服不拘時如覺痰多即減其數忌油膩炙爆麻仁丸治大便祕結胃實能食小便熱赤者芝麻四兩研取汁杏仁四兩去皮尖研如泥大黃五兩山梔十兩上為末煉蜜入麻汁和丸桐子大每服五十丸食前白湯下局方脾約丸此即仲景麻人丸仲景曰趺陽脈浮而澀浮則胃氣強浮澀則小便數浮澀相搏大便則難其脾為約麻人丸主之亦名潤腸丸治臟腑不和津液偏滲於膀胱以致小便利大便祕結者大黃蒸杏仁去皮尖炒厚朴麻仁各四兩枳實二兩煉蜜丸桐子大每服二十丸白滾湯下日三服漸加以和為度局方七宣丸治風氣結聚宿食不消心腹脹滿胸膈痞塞風毒腫氣連及頭面大便祕澀小便時數脾胃氣壅不能飲食東垣云治在脈則澀在時則秋柴胡枳實訶子肉木香各五兩炙甘草四兩桃仁炒去皮尖六兩大黃蒸十五兩上為末煉蜜丸桐子大每服二十丸食遠米飲下漸加至四五十丸以利為度覺病退止服局方七聖丸治風氣壅盛痰熱結搏心煩面赤咽乾口燥肩背拘急胸膈脹滿腹脅痞悶腰膝沉重大便閉結小便赤澀東垣曰治在脈則弦在時則春木香檳榔川芎肉桂羌活各五錢郁李仁炮去皮大黃半生半熟各一兩上為末煉蜜丸小豆大每服十五丸至二十丸食後臨臥白湯下三因紅丸子消食瘧胡椒一兩阿魏一錢醋化青皮炒三兩莪朮三稜醋煮一伏時各二兩上為末另用陳倉米末同阿魏醋煮糊丸桐子大炒土朱為衣每服七十丸薑湯下追蟲丸取一切蟲積黑醜頭末檳榔各八錢雷丸醋炙南木香各二錢上為末用茵陳二兩大皂角苦楝皮各一兩煎濃汁丸緑豆大壯大人每服四錢小人弱人或一錢五分量人虛實於五更時用砂糖水吞下待追去惡毒蟲積二三次方以粥補之醫林化蟲散雷丸二粒檳榔二枚鶴蝨一錢使君子七枚輕粉少許上為末分二服候晚刻以精豬肉一兩切成片用皂角漿泡一宿至五更慢火炙熟乃以香油拭肉上候溫取前藥一服擦肉上略烘過食之至巳時蟲下了乃進飲食萬應丸下諸蟲檳榔五兩大黃半斤黑醜頭末四兩皂角不蛀者十條苦楝根皮一升上先將苦楝皮皂角二味用水二大碗熬成膏子搜和前三味為丸桐子大以沉香雷丸木香各一兩為衣先用沉香衣後用雷丸木香衣每服三錢四更時用砂糖水送下妙應丸一名剪紅丸殺諸蟲大黃牽牛頭末檳榔各三兩雷丸錫灰各五錢大戟三錢鶴蝨使君子煨茴香貫衆各二錢半輕粉少許苦楝根一兩上為細末用皂角煎膏丸服每服五六十丸隨弱強加減五更初茶清下如未通再吃溫茶助之下蟲積盡了白粥補之運氣五瘟丹治瘟疫火證黃芩黃柏黃連山梔香附紫蘇甘草梢大黃上以前七味生為末用大黃三倍煎濃湯去滓和藥丸如雞子大硃砂雄黃為衣貼以金箔每用一丸取泉水七碗浸化可服七人前藥甲己年以甘草梢為君乙庚年黃芩為君丙辛年黃柏為君丁壬年山梔為君戊癸年黃連為君為君者多一倍也餘四味同香附紫蘇為臣者減半也大青丸治時行瘟病發熱上膈結熱薄荷梔子黃芩黃連甘草各三錢連翹六錢大黃玄明粉各八錢上為細末以青蒿自然汁為丸緑豆大雄黃為衣每服五六十丸白滾湯下若治雜病發熱者以硃砂或青黛為衣硃砂丸治卒時中惡垂死硃砂研附子炮去皮臍雄黃明者各一兩麝香一分另研巴豆二十粒去油上研勻煉蜜和搗為丸麻子大每服三丸不拘時粥飲下如不利更加三丸至七丸以利為度李氏八毒赤丸治一切邪崇鬼疰服之即愈雄黃硃砂礬石附子炮藜蘆牡丹皮巴豆各一兩蜈蚣一條上為末煉蜜丸如小豆大每服五七丸涼水送下無時衛生寶鑑云副使許可道宿驛中夜夢一婦人於脅下打一拳遂痛不止而往來寒熱不能食乃鬼擊也名醫録云李子豫八毒赤丸名為殺鬼杖子遂與藥三粒臥時服明旦下清水二斗而愈又陳慶玉子因晝臥水仙廟夢得一餅食之而心腹痞滿病及一年諸治不效余診之問其始末因思此疾既非外感又非內傷惟八毒赤丸頗為相當遂與五七丸下清黃涎鬥余漸得氣調後以別藥理之數月而愈仲景瓜蒂散治傷寒頭不痛寸脈微浮胸中痞硬氣上衝咽喉不息者此為胸有寒也當吐之瓜蒂熬黃赤小豆等分上二味各別搗篩為散然後合之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少再加得快吐乃止諸亡血虛家不可與瓜蒂散子和獨聖散吐積蓄痰涎甜瓜蒂不拘多少微炒為細末每服一二錢齏汁調服膝痛加全蠍頭痛加鬱金服吐之茶調散吐除痰積瓜蒂二錢好茶一錢上為末每服二錢齏汁調服陳氏獨聖散方在外科治瘡瘍氣血凝滯良方獨聖散方在婦人治妊娠傷觸動胎腹痛下血錢氏獨聖散方在痘疹治痘瘡倒靨陷伏木通散凡男子婦人脅肋苦痛木通去節青皮蘿蔔子炒茴香川楝子取肉用巴豆半兩同炒黃去巴豆各一兩滑石另研莪朮木香各半兩上為細末每服三錢不拘時用蔥白湯調服甚者不過三服金匱大黃附子湯治寒氣內積脅下偏痛大黃三兩附子三枚炮細辛二兩上三味用水五升煮取二升分溫三服若強人煮取二升半分溫三服服後如人行四五里更進一服金匱外臺走馬湯治中惡心痛腹脹大便不通巴豆二枚去皮心熬杏仁二枚上二味以綿纏令碎熱湯二合捻取白汁飲之當下通治飛尸鬼擊病老小量用
