body:
  text: 卷之五十五宇集古方八陳攻陳仲景大承氣湯治陽明太陰傷寒譫語五六日不大便腹滿煩渴並少陰舌乾口燥潮熱脈實者劉河間加甘草名三一承氣湯大黃四兩厚朴半斤枳實五枚芒硝三合上以水一斗先煮厚枳二物取五升去滓納大黃煮取二升去滓納芒硝更上微火一兩沸分溫再服得下余勿服仲景小承氣湯治病在太陰無表證汗後潮熱狂言腹脹脈實六七日不大便喘滿者即前大承湯減去芒硝仲景調胃承氣湯治太陽陽明不惡寒反惡熱大便祕結日晡潮熱者凡陽明病有一證在經者當解肌入腑者當攻下大黃芒硝甘草各五錢此從近法每服三五錢水一大盞煎七分溫服仲景桃仁承氣湯治傷寒蓄血小腹急大便黑而不通桃仁十二枚去皮尖官桂甘草各一錢芒硝三錢大黃半兩或一兩此從近法上㕮咀作一服或分二服水一大盞煎七分溫服良方桃仁承氣湯治瘀血小腹作痛大便不利或譫語口乾漱水不咽遍身黃色小便自利或血結胸中硬滿心下手不可近或寒熱昏迷其人如狂桃仁半兩去皮尖大黃炒一兩甘草二錢肉桂一錢上薑水煎發日五更服當歸承氣湯治燥熱裡熱火鬱為病或皮膚枯燥或咽乾鼻乾或便溺結閟通宜此方當歸大黃各四錢甘草芒硝各二錢上㕮咀入薑煎服仲景大柴胡湯表證未除里證又急汗下兼行用此柴胡半斤半夏半升黃芩芍藥各三兩生薑五兩切枳實四枚大黃二兩大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎溫服一升日三服陶氏六一順氣湯以代大小承氣大柴胡大陷胸等湯之神藥也此湯治傷寒熱邪傳裡大便結實口燥咽乾怕熱譫語揭衣狂走斑黃陽厥潮熱自汗胸脅滿硬臍腹疼痛等證效不盡述大黃枳實黃芩厚朴柴胡甘草芍藥芒硝水煎服欲峻者大黃後入凡傷寒過經及老弱或血氣兩虛之人或婦人産後有下證或有下後不解或表證尚未除而里證又急不得不下者用此湯去芒硝下之則吉蓋恐硝性峻急故有此戒經云轉藥孰緊有芒硝者緊也今之庸醫不分當急下可少與宜微和胃氣之論一概用大黃芒硝亂投湯劑下之因茲枉死者多矣仲景云蕩滌傷寒熱積皆用湯液切禁丸藥不可不知也仲景大陷胸湯治大結胸手不可按大黃四錢芒硝三錢甘遂末二分此從近數用水一鍾半先煎大黃至一鍾納芒硝煎一二沸去柤納甘遂末和勻服得利則止此藥極峻必不得已而用之原方用大黃六兩芒硝一升甘遂末一錢水六升如前法煮二升分二服得快利止後服小陷胸湯方在寒陳治小結胸正在心下按之則痛脈浮滑者河間大黃湯治瀉痢濕熱邪盛膿血稠黏裡急後重日夜無度者大黃一兩上細銼好酒二大盞浸半日煎至一盞半去大黃分二服頓服之痢止一服如未止再服以利為度服芍藥湯以和之痢止再服黃芩湯和之以撤其毒外科大黃湯方在外科治腸癰小腹堅腫金匱大黃甘草湯治食已即吐按此湯必下焦脹實大便祕結不通而格拒吐食者方可用之若因胃虛而食已即吐者此則大非所宜用者不可誤認大黃四兩甘草一兩上二味以水三升煮取一升分溫再服金匱大黃硝石湯治黃疸腹滿小便不利而赤自汗出表和裡實者宜用之大黃黃柏硝石各四兩梔子十五枚上四味以水六升煮取二升去滓納硝更煮取一升頓服金匱梔子大黃湯治酒疸心中懊憹或熱痛梔子十四枚大黃一兩枳實五枚豉一升上用水六升煮取二升分溫三服河間防風通聖散治諸風潮搐手足瘛瘲小兒急驚便結邪熱暴甚肌肉蠕動一切風熱疥痢等疾防風川芎當歸芍藥麻黃連翹蒲荷葉大黃芒硝各五錢石膏黃芩桔梗各一兩滑石三兩甘草二兩荊芥白朮梔子各二錢半上為末每服二錢水一大鐘生薑三片煎六七分溫服醫統方各五分用水二鍾煎服痰嗽加半夏閉結加大黃二錢破傷風加羌活全蠍各五分此方有四賈同知方無芒硝崔宣武方無芒硝有縮砂癘瘍機要有白芷蒺藜鼠黏子甘草雙解散方在痘疹治痘疹表裡俱實牛黃雙解散方在外科治便癰熱毒大小便祕局方涼膈散瀉三焦六經諸火大黃朴硝甘草各一錢連翹一錢半梔子黃芩蒲荷各五分水一鍾半加竹葉七片煎八分入蜜一匙和勻服東垣涼膈散方在痘疹解痘疹內熱良方陶氏黃龍湯治熱邪傳裡胃有燥糞結實心下硬痛而下利純清水身熱譫語發渴此非內寒而利乃因湯藥而利也名曰積熱利證宜急下之身有熱者宜用此湯身無熱者宜六一順氣湯醫家有不識此證者便呼為漏底傷寒即用熱藥止之者是猶抱薪救火也誤人多矣大黃芒硝老弱者去此厚朴甘草人參當歸水一鍾半生薑三片棗二枚煎服良方黃龍湯方在婦人治妊婦感冒風寒熱入胞宮寒熱如瘧錢氏黃龍湯方在小兒治小兒感冒發熱或寒熱往來子和玉燭散治血虛有滯或婦人經候不通腹脹作痛此四物湯對調胃承氣湯也當歸川芎芍藥地黃大黃芒硝甘草各等分上㕮咀水煎服甚者倍用大黃四順清涼飲子治大人小兒血脈壅實臟腑生熱面赤煩渴睡臥不寧大便祕結大黃當歸芍藥甘草各等分上㕮咀水煎服元戎四物湯治臟結祕澀當歸熟地黃川芎白芍藥大黃煨桃仁各等分上用水煎或丸服亦可仲景抵當湯治傷寒熱在下焦少腹硬滿其人發狂小便自利下血乃愈以太陽病瘀熱在裡也水蛭三十條熬虻蟲三十個熬去翅尾桃仁二十個去皮尖大黃三兩酒浸上四味為末以水五升煮取三升又抵當丸亦即此四味仲景十棗湯治懸飲內痛芫花醋拌經宿炒微黑勿焦大戟長流水煮半時曬乾甘遂麵裹煨各等分上為細末先以水一鍾半煮大棗十枚至八分去棗納藥末強人一錢弱人五分平旦服之不下更加五分快下徐以糜粥補之潔古三化湯治中風外有六經之形證先以續命湯主之內有便溺之阻格此方主之厚朴薑製大黃枳實羌活各等分上㕮咀每服一兩水煎服微利則止選要透膈湯治脾胃不和中脘氣滯胸膈滿悶噎塞不通脅肋脹痛痰涎嘔逆飲食不下木香白豆蔻砂仁檳榔枳殼麩炒厚朴薑汁炒半夏制青皮橘紅甘草大黃朴硝各一錢水一鍾半薑三片紅棗一枚煎八分食遠服金匱因陳蒿湯治傷寒發黃及谷疸發熱不食大小便祕或食即頭眩是為谷疸茵陳九錢大黃四錢半山梔一錢半上作二服每服水二鍾煎八分食遠溫服河間芍藥湯下血調氣經曰溲而便膿血氣行而血止行血則便自愈調氣則後重除芍藥一兩當歸黃連各五錢木香甘草炙檳榔各二錢大黃三錢官桂一錢半黃芩五錢上咀每服半兩水二鍾煎一盞食後溫服如血痢則漸加大黃如汗後臟毒加黃柏半兩依前服愚按此湯乃河間之心方然惟真有實熱者可用若假熱假實者誤服則死枳實大黃湯治濕滯腳氣羌活錢半當歸一錢枳實五分大黃酒煨三錢水一鍾半煎八分食前空心溫服以利為度羌活導滯湯治風濕實滯腳氣羌活獨活各半兩防己當歸各三錢枳實麩炒二錢大黃酒煨一兩上每服五七錢水一鍾半煎至七分溫服量虛實加減微利則已牛黃瀉心湯治心經實熱狂言妄語神志不安牛黃另研一兩冰片另研一分硃砂另研二錢大黃生一兩上為細末和勻每服一二錢冷薑湯或蜜水調下宣明三稜散治積聚癥瘕痃癖不散堅滿痞悶食不下三稜白朮炒各二兩蓬朮當歸各五錢木香檳榔各三錢上為末每服三錢沸湯調下三稜丸治血癥血瘕食積痰滯莪朮醋浸炒三稜各三兩青皮麥芽炒半夏各一兩上共用好醋一鍾煮乾焙為末醋糊丸桐子大每服四十丸淡醋湯下痰積薑湯下三聖膏貼積聚癥塊石灰十兩官桂半兩為末大黃一兩綿紋者為末上將石灰細篩過炒紅急用好醋熬成膏入大黃官桂末攪勻以瓷器收貯用泊紙或柿漆紙攤貼患處火烘尉之良方桃仁煎治血瘕桃仁大黃炒各一兩虻蟲半兩炒黑朴硝一兩上為末以醇醋一鍾瓷器中煮三分下前三味不住手攪煎至可丸乃下朴硝丸如桐子大不吃晚食五更初溫酒下五丸日午下穢物如未見再服仍以調氣血藥補之立齊曰向在毗陵一婦人小便不通臍腹脹甚豫診之曰此血瘕也用前藥一服腹痛下瘀血血水即愈此藥猛烈大峻氣血虛者斟酌與之穿山甲散治癥痞瘀血心腹作痛穿山甲炒焦鱉甲醋炙赤芍藥大黃炒乾漆炒煙盡桂心各一兩川芎芫花醋炒歸尾各半兩麝香一錢上為末每服一錢酒調下子和禹功散瀉水之劑黑醜頭末四兩茴香一兩炒或加木香一兩上為細末以生薑自然汁調一二錢臨臥服子和浚川散治一切痰飲十種水氣甘遂麵裹煨芒硝各二錢郁李仁一錢大黃牽牛末各三錢上為末滴水丸桐子大每服五十丸溫水下稀涎散吐頑痰牙皂炙去皮弦一錢藜蘆五分上為細末每服五分或一二錢漿水調下牙關不開者灌之大異香散治積聚脹滿三稜蓬朮青皮陳皮枳殼炒藿香香附半夏曲桔梗益智各一錢半炙甘草五分上分二帖水二鍾薑三片棗一枚煎七分食遠服經驗流金膏治一切火痰咳逆等證白石膏微煅研細大黃錦紋者捶碎酒浸半日蒸曬九次各二兩黃芩酒洗橘紅各兩半連翹川芎桔梗貝母各一兩膽星蘇州薄荷香附各五錢上為極細末煉蜜丸彈子大午後臨臥細嚼一丸忌酒面諸濕熱物按此方當去川芎桔梗效必更速子和通經散治婦人氣逆血閉陳皮去白當歸各一兩甘遂以麵包勿令透水煮百餘滾取出用冷水浸過去面焙乾一兩上為細末每服三錢溫湯調下臨臥服外臺苦楝湯治蛔蟲苦楝根東引不出土者刮去皮土取內白皮二兩水三碗煎一碗半去柤以晚米三合煮糜粥空心先以炙肉一片嚼之引蟲向上次吃藥粥一二口少頃又吃漸漸加至一碗其蟲下盡而愈宣明三花神佑丸治一切沉積痰飲變生諸病或氣血壅滯濕熱鬱結走注疼痛風痰脹滿等證子和神佑丸用黑醜一兩無輕粉黑醜取頭落末二兩大黃一兩芫花醋浸炒大戟醋浸炒甘遂麵裹煨各五錢輕粉一錢上為細末滴水為丸小豆大初服五丸每服加五丸溫水下日三服以快利為度欲速下者宜八九十丸或百餘丸凡痞滿甚者以痰涎壅盛頓攻不開則轉加痛悶須漸進之初服止三丸每加二丸至快利即止木香檳榔丸殺下諸蟲檳榔一兩木香鶴蝨貫衆錫灰乾漆燒煙盡使君子各五錢輕粉一錢雷丸巴豆仁各二錢半麵糊丸麻子大每服二十丸五更粥飲下或煎菖蒲石榴湯下寶鑑木香檳榔丸治一切氣滯心腹痞滿脅肋脹悶大小便澀祕不通木香檳榔青皮去瓤陳皮去白枳殼麩炒蓬朮煨切黃連各一兩黃柏去皮香附炒大黃炒各三兩黑醜取頭落末四兩滴水為丸豌豆大每服三五十丸食遠薑湯送下以微利為度遇仙丹追蟲逐積消澼利痰萬病可除黑醜頭末檳榔各一斤大黃半斤三稜莪朮醋炙各四兩木香二兩上為末用大皂角去子打碎煎濃湯去滓煮麵糊為丸桐子大每服四五十丸以強弱為加減五更茶清下如未通再飲溫茶助之下蟲積惡物盡了白粥補之備急丸治胃中停滯寒冷之物心腹作痛如錐及脹滿下氣並卒暴百病中惡客忤口噤卒死皆治之易老名獨行丸脾胃論名備急大黃丸巴霜大黃乾薑俱為末上等分和勻煉蜜丸石臼內杵千餘下如泥丸如小豆大夜臥時溫水下一丸氣實者加一二丸如卒病不計時候服如卒死口噤即斡口折齒灌之司空裴秀亦作散用用其急也孕婦忌用和劑神保丸治心膈痛腹痛血痛腎氣脅下痛大便不通氣噎宿食不消木香胡椒各二錢半乾蠍七枚巴豆十粒去皮心研上為末湯浸蒸餅丸麻子大硃砂三錢為衣每服五丸用柿蒂湯或薑醋茶蜜茴香木香等湯隨宜送下寶藏感應丸治宿食積滯腹