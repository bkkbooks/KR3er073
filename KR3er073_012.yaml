body:
  text: 卷之十二從集雜證謨風痹經義痹論曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹帝曰其有五者何也岐伯曰以冬遇此為骨痹以春遇此為筋痹以夏遇此為脈痹以至陰遇此為肌痹以秋遇此為皮痹帝曰內舍五臟六腑何氣使然岐伯曰五臟皆有合病久而不去者內舍於其合也故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也痹論曰凡痹之客五臟者肺痹者煩滿喘而嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐肝痹者夜臥則驚多飲數小便上為引如懷腎痹者善脹尻以代踵脊以代頭脾痹者四肢懈惰發咳嘔汁上為大塞腸痹者數飲而出不得中氣喘爭時發飧泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絶痹聚在脾諸痹不已亦益內也其風氣勝者其人易已也痹論帝曰痹其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已帝曰其客於六腑者何也曰此亦其食飲居處為其病本也六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也帝曰痹或痛或不痛或不仁或寒或熱或燥或濕其故何也曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深營衛之行澀經絡時疏故不痛皮膚不營故為不仁其寒者陽氣少陰氣多與病相益故寒也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱其多汗而濡者以其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也帝曰夫痹之為病不痛何也曰痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也凡痹之類逢寒則急逢熱則縱帝曰善周痹篇帝曰願聞衆痹岐伯曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也刺此者痛雖已止必刺其處勿令復起帝曰願聞周痹何如曰周痹者在於血脈之中隨脈以上隨脈以下不能左右各當其所帝曰刺此奈何曰痛從上下者先刺其下以過之後刺其下以脫之痛從下上者先刺其上以過之後刺其下以脫之帝曰此痛安生何因而有名曰風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是此內不在臟而外未發於皮獨居分肉之間真氣不能周故命曰周痹長刺節論曰病在筋筋攣節痛不可以行名曰筋痹病在肌膚肌膚盡痛名曰肌痹傷於寒濕病在骨骨重不可舉骨髓痠痛寒氣至名曰骨痹壽夭剛柔篇曰病在陽者命曰風病在陰者命曰痹陰陽俱病命曰風痹病有形而不痛者陽之類也無形而痛者陰之類也無形而痛者其陽完而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰陰陽俱動乍有形乍無形加以煩心命曰陰勝其陽此謂不表不里其形不久五邪篇曰邪在腎則病骨痛陰痹陰痹者按之而不得腹脹腰痛大便難肩背頸項痛時眩取之湧泉崑崙視有血者盡取之五臟生成篇曰臥出而風吹之血凝於膚者為痹凝於脈者為泣凝於足者為厥此三者血行而不得反其空故為痹厥也脈要精微論曰按之至骨脈氣少者腰脊痛而身有痹也九針論曰八風傷人內舍於骨解腰脊節腠理之間為深痹也故為治針必長其身鋒其末可以取深邪遠痹四時氣篇曰著痹不去久寒不已卒取其三里玉機真藏論曰風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也弗治病人舍於肺名曰肺痹發咳上氣弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食當是之時可按若刺耳五臟生成論曰赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清水而臥逆調論帝曰人身非衣寒也中非有寒氣也寒從中生者何岐伯曰是人多痹氣也陽氣少陰氣多故身寒如從水中出一水不能勝二火故不能凍栗病名曰骨痹詳寒熱門論證共二條風痹一證即今人所謂痛風也蓋痹者閉也以血氣為邪所閉不得通行而病也如痹論曰風氣勝者為行痹蓋風者善行數變故其為痹則走注歷節無有定所是為行痹此陽邪也曰寒氣勝者為痛痹以血氣受寒則凝而留聚聚則為痛是為痛痹此陰邪也曰濕氣勝者為著痹以血氣受濕則濡滯濡滯則肢體沉重而疼痛頑木留著不移是為著痹亦陰邪也凡此三者即痹之大則也此外如五臟六腑之痹則雖以飲食居處皆能致之然必重感於邪而內連臟氣則合而為痹矣若欲辨其輕重則在皮膚者輕在筋骨者甚在臟腑者更甚若欲辨其寒熱則多熱者方是陽證無熱者便是陰證然痹本陰邪故惟寒者多而熱者少此則不可不察觀痹論曰風寒濕三氣雜至合而為痹而壽夭剛柔篇又曰在陽者命曰風在陰者命曰痹何也蓋三氣之合乃專言痹證之所因也曰在陽為風在陰為痹又分言表裡之有殊也如風之與痹本皆由感邪所致但外有表證之見而見發熱頭疼等證或得汗即解者是皆有形之謂此以陽邪在陽分是即傷寒中風之屬也故病在陽者命曰風若既受寒邪而初無發熱頭疼又無變證或有汗或無汗而筋骨之痛如故及延綿久不能愈而外無表證之見者是皆無形之謂此以陰邪直走陰分即諸痹之屬也故病在陰者命曰痹其或既有表證而疼痛又不能愈此即半表半裡陰陽俱病之證故陰陽俱病者命曰風痹此所以風病在陽而痹病在陰也然則諸痹者皆在陰分亦總由真陰衰弱精血虧損故三氣得以乘之而為此諸證經曰邪入於陰則痹正謂此也是以治痹之法最宜峻補真陰使血氣流行則寒邪隨去若過用風濕痰滯等藥而再傷陰氣必反增其病矣風痹治法共五條痹因外邪病本在經而深則連臟故其在上則有喘嘔有吐食在中則為脹滿為疼痛在下則為飧泄為祕結諸病此皆風痹之兼證也凡見此者當於各門權其緩急先後而隨證治之一痹證之風勝者治當從散宜敗毒散烏藥順氣散之類主之若以風勝而兼微火者宜大秦艽湯或九味羌活湯之類主之一痹證之寒勝者但察其表裡俱無熱證即當從溫治之宜五積散或小續命湯甘草附子湯之類主之若寒甚氣虛者宜三因附子湯之類主之一痹證之濕勝者其體必重或多寒或多痰或多汗皆脾弱陰寒證也若羌活勝濕湯乃兼風散濕之劑也五積散乃溫經散濕之劑也真武湯乃溫中除濕之劑也三因附子湯乃補脾燥濕之劑也調氣平胃散乃行氣行濕之劑也五苓散乃利水導濕之劑也二陳湯六君子湯乃化痰去濕之劑也大抵治濕者欲其燥欲燥者宜從暖蓋脾土喜燥而惡濕喜暖而惡寒故溫脾即所以治濕也然又有濕熱之為病者必見內熱之證滑數之脈方可治以清涼宜二妙散及加味二妙丸當歸拈痛湯之類主之其有熱甚者如抽薪飲之類亦可暫用先清其火而後調其氣血一風痹之證大抵因虛者多因寒者多惟血氣不充故風寒得以入之惟陰邪留滯故經脈為之不利此痛痹之大端也惟三氣飲及大防風湯之類方能奏效凡治痹之法惟此為最其有宜酒者即以三氣飲浸酒服之亦妙法見本方或用易老天麻丸亦可歷節風痛歷節風痛以其痛無定所即行痹之屬也病源云歷節風痛是氣血本虛或因飲酒腠理開汗出當風所致或因勞倦調護不謹以致三氣之邪遍歷關節與氣血相搏而疼痛非常或如虎之咬故又有白虎歷節之名中藏經曰歷節疼痛者因醉犯房而得之此其概也大都痛痹之證多有晝輕而夜重者正陰邪之在陰分也其有遇風雨陰晦而甚者此正陰邪侮陽之證也或得暖遇熱而甚者此濕熱傷陰之火證也有火者宜從清涼有寒者宜從溫熱若筋脈拘滯伸縮不利者此血虛血燥證也非養血養氣不可凡諸治法總宜如前一凡諸痹作痛者俱宜用火龍膏貼之風痹論列方六君子湯補五大防風湯補九八大秦艽湯和二四五小續命湯散五二敗毒散散三六五積散散三九真武湯熱一四三二陳湯和一三氣飲新熱十七五苓散和一八二抽薪飲新寒三二妙散寒一三四火龍膏外三百二十三因附子湯熱二三甘草附子湯熱三一加味二妙丸寒一三五易老天麻丸和二七五當歸拈痛湯寒百三十烏藥順氣散散九三九味羌活湯散四四調氣平胃散和十八羌活勝濕湯和一七八論外備用方大建中湯補二四陽虛愈風丹和二七四虛風活絡飲和二六九風濕茯苓丸和百十四痰飲痹痛換骨丹和二七九史國公浸酒方和二八一三痹湯和二五八血虛氣滯蠲痹湯和二五七溫經虎骨散和二五一風毒走注換腿丸和二百八十疏邪桂心散和二六五風邪走痛透經解攣湯和二七一去風通經虎骨酒和三一五強筋骨薏仁酒和三一六腳痹秦艽地黃湯和二六八風熱血燥趁痛散和二六七行血行氣草豨蘞丸和二五六六味茯苓湯和二六一痰痹雞鳴散和二八五風濕流注白朮酒和一八一中濕身痛獨活寄生湯和二百七十風寒濕痹續斷丸和三百五風濕浮腫續斷丹和二五五三氣除濕蠲痹湯和二六四風濕濕鬱湯和二六六風濕薏仁湯和二四七流注熏洗痛風法和二七三熏蒸法和二七二枳實散和二六二心痹痛加味五痹湯和二五九五臟痹人參散和二百六十肝痹脅痛紫蘇子湯和二六三肺痹胸痛溫中法曲丸熱一二五脾痹多寒當歸湯散九一肺痹上氣麻黃左經湯散九六風邪半夏左經湯散九七風濕流注大黃左經湯散九八閉結神效左經丸散九五三氣虎脛骨丸寒一三七濕熱羌活散散八七風氣蒼朮丸寒一三三濕熱苦參丸寒一三八陰虛風熱尉背散熱一二四脅背痛十味銼散熱四九血弱攣痛參附滲濕湯熱一二二寒濕痹痛龍虎丹熱一二六走注芎歸散熱一二一溫補行散愈風燥濕化痰丸和二七六麻黃杏仁薏苡甘草湯散四風濕汗證經義陰陽應象大論曰陽之汗以天地之雨名之宣明五氣篇曰心為汗陰陽別論曰陽加於陰謂之汗評熱病論曰陰虛者陽必湊之故少氣時熱而汗出也決氣篇曰津脫者腠理開汗大泄骨空論曰風從外入令人振寒汗出頭痛身重惡寒大風汗出灸噫嘻噫嘻在背下俠脊傍三寸所金匱真言論曰夏暑汗不出者秋成風瘧熱論曰暑當與汗皆出勿止生氣通天論曰因於暑汗煩則喘喝靜則多言體若燔炭汗出而散汗出偏沮使人偏枯汗出見濕乃生痤痱勞汗當風寒薄為皶郁乃痤魄汗未盡形弱而氣爍穴俞以閉發為風瘧陽者衛外而為固也評熱病論曰人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也汗出而脈尚躁盛者死熱病篇曰熱病已得汗出而脈尚躁喘且復熱喘甚者死熱病已得汗而脈尚躁盛此陰極之脈也死其得汗而脈靜者生熱病者脈尚盛躁而不得汗者此陽極之脈也死脈盛躁得汗靜者生熱病而汗且出及脈順可汗者取之魚際太淵大都太白瀉之則熱去補之則汗出汗出太甚取內踝上橫脈以止之寒熱病篇曰臂太陰可汗出足陽明可汗出故取陰而汗出甚者止之於陽取陽而汗出甚者止之於陰逆順篇曰無刺熇熇之熱無刺漉漉之汗五禁篇曰五禁五奪五逆者皆不可刺曰大汗出之後是三奪也平人氣象論曰尺澀脈滑謂之多汗邪氣臟腑病形篇曰肺脈緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止本藏篇曰衛氣者所以溫分肉充皮毛肥腠理司闔關者也經脈別論曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞倦汗出於脾本病論曰醉飽行房汗出於脾水熱穴論曰勇而勞甚則腎汗出所謂玄府者汗空也舉痛論曰炅則腠理開營衛通汗大泄故氣泄矣勞則喘息汗出外內皆越故氣耗矣論證共三條汗出一證有自汗者有盜汗者自汗者濈濈然無時而動作則益甚汗者寐中通身汗出覺來漸收諸古法云自汗者屬陽虛腠理不固衛氣之所司也人以衛氣固其表衛氣不固則表虛自汗而津液為之發泄也治宜實表補陽盜汗者屬陰虛陰虛者陽必湊之故陽蒸陰分則血熱血熱則液泄而為盜汗也治宜清火補陰此其大法固亦不可不知也然以余觀之則自汗亦有陰虛盜汗亦多陽虛也如遇煩勞大熱之類最多自汗故或以飲食之火起於胃勞倦之火起於脾酒色之火起於腎皆能令人自汗若此者謂非陽盛陰衰者而何又若人之寤寐總由衛氣之出入衛氣者陽氣也人於寐時則衛氣入於陰分此其時非陽虛於表者而何所以自汗盜汗亦各有陰陽之證不得謂自汗必屬陽虛盜汗必屬陰虛也然則陰陽有異何以辨之曰但察其有火無火則或陰或陽自可見矣蓋火盛而汗出者以火爍陰陰虛可知也無火而汗出者以表氣不固陽虛可知也知斯二者則汗出之要無餘義而治之之法亦可得其綱領矣一汗由血液本乎陰也經曰陽之汗以天地之雨名之其義可知然汗發於陰而出於陽此其根本則由陰中之營氣而其啓閉則由陽中之衛氣故凡欲疏汗而不知營衛之盛衰欲禁汗而不知橐籥之牝牡亦猶蕩舟於陸而駕車於海耳吾知其不敗不已也一汗證有陰陽陽汗者熱汗也陰汗者冷汗也人但知熱能致汗而不知寒亦致汗所謂寒者非曰外寒正以陽氣內虛則寒生於中而陰中無陽陰中無陽則陰無所主而汗隨氣泄故凡大驚大恐大懼皆能令人汗出是皆陽氣頓消真元失守之兆至其甚者則如病後産後或大吐大瀉失血之後必多有汗出者是豈非氣去而然乎故經曰陰勝則身寒汗出身常清數栗而寒寒則厥厥則腹滿死仲景曰極寒反汗出身必冷如冰是皆陰汗之謂也故凡治陰汗者但當察氣虛之微甚微虛者略扶正氣其汗自收甚虛者非速救元氣不可即薑桂附子之屬必所當用余別有治按在傷寒門戰汗條中汗出不治證凡汗出不治之證有六一汗出而喘甚者不治二汗出而脈脫者不治三汗出而身痛甚者不治四汗出發潤至顛者不治五汗出如油者不治六汗出如珠者不治凡見此類不得妄為用藥論治共八條一陽證自汗或盜汗者但察其脈證有火或夜熱煩渴或便熱喜冷之類皆陽盛陰虛也宜當歸六黃湯為第一保陰煎亦妙其或陰分雖有微火而不甚者宜一陰煎或加減一陰煎之類主之其有心火不寧煩躁出汗者宜硃砂安神丸天王補心丹生脈散之類主之又有本非陰虛止因內火熏蒸血熱而多汗者宜正氣湯或黃芩芍藥湯清化飲之類主之一陰證自汗或盜汗者但察其內無火邪又無火脈便是氣虛陰證皆不可妄用涼藥以敗陽氣若止因氣虛而火未衰者宜三陰煎參歸湯人參建中湯之類主之若睡中盜汗而無火者宜參苓散獨參湯主之若陽氣俱虛者宜參附湯大建中湯之類主之若氣虛火衰之甚者宜大補元煎六味回陽飲之類主之一衛氣不固腠理不密而易汗者是亦陰證之屬宜黃耆六一湯玉屏風散耆附湯之類主之一諸病誤治有不當汗而妄汗或雖當汗而汗之太過者皆汗多亡陽之證是亦陰證之屬當察其虛之微甚微虛者宜三陰煎五陰煎獨參湯之類主之大虛者非大補元煎六味回陽飲之類不可一濕氣乘脾者亦能作汗凡證有身重困倦而脈見緩大聲音如從甕中出者多屬濕證若熱濕勝者但去其火而濕自清宜用前陽證之法寒濕勝者但助其火而濕自退宜用前陰證之法或用玉屏風散四君子湯五君子煎之類以健脾土之氣則濕去而汗自收一收汗止汗之劑如麻黃根浮小麥烏梅北五味小黑豆龍骨牡蠣之屬皆可隨宜擇用一曰黃耆得防風而力愈大一曰官桂最能實表一凡汗出太多不能收者速宜用五倍子為末以唾津調填臍中外用帕帛縛定過宿即止或用何首烏為末填臍縛之亦止一小兒盜汗雖是常事在東垣諸公皆曰不必治之蓋由血氣未足也然汗之太多者終屬氣分之虛余於兒輩見汗之甚者每以人參一錢許煎湯與服當夜即止正恐他日之強弱未必不由乎此所以培補之功原不可少一病後多汗若傷寒若瘧疾凡系外感寒邪汗出熱退而有汗不即止者此以表邪初解必由腠理衛氣開泄其汗宜然即數日旬日亦自無妨俟衛氣漸實汗必自止無足慮也若其他雜證本非外感之解而有自汗盜汗者乃非所宜不容不治述古共二條丹溪附録曰心之所藏在內者為血發外者為汗蓋汗乃心之液而自汗之證未有不由心腎俱虛而得之者故陰虛陽必湊發熱而自汗陽虛陰必乘發厥而自汗皆陰陽偏勝所致也立齊曰若陽氣虛弱汗出不止肢體倦怠用耆附湯上氣喘急盜汗氣短頭暈者用參附湯腎氣虛弱盜汗發熱者用六味丸若腎氣虛乏盜汗惡寒者用八味丸氣血俱虛而盜汗者用十全大補湯陽盛陰虛者當歸六黃湯心腎虛弱者斑龍丸汗證論列方大補元煎新補一大建中湯補二五玉屏風散補五十四君子湯補一五君子煎新熱六當歸六黃湯寒六五獨參湯補三五參附湯補三七十全大補湯補二十參歸湯補三八耆附湯補四三人參建中湯補二六參苓散補五三生脈散補五六黃耆六一湯補四九一陰煎新補八三陰煎新補十一六味回陽飲新熱二五陰煎新補十三保陰煎新寒一天王補心丹補百八六味丸補百二十八味丸補一二一加減一陰煎新補九清化飲新因十三正氣湯寒六六黃芩芍藥湯寒百九斑龍丸補百二八論外備用方歸脾湯補三二黃耆湯補四五大補黃耆湯補四七還少丹補一三五柔脾湯補七一吐衄汗益陰腎氣丸補一二三血虛盜汗三味建中湯補二九大建中湯補二五陰汗人參養營湯補二一心腎丸補百十二陰虛盜汗生地黃湯寒六八陰火汗防己黃耆湯和一七六風濕汗宣明白朮散固三虛風白朮散和三十自汗益汗防風當歸湯和二四一過汗反張牡蠣白朮散固二酒風牡蠣散固一金鎖正元丹固十八遺精汗祕元丹固三二虛寒自汗麥麵湯固四氣虛汗辰砂妙香散固十五心虛汗腳汗牡蠣散因二九六痙證經義至真要大論曰諸痙項強皆屬於濕諸暴強直皆屬於風厥陰在泉客勝則大關節不利內為痙強拘瘛外為不便主勝則筋骨繇並腰腹時痛經筋篇曰足太陽之筋病脊反折項筋急肩不舉腋支缺盤中紐痛不可左右搖足少陰之筋病主癇瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸繆刺論曰邪客於足太陽之絡令人拘攣背急引脅而痛骨空論曰督脈為病脊強反折生氣通天論曰因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿經脈篇曰膀胱足太陽也是動則病沖頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者氣厥論曰肺移熱於腎傳為柔痓診要經終論曰太陽之脈其終也戴眼反折瘛瘲其色白絶汗乃出出則死矣六元正紀大論曰太陽所至為寢汗痙熱病篇曰風痙身反折先取足太陽及膕中及血絡出血中有寒取三里熱病不可刺者有九九日熱而痙者死腰折瘛瘲齒噤齘也厥論曰手陽明少陽厥逆發喉痹嗌腫痙治主病者論證共六條痓之為病即內經之痙病也以痙作痓蓋傳寫之誤耳其證則脊背反張頭搖口噤戴眼項強四肢拘急或見身熱足寒惡寒面赤之類皆是也仲景曰太陽之病發熱無汗反惡寒者名曰剛痓太陽病發熱汗出而不惡寒者名曰柔痓太陽病發熱脈沉而細者名曰痙為難治太陽病發汗太多因致痓風病下之則痓復發汗必拘急瘡家雖身疼痛不可發汗汗出則痓陳無擇曰夫人之筋各隨經絡結束於身血氣內虛外為風寒濕熱之所中則痓蓋風散氣故有汗而不惡寒曰柔痓寒泣血故無汗而惡寒曰剛痓原其所因多由亡血筋無所營故邪得以襲之所以傷寒汗下過多與夫病瘡人及産後致斯疾者概可見矣診其脈皆沉伏弦緊但陽緩陰急則久久拘攣陰緩陽急則反張強直二證各異不可不別愚謂痙之為病強直反張病也其病在筋脈筋脈拘急所以反張其病在血液血液枯燥所以筋攣觀仲景曰太陽病發汗太多因致痙風病下之則成痙瘡家不可發汗汗之亦成痙只此數言可見病痓者多由誤治之壞證其虛其實可瞭然矣自仲景之後惟陳無擇能知所因曰多由亡血筋無所營因而成痙則盡之矣但惜其言之既善而復有未善者曰血氣內虛外為風寒濕熱所中則痙斯言不無又誤若其所云則仍是風濕為邪而虛反次之不知風隨汗散而既汗之後何復言風濕隨下行而既下之後何反致濕蓋誤汗者必傷血液誤下者必傷真陰陰血受傷則血燥血燥則筋失所滋筋失所滋則為拘為攣反張強直之病勢所必至又何待風寒濕熱之相襲而後為痙耶且仲景所言言不當汗而汗也不當下而下也汗下既誤即因誤治而成痓矣豈誤治之外必再受邪而後成痙無邪則無痙哉此陳氏之言不惟失仲景之意而反致後人疑惑用持兩端故凡今人之治此者未有不以散風去濕為事亦焉知血燥陰虛之證尚能堪此散削否此不可不為辨察故余列二子之論於前以資後學之印證一痙證甚多而人多不識者在不明其故而鮮有察之者耳蓋凡以暴病而見反張戴眼口噤拘急之類皆痙病也觀仲景以汗下為言謂其誤治亡陰所以然也余因類推則常見有不因誤治而凡屬陰虛血少之輩不能養營筋脈以致搐攣僵仆者皆是此證如中風之有此者必以年力衰殘陰之敗也産婦之有此者必以去血過多衝任竭也瘡家之有此者必以血隨膿出營氣涸也小兒之有此者或以風熱傷陰遂為急驚或以汗瀉亡陰遂為慢驚凡此之類總屬陰虛之證蓋精血不虧則雖有邪干亦斷無筋脈拘急之病而病至堅強其枯可知故治此者必當先以氣血為主而邪甚者或兼治邪若微邪者通不必治邪蓋此證之所急者在元氣元氣復而血脈行則微邪自不能留何足慮哉奈何今人但見此證必各分門類而悉從風治不知外感之風寒邪證也治宜解散內生之風血燥證也止宜滋補矧此數者總由內證本無外邪既以傷精敗血枯燥而成而再治風痰難乎免矣故余筆於此以明痓證之要一仲景言痙止屬太陽而不及他經者何也蓋痓必反張其病在背背之經絡惟太陽督脈耳言太陽則督在其中矣此其義也然仲景止言其表而未詳其里考內經之經脈篇曰足少陰之脈貫脊屬腎其直者從腎上貫肝膈經筋篇曰足少陰之筋循脊內挾膂上至項結於枕骨與足太陽之筋合又曰足太陽之筋病脊反折項筋急足少陰之筋病主癇瘛及痙陽病者腰反折不能俯陰病者不能仰由此觀之則痙之為病乃太陽少陰之病也蓋腎與膀胱為表裡膀胱為津液之府而腎為藏精之臟病在二經水虧可知故治此者最當以真陰為主論治共八條一痙證凡因汗因瀉者其氣必虛微虛者宜三陰煎五福飲之類主之大虛而脈見沉細陰勝者宜大營煎大補元煎十全大補湯之類主之一痙證多汗者宜三陰煎參歸湯人參建中湯主之陽氣大虛汗出或亡陽者宜參附湯耆附湯大補元煎之類主之若汗出兼火多熱躁者且當歸六黃湯主之一痙因泄瀉者宜胃關煎溫胃飲之類主之瀉止而痙者宜大營煎五福飲之類主之一痙有兼火者必脈見洪滑證見煩熱宜一陰煎或加減一陰煎主之若火盛之甚以致陰血涸燥者不得不先去其火宜清化飲保陰煎玉女煎之類主之一痙有表邪未解者當察其邪之微甚及證之陰陽若身有微熱脈不緊數者此微邪也只補正氣其邪自散宜五福飲之類主之若表邪未解陰虛無汗身熱者宜三柴胡飲四柴胡飲補陰益氣煎之類主之若陽氣大虛陰極畏寒邪不解而痙者宜大溫中飲主之一痙有痰盛者不得不先清上焦若火盛多痰者宜用清膈煎抱龍丸若多痰無火宜用六安煎凡此證候多屬虛痰虛火因其壅滯不得不暫為清理但得痰氣稍開便當調理血氣一小兒吐瀉及多汗之後一婦人産後一諸證大失血之後一凡病中風及瘡毒潰膿之後皆有此證悉當依前法酌宜治之一痙證有兼濕者當如王海藏治法詳見後條述古共二條仲景治太陽之痓身體強脈沉遲者用栝蔞桂枝湯取微汗治剛痓無汗者用葛根湯治胸滿口噤臥不著席腳攣齘齒者用大承氣湯按此皆散逐實邪之法雖此證不多見然間或有之則亦不可不知王海藏治剛痓用神術湯加羌活獨活麻黃治柔痓用白朮湯加桂心黃耆痙證論列方大營煎新補十四五福飲新補六參歸湯補三八參附湯補三七耆附湯補四三白朮湯和二六一陰煎新補八三陰煎新補十一保陰煎新寒一溫胃飲新熱五胃關煎新熱九清化飲新因十三玉女煎新寒十二大補元煎新補一十全大補湯補二十五積散散三九大溫中飲新散八人參建中湯補二六清膈煎新寒九二柴胡飲新散二當歸六黃湯寒六五神術湯和三九三柴胡飲新散三補陰益氣煎新補十六六安煎新和二四柴胡飲新散四加減一陰煎新補九葛根湯散二九大承氣湯攻一栝蔞桂枝湯散十二抱龍丸小八五論外備用方防風當歸湯和二四一過汗反張
