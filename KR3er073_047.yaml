body:
  text: 卷之四十七賢集外科鈐下外科鈐下發背四十二發背屬督脈膀胱經凡陰虛火盛或醇酒厚味或鬱怒房勞或丹石熱毒皆能致之若腫赤痛甚脈洪數而有者熱毒之證也為易治若漫腫微痛色黯作渴脈雖洪數而無力者陰虛之證也為難治若不腫不痛或漫腫色黯脈微細者陽氣虛甚也尤為難治大抵發背之證其名雖多總惟陰陽二證為要若發一頭或二頭其形焮赤腫高發熱疼痛頭起者為癰屬陽易治若初起一頭如粟不腫不赤悶痛煩躁大渴便祕睡語咬牙四五日間瘡頭不計其數瘡口各含如粟形如蓮蓬故名蓮蓬髮積日不潰按之流血至數日或八九日其頭成片所含之物俱出通結一衣揭去又結其口共爛為一瘡其膿內攻其色紫黯者為疽屬陰難治且此證不可大痛又不可不痛若見煩悶者多不治總之瘡瘍雖云屬火然未有不由陰虛而致者故經云督脈經虛從腦而出膀胱經虛從背而出故不可專泥於火陳良甫曰背疽之源有五一天行二瘦弱氣滯三怒氣四腎氣虛五飲冷酒食炙爆服丹藥立齊曰大抵發背之證雖發熱疼痛形勢高大煩渴不寧但得脈息有力飲食頗進可保無虞其膿一潰諸證悉退多有因膿不得外泄以致疼痛若用敗毒寒藥攻之反致誤事若有膿急針之膿一出苦楚即止膿未成而熱毒作痛者可用解毒之藥亦有腐潰尺余者若無惡證則投以大補之劑肉最易生亦無所妨惟忌腫不高色不赤不焮痛脈無力不飲食腫不潰腐不爛膿水清或膿多不止皆屬元氣虛也為難治宜峻補之其或膿血既泄腫痛尤甚濃水臭敗煩躁時嗽腹痛渴甚瀉利無度小便如淋乃惡證也皆不可治又灸法曰豫常治發背不問日期陰陽腫痛或不痛或痛甚但未成膿或不潰者即與灸之隨手取效或麻木者明灸之毒氣自然隨火而散或瘡頭如黍者灸之尤效亦有數日色尚微赤腫尚不起痛不甚膿不作者尤宜多灸勿拘日期更服甘溫托裡藥切忌寒涼之劑其有勢未定者或先用箍藥圍之若用烏金膏點患處尤妙凡人初覺發背赤熱腫痛莫辨其頭者但以濕紙覆其上立候視之其紙有先干處即是結癰頭也取大蒜切成片如二三錢厚薄安於頭上用大艾炷灸之三壯換一蒜片痛者灸至不痛不痛灸至痛時方止最要早覺早灸為上一日二日十灸十活三日四日六七活五日六日三四活過七日則難為力矣若有十數頭作一處者即用大蒜研成膏作薄餅鋪頭上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一片黃粟米頭子便用獨蒜切去兩頭取中間半寸厚者正安於瘡上灸十四壯多至四十九壯蓋如此惡證惟隔蒜灸及塗烏金膏有效又治法曰腫硬痛深脈實者邪在內也可下之腫高焮痛脈浮者邪在表也宜托之焮痛煩躁或咽乾火在上也宜瀉之腫高或不作膿者邪氣凝結也宜解之腫痛飲冷發熱睡語者火也宜清之不作膿或不潰不斂者陽氣虛也宜補之瘀肉不腐或積毒不解者陽氣虛也宜助陽氣膿多或清者氣血俱虛也宜峻補之脈浮大或澀而肌肉遲生者氣血俱虛也宜補之右關脈弱而肌肉遲生者宜補脾胃又諸毒治法曰如頭痛有表證者宜先服人參敗毒散一二劑如焮痛發熱脈數者用金銀花散槐花酒神功托裡散如疼痛腫硬脈實者以清涼飲仙方活命飲苦參丸腫硬木悶疼痛發熱煩躁飲冷便祕脈沉實者內疏黃連湯或清涼飲大便已通欲其作膿宜仙方活命飲托裡散蠟礬丸外用神異膏如飲食少思或不甘美用六君子湯加藿香連進三五劑更用雄黃解毒散洗患處每日用烏金膏塗瘡口處俟有瘡口即用紙作捻蘸烏金膏紝入瘡內若有膿為脂膜間隔不出或作脹痛者宜用針引之腐肉堵塞者去之若瘀肉腐動用豬蹄湯洗之如膿稠或痛飲食如常瘀肉自腐用消毒與托裡藥相兼服之仍用前二膏塗貼若腐肉已離好肉者宜速去之如膿不稠不稀微有疼痛飲食不甘瘀肉腐遲更用桑柴灸之亦用托裡藥若瘀肉不腐或膿清稀不焮痛者急服大補之劑亦用桑木灸之以補接陽氣解散郁毒常觀患疽稍重未成膿者不用蒜灸之法及膿熟不開或待腐肉自去則多致不救大抵氣血壯實或毒少輕者可假藥力或自腐潰若怯弱之人熱毒中隔內外不通不行針灸藥無全功矣此證若膿已成急宜開之否則重者潰通臟腑腐爛筋骨若使透膈則不可治輕者延潰良肉難於收功因而不斂者多矣又諸補治法曰若腫焮作痛寒熱作渴飲食如常此形氣病氣俱有餘也先用仙方活命飲後用托裡消毒散解之漫腫微痛或色不赤飲食少思此形氣病氣俱不足也用托裡散調補之不作膿或膿成不潰陽氣虛也托裡散倍加肉桂參耆膿出而反痛或膿清稀氣血俱虛也八珍湯惡寒形寒或不收斂陽氣虛也十全大補湯晡熱內熱或不收斂陰血虛也四物加參朮作嘔欲嘔或不收斂胃氣虛也六君加炮姜食少體倦或不收斂脾氣虛也補中益氣湯加茯苓半夏肉赤而不斂血熱也四物加山梔連翹肉白而不斂脾虛也四君加酒炒芍藥木香小便頻數者腎陰虧損也加減八味丸大抵病毒勢甚若妄用攻劑怯弱之人必損元氣因而變證者衆矣又三證治法曰若初患未發出而惡寒疼痛作渴飲冷此邪氣內蘊也仙方活命飲若口乾飲熱漫腫微痛此元氣內虛也托裡消毒散若飲食少思肢體倦怠此脾胃虛弱也六君子湯如未應加薑桂其有死者乃邪氣盛真氣虛而不能發出也在於旬余之間見之若已發出用托裡消毒散不腐潰用托裡消毒散如不應急宜溫補脾胃其有死者乃真氣虛而不能腐潰也在於二旬之間見之若已腐潰用托裡散以生肌如不應急溫補脾胃其有死者乃脾氣虛而不能收斂也在於月餘見之此三證雖不見於經籍余嘗治而歷驗者千金方灸法治發背已潰未潰者用淡豆豉以水和搗成硬泥依腫大小作餅三四分厚如已有瘡孔勿置瘡孔上但四布豆餅列艾其上灸之使微熱勿令破肉如熱痛急少起之日灸二度如先有瘡孔孔出汁即瘥一驗透膈法凡背疽大潰欲驗穿透內膜者不可用皂角散嚏法但以紙封患處令病者用意呼吸如紙不動者未穿透也倘用取嚏法鼓動內膜則反致穿透慎之慎之都憲周弘岡背患疽腫而不潰脈大而浮此陽氣虛弱而邪氣壅滯也用托裡散倍加參耆反內熱作渴脈洪大鼓指此虛火也用前散急加肉桂脈證頓退仍用托裡而愈若以為熱毒而用寒藥則誤矣上舍張克恭患此內服外敷皆寒涼敗毒遍身作痛欲嘔少食晡熱內熱惡寒畏寒余曰遍身作痛營衛虛而不能營於肉裡也欲嘔少食脾胃虛寒而不能消化飲食也內熱晡熱陰血內虛而陽氣陷於陰分也惡寒畏寒陽氣虛弱而不能衛於肌肉也此皆由脾胃之氣不足所致遂用補中益氣湯諸證漸退更以十全大補湯腐肉漸潰又以六君子湯加芎歸肌肉頓生而愈府庠彭碧溪患腰疽服寒涼敗毒之藥色黯不痛瘡頭如鋪黍背重不能安寢耳聵目白面色無神小便頻澀作渴迷悶氣粗短促脈浮數重按如無余先用滋水之藥一劑少頃便利渴止背即輕爽乃砭出瘀血以艾半斤許明灸患處外敷烏金膏內服參耆歸朮肉桂等藥至數劑元氣稍復自疑肉桂辛熱一日不用手足並冷大便不禁仍用肉桂及補骨脂二錢肉豆蔻一錢大便復常其肉漸潰更用當歸膏以生肌肉八珍湯以補氣血而愈上舍蔡東之患此余用托裡之藥而潰瘡口尚未全斂時值仲冬且兼咳嗽余曰瘡口未斂脾氣虛也咳嗽不止肺氣虛也法當補其母一日與之同宴見忌羊肉余曰補可去弱人參羊肉之類是也最宜食之遂每日不徹旬余而瘡斂嗽亦頓愈矣一男子年逾五十患發背色紫腫痛外皮將潰寢食不安神思甚疲用桑柴灸患處出黑血即鼾睡覺而諸證如失服仙方活命飲二劑又灸一次膿血皆出更進二劑腫痛大退又服托裡消毒散數劑而斂夫瘡勢熾甚本宜峻劑攻之但年老血氣衰弱況又發在肌表若專於攻毒則胃氣先損必反誤事薛按豫長男於一周患背疽治按在腫瘍條中新按論外通用方神仙熏照法外一二三腦疽四十三立齊曰腦疽屬膀胱經積熱或濕毒上壅或陰虛火熾或腎水虧損陰精消涸所致若腫痛未作膿者宜除濕消毒大痛或不痛或麻木者毒甚也隔蒜灸之更用解毒藥腫痛便祕者邪在內也宜泄之不甚痛或不做膿者虛也托裡為主膿成脹痛者針之更以托裡上部脈數實而痛者宜降火上部脈數虛而痛者宜滋陰降火為主尺部脈數而作渴者滋陰降火脈數而虛細無力或膿清或不斂或膿多者大補血氣不作膿或不潰者托裡藥主之煩躁飲冷脈實而痛者宜瀉火又治法曰初起腫赤痛甚煩渴飲冷脈洪數而有力乃濕熱上壅當用黃連消毒散並隔蒜灸以除濕熱若漫腫微痛渴不飲冷脈洪數而無力乃陰虛火熾當用六味丸及補中益氣湯以滋化源若口乾舌燥小便頻數或淋漓作痛乃腎水虧損急用加減八味丸及前湯以固根本而引火歸經若不成膿不腐潰陽氣虛也四君加歸耆若不生肌不收斂脾氣虛也十全大補湯若色黯不潰或潰而不斂乃陰精消涸名曰腦爍為不治若攻補得宜亦有可愈大凡腫焮痛甚宜活命飲隔蒜灸之以解散瘀血撥引郁毒但艾炷宜小而少若欲其成膿腐潰生肌收斂並用托裡為主李氏曰腦疽及頸項有疽不可用隔蒜灸恐引毒上攻宜灸足三里穴五壯氣海穴三七壯仍服涼血化毒之藥或以騎馬穴法灸之凡頭項咽喉生疽古法皆為不治若用此法多有生者如五香連翹漏蘆等湯國老膏萬金散皆可選用見外科精要一老人患此色赤腫痛脈數而有力與黃連消毒散二劑少退更與清心蓮子飲四劑而消一男子腫痛脈數以荊防敗毒散二劑而痛止更以托裡消毒藥而消一男子焮腫疼痛發熱飲冷脈洪數與涼膈散二劑而痛止以金銀花散四劑而潰更以托裡藥而愈一老婦稟壯實潰而痛不止脈實便祕以清涼飲二劑而痛止更以托裡消毒藥而愈一婦人冬間患此腫痛熱渴余用清熱消毒潰之而愈次年三月其舌腫大遍身發疔如葡萄不計其數手足尤多乃脾胃受毒也先各刺出黑血隨服奪命丹七粒出鼻汗瘡熱益甚便祕二日與大黃芩連各三錢升麻白芷出梔薄荷連翹各二錢生甘草一錢水煎三五沸服之大小便出臭血甚多下體稍退乃磨入犀角汁再服舌本及齒縫出臭血諸毒乃消更以犀角地黃湯而愈一婦人患前證口乾舌燥內服清熱外敷寒涼色黯不臖胸中氣噎此內真寒而外假熱也彼疑素有痰火不欲溫補余以參耆各五錢薑桂各二錢一劑頓潰又用大補藥而愈一男子頭項俱腫雖大潰腫痛益甚兼作瀉煩躁不睡飲食少思其勢可畏診其脈則毒尚在與仙方活命飲二劑腫痛退半與二神丸及六君子湯加五味子酸棗仁四劑諸證少退飲食少進睡亦少得又與參苓白朮散數服飲食頓進再與十全大補湯加金銀花白芷月餘而瘥薛按耳瘡四十四立齊曰耳瘡屬少陽三焦經或足厥陰肝經血虛風熱或肝經燥火風熱或腎經虛火等因若發熱焮痛屬少陽厥陰風熱用柴胡清肝散若內熱癢痛屬二經血虛用當歸川芎散若寒熱作痛屬肝經風熱用小柴胡湯加山梔川芎若內熱口乾屬腎經虛火用加減地黃丸如不應用加減八味丸余當隨證治之愚按薛氏所治耳證凡氣虛者以補中益氣湯加山梔黃芩血虛者用八珍湯加柴胡丹皮肝火血虛者用梔子清肝散怒動肝火者用加味逍遙散肝脾受傷者朝用加味歸脾湯暮用加味逍遙散此其治之大約也豫嘗治一儒者年近三旬素有耳病每年常發發必腫潰至乙亥二月其發則甚自耳根下連頸項上連頭角耳前耳後莫不腫痛諸醫之治無非散風降火至一月後稠脹鮮血自耳迭出每二三日必出一酒鍾許然膿出而腫全不消痛全不減枕不可近食不可加氣體俱困自分其危延余治之察其形氣已大不足察其病體則腫痛如舊仍若有餘察其脈息則或見弦急或見緩弱此非實熱可知然脈不甚緊而或時緩弱亦得潰瘍之體尚屬可治遂先以六味湯二三劑而元氣稍振繼以一陰煎加牛蒡茯苓澤瀉仍倍加白蒺藜為君服五十餘劑外用降癰散晝夜敷治兩月而後愈蓋此證雖似潰瘍有餘而實以肝腎不足上實下虛一奇證也故存識之薛按鬢疽四十五立齊曰鬢疽屬肝膽二經怒火或風熱血虛所致若焮痛或發熱者宜祛風清熱焮痛發寒熱或拘急者發散表邪作膿焮痛托裡消毒膿已成作痛者針之不作膿或膿成而不潰者俱宜托裡不斂或膿清者宜峻補之又治法曰若發熱作渴者用柴胡清肝散腫臖痛甚者仙方活命飲若大勢已退餘毒未散用參苓歸術為主佐以川芎白芷金銀花以速其膿膿成仍用參苓之類托而潰之若欲其生肌收斂腎虛者六味丸血虛者四物湯加參耆或血燥者四物湯或水不能生木者六味地黃丸氣虛者用補中益氣湯皆當滋其化源為善痄腮四十六立齊曰痄腮屬足陽明胃經或外因風熱所乘或內因積熱所致若腫痛寒熱者白芷胃風湯內熱腫痛者升麻黃連湯外腫作痛內熱口乾者犀角升麻湯內傷寒涼不能消潰者補中益氣湯發熱作渴大便祕結清涼飲表裡俱解而仍腫痛者欲作膿也托裡散若飲食少思胃氣虛弱者六君子湯肢體倦怠陽氣虛弱也補中益氣湯膿毒既潰腫痛不減熱毒未解也托裡消毒散膿出而反痛氣血虛也參耆內托散發熱晡熱陰血虛也八珍湯惡寒發熱氣血俱虛也十全大補湯若焮腫痛連耳下者屬手足少陽經當清肝火若連頤及耳後者屬足少陰經虛火當補腎水此證而有不治者多泥風熱用克伐之劑耳瘰癧四十七瘰癧之病屬三焦肝膽等經風熱血燥或肝腎二經精血虧損虛火內動或恚怒憂思氣逆於肝膽二經二經常多氣少血故怒傷肝則木火動而血燥腎陰虛則水不生木而血燥血燥則筋病肝主筋也故纍纍然結若貫珠其候多生於耳前後連及頤頷下至缺盆及胸腋之側又謂之馬刀其初起如豆粒漸如梅李核或一粒或三五粒按之則動而微痛不甚熱久之則日以益甚或頸項強痛或午後微熱或夜間口乾飲食少思四肢倦怠或堅而不潰或潰而不合皆由氣血不足故往往變為癆瘵外臺祕要云肝腎虛熱則生癧病機云瘰癧不繫膏粱丹毒火熱之變總因虛勞氣鬱所致止宜以益氣養營之藥調而治之其瘡自消蓋不待汗之下之而已也若不詳脈證虛實之異而概用追蝕攻下及流氣飲十宣散之屬則必犯經禁病禁以致血氣愈損必反為敗證矣若脈洪大以元氣虛敗為不治若面色㿠白為金剋木亦不治若眼內赤脈貫瞳人見幾條則幾年死使不求本而妄用伐肝之劑則誤矣蓋伐肝則脾土先傷脾傷則損五臟之源矣可不慎哉齊氏曰瘰癧結核初覺時宜內消之如經久不除氣血漸衰肌寒肉冷或膿汁清稀毒氣不出瘡口不含聚腫不赤結核無膿外證不明者並宜托裡膿未成者使膿早成膿已潰者使新肉早生血氣虛者托裡補之陰陽不和者托裡調之大抵托裡之法使瘡無變壞之證所以宜用也丹溪曰瘰癧必起於足少陽一經不守禁忌延及足陽明經食味之厚鬱氣之久曰毒曰風曰熱皆此三端拓引變換須分虛實實者易治虛者可慮此經主決斷有相火且氣多血少婦人見此若月水不調寒熱變生稍久轉為潮熱自非斷欲食淡神醫不能療也立齊曰焮腫脈沉數者邪氣實也宜泄之腫痛憎寒發熱或拘急者邪在表也宜發散因怒結核或腫痛或發熱者宜疏肝行氣腫痛脈浮數者祛風清熱脈澀者補血為主脈弱者補氣為主腫硬不潰者補氣血為主抑鬱所致者解鬱結調氣血潰後不斂者屬氣血俱虛宜大補虛勞所致者補之因有核而不斂者腐而補之脈實而不斂或不消者下之又治法曰若寒熱焮痛者此肝火風熱而氣病也用小柴胡湯以清肝火並服加味四物湯以養肝血若寒熱既止而核不消散者此肝經火燥而血病也用加味逍遙散以清肝火六味地黃丸以生腎水若腫高而稍軟面色萎黃皮膚壯熱膿已成也可用針以決之及服托裡之劑若經久不愈或愈後復發膿水淋漓肌肉羸瘦者必純補之劑庶可收斂否則變成九瘻內經曰陷脈為瘻留連肉腠即此病也外用豆豉餅琥珀膏以驅散寒邪補接陽氣內服補中益氣湯六味丸以滋腎水培肝木健脾土亦有可愈者又治法曰大抵此證原屬虛損若不審虛實而犯經禁病禁則鮮有不誤常治此證先以調經解鬱更以隔蒜灸之多自消如不消即以琥珀膏貼之俟有膿即針之否則變生他處設若兼痰兼陰虛等證只宜加兼證之劑不可干擾余經若氣血已復而核不消卻服散堅之劑至月餘不應氣血亦不覺損方進必效散或遇仙無比丸其毒一下即止二藥更服益氣養營湯以調理之若瘡口不斂宜用豆豉餅灸之用琥珀膏貼之若氣血俱虛或不慎飲食起居七情者俱不治然此證以氣血為主氣血壯實者不用追蝕之劑彼亦能自腐但取去之亦使易於收斂若氣血虛者不先用補劑而數用追蝕之藥適足以敗之矣若發寒熱眼內有赤脈貫瞳人者不治灸瘰癧法取肩尖肘尖骨縫交接處各一穴即手陽明經肩髃曲池二穴也各灸七壯在左灸左在右灸右左右俱病者俱灸之余常用之甚效薛氏以曲池云肘髎似亦未的也又薛氏經驗方云治瘰癧已成未成已潰未潰者以手仰置肩上微舉起則肘骨尖自見即是灸處灸以三四十壯為度更服益氣養營湯灸三次瘡自除如患三四年不愈者辰時灸至申時三灸即愈更服補劑按此法乃單灸曲池以多為貴也然但用前法而已妙矣尚有未應者又當以此法治之又曰此治瘰癧之祕法凡男子婦人若困恚怒傷肝氣血壅遇而不愈者宜灸此穴以疏通經絡如取此穴當以指甲掐兩肘兩肩四所患處覺有痠麻方是其穴又法灸瘰癧未成膿者用大蒜切片三錢厚安患處用艾壯於蒜上灸之每三五壯即換蒜再灸每日灸十數蒜片以拔郁毒如破久不合更以江西豆豉為末以唾津和作餅如前灸之以助陽氣內服補藥外貼琥珀膏或太乙膏瘡口自合又或瘡口已破核不腐則瘡口不能斂或貼琥珀膏不應須用針頭散敷之以去腐肉再以如神散敷之更服益氣養營湯若氣血虛者先服益氣養營湯待血氣稍充方用針頭散仍服前湯一男子患而腫硬久不消亦不做膿服散堅敗毒藥不應令灸肩尖肘尖二穴更服益氣養營湯月餘而愈一婦人久潰發熱月經每過期且少用逍遙散兼前湯兩月餘氣血復而瘡亦愈但一口不收敷針頭散更灸前穴而痊常治二三年不愈者連灸三次兼用托裡藥必愈一婦人因怒結核腫痛察其氣血俱實先以必效散下之更以益氣養營湯三十餘劑而消常治此證虛者先用益氣養營湯待其氣血稍充乃用必效散取去其毒仍進前藥無不效者田氏婦年逾三十瘰癧已潰不愈與八珍湯加柴胡地骨皮夏枯草香附貝母五十餘劑形氣漸轉更與必效散二服瘡口遂合惟氣血未平再與前藥三十餘劑而愈後田生執此方不問虛實概以治人殊不知散中斑蝥性毒雖治瘰癧多服則損元氣若氣血實者先用此下之而投補劑或可愈若虛而用下藥或用追蝕藥瘀血雖去而瘡口不合反致難治俱薛按治瘰癧痰核方凡瘰癧初起未甚者即宜服此或加夏枯草更佳用忍冬花蒲公英各四五錢以水二碗同煎湯朝夕代茶飲之十餘日漸消然此藥但可治標若欲除根必須灸肩髃曲池二穴疔瘡四十八齊氏曰夫疔瘡者以其瘡形如丁蓋之狀者是也古方之論凡有十種華元化之論有五色疔千金方說疔有十三種以至外臺祕要神巧萬全其論頗同然皆不離毒氣客於經絡及五臟內蘊熱毒凡初生一頭凹而腫痛青黃赤黑無復定色令人煩躁悶亂或憎寒頭痛或嘔吐心逆以針刺瘡不痛無血是其候也多因肥甘過度不慎房酒以邪致毒蓄結遂生疔瘡內經曰膏粱之變足生大疔此之謂也其治之法急以艾炷灸之若不覺痛者針疔四邊皆令血出以奪命丹或回生丹從針孔紝之上用膏藥貼之仍服五香連翹湯漏蘆湯等劑疏下之為效若或針之不痛無血者以猛火燒鐵針通紅於瘡上烙之令如焦炭取痛為效亦紝前藥用膏藥貼之經一二日膿潰根出服托裡湯散依常療之以取平復如針之不痛其人眼黑或見火光者不可治也此邪毒之氣入於臟府故也養生方云人汗入肉食食之則生疔瘡不可不慎也立齊曰此證多由膏粱厚味之所致或因卒中飲食之毒或感四時不正之氣或感蛇蟲之毒或感死畜之穢各宜審而治之其毒多生於頭面四肢形色不一或如小瘡或如水泡或疼痛或麻木或寒熱作痛或嘔吐噁心或肢體拘急並宜隔蒜灸之痛則灸至不痛不痛灸至痛若灸而不痛則明灸之及針疔四畔去惡血以奪命丹一粒入瘡頭孔內仍以膏藥貼之並服解毒之劑或用荊防敗毒散若針之不痛無血者宜用燒針治如前齊氏之法若不省人事或牙關緊急者以奪命丹為末蔥酒調灌之候醒更服敗毒散或奪命丹甚效若生兩足者多有紅絲至臍生兩手者多有紅絲至心腹生唇面口內者多有紅絲入喉皆為難治急宜用針於血絲盡處挑破使出惡血若紅絲近心腹者更挑破瘡頭去惡水以泄其毒亦以膏藥貼之多有生者若患於偏僻下部之處藥力所難到者若專假藥力則緩不及事惟灸之則大有回生之功疔之名狀雖有十三種之不同而治法但當審其元氣虛實邪之表裡庶不誤人之夭札也若專泥於疏利表散非為無益而反害之凡人暴死者多是疔毒急取燈遍照其身若有小瘡即是其毒宜急灸之並服奪命丹等藥亦有復蘇者又曰脈浮數者散之脈沉實者下之表裡俱實者解表攻裡麻木或大痛及不痛者並灸之更兼攻毒操江張恆山左足次指患之痛不可忍急隔蒜灸三十餘壯即能舉步彼欲速愈自敷涼藥遂致血凝肉死毒氣復熾再灸百壯服活命飲出紫血其毒方解腳底通潰腐筋爛肉甚多及將愈豫因考績北上又誤用生肌藥反助其毒使元氣虧損瘡口難斂豫回用托裡藥補之喜其稟實且客處至三月餘方瘥表甥居富右手小指患之或用針出血敷以涼藥掌指腫三四倍六脈洪大此真氣奪則虛邪氣盛則實也先以奪命丹一服活命飲二劑勢稍緩余因他往或又遍刺出血腫延臂腕如大瓠手指腫大數倍不能消潰乃真氣愈虛而邪氣愈盛也余回用大劑參耆歸術之類及頻灸遍手腫勢漸消後大便不實時常泄氣此元氣下陷以補中益氣湯加補骨脂肉豆蔻吳茱萸五味子又以生脈散代茶飲大便漸實手背漸潰又用大補藥五十餘劑漸愈薛按時毒四十九齊氏曰時毒者為四時邪毒之氣而感之於人也其候發於鼻面耳項咽喉赤腫無頭或結極有根令人憎寒發熱頭痛肢體甚痛恍惚不守咽喉閉塞人不識者將謂傷寒原夫此疾古無方論世俗通謂丹瘤病家惡言時毒切恐傳染經曰人身忽經變赤狀如塗丹謂之丹毒此風熱惡毒所為自與時毒不同蓋時毒者感四時不正之氣初發狀如傷寒五七日之間乃能殺人若至十日之外則不治自愈也治宜辨之先診其脈凡滑數浮洪沉緊弦澀皆其候也但浮數者邪在表也沉澀者邪氣深也察其毒之甚者急服化毒丹以攻之實熱便祕者大黃湯下之其有表證者犀角升麻湯以發之或年高氣鬱者五香連翹湯主之又於鼻內㗜通氣散取十餘嚏作效若㗜藥不嚏者不可治之若嚏出膿血者治之必愈凡左右看病之人日日用㗜藥嚏之必不傳染切須記之其病人每日用嚏藥三五次以泄熱毒此治時證之良法也凡經三四日不解者不可大下猶宜和解之以犀角散芩連消毒飲甚者連翹湯之類至七八日大小便通利而頭面腫起高赤者可服托裡散托裡黃耆湯如腫甚者宜砭患處出惡血以泄其毒氣此病若五日以前精神昏亂咽喉閉塞語言不出頭面赤腫食不知者必死之候治之無功矣然而此疾有陰有陽有可汗者有可下者嘗見粗工但云熱毒只用寒藥殊不知病有微甚治有逆從不可不審矣羅謙甫云泰和二年先師監濟源稅時四月民多疫癘初覺憎寒體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問染之多不救張縣令侄亦得此病至五六日醫以承氣加板藍根下之稍緩翌日其病如故下之又緩終莫能愈漸至危篤或曰李明之存心於醫可請治之遂請診視具說其由先師曰夫身半以上天之氣也身半以下地之氣也此邪熱客於心肺之間上攻頭目而為腫盛用承氣下之以瀉胃中之實熱是誅伐無過也殊不知適其病所為故遂處一方用黃芩黃連苦苦寒瀉心肺間熱以為君橘紅苦平玄參苦寒生甘草甘寒人參甘平瀉火補氣以為臣連翹鼠黏子薄荷葉苦辛平板藍根味苦寒馬勃白殭蠶味苦平行少陽陽明二經氣不得伸桔梗味辛溫為舟楫不令下行升麻柴胡苦辛以散表邪共為細末半用湯調時時服之半蜜為丸噙化之服盡良愈因嘆曰往者不可追來者猶可及凡他所有病者皆書方以貽之全活甚衆時人皆曰此方天人所制遂刊於石以傳永久命曰普濟消毒飲薛立齊曰此感四時不正之氣邪客心肺之間上攻頭目而為患與膏粱積熱之證不同硝黃之劑非大便祕實者不可用若不審其因不辨表裡虛實而概用攻必致有誤裡實而不利者下之表實而不解者散之表裡俱實而不解者解表攻裡表裡俱解而不消者和之腫甚焮痛者砭去惡血更用消毒之劑不作膿或不潰者托之饑年普患者不宜用峻利藥當審而治之又治法曰若脈浮者邪在表也用葛根牛蒡湯犀角升麻湯人參敗毒散之類以發之脈沉澀者邪在裡也用梔子仁湯五利大黃湯之類以下之表裡俱病而腫不退者用犀角升麻湯甚者砭出惡血並用通關散㗜鼻內取嚏以泄其毒表裡俱不解而內外俱實者防風通聖散欲其作膿者用托裡消毒散欲其收斂者用托裡散此法最為穩當常見饑饉之際芻蕘之人多患之乃是胃氣有損邪氣從之為患也故凡以凶荒勞役而患此者多宜安里為主或用普濟消毒飲最善一老人冬月頭面耳項俱腫痛甚便祕脈實此表裡俱實病也與防風通聖散不應遂砭患處出黑血仍投前藥即應又以荊防敗毒散而瘳蓋前藥不應者毒血凝聚上部經絡藥力難達故也惡血既去其藥自效或拘用寒遠寒及年高畏用硝黃而用托裡與夫尋常消毒之劑或不砭泄其毒專假藥力鮮不危矣一男子頭面腫痛服硝黃敗毒之劑愈甚診之脈浮數其邪在表尚未解散用荊防敗毒散加玄參牛蒡子二劑勢退大半以葛根牛蒡子湯四劑而痊薛按肺癰肺痿五十此證初起邪結在肺者惟桔梗杏仁煎為治此之第一方在新因三三齊德之曰肺者五臟之華蓋也處於胸中主於氣候於皮毛勞傷血氣腠理虛而風邪乘之內感於肺也故汗出惡風咳嗽短氣鼻塞項強胸脅脹滿久久不瘥已成肺痿也風中於衛呼氣不入熱至於營則吸而不出所以風傷皮毛熱傷血脈風熱相搏氣血稽留蘊結於肺變成瘡疽診其脈候寸口脈數而虛者肺痿也數而實者肺癰也若欲知其有膿但脈見微緊而數者未有膿也緊甚而數者已有膿也肺痿之候久嗽不已汗之過度重亡津液便如爛瓜下如豕膏小便數而不渴渴者自愈欲飲者將瘥此由肺多唾涎而無膿者肺痿也肺瘡之候口乾喘滿咽燥而渴甚則四肢微腫咳唾膿血或腥臭濁沫胸中隱隱微痛者肺疽也又聖惠曰中府隱隱微痛者肺疽也上肉微起者肺瘡也中府者穴名也是以候始萌則可救膿成則多死又內經曰血熱則肉敗營衛不行必將為膿大凡肺瘡當咳嗽短氣胸滿時唾膿血久久如粳米粥者難治若嘔膿而不止者亦不可治其嘔膿而自止者將自愈其脈短而澀者自痊浮洪而大者難治其面色當白而反面赤者此火之剋金皆不可治仲景曰上氣面浮腫肩息其脈浮大不治又加利尤甚馬益卿曰肺癰治法要略先以小青龍湯一帖以解其風寒邪氣然後以葶藶大棗瀉肺湯桔梗湯葦莖湯見金匱要略隨證用之以取膿此治腫瘍之例也終以內補黃耆湯以補里之陰氣此治潰瘍之例也又曰腫癰已破入風者不治或用太乙膏丸服以搜風湯吐之若吐膿血狀如肺癰口臭他方不應者宜消風散入男子發灰清水飲調下兩服可除立齊曰凡勞傷血氣腠理不密外邪所乘內感於肺或入房過度腎水虧損虛火上炎或醇酒炙爆辛辣厚味熏蒸於肺或咳唾痰涎汗下過度重亡津液皆能致之其候惡風咳嗽鼻塞項強胸脅脹滿呼吸不利咽燥作渴甚則四肢微腫咳唾膿血若吐痰臭濁膿血腥穢胸中隱隱微痛右手寸口脈數而實者為肺疽若唾涎沫而無膿脈數而虛者為肺痿也又治法曰大抵勞傷氣血則腠理不密風邪乘肺風熱相搏蘊結不散必致咳嗽若誤用汗下過度則津液重亡遂成斯證凡喘嗽氣急胸滿者表散之咳嗽發熱者和解之咳而胸膈隱痛唾痰腥臭者宜排膿散喘急恍惚痰盛者宜平肺唾膿脈短澀者宜補之又治法曰若咳嗽喘急者小青龍湯咳嗽胸脹者葶藶大棗瀉肺湯咳膿腥濁者桔梗湯咳喘短氣或小便短少者佐以參耆補肺湯體倦食少者佐以參朮補脾湯咳唾痰壅者腎虛水泛也六味地黃丸口乾咽燥者虛火上炎也加減八味丸此證皆因脾土虧損不能生肺金肺金不能生腎水故始成則可救膿成則多死苟能補脾肺滋腎水庶有生者若專攻其瘡則脾胃益虛鮮有不誤者矣陸司廳子春間咳嗽唾痰腥穢胸滿氣促皮膚不澤項強脈數此肺疽也蓋肺系在項肺傷則系傷故牽引不能轉側肺者氣之本其華在毛其充在皮治以黃耆當歸川芎白芷貝母知母麥冬栝蔞仁桔梗防風甘草兼以蠟礬丸及太乙膏治之膿盡脈澀而愈一男子面白神勞咳而胸膈隱痛其脈滑數豫以為肺癰欲用桔梗湯不信仍服表藥致咳嗽愈甚唾痰腥臭始悟乃服前湯四劑咳嗽少定又以四順散四劑而脈靜更以托裡藥數劑而愈一男子咳嗽喘急發熱煩躁面赤咽痛脈洪大用黃連解毒湯二劑少退更以梔子湯四劑而安一男子患肺痿咳嗽喘急吐痰腥臭胸滿咽乾脈洪數用人參平肺散六劑及飲童便諸證悉退更以紫苑茸湯而愈童便雖云專治虛火常治瘡湯焮腫疼痛發熱作渴及肺痿肺癰發熱口渴者尤效一男子面赤吐膿發熱做渴煩躁引飲脈洪數而無倫次先用加減八味丸加麥冬大劑一服熱渴頓止即熟睡良久覺而神爽索食再劑諸證頓減仍用前藥更以人參五錢麥冬二錢五分五味二錢水煎代茶日飲一劑月餘而安此證面赤者當補肺腎面白者當補脾肺治者審之一婦人素血虛發熱咳嗽或用痰火之劑後吐膿血面赤脈數其勢甚危此膿成而氣血虛也余用八珍湯以補元氣用桔梗湯以治肺證因得漸愈一儒者患肺癰鼻流清涕咳吐膿血胸膈作脹此風邪外傷也先用消風散加亂髮灰二服而鼻利又用四君加芎歸及桔梗湯而愈後因勞役咳嗽吐膿小便滴瀝面色黃白此脾土不能生肺金肺金不能生腎水也用補中益氣湯六味地黃丸而愈一僕年逾三十嗽久不愈氣壅不利睡臥不安咯吐膿血甚虛可畏其主已棄矣余以寧肺散一服少愈又服而止大半及以寧肺湯數劑而痊所謂有是病必用是藥若泥前散性澀而不用何以得愈薛按乳癰乳岩五十一婦人門亦有乳證當互察之立齊曰乳房屬足陽明胃經乳頭屬足厥陰肝經男子房勞恚怒傷於肝腎婦人胎産憂鬱損於肝脾皆能致之若因暴怒或兒口氣所吹腫痛者宜疏肝行氣焮痛發寒熱者發散表邪焮腫痛甚者清肝消毒並宜隔蒜灸未成膿者疏肝行氣不作膿或不潰者托裡為主潰而不斂或膿清者宜大補脾肺氣血為主又治法曰若膿出反痛或作寒熱氣血虛也十全大補湯體倦口乾中氣虛也補中益氣湯晡熱內熱陰血虛也八珍湯加五味子欲嘔作嘔胃氣虛也補胃為主或用香砂六君子湯食少作嘔胃氣虛寒也前湯加乾薑食少泄瀉脾氣虛寒也理中湯或加人參附子若勞碌以致腫痛氣血未復也八珍湯倍用參耆歸術若因怒氣以致腫痛肝火傷血也八珍湯加柴胡山梔若肝火血虛而結核不消者四物湯加柴胡升麻若肝脾氣血俱虛而結核者四君子加芎歸柴胡升麻鬱結傷脾而結核者歸脾湯兼神效栝蔞散若為兒所吹而發腫焮痛須吮通揉散否則成癰矣若兼餘證亦當治以前法若婦人鬱怒傷肝脾而結核不癢不痛一二載始潰者名曰乳岩最難治療又治法曰若忿怒傷肝厚味積熱以致氣不行竅不通乳不出則結而為肝為痛此陽明之血熱甚則肉腐為膿若膿一成即針出之以免遍潰諸囊之患亦有所乳之子膈有滯痰口氣焮熱含乳而睡熱氣所吹遂成腫痛於初起時須吮咂使通或忍痛揉散之失治必成癰患宜用青皮以疏厥陰之滯石膏以清陽明之熱甘草節以行汙濁之血栝蔞子以消腫導毒或加沒藥橘葉皂角針金銀花當歸更宜隨證消息加減而治仍用少酒佐之更用隔蒜灸之其效尤捷若有膿即針之否則通潰難於收斂乳癰用蒲公英忍冬藤入少酒煎服即欲睡是其功也及覺而病安矣見外科心法一婦人患乳癰寒熱頭痛與荊防敗毒散一劑更與蒲公英一握搗爛入酒二三盞再搗取汁熱服柤熱罨患處而消丹溪云此草散熱毒消腫核又散滯氣解金石毒之聖藥一婦人左乳內腫如桃不痛色不變發熱漸消瘦以八珍湯加香附遠志青皮柴胡百餘劑又間服神效栝蔞散三十餘劑膿潰而愈常見患者責效太速或不解七情及藥不分經絡虛實者俱難治大抵此證四十以外者尤難治蓋因陰血日虛也一婦人因怒左乳內腫痛發熱表散太過致熱益甚以益氣養營湯數劑熱止膿成欲用針彼不從遂腫脹大熱發渴始針之膿大泄仍以前湯月餘始愈一男子左乳腫硬痛甚以仙方活命飲二劑而痛止更以十宣散加青皮四劑膿成針之而愈此證若膿成未破瘡頭有薄皮剝起者用代針之劑點起皮處以膏藥貼之膿亦自出但不若及時針之則不致大潰如膿出不利更紝入搜膿化毒之藥若膿血未盡輒用生肌之劑反助邪氣縱早合必再發不可不慎也一産婦因乳少服藥通之致乳房腫脹發熱作渴狀類傷寒以玉露散補之而愈夫乳汁乃氣血所化在上為乳在下為經若衝任之脈盛脾胃之氣壯則乳汁多而濃衰則少而淡所乳之子亦弱而多病此自然之理亦有屢産有乳再産卻無或大便澀滯乃亡津液也三因論云産婦乳脈不行有二有血氣盛閉而不行者有血氣弱澀而不行者虛當補之盛當疏之盛者當用通草漏蘆土瓜根輩虛者當用煉成鍾乳粉豬蹄鯽魚之屬概可見矣俱薛按一婦人久郁右乳內結三核年餘不消朝寒暮熱飲食不甘此乳岩也乃七情所傷肝經氣血枯槁之證宜補氣血解鬱結藥治之遂以益氣養營湯百餘劑血氣漸復更以木香餅灸之喜其謹疾年餘而消若用克伐之劑以復傷血氣則一無可保者一妾乃放出宮人乳內結一核如栗欲用前湯彼不信乃膿瘡科流氣飲及敗毒散三年後大如覆碗堅硬如石出水不潰而歿大抵鬱悶則脾氣阻肝氣逆遂成隱核不痛不癢人多忽之最難治療若一有此宜戒七情遠厚味解鬱結更以養血氣之藥治之庶可保全否則不治亦有數載方潰而陷下者皆曰乳岩蓋其形似巖穴而最毒也慎之則可保十中之一二薛按胃脘癰五十二立齊引聖濟總録云胃脘癰由寒氣隔陽熱聚胃口寒熱不調故血肉腐壞以氣逆於胃故胃脈沉細以陽氣不得上升故人迎熱甚令人寒熱如瘧身皮甲錯或咳嗽或嘔膿唾血若脈見洪數膿已成也急宜排之設脈遲緊其膿未就有瘀血也急下之否則邪毒內攻腐爛腸胃矣丹溪云內疽者因飲食之毒七情之火相鬱而發用射干湯主之愚常以薏苡仁湯牡丹皮散太乙膏選用之亦效若吐膿血飲食少思宜助胃壯氣為主而佐以前法不可專治其瘡腹癰五十三立齊曰腹癰謂瘡生於肚腹或生於皮裡膜外屬膏粱厚味七情鬱火所致若漫腫堅硬肉色不變或脈遲緊未成膿也四君加芎歸白芷枳殼或托裡散腫軟色赤或脈洪數已成膿也托裡消毒散膿成而不外潰者氣血虛也臥針而刺之焮腫作痛者邪氣實也先用仙方活命飲隔蒜灸以殺其毒後用托裡以補其氣若初起欲其內消當助胃壯氣使根本堅固而以行經活血之藥佐之若用克伐之劑欲其消散則腫者不能潰潰者不能斂若用疏利之藥下其膿血則少壯者多為難治老弱者立見危亡若有食積疝氣類此者當辨而治之進士邊云莊腹痛惡寒脈浮數余曰浮數之脈而反惡寒瘡疽之證也不信數日後復請視之左尺洪數余曰內有膿矣仍不信至小腹痛脹連及兩臀始悟余曰膿潰臀矣氣血俱虛何以收斂急服活命飲一鍾臀潰一孔出膿鬥許氣息奄奄用大補藥一劑神思方醒每去後糞從瘡出痛不可當小腹間如有物上挺即發痙不省人事煩躁脈大舉按皆實省而細察之脈雖洪大按之如無以十全大補倍加參耆至四斤更加附子二枚煎膏服之而痙止又用十全大補湯五十餘劑而瘡斂上舍周一元患腹癰三月不愈膿水清稀朝寒暮熱服四物黃柏知母之類食少作瀉痰涎上湧服二陳枳實之類痰涎愈甚胸膈痞悶謂余曰何也余曰朝寒暮熱血氣虛也食少作瀉脾腎虛也痰湧胸痞脾肺虛也悉因真氣虛而邪氣實也當先壯其胃氣使諸臟有所稟而邪自退矣遂用六君加黃耆當歸數劑諸證漸退又用十全大補湯肌肉漸斂更用補中益氣湯調理而愈薛按腸癰五十四孫真人云腸癰為病小腹重強按之則痛小便如淋時時汗出復惡寒身皮甲錯腹皮急如腫甚者腹脹大轉側有水聲或繞臍生瘡或膿從臍出或大便膿血脈洪數者已有膿也血下則安若妄治者必殺人陳無擇曰腸癰為病身甲錯腹皮急按之濡始腫狀腹無聚積身無熱脈數此為腸內有膿久積陰冷所成也故金匱有用附子溫之其脈遲緊者膿未成可下之當有血洪數者膿已成不可下此以內結熱所成也故金匱有用大黃利之千金方灸法曲兩肘正肘頭鋭骨灸百壯下膿血而安一男子裡急後重下膿脹痛此脾氣下陷也用排膿散蠟礬丸而愈後因勞役寒熱體倦用補中益氣湯而安一婦人膿成腹脹痛小便不利脈滑數此膿毒內潰也服太乙膏三錢膿下升許脹痛頓退更以神效栝蔞散二劑而全退又以蠟礬丸及托裡藥十餘劑而安一産婦小腹疼痛小便不利以薏苡仁湯二劑痛止更以四物湯加桃仁紅花下瘀血升許而愈一婦人産後惡露不盡小腹患痛服瓜子仁湯下瘀血而痊凡瘀血停滯宜急治之緩則腐化為膿最難治療若使流注骨節則患骨疽失治多為敗證薛按附骨疽五十五附骨疽一證近俗呼為貼骨癰凡疽毒最深而結聚於骨際者皆可謂之附骨疽然尤惟兩股間肉厚處乃多此證蓋此證之因有勞傷筋骨而殘損其脈者有恃酒力房而困爍其陰者有憂思鬱怒而留結其氣者有風邪寒濕而湊滯其經者凡人於環跳穴處無故痠痛久而不愈者便是此證之兆速當因證調治不可遲也蓋其初起不過少陽經一點逆滯逆而不散則以漸而壅壅則腫腫則潰至其延漫則三陰三陽無不連及而全腿俱潰然此證無非元氣大虧不能運行故致留滯不散而後至決裂誠危證也若潰後脈和雖見困弱之甚只以大補氣血為主皆可保全若潰後脈反洪芤而煩躁不寧發熱口渴則必不可治至若治此之法凡以勞傷筋骨而致者宜大營煎兼大防風湯治之若酒色傷陰者宜八味丸六味丸或右歸飲兼大防風湯主之若憂思鬱怒結氣者宜瘡科流氣飲或五香連翹湯兼大防風湯主之若風寒外襲者宜五積散兼大防風湯主之大抵此證初起即宜用大營煎溫補氣血或兼仙方活命飲通行毒氣有火者宜速用連翹歸尾煎以解散其毒仍宜速用隔蒜灸或豆豉餅尋頭灸之以速散其毒最為捷法其有濕熱痰飲等證當並求後法以治之庶免大害也若環跳久痛不已或見臀股微腫度其已成勢不能散只宜速用托補專固根本使其速起速潰則根本既實雖凶亦無大害必且易潰易斂而易愈也若脈見滑數按之軟熟膿已成也速宜針之無使久留以防深蝕之患其有不明利害苟圖目前或用克伐消散再傷元氣或用寒涼敷藥以遏其毒氣必致日延日甚而元氣日敗則一潰不可收拾矣考諸方書俱未詳及此證故悉其所因並附治按於後立齊曰附骨疽有因露臥風寒深襲於骨者有因形氣損傷不能起發者有因克伐之劑虧損元氣不能發出者有因外敷寒藥血氣凝結於內者凡此皆宜灸尉患處解散毒氣補接元氣溫補脾胃為主若飲食如常先用仙方活命飲解毒散郁隨用六君子湯補托營氣若體倦食少但用前湯培養諸臟使邪不得傷正若膿已成即針之使毒氣不得內侵帶生用針亦無妨如用火針亦不痛且使易斂其隔蒜灸能解毒行氣蔥尉法能助陽氣行壅滯此雖不見於方書豫常用之大效其功不能盡述惟氣血虛脫者不應又曰大抵此證雖云腫有淺深感有輕重其所受皆因真氣虛弱邪氣得以深襲若真氣壯實邪氣焉能為患也故附骨癰疽及鶴膝風證惟腎虛者多患之前人用附子者以溫補腎氣而又能行藥勢散寒邪也亦有體虛之人秋夏露臥為冷氣所襲寒邪伏結多成此證不能轉動乍寒乍熱而無汗按之痛應骨者是也若經久不消極陰生陽寒化為熱而潰也若被賊風所傷患處不甚熱而灑淅惡寒不時汗出尉之痛止少者須大防風湯及火龍膏治之若失治則為彎曲偏枯有堅硬如石者謂之石疽若熱緩積日不潰肉色赤紫皮肉俱爛名緩疽其始末皆宜服前湯欲其驅散寒邪以補虛托裡也又曰此證亦有産後惡血未盡臍腹刺痛或流於四肢或注於股內疼痛如錐或兩股腫痛此由冷熱不調或思慮動作氣所壅遏血蓄經絡而然宜沒藥丸治之亦有經血不行流注四肢或股內疼痛如錐或因水濕所觸經水不行而腫痛者宜當歸丸治之凡惡血停滯為患匪輕治之稍緩則流注為骨疽多致不救一婦人膝腫痛遇寒痛益甚月餘不愈諸藥不應脈弦緊此寒邪深伏於內也用大防風湯及火龍膏治之而消一男子腿根近環跳穴患痛徹骨外皮如故脈數而滯滑此附骨疽膿將成也用托裡藥六劑腫起作痛脈滑數其膿已成針之出碗許更加補劑月餘而瘳一男子患附骨疽腫硬發熱骨痛筋攣脈數而沉用當歸拈痛湯而愈一男子腿內患癰漫腫作痛四肢厥逆咽喉閉塞發寒熱諸治不效乃邪郁經絡而然也用五香連翹湯一劑諸證少退又服之大便行二次諸證悉退而愈一男子先腿痛後四肢皆痛遊走不定至夜益甚服除濕敗毒之劑不應其脈滑而澀此濕痰濁血為患以二陳湯加蒼朮羌活桃仁紅花牛膝草烏治之而愈凡濕痰濕熱或死血流注關節非辛溫之劑開發腠理流通隧道使氣行血和焉能得愈王時亨室産後腰間腫痛兩腿尤甚此由瘀血滯於經絡而然也不早治必作骨疽遂與桃仁湯二劑稍愈更以沒藥丸數服而痊薛按一魏生者年三十餘素多勞碌忽患環跳痠痛數月後大股漸腫延豫視之曰此附骨疽也速當治之與以活命飲二劑未及奏效而腫益甚因慌張亂投或清火或解毒遂致嘔惡發熱飲食不進其勢甚危然後懇求相救遂以參耆內托散大加炮姜數劑而嘔止食進其腫軟熟知其膿成速令針之針處出膿不多復以九味異功煎與之遂得大潰且瓣瓣出膿潰者五六處而腿肉盡去止剩皮骨矣潰後復嘔惡發熱不食遂以十全大補湯及九味異功煎相間與之然後熱漸退食漸近稍有生色然足筋短縮但可豎膝仰臥左右挨緊毫不能動動則痛極自分已成廢物此後凡用十全大補湯八十餘劑人參三斤而腿肉漸生筋舒如故覆成一精壯男子此全得救本之功也一男子陳姓者年近三旬素不節欲忽見環跳痠痛月餘不愈豫曰此最可畏恐生癰毒之患彼不信又謀之一庸醫反被其詬曰此等胡說真可笑也筋骨之痛亦常事耳不過風熱使然何言癰毒遂用散風清火等藥至半年後果見微腫復來求治豫曰速用托補以救根本尚不遲也彼又不信而謀之瘍醫曰豈可腫瘍未潰而遽可溫補耶復用清火清毒之劑及其大潰而危再延余視則脈證俱敗方信豫言而痛悔前失已無及矣一膏粱子茅姓者年未三旬素以酒色為事亦患此證早令服藥執拗不從及其腫而膿成令速針之亦畏痛不從而偏聽庸流敷以苦寒解毒之藥不知膿既已成尤不可解但有愈久愈深直待自潰而元氣盡去不可收拾矣薛按臀癰五十六馬益卿曰臀癰證臀居小腹之下此陰中之陰也道遠位僻雖曰多血然氣運不到血亦罕來中年之後尤慮患此才有腫痛參之脈證但見虛弱便與滋補氣血無虧可保終吉立齊曰凡治此者毋傷脾胃勿損脾氣但當以固根本為主若焮痛尺脈緊而無力者托之腫硬痛甚者隔蒜灸之更以解毒不作膿者托裡為主不作膿而痛者解毒為主不潰或潰而不斂者托裡為主又治法曰若腫硬作痛者形氣虛而邪氣實也用托裡消毒散微腫微痛者形氣病氣俱虛也用托裡散補之欲作膿者用內托羌活湯若痛甚者用仙方活命飲大勢既退亦用托裡消毒散若脾虛不能消散或不潰不斂者六君子加芎歸黃耆若陰虛不能消散或作渴便淋者六味丸加五味子若陽虛不能潰或膿清不能斂者用補中益氣湯氣血俱虛者十全大補湯若腫硬未成膿者用隔蒜灸及活命飲潰後宜豆豉餅及補中益氣十全大補二湯若灸後大勢已退餘毒未消頻用蔥尉以補其氣以消餘毒為善又曰凡毒氣已退不起者但可補其血氣使膿速成而針去之不可用內消之論若腫高而軟者發於血脈腫下而堅者發於筋骨肉色不變者發於骨髓也膿血大泄之後當大補氣血為先雖有他證以末治之巡按陳和峰脾胃不健常服消導之劑左腿股及臀患腫余曰此脾氣虛而下注非瘡毒也當用補中益氣倍加白朮彼惑於衆人云白朮能潰膿乃專以散腫消毒為主而腫益甚體益倦余用白朮一味煎飲而消儒者楊啓元左臀患此敷貼涼藥腫徹內股服連翹消毒散左體皆痛余以為足三陰虧損用補中益氣湯以補脾肺用六味丸加五味子以補肝腎股內消而臀間潰又用十全大補湯而瘡口斂一儒者焮腫痛甚此邪毒壅滯用活命飲隔蒜灸而消後因飲食勞倦腫痛復作寒熱頭痛此元氣虛而未能復也與補中益氣湯頻用蔥尉法兩月而愈一男子患臀癰作膿而痛以仙方活命飲二劑痛止更以托裡消毒散膿潰而瘥一弱人臀癰膿成不潰以十全大補湯數劑始托起乃針之又二十餘劑而愈薛按流注五十七立齊曰流注之證多因鬱結或暴怒或脾氣虛濕氣逆於肉理或腠理不密寒邪客於經絡或濕痰或閃撲或産後瘀血流注關節或傷寒餘邪未盡為患皆因真氣不足邪得乘之故氣凝血聚為患也然此證或生於四肢關節或生於胸腹腰臀或結塊或漫腫或痛或不痛悉宜用蔥尉法及益氣養營湯固其元氣則未成者自消已成者自潰可全愈也若不補氣血及節飲食慎起居戒七情而專用寒涼克伐者俱不治又治法曰常治此證凡暴怒所致胸膈不利者調氣為主抑鬱所致而不痛者宜調經脈補氣血腫硬作痛者行氣和血潰而不斂者補氣血為主傷寒餘邪未盡者和而解之脾氣虛濕熱凝滯肉理者健脾除濕為主閃跌瘀血凝滯為患者和血氣調經絡寒邪所襲筋攣骨痛或遍身痛宜溫經絡養血氣若久而不斂瘡口無陽者宜豆豉餅或附子餅灸之以祛散寒邪接補陽氣或外用琥珀膏貼之若內有膿管或生瘀肉而不斂者用針頭散腐之自愈錠子尤效醫林集要云骨疽乃流注之敗證也如用涼藥則內傷其脾外冰其血脾主肌肉脾氣受傷飲食必減肌肉不生血為脈絡血受冰則氣血不旺而愈滯宜用理脾脾健則血自生而氣自運行矣又有白虎飛尸留連周期或展轉數歲冷毒朽骨出盡自愈若附骨腐者可痊正骨腐則為終身廢疾矣有毒自手足或頭面腫起或兼疼痛上至頸項骨節去處如瘍癧貫珠此風濕流氣之證也宜以加減小續命湯及獨活寄生湯治之有兩膝腫痛起或至遍身骨節疼痛者此風濕痹又名歷節風宜附子八物湯治之又有結核在項腋或兩乳旁或兩胯軟肉處名曰𤷍癧癰屬冷證也又有小兒宿痰失道致結核於頸項臀膊胸背之處亦令證也俱宜熱藥敷貼以上諸證皆緣於腎腎主骨腎虛則骨冷而為患也所謂骨疽皆起於腎亦以其根於此也故用大附子以補腎氣腎實則骨有生氣而疽不附骨矣一男子臀腫一塊微痛脈弦緊以瘡科流氣飲四劑而消一婦人暴怒腰腫一塊胸膈不利時或氣走作痛用方脈流氣飲數劑而止更以小柴胡湯對四物加香附貝母月餘而愈一婦人稟弱性躁脅臂腫痛胸膈痞悶服流氣敗毒藥反發熱以四七湯數劑胸寬氣利以小柴胡湯對四物加陳皮香附腫痛亦退大抵婦人性情執著不能寬解多被七情所傷遂致遍身做痛或肢節腫痛或氣填胸滿或如梅核塞喉咽吐不出或痰涎壅盛上氣喘急或嘔逆噁心甚者渴悶欲絶産婦多有此證宜服四七湯先調滯氣更以養血之藥若因憂思致小便白濁者用此湯吞青州白丸子屢效一老人傷寒表邪未盡股內患腫發熱以人參敗毒散二劑熱止灸以香附餅又小柴胡湯加二陳羌活川芎歸朮枳殼數劑而散一男了退患潰而不斂用人參養營湯及附子餅更以補劑煎膏貼之兩月餘而愈一男子腿患腫肉色不變不痛脈浮而滑以補中益氣湯加半夏茯苓枳殼木香飲之以香附餅尉之彼謂氣無補法乃服方脈流氣飲虛愈甚復求治以六君了湯加芎歸數劑飲食少進再用補劑月餘而消夫氣無補法俗論也以其為病痞塞似難於補殊不知衛氣虛而不能運行則邪氣滯而為病經云壯者氣行則愈怯者弱者則著而為病苟不用補法元氣何由而行乎一婦人腿患筋攣骨痛諸藥不應脈遲緊用大防風湯二劑頓退又二劑而安又一婦人亦然先用前湯二服更服黑丸子而痊此二患若失治必潰成敗證一男子肩胛患之微腫形勞氣弱以益氣養營湯服黑丸子以及木香生地黃作餅覆患處尉之月餘膿成針之仍服前藥而愈一男子臂腫筋攣骨痛年餘方潰不斂診其脈更虛以內塞散一料少愈以十全大補湯及附子餅灸之而愈精要云留積經久極陰生陽寒化為熱以此潰多成痿宜早服內塞散排之一男子臂患出腐骨三塊尚不斂發熱作渴脈浮大而澀乃氣血俱損須多服生血氣之藥庶可保全彼惑於火尚未盡仍用涼藥內服外敷幾危求治其形甚瘁其脈愈虛先以六君子湯加芎歸月餘飲食漸進以八珍湯加肉桂三十餘劑瘡色乃赤更以十全大補湯外以附子餅灸之僅年而瘥薛按鶴膝風五十八凡肘膝腫痛臂胻細小者名為鶴膝風以其象鶴膝之形而名之也或止以兩膝腫大胻腿枯細不能屈伸俗又謂之鼓槌風總不過風寒濕三氣流注之為病也然腫痛者必有邪滯枯細者必有血虛凡治此者必宜以養氣滋血為主有風者兼散其風有寒濕者兼去其寒濕若果由邪郁成熱者必宜滋陰清火自無不愈其有痢後而成者又名痢後風此以瀉痢亡陰尤宜壯腎凡寒勝者宜三氣飲五積散或大防風湯之類主之濕勝者宜五苓散理中湯之類主之熱勝者宜保陰煎大秦艽湯之類主之若以陽氣不足而敗及四肢者非右歸丸理陰煎及八味地黃丸之類不可立齊曰鶴膝風乃調攝失宜虧損足三陰經風邪乘虛而入以致肌肉日瘦內熱減食肢體攣痛久則膝大而腿細如鶴之膝故爾名之若傷於脾胃者用補中益氣湯為主若傷於肝腎者六味地黃丸為主若欲其作膿或潰後者十全大補湯為主皆佐以大防風湯初起者須用蔥尉法可以內消若津涸口乾中氣不足也補中益氣湯加五味子頭暈頭痛陽氣不升也補中益氣湯加蔓荊子發熱晡熱陰血虛弱也用四物參耆白朮畏寒憎寒陽氣虛弱也用十全大補湯飲食少思胸膈膨脹脾胃虛痞也用四君子湯面色痿黃飲食少思脾胃虛弱也用六君子湯膿水清稀肌肉不生氣血俱虛也用八珍湯熱來復去有時而動無根虛火也用十全大補湯形瘦嗜臥寢息發熱痰盛作渴小便頻數五臟虛損也用六味丸臍腹疼痛夜多漩溺腳膝無力頭暈吐痰腎氣冷敗也用八味丸發熱大渴不欲近衣面目赤色脈大而虛血虛發燥用當歸補血湯或有痢後而患者亦治以前法余當臨證制宜又曰夫立方之義各有所宜凡體氣虛弱邪入骨界遏絶隧道若非用附桂辛溫之藥開散關節腠理之寒邪通暢隧道經絡之氣血決不能愈且本草云附子治寒濕痿躄拘攣膝痛不能行步以白朮佐之為寒濕之聖藥又云桂通血脈消瘀血堅骨節治風痹骨攣腳軟宣導諸藥及十全大補湯以治前證不但不可去桂亦不可不加附子無此二味何以行參耆之功健芎歸之性而補助血氣使之宣通經絡扶大虛之證以收必效之功哉況前證在骨節之間關鍵之地治之不速使血氣循環至此鬱而為膿從此而泄氣血瀝盡無可生之理矣亦有秋夏露臥為寒所襲炥熱內作遂成附骨疽亦有賊風搏於肢節痛徹於骨遇寒尤甚以熱尉之則少減尤當以大防風湯治之更以蒜搗爛攤患處用艾鋪蒜上燒之蒜壞再易皮膚尚破無妨若經久不消則極陰生陽潰而出水必致偏枯或為漏證宜服內塞散及附子餅灸之或脈大或發渴者俱不治以其真氣虛而邪氣實也張上舍患前證伏枕半載流膿三月彼云初服大防風湯去附子將潰服十宣散今用十全大補湯而去肉桂俱不應視其脈證甚弱豫以十全大補湯每帖加熟附子一錢服三十餘劑少愈乃去附子五分又服三十餘劑將愈卻全去附子更三十餘劑而痊一男子左膝腫大三月不潰豫謂體虛之人風邪襲於骨節使氣滯而不行故膝愈大而腿愈細名曰鶴膝風遂以大防風湯三十餘劑而消州守張天澤左膝腫痛胸膈痞悶飲食少思時欲作嘔頭暈痰壅日晡益倦此脾肺氣虛也用蔥尉及六君加炮姜諸證頓退飲食少進用補中益氣加蔓荊子頭目清爽間與大防風湯十餘劑又用補中益氣湯三十餘劑而消薛按多骨疽五十九立齊曰多骨疽者由瘡瘍久潰氣血不能營於患處邪氣陷襲久則爛筋腐骨而脫出屬足三陰虧損之證也用補中益氣湯以固根本若陰火發熱者佐以六味丸壯水之主以鎮陽光陽氣虛寒者佐以八味丸益火之源以消陰翳外以附子餅蔥尉法祛散寒邪補接營氣則骨自脫瘡自斂也夫腎主骨若腎氣虧損其骨漸腫荏苒歲月潰而出骨亦用前法若投以克伐之劑復傷真氣鮮有不誤者下疳瘡六十下疳一證本肝腎濕熱證也若無外因而病者不過去其濕熱或滋真陰濕熱既清其瘡自愈無足慮也惟感觸淫毒而患者毒有淺深則病有微甚皆宜用百草煎熏洗外以螵蛸散敷之則輕者自愈若濕熱甚而為腫為痛者宜用芍藥疾藜煎兼而治之如毒甚者必用萆薢湯方可若感觸淫邪毒自少陰直入精宮者不易愈即治如前法然必見便毒廣瘡發出而後下疳始愈既見瘡毒即當於本證條下求法治之余嘗治一少年因偶觸穢毒遽患下疳始潰龜頸敷治不效隨從馬口延入尿管以漸而深直至肛門逐節腫痛形如魚骨每過夜則膿結馬口脹不得出潤而通之則先膿後尿敷洗皆不能及甚為危懼余嘗遇一山臾傳得槐花蕊方因以治之不十日而莖根漸愈半月後即自內達外退至馬口而全愈疳愈後即見些微廣瘡復以五加皮飲十餘劑而全愈向彼傳方者曰此方善治淫瘡熱毒悉從小便泄去所以能治此疳但服此者可免終身瘡毒後患然猶有解毒奇驗則在瘡發之時但見通身忽有云片紅斑數日而沒者即皆瘡毒應發之處瘡毒已解而瘡形猶見是其驗也豫初未之信及此人瘡發之時瘡固不多而通身紅斑果見凡兩日而沒豫始知瘡之有奇一至如此新按立齊曰下疳屬肝經濕熱下注或陰虛火燥治法腫痛發熱者血虛而有熱也四物湯加柴胡山梔腫痛寒熱者肝經濕熱也小柴胡湯加龍膽草黃連腫痛便澀者濕熱壅滯也龍膽瀉肝湯腫痛腐潰者氣血虛而有火也八珍湯加山梔柴胡日晡熱甚者陰血虛而有火也小柴胡湯加參朮芎歸日晡倦怠者陽氣虛而下陷也補中益氣湯有經久不愈而發寒熱者腎水不能生肝木也宜六味丸若筋縮或縱或為癢痛或出白津此筋疝也用龍膽瀉肝湯氣虛者補中益氣湯加炒山梔炒龍膽陰虛火燥者用六味丸莖中癢出白津用補中益氣湯與清心蓮子飲間服蓋此證肝經陰虛為本腫痛寒熱等證為標須用六味丸以生肝血凡脾土虛不能生金水而見一切肝證者當佐以補中益氣湯加麥門冬以滋化源一男子腫痛不消一男子潰而腫痛發熱小便祕澀日晡或熱一小兒腫痛諸藥不應俱以小柴胡湯吞蘆薈丸數服而愈一小兒十五歲患前證雜用消毒之藥虛證悉具二年餘矣詢之乃稟所致用萆薢湯月餘諸證漸愈又用補陰八珍湯補中益氣二湯而痊庶吉士劉華甫或莖中作痛或竅出白津或小便祕澀先用小柴胡湯加山梔澤瀉黃連木通膽草茯苓二劑以清肝火導濕熱諸證漸愈後因勞倦忽然寒熱此元氣復傷也用補中益氣而安又用六味丸以生肝血滋腎水而全愈一男子玉莖腫痛小便如淋自汗甚苦時或尿血少許尺脈洪數按之則澀先用清心蓮子飲加牛膝山梔黃柏知母柴胡數劑少愈更以滋腎丸一劑而痊玉機微義曰如自汗小便少不可以藥利之既已自汗則津液外亡小便自少若再利之則營衛枯竭無以制火而煩熱愈甚當俟熱退汗止小便自行也兼此證乃陽明經病大忌利小便俱薛按海藏治下疳久不愈方橡斗子二個合盛黃丹令滿以亂髮厚纏定燒煙盡為度同研為細末先用蔥白熱漿水洗瘡膿盡次上藥甚者不過三次如神又下疳方下疳瘡內毒盛者必須治內方愈外治者須螵蛸散或此方亦佳人中白生用官粉煅黃紅丹飛炒上等分為末先用藥湯或濃茶洗淨然後敷藥每日二三次或用豬油或用蜜水調敷之便毒六十一便毒論治如薛氏之法固已詳矣然又惟交感不潔遭淫毒而患者為最多每每先起下疳下疳未已便毒繼之此濕熱穢毒之為患也凡初起腫痛尚未成膿而元氣尚強者速宜先去其毒唯會膿散或牡蠣散為最善若已成膿則或針或蝕惟速去其膿隨因證調補使速收口為善若初起一核其痛微其腫漫者此有二證一以邪輕一以元氣虛弱毒深而然若邪輕者只用會通膏加麝香貼之無有不散或降癰散亦可若元氣虛弱而毒深者既不肯散又不早潰愈久必愈甚最為可畏及其潰後多不能收輕則為瘻重則殞命此惟大補元氣方不致害若焮腫痛甚膿已將成勢不能消宜用降癰散留頭圍之則勢可斂痛可解膿可速成而潰也立齊曰便癰屬足厥陰肝經內熱外寒或勞役過度或房欲不節或欲火不遂或強固其精或肝經濕熱而致大抵多患於勞役不足精氣俱虛之人俗云一石米瘡此言百日方可愈若大補血氣不旬日可愈何用百日蓋瘡之收斂在乎血氣之盛也亦有內蘊熱毒而生者須辨虛實及成膿與否不可概投攻藥凡婦人患此者多在兩拗腫痛或腹中結塊小便澀滯苟治者得法患者又能調攝無足慮也常見治此證者概用大黃之類之下之以求內消或其膿成令膿從大便而出鮮有見其痊也人多欲內消者恐收口之難也若知補養血氣不旬日而收矣何難之有若膿既成豈有可消之理如再用克伐之劑必致難治又曰便癰者血疝也俗呼為便毒言於不便處為癰也乃足厥陰之經絡及衝任督脈亦屬肝之傍絡此氣血流通之道路今壅而腫痛是則熱毒所致宜先疏導其滯更以托裡之劑此臨證制宜之法也又治法曰內熱外寒者牛黃雙解散濕熱壅滯者宜用龍膽瀉肝湯疏肝導滯欲心不遂致逆精氣者先用五苓散加大黃疏其逆滯後用地黃丸以補肝腎強固其精房欲不節者宜六味丸料勞倦過度者補中益氣湯一男子患便毒焮腫作痛大小便祕脈有力以玉燭散二劑頓退更以龍膽瀉肝湯四劑而消一男子膿未成大痛服消毒托裡等藥不應診之脈洪大毒尚在以仙方活命飲一劑痛止又劑而消一儒者腫痛便澀用八正散二劑以清肝火導濕熱而腫痛愈再以小柴胡加芎歸澤瀉山梔二劑以清火補血而小便利一男子已潰而痛不止小便祕澀此肝火未解也與小柴胡加黃柏知母芎歸痛止便利更以托裡當歸湯而瘡斂若毒未解而痛不止者須用活命飲府庠沈尼文年二十左拗患之余以肝腎陰虛先用托裡藥潰而將愈因入房發熱作渴右邊亦作痛膿水清稀虛證悉至脈洪大而無力勢甚可畏用十全大補加附子一錢脈證頓退再劑全退後用大補湯三十劑而愈一男子腫而不潰此因陽氣虛弱用參耆歸術以補托元氣用白芷皂刺柴胡甘草以排膿清肝數劑而潰以八珍加柴胡補其氣血數劑而愈春元凌待之虛而服克伐藥幾至危殆余用托裡健脾藥而愈秀才王文遠因勞苦患之服小柴胡湯而表證散後用托裡藥膿成針之而旬日愈又胡判官膿清脈弱以大補之藥而已愈因新婚復發自用連翹消毒散致瀉痢不止竟致不救可見此證屬不足者多矣非補不可大抵便毒屬肝經初起堅硬肝主筋故也五七日後當赤軟膿成故也若尚堅硬乃元氣不能腐化往往人見堅硬只欲內消反服攻散藥多致虛虛之禍前此治者即其驗也一婦人兩拗腫痛小腹痞滿小便數白帶時下寒熱往來小水淋漓余謂脾氣滯而血病用龍膽瀉肝湯漸愈又用加味逍遙散六味丸而全愈一婦人小腹內如有所梗兩拗並人門俱腫小便淋澀經候不調內熱作渴飲食少思腹內初如雞卵而漸大脈洪數而虛左關尤甚屬肝膽鬱結之證也用加味歸脾湯肝火退而脾土健間以逍遙散下蘆薈丸而愈俱薛按楊梅瘡六十二楊梅瘡一證以其腫突紅爛狀如楊梅故爾名之其在西北人則名為天泡瘡東南人又謂之廣東瘡凡毒輕而小者狀類茱萸故名茱萸瘡毒甚而大者泛爛可畏形如綿花故名綿花瘡大都此證必由淫毒傳染而生蓋此淫穢之毒由精泄之後氣從精道乘虛直透命門以灌衝脈所以外而皮毛內而骨髓凡衝脈所到之處則無處不到此其危害最深最惡設初起時去毒不淨或治失其宜而隨至敗爛殞命者蓋不少矣或至二三十年之後猶然發為瘋毒或至爛頭或至爛鼻或四肢幽隱之處臭爛不可收拾或遺毒兒女致患終身其惡如此靜而思之則有見此惡道而不為寒心知避者其愚亦甚矣故凡治之之法最當知要切不可不慎也亦有不因淫毒傳染偶中濕熱而患者此不過在皮毛肌肉之間清去濕熱自當全愈無足慮也一今人每逢此患或畏人知或畏毒甚而大用攻擊峻利等藥多致邪毒未除而元氣先敗或成勞瘵或即殞命或愈久愈甚以致敗壞不能收斂皆元氣先敗之故也余見之多矣故凡被此病者切不可驚慌亦不可專肆攻擊但按法漸解其毒務使元氣毫無損傷則正能勝邪雖毒無害若正不勝邪則微毒亦能殺人此其要也不可不察一廣瘡治法凡其初起而元陽未傷毒亦未甚宜速用清利使從小便利去其毒惟換肌消毒散為第一其次則五加皮飲亦妙或兼火邪者宜祕萬仙遺糧湯或稟氣多弱者宜茯苓膏凡此諸藥或十日或半月甚者一月無不見效一凡生瘡毒者宜服槐花蕊至二三升則毒從小便泄去可免終身之患真神方也有按在下疳瘡條中此瘡初起時多有先下疳次便毒而後瘡出是為一套若便毒勢甚腫痛熱祕而元氣素強者即宜用會膿散或牡蠣散先去其毒之大勢而後用前方諸藥亦要著也一此瘡或久而不愈或元氣素弱者即宜用會膿散或牡蠣散先去其毒之大勢而後用前方諸藥亦要著也一此瘡或久而不愈或元氣素弱或因克伐致虛但見有正不勝邪之勢則當酌其輕重或以純補元氣為主凡脾腎陰陽氣血皆宜隨證用方但使氣血得復則雖毒無害最忌見不真而執兩端則終歸無益亦是要著一飲食宜否有謂宜忌口者有謂不宜忌口者而任其發透總之亦有其要蓋瘡毒初染毒本未甚此時只宜清利使毒漸消為善若食發物則愈發愈多而毒愈甚矣此則宜忌之時也若瘡毒已久元氣已弱膿汁既多血氣既耗斯時也非以藥食滋補則日見消敗何以收效此則不宜忌者也宜忌不宜忌是亦宜補不宜補之法耳使不知辨安能無誤一瘡生頭面或遍身不便處欲其速愈但用點藥則二三日可以脫落亦神妙者也但此惟治標之法耳方在新因四十二一瘡毒久蓄發為瘋毒亦名楊梅癰漏或蝕筋或腐骨潰爛不收最為惡候近來治法惟五寶丹為最效及徐東皋楊梅癰漏方或祕傳水銀膏宜擇用之立齊曰天泡瘡屬元氣不足邪氣所乘亦有傳染而患受證在肝腎二經故多在下體發起有先筋骨痛而後患者有先患而後痛者有瘡凸赤作痛熱毒熾甚也瘡微作痛毒將殺也瘡色白而不結痂陽氣虛也色赤而不結痂陰血虛也瘙癢脈虛浮氣不相榮也瘙癢脈浮數血不相榮也臀背間或頸間作癢膀胱陰虛也陰器股內作癢肝經血虛也陰囊作癢重墜肝經陰虛濕熱也小便頻數短少色赤肝經陰虛也小便頻數短少色白脾肺氣虛也面目搔癢或變赤外邪相搏也眉間癢或毛落肝膽血燥也飲食少思口乾飲湯胃氣虛也飲食不化大便不實脾氣虛也清晨或夜間泄瀉脾腎虛也又治法曰若表實者先用荊防敗毒散解散之裡實者先用內疏黃連湯通導之表裡俱實者防風通聖散雙解之邪熱在肝經者龍膽瀉肝湯清解之後用換肌消毒散為主愈後再無筋骨疼痛之患氣虛者四君子湯血虛者四物湯氣血俱虛者八珍湯俱加兼證之藥治之自無不愈若治失其法有蝕傷眼目腐爛玉莖拳攣肢體者但用九味蘆薈丸以清肝火六味丸以生腎水蠲痹消毒散以養血祛邪亦有可生者若服輕粉等藥反收毒於內以致迭發或概服防風通聖散氣血愈虛因而不治者多矣凡有腫硬或作痛外用蒜灸及敷沖和膏內服補藥並效一男子遍身皆患脈浮而數以荊防敗毒散治之表證乃退以仙方活命飲六劑瘡漸愈兼飲萆薢湯月餘而愈一男子下部生疳諸藥不應延及遍身突腫狀似番花筋攣骨痛至夜尤甚此肝腎二經濕熱所致先以導水丸五服次以龍膽瀉肝湯數劑再與除濕健脾之藥外貼神異膏吸其膿隔蒜灸拔其毒而愈一童子玉莖患之延及小腹數枚作痛發熱以小柴胡湯吞蘆薈丸更貼神異膏月餘而安一儒者患前證先玉莖作癢出水後陰囊股內小腹脅臂發小㿔或干或膿窠誤服祛風等藥肢體倦怠惡寒發熱飲食漸減大便不實脈見浮弦兩尺浮數此腎水虛熱肝木乘脾土也用六味地黃丸補中益氣湯為主佐以換肌消毒散而愈一人患此服攻毒等藥患處凸而色赤作痛肢體倦怠惡寒發熱脈浮而虛此元氣復傷而邪氣實也用補中益氣湯二劑而愈進士劉華甫患之數月用輕粉硃砂等藥頭面背臀各結一塊二寸許潰而形氣消弱寒熱口乾舌燥唇裂小便淋漓痰涎上壅飲食少思此脾胃傷諸臟弱而虛火動也先用六君子二十餘劑又用補中益氣湯加山藥山茱萸麥門冬五味服之胃氣復而諸證愈惟小便未清痰涎未止用加減八味丸而痊一男子患楊梅瘡後兩腿一臂各潰二寸許一穴膿水淋漓少食無睡久而不愈以八珍湯加茯神棗仁炒服每日以蒜搗爛塗患處灸良久隨貼膏藥數日少可卻用豆豉餅灸之更服十全大補湯而愈一婦人患之皆愈惟兩腿兩臁各爛一塊如掌兼筋攣骨痛三載不愈諸藥不應日晡熱甚飲食少思以萆薢湯兼逍遙散倍用茯苓白朮數劑熱止食進貼神異膏更服八珍湯加牛膝杜仲木瓜三十餘劑而痊一婦人患此燃輕粉藥於被中熏之致遍身皮塌膿水淋漓不能起居以滑石黃柏緑豆粉末等藥鋪席上令可臥更服神功托裡散月餘而痊俱薛按囊癰六十三立齊曰囊癰屬肝腎二經陰虛濕熱下注也腫痛未作膿者疏肝導濕腫硬發熱者清肝降火已潰者滋陰托裡大抵此證屬陰道虧濕熱不利所致故滋陰除濕藥不可缺常治腫痛小便祕澀者用除濕為主滋陰佐之腫痛已退便利已和者除濕滋陰藥相兼用之欲其成膿用托裡為主滋陰佐之候膿成即針之仍用托裡滋陰濕毒已盡者專用托裡如膿清或多或斂遲者用大補之劑及豆豉餅灸之若潰後虛而不補少壯者成漏老弱者不治膿清作渴脈大者亦不治又法曰若小便澀滯者先用分利以泄其毒繼補陰以令其自消若濕熱退而仍腫痛宜補陰托裡以速其膿膿腫而便祕者熱毒壅閉也先用托裡消毒散後用針以泄之膿去即解若膿去而腫痛不減者熱毒未解也用清肝益營湯口乾而小便數者腎經虛熱也六味丸內熱晡熱者肝經血虛也四物加參術體倦食少者脾氣虛熱也補中益氣湯膿水清稀者氣血俱虛也十全大補湯此證雖大潰而睪丸懸露治得其法旬日間肉可漸生而愈若專攻其瘡陰道益虛則腫者不能潰潰者不能斂少壯者成痼疾老弱者多致不起亦有患痔久漏而串及於囊者當兼治其痔切忌寒藥克伐虧損胃氣馬益卿曰囊癰者濕熱下注也有作膿者此濁氣下流入滲道因陰道或虧水道不利而然膿儘自安不藥可也惟在善於調攝耳又有因腹腫漸流入囊腫甚而囊自裂開睪丸懸掛水出以麩炭末敷之外以紫蘇包裹仰臥而養之癰疽入囊者豫嘗治數人悉以濕熱入肝經施治而用補陰佐之雖膿潰皮脫睪丸懸掛皆不死一男子患此未作膿而腫痛以加味龍膽瀉肝湯二劑少愈更以四物湯加木通知母黃柏而愈一男子焮腫痛甚小便澀發熱脈數以龍膽瀉肝湯倍用車前子木通茯苓四劑勢去其半仍用前湯止加黃柏金銀花四劑又減二三便利如常惟一處不消此欲成膿也再用前湯加金銀花白芷皂角刺六劑微腫痛脈滑數乃膿已成令針之腫痛悉退投滋陰托裡藥及蘇葉末敷之而愈一膏粱之客陰囊腫脹小便不利此中焦積熱乘虛下注先用龍膽瀉肝湯加黃柏牛膝四劑漸愈後用補陰八珍湯加柴胡山梔而愈後不守禁忌前證復作仍用補陰八珍湯補中益氣湯六味丸而痊又因勞倦發熱自用四物黃柏知母之類虛證悉具瘡口大開余謂五臟氣血俱虛也朝用補中益氣夕用六君加當歸各五十餘劑瘡口始斂又用六味丸調補而愈儒者陳時用考試不利一夕飲燒酒入房其妻不納翌日陰囊腫脹焮痛遣人求治與清肝火除濕熱之劑城門夜閉不及歸服翌日報云夜來陰囊悉腐玉莖下面貼囊者亦腐此肝火挾酒毒而濕熱熾盛也仍以清肝火除濕之劑加參耆歸術四劑腐肉盡脫睪丸懸掛用大補氣血並塗當歸膏囊莖全復而愈一男子醉而入房陰囊腫脹大如斗小腹脹悶小水淋赤發熱口乾痰涎壅盛此膀胱陰虛酒毒所乘也用六味丸料加車前牛膝作飲下滋腎丸諸證頓退再加五味麥冬二劑而愈卻以補中益氣加麥冬五味調理而瘳若全用淡滲復損真陰決致不起俱薛按懸癰六十四立齊曰懸癰謂瘡生於玉莖之後穀道之前屬足三陰虧損之證輕則為漏瀝盡氣血而亡重則內潰而即殞大抵此證原屬肝腎陰虛故不足之人多患之雖一於補猶恐不治況膿成而又克伐不死何俟即寒涼之劑亦不可過用恐傷胃氣惟制甘草一藥不損血氣不動臟腑其功甚捷最宜用之不可忽也焮痛或發熱者清肝解毒腫痛者解毒為主腫痛而小便赤澀者肝經濕熱也宜分利清肝不作膿或不潰者氣血虛也宜補之又治法曰凡初起濕熱腫痛或小便赤澀宜先以制甘草一二劑及隔蒜灸更飲龍膽瀉肝湯焮腫痛甚宜仙方活命飲以制甘草佐之若發熱腫痛者以小柴胡湯加車前黃柏芎歸若不成膿或膿成不潰者八珍湯補之若膿已成者急針之已潰者用八珍湯加制甘草柴胡梢酒炒黃柏知母小便澀而脈有力者仍用龍膽瀉肝湯加制甘草小便澀而脈無力者清心蓮子飲加制甘草膿清不斂者用大補之劑間以豆豉餅灸之久而不斂者用附子餅灸之並效欲其生肌收斂腎虛者六味地黃丸血虛者四物加參術氣虛者四君加芎歸脾虛者補中益氣湯氣血俱虛者八珍湯並十全大補湯若用寒涼消毒則誤矣陳良甫曰治穀道前後生癰謂之懸癰用粉甘草一兩截斷以澗水浸潤炙令透內細銼用無灰酒煎服有人患此已破服兩劑瘡即合一弱人莖根結核如大豆許勞則腫痛先以十全大補湯去桂加車前麥冬酒製黃柏知母少愈更服制甘草漸愈仍以四物車前之類而消一男子患此焮痛發熱以龍膽瀉肝湯二劑及制甘草四劑而潰再用滋陰之劑而愈若或膿未成以蔥炒熟敷上冷即易之隔蒜灸之亦可數日不消或不潰或潰而不斂以十全大補湯加柴胡梢為主間服制甘草並效若不保守必成漏矣一儒者患懸癰服坎離丸及四物黃柏知母之類不應脈浮洪按之微細余以為足三陰之虛用托裡散及補陰八珍湯漸愈又用六味丸補中益氣湯調補化源半載而痊大凡瘡瘍等證若腎經火氣亢盛致陰水不能生化而患陰虛發熱者宜用坎離丸取其苦寒能化水中之火令火氣衰而水自生若陽氣衰弱致陰水不能生化而患陰虛發熱者宜用六味丸取其酸溫能生火中之水使陽氣旺而陰自生況此證屬腎經精氣虧損者十有八九屬腎經陽氣亢盛者十無一二然江南之人患此者多屬脾經陰血虧損元氣下陷須用補中益氣湯升補陽氣使陽生而陰長若嗜欲過多虧損真陰者宜用六味丸補腎經元氣以生精血仍用補中益氣湯以培脾肺之生氣而滋腎水經云陰虛者脾虛也但多誤認為腎經火證用黃柏知母之類復傷脾肺絶其化源反致不起惜哉通府張敬之患前證久不愈日晡熱甚作渴煩而喘或用四物湯黃柏知母之類病益甚肢體倦少食大便不實小便頻數謂余曰何也余曰此脾虛之證前藥復傷而然遂用補中益氣湯加茯苓半夏數劑飲食漸進前證漸愈更加麥冬五味調理乃痊經曰脾屬太陰為陰土而主生血故東垣云脾虛元氣下陷發熱煩渴肢體倦怠等證用補中益氣湯以升補陽氣而生陰血若誤認為腎虛火盛而用四物黃柏知母之類反傷脾胃生氣是虛其虛矣況黃柏知母乃瀉陽損陰之劑若非膀胱陽火盛而不能生陰水以致發熱者不可用也俱薛按脫疽六十五立齊曰脫疽以疔患於足或足趾重者潰脫故名之亦有患於手指者名曰蛀節疔重者腐去本節輕者筋攣此證固膏粱厚味酒面炙爆積毒所致或不慎房勞腎水枯竭或服丹石補藥致有先渴而後患者有先患而後渴者皆腎水虧涸不能制火也此證形勢雖小其惡甚大不問腫潰皆須隔蒜灸之不痛者宜明灸之庶得少殺其毒凡初發而色黑不潰者不治毒延入腹者不治色黑不痛者亦不治色赤作痛自潰者可治若失解其毒以致肉死色黑者急斬去之亦有因修手足口咬等傷而致者若元氣虛弱或犯房事或外塗寒涼內服克伐損傷脾胃以致患處不潰或黑延上足亦多致死重者須當用腳刀轉解周骨輕拽去之使筋隨骨出而毒得泄亦不痛否則毒筋內斷雖去而仍潰且偏僻之處氣血罕到藥難導達況攻毒之劑必先傷脾胃反損元氣不若灸法為良重者須解去為善故孫真人云在肉則割在指則截使不如此則必致夭歿而害尤甚矣況患處已壞雖解不痛又何憚而不為乎患者當知之若女人患此又多因札縛血脈不通遂成死肉惟當壯其脾胃行其經絡生其血氣則愈又治法曰色赤作痛者元氣虛而濕毒壅盛也先用隔蒜灸更用解毒藥如活命飲托裡散之屬仍速用補劑如十全大補湯加減八味丸則毒氣不致上侵元氣不致虧損庶可保生作渴者宜滋陰降火色黑者不治崔氏方治手足甲疽或因修甲傷肉或因損足成瘡潰爛上腳用緑礬置鐵板上煅沸色赤如溶金色者為真沸定取出研末以鹽湯洗而搽之一男子足趾患之焮痛色赤發熱隔蒜灸之更以人參敗毒散去桔梗加金銀花白芷大黃二劑痛止又用十宣散去桔梗官桂加天花粉金銀花數劑而痊一男子足趾患之色紫不痛隔蒜灸五十餘壯尚不知痛又明灸百壯始痛更投仙方活命飲四劑乃以托裡藥潰脫而愈一膏粱之人先作渴足熱後足大趾赤痛六脈洪數而無力左尺為甚豫謂此足三陰虛證當滋化源為主彼固服除濕敗毒等劑元氣益虛色黯延足余乃朝用補中益氣湯夕用補陰八珍湯各三十餘劑及桑枝灸潰而膿清作渴不止遂朝以前湯送加減八味丸夕用十全大補湯三十餘劑而痊是時同患此證服敗毒之藥者俱不效一膏粱人年逾五十亦患此色紫黑腳焮痛喜其飲食如故動息自寧為瘡瘍之善證尚可治遂以連翹消毒散六劑更以金銀花甘草節栝蔞二十餘劑患指潰脫再以當歸川芎連翹生地金銀花白芷二十餘劑而愈一芻蕘左足趾患一泡麻木色赤次日趾黑五日其足黑冷不知疼痛脈沉細此脾胃受毒所致以飛龍奪命丹一服翌日令割去足上死肉割後骨始痛而可救遂以十全大補湯治之而愈蓋死肉乃毒氣盛而拒絶營氣所致況至陰之下氣血難達經曰風淫末疾即此是也向若攻伐之則元氣愈盛邪氣愈盛乘虛上侵必致不救俱薛按腳發六十六立齊曰腳發之證屬足三陰精血虧損或足三陽濕熱下注若色赤腫痛而潰膿者屬濕熱下注為可治若色微赤微腫而膿清者屬精血虧損為難治若黑黯不腫痛不潰膿煩熱作渴小便淋漓者陰敗末傳惡證也為不治治法濕熱下注者先用隔蒜灸活命飲以解壅毒次服益氣湯六味丸以補精氣若色黯不痛者著肉灸桑枝灸以行壅滯助陽氣更用十全大補湯八味丸以壯脾土滋化源多有生者若專治其瘡復傷生氣吾未見其生者閣老靳介庵腳趾縫作癢出水腫焮腳面敷止癢之藥不應服除濕之藥益甚余以為陰虛濕熱下注用六味地黃丸補中益氣湯而愈大參李北溪左足赤腫作痛此足三陽經濕熱下注先用隔蒜灸與活命飲一劑其痛頓止灸患處出水赤腫頓消次用托裡消毒散四劑灸患處出膿而愈一儒者患此腫硬色白兩月餘矣此足三陰虧損為外寒所侵也用大防風湯及十全大補湯兼服而消後場屋不利飲食勞倦前證復作盜汗內熱飲食不化便滑肌瘦此脾土虛寒而命門火不能相生用八味丸益氣湯百餘劑喜其年壯得愈一男子腳心發熱作渴引飲或用四物芩連知柏之類腹痛作嘔煩熱大渴此足三陰虧損前藥復傷脾胃也先用六君加炮姜數劑而脾胃醒再用補中益氣加茯苓半夏而脾胃健乃以加減八味丸兼服半載而愈一儒者腳心發熱作癢以滾湯浸漬而出水肌體骨立作渴吐痰此脾腎虛而水泛為痰也服益氣湯六味丸年餘元氣復而諸證愈俱薛按足跟瘡六十七立齊曰足跟乃督脈發源之所腎經所過之地若飲食失節起居失宜虧足三陰經則成瘡矣若漫腫寒熱或體倦少食屬脾虛下陷也用補中益氣湯若晡熱作痛頭目不清屬脾虛陰火也前湯並六味丸若痰涎上升或口舌生瘡屬腎水乾涸也前湯並加減八味丸凡此皆當滋其化源若治其外則誤矣俗云兔齧瘡者蓋獵人被兔咬足跟或瘡久而不斂必氣血瀝盡而死若人腳跟患此亦終難愈因名兔齧也一男子素不慎起居內熱引飲作渴體倦兩足發熱後足跟作痛或用清熱除濕之劑更加發腫又服敗毒之藥焮赤痛甚復用清熱祛毒潰裂番張狀如赤榴熱痛如錐內熱晡熱此以足三陰虧損朝用十全大補湯夕用加減八味丸外敷當歸膏兩月餘而愈其服消毒等藥而歿者不能枚舉太尹陳汝鄰兩腿痠軟或赤或白足跟患腫或痛或癢後痛而或如無皮或如皺裂日晡至夜脹痛焮熱用補中益氣湯加八味丸料補其肝腎而愈一男子患足跟瘡腫痛服消毒散搽追蝕藥虛證疊出形體骨立自分必死余用十全大補湯兼山藥山茱萸兩月餘而愈一婦人兩足發熱兩跟作痛日晡熱甚余以為肝腎血虛用加減逍遙散六味地黃丸五十餘劑而愈楊錦衣腳跟生瘡如豆許痛甚狀似傷寒以還少丹內塞散治之稍可次因納寵作痛反服攻毒藥致血氣愈弱腿膝痿弱而死蓋足跟乃二蹻發源之處腎經所由之地若瘡口不合則蹻氣不能發生腎氣由此而泄故為終身之疾況彼瘡先得於虛復不知戒雖大補氣血猶恐不及安可服暴悍攻毒之藥以戕賊之乎俱薛按腎藏風瘡六十八立齊曰腎藏風屬腎虛風邪乘於臁脛以致皮膚如癬或漸涎上腿久則延及遍身外證則搔癢成瘡膿水淋漓眼目昏花內證則口燥舌乾腰腿倦怠吐痰發熱盜汗體疲治法用六味丸為主佐以四生散若脾胃虛弱者用補中益氣湯為主佐以六味丸四生散為善欽天薛循齊年六十有一兩臁患之膿水淋漓發熱吐痰四年矣此腎臟風證也與六味丸四生散而瘥年餘復作延及遍身日晡益甚痰渴盜汗唇舌生瘡兩目昏赤皆腎經虛火而水泛為痰也用加減八味丸而愈三年後小便淋瀝莖中澀痛此思色精不出而內敗也用前丸及補中益氣湯加麥冬五味而愈薛按一凡腎囊濕癢抓破成瘡俗名腎上風也外治之法但以黃丹枯礬生牡蠣共為末搽擦即愈或以蛇床子同白礬煎湯洗之亦可臁瘡六十九立齊曰臁瘡生於兩臁初起赤腫久而腐潰或浸淫瘙癢破而膿水淋漓蓋因飲食起居虧損肝腎或因陰火下流外邪相搏而致外臁屬足三陽濕熱可治內臁屬足三陰虛熱難治若初起惡寒壯熱焮腫作痛者屬濕熱用檳蘇散若漫腫作痛或不腫不痛者屬陰虛用補陰八珍湯若膿水淋漓體倦食少內熱口乾者屬脾虛用補中益氣湯加茯苓酒炒白芍藥若午後熱或作痛頭目不清者屬陰水前湯加酒炒黑黃柏及六味地黃丸若午後發熱至子時方止是血虛前湯加芎歸熟地若鬱結傷脾而甚者用歸脾湯加柴胡山梔若怒動肝火而甚者用補中益氣湯加川芎山梔黃芩若內熱口乾肢體倦怠或痰涎上升或口舌生瘡屬脾腎虛熱用六味地黃丸補中益氣湯若患處黑黯肢體畏寒飲食少思屬脾腎虛敗用八味地黃丸若誤用攻伐復損胃氣絶其化源治亦難矣鴻臚翟少溪兩臁生瘡漸至遍身發熱吐痰口燥咽乾盜汗心煩溺赤足熱日晡益甚形體日瘦此腎經虛火也用六味丸不一月諸證悉退三月元氣平復陳湖陸懋誠素因陰虛過飲入房發熱腿痛似臁瘡用發表之劑兩腿腫黯熱氣如霧欲發痙脈皆洪數兩尺尤大余曰屬足三陰虛酒濕所乘元氣損而邪益甚耳用十全大補加山藥山茱萸附子一劑脈證頓退卻去附子又二劑全愈薛按天泡瘡七十天泡瘡形如水泡皮薄而澤或生頭面或生遍身乃太陰陽明風熱所致故見於皮毛肌肉之間宜清血涼血熱解則愈如兼表邪而發熱脈數者宜荊防敗毒散如火盛者或加芩連連翹金銀花玄參之屬如焮腫疼痛脈數便結者此表裡俱實也宜防風通聖散雙解之如外多毒水以金黃散敷之無有不愈赤白遊風七十一立齊曰赤白遊風屬脾肺氣虛腠理不密風熱相搏或寒閉腠理內熱拂鬱或因虛火內動外邪所乘或肝火血熱風熱所致治法若風熱用小柴胡湯加防風連翹血熱用四物湯加柴胡山梔丹皮風熱相搏用荊防敗毒散內熱外寒用加味羌活湯胃氣虛弱用補中益氣湯加羌活防風及消風散血虛用加味逍遙散陰虛逍遙散六味丸肝腎虛熱用六味丸則火自息風自定癢自止若用祛風辛熱之劑則肝血愈燥風火愈熾元氣愈虛腠理不閉風客內淫腎氣受傷相火翕合血隨火耗反為難治矣一男子秋間發疙瘩此元氣虛而外邪所侵也先用九味羌活湯二劑又用補中益湯加羌防而愈後不慎起居盜汗晡熱口乾唾痰體倦懶言用補中益氣湯加減八味丸而愈一婦人身如丹毒搔破膿水淋漓熱渴頭暈日晡益甚用加味逍遙散而愈一女子赤暈如霞作癢發熱用加味小柴胡湯加生地連翹丹皮而愈俱薛按翻花瘡七十二立齊曰翻花瘡者由瘡瘍潰後肝火血燥生風所致或瘡口胬肉突出如菌大小不同或出如蛇頭長短不一治法當滋肝補氣外塗藜蘆膏胬肉自入須候元氣漸復膿毒將盡塗之有效不然雖入而復潰若誤用刀針蝕藥灸火其勢益甚或出血不止必致寒熱嘔吐等證須大補脾胃為善判官張承恩內股患癰將愈翻出一肉如菌余曰此屬肝經風熱血燥當清肝熱養肝血彼為不然乃內用降火外用追蝕而復翻翻而復蝕其肉益大元氣益虛始信余言遂內用梔子清肝散外用藜蘆膏而痊一上舍素膏粱善怒耳下結一核從潰而瘡口翻張如菌焮連頭痛或胸脅作脹或內熱寒熱或用清熱消毒之藥年餘未瘥余用補中益氣湯六味地黃丸而尋愈一男子背瘡斂如豆許翻出肉寸余用消濁割擊法屢去屢大此肝經血虛風熱余用加味逍遙散三十餘劑塗藜蘆膏而消又用八珍湯倍用參耆歸術而斂一婦人素善怒臂患癰瘡口出肉長二寸許此肝腎鬱怒氣血虛而風內動也用加味逍遙散塗藜蘆膏而愈後因怒患處脹悶遍身汗出如雨此肝經風熱風能散氣故耳仍用前散並八珍湯而愈俱薛按痔漏七十三附臟毒下血按丹溪曰漏瘡須先服補藥以生氣血即參耆歸術芎大劑為主外以炮附子為末唾津和為餅如三錢厚安瘡上以艾炷灸之漏大艾炷亦大漏小艾炷亦小但灸令微熱不可令痛干前易之如因則止來日如前再灸直至肉平為效亦有用附片灸之以補氣血藥作膏貼之立齊曰痔屬肝脾腎三經凡陰經虧損者難治多成漏證若肺與大腸二經風熱濕熱者熱退自愈若不守禁忌者亦成漏證此因醉飽入房筋脈橫解精氣脫泄熱毒乘虛流注或淫極強固其精以致木乘火勢而侮金或炙爆厚味過多或勞傷元氣陰虛火熾皆成斯疾若破而不愈即成漏矣有串臀者有患陰者有患腸者有穢從瘡口而出者形雖不同治頗相似其腸頭腫成塊者濕熱也作痛者風熱也大便燥結者火也潰而為膿者熱勝血也當各推其所因而治之治法曰初起焮痛便祕小便不利者宜清熱涼血潤燥疏風若氣血虛而為寒涼傷損者宜調養脾胃滋補陰精大便祕澀或作痛者潤燥除濕肛門墜痛者瀉火導濕下墜腫痛而癢者祛風勝濕小便澀滯腫痛者清肝導濕其成漏者養元氣補陰精為主大凡痔漏下血服涼血藥不應者必因中氣虛不能攝血非補中升陽之藥不能愈切忌寒涼之劑亦有傷濕熱之食成腸澼而下膿血者宜苦寒之劑內疏之脈弦絶澀者難治滑大柔和者易治經云因而飽食筋脈橫解腸澼為痔其屬肝脾腎也明矣若有患痔而兼疝患疝而兼下疳皆屬肝腎不足之變證但用地黃丸益氣湯以滋化源為善若專服寒涼治火者無不致禍一男子患痔成漏每登廁則痛以秦艽防風湯加條芩枳殼四劑而愈以四物加升麻芩連荊防不復作一男子患痔漏每登廁則肛門下脫作痛良久方收以秦艽防風湯數劑少愈乃去大黃加黃耆川芎芍藥而痛止更以補中益氣湯二十餘劑後再不脫一儒者膿血淋漓口乾作渴晡熱便血自汗盜汗余謂此肝腎陰虛也不信仍服四物芩連知柏之類食少泄嘔余先用補中益氣湯加茯苓半夏炮姜脾胃漸醒後用六味丸朝夕服兩月餘諸證悉愈一男子患此服寒涼之劑清晨去後不實食少體倦口乾作渴小腹重墜余用補中益氣湯而下墜頓止用四神丸而食進便實用地黃丸而瘡尋愈俱薛按一男子臟毒下血服寒涼敗毒藥不惟不能止且飲食日減肢體愈倦脈數而澀先以補中益氣湯數劑少止更以六君子湯加升麻炮姜四劑而止乃去炮姜加芎歸月餘脾胃亦愈嘗治積熱成風下血者先以敗毒散散之胃寒氣弱者用四君子湯或參苓白朮散補之並效一男子臟毒下血脾氣素弱用六君子湯加芎歸枳殼地榆槐花治之而愈後因謀事血復下諸藥不應余意思慮傷脾所致遂投以歸脾湯四劑而痊大抵此證所致之由不一當究其因而治之丹溪云芎歸湯一劑乃調血之上品熱加赤茯苓槐花冷加白茯苓木香此則自根自本之論也雖然血氣出於穀氣故大腸下血以胃藥收功宜四君子湯或參苓白朮散以枳殼散小烏沉湯和之胃氣一回血自循經絡矣凡腸風者邪氣外入隨感隨見臟毒者蘊積毒久而始見又云人惟坐臥風濕醉飽房勞生冷停寒酒面積熱以致營血失道滲入大腸此腸風臟毒之所由作也挾熱下血者清而色鮮挾冷下血者濁而色黯清則為腸風濁者為臟毒先便而後血者其來遠先血而後便者其來近治法大要先當解散脾胃風邪熱則敗毒散冷則不換金正氣散加川芎當歸後隨其冷熱治之一婦人素患痔漏每因熱則下血數滴以四物湯加黃連治之即愈後為大勞瘡發腫痛經水不止脈洪大無力此勞傷血氣火動而然也用八珍湯加芩連蒲黃二劑而止後去蒲黃芩連加地骨皮數劑而安丹溪曰婦人崩中者由臟府傷損衝任二脈血氣俱虛故也若勞動過極臟府俱傷以致衝任氣虛不能約制經血故忽然而下謂之崩中暴下治宜大補氣血之藥舉養脾胃微加鎮墜心火之劑以治其心補陰瀉陽經自正矣俱薛按論外通用方枯痔水澄膏如神千金方三品錠子羊膽膏熊膽膏外水銀棗子膏蝸牛膏一方凡痔瘡初起痛癢不止以舊布鞋底烘熱頻頻尉之冷則再烘再尉其痛癢則止灸法命門灸七壯治五種痔漏長強灸隨年壯治五痔便血最效一法治痔疾大如胡瓜貫於腸頭發則疼痛僵仆先以荊芥湯洗之次以艾灸其上三五壯若覺一道熱氣貫入腸中必大瀉鮮血穢血一時許覺痛甚後其疾乃愈跌打損傷七十四凡跌打損傷或從高墜下惡血流於內不分何經之傷皆肝之所主蓋肝主血也故凡敗血凝滯從其所屬而必歸於肝多在脅肋小腹者皆肝經之道也若其壅腫痛甚或發熱自汗皆當酌其虛實而以調血行經之藥治之脈法如內經曰肝脈搏堅而長色不青當病墜若搏因血在脅下令人嘔逆金匱云寸口脈浮微而澀然當亡血若汗出設不汗出者當身有瘡被刀斧所傷亡血故也脈經云金瘡出血太多其脈虛細沉小者生浮數實大者死砍刺出血不止其脈來大者七日死滑細者生從高顛仆內有瘀血腹脹脈堅強者生小弱者死破傷有瘀血在內者脈堅強實則生虛小弱則死若血亡過多者脈細小則生浮大數實則死皆為脈病不相應故也一治法凡胸滿脅脹者宜行血老弱者宜行血活血腹痛者宜下血瘀血不潰或潰而不斂宜大補氣血若打撲墜墮稍輕別無瘀血等證而疼痛不止者惟和氣血調經脈其痛自止更以養氣血健脾胃則無有不效亦有痛傷胃氣作嘔或不飲食者以四君子湯加當歸砂仁之類調之若有瘀血不先消散而加補劑則成實實之禍設無瘀血而妄行攻利則致虛虛之禍故凡此證須察所患輕重有無瘀血及元氣虛實不可概行攻下致成敗證蓋打撲墜墮皮肉不破肚腹作痛者必有瘀血在內宜以復元活血湯攻之老弱者四物湯加紅花桃仁穿山甲補而行之若血去多而煩燥此血虛也名曰亡血宜補其血如不應當以獨參湯補之一凡損傷不問老弱及有無瘀血停積俱宜服童便以酒佐之推陳致新其功甚大若脅脹或作痛或發熱煩燥口乾喜冷惟飲熱童便一甌勝服他藥他藥雖亦可取效但有無瘀血恐不能盡識反致誤人惟童便不動臟腑不傷氣血萬無一失嘗詢之諸營操軍常有墜馬傷者何以愈之俱對曰惟服熱童便即愈此其屢試之驗亦明矣然惟胃虛作嘔及中寒泄瀉者不可服大凡腫痛或傷損者以蔥搗爛炒熱罨之或用生薑蔥白同搗爛和麵炒熱罨之尤妙或用生薑陳酒糟同搗爛炒熱罨之亦可外治損傷諸方如祕傳正骨丹沒藥降聖丹當歸導滯散黑丸子本事接骨方十味沒藥丸洗損傷等十餘方俱有妙用所當詳察立齊曰豫於壬申年被重車碾傷悶瞀良久復蘇胸滿如築氣息不通隨飲熱童便一碗胸寬氣利惟小腹作痛吾鄉銀臺徐東濠先生與復元活血湯一劑便血數升腫痛悉退更服養血氣藥而痊戊辰年公事居庸見覆車被傷者七八人仆地呻吟一人未蘇豫俱令以熱童便灌之皆得無事杖瘡七十五杖瘡一證凡其甚者必以瘀血為患血瘀在外者淺則砭之深則刺之內潰者開之腐肉者取之血瘀在內者宜以活血流氣之藥和之甚者利之行之此治血凝之法也然其受刑之時號叫則傷氣忍痛則傷血悲憤則傷志血氣情志俱傷虛所必至若不培補則羸困日甚矣況脾主肌肉脾氣受傷則飲食必減血脈損壞則肌肉俱病故凡即傷之後但察其虛多滯少者則宜以參耆歸朮熟地甘草之屬專理脾氣以托氣血脾健則元氣日復肌肉自生可保無虞矣其有傷筋骨而作痛者宜沒藥降聖丹治之若牙關緊急或腰背反張者以玉真散治之並效總之此證宜先察其有瘀無瘀及形氣虛實酌而治之凡諸變證治法有未盡者宜與前跌打損傷條互參通用外杖瘡四方見外科方中文刑部用晦伏闕諫南巡受杖瘀血已散壞肉不潰用托裡之藥稍潰而膿清此氣血虛也非大劑參耆不能補文君亦善醫以為恐腹滿豫強之而飲食稍思遂加大補劑飲食日進肉潰膿稠而愈又治江翰林諸公與文同事者九人皆先散其瘀血漸用排膿托裡之藥俱愈夏鳳北京人因杖瘡臀膝通潰膿瘀未出時發昏憒此膿毒內作而然也急與開之昏憒愈甚此虛也以八珍湯一服少可數服死肉自腐頓取之令用獵蹄湯洗淨以神效當歸膏塗貼再以十全大補湯兩月而愈若更投破血之劑則危矣薛按破傷風七十六病機云破傷風者有因卒暴傷損風寒襲之傳播經絡致使寒熱更作身體反張口噤不開甚者邪氣入臟有因諸瘡不瘥營衛俱虛肌肉不生瘡眼不合邪亦能外入於瘡為破傷風之候有諸瘡不瘥舉世皆言著灸為上是為熱瘡而不知火熱客毒逐經為變不可勝數微則發熱甚則生風而搐或角弓反張口噤目斜亦有破傷不灸而病此者因瘡著白痂瘡口閉塞氣難通泄故陽熱易為鬱結熱甚則生風也徐用城曰此論所因有四二者因瘡口入風似屬外因一者因灸生熱似屬不內外因一者因瘡口閉塞內熱生風似屬內因也又云破傷風證古方藥論甚少豈非以此疾與中風同論故不另立條目也惟河間論與傷寒表裡中三法同治其言病因有因外傷於風者有因灸者有因內熱所作者然與中風相似也但中風之人尚可淹延歲月而破傷風者犯之多至不救蓋中風有在經在腑在臟之異獨入臟者最難治破傷風或始而出血過多或瘡早閉合瘀血停滯俱是陰虛受病乃五臟之所主故此風所傷始雖在表即隨必傳入臟故多死也此病或因瘡口坦露或因瘡口閉密皆能為之若病已十分安全而忽有此大抵皆由內氣虛而有鬱熱者乃得之若內氣壯實而無鬱熱者雖害而無所害也立齊曰大法破傷中風風熱燥甚怫鬱在表而裡氣尚平者必善伸數缺筋脈拘急時或惡寒或筋惕而播脈浮數而弦皆表證也宜以辛熱治風之藥開散結滯是與傷寒表熱怫鬱而以升麻湯辛熱發散者同也然凡用辛熱開其風熱結滯者宜用寒藥佐之則免其藥雖中病而風熱轉甚也如治傷寒發熱用麻黃桂枝而加黃芩知母石膏之類是也若近世以甘草滑石蔥豉寒藥發散甚妙若表病不已漸傷入里里又未太甚而脈在肌肉者宜以退風熱開結滯之寒藥調之或微加治風辛熱亦得猶傷寒在半表半裡而以小柴胡和解之意也若裡熱已甚而舌強口噤項背反張驚搐惕搦涎唾稠黏胸腹滿塞或便溺閉結或時汗出脈洪數而弦然汗出者由風熱甚於里而表邪已罷腠理疏泄心火內盛故汗出也法宜除風散結以寒藥下之後用退風熱開鬱滯之寒藥調之熱退結散則風自愈矣凡治此者亦宜用按摩導引之法及以藥干開牙關勿令口噤使粥藥得下也一婦人臀癰將愈患破傷風發熱搐搦脈浮數豫以當歸地黃湯治之彼不信乃服發散敗毒藥果甚始信而服之數劑而痊一男子背瘡未痊斂以膏藥剪孔貼之患破傷風證而歿此先失於內補外邪襲其虛耳余見此證貼膏藥剪孔欲其通氣而反患破傷風搽斂藥生肌欲其收口而反助餘毒以致歿者多矣可不慎哉薛按破傷風通用方草豨蘞酒防風湯蜈蚣散大芎黃湯羌活湯白朮防風湯玉真散外敷藥養血當歸地黃湯類破傷風七十七立齊曰大凡癰疽潰後筋糜肉爛膿血大泄陽隨陰散或筋脈拘急惡寒惕搦甚者舌強口噤項背反張痰涎壅盛便閉汗出不時發熱此氣血俱虛而變見若此雖與破傷風相類而主治之法但當大補血氣若果有風證亦須以大補氣血為主而兼以治風之藥設若不審是非而妄藥之則誤矣司徒邊華泉肩患癰而發熱目直或瞤殊類中風日晡熱甚脈益數此足三陰氣血虧損虛火妄動也用參耆歸朮炙甘草加酒炒黑黃柏五味麥冬肉桂四劑而愈又數劑而斂一儒者患腿癰深蓄於內肉色不變久不穿潰針出膿瘀五碗許惡證駢臻全類中風此脾胃虛而變證也用六君子湯加當歸炮姜及聖愈湯各四劑而安又勞心不寐用歸脾湯而愈薛按斑疹丹毒七十八斑疹一證雖已有正門詳載然彼以小兒麻瘄為言其有非麻瘄而無論大人小兒忽患斑疹小瘡者此雖與彼相類而實有小異也是亦不可不辨而治之蓋多由風熱外感之證耳治此之法脈浮而身熱有表證者惟散風邪為主脈浮而數者祛風兼清熱脈沉滑而無表證者清火為主脈浮沉俱滑數而表裡兼見者宜表裡雙解之然惟小兒多有此證須察其表裡虛實酌而治之可也總之小兒脆弱宜安里之藥多攻發之藥少祕則微泄之結則微導之但令邪氣不壅而散之易則證輕而兒自安矣大抵身溫暖者順身涼者逆王海藏曰前人云首尾俱不可下者何也曰首不可下者為斑未見於表下則邪氣不得伸越此脈證有表而無里故禁首不可下也尾不可下者為斑毒已顯於外內無根蒂大便不祕本無一切里證下之則斑氣陷逆故禁尾不可下也潔古曰斑疹之病其為證各異發焮腫於外者屬少陽三焦相火也謂之斑小紅靨行皮膚之中不出者屬少陰君火也謂之疹凡見斑證若自吐瀉者多吉慎勿亂治謂邪氣上下俱出也若斑疹並出者其邪必甚小兒難勝是以多生別證也然首尾皆不可下立齊曰凡小兒丹毒遍身俱赤不從砭治以致毒氣入腹則不救蓋此證乃惡毒熱血蘊蓄於命門遇相火而合起也如霞片者須砭去惡血為善如腫起赤色遊走不定者宜先以生麻油塗患處砭之以泄其毒凡從四肢起入腹者不治雖云丹有數種治有數法無如砭之為善常見患重者不用砭法俱不救一婦人患斑作癢脈浮以消風散四劑而愈一婦人患斑作癢脈浮數以人參敗毒散二劑少愈更以消風散四劑而安一男子患斑色赤紫焮痛發熱喜冷脈沉實以防風通聖散一劑頓退又以防風敗毒散加芩連四劑而愈一老人患疹色微赤作癢發熱以人參敗毒散二劑少愈以補中益氣湯加黃芩山梔而愈一小兒患疹發熱作痛煩渴欲以清涼飲下之診其脈不實舉指不數此邪在經絡也不可下遂以解毒防風湯二劑而愈此證小兒多患之須詳審在表在裡及邪之微甚而治之一兒作癢發熱以犀角散一劑作吐瀉此邪氣上下俱出也毒必自解少傾吐瀉俱止其疹果消吐瀉後脈見七至此小兒和平之脈也邪已盡矣不須治果愈俱薛按一男子患丹毒焮痛便祕脈數而實服防風通聖散不應令砭患處去惡血仍用前藥而愈一小兒腿患丹如霞遊走不定先以麻油塗患處砭出惡血毒即漸散更以神功托裡散一劑而安一小兒患丹毒外勢雖輕內則大便不利此患在臟也服大連翹飲敷神功散而瘥一小兒遍身皆赤砭之投解毒藥而愈嘗治小兒丹毒便祕或煩躁者服五福化毒丹亦效俱薛按一白虎丹方治在外科方二九二瘤贅七十九立齊曰內經云肝主筋而藏血心裹血而主脈脾統血而主肉肺司腠理而主氣腎統骨而主水若怒動肝火血涸而筋攣者自筋腫起按之如筋久而或有赤縷名曰筋瘤若勞役火動陰血沸騰外邪所搏而為腫者自肌肉腫起久而有赤縷或皮俱赤者名曰血瘤若鬱結傷脾肌肉消薄外邪所搏而為腫者自肌肉腫起按之實軟名曰肉瘤若勞傷肺氣腠理不密外邪所搏而壅腫者自皮膚腫起按之浮軟名曰氣瘤若勞傷腎水不能榮骨而為腫者自骨腫起按之堅硬名曰骨瘤夫瘤者留也隨氣凝滯皆因臟腑受傷氣血乖違當求其屬而治其本大凡屬肝膽二經結核宜八珍加山梔膽草以養氣血清肝火六味丸以養肺金生腎水若屬肝火血燥須生血涼血用四物二地丹皮酒炒黑膽草山梔若中氣虛者補中益氣湯兼服之若治失其法脾胃虧損營氣虛弱不能濡於患處或寒氣凝於瘡口營氣不能滋養於患處以致久不生肌而成漏者悉宜調補脾氣則氣血壯而肌肉自生矣若不慎飲食起居及七情六淫或用寒涼蝕藥蛛絲纏芫花線等法以治其外則誤矣按瘤贅一證如前薛論已盡其略然此五瘤之外又惟粉瘤為最多蓋此以腠理津沫偶有所滯聚而不散則漸以成瘤是亦粉刺之屬但有淺深耳深者在皮里則漸成大瘤也余嘗聞之先輩曰瘤贅既大最畏其破非成膿者必不可開開則牽連諸經漏竭血氣最難收拾無一可活及詳考薛按所載數人凡其破潰者皆至不治誠信然也不可不知茲紀豫於三旬之外忽於臀下肛門前骨際皮里生一小粒初如緑豆許不以為意及半年而如黃豆矣又一年而如皂子復如栗矣此時乘馬坐椅皆有所礙而漸至痛矣然料此非敷藥可散又非煎藥可及使其日漸長大則如升如斗懸掛腰股間行動不便豈不竟成廢物乎抱憂殊甚謀之識者皆言不可割刺恐為禍不少豫熟籌數月莫敢妄動然竊計此時乘小不取則日後愈大愈難矣將奈之何嘗見人臀股間受箭傷者未必即死此之利害不過如是遂決意去之一日飲酒微醺乘醉以柳葉針刺之所出者皆如豆腐白皮之屬蓋即粉瘤也刺後頓消豫甚快然又兩日後則腫如熱癰豫以會通膏貼三日膿潰而愈豫又快然不兩日又腫起更熱更大豫則大懼大悔謂瘤贅誠不可刺也然而無奈復以會通膏貼之又三日而大潰則潰出一囊如魚胞者然後收口全愈今愈後數十年此間仍有一小竅誠險證也向非豫之勇決則此後不知作何狀使開之再遲則真有不可收拾矣是以病不早治則不知所終此亦可為治病者之鑑新按一刺灸法向一人於眼皮下弦生一小瘤初如米粒漸大如豆其人疑畏求治於外科彼用攢針三四枚翻轉眼皮刺其內膜少少出血如此二三次其瘤日縮竟得盡消又一人於手臂上生一瘤漸大如龍眼其人用小艾於瘤上灸七壯竟爾漸消不長亦善法也或用隔蒜灸之亦無不可一凡於不便處有生此物者當以此二法酌宜用之大都筋脈宜灸血病宜刺或有以蘿蔔子南星朴硝之類敷而治者亦可暫消若欲拔根無如前法一蛛絲纏法可治瘤贅未甚大者其法最妙豫嘗見一人於腹上生一瘤其大如胡桃一治者取珠絲捻成粗線纏扎其根數日其絲漸緊瘤根漸細屢易屢細不十日意爾脫落誠奇法也可見諸線日松惟蛛絲日緊物理之妙有當格致者如此然亦纏治宜早若形勢既大恐不宜也薛氏按曰一男子左腿外側近臀腫一塊上有赤縷三年矣飲食起居如常觸破湧出膿血發熱惡寒此膽經受證故發於腿外側診其脈左尺洪數左關弦洪此腎水不能生肝木用補中益氣湯六味地黃丸而愈痊一男子小腹患之膿水淋漓此足三陰之證用補中益氣湯加麥冬五味以培脾土用六味地黃丸以生腎水更用蘆薈丸以清肝火而斂一老儒眉間患之三年其狀如紫桃下墜蓋目按之如水囊此肝脾之證膿瘀內潰而然耳遂刺出血膿目即開以炒黑膽草山梔芎歸芍藥柴胡白朮茯苓等藥而愈疣八十立齊曰疣屬肝膽經風熱血燥或怒動肝火或肝客淫氣所致蓋肝熱水涸腎氣不榮故精亡而筋攣也宜以地黃丸滋腎水以生肝血為善若用蛛絲纏螳螂蝕著艾灸必致多誤大抵此證與血燥結核相同故外用腐蝕等法內服燥血消毒則精血益虛肝筋受傷瘡口翻突開張卒成敗證府庠朱宏仁年二十右手背近中指患五疣中一大者如黃豆余皆如聚黍拔之如絲長三四寸許此血燥筋縮也用清肝益榮湯五十餘劑而愈府庠沈嫗文幼齧指甲及長不能自禁余曰此肝火血燥也又頸側常生小疣子屢散屢發又臂生一塊如緑豆大若觸碎則如斷束縷扯之則長縱之則縮後兩鬢髮白點求治余曰子素肝病此部亦屬肝膽經也夫爪為筋之餘膽行人身之側正與齧爪生庥等證相應須滋補腎水以生肝膽則諸病自愈矣乃與六味地黃丸服之二年白點自退疣亦不生一男子小腹中一塊不時攻痛或用行氣化痰等藥不應尤以為血鱉服行氣逐血之劑後手背結一庥子漸長寸許形如鱉狀肢節間如豆大者甚多彼疑鱉生子今發於外亦用行血虛證悉至左尺洪數關脈洪數而弦余以為腎水不能生肝木以致肝火血燥而筋攣用六味地黃丸生腎水滋肝血三月餘諸證悉愈一婦人左手背並次指患五六枚如熟椹內熱晡熱月經素不及期余曰此因肝脾血虛而有熱也當調補二經使陰血生而諸證自愈不信乃用艾灸手即腫脹發熱手指皆攣兩脅項及胸乳間皆患疣經行無期余用加味逍遙散少加炒黑黃連數劑漸愈乃去黃連更佐以歸脾湯各患漸愈又百餘劑經行如期再用地黃丸三料而痊俱薛按論列方外科下四物湯補八八珍湯補十九一陰煎新補八四順散外一五四八正散寒百十五五種散散三九五苓散和一八二四生散外一八六三氣飲新熱十七十宣散痘十四四七湯和九七五