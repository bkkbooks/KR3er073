body:
  text: 卷之五十六宇集古方八陳散陳仲景麻黃湯治太陽經傷寒發熱無汗惡寒及身痛此峻逐陰邪之方也麻黃桂枝各三兩甘草一兩杏仁七十個上四味以水九升先煮麻黃減二升去沫納諸藥煮取三升半去柤溫服八合覆取微汗麻黃加朮湯治風濕即前方加白朮四兩仲景麻黃附子細辛湯治少陰傷寒始得之脈雖沉而反發熱者此陰分之表證也宜此主之並治寒氣厥逆頭痛脈沉細者麻黃去節細辛各二兩附子一枚炮去皮切八片上三味以水一斗先煮麻黃減二升去上沫納藥煮取三升去滓溫服一升日三服金匱麻黃杏仁薏苡甘草湯治風濕一身盡痛發熱日晡劇者因汗出當風或久傷取冷所致麻黃去節湯泡薏仁各半兩甘草炙一兩杏仁十個去皮尖炒上每服四錢水一盞半煮八分溫服取微汗避風仲景麻黃附子甘草湯治少陰傷寒二三日無別證用此微發其汗並治風濕通身浮腫麻黃去節甘草炙各三兩附子一枚炮去皮上三味以水七升先煮麻黃一兩沸去上沫納諸藥煮取三升去滓溫服一升日三服金匱麻黃甘草湯治腰以上水腫者宜此汗之麻黃半兩甘草二錢半上咀用水二鍾先煮麻黃三四沸去沫入甘草再煎至八分食遠熱服取汗有人患氣喘積久不瘥遂成水腫服此效仲景大青龍湯治傷寒頭痛發熱無汗而煩躁麻黃三錢桂枝生薑各一錢杏仁五枚甘草五分大棗一枚此非古數石膏半雞子大一塊水一鍾半煎分二服仲景小青龍湯治傷寒表不解心下有水氣嘔噦而咳發熱或渴或利或小水不利小腹滿而喘並治肺經受寒咳嗽喘急宜服此以發散表邪麻黃去節桂枝芍藥甘草細辛乾薑各三兩半夏五味各半升上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升溫服一升按上方乃仲景古法今當隨證輕重酌宜用之仲景桂枝湯治太陽經傷風發熱自汗惡風桂枝芍藥生薑各三兩甘草二兩大棗十二枚上以水七升微火煮取三升去滓適寒溫服一升服已須臾食熱稀粥一升余以助藥力溫覆一時許令遍身微似有汗者佳不可令如水流漓病必不除桂枝加黃耆湯治黃疸脈浮者當以汗解之即前桂枝湯加黃耆二兩桂枝加大黃湯即前桂枝湯內加大黃一兩栝蔞桂枝湯治痓即前桂枝湯加栝蔞根二兩仲景桂枝人參湯治太陽傷寒表裡不解協熱下利者桂枝去皮炙甘草各四兩白朮人參乾薑各三兩上五味以水九升先煮四味取五升後納桂枝更煮取三升溫服一升日再夜一服仲景桂枝麻黃各半湯治太陽傷寒如瘧狀發熱惡寒不能得汗熱多寒少而身癢者桂枝去皮麻黃去節芍藥甘草炙生薑切各一兩大棗四枚擘杏仁二十四個湯浸去皮尖上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合桂枝附子湯方在熱陳治傷寒風濕身痛桂枝甘草湯方在熱陳治過汗心悸桂枝葛根湯方在痘疹解散寒邪仲景柴胡桂枝湯治傷寒發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡四兩桂枝去皮人參黃芩芍藥生薑各一兩半甘草炙一兩半夏二合半大棗六枚擘上九味以水七升煮取三升去滓溫服仲景小柴胡湯治邪在肝膽半表半裡之間寒熱往來喜嘔或日晡發熱脅痛耳聾鬱怒痎瘧等證柴胡半斤半夏半升人參黃芩生薑甘草各三兩大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去芩加茯苓四兩若不渴外有微熱者去人參加桂三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩按上方乃漢時古數也今方改用柴胡二三錢半夏黃芩各一二錢人參二三錢甘草五七分上加薑棗水煎服薛氏加味小柴胡湯亦名柴胡梔子散治乳母肝火發熱致兒為患及風熱生痰等證即前方加丹皮梔子良方加味小柴胡湯治傷寒脅痛及少陽厥陰熱瘧即前方小柴胡湯加枳殼麵炒牡蠣粉加姜三片棗二枚水二鍾煎服加減小柴胡湯治脈弦寒熱腹中痛即前小柴胡湯去黃芩加芍藥加薑棗水煎服柴胡石膏湯治少陽陽明外感挾火頭痛口乾身熱惡寒拘急柴胡二錢石膏三錢甘草一錢上用薑水煎服氣虛者加人參大柴胡湯方在攻陳治表證未除里證又急汗下兼行宜此柴平湯方在和陳治濕瘧一身盡痛柴苓湯方在和陳治身熱煩渴泄瀉加減柴苓湯方在和陳治諸疝和肝腎順氣除濕仲景四逆散治陽氣亢極血脈不通四肢厥逆在臂脛之下者若是陰證則上過於肘下過於膝以此為辨乃不當用此也柴胡芍藥甘草枳殼各等分為細末每服二錢米飲調下日三服嗽加五味子乾薑各五分悸者加桂五分腹痛加附子一枚炮令坼泄利下重者濃煎韭白湯調服仲景葛根湯治太陽傷寒項背強几几無汗惡風及太陽陽明合病下利者此即桂枝湯加麻黃葛根也葛根四兩麻黃去節生薑各三兩桂去皮芍藥甘草炙各二兩大棗十二枚擘上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌升麻葛根湯治傷寒陽明經證目痛鼻乾不眠無汗惡寒發熱及小兒瘡疹疫癘等證升麻葛根芍藥甘草各等分水二鍾煎一鍾寒多熱服熱多溫服柴葛解肌湯此槌法加減方治足陽明證目痛鼻乾不眠頭疼眼眶痛脈微洪者柴胡乾葛甘草黃芩芍藥羌活白芷桔梗水二鍾姜三片棗二枚槌法加石膏末一錢煎之熱服本經無汗惡寒者去黃芩冬月加麻黃他時加蘇葉葛根蔥白湯治傷寒已汗未汗頭痛葛根芍藥川芎知母各二錢生薑二錢蔥白五寸水二鍾煎一鍾服連須蔥白湯治傷寒已汗未汗頭痛如破連須蔥白切半片生薑二兩水三鍾煎一鍾半分二服局方參蘇飲治四時感冒傷寒頭痛發熱惡寒無汗及傷風咳嗽聲重涕唾稠黏潮熱往來此藥解肌寬中孕婦傷寒痘疹並治人參蘇葉乾葛前胡陳皮枳殼半夏茯苓各八分木香桔梗甘草各五分水二鍾姜五片棗一枚煎八分熱服加減參蘇飲方在痘疹治痘疹初熱見點解利之藥敗毒散亦名人參敗毒散治四時傷寒瘟疫憎寒壯熱風濕風眩項強身體疼痛不問老少皆可服或嶺南煙瘴之地疫癘時行或處卑濕腳氣痿弱等證此藥不可缺日三服以效為度人參茯苓枳殼甘草川芎羌活獨活前胡柴胡桔梗各等分水一鍾半姜三片煎服或為細末沸湯點服加味敗毒散方在外科解利足三陽熱毒寒熱如瘧荊防敗毒散方在痘疹發散痘疹俱可用局方五積散治感冒寒邪頭疼身痛項背拘急惡寒嘔吐肚腹疼痛及寒濕客於經絡腰腳骨髓痠痛及痘瘡寒勝等證當歸麻黃蒼朮陳皮各一錢厚朴制乾薑炮芍藥枳殼各八分半夏炮白芷各七分桔梗炙甘草茯苓肉桂人參各五分川芎四分水二鍾姜三片蔥白三莖煎八分不拘時服又歌曰痢後遍生腳痛風局方五積自能攻就中或卻麻黃去酒煮多多服見功十神湯治時氣瘟疫感冒風寒發熱憎寒頭痛咳嗽無汗此藥不拘陰陽兩感一切發散宜此紫蘇乾葛升麻芍藥各一錢麻黃川芎甘草各八分白芷陳皮香附各六分水二鍾姜三片煎服東垣升陽散火湯治胃虛血虛因寒邪郁遏陽氣以致肌表俱熱如火捫之烙手此火鬱發之之劑也升麻葛根羌活獨活芍藥人參各五分防風炙甘草各三分生甘草二分柴胡八分水一鍾半加生薑三片煎服忌生冷升陽益胃湯方在和陳治秋燥行令陽氣漸衰惡寒體倦聖散子治一切山嵐瘴氣時行瘟疫傷寒風濕等疾有非常之功如李待詔所謂內寒外熱上實下虛者此藥尤效通神宋嘉祐中黃州民病疫瘴大行得此藥痊活者不可勝紀蘇東坡撰文勒石以廣其傳聖散子之功益著徽州鄭尚書在金陵用此方治傷寒活人甚衆故知其大能發散寒濕驅除瘴瘧實有超凡之效也蒼朮制防風厚朴姜炒豬苓澤瀉煨各二兩白芷川芎赤芍藥藿香柴胡各半兩麻黃升麻羌活獨活枳殼吳茱萸泡細辛藁本茯苓各七錢石菖蒲草豆蔻良薑各八錢甘草二兩半大附子一枚上為粗末每服三錢水二鍾棗一枚煎八分稍熱服易老九味羌活湯一名羌活沖和湯治四時不正之氣感冒風寒憎寒壯熱頭疼身痛口渴人人相似者此方主之羌活防風蒼朮各一錢白芷川芎生地黃芩甘草各錢半細辛七分水二鍾姜三片棗一枚煎八分熱服取汗有汗者去蒼朮加白朮渴者加葛根石膏六神通解散方在寒陳治發熱頭痛脈洪身熱無汗局方消風百解散治四時傷寒頭痛發熱及風寒咳嗽鼻塞聲重或喘急荊芥穗麻黃白芷蒼朮陳皮各一錢甘草五分水一鍾半加薑蔥煎八分熱服嗽甚者加烏梅一個局方消風散一名人參消風散治風熱上攻頭目昏眩鼻塞聲重及皮膚頑麻癮疹瘙癢等證荊芥穗炙甘草人參川芎防風羌活蒲荷蟬蛻炒殭蠶炒茯苓各二錢陳皮厚朴各一錢上為末每服二三錢茶清調服瘡癬溫酒下子和風消散照前方但無荊芥防風薄荷甘草四味二味消風散治皮膚瘙癢不能忍蘇州薄荷葉蟬蛻去頭足土各等分上為末食遠溫酒調下二錢大旨黃芩半夏湯專治寒包熱兼治表裡黃芩酒炒半夏麻黃紫蘇桔梗枳殼杏仁甘草等分水二鍾姜三片棗二枚煎八分食遠服天寒加桂枝金匱續命湯治中風肢體不收口不能言冒昧不知痛處拘急不能轉側並治但伏不得臥咳逆上氣面目浮腫麻黃去節人參當歸石膏桂枝川芎乾薑甘草各三兩杏仁四十枚去皮尖上九味以水一斗煮取四升溫服一升當小汗薄覆脊憑几坐汗出則愈不汗更服無所禁忌勿當風千金小續命湯通治八風五痹痿厥等證又於六經分別隨證加減用之麻黃去節人參去蘆黃芩去腐芍藥甘草炙川芎白朮防己杏仁去皮尖炒官桂各一兩防風一兩半附子炮去皮臍半兩上㕮咀每服五錢用水一鍾半加姜五片棗一枚煎八分溫服春夏加石膏知母黃芩秋冬加官桂附子芍藥可隨證增減諸藥用附云岐子加減法如精神恍惚加茯苓遠志心煩多驚加犀角骨節間煩疼有熱者去附子倍芍藥骨間冷痛倍用桂枝附子燥悶小便澀去附子倍芍藥入竹瀝一合煎臟寒下痢去防己黃芩倍附子白朮一兩熱痢減去附子腳弱加牛膝石斛各一兩身痛加秦艽一兩腰痛加桃仁杜仲各半兩失音加杏仁一兩自汗者去麻黃杏仁加白朮春加麻黃一兩夏加黃芩七錢秋加當歸四兩冬加附子半兩千金大續命湯即前方金匱續命湯去人參加黃芩荊瀝元戎方用竹瀝續命煮散補虛消風通經絡行氣血除瘛瘲疼痛人參熟地黃當歸川芎芍藥防風荊芥獨活細辛葛根甘草遠志半夏各五錢桂心七錢半上每服一兩水二鍾生薑三片煎八分溫服汗多者加牡蠣粉一錢半寶鑑秦艽升麻湯治中風手足陽明經口眼喎斜四肢拘急惡風寒升麻葛根甘草炙芍藥人參各半兩秦艽白芷防風桂枝各三錢每服一兩水二鍾連須蔥白頭三莖煎至一鍾食後稍熱服避風寒臥得微汗即止愈風湯治中風諸證當服此藥以行導諸經則大風悉去縱有微邪只從此藥加減治之若初覺風動服此不致倒僕此乃治未病之要藥也羌活甘草防風當歸蔓荊子川芎細辛黃耆枳殼人參麻黃白芷甘菊薄荷枸杞子知母地骨皮獨活秦艽黃芩芍藥蒼朮生地黃各四兩肉桂一兩上㕮咀每服一兩水二鍾生薑三片煎七分空心臨臥服空心一服吞下二丹丸謂之重劑臨臥一服吞下四白丹謂之輕劑假令一氣之微汗用愈風湯三兩加麻黃一兩作四服加姜五七片空心服以粥投之得