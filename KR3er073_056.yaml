嗽哮吼夜不得臥麻黃紫蘇薄荷桂枝桑白皮大腹皮陳皮杏仁甘草各六分水一鍾半姜三片烏梅一個煎七分服局方羌活散治風邪壅滯鼻塞聲重頭目昏眩遍身拘急肢節煩痛天陰愈覺不安者羌活麻黃防風細辛川芎菊花枳殼蔓荊子前胡白茯苓甘草石膏黃芩等分水一鍾半姜三片煎服羌活散治風痹手足不仁羌活防己防風棗仁當歸川芎各一兩附子炮去皮臍麻黃去根節天麻各一兩半黃松節薏仁各二兩荊芥一握上為細末每服二錢不拘時溫酒調下得效芎芷香蘇散散風消痰理腳氣川芎甘草二錢蘇葉乾葛白茯苓柴胡各半兩半夏六錢枳殼炒三錢桔梗生二錢半陳皮三錢半每服三錢水一鍾姜三片棗一枚煎八分不拘時溫服金匱越婢湯治風水惡風一身悉腫脈浮不渴續自汗出無大熱麻黃一兩石膏半斤生薑三兩甘草二兩大棗十五枚上五味以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服惡風者加附子一枚風水加白朮四兩古今録驗方即名越婢加朮湯金匱越婢加半夏湯治肺脹咳喘上氣目如脫狀脈浮大者麻黃六兩石膏半斤生薑三兩甘草二兩大棗十五枚半夏半斤上六味以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服當歸湯治肺痹上氣閉塞胸中脅下支滿乍作乍止不得飲食唇乾舌燥手足冷痛當歸焙防風去叉黃耆各二兩人參細辛黃芩去腐各一兩桂心三兩柴胡八兩半夏湯炮五兩杏仁去皮尖炒五十個麻黃去根節水煮二三沸掠去沫曬乾一兩上㕮咀每服五七錢水一鍾姜七片棗二枚煎七分不拘時溫服日三夜二羌活勝濕湯方在和陳治外傷濕氣一身盡痛局方烏藥順氣散治風氣攻注四肢骨節疼痛遍體頑麻癱瘓腳氣語言蹇澀痿弱等證先宜服此以疏氣道然後隨證用藥烏藥麻黃白芷川芎桔梗橘紅枳殼麩炒甘草炙殭蠶炒各一兩乾薑炮五錢上每服五錢薑水煎服通關散方在因陳搐鼻取嚏開通牙關神效左經丸治諸風寒濕痹麻木不仁肢體手足疼痛極效蒼朮米泔浸草烏去皮蔥白乾薑各四兩上四味搗爛裝入瓶內按實密封瓶口安於暖處三日取出曬乾入後藥按此方當加當歸六兩更佳金毛狗脊藁本白芷破故紙酒浸焙乾撫芎小茴香炒穿山甲炮牛膝酒浸各三兩川烏炮木瓜白附子虎脛骨酥炙乳香炙沒藥炙各一兩另研上為末酒糊丸小豆大每服三四十丸空心酒下三因麻黃左經湯治風寒暑濕四氣流注足太陽經腰足攣痹關節重痛憎寒發熱無汗惡寒或自汗惡風頭痛麻黃去節乾葛細辛防風桂心羌活蒼朮防己酒拌茯苓炙甘草各一錢一分水二鍾姜三片棗一枚煎八分食前服三因半夏左經湯治足少陽經為四氣所乘以致發熱腰脅疼痛不食熱悶煩心腿痹縱緩半夏制乾葛細辛柴胡防風桂心乾薑炮白朮麥冬黃芩茯苓炙甘草各一錢水二鍾姜三片棗一枚煎八分食前服三因大黃左經湯治四氣流注足陽明經致腰腳腫痛不可行大小便祕或惡飲食喘滿自汗嘔吐腹痛大黃煨細辛羌活前胡杏仁去皮尖炒厚朴制枳殼黃芩茯苓炙甘草各一錢水二鍾姜三片棗二枚煎八分食前服千金第一麻黃湯治惡風毒氣腳弱無力頑痹四肢不仁失音不能言毒氣衝心有人病此者但一病相當即服此第一方次服第二第三第四方麻黃一兩大棗十二枚茯苓三兩杏仁三十枚防風當歸白朮川芎升麻芍藥黃芩桂心麥冬甘草各二兩上㕮咀以水九升清酒二升合煮取二升半分四服日三夜一覆令小汗粉之莫令見風千金第二獨活湯獨活四兩熟地黃三兩生薑五兩葛根桂心甘草芍藥麻黃各二兩上㕮咀以水八升清酒二升合煎取二升半分四服日三夜一腳弱者特忌食瓠子蕺菜犯之則一世不愈千金第三兼補厚朴湯並治諸氣咳嗽逆氣嘔吐厚朴川芎桂心熟地黃芍藥當歸人參各二兩黃耆甘草各三兩吳茱萸二升半夏七兩生薑一斤上㕮咀以水二斗煮豬蹄一具取汁一斗二升去上肥膩入清酒三升合煮取三升分四服相去如人行二十里久更進服千金第四風引獨活湯兼補方獨活四兩茯苓甘草各三兩升麻一兩半人參桂心防風芍藥當歸黃耆乾薑附子各二兩大豆二升上㕮咀以水九升清酒三升合煮三升半分四服相去如人行二十里久更進服獨活湯治腳氣陽虛寒勝經氣不行頑腫不用如神獨活麻黃去節川芎熟附子牛膝黃耆炙人參當歸白芍藥白茯苓白朮杜仲炒乾薑肉桂木香甘草炙等分上㕮咀每服五七錢水一鍾半姜三片棗三枚煎八分食前溫服追毒湯治肝脾腎三經為風寒熱濕毒氣上攻陰陽不和四肢拘攣上氣喘滿小便祕澀心熱煩悶遍身浮腫腳弱不能行步半夏湯泡七次黃耆去蘆甘草炙當歸去蘆人參去蘆厚朴薑製獨活去蘆橘紅各一兩熟地黃枳實麩炒芍藥麻黃去節各二兩桂心三兩上㕮咀每服八錢水一鍾半生薑七片棗三枚煎八分食前溫服日三夜一局方排風湯治風虛冷濕邪氣入臟狂言妄語精神錯亂及五臟風邪等證防風白朮當歸酒浸芍藥肉桂杏仁川芎白蘚皮甘草炙各一錢麻黃去節茯苓獨活各三錢上分二服水二鍾姜三片煎七分食遠服陽毒升麻湯治陽毒赤斑狂言吐膿血升麻一錢半犀角磨射干黃芩人參甘草各八分水一盞半煎八分納犀角汁和勻服栝蔞根湯治風溫大渴栝蔞根乾薑防風人參甘草各一錢石膏三錢水一盞半煎八分服再造散治傷寒頭痛發熱惡寒無汗用表藥而汗不出脈無力者此以陽虛不能作汗名曰無陽若醫不識此復用麻黃等藥及覆逼取汗誤殺者多矣人參黃耆川芎甘草熟附子桂枝細辛羌活防風煨生薑夏月熱甚或加石膏水一鍾半棗二枚煎八分溫服本事枳殼煮散治悲哀煩惱傷肝兩脅骨痛筋脈緊腰腳重滯筋急不能舉動此藥大治脅痛枳殼麩炒四兩細辛川芎桔梗防風各二兩葛根一兩半甘草一兩上咀每服七八錢水一鍾半薑棗同煮食煎溫服柴胡疏肝散治脅肋疼痛寒熱往來陳皮醋炒柴胡各二錢川芎枳殼麩炒芍藥各一錢半甘草炙五分香附一錢半水一鍾半煎八分食前服本事桂枝散治因驚傷肝脅骨疼痛不已枳殼一兩小者桂枝半兩上為細末每服二錢薑棗湯調下河間葛根湯治寒邪在經脅下疼痛不可忍葛根桂枝川芎細辛防風各一錢麻黃枳殼芍藥人參炙甘草各八分上咀水一鍾半姜三片煎八分食遠溫服升麻湯治無汗而喘小便不利煩渴發斑升麻蒼朮麥門冬麻黃各一錢黃芩大青各七分石膏一二錢淡竹葉十片水二鍾煎八分溫服仲景柴胡桂枝幹薑湯治傷寒五六日汗下後但頭汗出往來寒熱心煩者邪未解也柴胡半斤桂枝三兩乾薑二兩栝蔞根四兩黃芩三兩牡蠣煅二兩甘草炙二兩上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩再服汗出便愈
