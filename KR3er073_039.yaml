body:
  text: 卷之三十九人集婦人規下産育類滑胎三十二妊娠滑胎之法惟欲其坐草之期易而且速而難易之由則在血之盈虛不在藥之滑利蓋血多則潤而産必易血虧則澀而産必難故於未産之前但宜以培養氣血為主而預為之地如四物湯滑胎煎五福飲小營煎八珍湯之類即皆滑胎之要藥若不知此而過用滑利等物或産期未近無火無滯而妄用清火行氣沉降苦寒等藥必皆暗殘營氣走泄真陰多致血虧氣陷反為臨期大害若果肥盛氣實者則紫蘇飲保生無憂散滑胎枳殼散之類皆可擇用催生三三凡妊娠胎元完足彌月而産熟落有期非可催也所謂催生者亦不過助其血氣而利導之耳直待臨期乃可用脫花煎或滑胎煎隨證加減主之或經日久産母困倦難生俱宜服滑胎煎以助其氣血令兒速生其有氣虛無力艱於傳送者必用獨參湯隨多隨少接濟其力皆為催生要法若期未至而妄用行氣導血等劑以為催生亦猶摘方苞之萼揠宋人之苗耳一臨盆將産腹痛已甚凡催生之藥無如脫花煎少用肉桂五七分為最穩最妙若氣虛無力者加人參二三錢虛甚者任意加用之一催生若水血下多子道乾澀難出者宜用滑利之物如豬脂油蜜酥油蔥白葵子牛乳滑石榆白皮之類以潤之亦濟急之法也滑胎催生論外方達生散婦四十生化湯婦四二加味芎歸湯婦四四難産良方當歸湯婦五滑胎催生經驗滑石散婦五二胎干難産佛手散婦四一穩婆三四産婦臨盆必須聽其自然弗宜催逼安其神志勿使驚慌直待花熟蒂圓自當落矣所以凡用穩婆必須擇老成忠厚者預先囑之及至臨盆務令從容鎮靜不得用法催逼余嘗見有穩婆忙冗性急者恐顧此失彼因而勉強試湯分之掐之逼之使下多致頭身未順而手足先出或橫或倒為害不小若未有緊陳不可令其動手切記切記又或有生息不順及雙胎未下之類但宜穩密安慰不可使産母聞知恐驚則氣散愈難生下又嘗見有奸詭之婦故為哼訝之聲或輕事重報以顯己能以圖酬謝因致産婦驚疑害尤非細極當慎也立齊醫按載一穩婆云止有一女於分娩時適當巡街侍御行牌取我視其內室分娩女為此驚嚇未産而死後見侍御更以威顏吩咐逮視産母胎雖順而頭偏在一邊此時若以手入推正可保順生因畏其威不敢施手但回稟云此是天生天化非人力所能因是子母俱不能救由此觀之可見産時當用靜鎮自然而一毫驚恐疑畏有不可使混於其間者産要三五凡孕婦臨月忽然腹痛或作或止或一二日或三五日胎水少來但腹痛不密者名曰弄胎非當産也又有一月前或半月前忽然腹痛如欲産而不産者名曰試月亦非産也凡此腹痛無論胎水來與不來俱不妨事但當寬心候時可也若果欲生則痛極連腰乃將産也蓋腎繫於腰胞系於腎故耳又試捏産母手中指本節跳動即當産也此時兒逼産門穀道挺迸水血俱下方可坐草試湯瓜熟蒂懸此乃正産之候也一産婦腹痛未甚且須寬心行動以便兒身舒轉如腰腹痛甚有産之兆即當正身仰臥或起坐舒伸務宜安靜從容待兒轉身向下其産必順而且易最不宜預為驚擾入手以致産婦氣怯胞破漿干使兒轉身不易則必有難産之患一産婦初覺欲生便須惜力調養不可用力妄施恐致臨産乏力若兒方轉身而用力太早則多致橫逆須待順而臨門一逼自下若時候未到用力徒然一臨産房中不宜多人喧嚷驚慌宜閉戶靜以待生一將産時宜食稠軟白粥勿令飢渴以乏氣力亦不宜食硬冷難化之物恐産時乏力以致脾虛不能消化則産後有傷食之病一産婦産室當使溫涼得宜若産在春夏宜避陽邪風是也産在秋冬宜避陰邪寒是也故於盛暑之時亦不可衝風取涼以犯外邪又不宜熱甚致令産母頭疼面赤亦不宜人衆若熱氣熏蒸亦致前患其或有熱極煩渴而血暈血溢者亦可少與涼水暫以解之然亦不可多用若冬末春初余寒尚盛産室不可無火務令下體和暖衣被亦當溫厚庶不為寒氣所侵可免胎寒血滯難産之患且産後胎元既落氣血俱去乘虛感邪此時極易故不可不慎一凡富貴之家過於安逸者每多氣血壅滯常致胎元不能轉動此於未産之先亦須常為運動庶使氣血流暢胎易轉則産亦易矣是所當預為留意者一妊娠將産不可詹卜問神如巫覡之徒哄嚇謀利妄言凶險禱神祗保産婦聞之致生疑懼夫憂慮則氣結滯而不順多至難産所宜戒也一産時胞漿未下但只穩守無妨若胞漿破後一二時辰不生即當服催生等藥如脫花煎滑胎煎或益母丸之類蓋漿乃養兒之生漿幹不産必其胎元無力愈遲則愈干力必愈乏所以速宜催之一産婦與酒不可多而致醉凡産前醉則乏力而四肢不用産後酒多恐引入血分四肢致後日有動血及四肢無力髓骨痠痛之患六逆産三六一橫生者以兒方轉身産母用力逼之太早故致兒身未順而先露手臂但令母安然仰臥穩婆以手徐推兒臂下體令其正直復以中指摸其肩弗使臍帶攀系即生二倒生者因兒未及轉身産母努力故令兒先露足令母正臥以手徐推足入良久仍推兒身徐俟轉正近門即生三偏生者因兒未順生路産母努力逼兒頭偏一邊雖若露頂實額角也亦照前法推正即生若兒頂後骨偏拄穀道傍以手從外後傍輕輕托正即生四礙産者兒身雖順門路雖正但不能下乃因胎轉時臍帶絆肩而然令産母仰臥以手輕推兒向上乃用中指按兒兩肩理順臍帶即生五坐産者因兒將産其母疲倦久坐椅褥抵其生路而然須用手巾一條拴系高處令産母以手攀之輕輕屈足舒伸以開生路兒即順生六盤腸産者臨産母腸先出子産而腸未收故曰盤腸産古法以醋水各半盞默然噀産母面背則收一法以萆麻子四十九粒研爛塗母頭頂待腸收上急洗去俗以水噀面背驚之而腸亦收但恐驚則氣散反致他疾戒之一方治橫逆産難令産母仰臥以小針刺兒手腳心三五次用鹽擦之手腳即縮上轉身即生一方治盤腸産以半夏為末用少許搐鼻中腸自上又方用大紙捻以麻油潤滲點著吹滅以煙燻産婦鼻中腸即上又方腸出盛以潔淨漆器濃煎黃耆湯浸之腸即上胞破産難三七凡産婦胎未順而胞先破者其因有二蓋一有母質薄弱胞衣不固因兒轉動隨觸而破者此氣血之虛也一有兒身未轉以坐草太早用力太過而胞先破者此舉動之傷也若胞破久而水血乾産路澀則兒難下宜急用大料四物湯或五物煎脫花煎滑胎煎五福飲當歸湯之類助其氣血並濃煎蔥湯熏洗産戶使其暖而氣達則自當順下若持久力乏血已耗涸則甚危矣當用八珍湯料一斤益母草四兩水數碗煎熟不時飲之亦有得生者或以黃耆芎歸數斤以大釜煎藥氣氤氳滿室使産母口鼻俱受其氣亦良法也大抵産難之證多患於鬱悶安佚富貴之家治法雖云胎前清氣産後補血然不可拘泥若脾胃不健氣血不充必當預為調補不然臨産必多患難一産難經日不下別無危證者宜用脫花煎催之極妥極妙一醫宿客店治店婦臨産數日不生下體俱冷無藥甚窘令取椒橙葉茱萸共煎湯一盆令産婦以小凳坐盆內熏洗良久小腹皆暖氣溫血行遂産一方以紫蘇煎湯熏洗大抵遇嚴寒時月産久傷冷氣血必凝此熏洗之法亦要法也外以淋湯內以羊肉湯必效一方令産婦以自己髮梢含於口中令其噁心作嘔即下亦治胞衣不出胞衣不出三八胞衣不出有以氣血疲弱不能傳送而停閣不出者其證但見無力而別無痛脹治當補氣助血宜速用決津煎或滑胎煎保生無憂散局方黑神散之類主之有以惡露流入胞中脹滯不出者蓋兒既脫胞帶必下墜故胞在腹中形如仰葉仰則盛聚血水而脹礙難出惟老成穩婆多有識者但以手指頂其胞底以使血散或以指摸上口攀開一角使惡露傾瀉則腹空自落矣又一法以本婦頭髮攪入喉中使之作嘔則氣升血散胞軟亦自落矣凡胎胞不出者多死授以此法甚效若血滲胞中停蓄既久而為脹為痛或喘或急則非逐血破血不可也宜速用奪命丹或用失笑散以熱酒調服使血散脹消其衣自下若氣血兼虛者亦惟決津煎為善一方用萆麻子仁一兩研爛貼母右足心衣下速洗去緩則腸亦出如腸不收以此膏塗腦頂則腸自入一方用紅花一兩酒煮濃汁服一法用産婦鞋底炙熱尉小腹上下即出一方用皂角刺燒為末每服一錢溫酒調服胞衣論外方牛膝散婦四九胎衣不下腹脹氣脫血暈三九産時胎胞既下氣血俱去忽爾眼黑頭眩神昏口噤昏不知人古人多雲惡露乘虛上攻故致血暈不知此證有二曰血暈曰氣脫也若以氣脫作血暈而用辛香逐血化痰等劑則立刻斃矣不可不慎也一氣脫證産時血既大行則血去氣亦去多致昏暈不省微虛者少頃即蘇大虛者脫竭即死但察其面白眼閉口開手冷六脈細微之甚是即氣脫證也速用人參一二兩急煎濃湯徐徐灌之但得下咽即可救活若少遲延則無及矣余嘗救此數人無不隨手而愈此最要法也又嘗見有禁參而斃者云新産後不可用參用參則補住惡血必致為害即勸之亦不肯用直待斃而後悔者亦數人矣又有云産後必過七日方可用參此等愚昧訛傳不知始自何人誤人不淺萬萬不可信也一血暈之證本由氣虛所以一時昏暈然血壅痰盛者亦或有之如果形氣脈氣俱有餘胸腹脹痛上衝此血逆證也宜失笑散若痰盛氣粗宜二陳湯如無脹痛氣粗之類悉屬氣虛宜大劑芎歸湯八珍湯之類主之一猝時昏暈藥有未及宜燒稱錘令赤用器盛至床前以醋沃之或以醋塗口鼻令酸氣入鼻收神即醒或以破舊漆器或用乾漆燒煙燻之使鼻受其氣皆可但此法惟輕而暴暈者所宜若氣虛之甚而昏厥者非用大補之劑終無益也兒初生初誕法詳小兒門四十凡嬰兒初生當隨手包裹切不可為風寒所侵蓋兒在腹中遮護最密及其初脫胞胎肌膚脆嫩極易感邪若在夏令自所無慮但覺稍寒即須慎之嘗見兒生未久多有驚風發熱抽搐等病者率由乎此一小兒初生天氣微涼即大忌洗沐恐腠理不密元氣發泄而外邪乘之也凡産母分娩艱難勞傷胎氣多有兒雖脫胞而乏力垂危或已死者切不可便斷臍帶當急用大紙捻蘸香油於臍帶上往來燒斷之取其陽氣以續胎元俄頃兒得啼聲即已活矣且可免胃寒泄瀉之病凡見此者若以刀斷臍帶則子母皆多難保此出立齊醫按一凡燒帶之法惟素多陽虛及産時氣脫者最宜用之以助陽氣若母氣陽強或兒聲洪亮者皆不宜用恐火從臍入日後致生熱毒則反為害不小子死腹中四一凡子死腹中者多以觸傷或犯禁忌或以胎氣薄弱不成而殞或以胞破血乾持久困敗但察産母腹脹舌黑者其子已死若非産期而覺腹中陰冷重墜或為嘔惡或穢氣上衝而舌見青黑者皆子死之證宜速用下死胎方下之下後察其虛實隨加調補自愈若唇舌面色俱青則母子皆危之兆也補遺方治胎死腹中用紅花以酒煮汁飲二三碗即下新法下胎方用當歸一兩厚朴三錢陳皮二錢入酒水各一碗煎至一碗加朴硝三五錢再煎十餘沸去柤熱服死胎自下或止用脫花煎更妙死胎論外方回生丹婦六六下死胎方婦五九桂香散婦五五琥珀丸婦一三四産門不開不閉子宮不收四二交骨不開産門不閉無非陰氣不足陰不足則氣不達所以不開不開則産必艱難宜加味芎歸湯補而開之大有奇效或十全大補湯亦可産門不閉由陰氣大虛不能收攝或由陰火下流而然故或為陰挺突出或為腫脹或為淋澀不禁若氣血俱虛者宜十全大補湯加五味子補而斂之或痛而覺熱者宜加味逍遙散若憂思傷脾血熱者加味歸脾湯若暴怒傷肝動火者龍膽瀉肝湯子宮不收而外墜者宜補中益氣湯加醋炒芍藥飲而舉之或外以黃耆煎湯熏洗亦妙或以硫黃湯熏洗硫黃散敷之一方治産後子宮不斂用荊芥藿香椿根白皮煎湯熏洗神效一方産後子腸不收外用枳殼訶子五倍子白礬煎湯熏洗若不收再灸頂心百會穴數壯即上一方子宮脫出用萆麻仁十四枚研爛塗頂心入即洗去一方治産後陰脫用絹袋盛炒熱蛇床子尉之亦治陰痛又法用蛇床子五兩烏梅十四個煎水日洗五六次小産四三小産之證有輕重有遠近有稟賦有人事由稟賦者多以虛弱由人事者多以損傷凡正産者出於熟落之自然小産者由於損折之勉強此小産之所以不可忽也若其年力已衰産育已多欲其再振且固自所難能凡見此者但得保其母氣則為善矣若少年不慎以致小産此則最宜調理否則下次臨期仍然復墜以致二次三次終難子嗣系不小矣凡此安之之法見前數墮胎條中既産調理之法亦與大産相似詳後産後條中俱當按而用之一凡婦人年及中衰胎元無力則常有胎不能長及多小産昏暈之患此氣血衰敗而然血氣既衰則凡於小産之後多有胎既落而復又下墜如更有一胎欲産者此非胎也乃因氣虛而胞宮隨胎下陷也産母不知必至驚慌此無足慮但以壽脾煎或八珍十全大補芎歸補中湯之類主之則自安矣又凡小産有遠近其在二月三月為之近五月六月為之遠新受而産者其勢輕懷久而産者其勢重此皆人之所知也至若猶有近者則隨孕隨産矣凡今艱嗣之家犯此者十居五六其為故也總由縱欲而然第自來人所不知亦所不信茲謹以筆代燈用指迷者倘濟後人實深願也請詳言之盡胎元始肇一月如珠露二月如桃花三月四月而後血脈形體具五月六月而後筋骨毛髮生方其初受亦不過一滴之玄津耳此其橐籥正無依根荄尚無地鞏之則固決之則流故凡受胎之後極宜節欲以防泛溢而少年縱情罔知忌憚雖胎固欲輕者保全亦多其有兼人之勇者或恃強而不敗或既敗而復戰當此時也主方欲靜客不肯休無奈狂徒敲門撞戶顧彼水性熱腸有不啓扉而從隨流而逝者乎斯時也落花與粉蝶齊飛火棗共交梨並逸合汙同流已莫知其昨日孕而今日産矣朔日孕而望日産矣隨孕隨産本無形跡蓋明産者胎已成形小産必覺暗産者胎仍以水直溜何知故凡今之行院家多無大産以小産之多也娶娼妓者多少子息以其子宮滑而慣於小産也今嘗見艱嗣求方者問其陽事則曰能戰問其功夫則曰盡通問其意況則怨嘆曰人皆有子我獨無亦豈知人之明産而爾之暗産耶此外如受胎三月五月而每有墮者雖衰薄之婦常有之然必由縱欲不節致傷母氣而墮者為尤多也故凡恃強過勇者多無子以強弱之自相殘也縱肆不節者多不育以盜損胎元之氣也豈悉由婦人之罪哉欲求我方者當以此篇先讀之則傳方之思已過半矣小産論外方人參黃耆湯婦四八小産氣虛血不止當歸川芎湯婦四三小産瘀血痛殿胞煎新因十小産後腹痛下胎斷産四四下胎斷産本非仁者之事然有婦人臨産艱危或病甚不勝産育者則下胎斷産之法有不得已亦不可廢者也至若水銀虻蟲水蛭斑蝥之屬不惟傷胎且傷母矣用者不可造次下胎方千金去胎方婦六一下胎小品方婦五六扶羸小品方婦五八廣濟下胎方婦五七良方桂心散婦五四一方不拘生胎死胎用萆麻仁二個巴豆一個麝香一分研貼臍中並足心即下月一粒溫酒吞下又云下生胎用萆麻子一個斷産方斷産小品方婦六八千金斷産方婦又六七丹溪斷子法婦六九斷産灸法婦六七産育類論列總方四五四物湯補八八珍湯補十九十全大補湯補二十五福飲新補六五物煎新因三補中益氣湯補三十當歸湯婦五小營煎新補十五保生無憂散婦四七羊肉湯婦七一脫生煎新因十一加味逍遙散補九三壽脾煎新熱十六決津煎新因二加味歸脾湯補三三滑胎煎新因九益母丸婦六四滑胎枳殼散婦二四紫蘇飲婦二八奪命丹婦六五加味芎歸湯婦四四失笑散婦百四芎歸補中湯婦四六龍膽瀉肝湯寒六二硫黃湯婦六三六二局方黑神散婦五十芎歸湯婦四一産後類論産後當大補氣血四六産後病治嘗見丹溪云産後當大補氣血即有雜證以末治之一切病多是血虛皆不可發表此其意謂血氣隨胎而去必屬大虛故無論諸證皆當以大補為先其他皆屬可緩余於初年誠然佩服及執而用之則每為所困經者數次始悟其言雖有理而未免言之過也即今産科所宗無非此法余目睹其誤及親為解救者蓋不少矣故敢剖析於後實有所見不得不言非存心自衒故毀先賢若然則徒為笑罵之招耳賓雖至愚必不為也觀者其深察此意凡産後氣血俱去誠多虛證然有虛者有不虛者有全實者凡此三者但當隨證隨人辨其虛實以常法治療不得執有成心概行大補以致助邪此辨之不可不真也一産後虛證無非隨人元氣必素弱之人多有之或於産後血氣俱去而更弱者亦有之此當因人察脈因脈察證若脈氣形氣病氣俱不足此當以全虛治之若形氣不足病氣有餘或兼火邪或兼外邪或以飲食停滯是亦虛中有實不得不詳審而治此中委曲未能言盡惟明者悟之一産後不虛證蓋或其素日無病或以年少當時或以素耐辛苦貧勞之質此輩本無不足及其一旦受孕乃於無病腹中參入此物故致血氣壅塞為脹為嘔是皆添設有餘之病及其既産始見通快所留得去仍復故吾常人之産此類極多果何虛之有然或以內傷或以外感産後之病難保必無倘有所犯去之即愈若概行大補果能堪否即臨盆帶去血氣未免暫見耗損然以壅滯之餘不過皆護胎隨從之物去者當去生者旋生不出數日必已來復此生化自然之理何至是産皆虛也凡治此類但當因證用治若執云産後必當大補氣血則實實之病必所不免而輕者必甚甚者必危矣由此觀之則立言者固不易而用言者又豈易哉一産後全實證有如外感風寒頭痛身熱便實中滿脈緊數洪大有力者此表邪之實證也又火之盛者必熱渴躁煩或便結腹脹口鼻舌焦黑酷喜冷飲眼眵尿管痛赤脈見洪滑此內熱之實證也又鬱怒動肝胸脅脹痛大便不利脈弦而滑此氣逆之實證也又惡露未盡瘀血上衝心腹脹滿疼痛拒按大便難而小便利此血逆之實證也又凡富貴之家保護太過或過用人參耆術以致氣壅或過用糖酒炭火以致內熱或産本不虛而妄用大補之藥以致增病此調攝之實證也又或因産過食恐其勞困固令勉強以致停蓄不散此內傷之實證也以上諸證姑舉要者以見其概然既有表邪則不得不解既有火邪則不得不清既有內傷停滯則不得不開通消導且人有強弱産有虛實病有真假治有逆從固不可以同日語也觀六元正紀大論曰婦人重身毒之何如曰有故無殞亦無殞也此自經常不易之大法亦何庸贅辨之若此第因丹溪之言人多偏執故不得不詳盡其說以解後人之惑也諸虛實治法詳具後條論産後三禁四七觀病機機要云治胎産之病當從厥陰證論之宜無犯胃氣及上二焦是為三禁謂不可汗不可下不可利小便發其汗則同傷寒下早之證利大便則脈數而傷脾利小便則內亡津液胃中枯燥但使不犯三禁則營衛自和而寒熱自止矣凡用治之法如發渴則白虎氣弱則黃耆血痛則當歸腹痛則芍藥大抵産病天行從加減柴胡雜證從增損四物宜察脈證而用之詳此說雖為産育之大法然病變不同倘有是證則不得不用是藥所謂有病則病受之也第此經常之法固不可不知而應變之權亦不可執一也産後腹痛四八産後腹痛最當辨察虛實血有留瘀而痛者實痛也無血而痛者虛痛也大都痛而且脹或上衝胸脅或拒按而手不可近者皆實痛也宜行之散之若無脹滿或喜揉按或喜熱尉或得食稍緩者皆屬虛痛不可妄用推逐等劑凡新産之後多有兒枕腹痛者摸之亦有塊按之亦微拒手故古方謂之兒枕皆指為胞中之宿血此大不然夫胎胞俱去血亦豈能獨留蓋子宮蓄子既久忽爾相離血海陡虛所以作痛胞門受傷必致壅腫所以亦若有塊而實非真塊腫既未消所以亦頗拒按治此者但宜安養其臟不久即愈惟殿胞煎為最妙其次則四神散五物煎皆極佳者若誤認為瘀而妄用桃仁紅花玄胡青皮之屬反損臟氣必增虛病一有母體本虛而血少者即於産時亦無多血此輩尤非血滯若有疼痛只宜治以前法或以大小營煎黃雌雞湯主之一凡新産之後其有陽氣虛弱而寒從中生或寒由外入以致心腹作痛嘔吐不食四肢厥冷者宜九蜜煎大嚴蜜湯或理陰煎主之一産當寒月以致寒氣入腹臍下脹痛手不可近者宜羊肉湯主之若氣實寒甚者宜蟠蔥散一産後惡露不盡留滯作痛者亦常有之然此與虛痛者不同必其由漸而甚或大小便不行或小腹硬實作脹痛極不可近手或自下上衝心腹或痛極牙關緊急有此實證當速去其血近上者宜失笑散近下者宜通瘀煎奪命丹回生丹如或未效當用決津煎為善一産後有脾虛腎虛而為腹痛者此不由産而由臟氣之不足若脾氣虛寒為嘔吐為食少而兼腹痛者宜五君子煎六君子湯溫胃飲之類主之若腎氣虛寒為瀉為痢而兼腹痛者宜胃關煎理陰煎之類主之一産後有飲食停滯及氣逆作痛亦當因其類而消去之如排氣飲大和中飲之類皆可酌用仲景曰産後腹中㽲痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足立齊曰前證若因氣滯用延胡索散若因外寒用五積散若因怒氣用四物加木香柴胡若因血虛用四物參朮炮姜若因陽氣虛弱用四君當歸炮姜若因脾虛血弱用六君當歸炮姜産後發熱四九産後發熱有風寒外感而熱者有邪火內盛而熱者有水虧陰虛而熱者有因産勞倦虛煩而熱者有去血過多頭暈悶亂煩熱者諸證不同治當辨察一産後有外感發熱者蓋臨盆之際多有露體用力無暇他顧此時或遇寒邪則乘虛而入感之最易若見頭疼身痛憎寒發熱或腰背拘急脈見緊數即産後外感證也然此等外感不過隨感隨病自與正傷寒宿感者不同故略加解散即自痊可勿謂新産之後不宜表散但當酌其虛實而用得其宜耳凡産後感邪氣不甚虛者宜三柴胡飲若氣虛脾弱而感者宜四柴胡五柴胡飲若肝脾腎三陰不足而感者宜補陰益氣煎若虛寒之甚者宜理陰煎若産婦強壯氣實而感者宜正柴胡飲若兼內火盛而外邪不解者宜一柴胡飲若風寒俱感表裡俱滯者宜五積散一産後有火證發熱者但外感之熱多在表火證之熱多在裡此必以調攝太過或時令熱甚或強以酒或誤用參朮薑桂大補之藥或過用炭火或窗牖太密人氣太盛或氣體本實而過於動作凡屬太過皆能生火火盛於內多見潮熱內熱煩渴喜冷或頭痛多汗便實尿赤及血熱妄行但無表證脈見緩滑不緊而發熱者便是火證宜清化飲保陰煎之類主之若本元不虛或火之甚而勢之急者即徙薪飲抽薪飲亦所常用不必疑也一産後有陰虛發熱者必素稟脾腎不足及産後氣血俱虛故多有之其證則倏忽往來時作時止或晝或夜進退不常或精神困倦怔忡恍惚但察其外無表證而脈見弦數或浮弦豁大或微細無力其來也漸非若他證之暴至者是即陰虛之候治當專補真陰宜小營煎三陰煎五陰煎之類隨宜主之若陰虛兼火而微熱者宜一陰煎若陰虛兼火之甚而大熱者宜加減一陰煎若陰虛火盛熱而多汗者宜當歸六黃湯若陰中之陽虛火不歸源而熱者宜大營煎理陰煎右歸飲之類主之若血虛陽不附陰煩熱作渴者宜人參當歸湯若氣血俱虛發熱煩躁面赤作渴宜八珍湯十全大補湯若熱甚而脈微者宜急加桂附或認為火則禍在反掌一産後有去血過多發熱者其證必煩渴短氣頭痛頭暈悶亂內熱是亦陰虛之屬宜人參當歸湯主之立齊曰大凡元氣虛弱而發熱者皆內真寒而外假熱也但用六君或補中益氣加炮姜溫補脾氣諸證自退若四肢畏冷急加附子凡新産陰血暴傷陽無所附而外熱宜用四物炮姜補陰以配陽若因誤服寒涼克伐之劑而外熱此為寒氣格陽於外宜用四君子加薑桂如不應急加附子若或肌膚髮熱面目赤色煩渴引飲此血脫髮躁宜用當歸補血湯産後乍寒乍熱五十産後乍寒乍熱總由血氣虛損陰陽不和而然若陽勝則乍熱陰勝則乍寒凡陰勝而寒多者宜增損四物湯理陰煎若陽勝而熱多者宜四物湯三陰煎若陽氣陷入陰中而乍寒乍熱者宜補中益氣湯補陰益氣煎若陰陽俱虛而寒熱者宜八珍湯十全大補湯若敗血不散流入陰中而作寒熱者宜決津煎殿胞煎若血實氣壅者宜奪命丹陳無擇曰敗血流閉諸陰則寒流閉諸陽則熱宜五積散若有外感者宜從前産後發熱調治蓐勞五一蓐草荐也産婦坐草艱難以致過勞心力故曰蓐勞此即産後勞倦也其證則或為寒熱如瘧或頭疼自汗或眩暈昏沉或百節疼痛或倦怠喘促飲食不甘形體虛羸之類皆其候也悉當以培補元氣為主若初産後蓐勞困倦惟豬腰湯為妙或用黃雌雞湯白茯苓散若蓐勞虛汗不止宜母雞湯若兼臟寒者宜羊肉湯若氣血俱虛者宜五福飲十全大補湯若兼外邪發熱者宜補陰益氣煎補中益氣湯若兼外邪發熱而中寒背惡寒者宜理陰煎詳加減法治之若兼陽虛內寒者宜五君子煎或理陰煎若陽盛陰虛兼內熱者宜五福飲加芍藥黃芩地骨皮之類隨宜用之産後喘促五二産後喘急有二乃一以陰虛之極一以寒邪在肺蓋産後既以大虛焉得氣實而喘若肺無寒邪而見喘促者此以血去陰虛孤陽無主故氣窮短促而浮脫於上此實肝腎不接無根將脫之兆最為危候經曰肝苦急急食甘以緩之正此類也惟貞元飲為治此之神劑若氣虛兼寒者宜大補丸煎或理陰煎若風寒外感邪氣入肺而喘急者此必氣粗胸脹或多咳嗽自與氣短似喘上下不接者不同治當以疏散兼補為主宜金水六君煎或六君子湯若單以寒邪入肺氣實氣壅而本無虛者宜六安煎或二陳湯加蘇葉之類主之喘嗽論外方二母散婦八六血熱喘嗽二物參蘇飲婦八四瘀血入肺喘嗽産後惡露不止五三産後惡露不止若因血熱者宜保陰煎清化飲有傷衝任之絡而不止者宜固陰煎加減用之若肝脾氣虛不能收攝而血不止者宜壽脾煎或補中益氣湯若氣血俱虛而淡血津津不已者宜大補丸煎或十全大補湯若怒火傷肝而血不藏者宜加味四物湯若風熱在肝而血下泄者宜一味防風散一止血方用蒲黃二兩水煎頓服血不止論外方人參當歸湯婦百十四佛手散婦四一血多煩暈産後發痙五四産後發痙乃陰血大虧證也其證則腰背反張戴眼直視或四肢強徑身體抽搐在傷寒家雖有剛痙柔痙之辨然總之則無非血燥血枯之病而實惟足太陽與少陰主之蓋膀胱與腎為表裡腎主精血而太陽之脈絡於頭目項背所以為病若此若其所致之由則凡如傷寒誤為大汗以亡液大下以亡陰或潰瘍膿血大泄之後乃有此證故在産後亦惟去血過多或大汗大瀉而然其為元氣虧極血液枯敗也可知凡遇此證速當察其陰陽大補氣血用大補丸煎或理陰煎及十全大補湯之類庶保其生若認為風痰而用發散消導等劑則死無丸矣産後大便祕澀五五産後大便祕澀以其失血亡陰津液不足而然宜濟川煎加減主之及後立齊法俱妙立齊曰前證若計其日期飲食已多即用藥通之禍在反掌之間矣必待其腹滿覺脹欲去不能者此乃結在大腸宜用豬膽汁潤之若服苦寒疏通反傷中氣通而不止或成他證若去血過多用十全大補湯血虛火燥用加味四物湯氣血俱虛用八珍湯雖數日不通飲食如常腹中如故仍用八珍加桃仁杏仁治之若泥其日期飲食之多而通之則誤矣産後雜證方五六良方黃龍湯婦八五産後外感良方交加散婦百産後中風海藏愈風湯和二一七失血筋急搐搦交加散和二五二産後類風不省人事七珍湯婦七九産後不語補脬飲婦八一産後脬破淋瀝良方人參湯婦七七産後諸虛麻黃根湯婦八三産後虛汗趁痛散婦八十産後發熱骨節疼痛加味小柴胡湯散二十乳母肝火發熱産後類論列總方五七四君子湯補一五君子煎新熱六金水六君煎新和一六君子湯補五大補丸煎新補一十全大補湯補二十四物湯補八五物煎新因三補中益氣湯補三十大營煎新補十四小營煎新補十五補陰益氣煎新補十六五福飲新補六八珍湯補十九當歸六黃湯寒六五溫胃飲新熱五胃關煎新熱九加味四物湯補九壽脾煎新熱十六理陰煎新熱三增損四物湯婦百十三陰煎新補十一一陰煎新補八加減一陰煎新補九五陰煎新補十三貞元飲新補十九人參當歸湯婦百十四保陰煎新寒一固陰煎新因二一味防風散婦百十五右歸飲新補三蟠蔥散熱百十當歸補血湯補四四羊肉湯婦七十七一豬腰湯婦七四黃雌雞湯婦七二母雞湯婦七三決津煎新因二殿胞煎新因十通瘀煎新因五濟川煎新補二一清化飲新因十三失笑散婦百四奪命丹婦六五四神散婦七五二陳湯和一六安煎新和二五積散散三九抽新飲新寒三徙薪飲新寒四延胡索散婦九八白茯苓散婦七八正柴胡飲新散六一柴胡飲新散一三柴胡飲新散三四柴胡飲新散四五柴胡飲新散五九蜜煎新因十二大岩蜜湯婦七六回生丹婦六六排氣飲新和六大和中飲新和七帶濁遺淋類帶下五八凡婦人淋帶雖分微甚而實為同類蓋帶其微而淋其甚者也總由命門不固而不固之病其因有六蓋一以心旌之搖之也心旌搖則命門應命門應則失其所守此由於不遂者也一以多欲之滑之也情欲無度縱肆不節則精道滑而命門不禁此由於太遂者也一以房室之逆之也凡男女相臨遲速有異此際權由男子而婦人情興多致中道而止止則逆逆則為濁為淋此由於遂而不遂乃女子之最多而最不肯言者也以上三證凡帶濁之由乎此者十居八九而三者之治必得各清其源庶可取效然源未必清而且旋觸旋發故藥餌之功必不能與情竇爭勝此帶濁之所以不易治也此三者之外則尚有濕熱下流者有虛寒不固者有脾腎虧陷而不能收攝者當各因其證而治之一心旌搖心火不靜而帶下者先當清火宜硃砂安神丸清心蓮子飲直指固精丸之類主之若無邪火而但見心虛帶下者宜祕丸煎人參丸心虛白濁歌茯兔丸之類一欲事過度滑泄不固而帶下者宜祕丸煎壽脾煎固陰煎苓朮菟絲丸濟生固精丸鎖精丸金鎖思仙丹之類主之一人事不暢精道逆而為濁為帶者初宜六味地黃湯或威喜丸之屬以利之久不止者宜固陰煎苓朮菟絲丸之屬以固之一濕熱下流而為帶濁脈必滑數色見紅赤證有煩渴而多熱者宜保陰煎加味逍遙散或經驗豬肚丸亦佳若熱甚兼淋而赤者宜龍膽瀉肝湯一元氣虛弱而帶下者宜壽脾煎固陰煎菟絲煎七福飲十全大補湯九龍丸之屬若陽氣虛寒脈見微澀色白清冷腹痛多寒者宜加姜附或用家韭子丸一脾腎氣虛下陷而多帶者宜用壽脾煎固陰煎歸脾湯補中益氣湯之屬立齊曰前證或因六淫七情或因醉飽房勞或因膏粱厚味或服燥劑所傷或虧損陽氣下陷或濕痰下注蘊積而成故言帶也凡此皆當壯脾胃升陽氣為主佐以各經見證之藥若色青者屬肝用小柴胡加山梔或濕熱壅滯小便赤澀龍膽瀉肝湯色赤者屬心用小柴胡加黃連山梔當歸思慮過傷用妙香散等藥色白者屬肺用補中益氣加山梔色黃者屬脾用六君子加山梔柴胡不應歸脾湯色黑者屬腎用六味地黃丸若氣血俱虛八珍湯陽氣陷下補中益氣湯濕痰下注前湯加茯苓半夏蒼朮黃柏氣虛痰飲下注四七湯送腎氣丸不可拘肥人多痰瘦人多火而以燥濕瀉火之藥輕治之也帶濁論外方醋附丸婦百七氣滯帶濁腹中急痛金櫻膏補百虛勞帶濁克應丸婦一二八虛滑帶濁固元丹固三一赤白帶白芷散婦一二六下元虛滑益母丸婦六四帶濁諸病白芍藥散婦一二七帶濁疼痛白濁遺淋五九淫濁與帶下之不同者蓋白帶出於胞宮精之餘也淫濁出於膀胱水之濁也雖膀胱與腎為表裡故帶濁之源無非皆出於陰分然帶由脾腎之虛滑者多淫濁由膀胱之濕熱者多此其所以有辨也若淫濁初起而見熱澀者宜大分清飲若初起無火而但有窒塞者宜小分清飲或五苓散若肝經怒火下流宜加味逍遙散若肝火盛而見痛澀者宜龍膽瀉肝湯若服寒涼利藥太過以致下焦虛寒不固者宜萆薢分清飲若元氣虛寒下陷者宜壽脾煎補中益氣湯若脾濕下流者宜歸脾湯六君子湯若久而不愈肝腎虛滑下陷者宜壽脾煎祕丸煎家韭子丸淋濁論外方滑石散婦一二九熱淋牛膝膏和三四六死血作淋三味牛膝湯寒一二六血熱淋痛婦人夢與鬼交六十人稟五行正氣以生氣正則正氣邪則邪氣強則神旺氣衰則鬼生如刺法論曰神失守位則邪鬼外干即此類也然婦人之夢與邪交其證有二一則由欲念邪思牽擾意志而為夢者此鬼生於心而無所外干也一則由稟賦非純邪得以入故妖魅敢於相犯此邪之自外至者亦有之矣病因有內外則證亦有不同病由內生者外無形跡不過於夢寐間常有所遇以致遺失及為恍惚帶濁等證亦如男子之夢遺其機一也但在女子多不肯言耳至若外有邪犯者其證則異或言笑不常如有對晤或喜幽寂不欲見人或無故悲泣而面色不變或面帶桃花其脈息則乍疏乍數三五不調或伏沉或促結或弦細或代易不常是皆妖邪之候凡此二者若失於調理久之不愈則精血日敗真陰日損乃致潮熱發熱神疲體倦飲食日減經水日枯肌肉消削漸成勞損脈見緊數多致不救矣凡治此者所因雖有不同而傷精敗血其病則一故凡病生於心者當先以靜心為主然後因其病而藥之神動者安其神定其志精滑者固其精養其陰尤當以培補脾腎要約門戶以助生氣為主若為妖魅所侵則內當調補正氣如歸神湯之類外宜速灸鬼哭穴以驅邪氣則自當漸愈其穴以兩手大指相併縛定用艾炷於爪甲角騎縫灸之務令兩甲連肉四處著火方效或七壯或二七壯兩足大指亦名足鬼眼帶濁類論列總方六一人參丸補百五八珍湯補十九硃砂安神丸寒一四二歸脾湯補三二六君子湯補五清心蓮子飲寒三二妙香散固十五十六九龍丸固四二十全大補湯補二十壽脾煎新熱十六祕丸煎新固一加味逍遙散補九三菟絲煎新固三固陰煎新固二心虛白濁歌補百一威喜丸固四五茯菟丸固三八補中益氣湯補三十鎖金丸固二六保陰煎新寒一濟生固精丸固二九四七湯和九七五苓散和一八二金鎖思仙丹固十九歸神湯婦一二五腎氣丸補一二一六味地黃湯補百二十七福飲新補七家韭子丸固三四小分清飲新和十直指固精丸固三十小柴胡湯散十九大分清飲新寒五苓朮菟絲丸新固五萆薢分清飲熱一六五經驗豬肚丸固四十龍膽瀉肝湯寒六三乳病類乳少六二婦人乳汁乃衝任氣血所化故下則為經上則為乳若産後乳遲乳少者由氣血之不足而猶或無乳者其為衝任之虛弱無疑也治當補化源而兼通利宜豬蹄湯若乳將至而未得通暢者宜湧泉散産婦乳汁不來其原有二蓋一因氣血不足故乳汁不來宜用豬蹄湯是即虛者補之也一因肥胖婦人痰氣壅盛乳滯不來者宜用漏蘆湯之類是壅者行之也乳出六三産後乳自出乃陽明胃氣之不固當分有火無火而治之無火而泄不止由氣虛也宜八珍湯十全大補湯若陽明血熱而溢者宜保陰煎或四君子湯加梔子若肝經怒火上衝乳脹而溢者宜加減一陰煎若乳多脹痛而溢者宜溫帛尉而散之若未産而乳自出者以胎元薄弱滋溉不全而然謂之乳泣生子多不育吹乳妒乳六四産後吹乳因兒飲乳為口氣所吹致令乳汁不通壅結腫痛不急治之多成癰腫速服栝蔞散外以南星末敷之更以手揉散之勢甚者惟連翹金貝煎最妙産後妒乳因無兒飲乳或兒未能飲余乳蓄結作脹或婦人血氣方盛乳房作脹以致腫痛憎寒發熱不吮通之必致成癰若腫不消用麥芽二三兩炒熟水煎服立消一方用陳皮一兩甘草一錢水煎服一方治吹乳乳癰腫痛用萱草根擂酒服之以滓罨患處袖珍方用豬牙皂角去皮蜜炙為末酒服一錢又詩云婦人吹奶法如何皂角燒灰蛤粉和熱酒一杯調八字管教時刻笑呵呵乳癰乳岩六五腫痛勢甚熱毒有餘者宜以連翹金貝煎先治之甚妙立齊法曰婦人乳癰屬膽胃二腑熱毒氣血壅滯故初起腫痛發於肌表肉色焮赤其人表熱發熱或發寒熱或憎寒頭痛煩渴引冷用人參敗毒散神效栝蔞散加味逍遙散治之腫自消散若至數日之間膿成潰竅稠膿湧出膿儘自愈若氣血虛弱或誤用敗毒久不收斂膿清脈大則難治乳岩屬肝脾二臟鬱怒氣血虧損故初起小核結於乳內肉色如故其人內熱夜熱五心發熱肢體倦瘦月經不調用加味逍遙散加味歸脾湯神效栝蔞散多自消散若積久漸大岩色赤出水內潰深洞為難療但用前歸脾湯等藥可延歲月若誤用攻伐危殆迫矣大凡乳證若因恚怒宜疏肝清熱焮痛寒熱宜發表散邪焮腫痛甚宜清肝消毒並隔蒜灸不作膿或膿不潰補氣血為主不收斂或膿稀補脾胃為主膿出反痛或發寒熱補氣血為主或晡熱內熱補血為主若飲食少思或作嘔吐補胃為主飲食難化或作泄瀉補脾為主勞碌腫痛補氣血為主怒氣腫痛養肝血為主兒口所吹須吮通揉散成癰治以前法潮熱暮熱亦主前藥大抵男子多由房勞耗傷肝腎婦人鬱怒虧損肝脾治者審之世有孕婦患此名曰內吹然其所致之因則一惟用藥不可犯其胎耳乳病論列總方六六豬蹄湯婦八七湧泉散婦八八漏蘆湯婦九十八珍湯補十九四君子湯補一十全大補湯補二十保陰煎新寒一歸脾湯補三二加味歸脾湯補三三栝蔞散婦九一神效栝蔞散外一八一加味逍遙散補九三加減一陰煎新補九人參敗毒散散三六連翹金貝煎新因三一子嗣類宜麟策總論共十二段六七天地絪縕萬物化醇男女構精萬物化生此造化自然之理也亦無思無為之道也故有人道即有夫婦有夫婦即有子嗣又何有乏嗣之說然天有不生之時地有不毛之域則人不能無乏嗣之流矣然則生者自生乏者當乏而求嗣之說又何為也果可求耶果不可求耶則其中亦自有說亦自有法矣所謂說者非為不生不毛者而說也亦非為少壯強盛者而說也蓋不生不毛者出於先天之稟賦非可以人力為也少壯強盛者出於妙合之自然不必識不必知也惟是能子弗子者無後難堪本非天付衰老無兒者精力日去豈比少年此所以有挽回之人力則有說而有法矣雖法之垂諸古者已不為少然以余覺之則若有未盡其妙蘊者焉因而臚列其法曰天時曰地利曰人事曰藥食曰疾病總五類二十四條但凡其一便足敗乃公事矣賓於晚年得子率鑑乎此凡苦於是者惟察之信之則祚胤之猷或非渺小故命之曰宜麟策時氣天時一凡交會下種之時古云宜擇吉日良時天德月德及干支旺相當避丙丁之說顧以倉猝之頃亦安得擇而後行似屬迂遠不足憑也然惟天日睛明光風霽月時和氣爽及情思清寧精神閒裕之況則隨行隨止不待擇而人人可辦於斯得子非惟少疾而必且聰慧賢明胎元稟賦實基於此至有不知避忌者犯天地之晦冥則受愚蠢迷濛之氣犯日月星辰之薄蝕則受殘缺刑剋之氣犯雷霆風雨之慘暴則受狠惡驚狂之氣犯不陰不陽倏熱倏寒之變幻則受奸險詭詐之氣故氣盈則盈乘之則多壽氣縮則縮犯之則多夭顧人生六合之內凡生長壯老已何非受氣於生成而知愚賢不肖又孰非稟質於天地此感兆元始之大本苟思造命而贊化育則當以此為首務陰陽天時二乾道成男坤道成女此固生成之至道然亦何以見之亦何以用之蓋乾坤不用用在坎離坎離之用陰陽而已夫離本居陽何以為女以陽之中而陰之初也坎本居陰何以為男以陰之中而陽之初也蓋中者盛於上盛者必漸消初者生於下生者必漸長故陽生於坎從左而漸升升則為陽而就明陰生於離從右而漸降降則為陰而就晦此即陰陽之用也而千變萬化莫不由之由之推廣則凡冬至夏至一歲之陰陽也子東午西一日之陰陽也有節有中月令之陰陽也或明或晦時氣之陰陽也節前節後消長之陰陽也月光潮汛盈虛之陰陽也再以及人則老夫女妻陰若勝矣有顛之倒之之妙彼強此弱陽亦在也有操之縱之之權顧無往而非陰陽之用也知之而從陽避陰則乾道成男不知而背陽向陰則坤道成女矣明眼人其鑑而悟之筆有難於盡意也地利地利一地利關於子嗣非不重也有陰宅之宜子孫者常見螽斯之多有陽宅之宜子嗣者惟生氣天乙方為最吉然吉地吉人每多不期而會所謂有德斯有人有人斯有土此其所致之由自非偶然故曰必先有心地而後有陰地信非誣也第其理深義邃有非一言可悉然宗枝攸系誠有不可不知者此外如寢室交會之所亦最當知宜忌凡神前廟社之側井灶冢柩之傍及日月火光照臨沉陰危險之地但覺神魂不安之處皆不可犯倘有不謹則夭枉殘疾飛災橫禍及不忠不孝之流從而出矣驗如影響可不慎哉基址地利二欲綿瓜瓞當求基址蓋種植者必先擇地砂礫之場安望稻黍求子者必先求母薄福之婦安望熊羆倘欲為子嗣之謀而不先謀基址計非得也然而基址之說隱微叵測察亦誠難姑舉其顯而易者十餘條以見其概云耳大都婦人之質貴靜而賤動貴重而賤輕貴厚而賤薄貴蒼而賤嫩故凡唇短嘴小者不堪此子處之部位也耳小輪薄者不堪此腎氣之外候也聲細而不振者不堪此丹田之氣本也形體薄弱者不堪此藏蓄之宮城也飲食纖細者不堪此倉廩血海之源也發焦齒豁者不堪肝虧血而腎虧精也睛露臀削者不堪藏不藏而後無後也顏色嬌豔者不堪與其華者去其實也肉肥勝骨者不堪子宮隘而腎氣詘也嫋娜柔脆筋不束骨者不堪肝腎虧而根幹不堅也山根唇口多青氣者不堪陽不勝陰必多肝脾之滯逆也脈見緊數弦澀者不堪必真陰虧弱經候不調而生氣杳然者也此外如虎頭熊項橫面豎眉及聲如豺狼之質必多刑剋不吉遠之為宜又若剛狠陰惡奸險剋薄之氣尤為種類源流子孫命脈所繫烏可近之雖曰堯亦有丹朱舜亦有瞽瞍然二氣相合未必非一優一劣之所致倘使陰陽有序種址俱宜而稼穡有不登者未之有也惟一有偏勝則偏象見矣是種之不可不擇者有如此不然則麟趾之詩果亦何為而作者耶余因人艱嗣之苦復見人有不如無之苦故願天常生好人所以並慮及之十機人事一陰陽之道合則聚不合則離合則成不合則敗天道人事莫不由之而尤於斯道為最合與不合機有十焉使能得之權在我矣一曰闔闢乃婦人之動機也氣靜則闔氣動則闢動緣氣至如長鯨之飲川如巨觥之無滴斯時也吸以自然莫知其入故未有闢而不受者未有受而不孕者但此機在瞬息之間若未闢而投失之太早闢已而投失之太遲當此之際自別有影響情狀可以默會不可以言得也惟有心人能覺之帶雨施云鮮不穀矣二曰遲速乃男女之合機也遲宜得遲速宜見速但陰陽情質稟有不齊固者遲不固者速遲者嫌速則猶飢待食及咽不能速者畏遲則猶醉添杯欲吐不得遲速不侔不相投矣以遲遇疾宜出奇由徑勿逞先聲以疾遇遲宜靜以自持挑而後戰能反其機適逢其會矣三曰強弱乃男女之畏機也陽強陰弱則畏如蜂蠆避如戈矛陽弱陰強則聞風而靡望塵而北強弱相凌而道同意合者鮮矣然撫弱有道必居仁由義務得其心克強固難非聚精會神安奪其魄此所以強有不足畏弱有不足虞者亦在乎為之者之何如耳四曰遠近乃男女之會機也或以長材排闥唐突非堪或以偷覷跽門敢窺堂室欲拒者不能欲吞者不得睽隔如斯其能姤乎然斂跡在形致遠在氣斂跡在一時養氣非頃刻使不有教養之夙謀恐終無剛徑之鋭氣又安能直透重圍而使鳩居鵲巢也五曰盈虛乃男女之生機也胃有盈虛飽則盈而飢則虛也腎有盈虛蓄則盈而泄則虛也盛衰由之成敗亦由之不知所用則得其幸而失其常耳六曰勞逸乃男女之氣機也勞者氣散而怯逸者氣聚而堅既可為破敵之兵機亦可為種植之農具動得其宜勝者多矣七曰懷抱乃男女之情機也情投則合情悖則離喜樂從陽故多陽者多喜鬱怒從陰故多陰者多怒多陽者多生氣多陰者多殺氣生殺之氣即孕育賢愚之機也莫知所從又胡為而然乎八曰暗産乃男子之失機也勿謂我強何虞子嗣勿謂年壯縱亦何妨不知過者失佳期強者無酸味而且隨得隨失猶所莫知自一而再自再而三則亦如斯而已矣前有小産論所當並察之九曰童稚乃女子之時機也方苞方萼生氣未舒甫童甫笄天癸未裕曾見有未實之粒可為種否未足之蠶可為繭否強費心力而年衰者能待乎其亦不知機也矣十曰二火乃男女之陽機也夫君火在心心其君主也相火在腎腎其根本也然二火相因無聲不應故心宜靜不靜則火由欲動而自心挑腎先心後腎者以陽爍陰出乎勉強勉強則氣從乎降而丹田失守已失元陽之本色腎宜足腎足則陽從地起而由腎及心先腎後心者以水濟火本乎自然自然則氣主乎升而百脈齊到斯誠化育之真機然伶薄之夫每從勉強故多犯虛勞詎雲子嗣朴厚之子常由自然故品物咸亨奚慮後人知機君子其務陽道之真機乎蓄妾人事二無故置妾大非美事凡諸反目敗亂多有由之可已則已是亦齊家之一要務也其若年邁妻衰無後為大則勢有不得不置者然置之易而蓄之難使蓄不有法則有蓄之名無蓄之實亦仍與不蓄等耳而蓄之之法有情況焉有寢室焉以情況言之則主母見妾大都非出樂從所以或多嗔怒或多罵詈或因事責其起居或假借加以聲色是皆常情之所必至者而不知産育由於血氣血氣由於情懷情懷不暢則衝任不充衝任不充則胎孕不受雖云置妾果何益與凡蓄妾之不可過嚴者以此再以寢室言之則宜靜宜遠宜少近耳目者為妙蓋私構之頃鋭宜男子受宜女人其鋭其受皆由乎氣當此時也專則氣聚而直前怯則氣餒而不攝此受與不受之機也然勇怯之由其權在心蓋心之所至氣必至焉心有疑懼心不至矣心有不至氣亦不至矣倘臨期驚有所聞則氣在耳而不及器矣疑有所見則氣在目而不及器矣或忿或畏則氣結在心而不至器矣氣有不至則如石投水而水則無知也且如兩陳交鋒最嫌奸細之偵伺一心無二何堪讒間以相離閨思兵機本無二致凡妾室之不可不靜而遠者以此雖然此不過為錦囊無奈者設倘有高明賢淑因吾言而三省惟宗祧之是慮不惟不妒而且相憐則愈近愈慰而遠之之說豈近人情又若有恭謹良人小心奉治則求容已幸又安敢有遠而敬之之念其然其然吾未如之何也已藥食藥食一種子之方本無定軌因人而藥各有所宜故凡寒者宜溫熱者宜涼滑者宜澀虛者宜補去其所偏則陰陽和而生化著矣今人不知此理而但知傳方豈宜於彼者亦宜於此耶且或見一人偶中而不論宜否而遍傳其神競相制服又豈知張三之帽非李四所可戴也今録十方於後擇宜用之庶獲濟矣一婦人血氣俱虛經脈不調不受孕者惟育麟珠隨宜加減用之為最妙其次則八珍益母丸亦佳若臟寒氣滯之甚者用續嗣降生丹亦妙一男子臟氣平和而惟精血不足者宜還少丹全鹿丸無比山藥丸若右腎陽氣不足者宜右歸丸或育麟珠俱妙若陽痿精衰虛寒年邁艱嗣者必宜贊育丹若陽盛陰虛左腎精氣不足者宜左歸丸或延年益嗣丹若火盛水虧多內熱者宜大補陰丸此外如河車種玉丸烏雞丸黑錫丹之類皆可酌用用藥法藥食二凡男女胎孕所由總在血氣若血氣和平壯盛者無不孕育亦育無不長其有不能孕者無非氣血薄弱育而不長者無非根本不固即如諸病相加無非傷損血氣如果邪逆未除但當以煎劑略為撥正撥正之後則必以調服氣血為主斯為萬全之策所以凡用種子丸散切不可雜以散風消導及敗血苦寒峻利等藥蓋凡宜久服而加以此類則久而增氣未有不反傷氣血而難於孕者也再若香附一物自王好古曰乃婦人之仙藥多服亦能走氣而後世不言走氣但相傳曰香附為婦人之要藥由是但治婦人則不論虛實無弗用之不知香附氣香味辛性燥惟開鬱散氣行血導滯乃其所長若氣虛用之大能泄氣血虛用之大能耗血如古方之女金丹又四制香附丸之類惟氣實血滯者用之為宜凡今婦人十有九虛顧可以要藥二字而一概用之乎用之不當則漸耗漸弱而胎元之氣必反將杳然矣飲食藥食三凡飲食之類則人之臟氣各有所宜似不必過為拘執惟酒多者為不宜蓋胎種先天之氣極宜清楚極宜充實而酒性淫熱非惟亂性亦且亂精精為酒亂則濕熱其半真精其半耳精不充實則胎元不固精多濕熱則他日痘疹驚風脾敗之類率已受造於此矣故凡欲擇期布種者必宜先有所慎與其多飲不如少飲與其少飲猶不如不飲此亦胎元之一大機也欲為子嗣之計者其毋以此為後著男病疾病一疾病之關於胎孕者男子則在精女人則在血無非不足而然凡男子之不足則有精滑精清精冷者及臨事不堅或流而不射者或夢遺頻數或便濁淋澀者或好色以致陰虛陰虛則腰腎痛憊或好男風以致陽極陽極則亢而亡陰或過於強固強固則勝敗不洽或素患陰疝陰疝則肝腎乖離此外則或以陽衰陽衰則多寒或以陰虛陰虛則多熱若此者是皆男子之病不得蓋諉之婦人也倘知其由而宜治則治之宜反則反之必先其在我而後及婦人則事無不濟矣女病疾病二婦人所重在血血能構精胎孕乃成欲察其病惟於經候見之欲治其病惟於陰分調之蓋經即血也血即陰也陰以應月故月月如期此其常也及其為病則有或先或後者有一月兩至者有兩月一至者有枯絶不通者有頻來不止者有先痛而後行者有先行而後痛者有淡色黑色紫色者有瘀而為條為片者有精血不充而化作白帶白濁者有子宮虛冷而陽氣不能生化者有血中伏熱而陰氣不能凝成者有血症氣痞子臟不收月水不通者凡此皆真陰之病也真陰既病則陰血不足者不能育胎陰氣不足者不能攝胎凡此攝育之權總在命門正以命門為衝任之血海而胎以血為主血不自生而又以氣為主是皆真陰之謂也所以凡補命門則或氣或血皆可謂之補陰而補陰之法即培根固本之道也凡自壯至老乃人人之所不可缺者而矧以先天后天之肇基又將舍是而何求乎是以調經種子之法亦惟以填補命門顧惜陽氣為之主然精血之都在命門而精血之源又在二陽心脾之間蓋心主血養心則血生脾胃主飲食健脾胃則氣布二者胥和則氣暢血行此情志飲食又當先經脈而為之計者亦無非補陰之源也使不知本末先後而妄為之治則又烏足以言調經種子之法以上宜麟策終盈虛吟六八誰識雌雄在坎離玄關消息有真機坎虛離實云非是坎實離虛亦是非天以至剛方得體地緣無日乃成泥三生同有金丹在試問仙翁知不知辨古六九種子之法古人言之不少而余謂其若未盡善者蓋亦有疑而云然謹並列而辨之亦以備達者之裁正一廣嗣訣云三十時辰兩日半二十八九君須算落紅滿地是佳期金水過時徒霍亂霍亂之時枉費功樹頭樹底覓殘紅但解開花能結子何愁丹桂不成叢按此言婦人經期方止其時子宮正開便是布種之時過此佳期則子宮閉而不受胎矣然有十日半月及二十日之後受胎者又何為其然也又一哲婦曰若依此說則凡有不端者便於後半月為之自可無他慮矣善哉言也此言果可信否一道藏經曰婦人月信止後一日三日五日合者乾道成男二日四日六日合者坤道成女按此以單數屬陽故成男偶數屬陰故成女果若然則誰不知之得子何難也總未必然一褚氏遺書云男女之合二情交暢若陰血先至陽精後沖血開裹精精入為骨而男形成矣陽精先至陰血後參精開裹血血入為本而女形成矣按此一說余初見之甚若有味有理及久察之則大有不然蓋相合之頃豈堪動血惟既結之後則精以肇基血以滋育而胎漸成也即或以血字改為精字曰陰精先至似無不可然常見初笄女子有一合而即孕者彼於此時畏避無暇何雲精泄但其情動則氣至氣至則陰闢陰闢則吸受吸受則無不成孕此自然之正理也若褚氏之說似穿鑿矣一東垣曰經水斷後一二日血海始淨精勝其血感者成男四五日後血脈已旺精不勝血感者成女按此說亦非確論今見多生女者每加功於月經初淨而必不免於女者豈亦其血勝而然乎一丹溪曰陰陽交構胎孕乃凝所藏之處名曰子宮一系在下上有兩岐中分為二形如合鉢一達於左一達於右精勝其血則陽為之主受氣於左子宮而男形成精不勝血則陰為之主受氣於右子宮而女形成按此乃與聖濟經左動成男右動成女之說同第以子粒驗之無不皆有兩瓣故在男子亦有二丸而子宮之義諒亦如此信非謬也惟左受成男右受成女之說則成非事後莫測其然即復有左射右射之法第恐陰中闔闢自有其機即欲左未必左欲右未必右而陰陽相勝之理則在天時人事之間似仍別有一道雖知此說終無益也述古七十褚氏遺書曰建平孝王妃姬皆麗無子擇民家未笄女子入御又無子問曰求男有道乎澄對曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲陰陽完實然後交而孕孕而育育而子堅壯強壽今未笄之女天癸始至已近男色陰氣早泄未完而傷未實而動是以交而不孕孕而不育而子脆不壽此王之所以無子也然婦人有所産皆女者有所産皆男者大王誠能訪求多男婦人至宮府有男之道也王曰善未再期生六男夫老陽遇少陰老陰遇少陽亦有子之道也子嗣類論列總方七一育麟珠新因十四左歸丸新補四右歸丸新補五贊育丹新因又十四還少丹補一三五全鹿丸補一二七無比山藥丸補一三六延年益嗣丹婦一三五大補陰丸寒一五七八珍益母丸婦一三八續嗣降生丹婦一三六女金丹婦一三三四制香附丸婦一三二河車種玉丸婦一三七烏雞丸四方婦一三九後黑錫丹熱一八九癥瘕類論證七二癥瘕之病即積聚之別名內經止有積聚疝瘕並無證字之名此後世之所增設者蓋癥者徵也瘕者假也徵者成形而堅硬不移者是也假者無形而可聚可散者是也成形者或由血結謂之血癥或由食結謂之食癥無形者惟在氣分氣滯則聚而見形氣行則散而無跡此癥瘕之辨也然又有痛者有不痛者痛者聯於氣血所以有知氣血行則愈故痛者易治不痛者不通氣血別結窠囊藥食難及故不痛者難治此又治之有辨也其他如肺之積曰息奔心之積曰伏梁脾之積曰痞氣肝之積曰肥氣腎之積曰奔豚以至後世有曰痃癖曰痞塊之屬亦不過以形見之處有不同故名亦因之而異耳總之非在氣分則在血分知斯二者則癥瘕二字已盡之矣但血癥氣瘕各有虛實而宜攻宜補當審之真而用之確也諸經義另詳積聚門所當參閲骨空論曰任脈為病男子內結七疝女子帶下瘕聚張子和曰遺溺閉癃陰痿脬痹精滑白淫皆男子之疝也若血涸月事不行行後小腹有塊或時動移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕血症七三瘀血留滯作症惟婦人有之其證則或由經期或由産後凡內傷生冷或外受風寒或恚怒傷肝氣逆而血留或憂思傷脾氣虛而血滯或積勞積弱氣弱而不行總由血動之時余血未淨而一有所逆則留滯日積而漸以成症矣然血必由氣氣行則血行故凡欲治血則或攻或補皆當以調氣為先羅謙甫曰養正邪自除必先調養使營衛充實若不消散方可議下但除之不以漸則必有顛覆之害若不守禁忌縱嗜欲其有不喪身者鮮矣一血瘀作痛或成形不散在臍腹之下若暫見停蓄而根盤未固者只宜五物煎或決津煎加減主之則血無不去痛無不止足稱神劑一婦人形氣病氣俱實或腹脹或痛甚而新有所逆但欲行滯止痛者宜通瘀煎失笑散玄胡當歸散加減四物湯之類疏之導之氣通滯去痛必自愈若稍久且堅而欲消之磨之宜三稜煎萬病丸之類主之一形氣強壯而瘀血不行或大病結閉或腹脹痛甚有非下不可者宜良方桃仁承氣湯下之最捷或用奪命丹桃仁煎穿山甲散赤金豆之類皆可然下須詳慎非有大實不得已之證不宜妄用一養正之法當察陰陽上下病之久新及邪正強弱之勢其有停瘀雖甚而元氣困弱者不可攻病久而弱積難搖動者不可攻凡此之類皆當專固根本以俟其漸磨漸愈乃為良策如鬱結傷脾者宜用歸脾湯逍遙飲壽脾煎脾胃虛寒者宜溫胃飲養中煎六君子湯肝腎虛寒者宜大營煎暖肝煎理陰煎或良方交加散亦可脾腎虛寒大便泄瀉或不實者宜胃關煎理陰煎病久脾腎氣滯而小腹痛脹者宜八味地黃丸肝火不清血熱而滯者宜加味逍遙散以上諸證凡虛中帶滯者不妨於前藥中各加行氣導滯之品此在用者之圓活也一婦人久癥宿痞脾腎必虧邪正相搏牢固不動氣聯子臟則不孕氣聯衝任則月水不通內治之法宜如前外以阿魏膏貼之仍用尉痞方或用琥珀膏亦可然必須切慎七情及六淫飲食起居而不時隨證調理庶乎可愈食癥七四凡飲食留聚而為癥痞者或以生冷或以風寒或以忿怒氣逆或以勞倦飢餒而飲食疊進不用消化則積而成癥矣然胃氣強者必不致留聚飲食而飲食之不能化者必由脾腎氣弱而然所以治此者宜酌虛實而為攻補庶乎得效也諸治法詳積聚門宜參而用之立齊曰前證若形氣虛弱須先調補脾胃為主而佐以消導若形氣充實當先疏導為主而佐以補脾胃若氣壅血滯而不行者宜用烏藥散散而行之若脾氣虛而血不行者宜用四君芎歸補而行之若脾氣鬱而血不行者宜用歸脾湯解而行之若肝腎血燥而不行者宜用加味逍遙散清而行之大抵食積痞塊之證皆以邪氣盛則實真氣奪則虛但當養正辟邪而積自除矣雖曰堅者削之客者除之若胃氣未虛或可少用若病久虛乏者不宜輕用氣瘕七五瘕者假也所謂假者謂其形雖若癥而原無根窠非若癥痞之堅頑有形者也蓋有形者或因血積或因食積積有定形所不可移易者也無形者病在氣分氣逆則甚氣散則緩聚散無根者也惟其無根故能大能小或左或右或近脅肋而如臂如指則謂之痃癖或下臍腹而為脹為急則謂之疝瘕難經曰病有積聚何以別之然積者陰氣也陰沉而伏聚者陽氣也陽浮而動故積者五臟之所生聚者六腑之所成也然則癥由於積積在陰分而有淵藪故攻之非易瘕由於聚聚在陽分而猶烏合故散之非難此癥瘕之辨有如此惟散之之法最有因通因塞之妙用而人多莫之知也一凡病在氣分而無停蓄形積者皆不可下蓋凡用下者可除有形而不可以除無形若氣因形滯者去其積則氣亦順自無不可若全在無形氣分即下亦不去而適足以敗正氣也宜切識之一散氣之法止在行氣蓋氣行則散也但行氣之法大有權宜如氣實則壅滯宜破而行之氣閉則留蓄宜利而行之氣熱則乾涸宜寒而行之氣寒則凝結宜溫而行之此散氣治瘕之大法也然瘕聚之證使果氣強力健則流行不息又何瘕聚之有惟正氣不行而後邪氣得聚經曰邪之所湊其氣必虛故凡為此病必氣虛者多虛不知補則正氣不行正氣不行則邪氣不散安望其有瘳乎但實者有據故顯而易見虛每似實故隱而難知此所以當辨其真也一破氣行氣之劑凡氣實氣壅之甚而為脹為痛者宜排氣飲木香順氣散木香調氣散四磨湯諸七氣湯之類主之若血中之氣滯而為瘀為痛者宜失笑散通瘀煎調經飲甚者良方奇命丹疝瘕氣聚者荔香散甚者天台烏藥散氣結膀胱小水不利者小分清飲四苓散五苓散氣結大腸干祕不行者搜風順氣丸麻仁丸水虧血虛而祕滯者濟川煎肝氣逆而為聚者解肝煎兼火者化肝煎氣聚兼熱火鬱不行者抽薪飲大分清飲寒滯不行氣結脹聚者抑扶煎和胃飲丁香茯苓湯三焦壅滯氣道不清而中滿腫脹者廓清飲痰飲水氣停蓄胸脅而為吞酸嘔逆者苓朮二陳煎六安煎和胃飲括痰丸之類主之以上諸法惟氣實瘕聚者宜之凡元氣不足者皆不可用一補氣以行氣之劑如聖愈湯參歸湯七福飲皆能調心氣之虛滯五味異功散參朮湯能理心脾之氣虛不行獨參湯參附湯能助肺以行五臟之治節若脾胃氣虛而滯者惟六君子湯歸脾湯為宜脾胃虛寒而滯者必溫胃飲理中湯五君子煎最佳若虛在脾腎陰分氣有不行而或為痰飲或為脹滿或為嘔吐腹痛等證非理陰煎不可若虛在血中之氣而為滯為痛微則四物湯甚則五物煎決津煎大營煎方可若肝腎寒滯小腹氣逆而痛者必暖肝煎以溫之若脾腎氣虛門戶不要而為滯為痛者必胃關煎以固之若元氣下陷滯而不升者宜補中益氣湯舉元煎以舉之若元氣大虛氣化不行而滯者必五福飲十全大補湯大補丸煎或六味回陽飲以培補之以上皆補氣行氣之法也亦不過為之筌蹄云耳而此中之用誠有未可以言悉者然常人之情猶為氣之滯者惟破之散之為宜而反云補之必不然也不知客之強者以主之弱邪之勝者惟正之虛凡今人之病虛者最多而用補者最少治與病違而欲以藥濟人蓋亦罕矣即余以多虛少實諄諄為言而人亦未信姑以人事喻之其或可曉然乎夫人之虛實亦猶人之貧富氣實者若富翁氣虛者若貧士今人於千百中而富者其幾舍富之外盡貧人矣其多其少即此類也又有華其貌而罄其室者人多難測亦此類也但貧人之情可益不可損增一分猶然未足削一分其窘何堪使以潛消暗剝之術而加之貧寒窘乏之士陰移人祚而人不之覺亦甚堪憐矣此道以仁為術其可不以此為心乎嗟乎人生以氣為主得氣則生失氣則死夫知者知人之命不知者知人之病若強不知以為知而徒資便給以人命為嘗試者則其概可知矣癥瘕類論列總方七六四君子湯補一五君子煎新熱六六君子湯補五四物湯補八五物煎新因三五味異功散補四五福飲新補六七福飲新補七十全大補湯補二十聖愈湯補九十大補丸煎新補一補中益氣湯補三十參朮湯補四十參歸湯補三八六味回陽飲新熱二參附湯補三七獨參湯補三五六味地黃丸補百二十舉丸煎新補十七大營煎新補十四八味地黃丸補一二一壽脾煎新熱十六逍遙飲新因一加味逍遙散補九三歸脾湯補三二養中煎新熱四苓朮二陳煎新和四溫胃飲新熱五胃關煎新熱九丁香茯苓湯熱六三理中湯熱一理陰煎新熱三天台烏藥散和三二九暖肝煎新熱十五和胃飲新和五木香調氣散和四四解肝煎新和十一化肝煎新寒十木香順氣散和四三排氣飲新和六抑扶煎新熱十一搜風順氣丸和三四三烏藥散和七四六安煎新和二桃仁承氣湯攻四四磨湯和五二廓清飲新和十三大分清飲新和五抽薪飲新寒三濟川煎新補二一小分清飲新和十七氣湯和四七調經飲新因四良方交加散婦百決津煎新因二通瘀煎新因五加減四物湯婦百十二失笑散婦百四五苓散和一八二玄胡當歸散婦九八三稜丸攻三七六十荔香散新因二八四苓散和一八七奪命丹婦六五括痰丸新和十九穿山甲散攻四十桃仁煎攻三九赤金豆新攻二麻仁丸攻九二萬病丸婦一四三尉痞方攻八八琥珀膏外三一七阿魏膏外三一二前陰類陰挺七七婦人陰中突出如菌如芝或挺出數寸謂之陰挺此或因胞絡傷損或因分娩過勞或因鬱熱下墜或因氣虛下脫大都此證當以升補元氣固澀真陰為主如陰虛滑脫者宜固陰煎祕元煎氣虛陷下者補中益氣湯十全大補湯因分娩過勞氣陷者壽脾煎歸脾湯鬱熱下墜者龍膽瀉肝湯加味逍遙散水楊湯治婦人陰中生物癢痛牽引腰腹多由房事太過或因淫欲不遂或因非理所為以致陰戶有傷名曰陰挺金毛狗脊五倍子枯礬魚腥草水楊根黃連各一兩上為末分四劑用有嘴瓦罐煎湯外預以竹筒去節接罐嘴引熱氣熏入陰中或透挺上俟湯溫仍用洗沃之仍服治挺諸藥陰腫七八婦人陰腫大都即陰挺之類然挺者多虛腫者多熱如氣陷而熱者升而清之宜清化飲如柴胡防風之屬氣閉而熱者利而清之宜大分清飲徒薪飲肝腎陰虛而熱者加味逍遙散氣虛氣陷而腫者補中益氣湯因産傷陰戶而腫者不必治腫但調氣血氣血和而腫自退或由損傷氣滯無關元氣而腫者但以百草湯熏洗之為妙一方治陰中腫痛用枳殼半斤切炒乘熱以帛裹尉之以消其外仍用少許乘熱裹納陰中冷即易之不三次愈一方用小麥朴硝白礬五倍子蔥白煎湯浸洗甘菊湯治陰戶腫用甘菊苗葉不拘多少搗爛以百沸湯淋汁熏浸洗之陰瘡七九婦人陰中生瘡多由濕熱下注或七情鬱火或縱情敷藥中於熱毒其外證則或有陰中挺出如蛇頭者謂之陰挺如菌者謂之陰菌或如雞冠或生蟲濕癢或內潰腫爛疼痛常流毒水其內證則或為體倦內熱經候不調或為飲食不甘晡熱發熱或為小腹痞脹腰脅不利或為小水淋瀝赤白帶下凡治此之法若腫痛內外俱潰者宜芍藥蒺藜煎為最佳或四物湯加梔子丹皮膽草荊芥或用加味逍遙散若濕癢者宜芍藥蒺藜煎或歸脾湯加柴梔丹皮淋澀者宜龍膽瀉肝湯加白朮丹皮淋澀而火盛痛脹者宜大分清飲或抽薪飲腫而墜毒者補中益氣湯加山梔丹皮可洗者用百草煎可敷者宜螵蛸散完瘡散蛇蛻散治婦人陰瘡先以荊芥蛇床子湯熏洗挹干敷藥蛇蛻一條燒存性枯礬黃丹萹蓄藁本各一兩硫黃荊芥穗蛇床子各五錢上為細末香油調搽濕則乾摻陰癢八十婦人陰癢者必有陰蟲微則癢甚則痛或為膿水淋瀝多由濕熱所化名曰䘌內宜清肝火以龍膽瀉肝湯及加味逍遙散主之外宜桃仁研膏和雄黃末或同難肝納陰中以制其蟲然無如銀硃煙搽雞肝以納之尤妙椒茱湯治婦人陰癢不可忍惟以熱湯泡洗有不能住手者花椒吳茱萸蛇床子各一兩藜蘆半兩陳茶一撮炒鹽二兩以水五升煎湯乘熱熏洗杏仁膏治婦人陰癢不可忍杏仁燒存性麝香少許上為末用舊帛裹之縛定火上炙熱納陰中椿根皮湯治陰癢突出臭椿皮荊芥穗藿香等分上銼煎湯熏洗即癢止而入一方治疳蟲下蝕下部用蒲黃水銀研勻敷入外以鶴蝨草煎湯熏洗炙肝散治婦人陰癢蟲蝕用牛肝或豬肝切三寸長大如錢炙熟納陰中引蟲出盡即愈一方治陰中蟲癢搗桃葉綿裹納陰中日易三四次一方治陰癢用蛇床子一兩白礬五錢煎湯淋洗陰冷八一婦人陰冷有寒證有熱證寒由陽虛真寒證也熱由濕熱假寒證也假寒者必有熱證如小便澀數黃赤大便燥結煩渴之類是也真寒者小便清利陽虛畏寒者是也真寒者宜補其陽如理陰煎十補丸加減續嗣降生丹假寒者當清其火宜龍膽瀉肝湯加味逍遙散肝腎虛寒者宜暖肝煎鎮陰煎大營煎脾胃虛寒者宜理中湯理陰煎壽脾煎之類主之交接出血而痛八二凡婦人交接即出血者多由陰氣薄弱腎元不固或陰分有火而然若脾虛氣陷不能攝血者宜補中益氣湯或補陰益氣煎若脾腎虛弱陰氣不固者宜壽脾煎歸脾湯若肝腎陰虛不守者宜固陰煎若陰火動血者宜保陰煎前陰類論列總方八三固陰煎新固二保陰煎新寒一補中益氣湯補三十理陰煎新熱三理中湯熱一補陰益氣煎新補十六歸脾湯補三二壽脾煎新熱十六加味精逍遙散補九三四物湯補八祕元煎新固一續嗣降生丹婦一三六清化飲新因十三大營煎新補十四芍藥蒺藜煎新因三五大營煎新補十四暖肝煎新熱十五鎮陰煎新熱十三十補丸熱一七三徒薪飲新寒四大分清飲新寒五百草煎新因三七螵蛸散新因三八銀硃煙新因五三抽薪飲新寒三完瘡散新因五九
