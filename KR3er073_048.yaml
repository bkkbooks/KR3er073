body:
  text: 卷之四十八大集本草正上山草部人參一反藜蘆味甘微苦微溫氣味頗厚陽中微陰氣虛血虛俱能補陽氣虛竭者此能回之於無何有之鄉陰血崩潰者此能障之於已決裂之後惟其氣壯而不辛所以能固氣惟其味甘而純正所以能補血故凡虛而發熱虛而自汗虛而眩運虛而困倦虛而驚懼虛而短氣虛而遺泄虛而瀉利虛而頭疼虛而腹痛虛而飲食不運虛而痰涎壅滯虛而嗽血吐血虛而淋瀝便閉虛而嘔逆躁煩虛而下血失氣等證是皆必不可缺者第欲以氣血相較則人參氣味頗輕而屬陽者多所以得氣分者六得血分者四總之不失為氣分之藥而血分之所不可缺者為未有氣不至而血能自至者也故扁鵲曰損其肺者益其氣須用人參以益之肺氣既王餘臟之氣皆王矣所以人參之性多主於氣而凡臟腑之有氣虛者皆能補之然其性溫故積溫亦能成熱若云人參不熱則可云人參之性涼恐未必然雖東垣云人參黃耆為退火之聖藥丹溪云虛火可補參朮之類是也此亦皆言虛火也而虛火二字最有關係若內真寒而外假熱者是為真正虛火非放膽用之必不可也然有一等元陰虧乏而邪火爍於表裡神魂躁動內外枯熱真正陰虛一證誰謂其非虛火若過用人參果能助熱若王節齋云陽旺則陰愈消及節要云陰虛火動者勿用又曰肺熱還傷肺等説固有此理亦不可謂其盡非而近之明哲如李月池輩皆極不然之恐亦未必然也夫虛火二字最當分其實中有虛虛中有實陽中有陰陰中有陽惟勿以成心而執己見斯可矣如必欲彼此是非是所謂面東方不見西牆皆未得其中也豫請剖之曰如龍雷之火原屬虛火得水則燔得日則散是即假熱之火故補陽即消矣至若亢旱塵飛赤地千里得非陽亢陰虛而亦可以捕陽生陰乎或必曰此正實火也得寒則已豫曰不然夫炎暑酷烈熱令大行此為實火非寒莫解而乾枯燥旱泉源斷流是謂陰虛非水莫濟此實火之與陰虛亦自判然可別是以陰虛而火不盛者自當用參為君若陰虛而火稍盛者但可用參為佐若陰虛而火大盛者則誠有暫忌人參而惟用純甘壯水之劑庶可收功一證不可不知也豫非不善用人參者亦非畏用而不知人參之能補陰者蓋以天下之理原有對待謂之曰陰虛必當忌參固不可謂之曰陰虛必當用參亦不可要亦得其中和用其當而已矣觀者詳之黃耆三味甘氣平氣味俱輕升多降少陽中微陰生者微涼可治癰疽蜜炙性溫能補虛損因其味輕故專於氣分而達表所以能補元陽充腠理治勞傷長肌肉氣虛而難汗者可發表疏而多汗者可止其所以止血崩血淋者以氣固而血自止也故曰血脫益氣其所以除瀉痢帶濁者以氣固而陷自除也故曰陷者舉之然其性味俱浮純於氣分故中滿氣滯者當酌用之白朮二味甘辛氣溫氣味俱厚可升可降陽中有陰氣中有血其性溫燥故能益氣和中補陽生血暖胃消穀益津液長肌肉助精神實脾胃止嘔逆補勞倦進飲食利小水除濕運痰消浮去脹治心腹冷痛胃虛下痢痃癖癥瘕制以人乳欲潤其燥炒以壁土欲助其固佐以黃芩清熱安胎以其性澀壯氣故能止汗實表而癰疽得之必反多膿奔豚遇之恐反增氣及上焦燥熱而氣多壅滯者皆宜酌用之然冬朮甘而柔潤夏術苦而燥烈此其功用大有不同不可不為深辨也若於飢時擇肥而甘者嚼而服之服之久久誠為延壽之物是實人所未知蒼朮四味苦甘辛性溫而燥氣味俱厚可升可降陽也用此者用其溫散燥濕其性溫散故能發汗寬中調胃進食去心腹脹疼霍亂嘔吐解諸鬱結逐山嵐寒疫散風眩頭疼消痰癖氣塊水腫脹滿其性燥濕故治冷痢冷泄滑瀉腸風寒濕諸瘡與黃柏同煎最逐下焦濕熱痿痹若內熱陰虛表疏汗出者忌服然惟茅山者其質堅小其味甘醇補益功多大勝他術甘草五味甘氣平生涼炙溫可升可降善於解毒反甘遂海藻大戟芫花其味至甘得中和之性有調補之功故毒藥得之解其毒剛藥得之和其性表藥得之助其升下藥得之緩其速助參耆成氣虛之功人所知也肋熟地療陰虛之危誰其曉焉祛邪熱堅筋骨健脾胃長肌肉隨氣藥入氣隨血藥入血無往不可故稱國老惟中滿者勿加恐其作脹速下者勿入恐其緩功不可不知也黃精六一名救窮草味甘微辛性溫能補中益氣安五臟療五勞七傷助筋骨益脾胃潤心肺填精髓耐寒暑下三蟲久服延年不飢發白更黑齒落更生張華博物志言天老曰太陽之草名黃精食之可以長生太陰之草名鉤吻不可食之入口立死此但以黃精鉤吻對言善惡原非謂其相似也而陶弘景謂黃精之葉與鉤吻相似誤服之害人蘇恭曰黃精葉似柳鉤吻蔓生葉如柿葉殊非比類陳藏器曰鉤吻乃野葛之別名二物全不相似不知陶公憑何説此是可見黃精之內本無鉤吻不必疑也肉蓯蓉七味甘鹹微辛酸氣微溫味重陰也降也其性滑以其味重而甘溫故助相火補精興陽益子嗣治女人血虛不孕暖腰膝堅筋骨除下焦寒痛以其補陰助陽故禁虛寒遺瀝泄精止血崩尿血以其性滑故可除莖中寒熱澀痛但驟服反動大便若虛不可攻而大便閉結不通者洗淡暫用三四錢一劑即通神效丹參八味微苦微甘微澀性微涼無毒反藜蘆能養血活血生新血行宿血故能安生胎落死胎血崩帶下可止經脈不勻可調此心脾肝腎血分之藥所以亦能養陰定志益氣解煩療眼疼腳痹通利關節及惡瘡疥癬赤眼丹毒排膿止痛長肉生肌還志九味微苦微辛氣溫陽也升也制以甘草湯浸一宿曬乾炒用功專心腎故可鎮心止驚辟邪安夢壯陽益精強志助力以其氣升故同人參甘草棗仁極能舉陷攝精交接水火但可為佐用不宜多神氣上虛者所宜痰火上實者當避巴戟天十味甘微溫陰中陽也雖曰足少陰腎經之藥然亦能養心神安五臟補五勞益志氣助精強陰治陰痿不起腰膝疼痛及夜夢鬼交遺精溺濁小腹陰中相引疼痛等證制宜酒浸去心微炒或滾水浸剝亦可仙茅十一味辛溫有小毒陽也能助神明強筋骨益肌膚培精血明耳目填骨髓開胃消食助益房事溫利五臟補暖腰腳此西域婆羅門僧獻方於唐明皇服之有效久祕而後得傳按許真君書云仙茅久服可以長生其味甘能養肉辛能養節苦能養氣咸能養骨滑能養膚酸能養筋宜和苦酒服之必效也然仙茅性熱惟陽弱精寒稟賦素怯者宜之苦體壯相火熾盛者服之大能動火不可不察凡制用之法於八九月採得用竹刀刮去黑皮切如豆粒糯米泔浸兩宿去赤汁用酒拌蒸之從巳至亥制之極熟自無毒矣然後曝乾搗篩熟蜜丸桐子大每空心酒飲任下二三十丸忌食牛乳及黑牛肉恐減藥力也若隨群補藥中為丸服之無所不可天麻十二一名赤箭一名定風草味辛平陰中有陽治風虛眩暈頭旋眼黑頭痛諸風濕痹四肢拘攣利腰膝強筋骨安神志通血脈止驚恐恍惚殺鬼精蟲毒及小兒風癇驚氣然性懦力緩用須加倍或以別藥相佐然後見功沙參十三反藜蘆一名鈴兒草味微甘苦氣味俱輕性微寒能養肝氣治多眠除邪熱益五臟陰氣清肺涼肝滋養血脈散風熱瘙癢頭面腫痛排膿消腫長肌肉止驚煩除疝痛然性緩力微非堪大用易老云人參補五臟之陽沙參補五臟之陰特以其甘涼而和補中清火反而言之故有是論若云對待人參則相去遠矣玄參十四反藜蘆味苦甘微咸氣寒此物味苦而甘苦能清火甘能滋陰以其味甘故降性亦緩本草言其惟入腎經而不知其尤走肺臟故能退無根浮遊之火散周身痰結熱癰逐頸項咽喉痹毒瘰癧結核驅男女傳尸煩躁骨蒸解溫瘧寒熱往來治傷寒熱斑支滿亦療女人産乳余疾或腸中血瘕熱癥並療勞傷痰嗽熱煩補腎滋陰明目解渴茅根十五即白茅味甘涼性純美能補中益氣此良藥也善理血病凡吐血衄血瘀血血閉及婦人經水不調崩中漏下且通五淋除客熱止煩渴堅筋骨療肺熱噦逆喘急解酒毒及黃疸水腫久服大是益人若治癰疽癤母及諸毒諸瘡諸血或用根搗敷或用此煮汁調敷毒等藥或以酒煮服無不可也茅有數種處處有之惟白者為勝春生芽布地如針故曰茅針可以生啖甚益小兒功用亦同濕羊霍十六味甘氣辛性溫乃手足陽明少陰三焦命門藥也主陽虛陽痿莖中作痛化小水益精氣強志意堅筋骨暖下部一切冷風勞氣筋骨拘攣補腰膝壯真陰及年老昏耄中年健忘凡男子陽衰女子陰衰艱於子嗣者皆宜服之服此之法或單用浸酒或兼佐丸散無不可者製法每擇淨一斤以羊脂四兩同炒油盡用之苦參十七味苦性寒反藜蘆沉也陰也乃足少陰腎經之藥能祛積熱黃疸止夢遺帶濁清小便利水除癰腫明目止淚平胃氣能令人嗜食利九竅除伏熱狂邪止渴醒酒療惡瘡斑疹疥癩殺疳蟲及毒風煩躁脫眉炒黃為末米飲調服治腸風下血熱痢貝母十八反烏頭味苦氣平微寒氣味俱輕功力頗緩用須加倍善解肝臟郁愁亦散心中逆氣祛肺痿肺癰痰膿喘嗽研末沙糖為丸含咽最佳降胸中因熱結胸及乳癰流痰結核若足生人面諸瘡燒灰油調頻敷産難胞衣不出研末用酒和吞亦除瘕疝喉痹金瘡並止消渴煩熱赤眼翳膜堪點時疾黃疸能驅又如半夏貝母俱治痰嗽但半夏兼治脾肺貝母獨善清金半夏用其辛貝母用其苦半夏用其溫貝母用其涼半夏性速貝母性緩半夏散寒貝母清熱性味陰陽大有不同俗有代用者其謬孰甚土貝母十九反烏頭味大苦性寒陰也降也乃手太陰少陽足陽明厥陰之藥大治肺癰肺痿咳喘吐血衄血最降痰氣善開鬱結止疼痛消脹滿清肝火明耳目除時氣煩熱黃疸淋閉便血溺血解熱毒殺諸蟲及療喉痹瘰癧乳癰發背一切癰瘍腫毒濕熱惡瘡痔漏金瘡出血火瘡疼痛為末可敷煎湯可服性味俱厚較之川貝母清降之功不啻數倍山慈菰二十一名金燈龍味甘微辛有小毒治癰瘍疔腫瘡瘻瘰癧結核破皮攻毒俱宜醋磨敷之除皯斑剝人面皮宜搗汁塗之並治諸毒蠱毒蛇蟲狂犬等傷或用酒調服或乾摻之亦冶風痰癇疾以茶清研服取吐可愈柴胡二一味苦微辛氣平微寒氣味俱輕升也陽中之陰用此者用其涼散平肝之熱入肝膽三焦心胞四經其性涼故解寒熱往來肌表潮熱肝膽火炎胸脅痛結兼治瘡瘍血室受熱其性散故主傷寒邪熱未解溫瘧熱盛少陽頭痛肝經郁證總之邪實者可用真虛者當酌其宜雖引清氣上升然升中有散中虛者不可散虛熱者不可寒豈容誤哉兼之性滑善通大便凡溏泄脾薄者當慎用之熱結不通者用佐當歸黃芩正所宜也愚謂柴胡之性善泄善散所以大能走汗大能泄氣斷非滋補之物凡病陰虛水虧而孤陽勞熱者不可再損營氣蓋未有用散而不泄營氣者未有動汗而不傷營血者營即陰也陰既虛矣尚堪再損其陰否然則用柴胡以治虛勞之熱者果亦何所取義耶觀寇宗奭衍義曰柴胡本經並無一字治勞今人冶勞方中鮮有不用者嗚呼凡此誤世甚多嘗原病勞之人有一種臟本虛損復受邪熱者當須斟酌用之如經驗方中治勞青蒿煎之用柴胡正合宜耳若或無邪得此愈甚雖至死人亦不怨目擊甚多日華子又謂補五勞七傷藥性論亦謂治勞乏羸瘦若此等病苟無實熱醫者執而用之不死何待注釋本草一字不可忽蓋萬世之後所誤無窮可不謹哉觀此寇氏之説其意專在邪熱二字謂但察有邪無邪以決可用不可用此誠得理之見而復有非之者抑又何也即在王海藏亦曰苟無實熱而用柴胡不死何待凡此所見略同用者不可不察桔梗二二一名薺苨味苦微辛氣微涼氣輕於味陽中有陰有小毒其性浮用此者用其載藥上升故有舟楫之號入肺膽胸膈上焦載散藥表散寒邪載涼藥清咽疼喉痹亦治赤目腫痛載肺藥解肺熱肺癰鼻塞唾膿咳嗽載痰藥能消痰止嘔亦可寬胸下氣引大黃可使上升引青皮平肝止痛能解中惡蠱毒亦治驚癇怔忡若欲專用降劑此物不宜同用防風二三味甘辛氣溫升也陽也用此者用其氣平散風雖膀胱脾胃經藥然隨諸經之藥各經皆至氣味俱輕故散風邪治一身之痛療風眼止冷淚風能勝濕故亦去濕除遍體濕瘡若隨實表補氣諸藥亦能收汗升舉陽氣止腸風下血崩漏然此風藥中之潤劑亦能走散上焦元氣誤服久服反能傷人細辛二四反藜蘆忌生菜味大辛氣溫氣味俱厚升也陽也有小毒用此者用其溫散善袪陰分之寒邪除陰經之頭痛益肝溫膽利竅逐諸風濕痹風癇疲瘧鼻齆不聞香臭開關通竅散風浪目疼口臭牙蟲煎湯含漱過服亦散真氣不可不知此味辛甚故能逐陰分之邪陰分且然陽分可知舊云少陰厥陰之藥然豈有辛甚而不入陽分者但陽證忌熱用當審之羌活二五味微苦氣辛微溫升也陽也用此者用其散寒定痛能入諸經太陽為最散肌表之寒邪利周身項脊之疼痛排太陽之癰疽除新舊之風濕緣非柔懦之物故能撥亂反正惟其氣雄大能散逐若正氣虛者忌用之獨活二六味苦氣香性微涼升中有降善行滯氣故入腎與膀胱兩經專理下焦風濕兩足痛痹濕癢拘攣或因風濕而齒痛頭眩喘逆奔豚疝瘕腰腹疼痛等證皆宜用之升麻二七味微苦氣平氣味俱輕浮而升陽也用此者用其升散提氣乃脾胃肺與大腸四經之藥善散陽明經風寒肌表邪熱提元氣之下陷舉大腸之脫泄除陽明溫疫表邪解膚腠風熱斑疹引石膏除齒牙臭爛腫痛引蔥頭去陽明表證頭疼佐當歸肉蓯蓉可通大便結燥凡癰疽痘疹陽虛不能起發及瀉痢崩淋夢遺脫肛陽虛下陷之類用佐補劑皆所宜也若上實氣壅諸火炎上及太陽表證皆不宜用且其味苦氣散若血氣太虛及水火無根者並不可用前胡二八味苦氣寒降也陰中微陽去火痰實熱開氣逆結滯轉筋霍亂除胸中痞滿氣喘嘔逆咳嗽煩悶治傷寒寒熱風熱頭疼解嬰兒疳熱延胡索二九味苦微辛氣微溫入肝脾二經善行滯氣破滯血血中氣藥故能止腹痛通經調月水淋滯心氣疼痛破症癖跌撲凝瘀亦善落胎利小便及産後逆血上衝俱宜以酒煮服或用酒磨服亦可然性惟破氣逐血必真有血逆氣滯者方可用若産後血虛或經血枯少不利氣虛作痛者皆大非所宜紫草三十味苦性寒此手厥陰足厥陰血分之藥性寒而利能涼血滑血通利二便故痘疹家宜用之凡治痘疹無論未出已出但血熱毒盛或紫或黑而大便祕結者宜用之若已出紅活不紫不黑而大便如常通利者即不可用故曾世榮活幼心書云紫草性寒小兒脾氣實者猶可用脾氣虛者反能作瀉又若古方惟用其茸亦取其氣輕味薄而有清涼升發之功也此外可用以解黃疸消腫脹及一切斑疹惡瘡亦以其能利九竅通水道去濕涼血而然也白芨三一味苦澀性收斂微寒反烏頭能入肺止血療肺癰肺痿治癰疽敗爛惡瘡刀箭湯火損傷生肌止痛俱可為未敷之凡吐血不能止者用白芨為末米飲調服即效三七三二味甘氣溫乃陽明厥陰血分之藥故善止血散血定痛凡金刃刀箭所傷及跌撲杖瘡血出不止嚼爛塗之或為末摻之其血即止亦治吐血衄血下血血痢崩漏經水不止産後惡血不下俱宜自嚼或為末米飲送下二三錢若治虎咬蛇傷等證俱可服可敷葉之性用與根大同凡折傷趺撲出血敷之即止青腫亦散白蘚皮三三味苦寒性燥而降乃手足太陰陽明之藥解熱黃酒黃急黃谷黃勞黃通關節九竅利血脈小水治時行大熱飲水狂躁叫呼及婦人陰中腫痛小兒風熱驚癇尤治一切毒風風瘡疥癬赤爛楊梅瘡毒眉發脫落此雖善理瘡瘍而實為諸黃風痹要藥秦艽三四味苦性沉寒沉中有浮手足陽明清火藥也治風寒濕痹利小水療通身風濕拘攣手足不遂清黃疸解溫疫熱母除口噤牙疼口瘡腸風下血及虛勞骨蒸發熱潮熱煩渴及婦人胎熱小兒疳熱瘦弱等證地榆三五味苦微澀性寒而降既清且澀故能止吐血衄血清火明目冶腸風血痢及婦人崩漏下血月經不止帶濁痔漏産後陰氣散失亦斂盜汗療熱痞除惡肉止瘡毒疼痛凡血熱者當用虛寒者不相宜也作膏可貼金瘡搗汁可塗虎犬蛇蟲傷毒飲之亦可黃芩三六味苦氣寒氣輕於味可升可降陰中微陽枯者善於入肺實者善入大腸欲其上者酒炒欲其下者生用枯者清上焦之火消痰利氣定喘嗽止失血退往來寒熱風熱濕熱頭痛解瘟疫清咽療肺痿肺癰乳癰發背尤祛肌表之熱故治斑疹鼠瘻瘡瘍赤眼實者涼下焦之熱能除赤痢熱蓄膀胱五淋澀痛大腸閉結便血漏血胎因火盛不安酌佐砂仁白朮腹因火滯為痛可加黃連厚朴大腸無火滑泄者最當慎用黃連三七味大苦氣大寒味厚氣薄沉也降也降中微升陰中微陽專治諸火火在上炒以酒火在下炒以童便火而嘔者炒以薑汁火而伏者炒以鹽湯同吳茱萸炒可以止火痛同陳壁土炒可止熱瀉同枳實用可消火脹同天花粉用能解煩渴同木香丸和火滯下痢腹痛同吳茱萸丸治胃熱吐吞酸水總之其性大寒故惟平肝涼血肅胃清腸涼膽止驚癇瀉心除痞滿上可治吐血衄血下可治腸澼便紅療婦人陰戶腫痛除小兒食積熱疳殺蛔蟲消惡瘡癰腫除濕熱鬱熱善治火眼亦消痔漏解烏附之熱殺巴豆之毒然其善瀉心脾實火虛熱妄用必致格陽故寇宗奭曰虛而冷者慎勿輕用王海藏曰夏月久血痢不用黃連陰在內也景嶽曰人之脾胃所以盛載萬物發生萬物本象地而屬土土暖則氣行而燥土寒則氣凝而濕土燥則實土濕則滑此天地間不易之至理黃連之苦寒若此所以過服芩連者無不敗脾此其濕滑亦自明顯易見獨因陶弘景別録中有調胃厚腸之一言而劉河間復證之曰諸苦寒藥多泄惟黃連黃柏性冷而燥因致後世視為奇見無不謂黃連性燥而厚腸胃凡治瀉痢者開手便是黃連不知黃連黃柏之燥於何見之嗚呼一言之謬流染若此難洗若此悖理惑人莫此為甚雖曰黃連治痢亦有效者然必其素稟陽臟或多縱口腹濕熱為痢者乃其所宜且凡以縱肆不節而血氣正強者即或誤用未必殺人久之邪去亦必漸愈而歸功黃連何不可也此外則凡以元氣素弱傷脾患痢或本無火邪而寒濕動脾者其病極多若妄用黃連則脾腎日敗百無一生凡患痢而死者率由此類可不寒心余為此言而人有未必信者多以苦燥二字有未明耳故余於傳忠録辨河間條中復詳言若味之理以後衛生仁者再為贊正庶是非得明而民生有攸賴矣道書言服黃連犯豬肉令人泄瀉胡黃連三八味大苦大寒其性味功用大似黃連能涼肝明目治骨蒸勞熱三消吐血衄血五心煩熱療婦人胎熱虛驚熱痢及小兒疳熱驚癇侵人乳點目甚良知母三九味苦寒陰也其性沉中有浮浮則入手太陰手少陰沉則入足陽明足厥陰足少陰也故其在上則能清肺止渴卻頭痛潤心肺解虛煩喘嗽吐血衄血去喉中腥臭在中則能退胃火平消疸在下則能利小水潤大便去膀胱肝腎濕熱腰腳腫痛並治勞瘵內熱退陰火解熱淋崩濁古書言知母佐黃柏滋陰降火有金水相生之義蓋謂黃柏能制膀胱命門陰中之火知母能消肺金制腎水化源之火去火可以保陰見即所謂滋陰也故潔古東垣皆以為滋陰降火之要藥繼自丹溪而後則皆用以為補陰誠大謬矣夫知母以沉寒之性本無生氣用以清火則可用以補陰則何補之有第其陰柔巽順似乎有德倘元氣既虧猶欲藉此以望補益是亦猶小人在朝而國家元氣日受其削有陰移焉而莫之覺者是不可不見之真而辨之早也龍臘草四十味大苦大寒陰也沉也乃足厥陰少陽之正藥大能瀉火但引以佐使則諸火皆治故能退骨蒸疳熱除心火驚癇狂躁胃火煩熱黃疸咽喉腫痛肝腎膀胱伏火小水淋閉血熱瀉痢下焦濕熱癰腫瘡毒疼痛婦人血熱崩淋小兒熱疳客忤去目黃睛赤腫痛殺蠱毒腸胃諸蟲及風熱盜汗凡肝腎有餘之火皆其所宜隰草部地黃四一生地黃味苦甘氣涼氣薄味厚沉也陰也鮮者更涼乾者微涼能生血補血涼心火退血熱去煩躁骨蒸熱痢下血止嘔血衄血脾中濕熱或婦人血熱而經枯或上下三消而熱渴總之其性頗涼若脾胃有寒者用宜斟酌熟地黃味甘微苦味厚氣薄沉也陰中有陽本草言其入手足厥少陰經大補血衰滋培腎水填骨髓益真陰專補腎中元氣兼療藏血之經此雖泛得其概亦豈足以盡是之妙夫地黃産於中州沃土之鄉得土氣之最厚者也其色黃士之色也其味甘土之味也得土之氣而曰非太陰陽明之藥吾弗信也惟是生者性涼脾胃喜暖故脾陽不足者所當慎用至若熟則性平稟至陰之德氣味純靜故能補五臟之真陰而又於多血之臟為最要得非脾胃經藥耶且夫人之所以有生者氣與血耳氣主陽而動血主陰而靜補氣以人參為主而耆朮但可為之佐補血以熟地為主而芎歸但可為之佐然在耆朮芎歸則又有所當避而人參熟地則氣血之必不可無故凡諸經之陽氣虛者非人參不可諸經之陰血虛者非熟地不可人參有健運之功熟地稟靜順之德此熟地之與人參一陰一陽相為表裡一形一氣互主生成性味中正無逾於此誠有不可假借而更代者矣凡諸真陰虧損者有為發熱為頭疼為焦渴為喉痹為嗽痰為喘氣或脾腎寒逆為嘔吐或虛火載血於口鼻或水泛於皮膚或陰虛而泄利或陽浮而狂躁或陰脫而仆地陰虛而神散者非熟地之守不足以聚之陰虛而火升者非熟地之重不足以降之陰虛而躁動者非熟地之靜不足以鎮之陰虛而剛急者非熟地之甘不足以緩之陰虛而水邪泛濫者舍熟地何以自制陰虛而真氣散失者舍熟地何以歸源陰虛而精血俱損脂膏殘薄者舍熟地何以厚腸胃且猶有最玄最妙者則熟地兼散劑方能發汗何也以汗化於血而無陰不作汗也熟地兼溫劑始能回陽何也以陽生於下而無復不成干也然而陽性速故人參少用亦可成功陰性緩熟地非多難以奏效而今人有畏其滯膩者則崔氏何以用腎氣丸而治痰浮有畏其滑濕者則仲景何以用八味丸而醫腎泄有謂陽能生陰陰不能生陽者則陰陽之理原自互根彼此相須缺一不可無陽則陰無以生無陰則陽無以化故內經曰精化為氣得非陰亦生陽乎孰謂陽之能生而陰之不能長也又若制用之法有用薑汁拌炒者則必有中寒兼嘔而後可有用砂仁制者則必有脹滿不行而後可有用酒拌炒者則必有經絡壅滯而後可使無此數者而必欲強用製法是不知用熟地者正欲用其靜重之妙而反為散動以亂其性何異畫蛇而添足今之人即欲用之補陰而必兼以滲利則焉知補陰不利水利水不補陰而補陰之法不宜滲即有用之補血而復疑其滯膩則焉知血虛如燥土旱極望雲霓而枯竭之陽極喜滋設不明此則少爪之尚欲兼之以利又孰敢單用之而任之以多單用而多且不敢又孰敢再助以甘而盡其所長是又何異因咽而廢食也嗟嗟熟地之功其不申於時用者久矣其有不可以筆楮盡者尚多也豫今特表而出之尚祈明者之自悟焉牛膝四二味若甘氣微涼性降而滑陰也忌牛肉酒漬㕮咀走十二經絡助一身元氣主手足血熱痿痹血燥拘攣通膀胱澀祕大腸乾結補髓填精益陰活血治腰膝痠疼滋鬚髮枯白其性下走如奔故能通經閉破血症引諸藥下降同麝香用墮胎尤速凡臟寒便滑下元不固者當忌用之麥門冬四三味甘微苦性微寒降也陽中陰也去心用恐令人煩其味甘多苦少故上行心肺補上焦之津液清胸膈之渴煩解火炎之嘔吐退血燥之虛熱益精滋陰澤肌潤結肺痿肺癰咳唾衄血經枯乳汁不行肺乾咳嗽不絶降火清心消痰補怯復脈須仗人參便滑中寒者勿設續斷四四川者色灰黑尖瘦多蘆形如雞腳皮斷而皺者是味苦而澀苦重澀輕氣微涼他産者味甘微辛澀少用川者良凡用此者用其苦澀其味苦而重故能入血分調血脈消腫毒乳癰瘰癧痔瘻治金損跌傷續筋骨血脈其味澀故能止吐血衄血崩淋胎漏便血尿血調血痢縮小便止遺精帶濁佐之以甘如甘草地黃人參山藥之類其效尤捷蜀葵子四五味甘性寒能利小水通淋閉消水腫潤大腸催生落胎通乳汁亦治一切瘡疥並瘢疵赤靨苗葉可作菜茹古以葵為五菜之主今不復用之矣黃葵花性滑利與蜀葵大同若治諸惡瘡膿水久不瘥者用花為末敷之即愈為瘡家要藥浸油可塗湯火瘡車前子四六即瞥苡味甘微咸氣寒入膀胱肝經通尿管熱淋澀痛驅風熱目赤翳膜利水能除濕痹性滑極善催生兼治濕熱瀉痢亦去心胸煩熱根葉生搗汁飲治一切尿血衄血熱痢尤逐氣癮利水白蒺藜四七味苦微辛微草微涼能破癥瘕結聚止遺溺泄精療肺痿肺癰翳膜目赤除喉痹癬疥痔瘰癜風通身濕爛惡瘡乳岩帶下俱宜催生止煩亦用涼血養血亦善補陰用補宜炒熱去刺用涼宜連刺生搗去風解毒白者最良沙苑蒺藜性亦大同若用固精補腎止遺瀝尿血縮小便止煩渴去燥熱則亦可用此紅花四八味甘微苦微宰氣微涼陰中微陽惟入血脈多用女科少用可活血引經多用能破血通瘀可下死胎亦療血暈達痘瘡血熱難出散斑疹血滯不消潤燥活血止痛通經亦消腫毒紫菀四九味苦平微辛辛能入肺苦能降氣故治咳嗽上氣痰喘惟肺實氣壅或火邪刑金而致咳唾膿血者乃可用之若以勞傷肺腎水虧金燥而咳喘失血者則非所宜觀陶氏別録謂其補不足治五勞體虛其亦言之過也甘菊花五十白菊花根善利水搗汁和酒服之大治癃閉味甘色黃者能養血散風去頭目風熱眩暈疼痛目中翳膜及遍身遊風風疹作枕明目葉亦可用味苦者性涼能解血中鬱熱清頭目去風熱眼目腫痛流浪根葉辛香能消癰毒止疼痛野菊花五一一名苦薏根葉莖花皆可同用味苦辛大能散火散氣消癰毒疔腫瘰癧眼目熱痛亦破婦人瘀血孫氏治癰毒方用野菊連根葉搗爛酒煎熱服取汗以渣敷之或同蒼耳搗汁以熱酒沖服冬月用乾者煎服或為末酒服亦可豨蘞五二味苦氣微寒有小毒此物氣味頗峻善逐風濕諸毒用蜜酒層層和灑九蒸九曝蜜丸空心酒吞多寡隨宜善治中風口眼歪邪除濕痹腰腳痿痛麻木生者酒煎逐破傷風危急如神散撒麻疔惡毒惡瘡浮腫虎傷狗咬蜘蛛蟲毒或搗爛封之或煎湯或散敷並良其掃蕩功力若此似於元氣虛者非利益母草五三子名茺蔚味微苦微辛微寒性滑而利善調女人胎産諸證故有益母之號能去死胎滑生胎活血涼血行血故能治産難胎衣不下子死腹中及經脈不調崩中漏下尿血瀉血瘀血等證然惟血熱血滯及胎産艱澀者宜之若血氣素虛兼寒及滑陷不固者皆非所宜不得以其益母之名謂婦人所必用也蓋用其滑利之性則可求其補益之功則未也本草言其久服益精輕身誠不足信此外如退浮腫下水氣及打撲瘀血通大小便之類皆以其能利也若治疔腫乳癰丹毒惡毒則可搗汁飲之其渣亦可敷貼子名茺蔚功用略同但子味微甘稍溫故能涼血補血亦益陰氣明目瞿麥五四味苦微寒降也性滑利能通小便降陰火除五淋利血脈兼涼藥亦消眼目腫痛兼血藥則能通經破血下胎凡下焦濕熱疼痛諸病皆可用之茵陳五五味苦微辛氣微寒陰中微陽入足太陽經用此者用其利濕逐熱故能通關節解熱滯療天行時疾熱狂頭痛利小水專治黃疸宜佐梔子黃而濕者多腫再加滲利黃而燥者乾澀再加涼潤只有陰黃一證因以中寒不運此非所宜又解傷寒瘴瘧火熱散熱痰風熱疼痛濕熱為痢尤其所宜青蒿五六味苦微辛性寒陰中有陽降中有散主肝腎三焦血分之病療陰火伏留骨節故善治骨蒸勞熱尸疰鬼氣降火滋陰潤顏色長毛髮治瘧疾寒熱殺蟲毒及惡瘡濕疥生搗可敷金瘡止血止痛款冬花五七味微甘微辛而溫其氣浮陽也入手太陰經能溫肺氣故療咳嗽及肺癰肺痿咳唾膿血寇宗奭曰有人病嗽多日或教以燃款冬花三兩於無風處以筆管吸其煙滿口則咽之數日果效麻黃五八味微苦微澀氣溫而辛升也陽也此以輕楊之味而兼辛溫之性故善達肌表走經鉻大能表散風邪祛除寒毒一應瘟疫瘧疾瘴氣山嵐凡足三陽表實之證必宜用之苦寒邪深入少陰厥陰筋骨之間非用麻黃官桂不能逐也但用此之法自有微妙則在佐使之間或兼氣藥以助力可得衛中之汗或兼血藥以助液可得營中之汗或兼溫藥以助陽可逐陰凝之寒毒或兼寒藥以助陰可解炎熱之瘟邪此實傷寒陰瘧家第一要藥故仲景諸方以此為首實千古之獨得者也今見後人多有畏之為毒藥而不敢用又有謂夏月不宜用麻黃者皆不逢可哂也雖在李氏有云若過發則汗多亡陽若自汗表虛之人用之則脫人元氣是皆過用及誤用而然若陰邪深入則無論冬夏皆所最宜又何過之有此外如手太陰之風寒咳嗽手少陰之風熱斑疹足少陰之風水腫脹足厥陰之風痛目痛凡宜用散者惟斯為最然柴胡麻黃俱為散邪要藥但陽邪宜柴胡陰邪宜麻黃不可不察也制用之法須折去粗根入滾湯中煮三五沸以竹片掠去浮沫曬乾用之不爾令人動煩麻黃根味甘平微苦微澀用甘斂藥煎服可以止汗同牡蠣粉米粉或用舊蕉扇杵末等分以生絹袋盛貯用撲盜汗或夏月多汗用之俱佳萱草五九一名忘憂一名宜男一名鹿蔥萱草者詩作諼草凡樹此玩此者可解憂思故名忘憂烹食其苗氣味如蔥而鹿喜食之故名鹿蔥婦人佩其花則生男故名宜男花葉氣味甘而微涼故能去濕熱利小便赤澀除煩渴酒濕黃疸安五臟利胸膈令人和悅亦能明目根治沙淋帶濁利水氣解酒疸宜搗汁服之治吐血衄血研汁一大盞和薑汁細細呷之治吹乳乳癰腫痛須擂酒服以渣封之連翹六十味苦微辛氣微寒氣味俱薄輕清而浮升也陽中有陰入手少陰手足少陽陽明瀉心經客熱降脾胃濕熱去寸白蛔蟲通月水五淋以其味苦而輕故善達肌表散鼠瘻瘰癧癭瘤結熱蠱毒癰毒斑疹治瘡癤止痛消腫排膿瘡家號為聖丹以其辛而能用故又走經絡通血凝氣滯結聚所不可無旋覆花六一味苦甘微辛陰也降也乃手太陰肺經手陽明大腸經藥開結氣降痰涎通水道消腫滿凡氣壅濕熱者宜之但其性在走散故凡見大腸不實及氣虛陽衰之人皆所忌用鼠黏子六二一名牛蒡子一名大力子味苦辛降中有升治風毒斑疹諸瘻散瘡瘍腫毒喉痹及腰膝凝寒痹滯之氣以其善走十二經而解中有散也決明六三味微苦微甘性平微涼力薄治肝熱風眼赤而多淚及肝火目昏可為佐使惟多服久服方可得效或作枕用治頭風明目其功勝於黑豆葶藶六四味苦大寒沉也陰也氣味俱厚有毒善逐水氣不減大黃但大黃能泄血閉葶藶能泄氣閉氣行而水自行也若肺中水氣膹滿脹急者非此不能除然性急利甚凡涉氣虛者不可輕用淮南子曰大戟去水葶藶愈脹用之不慎乃反成病即此謂也第此有甜苦二種雖曰為甜然亦非真甜但稍淡耳稍淡者其性亦稍緩夏枯草六五味微苦微辛氣浮而升陰中陽也善解肝氣養肝血故能散結開鬱大治瘰癧鼠屢乳癰癭氣並治頭瘡目疾樓全善云夏枯草治目珠痛至夜則甚者神致或用苦藥點眼反甚者亦神效一男子目珠痛至夜則重用黃連點之更甚諸藥不效乃用夏枯草二兩香附二兩甘草四錢為末每服一錢半清茶調服下咽即疼減至四五服良愈也蒼耳子六六一名羊負來味苦微甘治頭風寒痛風濕周痹四臉拘攣去風明目養血暖腰膝及瘰癧瘡疥亦治鼻淵宜炒熟為末白湯點眼一二錢久之乃效忌豬肉馬肉漏蘆六七味微咸性寒有小毒主熱毒惡瘡瘰癧乳癰痔漏挑膿長肉止金瘡血出亦下乳汁通經脈消赤眼利小便止尿血腸風淋瀝遺溺及小兒壯熱療跌撲損傷可續筋骨劉寄奴六八味苦性溫能破瘀血活新血通婦人經脈産後余血損傷瘀血下氣止心腹痛及小便去血俱可為散或茶或酒調服搗敷金瘡出血不止其效尤捷用治湯火傷大效但為末摻之萹蓄六九味苦澀利小便除黃疸殺二蟲去下部濕熱浸淫陰蝕瘡疥痔漏煮汁飲之療小兒蛔蟲上攻心腹作痛大效有海上歌云心頭急痛不能當我有仙人海上方萹蓄醋煎通口咽管教時刻即安康青葙子七十野雞冠子也味微苦微寒能清肝火血熱故治赤眼退赤障消翳腫鎮肝明耳目亦去風濕惡瘡疥癩艾七一味微苦氣辛生用微溫熟用微熱能通十二經而尤為肝脾腎之藥善於溫中逐冷除濕行血中之氣氣中之滯凡婦人血氣寒滯者最宜用之故能安胎止心腹痛治帶下血崩暖腰膝止吐血下痢闢風寒寒濕瘴瘧霍亂轉筋及一切冷氣鬼氣殺蛔蟲並下部𧈟瘡或生用搗汁或熟用煎湯或用灸百病或炒熱敷尉可通經絡或袋盛包裹可溫臍膝表裡生熟俱有所宜佛耳草七二一名鼠麴草味微酸性溫大溫肺氣止寒嗽散痰氣解風寒寒熱亦止泄瀉鋪艾卷作煙筒用熏久嗽尤效藍靛七三藍葉氣味苦寒微甘善解百蟲百藥毒及治天行瘟疫熱毒發狂風熱斑疹癰瘍腫痛除煩渴止鼻衄吐血殺疳蝕金瘡箭毒凡以熱兼毒者皆宜搗汁用之靛青乃藍與石灰所成性與藍葉稍異其殺蟲止血敷諸熱毒熱瘡之功似有勝於藍葉者青黛味微咸而寒性與靛青大同解諸熱毒蟲毒金瘡熱瘡或乾摻或以水調敷若治諸熱瘡毒或用馬齒莧加青黛同搗敷之苦治天行頭痛瘟疫熱毒及小兒諸熱驚癇發熱並水研服之木賊七四味微苦微甘性溫而升陽也性亞麻黃故能發汗解肌治傷寒瘧疾去風濕散火邪療目疾退翳障止腸風下血下痢及婦人崩中帶漏月水不調亦治風濕疝痛大腸脫肛王不留行七五一名金盞銀臺味苦平性滑利乃陽明衝任血海藥也治風毒通血脈療婦人難産及經滯不調下乳汁利小便除風濕痹痛止心煩鼻衄發背癰疽瘡瘻遊風風疹出竹木刺及金瘡止血亦能定痛海金沙七六此草出黔中七月收其全科曬乾以杖擊之則細沙自莖葉中落味甘性寒乃小腸膀胱血分藥也善通利水道解鬱熱濕熱及傷寒熱狂小便癃閉腫滿熱淋膏濁血淋石淋莖中疼痛解諸熱毒或丸或散皆可用燈心草七七味淡性平能通水道澀結癃閉治五淋瀉肺熱降心火除水腫止血通陰氣散腫止渴但用敗席煮服更良若治喉痹宜燒燈草灰吹之若治下疳瘡亦用燒灰加輕粉麝香為末摻之煙又七七味辛氣溫性微熱升也陽也燒煙吸之大能醉人用時惟吸一口或二口若多吸之令人醉倒久而後蘇甚者以冷水一口解之即醒若見煩悶但用白糖解之即安亦奇物也吸時須開喉長吸咽下令其直達下焦其氣上行則能溫心肺下行則能溫肝脾腎服後能使通身溫暖微汗元陽陡壯用以治表善逐一切陰邪寒毒山嵐瘴氣風濕邪閉腠理筋骨疼痛誠頃刻取效之神劑也用以治里善壯胃氣進飲食祛陰濁寒滯消膨脹宿食止嘔噦霍亂除積聚諸蟲解鬱結止疼痛行氣停血瘀舉下陷後墜通達三焦立刻見效此物自古未聞也近自我明萬曆時始出於閩廣之間自後吳楚間皆種植之矣然總不若閩中者色微黃質細名為金絲煙者力強氣勝為優也求其習服之始則向以徵滇之役師旅深入瘴地無不染病獨一營安然無恙問其所以則衆皆服煙由是遍傳而今則西南一方無分老幼朝夕不能間矣豫初得此物亦甚疑二及習服數次乃悉其功用之捷有如是者因著性於此然此物性屬純陽善行善散惟陰滯者用之如神若陽盛氣越而多躁多火及氣虛短而多汗者皆不宜用或疑其能頃刻醉人性必有毒今彼處習服既久初未聞其妨人者抑又何耶蓋其陽氣強猛人不能勝故下咽即醉既能散邪亦必耗氣理固然也然煙氣易散而人氣隨復陽性留中旋亦生氣此其耗中有補故人多喜服而未見其損者以此後檳榔條中有説當與此參閲芳草部當歸七八味甘辛氣溫氣輕味重可升可降陰中有陽其味甘而重故專能補血其氣輕而辛故又能行血補中有動行中有補誠血中之氣藥亦血中之聖藥也頭止血上行身養血中守尾破血下流全活血不走大約佐之以補則補故能養營養血補氣生精安五臟強形體益神志凡有形虛損之病無所不宜佐之以攻則通故能祛痛通便利筋骨治拘攣癱瘓燥澀等證營虛而表不解者佐以柴葛麻桂等劑大能散表衛熱而表不斂者佐以六黃之類又能固表惟其氣辛而動故欲其靜者當避之性滑善行大便不固者當避之凡陰中火盛者當歸能動血亦非所宜陰中陽虛者當歸能養血乃不可少若血滯而為痢者正所當用其要在動滑兩字若婦人經期血滯臨産催生及産後兒枕作痛俱當以此為君小兒痘疹驚癇凡屬營虛者必不可少川芎七九味辛微甘氣溫升也陽也其性善散又走肝經氣中之血藥也反藜蘆畏硝石滑石黃連者以其沉寒而制其升散之性也芎歸俱屬血藥而芎之散動尤甚於歸故能散風寒治頭痛破瘀蓄通血脈解結氣逐疼痛排膿消腫逐血通經同細辛煎服治金瘡作痛同陳艾煎服驗胎孕有無三四月後服此微動者胎也以其氣升故兼理崩漏眩運以其甘少故散則有餘補則不足惟風寒之頭痛極宜用之若三陽火壅於上而痛者得升反甚今人不明升降而但知川芎治頭痛謬亦甚矣多服久服令人走散真氣能致暴亡用者識之芍藥八十反藜蘆味微苦微甘略酸性頗寒氣薄於味斂降多而升散少陰也有小毒白者味甘補性多赤者味苦瀉性多生者更涼酒炒微平其性沉陰故入血分補血熱之虛瀉肝火之實固腠理止熱瀉消癰腫利小便除眼疼退虛熱緩三消諸證於因熱而致者為宜若脾氣寒而痞滿難化者忌用止血虛之腹痛斂血虛之發熱白者安胎熱不寧赤者能通經破血此物乃補藥中之稍寒者非若極苦大寒之比若謂其白色屬金恐傷肝木寒伐生氣産後非宜則凡白過芍藥寒過芍藥者又將何如如仲景黑神散芍藥湯之類非皆産後要藥耶用者還當詳審若産後血熱而陰氣散失者正當用之不必疑也丹皮八一味辛苦氣微涼氣味俱輕陰中陽也赤者行性多白者行性緩入足少陰及手厥陰經忌葫蒜涼骨蒸無汗散吐衄於血除産後血滯寒熱祛腸胃蓄血症堅仍定神志通月水治驚搐風癇療癰腫住痛總之性味和緩原無補性但其微涼而辛能和血涼血生血除煩熱善行血滯滯去而鬱熱自解故亦退熱用此者用其行血滯而不峻白豆蔻八二味辛氣溫味薄氣厚陽也入脾肺兩經別有清爽之氣散胸中冷滯溫胃口止疼除嘔逆翻胃消宿食膨脹治噎膈除瘧疾解酒毒祛穢惡能退翳膜亦消痰氣欲其速效嚼咽甚良或為散亦妙肉豆蔻八三味苦辛而澀性溫理脾胃虛冷穀食不消治大腸虛冷滑泄不止以其氣香而辛故能行滯止痛和腹脹治霍亂調中下氣開胃進食解酒毒化痰飲溫胃逐蟲闢諸惡氣療小兒胃寒傷乳吐瀉以其能固大腸腸既固則元氣不走脾氣自健故曰理脾胃虛冷而實非能補虛也麵包煨熟用或銼如豆大以乾麵拌炒熟去面用之尤妙蓋但欲去其油而用其熟耳草果八四亦名草豆蔻味辛性溫熱陽也浮也入足太陰陽明能破滯氣除寒氣消食療心腹疼痛解酒毒治瘴癘寒瘧傷暑嘔吐瀉痢脹滿反胃吐酸開痰飲積聚噎膈殺魚肉毒開鬱燥濕闢除口臭及婦人惡阻氣逆帶濁此有二種惟建寧所産辛香氣和者佳宜以麵裹微火煨熟用之或面拌炒熟亦可滇廣者氣辛而臭大能損人元氣破故紙八五味苦辛氣大溫性燥而降能固下元暖水臟治下焦無火精滑帶濁諸冷頑痹脾腎虛寒而為溏泄下痢以其暖腎固精所以能療腰膝痠疼陰冷囊濕縮小便暖命門小腹止腹中疼痛腎泄以其性降所以能納氣定喘惟其氣辛而降所以氣虛氣短及有煩渴眩運者當少避之即不得已用於丸中可也忌羊肉蕓薹木香八六味苦辛性溫氣味俱厚能升能降陽中有陰行肝脾肺氣滯如神止心腹脅氣痛甚捷和胃氣止吐瀉霍亂散冷氣除脹疼厄逆治熱痢可佐芩連固大腸火煨方用順其氣症積惡逆自除調其氣安胎月經亦用亦治疫癘溫瘧亦殺蠱毒鬼精若下焦氣逆諸病亦可縮小便亦能通祕結亦能止氣逆之動血亦能消氣逆之癰腫藿香八七味辛微甘氣溫氣味懼薄陽也可升可降此物香甜不峻善快脾順氣開胃口寬胸膈進飲食止霍亂嘔吐理肺化滯加烏藥等劑亦能健脾入四君同煎能除口臭亦療水腫亦解酒穢香附八八味苦辛微甘氣溫氣味俱厚陽中有陰血中氣藥也專入肝膽二經兼行諸經之氣用此者用其行氣血之滯童便炒欲其下行醋炒則理氣痛開六郁散寒邪利三焦行結滯消飲食痰涎痞滿腹脹附腫腳氣止心腹肢體頭目齒耳諸痛療霍亂吐逆氣滯泄瀉及吐血下血尿血婦人崩中帶下經脈不調胎前産後氣逆諸病因能解鬱故曰婦人之要藥然其味辛而動若陰虛躁熱而汗出血失者概謂其要則大誤矣此外凡癰疽瘰瀝瘡瘍但氣滯不行者皆宜用之為要藥砂仁八九味辛微苦氣溫和脾行氣消食逐寒除霍亂止噁心消脹滿安氣滯之胎卻腹痛治臟寒之瀉止小便泄痢快胸膈開痰平氣逆咳嗽口齒浮熱止女子崩中鬼氣奔豚欲其溫暖須用炒研入肺腎膀胱各隨使引亦善消化銅鐵骨哽紫蘇九十味辛氣溫氣味香竄者佳用此者用其溫散解肌發汗祛風寒甚捷開胃下食治脹滿亦佳順氣宜用口臭亦闢除霍亂轉筋祛腳氣通大小腸消痰利肺止痛溫中安胎定喘解魚蟹毒治蛇犬傷或作羹或生食俱可梗能順氣其性緩體虛者可用子性潤而降能潤大便消痰喘除五膈定霍亂順氣滯薄荷九一味辛微苦氣微涼氣味俱輕升也陽也其性涼散通關節利九竅乃手厥陰太陰經藥清六陽會首散一切毒風治傷寒頭痛寒熱發毒汗療頭風腦痛清頭目咽喉口齒風熱諸病除心腹惡氣脹滿霍亂下氣消食痰辟邪氣穢惡引諸藥入營衛開小兒之風涎亦治瘰癧癰腫瘡疥風瘙癮疹作菜食之除口氣搗汁含漱去舌胎語澀揉葉塞鼻止衄血亦治蜂螫蛇傷病新痊者忌用恐其泄汗陽荊芥九二味辛苦氣溫氣厚味薄浮而升陽也用此者用其辛散調血能解肌發表退寒熱清頭目利咽喉破結氣消飲食通血脈行瘀滯助脾胃闢諸邪毒氣醒酒逐濕療頭痛頭旋脊背疼痛手足筋急𤸷痹腳氣筋骨煩疼風濕疝氣止下血血痢崩淋帶濁若産後中風強直宜研末酒服甚妙搗爛醋調敷疔瘡腫毒最佳亦鼠瘻瘰癧血風瘡疥必用之要藥白芷九三味辛氣溫氣厚味輕升也陽也其性溫散敗毒逐陽明經風寒邪熱止頭痛頭風頭眩目痛目癢淚出散肺經風寒皮膚斑疹燥癢治鼻鼽鼻淵齒痛眉稜骨痛大腸風祕腸風尿血其氣辛香達表故治瘡瘍排膿止癢定痛托癰疽肺癰瘰癧痔痿長肉生肌炒黑用之提女人血崩漏下赤白血閉陰腫欲去皯斑宜以生用可作面脂亦治蛇傷砒毒金瘡傷損香薷九四味苦辛氣寒氣輕能升能降散暑熱霍亂中脘絞痛小便澀難清肺熱降胃火除躁煩解鬱滯為末水服可止鼻衄煮汁頓飲可除風熱轉筋去口臭濕熱水腫者可消中寒陰臟者須避之益智九五氣味辛溫能調諸氣闢寒氣治客寒犯胃暖胃和中去心腹氣滯疼痛理下焦虛寒溫腎氣治遺精餘瀝夢泄赤白帶濁及夜多小便者取二十餘枚研碎入鹽少許同煎服之有奇驗此行陽退陰之藥凡脾寒不能進食及三焦命門陽氣衰弱者皆宜之然其行性多補性少必兼補劑用之斯善若單服多服未免過於散氣鬱金九六味苦辛氣溫善下氣破惡血去血積止吐血衄血血淋尿血及失心癲狂蠱毒軍用治婦人冷氣血積結聚氣滯心腹疼痛及産後敗血衝心欲死或散或丸或以韭汁薑汁童便井花水俱可隨宜調服若治痔漏腫痛宜水調敷之耳內腫痛宜水調灌入少頃傾出即可愈薑黃九七味苦辛性熱善下氣破血除心腹氣結氣脹冷氣食積疼痛亦治癥瘕血塊通月經産後敗血攻心及撲損瘀血祛邪辟惡散風熱消癰腫功與鬱金稍同而氣味則尤烈澤蘭九八味微苦微辛善清血和血治吐血衄血療婦人産前産後諸血不調破宿血除腹痛清新血利關節通水道除癥瘕消撲損瘀血並治金瘡癰腫瘡膿用在清和故為婦人要藥藁本九九味甘辛性溫氣厚味薄升也陽也療諸惡風鬼注除太陽頂巔頭痛大寒犯腦痛連齒頰及鼻麵皮膚酒齄皯刺風濕泄瀉冷氣腰疼婦人陰中風邪腫痛此足太陽經風癇霧露瘴疫之要藥萆茇一百味辛大熱陽也浮也入手足陽明亦入肝腎善溫中下氣除胃冷闢陰寒療霍亂心腹疼痛冷痰嘔逆吞酸及虛寒瀉痢腸鳴其味大辛須同參朮歸地諸甘溫補劑用之尤效為末搐鼻可解偏風頭痛揩齒可殺牙痛牙蟲又牛乳煎治唐太宗氣痢方詳列痢疾門良薑百一子名紅豆蔻味辛熱純陽浮也入足太陰陽明治胃中逆冷嘔吐清水噁心霍亂氣寒腹痛解酒毒消宿食健脾胃寬噎膈除反胃破冷癖解瘴瘧療轉筋瀉痢同草豆蔻煎欽亦治口臭子名紅豆蔻治用略同三稜百二氣味苦平能行血中之氣善破積氣逐瘀血消飲食脹滿氣滯腹痛除痃癖癥瘕積聚結塊通月水亦墮胎及産後惡血撲損瘀血並治瘡腫堅硬制宜醋浸炒熟入藥此與蓬朮稍同但蓬朮峻而此則差緩耳蓬朮百三一名蓬莪朮味苦辛氣溫有小毒走肝經善破氣中之血通月經消瘀血療跌撲損傷血滯作痛在中焦攻飲食氣滯不消胃寒吐酸膨脹在下焦攻奔豚痃癖冷氣積聚氣腫水腫制宜或酒或醋炒用或入灰火中煨熟搗切亦可但其性剛氣峻非有堅頑之積不宜用蛇床子百四味微苦氣辛性溫乃少陽三焦命門之藥辛能去風暖能溫腎故可溫中下氣和關節除疼痛開鬱滯療陰濕惡瘡疥癬縮小便去陰汗止帶濁逐寒疝漱齒痛治男子陽痿腰疼大益陽事女人陰中腫痛善暖子宮男婦陽衰無子小兒驚癇撲傷俱可服去皮殼微炒用之凡治外證瘙癢腫痛風瘡俱宜煎湯熏洗亦可為末摻敷俱宜生用蔓草部天門冬百五味苦微甘氣大寒味厚氣薄沉也陰也入肺腎兩經除虛勞內熱其味苦寒故上定熱喘下去熱淋苦殺三蟲潤滋骨髓解渴除煩消痰止嗽降火保肺退熱滋陰大潤血熱燥結虛寒假熱脾腎溏泄最忌使宜貝母地黃去皮去心方用菟絲子百六味甘辛氣微溫其性能固入肝脾腎三經先用甜水淘洗淨浸脹次用酒漬煮熟曬乾炒之更炒補髓添精助陽固泄續絶傷滋消渴縮小便止夢遺帶濁餘瀝暖腰膝寒疼壯氣力筋骨明目開胃進食肥肌禁止鬼交尤安夢寐湯液丸散任意可用古人不入煎劑亦一失也欲止消渴煎湯任意飲之五味子百七皮甘肉酸性平而斂核仁味辛苦性溫而暖俱兼鹹味故名五味入肺腎二經南者治風寒咳嗽北者療虛損勞傷整用者用其酸生津解渴止瀉除煩療耗散之肺金滋不足之腎水能收斂虛火亦解除酒毒敲碎者用其辛溫補元陽壯筋骨助命門止霍亂但感寒初嗽當忌恐其斂束不散肝旺吞酸當忌恐其助木傷土何首烏百八味甘澀微苦陰中有陽性溫此其甘能補澀能固溫能養陽雖曰肝腎之藥然白者入氣分赤者入血分凡血氣所在則五陰之臟何所不至故能養血養神助氣壯筋骨強精髓黑鬚發亦治婦人帶濁失血産後諸虛等疾第其性效稍緩暫服若不甚顯必久服之誠乃延年益壽滋生助嗣之良劑至如斷瘧疾安久痢活血治風療癰腫瘰癧風濕瘡瘍及一切冷氣腸風宿疾總由其溫固收斂之功血氣固則真元復真元復則邪自散也故唐之李翱著有何首烏傳即李時珍亦曰此物不寒不燥功在地黃門冬之上誠非誣也若其制用之法則有用黑豆層鋪九蒸九曬者有單用米泔浸三宿切焙為未而用者有用壯健人乳拌曬三次生杵為末而用者總之生不如熟即單用米泔浸透蒸之極熱則善矣或不必人乳與豆也服此之後須忌生蘿蔔並諸血敗血等物栝蔞仁百九味甘氣寒氣味俱厚性降而潤能降實熱痰涎開鬱結氣閉解消渴定脹喘潤肺止嗽但其氣味悍劣善動噁心嘔吐中氣虛者不宜用本草言其補虛勞殊為大謬天花粉百十即栝蔞根味苦性寒氣味頗輕有升有降陰中有陽最涼心肺善解熱渴大降膈上熱痰消乳癰腫毒痔瘻瘡癤排膿生肌長肉除跌撲瘀血通月水除狂熱去黃疸潤枯燥善解酒毒亦通小腸治肝火疝痛金銀花百十一一名忍冬味甘氣平其性微寒善於化毒故治癰疽腫毒瘡癬楊梅風濕諸毒誠為要藥毒未成者能散毒已成者能潰但其性緩用須倍加或用酒煮服或搗汁攙酒頓飲或研爛拌酒厚敷若治瘰癧上部氣分諸毒用一兩許時常煎服極效葛根百十二味甘氣平寒氣輕於味浮而微降陽中微陰用此者用其涼散雖善達諸陽經而陽明為最以其氣輕故善解表發汗凡解散之藥多辛熱此獨涼而甘故解溫熱時行疫疾凡熱而兼渴者此為最良當以為君而佐以柴防甘桔極妙尤散鬱火療頭痛治溫瘧往來瘡疹未透解酒除煩生津止渴除胃中熱狂殺野葛巴豆毒箭金瘡等傷但其性涼易於動嘔胃寒者所當慎用茜草百十三亦名過山龍味苦甘氣微寒陰中微陽血中要藥其味苦故能行滯血其性涼故能止動血治勞傷吐衄時來除虛熱漏崩不止亦通經滯又療乳癰散跌撲血凝瘀聚解蠱毒敗血爛肝凡諸血熱血瘀並建奇功若女人經血不通以一兩酒煎服之一日即通甚效若氣虛不攝血及脾寒者勿用土茯苓百十四一名仙遺糧味甘淡性平能健脾胃強筋骨去風濕利關節分水道止瀉痢治拘攣骨痛療癰腫喉痹除周身寒濕惡瘡尤解楊梅瘡毒及輕粉留毒潰爛疼痛諸證凡治此者須忌茶酒牛羊雞鵝及一應發風動氣等物使君子百十五味甘氣溫有小毒性善殺蟲治小兒疳積小便白濁凡大人小兒有蟲病者但於每月上旬侵晨空腹食數枚或即以殼煎湯咽下次日蟲皆死而出也或云七生七煨食亦良或云一歲食一枚食後忌飲熱茶犯之即作瀉凡小兒食此亦不宜頻而多大約性滑多則能傷脾也李時珍曰凡殺蟲藥多是苦辛惟使君子棐子甘而殺蟲亦異也但使君子專殺蛔蟲棐子專殺寸白蟲耳牽牛百十六一名黑醜味苦辛熱氣雄烈性急疾有毒下氣逐水通大小便善走氣分通水道消氣實氣滯水腫攻症積落胎殺蟲瀉蟲毒去濕熱痰飲開氣祕氣結古方多為散丸若用救急亦可佐群藥煎服然大泄元氣凡虛弱之人須忌之防己百十七味苦性寒陰也降也去濕熱水腫利大小便解諸經熱壅腫痛濕熱腳氣通九竅熱閉逐膀胱肝腎濕熱及熱毒諸瘡濕熱生蟲等證萆薢百十八味微甘而淡氣溫能溫腎去濕理陰痿陰寒失溺白濁莖中作痛及四肢癱瘓不隨周身風濕惡瘡性味純緩用宜大劑鉤藤百十九味微甘微苦性微寒能清手厥陰之火足厥陰足少陽之風熱故專理肝風相火之病凡大人小兒驚癇眩運斑疹天釣頭旋煩熱等證用之而風靜火息則諸證自除矣山豆根百二十味大苦大寒解諸藥熱毒消癰腫瘡毒殺寸白諸蟲含而咽汁解咽喉痹痛研末湯服五七分解內熱喘滿腹脹磨汁服解熱厥心痛研汁塗諸熱毒熱瘡腫痛及諸蟲熱毒所傷威靈仙百二一味微辛微咸性溫可升可降陰中陽也善逐諸風行氣血走經絡宣通五臟去腹內冷滯心膈痰水癥瘕痃癖氣塊積聚膀胱宿水腰膝肢體冷痛亦療折傷此藥性利善走乃治痛風之要藥故崔元亮言其去衆風通十二經脈朝服暮效其法採得根陰乾月餘搗末溫酒調服一錢匕空腹服之如人本性殺藥可加及六錢微利兩行則減之病除乃停藥其性甚善不觸諸藥但惡茗及麵湯李時珍曰威靈仙辛能泄氣咸能泄水故於風濕痰飲之病氣壯者服之有捷效其性大抵峻利久服恐損真氣氣弱者亦不可服之馬兜鈴百二二味微苦微辛性寒氣薄陰中微陽入手太陰肺經降肺火清肺氣除熱痰咳嗽喘急不得臥多用則作吐凡蠱毒蛇毒於飲食中得之咽中如有物咽不下吐不出者以此一兩煎湯服之即毒從吐出若治痔瘻腫痛用馬兜鈴於瓶中燒煙燻病處良青木香百二三即馬兜鈴根亦名土木香味苦微辛性寒有毒能吐能利不可多服煮汁服可吐蠱毒鬼疰諸毒搗末水調塗疔腫熱毒蛇毒日三四次立瘥亦可敷瘙癢禿瘡白蘞百二四味苦微寒性斂取根搗敷癰毒及面上瘡疱刀箭傷湯火毒諸瘡不斂生肌止痛俱宜為末敷之若為丸散亦治眼目赤痛小兒驚癇婦人陰中腫痛赤白帶下木通百二五亦名通草味苦氣寒沉也降也能利九竅通關節消浮腫清火退熱除煩渴黃疸治耳聾目痛天行時疾頭痛鼻塞目眩瀉小腸火鬱利膀胱熱淋導痰濕嘔噦消癰腫壅滯熱毒惡瘡排膿止痛通婦人血熱經閉下乳汁消乳癰血塊催生下胎若治小水急數疼痛小腹虛滿宜加蔥煎飲若治喉痹咽痛宜濃煎含咽毒草部附子百二六氣味辛甘醃者大咸性大熱陽中之陽也有毒畏人參黃耆甘草黑豆緑豆犀角童便烏韭防風其性浮中有沉走而不守因其善走諸經故曰與酒同功能除表裡沉寒厥逆寒噤溫中強陰暖五臟回陽氣除嘔噦霍亂反胃噎膈心腹疼痛脹滿瀉痢肢體拘攣寒邪濕氣胃寒蛔蟲寒痰寒疝風濕麻痹陰疽癰毒久漏冷瘡格陽喉痹陽虛二便不通及婦人經寒不調小兒慢驚等證大能引火歸源制伏虛熱善助參耆成功尤贊朮地建效無論表證里證但脈細無神氣虛無熱者所當急用故虞搏曰附子稟雄壯之質有斬關奪將之氣能引補氣藥行十二經以追復散失之元陽引補血藥入血分以滋養不足之真陰引發散藥開腠理以驅逐在表之風寒引溫暖藥達下焦以祛除在裡之冷濕吳綬曰附子乃陰證要藥凡傷寒傳變三陰及中寒夾陰雖身大熱而脈沉者必用之或厥冷脈沉細者尤急須用之有退陰回陽之力起死回生之功近世陰證傷寒往往疑似而不敢用直待陰極陽竭而用已遲矣且夾陰傷寒內外皆陰舍此不用將何以救之此二公之言皆至言也不可不察惟孕婦忌服下胎甚速合蔥涎塞耳亦可治聾辨製法附子製法稽之古者則有單用童便煮者有用薑汁鹽水者有用甘草黃連者有數味皆兼而用者其中宜否最當詳辨夫附子之性熱而剛急走而不守土人醃以重鹽故其味鹹而性則降今之所以用之者正欲用其熱性以回元陽以補脾腎以行參耆熟地等功若制以黃連則何以藉其回陽若制以鹽水則反以助其降性若制以童便則必不免於尿氣非惟更助其降而凡脾氣大虛者極易嘔噦一聞其臭便動噁心是藥未入口而先受其害且其沉降尤速何以達脾惟是薑汁一制頗通第其以辛助辛似欠和平若果直中陰寒等證欲用其熱此法為良至若常用而欲得其補性者不必用此又若煮法若不浸脹而煮則其心必不能熟即浸脹而煮及其心熟則邊皮已太熟而失其性矣雖破而為四煮亦不勻且煮者必有汁而汁中所去之性亦已多矣皆非制之得法者製法用甘草不拘大約酌附子之多寡而用甘草煎極濃甜湯先浸數日剝去皮臍切為四塊又添濃甘草湯再浸二三日捻之軟透乃咀為片入鍋文火炒至將干庶得生熟勻等口嚼尚有辣味是其度也若炒太乾則太熟而全無辣味並其熱性全失矣故制之太過則但用附子之名耳效與不效無從驗也其所以必用甘草者蓋以附子之性急得甘草而後緩附子之性毒得甘草而後解附子之性走得甘草而後益心脾附子之性散得甘草而後調營衛此無他亦不過濟之以仁而後成其勇耳若欲急用以厚紙包裹沃甘草湯或煨或炙待其柔軟切開再用紙包頻沃又炙以熟為度亦有用麵裹而煨者亦通若果真中陰寒厥逆將危者緩不及制則單用炮附不必更用他制也辨毒附子之性剛急而熱制用失宜難云無毒故欲制之得法夫天下之製毒者無妙於火火之所以能製毒者以能革物之性故以氣而遇火則失其氣味而遇火則失其味剛者革其剛柔者失其柔故制附之法但用白水煮之極熟則亦全失辣味並其熱性俱失形如蘿蔔可食矣尚何毒之足慮哉今制之必用甘草者蓋欲存留其性而柔和其剛耳令人但知附子之可畏而不知太熟之無用也故凡食物之有毒者但製造極熟便當無害即河豚生蟹之屬諸有病於人者皆其欠熟而生性之未盡也故凡食物之有毒者皆可因此以類推矣至若藥劑之中有當煅煉而用者又何以然夫物之經火煅者其味皆咸澀而所以用煅者非欲去其生剛之性則欲用其咸澀之味而留性與不留性則其中各有宜否故凡當煅煉而用者皆可因此以類推矣又如藥之性毒者何可不避即如本草所云某有毒某無毒余則甚不然之而不知無藥無毒也故熱者有熱毒寒者有寒毒若用之不當凡能病人者無非毒也即如家常茶飯本皆養人之正味其或過用誤用亦能毒人而況以偏味偏性之藥乎但毒有大小用有權宜此不可不察耳矧附子之性雖云有毒而實無大毒但製得其法用得其宜何毒之有今之人不知其妙且並人參熟地而俱畏之夫人參熟地附子大黃實乃藥中之四維病而至於可畏勢非庸庸所濟者非此四物不可設若逸巡必誤乃事令人直至必不得已而後用附子事已無濟矣事無濟則反罪之將附子誠廢物乎嗟夫人之所以生者陽氣耳正氣耳人之所以死者陰氣耳邪氣耳人參熟地者治世之良相也附子大黃者亂世之良將也兵不可久用故良將用於暫亂不可忘治故良相不可缺矧夫附子雖烈而其性扶陽有非硝黃之比硝黃似緩而其性陰泄又非桂附可例華元化曰得其陽者生得其陰者死內經曰門戶不要是倉廩不藏也得守者生失守者死今之人履芒硝大黃若坦途視參附熟地為蛇蠍愚耶知耶白附子百二七味甘辛大溫有小毒其性升能引藥勢上行闢頭風諸風冷氣心疼風痰眩暈帶濁療小兒驚風痰搐及面鼻遊風野斑風刺去面痕可作面脂亦治疥癬風瘡陰下濕癢風濕諸病幾欲入藥炮而用之大黃百二八味苦氣大寒氣味俱厚陰中之陰降也有毒其性推陳致新直走不守奪土鬱壅滯破積聚堅症療瘟疫陽狂除斑黃譫語滌實痰導瘀血通水道退濕熱開燥結消癰腫因有峻烈威風積垢蕩之頃刻欲速者生用湯泡便吞欲緩者熟用和藥煎服氣虛同以人參名黃龍湯血虛同以當歸名玉燭散佐以甘草桔梗可緩其行佐以芒硝厚朴益助其鋭用之多寡酌人實虛假實誤用與鳩相類常山百二九味大苦性寒有毒攻溫瘧痰瘧及傷寒寒熱痰結氣逆狂癇癲厥惟胸腹多滯邪實氣壯而病瘧者宜之若老人弱人俱當忌用蓋此物性悍善逐痰飲得甘草則上行發吐得大黃則下行發瀉也亦治鬼毒蠱毒及頭項瘰癧鼠瘻半夏百三十味大辛微苦氣溫可升可降陽中陰也有毒其質滑潤其性燥濕降痰入脾胃膽經生嚼戟喉制用生薑下肺氣開胃健脾消痰飲痞滿止咳嗽上氣心痛脅痛除嘔吐反胃霍亂轉筋頭眩腹脹不眠氣結痰核腫突去痰厥頭痛散風閉喉喑治脾濕泄瀉遺精帶濁消癰疽腫毒殺蜈蚣蜂蠆蟲毒性能墮胎孕婦雖忌然胃不和而嘔吐不止加薑汁微炒但用無妨若消渴煩熱及陰虛血證最忌勿加李時珍曰半夏能主痰飲及腹脹者為其體滑味辛而性溫也滑則能潤辛溫能散亦能潤故行濕而通大便利竅而泄小便所謂辛走氣能化液辛以潤之是矣丹溪曰二陳湯能使大便潤而小便長攝云半夏辛而散行水而潤腎燥又局方用半硫丸治老人虛祕皆取其滑潤也世俗皆以半夏南星為性燥誤矣濕去則土燥痰涎不生非二物之性燥也古方治咽痛喉痹吐血下血多用二物非禁劑也二物亦能散血故破傷打撲皆主之南星百三一味苦辛氣溫可升可降陽中陰也性烈有毒薑汁製用善行脾肺墜中風實痰利胸膈下氣攻堅積治驚癇散血墮胎水磨箍蛇蟲咬毒醋調散腫破傷風金瘡折傷瘀血宜搗敷之功同半夏酌用可也膽星百三二七制九制者方佳降痰因火動如神治小兒急驚必用總之實痰實火壅閉上焦而氣喘煩躁焦渴脹滿者所當必用較之南星味苦性涼故散解風痰熱滯射干百三三味苦微寒有毒陰也降也治咳逆上氣喉痹咽疼散結氣不得息除胸腹邪熱脹滿清肝明目消積痰結核痃癖熱疝降實火利大腸消瘀血通女人經閉苦酒磨塗可消腫毒大戟百三四味苦太寒有毒反甘草性峻利善逐水邪痰涎瀉濕熱脹滿消急痛破癥結下惡血攻積聚通二便殺蠱毒藥毒療天行瘟瘧黃病及頸腋癰腫然大能瀉肺損真氣非有大實堅者不宜輕用若中其毒惟菖蒲可以解之甘遂百三五味苦性寒有毒反甘草專於行水能直達水結之處如水結胸者非此不除若留痰留飲宿食症堅積聚無不能逐故善治腹腳陰囊腫脹去面目浮腫通二便瀉膀胱濕熱及痰逆癲癇噎膈痞塞然性烈傷陰不宜妄用芫花百三六反甘草味苦微溫有毒專逐五臟之水去水飲寒痰痰癖脅下痛咳逆上氣心腹肢體脹滿瘴瘧鬼瘧濕毒寒毒蠱毒肉毒蟲魚毒除疝瘕癰腫逐惡血消咽腫根療瘡疥亦可毒魚若搗汁浸線亦能系落痔瘡惟其多毒虛者不可輕用玉簪百三七味甘辛性寒有小毒用根搗汁解一切諸毒下一切骨哽塗消癰瘍婦人乳癰初起但取根擂酒服之仍以渣敷腫處即消然性能損齒故亦可落齒取牙鳳仙花百三八味微苦性微溫有小毒子名急性子治産難下胎消積塊開噎膈下骨哽亦善透骨通竅故又名透骨草若欲取牙但用子研末入砒少許點疼牙根即可取之然此不生蟲蠹即烽蝶亦不近似非無毒者也萆麻子百三九味甘辛性熱有毒能逐風散毒療口眼喎斜失音口噤腫毒丹瘤針刺入肉止痛消腫追膿拔毒俱可研貼若治舌腫喉痹宜研爛紙卷燒煙熏吸立通催生下胎可同麝香巴豆研貼臍中李時珍曰一人病偏風手足不舉用此油同羊脂麝香穿山甲煎膏日摩數次兼服搜風養血之藥而愈一人病手臂一塊腫痛用此搗膏貼之一夜而愈一人病氣鬱偏頭痛用此同乳香食鹽搗貼太陽一夜痛止一婦産後子腸不收搗仁貼其丹田一夜而上此藥外用屢奏奇效但內服不可輕率爾或云搗膏以筋點於鵝鴨六畜舌根下即不能食點於肛門內即下血死其毒可知凡服篦麻者一生不得食炒豆犯之必脹死續隨子百四十一名千金子味辛性溫有毒能逐瘀血消痰飲食積癥瘕痃癖除蠱毒鬼疰水氣冷氣心腹脹滿疼痛腹內諸疾利大小腸祛惡滯及婦人血結血閉瘀血等證研碎酒服不過三顆當下惡物甚者十粒若瀉多以酸漿水或薄醋粥食之即止亦可研塗疥癬惡瘡此物之功長於逐水殺蟲是亦甘遂大戟之流也木鱉子又百四十味苦微甘微辛氣雄劣性大寒有大毒本草言其甘溫無毒謬也今見毒狗者能斃之於頃刻使非大毒而有如是乎人若食之則中寒發噤不可解救按劉績霏雪録云木鱉子有毒不可食昔一薊門人有兩子患痞食之相繼皆死此不可不慎也若其功用則惟以醋磨甩敷腫毒乳癰痔漏腫痛及喉痹腫痛用此醋漱於喉間引痰吐出以解熱毒不可咽下或同硃砂艾葉捲筒熏疥殺蟲最效或用熬麻油擦癬亦佳番木鱉味極苦性大寒大毒功用與木鱉大同而寒烈之性尤甚
