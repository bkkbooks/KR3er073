body:
  text: 卷之六十二長集小兒則古方小兒祕旨補脾湯一治小兒久病面黃肌瘦咬牙目札頭髮稀少誤藥所致人參白朮各一錢白芍藥酒炒白茯苓各八分川芎陳皮各六分炙甘草黃耆蜜炙當歸各四分上每服二三錢薑水煎調中湯二治傷乳食瀉後脾胃虛噦吐瀉人參茯苓乾薑炒藿香白朮甘草炙木香丁香香附炒去毛砂仁等分上水煎食前服調中丸三治脾胃虛寒吐瀉人參白朮炒甘草炒各五錢乾薑炮四錢上為末蜜丸緑豆大每服二三十丸白湯下薛按云前二方乃本經自病之藥即人參理中丸也若腎水侮土而虛寒者當加半夏茯苓陳皮或嘔吐更加藿香泄瀉加木香人參理中丸四治中氣虛熱人參白朮炒炙甘草等分上為末薑汁糊丸緑豆大每服二三十丸白湯下局方觀音散五治內傷嘔逆吐瀉不進飲食漸至羸瘦人參一兩神麯炒茯苓炙甘草綿黃耆白朮炒白扁豆炒木香各一錢石蓮肉去心錢半上為末每服一二錢入藿香三葉薑棗水煎服助胃膏六治脾胃虛寒吐瀉飲食不化等證人參白朮炒茯苓甘草炙丁香各五錢山藥一兩炒砂仁四十個木香三錢白豆蔻十四個肉豆蔻麵煨四個一方無木香名香砂助胃膏上為末蜜丸芡實大每服十丸米飲化下錢氏七味白朮散七一名人參白朮散治虛熱而渴人參白朮白茯苓炙甘草藿香木香各一錢乾葛二錢上為末每服三錢水煎溫服如飲水多多服之為妙按此方治小兒虛熱而渴如無氣滯吐瀉等證則當減去木香藿香以避燥而耗氣白朮散八方在和陳三十治自汗盜汗極效太和餅九人參白朮白茯苓各五錢山藥炒四錢木香炙甘草各一錢肉果麵煨四個白豆蔻十四個砂仁十四個山楂肉一兩使君子肉六十個煉蜜搗和為小餅量兒大小與服或再對證加減藥味用之團參散十治心虛血熱自汗盜汗人參當歸等分上為末用雄豬心一個切三片每服二錢以豬心一片煎湯調服或用水煎服亦可止汗散十一一名敗蒲散治睡而自汗故蒲扇燒存性上為末每服三錢溫酒調下調元散十二治小兒變蒸脾弱不乳吐乳多啼人參白朮陳皮厚朴制香附各一錢炙甘草藿香各五分上每服一二錢薑棗煎服平和飲子十三治小兒變蒸於三月後每三日進一服可免百病百日內宜服人參一錢半白茯苓一錢炙甘草五分升麻二分上咀水半盞煎三分不時服弱者加白朮一錢調氣散十四治變蒸吐瀉不乳多啼欲發慢驚人參陳皮木香藿香香附炙甘草各一錢上為末每服一錢薑棗水煎服錢氏當歸散十五治夜啼不乳人參當歸白芍藥各二錢半炙甘草錢二分桔梗陳皮各一錢上每服一二錢水煎灌之撮要當歸散十六治變蒸有寒無熱當歸二錢人參炙甘草木香官桂各一錢上每服二三錢薑棗水煎人參黃連散十七治心經蘊熱夜啼人參二錢半黃連錢半炒炙甘草五分竹葉二十片上薑水煎服無擇燈花散十八治心躁夜啼燈花二三顆上研細用燈草煎湯調塗口中乳汁送下日三服一法用燈花塗乳上令兒吮之如無燈花用燈草燒灰加辰砂少許亦妙一法用燈花七枚硼砂一字辰砂少許蜜調塗唇上立安寶鑑天麻散十九治小兒急慢驚風發熱抽搐痰涎壅盛或脾土虛弱肝木乘侮吐瀉不食嗜臥困倦半夏七錢天麻二錢半甘草炙白茯苓白朮各三錢上為末每服一二錢薑棗湯調服湯氏異功散二十止渴消暑生津補脾胄豬苓澤瀉各三錢人參白朮茯苓各五錢陳皮二錢半硃砂一錢上為末蜜丸芡實大每服一丸燈心竹葉湯化下柴胡散二一治變蒸骨熱心煩啼叫不已人參炙甘草麥冬各二錢龍膽草酒炒黑防風各一錢柴胡五分上每服二三錢水煎柴苓散二二治壯熱來去柴胡赤茯苓人參麥冬甘草各半兩黃芩一兩上每服二三錢入小麥二十粒青竹葉三片水煎服惺惺散二三治小兒傷寒時氣風熱頭痛目眵多睡痰壅咳嗽喘急或痘疹已出未出疑似之間人參白朮炒茯苓甘草北細辛川芎桔梗炒各等分上為末每服一錢入薄荷五葉水煎服一方有防風天花粉星蘇散二四治諸風口噤不語南星略炮切上每服五七分紫蘇五葉薑四片水煎入雄豬膽少許溫服錢氏黃龍散二五治發熱不退或往來寒熱柴胡五錢赤芍藥三錢黃芩炒甘草炙各二錢上每服二三錢薑棗水煎人參羌活散二六治傷風驚熱人參羌活川芎白茯苓柴胡前胡獨活桔梗枳殼地骨皮天麻各等分炙甘草減半上用生薑薄荷水煎治驚熱加蟬蛻牛黃散二七治溫熱壯熱或寒熱往來牛黃研甘草各半兩柴胡梔子酒炒龍膽草酒炒黃芩炒各二錢半上為末每服五七分以金銀薄荷湯調下錢氏生犀散二八治心經風熱犀角鎊三錢柴胡葛根赤芍藥地骨皮各一兩甘草五錢上為末每服一二錢水煎二黃犀角散二九治溫熱心神不安火腑祕結犀角屑大黃酒浸蒸鉤藤鉤梔子仁甘草黃芩等分上為末每服五七分熱湯調下量兒加減柴胡飲子三十解肌熱蒸熱積熱或汗後餘熱脈洪實弦數大便堅實者柴胡人參各五分黃芩芍藥各七分當歸一錢甘草四分大黃八分上每服一二錢水煎按此方用藥頗善但大便如常者勿得輕用大黃地骨皮散三一治虛熱壯熱地骨皮知母人參柴胡茯苓半夏甘草等分上薑水煎有驚熱加蟬蛻天麻黃芩天麻定喘飲三二治喘嗽驚風天麻防風羌活白朮甘草炒人參桔梗川芎半夏曲等分上每服二三錢水煎服補肺散三三一名阿膠散治肺虛噁心喘急久患咳嗽有痰阿膠兩半炒鼠黏子炒馬兜鈴各半兩杏仁七粒糯米一兩甘草三錢上每服二三錢水煎服錢氏阿膠散三四治小兒肺病咳嗽喘急或咳而哽氣喉中有聲阿膠蛤粉炒一兩鼠黏子炒香二錢半炙甘草一錢馬兜鈴半兩杏仁七個去皮尖糯米一兩上每二三錢水煎丹溪保和丸三五治飲食酒積停滯胸膈痞滿腹脹神麯炒陳皮半夏茯苓各一兩山楂肉蒸曬三兩連翹蘿蔔子炒各五錢上為末粥丸緑豆大一方尚有炒麥芽一兩黃連五錢大安丸三六治證同前即前保和丸加白朮二兩楊氏消食丸三七治乳食過多胃氣不能消化砂仁陳皮神麯炒麥芽炒三稜蓬朮各半兩香附炒一兩上為末麵糊丸麻子大白湯送下量兒加減消乳丸三八治嘔吐消乳食脈沉者傷食不化也香附炒砂仁陳皮神麯炒炙甘草麥芽炒等分上為末米糊丸黍米大每服二十丸薑湯下白餅子三九治傷食腹中有癖嘔吐肚疼先用此藥一服推下食積然後調治不可服冷藥滑石輕粉半夏湯浸焙南星各一錢巴豆二十四粒去皮膜用水一升煮乾研爛上為末糯米飯丸緑豆大捻作餅每服二三餅煎蔥白湯紫蘇湯下忌熱物量兒加減薛曰凡用此方及利驚丸紫霜丸三味牛黃丸褊銀丸之類乃斬關奪門起死回生之重劑也必審形病俱實方可施之鞏至失手命在反掌經云邪之所湊其氣必虛留而不去其病乃實實者病氣實而形氣則虛也東垣先生云形病俱實者當瀉不當補形病俱虛者當補不當瀉治者審焉宣風散四十治濕痰去積滯通祕結攻黑陷裡實以代百祥丸牛李膏檳榔二個陳皮甘草各五錢牽牛四兩半生半炒取頭末一兩上為末每服一錢量大小增減與服白湯調下一方有大黃木香連前三味煎成後加牽牛末調服人參養胃湯四一治外感風寒內傷生冷寒熱如瘧或嘔逆噁心人參厚朴薑製蒼朮炒半夏制草果仁藿香茯苓各五錢橘紅二錢半炙甘草二錢上每服二三錢薑三片烏梅一個水煎人參安胃散四二治脾胃虛弱傷熱乳食嘔吐瀉痢人參一錢黃耆二錢生甘草炙甘草各五分白芍藥酒炒七分白茯苓四分陳皮三分黃連炒一分上每服二三錢水煎生附四君湯四三治吐瀉不思乳食凡虛冷病宜先與數服以正胃氣人參白朮茯苓炙甘草附子木香橘紅等分上為末每服一二錢薑棗水煎服釀乳法四四治胃虛吐瀉睡中吐舌搖頭嘔乳額上汗流驚啼面黃令兒飢飲人參藿香木香沉香陳皮神麯炒麥芽炒各等分丁香上每服四五錢薑十片紫蘇十葉棗三枚水煎每服半盞令母食後捏去舊乳方服臥少時卻與兒飲按小兒不能飲藥者凡用補瀉諸劑皆宜此法銀白散四五治胃虛吐瀉糯米炒二兩半扁豆蒸二兩白朮炒一兩炙甘草三錢丁香藿香各二錢上為末紫蘇米飲調下直指方加炮白附子全蠍木香石蓮子薑水煎朱君散四六治吐瀉後而為驚為瀉及糞青者人參白朮茯苓炙甘草鉤藤鉤硃砂各一錢麝香半分燈心一團上為末每服一錢白湯調下二順散四七治中暑霍亂吐瀉煩悶燥渴小便赤澀便血肚疼白朮炙甘草茯苓豬苓澤瀉乾薑炒肉桂杏仁去皮尖炒各等分上為末每服五七分不拘時水調下或用水煎服香朴散四八治積冷嘔吐藿香葉厚朴薑汁炒陳皮各七錢半夏湯泡七次一兩炙甘草一錢上每服三錢薑棗水煎瀉甚者加木香肉豆蔻沉香散四九順胃氣止嘔吐茯苓二錢沉香丁香木香藿香厚朴炙甘草各一錢上為末每服一字米飲湯調服玉露散五十治傷熱吐瀉石膏煅寒水石各五錢甘草一錢半上為末每服五分白湯調下六神散五一治面青啼哭口出氣冷或泄瀉不乳腹痛曲腰四肢厥冷人參白朮炒山藥炒各五錢炙甘草二錢白茯苓白扁豆炒各一兩上為末每服二三錢薑棗水煎香橘餅五二治傷冷積瀉木香青皮各一錢陳皮二錢半厚朴神麯炒麥芽炒各半兩上為末蜜和為餅每服一枚米飲調下錢氏黃芩湯五三治挾熱下痢頭痛胸滿大渴或寒熱脅痛脈洪大而實者黃芩一兩半芍藥甘草炒各一兩上每服二三錢薑水煎如嘔加半夏二錢澀腸散五四治小兒久痢腸頭脫出訶子炮赤石脂龍骨各等分上為末臘茶少許和藥摻腸頭上絹帛揉入破故紙散五五治膀胱虛冷夜間遺尿或小水不禁破故紙炒上為末每服一錢熱湯調下陳氏肉豆蔻丸五六治瀉痢水穀或淡黃或白不能止者肉豆蔻訶子肉白龍骨各半兩木香砂仁各二錢赤石脂枯白礬各七錢半上為細末麵糊為丸黍米大周歲兒每服三五十丸三歲兒服百丸溫米飲下瀉甚者煎木香散或異功散送下不止多服薛按前方治陽氣虛寒腸滑之澀劑蓋腎主大便若因腎氣不固而致前證者宜用木香散送四神丸如不應急煎六君子湯送四神丸補之蓋豆蔻丸澀滯之功多補益之功少也寧神湯五七治心虛火盛熱躁驚搐等證人參當歸身生地麥冬各一錢山梔仁黃連炒炙甘草各二錢石菖蒲三分辰砂入二分上加燈心半錢水一盞煎七分調辰砂攪勻食後溫服當歸養心湯五八治心虛驚悸歸身麥冬生地酒洗人參炙甘草升麻少用水一鍾半加燈草一團煎七分食遠服錢氏養心湯五九治心血虛怯驚癇或驚悸怔仲盜汗無寐發熱煩躁人參黃耆遠志當歸川芎棗仁五味子柏子仁肉桂白茯苓茯神半夏曲各三錢炙甘草四錢上每服二三錢薑水煎茯神湯六十治膽氣虛寒頭痛目眩心神恐懼或是驚癇人參黃耆炒棗仁炒熟地白芍炒柏子仁炒五味子炒茯神各一兩桂心甘草炒各五錢上每服二三錢水煎清神湯六一治驚癇心虛血熱犀角鎊屑遠志薑汁焙白鮮皮石菖蒲人參甘草等分上為末每服五七分麥門冬煎湯調服錢氏酸棗仁湯六二治心肺虛熱煩躁驚啼痘疹血熱血燥等證棗仁炙甘草人參生地麥冬當歸身梔子仁等分上加燈心水一盞煎六分溫服黑附子湯六三治慢脾風四肢厥冷附子炒去皮三錢木香人參各一錢半白附子一錢炙甘草五分上為散每服三錢薑五片水煎若手足即溫即止後服鉤藤散六四治吐利脾胃氣虛慢驚生風鉤藤鉤人參天麻蠍尾去毒防風蟬殼各半兩麻黃殭蠶炒炙甘草川芎各二錢半麝香五分上㕮咀每服二三錢水煎服虛寒加附子一錢薛按慢驚之證屬脾胃虧損所致前方乃辛溫散表之藥而無調補之功須審用之鉤藤飲子六五治小兒一切驚風潮搐目視昏迷鉤藤鉤防風獨活天竺黃羌活各三錢麻黃升麻甘草草龍膽各二錢川芎三錢蟬蛻五個去頭足上每服二三錢薑棗水煎服薛立齋曰按上方若外感風寒形證俱實者宜用之若形氣虛而病氣實者宜用惺惺散加鉤藤麻黃若外邪少而形病俱虛者宜異功散錢氏鉤藤飲六六治小兒臟寒夜啼陰極發躁鉤藤鉤茯神茯苓當歸川芎木香各一錢甘草五分上每服二錢薑棗水煎服撮要方有芍藥一錢若心經有熱臉紅便赤去木香加硃砂末一錢木通湯下薛氏抑肝散六七治肝經虛熱發搐或發熱咬牙或驚悸寒熱或木乘土而嘔吐痰涎腹脹少食睡不安軟柴胡甘草各五分川芎八分當歸白朮炒茯苓鉤藤鉤各一錢上水煎子母同服以蜜丸名抑青丸大青膏六八治傷風痰熱發搐天麻青黛各一錢白附子煨烏蛇酒浸取肉焙蠍尾各五分天竺黃麝香各一字上為末生蜜丸豆大每用半粒薄荷湯化下地黃清肺飲六九治肺熱疳蝕穿孔或生瘜肉或鼻外生瘡桑白皮半兩炒紫蘇前胡赤茯苓防風黃芩當歸天門冬連翹桔梗生地甘草炙各二錢每服五七錢水煎服次用化𧈟丸甘草湯七十治撮口甘草生用一錢上水煎以棉球蘸吮令出痰涎卻以豬乳點入口中即瘥祕旨安神丸七一治心血虛而睡中驚悸或受驚嚇而作人參棗仁茯神半夏各一錢當歸芍藥炒橘紅各七分五味子五粒杵炙甘草三分上為末薑汁糊丸芡實大每服一丸生薑湯下七味安神丸七二治心經蘊熱驚悸黃連當歸身麥門冬白茯苓甘草各半兩硃砂飛一兩冰片二分半上為末湯浸蒸餅和獖豬心血搗丸黍米大每服十丸燈心湯下十味安神丸七三治驚人參茯神麥門冬山藥各二錢片腦一分龍齒二錢硃砂甘草寒水石各五分金薄二片上為末蜜丸雞豆大燈心湯調下一方有馬牙硝硃砂安神丸七四方在寒陳一四二清心火養血安神錢氏安神丸七五方在寒陳一四三除火邪熱渴清心化痰安神鎮驚丸七六驚退後調理安心神養氣血和平預防之劑也天竺黃另研人參南星薑製茯神各五錢當歸棗仁炒麥冬生地芍藥炒各三錢黃連薑汁炒薄荷木通山梔炒硃砂另研牛黃另研龍骨煅各二錢青黛一錢另研上為末蜜丸緑豆大每服三五丸量兒大小加減淡薑湯送下萬氏龍腦安神丸七七治驚痰及痘中昏悶譫妄良方大辰砂一錢飛牛黃一分龍腦半分上研細末取獖豬心血小豬尾尖血和丸如緑豆大每服一丸或二三丸新汲水化下或燈心湯紫草湯俱可下鎮心丸七八治急驚化痰鎮心硃砂龍齒牛黃各一錢鐵粉人參茯苓防風琥珀各二錢全蠍七枚焙上為末蜜丸桐子大每服一二丸薄荷湯送下金薄鎮心丸七九治風壅痰熱心神不寧驚悸煩渴唇焦頰赤夜臥不安譫語狂妄金薄十二帖為衣硃砂一兩飛人參白茯苓甘草各半兩山藥一兩半牙硝一錢半麝香五分片腦一分上為末煉蜜丸每一錢作十丸以金薄為衣每服一丸薄荷湯化下或含化亦可辰砂膏八十治眼閉口噤啼聲不出吮乳不得口吐白沫辰砂二錢硼砂馬牙硝各一錢半玄明粉全蠍珍珠各一錢麝香一分上為末每服一豆許諸驚薄荷湯下潮熱甘草湯下月內者用乳汁調塗乳頭令吮之琥珀散八一治急慢驚風涎潮昏冒驚搐目瞪內釣腹痛或驚癇時發琥珀牛黃膽星此當倍用白附子天麻殭蠶炒去絲嘴代赭石全蠍蟬蛻乳香各一錢硃砂一錢半上為末每服一二分白湯調下千金龍膽湯八二治月內臍風撮口四肢驚掣發熱吐乳及客忤鬼氣驚癇加人參當歸龍膽草炒黑鉤藤鉤柴胡黃芩炒芍藥炒桔梗茯苓甘草大黃煨各二錢半蜣螂二枚去翅足上為末每服一二錢水煎量兒加減梅花飲八三治五臟積熱喉中有痰面色赤白鼻流清涕氣逆喘急目赤咳嗽或因驚夜啼硼砂馬牙硝芒硝辰砂各一錢人參二錢甘草五分片腦半分麝香一分上為末瓷器收貯每服半匙麥冬湯調服或薄荷湯亦可擦牙通關散八四治風搐關竅不逸痰塞中脘留滯百節南星二錢麝香一字牙皂二錢燒存性殭蠶一錢赤腳蜈蚣一條上為末薑汁蘸藥少許擦牙或調服二三點涎自出陳氏抱龍丸八五治風痰壅盛或發熱咳嗽或發驚搐等證膽星九制四兩天竺黃一兩雄黃硃砂各五錢麝香五分另研或減半亦可上為細末用大甘草一斤煮極濃汁搗丸每兩作二十丸陰晾乾用薄荷湯或燈草湯下一二丸此方加牛黃四錢即名牛黃抱龍丸加琥珀即名琥珀抱龍丸至聖保命丹八六治胎驚內釣肚腹緊硬啼叫不安乃急驚風眼目上視手足抽搐不省人事全蠍十四個去毒防風二錢炮南星白附子蟬蛻殭蠶炒去絲嘴天麻硃砂各一錢麝香五分金箔上為末米糊和每兩作四十丸每服一丸白湯化下有熱者以南星易炮星此方去天麻加琥珀捏成錠以薄荷湯磨服即名保生錠子亦名太乙保生丹治慢驚尚有陽證者定命丹八七治天釣撮口通利痰熱全蠍七枚天麻南星炮白附子各二錢半硃砂青黛各一錢半輕粉麝香各五分片腦一字上為末米糊丸緑豆大每服一二丸荊芥薄荷湯下可先研半丸吹入鼻中九還金液丹八八此藥有斡旋造化之功專治男婦痰盛氣急中風不語口眼歪斜左癱右瘓牙關緊急及小兒急驚風手足抽搐不省人事痰多氣急等證功效不可盡迷膽星九制者二兩硃砂飛一兩生半黃五錢殭蠶五錢炒牙皂去皮弦炒焦三錢冰麝各五分小麥麵炒熟煉蜜和勻搗丸茨實大金薄為衣黃蠟區收藏如大人牙關緊急先以通關散開其竅隨用淡薑湯下一二丸若治小兒用薄荷湯化下一丸膽星天竺丸八九治小兒痰涎上壅喘嗽不休膽星一兩天竺黃三錢半夏薑製白附子湯炮去皮臍各五錢天麻防風各二錢辰砂一錢飛上為末甘草湯為丸芡實大每服一丸空心薄荷湯或淡薑湯下陳氏溫白丸九十驅風豁痰定驚人參防風白附子生用真殭蠶炒全蠍焙各一錢南星湯泡七次焙天麻各二錢上用末水糊丸桐子大每服三五丸薑湯下粉紅丸九一治小兒心虛困臥驚動痰涎不利或發熱痰嗽等證天竺黃五錢天南星硃砂各一錢半冰胭脂各一錢上以牛膽汁和丸芡實大每服一丸砂糖湯下錢氏牛黃丸九二治風癇因汗出風邪乘虛而入痰涎迷悶手足搐掣牛膽南星全蠍焙蟬蛻各二錢半防風白附子生用天麻殭蠶炒各一錢半麝香半字上為末棗肉和丸加水銀半錢同研細丸緑豆大每服一二丸荊芥生薑湯下雜著牛黃丸九三治小兒驚風中風五癇天弔客忤潮熱痰涎壅盛等證白花蛇酒浸白附子川烏全蠍天麻薄荷雄黃各五錢硃砂二錢牛黃麝香各一錢冰片五分上各另研為極細末和勻用麻黃煎酒搗丸芡實大每服一丸薄荷湯下萬氏牛黃清心丸九四治心熱神昏黃連生半兩黃芩山梔仁各三錢鬱金二錢辰砂一錢半牛黃二分半上為細末臘雪調麵糊丸如黍米大每服七八丸燈心湯下三味牛黃丸九五治驚熱消疳積雄黃飛牽牛各一錢天竺黃二錢上為末麵糊丸粟米大每服五七丸薄荷水下涼驚丸九六治驚疳熱搐睛赤潮熱痰涎牙關緊急龍膽草炒焦防風青黛各三錢鉤藤鉤二錢黃連炒五錢龍腦一錢牛黃麝香各二分上為末麵糊丸粟米大每服十丸煎金銀花湯下利驚丸九七治急驚天竺黃二錢輕粉青黛各一錢黑牽牛炒五錢一方無天竺黃上為末煉蜜丸豌豆大每歲一丸薄荷水化下錢氏抑青丸九八治肝熱急驚搐搦羌活川芎當歸防風龍膽草等分上為末煉蜜丸芡實大每服一二丸竹葉湯入砂糖化下此方加大黃梔子仁即名瀉青丸化痰丸九九治驚搐喉內痰響者暫用膽星半夏制礞石制枳實各二兩麝香三分上為末薑汁糊丸緑豆大硃砂為衣薑湯研化量送比金丸百治驚癇先用此藥人參遠志薑製取肉炒白茯苓南星川芎石菖蒲細密者天麻硃砂青黛琥珀各一錢麝香一字上為末蜜丸桐子大每服一二丸金銀薄荷湯下虎睛丸百一治驚癇邪氣入心虎睛細研遠志薑汁浸犀角鎊屑石菖蒲大黃濕紙包煨麥冬等分蜣螂去足翅炒三枚上為末米糊丸梧子大每服一二丸竹葉煎湯或金銀薄荷湯下五癇丸百二一名五色丸治五癇硃砂珍珠各五錢雄黃一兩水銀二錢半黑鉛三兩同水銀結成砂上為末煉蜜丸麻子大每服三四丸煎金銀薄荷湯下斷癇丹百三治五癇瘥後復發證候多端連綿不除者黃耆蜜炙鉤藤鉤細辛炙甘草各半兩蛇蛻二寸酒炙蟬蛻四個牛黃一錢另研上為末煮棗肉丸麻子大煎人參湯下每服數丸量兒加減消風丸百四治風癇先宜此藥膽星二錢羌活獨活防風天麻人參荊芥川芎細辛各一錢上為末蜜丸桐子大每服二丸薄荷紫蘇湯調化下妙聖丹百五治食癇因驚而停食吐乳寒熱大便酸臭是也赭石煅醋淬二錢半巴霜三分硃砂雄黃蠍梢各一錢輕粉麝香各一匙杏仁微炒二錢上為末棗肉丸梧子大每服一二丸木賊草煎湯送下褊銀丸百六治癲癇膈熱風涎壅盛腹脹喘促實滯者巴豆水銀各五錢京墨八錢火燒醋淬黑鉛二錢半水銀煎麝香五分另研上為末陳米粥丸緑豆大每服二三丸煎薄荷湯下薛氏紫河車丸百七治癲癇紫河車肥大者一具人參當歸二味酌用為末上將河車生研爛入二藥搗丸桐子大每服五七十丸日進三服人乳化下按此方凡先天不足後天虧敗者俱可隨宜增用藥物照此制服無不可也然河車必用酒燉熟方善雖薛氏之意用其生氣但生者腥膩恐不利於胃氣且此物既離本體尚何生氣之有亦不過取其應求之性味為血氣之資而已矧人之血氣本皆熱物之所養成故飲食之類凡生用熱用其補瀉有甚相遠者豈熟之即無益而生之果無礙耶余故曰熱之為宜大蕪荑湯百八治小兒脾疳發熱作渴少食大便不調發黃脫落面黑鼻下生瘡能乳嗜土等證蕪荑山梔各五分當歸白朮茯苓各四分柴胡麻黃羌活各三分防風黃連黃柏炙甘草各二分上作二劑水煎服生熟地黃湯百九治疳眼閉合不開生地黃熟地黃各半兩川芎赤茯苓枳殼杏仁去皮川黃連半夏曲天麻地骨皮炙甘草各二錢半上每服二三錢黑豆十五粒薑水煎服蘭香散百十治鼻疳赤爛蘭香葉二錢燒灰銅青輕粉各五分上為末干貼四味肥兒丸百十一治小兒食積五疳目生雲翳牙根腐爛口舌生瘡發熱體瘦肚大筋青發稀成穗或白禿瘡疥小便澄白等證蕪荑神麯炒麥芽炒黃連各等分上為末豬膽汁丸黍米大每服二三十丸木通煎湯下六味肥兒丸百十二消疳化蟲退熱黃連陳皮川楝子去核炒神麯炒麥蘖炒各一兩白蕪荑半兩上為末糊丸麻子大每服一二十丸空心米飲吞下薛氏曰前方又治脾疳飲食少思肌肉消瘦肚大頸鈿發稀成穗項間結核發熱作渴大便酸臭嗜食泥土或口鼻頭瘡肚見青筋吃齒便白五疳用此丸加乾蟾一兩尤妙七味肥兒丸百十三治小兒食積五疳頸項結核發稀成穗發熱作渴消瘦等證黃連炒神麯炒木香各一兩半檳榔二十個使君子酒浸麥芽炒各四兩肉豆蔻炮二兩麵糊丸麻子大每服三五十丸米飲下良久用五味異功散一服以助胃氣蘆薈肥兒丸百十四治疳熱蘆薈龍膽草酒洗木香人參使君子肉蚵蚾酥炙去頭足即上鱉麥芽炒各二錢檳榔黃連去蘆須酒炒白蕪荑各三錢胡黃連五錢上為細末豬膽汁為丸黍米大每服五六十丸米飲下大蘆薈丸百十五一名九味蘆薈丸治小兒肝脾疳積發熱體瘦熱渴大便不調或瘰癧結核耳內生瘡牙腮蝕爛目生雲翳等證胡黃連黃連蘆薈白蕪荑炒白雷丸破開赤者不用木香青皮鶴蝨草微炒各一兩麝香一錢另研上為末蒸餅糊丸麻子大每服一錢空心白湯送下立齋曰內青皮以龍膽草代之麝香不用尤效加減蘆薈丸百十六治證同前尤治小兒疳積腹脹蘆薈真者五錢宣黃連去須胡黃連枳實青皮各二錢半青黛木香山楂肉各二錢麥芽炒三錢麝香一分干蝦蟆一隻酥炙上為細末湯浸蒸餅為丸緑豆大每服七八分量兒大小與之按此方加使君子肉三錢治濕熱生蟲亦佳當歸龍薈丸百十七方在寒陳一六七治肝經實火大便祕結良方蘆薈丸百十八方在寒陳一六八治疳癖發熱諸證龍膽丸百十九治腦疳腦熱瘡龍膽草升麻苦楝根皮焙赤茯苓防風蘆薈油發灰各二錢青黛黃連各三錢上為末牡豬膽汁浸米糕丸麻子大薄荷湯下仍以蘆薈末敷入鼻內木香丸百二十治疳痢黃連淨三錢木香紫厚朴制夜明砂紙炒各二錢訶子肉炒一錢上為末飯丸麻子大干艾生薑煎湯食前下黃連丸一二一治疳勞黃連半兩淨牛膽汁浸曬石蓮子栝蔞根杏仁去皮尖烏梅肉各二錢上為末牛膽汁浸糕丸麻子大煎烏梅薑蜜湯下胡黃連丸一二二治熱疳胡黃連黃連各五錢硃砂二錢上為末填入豬膽內以線扎懸挂銚中淡漿水煮數沸取出研蘆薈麝香各二錢入之飲和丸麻子大每服一二十丸米飲下蟾蜍丸一二三治小兒頸項結核面色痿黃飲食不甘腹大發熱名曰無辜疳證一服虛熱退二服煩渴止三服瀉痢愈蟾蜍一二個夏月溝渠深土中取腹大不跳不鳴者是身多㿔者佳上將糞蛆一杓置桶中以尿浸之卻將蟾蜍跌死投與蛆食一晝夜用布袋盛蛆置急流中一宿取出瓦上焙乾為末入麝香一字粳米飯丸麻子大每服二三十丸米飲下其效如神天麻丸一二四治肝風疳眼天麻青黛黃連五靈脂夜明砂微炒川芎蘆薈各二錢龍膽草防風蟬蛻去足各一錢半全蠍二枚焙乾蟾頭炙焦三錢麝香少許上為末豬膽汁浸米糕丸麻子大每服十丸薄荷湯下靈脂丸一二五治脾疳食疳白豆蔻麥芽炒五靈脂砂仁蓬朮煨青皮橘紅使君子焙各二錢蝦蟆炙焦三錢上為末米糊丸麻子大每服十丸米湯下如聖丸一二六治疳熱泄瀉白蕪荑炒川黃連胡黃連各二兩半使君子肉一兩麝香五分另研干蝦蟆五個酒者杵膏上為末以蝦蟆膏杵丸麻子大每服一二十丸煎人參湯下薛按疳之為患乃肝脾虛熱津液乾涸之證前方乃專於治疳清熱之劑若脾胃虛弱者當佐以六君子湯調補脾胃使邪氣退庶可收全功也褐子丸一二七治疳腫脹蘿蔔子一兩微炒陳皮青皮炒檳榔五靈脂蓬朮煨黑牽牛頭末炒赤茯苓木香二錢半上為末麵糊丸緑豆大每服十五丸紫蘇湯下消積丸一二八治食積大便酸臭發熱丁香九個砂仁十二個烏梅肉三個巴豆三粒去皮心膜上為末麵糊丸黍米大每服五七丸溫水下塌氣丸一二九治肚腹虛脹胡椒一兩蠍尾五錢去毒上為末麵糊丸粟米大每服一二十丸陳米飲下紫霜丸百三十治驚積及變蒸發熱不解或食癇先寒後熱或乳哺失節宿滯不化腹痞便結代赭石煅醋焠七次赤石脂各一兩杏仁五十個巴豆二十枚去心膜油上先將巴豆杏仁研成膏入代赭石脂研勻湯浸蒸餅丸粟米大每服三五丸米飲送下化𧈟丸一三一黃連五錢蜀椒去閉口者炒出汗苦楝根白皮各二錢上為末用烏梅肥者七個艾湯浸去核搗爛和丸艾湯量兒大小送下下蟲丸一三二諸疳蛔諸蟲苦楝根皮新白者酒浸焙緑包貫衆雞心檳榔桃仁浸去皮焙蕪荑焙木香各二錢鶴蝨炒一錢輕粉五分干蝦蟆炙焦三錢使君子五十取肉煨上為末麵糊丸麻子大每服一二十丸天明清肉汁下一方內加當歸川連各二錢五分使君子丸一三三治五疳蛔蟲脾胃不和心腹膨脹時復作痛不食漸瘦使君子肉一兩厚朴制橘紅白芍藥甘草炒川芎各一錢上為末蜜丸皂角子大每服一丸陳米飲化下白玉散一三四治丹瘤白土二錢半寒水石五錢上為末米醋或新水調塗以下通用方四君子湯一三五方在補陳一治脾肺氣虛諸證六君子湯一三六方在補陳五治脾胃虛弱嘔吐等證五味異功散一三七方在補陳四治脾胃虛寒飲食少思等證四物湯一三八方在補陳八治一切血虛等證八珍湯一三九方在補陳十九治氣血兩虛十全大補湯百四十方在補陳二十治氣血俱虛大補元氣獨參湯一四一方在補陳三五治氣虛氣脫挽回元陽歸脾湯一四二方在補陳三二治心脾虛損參朮湯一四三方在補陳四十治氣虛泄瀉嘔吐等證參朮膏一四四方在補陳三九治中氣虛弱諸藥不應者參苓散一四五方在補陳五三治睡中出汗參附湯一四六方在補陳三七治真陽虛極喘急厄逆參苓白朮散一四七方在補陳五四治脾胃虛弱食少吐瀉理中湯一四八方在熱陳一治上中二焦虛寒諸證生脈散一四九方在補陳五六治熱傷元氣止渴消煩定咳嗽喘促五福飲百五十方在新補六補五臟虛損五君子煎一五一方在新熱六治脾胃虛寒嘔吐泄瀉理陰煎一五二方在新熱三治脾胃虛寒諸證溫胃飲一五三方在新熱五治中寒嘔吐吞酸泄瀉少食養中煎一五四方在新熱四治中氣虛寒嘔泄參薑飲一五五方在新熱八治脾肺胃氣虛寒嘔吐咳嗽六味回陽飲一五六方在新熱二治陰陽將脫等證六味異功煎一五七方在新熱七治脾胃虛寒吐瀉兼滯者六味丸一五八方在補陳百二十壯水補腎八味丸一五九方在補陳一二一益火補陽胃關煎百六十方在新熱九治脾胃虛寒瀉痢佐關煎一六一方在新熱十治生冷傷脾瀉痢五德丸一六二方在新熱十八治脾腎寒滯一切瀉痢飧泄二陳湯一六三方在和陳一和脾消痰芍藥枳朮丸一六四方在新和十六健脾消積止腹痛除脹滿枳朮丸一六五方在和陳七九健脾胃消食積大和中飲一六六方在新和七治飲食留滯小和中飲一六七方在新和八治胸膈脹滿脾胃不和四順清涼飲一六八方在攻陳二五治血熱壅滯祕結青州白丸子一六九方在和陳百十二治風痰嘔吐牙關緊急瀉青丸百七十方在寒陳一五一治肝火急驚目赤掃蟲煎一七一方在新和十四治諸蟲上攻胸腹作痛
