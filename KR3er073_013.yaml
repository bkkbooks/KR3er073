body:
  text: 卷之十三性集雜證謨瘟疫經義陰陽應象大論曰冬傷於寒春必溫病金匱真言論曰夫精者身之本也故藏於精者春不病溫熱論篇帝曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也岐伯對曰巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死帝曰願聞其狀岐伯曰傷寒一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈俠鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已四日太陰受之太陰脈循布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其臟脈病日衰已矣其未滿三日者可汗而已其滿三日者可泄而已熱論篇曰兩感於寒者病一日則巨陽與少陰俱病則頭痛口乾而煩滿二日則陽明與太陽俱病則腹滿身熱不欲食譫言三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死帝曰五臟已傷六腑不通營衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣熱論篇曰凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止熱論篇帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相搏兩熱相合故有所遺也帝曰治遺奈何岐伯曰視其虛實調其逆從可使必已也帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也刺熱篇曰肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛死刺足厥陰少陽其逆則頭痛員員脈引沖頭也心熱病者先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明出血如大豆立已腎熱病者先腰痛胻酸苦渴數飲身熱熱爭則項痛而強胻寒且酸足下熱不欲言其逆則項痛員員澹澹然戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽諸汗者至其所勝日汗出也肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病太陽之脈色榮顴骨熱病也榮未交曰今且得汗待時而已與厥陰脈爭見者死期不過三日其熱病內連腎少陽之脈色也少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少陰脈爭見者死期不過三日此一節即言傷寒之兩感也詳註備載類經疾病類四十四熱病篇曰熱病三日而氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足者身熱甚陰陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徵也熱病七日八日脈口動喘而弦者急刺之汗且自出淺刺手大指間熱病七日八日脈微小病者溲血口中乾一日半而死脈代者一日死熱病已得汗出而脈尚躁喘且復熱勿刺膚喘甚者死熱病七日八日脈不躁躁不散數後三日中有汗三日不汗四日死未曾汗者勿腠刺之熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不可治熱病而汗且出及脈順可汗者取之魚際太淵大都太白瀉之則熱去補之則汗出汗出太甚取內踝上橫脈以止之熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病者脈尚躁盛而不得汗者此陽脈之極也死脈盛躁得汗靜者生熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘛瘲齒噤齘也凡此九者不可刺也太陽之脈色榮顴骨熱病也與厥陰脈爭見者死死期不過三日少陽之脈色榮頰前熱病也與少陰脈爭見者死期不過三日本篇刺法未及詳錄具載類經針刺類第四十評熱病論帝曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯曰病名陰陽交交者死也人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也且夫熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也刺志論曰氣盛身寒得之傷寒氣虛身熱得之傷暑論疾診尺篇曰尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也刺法論帝曰余聞五疫之至皆相染易無問大小病狀相似不施救療如何可得不相移易者岐伯曰不相染者正氣存內邪不可干避其毒氣天牝從來復得其往氣出於腦即不幹邪氣出於腦即室先想心如日欲將入於疫室先想青氣自肝而出左行於東化作林木次想白氣自肺而出右行於西化作戈甲次想赤氣自心而出南行於上化作焰明次想黑氣自腎而出北行於下化作水次想黃氣自脾而出存於中央化作土五氣護身之畢以想頭上如北斗之煌煌然後可入於疫室水熱穴論帝曰夫子言治熱病五十九俞願聞其處因聞其意岐伯曰頭上五行行五者以越諸陽之熱逆也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞傍五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也帝曰人傷於寒而傳為熱何也曰夫寒盛則生熱也論證共二條經曰冬傷於寒春必病溫是溫病即傷寒也然傷寒有四時之不同如冬感寒邪而即病者為真傷寒其有寒毒內侵而未至即病者必待春溫氣動真陰外越再觸寒邪其病則發故至春犯寒則發為溫病至夏犯寒則發為熱病亦猶傷氣者遇氣則作傷食者遇食則發其義一也然而傷寒瘟疫多起於冬不藏精及辛苦飢餓之人蓋冬不藏精則邪氣乘虛易入而飢餓勞倦之流則受傷尤甚故大荒之後必有大疫正為此也但此輩疫氣既盛勢必傳染又必於體質虛濁者先受其氣以漸遍傳則又有不待冬寒而病者矣然此以冬寒主氣之為病也至於客氣變遷歲時不同故有冬行春令則應冷反溫夏行冬令則應熱反冷春秋皆然是則非其時而有其氣壯者無恙怯者受傷是又不止冬寒而運氣不正之害所當察而慎避者有如此一瘟疫本即傷寒無非外邪之病但染時氣而病無少長率相似者是即瘟疫之謂古人有云瘟證因春時溫氣而發乃因鬱熱自內而發於外初非寒傷於表也故宜用辛平之劑治與正傷寒用麻黃者不同也此說固若近理而實有未必然者蓋瘟疫若非表證則何以必汗而後解故余於前論中謂其先受寒邪再觸則發誠理勢之確然也但其時有寒熱證有陰陽治陽證熱證者即冬時亦可清解治陰證寒證者即春夏亦可溫散謂宜因證因時者則可謂非寒傷於表也則不可瘟疫脈候凡病傷寒瘟疫脈洪大滑數而數中兼緩者可治脈洪大而緊數甚者危脈雖浮大而按之無力者宜補兼表身雖熱而脈弱者當以純補為主或兼溫散身大熱而脈見沉澀細小足冷者難治瘟病四五日身熱腹滿而吐脈來細而弦強者十二日死瘟病二三日頭痛腹滿脈直而疾者八日死瘟病八九日頭身不痛色不變而利不止心下堅脈不鼓時或大者十七日死瘟病汗不出或出不至下部者死瘟病下痢腹中痛甚者死以上死證言其略耳諸所未盡當於傷寒門參閱治法六要自古傷寒治法苦於浩渺余自考索以來留心既久每臨編得其法未必見其病臨病見其證未必合其方可見病多變態執滯難行惟貴圓通而知其要耳故余注類經所列傷寒治要有六曰汗補溫清吐下然亦但言其概而未及其詳今悉諸法於此用補傷寒之未備者倘欲求仲景心法乃當閱傷寒本門使能彼此參證則綱舉目張自有包羅貫串之妙既約且盡而活人之要當無出此汗有六要五忌治傷寒之法余已析其六要而六要之外又有五忌者何也蓋六法之中惟汗為主正以傷寒之愈未有不從汗解者故法雖有六汗實統之而汗外五法亦無非取汗之法也然取汗以辛散此固其常也而何以五法皆能取汗六要則已又何以有五忌之辨也蓋汗由液化其出自陽其源自陰若肌膚閉密營衛不行非用辛散則玄府不開而汗不出此其一也又若火邪內燔血乾液涸非用清涼則陰氣不滋而汗不出此其二也又若陰邪固閉陽氣不達非用辛溫則凝結不開而汗不出此其三也又若營衛不足根本內虧非用峻補則血氣不充而汗不出此其四也又若邪在上焦隔遮陽道不施吐湧則清氣不升而汗不出此其五也又若邪入陽明胃氣壅滯不以通下則濁氣不解而汗不出此其六也凡此者皆取汗之道是即所謂六要也何謂五忌蓋一曰熱在表者內非實火大忌寒涼寒則陰邪凝滯不散邪必日深陽必日敗而汗不得出者死二曰元氣本弱正不勝邪者大忌消耗尤忌畏補消耗則正氣日消不補則邪氣日強消者日清甚者日甚而必不能汗者死三曰實邪內結伏火內炎者大忌溫補溫則愈燥補則愈堅而汗不得出者死四曰中虛氣弱並忌汗諸條者大忌發散散則氣脫氣脫而汗不能出氣脫而汗不能收者死五曰病非陽明實邪並忌下諸條者大忌通瀉瀉則亡陰陰虛則陽邪深陷而汗不得出者死是即所謂五忌也能知六要而避五忌傷寒治法盡於是矣第假熱者多真實者少能察秋毫於疑似非有過人之見者不能也余之諄諄其亦顒望於潛心者耳汗散法共五條凡傷寒瘟疫表證初感速宜取汗不可遲也故仲景曰凡發汗服湯藥其方雖言日三服若病劇不解當半日中盡三服如服一劑病證猶在當復作本湯服之至有不肯汗出者服三劑乃解若汗不能出者死病也此所謂汗不宜遲也然取汗之法又當察其元氣病氣之虛實若忽爾暴病表證已具而元氣未虧者但以辛平之劑直散之可也若兼雜證則當察其寒熱溫涼酌宜而治不得但知發散也又若身雖大熱表證全具而脈見虛弱者必不易汗此即當詳察補虛法酌而治之若不知標本而概行強散營竭則死一傷寒之宜平散者以其但有外證內無寒熱而且元氣無虧也宜以正柴胡飲為主治此外如十神湯參蘇飲皆可酌用若病在陽明者宜升麻葛根湯若感四時瘟疫而身痛發熱及煙瘴之氣者宜敗毒散或荊防敗毒散若病在三陽而頭痛鼻塞項強身痛咳嗽者宜神朮散若傷風兼寒而發熱咳嗽者宜柴陳煎或金沸草散甚者小青龍湯一傷寒之宜溫散者以其寒邪外盛而內無熱證及元氣無虧而氣清受寒者皆可從溫直散之宜二柴胡飲為最當若寒甚表實者惟麻桂飲為最妙毋疑畏也此外如五積散麻黃湯桂枝湯小青龍湯葛根湯聖散子之類皆可酌用一傷寒之宜涼散者以其外熱里亦熱必脈證俱陽而煩渴喜冷及元氣強實者乃可兼涼兼散宜一柴胡飲為先或九味羌活湯柴葛解肌湯甚者六神通解散皆可酌用若內外俱熱而或為熱瀉者宜柴芩煎若表裡俱熱而兼斑疹者宜柴葛煎一傷寒之宜兼補兼散者以營衛不足血氣不充也用藥如用兵兵進而糧餉不繼則兵覆攻病而元氣不繼則病覆故治虛邪之宜散者必當先本後末此其最要者也若寒邪在營肝脾血少而邪熱不退者宜三柴胡飲或歸柴飲若寒邪在衛脾肺氣虛而表邪不解者宜四柴胡飲若脾胃氣血不足而邪熱不解者宜五柴胡飲若邪在半表半裡往來寒熱而微見氣虛者宜小柴胡湯若溫暑大熱大渴津枯液涸陰虛不能作汗者宜歸葛飲若寒邪深入而陰中陽氣不足或背惡寒者必難散解非理陰煎不可若中氣大虛大寒身熱惡寒或大便溏泄而表邪不能解者非大溫中飲不可補虛法共三條傷寒瘟疫俱外侮之證惟內實者能拒之即有所感而邪不勝正雖病無害最畏者惟內虛之人正不勝邪邪必乘虛深入害莫大矣故曰傷寒偏打下虛人且今人虛弱者多強實者少設遇挾虛傷寒而不知速救根本則百無一生故傷寒書曰陽證得陰脈者死正以陰脈即虛證也此欲辨之惟脈為主而參以形證自無失矣蓋凡遇傷寒外熱等證而脈見微弱浮空舉按無力者即是虛證最不易解最不宜攻雖欲發汗汗亦難出即有微汗亦不過強逼膚腠之汗而必非營衛通達之所化若不顧虛實而逼之太甚則中氣竭而危亡立至矣然治虛之法須察虛實之微甚若半虛者必用補為主而兼散其邪若太虛者則全然不可治邪而單顧其本顧本則專以保命命得不死則元氣必漸復或於七日之後或十四日甚者二十日之後元氣一勝邪將不攻自潰大汗至而解矣欲知其兆亦察其脈但得弱者漸強小者漸大弦者漸滑緊者漸緩則大汗將通吉期近矣凡用補之法但察其胸膈何如若胸腹多滯者未可補年壯氣實者未可補若氣本不實而胸腹無滯則放膽用之又若內無熱邪而素宜用溫其或氣有難行者則必兼暖胃而後可蓋補得暖而愈行邪得暖而速散切不可雜用消耗寒涼以分溫補之力其或初感寒邪但見脈證真虛邪不易散等證則人參熟地之類開手便當速用愈早愈妙若或遲疑則縱寇深入反成難制此治虛邪最善之法也余用此法活人多矣常聞昧者有傷寒忌補之說不知補者所以補中是即托裡之意亦以寒邪如盜其來在外元氣如民其守在中足民正所以強中強中正所以御外保命玄機惟此一著何為補住邪氣庸妄誤人莫此為甚余因再悉於此用補傷寒治法之未備漸用漸熟方知其妙自今而後知必有不惑余言而受余之生者將無窮矣一傷寒精血素弱或陰中陽氣不足脈細弱而惡寒者必須大助真陰則陽從陰出而表邪自可速解惟理陰煎加柴胡麻黃之類或隨證加減用之為最妙若傷寒於七日八日之後脈數無力神昏氣倦或躁擾不寧散之不可清之不可而邪不能解者只宜理陰煎大劑與之真回生神劑也若氣血俱虛而邪不能解只宜平補者以五福飲為主而隨證加減用之或大補元煎或六物煎或十全大補湯皆可用若脾胃中氣虛弱而邪不能解者宜四君子湯加減用之若中氣虛弱脾寒或兼嘔惡而邪不解者宜五君子煎溫胃飲若勞倦傷脾寒邪內陷身熱不退當升散者宜補中益氣湯若寒邪陷入陰分血虛不能外達而當升散者宜補陰益氣煎若陰虛發熱面赤口渴煩躁脈浮洪無力者宜六味地黃湯大劑與之一服可愈凡中氣虛寒表邪不解或日久畏藥或諸藥不效者只宜獨參湯或濃或淡或冷或熱隨其所好時時代茶與之連日勿間使其營氣漸復則邪氣漸退大有回生之妙毋勿之也一傷寒用補之法與用攻用散者不同蓋攻散所以去實邪其力峻其效速故凡用柴胡麻黃之類取效在一二三劑之間用大黃芒硝之類取效在一劑之間此而不效必其用之不善不可多也至若用補者所以補虛其力柔其功緩雖於一二劑見效者亦多有之若積勞積損氣血虛甚者欲其復元誠不易也但察其服補無礙或於脈證間略見相投便是得補之力故輕者二三劑重者十餘劑方得見功而汗出邪退以愈也若不知此理而但於一二劑間未見速效則必致庸讒起惑亂生而全功盡棄矣此不可不深察也溫補法共二條凡治傷寒溫疫宜溫補者為其寒邪凝滯陽不勝陰非溫不能行非溫不能復也如寒氣在經者以邪在表也宜用溫散法具如前寒氣在臟者以陽氣虛也或宜溫補或止溫中然用溫之法但察其外雖熱而內無熱者便是假熱宜溫不宜涼也病雖熱而元氣虛者亦是假熱宜溫不宜涼也真熱者誰不得而知之惟假熱為難辨耳病假熱者非用甘溫熱必不退矧真寒者又在不言可知大都實證多真熱虛證多假熱故治實者多宜用涼治虛者多宜用溫真假不識誤人不淺矣又真寒假熱之辨則實亦有寒實亦有熱虛亦有寒虛亦有熱若謂實者皆熱虛者皆寒則鑿而謬矣但實而寒者只宜溫散不必滋補虛而熱者只宜調補最畏寒涼蓋寒涼無生意而善敗元氣若以寒涼治虛證則熱未必退且暫用則或可久則無不敗脾而危者既已病熱又不宜寒則總云假熱本非過也一傷寒發熱而命門陽虛或惡寒或身痛或嘔或痢脈弱氣虛而表不能解者必用大溫中飲或理陰煎若傷寒身熱心肺有寒或嘔噦而咳或腹滿而喘止有寒邪而無虛者宜小青龍湯若陰證傷寒自利脈沉身痛發熱腹痛厥逆但有寒邪而元氣無虛者當用溫藥宜四逆湯若寒在太陰腹痛吐痢或脹滿厥逆脾胃虛寒而邪有不解者宜溫胃飲或理中湯若傷寒一二日邪在太陽或在少陰背惡寒而表不解者宜附子理陰煎在仲景則用附子湯若風寒在表陰寒在裡外為身熱而內則瀉痢不能止或見嘔惡或腹因痢痛者此其中氣下泄則外邪益陷必不能解宜速用胃關煎或大溫中飲凡患傷寒有陰陽大虛元氣將敗而邪不能解者非六味回陽飲不可然但有大虛大寒之意即當用此若待其敗恐無及矣凡陰盛隔陽內真寒而外假熱者其證必頭紅面赤或乾渴舌焦或口瘡喉痛或煩喘狂躁或身熱如火或見虛斑而蚊跡遍身或發陰黃而溺如金汁雖其外有此證而脈則微弱不鼓且或為嘔惡或為泄瀉或背腹畏寒或氣短似喘或昏睡無知或驚惶懼怯或雖熱不渴或言雖譫妄而氣促聲微或身雖躁狂而舉動無力禁之則止是皆內虛外實真寒假熱之證須用理陰煎或六味回陽飲大溫中飲八味地黃湯之類大劑與之庶可保全若虛火上浮喉痛熱躁不能熱飲者用井水浸藥冷與飲之此用假寒之味以解上焦之假熱真熱之性以救下焦之真寒回陽起死真神妙之法也其有血氣本虛用補相便然溫補既多而病日昏憒且見煩熱難愈者此其陽邪獨亢陰氣不至而虛中有熱也但改滋陰以犀角地黃湯加黃芩麥冬或一柴胡飲加知母之類此十補一清之法一劑即效其妙如神醫中圓活最宜知此清利法共三條凡治傷寒瘟疫宜清利者非止一端蓋火實者宜清火氣實者宜行氣食滯者宜消食痰盛者宜化痰皆所謂清利也凡此數者滯去則氣行而表邪自解然此宜用於邪實等證而本非虛證之所宜其有虛中挾實者不妨少為兼用此中權度自有其宜若病在危急則毫不容謬設不當清而妄用之亦與撲殘燈者無異也一傷寒火盛者治宜清解若熱入陽明煩渴躁熱脈洪便實而邪有不解者宜柴胡白虎煎或單用白虎湯太清飲或玉泉散若汗後仍熱者亦宜用之若傷寒口渴煩熱赤斑脈洪大而無力者宜人參白虎湯若傷寒邪在太陽發熱頭痛脈洪大表邪未解而內熱又甚者宜一柴胡飲或三黃石膏湯或六神通解散若六經通熱火邪不解或狂斑煩躁或頭紅面赤口乾舌黑脈洪邪實者宜抽薪飲或黃連解毒湯或加柴胡若傷寒熱入血室吐衄斑黃及血熱血燥不能作汗而邪不解者宜局方犀角地黃湯熱甚者宜良方犀角地黃湯若熱邪閉結血分大便不通而邪不能解者宜拔萃犀角地黃湯若少陰水虧陽明火盛熱渴失血牙痛便結脈空作喘而邪不能解者宜玉女煎若傷寒陽邪亢盛血脈不通而四肢厥逆者謂之熱厥宜四逆散若暑月時行瘟疫表裡俱熱宜清宜解者羌活升麻湯若傷寒熱結膀胱而小水不利火邪不退或挾熱泄瀉者宜大分清飲或柴芩煎或益元散若傷寒實熱內蓄小水不利而口渴煩熱發黃者宜茵陳飲或大分清飲凡瘟疫熱甚而煩渴不寧者宜雪梨漿時時與之解渴退火最妙大勝於益元散冷水稟天一之性甘而不苦故大能清熱解煩滋陰壯水凡火盛水涸大渴便結營衛熱閉不能作汗者最宜用之雖虛證不可用然亦有當用者但察其喉口熱極唇舌乾焦大便秘結不通而大渴喜冷者此陰虛水虧證也不妨與人參熟地桂附乾薑之屬相間並用藉以滋陰其功不小惟大便不結及微熱微渴勞倦陽虛等證最不宜用若妄用之則多致寒顫而敗一傷寒兼雜證者治宜調和清利凡傷寒兼風發熱咳嗽多痰者宜柴陳煎若食滯氣實邪結胃脘而表不解者宜大和中飲加柴胡若感四時寒濕之氣以致脾胃不和或嘔或吐或泄瀉脹滿者宜平胃散或寒盛多吐者宜和胃飲若外感風寒內停飲食頭痛寒熱或為吐瀉脹滿者宜藿香正氣散若感四時寒濕發熱發黃身痛脈緊中寒泄瀉小水不利者宜柴芩飲若中無寒而多火者宜柴苓湯若外傷暑熱霍亂泄瀉小水不利腹痛脹滿內陰外陽者宜五苓散若外傷寒濕一身盡痛者羌活勝濕湯吐法共二條凡傷寒宜吐者必其上焦有滯或食或痰結聚胸膈而邪不得散者當吐也或寒邪濁氣內陷膈間而為痞為痛者當吐也蓋吐中自有發散之意若中氣虛寒脈弱無力及氣短虛煩不寧者皆不可吐凡用吐藥中病即止不必盡劑一古方吐法多用獨聖散及茶調散凡上焦邪滯皆可用之然不若新吐法為更捷也又凡諸藥皆可吐只隨證用藥煎湯服少頃探而吐之則輕重可酌標本可兼尤其善也下法共二條凡傷寒瘟疫宜下者必陽明邪實於腑而秘結腹滿者乃可下之或元氣素強胃氣素實者亦可下之若大便雖數日不行而腹無脹滿及大便無壅滯不通之狀或連日不食而臍腹坦然軟而無礙者此其陽明胃腑本無實邪切不可妄下妄導以泄中氣又如傷寒門忌下諸條必當加意詳察不可誤用蓋諸誤之害下為尤甚不可忽也今見時醫有妄下而亦不致死者必其元氣之素強能勝攻下者也若概引為證必致殺人一傷寒邪入陽明便秘譫語腹滿煩熱脈證俱實者宜大承氣湯或調胃承氣湯若傷寒表證未除里證又急表裡俱實者宜大柴胡湯若三焦六經邪火壅結大便不通而表邪不解者宜局方涼膈散若傷寒熱邪傳裡當下而氣血俱虛者宜陶氏黃龍湯若傷寒熱邪傳裡而血虛秘結腹脹作痛邪不能解者宜玉燭散若時氣瘟疫遍行火邪內蓄三焦實熱大便秘結而邪不能退者宜五瘟丹若時行瘟疫發熱火浮於上胸膈結熱者宜大清丸凡諸有宜通宜下者但隨證作引送百順丸一二三錢最捷最妙瘟疫熱毒辨治共三條瘟疫本即傷寒然亦有稍異以其多發於春夏且因時氣遍行大小相似必待日數足然後得汗而解者是為瘟疫之證雖古法云瘟病在三陽者多三陰者少然亦不可拘泥若見陰證陰脈是即三陰病也大宜辨而治之一瘟疫之在三陽者當辨其經如脈浮頭疼發熱身痛者太陽證也宜九味羌活湯加減治之若脈長鼻乾不眠而躁者陽明病也宜葛根解肌湯或十味參蘇飲加減治之若脈弦而數胸脅痛而耳聾少陽證也宜小柴胡湯加減治之按此三陽之治乃古方治瘟之大略然此證寒熱虛實無所不有仍當察治如前不可拘也一瘟疫初起而頭疼身痛憎寒發熱脈緊數洪滑而別無他證先宜正柴胡飲或敗毒散或十神湯若溫疫初起多陰少陽脈證無虛者宜神朮散若瘟疫胸膈滿悶小柴胡加枳實橘紅熱在內者仍加黃連若暑月時行瘟疫表裡俱熱甚宜清火解毒者羌活升麻湯若瘟疫火盛脈洪大而熱躁甚者三黃石膏湯若瘟疫熱毒上浮頭面俱腫目不能開口乾舌燥咽喉不利者普濟消毒飲若瘟疫脈洪大煩躁熱渴者白虎湯或兼嘔吐者仲景竹葉石膏湯若瘟疫發狂譫語脈洪大滑實而大便秘結不通者大承氣湯或雞子清飲若瘟疫內外俱有實邪大便不通當表裡雙解者防風通聖散若瘟疫病八九日不退而發斑發黃但脈不虛不浮緊而腹見痞滿者率可以承氣五苓合服而下之若瘟疫頭身紅赤肢體熱甚煩躁不能當者宜用解瘟疫熱毒法及內飲雪梨漿或用井花水調玉泉散俱妙按以上諸法乃因時因證皆陽證實邪之所宜若瘟疫脈弱無力或外雖實而內則虛或口不喜冷大便不結之類即非陽證不得以身熱脈數俱認為火雖在暑月如理中湯理陰煎大溫中飲大補元煎及前溫補諸法皆當隨證必用此舍時從證之妙法也矧夏月尤多伏陰故凡臨此證者必先察陰陽次辨虛實則其要也宜切識之徐東皋曰瘟疫六七日不解以致熱入血室發黃身如煙燻目如金色口燥而熱結以砭針刺曲池出惡血仍以通聖散兼散兼下得汗如黃水糞如黑膏而即愈按此即此方之所謂打寒也其法用手捋上膊使血聚於臂以帛縛定乃用筋夾瓷鋒擊刺肘中曲澤傍之大絡使邪毒隨惡血而出亦最捷之法窮人用之極效然非曲池穴也大頭瘟證治共三條大頭瘟者以天行邪毒客於三陽之經所以憎寒發熱頭目頸項或咽喉俱腫甚至腮面紅赤肩背斑腫狀如蝦蟆故又名為蝦蟆瘟大都此證多屬風熱然亦有表裡虛實之辨又外科有時毒證亦即此也方治具見本門當參閱用之一大頭蝦蟆瘟治法凡病在頭目內火未盛者先當解散宜正柴胡飲或敗毒散若時毒咽喉腫痛內火不甚而便利調和者葛根牛蒡湯時毒表裡俱熱頭目俱腫宜清宜散者柴葛煎若毒在陽明表裡俱熱多頭痛鼻乾宜散者柴葛解肌湯若時毒三陽熱極狂躁咽喉腫痛宜清兼散者梔子仁湯若時毒遍行邪熱上浮頭面俱腫咽喉不利者普濟消毒飲若時毒風熱上聚頭面宜升散者犀角升麻湯若時氣盛行宜清火解毒者羌活升麻湯若時毒血熱煩躁兼赤斑者犀角散人參白虎湯若時毒內外俱實當雙解者防風通聖散若時毒焮腫作痛脈實便秘宜下者五利大黃湯或漏蘆升麻湯或連翹消毒散若時毒雖盛而外實內虛脈弱神困凡諸虛證有據者必當救里內托宜參耆托裡散或托裡消毒散其有陽虛假熱而兼嘔惡泄瀉者如六味回陽飲之類皆所必用不可疑也若頭項腫甚疼痛難忍者宜用清涼救苦散敷之或取側柏葉自然汁調蚯蚓泥敷之徐東皋曰大頭蝦蟆之候因風熱濕邪在於高顛之上宜先用敗毒散加羌活黃芩酒浸大黃隨病加減不可峻用降藥雖有硝黃之劑亦必細細呷之蓋凡治大頭瘟者不宜速攻若攻之太峻則邪氣之在上者自如而無過之中氣反受其害而傷人也且頭乃空虛之地既著空虛則無所不致所以治法當先緩而後急則邪伏也緩治以清熱消毒虛者兼益元氣胃虛食少者兼助胃氣內實熱甚大便秘結者以酒浸大黃下之乃宣熱而泄其毒也此為先緩後急之法若先從鼻腫次腫於目又次腫於耳漸至頭上絡腦後結塊則止不散必出膿而後愈又曰大頭瘟太陽病發於頭上並腦後下項及目後赤腫者是也治宜荊防敗毒散羌活藁本行經陽明病發於鼻頞並目不能開及面部者是也或內熱氣喘口乾舌燥咽喉腫痛不利脈數大者普濟消毒飲若內實而熱者防風通聖散間服之少陽病發於耳之上下前後並頭角紅腫者是也若發熱或日晡潮熱或寒熱往來口苦咽乾目痛胸脅滿悶者小柴胡加消毒之藥傷寒初感治法凡傷寒初感之治本與傳變者不同蓋凡病傷寒瘟疫者無不發熱然初感之時其邪在表未經傳裡未至鬱熱雖身表有熱不過膚腠之寒邪而內未有火豈即陽證斯時也但用溫散或兼托散藥對其證無不即愈奈何時俗之醫一見發熱便認為火而芩連知柏開手便用不知內無實熱何以當此以寒邪得寒藥而表裡俱寒勾連不解則日以內傳寒涼妄用則元陽日敗凡受斯害死者多矣此理不明則既不知表裡又不知先後終身不省每致誤人而且敢侈口談醫其心果亦安乎傷寒飲食宜忌共二條凡傷寒飲食有宜忌者有不宜忌者若病傷寒而食不斷者以邪猶在表未深入也及其稍深而在半表半裡之間則食漸減矣再入胸膈胃口則全不食矣邪既在胃則胃口不飢所以傷寒不食者或十日或二十日皆無足慮者亦以胃氣不餒則不敗也第不欲食者不可強食強食則助邪或新愈之後胃氣初醒尤不可縱食縱食則食復此皆大忌也至有不宜忌者則如勞倦內傷之人偶感寒邪亦必發熱此多以勞傷中氣本非真正傷寒外邪內陷之病所以外雖發熱而內則飢餒每多思食奈何庸昧之輩但見發熱則曰餓不死傷寒不論虛實一概禁之常見欲食者索之不得而且加以克伐寒涼之藥嗟嗟飢腸受剝虛者益虛內外夾攻苦無所訴及胃氣既脫反不欲食矣即欲救之已無可及余常治此證每借食為藥所活多人而見禁食受斃者亦已不少故詳言之若病人時時覺飢而索食者此其邪不在臟胃中空虛而然必不可禁但不宜縱耳且因此可察虛實關係非小不可忽也巢氏曰凡瘟疫病新瘥脾胃尚虛穀氣未復若作勞妄動傷力並食豬羊雞犬魚膾灸爆肥膩生果麵食硬澀難消之物停積腸胃膈悶腹脹便秘或大吐大下重複發熱病作不可救矣避疫法共二條瘟疫乃天地之邪氣若人身正氣內固則邪不可干自不相染故避之之法惟在節欲節勞或於房室勞倦之後尤不可近仍勿忍飢以受其氣皆要法也至於卻邪之法則如刺法論所云天牝從來復得其往氣出於腦即不幹邪蓋天牝者鼻也鼻受天之氣故曰天牝氣自空虛而來亦欲其自空虛而去即天牝從來復得其往也正以氣通於鼻鼻通於腦毒入腦中則流布諸經令人相染矣氣出於腦謂嚏之或張鼻以泄之或受氣於室則泄氣於外而大吸精氣以易之則邪從鼻出而毒氣自散此卻邪於外之法也又如想心如日等法蓋膽屬少陽為中正之官少陽氣壯則臟氣賴以俱壯而邪不能入此強中御邪之法也凡探親診疾事有不容已者但知此諸法則雖入最穢之地自可保其無慮一方治天行時氣宅舍怪異用降真香燒焚大解邪穢小兒帶之能解諸邪最驗一法以福建香茶餅不時噙口中大辟傷寒瘴氣穢惡醫統曰男子病邪氣出於口女人病邪氣出於前陰其相對坐立之間必須識其向背或以雄黃末塗鼻孔中行動從容察位而入凡入病家此亦醫人之不可不知也瘟疫論列方麻桂飲新散七理陰煎新熱三補中益氣湯補三十麻黃湯散一桂枝湯散九補陰益氣煎新補十六參蘇飲散三四十神湯散四十九味羌活湯散四四五積散散三九敗毒散散三六荊防敗毒散痘三一柴葛煎新散十四葛根湯散二九柴葛解肌湯散三一歸葛飲新散十三神朮散散六五升麻葛根湯散三十歸柴飲新散十七柴陳煎新散九柴芩煎新散十羌活升麻湯寒十二柴苓湯和一九二柴苓飲新散十一十全大補湯補二十聖散子散四三五瘟丹攻百一六神通解散寒十五四逆湯熱十四平胃散和十七六味回陽飲新熱二四逆散散二八和胃飲新和五防風通聖散攻十六五福飲新補六五苓散和一八二藿香正氣散和二十六物煎新因二十一柴胡飲新散一普濟消毒飲寒十三獨參湯補三五二柴胡飲新散二人參白虎湯寒三溫胃飲新熱五三柴胡飲新散三柴胡白虎煎新散十二胃關煎新熱九四柴胡飲新散四竹葉石膏湯寒五理中湯熱一五柴胡飲新散五三黃石膏湯寒十一附子湯熱二二正柴胡飲新散六黃連解毒湯寒一白虎湯寒二小柴胡湯散十九局方涼膈散攻十九太清飲新寒十三大柴胡湯攻七解瘟熱毒法寒二四玉泉散新寒十五大補元煎新補一羌活勝濕湯和一七八益元散寒百十二四君子湯補一葛根牛蒡湯外四五抽薪飲新寒三五君子煎新熱六陶氏黃龍湯攻二一茵陳飲新寒八大溫中飲新散八調胃承氣湯攻三玉女煎新寒十二大和中飲新和七五利大黃湯外八九犀角散寒一三一大分清飲新寒五漏蘆升麻湯外九七雪梨漿新寒十六小青龍湯散八連翹消毒散外六一大青丸攻百二金沸草散散八一參耆托裡散外五玉燭散攻二四大承氣湯攻一托裡消毒散外二百順丸新攻六獨聖散攻百六梔子仁湯寒十九清涼救苦散外一三五茶調散攻百七雞子清飲寒十七犀角升麻湯外四七吐法新攻一犀角地黃湯三方寒七九八十八一論外備用方奪命散補三六虛極芩連消毒散寒十四陳氏正氣散和二二風寒生冷
