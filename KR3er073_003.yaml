body:
  text: 卷之三道集傳忠録下命門余義二十六共六條命門之義內經本無惟越人云腎有兩者非皆腎也左者為腎右者為命門命門者諸神精之所舍原氣之所繫男子以藏精女子以系胞也余以其義有未盡且有可疑故著有三焦包絡命門辨附梓類經之末似已盡其概矣然而猶有未盡者恐不足以醒悟後人茲因再悉其蘊條列於下一命門為精血之海脾胃為水穀之海均為五臟六腑之本然命門為元氣之根為水火之宅五臟之陰氣非此不能滋五臟之陽氣非此不能發而脾胃以中州之土非火不能生然必春氣始於下則三陽從地起而後萬物得以化生豈非命門之陽氣在下正為脾胃之母乎吾故曰脾胃為灌注之本得後天之氣也命門為化生之源得先天之氣也此其中固有本末之先後觀東垣曰補腎不若補脾許知可曰補脾不若補腎此二子之說亦各有所謂固不待辨而可明矣一命門有火候即元陽之謂也即生物之火也然稟賦有強弱則元陽有盛衰陰陽有勝負則病治有微甚此火候之所以宜辨也茲姑以大綱言之則一陽之元氣必自下而升而三焦之普𮑮乃各見其候蓋下焦之候如地土化生之本也中焦之候如灶釜水穀之爐也上焦之候如太虛神明之宇也下焦如地土者地土有肥瘠而出産異山川有厚薄而藏蓄異聚散操權總由陽氣人於此也得一分即有一分之用失一分則有一分之虧而凡壽夭生育及勇怯精血病治之基無不由此元陽之足與不足以為消長盈縮之主此下焦火候之謂也中焦如灶釜者凡飲食之滋本於水谷食強則體壯食少則身衰正以胃中陽氣其熱如釜使不其然則何以朝食午即化午食申即化而釜化之速不過如此觀灶釜之少一炬則遲化一頃增一炬則速化一時火力不到則全然不化即其證也故脾胃之化與不化及飲食之能與不能亦總由陽明之氣有強與不強而陰寒之邪有犯與不犯耳及其病也則漸痞漸脹或隔或嘔或十化其三五或膨聚而不消或吞酸噯腐而食氣不變或腹疼肚痛而終日不飢或清濁不分或完穀不化蓋化則無不運行不化則無不留滯運行則為氣為血留滯則為積為痰此其故謂非胃氣之不健乎而何以不健謂非火候之無力乎今見治痞治脹及治吞酸噯腐等症無論是熱非熱動輒呼為胃火餘燼其幾尚能堪否此中焦火候之謂也上焦如太虛者凡變化必著於神明而神明必根於陽氣蓋此火生氣則無氣不至此火化神則無神不靈陽之在下則溫暖故曰相火以位陽之在上則昭明故曰君火以明是以陽長則陰消而離照當空故五官治而萬類盛陽衰則陰勝而陽為陰抑故聰明奪而神氣減而凡人之聲色動定及智愚賢不肖之有不齊者何非陽德為之用此上焦火候之謂也此以三焦論火候則各有所司而何以皆歸之命門不知水中之火乃先天真一之氣藏於坎中此氣自下而上與後天胃氣相接而化此實生生之本也是以花萼之榮在根柢灶釜之用在柴薪使真陽不發於淵源則總屬無根之火矣火而無根即病氣也非元氣也故易以雷在地下而為復可見火之標在上而火之本則在下且火知就燥性極畏寒若使命門陰勝則元陽畏避而龍火無藏身之地故致遊散不歸而為煩熱格陽等病凡善治此者惟從其性但使陽和之氣直入坎中據其窟宅而招之誘之則相求同氣而虛陽無不歸原矣故曰甘溫除大熱正此之謂也奈何昧者不明此理多以虛陽作實熱不思溫養此火而但知寒涼可以滅火安望其尚留生意而不使之速斃耶此實醫家第一活人大義既從斯道不可不先明斯理倘三焦有客熱邪火皆凡火耳固不得不除而除火何難是本非正氣火候之謂也學者於此當深明邪正二字則得治生之要矣一命門有生氣即乾元不息之幾也無生則息矣蓋陽主動陰主靜陽主升陰主降惟動惟升所以陽得生氣惟靜惟降所以陰得死氣故乾元之氣始於下而盛於上升則向生也坤元之氣始於上而盛於下降則向死也故陽生子中而前升後降陰生午中而前降後升此陰陽之岐相間不過如毛髮及其竟也則謬以千里而死生之柄實惟此毫釐升降之機耳又如水暖則化氣化氣則升無不生也水寒則成冰成冰則降無不死也故腎氣獨沉則奉生者少即此生氣之理也至若人之生氣則無所不在亦無所不當察如臟腑有生氣顏色有生氣聲音有生氣脈息有生氣七竅有生氣四肢有生氣二便有生氣生氣即神氣神自形生何不可辨衰者速培猶恐不生尚堪伐乎而況其甚者乎故明師察此必知孰者已虧孰者猶可孰者能益生氣孰者能損生氣孰者宜先攻病氣以保生氣孰者宜先固生氣以御病氣務思病氣雖如此生氣將如何見在雖如此日後將如何使不有原始要終之明則皆寸光之流耳雖然此徒以斯道為言也而斯道之外猶有說焉夫生氣者少陽之氣也少陽之氣有進無退之氣也此氣何來無非來自根本此氣何用此中尤有玄真蓋人生所貴惟斯氣耳而出入之權在呼吸斯氣數之寶藏也河車之濟在轆轤實轉運之神機也其進其退其得其失總在生息之間而彭殤之途於斯判矣經曰得神者昌失神者亡即此生氣之謂也豫見遭剝於是者不可勝紀故特明其義於此一命門有門戶為一身鞏固之關也經曰倉廩不藏者是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死又曰腎者胃之關也關門不利故聚水而從其類也又曰北方黑色入通於腎開竅於二陰是可見北門之主總在乎腎而腎之政令則總在乎命門蓋命門為北辰之樞司陰陽柄陰陽和則出入有常陰陽病則啓閉無序故有為癃閉不通者以陰竭水枯乾涸之不行也有為滑泄不禁者以陽虛火敗收攝之無主也陰精既竭非壯水則必不能行陽氣既虛非益火則必不能固此固其法也然精無氣不行氣無水不化此其中又有可分不可分之妙用亦在乎慧者之神悟有非可以筆楮盡者一命門有陰虛以邪火之偏勝也邪火之偏勝緣真水之不足也故其為病則或為煩渴或為骨蒸或為咳血吐血或為淋濁遺泄此雖明是火證而本非邪熱實熱之比蓋實熱之火其來暴而必有感觸之故虛熱之火其來徐而必有積損之因此虛火實火之大有不同也凡治火者實熱之火可以寒勝可以水折所謂熱者寒之也虛熱之火不可以寒勝所謂勞者溫之也何也蓋虛火因其無水只當補水以配火則陰陽得平而病自可愈若欲去火以覆水則既虧之水未必可復而併火去之豈不陰陽兩敗乎且苦寒之物絶無升騰之生氣而欲其補虛無是理也故豫之治此必以甘平之劑專補真陰此雖未必即愈自可無害然後察其可乘或暫一清解或漸加溫潤必使生氣漸來庶乎脾可健則熱可退肺漸潤則嗽漸寧方是漸復之佳兆多有得生者若但知知柏為補陰則愈敗其腎而致泄瀉食減必速其殆矣誤謬論二十七經曰揆度奇恆道在於一得一之精以知死生此即斯道中精一執中之訓也凡天人之學總無出此矧醫之為道性命判於呼吸禍福決自指端此於人生關係較之他事為尤切也以此重任使不有此見此識誠不可猜摸嘗試以誤生靈矧立法垂訓尤難苟且倘一言失當則遺禍無窮一劑妄投則害人不淺此誤謬之不容不正也賓自從斯道常稽往古所見軒岐之下凡明良繼出何代無之然必欲求其得中者則舍靈素之外似亦不多其人蓋竊見相傳方論每多失經意背經旨斷章取義假借數語以飾一偏之詭說者比比其然此總屬意見有不到至理有未明故各逞胸臆用示已長致令斯道失中大違精一之義此則醫之於人亦何賴焉是豈知道本一源理無二致自一源而萬變則萬變仍歸於一自二致而錯亂則錯亂遂其為兩故言外有理理外亦有言如理有在而言不能達者此言外之理也有可以言而不可以行者此理外之言也然理外豈別有言乎第以疑似之間加之便佞則真為僞奪而道傍之築從來有矣如古之楊墨異端今之傳奇小說謂皆非理外之言乎言可假借則是非亂而強辨出由是賢者固執愚者亦固執如擇善固執則精一之謂君子時中則執中之謂此賢者之固執也其有言僞而辨行僻而堅必不知反必不可移者此愚者之固執也執中者見事之舛則不得不言以利害所關不容已也邪僻者見人之長則反詆其短以鄙陋不伸不肯已也千古來是非邪正每為此害矧以惟類知類而當局者亦難其人耳然此輩雖云偏拗猶知傍理自非曳白者所能其奈此中尚有全不知脈絡而止識皮毛者亦且囂囂偏能宜俗是不過見熱則用寒見寒則用熱見外感則云發散見脹滿則云消導若然者誰不得而知之設醫止於是則賤子庸夫皆堪師範又何明哲之足貴乎嗟嗟朱紫難辨類多如此豫因溯源稽古即自金元以來為當世之所宗範者無如河間丹溪矣而且各執偏見左說盛行遂致醫道失中者迄今四百餘年矣每一經目殊深扼腕使不速為救正其流弊將無窮也茲姑撮其數條以見倍理之談其有不可信者類如此庶乎使人警悟易轍無難倘得少補於將來則避諱之罪亦甘為後人而受之矣辨河間二十八共九條劉河間原病式所列病機原出自內經至真要大論蓋本論詳言五運六氣盛衰勝復之理而以病機一十九條總於篇末且曰有者求之無者求之盛者瀉之虛者補之令其調達而致和平是可見所言病機亦不過挈運氣之大綱而此中有無之求虛實之異最當深察總惟以和平為貴也故五常政大論又詳言五運三氣之辨則火之平氣曰升明火之太過曰赫曦火之不及曰伏明此虛火實火之辨則有如冰炭之異而內經不偏不倚之道固已詳明若是奈河間不能通察本經全旨遂單採十九條中一百七十六字演為二百七十七字不辨虛實不察盛衰悉以實火言病著為原病式以訖於今夫實火為病故為可畏而虛火之病猶為可畏實火固宜寒涼去之本不難也虛火最忌寒涼若妄用之無不致死矧今人之虛火者多實火者少豈皆屬有餘之病顧可概言為火乎歷觀唐宋以前原未嘗偏僻若此繼自原病式出而丹溪得之定城遂目為至寶因續著局方發揮及陽常有餘等論即如東垣之明亦因之而曰火與元氣不兩立此後如王節齊戴原禮輩則祖述相傳遍及海內凡今之醫流則無非劉朱之徒動輒言火莫可解救多致伐人生氣敗人元陽殺人於冥冥之中而莫之覺也誠可悲矣即間有一二特達明知其非而惜人陽氣則必有引河間之說而群吠之者矣何從辨哉矧病機為後學之指南既入其門則如夢不醒更可畏也醫道之壞莫此為甚此誤謬之源不可不察故直筆於此並再辨其略於下一河間論吐酸曰酸者肝木之味也由火盛制金不能平木則肝木自甚故為酸也而俗醫主於溫和脾胃豈知經言人之傷於寒也則為病熱云云賓謂吐酸吞酸等證總由停積不化而然而停積不化又總由脾胃不健而然脾土既不能化非溫脾健胃不可也而尚可認為火盛耶且妄引經文為證其謬孰甚本證別有詳辨具載吞酸門所當互閲一河間論瀉痢曰瀉白為寒青紅黃赤黑皆為熱也大法瀉利小便清白不澀為寒赤色者為熱又完穀不化而色不變吐痢腥穢澄徹清冷小便清白不澀身涼不渴脈遲細而微者寒證也穀雖不化而色變非白煩渴小便赤黃而或澀者熱證也凡穀消化者無問色及他證便為熱也寒瀉而穀消化者未之有也或火主疾速而熱盛則傳化失常谷不能化而飧泄者亦有之矣又曰痢為熱熱甚於腸胃怫熱鬱結而成或言下痢白為寒者誤也若果為寒則不能消穀何由反化為膿也如世之穀肉果菜濕熱甚則自然腐爛化為濁水故食於腹中感人濕熱邪氣則自然潰發化為膿血也據河間此說似是而非誤人不淺夫瀉白為寒人皆知也而青挾肝邪脾虛者有之豈熱證乎紅因損臟陰絡傷者有之豈盡熱乎正黃色淺食半化者有之豈熱證乎黑為水色元陽衰者有之豈熱證乎若此者皆謂之熱大不通矣且凡瀉痢者水走大腸小水多澀水枯液涸便尿多黃此黃澀之證未必皆由熱也亡液者渴亡陰者煩此煩渴之證未必盡為熱也至如完穀不化澄徹清冷誠大寒矣然人偶有寒邪傷臟或偶以生冷犯脾稍失溫和即病瀉痢者此本受寒然未必即大寒證也且凡脾胃初傷陽氣猶在何能卒至清冷遂成完穀不化若必待清冷不化始云為寒則陽已大敗又豈無漸寒而遽至若是哉夫漸寒者即寒證也此等證候犯者極多若作熱治必用寒涼夫既以生冷傷於前復以寒涼敗於後乃至冰堅於霜而遭其厄者皆此論之殺之也再觀其前條則猶云瀉白為寒也觀其後條則又云或言下痢白為寒者誤也然則凡治此者舍清涼之外則必無寒證矣謬甚謬甚又若寒則不能消穀及谷化為膿之說則尤為不妥夫飲食有時本當速化此自胃氣之常人皆賴之以為生也若化覺稍遲便是陽虛之病又何待不能消穀而始為寒乎矧以所下膿垢原非谷之所化蓋飲食入胃凡其神化而歸於營衛者乃為膏血其不能化而留於腸胃者惟糟粕耳此其為精為穢本自殊途是以糟粕不能化膿從可知矣且垢亦非膿而實腸臟之脂膏也何以知之近有偶病而服硝黃等藥者隨瀉而下必有如膿之垢又或偶患泄瀉者於一二日間即有此垢豈熱化之膿其速有如此乎又如久痢不已或經年纍月不能痊可而每日所下皆有膿垢者豈熱化之膿可以久延如此乎此其非膿也明矣既知非膿安得皆云為熱此蓋以腸臟受傷而致膏脂不固隨剝隨下所以如此若不為之安養臟氣而再用寒涼以治其熱則未有不藏氣日敗而必至於死故今之治痢多危者率受此害最當察也一河間曰假如下痢赤白俗言寒熱相兼其說尤誤豈知水火陰陽寒熱者猶權衡也一高必一下一盛必一衰豈能寒熱俱甚於腸胃而同為痢乎如熱生瘡瘍而出白膿者豈可以白為寒歟由其在皮膚之分屬肺金故色白也在血脈之分屬心火故為血癤也在肌肉屬脾土故作黃膿在筋部屬肝木故膿色帶蒼深至骨屬腎水故紫黑血出也各隨五臟之部而見五色是謂標也本則一出於熱但分深淺而已大法下迫窘痛後重裡急小便赤澀皆屬燥熱而下痢白者必多有之然則為熱明矣據此說以五色分五臟其理頗通若謂本則一出於熱則大不通矣且五臟之分五色之證則猶有精義余因其說併為悉之夫瀉出於臟無不本於脾胃脾胃之傷以五氣皆能犯之故凡其兼赤者則脾心證也兼青者脾肝證也兼白者脾肺證也兼黑者脾腎證也正黃者本臟證也若以脾兼心火乘土也其土多熱言火可也以脾兼肝土受克也其土多敗非火也以脾兼腎水反克也其土多寒非火也以脾兼肺母氣泄也其土多虛非火也本臟自病脾受傷也其土多濕非火也此兼證之盛衰其逆順有如此且凡脾腎之強者有實熱脾腎之弱者皆虛寒此臟氣之可辨也矧火本熱而尚有虛火實火之異風本陽也而亦有風熱風寒之異土本乎中氣也而亦有濕熱寒濕之異至於金之寒水之冷同歸西北之化則其寒多熱少理所必致豈可謂五臟之痢本則一出於熱乎因致寒證之含冤者此言之不得辭其責也又赤白義詳後丹溪條中一河間曰夫治諸痢者莫若於辛苦寒藥治之或微加辛熱佐之則可蓋辛熱能發散開通鬱結苦能燥濕寒能勝熱使氣宣平而已如錢氏香連丸之類是也故治諸痢者黃連黃柏為君以至苦大寒正主濕熱之病據河間此說最為治痢之害又觀其所著藥性則曰諸苦寒藥多泄惟黃連黃柏性冷而燥故自丹溪而後相傳至今凡治痢者舉世悉用寒涼皆此說之誤也毋論其他姑以苦能燥濕一言辨之則河間之見大左矣夫五味之理悉出內經內經有曰以苦燥之者蓋言苦之燥者也河間不能詳察便謂是苦皆燥而不知內經之言苦者其性有二其用有六如曰火生苦曰其類火其味苦曰少陽在泉為苦化少陰在泉為苦化曰濕淫於內治以苦熱燥淫於內治以苦溫是皆言苦之陽也曰酸苦湧泄為陰曰濕司於地熱反勝之治以苦冷曰濕化於天熱反勝之治以苦寒是皆言苦之陰也此其言性之二也又曰以苦發之以苦燥之以苦溫之以苦堅之以苦泄之以苦下之此其言用之六也蓋苦之發者麻黃白芷升麻柴胡之屬也苦之燥者蒼朮白朮木香補骨脂之屬也苦之溫者人參附子乾薑肉桂吳茱萸肉豆蔻秦椒之屬也苦之堅者續斷地榆五味訶子之屬也苦之泄者梔柏芩連木通膽草之屬也苦之下者大黃芒硝之屬也夫氣化之道惟陽則燥惟陰則濕此不易之理也豈以沉陰下降有如黃連黃柏之屬者以至苦大寒之性而猶謂其能燥有是理乎是但知苦燥之一言而不察苦發苦溫苦堅苦泄苦下之五者抑又何也凡醫中之訛每有云其然而不知其所以然者類如此因致後人治痢多不分寒熱虛實動以河間之法及其將危猶云血色如此何敢用溫腹痛如此何敢用補死而無悟深可哀也誰之咎與誰之咎與一河間腫脹條云腫脹者熱勝則胕腫如六月濕熱太甚而庶物隆盛則水腫之義明可見矣據此說豈其然乎夫腫脹之病因熱者固有之而因寒者尤不少蓋因熱者以濕熱之壅而陰道有不利也因寒者以寒濕之滯而陽氣有不化也故經曰臟寒生滿病又曰胃中寒則脹滿是皆軒岐之言也由此觀之豈脹皆熱病耶且庶物隆盛乃太和之陽化以此擬形質之強壯則可以此擬胕腫之病象擬亦下矣一河間曰戰栗動搖火之象也栗寒栗也或言寒戰為脾寒者未明變化之道也此由心火熱甚亢極而戰反兼水化制之故寒栗也然寒栗者由火甚似水實非兼以寒氣也據此說則凡見寒戰皆為火證而何以經曰陰勝則為寒又曰陽虛畏外寒又曰陽虛而陰盛外無氣故先寒栗也又曰陽明虛則寒栗鼓頷也凡此者皆屬經言而河間悉言為火其然否可知也一河間曰驚者心卒動而不寧也所謂恐則喜驚者恐則傷腎而水衰心火自甚故喜驚也據此所云恐則喜驚恐則傷腎然經曰肝氣虛則恐又曰恐則氣下驚則氣亂夫肝氣既虛腎氣既傷而復見氣下氣亂無非陽氣受傷之病陽氣既傷則何由心火遽甚而驚則皆由火也即曰恐則傷腎不能滋養肝木而肝虛則驚又何不可且腎水獨衰者有之豈必水衰即火盛也今常見驚恐之人必陽痿遺溺其虛可知然因火入心而驚者固亦有之未有因恐而驚者皆可指為火證則倍理甚矣一河間曰虛妄者以心火熱甚則腎水衰而志不精一故神志失常如見鬼神或以鬼神為陰而見之則為陰極脫陽而無陽氣者此妄意之言也據此一說則凡以神魂失守而妄見妄言者俱是火證亦不然也夫邪火盛而陽狂見鬼者固然有之又豈無陽氣太虛而陰邪為鬼者乎難經曰脫陰者目盲脫陽者見鬼華元化曰得其陽者生得其陰者死豈皆妄意之言乎何自信之如此也辨丹溪二十九共九條嘗見朱丹溪陽常有餘陰常不足論謂人生之氣常有餘血常不足而專以抑火為言且妄引內經陽道實陰道虛及至陰虛天氣絶至陽盛地氣不足等文強以為證此誠大倍經旨大伐生機之謬談也何也蓋人得天地之氣以有生而有生之氣即陽氣也無陽則無生矣故凡自生而長自長而壯無非陽氣為之主而精血皆其化生也是以陽盛則精血盛生氣盛也陽衰則精血衰生氣衰也故經曰中焦受氣取汁變化而赤是謂血是豈非血生於氣乎丹溪但知精血皆屬陰故曰陰常不足而不知所以生精血者先由此陽氣倘精血之不足又安能陽氣之有餘由此慮之何不曰難成易虧之陽氣而反曰難成易虧之陰氣是何異但知有母而不知有父者乎故其所立補陰等方謂其能補陰也然知柏止堪降火安能補陰若任用之則戕伐生氣而陰以愈亡以此補陰謬亦甚矣及察其引證經文則何其謬誕若經曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛此太陰陽明論言脾之與胃生病有異以陽明主表太陰主裡凡犯賊風虛邪者陽受之陽受之則入六腑而外邪在表邪必有餘故曰陽道實也食飲不節起居不時者陰受之陰受之則入五臟而內傷臟氣臟必受虧故曰陰道虛也此本經以陽主外陰主內而言陽病多實陰病多虛有如此豈以天地和平之陰陽而謂其陽常有餘陰常不足乎勉強引證此一謬也又經曰至陰虛天氣絶至陽盛地氣不足此方盛衰論言陰陽痞隔之為病謂陰虛於下則不升下不升則上亦不降是至陰虛天氣絶也陽亢於上則不降上不降則下亦不升是至陽盛地氣不足也此本以上下不交者為言亦非陽常有餘陰常不足之謂也且下二句猶或似之而上二句云至陰虛天氣絶則何以為解此更謬也以丹溪之通博而胡為妄引若此抑為偏執所囿而忘其矯強乎余陋不自覺而念切在道故不能為丹溪諱而摘正於此猶俟高明之評教一丹溪相火論曰五行各一其性惟火有二曰君火人火也曰相火天火也火內陰而外陽主乎動者也故凡動皆屬火天主生物故恆於動人有此生亦恆於動其所以恆於動者皆相火之所為也故人自有知之後五志之火為物所感不能不動為之動者即內經五火也相火易起五性厥陽之火相扇而妄動矣火起於妄變化莫測無時不有煎熬真陰陰虛則病陰絶則死據丹溪此論則無非闡揚火病而崇其補陰之說也第於此而淺視之則若或近理故易動人於此而深味之則意識皆幻大是誤人余請精繹其義用解後人之惑何如蓋自一元初肇兩儀繼之則動靜於斯乎見而陽主動陰主靜也自兩儀奠位而五行布之則氣質各有所主而火主熱水主寒也此兩儀動靜為五行之先天先天者性道也五行寒熱為兩儀之後天後天者變體也先後之理有可混言者有不可混言者其可混者如火本屬陽即言火為動若為不可也其不可混者以陽為元氣之大主火為病氣之變見而動乃陽之性道安得以性道為病變而言凡動皆屬火也即自天人論之則曰天行健豈天動即火乎又曰君子以自強不息豈人動即火乎使天無此動則生機息人無此動則性命去又何可以火言動乎若謂之火則火必宜去而性亦可去乎若謂凡動皆屬火則豈必其不動而後可乎夫以陽作火詞若相似而理則大倍矣故在丹溪則曰陰虛則病陰絶則死余則曰陽虛則病陽脫則死此機微疑似中有毫釐千里之異臨岐者不可不詳察也或曰子言雖是第未達丹溪之意耳如曰五臟各有火五志激之其火隨起以致真陰受傷陰絶則死者豈非因動生火乎豫曰此或因情欲之思動火者止有一證如欲念不遂或縱欲太過致動相火而為勞為瘵者誠有之也此外而五志之動皆能生火則不然也夫所謂五志者喜怒思憂恐也經曰喜傷心怒傷肝思傷脾憂傷肺恐傷腎五臟既受此傷則五火何由而起又曰喜則氣散怒則氣逆憂則氣閉思則氣結恐則氣下此五者之性為物所感不能不動動則耗傷元氣元氣既耗如此則火又何由而起故經曰五臟者主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣是可見臟不可傷氣亦不可傷未聞傷即為火也即云為火必有火證使無火證而但以動字敷衍其說是何異捉影為形而天下事又何不可馬鹿其間乎且常見五志所傷之人傷極必生戰栗是蓋以元陽不固神氣失守而然倘遇河間為之和則又必謂戰栗皆生於火矣孰是孰非其幾如此能不為生民痛哉一丹溪局方發揮曰相火之外又有臟腑厥陽之火五志之動各有火起相火者此經所謂一水不勝二火之火出於天造厥陽者此經所謂一水不勝五火之火出於人欲氣之升也隨火炎上升而不降孰能御之原經文五火之說乃解精微論中言厥病之目無所見也謂其陽並於上陰並於下陰陽不交所以為厥厥者逆也由其陽逆於上則火不降陰逆於下則水不升水既不升火又不降而目以一陰之微精不勝五臟之陽逆此單言厥逆之為病也如此豈言火有五而水止一乎又按二火之說乃逆調論言人有身寒之甚而反不戰栗者名為骨痹謂其人腎氣素勝以水為事則腎脂枯而髓不能滿故寒甚至骨也又以肝為一陽心為二陽二藏皆有伏火則一水不勝二火所以身雖寒而不凍栗此單言骨痹之為病也如此又豈陽常有餘之謂乎若以五火二火儘可引為火證則如示從容論中有云二火不勝三水者又將何以解之而何獨不引為言耶試以此問丹溪其將何以答乎一丹溪曰氣有餘便是火又曰五臟各有火五志激之其火隨起若諸寒為病必須身犯寒氣口得寒物乃為病寒非若諸火病自內作所以氣之病寒者十無一二豫味丹溪此言不能不掩卷嘆息豈必氣之病寒者十無一二耶夫氣本屬陽陽實者固能熱陽虛者獨不能寒乎故經曰氣實者熱也氣虛者寒也又經曰血氣者喜溫而惡寒寒則泣不能流溫則消而去之則其義有可知矣且今人之氣實與氣虛者孰為多寡則寒熱又可知矣然而何以證之如心氣虛則神有不明肺氣虛則治節有不行脾氣虛則食飲不能健肝氣虛則魂怯而不寧腎氣虛則陽道衰而精少志屈胃氣虛則倉廩匱而並及諸經三焦虛則上中下俱失其職命門虛則精氣神總屬無根凡此者何非氣虛之類氣虛即陽虛陽虛則五內不暖而無寒生寒所以多陽衰羸敗之病若必待寒氣寒食而始為寒證則將置此輩於何地夫病之所貴於醫者貴其能識生氣是誠醫家最大關係而丹溪全不之察故無怪其曰氣有餘便是火而余反之曰氣不足便是寒使其聞余之說尚不知以為然否一丹溪格致餘論曰六氣之中濕熱為病十居八九據此說濕熱為病十居八九則無怪乎寒涼之藥亦宜八九矣此亦大謬之言也夫陰陽之道本若權衡寒往暑來無勝不復若偏熱如此則氣候亂而天道乖矣故軒轅帝曰其德化政令之動靜損益皆何如岐伯曰夫德化政令災變不能相加也勝復盛衰不能相多也往來大小不能相過也用之升降不能相無也各從其動而復之耳此氣交變大論之文豈亦其不足信乎一丹溪夏月伏陰論曰若於夏月火令之時妄投溫熱寧免實實虛虛之患乎或曰巳月純陽於理或通五月一陰六月二陰非陰冷而何答曰此陰之初動於地下也四陽浮於地上燔灼焚燎流金爍石何陰冷之有據此一說則夏月止宜寒涼矣而何以帝曰服寒而反熱服熱而反寒其故何也岐伯曰治其旺氣是以反也然則丹溪止知治旺氣而旺氣有不可治者何以不知也矧春夏之溫熱秋冬有寒涼此四時之主氣也而風寒暑濕火燥此六周之客氣也故春夏有陰寒之令秋冬有溫熱之時所謂主氣不足客氣勝也所謂必先歲氣無伐天和亦此謂也豈丹溪止知有主氣而客氣之循環勝復又何以不知也然此猶以氣令言也若人之血氣陰陽本自不同病之表裡寒熱豈皆如一設以夏月得陰證而忌用溫熱冬月得陽證而忌用寒涼則其人能生乎是丹溪止知時熱宜涼而舍時從證又何以不知也觀其所論止言夏月忌溫熱不言冬月忌寒涼何其畏火之見主火之言一至於此一丹溪局方發揮曰經云暴注下迫皆屬於熱又曰暴注屬於火又曰下痢清白屬於寒夫熱為君火之氣火為相火之氣寒為寒水之氣屬火熱者二屬水寒者一故瀉痢一證似乎屬熱者多屬寒者少詳玩局方專以熱澀為用若用於下痢清白而屬寒者斯可矣經所謂下迫者即裡急後重之謂也其病屬火相火所為其毒甚於熱也投以澀熱非殺之而何據此說以二火一水言瀉痢之由殊未當也夫經言暴注下迫皆屬於熱者謂暴瀉如注之下迫非腸澼下痢之謂也觀太陰陽明論曰陰受之則入五臟下為飧泄久為腸澼然腸澼言久豈同暴注而皆為熱乎且內經所言瀉痢之證寒者極多今於泄瀉門詳列可考何丹溪俱不引證而獨引二火之說亦勉強矣及遍考內經則止有暴注下迫皆屬於熱一句並無暴注屬於火之文即或以屬火之年有言暴注者然木金土水之年皆有此證又何以獨言火也蓋其意專在火故借引經文以證其說而不知經言二火者本言六氣之理也豈以瀉痢一證為二火乎觀之經曰長夏善病洞泄寒中何不曰洞泄熱中其義可知而丹溪何不察也夫以瀉痢為火者本出河間而丹溪宗之故變為此說戴原禮又宗丹溪故云痢雖有赤白二色終無寒熱之分通作濕熱治自此說相傳遂致諸家方論無不皆言濕熱而不知復有寒濕矣其害孰甚至若局方一書雖云多用熱澀然於實熱新邪豈云皆用此法觀其所載太平丸戊己丸香連丸薷苓湯之類豈非以寒治熱者耶又若真人養臟湯大已寒丸胡椒理中湯之類皆有可用之法其中隨證酌宜顧在用之者何如耳豈局方專以熱澀為用而可斥其非耶且是書之行乃宋神宗詔天下高醫各以效方奏進而成者此其中或過於粉飾者料不能無而真效之方必亦不少第在丹溪之言火多者謂熱藥能殺人而余察其為寒多者則但見寒藥之殺人耳明者其深察之一丹溪曰痢赤屬血自小腸來白屬氣自大腸來皆濕熱為本初得一二日間元氣未虛必推蕩之此通因通用之法大承氣湯調胃承氣湯下後看其氣病血病而用藥氣用參術血用四物痢五日後不可下脾胃氣虛故也壯實者亦可下據此說以赤白言血氣而分屬大腸小腸其於五行之說則然而於病情之真則鑿矣蓋小腸為心之腑宜其主血大腸為肺之腑宜其主氣然水穀氣化於小腸豈小腸之非氣乎或於糞前而見血豈大腸之無血乎觀之經曰血者神氣也此非赤化於氣乎又曰白血出者死此非白亦為血乎蓋白者赤者無不關乎血氣但其來淺者白而來深者則赤也故經曰陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血此自至理何其明顯而顧可以小腸大腸分血氣哉然此猶無礙亦不必深為之辨也至若初得一二日間元氣未虛必推蕩之為通因通用法則此說不可概言矣蓋此證有不宜下者有必不可下者豈以一二日間必可推蕩耶若病之可瀉者必其元氣本強積聚多實則無論寒邪熱邪但得一推則邪從瀉去而氣本無傷故可瀉也使無此元氣無此脹實則無可言瀉者矣則強盛之人隨食隨化故飲食不易傷瀉痢不易犯即有所犯亦無不隨病而隨愈也其有易病者必其易傷者也易傷者必其本弱者也所以凡患瀉痢而有久延難愈者必其弱者多而強者少也是以治宜推蕩者亦不過數十中之一二耳且體弱之證亦有不同有微弱者有次弱者有大弱者此其形氣脈息病因證候是實是虛自可明辨凡見脾腎不足而致瀉痢者則始終皆不可下若妄用之則微者必甚甚者必死莫可解救此推蕩之不可輕用也誠見其致誤者不少矣即在丹溪亦曰余近年涉歷亦有大虛大寒者不可不知此丹溪晚年之一隙耳而亦知前言之過否一丹溪痢疾門附録曰諸有積者以肚熱纏痛推之諸有氣者以肚如蟹渤驗之究其受病之源決之對病之劑大要以散風邪行滯氣開胃脘為先不可遽用肉豆蔻訶子白朮輩以補住寒邪不可投米殼龍骨輩以閉澀腸胃邪得補而愈盛故變證作所以日夕淹延而不已也據此散風邪行滯氣開胃脘三法亦不過言其大概固未盡也至若補住寒邪之說則大有不通而且最易惑人為害不淺夫既受寒邪即當辨其虛實然實者必有實證本不宜補不宜補而補之則隨補隨甚即顯見也又何待乎變證若因臟氣受傷者則無非虛證即宜溫補蓋溫可以逐寒邪補可以健脾腎脾腎既健寒邪既去則無不速愈何反有補住之理又何有變證之說且溫補之法原不在米殼龍骨之屬又豈止豆蔻白朮而已乎若執補住之說而禁用之則必致虛者日虛而變證百出矣余所見者惟寒涼變證之害不可勝紀或近則旬日遠則纍月經年終於殞命而後已未聞有以溫補變證而日夕淹延不已者茲餘年出古稀涉歷不少凡遇人言率多不分虛實無不曰補住寒邪無不曰邪得補而愈盛正以信之者多所以害之者甚因致抱疾之輩寧受寒涼而死不願溫補而生究其所由實由乎此嗟嗟一言關係有如是乎餘切悲之今但反其說曰以寒遇寒則留住寒邪邪得寒而愈甚理所必然遭此害者多矣因特表其義謹以告諸惑者又總原劉朱二家之說無非偏執言火故但見經文有火字則必引以為證凡如前列諸條果亦有一言合經意者否彼二子者既曰讀經何以不顧上下文而單扯一句便可著書妄言豈謂後世之人都無目耶抑舉世可欺耶抑性體之有未明耶謬已甚矣吾不得為之解也自二子之說行而軒岐之受誣亦久矣何也以後人之遭毒於亡陽者必謂軒岐之誨之也使軒岐再起而見之能無眥裂而發豎乎此時醫受病之源實河間創之而丹溪成之豫為此論蓋一則為後人保生命一則為軒岐正道統一則為後生淺學知識未廣凡初見彼書者無不信為經訓多致終生受誤害可勝言欲清其流必澄其源故單採二家之略辨正於此而有餘未盡誠難悉也論時醫三十共三十一條一時醫治病但知察標不知察本且常以標本藉口曰急則治其標緩則治其本是豈知內經必求其本之意故但見其所急在病而全不知所急在命此其孰可緩也孰當急也孰為今日之當急孰為明日之更當急也緩急既不知則每致彼此誤認尚何標本為言乎一中風證悉由內傷本無外感既無外感必不可散若過用治風等藥則輕者必重重者必速死一傷寒關係全在虛實二字實者易治虛者難治以其元氣本虛故邪不易解若治挾虛傷寒不知托散而但知攻邪愈攻則愈虛愈虛則無有不死若甚虛者即微補且無益而但以治標為主者必死一傷寒陽經與陽證不同陽經者邪在表也陽證者熱在裡也若內無實熱脈候而以陽經作陽證妄用寒涼治其火因致外內合邪而不可解者必死一痢疾之作惟脾腎薄弱之人極易犯之夫因熱貪涼致傷臟氣此人事之病非天時之病也今之治痢者止知治天時之熱不知治人事之寒何也矧痢證多在秋深斯時也炎暑既消固不可執言熱毒秋涼日至又何堪妄用寒涼凡若此者既不知人事又不知天時失之遠矣害莫甚矣當因豫言而熟思之矣一小兒血氣未充亦如苗萼之柔嫩一或傷殘無不凋謝故平時最宜培植不可妄行消導其或果有食滯脹痛則宜暫消果有風寒發熱則宜暫散果有實熱痰火則宜暫清此不得不治其標也舍此之外如無暴急標病而時見青黃羸瘦或腹膨微熱溏泄困倦等證則悉由脾腎不足血氣薄弱而然而時醫見此無非曰食積痰火而但知消導尤尚清涼日消日剝則元氣日損再逢他疾則無能支矣此幼科時俗之大病有不可不察者也一小兒痘疹發熱此其正候蓋不熱則毒不能透凡其蒸熱之力即元氣之力故自起至化自收至靨無不賴此熱力為之主是誠痘疹之用神必不可少亦不必疑者也惟是熱甚而毒甚者則不得不清火以解其毒然必有內熱真火脈證方可治以清涼此不過數十中之一二耳如無內熱而但有外熱此自痘家正候必不可攻熱以拔元氣之力以傷脾腎之源奈近代痘科全不知此但見發熱則無論虛實開口止知解毒動手只知寒涼多致傷脾而飲食日減及靨時泄瀉而斃者皆其類也此誤最多不可不察一痘瘡不起如毒盛而不可起者此自不救之證不必治也若別無危證而痘不起者總由元氣無力但培氣血則無有不起近見痘科凡逢此證則多用毒藥如桑蠶穿山甲之類逼而出之見者以為奇效而不知起發非由根本元氣為毒所殘發泄太過內必匱竭以此誤人所當切省一婦人經脈滯逆或過期不至總由衝任不足而然若不培養血氣而止知通經逐瘀則血以日涸而崩漏血枯等證無所不至矣一凡情欲致傷多為吐血失血及或時發熱此真陰受傷之病若但知治火而不知治陰則陰日消亡而勞瘵反成矣一痰證必有所因是痰本不能生病而皆因病生痰也若止知治痰而不知所以生痰則痰必愈甚未有可消而去者也一膨滿總由脾胃脾胃雖虛未必即脹若但知消導則中氣愈虛而脹必日甚矣一氣滯隔塞總屬脾虛不運故為留滯若不養脾而但知破氣則氣道日虧而漸成噎隔等病一小水短赤惟勞倦氣虛及陰虛之人多有之若以此類通作火治而專用寒涼則變病有不可測矣一脈虛證熱本非真火若作熱治而肆用寒涼則輕者必重重者必死一病本大虛而治以微補藥不及病本無濟益若疑為誤而改用消伐則死一病有緩急效有遲速若以遲病而求速效則未免易醫易醫多則高明本少庸淺極多少不勝多事必敗矣一任醫須擇賢者而於危急之際尤不可苟若彼宵小之輩惟妄衒已長好翻人按不幸遇之多致淆惑是非生命所繫不淺一經曰人迎盛堅者傷於寒氣口堅盛者傷於食此本以陽明太陰之脈分言表裡而王叔和以左為人迎右為氣口因致後人每以左脈辨外感右脈辨內傷豈左無內傷而右無外感乎謬甚謬甚一經曰病生於內者先治其陰後治其陽反者益甚病生於陽者先治其外後治其內反者益甚一病人善服藥者聞其氣嘗其味便可覺宜否之優劣固無待入腹而始知也獨憫乎無識無知者但知見藥服藥而不知藥之為藥但知見醫求醫而不知醫之為醫亦可悲矣京師水火說三十一水火者養生之本日用之物用水火而不察其利病則適足以傷人而實人所不知也故水品分差等火性言優劣固非欺我者也姑無論其他試以燕京之水火言之凡水之佳者得陽之氣流清而源遠氣香而味甘水之劣者得陰之性源近而流濁氣穢而味苦而京師之水則有兩種曰甜水曰苦水是也即其甜者亦未甚佳而其苦者乃為最劣蓋水之味苦者以其多鹼試取牆間白霜火之皆燃水中所有即此物也即朴硝也其性則五金八石皆能消化因而命名曰硝故善於推蕩積滯攻破癥堅凡脾弱之人服之多泄是所驗也使無其實而朝夕用之以養生吾恐人之臟腑有更非五金八石之可比其為潛消暗耗剝人元氣於罔覺之中大有可畏者或曰未必然果若所云則吾未見斯地之乏人亦未見斯地之皆病何子之過慮也豫曰噫此正所謂罔覺也請以壽夭而紀其驗則水土清甘之處人必多壽而黃髮兒齒者比比皆然水土苦劣之鄉暗折天年而耄耋期頤者目不多見雖曰壽鄉未必全壽夭鄉未必皆夭若以強者而滋養得宜豈不更壽弱者而飲食不佳豈不更夭遠者不能概知第以京師較之吾鄉則其壽夭之殊不無大有徑庭矣職此之由謂非水土之使然與又若火之良否原自不同故先王取用四時有異惟是京師用煤必不可易雖用煤之處頗多而惟京師之煤氣性尤烈故每燻人至死歲歲有之而人不能避者無他亦以用之不得其法耳夫京師地寒房室用紙密糊人睡火炕煤多熱於室內惟其房之最小而最密者最善害人其故何也蓋以水性流下下而不泄則自下滿而上火性炎上上而不泄則自上滿而下故凡煤毒中人者多在夜半之後其氣漸滿下及人鼻則閉絶呼吸昧然長逝良可慨憫凡欲避其毒者惟看房室最密之所極為可慮但於頂格開留一竅或於窗紙揭開數楞則其氣自透去不能下滿乃可無慮矣然總之窗隙不如頂核為其透氣之速也設有中其毒者必氣閉聲掙不能自醒速當呼之飲以涼水立可解救或速令仆地使其鼻吸地氣亦可解救然待其急而救療恐有遲誤而無濟於事孰若預有以防之為愈也此京師水火之害舉京師而言則他處可以類推矣凡宦遊京國及客處異地者不可不知此二說以為自珍之本醫非小道記三十二豫出中年嘗遊東藩之野遇異人焉偶相問曰子亦學醫道耶醫道難矣子其慎之豫曰醫雖小道而性命是關敢不知慎敬當聞命異人怒而叱曰子非知醫者也既稱性命是關醫豈小道云哉夫性命之道本乎太極散於萬殊有性命然後三教立有性命然後五倫生故造化者性命之爐冶也道學者性命之繩墨也醫藥者性命之贊育也然而其義深其旨博故不有出人之智不足以造達微妙不有執中之明不足以辨正毫釐使能明醫理之綱目則治平之道如斯而已能明醫理之得失則興亡之機如斯而已能明醫理之緩急則戰守之法如斯而已能明醫理之趨舍則出處之義如斯而已洞理氣於胸中則變化可以指計運陰陽於掌上則隔垣可以目窺修身心於至誠實儒家之自治洗業障於持戒誠釋道之自醫身心人己理通於一明於此者必明於彼善乎彼者必善於斯故曰必有真人而後有真知必有真知而後有真醫醫之為道豈易言哉若夫尋方逐跡齪齪庸庸椒硫殺疥蔥薤散風誰曰非醫也而緇衣黃冠總稱釋道矯言僞行何非儒流是泰山之與丘垤河海之與行潦固不可以同日語矣又若陰陽不識虛實誤攻心粗膽大執拗偏庸非徒無益而反害之之徒殆又椒硫蔥薤之不若小道之稱且不可當又烏足與言醫道哉醫道難矣醫道大矣是誠神聖之首傳民命之先務矣吾子其毋以草木相渺必期進於精神相貫之區玄冥相通之際照終始之後先會結果之根蒂斯於斯道也其庶乎為有得矣子其勉之豫聞是教慚悚應諾退而皇皇者數月恐失其訓因筆記焉病家兩要說三十三一忌浮言二知真醫醫不貴能愈病而貴於能愈難病病不貴於能延醫而貴於能延真醫夫天下事我能之人亦能之非難事也天下病我能愈之人亦能愈之非難病也惟其事之難也斯非常人之可知病之難也斯非常醫所能療故必有非常之人而後可為非常之事必有非常之醫而後可療非常之病第以醫之高下殊有相懸譬之升高者上一層有一層之見而下一層者不得而知之行遠者進一步有一步之聞而近一步者不得而知之是以錯節盤根必求利器陽春白雪和者為誰夫如是是醫之於醫尚不能知而矧夫非醫者昧真中之有假執似是而實非鼓事外之口吻發言非難撓反掌之安危惑亂最易使其言而是則智者所見略同精切者已算無遺策固無待其言矣言而非則大隳任事之心見幾者寧袖手自珍其為害豈小哉斯時也使主者不有定見能無不被其惑而致誤事者鮮矣此浮言之當忌也又若病家之要雖在擇醫然而擇醫非難也而難於任醫任醫非難也而難於臨事不惑確有主持而不致朱紫混淆者之為更難也倘不知此而偏聽浮議廣集群醫則騏驥不多得何非冀北駑群帷幄有神籌幾見圯橋傑豎危急之際奚堪庸妄之誤投疑似之秋豈可紛紜之錯亂一著之謬此生付之矣以故議多者無成醫多者必敗多何以敗之君子不多也欲辨此多誠非易也然而尤有不易者則正在知醫一節耳夫任醫如任將皆安危之所關察之之方豈無其道第欲以慎重與否觀其仁而怯懦者實似之穎悟與否觀其智而狡詐者實似之果敢與否觀其勇而猛浪者實似之淺深與否觀其博而強辨者實似之執拗者若有定見誇大者若有奇謀熟讀幾篇便見滔滔不竭道聞數語謂非鑿鑿有憑不反者臨涯已晚自是者到老無能執兩端者冀自然之天功廢四診者猶瞑行之瞎馬得穩當之名者有耽閣之誤昧經權之妙者無格致之明有曰專門決非通達不明理性何物聖神又若以己之心度人之心者誠接物之要道其於醫也則不可謂人己氣血之難符三人有疑從其二同者為決斷之妙方其於醫也亦不可謂愚智寡多之非類凡此之法何非徵醫之道而徵醫之難於斯益見然必有小大方圓全其才仁聖工巧全其用能會精神於相與之際燭幽隱於玄冥之間者斯足謂之真醫而可以當性命之任矣惟是皮質之難窺心口之難辨守中者無言懷玉者不衒此知醫之所以為難也故非熟察於平時不足以識其蘊蓄不傾信於臨事不足以盡其所長使必待渴而穿井鬥而鑄兵則倉卒之間何所趨賴一旦有急不得已而付之庸劣之手最非計之得者子之所慎齊戰疾凡吾儕同有性命之慮者其毋忽於是焉噫惟是伯牙常有也而鍾期不常有夷吾常有也而鮑叔不常有此所以相知之難自古苦之誠不足為今日怪倘亦有因余言而留意於未然者又孰非不治已病治未病不治已亂治未亂之明哲乎惟好生者略察之保天吟三十四一氣先天名太極太極生生是為易易中造化分陰陽分出陰陽運不息剛柔相蕩立乾坤剝復夬姤群生植稟得先天成後天氣血原來是真的陰陽氣固可長生龍虎飛騰失家宅造化鍾人果幾多誰道些須亦當惜顧惜天真有兩端人己機關宜辨格自治但存毋勉強莊生最樂無心得為人須慎保天和岐伯深明無伐克伐克從來性命仇勉強分明元氣賊膚切根源未了然養氣修真亦何益漫將斯語等浮雲道在路旁人不識余今著此保天吟願效癡東奉佳客
