body:
  text: 卷之六十三長集痘疹詮古方痘疹保元湯一治痘瘡氣虛塌陷者人參二三錢炙甘草一錢肉桂五七分黃耆二三錢灌膿時酒炒回漿時蜜炙水一鍾半加糯米一撮煎服此藥煎熟或加人乳好酒各半盞和服更妙酌宜用之頭額不起加川芎三五分面部加升麻三四分胸腹加桔梗三四分腰膝加牛膝四分四肢不起加桂枝嘔惡加丁香三四分元氣虛寒加大附子七八分或一錢調元湯二按此即保元湯無肉桂者名為調元湯即東垣之黃耆湯也東垣用為小兒治驚之劑魏桂岩用以治痘多效因美之名保元湯也蓋小兒元氣未充最易傷殘用此保全誠幼科王道之妙方但能因此廓充則凡氣分血分虛寒虛陷等症皆可隨症增減用之無不可奏神效也內補湯三治痘瘡中虛等症人參黃耆當歸白朮川芎甘草茯苓陳皮厚朴上等分水煎服托裡散四治痘毒元氣虛弱或妄行克伐不能潰散用之未成自消已成自潰並治癰毒內虛不能起發人參黃耆炒各二錢當歸酒洗白朮熟地芍藥炒茯苓各一錢半炙甘草五分上每用三五錢水煎服外科樞要方有陳皮一錢半無甘草解毒內托散五治痘癰金銀花黃耆當歸赤芍藥防風甘草節荊芥連翹木通上水煎入酒少許服陳氏托裡消毒散六治痘毒氣血虛弱不能起發腐潰收斂或發寒熱肌肉不生人參黃耆炒當歸酒洗川芎芍藥炒白朮炒茯苓陳皮各一錢金銀花連翹白芷各七分炙甘草五分上每服三五錢水煎服外科方無陳皮參耆內托散七治痘瘡裡虛發癢或不潰膿或為倒靨及瘡癰膿毒不化膿潰作痛等證人參黃耆蜜炙當歸川芎厚朴薑製防風桔梗炒白芷紫草官桂木香甘草等分入糯米一撮水煎服色淡白者去防風紫草白芷多加黏米一方有芍藥參耆四聖散八治痘瘡已出至六七日不起發不成膿人參黃耆炒白朮炒當歸川芎芍藥炒茯苓各五分紫草防風木通各三分上用水煎服陳氏四聖散九治痘瘡出不快及倒靨因內實者紫草茸木通炙甘草枳殼麩炒黃耆等分上每服二錢加糯米一百粒水煎待米熟溫服加味四聖散十治痘瘡黑陷倒陷人參黃耆炙川芎甘草紫草木通木香等分蟬蛻十個上加糯米百粒水一盞煎服如聖湯十一治毒盛不起芍藥升麻乾葛各一錢甘草紫草木通各三五分水一鍾姜一片煎七分溫服不拘時人參固肌湯十二治痘瘡發表太過致肌肉不密或痘痂久黏者人參黃耆當歸酒洗甘草蟬蛻去土等分水一鍾入糯米一撮煎服人參透肌散十三治痘瘡虛而有熱雖出快而不齊隱於肌膚間者人參紫草如無紅花代之當歸芍藥茯苓甘草木通蟬蛻糯米等分上每服三錢水一盞煎半盞徐服之十宣散十四一名托裡十補散調氣補血內托瘡毒五日後必用之方也亦治癰疽人參黃耆當歸各二錢川芎防風桔梗白芷甘草炙厚朴各一錢桂心三分上為細末每服一錢或二錢木香湯下芎歸湯十五亦名活血散大能養營起痘當歸倍用川芎上為細末每服一錢紅花湯調服活血散十六治痘疹血虛血熱已出未盡煩躁不寧腹痛白芍藥酒炒上為末每服一匙糯米湯調下或荔枝湯亦可此湯對四君子湯加歸耆名參歸活血散當歸活血散十七治痘色淡白當歸酒焙赤芍酒炒川芎紫草紅花各五錢木香二錢血竭一錢上為末每五歲者服一錢十歲以上服二錢酒下養血化斑湯十八治白疹白痘當歸身人參生地紅花蟬蛻等分水一盞生薑一片煎六分溫服無時人參胃愛散十九治痘疹已發未發吐瀉不止不思飲食等證人參茯苓甘草丁香藿香紫蘇木瓜糯米上每服三錢薑棗水煎二仙散二十治體寒肢冷腹痛口氣冷陰盛陽衰嘔吐泄瀉難發等證丁香九粒乾薑炒一錢上為細末每服五七分白湯送下被蓋片時令脾胃溫暖陰返陽回則痘變潤矣量大小加減與之陳氏木香散二一又名十一味異功散治小兒痘疹虛寒多滯者宜此木香丁香大腹皮人參桂心炙甘草半夏制訶黎勒赤茯苓青皮前胡等分上每服二三錢薑水煎薛按曰前方治痘瘡已出未愈之間其瘡不光澤不起發不紅活五七日內泄瀉作渴或肚腹作脹氣促作喘或身雖熱而腹脹足指冷或驚悸或汗出或寒戰咬牙或欲靨不靨瘡不結痂或靨後腹脹泄瀉作渴此皆脾胃虛寒津液衰少急用此藥治之若誤認為實熱用寒涼之劑及飲蜜水生冷瓜果之類必不治陳氏十二味異功散二二治元氣虛寒小兒痘疹色白寒戰咬牙泄瀉喘嗽等證人參丁香木香肉豆蔻陳皮厚朴各二錢半白朮茯苓官桂各二錢當歸三錢半製附子半夏各錢半上咀每服二三錢薑棗水煎服愚按陳氏此上二方溫性有餘補性不足用治寒證則可用治虛證則不及也用者更當詳酌陳氏人參麥門冬散二三治痘瘡微渴麥門冬一兩人參炙甘草白朮陳皮厚朴薑製各五錢上每服三四錢水一大盞煎至六分徐徐溫服量兒增減薛氏曰前方治痘瘡熱毒氣虛宜用之若因氣虛作渴宜人參白朮散柴胡麥門冬散二四治痘瘡壯熱經日不止更無他證者柴胡二錢半龍膽草一錢麥門冬三錢甘草炙人參玄參各錢半上㕮咀每服三錢水一大盞煎至六分不拘時徐徐溫服量大小加減按此方解表之功居六清火之功居四養營退熱此方最宜升均湯二五治痘瘡已出不勻或吐瀉發熱作渴升麻乾葛人參白朮炒芍藥炒茯苓甘草紫草如無紅花代之上每服三五錢薑水煎升麻葛根湯二六亦名升麻湯解發痘毒之良方升麻葛根芍藥甘草等分上㕮咀水一盞煎七分溫服無時萬氏曰古人治痘以升麻葛根湯為主後世好奇多立方法法愈多而治愈難矣苟能通變則痘疹諸證皆可增減用之不特發表解肌而已今以葛根湯為主治隨證立增損法於後初發熱解表加柴胡羌活白芷桔梗防風口乾渴內熱也加葛粉天花粉麥門冬自利加條實黃苓嘔吐加半夏生薑腹中痛加木香青皮枳殼山楂肉腰痛加獨活北細辛頭痛加羌活藁本蔓荊子驚搐加木通生地黃燈心小便少加木通車前瞿麥大便秘加大黃衄血加山梔仁玄參生地黃發熱三四日熱甚不減須解其毒加大力子連翹紫草瘡不出加防風蟬蛻荊芥穗紅花子目痛加龍膽草密蒙花柴胡瘡出太稠密加人參當歸木香紫草大力子防風桔梗咽痛加桔梗連翹瘡干或帶紫或太赤者血熱也加當歸梢生地黃紅花地骨皮牡丹皮痘平陷灰白色氣虛也加人參白朮防風木香官桂手足瘡不起脾胃不足也加人參黃耆防風官桂泄瀉者裡虛也加人參白朮訶子白茯苓瘡不著痂者濕也加黃耆防風官桂白芷愚謂前方乃胃經發表之劑萬氏增減之法大意已悉但此方性味清涼純於疏泄必陽明多實多熱者乃宜用之然小兒氣血體質大都虛弱平和者十居七八故凡痘瘡初起乍見發熱用藥最貴和平兼養營氣則庶乎盡善若預用清涼未免傷其胃氣全用解散未免虛其表氣二者受傷變患有不可測矣故余制柴歸飲為治痘之先著所當酌宜用之若治麻疹則多屬火證此方乃所宜也蘇葛湯二七初熱未見點發表之劑暫用之分兩宜酌兒大小以為增減蘇葉二錢葛根二錢甘草一錢白芍藥錢半連須蔥白三根生薑三片水鍾半煎七分熱服原方有陳皮砂仁各五分此惟氣滯腹痛者宜用之否則不必連翹升麻湯二八散毒清火連翹一錢升麻葛根桔梗甘草各七分白芍藥五分薄荷少許上加淡竹葉燈草水一盞半煎一盞溫服無時柴胡橘皮湯二九柴胡橘皮人參半夏茯苓黃芩等分上加竹茹一團水一盞煎七分溫服不拘時人參敗毒散三十方在散陣三六治時疫斑疹荊防敗毒散三一亦名消風敗毒散發散痘疹俱可用及時氣風毒邪熱柴胡荊芥穗防風羌活獨活前胡川芎枳殼人參甘草桔梗茯苓等分上切細加薄荷葉水一盞煎七分去滓溫服柴葛敗毒散三二疑似傷寒以此解散柴胡乾葛人參羌活防風荊芥桔梗蘇葉甘草上用生薑三片水煎服參蘇飲三三方在散陣三四治傷風咳嗽傷寒痘疹加減參蘇飲三四初熱見點解利之藥但表邪未達而元氣強壯者宜暫用之或前後感冒風寒俱可暫用蘇葉一錢乾葛錢半前胡八分陳皮七分枳殼六分桔梗甘草各四分水一鍾半加生薑三片煎服麻黃甘草湯三五冬月痘毒熾盛表實者宜用之麻黃一二錢生甘草減半水煎服柴葛桂枝湯三六表散痘熱柴胡乾葛桂枝防風甘草人參白芍藥水一盞加生薑三片煎七分溫服桂枝葛根湯三七解散寒邪桂枝葛根升麻赤芍藥防風甘草各一錢上加生薑三片淡豆豉一錢水一鍾前七分溫服無時十味羌活散三八此初熱見點解利之劑若小兒身壯力強者可用蘇葛以行表其次者宜此和解疏利之藥若虛而宜補者必當兼顧元氣不得單用此類羌活前胡防風各一錢荊芥獨活各八分細辛白芷各三分柴胡炙甘草蟬蛻各四分水一鍾半加薄荷三葉煎五分不拘時服發搐及熱盛不遏者調入制過硃砂末服之神效十三味羌活散三九解熱散毒治風壅欲作痘疹者羌活獨活防風桔梗荊芥柴胡前胡地骨皮炙甘草蟬蛻川芎天花粉天麻等分上為細末每服二三錢水一盞入薄荷葉三片煎四分溫服羌活湯四十解發痘瘡兼治肝熱驚狂羌活川芎防風山梔仁龍膽草當歸等分甘草減半淡竹葉薄荷葉水煎溫服無時雙解散四一痘疹表裡俱實者非此不解防風川芎當歸連翹芍藥薄荷大黃各五分石膏桔梗黃芩各八分荊芥穗白朮桂枝各二分滑石二錢四分甘草二錢水二鍾加生薑三片煎一鍾溫服無時此即防風通聖散減去麻黃芒硝梔子外加桂枝也柴胡散子四二治痘瘡表裡俱實良方柴胡防風當歸人參白芍藥甘草黃芩滑石大黃等分上加生薑一片水煎服桂枝大黃湯四三治腹痛大便不通良方桂枝白芍各二錢半甘草五分大黃一錢半上銼細加生薑一片水一鍾半煎八分食前溫服防風芍藥甘草湯四四解痘毒及陽明經痘出不快防風芍藥甘草等分上每服一二錢水煎服荊芥防風甘草湯四五解痘毒及太陽經痘出不快荊芥防風甘草等分上每服一二錢水煎蟬蛻膏四六治痘瘡虛陷不起蟬蛻當歸川芎甘草升麻防風荊芥穗等分加人參白芍藥上為末煉蜜丸如芡實大每服一丸薄荷湯下消毒散四七亦名消毒飲治痘瘡六七日間身壯熱不大便其脈緊盛者用此藥微利之荊芥穗炙甘草各一兩牛蒡子四兩杵炒上為粗散每服三錢水一盞煎七分不拘時徐徐服四味消毒飲四八治痘瘡熱盛毒氣壅遏無問前後皆可服人參炙甘草黃連牛蒡子等分上為粗末每服一錢加姜一片水一盞煎四分去滓溫服不拘時六味消毒飲四九解痘毒牛蒡子連翹甘草綠升麻紫草山豆根等分水一盞煎七分溫服不拘時消毒化斑湯五十消風散毒清眼目咽喉升麻柴胡桔梗甘草連翹龍膽草牛蒡子防風蟬蛻密蒙花水一鍾半加淡竹葉十片煎服解毒湯五一治一切熱毒腫痛或風熱瘙癢黃連金銀花連翹上水煎服真人解毒湯五二治痘母忍冬花半斤甘草節一兩木通防風荊芥連翹各三錢上分作三劑用水酒各一鍾煎服以腫消痘出為度葛根解毒湯五三解痘毒止渴良方葛根升麻減半生地黃麥門冬天花粉等分甘草減半上取糯米泔水一盞煎七分入茅根自然汁一合服之實表解毒湯五四人參黃耆當歸梢生地黃甘草白芍藥柴胡升麻酒片芩玄參地骨皮上入薄荷葉少許淡竹葉十片水煎服溯源解毒湯五五解胎毒之良方當歸身川芎生地黃白芍藥人參生甘草黃連連翹陳皮木通等分水一盞加淡竹葉十片煎半盞溫服無時陳氏解毒防風湯五六治痘瘡毒氣熾盛防風黃芩地骨皮白芍藥炒荊芥牛蒡子上每服四五錢水煎服或為