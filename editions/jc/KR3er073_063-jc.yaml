三錢上研細末酒蜜和丸辰砂為衣薄荷葉煎湯下東垣涼膈散八三解痘疹裡熱良方黃芩連翹為君甘草梔子薄荷桔梗竹葉上水煎服退火丹八四治痘中狂妄神方滑石硃砂飛各一錢冰片三釐共為細末冷水調一分服得睡少時神安氣寧痘轉紅活矣陳氏通關散八五通心經降心火利小便良方山梔仁大黃炒各一分木通甘草炙車前子炒赤茯苓人參瞿麥滑石各三分扁蓄炒五分上用水一盞燈草十根煎半盞溫服玄參地黃湯八六治痘疹衄血玄參生地黃牡丹皮梔子仁各錢半甘草升麻各半錢白芍藥一錢蒲黃炒五分水一鍾煎七分溫服愚謂此方宜去升麻以塞上衝之源勿謂但屬陽明即宜用升麻也萬氏清肺飲八七治肺熱喘嗽聲啞麥門冬桔梗各二錢荊芥穗天花粉知母各一錢石菖蒲訶子仁各八分上水煎服此當與清肺湯參用方在後一四五導赤通氣散八八治心虛聲不揚者木通生地黃人參麥門冬當歸身石菖蒲甘草上加燈心水煎服甘桔清金散八九治肺熱咽痛聲不清桔梗一兩甘草連翹各半兩訶子皮三錢牛蒡子炒七錢上為細末每服一錢薄荷葉少許同前服加味甘桔湯九十咽喉腫痛暫用桔梗八分甘草錢二分牛蒂子射干各六分防風玄參各四分水一鍾煎服或加生薑一片熱甚者加黃芩去防風亦可大如聖飲子九一治瘡疹痘毒攻咽嗌腫痛熱渴或成腫毒不消等證桔梗甘草鼠黏子炒各一兩麥門冬五錢上每服二錢水煎萬氏橘皮湯九二行滯消痰止嘔吐橘皮半去白炒二錢半夏一錢白茯苓錢半上加生薑三片水一盞煎七分溫服勻氣散九三行氣化滯木香青皮各五錢山楂肉二錢半上為末每服一錢甘草湯調服前胡枳殼湯九四治痰實壯熱胸中煩悶大便堅實臥則喘急前胡一兩枳殼赤茯苓甘草炙大黃各半兩上㕮咀每服三五錢水一大盞煎至六分不拘時溫服此方宜量大小加減如身溫脈微並瀉者不可服薛氏曰前症苦屬肺胃實熱氣鬱痰滯大便秘結小便赤澀煩渴飲冷身熱脈實者宜用之以疏通內臟使邪無壅滯則痘瘡輕而易愈也當歸丸九五治便堅三五日不通者當歸半兩紫草三錢黃連錢半炒炙甘草一錢大黃二錢半上以當歸紫草熬成膏下三味研為細末以膏和為丸如胡椒大三歲以下兒服十丸七八歲兒二十丸食前清米飲下漸加之以和為度百祥丸九六治痘瘡紫黑干陷熱毒便秘裡實等症紅芽大戟不拘多少用漿水煮極軟去骨日中曬乾復內原汁中煮汁盡焙乾研末水丸粟米大每服一二十丸研赤芝麻湯下棗變百祥丸九七治同前而稍緩可代百祥丸紅芽大戟去骨一兩青州棗肉三十個上用水一碗同煎至水盡為度去大戟不用將棗焙乾可和作劑或搗爛為丸從少至多以木香湯吞服至利為度排毒散九八治痘毒發癰大黃當歸梢各一兩白芷沉香木香各半兩穿山甲七片土炒焦上為細末看虛實大小加減長流水煎沸調服錢氏苦參丸九九治痘後潰爛瘡毒瘡癩苦參一兩白蒺藜何首烏牛蒡子荊芥穗各半兩上為末酒調麵糊為丸竹葉湯下外科苦參丸見本門八八稀痘方百用老鼠去皮取肉水煮熟量兒大小與食數次出痘甚稀未食葷時與食尤效屢試屢驗稀痘酒百一最能散毒稀痘麻黃去節泡紫草各二兩上二味細切布囊盛之浸無灰酒一小壇泥封固凡遇天行小兒發熱時與半杯或一杯量兒大小服之出微汗為佳三痘湯百二痘發時預服之大黑豆赤小豆綠豆等分淘淨上用甘草浸水去渣以甘草水煮豆熟為度逐日空心任意飲其汁自然出少此方冬月煮熟令兒常食豆尤妙絲瓜湯百三解瘡毒一方無山楂絲瓜升麻芍藥酒炒生甘草山楂黑豆赤小豆犀角鎊等分上為粗散每服三錢水一大盞煎至六分不拘時徐徐溫服量大小加減辰砂散百四預解痘毒好辰砂一錢飛老絲瓜近蒂三寸連子燒灰存性此物發痘瘡最好上研末蜜水調服多者可少少者可無或以紫草甘草湯調服尤佳保嬰丹百五稀痘纏豆藤或黃豆或綠豆梗上纏繞細紅藤是也於八月生氣日擇取陰乾聽用二兩防風荊芥穗牛蒡子炒紫草茸去根酒浸一兩新升麻鹽水炒甘草去皮各五錢天竺黃真者三錢蟾酥真者一錢牛黃真者一錢赤小豆黑豆綠豆各三十粒略炒勿焦好硃砂用麻黃紫草荔枝殼升麻同煮過復以此汁飛過三錢上另用紫草二兩入水二碗煎膏至少半碗入沙糖一小鐘將前各藥為細末同紫草膏丸如李核大即以硃砂為衣於未痘之先濃煎甘草湯每磨服一丸大者二丸若已發熱用生薑湯磨服蓋被睡而表之多者可少少者可無大有神效一方無紫草茸仍有經霜老絲瓜一個連藤蒂五寸燒存性同用洗肝明目散百六治痘後目疾當歸羌活柴胡密蒙花川芎防風木賊山梔仁龍膽草各等分上為末每服一錢淡沙糖水調服洗肝散百七翳膜遮睛暫用歸尾錢二分防風八分大黃八分羌活川芎薄荷各四分梔子錢半甘草三分水一鍾姜一片煎服熱盛便秘加芩檗羊肝散百八治痘毒入眼或無辜疳氣入眼密蒙花二錢青葙子決明子車前子炒各一錢上為末用羊肝一大葉薄批摻上濕紙裹煨熟空心食之蒺藜散百九治痘瘡入眼腫痛白蒺藜穀精草防風羌活生蛤粉等分上為細末每服二錢溫水調服即退蟬菊散百十治痘疹入目或病後生翳障蟬蛻去土淨白菊花等分每服一二三錢水八分加蜜少許煎四分食後溫服秦皮散百十一治大人小兒風毒赤眼痛癢澀皺眵淚羞明秦皮滑石黃連等分湯泡熱洗日二三次通神散百十二治痘瘡入眼生翳膜白菊花穀精草綠豆皮上為末每服一錢用柿餅一個米泔水一盞同煎候水乾只吃柿餅每日三五次不拘至七日效錢氏黃柏膏百十三用此護眼可免痘毒入目黃柏一兩綠豆末二兩生甘草三兩上為細末以麻油調成膏用塗耳前眼角目下四五遍若早塗之痘出必稀若既患眼塗之必減痘疔散百十四雄黃一錢紫草三錢上為細末胭脂汁調用銀簪腳挑破黑痘入藥在內此下二方皆治痘疔之良方也四聖丹百十五治黑疔牛黃錢二分兒茶錢七分硃砂八分珍珠二分上為極細末以棉胭脂汁或油胭脂調勻先用銀針挑破黑疔拭去惡血乃點藥疔上萬氏四聖散百十六治痘不起發變黑而痛者痘疔也亦名鬼痘綠豆四十九粒豌豆四十九粒各燒存性珍珠一分油頭髮燒存性一分上為細末用胭脂水調先以簪腳撥開黑痘以此塗之神效隔蒜灸法百十七治痘疔毒氣熾盛使諸痘不能起發已起發者不能灌膿已灌膿者不能收靨或大痛或麻木痛者灸至不痛不痛者灸至痛其毒隨火而散其法用大蒜頭切三分厚安痘疔上用小艾炷於蒜上灸之每五壯易蒜再灸若紫血出後腫痛不止尤當用灸治者審之愚在京師嘗見治痘疔者即以線針挑破出毒血諸痘隨即灌膿若挑破不痛不出血者難治若用此法灸之即知痛更用針挑破紫血隨出諸痘隨灌亦有生者胡荽酒百十八闢穢氣使痘疹出快用胡荽一把以好酒二盞煎一兩沸令乳母每含一兩口噴兒遍身或噴頭面房中須燒胡荽香以闢除穢氣能使痘疹出快煎過胡荽懸房門上最妙或用棗炙之兒聞棗香尤能開胃氣進飲食解毒氣按此酒惟未出之前及初報之時宜用之若起脹之後則宜避酒氣亦忌發散皆不可用也茵陳熏法百十九用干茵陳研末搗棗膏和丸如雞子大曬乾用烈火燒煙燻之水楊湯百二十治倒陷之良方水楊即忍冬藤也春冬用枝秋夏用枝葉生水邊細葉紅梗枝上有圓果滿果有白鬚散出切斷用長流水一大釜煎六七沸先將三分之一置浴盆內以手試其適可仍先服煎藥然後浴洗漸漸添湯以痘起發光壯為度不拘次數洗畢照視若累累然起處覺暈暈有系此漿影也如漿不滿宜再浴之若弱者只浴頭面手足亦可此則不厭多洗洗後如無起勢乃氣血敗而津液枯多不可治秘傳茶葉方一二一鋪床蓆用茶葉要多楝去粗梗入水一煮取起再楝去梗濕鋪於床上用草紙隔層令兒睡上一夜則膿水皆干豬髓膏一二二治痘疹不靨及痂靨不落者塗之即落豬骨髓白蜜上二味以火熬一二沸退涼用雞翎掃上即落百花膏一二三治痘燥痂皮濺起作痛或瘡痂欲落不落者蜜不拘多少略用湯和時時以鵝翎潤痛處瘡痂亦易落無痕蕎麥散一二四治痘瘡潰爛以此敷之蕎麥一味磨取細面痘瘡破者以此敷之潰爛者以此遍撲之絹袋盛撲或以此襯臥尤佳胭脂汁一二五治黑痘之良方先用升麻一味煎濃湯去滓卻用棉胭脂浸於湯內揉出紅汁就以本棉蘸湯於瘡上拭而塗之敗草散一二六治痘瘡撾搔成瘡膿血淋漓謂之斑爛用蓋屋蓋牆爛草多年者佳或曠野自爛者尤佳為末搽摻之或氣血虛熱不愈而遍身患者須多摻席鋪上令兒坐臥其上其瘡即愈白龍散一二七治爛痘及抓破者用干黃牛糞在風露中多久者火煅成灰取中心白者為末以薄絹囊盛裹於瘡上撲之救苦滅瘢散一二八治爛痘以此敷面如誤抓破者用之敷貼最良密陀僧滑石各二兩白芷半兩上為細末濕則乾摻之或用好蜜調敷滅瘢散一二九治痘後面瘡以此敷之密陀僧白附子白殭蠶白芷鷹矢白等分上研極細末以水調搽面䵟神效辟邪丹百三十用燒於房中能闢一切穢惡邪氣蒼朮以黃連代之更妙乳香降真香甘松北細辛芸香各等分上為末水丸如豆大每焚一丸熏之良久又焚一丸不可太多只是略有香氣使之不斷可也砭法一三一治丹瘤用細瓷器擊碎取鋒鋩者以箸一根劈開頭夾定用線縛住兩指輕捻箸梢令瓷鋒正對毒頂懸高寸許另用一箸輕擊箸頭令毒血遇刺而出即可解散蜞針法一三二治痘癰及丹瘤用水蛭大者五六根放腫毒頭上吮去惡血可以消丹瘤決癰腫雄黃散一三三治痘後牙齦生疳蝕瘡雄黃一錢銅綠二錢上為末乾摻之綿繭散一三四治痘瘡餘毒肢體關節生疳蝕瘡膿水不絕出蛾綿繭不拘多少生白礬入繭內以炭火煅枯上為細末干貼疳瘡口內此總治瘡毒膿水淋漓收斂之外劑搽牙散一三五治痘後餘毒攻牙生疳一日爛進一分急用此搽之銅綠雄黃五倍子枯礬胡黃連北細辛烏梅同褐子包固火煅存性上等分為末搽之吹口丹一三六治疳黃連青黛兒茶片腦上等分為末吹之生肌散一三七痘後癰毒不收口用之神效枯礬三錢海螵蛸赤石脂煅各二錢龍骨煅黃丹飛炒乳香出汗沒藥出汗各一錢血竭五分輕粉麝各二分為細末摻瘡口內外以太乙膏貼之馬鳴散一三八治走馬疳良方人中白即尿缸底白垽也以物刮取新瓦盛之火煅如白鹽乃佳半兩五倍子生者一錢另用一錢同礬煅之馬鳴蛻即蠶蛻紙也火燒過二錢半枯白礬二錢即用五倍子一錢入礬於內煅枯者上為極細末先以濃米泔水浸洗瘡口以此敷之以下麻疹方升麻湯一三九解散疹毒升麻去須葛根去皮各一錢芍藥酒浸二錢炙甘草一錢水一盞煎五分食遠稍熟服量人大小加減予按此方即升麻葛根湯也麻疹之證多屬陽明火毒凡欲解表散邪但表實邪盛者最宜用此然愚謂以柴胡代升麻用之更妙若血氣稍虛而邪有未解者惟柴歸飲為最妥升麻透斑湯百四十治疹瘡初見紅點一日至三日升麻枳殼麩炒各五分柴胡錢半桔梗前胡各一錢乾葛川芎茯苓各七分陳皮半夏甘草各四分上加生薑一片水一鍾煎五分作十餘次徐服之葛根麥門冬散一四一治小兒熱毒斑疹頭痛壯熱心神煩悶葛根三錢麥門冬四錢人參川升麻茯苓甘草各二錢石膏半兩赤芍藥一錢上㕮咀每服三錢水一大盞煎至六分不拘時徐徐溫服仍量兒大小增減薛氏曰前方足陽明胃經之藥也外除表邪內清胃火兼補元氣若非發熱作渴表裡有熱者不可用若表裡俱虛而發熱作渴者宜用人參麥門冬散萬氏麥門冬湯一四二治表邪內熱咳嗽甚者此即前方去人參者但分兩稍異耳麥門冬葛根去皮各一錢升麻去須四分赤芍藥酒炒茯苓各六分炙甘草四分石膏煅一錢半上水煎服萬氏柴胡四物湯一四三治疹後餘熱柴胡當歸身川芎生地黃白芍藥人參麥門冬知母淡竹葉黃芩地骨皮上銼細水一盞煎七分不拘時溫服生地黃散一四四治小兒斑疹身熱口乾咳嗽心煩者生地黃半兩麥門冬七錢款冬花陳皮杏仁各三錢炙甘草二錢半上每服三五錢水一大盞煎六分不拘時徐徐溫服量大小加減清肺湯一四五治斑疹咳嗽甚者或二母散或麥門冬湯桔梗去蘆片芩貝母各七分防風去蘆炙甘草各四分知母七分上水一鍾煎五分入搗碎蘇子五分再煎溫服清肺消毒湯一四六治疹瘡收完不思飲食鼻乾無涕防風枳殼各五分連翹前胡黃芩桔梗一錢荊芥炙甘草上水一鍾煎至五六分作十餘次徐服之門冬清肺湯一四七治疹後咳嗽不止天門冬去心麥門冬去心款冬花知母貝母桔梗牛蒡子地骨皮杏仁去皮尖馬兜鈴甘草等分水一鍾半前七分食後溫服清肺消毒化痰湯一四八治疹後喘嗽聲音不清不思飲食眼目不清唇口乾燥牛蒡子防風荊芥穗貝母各五分連翹黃芩前胡茯苓各七分桔梗枳殼各一錢甘草三分上水一鍾煎五分作十餘次徐服之清金降火湯一四九治疹後肺熱聲啞咳喘當歸白芍藥酒炒生地黃酒洗栝蔞仁白茯苓陳皮貝母去心甘草麥門冬桑白皮枯芩酒炒山梔炒玄參杏仁去皮尖蘇梗天門冬黃連炒石膏上等分加姜一片水煎服二母散百五十方在寒陣四九治肺熱咳嗽及疹後嗽甚者透斑和中湯一五一治疹瘡二三日泄瀉升麻乾葛豬苓澤瀉陳皮半夏川芎茯苓各七分前胡桔梗各一錢柴胡錢半甘草三分上加生薑三片水一鍾煎至五分作數次徐服之解毒化滯湯一五二治疹後吃食太早咬指甲撕口唇𢳄眼毛看手咬人等證防風荊芥枳殼神麯炒麥芽炒各五分連翹黃芩茯苓前胡各七分桔梗一錢山楂甘草各三分上水一鍾煎五分作十餘次徐徐服之大青湯一五三解斑疹大毒良方生地黃石膏玄參地骨皮知母木通甘草青黛荊芥穗各等分上水一盞加淡竹葉十二片煎七分溫服無時羚羊角散一五四治小兒斑疹後餘毒不解上攻眼目羞明雲翳眵淚俱多紅赤腫閉羚羊角鎊黃耆黃芩草決明車前子升麻防風大黃芒硝等分水一盞煎半盞稍熱服羌菊散一五五治痘疹熱毒上攻眼目生翳並暴赤羞明羌活甘菊花蟬蛻蛇蛻防風穀精草木賊甘草白蒺藜山梔子大黃黃連沙苑蒺藜等分上為末每服一錢清米湯調下以下通用方人參理中湯一五六方在熱證一治脾胃虛寒諸證六物煎一五七方在新因二十治痘疹血氣不足隨證加減用六氣煎一五八方在新因二一治痘瘡氣虛癢𤹀倒陷九味異功煎一五九方在新因二二治痘瘡虛陷寒戰咬牙虛寒諸證柴歸飲百六十方在新因十五治痘瘡初起托散妙劑柴葛煎一六一方在新因十八治痘瘡表裡俱熱散毒養陰疏邪散一六二方在新因十六治痘瘡初起表邪強實者五積散一六三方在散陣三九溫散寒邪四順清涼飲一六四方在攻陣二五治血脈壅熱大便秘結涼血養榮煎一六五方在新因十七治痘瘡血虛血熱地紅熱渴搜毒煎一六六方在新因十九解痘疹熱毒紫黑乾枯犀角地黃湯一六七方在寒陣七九治痘疹血熱諸證仲景黃芩湯一六八方在寒陣百五治熱利透邪煎一六九方在新因二三治痘疹初熱未出者宜此蘇表達邪化斑渴百七十方在寒陣三治陽明熱渴化斑除煩小柴胡湯一七一方在散陣十九散肝膽經表邪往來寒熱益元散一七二方在寒陣百十二解煩熱止渴利小水四苓散一七三方在和陣一八七利小水去濕滯導赤散一七四方在寒陣一二二降心火及小腸熱證
