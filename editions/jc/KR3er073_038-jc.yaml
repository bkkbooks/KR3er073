body:
  text: 卷之三十八人集婦人規上總論類婦人九證一婦人諸病本與男子無異而其有異者則惟經水胎產之屬故本門亦止列此九證曰經脈類胎孕類產育類產後類帶濁類乳病類子嗣類癥瘕類前陰類凡此九者乃其最切之病不得不另詳方論此外雜證但與男子相同者自有各門論治之法故不以男女分而資贅於此論難易二諺云寧治十男子莫治一婦人此謂婦人之病不易治也何也不知婦人之病本與男子同而婦人之情則與男子異蓋以婦人幽居多郁常無所伸陰性偏拗每不可解加之慈戀愛憎嫉妒憂恚罔知義命每多怨尤或有懷不能暢遂或有病不可告人或信師巫或畏藥餌故染著堅牢根深蒂固而治之有不易耳此其情之使然也然尚有人事之難如寇宗奭引黃帝之論曰凡治病察其形氣色澤形氣相得謂之可治色澤以浮謂之易已形氣相失色夭不澤謂之難治又曰診病之道觀人勇怯骨肉皮膚能知其虛實以為診法故曰治之要極無失色脈此治之大則也今富貴之家居奧室之中處帷幔之內復有以綿帕蒙其手者既不能行望色之神又不能盡切脈之巧使脈有弗合未免多問問之覺繁必謂醫學不精往往並藥不信不知問亦非易其有善問者正非醫之善者不能也望聞問切欲於四者去其三吾恐神醫不神矣世之通患若此最多此婦人之所以不易也故凡醫家病家皆當以此為意經脈類經脈之本三上古天真論曰女子二七天癸至任脈通太衝脈盛月事以時下故有子蓋天癸者言後天之陰氣陰氣足而月事通是即所為月經也正以女體屬陰其氣應月月以三旬而一盈經以三旬而一至月月如期經常不變故謂之月經又謂之月信夫經者常也一有不調則失其常度而諸病見矣然經本陰血何臟無之惟臟腑之血皆歸衝脈而沖為五臟六腑之血海故經言太衝脈盛則月事以時下此可見衝脈為月經之本也然血氣之化由於水穀水穀盛則血氣亦盛水穀衰則血氣亦衰而水穀之海又在陽明考之痿論曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長是以男精女血皆由前陰而降此可見衝脈之血又總由陽明水穀之所化而陽明胃氣又為衝脈之本也故月經之本所重在衝脈所重在胃氣所重在心脾生化之源耳其他如七情六淫飲食起居之失宜者無非皆心脾胃氣之賊何者當顧何者當去學者於此當知所從矣經脈諸臟病因四女人以血為主血王則經調而子嗣身體之盛衰無不肇端於此故治婦人之病當以經血為先而血之所主在古方書皆言心主血肝藏血脾統血故凡傷心傷脾傷肝者均能為經脈之病又曰腎為陰中之陰腎主閉藏肝為陰中之陽肝主疏泄二藏俱有相火其繫上屬於心故心火一動則相火翕然從之多致血不靜而妄行此固一說然相火動而妄行者有之由火之盛也若中氣脫陷及門戶不固而妄行者亦有之此由脾腎之虛不得盡言為火也再如氣道逆而不行者有之由肝之滯也若精血敗而不行者亦有之此由真陰之枯竭其證極多不得誤以為滯也是固心脾肝腎四臟之病而獨於肺臟多不言及不知血之行與不行無不由氣如經脈別論曰飲入於胃遊溢精氣下輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五行陰陽揆度以為常也此言由胃達脾由脾達肺而後傳布諸經故血脫者當益氣氣滯者當調氣氣主於肺其義可知是皆諸經之當辨者如此然其微甚本末則猶有當辨者蓋其病之肇端則或由思慮或由鬱怒或以積勞或以六淫飲食多起於心肺肝脾四臟及其甚也則四臟相移必歸脾腎蓋陽分日虧則飲食日減而脾氣胃氣竭矣陰分日虧則精血日涸而衝任腎氣竭矣故予曰陽邪之至害必歸陰五臟之傷窮必及腎此源流之必然即治療之要著故凡治經脈之病或其未甚則宜解初病而先其所因若其已劇則必計所歸而專當顧本甚至脾腎大傷泉源日涸由色淡而短少由短少而繼絕此其枯竭已甚也昧者無知猶云積血而通之破之禍不旋踵矣經不調五經血為水穀之精氣和調於五臟灑陳於六腑乃能入於脈也凡其源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎以灌溉一身在男子則化而為精婦人則上為乳汁下歸血海而為經脈但使精氣無損情志調和飲食得宜則陽生陰長而百脈充實又何不調之有苟不知慎則七情之傷為甚而勞倦次之又或為欲不謹強弱相陵以致衝任不守者亦復不少此外則外感內傷或醫藥誤謬但傷營氣無不有以致之凡人有衰弱多病不耐寒暑不勝勞役雖先天稟弱者常有之然有以氣血方長而縱情虧損或精血未滿而早為斫喪致傷生化之源則終身受害此未病之先所當深察而調之者也若欲調其既病則惟虛實陰陽四者為要丹溪曰先期而至者血熱也後期而至者血虛也王子亨曰陽太過則先期而至陰不及則後時而來其有乍多乍少斷絕不行崩漏不止皆由陰陽盛衰所致是固不調之大略也然先期而至雖曰有火若虛而挾火則所重在虛當以養營安血為主矧亦有無火而先期者則或補中氣或固命門皆不宜過用寒涼也後期而至者本屬血虛然亦有血熱而燥瘀者不得不為清補有血逆而留滯者不得不為疏利總之調經之法但欲得其和平在詳察其脈證耳若形氣脈氣俱有餘方可用清用利然虛者極多實者極少故調經之要貴在補脾胃以資血之源養腎氣以安血之室知斯二者則盡善矣若營氣本虛而不知培養則未有不日枯而竭者不可不察也凡經行之際大忌寒涼等藥飲食亦然初虞世曰經以月至有常也其來過與不及皆謂之病若榮血虧損不能滋養百骸則發落面黃羸瘦燥熱燥氣盛則金受邪金受邪則為咳為嗽為肺癰為肺痿必矣但助胃壯氣則榮血生而經自行若果怒氣逆經閉不行當用行氣破血之劑褚氏遺書精血篇曰男子精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出而內敗小便澀而為淋精已耗而復竭之則大小便牽痛愈痛則愈便愈便則愈痛女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而為腫後雖合而難子合多則瀝枯虛人產眾則血枯殺人觀其精血思過半矣產寶方序論曰婦人以血為基本苟能謹於調護則血氣宣行其神自清月水如期血凝成孕若脾胃虛弱不能飲食營衛不足月經不行肌膚黃燥面無光澤寒熱腹痛難於子息或帶下崩漏血不流行則成瘕證薛立齋曰經云二陽之病發心脾有不得隱曲為女子不月故心脾平和則百骸五臟皆潤澤而經候如常苟或心脾受傷則血無所養亦無所統而月經不調矣是故調經者當理心脾為主丹溪先生亦曰先期而至者血熱也後期而至者血虛也竊謂先期而至者有因脾經血燥有因脾經鬱火有因肝經怒火有因血分有熱有因勞役動火過期而至者有因脾經血虛有因肝經血虛有因氣虛血弱主治之法脾經血燥者加味逍遙散脾經鬱滯者歸脾湯肝經怒火者加味小柴胡湯血分有熱者加味四物湯勞役動火者補中益氣湯其過期而至者若脾經血虛宜人參養營湯肝經血少宜六味地黃丸氣虛血弱宜八珍湯蓋血生於脾故云脾統血凡血病當用苦甘之劑以助其陽氣而生陰血俱屬不足也大凡肝脾血燥四物湯為主肝脾血弱補中益氣湯為主肝脾鬱結歸脾湯為主肝經怒火加味逍遙散為主又曰胃者衛之源脾者榮之本榮出中焦衛出上焦衛不足益之必以辛榮不足補之必以甘甘辛相合脾胃健而榮衛生是以氣血俱旺也或因勞心虛火妄動月經錯行宜安心補血瀉火此東垣先生治法也又曰人之少有老態不耐寒暑不勝勞役四時迭病皆因氣血方長而勞心虧損或精血未滿而早年斫喪故其見證難以名狀若左尺脈虛弱或細數是左腎之真陰不足也用六味丸右尺脈遲軟或沉細而數欲絕是命門之相火不足也用八味丸至於兩尺微弱是陰陽俱虛用十補丸此皆滋其化源也不可輕用黃柏知母之類設或六淫外侵而見證亦因其氣內虛而外邪溱集耳尤宜用前藥調經論外備用方加味八珍湯婦九四補虛調經調味養營湯婦九五退熱調經金匱膠艾湯婦九三勞傷經血不止良方當歸散婦九六妄行不止四物二連湯婦百十三血虛內熱補肝散婦九二虛弱不調益陰腎氣丸補一二三血虛不調丹參散婦九七調經止血琥珀散婦百二逐瘀通經白芷散婦一二六固經良方黃龍湯婦八五經後外感良方人參湯婦七七補虛調經十全大補湯補二十溫補氣血六物煎新因二十虛補最妙血熱經早六凡血熱者多有先期而至然必察其陰氣之虛實若形色多赤或紫而濃或去多其脈洪滑其臟氣飲食喜冷畏熱皆火之類也治血熱有火者宜清化飲主之若火之甚者如抽薪飲之類亦可暫用但不可以假火作真火以虛火作實火也大都熱則善流而愆期不止者如續斷地榆丹參茜根梔子之屬皆可用若微火陰虛而經多早者治宜滋陰清火用保陰煎之類主之所謂經早者當以每月大概論所謂血熱者當以通身臟象論勿以素多不調而偶見先期者為早勿以脈證無火而單以經早者為熱若脈證無火而經早不及期者乃其心脾氣虛不能固攝而然宜大營煎大補丸煎或五福飲加杜仲五味子之類主之此輩極多若作火治必誤之矣若一月二三至或半月或旬日而至者此血氣敗亂之證當因其寒熱而調治之不得以經早者並論血熱論外方良方續繼湯婦二二四物二連湯婦百十三二黃散婦二十一母丸婦三七良方當歸散婦九六延年益嗣丹婦一三五奇效四物湯婦百十一子芩散婦一二二血熱經遲七血熱者經期常早此營血流利及未甚虧者多有之其有陰火內爍血本熱而亦每過期者此水虧血少燥澀而然治宜清火滋陰以加味四物湯加減一陰煎滋陰八味丸之類主之血寒經遲八凡血寒者經必後期而至然血何以寒亦惟陽氣不足則寒從中生而生化失期是即所謂寒也至若陰寒由外而入生冷由內而傷或至血逆或為疼痛是又寒滯之證非血寒經遲之謂也當詳辨之凡陽氣不足血寒經遲者色多不鮮或色見沉黑或澀滯而少其脈或微或細或沉遲弦澀其臟氣形氣必惡寒喜暖凡此者皆無火之證治宜溫養血氣以大營煎理陰煎之類加減主之大約寒則多滯宜加薑桂吳茱萸蓽茇之類甚者須加附子血寒論外方五物煎新因三烏雞煎丸婦一四二增損四物湯婦百十四神散婦七五血虛經亂九凡女人血虛者或遲或早經多不調此當察臟氣審陰陽詳參形證脈色辨而治之庶無誤也蓋血虛之候或色淡或澀少或過期不至或行後反痛痛則喜暖喜按或經後則困憊難支腰膝如折或脈息則微弱弦澀或飲食素少或形色薄弱凡經有不調而值此不足之證皆不可妄行克削及寒涼等劑再傷脾腎以伐生氣則惟有日甚矣凡肝脾血虛微滯微痛者宜四物湯主之或加肉桂或加黃芩隨寒熱而用之自無不可三陰虧弱無熱無寒平臟者宜小營煎五福飲六物煎之類主之此常人最宜之劑或八珍湯十全大補湯之類皆宜擇用三陰虧弱兼陽虛者宜大營煎理陰煎之類主之憂思過度心脾受傷者七福飲歸脾湯之類主之脾土不健飲食減少宜燥宜溫者溫胃飲理中湯之類主之脾土虛陷不能統攝營氣而為漏為頻者宜五福飲歸脾湯壽脾煎秘元煎或四君子加芎歸主之肝虛不能藏血或多驚惕或多小腹急痛宜三陰煎補肝散之類主之若陰血虛水不制火而邪火盛者或為夜熱盜汗或為煩渴生痰是即勞損之漸速宜調治用一二三四五陰等煎擇宜治之否則恐成血枯也腎虛經亂十婦人因情欲房室以致經脈不調者其病皆在腎經此證最多所當辨而治之凡欲念不遂沉思積鬱心脾氣結致傷衝任之源而腎氣日消輕則或早或遲重則漸成枯閉此宜兼治心脾腎以逍遙飲秘元煎之類主之若或欲火熾盛以致真陰日潰者宜保陰煎滋陰八味丸之類主之若房室縱肆不慎者必傷衝任之流而腎氣不守治須扃固命門宜固陰煎秘元煎之類主之若左腎真陰不足而經脈不調者宜左歸飲左歸丸六味地黃丸之類主之若右腎真陽不足而經有不調者宜右歸飲右歸丸八味地黃丸之類主之若思郁不解致病者非得情舒願遂多難取效房室不慎致病者使非勇於節欲亦難全恃藥餌也經期腹痛十一經行腹痛證有虛實實者或因寒滯或因血滯或因氣滯或因熱滯虛者有因血虛有因氣虛然實痛者多痛於未行之前經通而痛自減虛痛者於既行之後血去而痛未止或血去而痛益甚大都可按可揉者為虛拒按拒揉者為實有滯無滯於此可察但實中有虛虛中亦有實此當於形氣稟質兼而辨之當以意察言不能悉也凡婦人經期有氣逆作痛全滯而不虛者須順其氣宜調經飲主之甚者如排氣飲之類亦可用若血瘀不行全滯無虛者但破其血宜通瘀煎主之若氣血俱滯者宜失笑散主之若寒滯於經或因外寒所逆或素日不慎寒涼以致凝結不行則留聚為痛而無虛者須去其寒宜調經飲加薑桂吳茱萸之類主之或和胃飲亦可酌用若血熱血燥以致滯澀不行而作痛者宜加味四物湯或用保陰煎去續斷加減主之以上五證但察其有滯無虛方是真實若或兼虛弗得任行克伐凡婦人經行作痛挾虛者多全實者少即如以可按拒按及經前經後辨虛實固其大法也然有氣血本虛而血未得行者亦每拒按故於經前亦常有此證此以氣虛血滯無力流通而然但察其形證脈息凡涉虛弱不足而經滯作痛者惟用決津煎五物煎加減主之其效如神或用四神散之類亦可若痛在經後者多由血虛當用大小營煎隨宜加減治之或四物八珍俱可用然必察其寒熱虛實以為佐使自無不效其有餘滯未行者惟決津煎為妙凡婦人但遇經期則必作痛或食則嘔吐肢體困倦或兼寒熱者是必素稟氣血不足止宜八珍湯大營煎之類若虛而寒甚者宜理陰煎漸加培補久必自愈有因帶濁多而虛痛者亦宜大小營煎隨其寒熱加佐使主之立齋曰前證若風寒傷脾者六君加炮姜思慮傷血者四物加參朮思慮傷氣者歸脾加柴梔鬱怒傷血者歸脾逍遙兼服經痛論外方溫經湯婦百三寒痛交加散婦百結聚作痛醋附丸婦百七行滯止痛牛膝散婦九九通經止痛薑黃散婦百一逐瘀止痛當歸沒藥丸婦百六血瘀作痛玄胡當歸散婦九八血逆作痛琥珀丸婦一三四崩淋經漏不止十二崩漏不止經亂之甚者也蓋亂則或前或後漏則不時妄行由漏而淋由淋而崩總因血病而但以其微甚耳陰陽別論曰陰虛陽搏謂之崩百病始生篇曰陽絡傷則血外溢陰絡傷則血內溢故凡陽搏必屬陰虛絡傷必致血溢知斯二者而崩淋之義及治療之法思過半矣惟是陰虛之說則但傷營氣無匪陰虛而五臟之陰皆能受病故神傷則血無所主病在心也氣傷則血無所從病在肺也意傷則不能統血攝血病在脾也魂傷則不能蓄血藏血病在肝也志傷則不能固閉真陰病在腎也所以五臟皆有陰虛五臟皆有陽搏故病陰虛者單以臟氣受傷血因之而失守也病陽搏者兼以火居陰分血得熱而妄行也凡治此之法宜審臟氣宜察陰陽無火者求其臟而培之補之有火者察其經而清之養之此不易之良法也然有火者不得不清但元氣既虛極多假熱設或不明真假而誤用寒涼必復傷脾胃生氣日見殆矣先賢有云凡下血證須用四君子輩以收功又云若大吐血後毋以脈診當急用獨參湯救之厥旨深矣故凡見血脫等證必當用甘藥先補脾胃以益發生之氣蓋甘能生血甘能養營但使脾胃氣強則陽生陰長而血自歸經矣故曰脾統血治崩淋經漏之法若陰虛血熱妄行者宜保陰煎加減一陰煎若火盛迫血妄行而無虛證者宜徙薪飲黃芩散加續斷丹參若血熱兼滑者宜保陰煎槐榆散生地黃湯若肝經怒火動血者加味四物湯若肝經怒火動血逆氣未散者化肝煎或保陰煎加減主之若血有滯逆而妄行者四物湯丹參散若營氣不足血不能調而妄行者五福飲四物湯四君子湯八珍湯擇宜用之若脾氣虛陷不能收攝而脫血者壽脾煎歸脾湯四君子加芎歸再甚者舉元煎若脾腎虛寒兼嘔兼溏泄而畏寒者理陰煎五君子煎理中湯若陽氣大虛脫陷者四維散若脾腎陰氣不固者固陰煎五陰煎秘元煎若肝膽氣虛不能藏血者必多驚恐畏怯宜五福飲七福飲八珍湯兼陽虛者仍加薑桂若去血過多血脫氣竭者當速用獨參湯提握其氣以防脫絕或用當歸補血湯若崩淋既久血滑不禁宜澀宜固者龍骨散如聖散七灰散之類同人參兼用之凡血淋治法大約如前但其穢臭脈滑者多火宜從清涼若腥臭清寒脈細者多寒必須溫補其或久病則精去無窮尾閭易竭非大加培補不可惟固陰煎及十全大補湯之類為宜一崩淋之病有暴崩者有久崩者暴崩者其來驟其治亦易久崩者其患深其治亦難且凡血因崩去熱必漸少少而不止病則為淋此等證候未有不由憂思鬱怒先損脾胃次及衝任而然者崩淋既久真陰日虧多致寒熱咳嗽脈見弦數或豁大等證此乃元氣虧損陰虛假熱之脈尤當用參地歸術甘溫之屬以峻培本源庶可望生但得胃氣未敗受補可救若不能受補而日事清涼以苟延目前則終非吉兆也一崩淋病治有五臟之分然有可分者有不可分者可分者如心肺居於膈上二陽臟也肝脾腎居於膈下三陰臟也治陽者宜治其氣治陰者宜治其精此可分之謂也然五臟相移精氣相錯此又其不可分者也即如病本於心君火受傷必移困於脾土故治脾即所以治心也病本於肺治節失職必殘及於腎水故治腎即所以治肺也脾為中州之官水穀所司餉道不資必五路俱病不究其母則必非治脾良策肝為將軍之官鬱怒是病勝則伐脾敗則自困不知強弱則攻補不無倒施不獨此也且五臟五氣無不相涉故五臟中皆有神氣皆有肺氣皆有胃氣皆有肝氣皆有腎氣而其中之或此或彼為利為害各有互相倚伏之妙故必悟藏氣之大本其強弱何在死生之大權其緩急何在精氣之大要其消長何在攻補之大法其先後何在斯足稱慧然之明哲若謂心以棗仁遠志肺以桔梗麥冬脾以白朮甘草肝以青皮芍藥腎以獨活玄參之類是不過膚毛之見又安知性命之道也諸證皆然不止崩淋者若此一婦人於四旬外經期將斷之年多有漸見阻隔經期不至者當此之際最宜防察若果氣血和平素無他疾此固漸止而然無足慮也若素多憂鬱不調之患而見此過期阻隔便有崩決之兆若隔之淺者其崩尚輕隔之久者其崩必甚此因隔而崩者也當預服四物八珍之類以調之否則恐其鬱久而決則為患滋大也若其既崩之後則當辨其有火無火有火者因火逼血宜保陰煎主之無火者因隔而決或其有滯當去其故而養其新宜調經飲先以理之然後各因其宜可養則養用小營煎可固則固用固陰煎之類主之王叔和曰五崩何等曰白崩者形如涕赤崩者形如絳津黃崩者形如爛瓜青崩者形如藍色黑崩者形如衃血也立齋曰前證治法固脾胃虧損不能攝血歸源者用六君加芎歸柴胡若因肝經之火而血下行用奇效四物湯或四物加柴梔苓術若肝經風熱而血妄行用加味逍遙散或小柴胡加梔芍丹皮若怒動肝火而血沸騰亦用前藥若脾經鬱結而血不歸經用歸脾加柴梔丹皮若悲傷胞絡而血下崩用四君加柴梔升麻附按大尹王天成之內久患崩自服四物涼血之劑或作或徹因怒發熱其血不止服前藥不應乃主降火更加脅腹大痛手足俱冷余曰此脾胃虛寒所致先用附子理中湯熱退痛止又用濟生歸脾湯補中益氣湯崩血頓愈若泥痛無補法則誤矣血崩簡易方一方治風熱血崩用荊芥穗燈火燒焦為末每服一二錢童便調服一方治血崩用陳槐花一兩百草霜半兩為末每服一二錢燒紅秤錘淬酒服崩漏論外方增損四物湯婦百十虛不固攝一味防風散婦百十五肝經風熱血崩防風黃芩湯婦一二三風熱血崩柏葉散婦一二一虛弱久崩棕灰散和二一五固澀崩漏龍腦雞蘇丸和三七二虛火崩淋下血殺血心痛十三陳臨川良方云婦人血崩而心痛甚名曰殺血心痛由心脾血虛也若小產去血過多而心痛甚者亦然用烏賊魚骨炒為末醋湯調下失血散亦效立齋曰前證若陰血耗散用烏賊丸收斂之若瘀血不散用失笑散行散之若心血虛弱用芎歸湯補養之若鬱結傷血用歸脾湯調補之附按一婦人血崩兼心痛三年矣諸藥不應每痛甚虛證悉具面色痿黃余曰心主血蓋由去血過多心無所養以致作痛宜用十全大補湯參朮倍之三十餘劑稍愈百餘劑全愈愚謂殺血心痛既由血去過多而心痛甚明屬心無所養但當專用甘溫以養營氣如十全大補湯大營煎小營煎五福飲之類為宜若失笑散者惟氣滯血逆而用以行之散之則可必不可以治血虛也再如烏賊丸乃內經腹中論用治血枯者亦恐於血虛心痛未必即效用者審之熱入血室十四婦人傷寒或勞役或怒氣發熱適遇經行以致熱入血室或血不止或血不行令人晝則明瞭安靜夜則譫語如見鬼狀者是也若熱因外邪由表而入者宜一柴胡飲或三柴胡飲或四柴胡飲或良方黃龍湯加生地酌而用之若或怒或勞火由內生其人多汗而無表證者宜保陰煎清化飲當歸六黃湯之類加減主之若病雖漸愈但元氣素弱而熱有未退血未止者宜補陰益氣煎或補中益氣湯若脾氣素弱宜歸脾湯血氣俱弱者宜十全大補湯庶無誤矣若血熱多滯者宜小柴胡湯加丹皮紅花當歸辨血色十五凡血色有辨固可以察虛實亦可以察寒熱若血濃而多者血之盛也色淡而少者血之衰也此固大概之易知者也至於紫黑之辨其證有如冰炭而人多不解誤亦甚矣蓋紫與黑相近今人但見紫色之血不分虛實便謂內熱之甚不知紫赤鮮紅濃而成片成條者是皆新血妄行多由內熱紫而兼黑或散或薄沉黑色敗者多以真氣內損必屬虛寒由此而甚則或如屋漏水或如腐敗之宿血是皆紫黑之變象也此肝脾大損陽氣大陷之證當速用甘溫如理陰煎理中湯歸脾湯四味回陽飲補中益氣湯之類單救脾土則陷者舉脫者固元氣漸復病無不愈若盡以紫色作熱證則無不隨藥而斃矣凡腸澼便血之屬無不皆然學者於此最有不可忽者血枯經閉十六評熱病論曰月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也陰陽別論曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治邪氣臟腑病形篇曰腎脈微澀為不月血枯之與血隔本自不同蓋隔者阻隔也枯者枯竭也阻隔者因邪氣之隔滯血有所逆也枯竭者因衝任之虧敗源斷其流也凡婦女病損至旬月半載之後則未有不閉經者正因陰竭所以血枯枯之為義無血而然故或以羸弱或以困倦或以咳嗽或以夜熱或以食飲減少或以亡血失血及一切無脹無痛無阻無隔而經有久不至者即無非血枯經閉之候欲其不枯無如養營欲以通之無如充之但使雪消則春水自來血盈則經脈自至源泉混混又孰有能阻之者奈何今之為治者不論有滯無滯多兼開導之藥其有甚者則專以桃仁紅花之類通利為事豈知血滯者可通血枯者不可通也血既枯矣而復通之則枯者愈枯其與榨乾汁者何異為不知枯字之義耳為害不小無或蹈此弊也此之治法當與前血虛腎虛二條參而用之寇宗奭曰夫人之生以血氣為本人之病未有不先傷其血氣者若室女童男積想在心思慮過度多致勞損男子則神色消散女子則月水先閉蓋憂愁思慮則傷心而血逆氣竭神色先散月水先閉且心病則不能養脾故不嗜食脾虛則金虧故發嗽腎水絕則木氣不榮而四肢干痿故多怒鬢髮焦筋骨痿若五臟傳遍則必至於死此一種於勞中最難治蓋病起於五臟之中無有已期藥力不可及也若或自能改易心志然後用藥扶接如此則可得九死一生舉此為例其餘諸方可按脈與證而治之張氏云室女月水久不行切不可用青蒿等涼藥醫家多以為室女血熱故以涼藥解之殊不知血得熱則行冷則凝養生必用方言之甚詳此說大有理不可不知若經候微少漸漸不通手足骨肉煩疼日漸羸瘦漸生潮熱其脈微數此由陰虛血弱陽往乘之少水不能減盛火火逼水涸耗亡津液治當養血益陰慎毋以毒藥通之宜用柏子仁丸澤蘭湯立齋曰夫經水陰血也屬衝任二脈主上為乳汁下為月水其為患有因脾胃虛不能生血而不行者調而補之有因脾郁傷血耗損而不行者解而補之有因胃火血消爍而不行者清而補之有因勞傷心血少而不行者靜而補之有因怒傷肝血少而不行者和而補之有因腎水虧不能生肝血而閉者補脾肺有因肺氣虛不能行血而閉者補脾胃經曰損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精審而治之庶無誤矣五穀入胃化以為血以榮四末內養五臟六腑若服苦寒之劑復傷胃氣必致不起經閉論外方通經散攻四五經脈類論列總方十七四君子湯補一五君子煎新熱六六君子湯補五四物湯補八八珍湯補十九十全大補湯補二十歸脾湯補三二小營煎新補十五加味四物湯補九壽脾煎新熱十六大營煎新補十四補中益氣湯補三十理陰煎新熱三理中湯熱一附子理中湯熱二保陰煎新寒一五福飲新補六補陰益氣煎新補十六五物煎新因三七福飲新補七人參養營湯補二一六物煎新因二十五陰等煎新補八起至三十止加減一陰煎新補九舉元煎新補十七秘元煎新固一四味回陽飲新熱一固陰煎新固二逍遙散補九二加味逍遙散補九三左歸飲新補二右歸飲新補三當歸補血湯補四四左歸丸新補四右歸丸新補五當歸六黃湯寒六五六味丸補百二十八味丸補一二一滋陰八味丸新寒十七獨參湯補三五十補丸熱一七三奇效四物湯婦百十一溫胃飲新熱五和胃飲新和五良方黃龍湯婦八五一柴胡飲新散一三柴胡飲新散三加味小柴胡湯散二十四柴胡飲新散四小柴胡湯散十九生地黃湯固五七補肝散婦九二化肝煎新寒十調經飲新因四決津煎新因二通瘀煎新因五丹參散婦九七芎歸湯婦四一如聖散婦百十七失笑散婦百四四維散新熱十二四神散婦七五排氣飲新和六抽薪飲新寒三徙薪飲新寒四清化飲新因十三黃芩散婦一二二槐榆散婦百十八龍骨散婦百十六七灰散婦百十九附綿花子方烏賊丸婦百九柏子仁丸婦百八澤蘭湯婦百五胎孕類胎脈十八平人氣象論曰婦人手少陰脈動甚者任子也陰陽別論曰陰搏陽別謂之有子腹中論曰何以知懷子之且生也曰身有病而無邪脈也脈經曰尺中之脈按之不絕法妊娠也滑伯仁曰三部脈浮沉正等無他病而不月者妊也凡婦人懷孕者其血留氣聚胞宮內實故脈必滑數倍常此當然也然有中年受胎及血氣羸弱之婦則脈見細小不數者亦有之但於微弱之中亦必有隱隱滑動之象此正陰搏陽別之謂是即妊娠之脈有可辨也又胎孕之脈數勞損之脈亦數大有相似然損脈之數多兼弦澀胎孕之數必兼和滑此當於幾微中辨其邪氣胃氣之異而再審以證自有顯然可見者凡辨男女之法自古及今無不以陰陽二字為綱領然言多矛盾悉屬疑似茲余以坎離之象定之庶得其要蓋坎為天一之卦坎中滿陽在內也離為地二之卦離中虛陰在內也得坎象者為男得離象者為女所以男脈多沉實沉實者中滿之象女脈多浮虛浮虛者中虛之象無論人之老少強弱脈之部位大小但因象察象無不如響之應然尤於兩尺為最也足稱捷法脈訣云欲產之婦脈離經沉細而滑也同名夜半覺痛應分誕來日日午定知生質疑謂離經之脈即歇至者是也在須臾卻非病胎候十九巫方氏顱囟經云一月為胞胎精血凝也二月為胎形始成胚也三月陽神為三魂四月陰靈為七魄五月五形分五臟也六月六律定六腑也七月睛開竅通光明也八月元神具降真靈也九月宮室羅布以定生人也十月受氣足萬象成也五臟論有耆婆論曰一月如珠露二月如桃花三月男女分四月形象具五月筋骨成六月毛髮生七月遊其魂男能動左手八月遊其魄兒能動右手九月三轉身十月受氣足孫真人曰凡兒在胎一月胚二月胎三月有血脈四月形體成五月能動六月諸骨具七月毛髮生八月臟腑具九月谷入胃十月百神備則生矣生後六十日瞳子成能咳笑應和人百五十日任脈成能自反覆百八十日髖骨成能獨坐二百一十日掌骨成能扶伏三百日髕骨成能行也若不能依期者必有不平之處巢氏病源論曰妊娠一月名胎胚足厥陰脈養之二月名始膏足少陽脈養之三月名始胎手心主脈養之當此之時血不流行形象始化未有定儀因感而變欲子端正莊嚴常口談正言身行正事欲子美好宜佩白玉欲子賢能宜看詩書是謂外象而內感者也四月始成其血脈手少陽脈養之五月始成其氣足太陰脈養之六月始成其筋足陽明脈養之七月始成其骨手太陰脈養之八月始成膚革手陽明脈養之九月始成毛髮足少陰脈養之十月五臟六腑關節人神皆備此其大略也陳臨川曰嘗試推巢氏所論云妊娠脈養之理若足厥陰肝脈也足少陽膽脈也為一臟一腑表裡之經余皆如此且四時之令必始於春木故十二經之養始於肝膽所以養胎在一月二月手心主心胞絡脈也手少陽三焦脈也屬火而夏旺所以養胎在三月四月手少陰手太陽乃心脈也以君主之官無為而尊也足太陰脾脈也足陽明胃脈也屬土而旺長夏所以養胎在五月六月手太陰肺脈也手陽明大腸脈也屬金而旺秋所以養胎在七月八月足少陰腎脈也屬水而旺冬所以養胎在九月又況母之腎臟繫於胎是母之真氣子之所賴也至十月兒於母腹之中受足諸臟氣脈所養然後待時而生此論誠有至理世更有明之者亦未有過於巢氏之論矣余因述其說一胎有男女之辨易曰乾道成男坤道成女顱囟經曰三陽所會則生男三陰所會則生女葛仙翁曰男從父氣女從母氣聖濟經曰天之德地之氣陰陽之至和流薄於一體因氣而左動則屬陽陽資之則成男因氣而右動則屬陰陰資之則成女是以胎有男女則成有遲速體有陰陽則懷有向背故男動在三月陽性早也女動在五月陰性遲也女胎背母而懷故母子腹軟男胎面母而懷故母之腹硬此皆得理之談所當察也至若褚氏以精血之先後言男女道藏經以一日三日五日得者為男等說總屬億度渺茫非有確見也余不敢遵信故別有微論列子嗣類安胎二十凡妊娠胎氣不安者證本非一治亦不同蓋胎氣不安必有所因或虛或實或寒或熱皆能為胎氣之病去其所病便是安胎之法故安胎之方不可執亦不可泥其月數但當隨證隨經因其病而藥之乃為至善若謂白朮黃芩乃安胎之聖藥執而用之鮮不誤矣一胎氣有寒而不安者其證或吞酸吐酸或嘔惡脹滿或喜熱畏涼或下寒泄瀉或脈多沉細或絕無火證而胎有不安者皆屬陽虛寒證但溫其中而胎自安矣宜用溫胃飲理陰煎之類加減主之亦當以平素之臟氣察其何如酌而用之一胎氣有熱而不安者其證必多煩熱或渴或躁或上下不清或漏血溺赤或六脈滑數等證宜涼胎飲保陰煎之類主之若但熱無虛者如枳殼湯一母丸黃芩散之類皆可擇用清其火而胎自安矣一胎氣有虛而不安者最費調停然有先天虛者有後天虛者胎元攸系盡在於此先天虛者由於稟賦當隨其陰陽之偏漸加培補萬毋欲速以期保全後天虛者由於人事凡色欲勞倦飲食七情之類皆能傷及胎氣治此者當察其所致之由因病而調仍加戒慎可也然總之不離於血氣之虛皆當以胎元飲為主若心脾氣虛於上者宜逍遙飲歸脾湯壽脾煎之類主之若肝腎不足於下者宜左歸飲右歸飲固陰煎主之若氣血俱虛者宜五福飲八珍湯十全大補湯之類主之若脾腎氣虛而兼帶濁者宜秘元煎菟絲煎之類主之若多嘔惡者當隨前證前方各加二陳湯之類以和之凡治虛證貴在隨機應變誠有不可以鑿執言者一胎氣有實滯氣滯凡為惡阻為脹滿而不安者惟其素本不虛而或多鬱滯者乃有之但察其所由而開之導之諸治實者固無難也嘔吐不止者二陳湯加枳殼砂仁主之或用人參橘皮湯亦妙食滯脹滿不安者小和中飲加減主之肝氣滯逆脹滿不安者解肝煎主之怒動肝氣兼火者化肝煎主之脾肺氣滯上攻作痛者紫蘇飲主之氣滯兼痰者四七湯二陳湯加當歸主之氣滯兼火為脹為煩者枳殼湯束胎丸之類主之一王節齋曰調理妊婦在於清熱養血白朮補脾為安胎君藥條實黃芩為安胎聖藥清熱故也暑月宜加用之此一說者雖若有理而實有大病不可不辨也夫孕之胎氣必隨母之臟氣大都陰虛者多熱氣陽虛者多寒氣寒之則寒熱之則熱者是為平氣今以十人言之則寒者居其三熱者居其三平者居其四此大較也若謂受胎之後必增內熱自與常人不同則何以治惡阻者必用二陳六君生薑半夏之屬而後效其果增熱否乎故治熱宜黃芩寒則不宜也非惟寒者不宜即平氣者亦不宜蓋凡今之胎婦氣實者少氣虛者多氣虛則陽虛而再用黃芩有即受其損而病者有用時雖或未覺而陰損胎元暗殘母氣以致產婦羸困或兒多脾病者多由乎此奈今人不能察理但以聖藥二字認為胎家必用之藥無論人之陰陽強弱凡屬安胎無不用之其害蓋不少矣至若白朮雖善安胎然或用不得善則其性燥而氣閉故凡陰虛者非可獨用氣滯者亦當權宜是以用藥之難當如盤珠有不可膠柱而鼓瑟也立齋曰妊娠若元氣不實發熱倦怠或胎氣不安用當歸散因氣惱加枳殼胸膈痞悶再加蘇梗或作痛加柴胡若飲食不甘或欲嘔吐用六君加紫蘇枳殼若惡阻嘔逆頭眩體倦用參橘散未應用六君子湯若惡阻嘔吐不食煩悶亦用參橘散之類若頓僕胎動腹痛下血用膠艾湯未應用八珍加膠艾若頓僕毒藥腰痛短氣用阿膠散未應煎送知母丸若頓僕胎傷下血腹痛用佛手散未應用八珍送知母丸若心驚膽怯煩悶不安名子煩用竹葉湯未應血虛佐以四物氣虛佐以四君若下血不止名胎漏血虛用二黃散血去多用八珍湯未應用補中益氣湯若因事而動下血用枳殼湯加生熟地黃未應或作痛更加當歸血不止八珍加膠艾若不時作痛或小腹重墜名胎痛用地黃當歸湯未應加參朮陳皮或因脾氣虛用四君加歸地中氣虛用補中益氣湯若面目虛浮肢體如水氣名子腫用全生白朮散未應用六君子湯下部腫甚用補中益氣倍加茯苓或因飲食失宜嘔吐泄瀉此是脾胃虧損用六君子湯若足指發腫漸至腿膝喘悶不安或足指縫出水名水氣用天仙藤散脾胃虛弱兼以四君子未應用補中益氣兼以逍遙散若胎氣上攻心腹脹滿作痛名子懸用紫蘇飲飲食不甘兼四君子內熱晡熱兼逍遙散若小便澀少或成淋瀝名子淋用安營散不應兼八珍湯腿足轉筋而小便不利急用八味丸緩則不救若項強筋攣語澀痰盛名子癇用羚羊角散或飲食停滯腹脹嘔吐此是脾胃虛弱而不能消化用六君子湯不應用平胃散加參苓或胎作脹或脹作痛此是脾胃氣虛不能承載用安胎飲加升麻白朮不應用補中益氣湯或臍腹作脹或小便淋閉此是脾胃氣虛胎壓尿胞用四物加二陳參術空心服後探吐藥出氣定又服又吐數次必安或因勞役所傷或食煎妙小便帶血此是血得熱而流於胞中宜清膀胱用逍遙散或遺尿不禁或為頻數此是肝火血熱用加味逍遙散若胸滿腹脹小便不通遍身浮腫名胎水不利用鯉魚湯脾胃虛佐以四君子病名同而形證異形證異而病名同聊見本方凡用見證之藥不應當分月經治之徐東皋曰胎有不安而腰疼腹痛甚則至於下墜者未必不由氣血虛無所營養而使之然也夫胎之在腹如果之在枝枝枯則果落固理之自然婦人性偏恣欲火動於中亦能致胎不安而有墮者大抵不外乎屬虛屬火二者之間清熱養血之治盡之矣此外有二因動胎者又不可不知也有因母病動胎者但療母病則胎自穩有因觸傷動胎者當以安胎藥二三劑而胎自安安胎論外方茯苓丸婦三九溫胃安胎黃耆湯婦九氣虛胎動七味阿膠散婦八胎動腹痛太山磐石散婦三千金保孕丸婦三六良方白朮散婦十一胎熱三味白朮湯婦十二胎熱心痛益母地黃湯婦十七跌墜腹痛鉤藤散婦十胎動腹痛醋附丸婦百七胎滯不安獨聖散婦十八順氣安胎探胎飲婦十五腎著湯熱一二九妊娠腳腫當歸黃耆湯婦九八妊娠不利滑胎枳殼散婦二四瘦胎惡阻二一妊娠之婦每多噁心嘔吐脹滿不食巢氏病源謂之惡阻此證惟胃氣弱而兼滯者多有之或嗜酸擇食或肢體困倦或煩悶脹滿皆其候也然亦有虛實不同所當辨而治之凡惡阻多由胃虛氣滯然亦有素本不虛而忽受胎妊則衝任上壅氣不下行故為嘔逆等證及三月餘而嘔吐漸止者何也蓋胎元漸大則臟氣僅供胎氣故無暇上逆矣凡治此者宜以半夏茯苓湯人參橘皮湯之類隨宜調理使之漸安必俟及期方得帖然也若中脘多痰者用二陳湯加枳殼或用半夏茯苓湯若飲食停滯作脹者宜小和中飲加減主之若氣逆作脹者宜半夏茯苓湯加枳殼蘇梗香附若脾胃氣虛者宜五味異功散六君子湯人參橘皮湯之類主之若胃虛兼寒多嘔者宜六味異功煎溫胃飲之類主之若肝腎陽虛作嘔者宜理陰煎主之立齋曰半夏乃健脾氣化痰滯之主藥也脾胃虛弱而嘔吐或痰涎壅滯飲食少思胎不安必用茯苓半夏湯倍加白朮以半夏白朮茯苓陳皮砂仁善能安胎氣健脾胃予常用驗矣惡阻論外方四味白朮散婦十三胃虛吐水茯苓丸婦三九養胃溫胃痞悶惡食竹茹湯婦三三清痰止嘔烏附湯婦三五和氣養胃胎氣上逼二二妊娠將理失宜或七情鬱怒以致氣逆多有上逼之證若氣逆氣實而脹逼者宜解肝煎若胃寒氣實而逼者宜和胃飲若胃火兼滯者宜枳殼湯若脾虛兼滯者宜紫蘇飲如脾虛而氣不行者宜四君子湯甚者八珍湯若脾氣虛而兼寒者宜五君子煎若脾腎虛寒不行者宜理陰煎若脾腎氣虛兼火者宜逍遙散或加黃芩枳殼砂仁若胎死腹中冷氣上逼嘔惡面青者治如後胎動欲墮條一方治胎氣上逼熱痛下血或煩悶困篤用蔥二十莖水濃煮飲之胎未死即安胎已死即下未效再服若胎動煩躁唇口青黑手足厥冷須用當歸湯胎漏二三妊婦經血不固者謂之胎漏而胎漏之由有因胎氣者有因病氣者而胎氣之由亦有二焉余嘗診一婦人脈見滑數而別無風熱等病問其經脈則如常不斷而但較前略少耳余曰此必受妊者也因胎小血盛有餘而然後於三月之外經脈方止果產一男故胎妊之婦多有此類今常見懷胎七八個月而生子者人但以血止為度謂之不足月然其受胎於未止之前至此而足而實人所不知也第此等胎氣亦有陰陽盛衰之辨如母氣壯盛蔭胎有餘而血之溢者其血雖漏而生子仍不弱此陰之強也不必治之若父氣薄弱胎有不能全受而血之漏者乃以精血俱虧而生子必萎小此陽之衰也而亦人所不知也凡此皆先天之由若無可以為力者然栽培根本豈果無斡旋之道乎第見有於無之目及轉強於弱之手為不易得是烏可以尋常語也至若因病而漏者亦不過因病治之而已耳妊娠血熱而漏者保陰煎清化飲擇而用之怒動肝火漏血者保陰煎甚者化肝煎主之脾虛不能攝血者壽脾煎四君子之類主之脾虛血熱氣滯者四聖散主之脾腎兼虛者五陰煎主之三焦氣血俱虛者五福飲七福飲之類主之勞倦傷而動血者壽脾煎歸脾湯主之偶因傷觸動血者五福飲安胎散主之衝任氣虛不能約制血滑易動者固陰煎秘元煎主之立齋曰前證若因氣熱用防風黃芩丸若因血熱用加味逍遙散若因血虛用二黃散若因血去太多用八珍湯未應補中益氣湯若因肝火用柴胡清肝散若因脾火用加味歸脾湯若因事下血作痛用八珍湯加阿膠熟艾若因脾胃虛弱用補中益氣湯加五味子若因脾胃虛陷用前湯倍用升麻柴胡若晡熱內熱宜用逍遙散胎漏論外方安胎寄生湯婦十九下血腰痛當歸芍藥湯婦十六急痛去血妊娠卒然下血二四妊娠忽然下血其證有四或因火熱迫血則妄行或因鬱怒氣逆則動血或因損觸胎氣胞宮受傷而下血或因脾腎氣陷命門不固而脫血凡此皆動血之最者也不速為調理則必致墮胎矣然治此者必先察其血去之多少及於血去之後尤當察其邪之微甚如火猶未清仍當清火氣猶未順仍當順氣若因邪而動血血去而營虛則速當專顧元氣以防脫陷此中或當治標或當救本或當兼標本而調理之倘不知先後緩急將恐治標未已而救本無暇也當詳察之若火盛迫血妄行者當察其火之微甚火之微者涼胎飲稍甚者徙薪飲再甚者保陰煎子芩散若肝經有風熱而血下者宜防風黃芩丸若怒氣傷肝氣逆血動而暴至者宜保陰煎若氣有未順而脹滿者四七湯二陳湯或加芎歸之類若兼肝火者宜化肝煎若觸損胎氣胞宮受傷而血下者宜安胎散膠艾湯去血多者倍加人參若從高墜下傷動胎氣而下血者宜益母地黃湯安胎散若因驚氣虛而陷者仍加人參若脾胃素弱或偶因傷脾下血者宜壽脾煎歸脾湯或中氣下陷者補中益氣湯若血虛微熱漏血尿血者續斷湯以上諸動血證若去血未多血無所積胎未至傷而不止者宜涼則涼宜補則補惟以安之固之為主治若血已離位蓄積胞宮為脹為痛而余血未出者欲與留之有不可得欲去其血而不傷營氣則惟四物湯大加當歸為最宜也若察其胎氣已動勢有難留則五物煎決津煎皆切要之藥一方治頓僕胎動用川芎末二錢酒下二三服胎生即安胎死即下又方治同前用砂仁和皮炒為末每服二錢米飲下腹熱即安胎動欲墮二五妊娠胎氣傷動者凡跌撲怒氣虛弱勞倦藥食誤犯房室不慎皆能致之若因母病而胎動但治其母若因胎動而母病但安其胎輕者轉動不安或微見血察其不甚速宜安之用前安胎及卒然下血等法若腹痛血多腰痠下墜勢有難留者無如決津煎五物煎助其血而落之最為妥當若其勢甚而舌青面赤脹滿嘔惡或冷氣上逼者兒已死矣若面青吐沫舌赤是母死也若面舌唇吻俱青口中沫出是母子俱死也若胎已死當速去其胎以救其母氣血虛者惟用決津煎最妙如不應而脹痛上逼熱不容緩者急用平胃散一兩酒水各半煎投朴硝五錢熱服之或用朴硝一兩以童便調服則逐而下矣下後隨證調補之如無脹急則但用決津煎加朴硝則死胎自下一凡氣血衰弱無以滋養其胎或母有弱病度其終不能成者莫若下之以免他患宜桂心散或用下胎小品方數墮胎二六夫胎以陽生陰長氣行血隨營衛調和則及期而產若或滋養之機少有間斷則源流不繼而胎不固矣譬之種植者津液一有不到則枝枯而果落藤萎而花墜故五常政大論曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絕正此謂也凡妊娠之數見墮胎者必以氣脈虧損而然而虧損之由有稟質之素弱者有年力之衰殘者有憂怒勞苦而困其精力者有色欲不慎而盜損其生氣者此外如跌撲飲食之類皆能傷其氣脈氣脈有傷而胎可無恙者非先天之最完固者不能而常人則未之有也且胎懷十月經養各有所主所以屢見小產墮胎者多在三個月及五月七月之間而下次之墮必如期復然正以先次傷此一經而再值此經則遇闕不能過矣況婦人腎以系胞而腰為腎之府故胎妊之婦最慮腰痛痛甚則墜不可不防故凡畏墮胎者必當察此所傷之由而切為戒慎凡治墮胎者必當察此養胎之源而預培其損保胎之法無出於此若待臨期恐無及也凡胎孕不固無非氣血損傷之病蓋氣虛則提攝不固血虛則灌溉不周所以多致小產故善保胎者必當專顧血虛宜以胎元飲為主而加減用之其次則芍藥芎歸湯再次則泰山磐石散或千金保孕丸皆有奪造化之功所當酌用者也又凡胎熱者血易動血動者胎不安故墮於內熱而虛者亦常有之若脾氣虛而血熱者宜四聖散肝腎虛而血熱者宜涼胎飲肝脾虛而血熱者宜固胎煎又立齋法治血虛血熱數墮胎者於調補之外時值初夏教以濃煎白朮湯下黃芩末二錢與數十帖得保而生亦可法也此外凡有他證而胎不安者當於安胎條中酌而治之胎不長二七妊娠胎氣本乎血氣胎不長者亦惟血氣之不足耳故於受胎之後而漏血不止者有之血不歸胎也婦人中年血氣衰敗者有之泉源日涸也婦人多脾胃病者有之倉廩薄則化源虧而衝任窮也婦人多鬱怒者有之肝氣逆則血有不調而胎失所養也或以血氣寒而不長者陽氣衰則生氣少也或以血熱而不長者火邪盛則真陰損也凡諸病此者則宜補宜固宜溫宜清但因其病而隨機應之則或以及期或以過月胎氣漸充自無不長惟是年邁血衰而然者數在天矣有非可以人力為也鬼胎二八婦人有鬼胎之說豈虛無之鬼氣果能襲人胞宮而遂得成形者乎此不過由本婦之氣質蓋或以邪思蓄注血隨氣結而不散或以衝任滯逆脈道壅瘀而不行是皆內因之病而必非外來之邪蓋即血癥氣瘕之類耳當即以癥瘕之法治之詳見本條此外如狐魅異類之遇者則實有所受而又非鬼胎之謂亦當於癥瘕類求法下之又凡鬼胎之病必以血氣不足而兼凝滯者多有之但見經候不調而預為調補則必無是病若其既病則亦當以調補元氣為主而繼以去積之藥乃可也然用補之外而欲於補中兼行者無如決津煎欲去其滯而不至猛峻者無如通瘀煎既加調補而欲直攻其病者則奪命丹回生丹皆可酌用或以當歸紅花煎濃湯送赤金豆亦妙妊娠藥禁二九蚖斑水蛭及虻蟲烏頭附子配天雄野葛水銀並巴豆牛膝薏苡與蜈蚣稜莪代赭芫花麝大戟蛇蛻黃雌雄牙硝芒硝牡丹桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑桃仁通硇砂乾漆蟹甲爪地膽茅根莫用好出便產須知妊娠寡欲三十妊娠之婦大宜寡欲其在婦人多所不知其在男子而亦多有不知者近乎愚矣凡胎元之強弱產育之難易及產後崩淋經脈之病無不悉由乎此其為故也蓋以胎神鞏固之日極宜保護宮城使不知慎而多動欲火盜泄陰精則藩籬由不固而傷血氣由不聚而亂子女由元虧而夭而陰分之病亦無不由此而百出矣此婦人之最宜慎者知者不可不察
