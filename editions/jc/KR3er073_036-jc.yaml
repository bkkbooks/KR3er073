body:
  text: 卷之三十六天集雜證謨諸氣經義天地氣一本神篇曰天之在我者德也地之在我者氣也德流氣薄而生者也詳二十九卷遺精門天元紀大論曰在天為氣在地成形形氣相感而化生萬物矣生氣通天論帝曰夫自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通於天氣其生五其氣三數犯此者則邪氣傷人此壽命之本也蒼天之氣清淨則志意治順之則陽氣固雖有賊邪勿能害也此因時之序故聖人傳精神服天氣而通神明失之則內閉九竅外壅肌肉衛氣解散此謂自傷氣之削也陰陽應象大論曰清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣故清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑惟賢人上配天以養頭下象地以養足中傍人事以養五臟天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣以天地為之陰陽陽之汗以天地之雨名之陽之氣以天地之疾風名之暴氣象雷逆氣象陽故治不法天之紀不用地之理則災害至矣四氣調神論曰天氣清淨光明者也藏德不止故不下也天明則日月不明邪害空竅陽氣者閉塞地氣者冒明雲霧不精則上應白露不下交通不表萬物命故不施不施則名木多死惡氣不發風雨不節白露不下則菀槁不榮賊風數至暴雨數起天地四時不相保與道相失則未央絕滅惟聖人從之故身無奇病萬物不失生氣不竭六元正紀大論帝曰天地之氣盈虛如何岐伯曰天氣不足地氣隨之地氣不足天氣從之運居其中而常先也故上勝則天氣降而下下勝則地氣遷而上多少而差其分微者小差甚者大差甚則位易氣交易則大變生而病作矣五常政大論帝曰天不足西北左寒而右涼地不滿東南右熱而左溫故其何也岐伯曰陰陽之氣高下之理大小之異也東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精奉於上故左寒而右涼是以地有高下氣有溫涼高者氣寒下者氣熱故適寒涼者脹之溫熱者瘡下之則脹已汗之則瘡已此腠理開閉之常大小之異耳五運行大論帝曰地之為下否乎岐伯曰地為人之下太虛之中者也帝曰憑乎曰大氣舉之也燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之故風寒在下燥熱在上濕氣在中火遊行其間寒暑六入故令虛而化生也方盛衰論曰至陰虛天氣絕至陽盛地氣不足陰陽並交至人之所行陰陽並交者陽氣先至陰氣後至是以聖人持診之道先後陰陽而持之太陰陽明論曰喉主天氣咽主地氣陰陽氣二至真要大論帝曰願聞陰陽之三也何謂岐伯曰氣有多少異用也帝曰陽明何謂也曰兩陽合明也帝曰厥陰何也曰兩陰交盡也氣之相守司也如權衡之不得相失也夫陰陽之氣清靜則生化治動則苛疾起此之謂也生氣通天論曰陽氣者若天與日失其所則折壽而不彰故天運當以日光明是故陽因而上衛外者也陽氣者煩勞則張精絕闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止陽氣者大怒則形氣絕而血菀於上使人薄厥陽氣者精則養神柔則養筋開闔不得寒氣從之乃生大僂陰者藏精而起亟也陽者衛外而為固也陰不勝其陽則脈流薄疾並乃狂陽不勝其陰則五臟氣爭九竅不通是以聖人陳陰陽筋脈和同骨髓堅固氣血皆從如是則內外調和邪不能害耳目聰明氣立如故故陽強不能密陰氣乃絕陰平陽秘精神乃治陰陽離決精氣乃絕陰陽應象大論曰陽化氣陰成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒重寒則熱重熱則寒寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣故曰知之則強不知則老太陰陽明論曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下陰病者下行極而上詳脾胃門終始篇曰陰者主臟陽者主腑陽受氣於四末陰受氣於五臟痹論岐伯曰陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷陰陽別論曰剛與剛陽氣破散陰氣乃消亡淖則剛柔不和經氣乃絕寒熱病篇曰足太陽入腦乃別陰蹺陽蹺陰陽相交陽入陰陰出陽交於目銳眥陽氣盛則䐜目陰氣盛則瞑目口問篇曰陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣大惑論曰夫衛氣者晝日行於陽夜行於陰故陽氣盡則臥陰氣盡則寤方盛衰論曰雷公請問氣之多少何者為逆何者為從帝曰陽從左陰從右老從上少從下時氣三六元正紀大論帝曰四時之氣至有早晏高下左右其候何如岐伯曰行有逆順至有遲速故太過者化先天不及者化後天帝曰願聞其行何謂也曰春氣西行夏氣北行秋氣東行冬氣南行故春氣始於下秋氣始於上夏氣始於中冬氣始於標春氣始於左秋氣始於右冬氣始於後夏氣始於前此四時正化之常故至高之地冬氣常在至下之地春氣常在必謹察之帝曰願聞同化何如岐伯曰風溫春化同熱曛昏火夏化同勝與復同燥清煙露秋化同雲雨昏暝埃長夏化同寒氣霜雪冰冬化同此天地五運六氣之化更用之盛衰也四氣調神論曰春三月此謂發陳天地俱生萬物以榮此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少夏三月此謂蕃莠天地氣交萬物華實此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少秋三月此謂容平天氣以急地氣以明此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少冬三月此謂閉藏水冰地坼無擾乎陽此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少逆春氣則少陽不生肝氣內變逆夏氣則太陽不長心氣內洞逆秋氣則太陰不收肺氣焦滿逆冬氣則少陰不藏腎氣獨沉夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根故與萬物浮沉於生長之門逆其根則伐其本壞其真矣生氣通天論曰陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄至真要大論帝曰分至何如岐伯曰氣至謂之至氣分謂之分至則氣同分則氣異所謂天地之正紀也脈要精微論曰冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失如脈所分分之有期故知死時順氣一日分為四時篇帝曰夫百病者多以旦慧晝安夕加夜甚者何也岐伯曰四時之氣使然春生夏長秋收冬藏人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣始衰故旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入臟邪氣獨居於身故甚也帝曰其時有反者何也曰是不應四時之氣臟獨主其病者是必以臟氣之所不勝時者甚以其所勝時者起也四時刺逆從論曰春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中帝曰敢問其故岐伯曰春者天氣始開地氣始泄凍解冰釋水行經通故人氣在脈夏者經滿氣溢入孫絡受血皮膚充實長夏者經絡皆盛內溢肌中秋者天氣始收腠理閉塞皮膚引急冬者蓋藏血氣在中內著骨髓通於五臟是故邪氣者常隨四時之氣血而入客也至其變化不可為度然必從其經氣闢除其邪除其邪則亂氣不生金匱真言論曰春氣者病在頭夏氣者病在臟秋氣者病在肩背冬氣者病在四肢故春善病鼽衄仲夏善病胸脅長夏善病洞泄寒中秋善病風瘧冬善病痹厥營衛生會篇曰衛氣行於陰二十五度行於陽二十五度分為晝夜故氣至陽而起至陰而止夜半為陰隴夜半後而為陰衰平旦陰盡而陽受氣矣日中為陽隴日西而陽衰日入陽盡而陰受氣矣夜半而大會萬民皆臥命曰合陰平旦陰盡而陽受氣如是無已與天地同紀運氣四天元紀大論曰所以欲知天地之陰陽者應天之氣動而不息故五歲而右遷應地之氣靜而守位故六期而環會動靜相召上下相臨陰陽相錯而變由生也天以六為節地以五為制五六相合而七百二十氣為一紀凡三十歲千四百四十氣凡六十歲為一周不及太過斯皆見矣六節藏象論曰天度者所以制日月之行也氣數者所以紀化生之用也五日謂之候三候謂之氣六氣謂之時四時謂之歲五氣更立各有所勝盛虛之變此其常也故春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂得五行時之勝各以氣命其臟帝曰何以知其勝岐伯曰求其至也皆歸始春未至而至此謂太過則薄所不勝而乘所勝也命曰氣淫至而不至此謂不及則所勝妄行而所生受病所不勝薄之也命曰氣迫所謂求其至者氣至之時也謹候其時氣可與期失時反候五治不分邪僻內生工不能禁也五運行大論曰丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氏昴畢玄天之氣經於張異婁胃所謂戊己分者奎壁角軫則天地之門戶也上下相遘寒暑相臨氣相得則和不相得則病東方生風在氣為柔南方生火在氣為息中央生濕在氣為充西方生燥在氣為成北方生寒在氣為堅氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之侮反受邪侮而受邪寡於畏也五常政大論帝曰太虛廖廓五運回薄衰盛不同損益相從願聞平氣何如而名何如而紀也岐伯曰木曰敷和火曰升明土曰備化金曰審平水曰靜順帝曰其不及奈何曰木曰委和火曰伏明土曰卑監金曰從革水曰涸流帝曰太過何謂曰木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍帝曰其歲有不病而臟氣不應不用者何也岐伯曰天氣制之氣有所從也少陽司天火氣下臨肺氣上從白起金用草木𤯝陽明司天燥氣下臨肝氣上從蒼起木用而立土乃𤯝太陽司天寒氣下臨心氣上從而火且明丹起金乃𤯝厥陰司天風氣下臨脾氣上從而土且隆黃起水乃𤯝少陰司天熱氣下臨肺氣上從白起金用草木𤯝太陰司天濕氣下臨腎氣上從黑起水變至真要大論帝曰五氣交合盈虛更作余知之矣六氣分治司天地者其至何如岐伯曰天地之大紀人神之通應也厥陰司天其化以風少陰司天其化以熱太陰司天其化以濕少陽司天其化以火陽明司天其化以燥太陽司天其化以寒帝曰地化奈何曰司天同候間氣皆然帝曰間氣何謂曰司左右者是謂間氣也主歲者紀歲間氣者紀步也帝曰歲主奈何曰厥陰司天為風化在泉為酸化司氣為蒼化間氣為動化少陰司天為熱化在泉為苦化不司氣化居氣為灼化太陰司天為濕化在泉為甘化司氣為黅化間氣為柔化少陽司天為火化在泉為苦化司氣為丹化間氣為明化陽明司天為燥化在泉為辛化司氣為素化間氣為清化太陽司天為寒化在泉為咸化司氣為玄化間氣為藏化故治病者必明六化分治五味五色所生五臟所宜乃可以言盈虛病生之緒也本乎天者天之氣也本乎地者地之氣也天地合氣六節分而萬物化生矣故曰謹候氣宜無失病機此之謂也帝曰氣之上下何謂也岐伯曰身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處而言其病半所謂天樞也帝曰勝復之動時有常乎氣有必乎岐伯曰時有常位而氣無必也初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則否帝曰六氣之勝何以候之岐伯曰清氣大來燥之勝也風木受邪肝病生焉熱氣大來火之勝也金燥受邪肺病生焉寒氣大來水之勝也火熱受邪心病生焉濕氣大來土之勝也寒水受邪腎病生焉風氣大來木之勝也土濕受邪脾病生焉所謂感邪而生病也乘年之虛則邪甚也失時之和亦邪甚也遇月之空亦邪甚也重感於邪則病危矣六微旨大論曰至而至者和至而不至來氣不及也未至而至來氣有餘也應則順否則逆逆則變生變生則病帝曰請言其應岐伯曰物生其應也氣脈其應也相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之帝曰何也岐伯曰亢則害承乃制制則生化外列盛衰害則敗亂生化大病帝曰六氣應五行之變何如岐伯曰位有始終氣有初中上下不同求之亦異也天氣始於甲地氣始於子子甲相合命曰歲立謹候其時氣可與期岐伯曰言天者求之本言地者求之位言人者求之氣交帝曰何謂氣交曰上下之位氣交之中人之居也故曰天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之萬物由之帝曰何謂初中岐伯曰初凡三十度而有奇中氣同法帝曰初中何也曰所以分天地也初者地氣也中者天氣也帝曰其升降何如岐伯曰氣之升降天地之更用也帝曰其用何如曰升已而降降者謂天降已而升升者謂地天氣下降氣流於地地氣上升氣騰於天故高下相召升降相因而變作矣岐伯曰出入廢則神機化滅升降息則氣立孤危故非出入則無以生長壯老已非升降則無以生長化收藏是以升降出入無器不有六元正紀大論帝曰氣至而先後者何岐伯曰運太過則其至先運不及則氣至後非太過非不及則至當時非是者𤯝也岐伯曰數之始起於上而終於下歲半之前天氣主之歲半之後地氣主之上下交互氣交主之歲紀畢矣故曰位明氣月可知乎所謂氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄甚則水閉胕腫隨氣所在以言其變耳帝曰水發而雹雪土發而飄驟木發而毀折金髮而清明火發而曛昧何氣使然岐伯曰氣有多少發有微甚微者當其氣甚者兼其下徵其下氣而見可知也帝曰五氣之發不當位者何也曰命其差帝曰差有數乎曰後皆三十度而有奇也氣交變大論岐伯曰德化者氣之祥政令者氣之章變易者復之紀災𤯝者傷之始氣相勝者和不相勝者病重感於邪則甚也帝曰善言天者必應於人善言古者必驗於今善言氣者必彰於物善言應者同天地之化善言化言變者通神明之理非夫子孰能言至道歟經氣臟氣五天元紀大論曰天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒思憂恐陰陽應象大論曰人有五臟化五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固本藏篇曰五臟者所以藏精神血氣魂魄者也六腑者所以化水穀而行津液者也此人之所以具受於天者也六節藏象論曰心者生之本神之變也為陽中之太陽通於夏氣肺者氣之本魄之處也為陽中之太陰通於秋氣腎者主蟄封藏之本精之處也為陰中之少陰通於冬氣肝者罷極之本魂之居也為陽中之少陽通於春氣脾胃大腸小腸三焦膀胱者倉廩之本營之居也此至陰之類通於土氣凡十一臟皆取決於膽也金匱真言論曰東方青色入通於肝其味酸其臭臊南方赤色入通於心其味苦其臭焦中央黃色入通於脾其味甘其臭香西方白色入通於肺其味辛其臭腥北方黑色入通於腎其味鹹其臭腐天年篇曰人生十歲五臟始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五臟六腑十二經脈皆大盛以平定腠理始疏榮華頹落發頗班白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣始衰苦憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魄離故言善誤九十歲腎氣焦四臟經脈虛空百歲五臟皆虛神氣皆去形骸獨居而終矣上古天真論曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下故有子丈夫八歲腎氣實髮長齒更二八腎氣盛天癸至精氣溢瀉陰陽和故能有子脈度篇曰肺氣通於鼻肺和則鼻能知香臭矣心氣通於舌心和則舌能知五味矣肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五穀矣腎氣通於耳腎和則耳能聞五音矣五藏生成篇曰諸脈者皆屬於目諸髓者皆屬於腦諸筋者皆屬於節諸血者皆屬於心諸氣者皆屬於肺此四肢八溪之朝夕也海論曰人有髓海有血海有氣海有水穀之海胃為水穀之海衝脈為十二經之海膻中為氣之海腦為髓之海得順者生得逆者敗知調者和不知調者害五味篇曰胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟氣於胃其大氣之搏而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入大惑論曰五臟六腑之精氣皆上注於目而為之精目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也詳眼目門衛氣篇曰請言氣街胸氣有街腹氣有街頭氣有街故氣在頭者止之於腦氣在胸者止之膺與背腧氣在腹者止之背腧與衝脈於臍左右之動脈者氣在脛者止之於氣街與承山踝上以下動輸篇曰夫四末陰陽之會者此氣之大絡也四街者氣之徑路也故絡絕則徑通四末解則氣從合相輸如環莫知其紀終而復始平人氣象論曰胃之大絡名曰虛里脈宗氣也詳脾胃門邪客篇帝曰人有八虛各何以候岐伯曰以候五臟心肺有邪其氣留於兩肘肝有邪其氣留於兩腋脾有邪其氣流於兩髀腎有邪其氣流於兩膕凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷經絡骨節機關不得屈伸故病攣也太陰陽明論曰四肢皆稟於胃而不得至經必因於脾乃得稟也詳脾胃門五藏別論曰腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也魄門亦為五臟使水穀不得久藏所謂五臟者藏精氣而不瀉也故滿而不能實六腑者傳化物而不藏故實而不能滿也所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不能實也平人絕谷篇曰平人胃滿則腸虛腸滿則胃虛更實更虛故氣得上下五臟安定血脈和則精神乃居邪氣臟腑病形篇帝曰天寒地冰而其面不衣何也岐伯曰十二經脈三百六十五絡其血氣皆上於面而走空竅詳面病門靈蘭秘典論曰膀胱者州都之宮津液藏焉氣化則能出矣憂恚無言篇帝曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方少師曰咽喉者水穀之道也喉嚨者氣之所以上下者也詳聲喑門脈氣六五臟別論帝曰氣口何以獨為五臟主岐伯曰胃者水穀之海五臟六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也動輸篇曰胃為五臟六腑之海其清氣上注於肺肺脈從太陰而行之其行也以息往來詳脾胃門五十營篇曰人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸詳脈神章根結篇曰一日一夜五十營以營五臟之精所謂五十營者五臟皆受氣持其脈口數其至也五十動而不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣予之短期所謂五十動而不一代者以為常也以知五臟之期予之短期者乍數乍疏也玉機真藏論曰春脈如弦春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長故曰弦反此者病其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中夏脈如鉤詳脈神章脈要精微論曰夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少詳脈神章平人氣象論曰人一呼脈一動一吸脈一動曰少氣平人之常氣稟於胃人無胃氣曰逆逆者死脈無胃氣亦死詳脾胃門形氣七陰陽清濁篇帝曰願聞人氣之清濁岐伯曰受谷者濁受氣者清清者注陰濁者注陽濁而清者上出於咽清而濁者則下行清濁相干命曰亂氣帝曰夫陰清而陽濁濁者有清清者有濁別之奈何岐伯曰氣之大別清者上注於肺濁者下走於胃胃之清氣上出於口肺之濁氣下注於經內積於海清者其氣滑濁者其氣澀此氣之常也決氣篇帝曰余聞人有精氣津液血脈余意為一氣耳今乃辨為六名余不知其所以然岐伯曰兩神相搏合而成形常先身生是謂精何謂氣曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣何謂津曰腠理發泄汗出溱溱是謂津何謂液曰谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液何謂血曰中焦受氣取汁變化而赤是謂血何謂脈曰壅遏營氣令無所避是謂脈精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛酸耳數鳴血脫者色白夭然不澤其脈空虛此其候也衛氣失常篇曰人有肥有膏有肉膏者多氣多氣者熱熱者耐寒肉者多血則充形充形則平脂者其血清氣滑少故不能大此別於眾人者也壽夭剛柔篇曰形與氣相任則壽不相任則夭詳生死門血氣八營衛生會篇曰夫血之與氣異名同類何謂也詳血證門五音五味篇曰今婦人之生有餘於氣不足於血以其數脫血也衝任之脈不榮口唇故須不生焉是故聖人視其顏色黃赤者多熱氣青白者少熱氣黑色者多血少氣夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥陰常多氣少血少陰常多血少氣太陰常多血少氣此天數之常也八正神明論曰故養神者必知形之肥瘦營衛血氣之盛衰血氣者人之神不可不謹養營衛氣九本藏篇曰經脈者所以行血氣而營陰陽濡筋骨利關節者也衛氣者所以溫分肉充皮膚肥腠理司關闔者也營衛生會篇帝曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛營行脈中衛行脈外衛氣行篇曰衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於陰二十五周是以平旦陰盡陽氣出於目目張則氣上行於頭痹論曰營者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣剽疾滑利不能入於脈也故循皮膚之中分肉之間熏於盲膜散於胸腹禁服篇曰審察衛氣為百病母逆調論曰營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用生氣通天論曰營氣不從逆於肉理乃生癰腫穀氣十營氣篇曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀邪客篇曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中詳脾胃門經脈篇曰谷入於胃脈道以通血氣乃行玉版篇曰人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也詳脾胃門五味篇曰天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣平人絕谷篇曰神者水穀之精氣也詳死生門終始篇曰邪氣來也緊而疾穀氣來也徐而和平人氣象論曰人以水穀為本故人絕水穀則死脈無胃氣亦死詳飲食門病能論曰食人於陰長氣於陽陰陽清濁篇帝曰願聞人氣之清濁岐伯曰受谷者濁受氣者清清者注陰濁者注陽氣味十一六節藏象論曰天食人以五氣地食人以五味詳脾胃門陰陽應象大論曰水為陰火為陽陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣化形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味厚則泄薄則通氣薄則發泄厚則發熱氣味辛甘發散為陽酸苦湧泄為陰形不足者溫之以氣精不足者補之以味經脈別論曰食氣入胃散精於肝詳脾胃門生氣通天論曰陰之所生本在五味陰之五宮傷在五味是故味過於酸肝氣以津脾氣乃絕味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央是故謹和五味骨正筋柔氣血以流腠理以密如是則氣骨以精謹道如法長有天命宣明五氣篇曰五味所禁辛走氣氣病無多食辛詳飲食門酒氣十二經脈篇曰飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛厥論曰酒入於胃則絡脈滿而經脈虛夫酒氣盛而剽悍腎氣日衰陽氣獨勝故手腳為之熱也營衛生會篇帝曰人飲酒酒亦入胃谷未熟而小便獨先下者何也岐伯曰酒者熟谷之液也其氣悍以清故後谷而入先谷而液出焉論勇篇帝曰怯士之得酒怒不避勇士者何藏使然少俞曰酒者水穀之精熟谷之液也其氣剽悍其入於胃中則胃脹氣上逆滿於胸中肝浮膽橫當是之時固比於勇士氣衰則悔與勇士同類不知避之名曰酒悖也邪氣十三刺節真邪論帝曰有一脈生數十病者或痛或癰或熱或寒或癢或痹或不仁變化無窮其故何也岐伯曰此皆邪氣之所生也帝曰余聞氣者有真氣有正氣有邪氣何謂真氣岐伯曰真氣者所受於天與穀氣並而充身也正氣者正風也從一方來非實風又非虛風也邪氣者虛風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間其氣外發腠理開毫毛搖氣往來行則為癢留而不去則為痹衛氣不行則為不仁余義詳本經通評虛實論曰邪氣盛則實精氣奪則虛帝曰虛實如何岐伯曰氣虛者肺虛也氣逆者足寒也非其時則生當其時則死余藏皆如此評熱病論曰邪之所湊其氣必虛小針解曰夫氣之在脈也邪氣在上者言邪氣之中人也高故邪氣在上也濁氣在中者言水穀皆入於胃其精氣上注於肺濁溜於腸胃言寒溫不適飲食不節而病生腸胃故曰濁氣在中也清濕在下者言清濕地氣之中人也必從足始故曰清氣在下也陰陽應象大論曰天之邪氣感則害人五臟水穀之寒熱感則害於六腑地之濕氣感則害皮肉筋脈病氣十四壽夭剛柔篇曰風寒傷形憂恐忿怒傷氣氣傷臟乃病藏寒傷形乃應形風寒傷筋筋脈乃應此形氣外內之相應也脈要精微論曰陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒言而微終日乃復言者此奪氣也刺志論曰氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病脈實血實脈虛血虛此其常也反此者病氣虛身熱此謂反也谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛血少此謂反也脈少血多此謂反也氣盛身寒得之傷寒氣虛身熱得之傷暑谷入多而氣少者得之有所脫血濕居下也谷入少而氣多者邪在胃及與肺也脈小血多者飲中熱也脈大血少者脈有風氣水漿不入此之謂也夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也宣明五氣篇曰五氣所病心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐大腸小腸為泄膀胱不利為癃不約為遺溺膽為怒是謂五病五積所並精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐是謂五並虛而相併者也五勞所傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋是為五勞所傷舉痛論帝曰余知百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生岐伯曰怒則氣逆甚則嘔血及飧泄故氣上矣喜則氣和志達營衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通營衛不散熱氣在中故氣消矣恐則氣卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣炅則腠理開營衛通汗大泄故氣泄矣驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘息汗出外內皆越故氣耗矣思則心有所存神有所歸正氣留而不行故氣結矣舉痛論曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止因重中於寒則痛久矣諸寒氣等義詳心腹痛門本神篇曰肝氣虛則恐實則怒脾氣虛則四肢不用五臟不安實則腹脹涇溲不利心氣虛則悲實則笑不休肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息腎氣虛則厥實則脹五臟不安必審五臟之病形以知其氣之虛實謹而調之也憂愁者氣閉塞而不行口問篇曰上氣不足腦為之不滿詳虛損門生氣通天論曰因於氣為腫四維相代陽氣乃竭俞氣化薄傳為善畏及為驚駭厥論曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥詳厥逆門逆調論帝曰人身非常溫也非常熱也為之熱而煩滿者何也詳寒熱門痹論曰風寒濕三氣雜至合而為痹也詳風痹門痿論帝曰五臟使人痿何也岐伯曰肺熱葉焦則皮毛虛弱急薄者則生痿躄也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱不任地也詳痿證門百病始生篇帝曰積之始生至其已成奈何岐伯曰積之始生得寒乃生厥乃成積也詳積聚門評熱病論曰諸有水氣者微腫先見於目下也月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也至真要大論曰諸氣膹郁皆屬於肺病能論曰有病怒狂者生於陽也陽氣者因暴折而難決故善怒也詳癲狂門陰陽別論曰一陽發病少氣善咳善泄其傳為心掣其傳為隔治氣十五五常政大論曰必先歲氣無伐天和無盛盛無虛虛而遺人夭殃無致邪無失正絕人長命上古天真論曰夫上古聖人之教下也皆謂之虛邪賊風避之有時恬憺虛無真氣從之病安從來上古有真人者提挈天地把握陰陽呼吸精氣獨立守神肌肉若一玉機真藏論曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣命曰易治取之以時形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時為不可治必察四難而明告之疏五過論曰凡欲診病者必問飲食居處暴樂暴苦始樂後苦皆傷精氣精氣竭絕形體毀沮治病之道氣內為寶循求其理求之不得過在表裡六元正紀大論曰司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯間氣同其主無犯異其主則小犯之是謂四畏必謹察之故曰無失天信無逆氣宜無翼其勝無贊其復是謂至治至真要大論帝曰服寒而反熱服熱而反寒其故何也岐伯曰治其王氣是以反也帝曰不治王氣而然者何也曰不治五味屬也夫五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也審察病機無失氣宜此之謂也補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也根結篇曰形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絕滅壯者不復矣形氣有餘病氣有餘此陰陽俱有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也刺法論帝曰五疫之至皆相染易如何可得不相移易者岐伯曰不相染者正氣存內邪不可干避其毒氣天牝從來復得其往氣出於腦即不邪干以上俱經旨總論氣理十六夫人之有生無非受天地之氣化耳及其成形雖有五行五志五臟六腑之辨而總惟血氣為之用然血無氣不行血非氣不化故經曰血者神氣也然則血之與氣誠異名而同類而實惟氣為之主是以天地間陰陽變遷運數治亂凡神神奇奇作於杳冥莫測之鄉者無非氣化之所為使能知此而氣得其正則何用弗臧一有違和而氣失其正則何往弗否故帝曰百病生於氣也又近見應震王氏曰行醫不識氣治病從何據堪笑道中人未到知音處旨哉斯言是實治身治病第一大綱而後學鮮有知者且軒岐言氣既已靡遺奈何久未發明終將冥諱故余摭其精微類述一十五條詳列如前俾後學得明造化之大源則因理觸機而拯濟無窮斯見軒岐贊育之恩與地同矣時崇禎丙子後學介賓謹識論調氣十七夫百病皆生於氣正以氣之為用無所不至一有不調則無所不病故其在外則有六氣之侵在內則有九氣之亂而凡病之為虛為實為熱為寒至其變態莫可名狀欲求其本則止一氣字足以盡之蓋氣有不調之處即病本所在之處也是為明哲不凡者乃能獨見其處撮而調之調得其妙則猶之解結也猶之雪汙也汙去結解而活人於舉指之間誠非難也然而人多難能者在不知氣之理並不知調之法即自河間相傳以來咸謂木香檳榔可以調氣陋亦甚矣夫所謂調者調其不調之謂也凡氣有不正皆賴調和如邪氣在表散即調也邪氣在裡行即調也實邪壅滯瀉即調也虛羸困憊補即調也由是類推則凡寒之熱之溫之清之升之降之抑之舉之發之達之劫之奪之堅之削之泄之利之潤之燥之收之澀之緩之峻之和之安之正者正之假者反之必清必靜各安其氣則無病不除是皆調氣之大法也此外有如按摩導引針灸熨洗可以調經絡之氣又如喜能勝憂悲能勝怒怒能勝思思能勝恐恐能勝喜可以調情志之氣又如五穀五果五菜五畜可以調化育之氣又春夏養陽秋冬養陰避風寒節飲食慎起居和喜怒可以調衛生之氣及其至也則精氣有互根之用陰陽有顛倒之施或以塞之而實以通之或以啟之而實以封之或人見其有而我見其無或病若在此反以治彼惟智者能見事之未然惟仁人能惜人之固有若此者何莫非調之之謂人能知此豈惟卻病而凡內而身心外而庶政皆可因之而無弗調矣甚矣調之為義其道圓矣其用廣矣有神有據無方無隅有不可以言宣者言難盡意也有不可跡拘者跡難求全也故余於本門但援經悉理不敢執方蓋亦恐一曲之談有不可應無窮之變也倘有所須則各門具列論治所當互證酌宜而無負調和之手斯於斯道可無愧矣述古十八共二條張子和云九氣之氣如天地之氣常則安變則病而況人稟天地之氣五運迭侵於外七情交戰於中是以聖人嗇氣如持至寶庸人役物反傷太和此軒岐之所以謂諸痛皆因於氣百病皆生於氣遂有九氣不同之說氣本一也因所觸而為九怒喜悲恐寒炅驚思勞也怒氣所致為嘔血為飧泄為煎厥為薄厥為陽厥為胸滿脅痛食則氣逆而不下為喘喝煩心為消癉為肥氣為目盲為耳閉筋緩發於外為癰疽喜氣所致為笑不休為毛革焦為肉病為陽氣不收甚則為狂悲氣所致為陰縮為筋攣為肌痹為肺痿男為溲血女為血崩為酸鼻辛頞為目昏為少氣不能接息為泣則臀麻恐氣所致為破䐃脫肉為骨酸痿厥為暴下清水為面熱膚急為陰痿為懼而脫頤驚氣所致為潮涎為目睘為口噤為癡癇為不省人事為僵仆久則為𤸷痹思氣所致為不眠為嗜臥為昏瞀為中痞三焦閉塞為咽嗌不利為膽癉嘔苦為筋痿為白淫為得後與氣則快然而衰為不嗜食寒氣所致為上下所出水液澄澈清冷下利青白炅氣所致為喘嘔吐酸暴注下迫丹溪曰氣無補法世俗之誤也氣實而壅盛者不必補內傷勞役正氣虛者不補而何若正氣虛而不補是虛而益虛則脾胃運化納受皆失其職陰不升而陽不降所謂天地不交之否也經曰虛者補之人參黃耆之屬是也若不審虛實悉以破氣行氣之藥與之以天真元氣耗絕而死者醫殺之耳
