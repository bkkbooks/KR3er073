body:
  text: 卷之二十八必集雜證謨聲喑經義脈解篇曰所謂入中為喑者陽盛已衰故為喑也內奪而厥則為喑俳此腎虛也少陰不至者厥也經脈篇曰手少陰之別名曰通里循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也足陽明之別名曰豐隆其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑實則狂巔虛則足不收脛枯取之所別也奇病論帝曰人有重身九月而喑此為何也岐伯對曰胞之絡脈絕也胞絡者繫於腎少陰之脈貫腎系舌本故不能言帝曰治之奈何岐伯曰無治也當十月復帝曰有病膺腫頸痛胸滿腹脹此為何病何以得之岐伯曰名厥逆帝曰治之奈何岐伯曰灸之則喑石之則狂須其氣並乃可治也帝曰何以然岐伯曰陽氣重上有餘於上灸之則陽氣入陰入則喑石之則陽氣虛虛則狂大奇論曰胃脈沉鼓澀胃外鼓大心脈小急堅皆膈偏枯男子發左女子發右不喑舌轉可治三十日起其從者喑三歲起年不滿二十者三歲死肝脈騖暴有所驚駭脈不至若喑不治自已憂恚無言篇帝曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方少師曰咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也口唇者音聲之扇也舌者音聲之機也懸雍垂者音聲之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣泄也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客於厭則厭不能發發不能下至其開闔不致故無音帝曰刺之奈何岐伯曰足之少陰上繫於舌絡於橫骨終於會厭兩瀉其血脈濁氣乃闢會厭之脈上絡任脈取之天突其厭乃發也逆調論曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也夫起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也宣明五氣篇曰五邪所亂邪入於陽則狂邪入於陰則痹搏陽則為巔疾搏陰則為喑陽入之陰則靜陰出之陽則怒是謂五亂脈要精微論曰心脈搏堅而長當病舌卷不能言其耎而散者當消環自已生氣通天論曰陽不勝其陰則五臟氣爭九竅不通脈度篇曰五臟常內閱於上七竅也五臟不和則七竅不通邪氣臟腑病形篇曰心脈澀甚則為喑寒熱病篇曰暴喑氣硬取扶突與舌本出血寶命全形論曰夫鹽之味鹹者其氣令器津泄弦絕者其音嘶敗木敷者其葉發病深者其聲噦人有此三者是謂壞府毒藥無治短針無取此皆絕皮傷肉血氣爭黑熱病篇曰痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也陰陽應象大論曰東方生風在地為木在臟為肝在音為角在聲為呼南方生熱在地為火在臟為心在音為徵在聲為笑中央生濕在地為土在臟為脾在音為宮在聲為歌西方生燥在地為金在臟為肺在音為商在聲為哭北方生寒在地為水在臟為腎在音為羽在聲為呻論證共二條聲音出於臟氣凡臟實則聲弘臟虛則聲怯故凡五臟之病皆能為喑如以憂思積慮久而至喑者心之病也驚恐憤郁瘁然致喑者肝之病也或以風寒襲於皮毛火燥刑于金臟為咳為嗽而致喑者肺之病也或以飢飽或以疲勞致敗中氣而喘促為喑者脾之病也至於酒色過傷欲火燔爍以致陰虧而盜氣於陽精竭而移稿於肺肺燥而嗽嗽久而喑者此腎水枯涸之病也是五臟皆能為喑者其概如此然舌為心之苗心病則舌不能轉此心為聲音之主也聲由氣而發肺病則氣奪此氣為聲音之戶也腎藏精精化氣陰虛則無氣此腎為聲音之根也經曰言而微終日乃復言者此氣之奪也而況於無聲者乎是知聲音之病雖由五臟而實惟心之神肺之氣腎之精三者為之主耳然人以腎為根蒂元氣之所由生也故由精化氣由氣化神使腎氣一虧則元陽寢弱所以聲音之標在心肺而聲音之本則在腎觀之經云陽盛已衰故為喑也內奪而厥則為喑俳此腎虛也然則腎為聲音之根信非謬矣一喑啞之病當知虛實實者其病在標因竅閉而喑也虛者其病在本因內奪而喑也竅閉者有風寒之閉外感證也有火邪之閉熱乘肺也有氣逆之閉肝滯強也風閉者可散而愈火閉者可清而愈氣閉者可順而愈此皆實邪之易治者也至若痰涎之閉雖曰有虛有實然非治節不行何致痰邪若此此其虛者多而實者少當察邪正分緩急而治之可也內奪者有色欲之奪傷其腎也憂思之奪傷其心也大驚大恐之奪傷其膽也飢餒疲勞之奪傷其脾也此非各求其屬而大補元氣安望其嘶敗者復完而殘損者復振乎此皆虛邪之難治者也然難易之辨固若此而猶有難易之辨者則辨其久暫辨其病因乃可悉焉蓋暫而近者易漸而久者難脈緩而滑者易脈細而數者難素無損傷者易積有勞怯者難數劑即開者易久藥罔效者難此外復有號叫歌唱悲哭及因熱極暴飲冷水或暴吸風寒而致喑者乃又其易者也若此者但知養息則弗藥可愈是皆所當辨者論治共七條一風寒襲於皮毛則熱鬱於內肺金不清而閉塞喉竅咳嗽甚而聲喑者宜參蘇飲二陳湯小青龍湯金水六君煎三抝湯之類以散之一火邪侵肺上焦熱甚而聲喑者宜四陰煎麥門冬湯主之心火盛者二陰煎胃火上炎者竹葉石膏湯肝膽火盛者柴胡清肝散之類主之勞瘵痰嗽挾火者竹衣麥門冬湯主之一肝邪暴逆氣閉為喑者宜小降氣湯潤下丸七氣湯之類主之一痰氣滯逆而為喑者如二陳湯六安煎貝母丸潤下丸之類皆治標之可用者或用鹽湯探吐之亦可其有虛痰或痰火之甚者當於痰飲門參酌治之一虛損為喑者凡聲音之病惟此最多當辨而治之凡色欲傷陰病在腎者宜六味丸八味丸左歸丸右歸丸人參平肺湯大補元煎之類主之或兼肺火者宜一陰煎四陰煎人參固本丸之類擇而用之凡大驚大恐猝然致喑者肝膽受傷也宜七福飲五福飲十味溫膽湯平補鎮心丹定志丸之類主之凡飢餒疲勞以致中氣大損而為喑者其病在脾宜歸脾湯理陰煎補中益氣湯補陰益氣煎溫胃飲之類主之凡憂思過度致損心脾而為喑者宜七福飲歸脾湯之類主之凡病人久嗽聲啞者必由元氣大傷肺腎俱敗但宜補肺氣滋腎水養金潤燥其聲自出或略加訶子百藥煎之類兼收斂以治其標務宜先本後末庶可保全若見其假熱而過用寒涼或見其痰盛而妄行消耗則未有一免者矣一凡患風毒或病喉癰病既愈而聲則喑者此其懸雍已損雖喑無害也不必治之一久病人不語者心氣已絕不治簡易方一方治失聲不出用蘿蔔搗自然汁入薑汁少許時時細飲之一方用皂角一條去皮子同蘿蔔三個煎服數次聲即出一方治無故咽喉聲音不出用橘皮五兩水三升煮一升頓服效一方治猝啞用杏仁三分去皮煎熬別杵桂末一分和搗如泥每用杏核大一丸綿裹噙口中細細嚥之日三夜五一方用密陀僧為極細末每服一錢點茶飲之聲即出按上方皆治標之法凡猝喑輕淺者亦可取效若系根本之病不得概以為用聲喑論列方一陰煎新補八二陰煎新補十大補元煎新補一五福飲新補六七福飲新補七補中益氣湯補三十歸脾湯補三二溫胃飲新熱五補陰益氣煎新補十六六味丸補百二十八味丸補一二一金水六君煎新和一左歸丸新補四右歸丸新補五人參固本丸補百六定志丸補百十六六安煎新和二柴胡清肝散寒五九二陳湯和一參蘇飲散三四平補鎮心丹補百十三抝湯散七八七氣湯和四七竹葉石膏湯寒六四陰煎新補十二潤下丸和百十七人參平肺湯因一八七理陰煎新熱三麥門冬湯寒四四十味溫膽湯和一五三華蓋散散七九小青龍湯散八竹衣麥門冬湯因一八九貝母丸新和十八小降氣湯和四二論外備用方百合丸因一八八肺燥失聲杏仁煎因一八三咳嗽失聲訶子甘桔湯因一七八火盛失音鐵笛丸因一九一謳歌失音靛花丸因一八二喉風失音咽喉經義憂恚無言篇曰咽喉者水穀之道也喉嚨者氣之所以上下者也詳前聲喑門陰陽別論曰一陰一陽結謂之喉痹厥論曰手陽明少陽厥逆發喉痹嗌腫經脈篇曰足陽明之別上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑三焦手少陽也是動則病嗌腫喉痹小腸手太陽也是動則病嗌痛頷腫腎足少陰也是所生病口熱舌乾咽腫上氣嗌乾及痛骨空論曰督脈為病嗌乾五音五味篇曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口脈解篇曰厥陰所謂甚則嗌乾熱中者陰陽相薄而熱故嗌乾也奇病論曰肝者中之將也取決於膽咽為之使雜病篇曰嗌乾口中熱如膠取足少陰雜病篇曰喉痹不能言取足陽明能言取手陽明熱病篇曰喉痹舌卷口中乾煩心心痛臂內廉痛不可及頭取手小指次指爪甲下去端如韭葉繆刺論曰邪客於手少陽之絡令人喉痹舌卷口乾心煩刺手中指次指爪甲上去端如韭葉各一痏邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上刺足下中央之脈各三痏嗌中腫不能內唾時不能出唾者刺然骨之前出血立已左刺右右刺左六元正紀大論曰少陽司天三之氣喉痹目赤善暴死少陰司天嗌乾腫上至真要大論云歲太陰在泉嗌腫喉痹太陽在泉寒淫所勝民病嗌痛頷腫太陰之勝喉痹項強少陽司天客勝則丹疹外發喉痹頭痛嗌腫論證共三條喉痹一證在古方書雖有十八證之辨而古人悉指為相火然此證雖多由火而復有非火證者不可不詳察也蓋火有真假凡實火可清者即真火證也虛火不宜清者即水虧證也且復有陰盛格陽者即真寒證也故內經曰太陽在泉寒淫所勝民病嗌痛頷腫其義即此何後人之弗究也一喉痹所屬諸經凡少陽陽明厥陰少陰皆有此證具列如前但其中虛實各有不同蓋少陽厥陰為木火之臟固多熱證陽明為水穀之海而胃氣直透咽喉故又惟陽明之火為最盛欲辨此者但察其以情志鬱怒而起者多屬少陽厥陰以口腹肥甘辛熱太過而起者多屬陽明凡患此者多宜以實火論治至若少陰之候則非此之比蓋少陰之脈絡於橫骨終於會厭繫於舌本凡陰火逆衝於上多為喉痹但少陰之火有虛有實不得類從火斷若果因實火自有火證火脈亦易知也若因酒色過度以致真陰虧損者此腎中之虛火證也非壯水不可又有火虛於下而格陽於上此無根之火即腎中之真寒證也非溫補命門不可凡此諸經不同而虛實大異皆後人所罕知者獨褚氏遺書有上病察下之說誠見道之言也一咽喉證總謂之火則名目雖多似有不必盡辨者然亦有不可不辨者如單乳蛾雙乳蛾及纏喉風之有不同也蓋腫於咽之兩旁者為雙蛾腫於一邊者為單蛾此其形必圓突如珠乃癰節之類結於喉間故多致出毒或宜刺出其血而愈者若纏喉風則滿片紅腫多不成膿亦不必出血但使火降其腫自消此其所以有異而治之當有法也論治共九條一火證喉痹悉宜以抽薪飲主之火不甚者宜徙薪飲主之凡肝膽之火盛者宜以芍藥梔子龍膽草為主陽明胃火甚者宜以生石膏為主若大便秘結不通則宜加大黃芒硝之屬通其便而火自降凡火浮於上而熱結於頭面咽喉者最宜清降切不可用散風升陽等劑蓋此火由中得升愈熾經曰高者抑之正此之謂非火鬱宜發及升陽散火之義學者於此最當體察勿得誤認其面目凡外治火證腫痛之法宜以木別子磨醋用鵝翎蘸攪喉中引去其痰或另少和清水免其太酸時時呷嗽喉中不可嚥下引吐其痰為更善漱後以代匙散吹之仍內服煎藥自無不愈凡火壅於上而食物之治最宜雪梨漿綠豆飲之屬為妙若南方少梨之處或以好蘿蔔杵汁和以清泉少加玄明粉攪勻徐徐飲之既可消痰亦可清火凡單雙乳蛾若毒未甚膿未成者治之自可消散若勢甚而危者必須砭出其血庶可速退此因其急亦不得已而用之也又古法用三稜針刺少商穴出血云治喉痹立愈一陰虛喉痹其證亦內熱口渴喉干或唇紅頰赤痰涎壅盛然必尺脈無神或六脈雖數而浮軟無力但察其過於酒色或素稟陰氣不足多倦少力者是皆腎陰虧損水不制火而然火甚者宜滋陰八味煎加減一陰煎之類主之火微而不喜冷物及大便不堅小便不熱者宜六味地黃湯一陰煎之類主之若因思慮焦勞兼動心火者宜二陰煎主之一格陽喉痹由火不歸元則無根之火客於咽喉而然其證則上熱下寒全非火證凡察此者但診其六脈微弱全無滑大之意且下體絕無火證腹不喜冷即其候也蓋此證必得於色欲傷精或泄瀉傷腎或本無實火而過服寒涼以傷陽氣者皆有此證速宜用鎮陰煎為上八味地黃湯次之或用蜜附子含咽亦妙若再用寒涼必致不救一陽虛喉痹非喉痹因於陽虛乃陽虛因於喉痹也蓋有因喉痹而過於攻擊致傷胃氣者有艱於食飲倉廩空虛亦傷胃氣者又有氣體素弱不耐勞倦而傷胃氣者凡中氣內虛疼痛外逼多致元陽飛越脈浮而散或弱而澀以致聲如鼾睡痰如拽鋸者此肺胃垂絕之候速宜挽回元氣以人參一味濃煎放心徐徐飲之如痰多者或加竹瀝薑汁亦可如遲多致不救如作實火治之則禍如反掌一喉癬證凡陰虛勞損之人多有此病其證則滿喉生瘡紅痛久不能愈此實水虧虛火證也宜用前陰虛喉痹之法治之若多咳嗽肺熱宜以四陰煎之類主之若滿喉生瘡破爛而痛者宜用牛黃益金散吹敷之仍內服滋補真陰之劑自可全愈一瘟毒喉痹乃天行瘟疫之氣其證則咽痛項腫甚有頸面頭項俱腫者北方尤多此病俗人呼為蝦蟆瘟又名顱鷀瘟亦名大頭瘟此濕熱壅盛最凶之候宜清諸經之火或瀉陽明之熱當察緩急而治之東垣有普濟消毒飲專治瘟毒喉痹百發百中一鎖喉風證時人以咽喉腫痛飲食難入或痰氣壅塞不通者皆稱為鎖喉風而不知有真正鎖喉風者甚奇甚急而實人所未知也余在燕都嘗見一女子年已及笄忽一日於仲秋時無病而喉竅緊澀息難出入不半日而緊澀愈甚及延余視診其脈無火也問其喉則無腫無痛也觀其貌則面青瞠目不能語也聽其聲則喉竅之細如針抽息之窘如線伸頸掙命求救不堪之狀甚可憐也余見而疑之不得其解然意謂風邪閉塞喉竅非用辛溫不能解散遂以二陳湯加生薑煎而與之毫忽無效意復用獨參湯以救其肺然見其勢危若此恐滋怨謗終亦未敢下手他醫見之亦但束手而已如此者一日夜而歿後又一人亦如此而歿若此二人者余至今莫識其所以病此終身之疑竇殊自愧也然意必肺氣竭絕而然倘再有值此者恐非獨參湯決不能救故筆諸此以俟後之君子虛心詳酌焉一楊梅結毒有喉間潰爛作痛久而不愈者此非喉痹之屬乃楊梅瘡毒也宜仙遺糧湯甚者宜以土茯苓煎湯吞五寶丹一諸物哽於喉中或刺或骨必有鋒芒之逆所以刺而不下凡下而逆者反而上之則順矣故治此者當借飲食之勢湧而吐之使之上出則如拔刺之捷也若芒刺既深必欲推下非惟理勢不能必且延遲或食飲既消無可推送以致漸腫則為害非細矣凡諸骨鯁或以餳糖一大塊滿口吞而咽之或用韭菜煮略熟勿切吞下一束即裹而下亦妙述古共二條張子和曰喉痹病大概痰火所致急者宜吐痰後復下之上下分消而愈又甚者以針刺去血然後用藥吐下此為治之上策若人畏懼而委曲旁求瞬息喪命治喉痹之火與救火同不容少待內經曰火鬱發之發散也吐中有發散之義出血者亦發散之端也治斯疾者毋執緩方小方而藥之曰吾藥乃王道不動臟腑若幸遇疾之輕者而獲愈疾之重者循死矣豈非誤殺也耶龐氏曰伏氣之病古方謂之腎傷寒謂非時有暴寒中人毒氣伏於少陰經始初不病旬月乃發脈微弱法當以傷寒治之非喉痹之病也次必下痢愚按此證亦所嘗有是必以少陰少陽之火令太陽之寒令太陰之濕令而復兼風寒之邪者皆有此證故治此者不必治喉痹但治外邪其喉自愈即如新方諸柴胡飲及散陣諸方皆可隨宜酌用格陽喉痹新按余友王蓬雀年出三旬初未識面因患喉痹十餘日延余診視見其頭面浮大喉頸粗極氣急聲啞咽腫口瘡痛楚之甚一婢倚背坐而不臥者累日矣及察其脈則細數微弱之甚問其言則聲微似不能振者詢其所服之藥則無非芩連梔柏之屬此蓋以傷陰而起而復為寒涼所逼以致寒盛於下而格陽於上即水飲之類俱已難入而尤畏煩熱余曰危哉再遲半日必不救矣遂與鎮陰煎以冷水頓冷徐徐使咽之用畢一煎過宿而頭項腫痛盡消如失餘次早見之則癯然一瘦質耳何昨日之巍然也遂繼用五福飲之類數劑而起疑者始皆駭服自後感余再生遂成莫逆虛損喉癬新按一來宅女人年近三旬因患虛損更兼喉癬疼痛多醫罔效余診其脈則數而無力察其證則大便溏泄問其治則皆退熱清火之劑然愈清火而喉愈痛察之既確知其本非實火而且多用寒涼以致肚腹不實總亦格陽之類也遂專用理陰煎及大補元煎之類出入間用不半月而喉痛減不半年而病全愈小兒吞釘新按一王氏子甫周歲其母以一鐵釘與之玩弄不覺納之口中吞入喉間其父號呼求救余往視之但見其母倒提兒足以冀其出口鼻皆血危劇之甚余曉之曰豈有倒懸可以出釘而能無傷命者哉因速令抱正遂聞啼聲余曰釘已下咽不在喉矣其父曰嬌嫩之臟安能堪此但因其哀求之切不得不允姑以慰之然計無從出而逼索方藥頃刻數四餘隻得靜坐齋頭潛思熟計亦無所得乃取本草一玩覬啟其幾見所載曰鐵畏朴硝遂得一計乃用活磁石一錢朴硝二錢並研為末付其父令以熬熟豬肉加蜜和調藥末與之於申末之頃盡吞之至次早其父匍匐階前曰昨於三鼓時忽解下一物大如芋子瑩如蓴菜潤滑無稜藥護其外撥而視之則釘在其中矣持以視余乃京中釘鞋所用蘑菇釘也其父索其方並問其故余曰所用者芒硝磁石耳蓋硝非磁石不能使藥附釘磁石非硝不能逐釘速出非油則無以潤非蜜則未必吞合是四者則著者著逐者逐潤者潤同功合力裹護而出矣公亦以為然否其父手額稱謝曰神哉不可泯也宜筆記之以資後人之識焉附按薛立齋治一婦人咽間作痛兩月後始潰而不斂遍身筋骨亦痛諸藥不應先以土萆薢湯數劑而斂更以四物湯倍加土茯苓黃耆二十餘劑諸證悉愈又一彌月小兒先於口內患之後延於身年餘不愈以土茯苓為末乳汁調服母以白湯調服月餘而愈又一男子以生廣瘡服輕粉稍愈後復發又服輕粉稍愈繼後大發喉齶潰蝕與鼻相通臂腿數枚如桃大潰年餘不斂虛證悉具投以萆薢湯為主佐以健脾諸藥月餘而安又一婦人臉鼻俱蝕半載不斂治以前藥而愈按此方本治淫瘡味甘而利善去濕熱和血脈所以凡諸瘡毒皆宜用之其效未可盡述咽喉論列方抽薪飲新寒三徙薪飲新寒四土萆薢湯外一九九一陰煎新補八二陰煎新補十仙遺糧湯外一九八五福飲新補六獨參湯補三五六味地黃湯補百二十四物湯補八二陳湯和一滋陰八味煎新寒十七綠豆飲新寒十四理陰煎新熱三加減一陰煎新補九雪梨漿新寒十六鎮陰煎新熱十三普濟消毒飲寒十三五寶丹外二百五四陰煎新補十二牛黃益金散因一八五蜜附子因一八四代匙散新因四八大補元煎新補一八味地黃丸補一二一論外備用方甘露飲寒十加減八味丸補一二二直指黃芩湯寒百七心肺熱咽喉諸方詳因陣一七五至二百一止齒牙經義上古天真論曰女子七歲腎氣盛齒更髮長三七腎氣平均故真牙生而長極丈夫八歲腎氣實髮長齒更三八腎氣平均筋骨勁強故真牙生而長極五八腎氣衰發墮齒槁八八則齒髮去邪客篇曰天有列星人有牙齒五味論帝曰苦走骨多食之令人變嘔何也少俞曰苦入於胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也經脈篇曰手陽明之脈其支者從缺盆上頸貫頰入下齒中足陽明之脈下循鼻外入上齒中還出挾口環唇下交承漿寒熱病篇曰臂陽明有入頄遍齒者名曰大迎下齒齲取之臂惡寒補之不惡寒瀉之足太陽有入頄遍齒者名曰角孫上齒齲取之在鼻與頄前方病之時其脈盛盛則瀉之虛則補之骨寒熱者病無所安汗注不休齒未槁取其少陰於陰股之絡齒已槁死不治骨厥亦然雜病篇曰齒痛不惡清飲取足陽明惡清飲取手陽明論證共四條齒牙之病有三證一曰火二曰蟲三曰腎虛凡此三者病治各有不同辨得其真自無難治之齒病矣凡火病者必病在牙床肌肉間或為腫痛或為糜爛或為臭穢脫落或牙縫出血不止是皆病在經絡而上牙所屬足陽明也止而不動下牙所屬手陽明也嚼物則動而不休此之為病必美酒厚味膏粱甘膩過多以致濕熱蓄於腸胃而上壅於經乃有此證治宜戒厚味清火邪為主蟲痛者其病不在經而在牙亦由肥甘濕熱化生牙蟲以致蝕損蛀空牙敗而痛治宜殺蟲為主濕熱勝者亦宜兼清胃火腎虛而牙病者其病不在經而在臟蓋齒為骨之所終而骨則主於腎也故曰腎衰則齒豁精固則齒堅至其為病則凡齒脆不堅或易於搖動或疏豁或突而不實凡不由蟲不由火而齒為病者必腎氣之不足此則或由先天之稟虧或由後天之斫喪皆能致之是當以專補腎氣為主一齒有傷於外因者或以擊損或以跌撲或勉強咬嚼堅硬等物久之無不損齒此豈藥之可療知者自當慎也一種齒法古有晨昏叩齒之說雖亦可行然而谷谷震動終非盡善之道余每因勞因酒亦嘗覺齒有浮突之意則但輕輕咬實務令漸咬漸齊或一二次或日行二三次而根自固矣又凡於小解時必先咬定牙根而後解則腎氣亦賴以攝非但固精亦能堅齒故餘年逾古稀而齒無一損亦大得此二方之力一金丹全書云今人漱齒每以早晨是倒置也凡一日飲食之毒積於齒縫當於夜晚刷洗則垢穢盡去齒自不壞故云晨漱不如夜漱此善於養齒者今觀智者每於飯後必漱則齒至老堅白不壞斯存養之功可見矣論治共六條一陽明熱壅牙痛宜清胃散清胃飲之類主之若火之甚者宜抽薪飲太清飲之類主之皆所以清其源也若腎陰本虛胃火復盛上實下虛而為熱渴腫痛者玉女煎為最妙一牙痛外敷之藥惟辛溫可以散熱宜細辛煎丁香散薑黃散赴筵散之類主之然惟二辛煎三香散為尤妙一蟲牙蛀空疼痛宜瑞竹堂方韭子湯巴豆丸藜蘆散皆可擇而用之一牙縫出血不止無非胃火所致宜以前清胃等藥主之亦有陰虛於下格陽於上則六脈微細全非實熱火證牙縫之血大出不能止而手足厥冷者速宜以鎮陰煎主之若誤用寒涼必致不救一腎虛牙齒不固或搖動或脆弱浮突者雖宜以補腎為主然亦當辨其寒熱凡左歸丸六味丸可壯腎中之陰右歸丸八味丸可補腎中之陽須通加骨碎補丸服尤妙若齒牙浮動脫落或牙縫出血而口不臭亦無痛者總屬陰中之陽虛宜安腎丸之類主之一走馬牙疳牙床腐爛齒牙脫落謂之走馬者言其急也此蓋熱毒蘊蓄而然凡病此者大為凶候初見此證速宜內瀉陽明之火兼以綠豆飲常服之外用冰白散三仙散麝礬散北棗丹之類敷之丹溪法曰用干北棗燒存性同枯白礬為末敷之神效述古共二條聖惠方云熱者怕冷水宜用牙硝薑黃雄黃荊芥等治之冷者怕熱湯宜用乾薑蓽茇等治之不怕冷熱乃風牙以豬牙皂角殭蠶蜂房草烏治之有孔者為蟲牙宜雄黃石灰砂糖等治之用藥了皆以溫水漱之薛立齋曰齒痛若因手足陽明經濕熱用東垣清胃散若因風寒入腦腦痛齒亦痛用羌活附子湯若因思慮傷脾用歸脾湯若因鬱火所致用越鞠丸若因酒面炙爆而發用清胃散若因飲食傷脾用六君子湯若因勞傷元氣用補中益氣湯若因脾胃素弱用六君子當歸升麻若因腎經陰虛用六味丸若因腎經陽虛用八味丸若陰陽俱虛用十補丸若脾腎虛寒用安腎丸徐用誠先生云凡齒痛惡寒熱等證屬足手陽明經齒搖斷脫屬足少陰經齒蝕腫痛出血皆胃火所致也亦有諸經錯雜之邪與外因為患者附按醫統云宋汪丞相之寵好食厚味一日熱大作齒間壅出有肉漸大脹滿口不能閉水漿不入一醫用生地黃汁一碗牙皂角數挺火上炙熱蘸汁令盡為末敷壅肉上隨即消縮不日而愈針灸法足內踝二尖治上牙痛灸之足三里治上齒痛灸四十九壯手三間治下齒痛灸七壯列缺灸七壯永不發合谷齒齲灸之內庭下牙痛針灸皆可陽谷治上牙痛在手外踝骨尖左灸右右灸左十一壯屢驗神效太淵治風牙肩髃七壯隨左右灸之耳垂下盡骨上穴灸三壯痛即止如神一法治一切牙痛以草量手中指至掌後橫紋止將草折作四分去三留一於橫紋後量臂中隨痛左右灸三壯即愈一經驗法於耳前鬢髮尖內有動脈處隨痛左右用小艾炷灸五七壯神效亦不必貼膏藥如再發再灸即可斷根齒牙論列方清胃飲寒五六清胃散寒五四補中益氣湯補三十抽薪飲新寒三冰玉散新因四六四七羌活附子湯散五九太清飲新寒十三三仙散因一五四六君子湯補五綠豆飲新寒十四藜蘆散因一五一瑞竹堂方因一四九歸脾湯補三二三香散新因四九韭子湯因一四八麝礬散因一五五六味丸補百二十玉女煎新寒十二丁香散因一四二八味丸補一二一鎮陰煎新熱十三薑黃散因一六四左歸丸新補四細辛煎因百四十赴筵散因一四五右歸丸新補五二辛煎新因四五越鞠丸和一五四十補丸熱一七三北棗丹因一五二巴豆丸因百五十安腎丸因一三八論外備用方良方蘆薈丸寒一六八疳蟲齒牙諸方詳因陣一三五至一七四止
