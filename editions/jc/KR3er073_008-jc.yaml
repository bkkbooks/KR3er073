body:
  text: 卷之八須集傷寒典下溫病暑病三十三溫病暑病之作本由冬時寒毒內藏故至春發為溫病至夏發為暑病此以寒毒所化故總謂之傷寒仲景曰發熱不惡寒而渴者溫病也暑病則尤甚矣蓋暑病者即熱病也是雖與寒證不同然亦因時而名非謂其病必皆熱也此外如夏月中暑者亦謂之暑病則又非寒毒蓄留之證在仲景則名之為中暍義詳暑證門所當參閱一溫病暑病之治宜從涼散固其然也然必表裡俱有熱證方可治用清涼若值四時寒邪客勝感冒不正之氣表邪未解雖外熱如火而內無熱證可據者不得以溫暑之名執以為熱而概用涼藥一冬有非時之暖或君相客熱之令而病熱者名曰冬溫此與冬月正傷寒大異法宜涼解此舍時從證也若夏月有寒者其宜溫亦然素問刺志論曰氣盛身寒得之傷寒氣虛身熱得之傷暑傷寒論曰脈盛身寒得之傷寒脈虛身熱得之傷暑此二論之言傷寒傷暑者非即溫病暑病之謂蓋單指夏月感觸時氣者所當辨其為寒為暑而寒則宜溫暑則宜清也身寒者言受寒憎寒身熱者言受熱發熱非曰身冷者方是傷寒身熱者乃是傷暑也但此二論則一曰氣盛氣虛一曰脈盛脈虛詞若異而理則一也故凡察氣者當在形色察脈者當在本元合而觀之則見理精矣發斑三十四發斑證輕則如疹子重則如錦紋其致此之由雖分數種然總由寒毒不解而然如當汗不汗則表邪不解當下不下則里邪不解當清不清則火盛不解當補不補則無力不解或下之太早則邪陷不解或以陽證誤用溫補則陽亢不解或以陰證誤用寒涼則陰凝不解凡邪毒不解則直入陰分鬱而成熱乃致液涸血枯斑見肌表此實毒邪固結營衛俱劇之證也但斑有微甚勢有重輕輕者細如蚊跡或先紅而後黃重者成粒成片或先紅而後赤輕者只在四肢重者乃見胸腹輕者色淡而隱重者色紫而顯若見黑斑或大便自利或短氣或二便不通則十死九矣凡病傷寒而汗下溫清俱不能解及足冷耳聾煩悶咳嘔者便是發斑之候一成無己曰大熱則傷血熱不散裡實表虛熱邪乘虛出於皮膚而為斑也慎不可發汗若汗之重令開泄更增斑爛也自後諸家所述皆同此說予則以為不然蓋凡傷寒之邪本自外而入深入不解則又自內而出此其表裡相乘勢所必至原非表虛證也但使內外通達則邪必由表而解矣即如犀角地黃湯乃治斑之要藥人知此湯但能涼血清毒而不知此湯善於解表散邪若用之得宜則必通身大汗熱邪頓解何為不可汗耶由此言之則凡脈數無汗表證俱在者必須仍從解散一凡治發斑須察表裡如瘟疫不解熱入血室舌焦煩熱發斑者犀角地黃湯內外俱熱陽明狂躁大渴發斑者白虎湯或加人參陽毒赤斑狂言見血者陽毒升麻湯疫癘發斑大熱而燥者三黃石膏湯火鬱於經寒邪不解脈仍滑數而發斑者一柴胡飲陽明外邪陽毒不解者升麻湯脾腎本虛外邪不解而發斑者五柴胡飲陽明表邪不解溫熱發斑者柴胡白虎煎溫熱毒盛咽痛發斑者玄參升麻湯陰虛水虧血熱發斑者玉女煎陰虛血燥大熱大渴發斑者歸葛飲內虛外實陰盛格陽發斑者大溫中飲太陽陽明惡熱大便秘結邪毒在腑發斑者調胃承氣湯一凡本非陽證妄用寒涼者每令泄瀉邪陷不解予常用大溫中飲理陰煎之類解寒托邪始得大汗汗後邪達多有見赤斑風餅隨汗而出隨出隨沒頃刻即愈活者多人矣凡寒毒為斑即此可見使內托無力則此毒終無出期日深日甚難乎免矣此理甚微不可不察發黃三十五凡發黃黃疸等證多由濕熱如小水不利或黃或赤或小腹脹滿不痛或大便實而渴甚脈來沉實有力皆濕熱之證輕則茵陳五苓散重則茵陳湯分利小便清血瀉火則黃自退矣然黃有陰證及諸治法俱詳黃疸門宜參用之仲景曰太陽病脈浮而動數頭痛發熱微盜汗出而反惡寒者表未解也醫反下之則為結胸若不結胸但頭汗出小便不利身必發黃也曰陽明病無汗小便不利心中懊憹者身必發黃陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗際頸而還小便不利渴飲水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之曰傷寒脈浮而緩手足自溫者系在太陰身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也曰傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之傷寒身黃髮熱者梔子柏皮湯主之孫真人曰黃疸脈浮者當以汗解之宜桂枝加黃耆湯發狂三十六傷寒發狂本陽明實熱之病然復有如狂證者雖似狂而實非狂此中虛實相反最宜詳辨不可忽也凡實熱之狂本屬陽明蓋陽明為多氣多血之經陽邪傳入胃腑熱結不解因而發狂內經陽明脈解篇曰胃者土也故聞木音而驚者土惡木也其惡火者熱甚則惡火也其惡人者以陽明厥則喘而惋惋則惡人也其病甚則棄衣而走登高而歌或數日不食或逾垣上屋者以四肢為諸陽之本陽盛則四肢實實則能登高也其棄衣而走者以熱盛於身也其妄言罵詈不避親疏而歌者以陽盛為邪也又曰陰不勝其陽則脈流薄疾並乃狂又曰邪入於陽則狂是皆以陽明熱邪上乘心肺故令神志昏亂若此此陽狂也然傷寒病至發狂是為邪熱已極使非峻逐火邪則不能已故但察其大便硬結或腹滿而堅有可攻之證則宜以大小承氣或涼膈散六一順氣湯之類下之可也如無脹滿實堅等證而惟胃火致然者則但以白虎湯抽薪飲之類泄去火邪其病自愈一如狂證本非實熱發狂其證亦有輕重如仲景曰太陽病不解熱結膀胱其人如狂其外證不解者尚未可攻當先解外外已解但少腹急結者乃可攻之宜桃仁承氣湯又曰太陽病六七日表證仍在脈微而沉反不結胸其人如狂者以熱在下焦少腹當硬滿小便自利者下其血乃愈抵當湯主之按此二條以太陽熱邪不解隨經入腑但未至發狂故曰如狂此以熱搏血分蓄聚下焦故宜下也一近見傷寒家則別有如狂之證古人所未及言者蓋或由失志而病其病在心也或由悲憂而病其病在肺也或由失精而病其病在腎也或由勞倦思慮而病其病在肝脾也此其本病已傷於內而寒邪復感於外則病必隨邪而起矣其證如狂亦所謂虛狂也而虛狂之證必外無黃赤之色剛暴之氣內無胸腹之結滑實之脈雖或不時躁擾而禁之則止口多妄誕而聲息不壯或眼見虛空或驚惶不定察其上則口無焦渴察其下則便無硬結是皆精氣受傷神魂不守之證此與陽極為狂者反如冰炭而時醫不能察但見錯亂便謂陽狂妄行攻瀉必致殺人凡治此者須辨陰陽其有虛而挾邪者邪在陽分則宜補中益氣湯之類邪在陰分則宜補陰益氣煎之類虛而無邪者在陽分則宜四君八珍十全大補湯大補元煎之類在陰分則宜四物六味左歸飲一陰煎之類陰虛挾火者宜加減一陰煎二陰煎之類陽虛挾寒者宜理中湯回陽飲八味湯右歸飲之類此方治之宜大略如此而變證之異則有言不能傳者能知意在言表則知所未言矣一凡身有微熱或面赤戴陽或煩躁不寧欲坐臥於泥水中然脈則微弱無力此陰證似陽也名為陰躁蓋以陽虛於下則氣不歸原故浮散於上而發躁如狂速當溫補其下命門暖則火有所歸而病當自愈若醫不識此而誤用寒涼者必死一發狂下痢譫語者不治狂言反目直視者為腎絕死汗出後輒復熱狂言不食者死風濕三十七仲景論曰太陽病關節疼痛而煩脈沉而細者此名濕痹其人小便不利大便反快但當利其小便曰濕家之為病一身盡痛發熱身色如熏黃濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲口燥煩也濕家下之額上汗出微喘小便不利者死利下不止者亦死論曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也論曰傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者桂枝湯去桂加白朮主之風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之結胸三十八仲景曰病有結胸其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也曰病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也曰結胸脈浮大者不可下下之即死曰結胸證悉具煩躁者亦死論曰太陽病脈浮而動數頭痛發熱微盜汗出而反惡寒者表未解也醫反下之胃中空虛陽氣內陷心下因硬而為結胸大陷胸湯主之曰太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之按此二條皆言太陽表證未解因誤下之而成結胸也論曰傷寒五六日嘔而發熱者此柴胡湯證具而以他藥下之其柴胡證仍在者當復與柴胡湯必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯按此一條以少陽表證未解因誤下之而為結胸也論曰太陽少陽並病而反下之成結胸心下硬下痢不止水漿不入其人煩心按此一條以太陽少陽並病二經表邪未解亦因誤下而成結胸也論曰陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈按此一條謂陽明邪氣入腑者必腹滿便結今惟心下硬以邪氣尚淺未全入腑故不可攻此雖非結胸而實亦結胸之類蓋不由誤下而因陽明之邪漸深也論曰傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之按此一條不云下早而云熱實其於六七日脈沉緊而心下硬痛者此傷寒傳裡之實邪有不因誤下而成結胸者乃傷寒之本病也愚按結胸一證觀傷寒論所載如前數條凡太陽表邪未解而誤下者成結胸少陽證亦然太陽少陽並病者亦然此不當下而誤下之以致臟氣空虛外邪乘虛內陷結於胸膈之間是皆因下而結者也又曰傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者此不因下而邪實漸深結聚於胸者也然則結胸一證有因誤下而成者有不因下而由於本病者觀近代傷寒諸書云未經下者非結胸也豈不謬哉一結胸證觀仲景所言惟太陽少陽二經誤下者有之而陽明一經獨無言及者何也蓋凡病入陽明胃腑已實故可下之而無害也然又曰陽明病心下硬滿者不可攻之攻之痢不止者死此豈非陽明在經表證邪未入腑者亦為不可下乎不惟三陽為然即三陰之證其有發熱惡寒表邪未解者切不可下最當慎也一結胸證治之辨凡心腹脹滿硬痛而手不可近者方是結胸若但滿不痛者此為痞滿非結胸也凡痞滿之證乃表邪傳至胸中未入於腑此其將入未入猶兼乎表是即半表半裡之證只宜小柴胡之屬加入枳殼之類治之或以本方對小陷胸湯亦妙今余新方制有柴陳煎及一柴胡飲之類皆可擇而用之也至於結胸之治則仲景俱用大陷胸湯主之然余之見則惟傷寒本病其有不因誤下而實邪傳裡心下硬滿痛連小腹而不可近或燥渴譫妄大便硬脈來沉實有力者此皆大陷胸湯所正宜也其於太陽少陽表邪未解因下早而致結胸者此其表邪猶在若再用大陷胸湯是既因誤下而復下之此則余所未敢不若以痞滿門諸法酌其輕重而從乎雙解以緩治之或外用罨法以解散胸中實邪此余之屢用獲效而最穩最捷者也罨法見新方因類第三十陰厥陽厥三十九附臟厥蛔厥厥有二證曰陽厥曰陰厥也陽厥者熱厥也必其先自三陽傳入陰分故其初起必因頭疼發熱自淺入深然後及於三陰變為四肢逆冷或時乍溫其證必便結躁煩譫語發渴不惡寒反惡熱脈沉有力此以傳經熱證所化外雖手足厥冷內則因於熱邪陽證發厥故為陽厥乃陽極似陰也其證由邪熱內結或伏陽失下之所致也凡厥微則熱亦微宜四逆散之類厥甚則熱亦甚宜承氣湯之類也陰厥者寒厥也初無三陽傳經實熱等證而真寒直入三陰則畏寒厥冷腹痛吐瀉戰慄不渴脈沉無力者此陰寒厥逆獨陰無陽也故為陰厥輕則理中湯重則四逆回陽等湯主之成無己曰四逆者四肢不溫也傷寒邪在三陽則手足必熱傳到太陰手足自溫至少陰則邪熱漸深故四肢逆而不溫也及至厥陰則手足厥冷是又甚於逆故用四逆散以散其傳陰之熱證論曰諸四逆厥者不可下之虛家亦然成無己注曰四逆者四肢不溫也厥者手足冷也甚於四逆也皆陽氣少而陰氣多故不可下虛家亦然金匱玉函曰虛者十補勿一瀉之論曰凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也若厥而嘔胸脅煩滿者其後必便血論曰少陰病下痢清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或痢止脈不出者通脈四逆湯主之傷寒脈促手足厥逆者可灸之傷寒脈滑而厥者里有熱也白虎湯主之手足厥寒脈細欲絕者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之大汗出熱不去內拘急四肢疼又下痢厥逆而惡寒者四逆湯主之大汗若大下痢而厥逆者四逆湯主之病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作痢也下痢清穀裡寒外熱汗出而厥者通脈四逆湯主之嘔而脈弱小便復痢身有微熱見厥者難治四逆湯主之按陽厥陰厥其辨如前此先哲之大法也然愚則猶有所辨如陰厥一證既無陽證陽脈而病寒若此明是陰證今人但曰中寒者即其病也然犯此者無幾知此者無難治宜溫中無待辨也惟是陽厥一證則有不得不辨者夫厥由三陽所傳是為陽厥此固然矣即以傳經者言之又豈盡無陰證乎故凡病真陽不足者即陽中之陰厥也脈弱無神者即陽中之陰厥也攻伐清涼太過者即陽中之陰厥也四肢為諸陽之本使非有熱結煩渴脹實等證而見厥逆者皆由陽氣不足也成無己曰大抵厥逆為陰所主寒者多矣又曰厥為陰之盛也故凡屬挾虛傷寒則雖自陽經傳入者是亦陽中之陰厥也陰中之陰者宜溫陽中之陰者果宜涼乎學者勿謂其先有頭疼發熱但自三陽傳至者便為陽厥而寒因熱用之則為害不小矣一臟厥證仲景曰傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥臟厥者死陽氣絕也一蛔厥證仲景曰蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之成無己曰臟厥者死陽氣絕也蛔厥雖厥而煩吐蛔已則靜不若臟厥而躁無暫安時也病人臟寒胃虛故宜與烏梅九溫臟安蟲譫語鄭聲四十論曰實則譫語虛則鄭聲此虛實之有不同也夫譫語鄭聲總由神魂昏亂而語言不正又何以分其虛實但譫語者狂妄之語也鄭聲者不正之聲也譫語為實實者邪實也如傷寒陽明實熱上乘於心心為熱冒則神魂昏亂而譫妄不休者此實邪也實邪為病其聲必高其氣必壯其脈必強其色必厲凡登高罵詈狂呼躁擾之類皆是也此之為病有燥糞在胃而然者有瘀血在臟而然者有火盛熱極而然者有腹脹便秘口瘡咽爛而然者察其果實即當以三承氣或白虎湯涼膈散之類治之鄭聲為虛虛者神虛也如傷寒元神失守為邪所乘神志昏沉而錯亂不正者此虛邪也虛邪為病其聲必低其氣必短其脈必無力其色必萎悴凡其自言自語喃喃不全或見鬼怪或驚恐不休或問之不應答之不知之類皆是也此之為病有因汗亡陽因下亡陰而然者有焦思抑鬱竭盡心氣而然者有勞力內傷致損脾腎而然者有日用消耗暗殘中氣而然者凡其或雖起倒而遏之即止終不若實邪之難制者即虛邪也察其果虛最忌妄行攻伐少有差謬無不即死治此者速宜察其精氣辨其陰陽舍其外證救其根本稍遲猶恐不及而況於誤治乎甚至有自利身寒或尋衣撮空面壁啐啐者尤為逆候蓋譫妄一證最於虛損者不宜有之故凡身有微熱脈見洪滑者生心多煩躁脈見微弱細急而逆冷者死所以證逢虛損而見有譫妄者即大危之兆不可不加之意也衄血四十一雜病衄血責熱在裡傷寒衄血責熱在表論曰傷寒小便清者知不在裡仍在表也當發其汗若頭痛者必衄宜桂枝湯曰傷寒脈浮緊不發汗因致衄者麻黃湯主之此以傷寒之衄為其熱不在裡在表而然也然又論曰衄家不可發汗而何以復用桂枝麻黃等湯蓋衄由乎陰者以陰虛火動也故不宜再汗以亡陰衄由乎陽者以表邪未解也故當用桂枝麻黃以發散又論曰太陽病脈浮緊發熱身無汗自衄者愈此以表邪欲解不從汗而從血俗人謂之紅汗所以衄後當愈也由此觀之則有因衄而愈者以經通而邪散也有治衄仍當發散者以邪之將解未解而因散其餘邪也治衄之法於斯可見若寒氣不甚而用麻黃桂枝似屬太剛或易以柴葛之類自無不可用者其酌之論曰陽明病口燥但欲漱水不欲咽者此必衄蓋陽明之脈絡於口鼻今其漱水不欲咽者以熱在經而里無熱故當鼻衄也一有動陰血者又非衄血之謂論曰少陰病但厥無汗而強發之必動其血未知從何道出故或從口鼻或從目出者是名下厥上竭此陰血也乃為危證蓄血四十二傷寒蓄血者以熱結在裡搏於血分留瘀下焦而不行也論曰傷寒有熱少腹滿應小便不利今反利者為有血也又曰太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也大抵熱蓄血分留結下焦則生狂躁論曰熱結膀胱其人如狂者是也然又有陽明證其人喜忘屎雖硬而大便反快其色黑者是亦蓄血之證故凡診傷寒但其少腹硬滿而痛便當問其小便若小水自利者知為蓄血之證蓋小水由於氣化病在血而不在氣故小便利而無恙也血瘀於下者血去則愈其在仲景之法則以抵當湯抵當丸主之愚謂但以承氣之類加桃仁紅花以逐之或其兼虛者以玉燭散之類下之則蓄血自去而病無不除矣成無己曰傷寒衄者以邪氣不得發散壅盛於經逼迫於血因而致衄也蓄血者下焦結聚而不行不散也血菀於上而吐血者謂之薄厥留瘀於下者謂之蓄血此由太陽經瘀熱在裡搏蓄下焦所致經曰太陽病七八日表證仍在脈沉而微反不結胸其人如狂者以熱在下焦少腹當硬滿小便自利者下血乃愈熱入血室四十三論曰陽明病下血譫語者此為熱入血室是兼男女而言也曰婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之曰婦人中風脈遲身涼而證如結胸者當刺期門曰婦人傷寒經水適來晝日了了暮則譫語者無犯胃氣及上二焦必自愈按血室者即衝任血海也亦血分也凡血分之病有蓄血者以血因熱結而留蓄不行也有熱入血室者以邪入血分而血亂不調也故血蓄者去之則愈血亂者調之則安調之之法則熱者宜涼陷者宜舉虛者宜滋瘀者宜行邪未散者宜解也然此皆病在下焦故曰無犯胃氣及上二焦必自愈是又不可不察胸脅腹滿四十四凡邪氣自表傳裡必先入胸膈以次漸從脅肋而後入胃邪氣入胃乃為入腑是以胸滿者猶屬表證脅滿則半表半裡也大抵胸脅滿者以邪氣初入於裡氣鬱不行所以生滿尚未停聚為實故但從和解以小柴胡之屬則可愈矣若果實邪在上留滯不能散者乃可吐之華元化曰四日在胸吐之則愈是因邪已收聚而未及散漫者乃可吐也在仲景用梔子豉湯或瓜蒂散之屬梔子豉湯可吐客熱瓜蒂散可吐實痰其或一時藥有不便余有吐法在新方攻陣中可以代之或即以和解之藥探而吐之無不可也一腹滿證按華元化曰傷寒一日在皮二日在膚三日在肌四日在胸五日在腹六日在胃入胃即為入腑入腑即在腹也若腹雖滿而未甚者猶是未全入腑不可攻也然腹滿之證有虛實也有寒熱也不可一概皆以實論觀金匱要略曰腹滿不減減不足言當下之是不減者為實滿也又曰腹滿時減復如故此虛寒從下上也當以溫藥和之是或進或退時或減而時復如故者本非結聚實邪此虛滿也大抵腹滿之證本屬太陰若是陽邪則必咽乾煩熱脈實有力若是陰邪則必腹滿吐食畏寒自利脈息無神可以辨之實熱者可清可攻虛寒者宜溫宜補也嘔吐噦證四十五嘔者有聲無物吐者吐出食物也嘔者有寒有熱吐則皆因胃寒也凡嘔而發熱煩悶者邪熱為嘔也嘔而吞酸冷咽涎沫𣲍𣲍一者寒邪為嘔也大抵傷寒表邪將傳入里裡氣相逆則為嘔是以半表半裡之邪其證多嘔若邪全在表無是證也凡邪在半表半裡者和之散之氣逆者順之有痰者降之熱者清之寒者溫之千金云嘔家多服生薑此是嘔家聖藥然嘔家雖有陽明證不可攻之蓋其氣逆在上而邪未入腑本非胃實證也氣逆於上而攻其下下虛則逆氣乘之勢必大危若脈微弱者乃為尤甚凡傷寒三陽傳畢三陰當受邪矣若其人反能食而不嘔此為邪不入陰是知邪之傳裡者乃致為嘔也觀乾薑附子湯證治云不嘔不渴者為里無熱十棗湯證治云乾嘔短氣汗出不惡寒者此表解里未和也即此觀之則凡嘔者知為里證而兼煩渴者方為內熱也仲景論曰食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也曰少陰病吐痢手足厥冷煩躁欲死者吳茱萸湯主之論曰病人脈數數為熱當消穀引飲而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也東垣曰邪熱不殺穀故熱邪在胃則不食論曰陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦若胃中虛冷不能食者飲水則噦若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯論曰傷寒噦而腹滿視其前後知何部不利利之則愈治噦諸法詳呃逆門勞力感寒四十六凡因辛苦勞倦而病者多有患頭痛發熱惡寒或骨腿痠疼或微渴或無汗或自汗脈雖浮大而無力亦多緊數此勞力感寒之證即東垣云內傷證也宜補中益氣湯或補陰益氣煎及五福飲等劑為良所謂溫能除大熱即此類也若或邪盛無汗脈見洪數而當和解者即當用新方散陣諸柴胡飲之類主之一凡勞力感寒一證人皆以服役辛苦之人為言而不知凡為名利所牽有不自揣以致竭盡心力而患傷寒者皆其類也故凡有形勞而神不勞者勞之輕者也若既勞其神又勞其形內外俱勞則形神俱困斯其甚矣今人之病傷寒者率多此類輕者和解治宜如前重者速宜救本當於後開培補諸方擇而用之庶乎有濟倘不知其所致之由而概施混治但知攻邪則未有不誤人者矣此即勞倦內傷之類諸義俱詳本門虛證四十七仲景曰陽微則惡寒陰弱則發熱是寒熱之有虛也曰其人本虛是以發戰是戰汗之皆因虛也曰耳聾無聞者陽氣虛也曰面赤戴陽者陰不足也曰無陽不能作汗必身冷而脈遲也曰客熱不能殺穀胃中虛冷也曰病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也曰虛則鄭聲以言語亂而不正也曰身蜷惡寒而利因冷氣而為厥逆也曰尺中脈微此裡虛須表裡實津液自和便自汗出愈曰脈促厥冷者宜灸以促脈有非因熱也曰頭疼嘔吐之宜溫以頭疼之有屬陰也曰不利而利發熱汗出者有陰無陽也曰少陰脈沉者汗後熱不去而厥利惡寒者皆宜急溫也曰舊有微溏者不可與梔子湯以裡虛而寒在下也曰陽明病不能食攻其熱必噦所以然者胃中虛冷故也飲之水亦噦也曰小便色白者以下焦之虛寒也曰自利不渴者以臟中之無火也曰邪中於陰者必生內慄因表氣虛而裡氣不守也曰發汗過多其人叉手自冒心心下悸而欲得按者亡其陽也曰發汗病不解而反惡寒者虛故也曰脈陰陽俱緊反汗出者亡其陽也一諸脈有虛證見前卷一忌汗下各有虛證見前卷一表裡五臟各有虛實詳一卷傳忠錄虛實辨中俱當互閱動氣四十八論曰諸動氣者不可發汗亦不可下按此動氣一證即築築然動於臍傍及左乳之下曰虛里者皆其聯絡者也考之難經則以臍之上下左右分心腎肝肺四臟而各列其證在傷寒論所載亦詳成無己曰動氣者臟氣不治正氣內虛也雖諸說如此然皆未盡其要所以今之醫家多不識此為何證而且疑為未見此證也余嘗留心察此所見極多蓋動氣之在臍傍者皆本於下焦之陰分凡病關格勞損者多有此證而尤於瘦薄者易見之其動之微者則止於臍傍上下其動之甚者則連及虛里心脅真若舂舂連續而混身皆振動者此以天一無根故氣不蓄臟而鼓動於下誠真陰不守大虛之候也何以驗之但察於呼吸飢飽之頃可得其徵凡病此者餒時則動甚飽時則稍緩呼出則動甚吸入則稍緩但虛甚者動必甚虛微者動亦微豈非虛實之明證乎即在病者雖常覺其振動而無疼無癢尚不知為何故醫家多不以為意弗能詳察故不知為何病此動氣之不明也久矣此動氣之見於虛損者極多而見於傷寒者亦不少也精虛者既不可汗陰虛者又不可下仲景但言其禁而不言其治然則動氣之治豈無法乎獨於霍亂條中雲臍上築者腎氣動也用理中丸去朮加桂四兩以治之此其意在脾腎概可知也然余之治此則惟直救真陰以培根本使其氣有所歸無不獲效欲察虛實者最不可忽此一證類經虛里穴下有詳註當並考之戰汗四十九論曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以其脈浮故當汗出而解若脈浮大而數按之不芤此本不虛故其欲解則但汗出而不發戰也一戰與慄異戰由乎外慄由乎內也凡傷寒欲解將汗之時若其正氣內實邪不能與之爭則但汗出自不作戰所謂不戰應知體不虛也若其人本虛邪與正爭微者為振甚則為戰正勝則戰而汗解矣故凡邪正之爭於外者則為戰戰其愈者也邪正之爭於內者則為慄慄其甚者也論曰陰中於邪必內慄也夫戰為正氣將復慄則邪氣肆強故傷寒六七日有但慄不戰竟成寒逆者多不可救此以正氣中虛陰邪內盛正不勝邪而反為邪氣所勝凡遇此證使非用大補溫熱之劑及艾灼回陽等法其他焉得而御之余嘗治一衰翁年逾七旬陡患傷寒初起即用溫補調理至十日之外正氣將復忽爾作戰自旦至辰不能得汗寒慄危甚告急於余余用六味回陽飲入人參一兩姜附各三錢使之煎服下咽少頃即大汗如浴時將及午而浸汗不收身冷如脫鼻息幾無復以告余余令以前藥復煎與之告者曰先服此藥已大汗不堪今又服此尚堪再汗乎余笑謂曰此中有神非爾所知也急令再進遂汗收神復不旬日而起矣嗚呼發汗用此而收汗復用此無怪乎人之疑之也而不知汗之出與汗之收皆元氣為之樞機耳故余紀此欲人知合闢之權不在乎能放能收而在乎所以主之者頭汗五十頭汗之證有二一為邪熱上壅一為陽氣內脫也蓋頭為諸陽之會凡傷寒遍身得汗者謂之熱越若身無汗則熱不得越而上蒸陽分故但頭汗出也治熱蒸者可清可散甚者可下在去其熱而病自愈至若氣脫一證則多以妄下傷陰或克伐太過或泄瀉不止以致陰竭於下則陽脫於上小水不通而上見頭汗則大危矣論曰傷寒五六日頭出汗微惡寒手足冷心下滿口不欲食大便難脈細者此為陽微結乃半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯得屎而解曰傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之論曰傷寒十餘日但結胸無大熱者此為水結在胸脅也但頭汗出者大陷胸湯主之曰陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈論曰太陽病醫反下之若不結胸但頭汗出余處無汗際頸而還小便不利身必發黃也曰陽明病但頭汗出小便不利必發黃論曰濕家下之額上汗出微喘小便不利者死若下痢不止者亦死脈經曰陽氣上出汗見於頭者蓋陽脫也一頭汗脈緊數有表邪當散者宜小柴胡湯或柴胡桂枝幹薑湯及新方諸柴胡飲俱可酌用若有火邪脈洪滑內多煩熱頭汗當清者宜人參白虎湯益元散之類主之若水結胸心下滿頭汗出者或大陷胸湯或小半夏茯苓湯若便結腹脹疼痛頭汗者宜承氣湯若諸虛泄瀉陽脫頭汗者宜速用獨參湯或大補元煎六味回陽飲等作急救之庶可保全吐蛔五十一凡治傷寒若見吐蛔者雖有大熱忌用涼藥犯之必死蓋胃中有寒陽氣弱極則蛔逆而上此大凶之兆也急用炮姜理中湯一服加烏梅二個花椒一二十粒服後待蛔定然後以小柴胡或補中益氣等劑漸治其餘蓋蛔聞酸則靜見苦則安也仲景曰病人有寒復發汗胃中冷必吐蛔蛔厥證見前三十九腹痛五十二陶節庵曰傷寒腹痛有四若繞臍硬痛大便結實煩渴者皆屬燥屎痛急用寒藥下之因食積而痛者治亦同一若小腹硬痛小水自利大便黑身目黃者屬蓄血痛亦用寒劑加行血藥下盡黑物自愈一凡傷寒腹中痛甚但將涼水一盞與病者飲而試之若飲水後痛稍可者屬熱痛當用涼藥清之以上三條皆實熱痛也必脈來沉實有力方是此證若微弱者仍當詳審從緩治之一若飲水愈加作痛此為寒痛當用溫藥和之和之不已而或四肢厥冷嘔吐瀉利者急用熱藥救之但須詳脈之有力無力方為良法下痢五十三凡雜證下痢多責於寒傷寒下痢有寒有熱蓋熱邪傳裡則亦有下痢之證但寒痢最多熱痢則僅見耳治者當辨寒熱若誤用之則為害最大仲景論曰自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩少陰病二三日至四五日腹痛小便不痢下痢不止便膿血者桃花湯主之少陰病吐痢手足厥冷煩躁欲死者吳茱萸湯主之少陰病下痢白通湯主之少陰病二三日不已至四五日腹痛小便不痢四肢沉重疼痛自下痢者此為有水氣其人或咳或小便痢或下痢或嘔者真武湯主之少陰病下痢清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或痢止脈不出者四逆湯主之大汗出熱不去內拘急四肢疼下痢厥逆而惡寒者四逆湯主之下痢清穀不可攻表汗出必脹滿按此諸論乃皆言寒痢之當溫也如所云手足厥逆惡寒腹痛脈微欲絕下痢清穀之類此固陰寒之甚者也其於疑似之間則猶有真辨凡傷寒下痢由熱邪者必有煩躁大熱酷欲冷水等證亦必有洪滑強盛數實等脈如果表裡俱熱方可作火證論治若其脈雖數而無力外雖身熱而不惡熱內雖渴而不喜冷此其內本不熱而病為下痢者悉屬虛寒治宜四逆湯理中湯溫胃飲胃關煎五苓散之類酌用可也或表裡寒邪俱甚則當以麻桂飲相兼用之為最妥若以寒痢作熱痢妄用寒涼再損胃氣則無有不死論曰下痢腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯按此一條乃言表裡俱病而下痢者雖有表證所急在裡蓋里有不實則表邪愈陷即欲表之而中氣無力亦不能散故凡見下痢中虛者速當先溫其里裡實氣強則表邪自解溫中可以散寒即此謂也論曰熱痢下重者白頭翁湯主之下痢脈數欲飲水者以有熱故也白頭翁湯主之少陰病下痢六七日咳而嘔渴心煩不得眠者豬苓湯主之按此三條乃言熱痢之當清也但既云脈數又欲飲水是誠熱矣然寒邪在表脈無不數但數而有力者為陽證數而無力者即陰證矣瀉痢亡津無有不渴但渴欲飲水愈多愈快者為陽證若口雖欲水而腹不欲咽者即非陽證矣此外如渴欲茶湯者乃瀉渴之當然也不得悉認為熱證一凡傷寒表邪未解脈實滑數喜冷氣壯內外俱熱而下痢者宜柴芩煎主之論曰少陰病自痢清水色純青心下必痛口乾燥者急下之宜大承氣湯下痢三部脈皆平按之心下硬者急下之宜大承氣湯下痢譫語者有燥屎也宜小承氣湯按此三條乃言下痢之當攻者也凡傷寒下痢者本非陽明實邪不當譫語今既譫語故知有燥屎當去也又若少陰下痢心下有痛有硬者必有所積故亦當下一凡自痢家身涼脈小者為順身熱脈大者為逆此以外無表證而病之左臟者言也下痢日十餘行脈反實者死發熱下痢至甚厥不止者死直視譫語下痢者死下痢無脈手足厥冷灸之不溫脈不遠者死少陰病自痢煩躁不得臥寐者死大抵下痢一證為脫氣至急五奪之中惟此為甚金匱要略曰六腑氣絕於外者手足寒五臟氣絕於內者痢下不禁臟氣既脫不能治也協熱下痢五十四仲景曰若不宜下而便攻之內虛熱入協熱遂痢煩躁諸變不可勝數輕者困篤重者必死矣太陽病二三日不能臥反下之若痢止必作結胸未止者四日復下之此作協熱痢也太陽病外證未除而數下之遂協熱而痢痢下不止心下痞硬表裡不解者桂枝人參湯主之陽明少陽合病若脈數不解而下不止必協熱而便膿血也按此四條乃皆言表證未除而誤下之因致外熱未退內復作痢故云協熱下痢此一熱字乃言表熱也非言內熱也夫協者協同之協非挾藏之挾即表裡俱病之謂故治此者止有桂枝人參湯一方其義顯然可見即如成無己明理論曰表邪傳裡裡虛協熱則痢乃亦以表邪為言也奈何後學不明此義止因協熱二字每每以表作里以寒作熱但見作痢者無論表裡虛實即認為內熱便云協熱下痢且近有不必誤下而妄用芩連治表熱者表證得寒熱愈不退乃致下痢或脾胃素弱逢寒即泄者皆是此證既見下痢益云協熱其謬孰甚獨不觀仲景桂枝人參湯豈治內熱之劑乎寒熱倒施殺人多矣予因特表於此小便五十五凡傷寒小便清者病不在裡仍在表也當解表發汗小便利者病不在氣分而在血分以小水由於氣化也陽盛則欲衄陰虛小便難凡病傷寒而小水利者多吉以內邪不甚也仲景曰陽明病汗出多而渴者不可與豬苓湯以汗多必胃燥故不可複利小水也論曰濕家之為病一身盡痛發熱身色如熏黃其人但頭汗出背強欲得被覆向火舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲此濕痹之候其人小便不利大便反快者但當利其小便凡傷寒表證未除病在陽分者不可即利小便蓋走其津液取汗愈難且恐大便乾結也死證五十六陶節庵曰凡看傷寒極要識各經中死證死脈須一一理會過免致臨病疑惑但見死證便當以脈參之如果有疑切莫下藥雖至親俯懇亦不可治倘有差失咎將歸於己矣一脈浮而洪身汗如油喘而不休水漿不入形體不仁乍靜乍亂此命絕也汗出發潤喘而不休此肺絕也形如煙煤直視搖頭此心絕也唇吻色青四肢振動此肝絕也環口黎黑冷汗發黃此脾絕也溲便遺失狂言反目直視此腎絕也一少陰病惡寒身蜷而利手足逆冷者不治少陰病吐痢躁煩四逆者死少陰病四逆身蜷脈不至不煩而躁者死少陰病六七日息高者死少陰病至五六日自利煩躁不得臥寐者死少陰病下痢厥逆無脈服藥後脈微續者生脈暴出者死少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治一陰病見陽脈者生陽病見陰脈者死脈純弦者死脈陰陽俱虛熱不止者死脈陰陽俱盛大汗出熱不解者死手足逆冷脈沉細譫言妄語者死脈證俱虛而見譫妄者死傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死寸脈上不至關為陽絕尺脈下不至關為陰絕此皆不治決死也傷寒下痢日十餘行脈反實者死一傷寒病脅下素有痞氣連於臍傍痛引少腹入陰筋者此名臟結死發熱下痢厥逆躁不得臥者死發熱下痢至甚厥不止者死直視譫語喘滿者死下痢者亦死下痢發熱者亦死發熱而厥七日下痢者難治傷寒六七日發熱而利汗出不止者死有陰無陽故也陽氣前絕陰氣後絕者陰證也其人死後身色必青陰氣前絕陽氣後絕者陽證也其人死後身色必赤腋下溫心下熱也金匱要略曰六腑氣絕於外者手足寒五臟氣絕於內者利下不禁蓋傷寒發熱為邪氣獨甚若下痢至甚厥不止此以邪未解而腑臟之氣先絕故死靈樞熱病篇曰熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘛瘲齒噤齘也傷寒逆證賦五十七傷寒難療逆證須知陽病怕逢陰脈譫語陰證非宜乍疏乍數脈之忌口張目陷舌如煤乾嘔出氣骨節痛而呃逆弗已發斑發黃大便利而先赤後灰霍亂躁煩心下悶而喘脹腹膨呃逆下泄利而難溲四肢厥逆眼定腹疼如石內外關格頭汗陽脫溲遲頭連胸痛四肢冷聲啞唇瘡狐惑悲七日已過復大熱喘逆上氣脈散危陰陽易脈離經而外腎腫手足攣拳加腹痛陰陽交大汗後而熱愈甚躁急狂言食更稀厥利無脈灸而不至者腎殆唇青舌卷耳聾囊縮者肝離赤斑黑斑救五而救一尋衣撮空兩感者何疑凡諸汗證仍當備言只在頭面不遍身鼻衄不止口噤肉戰多喘促如油汗圓當汗無汗麻黃數劑不能通尤嫌脈躁汗後嘔吐水藥不入證反劇言亂目眩濕家大汗必成痙風濕與疸皆譫言犯濕溫則身青面變耳聾不語名重暍發少陰必九竅出血下厥上竭奚能痊動氣脈遲弱皆忌風濕和中濕不堪其諸下痢尤宜細參熱厥利而汗難止冷厥利而躁不眠少陽陽明合病脈弦者負少陰吐瀉無脈拳厥躁煩譫語直視而喘滿下痢頻數而脈堅臟結者臍痛引陰白胎下利除中則厥逆而利反能食焉誤下濕家之頭汗溲難便利喘加添體如熏而搖頭直視心神已絕唇吻青而四肢多汗肝氣不全腎絕者直視狂言而遺尿反目肺絕者喘無休歇而汗潤髮顛虛汗發黃環口黑非脾經之吉兆孤陽偏勝脈暴出知陰絕之在先此傷寒之逆候勿僥倖以圖全傷寒治例五十八汗散類溫散諸方麻黃湯散一大溫凡太陽陽明傷寒而陰邪甚者宜此桂枝湯散九大溫凡太陽中風兼寒有汗者宜此麻桂飲新散七大溫凡傷寒初感邪盛氣實者無論諸經四季先宜用此二柴胡飲新散二微溫凡邪感三陽及三陽並病寒勝者宜此主之三陰初感者亦可用葛根湯散二九大溫治冬月太陽經傷寒項背強無汗惡風者宜此五積散散三九微溫凡感寒邪而陰勝於陽外有表證內有嘔吐腹痛及寒濕客於經絡筋骨痠疼等證宜此十神湯散四十微溫凡時氣風寒瘟疫發熱憎寒頭疼咳嗽無汗當溫散者宜此麻黃附子細辛湯散三大溫少陰傷寒脈沉發熱者宜此小青龍湯散八大溫凡傷寒陰勝表邪不解及心下有水氣嘔噦咳嗽發熱小腹滿者宜此消風百解散散四六微溫凡四時傷寒頭疼發熱及風寒咳嗽鼻塞聲重者宜此柴胡桂枝幹薑湯散百十四微溫傷寒汗下後但頭汗出寒熱往來邪不解者宜此桂枝加黃耆湯散十大溫黃疽脈浮當以汗解者宜此涼散諸方一柴胡飲新散一微涼凡六經初感內外俱有熱者宜此小柴胡湯散十九微涼凡邪在少陽及三陽並病但屬半表半裡往來寒熱兼嘔者宜此九味羌活湯散四四微涼凡四時不正之氣風寒感冒憎寒壯熱頭疼身痛者宜此柴葛解肌湯散三一微涼凡足陽明證發熱脈洪者宜此升麻葛根湯散三十微涼陽明證具及小兒疫癘瘡疹等證宜此歸葛飲新散十三次涼凡陽明溫暑大熱大渴津枯不能作汗者宜此六神通解散寒十五大涼凡發熱頭痛脈洪無汗三陽伏火而表邪不解者宜此柴胡白虎煎新散十二大寒凡溫病熱極表裡不解者宜此柴平湯和二三三微涼凡溫瘧身痛手足沉重寒熱者宜此柴芩煎新散十大涼凡表邪未解內外俱熱泄瀉不止者宜此大青龍湯散七微寒凡太陽中風發熱無汗而躁煩者宜此升麻湯散百十三大寒凡無汗而喘煩渴發斑者宜此四逆散散二八微涼凡陽邪亢極四肢厥逆者宜此平散諸方三柴胡飲新散三凡肝脾陰虛血少而偶感風寒者宜此正柴胡飲新散六凡氣血本無虧損而感冒寒邪者宜此柴陳煎新散九凡感冒風寒發熱而兼咳嗽嘔惡者宜此參蘇飲散三四凡四時感冒傷寒頭疼發熱無汗及咳嗽聲重往來潮熱者宜此敗毒散散三六凡四時瘟疫寒熱身體疼痛及煙瘴之氣或處卑濕腳氣者宜此升陽散火湯散四一凡胃虛血虛因寒邪冷物抑遏陽氣以致發熱者宜此發之加減小柴胡湯散二二凡少陽經寒熱往來脈弦腹痛者宜此兼補兼散諸方補中益氣湯補三十凡勞倦傷脾中氣不足以致外感發熱者宜此補陰益氣煎新補十六凡邪陷陰中陰虛不能作汗身熱不退或往來寒熱者宜此三柴胡飲新散三凡肝脾血分微虛而感外邪者宜此四柴胡飲新散四凡脾肺氣虛或勞倦感寒發熱者宜此五柴胡飲新散五凡睥腎血氣不足而感外邪發熱者宜此理陰煎新熱三大溫凡真陰不足或因勞倦感寒陰虛假熱寒邪不解者速宜用此大溫中飲新散八大溫凡中氣虛寒感邪發熱無汗表不能解者速宜用此調中益氣湯補三一凡風寒濕熱所傷食少體重者宜此溫中和中類大溫兼補諸方人參理中湯熱一大溫治太陰即病自利陰寒腹痛嘔吐中氣虛寒脹滿厥逆瘧痢等證四逆湯熱十四大溫治傷寒陰證自利脈沉身痛而厥胃關煎新熱九大溫凡脾腎虛寒瀉痢不止者宜此桂枝人參湯散十三大溫傷寒表裡不解協熱下痢者宜此白通湯熱一四五大熱少陰下痢者宜此桃花湯熱一四六微溫少陰下痢膿血者宜此真武湯熱一四二大溫少陰傷寒腹痛或嘔或痢者宜此回陽返本湯熱四五大溫傷寒陰盛格陽陰極發躁脈弱無力者宜此四味回陽飲新熱一大溫陽脫氣虛者宜此暖肝煎新熱十五大溫凡肝腎陰寒小腹疼痛者宜此吳茱萸湯熱一三七大熱嘔而胸滿吐涎頭痛者宜此當歸四逆湯熱二十微溫傷寒厥逆脈細下痢腸鳴者宜此茯苓甘草湯熱七五大溫水停心下作悸作利者宜此甘草附子湯熱三一大熱風濕相搏者宜此桂枝附子湯熱三十大熱風濕相搏筋骨疼痛者宜此乾薑附子湯熱三四大熱瘴毒陰證厥逆嘔吐自利汗出者宜此華佗救陽脫方熱六三治陰寒直中三陰證微溫和中諸方二陳湯和一微溫凡風寒咳嗽痰飲嘔惡脾胃不和者宜此六君子湯補五微溫凡脾胃虛弱或久患瘧痢或嘔吐吞酸者宜此金水六君煎新和一微溫凡陰虛受寒咳嘔喘促吞酸痞滿等證宜此平胃散和十七微溫凡寒傷脾胃心腹脹滿嘔惡不思飲食身體疼痛瀉痢者宜此藿香正氣散和二十微溫凡外感風寒內停飲食頭疼寒熱吐瀉脹滿者宜此烏梅丸和三二三微溫吐蛔蛔厥者宜此清理類清火諸方抽薪飲新寒三大寒凡熱邪內蓄之甚者宜此徙薪飲新寒四次寒凡熱邪內蓄將甚未甚者宜此黃連解毒湯寒三大寒凡熱邪內盛煩躁狂斑口渴舌焦喘滿脈洪熱甚者宜此白虎湯寒二大寒凡脈洪大渴陽明熱甚或中暑虛煩等證宜此人參白虎湯寒三大涼凡赤斑口燥煩躁暑熱脈洪大浮虛者宜此三黃石膏湯寒十一大寒凡疫瘟大熱而躁者宜此一六甘露散新寒十五大寒陽明實熱煩躁斑黃等證宜此益元散寒百十二次寒凡中暑身熱煩渴小水不利者宜此玉女煎新寒十二大寒凡陰虛水虧陽明火盛煩渴內熱者宜此陽毒升麻湯散百六大涼凡陽毒赤斑狂言失血者宜此竹葉石膏湯寒五微寒陽明汗多而渴鼻衄喜水暑熱煩躁者宜此桂苓甘露飲寒八微寒凡伏暑發熱煩躁水道不利者宜此黃芩清肺飲寒三八次寒肺熱小水不利或便血者宜此大連翹飲寒七八次寒凡風熱熱毒大小便不利及瘡毒丹瘤等證宜此普濟消毒飲寒十三大寒凡疫癘大行憎寒壯熱頭腫目閉喘渴咽喉不利俗名大頭瘟熱毒等證宜此梔子柏皮湯寒二三大寒傷寒身黃內外俱熱者宜此白頭翁湯寒一八四大寒治傷寒熱痢玄參升麻湯外四八次寒瘟疫頰腮腫痛發斑咽痛者宜此小陷胸湯寒十六微涼凡小結胸熱邪脹滿者宜此八正散寒百十五大寒凡心經蘊熱臟腑秘結小便赤澀血淋等證宜此解瘟疫熱毒法寒二四清血清便滋陰諸方犀角地黃湯寒七九微涼凡熱入血分吐衄斑黃及血熱血燥不能作汗表不解者宜此二陰煎新補十大涼心經有熱狂笑煩熱失血者宜此加減一陰煎新補九大涼凡水虧火盛煩熱動血者宜此五苓散和一八二微溫凡暑熱霍亂泄瀉小水不利濕腫脹滿者宜此導赤散寒一二二微涼心火小腸熱秘小水不利者宜此大分清飲新寒五微寒凡積熱閉結小水不通熱瀉等證宜此小分清飲新和十性平凡小水不利濕滯腫脹泄瀉者宜此豬苓湯和一八八微涼傷寒下後發熱小便不利者宜此清胃諸方大和中飲新和七性平凡邪結胃脘氣逆食滯者宜此小和中飲新和八性平胸膈脹滿嘔惡氣滯者宜此小半夏茯苓湯和九微溫膈間有水嘔吐心下痞者宜此半夏瀉心湯寒二八微涼嘔而腸鳴心下痞者宜此吐湧類獨聖散攻百六凡邪實上焦及痰涎積蓄者宜此茶調散攻百七治同前吐劑新攻一此有二法便而且易可隨宜用之梔子豉湯寒二十傷寒煩熱懊憹當吐者宜此攻下類峻下諸方大承氣湯攻一凡陽明太陰傷寒及各經實熱內結者宜此小承氣湯攻二凡病在太陰無表證潮熱脈實狂言腹脹者宜此調胃承氣湯攻三凡太陽陽明不惡寒反惡熱潮熱邪入腑者宜此桃仁承氣湯攻四凡傷寒蓄血證小腹急痛大便不通而黑者宜此大柴胡湯攻七凡傷寒表證未除里證又急當汗下兼行者宜此大陷胸湯攻九凡結胸脹痛連腹手足不可近者宜此六一順氣湯攻八凡傷寒熱邪傳裡便實口燥狂斑潮熱腹脹硬痛等證宜用此以代三承氣湯涼膈散攻十九凡三焦六經火邪內結不通者宜此百順丸新攻六凡三焦熱秘邪不解者宜此茵陳蒿湯攻三一谷疸發熱身黃便結者宜此罨結胸法新因三十攻補兼用諸方黃龍湯攻二一凡傷寒熱邪傳裡當下而氣血兼虛者宜此玉燭散攻二四凡血虛有滯而熱邪傳裡腹脹作痛者宜此培補類峻補諸方大補元煎新補一凡元氣大虛者雖有寒邪亦不可攻必單培根本正復邪將自散或真寒假熱等證皆宜用此大營煎新補十四此大補元煎之次者也酌宜用之三陰煎新補十一凡三陰不足及風瘧多汗而正氣不復寒熱不止者宜此六味回陽飲新熱二凡陰陽大虛元氣將脫者非此不可八珍湯補十九氣血兩虛者宜此十全大補湯補二十凡氣血兩虛惡寒發熱倦臥眩運自汗諸虛者宜此大建中湯補二三凡中氣不足厥逆嘔吐虛斑虛火筋骨疼痛等證宜此獨參湯補三五凡氣虛氣脫畏聞諸藥氣味及反胃嘔吐垂危者惟此為宜參附湯補三七凡真陽不足喘嘔呃逆腹痛厥冷氣短者宜此參歸湯補三八凡心虛血虛盜汗等證宜此補陰諸方陰煎新補八凡腎水真陰不足而虛火為邪者宜此小營煎新補十五凡血少陰虛而無火者宜此左歸飲新補二凡命門真陰虧損雖有寒邪不可攻者宜此右歸飲新補三凡命門陽衰或陰盛格陽感邪不可攻者宜此四物湯補八凡陰虛營弱病在血分者宜此生脈散補五六凡熱傷元氣口渴氣短煩躁倦怠汗出者宜此六味地黃丸補百二十陰虛水虧發熱等證宜此崔氏八味丸補一二一凡陰盛格陽火不歸原及真陽虛敗等證宜此補中諸方四君子湯補一凡脾胃虛弱食少體瘦瘧痢勞倦等證宜此五君子煎新熱六凡脾胃氣分虛弱而微寒當溫者宜此五味異功散補四凡脾胃虛寒飲食少思氣逆腹滿者宜此五福飲新補六凡五臟氣血俱虛者宜此為主溫胃飲新熱五凡中寒嘔吐吞酸者宜此養中煎新熱四凡中氣虛寒為嘔為泄者宜此歸脾湯補三二凡脾虛健忘怔忡少食困倦瘧痢等證宜此參苓白朮散補五四凡脾胃虛弱吐瀉食少等證宜此參朮湯補四十凡氣虛顫掉泄瀉嘔吐者宜此
