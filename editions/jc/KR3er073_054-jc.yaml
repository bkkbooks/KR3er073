末每服一錢溫酒下甚者姜酒下百選桃仁膏治氣血凝滯疝氣膀胱小腸氣痛不可忍桃仁炒去皮尖大茴香炒上等分為末每服二錢蔥白二寸煨熟蘸藥細嚼空心熱酒下局方守效丸治㿗疝不痛者之要藥蒼朮南星白芷川芎山楂半夏枳實一云橘核上等分為末薑汁糊丸桐子大每服七八十丸鹽湯下有寒加茱萸有熱加山梔子又或加青皮荔枝核來復丹治伏暑泄瀉裡寒外熱其效如神及治諸腹痛疝氣小兒驚風硝石一兩同硫黃為末入瓷碟內用微火炒以柳枝攪結砂子火不可大恐傷藥力再研極細名二氣末舶上硫黃一兩五靈脂澄去砂橘紅青皮各二兩一作各二錢太陰玄精石一兩上為末醋糊丸豌豆大每服三十丸空心米飲下伏暑悶亂紫蘇湯下大人疝氣諸痛悉宜服之小兒驚風欲絕研碎米湯下衛生潤腸湯治大便燥結不通生地黃生甘草熟地黃當歸尾大黃煨各五錢桃仁麻子仁各一錢紅花五分上用水二盞煎一盞空心服通幽湯治大便燥結堅黑腹痛熟地生地歸梢紅花桃仁泥大黃各一錢升麻二分水一鍾半煎服古方加麻仁甘草即名潤燥湯東垣導滯通幽湯治幽門不通氣不升降大便閉塞凡脾胃初受熱中多有此證治在幽門以辛潤之升麻梢桃仁泥歸身各一錢炙甘草紅花各三分熟地生地各五分水二鍾煎一鍾調檳榔末五分稍熱服河間厚朴湯治大便氣秘不通不能飲食小便清利者謂之虛秘此湯主之蓋實秘者物也虛秘者氣也厚朴一錢半白朮二錢半夏枳殼陳皮甘草各一錢水一鍾半姜三片棗三枚煎八分食遠服如不通加大黃一錢會編皂角散治大小便關格不通經三五日者大皂角燒存性上為末米湯調下又以豬脂一兩煮熟以汁及脂俱食之又宜以八正散加檳榔枳殼朴硝桃仁燈心茶葉煎服良方三仁丸治大腸有熱津液竭燥大便澀柏子仁松子仁火麻仁各一兩上研勻用黃蠟半兩溶化和丸桐子大每服二十丸食前米飲下未快加數服之脾約丸方在攻陣通大便秘結東垣潤腸丸治胃中伏火大便秘澀不通不思飲食或風結血秘皆須潤燥和血疏風則自通矣歸梢大黃煨羌活各五錢麻仁桃仁去皮尖各一兩上以二仁另研為泥外為細末煉蜜為丸桐子大每服三五十丸空心白湯送下一方有皂角仁秦艽各五錢濟生蓯蓉潤腸丸治發汗利小便致亡津液大腑秘結老人虛人宜服肉蓯蓉酒浸焙二兩沉香一兩另研上為末取麻子仁搗爛和水取汁打糊丸桐子大每服七八十丸空心米飲或酒送下益血潤腸丸治老人大便燥結熟地黃六兩杏仁炒去皮尖麻仁各三兩以上三味同杵膏枳殼麩炒橘紅各二兩肉蓯蓉酒洗去甲阿膠炒各一兩蘇子荊芥各一兩當歸三兩上以後七味為末同前三味膏和杵千餘下仍加煉蜜丸桐子大每服五六十丸空心白湯或酒下搜風順氣丸治痔漏風熱閉結老人燥秘等證車前子兩半大麻子微炒二錢大黃五錢半生半熟牛膝酒浸郁李仁菟絲子酒浸枳殼山藥各二錢上為末煉蜜丸桐子大每服三十丸溫酒下聖惠搜風順氣丸治風氣腳氣凡老人小兒血熱風熱而大便秘結者宜服車前子兩半大麻仁微炒去殼郁李仁炮去皮菟絲子酒浸煮牛膝酒浸一宿乾山藥各一兩白檳榔一兩枳殼麩炒防風獨活各八錢大黃五錢半生半熟煉蜜丸小豆大茶酒湯任下早晚各一服地髓湯治死血作淋痛不可忍及五淋小便不通莖中痛甚欲死一名牛膝膏又名苦杖散牛膝不拘多少或用一兩捶碎以水二鍾煎濃汁一鍾去渣日三服又法入麝香少許空心服或單以酒煎亦可牛膝膏治死血作淋桃仁去皮尖歸尾酒洗各一兩生地黃酒洗赤芍藥各兩半川芎五錢牛膝去蘆四兩酒浸一宿上㕮咀用好水十鍾炭火慢煎至二鍾入麝香少許分四次空心服如夏月須用冷水換浸之則不壞經驗琥珀散治老人虛人小便不通淋澀琥珀為末人參煎湯空心以人參湯調服琥珀末一錢導赤散方在寒陣利小腸熱澀萬全木通湯治小便難而黃木通赤茯苓車前葉滑石各二錢瞿麥一錢水一鍾半煎七分食前服蔥白湯治小便卒暴不通小腹脹急氣上衝心悶絕欲死此由暴氣乘膀胱或因驚憂氣無所伸沖逆胞系鬱閉不流陳皮三兩葵子一兩蔥白三莖上㕮咀用水五升煮取二升分三服一云每服五錢蔥白三莖水煎服東垣清肺飲子治渴而小便不利邪熱在上焦氣分也茯苓豬苓澤瀉各一錢半車前子琥珀木通瞿麥萹蓄各一錢通草燈心各五分水二鍾煎一鍾食遠服半夏丸治濕痰流注白濁神效半夏制豬苓等分上為末神麯糊丸服按此方與本事豬苓丸同意詳固陣良方醍醐膏治消渴白砂蜜五斤砂仁為末半兩烏梅一斤捶碎用水四大碗煎一碗去渣上入砂鍋慢火熬赤色成膏取下放冷加白檀細末三錢麝香一字攪勻以瓷器收貯密封冬月沸湯調服夏月涼水亦可無擇養榮湯治五疸虛弱腳軟心悸口淡耳鳴微發寒熱氣急小便白濁當作虛勞治之人參黃耆白朮當歸甘草炙桂心陳皮各一兩白芍藥三兩生地黃茯苓各五錢五味子遠志各三錢上咀每服一兩水一鍾半姜三片棗三枚煎七分食前服綱目綠礬丸治黃胖綠礬六兩以米醋於鐵杓內炒七次干為度放地上出火氣南星炒黃色神麯一兩炒黃色大皂角一斤鐵鍋水煮爛揉出聲膠淨汁入鍋入棗肉再熬成膠和藥紅棗六兩蒸去皮核入皂角汁納熬膠上前三味為細末以皂角棗膠搗丸桐子大每服五丸清晨下床時用薑湯下夜臥上床時再服五丸忌油膩煎炒如身上發紅斑急煎棗湯解之自愈簡易濟眾方治心氣不寧怔忡驚悸清上膈風熱痰飲白石英硃砂等分上為細末每服五分金銀湯調下抱膽丸治男婦一切癲癇風狂或因驚恐畏怖所致及婦人產後驚氣入心並室女經脈通時驚邪蘊結氣實上盛者累效水銀二兩黑鉛一兩半硃砂細研乳香細研各一兩上將黑鉛入銚子內溶化下水銀結成砂子次下硃砂乳香乘熱用柳木槌研勻丸雞豆子大每服一丸空心井花水吞下病者得睡切莫驚動覺來即安再一丸可除根靈苑辰砂散治風痰諸癇狂言妄走精神恍惚思慮迷亂乍歌乍哭飲食失常疾發仆地吐沫戴眼魂魄不守辰砂光明佳者二兩棗仁微炒乳香明者各半兩上為細末先令病人隨量恣飲沉醉但勿令吐居靜室中將前藥都作一服用溫酒一鐘調勻令頓飲之如量淺者但隨量取醉服藥訖便令安臥病淺者半日至一日病深者臥三兩日只令家人潛伺之察其鼻息勻調切勿喚覺亦不可驚觸使覺必待其自醒即神魂定矣萬一驚寤則不可復治吳正肅公少時心病服此一劑五日方寤遂瘥歸神丹治五癇諸風痰壅驚悸神不守舍人參當歸棗仁白茯苓各二兩硃砂大塊者琥珀遠志薑湯制龍齒各一兩金箔銀箔各二十片上為末酒糊丸桐子大每服三五十丸麥門冬湯下得效寧志丸治心風癲癇服此一料其病頓減硃砂佳者一兩人參白茯苓當歸石菖蒲乳香另研棗仁浸去皮取仁炒香熟各五錢上將硃砂用熟絹一小片包裹線扎以獖豬心一枚竹刀切開紙拭去血入硃砂包定再用線縛外以竹箬重裹麻皮紮緊用無灰酒二升同入砂罐煮酒盡取出硃砂另研將豬心用竹刀細切砂盆內研爛拌入藥末再加煮熟淨棗肉四兩搗桐子大留少硃砂為衣每服五七十丸人參湯下人參琥珀丸治癲癇人參琥珀另研茯神白茯苓石菖蒲小者遠志酒浸各半兩乳香另研硃砂水飛棗仁溫酒浸半日去殼紙上炒香各二錢半上為末煉蜜丸桐子大每服三五十丸食後溫酒送下日再服如不能飲者棗湯下此可常服集驗秘方半夏丸治心風癲狂張德明傳其內人失心狂數年服此藥而愈後再作服人參琥珀丸而安半夏一兩用生薑汁煮三五十沸取出切作塊更煮令熟焙乾為末麝香一錢研水銀半兩生薄荷一大握用水銀研如泥上藥同薄荷泥更研千百下丸如芥子每服十五丸金銀湯臨臥服三日再服神應丹治諸癇辰砂佳者不拘多少上研細豬心血和勻以蒸餅裹劑蒸熟就熱取出丸桐子大每服一丸人參湯下食後臨臥服楊氏五癇神應丸治癲癇潮發不問新久白附子炮半兩半夏二兩湯洗南星薑製烏蛇酒浸白礬生各一兩全蠍炒二錢蜈蚣半條白殭蠶炒一兩半麝香三字研皂角二兩捶碎用水半升揉汁去渣同白礬一處熬干為度研硃砂飛二錢半上為細末生薑汁煮麵糊為丸桐子大每服三十丸生薑湯食後送下局方牛黃清心丸治心志不定神氣不寧驚恐癲狂語言譫妄虛煩少睡甚至棄衣登高逾垣上屋或小兒風痰上壅抽搐發熱或急驚痰盛發搐目反口噤煩躁等證牛黃一兩二錢白朮麥門冬枯黃芩各兩半人參神麯蒲黃炒各二兩半山藥七兩炙甘草五兩杏仁去皮尖炒黃色另研桔梗各二兩二錢大豆黃卷微炒當歸肉桂各一兩七錢阿膠白蘞各七錢半白茯苓一兩二錢川芎防風麝香冰片各五錢羚羊角鎊一兩犀角鎊二兩雄黃八錢飛乾薑炮七錢大棗百枚蒸熟去皮研膏金箔一千四百張內四百為衣上另研為末煉蜜與棗杵勻每兩作十丸用金箔為衣每服一丸溫水化下醫統牛黃丸治癲狂風癇心風神不守舍時發無常仆地吐涎不自知覺牛黃珍珠麝香各五分硃砂龍齒各另研犀角琥珀各二錢天門冬去心麥門冬去心人參茯苓各四錢水銀五分防風黃芩知母龍膽草石菖蒲白芍藥全蠍甘草各五錢蜂房三錢金箔銀箔各七十片上為末共和勻煉蜜和搗千杵丸如梧桐子大每服十五丸食後臨臥新竹葉湯下萬氏牛黃清心丸方在小兒治心熱神昏錢氏牛黃丸方在小兒治小兒痰涎風癇雜著牛黃丸方在小兒治小兒驚癇痰涎壅盛三味牛黃丸方在小兒治小兒驚熱疳積蘇合香丸治中氣或卒暴氣逆心痛鬼魅惡氣等證麝香沉香丁香白檀香香附蓽撥白朮訶子煨去皮硃砂水飛青木香烏犀角各二兩熏陸香龍腦各一兩安息香二兩另為末用無灰酒一升熬膏蘇合油二兩入安息香膏內上為細末用安息香膏並煉蜜每兩作十丸熔黃蠟包裹為善每用溫水化服一丸或丸如桐子大每服四五丸龍腦雞蘇丸治上焦之火除煩解勞安吐血衄血清五臟虛煩神志不定上而酒毒膈熱消渴下而血滯五淋血崩等疾麥冬四兩甘草一兩半龍腦薄荷葉一斤阿膠炒人參各二兩黃耆炙一兩生地六兩另為末木通銀柴胡各二兩此二味用沸湯浸一日夜絞取汁上用好白蜜二斤先煎一兩沸卻入地黃末不住手攪徐加木通柴胡汁慢火熬成膏然後加前諸藥末和丸如豌豆大每服二十丸隨證用引送下如室女虛勞寒熱潮作用人參柴胡湯下一方如前有黃連一兩九還金液丹方在小兒治男婦小兒中風驚風痰盛氣急良方香橘湯治七情內傷胸膈不快腹脅脹痛香附炒半夏制橘紅各三錢甘草炙一錢水一鍾半生薑五片紅棗二枚煎八分食遠服良方分氣紫蘇飲治腹脅疼痛氣促喘息蘇葉桔梗去蘆桑白皮草果仁大腹皮白茯苓陳皮炙甘草各一錢半水一鍾半生薑三片入鹽少許煎八分食前服本事枳實散治男子兩脅疼痛枳實一兩白芍藥炒雀腦芎人參各半兩上為細末薑棗湯調服二錢酒亦可食前日三服濟生推氣散治右脅疼痛脹滿不食片薑黃枳殼麩炒桂心各五錢甘草炙二錢上為細末每服二錢薑棗湯食遠調服白朮丸治息積病脅下滿悶喘息不安呼吸引痛不可針炙宜導引服此藥白朮炒枳實麩炒官桂各一兩半人參二兩陳皮桔梗醋炒炙甘草各一兩上為細末煉蜜丸如桐子大每服五七十丸不拘時溫酒送下日三服
