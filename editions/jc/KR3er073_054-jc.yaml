body:
  text: 卷之五十四書集古方八陣和陣局方二陳湯治痰飲嘔惡風寒咳嗽或頭眩心悸或中脘不快或因生冷或飲酒過多脾胃不和等證陳皮半夏制各三錢茯苓二錢炙甘草一錢水二鍾姜三五片棗一枚煎八分食遠服加減二陳湯治嘔吐吞酸胃脘痛呃逆即前方加丁香九粒氣滯甚者可加一二錢丹溪加味二陳湯治食鬱瘀滯胸膈不快蒼朮米泔浸白朮炒橘紅半夏泡茯苓川芎香附各八分枳殼黃連姜炒甘草各五分水盞半煎八分食前稍熱服二術二陳湯治一切嘔吐清水如注蒼朮土炒白朮炒陳皮半夏制茯苓各一錢炙甘草五分水一鍾半姜三片棗一枚煎八分稍熱服虛寒者加人參煨乾姜痰飲加南星倍半夏宿食加神麯砂仁宣明黃芩二陳湯治熱痰黃芩陳皮半夏茯苓等分甘草減半水一鍾半姜三片煎七分食遠服辨疑柴葛二陳湯治一切瘧暑濕勞食等證柴胡乾葛陳皮半夏茯苓甘草白朮蒼朮制川芎黃芩各等分若陰瘧除此味水二鍾姜三片煎服內乾葛川芎蒼朮乃發散之劑若久瘧及發散過者除之陽分汗多加人參黃耆去乾葛陰分虛者加酒炒芍藥當歸生地久瘧微邪潮熱加四君子湯去祛邪之藥若欲截瘧加常山檳榔青皮貝母各一錢桂附二陳湯方在熱陣治寒瘧厥冷金匱小半夏湯治嘔吐谷不得下及心下有飲者半夏一升生薑半斤上二味以水七升煮取一升半分溫再服局方用半夏五錢生薑二錢半水一鍾半煎服金匱小半夏加茯苓湯治卒嘔吐心下痞膈間有水眩悸者即前方加茯苓三兩煎法同金匱大半夏湯治胃反不受食食入即吐外臺云治嘔而心下痞硬者半夏二升洗完用人參三兩白蜜一斤上三味以水一斗二升和蜜揚之二百四十遍煮藥取三升半溫服一升余分再服御藥大半夏湯一名橘皮湯治痰飲及脾胃不和半夏陳皮白茯苓各二錢水二鍾姜五片煎八分溫服茯苓半夏湯治嘔吐噦心下堅痞膈間有水痰眩驚悸及小兒等病白茯苓二兩半夏五錢上每服三五七錢薑水煎服宣明橘皮半夏湯治痰涎壅嗽久不已者常服潤燥解肌熱止嗽陳皮五錢半夏制二錢半水一鍾半加生薑三五片煎七分溫服靈樞秫米半夏湯久病不寐者神效世醫鮮用之秫米一升半夏五合上用千里長流水八升揚之萬遍取清者五升煮秫米半夏炊以葦薪令竭至一升半去渣飲汁一小杯日三服其新病者覆杯即臥汗之即已久病者三日已也東垣半夏白朮天麻湯治眩暈及足太陰痰厥頭疼半夏錢半白朮神麯炒各一錢麥芽陳皮各錢半人參黃耆茯苓蒼朮天麻澤瀉各五分黃柏二分乾薑三分上㕮咀每服半兩水二鍾煎八分食遠熱服金匱黃芩半夏生薑湯治乾嘔而利者黃芩生薑各三兩炙甘草芍藥各二兩半夏半升大棗十二個上六味以水一斗煮取三升去滓溫服一升日再夜一服東垣平胃散治脾胃不思飲食心腹脅肋脹滿刺痛嘔噦噁心吞酸噫氣體重節痛自利霍亂噫膈反胃等證厚朴薑製炒陳皮去白各五兩蒼朮去皮米泔浸炒八兩炙甘草三兩本方加人參茯苓各二兩即名參苓平胃散上為末每服二錢水二鍾姜三片棗二枚煎七分去渣溫服或去薑棗入鹽一小捻單以沸湯點服亦可如小便不利加茯苓澤瀉如飲食不化加神麯麥芽枳實如胃中氣痛加木香枳實或枳殼如脾胃困倦加人參黃耆如有痰加半夏如便硬腹脹加大黃芒硝如脈大內熱加黃連黃芩調氣平胃散治胃氣不和脹滿腹痛厚朴制陳皮木香烏藥白豆蔻砂仁白檀香各一錢甘草五分蒼朮錢半藿香一錢二分水一鍾半生薑三片煎八分食遠溫服錢氏益黃散治脾土虛寒寒水反來侮土而嘔吐不食或肚腹作痛或大便不實手足逆冷等證陳皮一兩青皮訶子肉炮去皮炙甘草各半兩丁香二錢上每服四錢水煎服藿香正氣散治外感風寒內停飲食頭疼寒熱或霍亂泄瀉痞滿嘔逆及四時不正之氣瘧痢傷寒等證藿香紫蘇桔梗白芷大腹皮各一錢陳皮半夏茯苓甘草白朮厚朴各八分水二鍾姜三片棗一枚煎八分熱服取汗不換金正氣散治脾氣虛弱寒邪相搏痰停胸膈致發寒熱或作瘧疾或受山嵐瘴氣等毒厚朴薑製藿香半夏蒼朮米泔浸陳皮各一錢甘草炙五分薑棗水煎服陳氏不換金正氣散治感冒風寒或傷生冷或瘴瘧或疫癘蒼朮米泔浸炒厚朴薑汁炒各四兩橘紅三兩炙甘草半夏制藿香各二兩人參木香濕紙裹煨白茯苓各一兩上每服一兩薑棗水煎服徐氏正氣散正胃氣進飲食退寒瘧食瘧瘴氣脾胃滯者用之為宜藿香草果各二兩半夏制陳皮厚朴砂仁炙甘草各一兩上為末每服三錢加生薑七片棗三枚同煎俟瘧未發前和渣服濟生大正氣散治脾胃不和為風寒濕氣所傷心腹脹悶有妨飲食白朮陳皮各二錢半夏制藿香葉厚朴姜炒桂枝枳殼檳榔乾薑炮各錢甘草炙五分水一鍾半姜三片棗一枚煎七分不時溫服東垣升陽益胃湯治秋燥令行濕熱少退脾胃虛弱怠惰嗜臥體重節痛四肢不收口苦舌乾飲食不消大便不調小便頻數兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也當升陽益胃良方無黃耆甘草半夏芍藥四味人參炙甘草半夏脈澀者宜用各一錢黃耆二錢白朮三分白芍防風羌活獨活各五分柴胡茯苓小便利者勿用澤瀉不淋者勿用各三分陳皮四分黃連二分上㕮咀每服三錢漸加至五錢生薑五片棗二枚水三鍾煎一鍾早飯午飯之間溫服忌語話一二時及酒濕助火之物服藥後如小便畢而病反增是不宜利小便也當去茯苓澤瀉若得喜食增食初一二日間不可太飽恐藥力尚淺胃氣再傷不得轉運也或用美食以助藥力而滋胃氣慎不可淡食以損藥力而助邪氣之沉降也亦可小役形體使胃氣升發切勿大勞致令復傷但以胃氣安靜為尤善海藏白朮湯治風濕惡寒脈緩白朮防風甘草上㕮咀加生薑煎服濟生白朮湯治五臟受濕咳嗽痰多氣喘身重脈濡細白朮橘紅半夏茯苓各二錢炙甘草一錢水一鍾半姜五片煎七分食遠服良方三味白朮湯方在婦人治妊娠內熱心痛良方四味白朮湯方在婦人治妊娠胃虛惡阻白朮散治自汗盜汗極效白朮半斤上將白朮切成小塊用浮麥一升水一斗同煮乾如白朮尚硬再加水煎透爛取起切片焙乾為末每服二三錢仍用浮麥煎湯食遠調服如治小兒以炒黃耆煎湯量兒大小與服忌蘿蔔辛辣炙爆之物乳母尤忌宣明白朮散方在固陣治虛風多汗痿弱良方白朮散方在婦人治妊娠傷寒內熱等證調胃白朮散治脾胃不和腹脹泄瀉身面浮腫白朮茯苓各二錢陳皮白芍藥炒澤瀉檳榔各一錢木香五分水二鍾姜三片煎八分食遠服如腫不退倍加白朮並枳實麩炒一錢白朮芍藥湯治脾經受濕水泄體重微滿困弱無力不欲飲食或暴泄無數水穀不化宜此和之白朮炒芍藥炒各一兩甘草炒半兩上每用一兩水煎服草窗白朮芍藥散治痛瀉要方白朮炒三兩芍藥炒二兩陳皮炒兩半防風一兩上或煎或丸或散皆可用久瀉者加炒升麻六錢金匱苓桂術甘草湯病痰飲者當以溫藥和之凡心下有痰飲胸脅支滿目眩此方主之茯苓四兩桂枝白朮各三兩甘草二兩上以水六升煮取三升溫分三服小便則利神朮散治傷寒頭痛身熱等證蒼朮二錢川芎藁本甘草各一錢水二鍾姜三片煎一鍾不拘時服局方神朮散方在散陣治四時瘟疫頭疼發熱海藏神術湯治風濕惡寒脈緊蒼朮防風甘草上㕮咀加蔥白煎服治剛痓汗者加羌活或獨活麻黃約說沉香降氣散治陰陽壅滯氣不升降胸膈痞塞或留飲吞酸脅下妨悶沉香二錢八分砂仁七錢半香附子去毛鹽水炒六兩二錢五分炙甘草五錢五分上為極細末每服二錢入鹽少許沸湯調不拘時服或淡薑湯亦可和劑蘇子降氣湯治心腹脹滿喘促氣急消痰進食蘇子炒半夏曲前胡當歸陳皮厚朴制各八分桂甘草各三分水二鍾姜三片煎七分不拘時服醫林小降氣湯治濁氣在上痰涎壅盛家紫蘇臺烏藥白芍陳皮各二錢炙甘草五分水一鍾半生薑三片棗一枚煎七分食遠服統旨木香順氣散治氣滯腹痛脅痛木香香附檳榔青皮陳皮枳殼砂仁厚朴制蒼朮各一錢炙甘草五分水二鍾姜三片煎八分食遠服局方木香調氣散木香白檀香白豆蔻丁香各二錢炙甘草藿香各八錢砂仁四錢上為末每服二錢入鹽少許沸湯點服流氣飲子治三焦氣壅五臟不和胸膈痞滿肩背攻痛嘔吐氣喘痰盛浮腫等證即外科方脈流氣飲木香磨汁檳榔青皮陳皮枳殼烏藥大腹皮枳實茯苓紫蘇桔梗防風黃耆當歸川芎芍藥甘草半夏制各等分水一鍾半姜三片棗一枚煎服和劑二十四味流氣飲調營衛利三焦行痞滯消腫脹紫蘇陳皮青皮厚朴制炙甘草香附炒各四兩木通二兩大腹皮丁香皮檳榔肉桂木香草果莪朮炮藿香各一兩半麥冬人參白朮赤茯苓木瓜白芷半夏枳殼炒石菖蒲各一兩上每服三錢姜四片棗二枚水煎服七氣湯治七情之氣鬱結於中心腹絞痛不可忍及不能飲食半夏制五兩人參肉桂甘草炙各一兩上每服三五錢水一鍾半姜三片煎八分服三因七氣湯治如前按此方即局方四七湯也在後半夏五兩制茯苓四兩厚朴三兩紫蘇二兩上每服三五錢姜七片棗二枚水煎服加味七氣湯即前七氣湯加厚朴茯苓各等分局方七氣湯治七情鬱結臟氣互相刑剋陰陽不和揮霍撩亂吐瀉交作半夏制厚朴芍藥茯苓各二錢人參肉桂橘紅紫蘇各一錢水二鍾加薑棗煎服指迷七氣湯治七情相干陰陽不得升降氣道壅滯攻衝作疼積聚癥瘕脹滿等證半夏甘草各七分半香附錢半青皮陳皮桔梗官桂藿香益智莪朮煨各一錢上每服三五錢姜三片棗一枚水煎服統旨七氣湯有三稜玄胡索薑黃草豆蔻無半夏桔梗濟生大七氣湯有三稜無半夏四磨飲治諸逆氣沉香烏藥枳實檳榔上四味用白湯共磨服或下養正丹尤佳一方用白酒磨濟生方用人參無枳實本方加木香即名五磨飲濟生疏鑿飲治水氣通身浮腫喘呼氣急煩渴大小便不利澤瀉茯苓皮木通商陸大腹皮檳榔羌活去蘆秦艽去蘆椒目赤小豆炒上㕮咀每服六七錢水一鍾半姜五片煎服良方厚朴湯治心腹脹滿此病氣壅實者之治法也厚朴四五錢薑汁炒加生薑五七片水煎溫服或間用沉香降氣散木香寬中散治七情傷於脾胃以致胸膈痞滿停痰氣逆或成五膈之病青皮陳皮丁香各四兩厚朴制一斤甘草炙五兩白豆蔻二兩香附炒砂仁木香各三兩上為末每服二錢薑鹽湯調服若脾胃虛損之證不可過服或與六君子兼用之良方木香分氣飲治氣滯留注四肢腹急中滿胸膈脅肋膨脹虛氣上衝小便臭濁木香豬苓澤瀉赤茯苓半夏枳殼檳榔燈草蘇子等分上㕮咀每服一兩水一鍾半煎八分入麝香末少許食遠服良方人參木香散治水氣病人參木香茯苓滑石琥珀海金沙枳殼檳榔豬苓甘草等分上㕮咀每服一兩生薑三片水一鍾半煎七分日進三服不拘時消導寬中湯治氣滯食滯水腫脹滿白朮一錢半枳實麩炒厚朴薑製陳皮半夏茯苓山楂神麯炒麥芽炒蘿蔔子炒各一錢水一鍾半姜三片煎八分食遠服小便不利加豬苓澤瀉化滯調中湯治食滯脹滿白朮錢半人參白茯苓陳皮厚朴薑汁炒山楂半夏各一錢神麯炒麥芽炒各八分砂仁七分水一鍾半姜三片煎七分食前服脹甚者加蘿蔔子炒用一錢麵食傷者尤宜用索矩三和湯治脾濕腫滿陳皮厚朴姜炒白朮檳榔各一錢紫蘇七分海金沙木通各五分水一鍾半姜三片棗一枚煎七分食遠服寶鑑導滯通經湯治脾濕氣不宣通面目手足浮腫木香白朮桑白皮陳皮各五錢茯苓一兩上㕮咀每服七八錢水一鍾