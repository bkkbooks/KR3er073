便溏瀉自汗口渴不思飲食人參黃耆升麻蒼朮各一錢白朮炒神麯炒各五分陳皮炙甘草黃柏麥冬當歸各五分乾葛五味澤瀉青皮各三分水煎溫服局方香薷飲治一切暑熱腹痛或霍亂吐利煩心等證按此方惟治陽暑陰暑不宜用香藿一斤厚朴制白扁豆炒各半斤每服五錢水一鍾半煎八分不拘時溫服五物香薷飲治一切暑毒腹痛霍亂吐瀉或頭痛昏憒等證香薷茯苓白扁豆厚朴炙甘草各一錢上為咀水一鍾半煎服本方加黃連即名黃連香薷飲百一十味香薷飲治伏暑身體倦怠神昏頭重吐瀉等證香薷二錢人參黃耆白朮茯苓厚朴姜炒陳皮白扁豆炒各一錢木瓜炙甘草各五分水二鍾煎七分食遠溫服黃連香薷飲治陽暑中熱黃連四兩香薷一斤厚朴半斤每服四錢如前煎服局方縮脾飲解伏暑除煩渴消暑毒止吐瀉霍亂白扁豆炒乾葛各二兩一作乾薑炙甘草烏梅肉砂仁草果各四兩上㕮咀每服四錢水煎冷服局方七味滲濕湯治寒濕所傷身體重著如坐水中小便或赤澀大便溏泄因坐臥濕地或陰雨之所襲也炙甘草蒼朮白朮各一錢茯苓乾薑各二錢丁香橘紅各二分半水一鍾半姜三片棗一枚煎七分食前服清熱滲濕湯方在寒陣治濕熱浮腫小水不利金匱防己黃耆湯治風濕脈浮身重汗出惡風者防己黃耆去蘆各一兩甘草炙半兩白朮七錢半上㕮咀每用五錢生薑四片棗一枚水盞半煎八分溫服良久再服喘者加麻黃半兩胃中不和加芍藥氣上衝者加桂枝下有陳寒者加細辛服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰下溫令微汗瘥百一除濕湯治中濕身體重著腰腿痠疼大便溏小便或澀或利半夏曲蒼朮厚朴茯苓各錢半陳皮七分藿香炙甘草各五分水二鍾姜七片棗一枚煎七分食遠服羌活勝濕湯治外傷濕氣一身盡痛者此方通治濕證羌活獨活各二錢藁本防風各錢半蔓荊子川芎炙甘草各五分水二鍾煎八分食後溫服如身重腰痛沉沉然經有寒也加酒防己五分附子五分東垣升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃四肢困弱升麻柴胡羌活防風半夏益智仁神麯澤瀉各五分麥蘖面陳皮豬苓甘草各三分蒼朮一錢上㕮咀作一服水三大盞生薑三片棗二枚煎至一盞去柤空心服拔萃升陽除濕防風湯治下痢下血大便秘滯裡急後重數至圊而不能便或下白膿慎勿利之舉其陽則陰自降矣防風二錢白朮白茯苓白芍藥各一錢蒼朮酒浸去皮炒四錢上先將蒼朮用水一鍾半煎至一鍾入諸藥同煎至八分食前服三因白朮酒治中濕骨節疼痛白朮一兩用酒三盞煎一盞不拘時頻服不能飲酒者以水代之仲景五苓散治暑熱煩躁霍亂泄瀉小便不利而渴淋澀作痛下部濕熱白朮豬苓茯苓各七錢半肉桂五錢澤瀉一兩二錢半古法為細末每服二錢白湯調下日三服今法以水煎服加減五苓散治濕熱黃疸小水不利即前五苓散去肉桂加茵陳各等分加味五苓散治濕勝身痛小便不利體痛發渴此太陽經解表滲利之劑治風濕寒濕藥也即前五苓散加羌活金匱茵陳五苓散治黃疸茵陳蒿末十分五苓散五分上和勻先食飲方寸匕日三服柴胡茵陳五苓散治傷寒溫濕熱病發黃小便赤黑煩渴發熱此以汗下太早濕熱未除以致遍身發黃嘗用此治之甚效五苓散一兩加茵陳半兩車前子一錢木通柴胡各一錢半上分二服用水一鍾半燈草五十莖煎服連進數服小便清利而愈因酒後者加乾葛二錢四苓散即前五苓散去肉桂仲景豬苓湯治傷寒下後脈浮發熱渴欲飲水小便不利及少陰病下利咳而嘔渴心煩不得眠者豬苓去皮茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓納阿膠烊盡服七合日三服茯苓湯治濕熱泄瀉或飲食泄瀉茯苓白朮炒各五錢上用水煎食前服一方有芍藥等方名白朮散胃苓湯治脾濕太過泄瀉不止陳皮厚朴甘草蒼朮白朮茯苓澤瀉獵苓肉桂各等分每服五六錢姜五片棗二枚水煎服橘半胃苓湯治嘔吐泄瀉脹滿不下食不知味橘紅半夏制各一錢蒼朮米泔浸炒白朮炒厚朴炙甘草人參茯苓澤瀉茅根各二錢薑汁數匙水二鍾煎一鍾入薑汁再煎一二沸陸續飲之柴苓湯治身熱煩渴泄瀉白朮茯苓澤瀉柴胡豬苓黃岑上水煎服加減柴苓湯治諸疝此和肝腎順氣消疝治濕之劑柴胡甘草半夏茯苓白朮澤瀉豬苓山梔炒山楂荔核煨各等分上㕮咀水二鍾姜三片煎八分食前服局方真人養臟湯治大人小兒冷熱不調下痢赤白或如膿血魚腦裡急後重臍腹㽲痛或脫肛墜下酒毒便血並治之人參當歸訶子肉豆蔻麵煨炙甘草木香各一錢芍藥白朮各三錢肉桂五分粟殼蜜炙二錢水二鍾煎八分食遠服臟寒者加附子一錢良方草果散治中寒泄瀉腹痛無度厚朴薑汁炒二兩肉豆蔻麵煨草豆蔻煨各十個上每服三錢薑水煎服經驗大橘皮湯治濕熱內甚心腹脹滿水瀉小便不利橘皮檳榔各一錢滑石茯苓豬苓澤瀉白朮各二錢官桂甘草各五分水一鍾半生薑三片煎八分食遠服消食導氣飲治凡遇氣怒便作泄瀉此必因怒挾食所致其有脾土本虛不勝肝氣者此方主之人參白朮茯苓炙甘草川芎半夏青皮陳皮枳實香附神麯砂仁木香上酌虛實增減用水一鍾半姜三片煎七分食遠溫服外臺黃芩湯治乾嘔下利黃芩人參乾薑各三兩桂枝一兩半夏半升大棗十二枚上六味以水七升煮取三升溫分三服秘傳斗門方治毒痢臟腑撮痛膿血赤白或下血片日夜不息及噤口惡痢裡急後重全不進食久渴不止他藥不能治者立見神效乾薑炒四錢粟殼蜜炙八錢地榆甘草炙各六錢白芍藥炒三錢黑豆炒去皮一兩半上㕮咀可分三四帖用水一鍾半煎七分食遠熱服治痢簡易八方外臺秘要方治痢下白膿不止用白麵一味炒熟搗篩煮米粥內方寸匕食之此療瀉痢日至百行藥所不及者也千金方治痢用薤白一握細切煮粥食之聖惠方治赤白痢疾以蔥一握切和米煮粥空腹食之千金翼方用雞子以醋煮極熟空腹食之治久痢赤白又方用乾薑於火內燒焦黑不可成炭放瓷瓶中閉冷為末每服一錢米飲調下炙雞散治脾胃氣虛腸滑下痢用黃雌雞一隻制如食法以炭火炙之捶扁用鹽醋刷遍又炙令極熟而燥空腹食之一方治熱毒下血痢久不已用當歸黃連各三錢烏梅五個水煎八分空心服類方曲術丸治暑濕暴瀉壯脾溫胃及治飲食所傷胸膈痞悶神麯炒蒼朮米泔浸一宿切炒等分上為細末麵糊丸桐子大每服七八十丸米飲下不拘時局方戊己丸治脾經受濕瀉痢不止米穀不化臍腹刺痛黃連炒吳茱萸炮炒白芍藥各五兩一方黃連四兩吳茱萸二兩芍藥三兩上為細末麵糊丸桐子大每服七十丸空心食前米飲下聖惠雙荷散治卒暴吐血藕節七節荷葉頂七個上入蜜一匙擂細水二鍾煎八分溫服或為末蜜湯調下二錢亦妙直指側柏散治內損失血飲酒太過勞傷於內氣血妄行血如湧泉口鼻皆出須臾不救服此即安又治男婦九竅出血人參荊芥穗燒灰各一錢側柏葉蒸乾一兩半上為末每服三錢入飛羅面三錢拌勻汲水調黏啜服地黃煎治吐血憂患內傷胸膈疼痛及虛勞唾血百病久服佳用生地黃一斤搗取汁於銀鍋或砂鍋微火煎一二沸入白蜜一斤再煎至三升每服半升日三服一方用生地黃汁一升生薑汁一合和勻溫服日三四次一方治虛勞吐血用生地黃五斤搗以好酒五升煮去渣服局方枇杷葉散治暑毒攻心嘔吐鮮血香薷二錢厚朴甘草麥門冬木瓜茅根各一錢陳皮枇杷葉丁香各五分上為末每服二錢薑水煎服阿膠散治肺燥咳嗽不已及唾血阿膠炒白芨各二錢天門冬北五味子人參生地黃茯苓各一錢上以白芨為細末余藥用水一鍾半入蜜二匙秫米百粒生薑五片同煎熟入白芨末調食後溫服良方阿膠散方在婦人安胎補血氣錢氏阿膠散方在小兒治小兒咳嗽喘急綠雲散治吐血柏葉人參阿膠炒珠百合上等分為末每服二錢不拘時糯米飲調下簡易黑神散治一切吐血及傷酒食醉飽低頭掬損吐血致多並血熱妄行口鼻俱出但聲未失無有不效百草霜不拘多少村居者佳上研細每服二錢糯米煎湯下喜涼水者以新汲水調服衄血者用少許吹鼻皮破出血或炙瘡出血摻之即止局方黑神散方在婦人治產後惡露不盡胎衣不下攻心腹痛天門冬丸治吐血咯血大能潤肺止嗽天門冬一兩貝母杏仁各七錢炒白茯苓阿膠甘草各五錢上為細末煉蜜丸芡實大每噙化一丸津嚥下發灰散治起居所傷小便尿血或忍尿脬轉臍下急痛小便不通又治肺疽心衄內崩吐血舌上出血亂髮燒灰即血餘也上每服二錢以米醋湯調服棕灰散治大腸下血不止或婦人崩漏下血敗棕不拘多少燒灰存性為細末每服二錢空心好酒或清米飲調服寶鑑平胃地榆湯治邪陷陰分則陰結便血陳皮厚朴蒼朮甘草地榆人參白朮當歸芍藥升麻乾葛茯苓神麯乾薑炒香附各等分上咀每服五錢加薑棗煎空心服海藏愈風湯一名舉卿古拜散治一切失血筋脈緊急產後或汗後搐搦荊芥穗為細末上先炒大豆黃卷以酒沃之去黃卷取淨汁調前末三四錢服之輕者一服重者二三服即止氣虛者忌服童便調亦可局方小烏沉湯治氣逆便血不止烏藥一兩炙甘草香附醋炒四兩上為末每服二錢食前鹽湯下除濕和血湯治陽明經濕熱虛陷便血腹痛當歸身酒拌牡丹皮生地黃熟地黃黃耆炙炙甘草各一錢白芍藥錢半生甘草升麻陳皮秦艽蒼朮肉桂各五分水二鍾煎八分空心候宿食消盡熱服驅瘧飲治諸瘧久瘧不愈者草果青皮陳皮人參茯苓半夏制厚朴蒼朮炒檳榔白朮甘草各一錢良薑五分水二鍾棗二枚烏梅一個煎八分食遠服祛瘧飲三發後火盛氣強者可因其衰而減之立效貝母去心紫蘇各一錢橘紅山楂肉枳實各錢半檳榔八分柴胡七分甘草炙三分知母去毛淨鹽酒炒過五錢上用水二鍾煎一鍾又將滓再煎至八分並一處露過宿臨發日早溫服一半未發前一時許再溫服後半截瘧飲史崇質傳云得之四明胡君屢試屢驗黃耆炙一錢六分人參白朮白茯苓橘紅砂仁草果五味子各一錢甘草七分烏梅三枚水二鍾姜三片棗二枚煎一鍾溫服濟生萬安散治一切瘧病之初邪盛氣壯者進此藥以逐邪取效若氣虛胃弱及妊婦皆不宜用蒼朮厚朴姜炒陳皮檳榔常山酒浸甘草炙各一錢半上咀水一鍾半煎八分露一宿臨發早溫服忌熱物濟生鱉甲飲子治瘧疾久不愈脅下痞滿腹中結塊名曰瘧母鱉甲醋炙川芎黃耆草果仁檳榔白朮橘紅白芍藥甘草厚朴制等分上㕮咀每服五七錢水一鍾姜七片棗一枚烏梅少許煎七分溫服無時濟生清脾飲治癉瘧脈來弦數但熱不寒或熱多寒少口苦咽乾小便赤澀厚朴制青皮白朮草果仁柴胡茯苓黃芩半夏甘草各等分每服四五錢水一鍾半姜三片棗一枚未發前服忌生冷油膩寒多者可加肉桂熱多者可加黃連局方草果飲治諸瘧通用草果川芎白芷蘇葉青皮陳皮良薑炙甘草上等分㕮咀每服五錢水一鍾半煎七分溫服留滓服並煎當發日進三服不以時加姜煎亦治寒瘧簡易七寶飲治一切瘧疾不拘寒熱鬼瘧食瘧常山草果檳榔厚朴薑製青皮陳皮甘草各一錢上用酒水各一鍾共煎一鍾將滓亦如前再煎一鍾各另放俱露一宿至次日當發清晨面東先服頭服少頃再飲二服大有神效簡易四獸飲治諸瘧和胃消痰人參白朮茯苓甘草炙減半陳皮半夏草果烏梅各等分大棗三枚生薑五片上咀以鹽少許醃食頃濕紙厚裹慢火煨香熟每服四五錢水一鍾半煎七分溫服局方常山飲治瘧疾發散