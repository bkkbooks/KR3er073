厭厭不能食而臟腑或秘或溏此皆胃虛所致常服之和中理氣消痰積去濕滯厚腸胃進飲食白朮麩炒二兩四錢厚朴薑製二兩陳皮一兩六錢半夏湯泡一兩檳榔五錢枳實五錢炙甘草四錢木香二錢上用生薑自然汁浸蒸餅為丸桐子大每服三四十丸食遠溫水送下東垣和中丸開胃進食人參白朮各三錢乾薑炮甘草炙陳皮各一錢木瓜一枚上為末蒸餅為丸桐子大食前白湯下三五十丸養胃進食丸治脾胃虛弱心腹脹滿面色痿黃肌肉消瘦怠惰嗜臥或不思食常服滋養脾胃進飲食消痰涎闢風寒濕冷邪氣人參白茯苓白朮泔浸炒厚朴姜炒各二兩神麯二兩半炒大麥蘖炒橘紅各一兩半甘草炙一兩蒼朮堅小而甘者米泔浸去皮五兩炒上九味為末水麵糊丸桐子大每服三五十丸食前米湯或薑湯送下消食丸治一切食積停滯山楂神麯炒麥芽炒蘿蔔子青皮陳皮香附各二兩阿魏一兩醋浸另研湯泡蒸餅為丸桐子大每服五十丸食遠薑湯下濟生導痰湯治一切痰涎壅盛或胸膈留飲痞塞不通陳皮半夏茯苓甘草南星枳殼炒上等分每服六錢水二鍾姜五片或十片煎七分食後服海藏五飲湯一留飲在心下二澼飲在脅下三痰飲在胃中四溢飲在膈上五流飲在腸間凡此五飲以酒後飲冷過多所致旋覆花人參橘紅炒枳實厚朴薑汁炒半夏茯苓澤瀉白朮豬苓各八分前胡桂心芍藥炙甘草各五分水二鍾姜十片煎八分不拘時服飲酒傷者加葛根砂仁外臺茯苓飲治胸有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食茯苓人參白朮各三兩枳實二兩陳皮二兩半生薑四兩上六味水六升煮取一升八合分溫三服如人行八九里進之茯苓飲子治痰迷心竅怔忡不止陳皮半夏茯苓茯神麥冬各錢半沉香甘草各五分上水一鍾半姜五片煎七分服千緡湯治痰喘不得臥人扶而坐一服即安半夏泡七個炙甘草皂角炙各一寸生薑一指大水一鍾半煎七分不拘時服玉液湯治七情所傷氣鬱生涎隨氣上逆頭目眩暈心𩞄忪悸眉稜骨痛半夏大者六錢湯泡七次切片上作一服水鍾半姜十片煎七分入沉香末少許不拘時溫服局方四七湯治七情之氣結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下此七情所為也或中脘痞滿氣不舒快痰飲嘔惡皆治之半夏湯泡錢半茯苓一錢二分蘇葉六分厚朴薑製九分水一鍾半生薑七片紅棗二枚煎八分不時服得效加味四七湯治心氣鬱滯豁痰散驚半夏制二錢半厚朴制茯苓各一錢半蘇葉茯神各一錢遠志石菖蒲甘草各五分水二鍾加薑棗煎服玉機澤瀉湯治心下有支飲苦眩冒澤瀉五錢白朮二錢水二鍾煎七分食遠溫服硃砂消痰飲治痰迷心竅驚悸怔忡膽星五錢硃砂二錢半另研麝香二分另研上為末臨臥薑湯調下一錢深師消飲丸治停飲胸滿嘔逆腹中水聲不思飲食白朮二兩炒茯苓五錢枳實炒乾薑炮各七錢上為細末蜜丸桐子大溫水下三十丸秘方星香丸治諸般氣嗽生痰南星礬水泡一宿半夏制同上共泡之香附皂角水浸一周時各二兩陳皮去白四兩上不見火為末薑汁糊丸每服五十丸臨臥薑湯送下祛痰丸治風痰頭旋惡逆胸膈不利南星生半夏生赤茯苓橘紅乾薑炮等分上為細末麵糊丸梧子大每服五七十丸不拘時米飲送下天花丸亦名玉壺丸治消渴引飲無度人參天花粉各等分上為細末煉蜜丸桐子大每服三五十丸麥門冬湯下局方玉壺丸治風痰頭痛亦治諸痰南星生半夏生各一兩天麻五錢白麵三兩上為末水和為丸桐子大每服三五十丸用水一大盞煎沸入藥煮令藥浮即熟漉出放溫別用生薑湯下一方用南星半夏各二兩俱制天麻白礬各五錢共為末以薑汁糊丸如胡椒大每服三十丸白湯下玉液丸治風熱痰涎壅盛利咽膈清頭目止咳嗽除煩熱半夏湯泡焙為細末枯礬研細各十兩寒水石煅赤為末水飛三十兩上研勻麵糊丸桐子大每服三十丸食後淡薑湯下潔古玉粉丸治氣痰咳嗽南星半夏各一兩俱湯浸橘紅二兩上為末湯浸蒸餅為丸桐子大每服五七十丸人參生薑湯任下食後瑞竹杏仁丸治久嗽及老人咳嗽喘急不已睡臥不得服此立效杏仁去皮尖炒胡桃肉去皮上等分研為膏加煉蜜丸如彈子大每服一丸食後細嚼薑湯下許學士神術丸治痰飲此足陽明太陽治濕發散之劑也茅山蒼朮一斤米泔浸一宿去皮切片焙乾為末生油麻五錢水二盞研細取漿大棗十五個煮取肉研旋入麻漿拌和藥上三味和丸桐子大日乾每服五七十丸空心溫酒下三因曲術丸治中脘宿食留飲酸蜇心痛嘈雜口吐清水神麯炒三兩陳皮一兩蒼朮米泔浸三宿切炒一兩半上為末生薑汁別煮神麯糊為丸薑湯送下百一三仙丸治一切濕痰痰飲胸膈煩滿痰涎不利頭目不清南星半夏香附各等分上南星半夏以滾湯泡過為末用生薑自然汁和不可太軟用楮葉或荷葉包住外以蒲包再包盦之令發黃色曬乾收用須五六月內造如盦之法每制丸藥用藥二兩香附一兩同為細末麵糊為丸綠豆大每服四五十粒食後薑湯下青州白丸子治男婦風痰壅盛手足癱瘓嘔吐涎沫牙關緊急痰喘麻木及小兒驚風嘔吐半夏七兩南星三兩白附子二兩川烏半兩俱生用上俱研羅為細末用生絹袋盛以瓷盆盛井花水擺洗粉出未出者以手揉擺再擂再擺以盡為度然後日曬夜露每日一換新水攪而復澄春五夏三秋七冬十日去水曬乾白如玉片以糯米粉作稀糊丸如綠豆大每服二十丸生薑湯下無時如癱瘓用酒下小兒驚風薄荷湯下五七丸局方琥珀壽星丸天南星一斤硃砂二兩研琥珀一兩研上先掘地坑深二尺用炭火五斤於坑內燒熱紅取出炭掃淨以好酒一升澆之將南星乘熱下坑內用盆急蓋以泥壅護經一宿取出焙乾為末同二味和勻用