body:
  text: 卷之三十一貫集雜證謨痰飲經義氣交變大論曰歲土太過飲發中滿食減五常政大論曰太陽司天濕氣變物水飲內蓄中滿不食六元正紀大論曰少陰司天四之氣民病飲發太陰所至為積飲痞隔土鬱之發為飲發注下至真要大論曰歲太陰在泉民病飲積歲陽明在泉民病喜嘔嘔有苦太陰之勝飲發於中太陰之復飲發於中唾吐清液太陽之復唾出清水及為噦噫諸病水液澄澈清冷皆屬於寒論證共六條痰飲一證其在內經止有積飲之說本無痰證之名此內經之不重痰證概可知矣及考痰之為名雖起自仲景今後世相傳無論是痰非痰開口便言痰火有云怪病之為痰者有云痰為百病母者似乎痰之關係不為不重而何內經之忽之也不知痰之為病必有所以致之者如因風因火而生痰者但治其風火風火息而痰自清也因虛因實而生痰者但治其虛實虛實愈而痰自平也未聞治其痰而風火可自散虛實可自調者此所以痰必因病而生非病之因痰而致也故內經之不言痰者正以痰非病之本而痰惟病之標耳今舉世醫流但知百計攻痰便是治病竟不知所以為痰而痰因何而起是何異引指以使臂灌葉以救根者乎標本誤認而主見失真欲求愈病難矣難矣一痰之與飲雖曰同類而實有不同也蓋飲為水液之屬凡嘔吐清水及胸腹膨滿吞酸噯腐渥渥有聲等證此皆水穀之餘停積不行是即所謂飲也若痰有不同於飲者飲清澈而痰稠濁飲惟停積腸胃而痰則無處不到水穀不化而停為飲者其病全由脾胃無處不到而化為痰者凡五臟之傷皆能致之故治此者當知所辨而不可不察其本也一痰即人之津液無非水穀之所化此痰亦既化之物而非不化之屬也但化得其正則形體強營衛充而痰涎本皆血氣若化失其正則臟腑病津液敗而血氣即成痰涎此亦猶亂世之盜賊何孰非治世之良民但盜賊之興必由國運之病而痰涎之作必由元氣之病嘗聞之立齋先生曰使血氣俱盛何痰之有余於初年頗疑此言而謂豈無實痰乎及今見定識多始信其然也何以見之蓋痰涎之化本由水穀使果脾強胃健如少壯者流則隨食隨化皆成血氣焉得留而為痰惟其不能盡化而十留一二則一二為痰矣十留三四則三四為痰矣甚至留其七八則但見血氣日削而痰涎日多矣此其故正以元氣不能運化愈虛則痰愈盛也然則立齋之言豈非出常之見乎今見治痰者必曰痰之為患不攻如何得去不知正氣不行而虛痰結聚則雖竭力攻之非惟痰不可去而且益增其虛故或有因攻而逐絕者或偶爾暫蘇而更甚於他日者皆攻之之誤也又孰知痰之可攻者少而不可攻者多也故凡將治痰者不可不先察虛實一痰有虛實不可不辨夫痰則痰矣皆若有餘又何有虛實之異蓋虛實二字全以元氣為言凡可攻者便是實痰不可攻者便是虛痰何為可攻以其年力猶盛血氣未傷或以肥甘過度或以濕熱盛行或風寒外閉皮毛或逆氣內連肝膈皆能驟至痰飲但察其形氣病氣俱屬有餘者即實痰也實痰者何謂其元氣猶實也此則宜行消伐但去其痰無不可也何為不可攻則或以形羸氣弱年及中衰者即虛痰也或以多病或以勞倦或以憂思酒色致成勞損非風卒厥者亦虛痰也或脈見細數臟無陽邪時為嘔惡泄瀉氣短聲喑等證但察其形氣病氣本無有餘者皆虛痰也虛痰者何謂其元氣已虛也此則但宜調補若或攻之無不危矣且凡實痰本不多其來也驟其去亦速其病亦易治何也以病本不深也虛痰反多甚其來則漸其去則遲其病亦難治何也以病非一日也是以實痰無足慮而最可畏者惟虛痰耳總之治痰之法無他但能使元氣日強則痰必日少即有微痰亦自不能為害而且亦充助胃氣若元氣日衰則水穀津液無非痰耳隨去隨生有能攻之使盡而且保元氣無恙者吾不信也故善治痰者惟能使之不生方是補天之手然則治此者可不辨其虛實而欲一概攻之如王隱君所論內外百病皆生於痰悉用滾痰丸之類其亦但知目前而不知日後之害哉一五臟之病雖俱能生痰然無不由乎脾腎蓋脾主濕濕動則為痰腎主水水泛亦為痰故痰之化無不在脾而痰之本無不在腎所以凡是痰證非此則彼必與二臟有涉但脾家之痰則有虛有實如濕滯太過者脾之實也土衰不能制水者脾之虛也若腎家之痰則無非虛耳蓋火不生土者即火不制水陽不勝陰者必水反侵脾是皆陰中之火虛也若火盛爍金則精不守舍津枯液涸則金水相殘是皆陰中之水虛也此脾腎虛實之有不同者所當辨也又若古人所云濕痰郁痰寒痰熱痰之類雖其在上在下或寒或熱各有不同然其化生之源又安能外此二臟如寒痰濕痰本脾家之病而寒濕之生果無干於腎乎木鬱生風本肝家之痰而木強制土能無涉於脾乎火盛剋金其痰在肺而火邪炎上有不從中下二焦者乎故凡欲治痰而不知所源者總惟猜摸而已耳一非風門有痰論三篇所當互閱論治共七條一脾胃之痰有虛有實凡脾土濕勝或飲食過度別無虛證而生痰者此乃脾家本病但去其濕滯而痰自清宜二陳湯為主治或六安煎橘皮半夏湯平胃散潤下丸滾痰丸之類皆可擇而用之若胃寒生痰而兼脹滿者宜和胃二陳煎或兼嘔吐而痛者宜神香散或為飲食所致宜加麥芽神麯山楂枳實之類然脾胃不虛則雖生痰飲不過微有留滯亦必不多且無大害惟脾虛飲食不能消化而作痰者其變最多但當調理脾胃使其氣強則自無食積之患而痰飲即皆血氣矣若脾氣微虛不能制濕或不能運化而為痰者其證必食減神倦或兼痞悶等證宜六君子湯或五味異功散之類主之金水六君煎亦妙若微虛兼寒者宜苓朮二陳煎主之若脾氣大虛或兼胃寒嘔惡而多痰者宜六味異功煎溫胃飲理中湯聖朮煎之類主之又有勞倦本以傷脾而疲極又傷肝腎脾氣傷則飲食減少或見噁心肝腎傷則水液妄行或痰飲起自臍下直衝而上此脾腎俱傷命門土母之病也雖八味地黃丸乃其正治然無如理陰煎其效更如神也或加白朮陳皮亦可一腎經之痰水泛為痰者也無非虛證有以腫脹而生痰者此水入脾經謂之反克臟平者宜六味地黃丸左歸飲之類主之臟寒者宜理陰煎加減金匱腎氣丸八味地黃丸之類主之其或但宜溫燥者則單助脾經亦能化濕惟六味異功煎及理中湯聖朮煎俱可酌用有以虛損而生痰者此水虧金涸精不化氣氣不化精而然使不養陰以濟陽則水氣不充痰終不化水不歸源痰必不寧宜以左歸右歸六味八味等丸酌其寒熱而用之若陰火乘肺津液乾枯或喉痛或煩熱或喜冷或便實必察其真有火邪而痰嗽不已者宜四陰煎一陰煎之類加減主之若火本非真則但宜純補庶保萬全也一風寒之痰以邪自皮毛內襲於肺肺氣不清乃致生痰是即傷寒之類但從辛散其痰自愈宜六安煎二陳湯甚者小青龍湯之類主之其有風寒外襲內兼火邪者亦可兼用黃芩若血氣兼虛者不得單用消耗宜金水六君煎主之若傷寒見風而兼發熱嗽痰者宜柴陳煎主之或金水六君煎加柴胡亦妙一中風之痰本非外感悉由脾腎虛敗所致治痰之法詳載非風門當與此互察之一治痰當分緩急凡非風等證其有痰涎壅盛閉塞上焦而藥食不能進者此不得不先治其痰以開清道若痰之甚者惟用吐法為最妙若痰氣不甚食飲可進便當從緩求其本而治之不宜妄行攻擊或但以六安煎二陳湯潤下丸橘皮半夏湯之類調之為宜若火盛生痰者宜清膈煎抽薪飲之類主之若類風等證但察其上焦無滯或見其神昏困倦而胸喉之間氣清息平本不見痰者切不可疑其為痰而妄用克伐消痰等劑則無有不敗者矣若雜證勢已至劇而喉中痰聲漉漉隨息漸甚者此垂危之候不可治也諸吐痰治痰之法俱詳載非風門痰治條中一治痰當知求本則痰無不清若但知治痰其謬甚矣故凡痰因火動者宜治火為先痰因寒生者宜溫中為主風痰宜散之非辛溫不可也濕痰宜燥之非滲利不除也郁痰有虛實郁兼怒者宜抑肝邪郁兼憂者宜培肝肺飲食之痰亦自不同有因寒者有因熱者有因肥甘過度者有因酒濕傷脾者此皆能生痰而其中各有虛實辨之不可不真也又如脾虛不能制濕腎虛不能約水皆能為痰此即寒痰之屬也或以脾陰乾爍而液化為膠或以金水偏枯而痰本乎血此即熱痰之屬也凡此二者於痰證中十居八九是皆虛痰之不可攻者也又或有過用峻利以致痰反日甚者亦皆脾腎受傷之候治不求本濟者鮮矣一諸家治痰之法多有治其標者雖不可執亦不可廢也詳列如下痰因表者汗之因里者下之挾濕者分利之痰在膈上必用吐法瀉亦不去膠固稠濁之痰必用吐痰在經絡中非吐不可吐中就有發散之義痰在腸胃間可下而愈痰在四肢非竹瀝不能達痰在脅下非白芥子不能除痰在皮裡膜外非薑汁竹瀝不能達熱痰火痰宜清黛黃芩天花粉連翹石膏火炎上者用流金膏老痰宜海石栝蔞貝母兼火盛膠固者節齋化痰丸實痰火痰滾痰丸最效但不宜多用風痰用南星白附子濕痰用蒼朮白朮半夏茯苓澤瀉食積痰用神麯山楂麥芽酒痰用天花粉黃連白朮神麯或五苓散四苓散分利之痰結核在咽喉咯唾不出化痰藥中加咸藥以軟其堅栝蔞仁杏仁海石朴硝海藻佐以薑汁竹瀝導痰非薑汁不能行經絡荊瀝治痰速效能食者用之二瀝佐以薑汁治經絡之痰最效痰中帶血者宜加韭汁海粉熱痰能清濕痰能燥堅痰能軟頑痰能消可入丸藥亦可入煎藥南星半夏治風痰濕痰石膏墜痰火極效黃芩治熱痰假其下行也枳實治痰有沖牆倒壁之功五倍子能治老痰佐以他藥大治頑痰人鮮知也天花粉治熱痰酒痰最效又云大治膈上熱痰玄明粉治熱痰老痰速效能降火軟堅故也硝石礞石大能消痰結降痰火研細末和白糖置手心中以舌餂服甚效蒼朮治痰飲成窠囊行痰極效又治痰挾瘀血成窠囊者即神術丸之類潤下丸降痰最妙可常服小胃丹治實痰積飲必用之藥不過二三服而已虛者不可用之中氣不足之痰須用參術內傷挾痰必用參耆白朮之屬多用薑汁傳送或加半夏茯苓中焦有痰胃氣亦賴所養卒不可用峻攻攻盡則大虛矣先君吐法記先君壽峰公少壯時素稱善飲後年及四旬而酒病起遂得痰飲之疾多見嘔酸脹滿飲食日減眩暈不支驚惕恍惚疾瘧等證相繼迭出百方治痰弗獲寸效因慕張子和吐法之妙遂遵而用之初用獨聖散茶調散及齏汁之類一吐而稍效再吐而再效自此屢用不止雖諸痰漸退而元氣弗復也如此年餘漸覺純熟忽悟其理遂全不用藥但於五鼓食消之後徐徐嚥氣因氣而提提不數口而清涎先至再提之則膠濁後隨自後凡遇諸疾無論表裡虛實雖變出百端絕不服藥但一行吐法無不即日盡卻後至六旬之外則一月或半月必行一次全不憚煩而鶴髮童顏日增矍鑠斯時也賓將弱冠漸已有知恐其吐傷因微諫曰吐本除痰豈諸病皆可吐耶且吐傷元氣人所共知矧以衰年能無慮乎先君曰吐以治痰爾所知也吐治百病爾知之乎吐能傷氣爾所知也吐能生氣爾亦知乎余當為爾細談之夫先哲中之善治痰積者無如子和之三法及丹溪之倒倉在倒倉之法不易行亦未敢有用之者惟子和之法則為人所常用而取效不為不速亦不為不多也今以余法言之則有不同者矣蓋子和之吐用藥而吐也藥必苦劣吐必勇猛勢不我由不能無傷也余之吐不用藥而吐者也痰隨氣行氣因痰至徐疾自如有益無損也子和之法其用在急故但攻有餘之實痰余之法其用在緩故可兼不足之百病夫百病所因本自不一何以皆宜於吐如痰涎壅盛格塞胃脘而清道不通者不得不吐也積聚痛急不易行散者不得不吐也膠固稠濁非藥所能消者不得不吐也痰在經絡膜竅及隱伏難狀等痰其藏深其蓄遠藥所難及者不得不吐也此皆人所易知者也又若風寒外感者吐能散之食飲內傷者吐能清之火鬱者吐能發越熱邪寒盛者吐能鼓動陽氣諸邪下陷者吐有升舉之功諸邪結聚者吐有解散之力且人之百病無非治節不行吐能達氣氣從則無所不從而何有於病故凡有奇怪難治之病醫家竭盡其技而不能取效者必用吐法方見神功此又人所罕知者也再如生氣之說則不惟人不知而且必不信茲餘力行身受始悟其微蓋天地不息之機總惟升降二氣升本乎陽生長之道也降本乎陰消亡之道也余之用氣藉此升權可疾可徐吐納自然之生意無殘無暴全收弗藥之神功故凡吐之後神氣必倍王爾之所見也陽道必勃然我之常驗也使非吐能生氣而有能如是乎蓋道家用督余則用任所用不同所歸一也不惟卻病而且延年余言非謬爾切識焉賓奉此教常習用之無不效如響應第不及先君之神妙耳憶自軒岐之後善用吐法者惟子和一人若以先君法較之則其難易優劣奚啻霄壤而所謂亙古一人者當不在子和矣倘智者見同則必有踵而行之而蒙惠將來者自應不少第恐百世之下泯此心傳妙道故詳錄語訓以為之記並列其詳法於下先君行吐之法每於五鼓睡醒之時仰臥用噯提氣氣有不充則嚥氣為噯隨咽隨提痰涎必隨氣而至雖以最深之痰無不可取但最後出者其形色臭味甚有紫黑酸惡不堪言者所以每吐之後或至唇腫咽痛但以涼水一二口漱咽解之吐畢早膳悉屏五味但用淡粥一二碗以養胃中清氣自四旬之後絕不用酒行吐法者四十餘年所以愈老愈健壽至八旬之外猶能登山及燈下抄錄古書後以無病忽一旦含笑而辟穀時年八旬二矣述古論共八條仲景金匱曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲其人素盛今瘦水在腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼痛謂之溢飲咳逆倚息氣短不得臥其形如腫謂之支飲水在心心下堅築短氣惡水不欲飲水在肺吐涎沫欲飲水水在脾少氣身重水在肝脅下支滿嚏而痛水在腎心下悸夫心有留飲其人背惡寒如掌大留飲者脅下痛引缺盆咳嗽則轉甚胸中有留飲其人短氣而渴四肢歷節痛脈沉者有留飲膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後善虛脈偏弦者飲也肺飲不弦但苦喘氣短支飲亦喘而不能臥加短氣其脈平也病痰飲者當以溫藥和之陳無擇曰病人百藥不效關上脈伏而大者痰也眼皮及眼下如灰煙黑者痰也活人書云中脘有痰亦令人憎寒發熱惡風自汗胸膈痞滿有類傷寒者但頭不痛項不強為異原病式曰積飲留飲積蓄而不散也水得燥則消散得濕則不消以為積飲土濕主病故也大略要分濕熱寒濕之因張子和曰凡人病痰證有五一曰風痰二曰熱痰三曰濕痰四曰酒痰五曰食痰如新暴風痰者形寒飲冷熱痰者火盛制金濕痰者停飲不散酒痰食痰者飲食過度也王節齋曰津液者血之餘行乎脈外流通一身如天之清露若血濁氣濁則凝聚而為痰痰乃津液之變如天之露也故云痰遍身上下無處不到蓋即津液之在周身者津液生於脾胃水穀所成濁則為痰故痰生於脾土也薛立齋曰凡痰火證有因脾氣不足者有因脾氣鬱滯者有因脾肺之氣虧損者有因腎陰虛不能攝水泛而為痰者有因脾氣虛不能攝涎上溢而似痰者有因熱而生痰者有因痰而生熱者有因風寒暑濕而得者有因驚而得者有因氣而得者有因酒而得者有因食積而得者有脾虛不能運化而生者有胸中痰鬱而似鬼附者各審其源而治之徐東皋曰脾胃為倉廩所以納穀因脾弱不能運行致血氣失於滋養故不周流氣道壅滯中焦不能腐谷遂停滯而為痰為飲其變為寒為熱為喘為咳為嘔吐為反胃為腫滿為眩運為風癇為噯氣為吞酸嘈雜為噎嗝為怔忡為疼痛之類不可盡狀是皆痰之變病而其源則出脾濕不流水穀津液停滯之所致也述古治共七條龐安常云有陰水不足陰火上升肺受火邪不得清肅下行由是津液凝濁生痰不生血者此當以潤劑如麥門冬地黃枸杞之屬滋其陰使上逆之火得返其宅則痰自清矣投以二陳立見其殆有腎虛不能納氣歸原原出而不納則積積不散則痰生焉八味丸主之吳茭山諸證辨疑云八味丸治痰之本也許學士用蒼朮治痰成窠囊一邊行極妙痰挾瘀血遂成窠囊朱丹溪曰脾虛者宜清中氣以運痰降下二陳湯加白朮之類兼用升麻提起二陳湯一身之痰都治管如要下行加引下藥在上加引上藥凡人身上中下有塊者多是痰問其平日好食何物吐下後方用藥王節齋曰痰生於脾胃宜實脾燥濕又隨氣而升宜順氣為先分導次之又氣升屬火順氣在於降火熱痰則清之濕痰則燥之風痰則散之郁痰則開之頑痰則軟之食痰則消之在上者吐之在中者下之又中氣虛者宜固中氣以運痰若攻之太重則胃氣虛而痰愈甚矣薛立齋曰凡痰證飲食少思或胸膈不利者此中氣虛弱也宜用補中益氣為主中氣既健其痰自運化若腎氣虧損津液難降敗濁為痰者乃真臟之病宜用六味地黃丸為主腎氣既壯津液清化而何痰之有哉亦有因脾胃虧損中焦氣虛不能運化而為痰者亦有因峻厲過度脾氣愈虛不能運化津液凝滯而為痰者凡此皆當健脾胃為主又曰痰者脾胃之津液或為飲食所傷或為七情六淫所擾故氣壅痰聚蓋脾為統血行氣之經氣血俱盛何痰之有皆由過思與飲食所傷損其經絡脾血既虛胃氣獨盛是以濕因氣化故多痰也遊行周身無所不至痰氣既盛客必勝主或奪於脾之大絡之氣則倏然仆地者此痰厥也升於肺則喘急咳嗽迷於心則怔忡恍惚走於肝則眩暈不仁脅肋脹痛關於腎不哈而多痰唾留於胃脘則嘔瀉而作寒熱注於胸則咽痛不利眉稜骨痛入於腸則漉漉有聲散則有聲聚則不利若脾氣虛弱不能消濕宜用補中益氣湯加茯苓半夏若因脾氣虛弱濕熱所致宜用東垣清燥湯若胃氣虛弱寒痰凝滯者宜用人參理中湯若脾胃虛寒而痰凝滯者宜用理中化痰丸若脾虛不能運化而痰滯氣逆宜用六君子加木香若脾胃虛弱而肝木乘侮宜用六君子加柴胡若肺氣虛弱不能清化而有痰者宜六君子加桔梗頭痛宜用半夏白朮天麻湯若脾腎虛弱寒邪所乘以致頭痛宜用附子細辛湯又曰凡治風痰若肺經風熱而生痰者宜用金沸草散若風火相搏肝經風熱熾盛而生痰者宜用牛黃抱龍丸或牛黃清心丸若肝經血燥而生痰者宜六味地黃丸若熱盛制金不能平木而生痰者宜柴胡梔子散若中氣虛弱不能運化而生痰者宜六君柴胡鉤藤若腎虛陰火炎上宜六味丸又曰凡治痰結有因脾經鬱結而傷陰血者有因腎水虧損而陰火上炎者有因脾肺火鬱而生痰者治法若因七情鬱結痰涎滯於喉間者先用局方四七湯調和滯氣後用歸脾湯調補脾血脾火傷血用加味歸脾湯腎水虧損用六味地黃丸肺經鬱火用知母茯苓湯若婦人患此而兼帶下皆由鬱結傷損肝脾當佐以四七湯送青州白丸子此等證候屬脾胃氣虛為本而氣滯痰結為末也古方用十棗湯控涎丹神佑丸滾痰丸木香枳實利膈滌痰透羅破飲降氣化痰等湯蘇合丸之類皆形氣充實之藥也西北人用之或有效驗其屬虛弱者必致肚腹脹滿而歿又曰痰之為病若熱病則多煩熱風痰多成癱瘓奇證冷痰多成骨痹濕痰多怠惰軟弱驚痰多成心痛癲疾飲痰多脅痛臂痛食積痰多成癖塊痞滿其為病種種難名竊謂前證若因腎水虛弱陰虧難降使邪水上溢故多痰唾宜滋其化源其痰自消若因肝木侮脾土而風痰壅滯者先用南星半夏清其痰後用六君子之類調胃氣痰自不至若概用風藥耗其陽氣而絕陰血之源適足以成其風益其病也又曰若因脾氣虧損痰客中焦閉塞清道以致四肢百骸發為諸病者理宜壯脾氣為主兼佐以治痰則中氣健而痰涎自化若倒倉之後而痰反甚此脾氣愈虛則津液反為痰者理宜補中益氣非參朮二陳之類不能治最忌行氣化痰及倒倉之法徐東皋曰嚴氏云人之氣順則津液通流決無痰患古方治痰多用汗下溫利之法不若以順氣為先分導次之氣順則津液流通痰飲運下自小便中出矣此則嚴氏亦有所見而云然也玉機微義云順氣特一法耳要觀痰之深淺有痰積膠固氣道因之而不得順宜先逐去積痰然後氣可得順豈可專主理氣一法愚謂有理氣而痰自順者治其微也有逐痰而氣方暢者治其甚也二者皆治痰之要也不可偏廢者也但看痰與氣孰輕而孰重施治有可急而可緩故曰逐痰理氣有所先後痰飲論列方二陳湯和一六安煎新和二加味歸脾湯補三三平胃散和十七溫胃飲新熱五六君子湯補五理中湯熱一聖朮煎新熱二五小青龍湯散八理陰煎新熱三金沸草散散八一五苓散和一八二四苓散和一八七蘇合香丸和三七一歸脾湯補三二清燥湯寒一三二和胃二陳煎新和三一陰煎新補八四陰煎新補十二補中益氣湯補三十柴陳煎新散九十棗湯攻二八金水六君煎新和一流金膏攻四五潤下丸和百十六五味異功散補四左歸飲新補二滾痰丸攻七七六味異功煎新熱七左歸丸新補四右歸丸新補五苓朮二陳煎新和四六味丸補一三八味丸補一二一理中化痰丸熱九清膈煎新寒九抽薪飲新寒三控涎丹攻八二神佑丸攻四八橘皮半夏湯和十三小胃丹攻七三抱龍丸小八五金匱腎氣丸補一二四神香散新和二十節齋化痰丸攻八十局方四七湯和九七知母茯苓湯外一六一附子細辛湯散三柴胡梔子散散二十牛黃清心丸和三六五青州白丸子和百十二半夏白朮天麻湯和十五論外備用方吐法新攻一四君子湯補一八物定志丸補百十七安神清痰朮附湯補四一寒痰小半夏湯和八小半夏茯苓湯和九飲大半夏湯和十一溫膽湯和一五二郁痰十味溫膽湯和一五三虛痰四磨飲和五二小降氣湯和四二氣滯苓桂朮甘湯和三六脾氣虛寒星香湯和二四三痰逆星香丸和百二氣嗽痰蘇子降氣湯和四一溫中消痰白朮湯和二七溫痰茯苓飲和九三吐水黃芩二陳湯和五熱痰千緡湯和九五痰喘茯苓丸和百十四化頑痰加味四七湯和九八郁痰黃栝蔞丸和百十八痰喘澤瀉湯和九九支飲眩冒不換金正氣散和二一濕痰導痰湯和九一留痰消飲丸和百一寒痰水丹溪潤下丸和百十六熱痰五飲湯和九二五飲清心散和二四九風痰不開半夏丁香丸和百三十冷氣停痰玉壺丸和百五風痰神朮散和百九濕痰茯苓半夏湯和十二水飲玉液丸和百六痰火嗽祛痰丸和百三風痰眩硃砂消痰飲和百痰迷心竅玉液湯和九六氣鬱痰玉粉丸和百七氣滯痰琥珀壽星丸和百十三風痰吐痰方攻八四痰癖青礞石丸攻七九食積痰清氣化痰丸攻七四七五七六茶調散攻百七吐犀角丸攻九十火痰辰砂化痰丸攻八一化痰止嗽獨聖散攻百六吐參蘇飲散三四風痰芎芷香蘇散散八八風痰雙玉散寒七一熱痰煩喘桑白皮散寒五二熱痰喘清膈導痰湯寒七六胃火痰三生飲熱九四風痰強中丸熱九三寒痰半夏乾薑散熱五三寒痰嘔安脾散熱六七寒痰倍術丸熱百四飲胡椒理中湯熱六胃寒養正丹熱一八八上壅不降黑錫丹熱一八九寒痰上壅溫胃化痰丸熱九八脾寒氣弱溫中化痰丸熱九七行滯丁香半夏丸熱百冷痰丁香茯苓湯熱六三溫中行滯苓桂朮甘湯熱八七支飲丁香五套丸熱百一溫中九還金液丹小八八風痰濕證經義至真要大論曰諸濕腫滿皆屬於脾諸痙項強皆屬於濕太陰司天其化以濕濕氣大來土之勝也寒水受邪腎病生焉風氣大來木之勝也土濕受邪脾病生焉濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之生氣通天論曰因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿汗出見濕乃生痤痱秋傷於濕上逆而咳發為痿厥痹論曰風寒濕三氣雜至合而為痹也濕氣勝者為著痹也不與風寒濕氣合故不為痹其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也百病始生篇曰風雨則傷上清濕則傷下邪氣臟腑病形篇曰身半以上者邪中之也身半以下者濕中之也太陰陽明論曰故陽受風氣陰受濕氣傷於風者上先受之傷於濕者下先受之調經論曰寒濕之中人也皮膚不收肌肉堅緊營血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛刺志論曰谷入多而氣少者得之有所脫血濕居下也臟氣法時論曰脾苦濕急食苦以燥之禁濕地濡衣宣明五氣篇曰脾惡濕五癃津液別篇曰天寒則腠理閉氣濕不行水下流於膀胱則為溺與氣陰陽應象大論曰濕勝則濡瀉秋傷於濕冬生咳嗽地之濕氣感則害人皮肉筋脈九宮八風篇曰兩實一虛犯其兩濕之地則為痿五常政大論曰敦阜之紀大雨時行濕氣乃用太陽司天濕氣變物太陰司天濕氣下臨六元正紀大論曰辰戌年太陽司天之政水土合德寒濕之氣持於氣交民病寒濕發肌肉萎足萎不收濡瀉血溢丑未年太陰司天之政濕寒合德黃黑埃昏民病寒濕腹滿身䐜憤胕腫太陰所至為濕生終為注雨痿論曰肉痿者得之濕地也脈要精微論曰中盛藏滿氣勝傷恐者聲如從室中言是中氣之濕也五運行大論曰濕傷肉風勝濕通評虛實論曰蹠跛寒風濕之病也五色篇曰厥逆者寒濕之起也長刺節論曰肌膚盡痛名曰肌痹傷於寒濕論證濕之為病有出於天氣者雨霧之屬是也多傷人臟氣有出於地氣者泥水之屬是也多傷人皮肉筋脈有由於飲食者酒酪之屬是也多傷人六腑有由於汗液者以大汗沾衣不皇解換之屬是也多傷人膚腠有濕從內生者以水不化氣陰不從陽而然也悉由乎脾腎之虧敗其為證也在肌表則為發熱為惡寒為自汗在經絡則為痹為重為筋骨疼痛為腰痛不能轉側為四肢痿弱痠痛在肌肉則為麻木為胕腫為黃疸為按肉如泥不起在臟腑則為嘔惡為脹滿為小水秘澀為黃赤為大便泄瀉為腹痛為後重脫肛㿗疝等證凡肌表經絡之病濕由外而入者也飲食血氣之病濕由內而生者也此其在外者為輕在內者為甚是固然矣然及其甚也則未有表濕而不連臟者里濕不連經者此其濕病之變不為不多故凡治此者必當辨表裡察虛實而必求其本也然濕證雖多而辨治之法其要惟二則一曰濕熱一曰寒濕而盡之矣蓋濕從土化而分旺四季故土近東南則火土合氣而濕以化熱土在西北則水土合德而濕以化寒此土性之可以熱可以寒故病熱者謂之濕熱病寒者謂之寒濕濕熱之病宜清宜利熱去濕亦去也寒濕之病宜燥宜溫非溫不能燥也知斯二者而濕無餘義矣何今之醫家動輒便言火多成熱而未聞知有寒多生濕者其果何也豈寒熱之偏勝原當如是耶抑陰陽之顯晦察有易難也且夫陰陽之理本無軒輊猶權衡也此而不知烏雲明慧創一偏之說以遺患後人則金元諸公有不得辭其責者矣論治共七條一濕熱證必其證多煩渴小水赤澀大便秘結脈見洪滑實數者方是熱證治宜清利如熱甚者宜以清火為主而佐以分利熱微者宜以分利為主而佐以清火如四苓散小分清飲或大分清飲茵陳飲之類皆可擇而用之如果濕熱之甚或元氣無損而兼秘結不通者方可或行推蕩若無實結等證則不宜妄行攻擊一寒濕證凡諸病濕而全無熱脈熱證者便多寒濕之屬蓋水之流濕本緣同氣惟濕中有火則濕熱熏蒸而停郁為熱濕中無火則濕氣不化而流聚為寒故凡病內濕等證者多屬氣虛之人氣屬陽陽虛則寒從中生寒生則濕氣留之此陰陽之性理出自然有不必外中於濕而後為之濕也此之變病惟腫脹泄瀉痰飲嘔吐等證多有之病之微者宜溫宜利宜燥如五苓散平胃散滲濕湯六味地黃丸之類是也病之甚者必用溫補俟陽氣漸復則陰邪始退如八味丸理中湯聖朮煎或佐關煎胃關煎薛氏加減金匱腎氣湯之類皆當隨證加減用之一寒濕之氣中於外者此與內生之濕自有不同宜溫而兼散如五積散平胃散加味五苓散不換金正氣散之類主之一寒濕之證凡氣令陰寒及陽氣不足之人多有其證而丹溪謂六氣之中濕熱為病者十居八九亦言之過矣一治濕之法凡濕從外入者汗散之濕在上者亦宜微汗之濕在中下二焦宜疏利二便或單用淡滲以利小便一治濕之法古人云宜理脾清熱利小便為上故曰治濕不利小便非其治也此固然矣然濕熱之證多宜清利寒濕之證多不宜利也何也蓋凡濕而兼寒者未有不由陽氣之虛而利多傷氣則陽必更虛能無害乎但微寒微虛者即溫而利之自無不可若大寒大虛者則必不宜利此寒濕之證有所當忌者也再若濕熱之證亦有忌利者以濕熱傷陰者也陰氣既傷而複利之則邪濕未清而精血已耗如汗多而渴熱燥而煩小水乾赤中氣不足溲便如膏之類切勿利之以致重損津液害必甚矣故凡治陽虛者只宜補陽陽勝則燥而陰濕自退陰虛者只宜壯水真水既行則邪濕自無所容矣此陰陽二證俱有不宜利者不可不察一濕證之見凡黃疸腫脹泄瀉痰飲嘔吐痹痛淋秘之類皆有濕證當於各門詳察治之述古共二條金匱要略曰太陽病關節疼痛而煩脈沉而細緩者此名濕痹濕痹之候小便不利大便反快但當利其小便濕家之為病一身盡疼發熱身色如熏黃也濕家但頭汗出背強欲得被覆向火若下之早則噦或胸滿小便不利舌上如胎者以丹田有熱胸上有寒渴欲得飲而不能飲則口燥煩也濕家下之額上汗出微喘小便不利者死若下痢不止者亦死風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲出汗者風濕俱去也治法曰濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或久傷取冷所致也可與麻黃杏仁薏苡甘草湯風濕脈浮身重汗出惡風者防己黃耆湯主之傷寒八九日風濕相搏身體疼痛不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若大便堅小便自利者白朮附子湯主之風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之陳無擇曰脾虛多病濕內因酒面積多過飲湯液停滯膩物燒炙膏粱過度氣熱熏蒸濁液不行湧溢於中此濕從內作外因坐臥濕地霧露陰雨所客澡浴為風所閉涉水為濕所郁鬱於表腠則發黃故經云地之濕氣感則害人皮膚筋脈此濕從外生可見內外所感皆由脾氣虛弱而濕邪乘而襲之故曰壯者氣行則愈怯者著而為病濕證論列方五苓散和一八二四苓散和一八七麻黃加朮湯散二平胃散和十七茵陳飲新寒八桂枝附子湯熱三十五積散散三九六味丸補百二十防己黃耆湯和一七六胃關煎新熱九佐關煎新熱十白朮附子湯熱二九聖朮煎新熱二五滲濕湯和一七四大分清飲新寒五金匱腎氣丸補一二四理中湯熱一小分清飲新和十甘草附子湯熱三十八味丸補一二一加味五苓散和一八四不換金正氣散和二一麻黃杏仁薏苡甘草湯散四論外備用方除濕湯和一七七身重痛神術湯和三九風濕脈緊調中益氣湯補三一濕陷濕鬱湯和二六六風濕敗毒散散三六風濕參附滲濕湯熱一二二寒濕痹胃苓湯和百九十活絡飲和二七七風濕痛羌活勝濕湯和一七八身盡痛白朮湯和二六風濕脈緩腎著湯熱一二九寒濕腰重清熱滲濕湯寒百十一濕熱聖散子散四三風濕黃疸經義經脈篇曰腎所生病為黃疸玉機真藏論曰風者百病之長也今風寒客於人使人毫毛畢直皮膚閉而為熱當時之時可汗而發也或痹不止腫痛當是之時可湯熨及火灸刺而去弗治肝傳之脾病曰脾風發癉腹中熱煩心出黃平人氣象論曰溺黃赤安臥者黃疸已食如飢者胃疸目黃者曰黃疸論疾診尺篇曰身痛而色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而澀者不嗜食賓按此二條凡已食如飢者即陽黃之證安臥脈小不嗜食者即陰黃之證也通評虛實論曰黃疸暴痛癲疾厥狂久逆之所生也論證共七條黃疸一證古人多言為濕熱及有五疸之分者皆未足以盡之而不知黃之大要有四曰陽黃曰陰黃曰表邪發黃曰膽黃也知此四者則黃疸之證無餘義矣丹溪曰疸不必分五種同是濕熱如盦曲相似豈果皆如盦曲悉可謂之濕熱耶弗足憑也愚列如下一陽黃證因濕多成熱熱則生黃此即所謂濕熱證也然其證必有身熱有煩渴或躁擾不寧或消穀善飢或小水熱痛赤澀或大便秘結其脈必洪滑有力此證不拘表裡或風濕外感或酒食內傷皆能致之但察其元氣尚強脾胃無損而濕熱果盛者直宜清火邪利小便濕熱去而黃自退治此者本無難也一陰黃證則全非濕熱而總由血氣之敗蓋氣不生血所以血敗血不華色所以色敗凡病黃疸而絕無陽證陽脈者便是陰黃陰黃之病何以致然蓋必以七情傷臟或勞倦傷形因致中氣大傷脾不化血故脾土之色自見於外其為病也必喜靜而惡動喜暗而畏明凡神思困倦言語輕微或怔忡眩暈畏寒少食四肢無力或大便不實小水如膏及脈息無力等證悉皆陽虛之候此與濕熱發黃者反如冰炭使非速救元氣大補脾腎則終無復元之理且此證最多若或但見色黃不察脈證遂云黃疸同是濕熱而治以茵陳梔子瀉火利水等劑則無有不隨藥而斃者一表邪發黃即傷寒證也凡傷寒汗不能透而風濕在表者有黃證或表邪不解自表傳裡而濕熱鬱於陽明者亦有黃證表邪未解者必發熱身痛脈浮少汗宜從汗散濕熱內郁者必煩熱脈緩滑多汗宜從分消清利若陽明實邪內郁而痞結脹滿者宜先下之然後清其餘熱則自無不愈一膽黃證凡大驚大恐及鬥毆傷者皆有之嘗見有虎狼之驚突然喪膽而病黃者其病則驟有酷吏之遭或禍害之慮恐怖不已而病黃者其病則徐如南北朝齊永明十一年有太學生魏准者因惶懼而死舉體皆青時人以為膽破即此之類又嘗見有鬥毆之後日漸病黃者因傷膽而然其證則無火無濕其人則昏沉困倦其色則正黃如染凡此數證皆因傷膽蓋膽傷則膽氣敗而膽液泄故為此證經曰膽液泄則口苦胃氣逆則嘔苦故曰嘔膽義猶此也且膽附於肝主少陽春生之氣有生則生無生則死故經曰凡十一藏皆取決於膽者正以膽中生氣為萬化之元也若此諸證皆以膽傷膽傷則生氣敗生氣既敗其能生乎所以凡患此者多致不救然當察其傷之微甚速救其本猶可挽回而煉石補天之權則操之醫之明者一黃疸大法古有五疸之辨曰黃汗曰黃疸曰谷疸曰酒疸曰女勞疸總之汗出染衣色如檗汁者曰黃汗身面眼目黃如金色小便黃而無汗者曰黃疸因飲食傷脾而得者曰谷疸因酒後傷濕而得者曰酒疸因色欲傷陰而得者曰女勞疸雖其名目如此然總不出陰陽二證大多陽證多實陰證多虛虛實弗失得其要矣一黃疸難治證凡寸口無脈鼻出冷汗腹膨形如煙燻搖頭直視環口黎黑油汗發黃久之變黑者皆難治論治共五條一陽黃證多以脾濕不流鬱熱所致必須清火邪利小水火清則溺自清溺清則黃自退輕者宜茵陳飲大分清飲梔子柏皮湯之類主之若閉結熱甚小便不利腹滿者宜茵陳蒿湯梔子大黃湯之類主之一陰黃證多由內傷不足不可以黃為意專用清利但宜調補心脾腎之虛以培血氣血氣復則黃必盡退如四君子湯五君子煎壽脾煎溫胃飲之類皆心脾之要藥也若六味丸八味丸五福飲理陰煎及左歸右歸六味回陽等飲皆陰中之陽虛者所宜也若元氣虛不至甚而兼多寒濕者則以五苓散四苓散或茵陳五苓散之屬加減用之亦可一傷寒發黃凡表邪未清而濕熱又盛者其證必表裡兼見治宜雙解以柴苓湯或茵陳五苓散主之若內熱甚而表邪仍在者宜柴苓煎主之若但有濕熱內實脹閉等證而外無表邪者宜茵陳蒿湯主之若因內傷勞倦致染傷寒者亦多有發黃之證但察其本無濕熱實邪等證即當以陰黃之法調補治之或用後韓祇和法亦可若但知攻邪則未有不敗故孫真人曰黃疸脈浮者當以汗解之宜桂枝加黃耆湯此即補虛散邪之法也外傷寒門別有正條所當並察一膽黃證皆因傷膽而然膽既受傷則臟氣之損敗可知使非修緝培補則必至決裂故凡遇此等證候務宜大用甘溫速救元氣然必察其所因之本或兼酸以收其散亡或兼澀以固其虛脫或兼重以鎮其失守之神魂或與開道利害以釋其不解之疑畏凡諸用藥大都宜同陰黃證治法當必有得生者若治此證而再加克伐分利則真如壓卵矣一治黃之法本當清濕利小便然亦多有不宜利者說詳濕證門論治條中述古共五條金匱要略曰趺陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食谷即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治心中懊憹而熱不能食時欲吐名曰酒疸陽明病脈遲者食難用飽飽則發煩頭眩小便必難此欲作谷疸雖下之腹滿如故所以然者脈遲故也夫病酒黃疸必小便不利其候心中熱足下熱是其證也酒黃疸者腹滿欲吐鼻燥其脈浮者先吐之脈沉者先下之酒疸心中熱欲吐者吐之愈師曰病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱所得然黃家所得從濕得之一身盡發熱面黃肚熱熱在裡當下之脈沉渴欲飲水小便不利者皆發黃黃疸之病當以十八日為期治之十日以上瘥反劇為難治疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔陽部其人振寒而發熱也谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸茵陳蒿湯主之酒黃疸心中懊憹或熱痛梔子大黃湯主之諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯主之黃疸病茵陳五苓散主之黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜大黃硝石湯黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之男子黃小便自利當與虛勞小建中湯韓祇和云病人三五日服下藥太過虛其脾胃亡其津液渴飲水漿脾土為陰濕所加與邪熱相會發黃此陰黃也當以溫藥治之如兩手脈沉細遲肢體逆冷皮膚有粟起或嘔吐舌上有苔遍身發黃煩躁欲於泥水中臥小便赤少皆陰候也故陰黃多以熱湯溫之或陽漬布搭其胸腹或以湯盛瓢中坐於臍下熨之其病愈者曾治趙顯宗病傷寒至六七日因服下藥太過致發黃其脈沉細遲無力皮膚涼發躁欲於泥中臥喘嘔小便赤澀先投茵陳橘皮湯喘嘔止次服小茵陳湯半劑脈微出不欲於泥中臥次日又吸茵陳附子湯半劑四肢發熱小便二三升當日中大汗而愈似此治愈者不一一錄凡傷寒病黃每遇太陽或太陰司天之歲若下之太過往往變成陰黃蓋辰戌太陽寒水司天水來犯土丑未太陰濕土司天土氣不足即脾胃虛弱亦水來侵犯多變此證也略例云內傷勞役飲食失節中州變寒之病生黃者非傷寒壞之而得只用建中理中大建中足矣不必用茵陳也劉宗厚曰按一身盡痛而黃者濕勝在表也不痛者病在裡也乾燥者熱勝也故後證皆有表裡之分東垣云傷寒當汗不汗即生黃邪在表者宜急汗之在表之裡宜滲利之在半表裡宜和解之在裡者宜急下之若以上諸證及略例云男黃小便自利當與虛勞小建中湯若黃色不變欲自利腹滿而喘不可除熱除熱必噦宜小半夏湯皆不必拘於茵陳也徐東皋曰疸證服解利之藥久而不愈及口淡怔忡耳鳴腳軟憎寒發熱小便濁皆為虛甚宜四君子湯吞八味丸不可強服涼藥通利以致脾氣虛弱腎水枯涸必至危篤黃疸論列方四苓散和一八七五苓散和一八二小建中湯補二二五福飲新補六茵陳飲新寒八大建中湯補二四左歸飲新補二右歸飲新補三茵陳五苓散和一八五理中湯熱一理陰煎新熱三茵陳橘皮湯熱一三二溫胃飲新熱五壽脾煎新熱十六茵陳附子湯熱百三十六味丸補百二十八味丸補一二一六味回陽飲新熱二柴苓湯和一九二柴芩散新散十梔子柏皮湯寒二三大分清飲新寒五茵陳蒿湯攻三一梔子大黃湯攻十五小半夏湯和八四君子湯補一大黃硝石湯攻十四小茵陳湯熱一三一五君子煎新熱六桂枝加黃耆湯散十論外備用方養勞湯和三五四虛勞疸加減五苓散和一八三茵陳四逆湯熱十九陰黃汗綠礬丸和三五五黃胖甘露飲寒十濕熱犀角地黃湯寒七九血熱茵陳湯寒一二八濕熱火府丹寒百二十消渴茯苓滲濕湯寒一二九濕熱柴胡茵陳五苓散和一八六傷寒濕熱
