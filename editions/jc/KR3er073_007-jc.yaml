body:
  text: 卷之七須集傷寒典上經義一水熱穴論帝曰人傷於寒而傳為熱何也岐伯曰夫寒盛則生熱也內經傷寒諸義及諸治法之未備者俱補載瘟疫門所當參閱傷寒總名二黃帝曰今夫熱病者皆傷寒之類也又曰凡病傷寒而成溫者先夏至日為病溫後夏至日為病暑此皆內經之明言也故凡病溫病熱而因於外感者皆本於寒即今醫家皆謂之為傷寒理宜然也近或有以溫病熱病謂非真傷寒者在未達其義耳初診傷寒法三凡初診傷寒者以其寒從外入傷於表也寒邪自外而入必由淺漸深故先自皮毛次入經絡又次入筋骨而後及於臟腑則病日甚矣故凡病傷寒者初必發熱憎寒無汗以邪閉皮毛病在衛也漸至筋脈拘急頭背骨節疼痛以邪入經絡病在營也夫人之衛行脈外營行脈中今以寒邪居之則血氣混淆經絡壅滯故外證若此此即所謂傷寒證也自此而漸至嘔吐不食脹滿等證則由外入內由經入腑皆可因證而察其表裡矣若或肌表無熱亦不憎寒身無疼痛脈不緊數者此其邪不在表病必屬裡凡察傷寒此其法也論脈四傷寒之邪實無定體或入陽經氣分則太陽為首或入陰經精分則少陰為先其脈以浮緊而有力無力可知表之虛實沉緊而有力無力可知里之虛實中而有力無力可知陰陽之凶吉診之之法當問證以知其外察脈以知其內先病為本後病為標能參合脈證而知緩急先後者乃為上工一診法曰浮脈為在表故凡脈見浮緊而數者即表邪也再加以頭項痛腰脊強等證此即太陽經病當求本經輕重而解散之一脈見洪長有力而外兼陽明證者即陽明在經之邪也宜求本經之寒熱以散之一脈見弦數而兼少陽之證者即少陽經半表半裡之病宜和解而散之一沉脈為在裡病屬三陰詳具後六經證辨中但沉數有力是即熱邪傳裡也若表證深入而內見大滿大實陽邪熱結等證治當從下也一沉緊無力而外無大熱內無煩渴等病此陰證也若或畏寒厥冷及嘔吐腹痛瀉痢者此即陰寒直中治宜溫中也一脈大者為病進大因邪氣勝病日甚也脈漸緩者為邪退緩則胃氣至病將愈也此以大為病進固其然也然亦有宜大不宜大者又當詳辨如脈體本大再加洪數此則病進之脈不可當也如脈體本小因服藥後而漸見滑大有力者此自陰轉陽必將汗解乃為吉兆蓋脈至不鼓者由氣虛而然無陽豈能作汗也後論汗條中有按當並閱之仲景傷寒論曰脈有陰陽者何謂也曰凡脈浮大數動滑皆陽也沉澀弱弦微皆陰也諸脈浮數而發熱惡寒身痛不欲飲食者傷寒也若灑淅惡寒飲食如常而痛偏一處者必血氣壅遏不通成癰膿也寸口脈浮為在表沉為在裡數為在腑遲為在臟寸關尺三部浮沉大小遲數同等雖有寒熱不解者此脈陰陽為和平雖劇必愈其脈浮而汗出如流珠者陽氣衰也脈瞥瞥如羹上珠者陽氣微也脈縈縈如蜘蛛絲者陽氣衰也脈綿綿如瀉漆之絕者亡其血也其脈沉者榮氣微也若脈浮大者氣實血虛也脈微緩者為欲愈也陽脈浮陰脈弱者為血虛血虛則筋急也脈微弱而惡寒者此陰陽俱虛不可更發汗更吐更下也陰證無脈溫之而脈微續者生暴出者死陰病見陽脈者生陽病見陰脈者死論曰寸脈微名曰陽不足陰氣上入於陽中則灑淅惡寒也尺脈微名曰陰不足陽氣下陷入陰中則發熱也寸口脈微而澀微者衛氣不行澀者榮氣不足衛氣衰面色黃榮氣不足面色青榮為根衛為葉榮衛俱微則根葉枯槁而寒慄咳逆唾腥吐涎沫也論曰緊脈從何而來曰假令亡汗若吐以肺裡寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下痢以胃中虛冷故令脈緊也按此言緊者即弦搏不軟之謂蓋單言其緊而無滑數之意乃陽明胃氣受傷之脈故主為陰寒之證若緊而兼數則必以外邪所致愚按浮為在表沉為在裡此古今相傳之法也然沉脈亦有表證此陰實陽虛寒勝者然也浮脈亦有里證此陽實陰虛水虧者然也故凡欲察表邪者不宜單據浮沉只當以緊數與否為辨方為的確蓋寒邪在表脈皆緊數緊數甚者邪亦甚緊數微者邪亦微緊數浮洪有力者邪在陽分即陽證也緊數浮沉無力者邪在陰分即陰證也以緊數之脈而兼見表證者其為外感無疑即當治從解散然內傷之脈亦有緊數者但內傷之緊其來有漸外感之緊發於陡然以此辨之最為切當其有似緊非緊但較之平昔稍見滑疾而不甚者亦有外感之證此其邪之輕者或以初感而未甚者亦多見此脈是又不可不兼證而察之也若其和緩而全無緊疾之意則脈雖浮大自非外邪之證按陶節庵曰夫脈浮當汗脈沉當下固其宜也然其脈雖浮亦有可下者謂邪熱入腑大便難也設使大便不難豈敢下乎其脈雖沉亦有可汗者謂少陰病身有熱也設使身不發熱豈敢汗乎若此之說可見沉有表而浮亦有里也風寒辨五凡病傷寒者本由寒氣所傷而風即寒之帥也第以風寒分氣令則風主春而東寒主冬而北以風寒分微甚則風屬陽而淺寒屬陰而深然風送寒來寒隨風入透骨侵肌本為同氣故凡寒之淺者即為傷風風之深者即為傷寒而不淺不深半正半邪之間者即為瘧疾其有留於經絡而肢體疼痛者則為風痹然則傷風也傷寒也瘧疾風痹也皆風寒之所為也觀靈樞九宮八風篇及歲露論所載俱甚言虛邪賊風之為害口問篇言風成為寒熱此皆指風為寒邪也即如冬傷於寒者宜乎其為傷寒也若春夏秋三時之感冒則孰非因寒亦孰非因風而入之故仲景曰凡傷寒之病多從風寒得之始因表中風寒入里則不消矣未有溫覆而當不消散者豈非風寒本為同氣乎內經曰謹候虛風而避之故聖人日避虛邪之道如避矢石然邪弗能害此之謂也此杜漸防微之道也傷寒三證六夫傷寒為病蓋由冬令嚴寒以水冰地裂之時最多殺厲之氣人觸犯之而即時病者是為正傷寒此即陰寒直中之證也然惟流離窮困之世多有之若時當治平民安飽暖則直中之病少見此傷寒之一也其有冬時感寒不即病者寒毒藏於營衛之間至春夏時又遇風寒則邪氣應時而動故在春則為溫病在夏則為暑病是以辛苦之人春夏多溫熱病者皆由冬時觸寒所傷故隨氣傳變本非即病正傷寒之屬所當因其寒熱而隨證調治之此傷寒之二也又有時行之氣者如春時應暖而反寒夏時應熱而反涼秋時應涼而反熱冬時應寒而反溫此非其時而有其氣是以一歲之中長幼之病多相似者是即時行之病感冒虛風不正之氣隨感隨發凡稟弱而不慎起居多勞倦者多犯之此傷寒之三也凡此三者皆傷寒之屬第其病有不同治有深淺苟不能辨則必致誤人六經證七太陽經病頭項痛腰脊強發熱惡寒身體痛無汗脈浮緊以太陽經脈由脊背連風府故為此證此三陽之表也陽明經病為身熱目疼鼻乾不眠脈洪而長以陽明主肌肉其脈挾鼻絡於目故為此證此三陽之裡也少陽經病為胸脅痛耳聾寒熱嘔而口苦咽乾目眩脈弦而數以少陽之脈循脅肋終於耳故為此證此二陽三陰之間也由此漸入三陰故為半表半裡之經太陰經病為腹滿而吐食不下嗌乾手足自溫或自利腹痛不渴脈沉而細以太陰之脈布胃中絡於嗌故為此證少陰經病為舌乾口燥或自利而渴或欲吐不吐或引衣蜷臥心煩但欲寐其脈沉以少陰之脈貫腎絡於肺系舌本故為此證厥陰經病為煩滿囊縮或氣上撞心心中疼熱消渴飢而不欲食食即吐蛔下之利不止脈沉而弦以厥陰之脈循陰器而絡於肝故為此證成無己曰熱邪自太陽傳至太陰則腹滿而嗌乾未成渴也傳至少陰則口燥舌乾而渴未成消也傳至厥陰而成消渴者熱甚能消水故也凡飲水多而小便少者謂之消渴肝居下部而邪居之則木火相犯所以邪上撞心木邪乘土則脾氣受傷所以飢不欲食食即吐蛔脾土既傷而復下之則脾氣愈虛所以痢不止正陽明腑病者由表而傳裡由經而入腑也邪氣既深故為潮熱自汗譫語發渴不惡寒反惡熱揭去衣被揚手擲足或發斑黃狂亂五六日不大便脈滑而實此實熱已傳於內乃可下之若其脈弱無神或內無痞滿實堅等證又不可妄行攻下仲景曰尺寸俱浮者太陽受病也當一二日發尺寸俱長者陽明受病也當二三日發尺寸俱弦者少陽受病也當三四日發此三陽皆受病未入於腑者可汗而已尺寸俱沉細者太陰受病也當四五日發尺寸俱沉者少陰受病也當五六日發尺寸俱微緩者厥陰受病也當六七日發此三陰俱受病已入於腑者可下而已成無己注曰三陽受邪為病在表法當汗解然三陽亦有便入腑者入腑則宜下故云未入於腑者可汗而已三陰受邪為病在裡於法當下然三陰亦有在經者在經則宜汗故云已入於腑者可下而已太陽證似少陰者以其發熱惡寒而脈反沉也少陰證似太陽者以其惡寒脈沉而反發熱也仲景曰太陽病發熱頭痛脈反沉身體疼痛若不瘥者當救其里宜四逆湯少陰病始得之反發熱脈沉者宜麻黃附子細辛湯按此二證謂病在太陽其脈當浮而反沉者因正氣衰弱裡虛而然故當用四逆湯此裡虛不得不救也病在少陰證當無熱而反熱者因寒邪在表猶未傳裡故當用麻黃附子細辛湯此表邪不得不散也此二證者均屬脈沉發熱但其有頭疼故為太陽病無頭疼故為少陰病第在少陰而反發熱者以表邪浮淺可以汗解其反猶輕在太陽而反脈沉者以正氣衰微難施汗下其反為重由此觀之可見陽經有當溫里者故以生附配乾薑補中自有散意陰經有當發表者故以熟附配麻黃發中亦有補焉此仲景求本之治其他從可知矣傳經辨八附合病並病義傷寒傳變不可以日數為拘亦不可以次序為拘如內經言一日太陽二日陽明三日少陽之類蓋言傳經之大概非謂凡患傷寒者必皆如此也蓋寒邪中人本無定體觀陶節庵曰風寒之初中人也無常或入於陰或入於陽非但始太陽終厥陰也或自太陽始日傳一經六日至厥陰邪氣衰不傳而愈者亦有不罷再傳者或有間經而傅者或有傳至二三經而止者或有始終只在一經者或有越經而傳者或有自少陽陽明而入者或有初入太陽不作鬱熱便入少陰而成真陰證者所以凡治傷寒不可拘泥但見太陽證便治太陽但見少陰證便治少陰但見少陽陽明證便治少陽陽明此活法也又有合病並病之證曰合病者兩經或三經齊病不傳者為合病並病者一經先病未盡又過一經者為並病所以有太陽陽明合病有太陽少陽合病有陽明少陽合病有三陽合病三陽若與三陰合病即是兩感所以三陰無合併例也即仲景亦曰日數雖多但見表證而脈浮緊者猶宜汗之日數雖少但見里證而脈沉實者猶宜下之誠為不易之論故不可執定日數謂一二日宜發表三四日宜和解五六日即宜下若或不知通變因致誤人者多矣故必真知其表邪未解則當汗之真知其胃邪已實方可下之真知其陰寒邪勝自宜溫之真知其邪實正虛客主不敵必須補之但能因機察變原始要終而纖悉無遺者方是活人高手仲景曰傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也傷寒六七日無大熱其人躁煩者此為陽去入陰故也傷寒二三日陽明少陽證不見者為不傳也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也陽證陰證辨九凡治傷寒須先辨陽證陰證若病自三陽不能解散而傳入三陰則寒鬱為熱因成陽證蓋其初病必發熱頭痛脈浮緊無汗以漸而深乃入陰經此邪自陽分傳來愈深則愈熱雖在陰經亦陽證也其脈必沉實有力其證必煩熱熾盛此當攻裡或消或下隨宜而用若內不有熱安得謂之陽證乎若初起本無發熱頭痛等證原不由陽經所傳而徑入陰分者其證或厥冷或嘔吐或腹痛瀉利或畏寒不渴或脈來沉弱無力此皆元陽元氣之不足乃為真正陰證經曰發熱惡寒發於陽無熱惡寒發於陰此以傳經不傳經而論陰陽也陰陽之治又當辨其虛實如下一治傷寒凡陽證宜涼宜瀉陰證宜補宜溫此大法也第以經臟言陰陽則陰中本有陽證此傳經之熱邪也以脈證言陰陽則陽中最多陰證此似陽之虛邪也惟陰中之陽者易辨而陽中之陰者為難知耳如發熱狂躁口渴心煩喜冷飲水無度大便硬小便赤喉痛口瘡聲粗氣急脈來滑實有力者此真陽證也其有身雖熱而脈來微弱無力者此雖外證似陽實非陽證觀陶節庵曰凡發熱面赤煩躁揭去衣被唇口赤裂言語善惡不避親疏虛狂假斑脈大者人皆不識認作陽證殊不知陰證不分熱與不熱須憑脈下藥至為切當不問脈之浮沉大小但指下無力重按全無便是陰脈不可與涼藥服之必死急與五積散通解表裡之寒甚者必須加姜附以溫之又曰病自陽分傳入三陰者俱是脈沉妙在指下有力無力中分有力者為陽為實為熱無力者為陰為虛為寒此節庵出人之見也然以余觀之大都似陽非陽之證不必謂其外熱煩躁微渴戴陽之類即皆為陰證也但見其元陽不足而氣虛於中雖有外熱即假熱耳設用清涼消耗則中氣愈敗中氣既敗則邪氣愈強其能生乎故凡遇此等證候必當先其所急人知所急在病而不知所急在命元氣忽去疾如絕弦呼吸變生挽無及矣治例另列後卷一傷寒綱領惟陰陽為最此而有誤必致殺人然有純陽證有純陰證是當定見分治也又有陰陽相半證如寒之即陰勝熱之即陽勝或今日見陰而明日見陽者有之今日見陽而明日變陰者亦有之其在常人最多此證盤珠膠柱惟明哲者之能辨也然以陰變陽者多吉以陽變陰者多凶是又不可不察凡病人開目喜明欲見人多談者屬陽閉目喜暗不欲見人懶言者屬陰論曰夫陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死又曰桂枝下咽陽盛則斃承氣入胃陰盛以亡按此陰陽二字乃以寒熱為言也陽盛陰虛言內熱有餘而外寒不甚也夫邪必入腑然後作熱熱實於內即陽盛也故再用溫熱以汗之則死矣陽虛陰盛言寒邪有餘而蓄熱未深也夫邪中於表必因風寒寒束於外即陰盛也故妄用沉寒以下之則死矣所以陽盛者用桂枝則斃陰盛者用承氣則亡三陽陽明證十仲景曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實也少陽陽明者發汗利小便胃中躁煩實大便難是也問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明內實大便難此名陽明也問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也按此三陽陽明之證皆自經傳腑胃家之實證也曰太陽陽明者邪自太陽傳入於胃其名脾約以其小便數大便硬也正陽陽明者邪自陽明本經傳入於腑而邪實於胃也少陽陽明者邪自少陽傳入於胃也胃為腑者猶府庫之府府之為言聚也以胃本屬土為萬物所歸邪入於胃則無所復傳鬱而為熱此由耗亡津液胃中乾燥或三陽熱邪不解自經而腑熱結所成故邪入陽明胃腑者謂之實邪土氣為邪旺於未申所以日晡潮熱者屬陽明也論曰潮熱者實也是為可下之證又曰潮熱者此外欲解也可攻其里焉又曰其熱不潮不可與承氣此潮熱屬胃可知也然潮熱雖為可攻若脈浮而緊或小便難大便溏身熱無汗此熱邪未全入腑猶屬表證仍當和解若邪熱在表而妄攻之則禍不旋踵矣成無己曰胃為水穀之海主養四傍故四傍有病皆能傳入於胃入胃則更不復傳如太陽病傳之入胃則不更傳陽明陽明病傳之入胃則不更傳少陽少陽病傳之入胃則不更傳三陰也兩感十一病兩感於寒者一日則太陽與少陰表裡俱病凡頭痛發熱惡寒者邪在表口乾而渴者邪在裡二日則陽明與太陰表裡俱病身熱目痛鼻乾不眠者邪在表腹滿不欲食者邪在裡三日則少陽與厥陰表裡俱病耳聾脅痛寒熱而嘔者邪在表煩滿囊縮而厥水漿不入邪在裡凡兩感者或三日或六日營衛不行臟腑不通昏不知人胃氣乃盡故當死也若此兩感雖為危證然不忍坐視其於拯溺救焚之計所不可免但當細察其證亦自有緩急可辨若三陽之頭痛身熱耳聾脅痛惡寒而嘔此在表者不得不解於外其三陰之腹滿口渴囊縮譫語此在裡者不得不和其中若其邪自外入而外甚於里者必當以外為主治而兼調其內若其邪因虛襲而元氣不支者速宜單顧根本不可攻邪但使元陽不敗則強敵亦將自解其庶幾乎有可望也此證變態非常故不可鑿言方治按門人錢禎曰兩感者本表裡之同病似若皆以外感為言也而實有未必盡然者正以外內俱傷便是兩感今見有少陰先潰於內而太陽繼之於外者即縱情肆欲之兩感也太陰受傷於裡而陽明重感於表者即勞倦竭力飲食不調之兩感也厥陰氣逆於臟少陽復病於腑者即七情不慎疲筋敗血之兩感也人知兩感為傷寒而不知傷寒之兩感內外俱困病斯劇矣但傷有重輕醫有知不知則死生系之或謂兩感證之不多見者蓋亦見之不廣而義有未達耳其於治法亦在乎知其由而救其本也此言最切此病誠發人之未發深足指迷不可不錄表裡辨十二陽邪在表則表熱陰邪在表則表寒陽邪在裡則裡熱陰邪在裡則裡寒邪在半表半裡之間而無定處則往來寒熱邪在表則心腹不滿邪在裡則心腹脹痛邪在表則呻吟不安邪在裡則躁煩悶亂邪在表則能食邪在裡則不能食不欲食者邪在於表裡之間未至於不能食也邪在表則不煩不嘔邪在裡則煩滿而嘔凡初見心煩喜嘔及胸膈漸生痞悶者邪在表方傳裡也不可攻下凡病本在表外證悉具而脈反沉微者以元陽不足不能外達也但當救里以助陽散寒為上策前卷傳忠錄中有辨當互閱之寒熱辨十三邪氣在表發熱者表熱里不熱也宜溫散之邪氣在裡發熱者裡熱甚而達於外也宜清之陽不足則陰氣上入陽中而為惡寒陰勝則寒也宜溫之陰不足則陽氣陷入陰中而為發熱陽勝則熱也宜清之寒熱往來者陰陽相爭陰勝則寒陽勝則熱也蓋熱為陽寒為陰表為陽里為陰邪之客於表者為寒邪與陽相爭則為寒慄邪之傳於裡者為熱邪與陰相爭則為熱躁其邪在半表半裡之間者外與陽爭則為寒內與陰爭則為熱或表或里或出或入是以寒熱往來此半表裡之證也故凡寒勝者必多寒熱勝者必多熱但審其寒熱之勢則可知邪氣之淺深也經曰陽微則惡寒陰弱則發熱仲景曰發熱惡寒者發於陽也無熱惡寒者發於陰也論汗十四仲景論曰寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗也曰三陽皆受病未入於府者可汗而已詳見前六經證中曰太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在者此當發其汗按此一證雖以太陽經為言然陽明少陽日久不解者亦仍當汗散但太陽為三陽之表而主通身之外證故特舉太陽為言也曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之曰脈浮而數者可發汗宜麻黃湯主之曰太陽與陽明合病喘而胸滿者邪在表也不可下宜麻黃湯主之曰陽明病脈浮無汗而喘者發汗則愈宜麻黃湯主之曰太陽病項背強几几無汗惡風者宜葛根湯主之曰太陽與陽明合病者必自下痢葛根湯主之曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之曰太陽病發熱汗出惡風脈緩者名為中風太陽病頭痛發熱汗出惡風者桂枝湯主之曰太陽病外證未解脈浮弱者當以汗解宜桂枝湯曰太陽病脈遲汗出多微惡寒者表證未解也可發汗宜桂枝湯曰病如瘧狀日晡所發熱者屬陽明也脈浮虛者當發汗宜桂枝湯曰太陰病脈浮者可發汗宜桂枝湯曰厥陰證有下痢腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯曰下痢後身疼痛清便自調者急當救表宜桂枝湯發汗按此以身疼痛者為表證故當散之曰傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯主之曰少陰病始得之反發熱脈沉者麻黃附子細辛湯主之按此證脈雖沉而身反熱者正乃陰經之表證也故宜用此溫散曰太陽病不解轉入少陽脅下硬滿乾嘔不能食往來寒熱脈沉緊者與小柴胡湯曰嘔而發熱者小柴胡湯主之曰陽明病發潮熱大便溏小便自可胸脅滿者小柴胡湯主之曰陰證不得有汗今頭汗出故知非少陰也可與小柴胡湯曰二陽並病太陽初得病時發其汗汗出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗按仲景表汗之條縷悉尚多今但述其切要者凡二十四證以見其宜否之法而大意可得也第其所用汗劑不曰麻黃則曰桂枝此寒邪初感溫散之妙法也今後人以麻黃桂枝為異物而不敢用而復有強為之釋者謂此在仲景乃為隆冬直中陰寒者設耳而不知四時陰勝之邪皆最宜者也嗚呼仲景之下再無仲景可見醫中之品矣一各經表證凡有汗出不徹者皆未足言汗蓋邪未盡去其人必身熱不退而仍覺躁煩或四體痠疼坐臥有不安者以汗出不徹故也何從知之但診其脈緊不退及熱時乾燥無汗者即其證也仍宜汗之如果汗透而熱仍不退或汗後身熱愈甚者是即所謂陰陽交魂魄離大凶之兆也一凡汗之不徹者其故有三如邪在經絡筋骨而汗出皮毛者此邪深汗淺衛解而營不解一不徹也或以十分之邪而去五分之汗此邪重汗輕二不徹也或寒邪方去猶未清楚遽起露風而因虛復感此新舊相踵三不徹也凡遇此者當辨其詳而因微甚以再汗之一凡既愈復熱者其故有四或以邪氣方散胃氣未清因而過食者是為食復此其一也或以表邪方解原不甚虛有過慎者輒加溫補是誤補而復此其二也若此二者所謂食入於陰長氣於陽以致胃氣復閉陽邪復聚而然表邪既復仍宜汗也又或有以新病方瘳不能調攝或勞傷脾陰因而復熱者是名勞復此其三也或不慎房室因而再感者是名女勞復此其四也若此二者所謂陰虛者陽必湊之而然此則或從補或從汗當因變制宜權其緩急而治分虛實也論曰傷寒瘥後更發熱者小柴胡湯主之脈浮者宜汗解之脈沉實者宜下解之一取汗之法當取於自然不宜急暴但服以湯劑蓋令溫暖使得津津微汗稍令久之則手足俱周遍身通達邪無不散矣若一時逼之致使如淋如洗則急遽間衛氣已達而營氣未周反有不到之處且恐大傷元氣非善法也余嘗見有子病者其父母愛惜之甚欲其速愈且當溫暖之令覆以重被猶恐不足而以身壓其上子因熱極呼叫其父母曰猶未也須再出些方好及許久放起竟致亡陽而斃之是但知汗出何妨而不知汗之殺人此強發之鑑也又有邪本不甚或挾虛年衰感邪等證醫不能察但知表證宜解而發散太過或誤散無效而屢散不已因而即被其害者有之或邪氣雖去遂致胃氣大傷不能飲食而羸憊不振者有之此過汗之戒也凡發汗太過一時將致亡陽或身寒而慄或氣脫昏沉等候速宜煎獨參湯一兩許飲之或甚者以四味回陽飲速為挽回庶可保全否則恐致不救一脈有忌汗者如傷寒論曰太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒慄不能自還傷寒四五日脈沉而喘滿沉為在裡不可汗汗亡津液必大便難而譫語少陰病脈微不可發汗以亡陽故也傷寒脈微而惡寒者此陰陽俱虛不可更發汗更吐下也尺脈弱而無力者切不可汗下尺中遲者不可發汗以榮氣不足血少故也景岳子曰按以上忌汗諸脈可見仲景大意故凡治傷寒但見脈息微弱及沉細無力者皆不可任意發汗然欲去外邪非汗不可而仲景云脈微弱者不可發汗夫脈弱非陽既不可用寒涼而寒邪在表又不可用攻下然則舍汗之外又將何法以治此表邪乎不知溫中即可以散寒而強主即可以逐寇此仲景之意豈不盡露於言表而明悟者當心會之矣且凡病外感而脈見微弱者其汗最不易出其邪最不易解何也正以元氣不能托送即發亦無汗邪不能解則愈發愈虛而危亡立至矣夫汗本乎血由乎營也營本乎氣由乎中也未有中氣虛而營能盛者未有營氣虛而汗能達者脈即營之外候脈既微弱元氣可知元氣愈虛邪愈不解所以陽證最嫌陰脈正為此也故治此者但遇脈息微弱正不勝邪等證必須速固根本以杜深入專助中氣以托外邪必使真元漸充則脈必漸盛自微細而至滑大自無力而至有神務令陰脈轉為陽脈陰證轉為陽證斯時也元氣漸充方是正復邪退將汗將解之佳兆故凡治表邪之法有宜發散者有宜和解者有宜調補營衛者如果邪實而無汗則發散為宜有汗而熱不除則和解為宜元氣虛而邪不能退則專救根本以待其自解自汗為宜此逐邪三昧萬全之法也今有庸流但見其外不見其內每不論證之陰陽脈之虛實但知寒涼可以退熱但知發散可以解表不知元陽一敗則土崩瓦解立見潰矣反掌殺人而終身不悟是真下愚不移者也若而人者亦可謂之醫乎證有忌汗者如傷寒論曰當汗者下之為逆當下者汗之為逆下痢清穀不可攻表汗出必脹滿以重亡津液故也汗家不可發汗陽虛不得重發汗衄家不可發汗亡血家不可發汗淋家不可發汗發汗必便血咽喉乾燥者不可發汗咽中閉塞不可發汗發汗則吐血氣欲絕身重心悸者不可發汗瘡家雖身疼痛不可發汗發汗則痙咳而小便利若失小便者不可發汗汗出則四肢厥逆冷諸動氣不可發汗動氣義詳後論下論吐十五仲景曰病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當吐之宜瓜蒂散病人手足厥冷脈乍結以客氣在胸中心下滿而煩飲食不能入者病在胸中當吐之曰病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯按此二節前節言胸有寒者謂寒邪也所以當吐後節言膈上有寒飲乾嘔者謂中寒也所以宜溫然則前節之言寒者言寒邪之實後節之言寒者言胃氣之虛均謂之寒而有虛實之異實者宜吐吐則散也虛而吐之則胃氣愈虛病必更甚矣此等要處最當詳察曰病胸上諸實胸中鬱郁而痛不能食欲使人按之而反有涎唾下痢日十餘行其脈反遲而寸脈微滑此可吐之吐之痢則止曰太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣者此為吐之內煩也按此以太陽證有不當吐而吐者必邪熱乘虛入胃故致內煩也一宿食在上脘者當吐之一凡用吐藥中病即止不必盡劑也一寸脈弱而無力者切忌用吐論下十六論曰三陰皆受病已入於府者可下而已此詳義見前六經證曰脈浮而大心下反硬有熱屬臟者攻之不令發汗按此以心下硬而熱在臟即脈雖浮大者病亦屬裡故不宜發汗而當攻內也曰傷寒不大便六七日頭痛有熱者與承氣湯按此以陽明內熱而為頭痛也故可攻之曰陽明病外已解而潮熱者可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗雖多而微發熱惡寒者表未解也其熱不潮未可與承氣曰陽明病胃中有燥屎者可攻之病人不大便五六日繞臍痛煩躁發作有時者此有燥屎也曰汗出譫語者以有燥屎在胃中此為風也須下之宜大承氣湯曰陽明病發熱汗多者熱在裡也急下之宜大承氣湯曰陽明病發汗不解腹滿痛者邪在裡也急下之宜大承氣湯曰病腹中滿痛者此為實也當下之曰腹滿不減減不足言當下之宜大承氣湯曰傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者或心下至少腹硬滿而痛不可近者大陷胸湯主之曰陽明少陽合病脈滑而數者有宿食也當下之宜大承氣湯按此一條必須兼脈證而察之蓋傷寒之脈滑數者多若無脹痛等證未必即為宿食故不可單據滑數之脈便認作可攻之證曰若表已解而內不消非大滿猶生寒熱則病不除也按此一條言若非大滿而猶生寒熱者是表病猶不除也尚不可下曰若表已解而內不消大滿大實堅有燥屎自可徐下之雖四五日不能為禍也若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者困篤重者必死矣按此一條言外無表證內有堅滿然後可下正以見下不宜輕輕下者為禍不小也曰太陽病熱結耪胱其人如狂血自下下者愈若表未解者不可攻當先解表表已解但少腹急結者乃可攻之宜桃仁承氣湯一凡傷寒當下者不宜用丸藥以丸藥不能滌盪熱邪而但能損正氣也又凡治傷寒熱邪傳裡者服下藥後仍用鹽炒麩皮一升許將絹包於病人腹上款款熨之使藥氣得熱則行大便必易通也一脈有忌下者如傷寒論曰傷寒脈微而惡寒者此陰陽俱虛不可更發汗更吐更下也寸口脈浮大而醫反下之此為大逆關脈弱胃氣虛有熱不可大攻之熱去則寒起尺脈澀弱無力者不可下大便硬者當下之設脈遲緩者不可下裡氣不實也脈虛細者不可下脈浮者不可下脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不宜下也脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部者醫以為熱而復用毒藥攻其胃此為重虛客陽去有期必下如汙泥而死脈濡而緊濡則陽氣微緊則榮中寒陽微衛中風發熱而惡寒榮緊胃氣冷微嘔心內煩醫謂有大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裡俱虛竭卒起而頭眩客熱在皮膚脹怏不得眠不知胃氣冷緊寒在關元當溫反下之安可復追還脈久數者非外邪也不可下之脈細數者非實邪也不可下結胸證其脈浮大者邪未入府也不可下下之則死大抵傷寒最宜慎下若脈息無力及表證未罷者不可亂投湯劑下之為逆一證有忌下者如太陽病外證未解不可下下之為逆太陽與陽明合病喘而胸滿者邪在表也不可下陽明病若微發熱惡寒者表未解也不可下陽明病潮熱大便初硬後溏者不可攻陽明病腹微滿初頭硬後必溏者非實熱也不可攻之陽明病其熱不潮者未可與承氣湯陽明病雖有潮熱而大便不硬者不可與承氣湯不轉失氣者其內不堅慎不可攻也陽明病心下硬滿者不可攻攻之利遂不止者死硬在心下者其邪在胸膈猶未入腑也故不可攻臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也病欲吐者不可下嘔多雖有陽明證不可攻之此嘔多者病在上焦病在上而攻其下取敗之道也陽明病若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯濕家下之額上汗出微喘小便不利者死下痢不止亦死陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦陰強無陽者雖其大便堅硬亦不可下下之則清穀腹滿陰陽俱虛惡水者若下之則里冷不嗜食大便完穀出陽微者不可下下之則心下痞硬惡寒者不可下小便清利者火不盛也不可下諸四逆厥者不可下咽中閉塞者不可下發汗多亡陽譫語者不可下諸虛者不可下下之則陽虛而生寒仲景曰極寒反汗出身必冷如冰其有眼睛不慧語言不休口雖欲言舌不得前者皆死陰虛水虧虛煩虛躁者不可下重亡其陰萬無生理矣看目十七夫治傷寒須觀兩目或赤或黃赤者為陽證若兼六脈洪大有力或躁而渴者其熱必甚輕則三黃石膏湯重則大承氣之類主之一凡目色清白而無昏冒閃爍之意者多非火證不可輕用寒涼一眼眵多結者必因有火蓋凡有火之候目必多液液干而凝所以為眵即如肺熱甚則鼻涕出是亦目液之類也一目睛上視者謂之戴眼此屬足太陽經之證蓋太陽為目之上網而與少陰為表裡少陰之腎氣大虧則太陽之陰虛血少故其筋脈燥急牽引而上若直視不轉者尤為凶候欲治此者速當以培陰養血為主今人不知皆云為風若用風藥則陰愈虛血愈燥矣其有不顛覆者未之有也舌色辨十八舌為心之官本紅而澤凡傷寒三四日以後舌上有苔必自潤而燥自滑而澀由白而黃由黃而黑甚至焦乾或生芒刺是皆邪熱內傳由淺入深之證也故凡邪氣在表舌則無苔及其傳裡則津液乾燥而舌苔生矣若邪猶未深其在半表半裡之間或邪氣客於胸中者其苔不黑不澀止宜小柴胡之屬以和之若陽邪傳裡胃中有熱則舌苔不滑而澀宜梔子豉湯之屬以清之若煩躁欲飲水數升者白虎加人參湯之類主之大都舌上黃苔而焦澀者胃腑有邪熱也或清之或微下之金匱要略曰舌黃未下者下之黃自去然必大便燥實脈沉有力而大渴者方可下之若微渴而脈不實便不堅苔不幹燥芒刺者不可下也其有舌上黑苔而生芒刺者則熱更深矣宜涼膈散承氣湯大柴胡之屬酌宜下之若苔色雖黑滑而不澀者便非實邪亦非火證非惟不可下且不可清也此辨舌之概雖云若此然猶有不可概論者仍宜詳察如下按傷寒諸書皆云心為君主之官開竅於舌心主火腎主水黑為水色而見於心部是為鬼賊相刑故知必死此雖據理之談然實有未然者夫五行相制難免無克此其所以為病豈因克為病便為必死第當察其根本何如也如黑色連地而灰黯無神此其本原已敗死無疑矣若舌心焦黑而質地紅活未必皆為死證陽實者清其胃火火退自愈何慮之有其有元氣大損而陰邪獨見者其色亦黃黑真水涸竭者其舌亦乾焦此腎中水火俱虧原非實熱之證欲辨此者但察其形氣脈色自有虛實可辨而從補從清反如冰炭矣故凡以焦黑乾澀者尚有非實非火之證再若青黑少神而潤滑不燥者則無非水乘火位虛寒證也若認此為火而苦寒一投則餘燼隨滅矣故凡見此者但當詳求脈證以虛實為主不可因其焦黑而執言清火也傷寒固爾諸證亦然新按余在燕都嘗治一王生患陰虛傷寒年出三旬而舌黑之甚其芒刺干裂焦黑如炭身熱便結大渴喜冷而脈則無力神則昏沉群醫謂陽證陰脈必死無疑余察其形氣未脫遂以甘溫壯水等藥大劑進之以救其本仍問用涼水以滋其標蓋水為天一之精涼能解熱甘可助陰非若苦寒傷氣者之比故於津液乾燥陰虛便結而熱渴火盛之證亦所不忌由是水藥並進前後凡用人參熟地輩各一二斤附子肉桂各數兩冷水亦一二斗然後諸證漸退飲食漸進神氣俱復矣但察其舌黑則分毫不減余甚疑之莫得其解再後數日忽舌上脫一黑殼而內則新肉燦然始知其膚腠焦枯死而復活使非大為滋補安望再生若此一證特舉其甚者紀之此外凡舌黑用補而得以保全者蓋不可枚舉矣所以凡診傷寒者當以舌色辨表裡以舌色辨寒熱皆不可不知也若以舌色辨虛實則不能無誤蓋實固能黑以火盛而焦也虛亦能黑以水虧而枯也若以舌黃舌黑悉認為實熱則陰虛之證萬無一生矣古按金鏡錄曰舌見全黑色水剋火明矣患此者百無一治治者審之薛立齋曰余在留都時地官主事鄭汝東妹婿患傷寒得此舌院內醫士曾禧曰當用附子理中湯人咸驚駭而止及其困甚治棺曾與其鄰復往視之謂用前藥猶有生意其家既待以死拼而從之數劑而愈大抵舌黑之證有火極似水者即杜學士所謂薪為黑炭之意也宜涼膈散之類以瀉其陽有水來剋火者即曾醫士所療者是也宜理中湯以消陰翳又須以老生薑切平擦其舌色稍退者可治堅不退者不可治又按弘治辛酉金臺姜夢輝患傷寒亦得此舌手足厥冷呃逆不止眾醫猶作火治幾致危殆判院吳仁齋用附子理中湯而愈夫醫之為道有是病必用是藥附子療寒其效可數奈何世皆以為必不可用之藥寧視人之死而不救不亦哀哉凡用藥得宜效應不異不可便謂為百無一治而棄之也飲水十九凡傷寒飲水因內水消竭欲得外水自救若大渴欲飲一升止可與一碗常令不足不可太過若恣飲過量使水停心下則為水結胸留於胃則為噎為噦溢於皮膚則為腫蓄於下焦則為癃滲於腸間則為痢下皆飲水太多之過也又不可不與又不可強與故曰若還不與非其治強飲須教別病生也凡陽明病口燥但欲潄水而不欲咽者以熱在經而里無熱也必將為衄不可與涼藥按飲水一證本以內熱極而陽毒甚者最其相宜若似乎止宜實邪不宜於虛邪也而不知虛證亦有不同如陽虛無火者其不宜水無待言也其有陰虛火盛者元氣既弱精血又枯多見舌裂唇焦大渴喜冷三焦如焚二便閉結等證使非藉天一之精何以濟然眉之急故先宜以冰水解其標而繼以甘溫培其本水藥兼進無不可也其有內真寒外假熱陰盛格陽等證察其元氣則非用甘溫必不足以挽回察其喉舌則些微辛熱又不可以近口有如是者則但將甘溫大補之劑或單用人參煎成湯液用水浸極冷而飲之此以假冷之味解上焦之假熱而真溫之性復下焦之真陽是非用水而實亦用水之意余用此活人多矣誠妙之甚者也惟是假熱之證則證雖熱而脈則微口雖渴而便則不閉者此而欲水必不可與若誤犯之則其敗泄元陽為害不小有不可不慎也三陽陰證辨二十足太陽膀胱經病凡發熱頭痛腰脊強肩背痛脈浮緊者是皆太陽證也若肩背畏寒噁心欲嘔或眼目無神不欲見人喜暗畏明眼眶酸澀或喜向壁臥或戴眼上視或頭傾身痛甚或顏色清白隱見青黑或丹田無力息短聲微氣促而喘或咽中閉塞或角弓發痙或小水清白或失小便或小便短赤而內不喜冷凡脈見浮空無力或沉緊細弱者皆太陽合少陰之陰證也足陽明胃經之病凡發熱頭目痛不得眠脈長而數者本皆陽明證也若面鼻惡寒面色清白或鼻尖冷口氣不熱或唇口青白微黑或氣短聲微鼻息不長懶於言語或戴陽面赤昏沉困倦多眠或煩躁面赤身熱虛狂假斑脈反微細無力或身雖發熱反欲得衣或口渴不欲飲水並水漿不入或惡寒寒慄噁心嘔逆或肉瞤心悸或動氣見於胸腹或四肢無力身重懶於舉動或手足自冷或肌肉之間以手按之殊無大熱或大便不實自利腹痛凡脈見浮長無力或短細結促者皆陽明合太陰之陰證也足少陽膽經之病凡發熱頭耳牽痛脅肋痛往來寒熱脈見弦數者本皆少陽證也若身雖微熱而時作時止時多畏寒或耳聾或頭運或眼目羞澀或多驚怯恐畏或嘔苦吐酸或噁心喜暖或爪青筋急囊縮或厥逆下痢腸鳴小腹痛凡脈見弦數無力而沉細微弱者皆少陽合厥陰之陰證也以上乃三陽經之陰證陰證者即陽虛之證也皆大忌寒涼克伐之藥妄用即死余恐將來復有如李子建之流者故特揭而出之用為提醒後人之鑑云再論陰證陽證及李子建傷寒十勸之害二十一天地間死生消長之道惟陰陽二氣盡之而人力挽回之權亦惟陰陽二字盡之至於傷寒一證則尤切於此不可忽也第傷寒之陰證陽證其義有二所謂二者曰經有陰陽證有陰陽也經有陰陽則三陽為陽證三陰為陰證證有陰陽則實熱為陽證虛寒為陰證凡經之陰陽則有寒有熱故陽經亦有陰證陰經亦有陽證證之陰陽則有假有真故發熱亦有陰證厥逆亦有陽證此經自經而證自證乃傷寒中最要之綱領不可混也而今之醫流多不明此故每致混指陰陽肆行克伐殺人於反掌之間而終身不悟深為可慨原其由然非無所本蓋本於李子建之傷寒十勸十勸之中惟八勸曰病已在裡不可發汗九勸曰飲水不可過多十勸曰病後當忌飲食房勞凡此三者皆為得理然亦人皆知之無待其為勸矣此外七勸則悉忌溫補如一勸云傷寒頭痛及身熱便是陽證不可服熱藥若此一說乃悉以陽經之表病認為內熱之陽證治以寒涼必殺人矣觀仲景治太陽經傷寒頭痛發熱無汗者用麻黃湯頭痛發熱汗出惡風者用桂枝湯太陽病發熱頭痛脈反沉身體疼痛者當救其里用四逆湯陽明病脈浮無汗而喘者出汗則愈宜麻黃湯凡此之類豈非皆用熱藥以治陽經之疼痛發熱乎且凡寒邪之感人必先入三陽之表所以為頭疼發熱等證使於此時能用溫散則淺而且易故岐伯曰發表不遠熱是誠神聖傳心之旨惟仲景知之故能用溫散如此是豈果陽經之病便是陽證耶經證不明而戒用溫熱最妄之談此其一也又二勸曰傷寒必須直攻毒氣不可補益若據此說則凡是傷寒盡皆實證而必無虛證矣何岐伯曰邪之所湊其氣必虛又曰寒則真氣去去則虛虛則寒搏於皮膚之間又觀仲景論傷寒之虛證虛脈及不可汗吐下者凡百十餘條此外如東垣丹溪陶節庵輩所用補中益氣回陽返本溫經益元等湯則其宜否溫補概可知矣矧今之人凡以勞倦七情色欲過度及天稟薄弱之流十居七八使以此輩一旦因虛感邪若但知直攻毒氣而不顧元陽則寇未逐而主先傷鼠未投而器先破顧可直攻無忌乎凡受斯害死者多矣妄談之甚此其二也又三勸曰傷寒不思飲食不可服溫脾藥據此一說則凡見傷寒不食者皆是實熱證而何以仲景有曰陽明病不能食攻其熱必噦所以然者胃中虛冷故也又曰病人脈數數為熱當消穀引飲而反吐者以其發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故也又曰食谷欲嘔者屬陽明也吳茱萸湯主之若此之類豈非皆寒證之宜溫者耶但傷寒之熱證固不能食而寒證之不食者尤多以中寒而不溫脾則元陽必脫而死矣此妄談之三也又四勸曰傷寒腹痛亦有熱證不可輕服溫暖藥據所云亦有熱證則寒證居多矣寒痛既多則何不曰不可輕服寒涼藥而特以溫暖為禁者何也獨不見仲景之治腹痛有用真武湯者有用通脈四逆湯者有用四逆散加附子者有曰手足厥冷小腹滿按之痛者此冷結膀胱關元也使以此證而亦忌溫暖則寒在陰分能無斃乎此妄談之四也再如五勸之傷寒自利不可例服補藥暖藥止瀉藥六勸之禁用艾火七勸之手足厥冷不可例作陰證等說總屬禁熱之談余亦不屑與之多辨第拓取聖賢成法明哲格言再悉於此用救將來是誠今日之急務也因詳考仲景傷寒論見其所列三百九十七法而脈證之虛寒者一百有餘一百一十三方而用人參者二十用桂附者五十有餘又東垣曰實火宜瀉虛火宜補又薛立齋曰大凡元氣虛弱而發熱者皆內真寒而外假熱也凡若此者豈皆余之杜撰耶豈子建諸人一無所見耶若無所見胡可妄言若有所見胡敢妄言今觀彼十勸之中凡禁用溫補者居其八九而絕無一言戒及寒涼果何意哉因致未學認為聖經遂悉以陰證作陽證悉以虛證作實證但知涼瀉之一長盡忘虛寒之大害夫生民元氣足者其幾能堪此潛消暗剝之大盜乎嗟嗟何物匪才敢言十勸既不能蒐羅訓典明析陰陽又不能揣摩實虛原終要始總弗求陽德之亨全不識冰霜之至後學者多被所愚致造終身之孽無辜者陰受其戮詎思冤魄可憐余言及此能不轉慈悲為憤怒借筆削為箴規獨思深詆先輩豈出本心亦以目擊多艱難勝嗚咽實亦有為而云然蓋以久感之餘復有所觸適一契姻向以中年過勞因患勞倦發熱余為速救其本已將復元忽遭子建之徒堅執十勸以相抗昧者見其發熱反為左袒不數劑而遂以有生之徒置之死地因並往日見聞倍加傷慘誠可痛可恨也子建子建吾知多冤之積於爾者久矣故悉此論以解爾此後之冤孽爾若有知尚知感否論傷寒古治法二十二凡傷寒治法必當先知經絡次序如一日在太陽則為發寒頭痛等證二日在陽明則為目痛鼻乾不眠等證三日在少陽則為耳聾脅痛寒熱口苦等證四日在太陰則為腹滿自利等證五日在少陰則為舌乾口燥等證六日在厥陰則為煩滿囊縮等證此傷寒傳經之大概也然病有不同證有多變故不可以一定之法鑿鑿為拘今人有不知察變者每按日按經執方求治則證多不合益見其難矣即如發熱無汗頭痛者宜於發汗本太陽經之證治也然仲景曰陽明病外證云何曰身熱汗自出不惡寒反惡熱此陽明之發熱也曰陽明病反無汗而小便利嘔而咳手足厥者必苦頭痛此陽明之無汗頭痛也曰傷寒脈弦細頭痛發熱者屬少陽此少陽之頭痛發熱也凡三陽皆為表證而惟少陽則曰半表半裡不可發汗然法曰尺寸俱浮者太陽受病也尺寸俱長者陽明受病也尺寸俱弦者少陽受病也此三經皆受病未入於府者可汗而已豈非少陽亦所當汗乎此三陽之治宜乎若此至於三陰則亦有若此者如曰太陰病脈浮者可發汗宜桂枝湯曰少陰病始得之反發熱脈沉者宜麻黃附子細辛湯曰厥陰證下痢腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯凡此皆三陰之發熱三陰之當汗者也至於下證則惟獨少陽為半表半裡之經若不之恐邪氣乘虛內陷故不可攻其他五經皆有下證由此觀之則三陽何嘗無里證三陰何嘗無表證故善治者但見表邪未解即當解表若表證未解不可攻裡也但見里證已具即當攻裡若里證未實尚宜和解也或汗或和或下但當隨證緩急而用得其宜即古今畫一之法也論古法通變二十三凡用藥處方最宜通變不可執滯觀仲景以麻黃湯治太陽經發熱頭痛脈浮無汗之傷寒而陽明病脈浮無汗而喘者亦用之太陽與陽明合病喘而胸滿者亦用之此麻黃湯之通變也又如桂枝湯本治太陽經發熱汗出之中風而陽明病如瘧狀日晡發熱脈浮虛宜發汗者亦用之太陽病外證未解脈浮弱當以汗解者亦用之太陰病脈浮可發汗者亦用之厥陰證下痢腹脹滿身疼痛宜攻表者亦用之此桂枝湯之通變也又如小柴胡湯本治少陽經脅痛乾嘔往來寒熱之傷寒而陽明病潮熱胸脅滿者亦用之陽明中風脈弦浮大腹滿脅痛不得汗身面悉黃潮熱等證亦用之婦人中風續得寒熱經水適斷熱入血室如瘧狀者亦用之此小柴胡之通變也由此觀之可見仲景之意初未嘗逐經執方而立方之意多有言不能悉者正神不可以言傳也所以有此法未必有此證有此證未必有此方即仲景再生而欲盡踵其成法吾知其未必皆相合即仲景復言而欲盡吐其新方吾知其未必無短長於戲方烏足以盡變變胡可以定方但使學者能會仲景之意則亦今之仲景也又何必以仲景之方為拘泥哉余故曰用藥處方最宜通變不當執滯也雖然此通變二字蓋為不能通變者設而不知斯道之理又自有一定不易之要焉苟不知要而強借通變為談柄則胡猜亂道何匪經權反大失通變之旨矣麻黃桂枝辨二十四按傷寒論曰太陽病頭痛發熱惡寒體痛嘔逆脈陰陽俱緊無汗而喘者名為傷寒麻黃湯主之曰太陽病頭痛發熱汗出惡風脈緩者名為中風桂枝湯主之此以無汗脈緊者為傷寒故用麻黃湯有汗脈緩者為中風故用桂枝湯是其辨也又論曰桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也然何以又曰太陽病外證未解脈浮弱者當以汗解宜桂枝湯陽明病日晡所發熱脈虛浮者宜發汗發汗宜桂枝湯是豈桂枝為止汗者耶但麻黃湯無芍藥而用麻黃桂枝湯無麻黃而用芍藥蓋桂枝性散芍藥性斂以芍藥從桂枝則桂枝不峻以桂枝從芍藥則芍藥不寒然以芍藥之懦終不勝桂枝之勇且芍藥能滋調營氣適足為桂枝取汗之助故桂枝湯亦是散劑但麻黃湯峻而桂枝湯緩耳故凡寒邪深固者恐服桂枝不能解表則反以助熱所以脈緊無汗者宜麻黃不宜桂枝若脈浮緩有汗或浮弱者以其風邪尚淺宜桂枝不宜麻黃也此麻黃湯為發表之第一而桂枝湯則解表之次者也今時醫不能察此但聞汗不出者不可與桂枝便謂桂枝能止汗誤亦甚矣而不知止汗在芍藥不在桂枝也但桂枝性溫能強衛氣如內經曰陰氣有餘為多汗身寒仲景曰極寒反汗出者此亡陽而汗也助陽乃可以止汗則正宜用桂枝矣又傷寒論以太陽病無汗脈緊者為傷寒汗出脈緩者為中風此風寒之辨也然大青龍湯證治曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之是豈非太陽中風亦有脈緊無汗者耶可見風之與寒本不相遠但風邪淺而寒邪深耳淺屬陽而深屬陰耳且近見外感寒邪者率皆傷寒發熱脈緊無汗等證至於中風一證謂其脈緩有汗而復發熱者其病本不多見即有之亦必外因者少而內因者多也倘學者以風寒二字及麻黃桂枝二湯必欲分其陰陽同異而執以為辭則失之遠矣本門前卷有風寒辨宜並察之論今時皆合病並病二十五余究心傷寒已久初見合病並病之說殊有不明而今始悉之夫所謂合病者乃二陽三陽同病病之相合者也並病者如太陽先病不解又併入陽明少陽之類也觀仲景曰二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明若太陽病證不罷者不可下按此云轉屬陽明則自太陽而來可知也云太陽病證不罷則二經皆病可知也凡並病者由淺而深由此而彼勢使之必然也此合病並病之義而不知者皆以此為罕見之證又豈知今時之病則皆合病並病耳何以見之蓋自余臨證以來凡診傷寒初未見有單經挨次相傳者亦未見有表證悉罷止存里證者若欲依經如式求證則未見有如式之病而方治可相符者所以令人致疑愈難下手是不知合病並病之義耳今列其大略如下一合病者乃兩經三經同病也如初起發熱惡寒頭痛者此太陽之證而更兼不眠即太陽陽明合病也若兼嘔惡即太陽少陽合病也若發熱不眠嘔惡者即陽明少陽合病也若三者俱全便是三陽合病三陽合病者其病必甚一三陽與三陰本無合病蓋三陽為表三陰為里若表裡同病即兩感也故凡有陰陽俱病者必以漸相傳而至皆並病耳此亦勢所必至非合病兩感之謂一並病與合病不同合病者彼此齊病也並病者一經先病然後漸及他經而皆病也如太陽先病發熱頭痛而後見目痛鼻乾不眠等證者此太陽並於陽明也或後見耳聾脅痛嘔而口苦等證者此太陽並於少陽也或後見腹滿嗌乾等證者此太陽並於太陰也或後見舌乾口燥等證者此太陽並於少陰也或後見煩滿囊縮等證者此太陽並於厥陰也若陽明並於三陰者必鼻乾不眠而兼三陰之證少陽並於三陰者必耳聾嘔苦而兼三陰之證陰證雖見於里而陽證仍留於表故謂之並凡患傷寒而始終熱有不退者皆表邪之未解耳但得正汗一透則表裡皆愈豈非陰陽相併之病乎今之傷寒率多並病若明此理則自有頭緒矣治此之法凡並病在三陽者自當解三陽之表如邪在太陽者當知為陽中之表治宜輕清邪在陽明者當知為陽中之裡治宜厚重邪在少陽者當知為陽中之樞治宜和解此雖解表之大法然余仍有心法詳載新方八略中故或宜溫散或宜涼散或宜平散或宜補中而散是又於陰陽交錯之理有不可不參合而酌用者皆治表之法也至於病入三陰本為在裡如太陰為陰中之陽治宜微溫少陰為陰中之樞治宜半溫厥陰為陰中之陰治宜大溫此陰證之治略也然病雖在陰而有兼三陽之並病者或其邪熱已甚則自宜清火或其表尚未解則仍當散邪蓋邪自外入則外為病本拔去其本則里病自無不愈者此所以解表即能和中也若表邪不甚而里證為急又當先救其里蓋表裡之氣本自相關惟表不解所以里病日增惟里不和所以表邪不散此所以治里亦能解表也但宜表宜里或此或彼之間則自有緩急先後一定不易之道而非可以疑似出入者要在乎知病之藪而獨見其必勝之機耳此又陰陽並病之治略也惟是病既在陰必關於臟臟氣為人之根本而死生系之故凡診陰證者必當細察其虛實而補瀉寒熱弗至倒施則今時之治要莫切乎此矣治法二十六凡治傷寒不必拘於日數但見表證即當治表但見里證即當治里因證辨經隨經施治乃為良法若表邪未解即日數雖多但有表證而脈見緊數者仍當解散不可攻裡也若表邪已輕即日數雖少但有里證而脈見沉實者即當攻裡不可發表也然此二者一曰發表一曰攻裡皆以邪實者為言也其有脈氣不足形氣不足者則不可言發言攻而當從乎補矣但補有輕重或宜兼補或宜全補則在乎明而慧者之用之如法耳一傷寒但見發熱惡寒脈緊數無汗頭項痛腰脊強或肢體痠軟者便是表證不拘日數多寡即當解散但於陰陽虛實不可不預辨也而於後開汗散方中擇宜用之一傷寒但見往來寒熱脅痛口苦而嘔或漸覺耳聾脈見弦數者即少陽經半表半裡之證治宜和解以新方諸柴胡飲及小柴胡湯之類酌宜用之然少陽之治有三禁曰不可汗吐下也一傷寒如頭痛發熱惡寒表證之類悉除反見怕熱躁渴譫語揭去衣被揚手擲足斑黃髮狂或潮熱自汗大便不通小便短赤或胸腹脹滿疼痛或上氣喘促脈實有力者即是傳裡之熱證不拘日數多少即當清裡如果實邪內結不得宣通此必大為滌盪庶使里通而表亦通也然必其胸腹脹滿腸胃燥結而大滿大實堅者乃可攻之故法曰痞滿燥實堅五者具而後可下又曰下不嫌遲蓋恐內不實而誤攻之則必致不救矣一凡治傷寒如時寒火衰內無熱邪而表不解者宜以辛溫熱劑散之時熱火盛而表不解者宜以辛甘涼劑散之時氣皆平而表不解者宜以辛甘平劑散之此解散之要法也蓋人在氣交之中隨氣而化天地之氣寒則宜辛熱天地之氣熱則宜辛涼經文既以冬為傷寒春為溫病夏為暑病名既因時而易則方亦不容不隨時而更也第以涼散之法當知所辨必其表裡俱有熱證方可兼用清涼若身表雖熱而內無熱證者此以表邪未解因寒而為熱也不可妄用涼藥蓋恐表寒未除而內寒復至以寒遇寒則凝結不解必將愈甚經曰發表不遠熱正此之謂也且舍時從證尤為治傷寒緊要之法此又不可不知常變一凡暑熱盛行瘟疫大起焦渴斑黃臟腑如火此則或用寒肅以清其里或用寒散以救其表但當察表裡而酌緩急之宜也論虛邪治法二十七凡傷寒治法在表者宜散在裡者宜攻此大則也然傷寒死生之機則全在虛實二字夫邪之所湊其氣必虛故傷寒為患多系乘虛而入者時醫不察虛實但見傷寒則動曰傷寒無補法任意攻邪殊不知可攻而愈者原非虛證正既不虛邪自不能害之及其經盡氣復自然病退故治之亦愈不治亦愈此實邪之無足盧也惟是挾虛傷寒則最為可畏使不知固本禦侮之策而肆意攻邪但施孤注則凡攻散之劑未有不先入於胃而後達於經邪氣未相及而胃氣先被傷矣即不盡脫能無更虛元氣更虛邪將更入虛而再攻不死何待是以凡患傷寒而死者必由元氣之先敗此則舉世之通弊也故凡臨證者但見脈弱無神耳聾手顫神倦氣怯畏寒喜暗言語輕微顏色青白諸形證不足等候便當思顧元氣若形氣本虛而過散其表必至亡陽臟氣本虛而誤攻其內必至亡陰犯者必死即如元氣半虛而邪方盛者亦當權其輕重而兼補以散庶得其宜若元氣大虛則邪氣雖盛亦不可攻必當詳察陰陽峻補中氣如平居偶感陰寒邪未深入但見發熱身痛脈數不洪內無火證素稟不足者即當用理陰煎加柴胡或加麻黃連進一二服其效如神此常用第一方也此外諸證如虛在陽分則當以四柴胡飲補中益氣湯或八珍湯理中湯溫胃飲之類此溫中自能發散之治也若虛在陰分而液涸水虧不能作汗則當用補陰益氣煎三柴胡飲或三陰煎左歸飲之類此壯水制陽精化為氣之治也若陰盛格陽真寒假熱者則當以大補元煎右歸飲崔氏八味丸料之類此引火歸原之治也其有陰盛陽衰之證身雖發熱而畏寒不已或嘔惡或泄瀉或背涼如冰或手足厥冷是皆陽虛之極必用大溫中飲或理陰煎不可疑也若果邪火熱甚而水枯乾涸者或用涼水漸解其熱表未解而固閉者或兼微解漸去其寒若邪實正虛原有主客不敵之勢使但能保定根本不令決裂則邪將不戰而自解此中大有玄妙余常藉此而存活者五十年來若干人矣謹書之以為普濟者之則補中亦能散表二十八夫補者所以補中何以亦能散表蓋陽虛者即氣虛也氣虛於中安能達表非補其氣肌能解乎凡脈之微弱無力或兩寸短小而多寒者即其證也此陽虛傷寒也陰虛者即血虛也血虛於裡安能化液非補其精汗能生乎凡脈之浮芤不實或兩尺無根而多熱者即其證也此陰虛傷寒也然補則補矣仍當酌其劑量譬之飲酒者能飲一勺而與一升宜乎其至於困也使能飲一斗而與一合其真蚍蜉之撼大樹耳寒中亦能散表二十九夫寒中者所以清火何以亦能散表蓋陽亢陰衰者即水虧火盛也水涸於經安能作汗譬之乾鍋赤裂潤自何來但加以水則鬱蒸沛然而氣化四達夫汗自水生亦猶是也如前論言補陽補陰者宜助精氣也此論言以水濟火者宜用寒涼也蓋補者補中之不足濟者制火之有餘凡此均能解表其功若一而宜寒宜暖其用不侔是有不可不辨傷寒三表法三十傷寒者危病也治傷寒者難事也所以難者亦惟其理有不明而不得其要耳所謂要者亦惟正氣邪氣二者之辨而已使能知正氣之虛實邪氣之淺深則盡之矣夫寒邪外感無非由表而入里由表而入者亦必由表而出之故凡患傷寒者必須得汗而後解但正勝邪者邪入必淺此元氣之強者也邪勝正者其入必深此元氣之弱者也邪有淺深則表散有異正有虛實則攻補有異此三表之法所不容不道也何為三表蓋邪淺者逐之於藩籬散在皮毛也漸深者逐之於戶牖散在筋骨也深入者逐之於堂室散在臟腑也故淺而實者宜直散直散者直逐之無難也虛而深者宜托散托散者但強其主而邪無不散也今姑舉其略如麻黃湯桂枝湯參蘇飲羌活湯麻桂飲之類皆單逐外邪肌表之散劑也又如小柴胡湯補中益氣湯三柴胡飲四柴胡飲之類皆兼顧邪正經絡之散劑也再如理陰煎大溫中飲六味回陽飲十全大補湯之類皆建中逐邪臟腑之散劑也嗚呼以散藥而散於肌表經絡者誰不知之惟散於臟腑則知者少矣以散為散者誰不知之惟不散之散則玄之又玄矣余因古人之未及故特吐其散邪之精義有如此傷寒無補法辨三十一按傷寒一證惟元氣虛者為最重虛而不補何以挽回奈何近代醫流咸謂傷寒無補法此一言者古無是說而今之庸輩動以為言遂致老幼相傳確然深信其為害也不可勝紀茲第以一歲之事言之如萬曆乙巳歲都下瘟疫盛行凡涉年衰及內傷不足者余即用大溫大補兼散之劑得以全活者數十餘人使此輩不幸而遭庸手則萬無一免者矣即餘一人於一年之中所遇若此其如歲月之長海宇之廣凡為無補所殺者固可勝量哉余痛夫枉者之非命因遍求經傳則並無傷寒無補法之例必求其由則惟陶節庵有云傷寒汗吐下後不可便用參耆大補使邪氣得補而熱愈盛所謂治傷寒無補法也此一說者蓋亦本於孫真人之言云服承氣湯得痢瘥慎不中補也此其意謂因攻而愈者本為實邪故不宜妄用補藥復助其邪耳初非謂虛證亦不宜補也此外則有最庸最拙為萬世之害者莫如李子建之傷寒十勸今後世謬傳實基於此故余於前論直叱其非並詳考仲景傷寒論及諸賢之成法以申明其義焉矧今人之患傷寒者惟勞倦內傷七情挾虛之類十居七八傳誦傷寒無補者十有八九以挾虛之七八當無補之八九果能堪乎而不知以直攻而死者皆挾虛之輩也此在眾人則以傳聞之訛無怪其生疑畏至若名列醫家而亦曰傷寒無補法何其庸妄無知毫不自反誤人非淺誠可醜可恨者也其有尤甚者則本來無術偏能惑人但逢時病則必曰寒邪未散何可用補若將邪氣補住譬之關門趕賊若此一言又不知出自何典亂道異端尤可恨也此外又有一輩曰若據此脈證誠然虛矣本當從補但其邪氣未淨猶宜緩之姑俟清楚方可用也是豈知正不能復則邪必日深焉能清楚元陽不支則變生呼吸安可再遲此不知死活之流也又有一輩曰此本虛證如何不補速當用人參七八分但以青陳之類監製用之自然無害是豈知有補之名無補之實些須兒戲何濟安危而尚可以一消一補自掣其肘乎此不知輕重之徒也即或有出奇言補者亦必見勢在垂危然後曰快補快補夫馬到臨涯收韁已晚補而無濟必又曰傷寒用參者無不死是傷寒無補之說益堅而眾人之惑益不可破雖有儀秦不能辯也余目睹其受害於此者蓋不可勝紀矣心切悲之不得不辯夫傷寒之邪本皆自外而入而病有淺深輕重之不同者亦總由主氣之有強弱耳故凡主強者雖感亦輕以邪氣不能深入也主弱者雖輕必重以中虛不能自固也此其一表一里邪正相為勝負正勝則生邪勝則死倘以邪實正虛而不知固本將何以望其不敗乎矧治虛治實本自不同補以治虛非以治實何為補住寒邪補以補中非以補外何謂關門趕賊即曰強寇登堂矣凡主弱者避之且不暇尚敢關門乎既能關門主尚強也賊聞主強必然退遁不遁即成禽矣謂之捉賊又何不可夫病情人事理則相同未有正勝而邪不卻者故主進一分則賊退一步謂之內托謂之逐邪又何不可而顧謂之關門耶矧如仲景之用小柴胡湯以人參柴胡並用東垣之用補中益氣湯以參朮升柴並用蓋一以散邪一以固本此自逐中有固固中有逐又豈皆補住關門之謂乎甚矣一言之害殺命無窮庸醫之庸莫此為甚余不能以口遍傳故特為此辯使有能廣余之說以活人一命者必勝念彌陀經多多矣徐東皋曰漢張仲景著傷寒論專以外傷為法其中顧盼脾胃元氣之秘世醫鮮有知之者觀其少陽證小柴胡湯用人參則防邪氣之入三陰或恐脾胃稍虛邪乘而入必用人參甘草固脾胃以充中氣是外傷未嘗不內因也即如理中湯附子湯黃連湯炙甘草湯吳茱萸湯茯苓四逆湯桂枝人參湯人參敗毒散人參白虎湯陽毒升麻湯大建中湯等未嘗不用參朮以治外感可見仲景公之立方神化莫測或者謂外傷是其所長而內傷非所知也此誠不知公者也何今世之醫不識元氣之旨惟見王綸雜著戒用人參之謬說執泥不移樂用苦寒攻病之標致誤蒼生死於非命抑何限耶間有病家疑信相半兩弗之從但不速其死耳直以因循俟其元氣自盡終莫之救而斃者可謂知乎況斯世斯時人物劇繁稟氣益薄兼之勞役名利之場甚至蹈水火而不知恤就酒色以竭其真不謂內傷元氣吾弗信也觀其雜病稍用攻擊而脾胃遂傷甚則絕谷而死者可以類推矣病宜速治三十二凡人有感冒外邪者當不時即治速為調理若猶豫隱忍數日乃說致使邪氣入深則難為力矣惟小兒女子則為尤甚凡傷寒之病皆自風寒得之邪氣在表未有溫覆而不消散者若待入里必致延久一人不愈而親屬之切近者日就其氣氣從鼻入必將傳染此其病之微甚亦在乎治之遲早耳故凡作湯液不可避晨夜覺病須臾即宜速治則易愈矣仲景曰凡發汗溫服湯藥其方雖言日三服若病劇不解當促之可半日中盡三服即速治之意也其或藥病稍見不投但有所覺便可改易若其勢重當一日一夜晬時觀之一劑未退即當復進一劑最難者不過三劑必當汗解其有汗不得出者即凶候也
