body:
  text: 卷之四十一謨集小兒則下吐瀉二十六小兒吐瀉證虛寒者居其八九實熱者十中一二但察其脈證無火面色清白氣息平緩肢體清涼或神氣疲倦則悉是虛寒之證不得妄用涼藥古人云脾虛則嘔胃虛則吐者是也蓋飲食入胃不能運化而吐者此脾氣虛弱所以不能運也寒涼入胃噁心而吐者此中焦陽氣受傷所以不能化也若邪在中焦則止於嘔吐若連及下焦則併為瀉矣故在中上二焦者宜治脾胃連及下焦者宜調脾腎若非實熱火邪而妄用寒涼消伐者無有不死一小兒虛寒嘔吐凡無故吐瀉察其無火者必生冷寒氣傷胃所致今小兒所病大約皆是此證宜養中煎或溫胃飲為主治其次則五君子煎理中湯冬朮煎若兼血虛燥渴者宜五君子加當歸若兼脾腎虛寒或多痰涎或兼喘促宜理陰煎甚者人參附子理陰煎為最妙勿謂嘔吐不宜熟地也若脾氣無寒或偶有所觸雖吐而不甚者宜五味異功散若脾中寒滯氣有不順而嘔吐者宜藿香安胃散若上焦不清多痰兼滯者宜六君子湯或更加砂仁炮薑木香一小兒傷食嘔吐若誤會不宜之物或停積滯濁以致吐者必胸膈脹滿或肚腹作痛此其中必有餘邪宜和胃飲益黃散若但有食滯而胃不寒者宜大和中飲小和中飲若食滯兼痰而吐者宜二陳湯六安煎苓朮二陳煎若飲食雖滯而因脾虛不能運化者此其所重在脾氣不在飲食止宜養中煎溫胃飲或理陰煎聖朮煎之類以培其本不可因飲食之故而直行消伐也一小兒胃熱嘔吐者其證最少蓋內熱者多不致吐即亦有之其必多食炙爆甘甜之物以致滯積胃口或夏間冒暑及臟氣素熱者乃有之凡治熱證必須詳辨的確勿得以假熱作真熱也凡胃火內熱嘔吐者察其證必煩熱作渴喜冷察其脈息必洪大滑數火之甚者宜瀉黃散玉泉散或竹葉石膏湯若有痰食之滯兼火作吐者宜二陳湯加石膏黃連山梔或加山楂麥芽之類若脾胃虛弱而兼火者宜人參安胃散或橘皮竹茹湯若胃火嘔吐作渴者宜竹茹湯若夏月胃熱陽暑傷胃者必煩熱大渴吐瀉並作宜五味香薷飲或十味香薷飲或竹茹湯或橘皮竹茹湯若內熱之甚者宜益元散玉泉散主之然暑有陰陽之辨若因天氣暑熱過用生冷以致傷胃而為吐瀉者此屬陰暑則宜暖胃溫中如前虛寒治法或用五苓散亦妙凡本條之藥絕不可用薛氏曰凡暑令吐瀉手足發熱作渴飲冷者屬陽證宜清涼之劑若手足並冷作渴飲湯者屬陰證宜溫補之劑故病有屬陰者誤用寒涼之藥死後手足青黯甚則遍身皆然於此可驗一小兒吐瀉並作者本屬內傷然有因寒氣自外而入內犯臟氣而然者有因生冷不慎致傷胃氣而然者有因中氣本弱飲食失宜而然者邪傷陽分則為吐邪傷陰分則為瀉若吐瀉並作則陰陽俱傷之證也此當察其有滯無滯詳辨其虛實而治之若吐瀉初起邪滯未清者必有胸腹脹悶實滯等證此宜先用和胃飲苓朮二陳煎之類以清上焦之氣若吐瀉初起腹脹腹痛而拒按者宜先用胃苓湯或五苓散加乾薑木香之類以分下焦之清若上無脹滯或所吐既多而嘔惡不已此其上焦豈尚有物但察其形氣困倦總惟胃虛而然若虛寒不甚者宜五味異功散然無寒不作吐故惟五君子煎六味異功煎及養中煎溫胃飲之類皆最宜也若下腹雖痛而可按可揉或腹寒喜熨或所瀉既多而泄仍不止此其下焦必空虛已極惟脾腎虛寒不能固攝而然非胃關煎不可其稍輕者或用四君子加肉豆蔻補骨脂丁香之屬若虛中兼滯者或助胃膏亦可酌用其或果由胃火則火逆於上熱蓄於下亦能為吐為瀉然必有火證火脈者方是其證乃宜大小分清飲或用香連丸或如前胃熱嘔吐條參而治之然此證最少不得輕易混用吐瀉新按余季子於丁巳正月生於燕邸及白露時甫及半周余見新涼日至虞裀褥之薄恐為寒氣所侵每切囑眷屬保護之而眷屬不以為意及數日後果至吐瀉大作余即用溫胃和脾之藥不效隨用理中等劑亦不效三日後加人參三錢及薑桂吳茱內豆蔻之類亦不效至四五日則隨乳隨吐吐其半而瀉其半腹中毫無所留矣余不得已乃用人參五六錢製附子薑桂等各一二錢下咽即吐一滴不存而所下之乳則白潔無氣仍猶乳也斯時也其形氣之危已萬無生理矣余含淚靜坐書室默測其故且度其寒氣犯胃而吐瀉不止若舍參薑桂附之屬尚何術焉伎已止此窘莫甚矣思之思之忽於夜半而生意起謂其胃虛已極但藥之氣味略有不投則胃不能受隨拒而出矧附子味鹹亦能致嘔必其故也因自度氣味酌其所宜似必得甘辣可口之藥庶乎胃氣可安尚有生意乃用胡椒三錢搗碎加煨姜一兩用水二鍾煎至八分另盛聽用又用人參二兩亦用水二鍾煎至一鍾另盛聽用用此二者取其氣味之甘辛純正也乃用茶匙挑合二者以配其味凡用參湯之十加椒姜揚之一其味微甘而辣正得可口之宜遂溫置熱湯中徐徐挑而與之陸續漸進經一時許皆咽而不吐竟得獲效自後乳藥皆安但瀉仍未止也此自四鼓服起至午未間已盡二兩之參矣參盡後忽爾躁擾呻吟煩劇之甚家人皆怨謂以嬰兒嬌嫩臟腑何堪此等熱藥是必燒斷肚腸也相與抱泣余雖疑之而不為亂仍寧神熟思之意此藥自四鼓至此若果藥有難堪何於午前相安而此時遽變若此其必數日不食胃氣新復而倉廩空虛飢甚則然也傍有預備之粥取以示之則張皇欲得其狀甚急乃與一小盞輒鯨吞虎嗜又望其餘遂復與半碗猶然不足又與半惋遂寂然安臥矣至次日復加制附始得為止全愈嗚呼此兒之重生固有天命然原其所致之因則人之臟氣皆繫於背褥薄夜寒則寒從背俞而入內干於臟中必深矣原其所治之法則用藥雖當而氣味不投無以相入求效難矣及其內飢發躁使非神悟其機倘妄用清涼一解則全功盡棄害可言哉故余筆此以見病原之輕重氣味之相關及診治之活變有如此關係者雖然此特以己之兒故可信心救療如是設以他人之子有同是病者於用參數錢之時見其未效不知藥未及病必且煩言吠起謗其誤治改用苦寒無不即死而仍歸罪於用參者此時黑白將焉辨之故再贅其詳用以廣人之聞見云都閫錢旭陽長郎年及兩周季夏間以生果傷脾因致先瀉後痢旭陽善醫知其不過傷於生冷乃與參朮薑桂溫脾等藥瀉痢不愈而漸至唇口生瘡乃謀之餘曰此兒明為生冷所傷今不利溫藥將奈之何余曰此因瀉傷陰兼之幸辣遽入而虛火上炎耳非易以附子不能使火歸原也因用二劑而唇口瘡痛咽腫倍甚外見於頭面之間而病更劇矣又謀之餘曰用藥不投如此豈真因濕生熱耶余診之曰上之脈息下之所出皆作真熱本屬陽虛今熱之不效雖屬可疑然究其所歸寒之則死必無疑也意者藥猶未及耳旭陽曰尚有一證似屬真寒今其所用湯飲必欲極滾極熱者余等不能入口而彼則安然吞之即其喉口腫痛如此所不顧也豈其證乎余曰是矣是矣遂復增附子一錢五分及薑桂肉果人參熟地之屬其瀉漸止瀉止而喉口等證不一日而全收矣疑似之間難辨如此使非有確持之見萬無一生矣余自經此以來漸至不惑後有數兒證治大同者俱得保全億此不惑之道其要何居在知本之所在耳臨證者可無慎哉附按薛氏治一小兒每飲食失節或外驚所忤即吐瀉發搐服鎮驚化痰等藥而愈後發搐益甚飲食不進雖參朮之劑到口即嘔余用白朮和土炒黃用米泔煎數沸不時灌半匙仍嘔次日灌之微嘔再日灌之欲嘔此後每服二三匙漸加至半杯不嘔乃濃煎服而愈一小兒瀉而大便熱赤小便澀少此熱蘊於內也先以四苓散加炒黃連一劑其熱頓退又用七味白朮散去木香二劑熱渴頓止後以四君升麻調理而痊一小兒九歲會炙爆之物作瀉飲冷諸藥不應肌體消瘦飲食少思余用黃連一兩酒拌炒焦為末入人參末四兩粥丸小豆大每服四五十丸不拘時白湯下服訖漸愈又用五味異功散加升麻服月餘而瘥後不戒厚味患疳積消瘦少食發熱作渴用大蘆蒼丸為主以四味肥兒丸為佐疳證漸退卻以四味肥兒丸為主以五味異功散為佐而痊後又不禁厚味作瀉飲冷仍服肥兒丸異功散而瘥霍亂吐瀉二十七小兒霍亂吐瀉者必以寒涼傷胃或時氣陰濕或飲食失宜皆能致之然此與前吐瀉並行者稍有不同蓋霍亂者暴而甚吐瀉者徐而緩霍亂者傷在一時吐瀉者其傷以漸此其所以有異也若暴疾霍亂而胃口未清胸腹仍滿者宜先用和胃飲苓朮二陳煎或大小和中飲或小分清飲或神香散之類主之俟胃口稍平即宜五味異功散或溫胃飲五苓散之類調補之若霍亂初起便覺神疲氣倦而胃口別無脹滯者此其胃氣已傷即宜溫補如養中煎溫胃飲之類不得概行清利也論瀉痢糞尿色二十八古人有以小兒瀉痢糞黃酸臭者皆作胃熱論治此大誤也蓋飲食入胃化而為糞則無有不黃無有不臭者豈得以黃色而酸臭者為熱乎今以大人之糞驗之則凡胃強糞實者其色必深黃而老蒼方是全陽正色若純黃不蒼而糞有嫩色則胃中火力便有不到之處再若淡黃則近白矣近白之色則半黃之色也糞色半黃則穀食半化之色也糞氣酸腥則穀食半化之氣也穀食半化則胃中火力盛衰可知也若必待糞青糞白氣味不臭然後為寒則覺之遲矣故但以糞色之淺深糞氣之微甚便可別胃氣陽和之成色智者見於未然而況於顯然乎余故曰古人以糞黃酸臭為火者大誤也再若小水之色凡大便瀉痢者清濁既不分小水必不利小水不利其色必變即清者亦常有之然黃者十居八九此因瀉亡陰陰亡則氣不化氣不化則水涸水涸則色黃不清此自然之理也使非有淋熱痛澀之證而但以黃色便作火治者亦大誤也吐乳二十九小兒吐乳雖有寒熱之不同然寒者多而熱者少虛者多而實者少總山胃弱而然但察其形色脈證之陰陽則虛實寒熱自有可辨熱者宜加微清寒者必須溫補乳子之藥不必多用但擇其要者二三四味可盡其妙如參姜飲五味異功散之類則其要也苦兒小乳多滿而溢者亦是常事乳行則止不必治也若乳母有疾因及其子或有別證者又當兼治其母宜從薛氏之法如下薛氏曰前證若小兒自受驚或乳母恚怒致兒吐瀉青色者宜用異功散若母食厚味而乳熱者用東垣清胃散母飲酒而乳熱者用葛花解酲湯子服一二匙若飲燒酒而乳熱或子母身赤或昏憒服冷米醋三五杯多亦無妨兒服一二匙若母停滯生冷而乳冷者母服人參養胃湯子服調中丸若母停滯而變熱乳者母服大安丸子服五味異功散若母鬱怒傷肝脾而乳熱者用歸脾湯逍遙散若母脾虛血弱而乳熱者用六君子加芍歸若母氣血虛而乳熱者子母俱服八珍湯若母勞後發熱而乳熱者子母俱服補中益氣湯苦因怒動肝火而乳熱者用五味異功散加柴胡山梔若吐痰涎及白綠水者木乘脾土虛寒證也用六君子加柴胡木香大凡吐乳瀉青色者屬驚法當平肝補脾吐瀉青白色者屬寒法當溫補脾土前諸證若手足指熱者屬實手足指冷者屬虛此亦驗法也五疳證三十錢仲陽曰小兒諸疳皆因病後脾胃虧損或用藥過傷不能傳化乳食內亡津液虛火妄動或乳母六淫七情飲食起居失宜致兒為患凡疳在內者目腫腹脹瀉痢青白體漸瘦弱疳在外者鼻下赤爛頻揉鼻耳或肢體生瘡大抵其證雖多要不出於五臟而五臟之疳不同當各分辨治之肝疳者一名筋疳亦名風疳其證白膜遮睛或瀉血而瘦宜用地黃丸以生腎心疳者面黃頰赤身體壯熱宜用硃砂安神丸以治心異功散以補脾脾疳者一名肥疳體黃瘦削皮膚乾澀而有瘡疥腹大嗜土宜用四味肥兒丸以治疳五味異功散以生土或用益黃散肺疳者一名氣疳喘嗽氣促口鼻生瘡宜用人參清肺湯以治肺益氣湯以生金腎疳者一名骨疳肢體瘦削遍生瘡疥喜臥濕地用地黃丸鼻瘡用蘭香散諸瘡用白粉散若患潮熱當先補肝後瀉心若妄以硝黃等藥利之則成疳若患癖當消磨若誤以巴豆硼砂下之或傷寒誤下皆能成疳其初病者為熱疳用黃連丸久病者為冷疳用木香丸冷熱相兼者用如聖丸津液短少者用七味白朮散凡此皆因大病脾胃虧損內亡津液所致當固脾胃為主而早為施治則不變敗證也楊氏曰無辜疳者腦後項邊有核如彈丸按之轉動軟而不疼其內有蟲不速針出則內食臟腑肢體癰疽便利膿血壯熱羸瘦頭露骨高宜用大蕪荑湯蟾蜍丸丁奚者手足極細項小骨高尻削體痿腹大臍突號哭胸陷宜用肥兒丸大蘆薈丸哺露者虛熱往來頭骨分開翻會吐蟲煩渴嘔噦宜用肥兒丸大蘆薈丸走馬疳者於齒蝕爛蓋齒屬腎腎虛受熱痰火上炎致口臭齒黑甚則齦爛牙宣宜敷雄黃散服蟾蜍丸若作渴瀉痢腫脹勞瘵等證當詳參方論而治之蓋疳者干也因脾胃津液乾涸而患在小兒為五疳在大人為五勞總宜以調補胃氣為主又楊氏曰又有疳傷者五臟蟲疳也其名甚多姑舉其要蟲疳者其蟲如絲出於頭項腹背之間黃白赤者可治青黑者難治蛔疳者皺眉多啼嘔吐青沫腹中作痛肚脹青筋唇口紫黑頭搖齒癢脊疳者身熱贏黃煩渴下利拍背有聲脊骨如鋸齒十指皆瘡頻齧指甲腦疳者頭皮光急滿頭並瘡腦熱如火髮結如穗遍身多汗腮腫囟高疳渴者日則煩渴飲水不食夜則渴止疳瀉者毛焦唇白額上青紋肚脹腸鳴瀉下糟粕疳利者停積宿滯水穀不聚瀉下惡物疳腫者虛中有積肚腹緊脹脾復受濕則頭面手足虛浮疳勞者潮熱往來五心煩熱盜汗骨蒸嗽喘枯悴渴瀉飲水肚硬如石面色如銀大抵其證雖多要不出於五臟總宜以五臟之法治之景岳曰按楊氏云疳者干也在小兒為五疳在大人為五勞然既云為干又云為勞豈非精血敗竭之證乎察前諸法俱從熱治多用清涼雖此證真熱者固多而元氣既敗則假熱者尤多也即前所用亦有地黃丸異功散益黃散益氣湯之類恐此數方有不足以盡之其或血氣俱損有非大補不可者陰虛假熱脾敗腎虧又有非溫補不可者貴在臨證酌宜仍當以虛損治勞之法參用庶得盡善薛氏曰按疳證或以哺食太早或嗜食甘肥或服峻厲之藥重亡津液虛火熾盛或因稟賦或乳母厚味七情致之各當調治其內若口舌蝕爛身體壯熱腮唇赤色或作腫痛腹膈煩悶或掌熱咽乾作渴飲水便赤盜汗齧齒虛驚此心經內外疳也宜安神丸之類主之若鼻外生瘡眼目赤爛肢體似癬兩耳前後項側缺盆兩腋結核或小腹內股玉莖陰囊睪丸腫潰小便不調或出白津或咬指甲搖頭側目白膜遮睛羞明畏日肚大青筋口乾下血此肝經內外疳也用地黃蘆薈二丸主之若頭不生髮或生瘡痂或發成穗或人中口吻赤爛腹痛吐逆乳食不化口乾嗜土瀉下酸臭小便白濁或合目昏睡惡聞木音此脾經內外疳也用肥兒丸主之若鼻外生瘡咽喉不利頸腫齒痛咳嗽寒熱皮膚皺錯欠伸少氣鼻癢出涕衄血目黃小便頻數此肺經內外疳也用地黃清肺飲主之若腦熱吐痰手足逆冷寒熱往來滑泄肚痛口臭作渴齒齦潰爛爪黑麵黧身耳生瘡或耳出水或食自發此腎經內外疳也用地黃丸主之凡疳熱上攻或痘毒上升為患甚速名為走馬疳急敷雄黃散搽牙散馬鳴散擇而用之服蟾蜍丸輕則於齦腐爛唇吻腫痛可治甚則牙齦蝕落腮頰透爛不治盜汗三十一小兒元氣未充腠理不密所以極易汗出故凡飲食過熱或衣被過暖皆能致汗東垣諸公云此是小兒常事不必治之然汗之根本由於營氣汗之啟閉由於衛氣若小兒多汗者終是衛虛所以不固汗出既多未免營衛血氣愈有所損而衰羸之漸未必不由乎此此所以不可不治也大都治汗之法當以益氣為主但使陽氣外固則陰液內藏而汗自止矣一治法凡小兒無故常多盜汗或自汗者宜以團參散為主或參苓散四君子湯五味異功散或白朮散之類俱可擇用若其甚者宜三陰煎人參養營湯或十全大補湯若心經有火而見煩渴者宜生脈散一陰煎若肝脾火盛內熱熏蒸血熱而汗出者脈必洪滑證多煩熱宜當歸六黃湯或加減一陰煎若陽明實熱汗出大渴者宜仲景竹葉石膏湯若因病後或大吐大瀉之後或誤用克伐之藥以致氣虛氣脫而大汗亡陽者速宜用參附湯六味回陽飲或耆附湯之類庶可挽回也大都汗多亡陽者多致角弓反張項強戴眼等證此太陽少陰二經精血耗散陰虛血燥而然速宜用大營煎人參養營湯或十全大補湯之類方可解救若作風治萬無一生矣前汗證門有詳論詳法所當參閱余之兒輩有於襁褓中多盜汗者但以人參一錢泡湯與服當夜即止久不服參必又汗出再服再止其效如神凡養兒者亦可以此為常法腹脹腹痛三十二小兒腹脹腹痛多因食積或寒涼傷脾而然內經曰病痛者陰也又曰痛者寒氣多也有寒故痛也束垣曰寒脹多熱脹少皆主於脾胃故凡小兒肚腹或脹或痛雖曰多由積滯然脾胃不虛則運化以時何致作脹是脹必由於虛也若胃氣無傷而腹中和暖則必無留滯作痛是痛多由乎寒也故治痛治脹者必當以健脾暖胃為主若無火證不得妄用涼藥若無拒按堅實等證不得妄用攻藥一治法凡小兒肚腹膨脹或時常作痛黃瘦常用調理之法惟芍藥枳實丸加減用之為宜且善止腹痛或大健脾丸楊氏啟脾丸和中丸之類皆可酌用若偶爾傷脾氣促困倦外見腹脹而內不脹者此脾氣虛也宜五味異功散或六味異功煎若脾胃陽氣不足虛寒作脹或畏寒或手足冷或兼嘔瀉者宜五君子煎養中煎溫胃飲六君子湯或調中丸若兼脾腎陽虛或水泛為痰成喘促痛脹泄瀉宜理陰煎加減主之若脾胃氣虛而痛滯吐瀉者宜六味異功煎或六君子湯加木香或調中湯若胃口偶有留滯大痛而脹者宜排氣飲或益黃散若宿食偶有不消而暫為脹滿者宜大小和中飲或保和丸消食丸若有堅積停滯脹痛拒按形氣俱實者宜赤金豆白餅子紫霜丸之類攻下之凡諸未盡當於腹痛腫脹二門參酌為治余初年在京治一五歲鄰女適經藥鋪見有曬晾巴豆其父誤以為松仁以一粒與食之嚼而味辣即忙吐出而已半粒下咽矣少頃大瀉十餘次瀉後次日即致肚腹通身悉皆腫脹絕口不食因求治於余或謂宜黃連綠豆以解毒或謂宜四苓五皮以利水余曰大攻之後豈非大虛之證乎能再堪苦寒以敗脾否大瀉之後又尚有何水之可利遂單用獨參湯及溫胃飲以培脾氣不數劑而復元如初夫既以大瀉而何以反脹若是因此一證乃知大虛大寒而致成腫脹者類多如此新按痞塊三十三小兒多有痞塊者總由口腹無節見食必啖食上加食脾胃化之不及則胃絡所出之道未免漸有留滯留滯不已則日以益大因成痞矣或以感寒發熱之後胃氣未清此時最宜擇食節食若不知慎則食以邪留最易成痞此實人所不知也第痞塊既成必在腸胃之外膜膈之間故作可以消伐之劑推逐而去者若但知攻痞則胃氣益弱運化失權不惟不能消痞且致脾土虧損則痞邪益橫而變百出矣故治此者當酌其緩急專以調補胃氣為主外則用膏用灸以拔其結絡之根庶為萬全之策一凡調理脾胃之法若痞邪未甚宜芍藥枳實丸加減用之為善或大健脾丸及楊氏啟脾丸皆可擇用若脾胃氣虛食少體瘦宜五味異功散若脾胃虛寒者宜調中丸溫胃飲五君子煎若兼胃脘停積食滯作脹者宜保和丸消食丸或大小和中飲苦脹急堅實形氣尚強不得不瀉者宜赤金豆白餅子若痞久成熱致動陽明之火而牙口潰爛成疳者宜蘆薈丸胡黃連丸或蟾蜍丸此外如貼痞膏及炙治之法俱詳載積聚門癲癇三十四錢仲陽曰小兒發癇因血氣未充神氣未實或為風邪所傷或為驚怪所觸亦有因妊娠時七情驚怖所致若眼直目牽口噤涎流肚膨發搐項背反張腰脊強勁形如死狀終日不醒則為痓矣凡治五癇皆隨臟治之每臟各有一獸之形通用五色丸為主仍參以各經之藥發而重者死病甚者亦死如面赤目瞪吐舌齧唇心煩氣短其聲如羊者曰心癇血虛者用養心湯發熱飲冷為實熱用虎睛丸發熱飲湯為虛熱用辰砂妙香丸面青唇青兩眼上竄手足攣掣反折其聲如犬者曰肝滴肝之虛者用地黃丸抽搐有力為實邪用柴胡清肝散大便不通用瀉青丸面黑目振吐涎沫形體如屍其聲如豬者曰腎癇用地黃丸紫河車丸之類腎無瀉法故徑從虛治之面如枯骨目白反視驚跳反折搖頭吐沫其聲如雞者曰肺癇肺氣虛者用補肺散面色萎黃者土不能生也用五味異功散面色亦者陰火上衝於肺也用地黃丸面色萎黃目直腹滿自利四肢不收其聲如牛者曰脾癇用五味異功散若面青瀉利飲食少思用六君子加木香柴胡若發熱抽掣仰臥面色光澤脈浮者病在腑為陽證易治身冷不搐覆臥面色黯黑脈沉者病在臟為陰證難治凡有此證先宜看耳後高骨間若有青脈紋先抓破出血可免其患此皆元氣不足之證也須以紫河車丸為主而以補藥佐之設若泛行克伐復傷元氣則必不時舉發久而變危多致不救又有驚癇風癇食癇三種治驚癇宜比金丸茯神丸錢氏養心湯辰砂妙香散清神湯虎睛丸之類主之風癇用錢氏牛黃丸消風丸星蘇散之類主之食癇用妙聖丹主之薛立齋曰妊娠若遇驚恐則必內應於胎故一月足厥陰脈養驚則肝有病二月足少陽脈養驚則膽受病三月手少陰脈養驚則心受病四月名為離經五月足太陰脈養驚則脾受病六月足陽明脈養驚則胃受病七月手太陰脈養驚則肺受病八月手陽明脈養驚則大腸受病九月足少陰脈養驚則腎受病是臟腑納氣于丹田自肝至腎十經滋養而生此則胎中所致也若既生之後或驚怪所觸或乳哺失節或乳母飲食起居六淫七情臟氣不平亦致是證須察見證屬於何經更別陰陽以調補脾胃為主否則不時舉發甚至不救附按薛氏治一小兒患前證吐痰困倦半餉而蘇諸藥不效年至十三而頻發用肥厚紫河車生研爛入人參當歸末搗丸桐子大每服三五十丸日進三五服乳化下一月漸愈又佐以八珍湯全愈又一兒七歲發驚癇令其恣飲人乳後發漸疏而輕至十四復發用乳不效亦用河車丸數具而愈常用加減八味丸而安後至二十三歲復發而手足厥冷仍用前法佐以八味丸十全大補湯而痊又治數小兒皆以補中益氣湯六君子湯六味八味等丸相間用之皆得全愈癲癇諸經義及大人證治諸法俱詳載癲狂門所當參閱溺白三十五小兒便如米泔或溺停少頃變作泔濁者此脾胃濕熱也凡飲食不節者多有此證然亦有氣虛下陷而然者若脈證兼火者當清利宜導赤散或四味肥兒丸若飲食過傷兼脹滯者宜保和丸大安丸若形氣不足或黃瘦或嘔泄者宜五味異功散或四君子湯或補中益氣湯若肝腎火盛移熱膀胱者必兼痛澀煩熱宜七味龍膽瀉肝湯若脾胃本虛而復兼濕熱者宜四君子湯加炒黃連若止見溺白而別無煩熱脈證則但節其生冷水果及甘甜等物不久自愈切不可因其溺白而過用芩連梔子之類多致傷脾而反生吐瀉等證漸至羸敗者是皆誤冶之害也不可不察變蒸三十六巢氏云小兒變蒸者以長血氣也變者上氣蒸者體熱錢仲陽曰變者易也小兒在母腹中乃生骨氣五臟六腑成而未全自生之後即長骨脈臟腑之神志自內而長自下而上故以生之日後三十二日一變蒸即覺情志有異於前何也長生意志臟腑故也何謂三十二日長骨添精神蓋人有三百六十五骨節以應天數內除手足中四十五碎骨外共有三百二十數自下生骨一日十段而上之十日百段而三十二日計三百二十段為一遍亦曰一蒸凡一周遍乃生虛熱諸病如是十周則小蒸畢也故初三十二日一變生腎志六十四日二變一蒸生膀胱九十六日三變生心喜一百二十八日四變二蒸生小腸一百六十日五變生肝哭一百九十二日六變三蒸生膽二百二十四日七變生肺聲二百五十六日八變四蒸生大腸二百八十八日九變生脾三百二十日十變五蒸生胃此所謂小蒸畢也又手厥陰經為臟手少陽經三焦為腑此一臟一腑俱無狀故不變不蒸也太倉云氣入四肢長碎骨於十變後六十四日為一大蒸計三百八十四日又六十四日為二大蒸計四百四十八日又六十四日為三大蒸計五百一十二日至五百七十六日變蒸既畢兒乃成人也變者生五臟也蒸者養六腑也每經一變一蒸情態即異輕則發熱微汗其狀似驚重則壯熱脈亂而數或汗或吐或煩啼躁渴輕者五日解重者七八日解其候與傷寒相似其治法平和者微表之實熱微利之用紫霜丸黑散子柴胡散有寒無熱並吐瀉不乳多啼者當歸散調氣散主之薛立齋曰全嬰方論云變蒸者以長氣血也變者上氣蒸者發熱也輕則體熱虛驚耳冷微汗唇生白泡三日可愈重則寒熱脈亂腹痛啼叫不能乳食食即吐哯五日方愈古方以黑散子紫霜丸主之竊謂此證小兒所不免者雖勿藥可也況前藥乃屬峻厲非惟臟腑不能勝抑且反傷氣血慎之慎之余嘗見一小兒至二變發熱有痰投以抱龍丸一粒卒至不救觀此可驗矣若不熱不驚略無證候而暗變者蓋受胎氣壯實故也景岳曰小兒變蒸之說古所無也至西晉王叔和始一言之繼自隋唐巢氏以來則日相傳演其說益繁然以余觀之則似有未必然者何也蓋兒胎月足離懷氣質雖未成實而臟腑已皆完備及既生之後凡長養之機則如月如苗一息不容有間百骸齊到自當時異而日不同豈復有此先彼後如一變生腎二變生膀胱及每變必三十二日之理乎又如小兒之病與不病余所見所治者蓋亦不少凡屬違和則不因外感必以內傷初未聞有無因而病者豈真變蒸之謂耶又見保護得宜而自生至長毫無疾痛者不少抑又何也雖有暗變之說終亦不能信然余恐臨證者有執迷之誤故道其愚昧若此及如前薛氏之戒皆不可不察也明達者以為然否小兒下論列方三十七理中湯熱一理中丸同上十全大補湯補二十養中煎新熱四溫胃飲新熱五六味地黃丸補百二十理陰煎新熱三胃關煎新熱九八味地黃丸補一二一四君子湯補一五君子煎新熱六加減八味丸補一二二六君子煎補五歸脾湯補三二補中益氣湯補三十八珍湯補十九白朮散和三十人參養營湯補二一生脈散補五六逍遙散補九二人參養胃湯小四一參姜飲新熱八團參散小三五人參安胃散小四二益黃散和十九大營煎新補十四三陰煎新補十一加減一陰煎新補九五味異功散補四參苓散補五三安神丸寒一四三當歸六黃湯寒六四茯神湯小六十清神湯小六一六味異功煎新熱七虛晴丸小百一調牛湯小二調中丸小三六味回陽散新熱二調中丸小三和中丸和八七八八保和丸小三五六安煎新和二參朮二陳煎新和四芍藥枳朮丸新和十六二陳湯和一大健脾丸和八五大安丸小三六啟脾丸和八六和胃飲新和五排氣飲新和六大和中飲新和七小和中飲新和八竹茹湯和一二一地黃清肺飲小六九五苓散和一八二瀉黃散寒五七錢氏養心湯小五九四苓散和一八七胃苓湯和百九十硃砂安神丸寒一四二益元散寒百十二小分清飲新和十辰砂妙香散固十五蘭香散小百十玉泉散新寒十五東垣清胃散寒五四柴胡散小二一蕁赤散寒一二二葛花解酲湯和一二四星蘇散小二四香連丸寒百十三五物香薷飲和百七十比金丸小百消風丸小百四十味香薷飲和一七一妙聖丹小百五紫河車丸小百九橘皮竹茹湯和一二二消食丸小三七胡黃連丸小一二二藿香安胃散熱七黃連丸小一三一如聖丸小二六竹葉石膏湯寒五紫霜丸小百三十木香丸小百二十龍膽瀉肝湯寒六三白餅子小三九地龍丸小八五錢氏牛黃丸小九二黑散子未收赤金豆新攻二四味肥皂丸小百十一馬鳴散痘一三八大蘆薈丸小百十五大蕪荑湯小百八搽牙散痘一三五白粉散外一九六聖朮煎新熱二五雄黃散痘一三三神香散新和二十助胃膏小六
