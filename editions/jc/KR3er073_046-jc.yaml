body:
  text: 卷之四十六聖集外科鈐上外科鈐上經義一癰疽篇黃帝曰血氣已調形氣乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期有遠近何以度之可得聞乎岐伯曰經脈流行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草萓不成五穀不殖徑路不通民不往來巷聚邑居則別離異處血氣猶然請言其故夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱勝則腐肉肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉血枯空虛則筋骨肌肉不相榮經脈敗漏熏於五臟臟傷故死矣黃帝曰願盡聞癰疽之形與忌曰名岐伯曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日而已發於頸名曰夭疽其癰大以赤黑不急治則熱氣下入淵腋前傷任脈內熏肝肺熏肝肺十餘日而死矣陽氣大發消腦留項名曰腦爍其色不樂項痛如刺以針煩心者死不治發於肩及臑名曰疵癰其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逞焫之發於腋下赤堅者名曰米疽治之以砭石欲細而長疏砭之塗以豕膏六日已勿裹之其癰堅而不潰者為馬刀挾纓急治之發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣發於膺名曰甘疽色青其狀如谷實𦸈𧁾常苦寒熱急治之去其寒熱十歲死死後出膿發於脅名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆銼榖𧄍草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急治三十日死矣發於尻名曰銳疽其狀赤堅大急治之不治三十日死矣發於股陰名曰赤施不急治六十日死在兩股之內不治十日而當死發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生諸癰疽之發於節而相應者不可治也發於陽者百日死發於陰者三十日死發於脛名曰兔齧其狀赤至骨急治之不治害人也發於內踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死發於足上下名曰四淫其狀大癰急治之百日死發於足傍名曰厲癰其狀不大初如小指發急治之去其黑者不消輒益不治百日死發於足指名脫癰其狀赤黑死不治不赤黑不死不衰急斬之不則死矣黃帝曰夫子言癰疽何以別之岐伯曰營衛稽留於經脈之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐腐則為膿然不能陷骨髓不為焦枯五臟不為傷故曰癰黃帝曰何謂疽岐伯曰熱氣淳盛下陷肌膚筋髓枯內連五臟血氣竭當其癰下筋骨良肉皆無餘故命曰疽疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤此其候也玉版篇黃帝曰病之生時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰疽陰陽不通兩熱相搏乃化為膿小針能取之乎岐伯曰以小治小者其功小以大治大者多害故其已成膿血者其唯砭石鈹鋒之所取也黃帝曰多害者其不可全乎岐伯曰其在逆順焉以為傷者其白眼青黑眼小是一逆也內藥而嘔者是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此五者為順矣寒熱病篇曰五臟身有五部伏兔一腓二腓者腨也背三五臟之腧四項五此五部有癰疽者死凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而恇致氣則生為癰疽也生氣通天論曰高梁之變足生大疔受如持虛汗出見濕乃生痤痱勞汗當風寒薄為皶郁乃痤營氣不從逆於肉理乃生癰腫陷脈為瘻留連肉腠因而飽食筋脈橫解腸澼為痔陰陽別論曰三陽為病發寒熱下為癰腫脈度篇曰六腑不和則留結為癰異法方宜論曰東方之域其民食魚而嗜咸其病皆為癰瘍其治宜砭石故砭石者亦從東方來氣穴論曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣邪溢於壅脈熱肉敗榮衛不行必將為膿內消骨髓外破大膕留於節湊必將為敗積寒留舍榮衛不居卷肉縮筋肋肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也刺節真邪篇曰虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕有所疾前筋筋屈而不得伸邪氣居其間而不反發為筋溜有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歲乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣並日以益大則為骨疽有所結中於肉宗氣歸之邪留而不去有熱則化為膿無熱則為肉疽凡此數氣者其發無常處而有常名也病能論黃帝問曰人病胃脘癰者診當何如岐伯對曰診此者當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也帝曰有病頸癰者或石治之或針灸治之而皆愈其真安在岐伯曰此同名異等者也夫癰氣之息者宜以針開除去之夫氣盛血聚者宜石而瀉之此所謂同病異治也脈要精微論帝曰諸癰腫筋攣骨痛此皆安生岐伯曰此寒氣之腫八風之變也帝曰治之奈何岐伯曰此四時之病以其勝治之愈也厥論曰少陽厥逆機關不利機關不利者腰不可以行項不可以顧發腸癰不可治驚者死寒熱篇帝曰寒熱瘰癧在於頸腋者皆何氣使然岐伯曰此皆鼠瘻寒熱之毒氣也留於脈而不去者也鼠瘻之本皆在於臟其末上出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也黃帝曰去之奈何岐伯曰請從其本引其末可使衰去而絕其寒熱宜按其道以予之徐往徐來以去之其小如麥者一刺知三刺而已黃帝曰決其死生奈何岐伯曰反其目視之其中有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死見赤脈不下貫瞳子可治也通評虛實論曰所謂少針石者非癰疽之謂也癰疽不得頃時回氣交變大論曰歲火太過民病身熱骨痛而為浸淫歲金太過民病兩脅下少腹痛目赤痛眥傷耳無所聞歲木不及復則炎暑流火濕性燥病寒熱瘡瘍痱疹癰痤歲金不及復則寒雨暴至民病口瘡歲水不及民病寒瘍流水五常政大論曰委和之紀其病支廢癰腫瘡瘍卑監之紀其動瘍湧分潰癰腫赫曦之紀其病笑瘧瘡瘍堅成之紀其動暴折瘍疰少陽司天火氣下臨鼻窒瘡瘍太陽司天寒氣下臨甚則胕腫身後癰少陰司天熱氣下臨甚則瘡瘍地有高下氣有溫涼高者氣寒下者氣熱故適寒涼者脹之溫熱者瘡下之則脹已汗之則瘡已脈候二浮數之脈應發熱其不發熱而反惡寒者若有痛處癰疽之謂也洪大之脈其主血實積熱瘡腫凡洪大者癰疽之病進也膿未成者宜下之膿潰之後脈見洪大則難治若兼自利尤有凶候數脈主熱浮而數者為表熱沉而數者為裡熱諸緊數之脈應發熱而反惡寒者癰疽也仲景曰數脈不時見則生惡瘡也又曰肺脈數者生瘡也凡諸瘡脈至洪數其內必有膿也實脈主邪盛邪氣盛則實也癰疽得此可下之若久病虛人則最忌之以正不勝邪也滑脈多陽或為熱或為虛瘡瘍得此膿未成者可內消膿已潰者宜托裡所謂始為熱終為虛也散脈為血虛有表無里也凡瘡毒膿潰之後脈見洪滑粗散而煩痛不除者難治以其正氣虛邪氣實也又曰肢體沉重肺脈大則斃謂其浮散無根也長脈主陽氣充實傷寒得之將欲汗解也長而緩者胃脈也百病得之皆愈故曰長則氣治也芤脈主陰虛血虛膿潰後得之為宜以脈病相應也弦脈主肝邪瘡疽論曰弦洪相搏內寒外熱欲發瘡疽也緊脈主切痛積癖凡瘡疽得此則氣血留滯邪結不散多為痛也短脈主虛經曰短則氣病以其乏胃氣也瘡瘍脈短真氣虛也諸病見之皆為難治尤不可攻也澀脈主血虛氣澀瘡瘍潰後得之無妨沉脈為陰瘡瘍得之邪氣深也遲脈主陽氣不足瘡瘍得之潰後自愈緩脈無邪長而緩者百病皆宜瘡瘍得此則易愈以其有胃氣也弱脈主氣血俱虛形精不足大抵瘡家之脈凡沉遲濡弱者皆宜托裡微脈主虛真氣復則生邪氣勝則死瘡瘍潰後微而和者將愈也脈細主陽衰瘡瘍脈細而沉者裡虛而欲變證也虛脈空而無力脈虛則血虛血虛生寒陽氣不足也瘡瘍得之只宜托裡養血補氣也軟脈少神元氣弱也凡瘡瘍之脈但見虛遲軟弱者悉宜補虛排膿托裡牢脈堅強陰之虧也凡瘰癧結腫之類診得牢脈者皆不可內消也結促之脈凡陰衰則促陽衰則結大抵結促之脈由氣血俱虛而斷續者居多瘡瘍得之多宜托裡然有素稟結促者又當以有力無力辨其虛實實者可下虛者不可不補右癰疽脈二十二種大都微弱虛細遲緩短澀者必氣血皆虛形精不足俱當用補用托不可妄攻無待言也即如浮滑弦洪結促等脈此中最有疑似亦不得以全實論治必須詳審形證或攻或補庶無誤也齊氏曰瘡瘍之證若不診候何以知陰陽勇怯血氣聚散又曰脈洪大而數者實也細微而數者虛也河間曰脈沉實者其邪在臟浮大者其邪在表立齋曰癰疽未潰而脈先弱者何以收斂論證三凡瘡瘍之患所因雖多其要惟內外二字證候雖多其要惟陰陽二字知此四者則盡之矣然內有由臟者有由府者外有在皮膚者有在筋骨者此又其淺深之辨也至其為病則無非血氣壅滯營衛稽留之所致蓋凡以鬱怒憂思或淫欲丹毒之逆者其逆在肝脾肺腎此出於臟而為內病之最甚者也凡以飲食厚味醇酒炙爆之壅者其壅在胃此出於腑而為內病之稍次者也又如以六氣之外襲寒暑之不調侵入經絡傷人營衛則凡寒滯之毒其來徐來徐者其入深多犯於筋骨之間此表病之深者也風熱之毒其來暴來暴者其入淺多犯於皮膚之間此表病之淺者也何也蓋在臟在骨者多陰毒陰毒其甚也在腑在膚者多陽毒陽毒其淺也所以凡察瘡瘍者當識癰疽之辨癰者熱壅於外陽毒之氣也其腫高其色赤其痛甚其皮薄而澤其膿易化其口易斂其來速者其愈亦速此與臟腑無涉故易治而易愈也疽者結陷於內陰毒之氣也其腫不高其痛不甚其色沉黑或如牛領之皮其來不驟其愈最難或全不知痛癢甚有瘡毒未形而精神先困七惡疊見者此其毒將發而內先敗大危之候也知此陰陽內外則瘡癰之概可類見矣然此以外見者言之但瘡瘍之發原無定所或在經絡或在臟腑無不有陰陽之辨若元氣強則正勝邪正勝邪則毒在腑在腑者便是陽毒故易發易收而易治元氣弱則邪勝正邪勝正則毒在臟在臟者便是陰毒故難起難收而難治此治之難易全在虛實實者易而虛者難也速者易而遲者難也所以凡察癰疽者當先察元氣以辨吉凶故無論腫瘍潰瘍但覺元氣不足必當先慮其何以收局而不得不預為之地萬勿見病治病且顧目前則鮮不致害也其有元氣本虧而邪盛不能容補者是必敗逆之證其有邪毒熾盛而脈證俱實者但當直攻其毒則不得誤補助邪所當詳辨也華元化曰癰疽瘡腫之作皆五臟六府蓄毒不流非獨因營衛閉塞而發也其行也有處其主也有歸假令發於喉舌者心之毒發於皮毛者肺之毒發於肌肉者脾之毒發於骨髓者腎之毒發於筋膜者肝之毒發於下者陰中之毒發於上者陽中之毒發於外者六腑之毒發於內者五臟之毒故內曰壞外曰潰上曰從下曰逆發於上者得之速發於下者得之緩感於六腑則易治感於五臟則難瘳又近骨者多冷近膚者多熱近骨者久不愈則化成血蟲近膚者久不愈則傳氣成漏成蟲則多癢少痛或先癢後痛成漏則多痛少癢或不癢不痛內虛外實者多痛少癢血不止則多死潰膿則多生證候多端要當詳治伍氏云癰疽之疾有二十餘證曰熛發痼發石發岩發蜂巢發蓮子發椒眼發連珠發竟體發腸癰內發腦背發眉發腮頷發肺癰瓜瓠發大率隨病淺深內外施治不可遲緩初發如傷寒脈浮而緊是其候也又曰五臟六腑俞穴皆在背凡患瘡證有傷臟膜者多致不救腑氣浮行於表故癰腫浮高為易治臟血沉寒主裡故疽腫內陷為難治又曰癤者節也癰者壅也疽者沮也一寸至二寸為癤三寸至五寸為癰一尺為疽一尺至二尺為竟體疽若脈洪數者難治脈微澀者易治初覺宜清熱拔毒已潰則排膿止痛膿盡則長肌敷痂當酌輕重順逆而審治之馬益卿癰疽論曰人有四肢五臟一覺一寐呼吸吐納精氣往來流而為營衛暢而為氣色發而為聲音陽用其形陰用其精此人之常數所同也至其失也蒸則生熱否則生寒結則為瘤贅陷則為癰疽凝則為瘡癬憤則結癭怒則結疽又五臟不和則九竅不通六氣不和則留結為癰皆經絡澀滯氣血不流風毒乘之而致然也薛立齋曰瘡瘍之作皆由膏梁厚味醇酒炙爆房勞過度七情鬱火陰虛陽輳精虛氣節命門火衰不能生土營衛虛弱外邪所襲氣血受傷而為患當審其經絡受證標本緩急以治之陳良甫曰外如麻里如瓜又曰外小如錢內可容拳善惡順逆四癰疽證有五善七惡不可不辨凡飲食如常動息自寧一善也便利調勻成微見乾澀二善也膿潰腫消水漿不臭內外相應三善也神彩精明語聲清亮肌肉好惡分明四善也體氣和平病藥相應五善也七惡者煩躁時嗽腹痛渴甚眼角向鼻瀉利無度小便如淋一惡也氣息綿綿脈病相反膿血既泄腫焮尤甚膿色臭敗痛不可近二惡也目視不正黑睛緊小白睛青赤瞳子上視睛明內陷三惡也喘粗短氣恍惚嗜臥面青唇黑便汙未潰肉黑而陷四惡也肩背不便四肢沉重已潰青黑筋腐骨黑五惡也不能下食服藥而嘔食不知味發痰嘔吐氣噎痞塞身冷自汗耳聾驚悸語言顛倒六惡也聲嘶色敗唇鼻青赤面目四肢浮腫七惡也五善者病在腑在腑者輕七惡者病在臟在臟者危也齊氏曰病有證合七惡皮急緊而如善者病有證合五善而皮緩虛如惡者夫如是豈淺識之所知哉然五善並至則善無加矣七惡並至則惡之極矣凡五善之中乍見一二善證瘡可治也七惡之內忽見一二惡證宜深懼之大抵瘡疽之發虛中見惡證者不可救實證無惡候者自愈又凡膿潰之後而煩疼不除診其脈洪數粗散者難痊微澀遲緩者易愈此善惡之證於診候中亦可知也若發背腦疽及諸惡瘡別有五逆之證者白睛青黑而眼小服藥而嘔傷痛渴甚膊項中不便音嘶色敗者是為五逆其餘熱渴利嘔蓋毒氣入里臟腑之傷也可隨證以治之出外科精義宋齊德之著陳氏曰病有甚而致生有微而致死病證難辨死生何從決乎答曰發背潰透內膜者死未潰內陷面赤唇黑便汙者死煩悶者不治潰喉者不治陰患入腹者不治入囊者不治鬢深寸許者不治頤後一寸三分名銑毒亦不治無此者生流注雖多療之必愈出外科精要宋臨江陳自明著發揮曰大抵發背腦疽脫疽腫痛色赤者乃水衰火旺之色多可治若黑若紫則火極似水之象乃其腎水已竭精氣枯涸也決不治又骨髓不枯臟腑不敗者可治若老弱患此瘡頭不起或腫硬色夭堅如牛領之皮脈更澀此精氣已絕矣不可治或不待潰而死有潰後氣血不能培養者亦死立齋曰瘡瘍之證有五善七惡善者勿藥自愈惡者乃五臟虧損之證多因元氣虛弱或因膿水出多氣血虧損或因汗下失宜營衛消鑠或因寒涼克伐血氣不足或因峻厲之治胃氣受傷以致真氣虛而邪氣實外似有餘而內實不足法當純補胃氣多有可生不可因其證惡遂棄而不治若大渴發熱或泄瀉淋閉者邪火內淫一惡也竹葉黃耆湯氣血俱虛八珍湯加黃耆麥冬五味山茱萸如不應佐以加減八味丸煎服膿血既泄腫痛尤甚膿色敗臭者胃氣虛而火旺二惡也人參黃耆湯如不應用十全大補湯加麥冬五味目視不正黑睛緊小白睛青赤瞳子上視者肝腎陰虛而目系急三惡也六味丸料如或陰中有火加炒山梔麥冬五味如不應用八珍湯加炒山梔麥冬五味喘粗短氣恍惚嗜臥者脾肺虛火四惡也六君加大棗生薑如不應用補中益氣湯加麥冬五味心火刑剋肺金人參平肺散陰火傷肺六味丸加五味子煎服肩背不便四肢沉重者脾腎虧損五惡也補中益氣湯加熟地山藥山茱萸五味如不應用十全大補湯加山茱萸山藥五味不能下食服藥而嘔食不知味者胃氣虛弱六惡也六君子湯加木香砂仁如不應急加附子聲嘶色敗唇鼻青赤面目四肢浮腫者脾肺俱虛七惡也補中益氣湯加大棗生薑如不應用六君子湯加炮姜更不應急加附子或用十全大補湯加附子炮姜腹痛泄瀉咳逆昏憒者陽氣虛寒氣內淫之惡證也急用托裡溫中湯後用六君子湯加附子或加薑桂溫補此七惡之治法也此外更有潰後發熱惡寒作渴或怔忡驚悸寤寐不寧牙關緊閉或頭目赤痛自汗盜汗寒戰咬牙手撒身熱脈洪大按之如無或身熱惡衣欲投於水其脈浮大按之微細衣厚仍寒此血氣虛極傳變之惡證也若手足逆冷肚腹疼痛泄利腸鳴飲食不入呃逆嘔吐此陽氣虛寒氣所乘之惡證也若有汗而不惡寒或無汗而惡寒口噤足冷腰背反張頸項強勁此血氣虛極變痙之惡證也俱急用參耆歸朮熟地附桂之屬救之間有可生者宋時齊院令雖嘗纂其狀而未具其因皇明陶節庵雖各立一方亦簡而未悉予故補其缺云又曰前證善者乃五臟未傷病微邪淺使能慎起居節飲食則勿藥自愈惡者乃五臟虧損之證前哲雖云不治若能補其脾胃固其根本多有可生者豈可以其惡而遂棄之耶虛實五齊氏曰瘡疽之證有臟腑氣血上下真邪虛實不同也不可不辨如腫起堅硬膿稠者瘡疽之實也腫下軟慢膿稀者瘡疽之虛也大便硬小便澀飲食如故腸滿膨脹胸膈痞悶肢節疼痛口苦咽乾煩躁多渴身熱脈大精神悶塞者悉臟腑之實也瀉利腸鳴飲食不入嘔吐無時手足厥冷脈弱皮寒小便自利或小便短少大便滑利聲音不振精神困倦悉臟腑之虛也凡瘡疽腫起色赤寒熱疼痛皮膚壯熱膿水稠黏頭目昏重者血氣之實也凡膿水清稀瘡口不合聚腫不赤不堪熱痛肌寒肉冷自汗色夭者氣血之虛也頭痛鼻塞目赤心驚咽喉不利口舌生瘡煩渴引冷睡語咬牙者上實也精滑不禁大便自利腰腳沉重睡臥不寧者下虛也腫焮尤甚痛不可近寒熱往來大便秘澀小便如淋心神煩悶恍惚不寧者邪氣之實也肩項不便四肢沉重目視不正睛不了了食不知味音嘶色敗四肢浮腫多日不潰者真氣之虛也又曰邪氣勝則實真氣奪則虛又曰諸痛為實諸癢為虛也又曰診其脈洪大而數者實也細微而軟者虛也虛則補之和其氣以托裡也實則瀉之疏利而導其滯也內經曰血實則決之氣虛則掣引之又曰形傷痛氣傷腫先腫而後痛者形傷氣也先痛而後腫者氣傷形也精要曰凡瘡疽腫高痛甚煩渴飲冷此病氣元氣俱有餘宜用清熱消毒散仙方活命飲為主若腫高痛甚口乾飲熱此病氣有餘元氣不足宜用托裡消毒散為主若漫腫微痛食少體倦此病氣元氣俱不足宜用六君補中二湯壯其脾胃則未成者消已成者潰已潰者斂矣心法曰凡瘡口不合膿水清稀氣血俱虛也飲食少而難化脾胃虛寒也肌體瘦弱面色痿黃膽氣不行也非參耆歸術之類不能補非附子不能助其功今飲食進少且難消化屬脾胃虛寒蓋脾胃屬土乃命門火虛不能生土而然不宜直補脾胃當服八味丸補火以生土也立齋曰瘡瘍之作當審其標本虛實邪正緩急而治之若病急而元氣實者先治其標病緩而元氣虛者先治其本或病急而元氣又虛者必先於治本而兼以治標大要腫高焮痛膿水稠黏者元氣未損也治之則易漫腫微痛膿水清稀者元氣虛弱也治之則難不腫不痛或漫腫黯黑不潰者元氣虛甚治之尤難也主治之法若腫高焮痛者先用仙方活命飲解之後用托裡消毒散漫腫微痛者用托裡散如不應加薑桂若膿出而反痛者氣血虛也八珍湯不作膿不腐潰陽氣虛也四君子加歸耆肉桂不生肌不收斂脾氣虛也四君加地黃木香惡寒憎寒陽氣虛也十全大補加薑附晡熱內熱陰血虛也四物加參術欲嘔作嘔胃氣虛也六君加炮姜自汗盜汗五臟虛也六味丸料加五味子食少體倦脾氣虛也補中益氣加茯苓半夏喘促咳嗽脾肺虛也前湯加麥冬五味欲嘔少食脾胃虛也人參理中湯腹痛泄瀉脾胃虛寒也附子理中湯小腹痞足脛腫脾腎虛也十全大補湯加山茱山藥肉桂泄瀉足冷脾腎虛寒也前藥加桂附熱渴淋秘腎虛陰火也加減八味丸喘嗽淋秘肺腎虛火也補中益氣湯加減八味丸又曰大凡虛怯之人不必分其腫潰惟當先補胃氣或疑參耆滿中間有用者又加發散敗毒所補不償所損又有泥於氣質素實或有痰不服補劑者多致有誤殊不知瘡瘍之作緣陰陽虧損其膿既泄則氣血愈虛豈有不宜補者哉故丹溪曰但見腫痛參之脈證虛弱便與滋補氣血無虧可保終吉旨哉斯言又曰氣無補法俗論也以其為病痞滿壅塞似難於補不知正氣虛而不能運行則邪氣滯而為病經云壯者氣行則愈怯者弱者則著而為病苟不用補氣何由而行乎淺深辨六齊氏精義曰瘡候多端欲辨淺深直須得法簡而論之則瘡疽概舉有三腫高而軟者發於血脈腫下而堅者發於筋骨皮肉之色不變者發於骨髓又曰凡療瘡疽以手按搖瘡腫根牢而大者深也根小而浮者淺也又驗其人初生瘡之時便覺壯熱惡寒拘急頭痛精神不寧煩躁飲冷者其瘡疽必深也若人雖患瘡疽而起居平和飲食如故者其瘡浮淺也惡瘡初生其頭如米粟微似有痛癢誤觸破之即焮展覺有深意速服犀角升麻湯及漏蘆湯通氣等藥取通利疏暢兼用浴毒湯溻潰之類若浮淺者貼膏紝求差以此推之則深淺之變始終之次也又曰憎寒壯熱所患必深肉色不變發於內也曾氏曰凡癰疽其脈浮數洪緊腫焮作痛身熱煩渴飲食如常此六腑不和毒發於外而為癰其勢雖急投以涼劑多保全生其脈沉細伏緊初發甚微或無瘡頭身不熱而內燥體重煩疼情緒不樂胸膈痞悶飲食無味此五臟不和毒蓄於內而為疽急投五香連翹湯或神仙截法蠟礬丸制甘草湯防托毒氣免致變證內攻尤宜當頭隔蒜灸若塗毒藥迷其腠理投涼藥虛其真氣故善惡之證在乎醫之工拙耳或噫氣痞塞咳逆身冷自汗目瞪耳聾恍惚驚悸語言顛倒皆深惡證也五善見三則瘥七惡見四則危五善並至則善無以加七惡並臻則惡之極矣李氏曰疽初發一粒如麻豆發熱腫高熱痛色赤此為外發勢雖熾盛治得其法可保其生若初時不發熱體倦怠患處如故數日不腫痛內臟已壞雖有盧扁之藥亦未如之何矣立齋曰前證有因元氣虛而不能發出者有因敷貼寒藥而不發出者有因攻伐過傷氣血而不能發出者有因熱毒內蘊而失疏托者審而治之多有生者總論治法七瘡瘍之治有宜瀉者有宜補者有宜發散者有宜調營解毒者因證用藥各有所主經曰形氣有餘病氣有餘當瀉不當補形氣不足病氣不足當補不當瀉此其大綱也故凡察病之法若其脈見滑實洪數而焮腫痛甚煩熱痞結內外俱壅者方是大實之證此其毒在臟腑非用硝黃猛峻等劑蕩而逐之則毒終不解故不得不下然非有真實滯者不可下此下之不可輕用也其有脈見微細血氣素弱或腫而不潰潰而不斂或飲食不加精神疲倦或嘔吐泄瀉手足常冷膿水清稀是皆大虛之候此當全用溫補固無疑矣然不獨此也即凡見脈無洪數外無煩熱內無壅滯而毒有可慮者此雖非大虛之證然察其但無實邪便當托裡養營預顧元氣何也蓋恐困苦日久或膿潰之後不待損而自虛矣及其危敗臨期何能及哉故丹溪云癰疽因積毒在臟腑宜先助胃壯氣以固其本夫然則氣血凝結者自散膿瘀已成者自潰肌肉欲死者自生肌肉已死者自腐肌肉已潰者自斂若獨攻其瘡則脾胃一虛七惡蜂起其不死者幸矣即此謂也其有脈見緊數發熱憎寒或頭痛或身痛或四肢拘急無汗是必時氣之不正外閉皮毛風熱壅盛而為癰腫此表邪之宜散者也如無表證則不宜妄用發散以致亡陽損衛故仲景曰瘡家不可汗此之謂也其有營衛失調氣血留滯而偶生癰腫但元氣無損飲食如常脈無凶候證無七惡此其在腑不在臟在表不在裡有熱者清其熱有毒者解其毒有滯者行其氣所當調營和衛而從平治者也大都瘡瘍一證得陽證而病氣形氣俱有餘者輕得陰證而形氣病氣俱不足者重若正氣不足而邪毒有餘補之不可攻之又不可者危若毒雖盡去而脾腎已敗血氣難復者總皆不治之證故臨證者當詳察虛實審邪正辨表裡明權衡尚舉措略乖必遺人大害斯任非輕不可苟也王海藏元戎曰若人氣血壅盛營衛充滿抑遏不行腐化而為癰者當泄之以奪其盛熱之氣若人飲食少思精神衰弱營衛短澀寒搏而為癰者當補之以接其虛怯之氣丹溪亦曰腫瘍內外皆虛宜以補接行散為主東垣曰瘡疽之發其受之有內外之別治之有寒熱之異受之外者法當托裡以溫劑反用寒藥則使皮毛始受之邪引入骨髓受之內者法當疏利以寒劑反用溫藥托裡則使骨髓之病上徹皮毛表裡通潰共為一瘡助邪為毒苦楚百倍輕則危殆重則死矣病機機要云內之外者其脈沉實發熱煩躁外無焮赤痛深於內其邪氣深故宜疏通臟腑以絕其源外之內者其脈浮數焮腫在外形證外顯恐邪氣極而內行故先宜托裡也內外之中者外無焮惡之氣內亦臟腑宣通知其在經當和營衛也用此三法之後雖未即瘥必無變證亦可使邪氣峻減而易愈故治瘡大要須明此托裡疏通和營衛之三法陳良甫曰諸痛癢瘡瘍皆屬心火前輩云癰疽多生於丹石房勞之人凡人年四十以上宜先用內托散次用五香連翹湯更以騎竹馬法或隔蒜並明灸足三里以發泄其毒蓋邪之所湊其氣必虛留而不去其病乃實故癰疽未潰則一毫熱藥斷不可用癰疽已潰臟腑既虧一毫冷藥亦不可用猶忌敷貼之藥閉其毫孔若熱渴便閉脈沉實洪數者宜用大黃等藥以泄其毒後以國老膏萬金散黃礬丸遠志酒之類選而用之立齋曰按前證若熱毒蘊於內大便秘結元氣無虧者宜用大黃等藥泄其熱毒若陰虛陽湊精虛氣怯脾胃虛弱者宜用甘溫之劑培其本源若瘡不焮腫不作膿者雖其未潰仍須溫補若瘡已潰而腫不退痛不止者仍宜清涼之劑治之若病急而元氣實者先治其標病緩而元氣虛者先治其本或病急而元氣更虛者必先治本而兼以治標大抵腫高焮痛膿水稠黏者元氣未損也治之則易漫腫微痛膿水清稀者元氣虛弱也治之則難不腫不痛或漫腫色黯不潰者發於陰也元氣虛甚理所不治若腫高焮痛者先用仙方活命飲後用托裡消毒散漫腫微痛者宜托裡散如不應加薑桂若膿出而反痛氣血虛也八珍湯不作膿不腐潰陽氣虛也四君加歸耆肉桂不生肌不收斂脾氣虛也十全大補加薑桂晡熱內熱陰血虛也四物加參術欲嘔作嘔胃氣虛也六君加炮姜自汗盜汗五臟虛也六味丸加五味子食少體倦脾氣虛也補中益氣加茯苓半夏喘促咳嗽脾肺虛也前湯加麥冬五味欲嘔少食脾胃虛也人參理中湯腹痛泄瀉脾胃虛寒也附子理中湯小腹痞足脛腫脾腎虛弱也十全大補加山萸山藥肉桂泄瀉足冷脾腎虛寒也前藥加桂附熱渴淋閉腎虛陰火也加減八味丸喘嗽淋閉肺腎虛火也補中益氣湯加減八味丸凡此變證皆因元氣虧損失於預補所致又曰凡瘡瘍用藥當審其經絡受證標本虛實以治之不可泥於熱毒內攻專用寒涼克伐之劑虧損脾胃氣血多致有誤且以虛弱之人用峻利之藥則藥力未到胃氣先傷虛虛之禍有所不免故凡元氣不足者既治其初患更當內用參耆歸術溫補脾胃外用桑枝蔥熨接補陽氣使自消散又曰凡癰疽腫痛初生便覺脈沉細而煩悶臟腑弱而皮寒邪毒猛暴恍惚不寧外證深沉者亦當即用托裡散及溫熱之劑以從治之又曰前證若發熱煩渴大便秘結者由邪蓄於內宜內疏黃連湯以泄內毒若頭痛拘急發熱惡寒者由邪客於外宜人參敗毒散以散表邪若腫痛焮赤發熱作渴此毒氣凝於肉裡宜仙方活命飲解散其毒若食少體倦發熱惡寒此中氣虛弱宜六君子湯以補脾胃又曰大抵證有本末治有權宜治其主則末病自退用其權則不拘於時泥於守常必致病勢危甚況雜用攻劑動損各經乎羅謙甫云守常者眾人之見知變者智者之事知常而不知變因細事而取敗者多矣凡癰疽實證不可溫補虛證不可涼泄此大法也觀前條陳良甫曰凡瘡瘍未潰一毫熱藥斷不可用癰疽已潰臟腑已虧一毫冷藥亦不可用又立齋云若腫焮痛甚煩躁脈大寒熱往來大便秘結小便澀痛心神憒悶皆邪熱之證凡辛熱之劑不但腫瘍不可用雖潰瘍亦不可用也此固然矣然二公已道其半猶未盡也余讀之曰凡癰疽陰盛陽衰者但見體虛脈弱陽氣無權等證則凡苦寒之劑非為潰瘍不可用即腫瘍亦不可用也又若陰邪凝結之毒非用溫熱何以運行而陳氏謂腫瘍不可用熱藥恐不可以概言也敗毒八外科樞要曰瘡瘍之證當祭經之傳受病之表裡人之虛實而攻補之假如腫痛熱渴大便秘結者邪在內也疏通之焮腫作痛寒熱頭疼者邪在表也發散之焮腫痛甚者邪在經絡也和解之微腫微痛而不作膿者氣血虛也補托之漫腫不痛或不作膿或膿成不潰者氣血虛甚也峻補之色黯而微腫微痛或膿成不出或腐肉不潰陽氣虛寒也溫補之若泥其未潰而概用敗毒復損脾胃不惟腫者不能成膿而潰者亦難收斂七惡之證蜂起多致不救馬益卿曰腫瘍內外皆壅宜以托裡表散為主如欲用大黃寧無孟浪之非潰瘍內外皆虛宜以托裡補接為主如欲用香散未免虛虛之失治者審之托裡九齊德之曰凡瘡疽丹腫結核瘰癧初覺有之即用內消之法經久不除血氣漸衰肌寒肉冷膿汁清稀毒氣不出瘡口不合聚腫不赤結核無膿外證不明者並宜托裡膿未成者使膿早成膿已潰者使新肉早生血氣虛者托裡補之陰陽不和托裡調之大抵托裡之法使瘡無變壞之證凡為瘡醫不可一日無托裡之藥然而寒熱溫涼煩渴利嘔臨證宜審其緩急耳馬益卿曰癰疽因積毒在臟腑當先助胃壯氣使根本堅固次以行經活血藥為佐參以經絡時令務使毒氣外泄治之早者可以內消此托裡之旨也立齋曰大凡瘡瘍之作由胃氣不從瘡瘍之潰由胃氣腐化瘡瘍之斂由胃氣營養余嘗治初結未成膿者托而散之已成欲作膿者托而腐之膿成未潰者托而開之膿已潰者托而斂之東垣云脾為倉廩之官胃為水穀之海主養四旁以生血氣故胃氣乃生髮之源為人身之本厥有旨哉論汗下十仲景治傷寒有汗吐下三法東垣治瘡瘍有疏通托裡和營衛之三法用之得宜厥疾瘳矣假如瘡瘍腫硬木悶煩熱便秘脈沉而實其邪在內當先疏其內以下之焮腫作痛便利調合脈浮而洪其邪在表當先托其里以汗之仲景曰瘡家雖身體疼痛不可發汗汗之則發痙苟不詳審而妄為汗下以致血氣虧損毒反延陷少壯者難以潰斂老弱者多致不救見外科樞要羅謙甫云丁巳歲冬月予從軍曹州有牛經歷者病頭目赤腫身前後尤甚疼痛不可忍發熱惡寒牙關緊急涕唾稠黏飲食難下不得安臥一瘍醫於腫上砭刺四五百針腫亦不減其痛益甚莫知所由予往診視其脈浮緊按之洪緩此證乃寒覆皮毛郁遏經絡熱不得散聚而為腫經云天寒則地凍水冰人氣在身中皮膚緻密腠理閉汗不出氣血強肉堅澀當是之時善行水者不能往冰善穿地者不能鑿凍善用針者亦不能取四厥必待天溫凍解而後水可行地可穿人脈亦猶是也又云冬月閉藏用藥多而少針石也宜以苦溫之劑溫經散寒其病自已所謂寒致腠理以苦發之以辛散之也遂用托裡溫中湯依方餌之以薄衣覆其首以厚被覆其身臥於暖處使經血溫腠理開寒氣散陽氣升大汗出後腫減八九再服則去麻黃防風加連翹鼠黏子腫痛悉愈經言汗之則瘡已信哉斯言或云仲景言瘡家雖身痛不可發汗其理何也余曰此說乃營氣不從逆於肉理而生瘡腫作身疼痛非外感寒邪之病故戒之以不可發汗汗之則成痙也又問仲景言鼻衄者不可發汗復言脈浮緊者當以麻黃湯發之衄血自止所說不同其故何也予曰此正與瘡家概同夫人身血之與汗異名而同類奪汗者無血奪血者無汗今衄血妄行為熱所逼更發其汗是反助熱邪重竭津液必變凶證故不可汗若脈浮則在表脈緊則在寒寒邪郁遏陽不得伸熱伏營中迫血妄行上出於鼻故當用麻黃湯散其寒邪使陽氣得舒其血自止又何疑焉或者嘆曰知其要者一言而終不知其要流散無窮潔古之學可謂知其要者矣東垣云瘡瘍有因風熱外郁其人多怒其色赤其腫高結硬而痛其脈洪緊而弦是邪客於血脈之上皮膚之間故發其汗而通其營衛則邪氣去矣又曰瘡瘍諸病凡面赤者雖伏大熱禁不得攻裡攻裡則下利此以陽邪怫鬱在經宜發表以去之故曰火鬱則發之雖大便數日不見宜多攻其表以發散陽氣少加潤燥之藥以潤之如見風脈風證只宜用風藥發表風邪解則大便自通也若只乾燥閉澀止宜潤之切不可下也但瘡瘍鬱冒俗乎昏迷是也宜汗之則愈初虞氏云凡癰疽始作須以大黃等藥亟轉利之勿以困苦為念與其潰爛而死不若利之而死況有生道哉古人立法率用五香連翹漏蘆等藥貧乏者單煮大黃湯以利之至於膿潰乃服黃耆等藥以排膿千金外臺備矣世以瘡發於外不行轉利而死者多矣立齋曰按前證若腫高焮痛臟腑閉結屬內外俱實者當用前藥瀉之若漫腫微痛臟腑不實屬內外俱虛者當用內托補之若患腫無頭肉色不變當助胃壯氣令其內消若疼痛不止焮腫不消當用人參黃耆湯以托裡排膿若飲食少思肌肉不生當用參耆托裡散以補養脾胃立齋曰王德之患發背脈浮數按之則澀大便五六日不行腹不加脹余曰邪在表不在裡但因氣血虛飲食少故大便不行非熱結也宜生氣血為主彼不信以為積毒在內仍用大黃遂連瀉不止更加發熱呃逆飲食不進而死其子曰瀉亦能為害乎余曰服利藥而利不止者死不當瀉而強瀉令人洞瀉不禁者死下多亡陰者死曰瘡瘍乃積毒在臟若不驅逐何以得解余曰瘡瘍雖積毒在臟腑治法先當助胃氣使根本堅固參以行經活血時宜之藥非宜妄用大黃也今其病在表而反以峻利之劑重奪其陰其可乎哉故曰表病里和而反下之則中氣虛表邪乘虛而入由是變證百出雖云脈浮數者邪在表當用托裡復煎散然其間黃芩蒼朮亦不敢妄用脈沉實者邪在裡當用內疏黃連湯然其中大黃檳榔亦不敢妄用況浮數澀主氣血皆虛且邪既在表而反用峻劑重傷其里誅伐無過不死何俟愚謂瘡腫之屬表邪者惟時毒丹毒斑疹及頭面頸項上焦之證多有之察其果有外邪而脈見緊數證有寒熱者方宜表散然散之之法又必辨其陰陽盛衰故或宜溫散或宜涼散或宜平散或宜兼補而散或宜解毒而散此散中自有權宜也又如里證用下之法則毒盛勢劇者大下之滯毒稍輕者微下之營虛便結而毒不解者養血滋陰而下之中氣不足而便結壅滯者潤導而出之凡此皆通下之法但宜酌緩急輕重而用得其當耳故必察其毒果有餘及元氣壯實下之必無害者方可用下否則不但目前且尤畏將來難治之患是以表證不真者不可汗汗之則亡陽里證不實者不可下下之則亡陰亡陰亦死亡陽亦死醫固可以孟浪乎論灸法十一王海藏曰瘡瘍自外而入者不宜灸自內而出者宜灸外入者托之而不內內出者接之而令外故經曰陷者灸之灸而不痛痛而後止其灸灸而不痛者先及其潰所以不痛而後及良肉所以痛也灸而痛不痛而後止其灸灸而痛者先及其未潰所以痛而次及將潰所以不痛也李氏云治疽之法灼艾之功勝於用藥蓋使毒氣外泄譬諸盜入人家當開門逐之不然則入室為害矣凡瘡初發一二日須用大顆獨蒜切片三分厚貼疽頂以艾隔蒜灸之每三壯易蒜瘡潰則貼神異膏如此則瘡不開大肉不壞瘡口易斂一舉三得此法之妙人所罕知若頭頂見疽則不可用此法五府極觀碑載又曰凡患背疽漫腫無頭者用濕紙貼腫處但一點先干處乃是瘡頭可用大蒜十顆淡豆豉半合乳香錢許研爛置瘡上鋪艾灸之痛否皆以前法為度陳氏曰腦為諸陽之會頸項近咽喉腎俞乃致命之所皆不可灼艾伍氏曰凡用蒜餅灸者蓋蒜味辛溫有毒主散癰疽假火勢以行藥力也只有用艾炷灸者此可施於頑疽痼發之類凡赤腫紫黑毒甚者須以蒜艾同灸為妙又曰凡治疽癰發背疔瘡若初灸即痛者由毒氣輕淺灸而不痛者乃毒氣深重悉宜內服追毒排膿外敷消毒之藥大抵癰疽不可不痛又不可大痛悶亂不知痛者難治又曰凡隔蒜灸者不論壯數則邪無所容而真氣不損但頭項見瘡宜用騎竹馬法及足三里灸之千金云癰疽始作或大痛或小痛或發如米粒既便出膿宜急斷口味利去其毒用騎竹馬灸法或就患處灼艾重者四面中央總灸一二百壯更用敷藥其效甚速立齋云夫瘡瘍之證有諸中必形諸外在外者引而拔之在內者疏而下之灼艾之功甚大若毒氣鬱結瘀血凝滯輕者或可藥散重者藥無全功矣東垣曰若不針烙則毒氣無從而解是故善治毒者必用隔蒜灸舍是而用苦寒敗毒等劑其壯實內熱者或可彼怯弱氣虛者未有不敗者也又有毒氣沉伏或年高氣弱或服克伐之劑氣益以虛膿因不潰者必假火力以成功大凡蒸灸若未潰則拔引郁毒已潰則接補陽氣祛散寒邪瘡口自合其功甚大嘗治四肢瘡瘍氣血不足者祗以前法灸之皆愈疔毒甚者尤宜灸蓋熱毒中隔內外不通不發泄則不解散若處貧居僻一時無藥則用隔蒜灸法尤便每三壯一易蒜片大概以百壯為度用大蒜取其辛而能散用艾炷取其火力能透如法灸之必瘡發膿潰繼以神異膏貼之不日自愈一能使瘡不開大二內肉不壞三瘡口易合見效甚神丹溪云惟頭為諸陽所聚艾壯宜小而少曹工部發背已十八日瘡頭如粟瘡內如錐痛極時有悶瞀飲食不思氣則益虛以大艾隔蒜灸十餘壯尚不知而痛不減遂明灸二十餘壯內瘡悉去毒氣大發飲食漸進更以大補藥及桑木燃灸瘀肉漸潰劉貫卿足患疔瘡已十一日氣弱亦灸五十餘壯更以托裡藥而愈黃君腿癰膿清脈弱一婦臂結一塊已潰俱不收斂各灸以豆豉餅更飲托裡藥而愈一男子胸腫一塊半載不消令明灸百壯方潰與大補藥不斂復灸以附子餅而愈一男子患發背瘡頭甚多腫硬色紫不甚痛不腐潰以艾鋪患處灸之更以大補藥數日死肉脫去而愈陳工部患發背已四五日瘡頭雖小根畔頗大以隔蒜灸三十餘壯其根內消惟瘡頭作膿數日而愈余丙子年忽噁心大錐骨甚癢須臾臂不能舉神思甚倦此夭疽危病也急隔蒜灸之癢愈甚又明灸五十餘壯癢遂止旬日而愈精要云灸法有四生之功信矣薛按史氏引證曰瘍醫常器之於甲戌年診太學史氏之母云內有蓄熱防其作疽至辛巳六月果背胛微癢瘡粒如黍灼艾即消隔宿復作用膏藥覆之暈開六寸許痛不可勝歸咎於艾適遇一僧自云病瘡甚危嘗灸八百餘壯方蘇遂用大艾壯如銀杏者灸瘡頭及四傍各數壯痛止至三十餘壯赤暈悉退又以艾作團如梅杏大者四十壯乃食粥安寢瘡實四寸小竅百許患肉俱壞而愈立齋曰灼艾之法必使痛者灸至不痛不痛者灸至痛則毒必隨火而散否則非徒無益而反害之愚意癰疽為患無非血氣壅滯留結不行之所致凡大結大滯者最不易散必欲散之非藉火力不能速也所以極宜用灸然又有孫道人神仙熏照方其法尤精尤妙若毒邪稍緩邪深經遠而氣有不達灸之為良若毒邪熾盛其勢猛急而垂危者則宜用熏照方更勝於灸膿針辨十二齊氏曰若發腫都軟而不痛者血瘤也發腫日漸增長而不大熱時時牽痛者氣瘤也氣結微腫久而不消後亦成膿此是寒熱所為也留積經久極陰生陽寒化為熱以此潰者必多成瘻宜早服內塞散以排之又凡察癰疽以手掩其上大熱者膿成自軟也若其上薄皮剝起者膿淺也其腫不甚熱者膿未成也若患瘰癧結核寒熱發渴經久不消其人面色痿黃者被熱上蒸已成膿也至於臟腑腸胃內瘡內疽其疾隱而深藏目既不見手不能近所為至難但以診脈而辨之亦可知也有患胃脘癰者當候胃脈胃脈者人迎也其脈沉數氣逆則甚甚則熱聚胃口而胃脘為癰也若其脈洪數者膿已成也設脈遲緊雖膿未就已有瘀血也宜急治之不爾則邪氣內攻腐爛腸胃不可救也又肺癰論曰始萌則可救膿成即死不可不慎也久之咳膿如粳米粥者不治嘔膿而止者自愈也又腸癰論曰或繞臍生瘡膿從瘡出者有出臍中者惟大便下膿血者自愈也伍氏曰瘡腫赤色按之色不變者此膿已成也按之隨手赤色者其亦有膿也按之白色良久方赤者此遊毒已息可就赤白盡處灸斷赤腫自消凡癰疽以手按之若牢硬未有膿也若半軟半硬已有膿也又按腫上不熱者為無膿熱甚者為有膿宜急破之立齋曰瘡瘍之證毒氣已結者但可補其氣血使膿速成膿成者當驗其生熟淺深視其可否針而去之不可論內消之法小按便痛者膿淺也大按方痛者膿深也按之不復起者膿未成也按之即復起者膿已成也膿生而用針氣血既泄膿反難成膿熟而不針則腐潰益深瘡口難斂若瘡深而針淺內膿不出外血反泄若瘡淺而針深內膿雖出良肉受傷若元氣虛弱必先補而後針勿論尻神其膿一出諸證自退若膿出而反痛或煩躁嘔逆皆由胃氣虧損也宜急補之若背瘡熱毒熾盛中央肉黯內用托裡壯其脾胃外用烏金膏塗於黯處其赤處漸高黯處漸低至六七日間赤黯分界自有裂紋如刀劃然黯肉必漸潰矣當用鈚針利剪徐徐去之須使不知疼痛不見鮮血為妙若雖有裂紋膿未流利及膿水雖出而仍痛者皆未通於內並用針於紋中引之若患於背胛之間凡人背近脊處並胛皮里有筋一層患此處者外皮雖破其筋難潰以致內膿不出令人脹痛苦楚氣血轉虛變證百出若待自潰多致不救必須開之引之兼以托裡常治此證以利刀剪之尚不能去似此堅物待其自潰不反甚乎此非氣血壯實者未見其能自潰也若元氣虛弱而誤服克伐患處不痛或肉將死急須溫補脾胃亦有生者後須純補之藥庶可收斂若妄用刀針去肉出血則氣血愈虛愈傷矣何以生肌收斂乎大凡瘡瘍膿即潰當大補血氣為先須有他證當以未治又曰凡瘡不起者托而起之不成膿者補而成之使不內攻膿成則及時針之不數日即愈矣常見患者皆畏針痛而不肯用又有恐傷肉而不肯用殊不知瘡雖發於肉薄之所若其膿成必腫高寸余瘡皮又厚分許用針深不過二分若發於背必腫高二三寸入針只於寸許況患者肉既已壞何痛之有何傷之慮凡怯弱之人或患附骨等疽待膿自通以致大潰不能收斂氣血瀝盡而已者為多矣又曰凡瘡既成膿皮膚不得疏泄昧者待其自穿殊不知少壯而充實者或能自解若老弱之人氣血枯槁或兼攻發太過不行針刺膿毒乘虛內攻穿腸腐膜鮮不誤事若毒結四肢砭刺少緩則腐潰深大亦難收斂毒結於頰項胸腹緊要之地不問壯弱急宜針刺否則難治如沈氏室黃上舍等皆以此而歿者多矣大抵瘡瘍之證感有輕重發有深淺淺者腫高而軟發於血脈深者腫下而堅發於筋骨然又有發於骨髓者則皮肉不變故古人制法淺宜砭而深宜刺使瘀血去於毒聚之始則易消若膿成之時氣血壯實者或自出怯弱者不行針刺鮮有不誤凡瘡瘍透膜十無一生雖以大補藥治之亦不能救此可為待膿自出之戒也故東垣云毒氣無從而解膿瘀無從而泄過時不烙反功於內內既消敗欲望其生豈可得乎茲舉一二以告同道並使患者知所慎云又曰凡患瘡疽雖因積熱所成若初起未成膿脈洪數乃陰虛陽亢之證若膿潰於內不得發泄於外身必發熱故脈見洪數乃癰疽之病進也膿既去則當脈靜身涼腫消痛息如傷寒表證之得汗也若反發熱作渴脈洪數者此真氣虛而邪氣實死無疑矣又曰若治元氣不足之證即其初患便當用參耆歸術溫補脾胃外用桑枝蔥熨接補陽氣使自消散若久而不能成膿者亦用前二法補助以速之若膿既成而不潰用艾於當頭灸數炷以出之卻服十全大補湯論針法十三上古有砭石之制內經有九針之別制雖不同而去病之意則一也且瘡瘍一科用針為貴用之之際雖雲量其潰之淺深尤當隨其肉之厚薄若皮薄針深則反傷良肉益增其潰肉厚針淺則膿毒不出反益其痛用針者不可不慎哉至於附骨疽氣毒流注及有經久不消肉潰不痛者宜燔針開之若治咽喉之患當用三稜針若丹瘤及癰毒四畔焮赤疼痛如灼宜用砭石去血以泄其毒則重者輕輕者消如洪氏室患腹癰膿脹悶瞀以臥針刺膿出即蘇一人患囊癰膿熟腫脹小便不利幾殆急針之膿水大泄氣通而愈大抵用針之法迎而奪之順而取之所謂不治已成治未成正此意也今之患者畏針而不用醫者又徇患者之意而不針遂至膿已成而不得潰或得潰而傷已深矣卒之夭枉者十常八九亦可悲矣見外科心法經曰天溫日明則人血淖溢而衛氣浮故血易泄氣易行天寒日陰則人血凝澀而衛氣沉是以因天時而調血脈也故凡遇天寒水冰或陰氣凝滯之時欲行針刺則先當溫衣覆蓋或以艾葉炒熱或熱盥熱衣類先熨其處務令血脈溫和而後刺之則血泄氣行其病立已若血寒脈澀遽爾用針則邪毒不瀉徒傷良肉反以益其病也立齋曰凡元氣虛弱者必當補助脾胃禁用刀針若妄用之而去肉去血便陽隨陰散是速其危也薛按曰四明有屠壽卿者當門齒忽如所擊痛不可忍脈洪大而弦余曰弦洪相搏將發瘡毒也先用清胃散加白芷銀花連翹一劑痛即止至晚鼻上發一瘡面腫黯痛用前藥加犀角一劑腫至兩額口出穢氣脈益洪大惡寒內熱此毒熾血瘀藥力不能敵也乃數砭患處出紫血服犀角解毒之藥異日腫痛尤甚又砭患處與唇上並刺口內赤脈各出毒血再服前藥至數劑而愈用針勿忌尻神十四立齋曰針灸之法有太乙人神周身血忌逐年尻神逐日人神而其穴有禁針禁灸之論犯者其病難瘳理固然也但瘡瘍氣血已傷肌肉已壞急宜迎而奪之順而取之非平人針灸之比何忌之有外科精義云瘡瘍之證毒氣無從而解膿瘀無從而泄反攻於內內既消敗欲望其生豈可得乎危惡之證發於致命之所禍在反掌腹癰囊癰二便不通胸腹脹悶唇疔喉痹咽喉腫塞其禍尤速患者審之鄰人蘇子遇之內左手指患疔麻癢寒熱噁心左半體皆麻脈數不時見余曰凡瘡不宜不痛不宜大痛煩悶者不治今作麻癢尤其惡也用奪命丹二服不應又用解毒之劑麻癢始去乃作腫痛余曰勢雖危所喜作痛但毒氣無從而泄欲針之適值望日其傢俱言尻神不從勢愈腫甚余強針之諸證頓退又用解毒之劑其瘡乃愈薛按圍藥十五內經云五臟不和九竅不通六腑不和則留結為癰又云形傷痛氣傷腫此則臟腑不和而瘡發於外也明矣若塗貼寒涼豈能調合臟腑宣通氣血耶若其腫痛熱渴脈滑數而有力證屬純陽者宜內用濟陰湯外用抑陽散則熱毒自解瘀滯自散若似腫非腫似痛非痛似潰不潰似赤不赤脈洪數而無力屬半陰半陽者宜內用沖和湯外用陰陽散則氣血自和瘀滯自消若微腫微痛或色黯不痛或堅硬不潰脈雖洪大按之微細軟弱屬純陰者宜內服回陽湯外敷抑陰散則脾胃自健陽氣自回也丹溪曰敷貼之劑應酬輕小熱證耳若不辨其陰證陽證之所由分而妄敷寒涼之劑則迷塞腠理凝滯氣血毒反內攻而肉反死矣況運氣得寒而不健瘀血得寒而不散敗肉得寒則不潰新肉得寒則不生治者審焉見外科樞要立齋曰大抵瘡之起發潰斂皆血氣使然各人元氣虛實不同有不能發出而死者有發出不能成膿而死者有成膿不能腐潰而死者有腐潰不能收斂而死者敷貼之法但可應酬輕小之證耳若血氣已竭其患必死不但敷貼不效且氣血喜溫而惡寒腠理喜通而惡塞氣血因而愈滯腫患因而愈盛邪氣因而愈深腐潰因而愈大怯弱之人取敗多矣況瘡瘍乃七情相火或食膏梁或餌金石以傷陰血陽盛陰虛受病於內而發於外若不彆氣分血分陰陽虛實腐潰淺深即服藥尚有不能保生者可敷貼而已乎施二守項右患一核用涼藥敷貼頸皆腫又敷之腫胤胸腋冷應腹內不悟涼藥所致尚以為毒盛形體困憊自分不起延余治之見其敷藥處熱氣如霧急令去藥良久瘡色變赤刺出膿血用托裡藥而愈張侍御發背專用敷藥瘡黯不起胸膈悶氣不能呼吸自分不治余用辛溫托裡藥而愈一男子臀癰腐潰肌肉不生用藥敷之肌肉四沿反硬予診之脈澀而弱此氣血俱虛不能營於患處故敷涼藥反硬乃血氣受寒凝結而非毒也用大補藥而愈一男子患胸疽腫高作痛腫處敷藥痛雖止而色變黯腫外作痛仍敷之肉色亦黯喉內作痛不悟此為涼藥所誤反盡頸敷之其頸皆潰而死一男子因怒左脅腫一塊不作痛脈澀而浮余曰此肝經邪火熾盛而真氣不足為患宜培養血氣為主彼以草藥敷貼遂致不救王安人發背正潰時欲速效敷以草藥即日而死張宜人年逾六十患發背三日肉色不變頭如粟許肩背腫脈洪數寒熱飲冷予以人參敗毒散二劑及隔蒜灸五十餘壯毒大發背始輕再用托裡藥漸潰因血氣虛甚而作渴用參耆歸熟等藥而渴亦止彼欲速效乃自用草藥罨患處毒氣復入遂不救薛按凡癰瘍腫痛宜用圍藥敷治者惟降癰散為第一無論陰毒陽毒皆所宜也腐肉十六齊德之曰夫瘡瘍生於外皆由積熱蘊於內內經謂血熱肉敗榮衛不行必將為膿留於節腠必將為敗蓋瘡疽膿潰之時頭小未破瘡口未開或毒氣未出疼痛難忍所以立追蝕腐潰之法使毒氣外泄而不內攻惡肉易去好肉易生也若紝其瘡血出不止者則未可紝於瘡上摻追蝕之藥待其熟可紝方紝若紝其瘡而痛應心根者亦不可強紝之誤觸其瘡焮痛必倍變證不測不可不慎也若瘡癤膿成未破於上薄皮剝起者即當用破頭代針之劑安其上以膏貼之膿出之後用搜膿化毒之藥取效如神矣若膿血未盡便用生肌斂瘡之劑欲其早愈殊不知惡肉未盡其瘡早合後必再發不可不慎也立齋曰瘡瘍之證膿成者當辨其生熟淺深肉死者當驗其腐潰連脫余嘗治脈證虛弱者用托裡之藥則氣血壯而肉不死脈證實熱者用清熱之劑則毒氣退而肉自生凡瘡聚於筋骨之間肌肉之內皆因血氣虛弱用十全大補湯壯其脾胃則未成者自解已成者自潰又何死肉之有若不大痛或大痛或不赤或內膿不潰或外肉不腐乃血氣虛弱宜用桑枝灸及十全大補加薑桂壯其陽氣則四畔即消瘡頭即腐其毒自散又何待於針割若脾胃虛弱飲食少思用六君倍加白朮壯其營氣則肌肉受毒者自潰已死者自活已潰者自斂若初起或因克伐或犯房事以致色黯而不痛者乃陽氣脫陷變為陰證也急用參附湯溫補回陽亦有可生又曰夫腐肉者惡肉也大凡癰疽瘡腫潰後若有腐肉凝滯者必取之乃推陳致新之意若壯者筋骨強盛氣血充溢真能勝邪或自去或自平不能為害若年高怯弱之人血液少肌肉澀必迎而奪之順而取之是謂定禍亂以致太平設或留而不去則有爛筋腐肉之患如劉大尹汪夫人收之及時而新肉即生得以全愈金工部鄭揮使取之失期大潰而斃予嘗見腐肉既去雖少壯者不補其氣血尚不能收斂若怯弱者不取惡肉不補血氣未見其生也故古人曰壞肉惡於狼虎毒於蜂蠆緩去之則戕賊性命信哉又曰瘡瘍之證若毒氣已結腫赤熾盛中央肉死黯黑者內用托裡健脾之劑外用烏金膏塗之則黯處漸低赤處漸起至六七日間赤黯之界自有裂紋如刀劃狀其黯漸潰若用鈹針利剪徐去猶好須使不知疼痛不見鮮血為善若膿未流利宜用針於紋中引之若膿水已出腫痛仍作乃內筋間隔亦用針引之若元氣虛弱誤服克伐之劑患處不痛或肉死不潰者急溫補脾胃亦有復生者後須純補脾胃庶能收斂此則不可妄用針刀若誤用之以去肉出血使陽隨陰敗是速其危也論外通用方針頭散外一四四去腐管代針膏一四五潰頭透骨丹外一四三潰頭豬蹄湯外一二五洗腐舍時從證十七立齋曰經云諸痛癢瘡皆屬於心若腫赤煩躁發熱大痛飲冷便秘作渴脈洪數實者為純陽雖在嚴冬之時必用大苦寒之劑以瀉熱毒若不腫不痛脈細皮寒瀉利腸鳴飲食不入嘔吐無時手足厥冷是為純陰雖在盛暑之時必用大辛溫熱之劑以助陽氣不拘嚴寒盛暑但當舍時從證若微腫微痛似潰不潰時出清膿者為半陰半陽宜用辛熱之劑溫補胃氣此亦治陰陽法也經曰用寒遠寒用熱遠熱有假者反之雖違其時必從其證若執常法無不誤矣壬午仲冬金臺一男子患腹痛誤服乾薑理中丸即時口鼻出血煩躁發狂入井而死辛卯冬一吏患傷寒誤服附子藥一鍾下咽發躁奔走跌死夫盛暑之際附子薑桂三藥並用連進三四劑無事嚴冬時令三藥單用一味止進一劑者即死可見羅謙甫先生有舍時從證權宜用藥之妙余宗此法凡冬間瘡證如脈沉實洪數大便秘瘡焮痛煩躁或飲冷不絕者即用硝黃芩連之劑攻之雖在夏令而脈見虛弱或浮大瘡不潰膿清稀惡寒飲者即用薑桂參耆之劑補之如脈見沉細瘡不潰不痛作呃逆手足冷大便不實或瀉利或腹痛更加附子皆獲大效昧者反以為非惑亂患人恪守常法必使冬用溫熱夏用清涼以致誤人深可哀也薛按至元壬午五月二十八日王伯祿年逾五旬有七右臂膊腫甚上至肩下至手指色變皮膚涼六脈沉細而微此乃脈證俱寒余與瘍醫孫彥和視之曰此乃附骨癰開發已遲以燔針啟之膿清稀解次日肘下再開之加呃逆不絕彥和以丁香柿蒂散兩劑稍緩次日呃逆尤甚自利臍腹冷痛腹滿飲食減少時發昏憒於左乳下黑盡處灸二七壯又處托裡溫中湯用乾薑附子木香沉香茴香羌活等藥㕮咀一兩半欲與服或者曰諸痛癢瘡瘍皆屬心火又當盛暑之時用乾薑附子可乎予應之曰理所當然不得不然內經曰脈細皮寒瀉利前後飲食不入此謂五虛況呃逆者胃中虛寒故也諸痛癢瘡皆屬心火是言其定理也此證內外相反須當舍時從證非大方辛熱之劑急治之則不能愈也遂投之諸證悉去飲食倍進瘡勢溫膿色正彥和復用五香湯數服後月餘平復噫守常者眾人之見知變者知者之能知常不知變因細事而取敗者亦多矣況乎醫哉見羅氏衛生寶鑑愚意羅先生以舍時從證之法垂訓後人誠百世不磨之要道也但時之遷變本所難知而證之幽顯尤不易識何也蓋常人之所謂時者春夏秋冬之時也歲歲時常之主氣也誰不得而知之而不知五六周環則長夏有寒淫之令三冬有炎暑之權此則雖若舍時而實以從時昧者固能知此乎又如察證之法則凡脈細皮寒泄瀉厥冷之類是皆已見之寒證也又誰不得而知之不知其來有源其甚有漸即諸證未見之前而本來已具此際便難錯認使必待焦頭爛額而後曲突徙薪則已晚矣此羅先生之所以明已然而余則更為慮未然蓋恐人之見之遲而無及於事也雖然余常見今人之於已然者尚不能見而復欲其見未然誠哉迂矣然余慨然之念則不能不道其詳而深望於知音者陽氣脫陷十八立齋曰瘡瘍陽氣脫陷或因克伐之劑或因膿血大泄或因吐瀉之後或因誤以入房大凡潰後勞後元氣虧損或夢遺精脫或脈數便血或外邪乘虛而入以致發熱頭痛小便淋澀或目赤煩喘氣短頭暈體倦熱渴意欲飲水投水身熱憎寒惡衣揚手擲足腰背反張鄭聲自汗脈浮洪大此無根虛火之假熱證也若畏寒頭痛咳逆嘔吐耳聵目蒙小便自遺瀉利腸鳴裡急腹痛玉莖短縮齒牙浮痛肢體麻痹冷汗時出或厥冷身痛咬舌齧唇舌本強硬呃逆喘促脈微沉細此陽氣脫陷之真寒證也凡此危候無論脈證但見有一二急用參附湯或用托裡消毒散去連翹白芷金銀花三味急加桂附大劑補之多有復生者內翰楊皋湖孟夏患背疽服克伐之劑二旬余矣漫腫堅硬重如負石隔蒜灸五十餘壯背遂輕以六君加砂仁兩劑涎沫湧出飲食愈少此脾虛陽氣脫陷也劑用溫補反嘔不食仍用前藥作大劑加附子薑桂又不應遂以參耆各一斤歸術陳皮各半斤附子一兩煎服三日而盡流涎頓止腐肉頓潰飲食頓進再用薑桂等藥托裡健脾腐脫而瘡愈矣少參史南湖之內夏患疽不起發脈大而無力發熱作渴自汗盜汗用參耆大補之劑益加手足逆冷大便不實喘促時嘔脈細微按之如無唯太衝不絕仍以參耆白朮當歸茯苓陳皮計斤許加附子五錢水煎二鍾作一服諸證悉退脈息頓復翼日瘡起而潰仍用前藥四劑後日用托裡藥調理兩月餘而愈薛按一婦人於癸卯冬失物發怒缺盆內微腫甲辰春大如覆碗左肩胛亦腫肉色如故或針出鮮血三碗許腹痛如錐泄瀉不止四肢逆冷嘔吐惡寒或時發熱絕食已七日矣其脈洪大時或微細此陽氣脫陷也用六君加炮姜三錢附子二錢早服至午不應再劑加附子五錢熟睡覺來諸證頓退六七可進稀粥再四劑諸證悉退飲食如故缺盆始痛針出清膿二碗許諸證復生此虛極也以十全大補加薑桂附各一錢三劑而安後減薑附各五分與歸脾湯兼服五十餘劑而愈薛按溫補按則十九留都鄭中翰仲夏患發背已半月瘡頭十餘枚皆如粟許漫腫堅硬根如大盤背重如負石即隔蒜灸五十餘壯其背頓輕彼因輕愈不守禁忌三日後大作瘡不起發但苦作痛用活命飲四劑勢少退用香砂六君子湯四劑飲食少進彼恃知醫自用敗毒藥二劑飲食益少口流涎沫若不自知此脾虛之甚也每用托裡藥加參耆各三錢彼密自揀去大半後雖用大補藥加薑桂亦不應遂令其子以參耆各一斤歸術各半斤乾薑桂附各一兩煎膏一罐三日飲進涎頓止腐頓潰食頓進再用托裡健脾藥腐肉自脫而愈下俱薛按張侍御患背瘡三枚皆如粟彼以為小毒服清熱化痰藥外用涼藥貼敷數日尚不起色黯不焮胸中氣不得出入勢甚可畏連用活命飲二劑氣雖利膿清稀瘡不起欲用補劑彼泥於素有痰火不受參朮之補因其固執遂陽以敗毒之劑與視之而陰以參耆歸術各五錢薑桂各二錢服二劑背覺熱腐肉得潰方信余言始明用大補藥乃愈南都聶姓者時六月患發背腐肉已去瘡口尺許色赤焮腫發熱不食欲嘔不嘔服十宣散等藥自為不起請余決之其脈輕診則浮而散重診則弱而澀此潰後之正脈然瘡口開張血氣虛也欲嘔不嘔脾胃虛也色赤焮腫虛火之象也尚可治遂與十全大補湯加酒炒黃柏知母五味麥冬及飲童便飲食頓進肌肉頓生服至八劑瘡口收如粟許又惑於人言謂餘毒未盡乃服消毒藥二劑復發熱昏憒急進前藥又二十餘劑乃愈後兩月因作善事一晝夜不睡以致勞倦發熱似睡不睡與前湯二劑更加發熱飲食不進惟飲熱湯後以前藥加附子一錢二劑復愈高秋官貞甫孟秋發背色黯而硬不痛不起脈沉而細四肢逆冷急用大艾隔蒜灸三十餘壯不痛遂用艾如粟大者著肉灸七壯乃始知痛與六君子湯二劑每劑入附子二錢不應後劑又加肉桂二錢始應而愈一男子脅腫一塊日久不潰按之微痛脈微而澀此形證俱虛也經曰形氣不足病氣不足當補不當瀉予以人參養營湯治之彼不信乃服流氣飲虛證悉至方服前湯月餘少愈但腫處尚硬以艾葉炒熱熨患處至十日餘日膿成以火針刺之更灸以豆豉餅又服十全大補湯百劑而愈定痛二十齊氏曰瘡疽之證候不同凡寒熱虛實皆能為痛故止痛之法殊非一端世人皆謂乳沒珍貴之藥可住疼痛而不知臨病制宜自有方法蓋熱毒之痛者以寒涼之藥折其熱而痛自止也寒邪之痛以溫熱之劑熨其寒則痛自除也因風而痛者除其風因濕而痛者導其濕燥而痛者潤之塞而痛者通之虛而痛者補之實而痛者瀉之因膿鬱而閉者開之惡肉侵潰者去之陰陽不和者調之經絡秘澀者利之臨機應變方為上醫不可執方而無權也立齋曰瘡瘍之作由六淫七情所傷其痛也因氣血凝滯所致假如熱毒在內便秘而作痛者內疏黃連湯導之熱毒熾盛焮腫而作痛者黃連解毒湯治之不應仙方活命飲解之瘀血凝滯而作痛者乳香定痛丸和之作膿而痛者托裡消毒散排之膿脹而痛者針之膿潰而痛者補之若因氣虛而痛四君加歸耆血虛而痛四物加參耆腎虛而痛六味地黃丸口乾作渴小便頻數者加減八味丸此皆止痛之法也慎勿概用寒涼之藥況血氣喜溫而惡寒若冷氣入里血即凝滯反為難瘥之證矣丹溪云膿出而反痛此為虛也宜補之穢氣所觸者和解之風寒所逼者溫散之若專用龍竭生肌乳沒止痛吾知其必無效也凡癰毒焮腫赤痛之甚者雖內治之法已具如前然煎劑功緩而痛急難當者必須外用敷藥既欲其止痛又欲其散毒則無如降癰散之神妙也生肌收口附成漏證二十一陳良甫曰癰疽之毒有淺深故收斂之功有遲速斷不可早用收口之藥恐毒氣未盡後必復發為患匪輕若癰久不合其肉白而膿少者此氣血俱虛不能潮運而瘡口冷澀也每日用艾葉一把煎湯避風熱洗及燒松香煙燻之或用豬蹄湯洗之更以神異膏貼之必須守禁調理否則不效又曰脈得寒則下陷凝滯肌肉故曰留連肉腠是為冷漏須溫補之丹溪曰諸經惟少陽厥陰之生癰者宜須防之以其多氣少血也血少則肌肉難長故瘡久未合必成敗證苟反用驅利毒藥以伐其陰分之血禍不旋踵矣立齋曰肌肉者脾胃之所主收斂者血氣之所使但當純補脾胃不宜泛敷生肌之劑夫瘡不生肌而色赤甚者血熱也四物加山梔連翹色白而無神者氣虛也四君加當歸黃耆晡熱內熱陰血虛也四物加參朮膿水清稀者氣血虛也十全大補湯食少體倦脾氣虛也補中益氣湯煩熱作渴飲食如常胃火也竹葉黃耆湯不應竹葉石膏湯熱渴而小便頻數腎水虛也用加減八味丸料煎服若敗肉去後新肉微赤四沿白膜者此胃中生氣也但用四君子湯以培補之則不日自斂若妄用生肌之藥餘毒未盡而反益甚耳殊不知瘡瘍之作由胃氣不調瘡瘍之潰由胃氣腐化瘡瘍之斂由胃氣榮養東垣云胃乃發生之源為人生之本丹溪亦謂治瘡瘍當助胃壯氣使根本堅固誠哉是言也可不慎歟又曰若肌肉傷而瘡口不斂用六君子湯以補脾胃若氣虛惡寒而瘡口不斂用補中益氣湯以補脾肺若血虛發熱而瘡口不斂用四物參朮以滋肝脾若膿多而瘡口不斂用八珍湯或十全大補湯以養血氣如不應但用四君歸耆以補脾胃更不應乃屬命門火衰急用八味丸以壯火生土若脈數發渴者難治以真氣虛而邪氣實也又曰生肌之法當先理脾胃助氣血為主若氣血俱虛不能生者當用托裡之劑若有風寒襲於瘡所不能生者宜用豆豉餅灸之若流注頑瘡內有膿管或瘀血或癧核須用針頭散腐之錠子尤妙如背瘡杖瘡湯火瘡大潰當用神效當歸膏則能去腐生新止痛大有神效又曰癰疽潰後毒盡則肉自生常見世之治者往往用龍骨血竭之屬以求生肌殊不知餘毒未盡肌肉何以得生氣血既虛龍竭豈能得效設若膿毒未盡就用生肌則反增潰爛壯者輕者不過復潰或遲斂而已怯者重者必致內攻或潰爛不斂反致危矣又曰凡瘡瘍成漏皆因元氣不足營氣不從陽氣虛寒則寒氣逆於肉裡稽留血脈腐潰既久即成是患故凡治不足之證於其初患便當內用參耆歸術溫補脾胃外用桑枝蔥熨接補陽氣使自消散若久而不能成膿亦用前二法補助以速之若膿既成而不潰用艾於當頭灸數炷而出之卻服十全大補湯患者又當慎起居節飲食庶幾收斂若用冷針開刺久而內出清膿外色黑黯或誤用生肌散速其口斂反束其邪必成敗證諸瘡患久成漏常有膿水不絕其膿不臭若無歹肉者法用炮附子去皮尖為細末以唾津和為餅如三錢厚安瘡上以艾炷灸之漏大艾亦大漏小艾亦小但灸令微熱不可令痛干則易之每灸一二十壯不論灸後貼以膏藥隔二三日又如前再灸更服大補氣血之藥直至肉平為度或用炮附子切片三分厚灸之亦可或用江西淡豆豉為餅多灸之亦效若瘡久成漏外有腐肉內有膿管不能收口者以針頭散和作細條紝入口內外用膏藥貼之待膿管盡去自然漸平收口或先用灸法數日後用此紝藥亦可仍內服十全大補等藥郭氏灸法瘡疽久不收斂及有膿水惡物漸潰根深者用白麵硫黃大蒜三物一處搗爛看瘡大小捻作餅子厚約三分安於瘡上用艾炷灸二十一壯一灸一易後隔四五日用藥錠針頭散等藥紝入瘡內歹肉盡去好肉長平然後貼收斂之藥內服應病之劑調理即瘥矣一男子年逾二十稟弱左腿外側患毒三月方潰膿水清稀肌肉不生以十全大補湯加牛膝二十餘劑漸愈更以豆豉餅灸之月餘而痊一婦人左臂結核年餘方潰膿清不斂一男子患貼骨癰腿細短軟瘡口不合俱用十全大補湯外以附子餅及貼補藥膏調護得宜百劑而愈大凡不足證宜大補之劑兼灸以補接陽氣祛散寒邪為上京師董賜年逾四十胸患瘡成漏日出膿碗許喜飲食如常以十全大補湯加貝母遠志白蘞續斷灸以附子餅膿漸少謹調護歲余而愈薛按用香散藥二十二伍氏曰氣血聞香則行聞臭則逆大抵瘡瘍多因營氣不從逆於肉理故郁聚為膿得香散藥則氣流行故當多服五香連翹湯萬金散清心內固金粉散凡瘡本腥穢又聞臭濁則愈甚若毒氣入胃則為咳逆古人用此可謂有理且如飲食調令香美則益脾土養真元保其無虞矣立齋曰今人有瘡瘍不審元氣虛實病之表裡病者多喜內消而醫者即用十宣散及敗毒散流氣飲之類殊不知十宣散雖有參耆然防風白芷厚朴桔梗皆足以耗氣況不分經絡時令氣血多少而概用之乎敗毒散乃發表之藥果有表證亦止宜一二服多則元氣反損其毒愈盛雖有人參莫能補也況非表證而用之乎流氣飲乃耗血之劑果氣結膈滿亦止宜二三服多則血氣愈傷夫血氣凝滯多因榮衛氣弱不能運行豈可用流氣飲以益其虛況諸經氣血多寡不同而流氣飲通行十二經則諸經皆為所損反為敗證雖有芎歸亦難倚伏若服之過度則氣虛血耗何以成膿苟不察其由而泛投克伐之劑能無危乎此三藥者其不可輕用亦明矣河間云凡瘡止於一經或兼二經者止當求責其經不可干擾余經也槐花酒二十三槐花治濕退熱之功最為神速大抵腫毒非用蒜灸及槐花酒先去其勢雖用托裡諸藥其效未必甚速惟胃寒之人不可過用滁洲於侍御髀胛患毒痛甚服消毒藥其勢未減即以槐花酒一服勢逐大退再以托裡消毒之藥而愈王通府患發背十餘日勢危脈大先以槐花酒二服殺退其勢更以敗毒散二劑再以托裡藥數劑漸潰又用桑柴燃灸患處每日灸良久仍以膏藥貼之灸至數次膿潰腐脫以托裡藥加白朮陳皮月餘而愈劉大尹發背六七日滿背腫痛勢甚危與隔蒜灸百壯飲槐花酒二碗即睡覺以托裡消毒藥十去五六令以桑枝灸患處而潰數日而愈一上舍肩患疽脈數以槐花酒一服勢頓退再與金銀花黃耆甘草十餘服而平薛按忍冬酒二十四忍冬酒治癰疽發背初發時便當服此不問疽發何處或婦人乳癰皆有奇效如或處鄉落貧家服此亦便且效仍兼以麥飯石膏及神異膏貼之甚效一園丁患發背甚危令取金銀藤五六兩搗爛入熱酒一鍾絞取酒汁溫服相罨患處四五服而平彼用此藥治瘡足以養身成家遂棄園業諸書云金銀花治瘡瘍未成者即散已成者即潰有回生之功一男子患腦癰其頭數多痛不可忍先服消毒藥不應更以忍冬酒服之即酣睡覺而勢去六七再四劑而消又一男子所患尤甚亦令服之腫痛頓退但不能平加以黃耆當歸栝蔞仁白芷甘草書桔梗數劑而愈一男子被鬼擊身有青痕作痛以金銀花煎湯飲之即愈本草謂此藥大治五種飛屍此其驗也腫瘍二十五立齋曰腫高焮痛脈浮者邪在表也宜托之腫硬痛深脈沉者邪在裡也宜下之外無焮腫內則便利調和邪在經絡也當調營衛焮腫煩躁或咽乾作渴者宜降火焮腫發熱或拘急或頭痛者邪在表也宜散之大痛或不痛者邪氣實也隔蒜灸之更用解毒煩躁飲冷焮痛脈數者邪在上也宜清之惡寒而不潰者氣虛而兼寒邪也宜宣而補之焮痛發熱汗多大渴便結譫語者結陽證也宜下之不作膿或熟而不潰者虛也宜補之又曰大抵癰腫之證不可專泥於火為患況稟有虛實及老弱不同豈可概用寒涼之藥設若毒始聚勢不盛者庶可消散尤當推其病因別其虛實若概用涼藥必致誤事如膿將成邪盛氣實者用消毒之劑先殺其毒雖作膿不為大苦潰亦不甚若就用托裡必益其勢如膿將成不成及不潰者方用托裡膿成勢盛者針之膿一出諸證悉退矣丹溪曰腫瘍內外皆壅宜以托裡表散為主如欲用大黃寧無孟浪之非潰瘍內外皆虛宜以補接為主如欲用香散未免虛虛之失愚意前論腫瘍有云忌補宜下者有云禁用大黃者此其為說若異而亦以證有不同耳蓋忌補者忌邪之實也畏攻者畏氣之虛也即如腫瘍多實潰瘍多虛此其常也然腫瘍亦多不足則有宜補不宜瀉者潰瘍亦或有餘則有宜瀉不宜補者此其變也或宜補或宜瀉總在虛實二字然虛實二字最多疑似貴有定見如火盛者宜清者也氣滯者宜行者也既熱且壅宜下者也無滯無壅則不宜妄用攻下此用攻之宜禁者也至若用補之法亦但察此二者凡氣道壅滯者不宜補火邪熾盛者不宜溫若氣道無滯火邪不甚或飲食二便清利如常而患有危險可畏者此雖未見虛證或腫瘍未潰亦宜即從托補何也蓋恐困苦日久無損自虛若能預固元氣則毒必易化膿必易潰口必易斂即大羸大潰猶可望生若必待虛證疊出或既潰不能收斂而後勉力支持則輕者必重重者必危能無晚乎此腫瘍之有不足也所繫非細不可不察向予長男生在癸丑及乙卯五月甫及二周而患背疽初起時背中忽見微腫數日後按之則根深漸闊其大如碗而皮色不變亦不甚痛至十餘日身有微熱其勢滋甚因謀之瘍醫或云背疽或云痰氣咸曰葷腥溫補一毫不可入口乃投以解毒之藥一劑而身反大熱神氣愈困飲食不進矣予危懼之甚因思丹溪有云癰疽因積毒在臟腑當先助胃氣為主使根本堅固而以行經活血佐之又曰但見腫痛參之脈證虛弱便與滋補氣血無虧可保終吉是誠確論也因卻前醫而專固元氣以內托其毒遂用人參三錢製附子一錢佐以當歸熟地炙甘草肉桂之屬一劑而飲食頓進再劑而神彩如舊抑何神也由是弛其口腹藥食並進十劑而膿成以其根深皮厚復用針出膿甚多調理月餘而愈向使傾信庸流絕忌溫補滋味專意解毒則胃氣日竭毒氣日陷飲食不進尚致透隔內潰則萬萬不保矣且此兒素無虛病何敢乃爾蓋以其既屬陰證又無實邪見有確真故敢峻補脾腎方保萬全嗚呼醫之關係皆是類也因錄此按用告將來以見腫瘍潰瘍凡虛證未見而但無實熱壅滯可據者便宜托補如此則其受益於不識不知有非可以言語形容者新按腫瘍不足二十六汪太夫人年逾八十腦疽已潰發背繼生頭如粟米脈大無力此膀胱經濕熱所致然脈大無力乃血氣衰也遂以托裡消毒散數服稍可更加參耆之劑雖瘡起而作渴此氣血虛甚以人參黃耆各一兩當歸熟地各五錢麥冬五味各一錢數服渴止而愈此不有臟腑能言氣血能告豈能省悟病者至死皆歸於命深可哀也又有患者氣質素實或有痰不服補劑然不知膿血內潰氣血並虛豈不宜補余常治瘡陰用參耆大補之劑陽書敗毒之名與服之俱不中滿瘡亦隨效虛甚者尚加薑桂甚至附子未嘗有不效也薛按潰瘍二十七立齋曰膿熟不潰者陽氣虛也宜補之瘀血不腐者宜大補陽氣更以桑木灸之膿清不斂者氣血俱虛宜大補膿後食少無睡或發熱者虛也宜補之倦怠懶言食少不睡者虛也宜補之寒氣襲於瘡口不能收斂或陷下不斂者溫補之脈大無力或澀微者氣血俱虛也峻補之出血或膿多煩躁不眠者乃亡陽也急補之凡膿潰而清或瘡口不合或聚腫不赤肌寒肉冷自汗色脫者皆氣血俱虛也非補不可凡膿血去多瘡口雖合尤當補益務使氣血平復否則更患他證必難治療也又曰大抵膿血大泄當大補血氣為先雖有他證以未治之凡癰疽大潰發熱惡寒皆屬氣血虛甚若左手脈不足者補血藥當多於補氣藥右手脈不足者補氣藥當多於補血藥切不可發表大凡癰疽全藉血氣為主若患而不起或潰而不腐或不收斂及膿少或清皆血氣之虛也俱宜大補之最忌攻伐之劑亦有膿反多者乃氣血虛而不能禁止也常見血氣充實之人患瘡者必腫高色赤易腐潰而膿且稠又易於收斂怯弱之人多不起發不腐潰及難於收斂若不審察而妄投攻劑虛虛之禍不免矣及患後更當調養若瘰癧流注之屬尤當補益也否則更患他證必難措治慎之又曰潰瘍若屬氣血俱虛固所當補若患腫瘍而氣血虛弱者尤宜預補否則雖潰而不斂矣又凡大病之後氣血未復多致再發若不調補必變為他證而危或誤以瘡毒復發反行攻伐則速其不起深可為戒也又曰若瘡瘍腫焮痛甚煩躁脈大則辛熱之劑不但腫瘍不可用即潰瘍亦不可用也太平聖惠方云凡癰疽膿潰之後脈微澀遲緩者邪氣去而真氣將復也為易愈若脈來沉細而直者裡虛而欲變證也若膿血既去則當脈靜身涼腫消痛息如傷寒表證之得汗也若反發熱作渴脈洪數者此真氣虛而邪氣實也死無疑矣潰瘍有餘二十八潰瘍有餘之證其辨有四蓋一以元氣本強火邪本盛雖膿潰之後而內熱猶未盡除或大便堅實而能食脈滑者此其形氣病氣俱有餘仍宜清利不宜溫補火退自愈亦善證也一以真陰內虧水不制火膿既泄而熱反甚脈反躁者欲清之則正氣以虛欲補之則邪氣愈甚此正不勝邪窮敗之證不可治也一以毒深而潰淺者其肌腠之膿已潰而根盤之毒未動此乃假頭非真潰也不得遽認為潰瘍而概施托補若誤用之則反增其害當詳辨也又有一種元氣已虛極似宜補然其稟質滯濁肌肉堅厚色黑而氣道多壅者略施培補反加滯悶若此輩者真虛既不可補假實又不可攻最難調理極易招怨是亦不治之證也總之潰瘍有餘者十之一二故潰瘍宜清者少腫瘍不足者十常四五故腫瘍宜補者多此亦以癰疽之危險有關生死者為言故貴防其未然也至若經絡浮淺之毒不過腫則必潰潰則必收又何必卷卷以補瀉為辨也觀者審之一男子年逾三十腹患癰腫脈數喜冷齊氏云瘡瘍腫起堅硬瘡疽之實也河間云腫硬木悶煩躁飲冷邪氣在內也遂用清涼飲倍加大黃三劑稍緩次以四物湯加芩連山梔木通四劑遂潰更以十宣散去參耆肉桂加金銀花天花粉漸愈彼欲速效自服溫補藥遂致肚腹俱腫小便不利仍以清涼飲治之膿潰數碗再以托裡藥而愈趙宜人年逾七旬患鬢疽已潰焮腫甚痛喜冷脈實大便秘澀東垣曰煩躁飲冷身熱脈大精神昏悶者皆臟腑之實也遂以清涼飲一劑腫痛悉退更以托裡消毒藥三十餘劑而平若謂年高潰後投以補劑實實之禍不免矣薛按潰瘍作痛二十九立齋曰膿出而反痛者虛也宜補之脈數虛而痛者屬虛火宜滋陰脈數實而痛者邪氣實也宜泄之脈實便秘而痛者邪在內也宜下之脈澀而痛者氣血虛寒也溫補之大抵瘡之始作也先發為腫氣血鬱積蒸肉為膿故多痛膿潰之後腫退肌寬痛必漸減若反痛者乃虛也宜補之亦有穢氣所觸者宜和解之風寒所逼者宜溫散之丁蘭年二十餘股內患毒日久欲求內消診其脈滑數知膿已成因氣血虛不潰遂刺之膿出作痛以八珍湯治之少可但膿水清稀更以十全大補湯加炮附子五分數劑漸愈仍服十全大補湯三十餘劑而痊一僧股內患腫一塊不痛不潰治以托藥二十餘劑膿成刺之作痛予謂腫而不潰潰而反痛此氣血虛甚也宜峻補之彼云氣無補法予謂正氣不足不可不補補之則氣化而痛邪自除遂以參耆歸朮熟地黃治之兩月餘而平薛按潰瘍發熱附惡寒三十用手摸熱有三法以輕手捫之則熱重按之則不熱是熱在皮毛血脈也重按之至筋骨之分則熱蒸手極甚輕手則不熱是邪在筋骨之間也不輕不重按之而熱是熱在筋骨之上皮毛血脈之下乃熱在肌肉也仲景曰脈虛則血虛血虛生寒陽氣不足也寸口脈微為陽不足陰氣上入陽中則灑淅惡寒尺脈弱為陰不足陽氣下陷入陰中則發熱也王氏曰病熱而脈數按之不鼓動乃寒盛格陽而致之非熱也形證似寒按之而脈氣鼓擊於指下盛者此為熱甚拒陰而生病非寒也東垣曰發熱惡熱大渴不止煩躁肌熱不欲近衣或目痛鼻乾但脈洪大按之無力者非白虎湯證也此血虛發躁當以當歸補血湯主之又有火鬱而熱之證如不能食而熱自汗氣短者虛也當以甘寒之劑瀉熱補氣如能食而熱口舌乾燥大便難者當以辛苦大寒之劑下之以瀉火保水又曰晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝夜發熱煩躁是重陽無陰也當急瀉其陽峻補其陰立齋曰脈浮或弱而熱或惡寒者陽氣虛也宜補氣脈澀而熱者血虛也宜補血脈浮數發熱而痛者邪在表也宜散之脈沉數發熱而痛者邪在裡也當下之午前熱者補血為主午後熱者補氣為主左手脈小於右手而熱者用血藥多於氣藥右手脈小於左手而熱者用氣藥多於血藥發熱煩躁三十一王太僕曰大寒而甚熱之不熱是無火也當治其心大熱而甚寒之不寒是無水也熱動夏止悠忽往來時動時止是無水也當補其腎故心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不勝寒是無火也寒不勝熱是無水也夫寒之不寒責其無水熱之不熱責其無火熱之不久責之心虛寒之不久責腎之弱治者當深味之立齋曰瘡瘍發熱煩躁或出血過多或膿潰大泄或汗多亡陽或下多亡陰以致陰血耗散陽無所依浮散於肌表之間而非火也若發熱無寐者血虛也用聖愈湯兼汗不止氣虛也急用獨參湯發熱煩躁肉瞤筋惕血氣俱虛也用八珍湯大渴面赤脈洪大而虛陰虛發熱也用當歸補血湯肢體微熱煩躁面赤脈沉而微陰盛發躁也用四君加薑附作嘔三十二立齋曰喜熱惡寒而嘔者宜溫養胃氣脈細腸鳴腹痛滑泄而嘔者宜托裡溫中喜寒惡熱而嘔者宜降火脈實便秘而嘔者宜瀉火若不詳究其源而妄用攻毒之藥則腫者不能潰潰者不能斂矣雖丹溪曰腫瘍時嘔當作毒氣攻心治之潰瘍時嘔當作陰虛補之殊不知此大概之言耳況今之熱毒內攻而嘔者十才一二脾胃虛寒或痰氣而嘔者十居八九故不可執以為言也又曰凡癰瘍腫赤痛甚煩躁脈實而嘔者為有餘當下之若腫硬不潰脈弱而嘔者乃陽氣虛弱當補之若嘔吐食少者乃胃氣虛寒當溫補脾胃若痛傷胃氣或感寒邪穢氣而嘔者雖在腫瘍當助胃壯氣若妄用攻伐多致變證不治薛氏樞要曰瘡瘍作嘔不可泥於熱毒內攻而概用敗毒等藥如熱甚焮痛邪氣實也仙方活命飲解之作膿焮痛胃氣虛也托裡消毒散補之膿熟脹痛氣血虛也先用托裡散後用針以泄之焮痛便秘熱壅於內也內疏黃連湯導之若因寒藥傷胃而嘔者托裡建中湯胃寒少食而嘔者托裡益中湯中虛寒淫而嘔者托裡溫中湯肝木乘脾而嘔者托裡抑青湯胃脘停飲而嘔者托裡清中湯脾虛自病而嘔者托裡益黃湯鬱結傷脾而嘔者托裡越鞠湯又曰大凡諸瘡作嘔若飲冷便秘是熱毒也黃連消毒散解之飲冷便實是胃火也竹葉石膏湯清之懶食飲湯是胃虛也補中益氣湯補之大便不實喜飲熱湯是脾胃虛寒也六君加炮姜以溫之常見脾胃虛弱者用前散反心膈陰冷致嘔而喉舌生瘡乃腎水枯涸虛火炎上也其證甚惡急用加減八味丸亦有得生者熱毒作嘔證如劉貴患腹癰焮痛煩躁脈實作嘔河間云瘡瘍者火之屬須分內外以治其本若脈沉實者先當疏其內以絕其源又曰嘔噦心煩脈沉而實腫硬木悶或皮肉不變邪氣在內宜用內疏黃連湯治之然做嘔脈實毒在內也遂以前湯通利二三行諸證悉去更以連翹消毒散而愈金臺王時亨年逾四十患臂毒焮痛作嘔服托裡消毒藥愈甚予用涼膈散二劑頓退更以四物湯加芩連四劑而消薛按胃寒作嘔證如顧浩室人年逾四十患發背治以托裡藥而潰忽嘔而瘡痛胃脈弦緊彼以為餘毒內攻東垣云嘔吐無時手足厥冷臟腑之虛也丹溪云潰後發嘔不食者濕氣侵於內也又云膿出而反痛此為虛也今胃脈弦緊木乘土位其虛明矣予欲以六君子湯加酒炒芍藥砂仁藿香治之彼自服護心散嘔愈甚復邀治仍用前藥更以補氣血藥兩月而愈大抵濕氣內侵或感穢氣而作嘔者必喜溫而脈弱熱毒內攻而作嘔者必喜涼而脈數必須辨認明白亦有大便不實或腹痛或膨脹或嘔吐或吞酸噯腐此皆腸胃虛寒也以理中湯治之如不應加熟附子二三片予嘗飲食少思吞酸噯腐諸藥不應惟服理中湯及附子理中丸有效蓋此證皆因中氣虛寒不能運化鬱滯所致故用溫補之劑使中氣溫和自無此證矣張生患漆瘡作嘔由中氣虛弱漆毒侵之予以六君子湯加砂仁藿香酒炒芍藥治之彼不信另服連翹消毒散嘔果甚復邀治仍以前藥外用麻油調鐵鏽末塗之而愈薛按戴氏曰如噁心者無聲無物欲吐不吐欲嘔不嘔雖曰噁心實非心經之病皆在胃口上宜用生薑蓋能開胃豁痰也名元禮南院使作渴三十三李氏曰人病疽多有愈後發渴而不救者十有八九或先渴而後患疽者尤為難治急用加減八味丸可免前患若疽安而渴者服此丸則渴止疽安而未渴者預服此丸則永不生渴或未發疽而先發渴者服此不惟渴止且疽亦不作氣血加壯真神劑也又曰癰疽已安之後或未安之際口舌燥黃如雞內金者乃腎水枯竭心火上炎此證最惡古人云玉華池竭七朝亡若誤投以丹藥則禍在反掌急用加減八味丸桑枝煎五味子湯以滋補之又云一貴人病疽未安而渴作一日飲水數升予以加減八味丸治之諸醫大笑云此能止渴我輩當不復業醫皆用木瓜紫蘇烏梅人參茯苓百藥煎等劑服多而渴愈甚不得已用此藥三日渴止久服遂不復渴飲食加倍健於少壯蓋此藥非出鄙見自為兒時聞先君言有人病渴用渴藥累年不愈一名醫使服此藥降心火生腎水為最家藏此方親用嘗驗患者當知所鑑詳外科精要馬益卿曰癰疽作渴乃氣血兩虛宜用參耆以補氣當歸地黃以養血或用黃耆六一湯或用忍冬丸其方以忍冬藤入瓶內加無灰酒微火煨一宿取出曬乾少加甘草俱為末仍用余酒調糊為丸桐子大每服百餘丸溫酒下兼治五痔諸癭氣立齋曰尺脈大或無力而渴者宜滋陰降火上部脈沉實而渴者宜瀉火上部脈洪數而渴者宜降火胃脈數而渴者宜清胃火氣虛不能生津液而渴者宜補中氣脈大無力或微弱而渴者宜補氣血膿血大泄或瘡口出血而渴者宜大補氣血如不應急用獨參湯薛氏樞要曰瘡瘍作渴若焮腫發熱便利調和者上焦熱也用竹葉石膏湯腫痛發熱大便秘澀者內臟熱也用四順清涼飲焮腫痛甚者熱毒蘊結也用仙方活命飲漫腫微痛者氣血虛壅也用補中益氣湯若胃火消爍而津液短少者用竹葉黃耆湯若胃氣虛弱不生津液者用補中益氣湯若胃氣受傷內無津液者用七味白朮散若腎水乾涸作渴或口舌乾燥者用加減八味丸或先口乾作渴小便頻數而後患疽或疽愈後作渴飲水或舌黃乾硬小便數而疽生者尤其惡也苟能逆知其因預服加減八味丸補中益氣湯以滋化源可免是患心法曰予治瘡瘍作渴不問腫潰但脈數發熱而渴以竹葉黃耆湯治之脈不數不發熱或脈數無力而渴或口乾以補中益氣湯若脈數而便秘以清涼飲若尺脈洪大按之無力而渴以加減八味丸若治口燥舌黃飲水不歇此丸尤妙瀉痢三十四立齋曰瘡瘍大便泄瀉或因寒涼克伐脾氣虧損或因脾氣虛弱食不克化或因脾虛下陷不能升舉或因命門火衰不能生土或因腎經虛弱不能禁止或因脾腎虛寒不能司職所主之法若寒涼傷脾六君加木香砂仁送二神丸脾虛下陷用補中益氣送二神丸命門火衰用八味丸料送四神丸腎虛不禁用姜附湯加吳茱萸五味脾腎虛寒用參附湯送四神丸病機云脈沉而細身不動作睛不了了飲食不下鼻準氣息者姜附湯主之身重四肢不舉者參附湯主之仲景云下痢腸鳴當溫之脈遲緊痛未止當溫之大孔痛當溫之心痛當救里可與理中附子四逆輩精要云癰疽嘔吐腎脈虛者不治凡此難治之證如按前法治之多有可生者御醫王彭峰之內年逾四十背疽不起發泄瀉作嘔食少厥逆脈息如無屬陽氣虛寒用大補劑加附子薑桂不應再加附子二劑瀉愈甚更以大附子薑桂各三錢參耆歸術各五錢作一劑腹內始熱嘔瀉乃止手足漸溫脈息遂復更用大補而潰再用托裡而斂十年後仍患脾胃虛寒而歿薛按大便秘結三十五立齋曰瘡瘍大便秘結若作渴飲冷其脈洪數而有力者屬實火宜用內疏黃連湯若口乾飲湯其脈浮大而無力者屬氣虛宜八珍湯若腸胃氣虛而燥而不通者宜用十全大補湯培養之若瘡證屬陽或因入房傷腎而不通者宜用前湯加姜附回陽多有得生者若飲食雖多大便不通而肚腹不脹者此內火消爍切不可通之若肚腹痞脹而直腸乾涸不通者宜用豬膽汁導之若誤行疏利復傷元氣則不能潰斂經曰腎開竅於二陰藏精於腎津液潤則大便如常若潰瘍有此因氣血虧損腸胃乾涸當大補為善設若不審虛實而一於疏利者鮮有不誤若老弱或產後而便難者皆氣血虛也豬膽汁最效甚者多用之更以養氣血藥助之萬不可妄行攻伐居賓鷗仲夏患發背黯腫尺余皆有小頭如鋪粟狀四日矣此真氣虛而邪氣實也遂隔蒜灸之服活命飲二劑其邪頓退乃純補其真陰又將生脈散以代茶飲瘡邪大退余因他往三日復視之飲食不入中央肉死大便秘結小便赤濁余曰中央肉死毒氣盛而脾氣虛也大便不通腸虛而不能傳送也小便赤濁脾虛而火下陷也治亦難矣彼始云莫非間斷補藥之過也余曰然乃急用六君子加當歸柴胡升麻飲食漸進大便自通外用烏金膏塗中央三寸許四周紅腫漸消中央黑腐漸去乃敷當歸膏用地黃丸與前藥間服將百劑而愈薛按小便淋澀不利三十六立齋曰瘡瘍小便淋漓頻數或莖中澀者腎經虧損之惡證也宜用加減八味丸以補陰足脛逆冷者宜用八味丸以補陽若小便頻數而黃者宜用四物湯加參朮麥門五味以滋肺腎若小便短而少者宜用補中益氣加山藥麥門五味以補脾肺若熱結膀胱而不利者宜用五淋散以清熱若脾氣燥熱而不能化者宜用黃芩清肺飲以滋陰若膀胱陰虛陽無以生者宜用滋腎丸若膀胱陽虛陰無以化者宜用六味地黃丸腎虛之患多傳此證非滋化源則不救若用黃柏知母反瀉其陽是速其危也若老人陰痿思色精氣內敗莖中痛而不利者用加減八味丸加車前子牛膝不應更加附子多有復生者若精已竭而復耗之大小便中牽痛愈痛則愈便愈便則愈痛以前藥加附子亦有復生者王太僕云無陰則陽無以化無陽則陰無以生當滋其化源若專用淡滲復損真陰乃速其危也發痙三十七立齋曰瘡瘍發痙因氣血虧損或為外邪所搏或內虛鬱火所致其形則牙關緊急四肢勁強或腰背反張肢體抽搐其有汗而不惡寒者曰柔痙風能散氣故有汗也其無汗而惡寒者曰剛痙寒能澀血故無汗也皆由亡血過多筋無所養故傷寒汗下過多與潰瘍產後多患之乃敗證也若大補氣血多有可治者若作風治速其危也痙論法俱詳見雜證謨十二卷痙證門所當參閱無寐三十八立齋曰瘡瘍潰後無寐發熱煩躁血虛也聖愈湯自汗不止無寐氣虛也四君子加黃耆五味子發熱煩躁肉瞤筋惕氣血虛也八珍湯大渴面赤脈洪大而浮陰虛發熱也當歸補血湯肢體微熱煩躁面赤脈沉微陰盛發躁也四君加姜附瘡瘍出血三十九立齋曰瘡瘍出血因五臟之氣虧損虛火動而錯經妄行也當求其經審其因而治之若肝熱而血妄行者宜四物加炒山梔芩朮丹皮肝虛而不能藏血者六味地黃丸心虛而不能主血者四物加炒黃連丹皮苓術脾虛熱而不能統血者四君子加炒梔子丹皮若脾經鬱結用歸脾湯加五味子脾肺氣虛用補中益氣湯加五味子氣血俱虛用十全大補湯陰火動者用六味丸加五味子大凡失血過多見煩躁發渴等證勿論其脈急用獨參湯以補氣經云血生於氣苟非參耆歸術甘溫等劑以生心肝之血決不能愈若發熱脈大者不治凡患血證皆當以犀角地黃湯為主戒忌調護四十李氏云病疽之人當戒酒面炙爆醃臘生冷油膩雞鵝魚腥之類若起居七情尤為深戒必令臥室潔淨馨香使氣血流暢仍忌僧道孝子產婦經婦及雞犬貓畜之類若背疽難於隱几宜用綠豆十斗做一袋隱伏其上以解毒涼心也又曰大凡臟腑已利瘡毒已潰氣血既虛最當調護若發熱而服涼藥無不致禍立齋曰綠豆性寒主丹毒煩熱風疹或金石所發實熱煩渴飲食如常證屬純陽者極宜用之否則不可輕用也又曰瘡瘍食肉乃自棄也瘡瘍之毒發於營氣今反助之與自棄何異雖用藥施治亦不能愈東垣云胃為五臟之根本胃氣一傷諸證皆虛七惡蜂起可不慎哉愚按瘡瘍當忌葷腥然以愚見言之則惟熱火證及疔毒陽癰則毫不可犯宜切慎之至若營衛大虛而毒不能化肉不能長凡宜溫宜補等證豈亦不宜滋補乎故古人號黃耆為羊肉則既宜黃耆未有不宜羊肉者惟豬肉牛肉醇酒及傷脾助濕等物則不可不忌陰陽證變四十一太監劉關患發背腫痛色紫診其脈息沉數陳良甫云脈細發熱而痛者發於陽也且瘡瘍赤甚則紫即火極似水也詢之嘗服丹石藥半載乃積溫成熱所致遂以內疏黃連湯再服稍平更用排膿消毒藥乃豬蹄湯太乙膏而愈經曰色與脈當相參應治之者在明亢害承製之理陰陽變化之機焉耳舉人潘光甫年四十患腦疽焮腫診其脈沉靜予謂此陽證陰脈斷不起已而果然蓋瘡瘍之證雖屬心火尤當分表裡虛實果元氣充實內有實火者寒劑或可責效若寒涼過度使胃寒脾弱陽證變陰或結而不潰潰而不斂陰陽乖戾水火交爭死無日矣薛按論列方外科上參附湯補三七托裹散外四三八珍湯補十九六君子湯補五聖愈湯補九一歸脾湯補三二回陽湯外三七八味丸補一二一敗毒散散三六沖和湯外二四四神丸熱一五一流氣飲外五五五淋散寒百十七五香渴末入即外五一方姜附湯熱三二四君子湯補一獨參湯補三五四物湯補八理中湯熱一六味丸補百二十滋腎丸寒一六三護心散外七二二神丸熱百五十清涼飲外九十麻黃湯散一涼膈散痘八三清胃散寒五四十宣散痘十四清陰湯外八五白虎湯寒二離金散外六七漏蘆湯外九五奪命丹外七七蠟礬丸外七四忍冬酒外百二槐花酒外百四通志酒外百六國老膏外六八桑枝煎外百九掣甘草湯外六八五味子湯補五七神仙截法外百十十全大補湯補二十仙方活命飲外一人參黃耆湯外二六補中益氣湯補三十托裹消毒散外二托裡溫中湯外十二托裡健中湯外十一托裡清中渴外十六托裡益黃湯外十五托裡益中湯外十三托裡抑青湯外十七托裡越鞠湯外十九托裡溫經湯外十四七味白求散小七丁香柿蒂散熱六四黃耆六一湯補四九當歸補血湯補四四加減八味丸外三八人參養營湯補二一人參平肺散寒三七人參理中湯熱一人參敗毒散散三六附子理中湯外三四竹葉黃耆湯寒七黃連消毒散外六十黃連解毒湯寒一竹葉石膏湯寒五連翹消毒散外六一內疏黃連湯外九三五香連翹渴外五一四順清涼飲攻二五黃芩清肺飲寒三八內固金粉散外七三犀角地黃湯外四六乳香定痛丸外五七犀角升麻湯外四七香砂六君湯補七神仙熏照方外一二二附子餅外百十六豆豉餅外百十七桑枝灸外百二十蔥熨法外一二一隔蒜灸外百十五騎竹馬法外百十四針頭散外一四四降癰散新因三六麥飯石膏外一三九烏金膏外一四二陰陽散外一三三抑陰散外一三一抑陽散外一三二豬蹄湯外一二五當歸膏外三一四神異膏外三百十
