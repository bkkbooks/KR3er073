body:
  text: 卷之六十一長集婦人規古方婦人安胎飲治妊娠五七個月用數服可保全產人參白朮當歸熟地川芎白芍藥陳皮甘草炙紫蘇炙黃芩各一錢上為薑水煎服一方有砂仁安胎散治妊娠卒然腰痛下血熟地艾葉白芍炒川芎黃耆炒阿膠炒當歸甘草炙地榆各一錢上為薑棗水煎服泰山盤石散治婦人血氣兩虛或肥而不實或瘦而血熱或脾肝素虛倦怠少食屢有墮胎之患此方平和兼養脾胃氣血覺有熱者倍黃芩少用砂仁覺胃弱者多用砂仁少加黃芩更宜戒欲事惱怒遠酒醋辛熱之物可永保無墮徐東皋曰婦人凡懷胎二三個月慣要墮落名曰小產此由體弱氣血兩虛臟腑火多血分受熱以致然也醫家又謂安胎多用艾附砂仁熱補尤增禍患而速其墮矣殊不知血氣清和無火煎爍則胎自安而固氣虛則提不住血熱則溢妄行欲其不墮得乎香附雖云快氣開鬱多用則損正氣砂仁快脾氣多用亦耗真氣況香燥之性氣血兩傷求以安胎適又損胎而反墮也今惟泰山盤石散千金保孕丸二方能奪化工之妙百發百效萬無一失甫故表而出之以為好生君子共知也人參黃耆當歸川續斷黃芩各一錢川芎白芍藥熟地各八分白朮二錢炙甘草砂仁各五分糯米一撮水一鍾半煎七分食遠服但覺有孕三五日常用一服四月之後方無慮也地黃當歸湯一名內補丸治妊娠衝任脈虛補血安胎熟地二兩當歸一兩上每服五錢水煎服為丸法以當歸炒為末熟地蒸搗膏和丸桐子大每服百餘丸溫酒或滾湯下許學士曰大率妊娠惟在抑陽助陰然胎前藥最惡陰陽雜亂致生他病惟枳殼湯所以抑陽四物湯所以助陰耳然枳殼湯其味多寒若單服恐致胎寒腹痛更以內補丸佐之則陽不致強陰不致弱陰陽調和有益胎嗣此前人末嘗論及也良方當歸湯治胎動煩躁或生理不順唇口青黑手足厥冷當歸人參各二三錢阿膠炒甘草炒各一錢連根蔥白一握上水四碗煎四味至半去滓下蔥再煎一碗分二服良方阿膠散或頓僕或因毒藥胎動不安或脅痛腹痛上搶短氣阿膠艾葉當歸熟地川芎白芍黃耆炙甘草等分上每服四錢薑棗水煎良方膠艾湯治妊娠頓僕胎動不安腰腹疼痛或胎上搶或去血腹痛又金匱膠艾湯在後阿膠炒一兩艾葉數莖上二味以水五升煮取二升分三服七味阿膠散治胎動腹痛阿膠炒白茯苓白朮炒川芎當歸陳皮各一錢甘草炒三分上薑棗水煎服良方黃耆湯治氣虛胎動腹痛下水糯米一合黃耆炒川芎各一兩上水煎分三服良方鉤藤湯治妊娠胎動腹痛面青冷汗氣欲絕鉤藤鉤當歸茯神桑寄生人參各一錢苦梗一錢半上水煎服如有煩熱加石膏良方白朮散治妊娠傷寒內熱等證白朮黃芩炒各二錢上用薑棗水煎服若陰證者不可用良方三味白朮湯治妊娠內熱心痛白朮四錢赤芍藥三錢黃芩炒二錢上水煎服忌桃李雀肉良方四味白朮湯治妊娠胃虛惡阻吐水甚至十餘日漿粥不入白朮炒一錢人參五分甘草炒丁香各二分上薑水煎服全生白朮散治妊娠面目虛浮四肢腫如水氣名曰胎腫白朮一兩生薑皮大腹皮陳皮白茯苓各半兩上為末每服二錢米飲下如未應佐以人參甘草探胎飲婦人經水不來三月疑似用此驗之川芎不拘多少為末不見火空心煎艾湯調下方寸匕覺腹中動則有胎也臍之下動者乃血瘕也不動者血凝也病也當歸芍藥湯治妊娠心腹急痛或去血過多而眩運當歸白芍藥炒白朮炒茯苓澤瀉各一錢川芎二錢上水煎服益母地黃湯治妊娠跌墜腹痛下血生地益母草各二錢當歸黃耆炒各一錢上薑水煎服良方獨聖散治妊娠有所傷觸激動胎元腹痛下血極效砂仁不拘多少帶皮同炒勿令焦黑取仁為末上用熱酒調服四五分或一錢此物有安胎導滯易產之功實妊婦之要藥也良方安胎寄生湯治妊娠下血或胎不安或腰腹作痛桑寄生白朮茯苓各五分甘草一錢上水煎服二黃散治胎漏下血或內熱晡熱或頭痛頭暈或煩躁作渴或脅肋脹痛等證生地熟地上為末每服三錢煎白朮枳殼湯下四聖散治漏胎下血條芩白朮砂仁阿膠各等分上為細末每服二錢艾湯調下一方有芍藥無阿膠按此方若改為湯砂仁用當減半良方續斷湯治妊娠下血尿血當歸生地黃各一兩續斷赤芍藥各半兩上為末每服二錢空心用蔥白煎湯調下枳殼湯治胎漏下血或因事下血亦進食和中並治惡阻枳殼炒黃芩炙各半兩白朮炒一兩上為末每服一錢白湯調下前四證若因脾胃虛弱宜用補中益氣湯加五味若因脾胃虛陷宜用前湯倍加升麻柴胡若因晡熱內熱宜用逍遙散滑胎枳殼散此方能令胎瘦產易湖陽公主每產累日不下南山道人進此方粉草炒一兩商州枳殼麩炒二兩上為末每服二錢空心沸湯調日三服凡孕六七月宜服之溫隱居方加當歸廣木香各等分或加香附一兩亦可枳殼散方在寒陣治婦人血熱氣滯經候不調千金鯉魚湯治妊娠腹脹胎中有水氣遍身浮腫小便不利或胎死腹中皆效當歸芍藥各一錢白朮一錢茯苓一錢半橘紅五分鯉魚一尾不拘大小上作一服將鯉魚去鱗臟白水煮熟去魚用汁鍾半入藥加生薑五片煎一鍾空心服當見胎水下如水未盡胎死腹中脹悶未除再製一服水盡脹消乃已竹葉湯治妊娠心驚膽怯煩悶不安名曰子煩一方有當歸防風梔子仁白茯苓麥門冬黃芩各三兩上每服四錢竹葉五片水煎服若因血虛煩熱宜兼用四物若因中氣虛弱宜兼用四君紫蘇飲治妊娠失調胎氣不安上㽲作痛名曰子懸或臨產氣結不下等證大腹皮川芎白芍藥陳皮蘇葉當歸各一兩人參甘草各半兩上每服一兩薑蔥水煎服一方有香附無人參若肝脾氣血虛而有火不安宜兼逍遙散若脾氣虛弱而不安宜用四君芎歸安榮散治妊娠小便澀少遂成淋瀝名曰子淋甚妙麥門冬通草滑石當歸燈心甘草人參細辛等分上水煎服一方人參細辛加倍為末每服二錢麥冬湯調服若因肺經鬱熱宜用黃芩清肺飲若因膏粱厚味宜用清胃散若因肝經濕熱宜用加味逍遙散天仙藤散治妊娠三月之後足指發腫漸至腿膝飲食不甘狀似水氣或腳指間出黃水名曰子氣天仙藤洗略炒香附炒陳皮甘草烏藥等分上每服三五錢加生薑木瓜各三片紫蘇三葉水煎食前日進三服若因脾胃虛弱宜兼六君子中氣下陷須用補中益氣湯羚羊角散治妊娠虛風頸項強直筋脈攣急語言蹇澀痰涎不利不省人事名曰子癇羚羊角鎊川獨活棗仁五加皮薏苡仁炒防風當歸川芎茯神杏仁去皮尖各五分炙甘草木香各一分上加姜五片水煎服若因肝經風熱或怒火所致須用加味逍遙散人參橘皮湯治妊娠脾胃虛弱氣滯惡阻嘔吐痰水飲食少進益胃和中一名參橘散人參陳皮麥門冬白朮各一錢厚朴制白茯苓各五分炙甘草三分上加淡竹茹一塊薑水煎溫服若因中脘停痰宜用二陳枳殼若因飲食停滯宜用六君加枳殼若因脾胃虛宜用異功散竹茹湯治孕婦嘔吐不止噁心少食服此止嘔清痰竹茹彈子大一丸陳皮半夏茯苓各錢半生薑二錢水鍾半粳米一撮煎七分溫服忌羊肉雞魚麵食良方半夏茯苓湯治妊娠脾胃虛弱飲食不化嘔吐不止半夏泡炒黃陳皮砂仁炒各一錢白茯苓二錢甘草炒五分上用薑棗烏梅水煎服一二劑後用茯苓丸在三九烏附湯治孕婦噁心阻食養胃調和元氣烏藥香附制白朮土炒陳皮各一錢人參炙甘草各八分水鍾半姜三片煎七分服吐甚者加丁香砂仁各七粒千金保孕丸治妊婦腰背痛善於小產服此可免墮胎之患此即良方杜仲丸但彼等分用杜仲四兩同糯米炒去絲川續斷二兩酒洗上為末山藥糊丸桐子大每服八九十丸空心米飲下忌酒醋惱怒一母丸一名知母丸治妊娠血熱頓僕胎動不安或欲墮產知母炒為末上搗棗肉為丸彈子大每服一丸人參湯嚼送或丸桐子大每服三四十丸白湯下或嚼咽之束胎丸懷胎七八個月恐胎氣展大難產用此扶母氣束兒胎易產然必胎氣強盛者乃可服條黃芩酒炒勿太熟冬月一兩夏月半兩白朮三兩陳皮二兩白茯苓七錢半上為末粥糊丸桐子大每服五十丸白湯下茯苓丸治妊娠煩悶頭暈聞食吐逆或胸腹痞悶赤茯苓人參桂心乾薑炮半夏泡洗炒黃橘紅各一兩白朮炒甘草炒枳殼麩炒各二兩上為末蜜丸桐子大每服五十丸米飲下日三服上原方仍有葛根二兩似非所宜也用者當酌之達生散妊娠臨月服十餘劑則易產或加砂仁枳殼如兼別證以意增減詩云誕彌厥月先生如達注曰先生首生也達小羊也羊子易生故以此名之人參白朮當歸白芍陳皮紫蘇各一錢炙甘草二錢大腹皮酒洗曬乾三錢水一鍾半煎服一方無當歸白芍白朮佛手散一名芎歸湯亦名當歸湯治產後去血過多煩暈不省並一切胎氣不安亦下死胎川芎二錢當歸三五錢上咀每用半兩水煎服若腹疼加桂若腹痛自汗頭眩少氣加羊肉若不應用八珍湯若用下胎當為末以酒調服錢氏生化湯此錢氏世傳治婦人者當歸五錢川芎二錢甘草炙五分焦姜三分桃仁十粒去皮尖雙仁熟地三錢上㕮咀水二鍾棗二枚煎八分溫服一方無熟地附加減法凡胎衣不下或血冷氣閉血枯氣弱等證連服生化湯二三劑即下或用此送益母丸一丸即下蓋益母草行血養血性善走而不傷人者也一凡婦人無論胎前產後皆宜此藥一凡血暈虛暈加荊芥穗六七分一凡產婦氣虛氣脫倦怠無力加人參黃耆一凡陽虛厥逆加附子肉桂一脈虛煩渴加麥冬五味一氣壅有痰加陳皮竹瀝一血虛血燥便結加麻仁杏仁蓯蓉一多汗不眠加茯神棗仁黃耆上體多汗加麻黃根下體多汗加漢防己一煩熱加丹皮地骨皮一口噤如風反張瘛瘲者加荊芥防風各三四分一惡露未盡身發寒熱頭痛脅脹其小腹必然脹痛加紅花丹皮肉桂各三四分玄胡一錢一內傷飲食加山楂陳皮砂仁或神麯麥芽一外傷寒濕或加蒼朮白朮一血積食積胃有燥糞臍腹脹痛加大黃二錢一產後下血不止或如屋漏水沉黑不紅或斷或來或如水或有塊淋瀝不休此氣血大虛之候不可誤用寒涼其脈浮脫者可加附子輩諸陽分藥否則無救矣佛手散單用當歸三錢川芎二錢此即其變方也會稽錢氏世傳曰嘗論產證本屬血虛陰亡陽孤氣亦俱病如大補則氣血陡生倘失調則諸邪易襲四物避芍藥之寒四物得薑桃之妙氣毋耗散法兼補虛食必扶脾勿專消導熱不可用芩連恐致宿穢凝滯寒不宜用桂附反招新血流崩三陽見表證之多似可汗也用麻黃則重竭其陽三陰見里證之劇似可下也用承氣則大涸其血耳聾脅病乃腎虛惡露之停休用柴胡譫語汗多乃元弱似邪之證毋同胃實厥由陽氣之衰難分寒熱非大補不能回陽痓因陰血之虧豈論剛柔非滋營胡以潤絡潮熱似瘧以瘧治則遷延神亂如邪以邪論則立困總屬大虛須從峻補去血多而大便燥蓯蓉加於生化非潤腸和氣之能通患汗出而小便難六君倍用參耆必生津助液之可利加參生化頻服救產後之危活命長生調攝須產前加意當歸川芎湯治小產後瘀血心腹疼痛或發熱惡寒當歸熟地黃白芍藥炒玄胡索炒川芎桃仁紅花香附青皮炒澤蘭牡丹皮上水煎入童便酒各小半若以手按腹愈痛此是瘀血為患宜用此藥或失笑散消之若按之反不痛此是血虛宜用四物參苓白朮若痛而作嘔此是胃虛宜用六君子若或作瀉此是脾虛宜用六君子送二神丸加味芎歸湯治分娩交骨不開或五七日不下垂死者生男女婦人發一握燒存性自死龜殼一個或佔過者亦可酥炙川芎當歸各一兩上咀每用一兩水煎服良久不問生死胎自下當歸黃耆湯方在補陣治妊娠下痢腹痛芎歸補中湯治氣血虛半產川芎當歸黃耆炙白朮炒人參芍藥炒杜仲炒艾葉阿膠炒五味子杵炒各一錢甘草炙五分上每服五錢水煎服若脾氣虛弱須用補中益氣湯若氣虛有火宜用安胎飲保生無憂散臨產服之補其血順其氣或胞胎肥厚根蒂堅牢者皆可使之易產又治小產瘀血腹痛當歸川芎白芍乳香枳殼南木香血餘上等分每服二三錢水煎日二服若胞衣既破其血已涸或元氣困憊急用八珍湯斤許水數碗煎熟時飲救之飲盡再製亦有得生人參黃耆湯治小產氣虛血下不止人參黃耆炒當歸白朮炒白芍炒艾葉各一錢阿膠炒二錢上作一劑水煎服良方牛膝散治胎衣不下腹中脹痛急服此藥腐化而下緩則不救牛膝川芎朴硝蒲黃各三兩當歸一兩半桂心半兩上每服五錢姜三片加生地黃一錢水煎服局方黑神散一名烏金散靈苑方名肉桂散治產後惡露不盡胎衣不下血氣攻心腹痛不止及治脾腎陰虛血不守舍吐衄等證黑豆二兩炒當歸去蘆酒洗熟地蒲黃白芍甘草炙乾薑炮肉桂各一兩上為末每服二錢童便酒各半調服良方黑神散有炮附子半兩無蒲黃簡易黑神散方在和陣治一切失血經驗滑石散治產難凡水下胎干胎滯不生用此最效滑石飛過一兩白蜜香油各半盞上將油蜜慢火熬熟三四沸掠去沫調滑石末頓服外以油調於產婦臍腹上下摩之立效難產方令產婦以自己髮梢含於口中噁心即下亦治胎衣不下良方桂心散治妊娠因病胎不能安者可下之桂心栝蔞牛膝瞿麥各五分或一錢當歸一錢或二三錢上水煎桂香散治胎死腹中不下桂心三錢麝香五分上為末作一服酒調下下胎小品方用麥蘖一升擂碎水二升煮一升服之即下神效按麥蘖能損氣破血如此故凡脾胃虛弱及飲食不化者不宜用明矣又方用牛膝一兩酒一鍾煎七分作二服即下廣濟下胎方並下死胎俱效天花粉四兩肉桂牛膝豆豉各三兩上咀用水七碗煎二碗半分三服每服後一時許又進一服扶羸小品方虛弱人慾下胎宜用此人參粉草川芎肉桂乾薑桃仁黃芩蟹爪上等分每服一兩水二鍾煎八分空心服未動再服下死胎凡胎死腹中其舌多見青黑口中甚穢而嘔腹中不動只覺陰冷重墜者是用平胃散一兩以黃酒河水各一鍾煎至一鍾入朴硝三五錢再煎三五沸溫服其死胎即化水而出萬不失一又方單用朴硝末三錢以熱酒和熱童便調服立出或用佛手散以酒調服亦妙千金去胎方大麥曲五升漬酒一斗煮二三沸去滓分五服隔宿勿食旦再服其胎如糜母無所苦千金不傳良方硫黃散治產後陽氣虛寒玉門不閉硫黃烏賊骨各半兩五味子五錢上為末摻患處日三易硫黃湯治產後玉門不斂陰戶突出硫黃三錢菟絲子吳茱萸各二錢蛇床子一錢半上研勻用水二鍾煎湯頻洗自收良方益母丸一名返魂丹治婦人赤白帶惡露時下不止及治婦人胎前產後經中諸般奇痛無所不療本草云此草胎前無滯產後無虛故名益母益母草一味一名充蔚子一名野天麻方梗對節生葉葉類火麻四五月間開紫花是白花者非上於五月採取曬乾連根莖葉勿犯鐵器磨為細末煉蜜丸如彈子大每服一丸用熱酒和童便化下或隨證用湯引送下一方以此為末每服二錢或酒或童便或隨證用引服之一方凡產時倉卒未合只用生益母草搗汁入蜜少許服之其效甚大一益母膏方依前採取搗爛以布濾取濃汁用砂鍋文武火熬成膏如黑砂糖色為度入瓷罐收貯每服二三匙酒便調下或於治血湯藥中加一匙服之尤妙良方奪命丹治瘀血入胞脹滿難下急服此藥血即消衣自下按此方頗有回生丹之功用下死胎必效須用當歸方附子炮半兩乾漆碎之炒煙盡牡丹皮各一兩上為細末另用大黃末一兩以好醋一升同熬成膏和前藥丸桐子大溫酒吞五七丸一方有當歸一兩回生丹治婦人產後諸疾汙穢未淨及一切實邪疼痛死胎瘀血沖逆等證大黃膏法用蘇木三兩河水五碗煎至三碗去柤聽用紅花三兩炒黃色用好酒一大壺煮十餘滾去柤聽用黑豆三升煮熟存汁三碗去豆去皮曬乾為末俱聽用大黃一斤為末用好醋入碗熬成膏次下紅花酒蘇木湯黑豆汁攪勻又熬成膏盆內收盛候用將鍋焦焙乾為末同豆皮末俱入之人參白朮青皮木瓜各三錢當歸川芎元胡蒼朮香附童便炒蒲黃赤茯苓桃仁泥熟地各一兩牛膝三稜山茱萸五靈脂地榆甘草羌活陳皮白芍各五錢良薑四錢烏藥二兩半木香乳香沒藥各一錢上為末用前大黃膏為丸彈子大金簿為衣不拘時隨證擇用湯引送下一丸斷產灸法一傳方欲絕產者灸臍下二寸三分陰動脈中三壯此當自臍中至骨際折作五寸約之千金斷產方四物湯一劑芸臺子一撮即油菜子紅花水鍾半煎八分經後空心服則不受胎斷產小品方斷產墮胎有驗故蠶蛻紙方一尺上燒為末空心酒調服終身不受孕丹溪斷子法用白麵曲一升無灰酒五升作糊煮至三升半濾去滓分作三服候經至前一日晚五更及天明各吃一服經即不一無不字行終身無子矣仲景羊肉湯治產婦腹中㽲痛寒痛血氣不足虛弱甚者及寒月生產寒氣入於子門手不可犯臍下脹滿此產後之寒證也並治寒疝腹中痛及脅痛裡急者精羯羊肉一斤當歸三兩生薑五兩上用水八升煮取三升加蔥椒鹽溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩良方羊肉湯治產婦脾虛寒邪內乘以致腹痛或頭眩臍脅急痛精羊肉四兩當歸川芎各半兩生薑一兩上以水十盞煎至四盞分四次空心服良方黃雌雞湯治產後虛羸腹痛當歸白朮炒熟地黃黃耆炒桂心各半兩小黃雌雞一隻去頭足腸翅細切上先用水七碗煮雞至三碗每用汁一碗藥四錢煎日三服母雞湯治產後褥勞虛汗不止人參黃耆白朮白茯苓麻黃根牡蠣煅各三錢上用母雞一隻去毛雜淨水六七碗同藥煮至三碗任意服之豬腰湯治產後褥勞寒熱如瘧自汗無力咳嗽頭痛腹痛俱效豬腰一對當歸白芍藥酒炒各一兩上以藥二味用水三碗煎至二碗去滓將豬腰切如骰子塊同晚米一合香豉一錢加蔥椒鹽煮稀粥空心日服一次神效或加人參更妙四神散治產後血虛或瘀血腹痛當歸二錢川芎芍藥炒各一錢炮姜五分上水煎服大岩蜜湯治產後陽氣虛寒心腹作痛不食嘔吐四肢厥逆生地當歸芍藥炒乾薑吳茱萸桂心獨活甘草炒小草各一兩細辛半兩上每服半兩水煎服良方人參湯治產後諸虛不足發熱盜汗內熱晡熱等證此即參歸湯亦名團參散人參當歸等分上為末先以豬腰子一枚切片糯米半合蔥白二莖入水二鍾煎汁八分再入藥三錢煎服白茯苓散治產後褥勞頭目肢體疼痛寒熱如瘧白茯苓一兩人參當歸黃耆川芎白芍藥炒熟地桂心各半兩豬腰一對上以水三盞入豬腰並薑棗各三事煎二盞去柤入前藥半兩煎一盞服良方七珍散治產後不語人參石菖蒲生地川芎各一兩細辛七錢防風硃砂另研各半兩上為末每服一錢薄荷湯調服良方趁痛散治產後骨節疼痛發熱頭重四肢不舉牛膝酒炒甘草炒薤白各一兩當歸白朮炒黃耆炒桂心獨活加姜各半兩上每服半兩水煎補脬飲治產後傷動脬破不能小便而淋瀝生黃絲絹一尺剪碎白牡丹皮根白芨各一錢俱為末用水一碗同煮至絹爛如餳空心頓服服時不得作聲作聲則不效良方止汗散牡蠣煅粉半兩小麥麩八兩炒黃為細末上每服三五錢用豬肉汁調服良方麻黃根湯治產後虛汗不止身熱發渴驚悸不安麻黃根人參黃耆炒當歸牡蠣煅粉甘草炒等分上每服四五錢水煎服二味參蘇飲治產後瘀血入肺咳嗽喘急人參一兩蘇木二兩上作一劑水煎服若既愈當用六君子以補脾胃若口鼻黑氣起宜急用此藥加附子五錢亦有得生者良方黃龍湯治妊婦寒熱頭疼嘿嘿不食脅痛嘔痰及產後經後外感風寒熱入胞宮寒熱如瘧等證按此即小柴胡湯之去半夏也柴胡二錢黃芩炒人參甘草各一錢上用水煎服陳氏二母散治產後熱血上攻留於肺經咳嗽喘促知母貝母人參桃仁杏仁俱去皮尖白茯苓上等分每服五錢薑水煎服豬蹄湯治氣血不足乳汁不下用八物湯加黃耆漏蘆陳皮木通先以豬蹄煮汁二碗煎藥服之或加天花粉又方用豬蹄一副通草二兩川芎一兩甘草一錢穿山甲十四片炒將豬蹄洗切入水六碗同藥煎煮約至三碗加蔥薑鹽料取汁飲之忌冷物要吃羹湯助其氣血乳汁自下夏月不可失蓋時用蔥湯洗乳為佳良方湧泉散下乳忌食薑椒辛辣飲食王不留行瞿麥麥門冬龍骨各二錢上用豬蹄汁一碗酒一杯煎服以木梳於乳上梳下玉露散治產後乳脈不行身體壯熱頭目昏痛大便澀滯人參白茯苓當歸炙甘草各五分桔梗川芎白芷各一錢芍藥七分上水煎食後服如熱甚大便秘結加大黃三五分炒用良方漏蘆湯治婦人肥盛脈氣壅結乳少漏蘆二兩蛇蛻一條土瓜根上共為末酒調下二錢栝蔞散治吹乳腫痛栝蔞一個乳香二錢上用酒煎服外用南星為末以溫湯調塗滑氏補肝散治肝腎二經氣血虧損脅脹作痛或脅脹頭暈寒熱發熱或遍身作痛經候不調熟地白朮炒各一兩棗仁炒獨活各四兩當歸川芎黃耆炒山藥五味子炒杵山茱萸肉木瓜各半兩上㕮咀每服五錢棗水煎服金匱膠艾湯治勞傷血氣衝任虛損月水過多淋瀝不止阿膠炒川芎炙甘草各一兩艾葉當歸各兩半白芍熟地各二兩上㕮咀每服五錢水煎服一方加地榆黃耆即名安胎散集驗加味八珍湯治婦人思慮過傷飲食日減氣血兩虛月經不調夜夢交感或出盜汗寢成勞損人參白朮茯苓當歸生地各一錢炙甘草川芎芍藥軟柴胡黃耆各五分香附制丹皮各八分水鍾半大棗一枚煎七分食前服集驗調衛養榮湯治婦人室女一切月經不調或先或後或絕閉不通憎寒壯熱口苦無味咳嗽躁煩頭眩漸成勞證者當歸生地麥冬沙參陳皮白朮各一錢牡丹皮地骨皮各八分柴胡梢桔梗各五分穀芽一錢甘草四分上加蓮子薑棗水煎服痰中見血加側柏葉煩躁口乾加炒山梔倍麥門冬脅下脹疼加青皮川芎胸膈滿悶加黃連姜炒枳實去麥冬地骨皮夜出盜汗加黃連黃耆去柴胡桔梗大便秘結加桃仁倍當歸咳嗽不已加栝蔞仁阿膠小水不利加木通茯苓良方當歸散治經水妄行不止及產後氣血虛弱惡露內停憎寒發熱宜服此去之當歸酒洗川芎白芍炒白朮炒黃芩炒各半兩山茱萸肉一兩半上為末每服二錢酒調日三服一方無山茱萸氣虛者去芩加桂心一兩良方丹參散良方云丹參一味其治頗類四物湯能破宿血補新血安生胎落死胎止崩中帶下調經下產後惡血兼治冷熱勞腰脊痛骨節煩疼丹參酒洗去土晾乾切上為細末每服二錢溫酒調下經脈不調食前服冷熱勞不拘時服玄胡當歸散亦名延胡索散治血積小腹疼痛或因氣逆月經不行肚腹作痛當歸赤芍藥劉寄奴沒藥枳殼麩炒玄胡索炒上為末每服一錢熱酒調下牛膝散治月水不利臍腹作痛或小腹引腰氣攻胸膈當歸酒浸牛膝酒炒赤芍藥桂心桃仁去皮尖玄胡索炒牡丹皮各一兩木香三錢上為末每服一錢溫酒調下或每服五七錢水煎服良方交加散治經脈不調腹中撮痛或結聚癥瘕產後中風又交加散方在和陣生地一斤取汁生薑十二兩取汁上以地黃汁炒姜柤薑汁炒地黃柤干為末每服三錢溫酒調服加芍藥玄胡當歸蒲黃桂心各一兩沒藥紅花各五錢尤效薑黃散治瘀血凝滯肚腹刺痛或腹脹發熱等證薑黃當歸酒拌各二錢蓬朮醋炒紅花桂心川芎玄胡索炒丹皮各五分上水酒