產後腹痛吐逆子死腹中氣滿煩悶臍腹作痛月水不通中風口噤痢疾消渴敗血上衝頭疼寒熱血運血泄見鬼迷悶產後傷寒虛煩勞瘦凡婦人諸疾不問久近並宜服之兼治男子下虛無力等證人參白朮炒茯苓炙甘草當歸川芎白芍白薇酒洗丹皮白芷藁本肉桂玄胡沒藥另研赤石脂另研上各一兩香附醋浸三日炒香十五兩上共十六味為末煉蜜丸彈子大以瓷瓶收貯封固每服一丸空心溫酒化下食乾物壓之服至四十九丸為一劑以癸水調平受妊為度妊中三五日服一丸產後二三日服一丸醋湯下亦妙琥珀丸治婦人或老或少或產前產後百病及療三十六種諸病七疝八瘕心腹刺痛卒中癱瘓半身不遂八風十二痹手足痠疼乳中結核結毒懷胎驚動傷犯不安死胎不下並治琥珀硃砂各另研沉香阿膠炒珠附子制川芎肉桂五味子石斛各五錢牛膝酒浸當歸肉蓯蓉酒洗曬人參熟地續斷木香沒藥各一兩一方有牛黃珍珠乳香玄胡各一兩共二十一味上煉蜜為丸彈子大每服一丸空心食前午後溫酒化開服凡服法或薑湯或米湯或酒或燈草湯或隨證用引皆可下若傷寒中風角弓反張用麻黃湯隨證改湯引送下孕婦臨月宜一日一服至產順利不覺疼痛凡婦人服至五服十服之後日倍飲食其功言不盡述服者當自覺也延年益嗣丹滋補元氣益精黑髮按此方即還元丹也但製法分兩不同宜參酌用之方在補陣人參天門冬酒浸去心麥門冬同上各三兩熟地黃酒蒸搗生地黃各二兩白茯苓酒浸曬乾地骨皮酒浸各五兩何首烏鮮者半斤上將何首烏去皮切片如干者用米泔水浸軟拈切外用砂鍋入黑羊肉一斤黑豆三合量著水上用甑箅箅上放首烏煮而蒸之以肉爛為度鍋蓋須密勿令泄氣取起曬乾為末煉蜜丸梧子大每服七八十丸空心溫酒送下續嗣降生丹治婦人五臟虛損子宮冷憊不能成孕並治男子精寒不固陽事衰弱白濁夢泄婦人帶下寒熱諸虛百損盜汗短氣無不感應此方乃溫隱居求嗣保生篇所載云東京焦員外三世無嫡嗣後遇一神僧問其故曰無嗣者有三一祖宗無德自身無行二夫妻年命恐犯禁忌三精神不守妻妾血寒焦公曰治之有道乎僧曰先修德後修身三年之後到台山令行童賜以方藥名續嗣降生丹依方服之後不及二十年子孫數人皆貴顯此方無怪誕克伐之品且溫且固凡血海虛寒者服之必佳但溫力有餘補力不足倘益以人參白朮熟地川芎炙甘草各一兩則八珍全而溫補贊育之功當非淺也因命名曰加味續嗣降生丹當歸酒洗杜仲酒炒茯神益智仁龍骨煅桂心吳茱萸制乾薑半生半熟川椒去目臺烏藥各一兩白芍藥酒炒川牛膝酒浸半夏制防風秦艽石菖蒲去毛北細辛桔梗各五錢附子一枚重一兩者臍下作一竅入硃砂一錢麵裹煨熟取出硃砂留為衣牡蠣大片者以童便浸四十九日每五日一換取出用硫黃一兩為末酒和塗遍用皮紙糊實米醋浸濕外以鹽泥厚固之候乾用炭五斤煅過為末每料止用二兩余可收貯再用上為末以酒煮糯米糊為丸梧子大以前硃砂為衣每服三五十丸漸至七八十丸空心滾白湯或鹽湯溫酒下河車種玉丸紫河車一具只要母氣壯盛厚大新鮮者但去胞內瘀血不必挑去鮮紅血脈以米泔水洗淨用布絞乾石臼內生杵如糊用山藥末四五兩收干捻為薄餅八九個於砂鍋內焙乾以香如肉脯為妙大熟地酒洗烘乾八兩枸杞烘乾五兩白茯苓人乳拌曬三次歸身酒洗人參菟絲制阿膠炒珠各四兩丹皮酒洗白薇酒洗各二兩沉香一兩桂心山茱萸香附米用酒醋水三件各半碗浸三日曬乾略烘各三兩大川芎酒浸切片曬乾二兩上煉蜜和丸桐子大每服百餘丸空心或酒或白湯鹽湯任下如帶濁多者加赤白石脂各二兩須以清米泔飛過用服藥後忌生蘿蔔生藕蔥蒜綠豆粉之類八珍益母丸治血氣兩虛脾胃並弱飲食少思四肢無力月經不調或腰痠腹脹或斷或續赤白帶下身作寒熱罔不獲效服一月之後即可受胎虛甚者用藥一觔必能受子人參白朮土炒茯苓川芎各一兩當歸酒洗熟地酒洗各二兩炙甘草五錢芍藥醋炒一兩益母草四兩五六月採取止用上半截帶葉者不見鐵器曬杵為末上為末煉蜜丸彈子大空心蜜湯或酒下一丸或為小丸亦可脾胃虛寒多滯者加砂仁一兩薑汁炒腹中脹悶者加山楂肉一兩飯上蒸熟多郁者加香附一兩酒製此徐思鶴醫統方又一方名八珍益母十全丸於前方內用益母草八兩外加沉香四錢思鶴曰資益坤元補養氣血除淋帶壯形體胎前和氣產後補虛真婦人之聖劑超古今之神方有室家者不可不知也予哂斯世之醫惟集古方香附勝金丹為女人開鬱調經之要藥殊不審古今虛實之異古人氣實故可用香附開導香附味辛性燥但能開破而已多用之大耗氣血虛者愈甚病者愈甚而於滋補何有哉今世十婦九虛非補不可再用香附以耗之寢成怯弱之證是辨之不早則危殆而難痊矣婦人經脈不調或氣血兩虛而身體素弱者宜服此以調養之經不通者服一料即通不調者一月即調素不孕者服一月即孕胎前間用一服則胎固而安產後用一服以童便酒化開調下則無壅滯血運之候多服之補虛活血凡治產後諸病極穩若急欲取效以酒調化服烏雞丸治婦人羸弱血虛有熱經水不調崩漏帶下骨蒸不能成胎等疾烏骨白毛公雞一隻重二斤半許者閉殺之去毛雜外用艾葉四兩青蒿四兩切碎納一半在雞肚內以小酒罈一個入雞並所剩蒿艾用童便和水灌令沒雞二寸許煮絕干取出去骨余俱同搗如薄餅焙乾為細末聽用南香附去毛淨一斤分四分用米泔童便酒醋各浸一分春秋一二日夏一日冬四日取出曬乾略炒人參熟地當歸酒浸洗生地川芎白芍各三兩黃耆白朮川牛膝柴胡知母丹皮各二兩鱉甲醋浸炙黃三兩白茯苓二兩半秦艽一兩半黃連炒地骨皮貝母玄胡索乾薑炮焦各一兩上俱為末用酒醋各半煮糊為丸桐子大每服五六十丸漸加至百丸溫酒米飲任下忌煎炒辛辣等物及莧菜又烏雞丸熟地當歸白朮山藥山茱萸棗肉柿餅蓮肉各四兩黃耆蜜炙三兩鹿角膠狗脊杜仲枸杞蓮鬚香附阿膠川芎各二兩烏藥一兩半上藥制淨用烏骨雞一隻悶殺之干去毛去雜連骨椎碎用酒醋各半同藥煮熟去骨烘乾共為末即將余汁少入面打糊為丸任意用引送下唐氏烏雞丸人參懷生懷熟青蒿子去梗香附四制鱉甲各三兩白朮棗仁肉枸杞麥冬雲苓地骨皮去骨丹皮去骨白芍各二兩歸身二兩半川芎甘草各一兩上先將諸藥備完聽用乃取絲毛烏骨白公雞一隻約重一斤許者撲倒去毛穢頭足腸雜不用將雞切作四塊先以鱉甲鋪銅鍋底次入雜藥以免焦腐漸漸加童便約至鬥許煮至極爛撈起曬乾為末將鱉甲去裙並雞骨俱以原汁醮炙至干為末同前藥煉蜜為丸桐子大每空心用清湯送下百餘丸秘方烏雞煎丸治婦人百病血氣虛勞赤白帶下人參官桂地骨皮各二兩茯苓三兩黃耆蜜炙當歸各六兩生地熟地香附各四兩上將烏骨白雞一隻男用雌女用雄籠住將黃耆末和炒麵丸如芡實餵雞二七日將雞縛死干掃去毛並腸雜令淨捶碎其骨入前藥於腹內縫密用酒醋各一瓶煮一宿取去骨焙乾為末用前汁打麵糊丸桐子大每服五六十丸空心鹽湯下萬病丸治月經瘀閉臍腹作痛及產後癥瘕等病乾漆炒煙出青白為度牛膝酒洗焙各一兩上為末生地黃汁一升用砂鍋慢火熬膏丸桐子大每服二十丸空心米飲下以下通用方四君子湯方在補陣治脾肺氣虛諸證六君子湯方在補陣治脾胃虛弱嘔吐吞酸等證五味異功散方在補陣治脾胃虛寒飲食少思等證補中益氣湯方在補陣治勞倦傷脾外感不解寒熱瘧痢氣虛不能攝血等證四物湯方在補陣治一切血虛勞弱之病八珍湯方在補陣治氣血兩虛調和陰陽十全大補湯方在補陣治氣血俱虛補救元陽歸脾湯方在補陣治心脾虛損人參理中湯方在熱陣溫中補脾胃虛寒諸證逍遙散方在補陣治肝脾血虛鬱怒傷肝等證加味逍遙散方在補陣治肝脾血虛發熱等證七味白朮散方在小兒治虛熱作渴六味地黃丸方在補陣壯水制火之劑八味地黃丸方在補陣治命門火衰之劑薛氏四神丸方在熱陣治脾胃虛寒泄痢五積散方在散陣治感冒寒邪參蘇飲方在散陣治四時傷寒感冒人參敗毒散方在散陣治四時傷寒瘟疫當歸六黃湯方在寒陣治血熱陰虛盜汗柴胡清肝散方在寒陣治肝膽風熱瘡瘍怒火寒熱梔子清肝散方在寒陣治肝膽三焦風熱八正散方在寒陣治臟腑秘結小便赤澀五苓散方在和陣治小便不利犀角地黃湯方在寒陣治心火動血及斑黃瘡疹導赤散方在寒陣治心火及小腸熱秘淋澀桃仁承氣湯方在攻陣治瘀血小腹作痛其人如狂玉燭散方在攻陣治血虛有滯經閉不通腎著湯方在熱陣治腎虛身重腰冷舒筋湯方在和陣治產後血滯作痛交加散方在和陣治產後口吐涎沫不省人事加味小柴胡湯方在散陣治乳母肝火發熱良方蜜酥煎方在補陣補虛潤肺止咳嗽柴胡石膏湯方在散陣治少陽陽明外感挾火發熱頭痛都梁丸方在散陣治胎前產後傷風頭痛瓜子仁湯方在外科治產後瘀血腸癰腹中㽲痛子和通經散方在攻陣治氣逆經閉二神散方在寒陣治吐血血崩下血小薊飲子方在寒陣治小焦結熱溲血崩淋海藏愈風湯方在和陣治一切失血及產後搐搦鎖精丸方在固陳治白濁白帶青蛾丸方在補陣治腎虛腰痛獨參湯方在補陣治諸氣虛脫奪命散方在補陣治陽邪傷氣暴脫煩躁發渴
