body:
  text: 卷之二十四心集雜證謨泄瀉經義金匱真言論曰長夏善病洞泄寒中陰陽應象大論曰清氣在下則生飧泄濁氣在上則生䐜脹濕勝則濡泄春傷於風夏生飧泄水穀之寒熱感則害人六腑藏氣法時論曰脾病者虛則腹滿腸鳴飧泄食不化百病始生篇曰虛邪之中人也留而不去傳舍於腸胃多寒則腸鳴飧泄食不化多熱則溏出糜舉痛論曰寒氣客於小腸小腸不得成聚故後泄腹痛矣怒則氣逆甚則嘔血及飧泄故氣上矣經脈篇曰脾所生病心下急痛溏瘕泄肝所生病胸滿嘔逆飧泄狐疝宣明五氣篇曰大腸小腸為泄厥論曰少陰厥逆虛滿嘔變下泄清太陰陽明論曰食飲不節起居不時者陰受之陰受之則入五臟入五臟則䐜滿閉塞下為飧泄久為腸澼陰陽別論曰一陽發病少氣善咳善泄邪氣臟腑病形篇曰肺脈小甚為泄腎脈小甚為洞泄脈要精微論曰胃脈實則脹虛則泄數動一代者病在陽之脈也泄及便膿血久風為飧泄倉廩不藏者是門戶不要也水泉不止是膀胱不藏也得守者生失守者死平人氣象論曰尺寒脈細謂之後泄玉機真藏論曰脈細皮寒氣少泄痢前後飲食不入此謂五虛泄而脈大脫血而脈實皆難治師傳篇曰臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄論疾診尺篇曰大便赤瓣飧泄脈小者手足寒難已飧泄脈小手足溫泄易已春傷於風夏生後泄腸澼咳論曰五臟各以治時感於寒則受病微則為咳甚則為泄為痛熱病篇曰泄而腹滿甚者死玉版篇曰其腹大脹四末清脫形泄甚是一逆也腹鳴而滿四肢清泄其脈大是二逆也咳嘔腹脹且飧泄其脈絕是五逆也標本病傳論曰先病而後泄者治其本先泄而後生他病者治其本四時氣篇曰飧泄取三陰之上補陰陵泉皆久留之熱行乃止氣交變大論曰歲木太過民病飧泄食減體重煩冤腸鳴腹支滿歲火太過民病血溢血泄注下歲土太過民病腹滿溏泄腸鳴反下甚歲水太過上臨太陽病反腹滿脹鳴溏泄食不化歲木不及民病少腹痛腸鳴溏泄歲火不及復則埃郁病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛歲土不及民病飧泄霍亂體重腹痛歲金不及民病血便注下歲水不及民病身重濡泄五常政大論曰卑監之紀上角與正角同其病飧泄邪傷脾也發生之紀上徵則其氣逆其病吐痢六元正紀大論曰不遠熱則熱至不遠寒則寒至寒至則堅痞腹滿痛急下痢之病生矣熱至則身熱吐下霍亂血溢血泄淋閟之病生矣太陰所至為中滿霍亂吐下厥陰所至為脅痛嘔泄少陽所至為暴注太陽所至為流泄禁止至真要大論曰歲少陽在泉火淫所勝民病注泄赤白少腹痛尿赤甚則血便少陰同候厥陰司天風淫所勝民病食則嘔冷泄腹脹溏泄瘕水閉病本於脾少陽司天火淫所勝民病泄注赤白陽明司天燥淫所勝民病寒清於中感而瘧咳腹中鳴注泄鶩溏病本於肝厥陰之勝腸鳴飧泄少腹痛注下赤白少陰之勝腹滿痛溏泄傳為赤沃太陰之勝濕化乃見善注泄陽明之勝清發於中左胠脅痛溏泄太陽之勝寒入下焦傳為濡泄陽明之復清氣大舉甚則心痛痞滿腹脹而泄諸病水液澄澈清冷皆屬於寒暴注下迫皆屬於熱論證共三條凡內經有言飧泄者有言濡泄者皆泄瀉也有言腸澼者即下痢也然痢之初作必由於瀉此瀉之與痢本為同類但瀉淺而痢深瀉輕而痢重瀉由水穀不分出於中焦痢以脂血傷敗病在下焦在中焦者濕由脾胃而分於小腸故可澄其源所以治宜分痢在下焦者病在肝腎大腸分痢已無所及故宜調理真陰並助小腸之主以益氣化之源此瀉痢之證治有不同而門類亦當有辨然病實相關不可不兼察以為治也一泄瀉之本無不由於脾胃蓋胃為水穀之海而脾主運化使脾健胃和則水穀腐熟而化氣化血以行營衛若飲食失節起居不時以致脾胃受傷則水反為濕谷反為滯精華之氣不能輸化乃致合汙下降而瀉痢作矣脾強者滯去即愈此強者之宜清宜利可逐可攻也脾弱者因虛所以易瀉因瀉所以愈虛蓋關門不固則氣隨瀉去氣去則陽衰陽衰則寒從中生固不必外受風寒而始謂之寒也且陰寒性降下必及腎故瀉多必亡陰謂亡其陰中之陽耳所以泄瀉不愈必自太陰傳於少陰而為腸澼腸澼者豈非降泄之甚而陽氣不升臟氣不固之病乎凡脾胃氣虛而有不升不固者若復以寒之復以逐之則無有不致敗者此強弱之治大有不同故凡治此者有不可概言清利也一泄瀉之因惟水火土三氣為最夫水者寒氣也火者熱氣也土者濕氣也此瀉痢之本也雖曰木亦能瀉實以土之受傷也金亦能瀉實以金水同氣因其清而失其燥也知斯三者若乎盡矣然而三者之中則又惟水火二氣足以盡之蓋五行之性不病於寒則病於熱大都熱者多實虛者多寒凡濕熱之證必其脈盛形強聲音壯亮食飲裕如舉動輕捷者此多陽也虛寒之證必其脈息無力形氣少神言語輕微舉動疲倦者此多陰也故必察其因而於初瀉之時即當辨其有餘不足則治無不愈而亦不致有誤矣分痢治法共二條凡泄瀉之病多由水穀不分故以痢水為上策然痢水之法法有不同如濕勝無寒而瀉者宜四苓散小分清飲之類主之但欲分其清濁也如濕挾微寒而瀉者宜五苓散胃苓湯之類主之以微溫而痢之也如濕熱在脾熱渴喜冷而瀉者宜大分清飲茵陳飲益元散之類主之去其濕熱而痢之也一泄瀉之病多見小水不利水穀分則瀉自止故曰治瀉不利小水非其治也然小水不利其因非一而有可利者有不可利者宜詳辨之如濕勝作瀉而小水不利者以一時水土相亂並歸大腸而然也有熱勝作瀉而小水不利者以火乘陰分水道閉澀而然也有寒瀉而小水不利者以小腸之火受傷氣化無權而然也有脾虛作瀉而小水不利者以土不制水清濁不分而然也有命門火衰作瀉而小水不利者以真陰虧損元精枯涸而然也凡此皆小水不利之候然惟暴注新病者可痢形氣強壯者可痢酒濕過度口腹不慎者可利實熱閉澀者可痢小腹脹滿水道痛急者可痢又若病久者不可痢陰不足者不可痢脈證多寒者不可痢形虛氣弱者不可痢口乾非渴而不喜冷者不可痢蓋虛寒之瀉本非水有餘實因火不足本非水不痢實因氣不行夫病不因水而痢則亡陰瀉以火虛而痢復傷氣倘不察其所病之本則未有不愈痢愈虛而速其危者矣諸泄瀉論治共九條一泄瀉之暴病者或為飲食所傷或為時氣所犯無不由於口腹必各有所因宜察其因而治之如因食生冷寒滯者宜抑扶煎和胃飲之屬以溫之因濕滯者宜平胃散胃苓湯或白朮芍藥散以燥之痢之因食滯而脹痛有餘者宜大小和中飲之屬以平之因氣滯而痛瀉之甚者宜排氣飲或平胃散之屬以調之因食滯而固結不散或胃氣之強實者宜神佑丸赤金豆百順丸之屬以行之凡初感者病氣未深臟氣未敗但略去其所病之滯則胃氣自安不難愈也一凡脾氣稍弱陽氣素不強者一有所傷未免即致泄瀉此雖為初病便當調理元氣自非強盛偶傷者之比如因瀉而神氣困倦者宜養中煎或溫胃飲或聖朮煎或四君子湯或五君子煎如微寒兼滯而不虛者宜佐關煎若脾虛而微滯者宜五味異功散若脾虛而微寒微滯者宜六味異功煎或溫胃飲若因飲食不調忽而溏瀉以漸而甚或見微痛但所下酸臭而顏色淡黃便是脾虛胃寒不化之證即宜用五德丸再甚者即宜用胃關煎切勿疑也一凡兼真陰不足而為泄瀉者則或多臍下之痛或於寅卯時為甚或食入已久反多不化而為嘔惡溏瀉或瀉不甚臭而多見完穀等證蓋因丹田不暖所以尾閭不固陰中少火所以中焦易寒此其咎在下焦故曰真陰不足也本與中焦無涉故非分利所及也惟胃關煎一劑乃為最上之乘且人之患此者最多勿謂其為新病而不可用也勿謂其為年少而未宜用也覺有是證即宜是藥劑少功多攸利非小但知者見其先昧者見其後見其後恐見之遲矣所以貴見先也一腎泄證即前所謂真陰不足證也每於五更之初或天將明時即洞泄數次有經月連年弗止者或暫愈而復作者或有痛者或有不痛者其故何也蓋腎為胃關開竅於二陰所以二便之開閉皆腎臟之所主今腎中陽氣不足則命門火衰而陰寒獨盛故於子醜五更之後當陽氣未復陰氣盛極之時即令人洞泄不止也古方有椒附丸五味子散皆治此之良方若必欲陽生於陰而腎氣充固則又惟八味地黃丸為宜然余嘗用此則似猶未盡善故特製胃關煎一氣丹九氣丹復陽丹之屬斯得其濟者多矣或五味子丸亦佳其有未甚者則加五德丸四神丸皆其最宜者也一凡脾泄久泄證大都與前治脾弱之法不相遠但新瀉者可治標久瀉者不可治標且久瀉無火多因脾腎之虛寒也若止因脾虛者惟四君子湯參朮湯參苓白朮散之屬為宜若脾胃兼寒者宜五君子煎黃芽丸五德丸若脾氣虛寒兼滯悶者宜六味異功煎溫胃飲聖朮煎若脾氣虛寒之甚而飲食減少神疲氣倦宜參附湯朮附湯十全大補湯若病在下焦腎氣虛而微熱者宜六味地黃湯微寒者宜八味地黃湯或胃關煎若脾虛溏泄久不能愈或小兒脾泄不止者止用敦阜糕黏米固腸糕亦易見效若脾胃寒濕而溏泄不止者蒼朮丸亦佳若久瀉元氣下陷大腸虛滑不收者須於補劑中加烏梅五味子粟殼之屬以固之一大瀉如傾元氣漸脫者宜速用四味回陽飲或六味回陽飲主之凡暴瀉如此者無不即效若久瀉至此猶恐無及蓋五奪之中惟瀉最急是不可見之不早也倘藥未及效仍宜速灸氣海以挽回下焦之陽氣仍須多服人參膏一酒瀉證飲酒之人多有之但酒有陰陽二性人有陰陽二臟而人多不能辨也夫酒性本熱酒質則寒人但知酒有濕熱而不知酒有寒濕也故凡因酒而生濕熱者因其性也以糵汁不滋陰而悍氣生熱也因酒而生寒濕者因其質也以性去質不去而水留為寒也何以辨之常見人有陽強氣充而善飲者亦每多泄瀉若一日不瀉反云熱悶蓋其隨飲隨瀉則雖瀉不致傷氣而得瀉反以去濕此其先天稟厚胃氣過人者也最不易得亦不多見此而病者是為陽證不過宜清宜利如四苓散大分清飲或酒蒸黃連丸之類去其濕熱而病可愈也若陽虛之人則與此大異蓋脾虛不能勝濕而濕勝即能生寒陽氣因寒所以日敗胃氣因濕所以日虛其證則形容漸羸飲食漸減或脈息見弦細或口體常怯寒或臍腹常有隱疼或眩暈常多困倦或不安於五鼓或加甚於秋冬但無熱證可據而常多飧泄者則總屬虛寒也凡若此者若不速培陽氣必致漸衰而日以危矣余於四旬之外亦嘗病此數年其勢已窘因遍求治法見朱丹溪曰因傷於酒每晨起必瀉者宜理中湯加葛根或吞酒蒸黃連丸王節齋曰飲酒便泄者此酒積熱瀉也宜加黃連茵陳乾薑木香之屬薛立齋曰若酒濕未散脾氣未虛宜用此藥分利濕熱若濕熱已去中氣被傷宜用六君調補中氣又曰酒性大熱乃無形之物無形元氣受傷當用葛花解酲湯分消其濕凡此諸論若已盡之然朱王二家之說則不分寒熱皆用黃連是但知酒之有熱而不知酒之有寒烏足憑也惟薛氏之說雖亦云酒性大熱而所重在脾誠若善矣余因效之初服葛花解酲湯不效繼服六君子補中益氣湯又不效再服理中以至八味俱不效斯時也計窮力竭若無再生之望矣因潛思熟計料非峻補命門終無益也乃自制胃關煎右歸丸一氣丹等方以治其病仍絕口不飲以杜其源調理年餘竟得全愈自後始明性質之理多得濟人向使己無確見執信濕熱之說而妄用黃連乾葛清涼分利之劑則焉望其有今日即或自用稍遲則既甚亦難挽矣矧今人之病此者最多而是陰是陽不可不辨凡陽盛者脾強胃健而氣不易奪者也故治本無難而泄亦無慮陽衰者脾腎既傷則脫氣最易故宜防其無及不可不為深慮也若必以酒為熱則其為古法所誤者誠不少矣一氣泄證凡遇怒氣便作泄瀉者必先以怒時挾食致傷脾胃故但有所犯即隨觸而發此肝脾二臟之病也蓋以肝木剋土脾氣受傷而然使脾氣本強即見肝邪未必能入今既易傷則脾氣非強可知矣故治此者當補脾之虛而順肝之氣此固大法也但虛實有微甚則治療宜分輕重耳如稟壯氣實年少而因氣泄瀉者可先用平胃散或胃苓湯若肝氣未平而作脹滿者宜解肝煎先順其氣若脾氣稍弱者宜二術煎或黏米固腸糕或消食導氣飲若脾氣稍寒者宜抑扶煎吳茱萸散或蒼朮丸若脾弱居多者宜溫胃飲聖朮煎或六味異功煎若既畏此證為患則必須切戒氣怒一風泄證亦當辨其風寒風熱而治之熱者如傷寒外感熱二之屬是也宜以傷寒門自利條諸法治之寒者以風寒在胃而脾土受傷如內經所云春傷於風夏生飧泄之屬是也宜以前溫胃理中之法治之述古共六條丹溪曰世俗例用澀藥治瀉若瀉而虛者或可用之若初得之者必變他證為禍不小殊不知瀉多因濕惟分利小水最為上策薛立齋曰凡傷食瀉黃若飲食已消而泄瀉未止此脾胃之氣傷也宜用五味異功散若泄瀉而腹中重墜此脾氣下陷也宜補中益氣湯若服克伐之劑而腹中窄狹此脾氣虛痞也宜六君子湯若脅脹善怒瀉青此肝乘脾虛也宜六君加柴胡升麻木香若少食體倦善噫瀉黃此脾虛色陷也宜六君加升麻柴胡又立齋曰凡久瀉脾胃虛弱或作嘔或飲食少思屬脾胃虛弱用四君子加半夏木香或腹痛屬脾胃虛寒用六君加炮薑木香大抵此證多由泛用消食利水之劑損其真陰元氣不能主持遂成久瀉若非補中益氣湯四神丸滋其本源後必胸痞腹脹小水淋瀝多致不起又立齋曰若久瀉腸胃滑泄不禁但脾胃虛寒下陷者用補中益氣湯加木香肉豆蔻補骨脂若脾氣虛寒不禁者用六君子湯加炮薑肉桂若命門火衰而脾土虛寒者用八味丸若脾腎俱虛者用十全大補湯送四神丸若大便滑痢小便閉澀或肢體漸腫喘嗽唾痰脾腎氣血俱虛宜用十全大補湯送四神丸或宜加減金匱腎氣丸每見元氣既虛而復用五苓之類因損真陰以致前證益甚者急投金匱腎氣丸多有得生者若反用牽牛大黃峻劑而通之是速其危也又立齋曰大凡黃連枳實雖消停滯開痞悶若人脾胃充實暴患實痞宜暫用之若屢患屢服或脾胃虛痞者用之則脾胃反傷而諸證蜂起矣故東垣先生曰脾胃實者用黃連枳實瀉之虛者用白朮陳皮補之徐東皋曰大抵諸泄瀉證各宜以類推求必先分痢後實脾土益元氣無不全愈泄瀉論列方四苓散和一八七五苓散和一八二胃苓湯和百九十平胃散和十七益元散寒百十二茵陳飲新寒八理中湯熱一溫胃飲新熱五二術煎新和十二聖朮煎新熱二五胃關煎新熱九佐關煎新熱十十全大補湯補二十抑扶煎新熱十一養中煎新熱四補中益氣湯補三十參朮湯補四十參附湯補三七五味異功散補四敦阜糕新固十右歸飲新補三右歸丸新補四六味異功煎新熱七解肝煎新和十一朮附湯補四一四味回陽飲新熱一排氣飲新和六蒼朮丸新和十七六味回陽飲新熱二五德丸新熱十八四神丸熱一五二六味地黃湯補百二十一氣丹新熱二二九氣丹新熱二三八味地黃湯補一二一黃芽丸新熱二一復陽丹新熱二十參苓白朮散補五四椒附丸熱百十二人參膏補一六三白朮芍藥散和三五神佑丸攻四八赤金豆新攻二葛花解酲湯和一二四四君子湯補一百順丸新攻六五味子散熱一四九加減金匱腎氣丸補一二四大和中飲新和七五君子煎新熱六黏米固腸糕新固七大分清飲新寒五小和中飲新和八消食導氣飲和一九七小分清飲新和十吳茱萸散熱一三九酒蒸黃連丸寒一七九論外備用方歸脾湯補三二脾虛泄瀉加味六君湯補六脾虛藿香正氣散和二十風寒益黃散和十九脾寒氣滯茯苓湯和一八九濕熱白朮芍藥湯和三四濕瀉滲濕湯和一七四寒濕胃風湯散五七風濕升陽除濕湯和一七九調脾曲術丸和二百一暑濕暴瀉術己丸和一百二濕熱豬苓湯和一八九發熱小水不利草果散和一九五寒痛泄大七香丸和一三一寒氣調胃白朮散和三三行氣和胃太平丸寒百十九熱瀉大橘皮湯和一九六濕熱水瀉橘半胃苓湯和一九一補胃和胃薷苓湯寒百十八暑瀉黃芩芍藥湯寒八九熱瀉真人養臟湯和一九四調脾胃愛散熱七十虛寒八味湯熱一四一虛寒滯八味理中丸熱七脾胃虛寒二神丸熱百五十脾胃虛寒蓽茇丸熱一五六中寒附子理中湯熱一漿水散熱一四七陰毒九寶丹熱一四三溫補脾胃吳茱萸湯熱一三七暑濕受寒四柱散熱一四四冷痛泄瀉陳曲丸熱一六三磨積止瀉附子茴香散熱一四八暖胃和中鐵刷散熱百九寒濕泄瀉縮脾丸熱一六一濕澀澹寮四神丸熱一五二腎泄補脾湯熱六八胃寒小已寒丸熱一六九中寒洞泄五味子丸熱一五五脾腎泄養胃湯熱六九虛寒痛泄厚朴丸熱百六十寒滯脹泄白朮聖散子熱一三六固腸溫胃肉豆蔻丸熱一五七臟寒滑泄小安腎丸熱一六七久瀉訶梨勒丸熱一五九寒滑固脹丸固五三溫補固澀泄瀉經驗方固四九痢疾經義通評虛實論帝曰腸澼便血何如岐伯曰身熱則死寒則生帝曰腸澼下白沫何如岐伯曰脈沉則生脈浮則死帝曰腸澼下濃血何如曰脈懸絕則死滑大則生帝曰腸澼之屬身不熱脈不懸絕何如曰滑大者曰生懸澀者曰死以臟期之百病始生篇曰陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血太陰陽明論曰食飲不節起居不時者陰受之陰受之則入五臟入五臟則䐜滿閉塞下為飧泄久為腸澼大奇論曰脾脈外鼓沉為腸澼久自已肝脈小緩為腸澼易治腎脈小搏沉為腸澼下血血溫身熱者死心肝澼亦下血二臟同病者可治其脈小沉澀為腸澼其身熱者死熱見七日死論疾診尺篇曰大便赤瓣飧泄脈小手足寒者難已飧泄脈小手足溫泄易已春傷於風夏生後泄腸澼經脈篇曰腎所生病為腸澼陰陽別論曰陰陽虛腸澼死氣厥論曰腎移熱於脾傳為虛腸澼死玉機真藏論曰泄而脈大脫血而脈實皆難治論證共二條痢疾一證即內經之腸澼也古今方書因其閉滯不利故又謂之滯下其證則裡急後重或垢或血或見五色或多紅紫或痛或不痛或嘔或不嘔或為發熱或為惡寒此證之陰陽虛實最宜博審詳察庶不致於差失若見有不確則大致誤人前泄瀉門諸法本與此通必互相參酌用之為善一痢疾之病多病於夏秋之交古法相傳皆謂炎暑大行相火司令酷熱之毒蓄積為痢今人所宗皆此一說夫痢因於暑而言其為熱豈不宜然然炎熱者天之常令也當熱不熱必反為災因熱貪涼者人之常事也過食生冷所以致痢多見人之慎疾者雖經盛暑不犯寒涼則終無瀉痢之患豈其獨不受熱乎此其病在寒邪不在暑熱病在人事不在天時從可知矣但胃強氣實者雖日用水果之類而陽氣能勝故不致疾其次之者雖未即病而日用日積迨夫大火流西新涼得氣則伏陰內動乘機而起故寒濕得以犯脾者多在七八月之間此陽消陰長之徵最易見也再其次者多以脾腎本弱則隨犯隨病不必伏寒亦不必待時尤為易見夫以生冷下咽瀉痢隨起豈即化而為熱乎奈何近代醫流止見此時之天熱不見此人之臟寒但見痢證開口便言熱毒反以寒涼治生冷是何異雪上加霜乎俗見相同死者不可勝言矣或曰然亦有用寒藥而愈者何也曰以胃強陽盛之人而得濕成熱者亦有之以元氣壯實而邪不勝正者亦有之此皆可以寒治而愈亦可以通利而愈而此輩極少以胃弱陽虛而因寒傷臟者此輩極多若再用寒涼或妄加盪滌則無有不死凡今以痢疾而致死者皆此類也觀丹溪曰瀉痢一證屬熱者多屬寒者少戴原禮曰以酷熱之毒至秋陽氣始收火氣下降因作滯下之證皆大謬之言也不可信之因作俚詞以志其戒俚詞曰夏日多炎陰邪易入暑熱是主風寒是客身不被風瘧從何致口不受寒痢從何得治必求本軒岐金石志此微言可為醫則論瀉痢虛實共三條凡治痢疾最當察虛實辨寒熱此瀉痢中最大關係若四者不明則殺人甚易也一實證之辨必其形氣強壯脈息滑實或素縱口腹或多脹滿堅痛及年少新病脾氣未損者方可用治標之法微者行之利之甚者瀉之一虛證之辨有形體薄弱者有顏色清白者有脈雖緊數而無力無神者有脈見真弦而中虛似實者有素稟陽衰者有素多淡素者有偶犯生冷者有偶中雨水陰寒者有偶因飲食不調者有年衰脾弱者以上諸證凡其素無縱肆而忽患瀉痢此必以或瓜或果或飲食稍涼偶傷胃氣而然果何積之有又何熱之有總惟脾弱之輩多有此證故治此者只宜溫調脾腎但使脾溫則寒去即所以逐邪也且邪本不多即用溫補健脾原無妨礙不過數劑自當全愈切不可妄云補住邪氣而先用攻積攻滯及清火等藥倘使脾氣再傷則輕者反重重者必危矣論瀉痢寒熱凡瀉痢寒熱之辨若果是熱則必畏熱喜冷不欲衣被渴甚飲水多亦無礙或小便熱澀而痛或下痢純血鮮紅脈息必滑實有力形氣必躁急多煩若熱證果真即宜放手涼解或兼分利但使邪去其病自愈若無此實熱諸證而瀉痢有不止者必是虛寒若非溫補脾腎必不能愈即有愈者亦必其元氣有根待其來復而然勿謂虛寒之證有不必溫補而可以愈者或治痢必宜寒涼而寒涼亦可無害者皆見有未真也論積垢凡腹中積聚之辨乃以飲食之滯留蓄於中或結聚成塊或脹滿硬痛不化不行有所阻隔者乃為之積此皆柤粕成形之屬所當逐也今人不能辨察但見痢如膿垢者皆謂之積不知此非柤粕之屬而實附腸著臟之脂膏皆精血之屬也無論瘦人肥人皆有此脂但肥者脂厚瘦者脂薄未有無脂者也若果無脂則腸臟之間豈容單薄赤露非惟藩籬不固而且臟必易傷無是理也今之凡患瀉痢者正以五內受傷脂膏不固故日剝而下若其臟氣稍強則隨去隨生猶無足慮若臟氣至敗剝削至盡或以久瀉久痢但見血水及如屋漏水者此在庸人云其積聚已無反稱為善而不知脂膏刮盡則敗竭極危之候也使今後醫家但識此為脂膏而本非積聚則安之固之且不暇而尚敢云攻之逐之或用苦寒以滑之利之者否論五色凡五色之辨如下痢膿垢之屬無非血氣所化但白者其來淺浮近之脂膏也赤者其來深由脂膏而切膚絡也下純血者多以血為熱迫故隨溢隨下此其最深者也若紫紅紫白者則離位稍久其下不速而色因以變或未及脈絡此其稍淺者也若紅白相兼者此又其淺深皆及者也大都純血鮮紅者多熱證以火性急速迫而下也紫紅紫白者少熱證以陰凝血敗損而然也純白者無熱證以臟寒氣薄滑而然也然有以無紅而亦因熱者此以暴注之類而非下痢之謂也有以紫紅雖多而不可言熱者此以陰絡受傷而非暴注之比也若辨黃黑二色則凡黃深而穢臭者此有熱證亦有寒證若淺黃色淡不甚臭而或兼腥餿氣者此即不化之類皆寒證也黑而濃厚大臭者此焦色也多有火證若青黑而腥薄者此肝腎腐敗之色也猶以為熱其謬甚矣雖五色之辨大約如此然痢之見血者無非陰絡受傷即或寒或熱但傷絡脈則無不見血故不可以見血者必認為熱也凡臨此證當必以脈色形氣病因兼而察之庶不致有疑似之誤論腹痛凡瀉痢腹痛有實熱者有虛寒者實熱者或因食積或因火邪但食積之痛必多脹滿堅硬或痛而拒按此必有所停滯微者宜行其滯甚者宜瀉而逐之火邪之痛必有內熱等證方宜清之利之然邪實於中者必多氣逆故凡治痛之法無論是火是食皆當以行氣為先但宜察藥性之寒熱擇而用之可也虛寒之痛尤所當辨蓋凡瀉痢之痛多由寒氣之在臟也經曰痛者寒氣多也有寒故痛也又曰病痛者陰也故凡人有過食生冷或外受寒氣即能腹痛此可知也寒在中者治宜溫脾寒在下者治宜溫腎也再若虛寒刮痛之義則人多不知蓋元氣不足於內則雖無外受寒邪而中氣不暖即寒證也所以瀉痢不能止飲食不能化而病有不能愈正以陽虛多寒也且瀉痢不止胃氣既傷膏血切膚安能不痛此其為痛乃因剝及腸臟而然是以痢因於痛痛因於痢故凡以寒侵腑臟及脈絡受傷血動氣滯者皆能為痛但察其不實不堅或喜揉按或喜暖熨或胸腹如飢而不欲食或胃脘作嘔而多吞酸但無實熱等證則總屬虛寒安得謂痛必因積積皆實證耶凡治虛寒之痛者速宜溫養臟氣不得再加消伐致令動者愈動滑者愈滑必至危矣若謂諸痛不宜補必待痛定然後可用則元氣日去終無定期嘗見一醫云痢疾須過七日方可用補而不知六日已死執迷不悟愚亦甚矣但其痛之甚者當於溫補藥中稍加木香以順其氣或多加當歸以和其血俟痛稍減則當去此二味蓋又恐木香之耗氣當歸之滑腸也若寒在下焦而作痛者必加吳茱萸其或痛不至甚則但以溫補脾腎為主使脾腎漸安則痛當自止此不必治其痛也論裡急後重凡裡急後重者病在廣腸最下之處而其病本則不在廣腸而在脾腎凡熱痢寒痢虛痢皆有之不得盡以為熱也蓋中焦有熱則熱邪下迫中焦有寒則寒邪下迫脾腎氣虛則氣陷下迫欲治此者但當察其所因以治脾腎之本則無有不愈然病在廣腸已非食積蓋食積至此瀉則無留而所留者惟下陷之氣氣本無形故雖若欲出而實無所出無所出而又似欲出皆氣之使然耳故河間之用芍藥湯謂行血則便自愈調氣則後重除是固然矣然調氣之法如氣熱者涼之則調氣寒者溫之則調氣虛者補之則調氣陷者舉之則調必使氣和乃為調氣行血之法其義亦然若但以木香檳榔當歸大黃行血散氣之屬謂之調和不知廣腸最遠藥不易達而所行所散者皆中焦之氣耳且氣既下陷而復以行之散之則氣必更陷其能愈乎矧痢止則後重自止未有痢不愈而後重能愈者也故凡欲治此者但當以治痢為主論大孔腫痛凡病痢疾多有大孔腫痛者其故何也蓋脾胃不和則水穀之氣失其正化而濁惡難堪之味出諸孔道此痛楚之不能免也又若火因瀉陷陽為陰逐則胃中陽氣並逼於下無從解散此腫之所由生也所以痢多則痛多痢少則痛少痛與不痛亦由氣之陷與不陷耳故無論寒痢熱痢大孔皆能為痛不能謂痛必由熱也欲治此者但治其痢痢止則腫痛自散亦如後重之法也自丹溪云大孔痛因熱流於下木香檳榔芩連加炒乾姜主之是但知火能為腫為痛亦焉知元陽之下陷也後人所宗皆其法也凡虛寒之輩其不能堪此亦多矣論口渴凡瀉痢之證必多口渴今人但見口渴即認為火而不知有火者固能渴無火者亦能渴此不可不辨也如火盛於中則熏脾爍胃津液耗干故酷好冰水多而不厭愈涼愈快隨飲隨消者此因熱而渴治宜涼也又如口熱作渴雖欲飲水而飲不能多者即非真火不宜涼也凡口雖乾渴喜涼而復不喜涼者是即寒聚於中而無根之火浮戴於上此最忌寒涼者也然渴有真渴有似渴真渴者必好茶飲但以喜熱喜涼即可辨其寒熱似渴者干也非渴也口雖干而不欲湯飲則尤非熱證可知也然瀉痢之證因其水泄於下必津涸於上故不免於渴渴而欲飲正以內水不足欲得外水以相濟也豈必皆因於火乎諸如此者必當詳審其有火無火若火有餘者自當清火水不足者自當滋陰是固然矣然氣為水母其有氣虛不能生水者不補其母則水不能生而渴不止也土為水主其有脾虛不能約水者不強其主則水不能蓄而渴不止也使能不治其渴而治其所以渴又何渴病之有論小水凡瀉痢之證小水必多不利或多黃赤此其寒熱虛實大有關係不可不察也若暴注之瀉以其清濁不分水穀並歸於大腸故水有不利者惟其暫也若痢疾之小水則病本不一今人但見黃赤不利無不云其為熱誤者多矣凡因於熱者必其熱赤之甚或多澀痛或見鮮血然必上下皆有熱證方是真熱此宜清涼治之若非真熱則或以中寒而逼陽於下者有之或以瀉痢亡陰而水虧色變者有之或以下焦陽氣不暖而水無以化者有之或以妄用滲利而泲逼干汁者亦有之但察其三焦無火則雖黃雖澀總皆亡陰亡液之證不得通以熱論速當培補真陰乃為良法內經曰中氣不足溲便為之變至哉斯言何今人之不能察也不獨此也每見有小水清白而兼腹痛者仍用芩連之類余則不知其何謂可恨可恨論陰陽疑似陰陽之道即養生治病之本而人有不易知者以其有莫測之妙也夫陰陽之用欲其相濟不欲其相賊相濟者相和者也陰中不可無陽陽中不可無陰也相賊者相害者也陽賊陰則為焦枯陰賊陽則為寂滅也凡諸為病者無非陰陽相賊而有失其和耳蓋陰陽之性陰常喜靜而惡動陽常喜暖而畏寒及其相賊則陰畏陽之亢所以陰遇陽邪非枯則槁陽畏陰之毒所以陽逢陰寇不走即飛此陰陽相妒之譏誠多難測凡諸病劇而有假真疑似者即其證也而尤於傷寒痢疾為最焉若今之患痢最甚者多見上下皆有熱證而實非真熱者何以見之如煩則似熱非熱躁則似狂非狂懊憹不寧莫可名狀此非真陽證也蓋以精血敗傷火中無水而陰失其靜故煩躁若此也又如飛者飛於上走者走於下飛於上則為口渴喉瘡或面紅身熱走於下則為孔熱孔痛或便黃便血此非實熱證也蓋以水火相刑陽為陰逐而火離其位故飛走若此也今之人但見此等證候僉曰察病不離形證形證之熱既已若此而猶謂之寒何其妄也是但知外之有熱而不知內之有寒也知上下之有熱而不知中焦之有寒也又豈知煩躁之為陰虛而飛走之為陽虛也余言若此聞者果能信乎將猶疑乎疑似之間猶不可不辨也且如肌表皆有熱證本當惡熱而反不捨衣被或臍腹喜暖而宜熨宜按者此則外雖熱而內則有寒也又如九竅皆有熱證必喜冷飲然有口欲寒而腹畏之故凡寒冷下咽則或增嘔惡或加腹疼或噎塞不行而反生脹悶或口舌雖有瘡痛而反欲熱湯飲者此則上下雖熱而中焦之有寒也此外有陽氣素弱及脈色少神如前論等證若止知為火治以寒涼其奈內本因寒而再加以寒則寒涼入胃直犯中焦是外熱不相及而中寒必更甚故致飛者愈飛走者愈走所謂雪上加霜欲孤陽之不滅不可得也故凡治此者但能引火歸原使丹田暖則火就燥下原固則氣歸精此陰陽顛倒之神理而或者昧之跡猶苦海無邊未得其岸故余悉此用垂普救之衣缽云論治共十條凡治痢之法其要在虛實寒熱得其要則萬無一失失其要則為害最多辨論如前所當熟察前如泄瀉門調治諸法俱宜酌用一生冷初傷飲食失調而胃氣未損元氣未虧或為痛為脹為暴瀉暴痢等證而食滯有未清者宜抑扶煎五德丸或平胃散胃苓湯五苓散之類略祛寒滯愈之極易一脾腎虛弱之輩但犯生冷極易作痢無論大人小兒凡系脾虛致痢別無實熱等證者先宜佐關煎溫其脾氣如或稍深而病及肝腎者即宜胃關煎為最妙之治勿以新病畏而弗用也或五德丸四神丸之類俱可間用一病痢凡脾腎俱虛而危劇可畏者只宜以胃關煎為最溫胃飲次之或相機間用亦可或兼用四維散九氣丹復陽丹庶可保全也一痢疾嘔惡兀兀欲吐或聞食氣即見噁心者此胃氣虛寒不能容受而然必宜溫補安胃用五君子煎或六味異功煎溫胃飲聖朮煎之類主之嘔甚者宜六味回陽飲之屬主之若陰中火虛氣不歸原而嘔者宜胃關煎理陰煎主之若胃火上衝而致嘔吐者則必有煩熱脹滿等證乃可用清涼降火等藥宜大分清飲益元散之類主之一濕熱邪盛而煩熱喜冷脈實腹滿或下痢純紅鮮血者宜清流飲黃芩芍藥湯或用香連丸或用河間芍藥湯熱甚者宜大分清飲或茵陳飲此等藥若數劑不效便當思顧脾腎矣一痢有發熱者似乎屬火宜從涼治然實熱之證反未必發熱惟痢傷精血陰虛水虧者則最多為熱為躁也如或虛中有火脈見有力者宜加減一陰煎或保陰煎主之若脈本無力全屬虛火則不可治火單宜壯水補陰如三陰煎及六味八味等丸若陰盛格陽而為外熱者必宜胃關煎及右歸飲之屬主之一痢疾初作氣稟尚強或因縱肆口腹食飲停滯凡有實邪脹痛堅滿等證而形氣脈氣俱實者可先去其積積去其痢自止宜承氣湯或神佑丸百順丸主之或用赤金豆以微利之此通因通用痛隨痢減之法也但此等證候必須確審然後用之若以脾腎虛寒致痢而妄用此藥及寒涼克伐等劑再敗元陽者多致不可解救最當慎也一禁口不食乃痢疾最危之候而自古未有明辨觀丹溪云禁口痢胃口熱甚故也用黃連人參煎汁終日呷之如吐再吃但得一呷下咽便好人不知此多用溫藥甘味此以火濟火以滯益滯也亦有誤服熱毒之藥犯胃者當推明而祛其毒此丹溪之說也而不知禁口之辨其義最微豈皆胃口熱甚而總以黃連可治乎蓋噤口者以食不得入雖亦有實熱證而惟脾胃虛寒者居多若因食積胃中而噤口者其胸腹必有脹滿或見硬痛此當行滯去積積滯去而食自入如青陳楂樸之屬是也有因火鬱胃中而噤口者其臟腑必多熾熱或脈見洪數此當瀉火去熱邪熱去而食自入如芩連梔柏之屬是也凡此者皆以邪蓄於中乃噤口之實證也然實證無幾而近之病者每察其胃口則多無脹滿等證或察其大邪則亦非實熱等證但見其有出無入而胃口日窮精神日敗蓋其既無脹滿本非積也又無真熱本非火也無積無火而食不能入其故何也以臟氣不能容受也不能容受其故有二蓋一由脾氣之弱故或為嘔惡或為吞酸或惡聞食氣而泛泛不寧或飢不能食而枵枵待困此以中焦不運故食不能入責在脾也一由腎氣之弱故命門不能暖則大腸不能固小腸不能化則胃氣不能行此以下焦失守而化源無主責在腎也欲健中焦非人參白朮乾薑甘草之屬不可欲實下焦非熟地附子吳茱萸肉桂之屬不可脾腎強而食自入其理甚明其應如響余之活人於此者不勝紀矣如丹溪之用黃連及以火濟火以滯益滯之說乃悉以實火為言特一曲之見耳局人意智絕人生幾此其關係非小不得信以為然一久痢陽虛或因攻擊寒涼太過致竭脾腎元神而滑脫不止者本源已敗雖峻用溫補諸藥亦必不能奏效矣宜速灸百會氣海天樞神闕等穴以回其陽庶或有可望生者述古共八條仲景曰夫六腑氣絕於外者手足寒上氣腳縮五臟氣絕於內利不禁下甚者手足不仁下痢腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯褚氏遺書曰陰已耗而復竭之則大小便牽疼愈疼則愈欲大小便愈便則愈疼東垣曰飲食有傷起居不時損其胃氣則上升清華之氣反從下降是為飧泄久則太陰傳少陰而為腸澼裡急後重膿血相雜數至圊而不能即便者專用補中益氣湯為主使升降之道行其痢不治自消矣裡急者腹中不寬快也亦有虛坐而大便不行者皆血虛也血虛則裡急後重薛立齋曰若白痢久胃弱氣虛數至圊而不能便或少有白膿者乃土不生金肺與大腸氣傷而下墜也當用補中益氣湯舉其陽氣則陰自降而二便自愈若飲食不入發熱作渴勢甚危急用十全大補湯如不應送二神丸若紅痢久胃弱血虛脾經血熱下注而不愈者用四物加白朮茯苓若脾經氣虛不能統血而不愈者用四君加川芎當歸若中氣下陷不能攝血而不愈者用補中益氣湯凡嘔吐食不得下其或脾胃素有實熱或過食辛辣厚味而暴患者宜開胃行滯若胃氣虛隔嘔吐者宜六君加生薑凡痢腹痛後重怕手按腹或脈洪實者為積滯閉結宜疏通之若腹痛後重喜手按腹或脈微細為陽氣虛寒宜六君乾薑溫補脾氣凡氣血虛而作痢若脾虛血弱者宜四君子湯胃虛血弱者補中益氣湯久病氣血俱虛者八珍湯若脾氣虛寒下陷補中益氣湯加粟殼薑桂如不應急用附子若氣血虛弱宜十全大補湯加附子粟殼若命門火衰宜八味丸以補母氣若腹痛作渴飲湯手按之而痛稍止者俱宜溫補脾胃徐東皋曰凡痢疾之治須審病者氣體厚薄曾無通瀉及用攻積苦寒之藥脈之有力無力及正氣邪氣有餘不足對證施治未有弗效今醫治痢多峻用下劑及苦寒太過鮮有不致誤者況年高與體弱之人遂致元氣虛陷反不能支胃氣既虛其痢益甚有陽虛陷入陰中則脫血陣陣而下者醫尚謂血痢不已仍用苦寒漸至脈絕四肢厥冷而死者曷可勝紀且今人之患痢者多有脾胃先虛而後積滯通滯之劑宜酌用也稍或過之遂致虛脫蓋有由焉附按共三條王海藏治楊師三朝三大醉至醒發大渴飲冷水冰茶各三杯遂病便血約一盆先用吳茱萸丸又用平胃五苓各半散三大服血止後復為白痢又與神應丸四服白痢乃止或曰何不用黃連之類以解毒而反用溫熱之劑予曰若用寒涼其疾必大變蓋寒毒內傷復用寒涼非其治也況血為寒所凝浸入大腸而下得溫乃行所以用溫熱其血自止經曰治病必求其本此之謂也胃既得溫其血不凝而自行各守其鄉也觀此治法可見治血痢者豈可偏執為熱乎又海藏曰暑月久血痢不可用黃連陰在內也夷堅甲志云昔虞丞相自渠川被召途中冒暑得泄痢連月蘿壁間有韻語云暑毒在脾溫氣連腳不泄則痢不痢則瘧獨煉雄黃蒸餅和藥甘草作湯服之安樂別作治療醫家大錯如方製藥其疾隨愈按此說頗奇雖未及用姑亦錄之以存其法唐太宗實錄云貞觀中上病氣痢久未痊服眾醫藥不應因下詔訪問時金吾長張寶藏曾困此疾即具疏以乳煎蓽茇方上服之立效宣下宰臣與五品官魏徵難之逾六月不擬上疾復發復進之又平因問左右曰進方人有功未見除授何也徵懼曰未知文武二吏上怒曰治得宰相不妨授三品我豈不及汝耶即命與三品文官授鴻臚寺卿其方用牛乳半斤蓽茇三錢同煎減半空腹頓服痢疾論列方抑扶煎新熱十一佐關煎新熱十胃關煎新熱九五苓散和一八二胃苓湯和百九十溫胃飲新熱五平胃散和十七四逆湯熱十四百順丸新攻六四君子湯補一五德丸新熱十八四神丸熱一五一五君子煎新熱六二神丸熱百五十復陽丹新熱二十六君子湯補五四維散新熱十二九氣丹新熱二三吳茱萸丸熱百四十六味丸補百二十八味丸補一二一大分清飲新寒五理陰煎新熱三右歸飲新補三六味異功煎新熱七四物湯補八八珍湯補十九六味回陽飲新熱二三陰煎新補十一保陰煎新寒一十全大補湯補二十桂枝湯散九神應丸未收補中益氣湯補三十清流飲新寒六茵陳飲新寒八加減一陰煎新補九香連丸寒百十三益元散寒百十二河間芍藥湯攻三二大承氣湯攻一神佑丸攻四八黃芩芍藥湯寒百九赤金豆新攻二聖朮煎新熱二五論外備用方歸脾湯補三二大防風湯補九八痢後風十寶湯補九六虛寒大七香丸和一三一寒氣戊己丸和二百二溫熱黃芩半夏生薑湯和十六乾嘔斗門方和一九九毒痢膿血藿香正氣散和二十寒滯真人養臟湯和一九四調和簡易八方和二百大黃湯攻十一濕熱木香化滯湯寒百十濕熱滯黃芩湯寒百五乾嘔痢六神丸寒百十四食積熱痢黃耆散寒百八熱赤痢理中湯熱一中寒蓽茇丸熱一五六寒痢白朮聖散子熱一三六固腸溫胃白通湯熱一四五少陰痢桂香丸熱一六二冷滑不禁附子茴香散熱一四八暖胃和中固腸散固五十溫固桃花丸固五六冷滑久痢訶梨勒丸熱一五九寒滑痢固腸丸固五三溫補固澀大斷下丸固五四溫澀生地黃湯固五七熱血痢澀腸散因二八六敷摻當歸黃耆湯補九七妊娠下痢升陽除濕防風湯和百八十濕滯
