body:
  text: 卷之三十三貫集雜證謨疝氣經義骨空論曰任脈為病男子內結七疝女子帶下瘕聚督脈生病從少腹上衝心而痛不得前後為沖疝長刺節論曰病在少腹腹痛不得大小便病名曰疝得之寒刺少腹兩股間刺腰髁骨間刺而多之盡炅病已經脈篇曰足厥陰肝病丈夫㿉疝婦人少腹腫肝所生病為飧泄狐疝足厥陰之別循脛上睪結於莖其氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也繆刺論曰邪客於足厥陰之絡令人卒疝暴痛刺足大指爪甲上與肉交者各一痏左取右右取左脈解篇曰厥陰所謂㿗疝婦人少腹腫也陰亦盛而脈脹不通故曰㿗隆疝也陰陽別論曰三陽為病發寒熱其傳為㿗疝經筋篇曰足陽明之筋病㿉疝腹筋急足太陰之筋病陰器紐痛下引臍兩脅痛足厥陰之筋病陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收邪氣臟腑病形篇曰小腸病者小腹痛腰脊控睪而痛時窘之後四時氣篇曰小腹控睪引腰脊上衝心邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃熏肝散於肓結於臍玉機真藏論曰是故風者百病之長也弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱本藏篇曰腎下則腰尻痛不可以俯仰為狐疝平人氣象論曰寸口脈沉而弱曰寒熱及疝瘕少腹痛脈急者疝瘕少腹痛脈要精微論曰診得心脈而急病名心疝少腹當有形也邪氣臟腑病形篇曰心脈微滑為心疝引臍小腹鳴肝脈滑甚為㿉疝脾脈微大為疝氣滑甚為㿉癃澀甚為腸㿉微澀為內㿉多下膿血腎脈滑甚為癃㿉大奇論曰腎脈大急沉肝脈大急沉皆為疝心脈搏滑急為心疝肺脈沉搏為肺疝三陽急為瘕三陰急為疝五臟生成篇曰青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法四時刺逆從論曰厥陰滑則病狐疝風少陰滑則病肺風疝太陰滑則病脾風疝陽明滑則病心風疝太陽滑則病腎風疝少陽滑則病肝風疝至真要大論曰陽明司天丈夫㿗疝婦人少腹痛陽明之勝外發㿗疝太陽在泉民病少腹控睪引腰脊上衝心痛太陽之復少腹控睪引腰脊上衝心太陰在泉主勝甚則為疝論證共三條疝氣病者凡小腹睪丸為腫為痛止作無時者皆是也但疝證不一如內經所謂狐疝者以其出入不常也有言㿗疝者以其頑腫不仁也有沖疝者以其自少腹上衝而痛也有厥疝者以結氣在陰而氣逆為疝也有疝瘕者以少腹冤熱而痛出白一名曰蠱也有六經風疝者如四時刺逆從論所言者是也有小腸疝者如邪氣臟腑病形篇所言者是也凡此七者總皆疝之為義然疝之為病不獨男子有之而婦人亦有之經曰有積氣在腹中有厥氣名曰厥疝女子同法又曰厥陰所謂㿗疝婦人少腹腫也至若沖疝瘕之屬亦皆男婦之所同病者然惟睪丸之病獨在男子而他則均當詳察也觀張子和曰夫遺溺閉癃陰痿脬痹精滑白淫皆男子之病也若血涸不月月罷腰膝上熱足躄嗌乾癃閉少腹有塊或定或移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕若年少而得之不計男子婦人皆無子此說誠非謬也然今人但言男子之疝而全不知婦人之疝殊失之矣一疝氣所屬本非一經如內經所云任脈為病男子內結七疝女子帶下瘕聚督脈生病從少腹上衝心而痛不得前後為沖疝又曰脾傳之腎病名曰疝瘕又曰三陽為病發寒熱其傳為㿗疝又曰邪在小腸者連睪系屬於脊又曰邪客於足厥陰之絡令人卒疝暴痛又如心肝脾肺腎五疝之脈各有所辨此素問言諸經之疝也又經筋等篇言足陽明之筋病㿉疝腹筋急足太陰之筋病陰器紐痛下引臍兩脅痛足厥陰之筋病陰器不用等義此靈樞言諸經之疝也自張子和云疝有七前人論者甚多其非靈樞素問銅人之言予皆不取乃引靈樞之論曰足厥陰之筋聚於陰器故陽明與太陰之筋皆會於陰器惟厥陰主筋故為疝者必本之厥陰此子和之意以疝為筋病而筋主於肝故謂疝必厥陰似亦有理而實則不然觀內經諸論之如前者謂非靈素之言而子和皆不可取乎且筋雖主於厥陰然散見諸經即為諸經之筋矣若病在諸經固可因筋而廢經乎矧如厥論曰前陰者宗筋之所聚太陰陽明之合也又痿論曰陰陽總宗筋之會會於氣街而陽明為之長此亦可以不取乎然則小腹前陰之經則厥陰少陰太陰陽明少陽太陽以至沖任督脈皆有所涉今考銅人經治疝之法則諸經皆有俞穴若謂止屬厥陰則諸經皆可廢矣即子和亦歷指諸經之穴謂諸穴雖亦治疝然終非受疝之地此說何也自後丹溪遂因子和之言謂經有七疝寒水筋血氣狐㿗也專主肝經與腎經無相干再至戴原禮又因丹溪之說云疝本屬厥陰之一經余嘗見俗說小腸膀胱下部氣者皆妄言也嗚呼此等議論皆後學逞億之見果堪信乎果堪法乎醫失真傳類多如此故非靈素銅人之言余誠不敢取也今錄銅人治疝穴法條列後章以便後人用證一疝氣之病有寒證亦有熱證然必因先受寒濕或犯生冷以致邪聚陰分此其肇端之始則未有不因寒濕而致然者及其病郁既久則鬱而成熱者有之或以陽臟之人火因邪聚而濕熱相資者亦有之故在內經言疝則寒熱皆有所論如曰病在少腹腹痛不得大小便病名曰疝得之寒曰陰亦盛而脈脹不通故曰㿗癃疝也曰肝痹得之寒濕與疝同法曰太陽太陰陽明之勝復皆有疝氣是皆言疝之寒也又如曰脾風傳腎名曰疝瘕少腹冤熱而痛出白一名曰蠱曰足厥陰之筋病陰器不用傷於寒則陰縮入傷於熱則縱挺不收是皆言疝之熱也此內經之言寒言熱未嘗偏廢者如此觀丹溪曰自素問而下皆以為寒蓋寒主收引經絡得寒則引而不行所以作痛者然亦有踢冰涉水終身不病此者無熱在內故也大抵此證始於濕熱在經鬱而至久又得寒氣外來不得疏散所以作痛若只作寒論恐未為備此丹溪之論如此故其治多從火而借用山梔黃柏之屬余則不能無言也觀內經之言疝者如前原非只作寒論第言寒者較多於熱亦自疝家之正理不可易也矧疝以寒邪入經所以為痛及其久也方為鬱熱使其始不受寒何由致疝此寒為本而熱為標也若謂始於濕熱在經又得邪氣外來所以作痛則反以熱為本而寒為標矣豈其然乎至若踢冰涉水終身不痛者此雖有貴賤之分久暫之異然必以陽氣內實而寒不能犯者有之若謂無熱在內故寒自不入又豈其然乎此致病之因有不得不辨也是以內經之論凡至切至當者胡可弗遵後世之談其多鑿多偏者安庸盡信再若治此之法固不可必其為寒又不可必其為熱但治初受之邪必當以溫經散寒行氣除濕為主切不可早用寒涼致留邪氣則遺害非淺及其久也則有始終以寒者有因寒鬱熱者有元陽受傷而虛陷日甚者但當察其形氣病氣因病制方若果有熱證熱脈顯然外見者方可治以寒涼如無熱證可據而執云大抵疝由濕熱則無者生之有者甚之矣此習俗之通弊有不可不鑑也論治共十一條凡治疝之法當察所由此雖以受寒受濕因而成疝然或以色欲或以勞損或以鬱怒或以飲食酒濕之後不知戒慎致受寒邪則以陰求陰流結於衝任血氣之海而下歸陰分遂成諸疝故其為病則有遇寒而發者有郁久成熱遇熱而發者有鬱則氣逆遇鬱怒而發者有濕因寒滯遇濕而發者有疲極則傷筋遇勞苦而發者有虛邪在少陰厥陰遇色欲而發者有飲食之濕在陽明太陰遇酒酪而發者至其久也則正氣陷而不舉邪氣留而不去而為㿗為木難於愈矣故治此者必當因其所因辨而治之則無不隨手可愈若茫然混然徒執一偏之見而至老不寤者即與之談終無益也一治疝必先治氣故病名亦曰疝氣非無謂也蓋寒有寒氣熱有熱氣濕有濕氣逆有逆氣氣在陽分則有氣中之氣氣在陰分則有血中之氣凡氣實者必須破氣氣虛者必須補氣故治疝者必於諸證之中俱當兼用氣藥一疝之暴痛或痛甚者必以氣逆宜先用荔香散氣實多滯者宜寶鑑川楝散或天台烏藥散非有實邪而寒勝者宜暖肝煎主之一寒疝最能作痛多因觸冒寒邪或犯生冷所致凡喜暖畏寒脈弦細鼻尖手足多冷大小便無熱之類皆是也寒微者宜荔香散暖肝煎腎氣丸神應散丁香楝實丸之類主之寒甚者宜醫林四神丸百一選方十補丸胡蘆巴丸沉香桂附丸之類主之一法以五積散加鹽炒吳茱萸小茴香各一錢姜五片蔥白五寸同煎空心熱服大治氣痛不可忍一熱疝大能作痛凡火邪聚於陰分而為痛者必有熱證熱脈或大便秘結或小水熱閉不通或為脹為滿而煩熱喜冷者是也宜大分清飲或茵陳飲加茴香川楝子之類或以加味通心飲葵子湯之類主之又有腎本不虛而肝經濕熱火旺莖中作痛筋急縮或痛或癢或腫或挺縱不收白物如精隨溺而下者此筋疝也宜龍膽瀉肝湯主之一濕疝多為重墜脹滿然亦有痛者宜以前寒熱證參而治之有不痛而久墜不愈者是即㿗疝之屬單宜治濕理氣以加味五苓散或局方守效丸或蒼朮散或三層茴香丸之屬主之一云凡治㿗疝非斷房事厚味不能取效一疝病遇酒而發者多因濕熱當先去其濕濕而熱者大分清飲加茴香川楝之屬濕兼寒者宜加味五苓散主之或以葛花解酲湯加減用之一血結少腹間者是為血疝但察其非氣非食小腹硬而有形大便秘結而黑小水利者必血積血疝之屬宜桃仁膏或桃仁煎或玉燭散之類下之一疝遇色欲而發者是必陰虛之屬若陰虛兼動相火者宜以六味地黃湯加黃柏知母山梔茴香川楝之類主之若陰虛無火或兼寒痛精虛者宜理陰煎或八味地黃湯加茴香枸杞之類或用暖肝煎主之一疝久者必多虛證或以元氣本虛而偶患者亦有虛證或不耐勞苦而微勞即發者亦有虛證當以脈證辨之凡治虛疝當察其虛在陰分或在陽分陰虛者輕則暖肝煎八味地黃湯甚則理陰煎補陰益氣煎之類酌而用之陽虛者宜溫胃飲歸脾湯補中益氣湯之類主之若陽虛至甚者必用桂附椒姜或以六味回陽飲之類主之若虛中挾滯者宜以前法為主而加以疏導之藥如川楝茴香枳實山楂梔子之屬酌其宜而佐用之一疝有邪實當下者詳後條張子和論中述古共八條巢氏病源曰諸疝者陰氣積於內復為寒氣所加使營衛不調氣血虛弱故風冷入其腹內而成疝也疝者痛也或小腹痛不得大小便或手足厥冷繞臍痛自汗或冷氣逆上搶心腹令心痛或裡急而腹痛此諸候非一故云諸疝也許學士云大抵此疾雖因虛得之不可以虛而驟補經云邪之所湊其氣必虛留而不去其病則實故必先滌所蓄之熱然後補之是以諸方多借巴豆氣者蓋謂此也劉宗厚云謹按疝證雖始為因虛而得必邪實迫痛而未下者故當先瀉而後補也至有虛甚迫痛上為嘔逆或下有遺精者此邪實正虛之甚矣此欲不補可乎但恐補之則無益瀉之則氣轉陷幸而獲生者鮮矣陳無擇曰經云七疝諸疝等義更不見名狀但有寒疝㿗疝狐疝而已唯大奇論列五臟脈為五疝者如前大抵血因寒泣則為瘕氣因寒聚則為疝但五臟脈理不同不可不辨且腎脈本沉心脈本滑受寒則急於理乃是肝脈本弦肺脈本澀並謂之沉未為了義又脾不出本脈但云急為疝亦文義之缺也凡云急者緊也緊為寒亦可類推且賊風入腹亦為疝冒暑履濕皆能為疝當隨四氣改易急字風則浮弦暑則洪數濕則緩細於理始明要知疝雖兼臟氣皆外所因也寒泣風散暑郁濕著絞刺擊搏無有定處倉卒之際痛不堪忍世人稱為橫弦豎弦膀胱小腸氣賊風入腹等名義不同證狀則一張子和曰內經曰木鬱則達之達謂吐也令條達其氣也肝之積本當吐者然觀其病之上下以順為貴仲景所謂上宜吐下宜瀉者此也敢列七疝圖於下以示後之君子庶幾有所憑藉者焉寒疝其狀囊冷結硬如石陰莖不舉或控睪丸而痛得於坐臥濕地或寒月涉水或冒雨雪或坐臥磚石或風冷處使內過勞宜以溫劑下之久而無子水疝其狀腎囊腫痛陰汗時出或囊腫而狀如水晶或囊癢而搔出黃水或少腹中按之作水聲得於飲水醉酒使內過勞汗出而遇風寒濕之氣聚於囊中故水多令人為卒疝宜以逐水之劑下之有漏針去水者人多不得其法筋疝其狀陰莖腫脹或潰或膿或痛而裡急筋縮或莖中痛痛極則癢或挺縱不收或白物如精隨溲而下久而得於房室勞傷及邪術所使宜以降心之劑下之血疝其狀如黃瓜在少腹兩旁橫骨兩端約中俗云便癰得於重感春夏大燠勞動使內氣血流溢滲入脬囊留而不去結成癰腫腫少血多宜以和血之劑下之氣疝其狀上連腎區下及陰囊或因號哭忿怒則氣鬱之而脹怒哭號罷則氣散者是也有一治法以針出氣而愈者然針有得失宜以散氣之藥下之或小兒亦有此疾俗曰偏氣得於父已年老或年少多病陰痿精怯強力入房因而有子胎中病也此疝不治惟築賓一穴灸之狐疝其狀如瓦臥則入小腹行立則出小腹入囊中狐晝則出穴而溺夜則入穴而不溺此疝出入上下往來正與狐相類也亦與氣疝大同小異今人帶鉤鈐是也宜以逐氣流經之藥下之㿗疝其狀陰囊腫縋如升如斗不癢不痛者是也得之地氣卑濕所生故江淮之間湫塘之處多感此疾宜以去濕之藥下之女子陰戶突出雖以此類乃熱則不禁固也不可便謂虛寒而澀之燥之補之本名曰瘕宜以苦下之以苦堅之王太僕曰陽氣下墜陰氣上爭上爭則寒多下墜則筋緩故睪垂縱緩因作㿗疝也以上七疝下去其病之後可調則調可補則補各量病勢勿拘俗法經所謂陰盛而腹脹不通者㿗癃疝也不可不下劉宗厚曰按子和所論病本經絡之原至為詳盡但七疝名固不同治法當異然俱用攻下之法愚切疑焉雖錢仲陽亦曰肝為相火有瀉無補丹溪有曰肝只是有余腎只是不足夫厥陰一經受疝宜通勿塞固宜亦當視其淺深而行之可也況有邪氣客於膀胱小腸之經者若干於少陰腎經則宜通勿塞之法可例用乎愚謂子和七疝之治雖各有不同然無非用下則不能無偏故劉宗厚徐用誠皆疑而議之亦謂其太過耳非謂盡不可用也再觀丹溪之法則曰治疝大不宜下是又相左之甚矣余因考子和治按如治蔡參軍因坐濕地疝痛不堪用導水丸下之而愈又治一人因瘧渴過飲漿水病疝醫進姜附為燥熱所壅以致陰囊重墜大如升斗乃先以導水丸後用豬膚散大下之而愈又治一夫病卒疝赤腫大痛數日不止諸藥如石投水遂以導水丸次以通經散大下之而愈若此類者豈皆不可下乎故但宜酌其虛實緩急如或為邪熱所閉或以少年暴疾或以腫硬赤痛之極者則如導水丸三花神祐丸禹功散之類皆所當用蓋邪盛而急勢不可當有非行氣利水等劑所能及者則不得不攻此子和之法亦自有必不可廢者是不可不察也辨疑錄云治疝者每用五苓散內加行氣之藥獲效者多按藥性豬苓澤瀉分理陰陽以和心與小腸之氣白朮調脾並利臍腰間濕及死血茯苓淡利膀胱水桂能伐肝邪茴香善治小腸之氣金鈴子橘核去膀胱之氣檳榔下氣少加木通以導引小腸之邪屢用屢驗諸經治疝灸法足陽明經氣衝歸來水道陰市大巨陷谷足太陰經衝門府舍陰陵泉三陰交足太陽經肝俞次髎合陽承山金門足少陰經肓俞四滿陰谷築賓治小兒胎病交信太谿照海然谷足厥陰經急脈曲泉中都蠡溝中封太衝行間大敦足少陽經五樞肩井丘墟督脈命門長強任脈曲骨中極關元石門氣海陰交一法於關元兩旁相去各三寸青脈上灸七壯即愈左灸左右灸右用驗一法令病者合口以草橫量兩口角為一摺照此再加二摺共為三摺屈成三角如樣將上角安臍中心兩角安臍下兩旁當下兩角處是穴左患灸右右患灸左左右俱患即兩灸之艾柱如麥粒灸十四壯或二十一壯即安一闌門穴在陰莖根兩旁各開三寸是穴針一寸半灸七壯治木腎偏墜按此即奇俞中泉陰穴千金翼云在橫骨旁三寸治㿗卵偏大灸百壯三報之一外陵穴在臍左右各開一寸半灸疝立效永不再發屢用屢驗一風市穴在膝上七寸外側兩筋間又取法令正身平立直垂兩手著腿當中指盡處陷中是也針五分灸七壯千金云灸百壯重者五六百壯治疝氣外腎腫小腸氣痛腹內虛鳴此風痹疼痛之要穴熨治法嚴氏云用食鹽半斤炒極熱以故帛包熨痛處一法用泥蔥白一握置臍中上用熨斗熨之或上置艾灼之妙或以蔥白為一束去須葉切為寸厚蔥餅烘熱置臍上仍以熨斗熨之尤便而妙疝氣論列方荔香散新因二八川楝散和三二六加味通心飲寒三三暖肝煎新熱十五理陰煎新熱三龍膽瀉肝湯寒六三六味丸補百二十八味丸補一二一葛花解酲湯和一二四溫胃飲新熱五腎氣丸熱一七七歸脾湯補三二加味五苓散和一八四玉燭散攻二四五積散散三九丁香楝實丸熱一七九蒼朮散和三二八葵子湯寒一二四天台烏藥散和三二九桃仁煎攻三九桃仁膏和三百三十茵陳飲新寒八百選十補丸熱一七四神應散熱一七五守效丸和三三一醫林四神丸熱一五三神佑丸攻四八禹功散攻四一三層茴香丸熱一八一導水丸攻七一胡蘆巴丸熱一七八六味回陽飲新熱二大分清飲新寒五沉香桂附丸熱百十一補中益氣湯補三十補陰益氣煎新補十六論外備用方荔核散和三二七氣疝祛痛散和七一氣逆木香導氣丸因二七六降椒酒和二三八風濕苦楝丸熱百八十奔豚加減柴苓湯和一九三濕疝寒熱蟠蔥散熱百十寒滯羊肉湯熱一七六寒疝疝氣神方因二七二二七四去鈴丸因二七七奪命丹熱一八二陰寒當歸羊肉湯熱一七六寒疝川楝丸因二七五寒滯固元丹固三一虛寒濕疝陰丸作痛因二七九脫肛論證大腸與肺為表裡肺熱則大腸燥結肺虛則大腸滑脫此其要也故有因久瀉久痢脾腎氣陷而脫者有因中氣虛寒不能收攝而脫者有因勞役吐瀉傷肝脾而脫者有因酒濕傷脾色欲傷腎而脫者有因腎氣本虛關門不固而脫者有因過用寒涼降多亡陽而脫者有因濕熱下墜而脫者然熱者必有熱證如無熱證便是虛證且氣虛即陽虛非用溫補多不能效凡小兒元氣不實者常有此證故陳自明曰大腸虛寒其氣下陷則肛門翻出或因產努力其肛亦然是誠確見之論論治內經曰下者舉之徐之才曰澀可去脫皆治脫肛之法也故古人之治此者多用參耆歸朮川芎甘草升麻之類以升之補之或兼用北五味烏梅之類以固之澀之仍外用熏洗收澀之藥則無有不愈凡中氣微虛而脫者宜四君子湯或五味異功散中寒吐瀉而脫者五君子煎或溫胃飲瀉痢不止而滑脫者胃關煎或加烏梅北五味文蛤木香之屬以佐之脾虛下陷而脫者補中益氣湯或舉元煎陰虛肝腎不足而下陷者補陰益氣煎陰中陽虛而脫者理陰煎或大補元煎以上諸證凡虛中挾火或熱赤或腫痛宜用補中益氣湯加黃連黃芩槐花之類加減治之然必真有火證火脈方可酌用寒涼若非實火則大忌苦寒以防其沉降敗脾也若婦人產後用力太過肛門脫出者宜六物煎加升麻或用殿胞煎加人參仍須用溫熱湯洗而收之若濕熱下墜疼痛脫肛甚者抽薪飲大分清飲微者約營煎述古薛立齋曰脫肛屬大腸氣血虛而兼濕熱凡濕熱勝者升陽除濕湯血熱者四物加條芩槐花血虛者四物加白朮茯苓兼痔而痛者四物加槐花黃連升麻久痢者補中益氣湯加酒炒芍藥中氣虛陷者前湯加半夏炮薑五味茯苓腎虛者六味丸虛寒者八味丸簡易方一方用五倍子末三錢明礬末二錢水二碗煎沸熱洗立收一方治脫肛三五寸者先用五倍礬湯洗過次用赤石脂為末以油紙托上四圍皆摻之妙一方用桑葉桃葉煎湯入礬末洗之則愈或以蓖麻子搗膏藥貼頂心則不下脫一方用石灰炒熱以帛包裹令患人坐其上冷即易之灸脫肛法長強穴灸三壯愈臍中隨年壯百會灸三壯治小兒脫肛脫肛論列方四君子湯補一五君子煎新熱六大補元煎新補一溫胃飲新熱五四物湯補八大分清飲新寒五補中益氣湯補三十胃關煎新熱九六物煎新因二十升陽除濕湯和一七九舉元煎新補十七六味丸補百二十五味異功散補四理陰煎新熱三殿胞煎新因十八味丸補一二一補陰益氣煎新補十六抽薪飲新寒三約營煎新寒二十論外備用方縮砂散因二八四伏熱伏龍肝散因二八八擦敷真人養臟湯和一九四蟠龍散因二八七擦敷熏洗熨法因二百八十二八一參朮芎歸湯因二八二氣虛涼血清腸散因二八三血熱訶子人參湯因二八五虛陷
