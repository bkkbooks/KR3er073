body:
  text: 卷之三十貫集雜證謨血證經義決氣篇帝曰何謂血岐伯曰中焦受氣取汁變化而赤是謂血血脫者色白夭然不澤痿論曰心主身之血脈五臟生成篇曰諸血者皆屬於心人臥血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能攝臥出而風吹之血凝於膚者為痹凝於脈者為泣澀同凝於足者為厥此三者血行而不得反其空故為痹厥也調經論曰肝藏血血有餘則怒不足則恐孫絡外溢則經有留血氣血以並陰陽相傾氣亂於衛血逆於經氣血離居一實一虛血並於陰氣並於陽故為驚狂血並於陽氣並於陰乃為炅中血並於上氣並於下心煩惋善怒血並於下氣並於上亂而喜忘血氣者喜溫而惡寒寒則泣不能流溫則消而去之氣之所併為血虛血之所併為氣虛帝曰血併為虛氣併為虛是無實乎岐伯曰有者為實無者為虛故氣並則無血血並則無氣今血與氣相失故為虛焉絡之與孫脈俱輸於經血與氣並則為實焉血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死平人絶谷篇曰血脈和則精神乃居營衛生會篇帝曰夫血之與氣異名同類何謂也岐伯曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血故人有兩死而無兩生百病始生篇曰卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血六元正紀大論曰不遠熱則熱至血溢血泄之病生矣生氣通天論曰陽氣者大怒則形氣絶而血菀於上使人薄厥舉痛論曰怒則氣逆甚則嘔血及飧泄故氣上矣氣厥論曰脾移熱於肝則為驚衄胞移熱於膀胱則癃溺血刺志論曰脈實血實脈虛血虛此其常也反此者病脈盛血少此謂反也脈少血多此謂反也谷入多而氣少者得之有所脫血濕居下也脈小血多者飲中熱也脈大血少者脈有風氣水漿不入此之謂也脈要精微論曰肺脈搏堅而長當病唾血肝脈若搏因血在脅下令人喘逆腎脈耎而散者當病少血邪氣臟腑病形篇曰心脈微澀為血溢肺脈微急為肺寒熱怠惰咳唾血肺脈微滑為上下出血澀甚為嘔血肝脈大甚為內癰善嘔衄脾脈微澀為內㿉多下膿血腎脈微澀為不月示從容論曰血泄者脈急血無所行也玉機真藏論曰秋脈不及則令人喘呼吸少氣而咳上氣見血下聞病音平人氣象論曰臂多青脈曰脫血安臥脈盛謂之脫血陰陽別論曰陰虛陽搏謂之崩痿論曰悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也經脈篇曰腎足少陰也是動則病飢不欲食咳唾則有血喝喝而喘脈解篇曰少陰所謂咳則有血者陽脈傷也陽氣未盛於上而脈滿滿則咳故血見於鼻也厥論曰陽明厥逆喘咳身熱善驚衄嘔血至真要大論曰陽明司天咳不止而白血出者死陰陽別論曰結陰者便血一升再結二升三結三升五音五味篇曰婦人之生有餘於氣不足於血以其數脫血也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多氣多血厥陰常多氣少血少陰常多血少氣太陰常多血少氣此天之常數也評熱病論曰月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也宣明五氣篇曰咸走血血病無多食鹹曰陽病發於血曰久視傷血九針論曰苦走血病在血無食苦五味論曰咸走血多食之令人渴至真要大論曰凡太陽太陰少陽少陰司天在泉之年皆有見血等證又氣交變等論凡歲火太過及歲金太過不及之年亦有見血等證論證共四條萬物生成之道惟陰與陽非陽無以生生者神其化也非陰無以成成者立其形也人有陰陽即為血氣陽主氣故氣全則神王陰主血故血盛則形強人生所賴惟斯而已然人之初生必從精始精之與血若乎非類而丹家曰涕唾精津汗血液七般靈物總屬陰由此觀之則凡屬水類無非一六所化而血即精之屬也但精藏於腎所蘊不多而血富於沖所至皆是蓋其源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎灌溉一身無所不及故凡為七竅之靈為四肢之用為筋骨之和柔為肌肉之豐盛以至滋臟腑安神魂潤顏色充營衛津液得以通行二陰得以調暢凡形質所在無非血之用也是以人有此形惟賴此血故血衰則形萎血敗則形壞而百骸表裡之屬凡血虧之處則必隨所在而各見其偏廢之病倘至血脫則形何以立氣何所歸亡陰亡陽其危一也然血化於氣而成於陰陽虛固不能生血所以血宜溫而不宜寒陽亢則最能傷陰所以血宜靜而不宜動此盈虛性用之機苟能察其精義而得養營之道又何血病之足慮哉一血本陰精不宜動也而動則為病血為營氣不宜損也而損則為病蓋動者多由於火火盛則逼血妄行損者多由於氣氣傷則血無以存故有以七情而動火者有以七情而傷氣者有以勞倦色欲而動火者有以勞倦色欲而傷陰者或外邪不解而熱鬱於經或縱飲不節而火動於胃或中氣虛寒則不得收攝而注陷於下或陰盛格陽則火不歸原而泛溢於上是皆動血之因也故妄行於上則見於七竅流注於下則出乎二陰或壅瘀於經絡則發為癰疽膿血或鬱結於腸臟則留為血塊血癥或乘風熱則為斑為疹或滯陰寒則為痛為痹此皆血病之證也若七情勞倦不知節潛消暗爍不知養生意本虧而耗傷弗覺則為營氣之羸為形體之敝此以真陰不足亦無非血病也故凡治血者當察虛實是固然矣然實中有虛則於疼痛處有不宜攻擊者此似實非實也熱中有寒則於火證中有速宜溫補者此似熱非熱也夫正者正治誰不得而知之反者反治則吾未見有知之者矧反證甚多不可置之忽略也一失血於口者有咽喉之異蓋上焦出納之門戶惟咽喉二竅而已咽為胃之上竅故由於咽者必出於胃喉為肺之上竅故由於喉者必出於肺然喉連於肺而實總五臟之清道咽連於胃而實總六腑之濁道此其出於肺者人知病在五臟而不知出於胃者亦多由乎臟者也何也觀內經曰五臟者皆稟氣於胃胃者五臟之本也然則五臟之氣皆稟於胃而五臟之病獨不及於胃乎今見吐血之證古人云嘔血者出於胃而豈知其亦由乎臟也蓋凡胃火盛而大吐者此本家之病無待言也至若怒則氣逆甚則嘔血者亦必出於胃脘此氣逆在肝木邪乘胃而然也又如欲火上炎甚則嘔血者亦出於胃脘此火發源泉陰邪乘胃而然也由此觀之則凡五志之火皆能及胃而血出於咽者豈止胃家之病但咳而出者必出於喉出於喉者當察五臟嘔咯而出者必出於咽出於咽者則五臟六腑皆能及之且胃以水穀之海故為多氣多血之腑而實為衝任血海之源故凡血枯經閉者當求生血之源源在胃也而嘔血吐血者當求動血之源源在臟也於此不明濟者鮮矣一凡失血等證身熱脈大者難治身涼脈靜者易治若喘咳急而上氣逆脈見弦緊細數有熱不得臥者死論治共八條凡治血證須知其要而血動之由惟火惟氣耳故察火者但察其有火無火察氣者但察其氣虛氣實知此四者而得其所以則治血之法無餘義矣詳列如下一凡諸口鼻見血多由陽盛陰虛二火逼血而妄行諸竅也悉宜以一陰煎加清降等劑為主治蓋血隨氣上則有升無降故惟補陰抑陽則火清氣降而血自靜矣此治陽盛動血之大法也一火盛逼血妄行者或上或下必有火脈火證可據乃可以清火為先火清而血自安矣宜芩連知柏玄參梔子童便犀角天花粉生地芍藥龍膽草之屬擇而用之如陽明火盛者須加石膏三焦熱極或閉結不通者須加大黃如熱壅於上火不能降者於清火藥中須加澤瀉木通梔子之屬導之泄之則火可降血可清也然火有虛實或宜兼補或宜兼清所當酌也若以假火作真火則害不旋踵矣一氣逆於臟則血隨氣亂而錯經妄行然必有氣逆喘滿或胸脅痛脹或尺寸弦強等證此當以順氣為先宜陳皮青皮杏仁白芥子澤瀉之屬主之有火者宜梔子芍藥之類兼以平肝無火者宜香附烏藥乾薑鬱金之屬用行陰滯然此必氣實多逆者乃堪用此蓋氣順則血自寧也其或實中有虛不堪消耗者則或宜暫用或酌其佐使不可拘也一凡火不盛氣不逆而血動不止者乃其元陰受損營氣失守病在根本而然經曰起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則吐衄陰絡傷則血內溢血內溢則後血此二言者最得損傷失血之源故凡治損傷無火無氣而血不止者最不宜妄用寒涼以伐生氣又不宜妄用辛燥以動陽氣蓋此二者大非真陰虧損者所宜而治此之法但宜純甘至靜之品培之養之以完固損傷則營氣自將寧謐不待治血而自安矣且今人以勞傷而病者多屬此證若不救根本終必敗亡方列後條用宜詳酌一吐血失血等證凡見喘滿咳嗽及左右腔膈間有隱隱脹痛者此病在肺也若胸膈膻中之間覺有牽痛如縷如絲或懊憹嘈雜有不可名狀者此病在心主包絡也若胸腹膨膨不知飢飽食飲無味多涎沫者此病在脾也若脅肋牽痛或躁擾喘急不寧往來寒熱者此病在肝也若氣短似喘聲啞不出骨蒸盜汗咽乾喉痛動氣忡忡者此病在腎也若大嘔大吐煩渴頭痛大熱不得臥者此病在胃也於此而察其兼證則病有不止一臟者皆可參合以辨之也其於治法凡肺病者宜清降不宜升浮心主病者宜養營不宜耗散脾病者宜溫中不宜酸寒肝病者或宜疏利或宜甘緩不宜祕滯腎病者宜壯水宜滋陰不宜香燥克伐胃病者或宜大瀉或宜大補當察兼證虛實勿謂陽明證儘可攻也一治血之藥凡為君為臣或宜專用或宜相兼病有淺深方有輕重其間參合之妙固由乎人而性用之殊當知其類故茲條列於下血虛之治有主者宜熟地當歸枸杞鹿膠炙甘草之屬血虛之治有佐者宜山藥山茱萸杜仲棗仁菟絲子五味子之屬血有虛而微熱者宜涼補之以生地麥冬芍藥沙參牛膝雞子清阿膠之屬血有因於氣虛者宜補其氣以人參黃耆白朮之屬血有因於氣實者宜行之降之以青皮陳皮枳殼烏藥沉香木香香附栝蔞杏仁前胡白芥子海石之屬血有虛而滯者宜補之活之以當歸牛膝川芎熟地醇酒之屬血有寒滯不化及火不歸原者宜溫之以肉桂附子乾薑薑汁之屬血有亂動不寧者宜清之和之以茜根山楂丹皮丹參童便貝母竹瀝竹茹百合茅根側柏藕汁荷葉蒂柿霜桑寄生韭汁蘿蔔汁飛羅面黑墨之屬血有大熱者宜寒之瀉之以黃連黃芩黃柏知母玄參天花粉梔子石膏龍膽草苦參桑白皮香薷犀角青黛童便槐花之屬血有蓄而結者宜破之逐之以桃仁紅花蘇木玄胡三稜蓬朮五靈脂大黃芒硝之屬血有陷者宜舉之以升麻柴胡川芎白芷之屬血有燥者宜潤之以乳酪酥油蜂蜜天門冬柏子仁蓯蓉當歸百合胡桃肉之屬血有滑者宜澀之止之以棕灰發灰白芨人中白蒲黃松花百草霜百藥煎訶子五味子烏梅地榆文蛤川續斷椿白皮之屬血有澀者宜利之以牛膝車前茯苓澤瀉木通瞿麥益母草滑石之屬血有病於風濕者宜散之燥之以防風荊芥葛根秦艽蒼朮白朮半夏之屬一治血之劑古人多以四物湯為主然亦有宜與不宜者蓋補血行血無如當歸但當歸之性動而滑凡因火動血者忌之因火而嗽因濕而滑者皆忌之行血散血無如川芎然川芎之性升而散凡火載血上者忌之氣虛多汗火不歸原者皆忌之生血涼血無如生地斂血清血無如芍藥然二物皆涼凡陽虛者非宜也脾弱者非宜也脈弱身涼多嘔便溏者皆非宜也故凡四物湯以治血者不可不察其宜否之性吐血論治共十三條以下凡諸見血者皆當於此類求其義一吐血之病當知輕重凡偶有所傷而根本未搖者輕而易治但隨其所傷而宜清則清宜養則養隨藥可愈無足慮也惟積勞積損以致元氣大虛真陰不守者乃為危證此惟不慎其初所以致病於前倘病已及身而猶不知慎則未有能善其終者凡患此者非加意慎重而徒恃藥力以求免者難矣一吐血咯血凡因勞損而氣虛脈靜或微弦無力既非火證又非氣逆而血有妄行者此真陰內損絡脈受傷而然惟用甘醇補陰培養脈絡使營氣漸固而血自安矣宜一陰煎左歸飲六味地黃湯小營煎之類酌宜用之若虛在氣分者宜五福飲或大補元煎為最佳此等證候最忌寒涼亦忌行散皆非虛損所宜也一吐血咯血凡兼口渴咽痛躁煩喜冷脈滑便實小水赤熱等證此水不濟火陰虛陽勝而然治當滋陰壯水微佐清涼宜二陰煎四陰煎或加減一陰煎生地黃飲子天門冬丸之類察其臟氣隨宜用之若熱不甚者惟一陰煎左歸飲或六味地黃湯之類為宜凡此證候大忌辛溫如芎歸耆朮杜仲破故紙香附砂仁薑桂之屬皆所當避一吐血全由火盛而逼血上行者宜察火之微甚火微者宜局方犀角地黃湯或清化飲主之火暴盛而根本無傷者宜抽薪飲徙薪飲或黃連解毒湯三黃丸之類主之若胃火熱甚而煩熱作渴頭痛脈滑氣壅而吐血不止者宜白虎湯或抽薪飲若胃火熾盛而兼陰虛水虧者宜玉女煎若陽明實熱之甚而兼便結腹脹氣壅不降者宜拔萃犀角地黃湯或涼膈散或桃仁承氣湯之類主之然此證不多見必審知的確乃可用之毋孟浪也凡屬火證皆宜童便一飲酒過多而吐血者宜徙薪飲清化飲或葛花解酲湯加黃連丹皮主之一怒氣傷肝動肝火則火載血上動肝氣則氣逆血奔所以皆能嘔血凡肝火盛者必有煩熱脈證宜芍藥生地黃丹皮梔子澤瀉芩連之屬降其火而血自清若肝氣逆者必有胸脅痛滿等證宜芍藥生地黃青陳枳殼貝母澤瀉之屬行其氣而血自清若火因氣逆者惟化肝煎為宜其有病雖因怒而或逆氣已散者不得再加行散以傷真氣或肝火已平勿得過用苦寒再損元陽且凡肝氣為邪每多侮土故常致脾胃受傷及營血失守等證若察其無脹無火脈虛神困而血妄行者此其病傷在脾治當專理中氣宜五陰煎五福飲之類主之或兼火不生土則理中湯理陰煎之屬皆不可少勿謂始因怒氣而專意伐肝也一憂思過度損傷心脾以致吐血咯血者其病多非火證或常見氣短氣怯形色憔悴或胸懷郁然食飲無味或腹雖覺飢而不欲食或神魂驚困而臥不安是皆中氣虧損不能收攝所致速宜救本不得治標惟五福飲五陰煎之類為宜其或氣陷而稍滯者宜歸脾湯若陽分不足者宜理中湯或理陰煎之類主之若素多勞倦思慮或善嘔吐或善泄瀉而忽致吐血下血者此脾虛不能攝血非火證也宜六味回陽飲大加白朮主之切不可用清寒等藥暑毒傷人多令人吐衄失血蓋暑氣通心火毒刑肺也然暑既傷心熱又傷氣其人必脈虛氣怯體倦息微若但知為熱而過用寒涼則氣必愈傷害斯甚矣此惟生脈散人參湯之屬為宜若氣虛之甚者當以人參黃耆並加用之若火甚而熱渴煩悶者宜人參白虎湯或竹葉石膏湯若氣不甚虛者宜局方犀角地黃湯或枇杷葉散一格陽失血之證多因色欲勞傷過度以致真陽失守於陰分則無根虛火浮泛於上多見上熱下寒或頭紅面赤或喘促躁煩而大吐大衄失血不止但其六脈細微四肢厥逆或小水清利大便不實者此格陽虛火證也速宜引火歸原用鎮陰煎或八味地黃湯之類則火自降而血自安矣若用寒涼陽絶則死一所吐之血色黑而黯必停積失位之血非由火逼而動也或面白息微脈見緩弱身體清涼者此必脾腎氣虛不能攝血而然皆非火證若用涼血之劑必致殆矣三因方云理中湯能止傷胃吐血以其溫中大能分理陰陽安和胃氣故當用也若察其虛在陰分則又惟理陰煎為最宜一暴吐暴衄失血如湧多致血脫氣亦脫危在頃刻者此其內傷敗劇而然當此之際速宜以氣為主蓋有形之血不能即生無形之氣所當急固但使氣不盡脫則命猶可保血漸可生宜急用人參一二兩為細末加飛羅面一錢許或溫水或井花冷水隨其所好調如稀糊徐徐服之或濃煎獨參湯徐服亦可此正血脫益氣陽生陰長之大法也一凡血逆上焦紫黑成塊或痛或悶結聚不散者惟宜行散或吐出方好大都治血之法多忌辛散恐其能動血也惟此留滯之血則不妨用之如四物湯加香附肉桂蘇木紅花之屬無不可也或服韭汁亦善行瘀血若火鬱不散致血有留滯者惟於四物湯加炒山梔大能清胃脘之血一吐血不能止者惟飲童便最效或搗側柏葉以童便二分酒一分和而溫飲之大能止血吐血下血新按倪孝廉者年逾四旬素以燈窗思慮之勞傷及脾氣時有嘔吐之證過勞即發余常以理陰煎溫胃飲之屬隨飲即愈一日於暑末時因連日交際致勞心脾遂上為吐血下為泄血俱大如手片或紫或紅其多可畏急以延余而余適他往復延一時名者云此因勞而火起心脾兼以暑令正旺而二火相濟所以致此乃與犀角地黃童便知母之屬藥及兩劑其吐愈甚脈益緊數困憊垂危彼醫云此其脈證俱逆原無生理不可為也其子皇懼復至懇余因往視之則形勢俱劇第以素契不可辭乃用人參熟地乾薑甘草四味大劑與之初服毫不為動次服覺嘔惡稍止而脈中微有生意及復加附子炮姜各二錢人參熟地各一兩白朮四錢炙甘草一錢茯苓二錢黃昏與服竟得大睡直至四鼓復進之而嘔止血亦止遂大加溫補調理旬日而復健如故余初用此藥適一同道者在見之驚駭莫測其謂及其既愈乃始心服曰向始不有公在必為童便犀角黃連知母之所斃而人仍歸譽於前醫曰彼原說脈證俱逆本不可治終是識高見到人莫及也嗟嗟夫童便最能動嘔犀角知連最能敗脾時當二火而證非二火此人此證以勞倦傷脾而脾胃陽虛氣有不攝所以動血再用寒涼脾必敗而死矣倘以此殺人而反以此得譽天下不明之事類多如此亦何從而辨白哉此後有史姓等數人皆同此證豫悉用六味回陽飲活之此實至理而人以為異故並紀焉吐血附按薛立齊治星士張東谷談命時出中庭吐血一二口云久有此證遇勞即發余意此勞傷肺氣其血必敗視之果然與補中益氣加麥冬五味山藥熟地茯神遠志服之而愈翌早請見云服四物黃連山梔之屬而倦更甚得公一匕吐血頓止精神如故何也曰脾統血肺主氣此勞傷脾肺致血妄行故用前藥健脾肺之氣而噓血歸原耳吐血述古共三條褚氏遺書曰喉有竅咳血殺人腸有竅便血殺人便血猶可治咳血不可醫飲溲溺者百不一死服寒涼者百不一生血雖陰類運之者其和陽乎愚謂褚氏和陽之說真玄理之法言必不可不知也若溲溺之用則但於邪熱上炎者藉以降火是誠善矣其若傷在脾胃或陽虛陰勝等證則大非所宜勿謂百不一死可概用也楊仁齊曰血遇熱則宣流故止血多用涼藥然亦有氣虛挾寒陰陽不相為守營氣虛散血亦錯行所謂陽虛陰必走耳外必有寒冷之狀法當溫中使血自歸於經絡可用理中湯加南木香或甘草乾薑湯其效甚著又有飲食傷胃胃虛不能傳化其氣上逆亦能吐衄宜木香理中湯甘草乾薑湯通用徐東皋論王節齊曰凡酒色過度損傷肺腎真陰咳嗽吐痰吐衄咳咯血等證誤服參耆等甘溫之藥則病日增世人不識往往服之致不救者多矣噫此一隅之說非天下之通論甫論節齊議論多長而獨短於此何則凡諸失血證因火盛妄行而不宜於甘溫者理固然也其有虛火體氣弱甚者寧有不用參耆者乎葛可久治大吐血後用獨參湯一味服之所以治其虛也經曰虛者補之是以臞仙集之以為十藥神書今之治勞怯吐血立有起死回生之效然則彼以獨參湯者何其神歟又如丹溪治一人年五十勞嗽吐血用人參黃耆白朮茯苓百合阿膠白芍藥桑白皮杏仁貝母栝蔞海石五味天冬而愈又如局方人參湯專治胃弱吐血衄血之證然則彼皆非歟大抵用藥補瀉宜審人之虛實則無施不當也何甘溫之必不可用哉咳血論治共二條凡咳血嗽血者諸家皆言其出於肺咯血唾血者皆言其出於腎是豈足以盡之而不知咳嗽咯唾等血無不有關於腎也何也蓋腎脈從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中此肺腎相聯而病則俱病矣且血本精類而腎主五液故凡病血者雖有五臟之辨然無不由於水虧水虧則火盛火盛則刑金金病則肺燥肺燥則絡傷而嗽血液涸而成痰此其病標固在肺而病本則在腎也苟欲舍腎而治血終非治之善者第腎中自有水火水虛本不能滋養火虛尤不能化生有善窺水火之微者則洞垣之目無過是矣一咳血嗽血皆從肺竅中出雖若同類而實有不同也蓋咳血者少痰其出較難嗽血者多痰其出較易咳而少痰者水竭於下液涸於上也亦名干嗽嗽而多痰者水泛於上血化為痰也亦謂之白血此二者之治雖皆宜壯水補陰凡一陰煎四陰煎六味地黃湯麥門冬湯天門冬丸貝母丸之類皆必用之藥也然乾咳者宜加滋潤為佐如天冬麥冬百合柏子仁茜根之屬或當歸亦可酌用多痰者宜加清降為佐如貝母海石阿膠竹瀝之屬而當歸則非所宜也咳血辨古王節齊曰大抵咳嗽見血多是肺受熱邪氣得熱而變為火火盛而陰血不寧從火上升故治宜瀉火滋陰忌用人參等甘溫之藥然亦有氣虛而咳血者則宜用人參黃耆款冬花等藥但此等證不多耳愚意王氏之說乃多以火證為言故凡治血因火動而為咳嗽者則不得不於滋陰藥中加清火等劑如黃芩桑皮清肺火黃連清心火石膏清胃火梔子龍膽草清肝火黃柏知母清腎火貝母栝蔞竹葉枇杷葉潤肺化痰此等治法非不可用然惟火之偶盛而根本未虧者則但去其火自無不愈若用此法概治勞損總不過暫解燃眉終非救本之道蓋凡陰虛生火等證多以真陰受傷水虧而然此其所重在陰不當在火若治火太過則未免脾腎俱敗必致不救此所以虛火宜補也且常有過服天冬生地之類致傷胃氣不能生金而不愈者又有妄用黃柏知母之屬愈損真陰遏絶生氣而不復者此又傷而復傷則尤為脾肺腎三陰虧損之害故凡欲壯水補陰者無如一陰煎左歸飲或五陰煎五福飲大補元煎六味地黃丸等方斯為最妥其有火本無根化元失守或誤用寒涼而病及脾肺則有以寒在上焦而為嘔惡為短氣為眩運者有以寒在中焦而為膨滿為痰涎為飲食不運者有以寒在下焦而為溏泄為腹痛為小水不化為足寒膝冷等證則理中湯理陰煎或右歸飲右歸丸八味地黃丸之類皆當隨證隨臟擇而用之勿謂見血者多是肺受熱邪而但知滋陰降火則必多為人害矣衄血論治共五條衄血證諸家但謂其出於肺蓋以鼻為肺之竅也不知鼻為手足陰明之正經而手足太陽亦皆至鼻故仲景曰太陽病脈浮緊發熱身無汗自衄者愈此太陽之衄也原病式曰陽熱怫鬱於足陽明而上熱則血妄行為鼻衄此陽明之衄也若以愚見言之則凡鼻衄之血必自山根以上精明之次而來而精明一穴乃手足太陽足陽明陰陽蹺五脈之會此諸經皆能為衄也然行於脊背者無如足太陽為最行於胸腹者無如足陽明為最而尤有其最者則又惟衝脈為十二經之血海沖之上俞出足太陽之大杼沖之下俞會足陽明之氣街故太陽陽明之至而衝脈無不至矣衝脈之至則十二經無不至矣所以衄之微者不過一經之近而衄之甚者則甚至數升或至鬥許並通身形色盡脫又豈特手太陰一經而病至如是耶臨證者不可不察一衄血之由內熱者多在陽明經治當以清降為主微熱者宜生地芍藥天冬麥冬玄參丹參或局方犀角地黃湯生地黃飲子麥門冬散之類主之熱甚者宜芩連梔柏或茜根散抽薪飲加減一陰煎若兼頭痛口渴者宜玉女煎白虎湯之類主之或陽明熱極下不通而火壅於上者宜拔萃犀角地黃湯之類通其下而上自愈一衄血之由外感者多在足太陽經觀仲景曰傷寒脈浮緊不發汗因致衄者麻黃湯主之曰傷寒不大便其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯成無己曰傷寒衄者為邪氣不得發散壅盛於經逼迫於血因致衄也麻黃湯桂枝湯治衄者非治衄也即是發散經中邪氣耳按此論治則凡傷寒因衄而邪得解者即所以代汗也不必治之若雖見衄血而脈仍浮緊熱仍不退是必衄有未透而表邪之猶未解耳故仍宜麻黃桂枝等湯然此二湯乃仲景正傷寒之治法倘病由溫熱而有未宜於此者則但於傷寒門擇散劑之宜者用之或於余新方中諸柴胡飲隨宜用之自無不可一衄血雖多由火而惟於陰虛者為尤多正以勞損傷陰則水不制火最能動衝任陰分之血但察其脈之滑實有力及素無傷損者當作火治如前若脈來洪大無力或弦或芤或細數無神而素多酒色內傷者此皆陰虛之證當專以補陰為主若有微火者自當兼而清之以治其標若雖見虛熱而無真確陽證則但當以甘平之劑溫養真陰務令陰氣完固乃可拔本塞源永無後患如一陰煎三陰煎左歸飲六味地黃湯之類皆必用之劑如兼氣虛者則五福飲五陰煎之屬皆當隨意用之一止衄法凡衄血甚多不能止者用蒜一頭搗如泥作餅如錢大厚一分許貼腳心左衄貼右右衄貼左兩孔俱出者左右俱貼即止又止衄歌因九四止衄方因九三鼻衄蒸法因九五黑神散和二二俱可擇用衄血新按一衄血有格陽證者以陰虧於下而陽浮於上但察其六脈細微全無熱證或脈見浮虛豁大上熱下寒而血衄不止皆其證也治宜益火之源古有八味地黃湯乃其對證之劑余復有鎮陰煎之制其效尤捷蓋此證不惟內傷者有之即傷寒者亦有之然必其素多斫喪損及真陰者乃見此證余嘗治一多欲少年以傷寒七日之後忽爾鼻衄以為將解之兆及自辰至申所衄者一斗余鼻息脈息俱已將脫身涼如冰目視俱直而猶涓涓不絶呼吸垂危其父母號呼求救余急投鎮陰煎一劑衄乃止身乃溫次加調理而愈自後凡治此證無不響應亦神矣哉齒衄舌血論治共五條一血從齒縫牙齦中出者名為齒衄此手足陽明二經及足少陰腎家之病蓋手陽明入下齒中足陽明入上齒中又腎主骨齒者骨之所終也此雖皆能為齒病然血出於經則惟陽明為最故凡陽明火盛則為口臭為牙根腐爛腫痛或血出如湧而齒不動搖必其人素好肥甘辛熱之物或善飲胃強者多有陽明實熱之證宜內服抽薪飲清胃散等劑外以冰玉散敷之一陽明實熱之甚大便閉結不通而齒衄不止者宜調胃承氣湯下之一腎水不足口不臭牙不痛但齒搖不堅或微痛不甚而牙縫時多出血者此腎陰不固虛火偶動而然但宜壯腎以六味地黃丸左歸丸之類主之或其陽虛於下而虛火上浮者宜八味丸小安腎丸之類主之一陰虛有火而病為齒衄者其證或多燥渴或見消瘦或神氣困倦或小水短澀而熱或六脈浮大而豁此雖陽明有餘而亦少陰不足宜玉女煎主之凡屬陰虛有火者則惟此煎為最妙然必大便多實者乃可用之若大便滑泄或脈細惡寒下元無火等證則亦有格陽而然者當以前吐血條中格陽法治之舌上無故出血如縷者以心脾腎之脈皆及於舌若此諸經有火則皆能令舌出血用蒲黃炒焦為末敷之或炒槐花為末摻之或冰玉散敷之亦可若火之甚者仍須用湯飲等劑以清三陰之火咯唾痰涎血論治共三條一咯血唾血古皆云出於腎痰涎之血云出於於脾此亦未必然也凡咯血者於喉中微咯即出非若咳血嗽血之費力而甚也大都咳嗽而出者出於臟出於臟者其來遠一咯而出者出於喉出於喉者其來近其來遠者內傷已甚其來近者不過在經絡之間所以凡見咯血唾血及痰涎中帶血者多無咳嗽發熱氣喘骨蒸等證此其輕重為可知矣治此之法凡因火者亦不過微清脾肺之火或因勞倦而致者但為養營補陰則自無不愈一勞損之漸者必初因酒色勞傷過度以致痰中或見血絲此則本於肝脾腎經當於未咳未嗽之先速為調理宜生地熟地天冬麥冬棗仁茯神茜根貝母甘草之屬主之或有火者宜加黃柏知母仍須加意謹慎庶無後患否則必漸甚也一清晨初起時每於痰中有淡紫凝血或塊或片常見數口者此多以操心動火或多思郁或由過飲但無咳嗽發熱等證即不足慮此不過致動絡血而然惟天王補心丹或二陰煎之類最所宜也咯血述古薛立齊曰若脾經氣滯而痰中有血者宜加味歸脾湯若肝經血熱而痰中有血宜加味逍遙散若肝腎陰虛而痰中有血宜六味地黃丸若過服寒涼而唾痰有血者宜四君子類溺血論治共五條凡溺血證其所出之由有三蓋從溺孔出者二從精孔出者一也一溺孔之血其來近者出自膀胱其證溺時必孔道澀痛小水紅赤不利此多以酒色欲念致動下焦之火而然常見相火妄動逆而不通者微則淋濁甚則見血經曰胞移熱於膀胱則癃而溺血即此證也治宜清利膀胱之火以生地芍藥牛膝山梔黃柏知母龍膽草瞿麥木通澤瀉等劑或七正散大分清飲五淋散之屬皆所宜也一溺孔之血其來遠者出自小腸其證則溺孔不痛而血隨溺出或痛隱於臍腹或熱見於臟腑蓋小腸與心為表裡此丙火氣化之源清濁所由以分也故無論焦心勞力或厚味酒漿而上中二焦五志口腹之火凡從清道以降者必皆由小腸以達膀胱也治須隨證察因以清臟腑致火之源宜於寒陳中擇方用之一精道之血必自精宮血海而出於命門蓋腎者主水受五臟六腑之精而藏之故凡勞傷五臟或五志之火致令衝任動血者多從精道而出然何以辨之但病在小腸者必從溺出病在命門者必從精出凡於小腹下精泄處覺有痠痛而出者即是命門之病而治之之法亦與水道者不同蓋水道之血宜利精道之血不宜利澀痛不通者亦宜利血滑不痛者不宜利也若果三焦火盛者惟宜清火涼血為主以生地芍藥丹皮地骨茜根梔子槐花及芩連知柏之類主之或約陰丸約陰煎俱可用若腎陰不足而精血不固者宜養陰養血為主以左歸飲或人參固本丸之類主之若腎虛不禁或病久精血滑泄者宜固澀為主以祕元煎苓朮菟絲丸金櫻膏玉鎖丹金鎖思仙丹之類主之或續斷烏梅之屬亦所宜用若心氣不定精神外馳以致水火相殘精血失守者宜養心安神為主以人參丸天王補心丹王荊公妙香散之類主之若脾肺氣虛下陷不能攝血而下者宜歸脾湯人參養營湯補中益氣湯舉元煎之類主之一血從精道出者是即血淋之屬多因房勞以致陰虛火動營血妄行而然凡血出命門而澀痛者為血淋不痛者為溺血好色者必屬虛也便血論治共十條便血之與腸澼本非同類蓋便血者大便多實而血自下也腸澼者因瀉痢而見膿血即痢疾也觀內經曰食飲不節起居不時者陰受之陰受之則入五臟入五臟則䐜滿閉塞下為飧泄久為腸澼此可見腸澼之因飧泄自與便血不同而治亦有異且便血有夙疾而腸澼惟新邪尤為易辨今諸書以此類言者皆誤也茲列便血證治於此而腸澼之義則在痢疾門故凡臨此證者必須詳察大便之燥泄何如庶不致疑似誤認之謬然多酒之人必多溏泄亦多便血是又不可因泄而作腸澼也一大便下血多由腸胃之火蓋大腸小腸皆屬於胃也但血在便前者其來近近者或在廣腸或在肛門血在便後者其來遠遠者或在小腸或在於胃雖血之妄行由火者多然未必盡由於火也故於火證之處則有脾胃陽虛而不能統血者有氣陷而血亦陷者有病久滑泄而血因以動者有風邪結於陰分而為便血者大都有火者多因血熱無火者多因虛滑故治血者但當知虛實之要一下血因火者宜清熱為主惟約營煎最佳次以地榆散槐花散黃連丸槐角丸之類主之若熱在脾胃小腸之間而火之甚者宜抽薪飲黃連解毒湯之類主之若素以腸臟多火而遠年近日臟毒下血久不能愈者宜臟連丸豬臟丸主之若大腸風熱而血不止者宜防風黃芩丸主之一酒毒濕熱結蓄大腸下血者宜約營煎聚金丸或槐角丸之類主之若但以寒濕而無火下血者宜二術煎或四君子湯主之或葛花解酲湯亦佳一脾胃氣虛而大便下血者其血不甚鮮紅或紫色或黑色此陽敗而然故多無熱證而或見噁心嘔吐蓋脾統血脾氣虛則不能收攝脾化血脾氣虛則不能運化是皆血無所主因而脫陷妄行速宜溫補脾胃以壽脾煎理中湯養中煎歸脾湯或十全大補湯之類主之一氣陷不舉而血不止者宜補中益氣湯或壽脾煎歸脾湯主之若微陷而兼火者宜東垣加減四物湯主之若氣大虛而大陷者宜舉元煎主之一血滑不止者或因病久而滑或因年衰而滑或因氣虛而滑或因誤用攻擊以致氣陷而滑凡動血之初多由於火及火邪既衰而仍有不能止者非虛即滑也凡此之類皆當以固澀為主宜勝金丸香梅丸之類主之然血滑不止者多由氣虛宜以人參湯送之尤妙或以補中益氣湯歸脾湯舉元煎理中湯加烏梅文蛤五味子之類主之若滑甚不能止者惟玉關丸最佳一結陰便血者以風寒之邪結於陰分而然此非傷寒之比蓋邪在五臟留而不去是謂之結陰邪內結不得外行則病歸血分故為便血經曰結陰者便血一升再結二升三結三升正此之謂此宜外灸中脘氣海三里以散風邪內以平胃地榆湯溫散之劑主之一怒氣傷肝血因氣逆而下者宜化肝煎枳殼湯之類主之若逆氣散而微有火者宜黃芩芍藥湯主之若肝邪乘胃以致脾虛失血者自無煩熱氣逆等證宜從前脾胃氣虛證治不得平肝以再傷脾氣也一凡因勞倦七情內傷不足而致大便動血者非傷心脾即傷肝腎此其中氣受傷故有為嘔惡痞滿者有為疼痛泄瀉者有為寒熱往來飲食不進者時醫不能察本但見此證非雲氣滯即云痰火而肆用寒涼妄加攻擊傷而又傷必致延綿日困及其既甚則多有大便下紫黑敗血者此胃氣大損脾元脫竭血無所統故注泄下行陽敗於陰故色為灰黑此危劇證也即速用回陽等劑猶恐不及而若輩猶云今既見血安可再用溫藥必致其斃籲受害者殊為可憫害人者殊為可恨便血述古徐東皋曰凡下血之人用涼藥多而不愈者必須加辛味用辛味而不愈可用溫劑兼升提藥須酒浸酒炒始效凡久而虛者當行溫散如四物加升麻炮乾薑之屬是也血證論列方一陰煎新補八二陰煎新補十一三陰煎新補十一大補元煎新補一四陰煎新補十二四君子湯補一五陰煎新補十三五福飲新補六麥門冬湯寒四四左歸飲新補二右歸飲新補三麥門冬散補七七左歸丸新補四右歸丸新補五大分清飲新寒五小營煎新補十五生脈散補五六枇杷葉散和二百六人參湯補三四人參丸補百五天門冬丸和二一三養中煎新熱四壽脾煎新熱十六小安腎丸熱一六七四物湯補八歸脾湯補三二加味歸脾湯補三三六味丸百二十八味丸補一二一十全大補湯補二十舉元煎新補十七鎮陰煎新熱十三人參養營湯補二一理中湯熱一理陰煎新熱三加味四物湯寒九九白虎湯寒二玉女煎新寒十二人參白虎湯寒三約營煎新寒二十化肝煎新寒十祕元煎新固一加減一陰煎新補九貝母丸新和十八約陰丸新寒十八清化飲新因十三冰玉散新因四六天王補心丹補百八抽薪飲新寒三徙薪飲新寒四人參固本丸補百六七正散寒百十六五淋散寒百十