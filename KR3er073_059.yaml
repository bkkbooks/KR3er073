body:
  text: 卷之五十九宙集古方八陳固陳局方牡蠣散治諸虛不足及大病後體虛津液不固常常自汗黃耆蜜炙麻黃根牡蠣煅淬醋中各二錢半水一鍾半加小麥百粒煎八分食遠溫服牡蠣白朮散治漏風證以飲酒中風汗多食則汗出如洗久而不治必成消渴牡蠣煅一錢白朮炒防風各二錢水二鍾煎八分食遠溫服宣明白朮散治虛風多汗食則汗出如洗少氣痿弱不治必為消渴證白朮二兩防風五兩牡蠣煅六錢上為末每服一錢溫水調下不拘時如惡風倍白朮如多汗而腫倍牡蠣按此方雖與前同而用法不同故並存之神效麥麵湯治心虛盜汗麥面炒黃色一錢防風白朮牡蠣煅醋淬黃耆蜜炙一錢半水一鍾半棗二枚煎八分調服辰砂妙香散極效在後十五黃耆湯方在補陳治自汗盜汗聖惠寧肺散治新久咳嗽肺氣不通咯唾膿血自汗咳嗽常年不愈者服之立止並坐臥不安語言不出等證烏梅肉七分罌粟殼二錢去筋蜜炙上為細末不拘時烏梅湯調下選要安眠散治上喘咳嗽久而不止款冬花麥門冬烏梅肉佛耳草各四分橘紅五分炙甘草三分粟殼蜜炙一錢上為末水一鍾煎八分入黃蠟如棗核許煎化臨睡溫服丹溪百藥煎劫嗽立止百藥煎訶子荊芥穗等分上為極細末蜜丸噙化集成三妙湯治久嗽烏梅肉二個北棗三枚粟殼蜜炙四個水一鍾半煎七分食後服九仙散治一切咳嗽不已人參款冬花桔梗桑白皮五味子阿膠貝母烏梅各五分御粟殼二錢蜜炙水一鍾半姜一片棗一枚煎七分食遠服劫嗽丸治久嗽失氣失聲者宜此斂之新咳者不宜用也訶子肉百藥煎荊芥穗等分上為細末蜜丸噙化五味子丸劫咳嗽如神五味子五錢甘草二錢半文蛤風化硝各一錢上為末煉蜜丸芡實大噙化罌粟丸治一切久嗽勞嗽一服即愈罌粟殼新者一半去蒂切焙乾陳者一半泡去筋膜炒各一兩上共為末蜜丸彈子大臨睡嚼服一丸一方用罌粟子半斤淘淨焙乾炒黃為末沙糖丸彈子大每服一丸臨臥綿包含化統旨潤肺丸治咳嗽訶子五味子五倍子甘草等分上為末蜜丸噙化久嗽者加罌粟殼良方辰砂妙香散治心氣不足驚癇或精神恍惚虛煩少氣少睡夜多盜汗心虛遺精白濁服之安神鎮心黃耆山藥薑汁炒茯苓茯神遠志甘草湯制各一兩人參炙甘草桔梗各五錢木香二錢麝香一錢另研硃砂三錢另研上為末每服二錢不拘時溫酒調下或用麥麵湯調下局方王荊公妙香散安神祕精定心氣人參龍骨五色者益智各一兩白茯神白茯苓遠志制甘草炙各五錢硃砂飛二錢半上為末每服二錢空心臨臥溫酒調下本事金鎖丹治夢泄遺精關鎖不固舶茴香葫蘆巴破故炒白龍骨各一兩木香兩半胡桃肉三十個研膏羊腎三對切開用鹽半兩擦炙熟搗膏上為末和二膏加酒浸蒸餅為丸桐子大每服三五十丸空心鹽湯下和劑金鎖正元丹治真氣不足遺精盜汗目暗耳鳴吸吸短氣四肢酸倦一切虛損等證補骨脂一兩酒浸炒肉蓯蓉酒洗焙紫巴戟去心葫蘆巴炒各一斤文蛤八兩茯苓去皮六兩龍骨二兩硃砂三兩另研上為細末酒糊丸桐子大每服二十丸空心溫酒鹽湯任下萬氏金鎖思仙丹治男子嗜欲太過精血不固此澀以去脫之劑蓮蕊芡實石蓮子各十兩金櫻膏三斤上以金櫻煎膏如餳入前三味藥末和丸桐子大空心鹽酒下三十丸服久精神完固大能延年平時服食忌葵菜車前子醫林金鎖匙丹治男婦精滑遺泄不禁夢與鬼交茯苓茯神各二錢遠志制龍骨煅各三錢左股牡蠣煅四錢上為末酒糊丸桐子大每服四十丸空心鹽湯或酒下玉鎖丹治玉門不閉遺精日久如水之漏不能關束者文蛤八兩白茯苓二兩白龍骨一兩上為細末米糊丸桐子大每服七十丸空心淡鹽湯下臨睡更進一服極效御藥玉鎖丹治精氣虛滑遺泄不禁龍骨蓮花蕊雞頭子烏梅肉等分上為末用熟山藥去皮為膏和丸小豆大空心米湯下三十丸經驗水陸二仙丹治精脫腎虛夢遺白濁等證與補陰藥同用甚有奇效金櫻膏一斤用金櫻子不拘多少入粗麻布袋內擦去毛刺搗爛入缸以水沒頭浸一二宿濾去柤取汁以棉濾二三次卻入銅鍋用桑柴文火熬成膏取起以瓷瓶收貯聽用芡實粉一斤上二味和勻丸桐子大每服二三百丸空心淡鹽湯下經驗金櫻丸治夢遺精滑小便後遺溺金櫻子芡實各一兩龍骨煅白蓮蕊各五錢上為末糊丸桐子大每服八十丸空心鹽酒下正傳經驗祕真丹治腎虛遺精夢泄白濁等證菟絲子制韭子破故炒杜仲薑湯炒乾薑炒各一兩龍骨牡蠣煅山茱萸赤石脂各五錢遠志覆盆子巴戟肉枸杞山藥各七錢半鹿角膠一兩半柏子仁一兩金櫻子取黃者去刺核焙淨肉二兩黃柏鹽酒炒七錢五分上為細末煉蜜丸桐子大每服百丸空心姜鹽湯下局方鎖精丸治白濁白帶小便頻數破故紙青鹽白茯苓五味子炒等分一方用五倍子上為末酒糊丸桐子大每服三十丸空心溫酒下東垣固真丸治精滑久不愈牡蠣不拘多少用砂鍋內煅醋淬七遍為末上以醋糊為丸桐子大每服五七十丸空心鹽湯下良方固真散治才睡著即泄精此二味大能澀精固真氣暖下元韭子一合白龍骨一兩上為細末每服二錢空心用酒調服濟生固精丸治下元虛損白濁如脂或胞氣虛寒腰重少力小便無度並效牡蠣煅菟絲子酒浸蒸炒韭子炒龍骨煅北五味炒白茯苓桑螵蛸酒炙白石脂煅各等分上為細末酒糊丸桐子大每服七十丸空心鹽湯下直指固精丸治腎虛有火精滑心神不安黃柏酒炒知母酒炒各一兩牡蠣煅龍骨煅蓮蕊芡實山茱萸遠志甘草制茯苓各三錢上為末山藥糊丸桐子大每服五十丸空心溫酒下百一固元丹治元臟久虛遺精白濁五淋及小腸膀胱疝氣婦人赤白帶下血崩便血等疾以小便頻利為效好蒼朮刮淨米泔浸咀片一斤擇堅而小者佳惟茅山者尤妙分作四分制之一分用小茴香食鹽各一兩同炒一分用川椒補骨脂各一兩同炒一分用川烏頭川楝子肉各一兩同炒一分用醇醋老酒各半斤同煮乾焙燥上連炒諸藥同為末用酒煮糊丸桐子大每服三五十丸男以溫酒女以醋湯空心下此高司法方也御藥祕元丹治內虛里寒自汗時出小便不禁白龍骨三兩訶子肉砂仁各一兩靈砂二兩上為末煮糯米粥丸桐子大每服五十丸空心鹽酒下韭子丸治虛勞寒脫漏精韭子炒車前子天雄制菟絲子酒煮另搗龍骨各一兩鹿茸酥炙乾薑炮桑螵蛸炒各三錢上為末煉蜜丸桐子大每服二三十丸空心黃耆湯下三因家韭子丸治少長遺溺及男子虛劇陽氣衰敗小便白濁夜夢遺精此藥補養元氣進美飲食按此方當除去石斛倍用菟絲庶乎尤效家韭子炒六兩鹿茸酥炙四兩肉蓯蓉酒浸牛膝酒浸熟地當歸各二兩菟絲子酒煮巴戟肉各一兩半杜仲炒石斛桂心乾薑炮各一兩酒糊丸桐子大每服五七十丸加至百餘丸食前溫酒鹽湯任下凡小兒遺尿者多因胞寒亦稟受陽氣不足也作小丸服之小菟絲子丸治腎氣虛損目眩耳鳴四肢倦怠夜夢遺精菟絲子制五兩石蓮肉二兩白茯苓二兩山藥炒二兩分一半作糊用山藥糊丸桐子大每服五十丸空心溫酒鹽湯任下一方有五味子一兩治小便多而不禁局方大菟絲子丸治腎氣虛損五勞七傷腳膝痠痛面色黎黑目眩耳鳴心忡氣短時有盜汗小便滑數菟絲子酒製鹿茸酥炙肉桂石龍肉去土附子炮澤瀉各一兩熟地牛膝酒浸一宿焙乾山茱萸杜仲炒茯苓肉蓯蓉酒浸切焙續斷石斛防風補骨脂酒炒蓽茇巴戟肉茴香炒沉香各三兩川芎五味桑螵蛸覆盆子各五錢上為末酒煮麵糊丸桐子大每服三五十丸空心鹽湯溫酒任下濟生菟絲子丸治小便多致失禁菟絲子制肉蓯蓉酒浸各二兩牡蠣煅附子炮五味子鹿茸酒炙各一兩雞䏶胵炙乾五錢桑螵蛸酒炙五錢上為末酒糊丸桐子大每服七十丸空心鹽湯溫酒任下局方茯菟丸治思慮太過心腎虛損真陽不固尿有餘瀝或小便白濁夢寐遺精等證菟絲子制五兩白茯苓三兩石蓮肉二兩酒糊丸桐子大每服三五十丸空心鹽湯或米湯下一方有北五味子四兩兼治三消豬肚丸治小便頻數蓮子一斤以豬肚一個同煮一周日取出去皮心焙乾為末舶茴香破故紙川楝子母丁香各一兩上為末煉蜜丸桐子大每服五十丸空心溫酒送下經驗豬肚丸止夢遺泄精進飲食健肢體此藥神應瘦者服之自肥莫測其理白朮麵炒五兩苦參白者三兩牡蠣左扇者煅研四兩上為末用雄豬肚一具洗淨以瓷罐煮極爛木石臼搗如泥和藥再加肚汁搗半日丸如小豆大每服四五十丸日進三服米飲送下久服自覺身肥而夢遺永止良方三仙丸治夢遺精滑益智仁二兩用鹽二兩同炒去鹽烏藥一兩半炒山藥一兩炒上為末山藥煮糊丸桐子大每服七十丸空心茯苓湯送下丹溪九龍丸治腎虛精滑金櫻子枸杞山茱萸蓮蕊蓮肉當歸熟地芡實白茯苓各等分上為末酒糊丸桐子大每服五六十丸或酒或鹽湯下小溫金散治心腎虛熱小便赤白淋瀝或不時自汗等證人參蓮肉去心巴戟肉益智黃耆蜜炙麥冬去心赤茯苓萆薢酒浸炒炙甘草各一錢燈心十莖棗一枚水煎服仁齊蓮子六一散治心經虛熱赤濁石蓮子六兩炙甘草一兩為末每服三錢燈心湯調下和劑威喜丸治元陽虛憊精滑白濁遺尿及婦人血海久冷淫帶夢泄等證白茯苓去皮四兩切塊同豬苓二錢五分同於瓷器內煮二十餘沸取出曬乾不用豬苓黃蠟四兩上以茯苓為末熔黃蠟搜和為丸如彈子大每空心細嚼滿口生津徐徐咽服以小便清利為效忌米醋惟糠醋可用尤忌氣怒動性五子丸治小便頻數時有白濁菟絲子酒蒸家韭子炒益智茴香炒蛇床子去皮炒上各等分為末酒糊丸桐子大每服七十丸米飲鹽湯任下遠志丸方在補陳治神魂恍惚夢泄遺精本事豬苓丸此方以行為止治濕鬱熱滯小水頻數夢遺精滑半夏一兩將半夏破如豆粒用豬苓為末二兩先將一兩炒半夏色黃勿令焦出火毒取半夏為末糊丸桐子大候乾用前豬苓末一半又同炒微裂入瓷瓶內養之空心溫酒鹽湯下三四十丸常又服於未申間以溫酒下泄瀉經驗方治泄瀉飲食少進用糯米一升水浸一宿瀝乾慢火炒令極熟磨細羅如飛面加懷山藥一兩炒研末和米粉內每日清晨用半盞入白糖二匙川椒末少許將極滾湯調食其味甚佳且不厭人大有資補久服之其有精寒不能成孕者亦孕矣固腸散治脾胃虛弱內寒注泄水穀不分下痢膿血赤少白多腸滑腹痛心腹脹滿食減力乏陳米炒二兩木香一錢肉豆蔻生粟殼蜜炙各二錢乾薑炮炙甘草各二錢半上為末每服二錢水一鍾姜三片棗一枚煎七分不拘時溫服忌酒豬肉魚腥生冷白朮聖散子方在熱陳治一切瀉痢久不瘥陳氏肉豆蔻丸方在小兒治瀉痢腸滑不止醫林固腸丸治瀉痢日夜無度人參附子制阿膠炒龍骨研肉豆蔻麵煨赤石脂煨醋淬乾薑炒木香各一兩白朮炒訶子肉各二兩沉香五錢上為末粳米糊丸桐子大每服七八十丸米飲下局方大斷下丸治臟腑停寒下痢不已乾薑炮高良薑細辛各兩半附子制牡蠣煅龍骨研赤石脂煨肉豆蔻麵煨訶子肉枯礬酸石榴皮醋浸一宿炙黃用各一兩上為細末醋煮麵糊為丸桐子大每服五七十丸米飲送下東垣椿皮散治血痢及腸風下血神效椿根白皮枯白礬各二兩槐角子四兩炙甘草一兩上為細末每服三錢米飲調下桃花丸治腸胃虛弱冷氣乘之臍腹攪痛下痢腸滑不禁日夜無度此即仲景桃花湯之法方見熱陳赤石脂煅醋淬乾薑炮等分上為末湯浸蒸餅丸梧子大每服百餘丸食前米飲下日三服若痢久虛滑去積不已用蒼朮二兩防風五錢水一碗煎至半碗下此丸小便利則安生地黃湯治熱痢便血崩淋不止生地黃五錢地榆七錢半炙甘草二錢半上㕮咀用水二鍾煎一鍾分空心日晚二服香梅丸治腸風下血服之即止烏梅肉白芷百藥煎燒存性等分上為末米糊丸桐子大每服五六十丸空心米湯下勝金丸一名百藥散治腸風下血溺血不止及臟毒便血百藥煎三兩生用一兩炒焦一兩燒存性一兩上為末軟飯和丸或蜜丸桐子大每服五七十丸空心米飲下或人參湯下濟生烏梅丸治大便下血如神殭蠶炒一兩烏梅肉一兩半上為末醋糊丸桐子大每服四五十丸空心醋湯下縮泉丸治脬氣不足小便頻多烏藥益智等分為末酒煮山藥糊為丸桐子大每服五七十丸空心鹽湯下四味肉蓯蓉丸治稟賦虛弱小便遺數不禁此即集要四神丸補陳一五八熟地六兩五味子四兩肉蓯蓉酒洗去甲八兩菟絲子制二兩酒煮山藥糊丸桐子大每服七八十丸空心鹽湯下固脬丸治遺尿不覺小便不禁菟絲子制三兩茴香一兩桑螵蛸炙製附子各五錢戎鹽一錢上為末酒煮麵糊丸桐子大每服三十丸空心米飲下牡蠣丸治小便不禁牡蠣三兩用瓷器盛以鹽末一兩鋪底蓋面用炭火約五斤燒半日取出研赤石脂三兩搗碎醋拌勻濕於鐵鍋內慢火炒乾研粉上用酒糊丸桐子大每服五十丸空心鹽湯下心統茴香益智丸治老人陽虛失禁及房勞傷腎遺溺小茴香鹽炒益智仁炒故紙酒炒川烏炮烏藥各一兩上為末山藥糊丸桐子大每服八十丸鹽湯下溺血方文蛤炒為末上以烏梅肉浸爛搗膏丸桐子大空心酒下五六十丸
