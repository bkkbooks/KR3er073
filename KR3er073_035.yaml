body:
  text: 卷之三十五天集雜證謨諸蟲經義厥病篇曰腸中有蟲瘕及蛟蛕皆不可取以小針心腸痛憹作痛腫聚往來上下行痛有休止腹熱喜渴涎出者是蛟蛕也以手按聚而堅持之無令得移以大針刺之久持之蟲不動乃出針也㤣腹憹痛形中上者口問篇帝曰人之涎下者何氣使然岐伯曰飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下補足少陰五癃津液別篇曰中熱則胃中消穀消穀則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出上膈篇曰氣為上膈者食飲入而還出蟲為下膈下膈者食晬時乃出詳噎膈門氣交變大論曰歲木不及收殺氣行寒雨害物蟲食甘黃脾土受邪歲土不及復則收政嚴峻名木蒼凋蟲食甘黃氣客於脾論疾診尺篇曰肘後粗以下三四寸熱者腸中有蟲邪氣臟腑病形篇曰脾脈微滑為蟲毒蛕蠍腹熱論證共三條蟲之為病人多有之由於化生誠為莫測在古方書雖曰由濕由熱由口腹不節由食飲停積而生是固皆有之矣然以常見驗之則凡臟強氣盛者未聞其有蟲正以隨食隨化蟲自難存而蟲能為患者終是臟氣之弱行化之遲所以停聚而漸致生蟲耳然則或由濕熱或由生冷或由肥甘或由滯膩皆可生蟲非獨濕熱已也然以上數者之中又惟生冷生蟲為最即如收藏諸物但著生水或近陰濕則最易蛀腐非其義乎故凡欲愛養小兒即當節其水果以防敗脾此實緊要之一端也至若治蟲之法雖當去蟲而欲治生蟲之本以杜其源猶當以溫養脾腎元氣為主但使臟氣陽強非惟蟲不能留亦自不能生也余制有溫臟丸方最所宜也一蟲之為病其類不一或由漸而甚或由少而多及其久而為害則為腹痛食減漸至羸瘠而危者有之凡蟲痛證必時作時止來去無定或嘔吐青黃綠水或吐出蟲或痛而坐臥不安或大痛不可忍面色或青或黃或白而唇則紅然痛定則能飲食者便是蟲積之證速宜逐之本事方云心蟲曰蛔脾蟲曰寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如蠶皆能殺人惟肺蟲為急肺蟲居葉之內蝕人肺系故成瘵疾咯血聲嘶藥所不到治之為難論治共四條治蟲之劑凡蟲勢驟急上攻心腹作痛者宜掃蟲煎先治其標若蟲積堅固者宜獵蟲丸遇仙丹木香檳榔丸百順丸之類主之或稍緩而質弱者宜蕪荑散化蟲散之類主之丹溪云打蟲方用楝樹根檳榔鶴蝨夏取汁冬濃煎飲之又萬應丸最妙一治蟲之法按丹溪云上半月蟲頭向上易治下半月蟲頭向下難治先以肉汁或糖蜜引蟲頭向上然後用藥此皆法之善者然此惟緩治之法耳然蟲證甚急又安能必待其時乎且以望前望後辨蟲頭亦若渺茫無據惟先用香餌而蟲頭可引豈非望後之治亦自有法又何慮其難治也徐東皋云治蟲之方固多而用之者不知其法則亦不能下蟲如丹溪云蟲頭向下之時必須俟其向上法當行於月半之前也若蟲得食則不食藥亦不能下蟲而徒瀉其虛也故雖有方不知其法則方亦不效凡欲下蟲必先一日不食而使蟲飢次早五更用油煎肉嚼之良久腹內蟲聞肉香頭皆向上而欲食乃以雞蛋煎餅和藥嚼而食之須臾服蔥湯或白水少少以助藥力下行不逾時而蟲俱下甚至數升然後以白粥補之隨服補劑調理脾胃而疾可悉愈一驗治法昔一人患心腹大痛或止或作痛不可忍凡用去積行氣等藥百方不效但於痛極時須用拳捶之痛得少止而旋止旋作久不能愈日加困弊莫測其故忽一胡僧見之曰余能治也遂令病者先食香餌繼進一丸打下一硬嘴異蟲遂愈此因蟲齧腸臟所以痛極捶之則五內震動蟲亦畏而斂伏不捶而蟲得自由所以復作此亦驗蟲奇法故凡見心腹痛證但用揉按重捻而痛得暫止者多有因蟲而然也蛔蟲共五條凡諸蟲之中惟蛔蟲最多其逐治之法總若前條然旋逐旋生終非善策欲杜其源必須溫養脾胃脾胃氣強蟲自不生矣故凡逐蟲之後或於未逐之先若欲調補脾腎則如歸脾湯溫胃飲五君子煎理中湯或理陰煎之屬皆所宜也若欲兼蟲而治之則惟溫臟丸為最善凡治蟲之法或攻或補自有緩急先後之宜所當詳辨不可任意忽略也巢氏病源曰凡腹中痛其脈法當沉弱今脈反洪大者是蛔蟲也醫余曰蛔蟲亦九蟲之數人腹中皆有之小兒失乳而哺早或食甜食過多胃虛而熱生蟲令人腹痛惡心口吐清水腹上青筋用火煨使君子與食以殼煎湯送下甚妙然世人多於臨臥服之又無日分多不驗惟月初四五里五更而服之至日午前蟲盡下可用溫平和胃藥調理一二日凡蟲在腹中月上旬頭向上中旬橫之下旬頭向下故中旬下旬用藥則不入蟲口所以不驗也牛馬之生子上旬生者行在母前中旬生者並肩而行下旬生者後隨之貓之食鼠亦然天地自然之理物皆由之而莫知之傷寒門有吐蛔蛔厥證治嘔吐門有吐蛔治法並吐蛔治按腫脹門有孫一奎蛔蟲按俱當參閱外臺用苦楝湯治蛔蟲寸白蟲共三條此蟲長寸許色白其狀如蛆母子相生有獨行者有個個相接不斷者故能長至一二丈治寸白蟲無如榧子煎其效如神本事方云用良方錫灰蕪荑檳榔者極佳五更服則蟲盡下以此為末用石榴根煎汁送下三錢或丸服亦可庚志云趙子山字景高寓居邵武軍天王寺苦寸白蟲為患醫者咸云是疾當止酒然以素所耽嗜欲罷不能一夕醉於外舍至夜半口乾舌燥倉卒無湯飲適見廊廡下有甕水月色下照瑩然可掬即酌而飲之甚甘如飴連飲數酌乃就寢迨曉蟲出盈席覺心腹頓寬宿疾遂愈一家皆驚異驗其所飲蓋寺僕日織草履浸紅藤根水也小兒疳蟲名曰疳䘌小兒疳䘌亦由飲食過傷致成疳積身熱腹大面黃四肢無力昏睡鼻爛汁臭齒齦生瘡或下痢黑血皆腹中有蟲故也宜九味蘆薈丸追蟲丸四味肥兒丸七味肥兒丸蟾蜍丸之類主之蟲去之後仍當調補氣血應聲蟲共二條泊宅編云水州通判聽軍員毛景得奇疾每語喉中必有物作聲相應有道人教令誦本草藥名至藍而默然遂取藍搗汁飲之少頃吐出肉塊長一寸余人形悉具自後無聲陳正敏遁齋閒覽載楊勔中年得異病每發言應答腹中有小聲效之數年間其聲漸大有道人見而驚曰此應聲蟲也久不治延及妻子宜讀本草遇蟲不應者當取服之勔如言讀至雷丸蟲無聲乃頓服之遂愈後正敏至長沙遇一丐者亦有是疾環而觀之者甚眾因教服雷丸丐者亦愈九蟲千金要方云人腹中生蟲大率有九皆能食人臟腑一曰伏蟲長四分群蟲之主也二曰蛔蟲長一尺生髮多則貫心而殺人三曰白蟲長一寸子孫相生其母轉大長至四五丈亦能殺人四曰內蟲狀如爛杏令人煩滿五曰肺蟲狀如蠶令人咳嗽六曰胃蟲狀如蝦蟆令人嘔吐胃逆喜噦七曰弱蟲又名膈蟲狀如瓜瓣令人多唾八曰赤蟲狀如生肉令人腸鳴九曰蟯蟲致細微形如菜蟲居廣腸之間多則為痔劇則為癩因人瘡痍即生諸癰疽癬瘻瘑疥齲蟲無所不為其害匪細凡此諸蟲大則依附臟腑之間小則侵蝕肌膚之內若元氣尚實未為大害稍有虛損遂肆其毒甚至如勞瘵殺人及傳屍疰怪或應聲溪鼠之類而非理之可測者多矣業醫者不可不究其所致之本及治之之法也狐惑共二條仲景曰狐惑之為病狀如傷寒默默欲眠目不得閉起臥不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍白乍黑蝕於上部則聲啞甘草瀉心湯主之蝕於下部則咽乾苦參湯洗之蝕於肛者雄黃熏之愚按此仲景云狐惑之為病狀如傷寒則可見本非傷寒也而後世即以狐惑為傷寒者豈非誤乎千金要方曰凡得傷寒及天行熱病腹中有熱又食少腸胃空虛三蟲行作求食蝕人五臟及下部若齒齦無色舌上盡白甚者唇里有瘡四肢沉重忽忽喜眠當數看其上唇內有瘡唾血唇內如粟瘡者心內懊憹痛悶此蟲在上蝕其五臟下唇內生瘡者其人喜眠此蟲在下蝕其下部人不能知可服此蝕蟲藥不爾䘌蟲殺人又曰凡患濕䘌者多是熱病後或久瀉不止或有客熱結在腹中或易水土溫涼氣著多生此病亦有干䘌不甚瀉痢而下部瘡癢不問乾溼久則殺人凡濕得冷則苦痢單煮黃連及艾葉苦參之屬皆可用之若病人齒齦無色舌上白者或喜眠煩憒不知痛癢處或下痢急治下部不曉此者但攻其上不以下部為意下部生蟲蟲蝕其肛肛爛見五臟便死燒艾於竹筒熏之諸蟲方一傳屍勞瘵未甚者宜早用神授散因二五五一䘌蟲內蝕下部生瘡宜雄黃兌散主之因二五七一大孔蟲癢方因二五八一銀硃煙用治膚腠諸蟲無不神妙新因五三諸蟲論列方掃蟲煎新和十四獵蟲丸新攻五蕪荑散和三一九追蟲丸攻九七化蟲散攻九八五君子煎新熱六百順丸新攻六苦楝湯攻四七榧子煎和三二一甘草瀉心湯寒二八溫臟丸新熱二四蟾蜍丸小一二三四味肥兒丸小百十一理中湯熱一理陰煎新熱三七味肥兒丸小百十三溫胃飲新熱五歸脾湯補三二九味蘆薈丸小百十五萬應丸攻九九遇仙丹攻五一木香檳榔丸攻四九論外備用方聖效方和三二二寸白蟲妙應丸攻百殺蟲直指蕪荑散和三百二十取蟲仲景烏梅丸和三二二胃寒吐蛔諸毒附蟲毒論飲食諸毒風俗通曰禽獸自死者俱有毒不可食魚無腮者有毒腮大者亦有毒鱉肚下有紅藻紋者有毒蟹腹下有毛者有毒煮酒初出火者有毒江南謂之火頭酒飲之則生痔溢血夏月飲食但過宿者即有毒夏月酒在銅錫器中過夜即有毒銅器蓋熱食氣上蒸成汗滴下食中即有毒炊湯過宿飲之有毒盥洗則生疥桃杏仁雙仁者毒能殺人果未成核者俱有毒令人發瘡癤夏秋果熟落地蟲緣者有毒人食之作漏屋漏水有毒人食之有脹而死者用之沐手則生浸淫之疥屢驗澤中死水有毒飲之令人生瘕湯池中溫泉水不可飲令人脹悶惟澡浴可以疏風愈疥癬蓋其泉自硫黃中出故溫也患疥者宜飽食入浴之連日數次汗透而愈體虛者不可輕浴解一切飲食諸毒芝麻油總能解一切飲食諸毒不可不知凡造餚饌必先用真麻油於淨鍋熬熟卻下肉炒過然後入清水煮之則並不犯毒今徽州池州地方食牛肉不論春夏無日不食惟制之有方所以鮮有中毒但犯一切飲食毒者即用麻油一二杯飲之得吐即毒釋而無不愈者一解飲食中毒共有十五方俱載古方因陣中自二百七起至二二一止一善解毒者無如火蓋火能革物之性解一切藥毒凡解諸藥毒者宜以薺苨汁白扁豆汁綠豆汁甘草汁餳糖汁米糖汁蠶蛻紙燒灰隨便用之俱可解凡解毒藥湯劑不可熱服宜涼飲之蓋毒得熱而勢愈盛也雖然此特以熱毒為言耳若解木鱉菌蕈黃連石膏之類以中陰毒者豈仍避熱而猶堪以寒飲乎此有醫按在嘔吐門當兼察之一解毒藥共十四方俱載古方因陣中自二二二起至二三五止解諸毒通用簡易方一方雄黃青黛等分為末新汲水調服一方揀淨土地掘窟用井水傾入攪澄清多飲則愈一方晉礬建茶等分為末新汲水調服三錢吐即效不吐再服一方黃連甘草節二味水煎涼服不拘多少一方薺苨黑豆甘草㕮咀每用一兩水二盞煎一盞溫服未效再服一方白扁豆生為末水調服二三錢一方伏龍肝為細末涼水調三四錢攪動服之吐者再一服即灶心土解一切蟲獸毒凡虎傷犬傷蛇蠍蜈蚣水蛭之類皆是也共二十三方俱載古方因陣中自二三六起至二五八止蠱毒共三條蠱之為毒中土少見之世傳廣奧深山之人於端午日以毒蛇蜈蚣蝦蟆三物同器盛之任其互相吞食俟一物獨存者則以為蠱又謂之挑生凡欲害人密置其蠱於飲食中人中其毒必心腹㽲痛如有蟲齧吐下皆如爛絮若不即治食人五臟而死亦有十餘日而死者更有緩者待以數月氣血羸憊食盡五臟而後死一說兩廣山谷間有草曰胡蔓草又名斷腸草若人以急水吞之則急死以緩水吞之則緩死今見荊楚之地有曰鼠莽草者人食之則毒死意即胡蔓草也一說嶺南人取毒蛇殺之以草覆之以水灑之數日菌生取菌為末酒調以毒人始亦無患再後飲酒則毒作而死其俗淫婦多自合北人日久情好又不肯逐人歸乃陰以毒投飲食中北人歸則戒之曰子去幾時還若從其言則復以藥解之若過期不往則死矣名曰定年蠱北人至彼宜預防之須備解毒丹之類隨身勿忘凡稍覺飲食之後四大不調宜即服解藥若不預識其機備有藥餌恐一時倉卒不救所謂有備無患重生者不可忽也驗蠱毒法遁齋閒覽云海南魚有石首蓋魚枕也取其石為器可盛飲食如遇蠱毒器必爆裂其效甚著閩人制作最精人但玩其色而鮮有識其用者一驗蠱之法唾津在淨水中沉則是浮則非又法口含大豆中蠱者豆即脹而皮脫無蠱者豆不脹脫又法煮雞蛋一枚去殼以銀簪一雙插入其中並含入口內一飲之頃取視簪卵俱黑即為中蠱孫真人曰凡中蠱者嚼生黑豆不腥噙白礬而味反甘者皆中蠱也蠱證直指云中蠱之候面目青黃力乏身痛唇口焦乾眉須脫落煩躁悶瞀胸腹痞滿肚脹皮堅腹中切痛如蟲齧又如蟲行唾吐鮮血小便淋瀝大便膿血病人所食之物皆變而為蟲侵蝕臟腑傷甚則死死則毒氣流注復染他人所謂蠱疰蠱脈脈緊數如釵股弦直而吐甚者此中蠱毒也急治之中蠱脈洪大者生微細者死防蠱凡入有蠱之鄉所用飲食但以犀角攪試有毒則白沫竦起無沫即無毒也若自幼時食貓肉者則毒不能為害知禁忌凡中蠱者但能記何物之中中毒須終身再不食此物犯之則毒作若用藥而愈自後飲食永不可吃冷吃冷則蠱毒復生竟不能救反蠱及主法衛生云凡入蠱鄉見人家門限屋梁絕無灰塵潔淨者其家必蓄蠱當用心防之如不得已吃其飲食即潛於初下箸時收藏一片在手盡吃不妨少頃卻將手藏之物潛埋於人行十字路下則蠱神反於本家作鬧蠱主必反來懇求或食時讓主人先動箸或明問主人云莫有蠱麼以箸築桌而後食如是則蠱皆不能為害此皆驗於蠱鄉云治蠱大法有二胸膈痛脹則毒在上焦宜吐之法以熱水半盞投入膽礬末五分通口服少頃以鵝翎探吐毒物出盡自愈或服升麻湯探而吐之亦妙腹痛脹為毒在下焦宜瀉之法以鬱金末二錢米湯調下空腹取瀉惡毒盡為妙瀉後以四君子湯服二三劑調理慎忌口咒語破蠱法大藏經云治蠱毒挑生毒有咒法凡人在外飲食先默誦咒七遍其毒自不為害咒曰姑蘇琢磨耶琢吾知蠱毒生四角父是穹窿穹母是舍耶女眷屬百千萬吾今悉知汝摩訶薩摩訶薩凡見飲食上有蛛絲便莫吃又法每遇所到處念藥王萬福七遍亦可避灸蠱毒法凡灸一切蠱毒於兩足小指盡處各灸三壯即有物出酒中者隨酒出飲食中者隨飲食出屢驗解一切中惡邪鬼崇毒凡卒時中惡垂死者宜硃砂丸急服之方在攻陣百三凡遭一切鬼崇鬼疰等毒者急與八毒赤丸攻之方在攻陣百四凡中惡心腹脹痛大便不通及飛屍鬼擊等急證惟外臺走馬湯最捷最妙方在攻陣百十三治蠱毒方丹砂丸因二百六十雄麝散因二五九萬病解毒丹因二百二七寶丸因二六一蜜髓煎因二六二挑生蠱毒簡易方因二六五解毒散因二四四歸魂散因二六三三因解毒丸因二百三麥面散因二六四
