命門火衰不能生土以致脾胃虛寒飲食少思大便不實或下元冷憊臍腹疼痛等證王太僕曰益火之源以消陰翳即此謂也即前六味地黃丸加肉桂製附子各一兩陳氏加減八味丸治腎水不足虛火上炎發熱作渴口舌生瘡或牙根潰蝕咽喉疼痛寢汗憔悴等證此臨川陳自明方李氏云凡發背之熱未有不自腎虛而得之者必須五更服加減八味丸即前六味丸加肉桂一兩五味子四兩炒用納澤瀉切片蒸五次焙用一方五味止用一兩良方益陰腎氣丸治陰虛潮熱盜汗煩熱作渴筋骨疼痛月經不調等證即前六味丸加當歸生地各四兩五味子二兩薛氏加減金匱腎氣丸治脾腎陽虛不能行水小便不利腰重腳腫或肚腹腫脹四肢浮腫或喘急痰盛已成臌證其效如神此證多因脾胃虛弱或治失其宜元氣復傷而變此證若非速救腎中之火則陽氣不充於下何以生土土虛又何以制水此必用之劑也苟不知此必不能救若病在燃眉當變丸為湯治之熟地四兩酒拌蒸山藥山茱萸川牛膝丹皮澤瀉車前子肉桂各一兩白茯苓三兩附子制五錢上為末煉蜜同地黃膏搗丸桐子大每服七八十丸空心米飲下丹溪滋陰大補丸治諸虛不足腰腿疼痛行步無力壯元陽益腎水熟地二兩山藥炒牛膝各兩半山茱萸杜仲巴戟肉白茯苓五味子小茴香炒肉蓯蓉酒洗去甲新瓦焙乾遠志甘草湯煮曬乾各一兩石菖蒲枸杞各五錢上為末紅棗肉和或煉蜜為丸桐子大每服七八十丸空心淡鹽湯或溫酒任下大造丸方在寒陳治陰虛血熱諸證祕方全鹿丸此藥能補諸虛百損五勞七傷攻效不能盡述人制一料服之可以延年一紀其法須四人共制一鹿分而服之逾年又共制之四人共制四年則每人得一全鹿若一人獨制一料恐久留變壞藥力不全矣中鹿一隻縛殺之退去毛將肚雜洗淨同鹿肉加酒煮熟將肉橫切焙乾為末取皮同雜仍入原湯熬膏和藥末肉末加煉蜜和搗為丸其骨須酥炙為末同入之人參白朮炒茯苓炙甘草當歸川芎生地黃熟地黃黃耆蜜炙天門冬麥門冬枸杞杜仲鹽水炒牛膝酒拌蒸山藥炒芡實炒菟絲制五味子鎖陽酒拌蒸肉蓯蓉破故酒炒巴戟肉胡蘆巴酒拌蒸川續斷覆盆子酒拌蒸楮實子酒拌蒸秋石陳皮上各一斤川椒去目炒小茴香炒沉香青鹽各半斤上先須精製諸藥為末和勻一處候鹿膠成就和搗為丸桐子大焙乾用生黃絹作小袋五十條每袋約盛一斤懸置透風處用盡一袋又取一袋陰濕天須用火烘一二次為妙每服八九十丸空心臨臥薑湯鹽湯白湯任下冬月溫酒亦可青囊仙傳斑龍丸壯精神除百病養氣血補百損老人虛人常服延年益壽昔蜀中有道士酣歌酒肆曰尾閭不禁滄海竭九轉金丹都慢說惟有斑龍頂上珠能補玉堂關下血真人仲源索方傳世鹿角膠鹿角霜柏子仁菟絲子制熟地黃各八兩白茯苓補骨脂各四兩上將膠先溶化量入無灰酒打糊丸桐子大每服六七十丸空心淡鹽湯或酒任下祕驗斑龍二至百補丸此藥固本保元生精養血培復天真大補虛損益五內除骨蒸壯元陽多子嗣充血脈強健筋骸美顏色增延壽算聰明耳目潤澤髭鬚真王道奇品之方功難盡述也鹿角五十兩為則取新角連腦骨者佳鋸長二寸許用米泔浸一宿刷洗淨同後藥入壇煮膠黃精八兩枸杞懷熟地菟絲子淘洗淨金櫻子去毛子各四兩天門冬去心麥門冬去心川牛膝龍眼肉楮實子各二兩以上十味同角入金華好壇層層放實以新汲淡水入壇平肩用蜜梭布四層包口以新磚壓之置大鍋中井字架上以木甑蓋好重湯煮三日夜毋得間斷火候傍用小鍋燒滾水不時添注壇內並鍋水勿使乾涸日足取起濾去滓將汁用羅底絹絞出入淨砂鍋內文火熬成膏約一斤半外煉蜜二斤滴水成珠攙入調和後藥杵合為丸鹿角霜十兩人參五兩黃耆蜜炙芡實炒白茯苓山藥炒山茱萸生地黃酒洗飯上蒸過知母鹽水炒各四兩北五味子一兩夏月加川黃柏四兩炒褐色以上十味為細末用前膏和勻木杵搗丸桐子大空心淡鹽湯送下百餘丸隨用煮熟蓮肉或干棗數枚壓之俾納丹田也正傳鹿角膠丸治血氣虧損兩足痿弱不能行動久臥床禱者神效鹿角膠一斤鹿角霜熟地各半兩當歸四兩人參牛膝菟絲子制白茯苓各三兩白朮杜仲各二兩虎脛骨酥炙龜板酥炙各一兩上為末先將鹿角膠用無灰酒二鍾溶化加煉蜜搗丸桐子大每服百丸空心鹽薑湯下鹿茸丸治腳氣腿腕生瘡及陰虛下元痿弱咳嗽等證鹿茸酥炙另搗成泥五味子當歸熟地黃各等分酒糊和丸桐子大每服四五十丸溫酒或鹽湯任下集驗鹿茸丸治諸虛勞倦補心腎益氣血鹿茸酥炙熟地黃當歸枸杞棗仁炒附子制牛膝遠志薑汁浸炒山藥沉香肉蓯蓉酒浸各二兩麝香五分煉蜜丸桐子大每服五十丸鹽湯下三因鹿茸丸治失志傷腎腎虛消渴小便無度鹿茸酥炙麥門冬熟地黃黃耆炙五味肉蓯蓉雞內金酒炒山茱萸破故紙炒各七錢茯苓人參牛膝酒浸玄參地骨皮各半兩上為末煉蜜丸桐子大每服七八十丸米飲下本事麋茸丸治腎虛腰痛不能轉側麋茸鹿茸亦可菟絲子制各一兩舶茴香五錢上為末以羊腎二對用酒煮爛去膜研如泥和丸桐子大陰乾如太乾以酒糊佐之每服三五十丸溫酒或鹽湯下楊氏還少丹治脾腎虛寒飲食少思發熱盜汗遺精白濁真氣虧損肌體瘦弱等證熟地黃二兩山藥山茱萸杜仲薑湯炒枸杞二兩牛膝酒浸遠志薑汁浸炒肉蓯蓉酒浸北五味川續斷楮實子舶茴香菟絲子制巴戟肉余各一兩上為細末煉蜜丸桐子大每服五十丸空心鹽酒下局方無比山藥丸治諸虛損傷肌肉消瘦耳聾目暗常服壯筋骨益腎水令人不老山藥二兩菟絲子三兩酒浸煮五味揀淨六兩肉蓯蓉四兩切片酒浸焙杜仲三兩酒炒牛膝一兩酒浸蒸熟地澤瀉山茱萸茯苓巴戟肉赤石脂各一兩上為細末煉蜜和丸桐子大每服三五十丸食前溫酒或米飲下還元丹一名延年益壽不老丹此藥大補元氣服一月自覺異常功效不可盡述按此方為陰虛血熱者宜之諸陽虛者不可用何首烏半斤用米泔水浸軟竹刀刮去皮分四制忌鐵器以砂鍋瓦器盛酒拌芝麻蒸一次曬乾又用羊肉一斤切片拌蒸一次曬乾再用酒拌蒸一次黑豆拌蒸一次各曬乾熟地生地酒浸焙各三兩天冬麥冬各末一兩人參五錢地骨皮童便浸曬白茯苓酒浸曬乾取末各一兩上取乳汁六兩白蜜十兩同煉一器中合前末為膏瓷器取貯勿令泄氣不拘時服一二匙沸湯嗽咽之經驗養榮丸治男婦氣血兩虛精神短少脾胃不足形體羸瘦人參白朮土炒當歸熟地黃黃耆芍藥山藥各一兩遠志制生地黃山茱萸各半兩白茯苓二兩陳皮八錢上為細末用鴨一隻取血入煉蜜和丸桐子大每服八九十丸食前淡鹽湯送下或酒亦可三才丸天門冬熟地黃人參等分上為末煉蜜丸服七珍至寶丹補血生精瀉火益水強筋骨黑鬚發補益之功甚大何首烏赤白各半斤酒浸軟竹刀刮去皮同牛膝蒸川牛膝半斤淨用黑豆三升同何首烏層層拌鋪甑內蒸極熟取出去豆與何首烏共搗如泥白茯苓一斤用人乳五升煮乾為度赤茯苓一斤用牛乳五升煮乾為度當歸四兩酒浸焙乾枸杞四兩破故炒香菟絲子制各半兩煉蜜為丸雞頭子大每服一丸日進三服空心溫酒午後薑湯臨臥鹽湯送下百一補髓丹治老人虛弱腎傷腰痛不可屈伸杜仲十兩補骨脂用芝麻五兩同炒以芝麻黑色無聲為度去麻不用十兩鹿茸四兩燎去毛酒浸炙上為末用胡桃肉三十個浸去皮搗為膏入面少許煮糊為丸桐子大每服百丸溫酒鹽湯任下枸杞子丸治腎虛精滑補精氣甘州枸杞黃精九蒸九曬上二味等分相和搗作餅子焙乾為末煉蜜丸桐子大每服百餘丸空心溫酒送下局方青娥丸治腎虛腰痛益精助陽烏須壯腳力婦人隨證用引吞送神效破故紙四兩炒香杜仲淨八兩薑湯炒胡桃肉十兩上為末用蒜四兩搗膏和丸桐子大每服三五十丸空心溫酒送下一法不用蒜以酒糊為丸或煉蜜為丸服者更佳按此方可加巴戟肉大茴香各四兩為尤妙或再加肉蓯蓉亦可良方加味青娥丸補諸虛不足滋益陰陽美容顏健腰膝止腰痛尤效破故炒小茴鹽水炒胡蘆巴炒各四兩杜仲三兩薑汁炒胡桃肉二十五個蓮蕊一兩青鹽煅五錢穿山甲酥炙三錢五分上為末將胡桃肉搗爛加酒煮麵糊為丸桐子大每服三十丸空心溫酒下十補丸方在熱陳治腎臟虛冷等證保命煨腎丸治腎肝虛損骨痿不能起床筋弱不能收持及脾損穀不化善益精緩中消穀杜仲薑湯炒牛膝萆薢白蒺藜防風菟絲子制胡蘆巴肉蓯蓉酒浸破故紙酒炒各等分官桂減半上將豬腰子制如食法搗爛加煉蜜和杵千餘為丸桐子大每服五七十丸空心用溫酒送下治腰痛不起甚效局方煨腎散治腎虛腰痛杜仲薑汁炒花椒炒出汁食鹽少許上為末以豬腰子一枚薄批作五七片以椒鹽淹去腥水摻杜仲末三錢在內以薄荷包外加濕紙二三層煨熟食之酒下安腎丸方在熱陳治腎經積冷下元衰弱小安腎丸方在熱陳治腎氣虛寒多溺腰膝沉重石刻安腎丸方在熱陳治真氣虛憊夢遺便數腳膝軟弱紅鉛丸一名一氣丹一名人精妙合丸紫河車用頭産壯盛男胎者一具以銀針挑去紫血米泔水洗淨用酒醋燉爛焙乾人乳以瓷罐盛曬乾者四兩或以茯苓末一兩收曬至五兩者亦可秋石以童男女小便煉成者四兩紅鉛亦名先天梅子五錢此室女初次經血扣算女子年歲凡五千四十八日即女子天癸將至之日須預備錫船候取以茯苓未收滲曬乾或以絲綿滲取用烏梅煎湯洗下去水曬乾亦可上為細末煉蜜為丸每丸重七釐此藥俗傳云以人補人得先天之氣神妙不可盡述每丸價一兩打老兒丸熟地山藥炒各五兩牛膝酒洗巴戟枸杞湯洗炒楮實子去浮者枸杞石菖蒲遠志肉甘草湯制白茯苓去筋杜仲鹽水炒北五味蜜水拌蒸一二時搗餅焙乾山茱萸上各四兩小茴香續斷各三兩肉蓯容切片酥炒五兩上為末煉蜜丸桐子大每服五六十丸空心午前臨睡或酒或鹽湯下百餘丸肉蓯蓉丸治腎虛耳聾肉蓯蓉酒浸焙菟絲子酒浸煮研山茱萸白茯苓熟地黃人參官桂防風芍藥黃耆各五錢附子炮羌活澤瀉各二錢半羊腎一對薄切去筋膜炙乾煉蜜丸桐子大每服三五十丸空心溫酒下四味肉蓯蓉丸方在固陳治小便不禁黃耆丸治虛風羸瘦心神虛煩筋脈拘攣疼痛少睡黃耆炙人參熟地黃白茯苓薏苡仁山茱萸各一兩棗仁羌活去蘆當歸羚羊角屑枸杞子桂心各七錢半防風遠志各半兩上為細末煉蜜和丸梧子大每服七八十丸溫酒下不拘時二丹丸治風邪健忘和血養神定志內安心神外華腠理丹參天門冬熟地黃各一兩半麥門冬白茯苓甘草各一兩人參丹皮遠志各半兩上為細末煉蜜和丸桐子大以硃砂半兩為衣每服五七十丸加至百丸空心煎愈風湯送下海藏益血丹治大便燥久虛亡血當歸酒浸焙熟地黃等分上為末煉蜜丸彈子大細嚼酒下一丸集要四神丸治稟賦虛弱小便頻數不禁五味子菟絲餅各四兩熟地黃六兩肉蓯蓉一斤去甲上為末酒煮山藥糊丸桐子大每服五十丸空心鹽湯下局方虎骨四斤丸宣州木瓜去穰天麻去蘆肉蓯蓉洗淨牛膝焙乾各一斤附子炮去皮臍二兩虎骨酥炙一兩上先將前四味用無灰酒五升浸春秋五日夏三日冬十日取出焙乾入附子虎骨共為末用前浸藥酒打麵糊丸梧子大每服五十丸食前鹽湯送下加味四斤丸治肝腎二經氣血不足足膝痠痛步履不隨如受風寒濕毒以致腳氣者最宜服之虎脛骨一兩酥炙乳香另研沒藥另研各五錢川烏炮去皮一兩肉蓯蓉牛膝各一兩半天麻一兩木瓜一斤去穰蒸上各為末先將木瓜蓯蓉搗膏加酒糊和杵丸桐子大每服七八十丸空心溫酒或鹽湯任下三因加味四斤丸治腎虛肺熱熱淫於內致筋骨痿弱不能收持肉蓯蓉酒洗牛膝酒洗天麻木瓜鹿茸酥炙熟地黃五味酒浸菟絲子酒煮等分上為末煉蜜丸桐子大每服五十丸食前溫酒或米飲送下劉宗厚曰按此方云熱淫於內而用溫補何也然陰血衰弱血不養筋筋緩不能自收持今陽燥熱淫於內故用此以養陽滋陰陰實則水升火降矣金剛丸治腎損骨痿不能起床宜此益精萆薢杜仲薑汁炒肉蓯蓉酒洗菟絲子制上用酒煮豬腰子搗丸桐子大每服五七十丸空心溫酒送下人參膏用人參十兩細切以活水二十盞浸透入銀石器內桑柴火緩緩煎取十盞濾汁再以水十盞煎渣取汁五盞併入前汁合煎成膏瓷瓶收貯隨證作湯使調服丹溪云多欲之人腎氣衰憊咳嗽不止用生薑橘皮煎湯化膏服之浦江鄭兄五月患痢又犯房室忽發昏運不知人事手撒目暗自汗如雨喉中痰鳴聲如拽鋸小便遺失脈大無倫此陰虧陽絶之證也豫令急煎大料人參膏仍與灸氣海十八壯右手能動再二壯唇口微動遂與膏服一盞半夜後服三盞眼能動盡三斤方能言而索粥盡五斤而痢止至十斤而全安若作風治則誤矣一人背疽服內托十宣藥已多膿出作嘔發熱六脈沉數有力此潰瘍所忌也遂用大料人參膏入竹瀝飲之參盡十六斤竹伐百餘竿而安後經旬余值大風拔木瘡復起有膿中有紅線一道過肩胛抵右肋豫曰急作參膏以芎歸橘皮作湯入竹瀝薑汁飲之盡三斤而瘡潰調理乃安若癰疽潰後氣血俱虛嘔逆不食變證不一者以參耆歸術等分煎膏服之最妙
