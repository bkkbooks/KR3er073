body:
  text: 卷之五十三圖集古方八陳補陳四君子湯治脾胃虛弱飲食少思或大便不實體瘦面黃或胸膈虛痞吞酸痰嗽或脾胃虛弱善患瘧痢等證人參白朮茯苓各二錢炙甘草一錢加薑棗水煎服或加粳米百粒加味四君湯治痔漏下血面色痿黃怔忡耳鳴腳軟氣弱及一切脾胃氣虛口淡食不知味又治氣虛不能攝血以致下血不禁人參白朮炒茯苓炙甘草黃耆炙白扁豆炒上水煎服或為末每服三錢滾湯調服生附四君湯方在小兒治脾胃虛寒吐瀉五味異功散治脾胃虛寒飲食少思嘔吐或久患咳嗽面浮氣逆腹滿等證人參白朮炒茯苓炙甘草陳皮各一錢此即四君子湯加陳皮也上加薑棗水煎服六君子湯治脾胃虛弱飲食少思或久患瘧痢或食飲難化或嘔吐吞酸或咳嗽喘促若虛火等證須加炮姜其功尤速即前四君子湯加陳皮半夏各一錢五分加味六君湯治一切脾胃虛弱泄瀉及傷寒病後米穀不化腸中虛滑發渴微痛久不瘥者及治小兒脾疳瀉痢人參白朮黃耆山藥甘草白茯苓各一兩砂仁厚朴肉豆蔻麵裹煨各七錢上每服一兩用水煎服或為細末用米湯調服二錢不拘時香砂六君子湯治過服涼藥以致食少作嘔或中氣虛滯噁心脹滿等證人參白朮茯苓半夏陳皮各一錢砂仁炒藿香各八分炙甘草六分上姜水煎服局方四物湯治血虛營弱一切血病當以此為主熟地黃當歸各三錢川芎一錢芍藥二錢水二鍾煎服薛氏加味四物湯即前方加山梔柴胡丹皮正傳加味四物湯治血熱陰虛諸痿四肢軟弱不能舉動當歸一錢五味子九粒熟地三錢麥冬黃柏蒼朮各一錢白芍藥川芎各七分半人參黃連各五分杜仲七分半牛膝足不軟者不用知母各三分水二鍾煎一鍾空心溫服酒糊丸服亦可東垣加減四物湯方在寒陳治腸風下血保命柴胡四物湯治日久虛勞微有寒熱脈滑而數者當歸熟地芍藥川芎各錢半柴胡八分人參黃芩半夏甘草各三錢加生薑三片水煎服萬氏柴胡四物湯方在痘疹治疹後餘熱奇效四物湯方在婦人治肝經虛熱血崩增損四物湯方在婦人治脾虛不攝去血不止元戎四物湯方在攻陳治血虛臟結良方加減四物湯方在婦人治婦人血積四物二連湯方在婦人治婦人陰虛內熱局方八珍湯治氣血兩虛調和陰陽即前四君子四物湯相合也本方加黃柏知母即名補陰八珍湯方見外科三二十全大補湯治氣血俱虛惡寒發熱自汗盜汗肢體困倦眩暈驚悸晡熱作渴遺精白濁二便見血小便短少便泄閉結喘咳下墜等證即前八珍湯加黃耆肉桂各一錢局方人參養營湯治脾肺俱虛惡寒發熱肢體瘦倦食少作瀉口乾心悸自汗等證人參黃耆當歸白朮炙甘草桂心陳皮各一錢熟地五味茯苓各七分白芍錢半遠志五分加薑棗水煎服金匱小建中湯治虛勞裡急腹痛失精四肢痠疼手足煩熱咽乾口燥等證炙甘草桂枝生薑各三兩大棗十二枚芍藥六兩膠飴一升上六味以水七升煮取三升去渣納膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也按此即桂枝湯加膠飴也今方俱改兩為錢而以阿膠代膠飴殊失本方之妙矣金匱大建中湯治胸中大寒痛嘔不能飲食腹中寒氣上衝上下疼痛不可觸近人參二兩蜀椒二合炒去汗乾薑四兩膠飴上三味以水四升煮取二升去滓納膠飴一升微火煎取一升半分二次溫服如一炊頃可食溫粥覆之局方十四味大建中湯治陽虛氣血不足腰腳筋骨疼痛及榮衛失調積勞虛損形體羸瘠短氣嗜臥漸成勞瘵者人參白朮茯苓甘草炙川芎當歸白芍熟地黃耆肉桂附子炮麥冬半夏湯洗肉蓯蓉酒浸各等分上咀每服五錢水二鍾姜三片棗二枚煎八分空心溫服八味大建中湯治中氣不足手足厥冷小腹攣急或腹滿不食陰縮多汗腹中寒痛唇乾精出寒熱煩冤四體痠痛及無根失守之火出於肌表而為疹為斑厥逆嘔吐等證人參甘草炙各一錢黃耆炙當歸芍藥酒炒桂心各二錢半夏附子制各二錢半上咀每服五錢水二鍾姜三片棗二枚煎七分食前服人參建中湯治虛勞自汗即前小建中湯加人參二兩煎法同黃耆建中湯治諸虛羸瘠百病即前小建中湯加黃耆一兩五錢煎法同當歸建中湯治婦人血虛自汗即前小建中湯加當歸二兩煎法同三味建中湯治表虛自汗芍藥二錢甘草一錢官桂五分姜三片棗一枚水煎服東垣補中益氣湯治勞倦傷脾中氣不足清陽不升外感不解體倦食少寒熱瘧痢氣虛不能攝血等證人參黃耆炒白朮炒甘草炙各錢半當歸一錢陳皮五分升麻柴胡各三分上加薑棗水煎空心午前服東垣調中益氣湯治濕熱所傷體重煩悶口失滋味或痰嗽稠黏寒熱不調體倦少食等證黃耆一錢人參炙甘草蒼朮各五分橘紅木香柴胡升麻各二分水煎空心服一方有白芍三分五味十五粒歸脾湯治思慮傷脾不能攝血致血妄行或健忘怔忡驚悸盜汗嗜臥少食或大便不調心脾疼痛瘧痢鬱結或因病用藥失宜克伐傷脾以致變證者最宜用之人參黃耆白朮茯苓棗仁各二錢遠志當歸各一錢木香炙甘草各五分水二鍾加圓眼肉七枚煎七分食遠服愚意此湯之用木香特因鬱結疼痛者設如無痛郁等證必須除去木香以避香燥豈不於氣虛血動者為尤善乎又遠志味辛氣升而散凡多汗而躁熱者亦宜酌用加味歸脾湯治脾經血虛發熱等證即前方加柴胡山梔各一錢人參湯治吐血咯血後宜服並治吐血不止人參一兩為細末五更時用雞蛋清調如稀糊每用二錢茶匙抄服服訖卻臥參盡則效愚意此方固佳其或有惡腥者但以真牛乳稀調燉熟或溫飲之凡無火及微火者豈不更妙一方治吐衄咯血不止用人參為末以雞子清投新汲水攪勻調服一二錢獨參湯治諸氣虛氣脫及反胃嘔吐喘促粥湯入胃即吐凡諸虛證垂危者用人參二兩水一升煮取四合乘熱頓服日再進之兼以人參煮粥食之尤妙奪命散治傷寒瘴疾陰陽不明或誤用藥致病愈困煩躁發渴及婦人胎前産後受熱瘴疾上黨人參七錢水二鍾煎一鍾去渣連罐浸新汲水中取冷一服而盡若鼻上有汗滴尤妙嚴氏參附湯治真陽不足上氣喘急厄逆自利臍腹疼痛手足厥冷嘔惡不食自汗盜汗氣短頭暈等證人參製附子用須參倍於附或等分不拘五錢或一兩酌宜用姜水煎服良方有丁香十五粒名加減參附湯參歸湯此即團參散見小兒門十亦名人參湯見婦人門七七治心虛盜汗人參當歸等分上先用豬心一枚破作數片煎湯澄取清汁煎藥服參朮膏治中氣虛弱諸藥不應或因用藥失宜耗傷元氣虛證蜂起但用此藥補其中氣諸證自愈人參白朮等分用水煎膏化服之一方用白朮一斤人參四兩切片以流水十五碗浸一宿桑柴文武火煎取濃汁再用重湯熬膏入真白蜜收之每以白湯點服參朮湯治氣虛顫掉泄瀉嘔吐等證人參白朮黃耆各二錢白茯苓陳皮炙甘草各一錢甚者加製附子一錢水二鍾煎八分食遠服仲景朮附湯一名白朮附子湯治中寒中氣不足四肢逆冷口噤牙關緊急痰盛脈弱風虛頭眩頭重苦極不知食味白朮二兩炙甘草一兩附子一兩半炮去皮每用五六錢姜五片棗一枚水一鍾半煎七分食遠溫服或用此化蘇合丸連進三服效濟生朮附湯治寒濕腰痛重冷小便自利白朮附子制各一兩杜仲炒半兩上咀每服四錢入姜煎服嚴氏耆附湯治氣虛陽弱虛汗倦怠黃耆蜜炙製附子等分每服四錢水一鍾姜五片煎六分食遠服寶鑑當歸補血湯治血氣損傷或因誤攻致虛肌熱口渴目赤面紅脈大而虛重按全無及病因飢飽勞役者黃耆炙一兩當歸酒洗三錢水一鍾半煎八分食遠服濟生黃耆湯治喜怒驚恐房勞致陰陽偏虛者或自汗盜汗不止黃耆蜜炙熟地白茯苓天門冬麻黃根肉桂龍骨各一錢小麥炒五味子防風各八分當歸炙甘草各七分水二鍾姜三片煎服如冷汗加熟附子二片發熱自汗加石斛一錢良方黃耆湯方在婦人安胎治腹痛魏氏大補黃耆湯治虛弱自汗人參白茯苓肉蓯蓉熟地各一錢黃耆白朮當歸山茱萸防風各八分炙甘草肉桂各四分五味子十一粒水一鍾半加姜三片棗一枚煎七分不拘時服東垣神效黃耆湯治渾身或頭面手足麻木不仁目緊縮小及羞明畏日視物不明黃耆二錢人參八分炙甘草蔓荊子芍藥各一錢陳皮五分水煎臨臥熱服如麻木不仁雖有熱證不得用黃柏但加黃耆黃耆六一湯治陰陽俱虛盜汗黃耆蜜炙六錢炙甘草一錢水一鍾半煎八分食遠服玉屏風散治表虛自汗黃耆蜜炙防風各一錢白朮炒二錢水一鍾姜三片煎服良方潤神散治勞瘵憎寒壯熱口乾咽燥自汗疲倦煩躁人參麥門冬黃耆桔梗淡竹葉炙甘草等分上每服一兩水煎服如自汗加小麥同煎當歸六黃湯方在寒陳治陰虛血熱盜汗神效參苓散治睡中汗出人參酸棗仁白茯苓各等分上為細末每服三錢食遠米飲調下大人小兒皆可服和劑參苓白朮散治脾胃虛弱飲食不進嘔吐泄瀉或久瀉或大病後調助脾胃人參山藥炒白扁豆去皮薑汁炒蓮肉去心各一斤半白朮二斤米泔浸炒桔梗炒黃色砂仁薏仁炒白茯苓去皮炙甘草各一斤上為細末每服二錢米湯調下或加薑棗水煎服或煉蜜丸桐子大每服七八十丸空心米飲白湯任下七味白朮散方在小兒治脾虛熱渴醫録生脈散治熱傷元氣肢體倦怠氣短口渴汗出不止或金為火制水失所生而致咳嗽喘促肢體痿弱腳軟眼黑等證人參五錢麥冬五味子各三錢水煎服此方以生脈為名故俗醫之治脈脫者每多用此是豈知脈脫由陽氣豈麥冬五味之所宜乎見亦淺矣五味子湯治喘促脈伏而數或虛煩作渴五味子一錢人參麥冬杏仁橘紅各一錢五分水二鍾姜三片棗二枚煎八分無時服陳氏五味子湯治腎水枯涸口燥舌乾五味子麥門冬各一兩黃耆炒三兩人參二兩粉草炙五錢上每服五錢水煎日夜服數劑人參胡桃湯治喘急不能臥人參錢半胡桃肉五枚泡去皮水一鍾半姜三片棗一枚煎八分食後溫服丹溪瓊玉膏治虛勞乾咳嗽或好酒者久嗽尤效人參十二兩白茯苓十五兩白蜜五斤熬去沫琥珀沉香各五錢大生地十斤以銀石器杵取自然汁上先以地黃汁同蜜熬沸攪勻用密絹濾過將人參等為極細末和蜜汁入瓷銀瓶內用綿紙十餘層加箬封扎瓶口入砂鍋或銅鍋以桑柴火長流水沒瓶煮三晝夜取出換油蠟紙扎口懸浸井中半日以出火氣提起仍煮半日以去水氣然後收藏每日清晨及午後取三匙用溫酒一兩許調服或白湯亦可制須淨室忌雞犬婦人本方原無琥珀沉香二味乃臞仙加入者云奇效異常今並録其方補肺湯治勞嗽人參黃耆北五味紫菀各七分半熟地黃桑白皮各錢半水二鍾煎八分入蜜少許食遠溫服楊氏寧肺湯治榮衛俱虛發熱自汗咳嗽痰涎肺氣喘急唾膿人參茯苓當歸白芍藥白朮甘草炙川芎熟地黃麥門冬五味桑白皮各七分阿膠炒一錢水二鍾姜二片紫蘇五葉煎八分食遠服聖惠寧肺散方在固陳治久嗽收澀之劑鳳髓湯治咳嗽大能潤肺牛髓一斤胻骨中者白蜜半斤乾山藥四兩炒杏仁四兩去皮尖研如泥胡桃仁去皮四兩另研上將牛髓白蜜用砂鍋熬沸以絹濾去渣盛瓷瓶內將杏仁等三味同入瓶內以紙密封瓶口重湯煮一日夜取出冷定每空心以白湯化服一二匙良方蜜酥煎治咳嗽胸痛上氣喘壅此為邪搏於肺氣不宣通故咳而喘氣上逆面目浮腫此方非獨治嗽兼補虛損去風燥悅肌膚婦人服之尤佳白沙蜜一升牛酥一升杏仁三升去皮尖研如泥上將杏仁於瓷盆中用水研取汁五升以淨銅鍋先傾汁三升熬減其半又傾汁二升再以微火熬