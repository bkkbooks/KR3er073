body:
  text: 卷之二十九必集雜證謨遺精經義上古天真論曰上古有真人者提挈天地把握陰陽呼吸精氣獨立守神肌肉若一故能壽敝天地無有終時中古有至人者淳德全道和於陰陽調於四時去世離俗積精全神遊行天地之間視聽八達之外此蓋益其壽命而強者也亦歸於真人其次有聖人者處天地之和從八風之理適嗜欲於世俗之間無恚嗔之心行不欲離於世舉不欲觀於俗外不勞形於事內無思想之患以恬愈為務以自得為功形體不敝精神不散亦可以百數今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫上古聖人之教下也皆謂之虛邪賊風避之有時恬憺虛無真氣從之精神內守病安從來腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉生氣通天論曰蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也此因時之序故聖人傳精神服天氣而通神明失之則內閉九竅外壅肌肉衛氣解散此謂自傷氣之削也陰者藏精而起亟也陽者衛外而為固也凡陰陽之要陽密乃固兩者不和若春無秋若冬無夏因而和之是謂聖度故陽強不能密陰氣乃絶陰平陽祕精神乃治陰陽離決精氣乃絶陰之所生本在五味陰之五宮傷在五味味過於辛筋脈沮弛精神乃央金匱真言論曰夫精者身之本也故藏於精者春不病溫本神篇曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來謂之魂並精而出入者謂之魄是故怵惕思慮者則傷神神傷則恐懼流淫而不止恐懼而不解則傷精精傷則骨酸痿厥精時自下是故五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣本藏篇曰人之血氣精神者所以奉生而周於性命者也志意者所以御精神收魂魄適寒溫和喜怒者也志意和則精神專直魂魄不散悔怒不起五臟不受邪矣經脈篇曰人始生先成精精成而腦髓生邪客篇曰心者五臟六腑之大主也精神之所舍也其臟堅固邪弗能容也容之則心傷心傷則神去神去則死矣平人絶谷篇曰血脈和則精神乃居故神者水穀之精氣也調經本神等論曰心藏神肺藏氣肝藏血脾藏肉腎藏經而成此形志意通內連骨髓而成身形五臟六節臟象論曰心者生之本神之變也腎者主蟄封藏之本精之處也痿論曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓衛氣篇曰五臟者所以藏精神魂魄者也六腑者所以受水穀而行化物者也其氣內干五臟而外絡肢節其浮氣之不循經者為衛氣其精氣之行於經者為營氣陰陽相隨外內相貫如環之無端疏五過論曰嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣流連病有所並暴樂暴苦始樂後苦皆傷精神精氣竭絶形體毀沮故貴脫勢雖不中邪精神內傷身必敗亡論證共三條夢遺精滑總皆失精之病雖其證有不同而所致之本則一蓋遺精之始無不病由乎心正以心為君火腎為相火心有所動腎必應之故凡以少年多欲之人或心有妄思或外有妄遇以致君火搖於上相火熾於下則水不能藏而精隨以泄初泄者不以為意至再至三漸至不已及其久而精道滑則隨觸皆遺欲遏不能矣斯時也精竭則陰虛陰虛則無氣以致為勞為損去死不遠可無畏乎蓋精之藏制雖在腎而精之主宰則在心故精之蓄泄無非聽命於心凡少年初省人事精道未實者苟知惜命先須惜精苟欲惜精先宜淨心但見伶俐乖巧之人多有此病而田野愚魯之夫多無此病其故何也亦總由心之動靜而已此少年未病之前所當知也及其既病而求治則尤當以持心為先然後隨證調理自無不愈使不知求本之道全恃藥餌而欲望成功者蓋亦幾希矣遺精之證有九凡有所注戀而夢者此精為神動也其因在心有欲事不遂而夢者此精失其位也其因在腎有值勞倦即遺者此筋力有不勝肝脾之氣弱也有因用心思索過度輒遺者此中氣有不足心脾之虛陷也有因濕熱下流或相火妄動而遺者此脾腎之火不清也有無故滑而不禁者此下元之虛肺腎之不固也有素稟不足而精易滑者此先天元氣之單薄也有久服冷利等劑以致元陽失守而滑泄者此誤藥之所致也有壯年氣盛久節房欲而遺者此滿而溢者也凡此之類是皆遺精之病然心主神肺主氣脾主濕肝主疏泄腎主閉藏則凡此諸病五臟皆有所主故治此者亦當各求所因也至若盛滿而溢者則去者自去生者自生勢出自然固無足為意也一因夢而出精者謂之夢遺不因夢而精自出者謂之滑精夢遺者有情有火有虛有溢有因情動而夢者有因精動而夢者情動者當清其心精動者當固其腎滑精者無非腎氣不守而然若暴滑而兼痛者則當從赤白濁門論治論治共八條一精道滑而常夢常遺者此必始於欲念成於不謹積漸日深以致腎氣不固而然惟苓朮菟絲丸為最佳其次則小菟絲子丸金鎖思仙丹之類皆可擇用一君火不清神搖於上則精遺於下火甚者宜先以二陰煎之類清去心火火不甚者宜先以柏子養心丸天王補心丹或人參丸遠志丸之類收養心氣然後用苓朮菟絲丸之類固之一相火易動肝腎多熱而易於疏泄者宜經驗豬肚丸為最或固精丸之類主之然須察其火之微甚宜清者亦當先清其火一凡思慮勞倦每觸即遺者但當培補心脾勿得誤為清利惟壽脾煎或歸脾湯減去木香或用祕元煎主之皆其宜也其有氣分稍滯不堪耆術者宜菟絲煎主之或以人參湯吞苓朮菟絲丸亦妙一先天素稟不足元陽不固每多遺滑者當以命門元氣為主如左歸右歸六味八味等丸或五福飲固陰煎菟絲煎之類隨宜用之或經驗祕真丹亦可酌用一濕熱下流火伏陰中而遺者宜四苓散或大小分清飲之類主之一過服寒涼冷利等藥以致陽氣不固精道滑而遺泄不止者速當溫補脾腎宜五君子煎壽脾煎或右歸丸八味地黃丸家韭子丸之類主之一治遺精之法凡心火盛者當清心降火相火盛者當壯水滋陰氣陷者當升舉滑泄者當固澀濕熱相乘者當分利虛寒冷利者當溫補下元元陽不足精氣兩虛者當專培根本今人之治遺泄動以黃柏知母為君或專用固本丸坎離丸之類不知苦寒之性極能沉降瀉水腎虛者尤非所宜腎有補而無瀉此輩亦何裨於腎而凡用治於非火滑泄者適足為腎之害耳述古五條丹溪曰夢遺精滑專主乎熱熱則流通宜滋陰降火勞神思者安神養心久而虛脫者須兼補藥及收澀之藥無有不愈薛立齊曰按前證若腎氣不足用益志湯金鎖正元丹肝腎虛熱者用六味丸加味逍遙散脾虛熱者用六味丸補中益氣湯凡此悉屬不足之證宜用十全大補湯或用萆薢分清飲送八味丸又曰按前證屬足三陰虧損所致若肝腎虛熱者用四物加柴胡山梔山茱萸山藥脾胃氣虛者用補中益氣加山茱萸山藥思慮傷脾者兼用歸脾湯加山茱萸山藥肝腎虧損者六味丸真陽虛敗者八味丸心腎不交用萆薢分清飲心氣虛熱者清心蓮子飲樓全善綱目云一壯年夢遺白濁與澀精藥益甚知其鬱滯改用導赤散大劑服之遺濁皆止又一中年夢遺與澀藥勿效改與神芎丸下之下後與豬苓丸遂愈徐東皋云夢遺因心經有火神思不寧所以夢與人交而精泄治當用清心安神溫膽等劑加黃連生地人參遠志茯神棗仁羚羊角之類有自遺者乃氣血虛而下脫有因熱而流通者當分虛實須用八物湯加龍骨牡蠣樗根皮之類有小便後精出不可禁者或不小便而自出者或莖中出而癢痛常如欲小便者並宜先服辰砂妙香散或威喜丸或分清飲別以綿裹龍骨同煎或加五倍子牡蠣白茯苓五味子之屬煎服王宇泰曰凡病精泄不禁自汗頭眩虛極或寒或熱用補澀之藥不效其脈浮軟而散蓋非虛也亦非房室過度此無他心有所睹因有所慕意有所樂欲想方興不遂所欲而致斯疾既以藥補且固不效將何以治之緣心有愛則神不歸意有想則志不寧當先和營衛營衛和則心安次調其脾脾氣和則志舍定心腎交媾精神內守其病自愈其法用人參三錢當歸一錢洗焙為末作三服糯米飲調下服畢自汗出而寒熱退若頭眩未除用川芎三錢人參一錢焙為末作三服沸湯調下頭眩瘥而精不禁者用芍藥半兩丁香三錢木香三錢銼散每服用生薑五片棗二枚以水同煎空心服即心安神定精固神悅遺精論列方小菟絲丸固三五家韭子丸固三四五君子煎新熱六人參丸補百五歸脾湯補三二大分清飲新寒五菟絲煎新固三壽脾煎新熱十六小分清飲新和十遠志丸補百十三固精丸固三十苓朮菟絲丸新固五祕元煎新固一祕真丹固二五金鎖思仙丹固十九固陰煎新固二二陰煎新補十金鎖正元丹固十八左歸丸新補四右歸丸新補五補中益氣湯補三十五福飲新補六八物湯補十九十全大補湯補二十六味丸補百二十八味丸補一二一天王補心丹補百八益志湯熱一六五經驗豬肚丸固四十逍遙散補九二四物湯補八辰砂妙香散固十五安神丸寒一四二溫膽湯和一五三柏子養心丸補百十一威喜丸固四五導赤散寒一二二清心蓮子飲寒三二豬苓丸因四八四苓散和一八七萆薢分清飲熱一六四神芎丸攻七二論外備用方還少丹補一三五心腎丸補百十二枸杞子丸補一四二金櫻膏補百安腎丸熱一六六精寒不禁小安腎丸熱一六七陰虛夢遺玉鎖丹固二一不禁金鎖丹固十七金鎖匙丹固二十鬼交夢遺固真散固二八暖下元三仙丸固四一遺滑金櫻丸固二四固真丸固二七久滑九龍丸固四二水陸二仙丹固二三韭子丸固三三虛寒漏精茯菟丸固三八思慮傷精王荊公妙香散固十六安神固精淋濁經義至真要大論曰諸轉反戾水液渾濁皆屬於熱太陽之勝陰中乃瘍隱曲不利互引陰股痿論曰思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫口問篇曰中氣不足溲便為之變五癃津液別篇曰陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛酸氣厥論曰胞移熱於膀胱則癃溺血評熱病論曰小便黃者少腹中有熱也玉機真藏論曰冬脈不及則令人少腹滿小便變經脈別論曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也論證共四條便濁證有赤白之分有精溺之辨凡赤者多由於火白者寒熱俱有之由精而為濁者其動在心腎由溺而為濁者其病在膀胱肝脾一赤濁之證有溺之赤色者有帶血而赤者若見鮮血則當從血證門溺血條下治之若溺之黃赤者此固多有火證然必赤而痛澀及別有火脈火證方可以火證赤濁論治若或以勞倦過傷或以久病或以酒色耗傷真陰或以素服清涼等藥愈服愈赤愈見短少而且無痛澀等證者此係水虧液涸全非赤濁之比經曰中氣不足溲便為之變即此類也但當溫補下元使之氣化水必自清切不可因小便黃赤一概皆從火治一白濁證有濁在溺者其色白如泔漿凡肥甘酒醴辛熱炙爆之物用之過當皆能致濁此濕熱之由內生者也又有炎熱濕蒸主客時令之氣侵及臟腑者亦能致濁此濕熱之由外入者也然自外而入者少自內而生者多總之必有熱證熱脈方是火證清去其火則濁無不愈矣有濁在精者必由相火妄動淫欲逆精以致精離其位不能閉藏則源流相繼淫溢而下移熱膀胱則溺孔澀痛清濁並至此皆白濁之因熱證也及其久也則有脾氣下陷土不制濕而水道不清者有相火已殺心腎不交精滑不固而遺濁不止者此皆白濁之無熱證也有熱者當辨心腎而清之無熱者當求脾腎而固之舉之治濁之法無出此矣淋之為病小便痛澀滴瀝欲去不去欲止不止者是也是亦便濁之類而實濁之甚者但濁出於暫而久而不已則為淋證其證則或有流如膏液者或出如砂石而痛不可當者或有如筋條者或時為溺血血條者此淋之與濁誠有不同故嚴氏有五淋之辨曰氣石血膏勞也氣淋為病小便澀常有餘瀝石淋莖中痛溺如砂石不得卒出膏淋溺如膏出勞淋勞倦即發痛引氣衝血淋遇熱即發甚則溺血候其鼻頭色黃者小便難也大抵此證多由心腎不交積蘊熱毒或酒後房勞服食燥熱七情鬱結所致此嚴氏之說固已盡之然淋之初病則無不由乎熱劇無容辨矣但有久服寒涼而不愈者又有淋久不止及痛澀皆去而膏液不已淋如白濁者此惟中氣下陷及命門不固之證也故必以脈以證而察其為寒為熱為虛庶乎治不致誤論治共六條一熱蓄膀胱溺赤熱甚而或痛或澀者必當專去其火宜先用抽薪飲大分清飲七正散之類主之若小水不利而煩熱難解者惟緑豆飲為最妙若兼大便燥結者宜八正散主之若微熱不甚或熱勢稍退者宜加減一陰煎或導赤散火府丹清心蓮子飲之類主之若小水不利者宜清肺飲子主之一溺白證凡如泔如漿者亦多屬膀胱水道之熱宜導赤散徙薪飲之類以清之若無內熱而溺白者多由飲食濕滯宜小分清飲或苓朮二陳湯減去乾薑以燥之利之大都濕在腸胃或在膀胱者宜二陳湯或半夏丸或固元丹之類皆可擇用若胞氣不固而液濁不清者此亦敗精之屬也宜祕元煎或水陸二仙丹以固之一濁在精分者必因相火妄動或逆精而然以致精溺並至若兼澀痛之甚者亦宜抽薪飲大分清飲之類先去其火然後再安精氣及其稍久痛澀俱去而惟精濁不止者當用寧心固腎等劑宜祕元煎菟絲煎或人參丸定志丸心虛白濁歌之類主之一命門虛寒陽氣不固則精濁時見而久不能愈者但當培補命門宜右歸丸益志湯石刻安腎丸八味地黃丸之類主之若虛本不甚而胞氣微寒不攝者宜萆薢分清飲主之一治淋之法大都與治濁相同凡熱者宜清澀者宜利下陷者宜升提虛者宜補陽氣不固者宜溫補命門但當以前法通用無他技也一血淋證若在男子則凡便血不痛者即為溺血血來而痛者即曰血淋然無非逆血證耳治法具詳血證門惟婦人之血淋則多由衝任經脈之病大與男子者不同婦人門另有正條述古共六條河間曰小便渾濁皆屬於熱如夏月天氣熱則水液渾濁冬月天氣寒則水清潔水體清而火體濁故也如清水火煎自濁東垣曰淋證當分在氣在血而治之以渴與不渴為辨如渴而小便不利熱在上焦氣分肺金主之宜用淡滲之藥以茯苓澤瀉琥珀燈心通草車前瞿麥萹蓄之類而清肺金之氣瀉其火以滋水之上源也不渴而小便不利者熱在下焦血分腎與膀胱主之宜用氣味俱陰之藥如知母黃柏滋腎丸是也除其熱泄其閉塞以滋膀胱腎水之下元也丹溪曰淋雖有五皆屬於熱治宜解熱利水以山梔子之類不可發汗汗之必便血又曰濁主濕熱有痰有虛赤屬血白屬氣大率皆是濕痰流注宜燥中宮之濕用二陳加蒼朮白朮燥去其濕去熱宜黃柏青黛滑石山梔痰盛者以二陳加南星蛤粉神麯糊丸青黛為衣虛勞者不宜峻用寒涼當用補陰滋腎氣胃弱者兼用人參以柴胡升麻升其胃中之氣附録云人之五臟六腑俱各有精然腎為藏精之府而聽命乎心貴乎水火升降精氣內持若調攝失宜思慮不節嗜欲過度水火不交精元失守由是而為赤白濁之患赤濁是心虛有熱因思慮得之白濁腎虛有寒過於淫欲而得之其狀漩白如油光彩不定漩腳澄下凝如膏糊治法赤者當清心調氣白者溫補下元又須清上使水火既濟陰陽葉和精氣自固矣薛立齊曰按前證脾肺虛熱者用補中益氣湯送六味丸肺腎虛熱者用黃芩清肺飲送六味丸肝腎虛熱者用加味逍遙散送六味丸勞傷心腎者清心蓮子飲鬱結傷脾者歸脾湯若鬱怒傷肝脾者加味逍遙散若心腎虛弱者小溫金散若思慮傷心腎者茯菟丸夢遺精滑赤白二濁治法當互參用之徐東皋曰淋證初作者主於實熱當利之八正散之屬是也既利之而不愈久久而氣下陷者虛也宜升其氣氣升而水自下升而不愈必用吐法吐之而氣自升也痰多者用二陳湯先服後吐痰氣閉塞者用二陳湯加木通香附探吐趙氏曰肝主小便若肝經血虛用四物山梔若小便澀滯或莖中作痛屬肝經濕熱用龍膽瀉肝湯若小便頻數或勞而益甚屬脾氣虛弱用補中益氣湯加山藥五味若小便無度或淋瀝不禁乃陰挺痿痹也用六味地黃丸若小便澀滯或補而益甚乃膀胱結熱也用五淋散若脾肺燥熱不能化生者黃芩清肺湯膀胱陰虛陽無所生者滋腎丸膀胱陽虛陰無所化者六味丸若陰痿思色精不出莖道澀痛如淋用加減八味丸料加車前牛膝若老人精竭復耗大小便牽痛如淋亦用前法溫之如不應急加附子多有生者淋濁論列方大分清飲新寒五小分清飲新和十小溫金散固四三抽薪飲新寒三徙薪飲新寒四加減一陰煎新補九七正散寒百十六八正散寒百十五清心蓮子飲寒三二導赤散寒一二二火府丹寒百二十苓朮二陳煎新和四緑豆飲新寒十四五淋散寒百十七水陸二仙丹固二三四物湯補八清肺飲子和一五三萆薢分清飲熱一六四二陳湯和一滋腎丸寒一六三心虛白濁歌補百一六味丸補百二十八味丸補一二一黃芩清肺飲寒三八右歸丸新補五半夏丸和三五二補中益氣湯補三十歸脾湯補三二益智湯熱一六五加減八味丸補一二二人參丸補百五菟絲煎新固三加味逍遙散補九三定志丸補百十六茯菟丸固三八石刻安腎丸熱一六八祕元煎新固一固元丹固三一龍膽瀉肝湯寒六三論外備用方還少丹補一三五金櫻膏補百虛帶濁人參固本丸補百六琥珀散和三四七氣虛淋濁地髓湯和三四五淋痛海金砂散寒一七二膏淋五淋散寒百十七熱淋牛膝湯寒一二五砂淋直指黃芩湯寒百七心肺熱祕真丹固二五五子丸固四六濁蓮子六一散固四四赤濁鎖精丸固二六帶濁威喜丸固四五家韭子丸固三四陽虛久濁固精丸固二九虛滑帶濁遺溺經義宣明五氣篇曰膀胱不利為癃不約為遺溺五癃津液別篇曰天寒則腠理閉氣濕不行水下留於膀胱則為溺與氣陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛酸骨空論曰督脈為病癃痔遺溺經脈篇曰肝所生病者遺溺閉癃痹論曰淫氣遺溺痹聚在腎氣厥論曰心移寒於肺肺消肺消者飲一溲二死不治脈要精微論曰倉廩不藏者是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死本輸篇曰三焦者足少陰太陽之所將實則閉癃虛則遺溺論證共二條遺溺一證有自遺者以睡中而遺失也有不禁者以氣門不固而頻數不能禁也又有氣脫於上則下焦不約而遺失不覺者此虛極之候也總之三者皆屬虛證但有輕重之辨耳若夢中自遺者惟幼稚多有之俟其氣壯而固或少加調理可愈無足疑也惟是水泉不止膀胱不藏者必以氣虛而然蓋氣為水母水不能蓄以氣不能固也此失守之兆大非所宜甚至氣脫而遺無所知覺則尤其甚者也此惟非風證及年衰氣弱之人或大病之後多有之仲景曰下焦竭則遺溺失禁此之謂也一古方書論小便不禁者有屬熱屬虛之辨不知不禁之謂乃以小水太利者為言皆屬虛寒何有熱證若因熱而小水頻數其證則淋瀝點滴不能禁止而小水必不利且或多痛澀方是熱證若然則自有淋濁門正治之法蓋此非遺失之謂也倘以虛寒誤認為熱而妄投瀉火之藥無不殆矣論治共六條凡治小便不禁者古方多用固澀此固宜然然固澀之劑不過固其門戶此亦治標之意而非塞源之道也蓋小水雖利於腎而腎上連肺若肺氣無權則腎水終不能攝故治水者必須治氣治腎者必須治肺宜以參耆歸朮桂附乾薑之屬為之主然後相機加以固澀之劑為之佐庶得治本之道而源流如度否則徒障狂瀾終無益也余制有鞏堤丸方治無論心脾肺腎之屬皆宜以此為主治一脾肺氣虛不能約束水道而病為不禁者此其咎在中上二焦宜補中益氣湯理中湯溫胃飲歸脾湯或四味回陽飲之類加固澀等劑主之如不見效當責之腎一肝腎陽氣虧敗則膀胱不藏而水泉不止此其咎在命門宜右歸飲大補元煎六味回陽飲甚者以四維散之類主之或加固澀為佐亦可或用集要四神丸或八味地黃丸去澤瀉亦可用一凡睡中遺溺者此必下元虛寒所以不固宜大菟絲子丸家韭子丸五子丸縮泉丸之類主之其有小兒從幼不加檢束而縱肆常遺者此慣而無憚志意之病也當責其神非藥所及或因縱以致不固者亦當治之如前宜用豬羊溲脬炙脆煎湯送下前藥更妙一凡因恐懼輒遺者此心氣不足下連肝腎而然宜大補元煎歸脾湯五君子煎之類主之一古方壯陽固澀等劑如茴香益智丸二氣丹固脬丸祕元丹牡蠣丸濟生菟絲子丸固真散皆可隨宜擇用述古薛立齊曰經云膀胱不約為遺溺小便不禁常常出而不覺也人之漩溺賴心腎二氣之所傳送蓋心與小腸為表裡腎與膀胱為表裡若心腎氣虧傳送失度故有此證治宜溫暖下元清心寡欲又有産育不順致傷膀胱若內虛寒者祕元丹韭子丸之類若內虛濕熱者六味地黃丸或加五味杜仲補骨脂年老者八味丸産育收生不謹損破尿胞者參朮補胞湯加豬羊胞煎之竊謂肝主小便若肝經血虛用四物山梔若小便澀滯或莖中作痛屬肝經濕熱用龍膽瀉肝湯若小便頻數或勞而益甚屬脾氣虛弱用補中益氣湯加山藥五味子若小便無度或淋瀝不禁乃陰挺痿痹也用六味地黃丸若小便澀滯或補而益甚乃膀胱熱結也用五淋散其脾肺燥不能化生者黃芩清肺飲膀胱陰虛陽無所生者滋腎丸膀胱陽虛陰無所化者六味丸若陰痿思色精不出莖道澀痛如淋用加減八味丸料加車前牛膝若老人精竭復耗大小便牽痛如淋亦用前藥不應急加附子多有生者遺溺論列方理中湯熱一溫胃飲新熱五四味回陽飲新熱一右歸飲新補三八味丸補一二一六味回陽飲新熱二四維散新熱十二滋腎丸寒一六三補中益氣湯補三十歸脾湯補三二固脬丸固六三大菟絲子丸固三六二氣丹熱一八六五子丸固四六濟生菟絲丸固三七縮泉丸固六一五淋散寒百十七參朮補胞湯未收祕元丹固三二牡蠣丸固六四茴香益智丸固六五固真散固二八大補元煎新補一加減八味丸補一二二家韭子丸固三四五君子煎新熱六黃芩清肺飲寒八三龍膽瀉肝湯寒六三集要四神丸補一五八鞏堤丸新固九論外備用方朮附湯補四二虛寒鹿茸丸補一三三腎虛多溺小安腎丸熱一六七多溺椒附丸熱百十二小便頻威喜丸固四五局方安腎丸熱一六六頻數腎著湯熱一二九腰冷多溺豬苓丸固四八頻數石刻安腎丸熱一六八頻數豬肚丸固三九小便頻數肉蓯蓉丸固六二不禁鎖精丸固二六雞內金散固二九二氣虛遺尿
