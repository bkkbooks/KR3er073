生仲景桃花湯治少陰傷寒下利便膿血赤石脂一斤一半篩末一半全用乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合內所篩赤石脂細末方寸匕攪勻服之日三服若一服愈余勿服潔古漿水散治暴瀉如水周身汗出一身盡冷脈微而弱氣少不能語者甚者加吐即為急證半夏一兩制附子制炮姜肉桂甘草各五錢良薑二錢半上為末每服三錢漿水一鍾半煎至半鍾熱服淡寮附子茴香散治氣虛積冷心腹絞痛泄瀉食少人參白朮茯苓炙甘草各七分附子制炮姜各五分茴香肉豆蔻各四分木香三分丁香五粒水一鍾半煎七分食遠服本事五味子散治腎泄在侵晨及五更作瀉飲食不進不時去後五味子炒二兩吳茱萸炒一錢上為末每服二錢白湯調下為丸尤效本事二神丸治脾胃虛寒不思飲食泄瀉不止肉豆蔻生用二兩破故紙炒四兩上為末用大肥棗四十九枚入生薑片四兩同煮以棗爛為度去姜取棗肉搗藥為丸桐子大每服五六十丸白湯下薛氏四神丸治脾腎虛寒大便不實飲食不思及泄痢腹痛等症破故炒四兩肉豆蔻麵煨五味子各二兩吳茱萸湯浸炒一兩上為末用大棗百枚同姜八兩煮爛取肉搗丸桐子大每服七八十丸空心食前白湯下按此丸不宜用棗但以薑汁煮麵糊為丸更佳淡寮四神丸治脾腎泄清晨溏瀉破故炒四兩肉豆蔻二兩木香半兩小茴香炒一兩上為末姜煮棗肉為丸桐子大白湯送下醫林四神丸治寒疝脹痛不已蓽澄茄木香各半兩吳茱萸半酒浸半醋浸香附各一兩上為末糊丸桐子大每服七八十丸空心鹽湯或乳香蔥湯任下集要四神丸方在補陳治小便頻數不禁五味子丸治下元虛寒火不生土以致命門不暖關門不閉名曰腎泄亦名脾腎泄人參白朮炒北五味子炒破故炒各三兩山藥炒白茯苓各兩半吳茱萸湯泡炒川巴戟去心炒肉果麵煨各一兩龍骨煅五錢上為末酒糊丸桐子大每服百餘丸食前白湯或米湯任下得效蓽茇丸治滑泄中寒者宜之蓽茇川薑炮丁香不見火附子炮去皮臍良薑胡椒吳茱萸湯浸炒各一兩山茱萸草豆蔻去皮各半兩煮棗肉丸桐子大每服五六十丸食前陳米飲下日三服局方肉豆蔻丸治脾胃虛弱脹滿水穀不消臟腑滑泄肉豆蔻麵煨蒼朮制乾薑炮厚朴制陳皮各四兩炙甘草茴香炒肉桂川烏炮去皮臍訶子肉各二兩上用湯浸蒸餅為丸梧子大每服七八十丸食前白滾湯下陳氏肉豆蔻丸方在小兒治腸滑瀉痢濟生訶梨勒丸治大腸虛冷泄瀉不止腹脅引痛飲食不化訶梨勒麵裹煨附子炮肉豆蔻麵裹煨木香吳茱萸湯泡炒龍骨生用白茯苓去皮蓽茇各等分上為細末生薑汁煮麵糊為丸梧子大每服七十丸空心米飲下良方厚朴丸治寒中洞泄實滯脹滿等證厚朴炒乾薑炒等分上水拌炒為末水糊丸桐子大每服五十丸米飲下百一縮脾丸治滑泄不禁白朮炒厚朴姜炒赤石脂肉豆蔻麵煨乾薑炒各一兩附子制蓽茇神麯炒各五錢上為細末醋糊丸桐子大每服五七十丸空心米飲下三因桂香丸治臟腑虛寒為風寒所搏冷滑注下不禁危篤者纍效附子肉豆蔻麵煨白茯苓各一兩桂心乾薑炒木香各半兩丁香二錢半上為末麵糊丸桐子大空心米飲下五七十丸寶鑑陳曲丸磨積止瀉痢治腹中冷痛陳曲一兩半人參白朮炒當歸炒乾薑肉桂甘草炙厚朴制各半兩上為末煉蜜丸桐子大每服三五十丸溫酒或淡醋湯任下日二服楊氏萆薢分清飲治真元不足下焦虛寒或服寒涼刮藥過多小便白濁頻數無度澄如膏糊等證益智仁川萆薢石菖蒲烏藥各等分上㕮咀每服五六錢水一鍾入鹽一捻煎七分食前溫服一方加茯苓甘草益志湯治腎經虧損遺精白濁四肢煩倦時發蒸熱等證鹿茸酥炙巴戟肉枸杞子熟地黃蓯蓉酒浸牛膝酒浸附子炮去皮臍桂心不見火山茱萸白芍藥炙甘草防風各等分上每服三錢水一盞姜五分鹽少許同煎空心服局方安腎丸治腎經積冷下元衰憊目暗耳鳴四肢無力夜夢遺精小便頻數臍腹撮痛食少體瘦神困健忘常服壯元陽益腎水肉桂去粗皮不見火川烏炮去皮臍各一斤白朮山藥茯苓肉蓯蓉酒浸炙巴戟去心破故炒萆薢桃仁麵炒石斛炙白蒺藜炒去刺各三斤上為末煉蜜丸桐子大每服三五十丸溫酒或鹽湯下空心食前服疝氣茴香湯下三因安腎丸無茯苓肉桂二味小安腎丸治腎氣虛乏下元冷憊夜多漩溺體瘦神倦腰膝沉重泄瀉腸鳴眼目昏暗牙齒蛀痛川楝子一斤用香附子川烏各一斤加鹽四兩水四升同煮候乾去香附川烏不用取川楝切焙小茴十一兩熟地八兩川椒四兩去閉口者微炒出汗上為末酒糊丸桐子大每服二三十丸空心臨臥鹽湯或酒任下西蜀石刻安腎丸治真氣虛憊腳膝軟弱夜夢遺精小便滑數附子制肉桂川烏制川椒去目微炒出汗菟絲制巴戟制破故酒炒赤石脂煅遠志制茯神茯苓蒼朮米泔浸炒山茱萸杜仲制石斛胡蘆巴炒柏子仁韭子微炒小茴酒炒肉蓯蓉酒浸川楝子酒蒸去核各二兩鹿茸制一兩青鹽四錢山藥四兩作糊上為末酒煮山藥糊丸桐子大每服七八十丸空心鹽湯或白湯下元戎小已寒丸一名強中丸治脾胃積冷中寒洞泄倦怠不思飲食進食止自汗厚腸胃見肘後甚驗艾葉四兩蒼朮一兩炒吳茱萸炒陳皮炒各二兩上用米醋二升浸一宿漉出曝乾再於原醋內拌勻炒令紫色焙乾為末稀糊丸桐子大每服三五十丸空心食前溫酒鹽湯米湯白湯任下局方大已寒丸治臟腑虛寒心腹㽲痛腸鳴泄瀉自利自汗米穀不化手足厥冷陰盛陽衰等證蓽茇肉桂各四兩乾薑炮良薑各六兩水煮麵糊為丸桐子大每服二三十丸食前米飲下元戎大已寒丸治諸沉寒冷祕等證吳茱萸官桂乾薑良薑烏頭附子上為末醋糊丸桐子大每服三五十丸米飲下空心食前日二服無所忌海藏巳寒丸此丸不僭上而陽生於下治陰證服四逆輩胸中發躁而渴者或數日大便祕小便赤澀服此丸上不燥大小便自利肉桂附子炮烏頭炮良薑乾薑芍藥茴香各等分上為末米糊丸桐子大空心溫水下五七十丸或八九十丸食前亦可酒醋糊丸亦可海藏云已寒上五味雖熱以芍藥茴香潤劑引而下之陰得陽而化故大小便自通如得春和之陽冰自消矣十補丸治腎臟虛冷面黑足寒耳聾膝軟小便不利等證附子炮五味各二兩山藥山茱萸丹皮桂心鹿茸制茯苓澤瀉各一兩煉蜜丸桐子大每服六七十丸鹽湯下百選十補丸治小腸寒疝附子一大枚制胡蘆巴木香巴戟天川楝肉玄胡索官桂蓽澄茄大茴香破故紙炒各一兩上為末酒煮糯米粉糊為丸桐子大硃砂為衣空心酒下五十丸集成神應散治寒疝諸疝心腹痛不可忍散氣開鬱玄胡索胡椒小茴香等分上為末每服二錢酒調下金匱當歸生薑羊肉湯治寒疝腹中痛及脅痛裡急者當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩如加生薑亦須加水五升煮取三升二合服之丹溪腎氣丸治諸疝痛小茴香炒破故紙炒吳茱萸鹽炒各五錢胡蘆巴七錢半木香三錢半上為末蘿蔔汁丸桐子大鹽湯下五七十丸百選胡蘆巴丸治小腸氣蟠腸氣奔豚疝氣偏墜陰腫小腹有形如卵上下來去痛不可忍或絞結繞臍攻刺嘔吐者胡蘆巴炒一斤大巴戟炒川烏炮去皮各六兩川楝子炒十八兩茴香二十兩吳茱萸湯浸七次炒十兩上為末酒糊丸桐子大每服十五丸至二十丸空心溫酒下東垣丁香楝實丸治寒疝氣血留滯當歸酒洗附子炮川楝肉茴香各一兩以上㕮咀用好酒三升同煮酒盡焙乾為末每藥末一兩入沒藥丁香木香各五分全蠍十三個玄胡索五錢上俱為末拌勻酒糊丸桐子大每服三五十丸加至百丸空心溫酒送下苦楝丸治奔豚小腹痛神效川苦楝子茴香各二兩附子一兩炮去皮臍上三味用酒三升同煮盡為度焙乾為末每藥末一兩入玄胡索二錢一作五錢全蠍十八個炒丁香十八粒俱為末和勻酒糊丸桐子大溫酒下五十丸空心服如痛甚煎當歸酒下良方三層茴香丸治腎與膀胱俱虛邪氣搏結不散遂成寒疝臍腹疼痛陰丸偏大膚囊壅腫有妨行步或瘙癢不止時出黃水浸成瘡瘍或長怪肉或外腎腫脹冷硬如石日以漸大須溫導陽氣漸退寒邪補虛消疝暖養腎經凡一應小腸氣寒疝之疾久新不過三料第一料舶上茴香用鹽半兩同炒焦黃和鹽稱用一兩連下共重四兩川楝子炮去核沙參洗木香各一兩上為細末米糊丸桐子大每服二三十丸空心溫酒或鹽湯下日三服小病一料可安病深者一料才盡便可用第二料第二料如前方加蓽茇一兩檳榔五錢上六味共重五兩半依前糊丸服如前若未愈再服第三料第三料如前方加白茯苓佳者四兩附子炮去皮臍或五錢或一兩上八味共重十兩丸服如前漸加至三四十丸凡小腸氣頻發及三十年者或大如栲栳者皆可消散神效奪命丹治遠年近日小腸疝氣偏墜搐痛臍下脹痛以致悶亂及外腎腫硬日漸滋長陰間濕癢等證吳茱萸揀淨一斤分四分用酒醋鹽湯童便各浸一宿焙乾澤瀉淨片二兩酒浸一宿上為末酒糊丸桐子大每服五十丸食前鹽酒或鹽湯下良方奪命丹方在婦人治瘀血入胞脹滿難下萬氏奪命丹方在痘疹治痘瘡倒陷解毒發痘外科奪命丹方在外科治疔瘡發背惡毒惡證有奪命之功局方二氣丹治虛寒積冷小便不禁老人虛人尺脈微弱患此者硫黃制研細肉桂各二錢半乾薑炮硃砂研為衣各二錢附子制半兩上以麵糊丸桐子大每服二十丸空心鹽湯下局方半硫丸治高年冷祕虛祕及痃癖冷氣簡易曰此潤劑也半夏湯泡七次焙乾為末硫黃明淨者研極細用柳木槌子殺過上等分以生薑汁打糊丸桐子大每服五七十丸用無灰酒或生薑湯任下養正丹治上盛下虛眩運此藥升降陰陽及咳逆翻胃霍亂吐瀉中風涎潮不省人事傷寒陰盛唇青自汗硫黃為末黑錫熔淨水銀硃砂研各一兩上將錫熔化入硫末漸入漸攪為末再入水銀同擂如硬再於火上微煅又擂勻放冷研極細末糯米糊丸緑豆大每服三十丸空心鹽湯下局方黑錫丹治痰氣壅塞上盛下虛腎水虧竭心火炎盛或一應下虛陰寒真頭痛等證及婦人血海久冷無子赤白帶下黑錫去滓二兩炒末硫黃二兩肉桂五錢附子炮木香沉香舶茴香故紙陽起石水飛葫蘆巴酒浸炒肉豆蔻麵裹煨金鈴子蒸去皮核各一兩上用新鐵銚將錫化開下硫黃末提起以木杵擂極細放地上退火毒同餘藥研一日至黑光色為度酒糊丸桐子大陰乾入布袋內擦令光瑩每服四十丸空心姜鹽湯下女人艾棗湯下局方紅丸子和脾胃消宿食去膨脹治大人小兒脾胃之證極有神效京三稜浸軟切片蓬朮煨青皮橘紅各五斤乾薑炮胡椒各三斤上為末用醋糊丸桐子大礬紅為衣每服三十丸食後薑湯送下小兒臨時加減與服丸治飲食所傷中脘痞滿服之應手而愈妊婦惡阻嘔吐全不納食百藥不治者惟此最妙可佐二陳湯服之但人疑其墮胎必不信服每易名用之時有神效但恐妊婦偶爾損動未免歸咎此藥是當酌而防之椒囊法闢一切瘴疾時氣風寒時氣紅川椒去閉口者以絳紗囊貯椒兩許懸佩身傍近裡衣處則一切邪氣不能侵犯椒紅丸治元臟傷憊目暗耳聾服此百日覺身輕少睡足有力是其效也服及三年心智爽悟目明倍常面色紅悅鬚髮光黑川椒去目併合口者炒出汗搗取紅一斤生地黃搗自然汁熬取濃汁一升上將生地汁熬至稀稠得所和椒末搗丸梧子大每空心溫酒下三四十丸合藥時勿令婦人雞犬見有詩曰其椒應五行其仁通六義欲知先有功夜間無夢寐四時去煩勞五臟調元氣明目腰不疼身輕心健記別更有異能三年精自祕回老返嬰童康強不思睡九蟲頓消亡三尸自逃避若能久餌之神仙應可冀
