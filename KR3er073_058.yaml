body:
  text: 卷之五十八宙集古方八陳熱陳仲景理中丸即名人參理中湯治太陰即病自利不渴陰寒腹痛短氣咳嗽霍亂嘔吐飲食難化胸膈噎塞或瘧疾瘴氣瘟疫中氣虛損久不能愈或中虛生痰等證人參白朮炒乾薑炒炙甘草各三兩上四味搗篩為末蜜丸雞子黃大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依數切用水八升煮取三升去渣溫服一升日三服原論加減法詳在霍亂門述古條中賓按上方兩數乃漢時權度今後世所用惟每味數錢而甘草半之酌宜可也附子理中湯治證如前而中氣虛寒腹痛甚者又或入房腹痛手足厥冷或食冷犯寒等證即前方加製附子一二三錢隨宜用之其有寒甚勢急者不妨生用或炮用亦可外科附子理中湯有芍藥茯苓無甘草乾薑附子理中丸治陰寒腎氣動者即前附子理中湯去白朮煉蜜丸服理中加丁香湯治中脘停寒喜辛物入口即吐即噦即前附子理中湯加丁香十粒甚或兼痛者可加至一二錢若以理中加木香即名木香理中湯加味理中湯治脾肺俱虛咳嗽不已人參白朮茯苓炙甘草陳皮半夏乾薑細辛北五味等分上咀每服三錢姜三片棗一枚煎七分食遠服局方胡椒理中湯治肺胃虛寒氣不宣通咳喘逆氣虛痞噎悶脅腹滿痛短氣不能飲食嘔吐痰水不止白朮五兩乾薑炙甘草胡椒良薑蓽茇陳皮細辛款冬花去梗各四兩上㕮咀每服五七錢水一鍾半煎七分食遠溫服或煉蜜丸桐子大每服三五十丸白湯溫酒米飲任下無時每日二服選方八味理中丸治脾胃虛寒飲食不化胸膈痞悶或嘔吐泄瀉人參乾薑炒各一兩白朮四兩炒白茯苓麥芽炒二兩甘草炙神麯炒砂仁炒各一兩半上為細末煉蜜為丸每丸重一錢空心服一丸薑湯嚼下枳實理中丸治傷寒寒實結胸人參白朮茯苓甘草乾薑各二兩枳實十六片上為細末煉蜜丸雞子黃大每服一丸熱湯化下連進二三服理中化痰丸治脾胃虛寒痰涎內停嘔吐少食或大便不實飲食難化咳唾痰涎此中氣虛弱不能統涎歸源也人參白朮炒乾薑炮茯苓各二兩炙甘草一兩半夏制三兩薑湯煮麵糊丸桐子大每服四五十丸白湯送下治中湯治脾胃不和嘔逆霍亂中滿虛痞或泄瀉此即理中湯加青皮陳皮也人參白朮乾薑炮炙甘草青皮陳皮等分上每服五錢水煎服如嘔加半夏丁香溫中湯治同前即前治中湯加丁香去半夏良方溫胃湯治憂思結聚脾肺氣凝元陽受損大腸與胃氣不平脹滿上衝飲食不下脈虛而緊滿附子制厚朴當歸白芍藥人參甘草炙陳皮各一錢乾薑炮一錢川椒去合口炒出汗三分水一鍾半姜三片煎一鍾食遠服東垣溫胃湯治服寒藥多致脾胃虛弱胃脘痛白豆蔻人參澤瀉各三分益智砂仁厚朴甘草乾薑薑黃各四分黃耆陳皮各七分上為細末每服三錢水一盞煎至半盞食前溫服仲景四逆湯又名通脈四逆湯治傷寒陰證自利裡寒外熱脈沉身痛而厥甘草炙二兩乾薑炮三兩附子一枚破八片生用上㕮咀以水三升煮取一升二合分二次溫服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者加桔梗一兩利止脈不出者加人參一兩仲景四逆加人參湯治傷寒惡寒脈微而復利即於前方內加人參一兩仲景四逆加豬膽汁湯治傷寒吐下後汗出而厥四肢拘急脈微欲絶者即於四逆湯內加入豬膽汁半合仲景茯苓四逆湯治傷寒汗下後病仍不解煩躁者茯苓六兩人參一兩甘草炙二兩乾薑一兩半附子一枚生用去皮切八片上五味以水五升煮取三升去渣溫服七合日三服茱萸四逆湯治厥陰中寒小腹痛甚吳茱萸湯泡附子炮乾薑各二錢炙甘草錢半水一鍾半煎七分熱服韓氏茵陳四逆湯治發黃脈沉細遲肢體逆冷腰以上自汗茵陳二兩炙甘草一兩乾薑炮兩半附子一個炮作八片上分四帖水煎服仲景當歸四逆湯治傷寒手足厥寒脈細欲絶者或下利脈大腸鳴者虛也及其人內有久虛者宜當歸四逆加吳茱萸生薑湯主之當歸桂枝芍藥細辛各三兩甘草通草各二兩大棗二十五枚擘上七味以水八升煮取三升去滓溫服一升日三服四逆散方在散陳治陽邪亢熱血脈不通四肢厥逆仲景附子湯治少陰病得之一二日口中和其背惡寒者當灸之附子湯主之並治少陰病身體痛手足寒骨節痛脈沉者附子二枚去皮破八片人參二兩白朮四兩芍藥茯苓各三兩上五味以水八升煮取三升去渣溫服一升日三服三因附子湯治風寒濕痹骨節疼痛皮膚不仁肌肉重著四肢緩縱附子生白芍藥桂心甘草白茯苓人參乾薑各三兩白朮一兩上㕮咀每服四錢水煎服生附湯治寒濕腰痛附子生用白朮茯苓牛膝厚朴乾薑炙甘草各一錢蒼朮杜仲姜炒各二錢水二鍾生薑三片紅棗二枚煎八分食前服參附湯方在補陳治元陽不足喘急厄逆嘔惡厥冷等證仲景朮附湯方在補陳治中寒中氣不足逆冷痰盛口噤等證耆附湯方在補陳治氣虛陽弱虛汗倦怠濟生朮附湯方在補陳治寒濕腰冷重痛小便自利金匱桂枝附子湯治傷寒八九日風濕相搏身體疼煩不能轉側不嘔不渴脈浮虛而澀者桂枝四兩去皮生薑三兩切附子三枚炮去皮各破八片甘草三兩炙大棗十二枚擘上五味以水六升煮取二升去渣分溫三服金匱白朮附子湯治傷寒八九日風濕相搏身體疼煩不能轉側不嘔不渴脈虛浮而澀若大便堅小便自利者去桂枝此方主之白朮二兩附子一枚炮去皮甘草炙一兩生薑一兩半切大棗六枚上五味以水三升煮取一升去滓分溫三服一服覺身痹半日許再服三日服都盡其人如冒狀勿怪即是朮附並走皮中逐水氣未得除故耳金匱甘草附子湯治風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利大便反快惡風不欲去衣或身微腫者此主之甘草炙白朮各二兩附子二枚炮去皮桂枝四兩去皮上四味以水六升煮取三升去渣溫服一升日三服初服得微汗則解能食汗後復煩者服五合恐一升多者服六七合為妙良方姜附湯治霍亂轉筋手足厥冷或吐逆身冷脈微急用此藥救之此即仲景乾薑附子湯乾薑一兩附子一個生用上每服半兩水煎外科姜附湯有人參白朮生薑附子湯治嶺南瘴厲內虛發熱或寒熱往來嘔痰吐逆頭疼身痛或汗多煩躁引飲或自利小便赤兼主卒中風附子一枚如法制分四服上每服水一鍾生薑十片煎六分微溫服乾薑附子湯治瘴毒陰證發熱或煩躁手足冷鼻尖冷身體重痛舌上胎生引飲煩渴或自利嘔吐汗出惡風大附子一枚制分四服上每服加炮乾薑二錢同煎溫服熱甚者冷服寶鑑羌活附子湯治厄逆羌活附子乾薑炮茴香各一錢木香五分水鍾半棗二枚煎服三因方木香作丁香仲景芍藥甘草附子湯治發汗病不解反惡寒者虛故也芍藥甘草炙各三兩附子一枚炮去皮切八片上三味以水五升煮取一升五合去渣分溫服活人附子八味湯治氣虛中寒腳氣等症附子炮去皮臍人參乾薑炮芍藥茯苓甘草炙桂心各二兩白朮四兩上每服五七錢水一鍾半煎七分食前溫服又方去桂心加干熟地黃三兩六物附子湯方在外科治四氣流注太陰四肢骨節煩疼浮腫小水不利小建中湯方在補陳治虛勞裡急腹痛失精四肢痠疼咽乾口燥等證局方大建中湯方在補陳治陽虛氣血不足腰腳筋骨疼痛八味大建中湯方在補陳治中氣不足厥逆嘔吐攣急陰縮腹痛虛火等證三建湯治元陽素虛寒邪外攻手足厥冷六脈沉微大小便數滑凡中風潮涎不省人事傷寒陰證皆可用之大附子大川烏天雄各制用三錢上用水二鍾姜十片煎一鍾不拘時或溫服或冷服自汗加桂浮小麥氣逆加沉香胃冷加丁香胡椒仲景炙甘草湯一名復脈湯治傷寒脈結代心動悸炙甘草四兩生薑桂枝去皮各三兩人參阿膠各二兩生地黃一斤麥冬去心半斤麻子仁半斤大棗十二枚擘上九味以清酒七升水八升先煮八味取三升去渣內膠煬盡溫服一升日三服仲景桂枝甘草湯治發汗過多其人叉手自冒心心下悸欲得按者桂枝四兩去皮甘草二兩上二味以水三升煮取一升去渣頓服陶氏回陽返本湯治陰盛格陽陰極發躁渴而面赤欲坐泥水中脈則無力或脈全微欲絶者服後脈微出者生頓出者死人參製附子炮姜炙甘草五味子麥冬陳皮臘茶面戴陽者下虛也加蔥七莖黃連少許用澄清泥漿水一鍾煎之臨服入蜜五匙頓冷服之取汗為效華他救脫陽方治寒中三陰口噤失音四肢強直攣急疼痛似乎中風及厥逆唇青囊縮無脈或卒倒尸厥脫陽等證先急用蔥白一握微搗碎炒熱用布包尉臍下以二包更替尉之甚者仍灸氣海關元二三十壯脈漸出手足漸溫乃可生也次用附子一個重一兩者切八片白朮乾薑各五錢木香二錢同用水二鍾煎一鍾候冷灌服須臾又進一服或煎服回陽等湯仲景旋覆代赭石湯治傷寒若汗或吐下解後心下痞硬噫氣不除者旋覆花甘草炙各三兩人參二兩生薑五兩切代赭石一兩大棗十二枚擘半夏半升洗上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服仲景厚朴生薑甘草半夏人參湯治發汗後腹脹滿厚朴去皮尖生薑切各半斤半夏半升洗人參一兩甘草二兩炙上五味以水一斗煮取三升去滓溫服一升日三服簡易十味銼散治中風血弱臂痛連及筋骨舉動艱難附子三兩炮當歸黃耆炙白芍藥各二兩川芎防風白朮各兩半肉桂一兩熟地茯苓各七錢半上㕮咀每服五七錢水鍾半姜八片棗三枚煎八分食後臨臥服奇效芎術湯治寒濕頭痛眩運痛極川芎附子生去皮臍白朮各三錢桂心去皮甘草各一錢水一鍾半生薑七片棗二枚煎八分食遠服正元散治眩暈陽虛紅豆炒乾薑炮各三錢人參白朮炙甘草茯苓各二兩附子炮去皮臍川芎山藥薑汁炒烏藥乾葛各一兩川烏炮去皮臍肉桂各五錢黃耆炙兩半陳皮二錢上㕮咀每服三錢水一鍾姜三片棗一枚入鹽少許煎服金匱生薑半夏湯治胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者半夏半升生薑汁一升上二味以水三升煎半夏取二升納生薑汁煮取一升半小冷分四服日三夜一服病止停後服金匱半夏乾薑散治乾嘔或吐逆痰延半夏制乾薑炙等分上二味杵為散取方寸匕用漿水一升半煎取七合去柤頓服之仲景甘草乾薑湯治少陰傷寒小便色白吐逆而渴動氣因下反劇身雖有熱反倦及肺痿吐涎沫而不咳口不渴小便數遺尿肺中冷土虛不能制下眩暈多涎唾等證楊仁齊曰治男女諸虛出血胃寒不能引氣歸元無以收約其血者良方名姜草湯治陰盛於陽寒而嘔血甘草炙四兩乾薑炮二兩上咀以水三升煮取一升五合分溫再服仁齊曰等分每服三錢食前煎服橘皮乾薑湯治噁心嘔噦人參乾薑肉桂各一錢陳皮通草各錢半甘草五分水一鍾半煎八分服金匱橘皮湯亦名生薑橘皮湯治乾嘔噦若手足厥者橘皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽即愈萬氏橘皮湯方在痘疹行滯消痰止嘔吐金匱橘皮竹茹湯治噦逆橘皮二斤竹茹二升生薑半斤甘草五兩人參一兩大棗三十枚上六味以水一斗煮取三升溫服一升日三服小半夏湯方在和陳治嘔吐及心下有飲者三因丁香散治厄逆丁香柿蒂各一錢炙甘草良薑各五分上為末熱湯點服二錢不拘時丁香煮散治翻胃嘔逆丁香石蓮肉各十四枚北棗七枚切碎生薑七片黃秫米半合洗水一碗半同煮稀粥去藥啜粥簡易丁香散治反胃嘔逆粥食不下大附子一枚坐於磚石上四面著火漸漸逼熱淬入生薑汁中浸少時如法再