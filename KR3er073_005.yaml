body:
  text: 卷之五道集脈神章中通一子脈義脈神一脈者血氣之神邪正之鑑也有諸中必形諸外故血氣盛者脈必盛血氣衰者脈必衰無病者脈必正有病者脈必乖矧人之疾病無過表裡寒熱虛實只此六字業已盡之然六者之中又惟虛實二字為最要蓋凡以表證里證寒證熱證無不皆有虛實既能知表裡寒熱而復能以虛實二字決之則千病萬病可以一貫矣且治病之法無逾攻補用攻用補無逾虛實欲察虛實無逾脈息雖脈有二十四名主病各異然一脈能兼諸病一病亦能兼諸脈其中隱微大有玄祕正以諸脈中亦皆有虛實之變耳言脈至此有神存矣倘不知要而泛焉求迹則毫釐千里必多迷誤故豫特表此義有如洪濤巨浪中則在乎牢執柁杆而病值危難處則在乎專辨虛實虛實得真則標本陰陽萬無一失其或脈有疑似又必兼證兼理以察其孰客孰主孰緩孰急能知本末先後是即神之至也矣部位解二左寸心部也其候在心與心包絡得南方君火之氣脾土受生肺金受制其主神明清濁右寸肺部也其候在肺與膻中得西方燥金之氣腎水受生肝木受制其主情志善惡右二部所謂上以候上也故凡頭面咽喉口齒頸項肩背之疾皆候於此左關肝部也其候在肝膽得東方風木之氣心火受生脾土受制其主官祿貴賤右關脾部也其候在脾胃得中央濕土之氣肺金受生腎水受制其主財帛厚薄右二部居中所以候中焦也故凡於脅肋腹背之疾皆候於此左尺腎部也其候在腎與膀胱大腸得北方寒水之氣肝木受生心火受制其主陰氣之壽元右尺三焦部也其候在腎與三焦命門小腸得北方天一相火之氣脾土受生肺金受制其主陽氣之壽元右二部所謂下以候下也故凡於腰腹陰道及腳膝之病皆候於此按本經曰上竟上者胸喉中事下竟下者少腹腰股膝脛中事所以脈之形見上者候上下者候下此自然之理也自王叔和云心與小腸合於左寸肺與大腸合於右寸以至後人遂有左心小腸右肺大腸之説其謬甚矣夫小腸大腸皆下部之腑自當應於兩尺然脈之兩尺左為水位乃真陰之舍也右為火位乃元陽之本也小腸屬火而火居火位故當配於下之右大腸屬金而金水相從故當配於下之左此亦其當然也但二腸連胃氣本一貫故在內經亦不言其定處而但曰大腸小腸皆屬於胃是又於胃氣中總可察二腸之氣也然凡在下焦臟腑無不各具陰陽若欲察下部之陽者當總在右尺察下部之陰者當總在左尺則盡其要矣或問曰何以右尺為陽而屬火曰尺為蛇武之鄉而地之剛居西北所以手足之右強於左是即左陰右陽之義也此篇尚有詳論具載類經求正録中所當參閲正脈十六部三浮沉遲數洪微滑澀弦芤緊緩結伏虛實浮脈舉之有餘按之不足浮脈為陽凡洪大芤革之屬皆其類也為中氣虛為陰不足為風為暑為脹滿為不食為表熱為喘急浮大為傷風浮緊為傷寒浮滑為宿食浮緩為濕滯浮芤為失血浮數為風熱浮洪為狂躁雖曰浮為在表然真正風寒外感者脈反不浮但其緊數而略兼浮者便是表邪其證必發熱無汗或身有痠疼是其候也若浮而兼緩則非表邪矣大都浮而有力有神者為陽有餘陽有餘則火必隨之或痰見於中或氣壅於上可類推也若浮而無力空豁者為陰不足陰不足則水虧之候或血不營心或精不化氣中虛可知也若以此等為表證則害莫大矣其有浮大弦硬之極甚至四倍以上者內經謂之關格此非有神之謂乃真陰虛極而陽亢無根大凶之兆也凡脈見何部當隨其部而察其證諸脈皆然沉脈輕手不見重取乃得沉脈為陰凡細小隱伏反關之屬皆其類也為陽郁之候為寒為水為氣為郁為停飲為癥瘕為脹實為厥逆為洞泄沉細為少氣為寒欲為胃中冷為腰腳痛為痃癖沉遲為痼冷為精寒沉滑為宿食為伏痰沉伏為霍亂為胸腹痛沉數為內熱沉弦沉緊為心腹小腸疼痛沉雖屬裡然必察其有力無力以辨虛實沉而實者多滯多氣故曰下手脈沉便知是氣氣停積滯者宜消宜攻沉而虛者因陽不達因氣不舒陽虛氣陷者宜溫宜補其有寒邪外感陽為陰蔽脈見沉緊而數及有頭疼身熱等證者正屬邪表不得以沉為里也遲脈不及四至者皆是也遲為陰脈凡代緩結澀之屬皆其相類乃陰盛陽虧之候為寒馬虛浮而遲者內氣虛沉而遲者表氣虛遲在上則氣不化精遲在下則精不化氣氣寒則不行血寒則凝滯若遲兼滑大者多風痰頑痹之候遲兼細小者必真陽虧弱而然或陰寒留蓄於中則為泄為痛或元氣不榮於表則寒栗拘攣大都脈來遲慢者總由元氣不充不可妄施攻擊數脈五至六至以上凡急疾緊促之屬皆其類也為寒熱為虛勞為外邪為癰瘍滑數洪數者多熱澀數細數者多寒暴數者多外邪久數者必虛損數脈有陰有陽今後世相傳皆以數為熱脈及詳考內經則但曰諸急者多寒緩者多熱滑者陽氣盛微有熱曰粗大者陰不足陽有餘為熱中也曰緩而滑者曰熱中舍此之外則並無以數言熱者而遲冷數熱之説乃始自難經云數則為熱遲則為寒今舉世所宗皆此説也不知數熱之説大有謬誤何以見之蓋自余歷驗以來凡見內熱伏火等證脈反不數而惟洪滑有力如經文所言者是也至如數脈之辨大約有七此義失真以至相傳遺害者弗勝紀矣茲列其要者如左諸所未盡可以類推一外邪有數脈凡寒邪外感脈必暴見緊數然初感便數者原未傳經熱自何來所以只宜溫散即或傳經日久但其數而滑實方可言熱若數而無力者到底仍是陰證只宜溫中此外感之數不可盡以為熱也若概用寒涼無不殺人一虛損有數脈凡患陽虛而數者脈必數而無力或兼細小而證見虛寒此則溫之且不暇尚堪作熱治乎又有陰虛之數者脈必數而弦滑雖有煩熱諸證亦宜慎用寒涼若但清火必至脾泄而敗且凡患虛損者脈無不數數脈之病惟損最多愈虛則愈數愈數則愈危豈數皆熱病乎若以虛數作熱數則萬無不敗者矣一瘧疾有數脈凡瘧作之時脈必緊數瘧止之時脈必和緩豈作即有火而止則無火乎且火在人身無則無矣有則無止時也能作能止者惟寒邪之進退耳真火真熱則不然也此瘧疾之數故不可盡以為熱一痢疾有數脈凡痢疾之作率由寒濕內傷脾腎俱損所以脈數但兼弦澀細弱者總皆虛數非熱數也悉宜溫補命門百不失一其有形證多火年力強壯者方可以熱數論治然必見洪滑實數之脈方是其證一癰瘍有數脈凡脈數身無熱而反惡寒飲食如常者或身有熱而得汗不解者即癰疽之候也然瘡瘍之發有陰有陽可攻可補亦不得盡以脈數者為熱證一痘疹有數脈以邪毒未達也達則不數矣此當以虛實大小分陰陽亦不得以數為熱脈一癥癖有數脈凡脅腹之下有塊如盤者以積滯不行脈必見數若積久成疳陽明壅滯而致口臭牙疳發熱等證者乃宜清胃清火如無火證而脈見細數者亦不得認以為熱一胎孕有數脈以衝任氣阻所以脈數本非火也此當以強弱分寒熱不可因其脈數而執以黃芩為聖藥按以上數脈諸證凡邪盛者多數脈虛甚者尤多數脈則其是熱非熱從可知矣洪脈大而實也舉按皆有餘洪脈為陽凡浮芤實大之屬皆其類也為血氣燔灼大熱之候浮洪為表熱沉洪為裡熱為脹滿為煩渴為狂躁為斑疹為頭疼面熱為咽乾喉痛為口瘡癰腫為大小便不通為動血此陽實陰虛氣實血虛之候若洪大至極甚至四倍以上者是即陰陽離絶關格之脈也不可治微脈纖細無神柔弱之極是為陰脈凡細小虛濡之屬皆其類也乃血氣俱虛之候為畏寒為恐懼為怯弱為少氣為中寒為脹滿為嘔噦為泄瀉為虛汗為食不化為腰腹疼痛為傷精失血為眩運厥逆此雖氣血俱虛而尤為元陽虧損最是陰寒之候滑脈往來流利如盤走珠凡洪大芤實之屬皆其類也乃氣實血壅之候為痰逆為食滯為嘔吐為滿悶滑大滑數為內熱上為心肺頭目咽喉之熱下為小腸膀胱二便之熱婦人脈滑數而經斷者為有孕若平人脈滑而和緩此自營衛充實之佳兆若過於滑大則為邪熱之病又凡病虛損者多有弦滑之脈此陰虛然也瀉痢者亦多弦滑之脈此脾腎受傷也不得通以火論澀脈往來艱澀動不流利如雨霑沙如刀刮竹言其象也澀為陰脈凡虛細微遲之屬皆其類也為血氣俱虛之候為少氣為憂煩為痹痛為拘攣為麻木為無汗為脾寒少食為胃寒多嘔為二便違和為四肢厥冷男子為傷精女子為失血為不孕為經脈不調凡脈見澀滯者多由七情不遂營衛耗傷血無以充氣無以暢其在上則有上焦之不舒在下則有下焦之不運在表則有筋骨之疲勞在裡則有精神之短少凡此總屬陽虛諸家言氣多血少豈以脈之不利猶有氣多者乎弦脈按之不移硬如弓弦凡滑大堅搏之屬皆其類也為陽中伏陰為血氣不和為氣逆為邪勝為肝強為脾弱為寒熱為痰飲為宿食為積聚為脹滿為虛勞為疼痛為拘急為瘧痢為疝痹為胸脅痛瘡疽論曰弦洪相搏外緊內熱欲發瘡疽也弦從木化氣通乎肝可以陰亦可以陽但其弦大兼滑者便是陽邪弦緊兼細者便是陰邪凡臟腑間胃氣所及則五臟俱安肝邪所侵則五臟俱病何也蓋木之滋生在水培養在土若木氣過強則水因食耗土為克傷水耗則腎虧土傷則胃損腎為精血之本胃為水穀之本根本受傷生氣敗矣所以木不宜強也矧人無胃氣曰死故脈見和緩者吉指下弦強者凶蓋肝邪與胃氣不和緩與弦強相左弦甚者土必敗諸病見此總非佳兆芤脈浮大中空按如蔥管芤為陽脈凡浮豁弦洪之屬皆相類也為孤陽脫陰之候為失血脫血為氣無所歸為陽無所附為陰虛發熱為頭暈目眩為驚悸怔忡為喘急盜汗芤雖陽脈而陽實無根總屬大虛之候緊脈急疾有力堅搏抗指有轉索之狀凡弦數之屬皆相類也緊脈陰多陽少乃陰邪激搏之候主為痛為寒緊數在表為傷寒發熱為渾身筋骨疼痛為頭痛項強為咳嗽鼻塞為瘴為瘧沉緊在裡為心脅疼痛為胸腹脹滿為中寒逆冷為吐逆出食為風癇反張為痃癖為瀉痢為陰疝在婦人為氣逆經滯在小兒為驚風抽搐緩脈和緩不緊也緩脈有陰有陽其義有三凡從容和緩浮沉得中者此自平人之正脈若緩而滑大者多實熱如內經所言者是也緩而遲細者多虛寒即諸家所言者是也然實熱者必緩大有力多為煩熱為口臭為腹滿為癰瘍為二便不利或傷寒溫瘧初愈而餘熱未清者多有此脈若虛寒者必緩而遲細為陽虛為畏寒為氣怯為疼痛為眩暈為痹弱為痿厥為怔忡健忘為食飲不化為驚溏飧泄為精寒腎冷為小便頻數女人為經遲血少為失血下血凡諸瘡毒外證及中風産後但得脈緩者皆易愈結脈脈來忽止止而復起總謂之結舊以數來一止為促促者為熱為陽極緩來一止為結結者為寒為陰極通謂其為氣為血為食為痰為積聚為癥瘕為七情鬱結浮結為寒邪在經沉結為積聚在內此固結促之舊説矣然以豫之驗則促類數也未必熱結類緩也未必寒但見中止者總是結脈多由血氣漸衰精力不繼所以斷而復續續而復斷常見久病者多有之虛勞者多有之或誤用攻擊消伐者亦有之但緩而結者為陽虛數而結者為陰虛緩者猶可數者更劇此可以結之微甚察元氣之消長最顯最切者也至如留滯鬱結等病本亦此脈之證應然必其形強氣實而舉接有力此多因鬱滯者也又有無病而一生脈結者此其素稟之異常無足怪也舍此之外凡病有不退而漸見脈結者此必氣血衰殘首尾不繼之候速宜培本不得妄認為留滯伏脈如有如無附骨乃見此陰陽潛伏阻隔閉塞之候或火閉而伏或寒閉而伏或氣閉而伏為痛極為霍亂為疝瘕為閉結為氣逆為食滯為忿怒為厥逆水氣凡伏脈之見雖與沉微細脫者相類而實有不同也蓋脈之伏者以其本有如無而一時隱蔽不見耳此有胸腹痛劇而伏者有氣逆於經脈道不通而伏者有偶因氣脫不相接續而伏者然此必暴病暴逆者乃有之調其氣而脈自復矣若此數種之外其有積困延綿脈本細微而漸至隱伏者此自殘燼將絶之兆安得尚有所伏常見庸人診此無論久暫虛實動稱伏脈而破氣導痰等劑猶然任意此恐其就道稽遲而復行催牒耳聞見略具諒不至此虛脈正氣虛也無力也無神也有陰有陽浮而無力為血虛沉而無力為氣虛數而無力為陰虛遲而無力為陽虛雖曰微濡遲澀之屬皆為虛類然而無論諸脈但見指下無神者總是虛脈內經曰按之不鼓諸陽皆然即此謂也故凡洪大無神者即陰虛也細小無神者即陽虛也陰虛則金水虧殘龍雷易熾而五液神魂之病生焉或盜汗遺精或上下失血或驚忡不寧或咳喘勞熱陽虛則火土受傷真氣日損而君相化源之病生焉或頭目昏眩或膈塞脹滿或嘔惡亡陽或瀉痢疼痛救陰者壯水之主救陽者益火之源漸長則生漸消則死虛而不補元氣將何以復此實死生之關也醫不識此尚何望其他焉實脈邪氣實也舉按皆強鼓動有力實脈有陰有陽凡弦洪緊滑之屬皆相類也為三焦壅滯之候表邪實者浮大有力以風寒暑濕外感於經為傷寒瘴瘧為發熱頭痛鼻塞頭腫為筋骨肢體痠疼癰毒等證里邪實者沉實有力因飲食七情內傷於臟為脹滿為閉結為癥瘕為瘀血為痰飲為腹痛為喘嘔咳逆等證火邪實者洪滑有力為諸實熱等證寒邪實者沉弦有力為諸痛滯等證凡其在氣在血脈有兼見者當以類求然實脈有真假真實者易知假實者易誤故必問其所因而兼察形證必得其神方是高手常變四持脈之道須明常變凡衆人之脈有素大素小素陰素陽者此其賦自先天各成一局也邪變之脈有倏緩倏疾乍進乍退者此其病之驟至脈隨氣見也故凡診脈者必須先識臟脈而後可以察病脈先識常脈而後可以察變脈於常脈中可察人之器局壽夭於變脈中可察人之疾病吉凶診家大要當先識此四診五凡診病之法固莫妙於脈然有病脈相符者有脈病相左者此中大有玄理故凡值疑似難明處必須用四診之法詳問其病由兼辨其聲色但於本末先後中正之以理斯得其真若不察此而但謂一診可憑信手亂治亦豈知脈證最多真假見有不確安能無誤且常診者知之猶易初診者決之甚難此四診之所以不可忽也故難經以切居四診之末其意深矣陶節庵亦曰問病以知其外察脈以知其內全在活法二字乃臨證切脈之要訣也此義惟汪石山言之最詳並附於後卷獨論六脈義之見於諸家者六經有序也臟象有位也三部九候有則也昭然若此非不既詳且備矣及臨證用之則猶如望洋莫測其孰為要津孰為彼岸豫於初年亦嘗為此所迷者蓋屢屢矣今而熟察其故乃知臨岐忘羊患在不得其獨耳茲姑以部位言之則無不曰心肝腎居左之三部肺脾命居右之三部而按部以索臟按臟以索病咸謂病無遁情矣故索部位者審之寸則似乎病在心肺也審之關則似乎病在肝脾也審之尺又似乎病在兩腎也既無無脈之部又無無病之脈而病果安在哉孰是孰非此難言也再察其病情則有如頭痛者一證耳病本在上兩寸其應也若以經臟言之則少陽陽明之痛不應在兩關乎太陽之痛不應在左尺乎上下無分此難言也又如淋遺一證耳病本在下尺中所主也若氣有不攝病在右寸矣神有不固病在左寸矣源流無辨此難言也諸如此類百病皆燃使必欲以部位言則上下相關有不可泥也使必欲以經臟言則承製相移有不可執也言難盡意繪難盡神無弗然矣是可見諸家之所臚列者亦不過描摸影響言此失彼而十不得一第覺其愈多愈繁愈繁愈失而迷津愈甚矣故善為脈者貴在察神不在察形察形者形千形萬不得其要察神者惟一惟精獨見其真也獨之為義有部位之獨也有臟氣之獨也有脈體之獨也部位之獨者謂諸部無恙惟此稍乖乖處藏姦此其獨也臟氣之獨者不得以部位為拘也如諸見洪者皆是心脈諸見弦者皆是肝脈肺之浮脾之緩腎之石五臟之中各有五脈五脈互見獨乖者病乖而強者即本臟之有餘乖而弱者即本臟之不足此臟氣之獨也脈體之獨者如經所云獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病此脈體之獨也總此三者獨義見矣夫既謂之獨何以有三而不知三者之獨亦總歸於獨小獨大獨疾獨遲之類但得其一而即見病之本矣故經曰得一之精以知死生又曰知其要者一言而終不知其要則流散無窮正此之謂也雖然然獨不易言也亦不難言也獨之為德為群疑之主也為萬象之源也其體至圓其用至活也欲得之者猶縱目於泰山之頂則顯者顯隱者隱固若易中有難也猶認針於滄海之中則左之左右之右還覺難中有易也然不有無岐之目無二之心誠不足以因彼之獨而成我之獨也故曰獨不難知也而惟恐知獨者之難其人也獨自有真也而又恐偽辨者假借以文其僻也真獨者兼善成於獨善偽獨者毒己由於獨人獨之與毒音雖若同而利害則天淵矣故並及之以識防於此上下來去至止又六上下來去至止此六字者深得診家之要乃滑伯仁所創言者第滑氏之説未盡其蘊此中猶有精義余並續而悉之蓋此六字之中具有三候之法如初診之先即當詳審上下上下之義有升降焉有陰陽焉有臟象焉有補瀉焉上下昭然則證治條分而經濟自見此初候之不可不明也及診治之後即當詳察來去來去之義或指下之和氣未來形證之乖氣未去此進退可別矣或何者為邪氣漸去何者為生氣漸來此消長有徵矣來去若明則吉凶可辨而權衡在我此中候之不可不察也再統初中之全局猶當詳見至止至止之義即凡一舉一動當料其勢所必至一聞一見當思其何所底止知始知終庶乎近神矣此未候之不可不察也凡此六字之義其真診家之綱領乎故余續之如此並附滑氏原論於後滑氏曰察脈須識上下來去至止六字不明此六字則陰陽虛實不別也上者為陽來者為陽至者為陽下者為陰去者為陰止者為陰也上者自尺部上於寸口陽生於陰也下者自寸口下於尺部陰生於陽也來者自骨肉之分而出於皮膚之際氣之升也去者自皮膚之際而還於骨肉之分氣之降也應曰至息曰止也胃氣解七凡診脈須知胃氣如經曰人以水穀為本故人絶水穀則死脈無胃氣亦死又曰脈弱以滑是有胃氣又曰邪氣來也緊而疾穀氣來也徐而和又曰五味入口藏於胃以養五臟氣是以五臟六腑之氣味皆出於胃而變見於氣口是可見穀氣即胃氣胃氣即元氣也夫元氣之來力和而緩邪氣之至力強而峻高陽生曰阿阿軟若春楊柳此是脾家脈四季即胃氣之謂也故凡診脈者無論浮沉遲數雖值諸病疊見而但於邪脈中得兼軟滑徐和之象者便是五臟中俱有胃氣病必無害也何也蓋胃氣者正氣也病氣者邪氣也夫邪正不兩立一勝則一負凡邪氣勝則正氣敗正氣至則邪氣退矣若欲察病之進退吉凶者但當以胃氣為主察之之法如今日尚和緩明日更弦急知邪氣之愈進邪愈進則病愈甚矣今日甚弦急明日稍和緩知胃氣之漸至胃氣至則病漸輕矣即如頃刻之間初急後緩者胃氣之來也初緩後急者胃氣之去也此察邪正進退之法也至於死生之兆亦惟以胃氣為主夫胃氣中和旺於四季故春脈微弦而和緩夏脈微鉤而和緩秋脈微毛而和緩冬脈微石而和緩此胃氣之常即平人之脈也若脈無胃氣即名真臟脈見真臟何以當死蓋人有元氣出自先天即天氣也為精神之父人有胃氣出乎後天即地氣也為血氣之母其在後天必本先天為主持在先天必賴後天為滋養無所本者死無所養者亦死何從驗之如但弦但鉤但毛但石之類皆真臟也此以孤臟之氣獨見而胃氣不能相及故當死也且脾胃屬土脈本和緩士惟畏木脈則弦強凡脈見弦急者此為土敗木賊大非佳兆若弦急之微者尚可救療弦急之甚者胃氣其窮矣真辨八據脈法所言凡浮為在表沉為在裡數為多熱遲為多寒弦強為實微細為虛是固然矣然疑似中尤有真辨此其關係非小不可不察也如浮雖屬表而凡陰虛血少中氣虧損者必浮而無力是浮不可以概言表沉雖屬裡而凡表邪初感之深者寒束皮毛脈不能達其必沉緊是沉不可以概言里數為熱而真熱者未必數凡虛損之證陰陽俱困氣血張皇虛甚者數必甚是數不可以概言熱遲雖為寒凡傷寒初退餘熱未清脈多遲滑是遲不可以概言寒弦強類實而真陰胃氣大虧及陰陽關格等證脈必豁大而弦健是強不可以概言實微細類虛而凡痛極氣閉營衛壅滯不通者脈必伏匿是伏不可以概言虛由此推之則不止是也凡諸脈中皆有疑似皆有真辨診能及此其必得鳶魚之學者乎不易言也不易言也從舍辨九共三條凡治病之法有當舍證從脈者有當舍脈從證者何也蓋證有真假脈亦有真假凡見脈證有不相合者則必有一真一假隱乎其中矣故有以陽證見陰脈者有以陰證見陽脈者有以虛證見實脈者有以實證見虛脈者此陰彼陽此虛彼實將何從乎病而遇此最難下手最易差錯不有真見必致殺人矧今人只知見在不識隱微凡遇證之實而脈之虛者必直攻其證而忘其脈之真虛也或遇脈之弦大而證之虛者亦必直攻其脈而忘其證之無實也此其故正以似虛似實疑本難明當舍當從孰知其要醫有迷途莫此為甚余嘗熟察之矣大都證實脈虛者必其證為假實也脈實證虛者必其脈為假實也何以見之如外雖煩熱而脈見微弱者必火虛也腹雖脹滿而脈見微弱者必胃虛也虛火虛脹其堪攻乎此宜從脈之虛不從證之實也其有本無煩熱而脈見洪數者非火邪也本無脹滯而脈見弦強者非內實也無熱無脹其堪瀉乎此宜從證之虛不從脈之實也凡此之類但言假實不言假虛果何意也蓋實有假實虛無假虛假實者病多變幻此其所以有假也假虛者虧損既露此其所以無假也大凡脈證不合者中必有姦必先察其虛以求根本庶乎無誤此誠不易之要法也一真實假虛之候非曰必無如寒邪內傷或食停氣滯而心腹急痛以致脈道沉伏或促或結一證此以邪閉經絡而然脈雖若虛而必有痛脹等證可據者是誠假虛之脈本非虛也又若四肢厥逆或惡風怯寒而脈見滑數一證此由熱極生寒外雖若虛而內有煩熱便結等證可據者是誠假虛之病本非虛也大抵假虛之證只此二條若有是實脈而無是實證即假實脈也有是實證而無是實脈即假實證也知假知真即知所從舍矣近見有治傷寒者每以陰脈作伏脈不知伏脈之體雖細雖微亦必隱隱有力亦必明明有證豈容任意胡猜以草菅人命哉仁者必不然也一又有從脈從證之法乃以病有輕重為言也如病本輕淺別無危候者但因見在以治其標自無不可此從證也若病關臟氣稍見疑難則必須詳辨虛實憑脈下藥方為切當所以輕者從證十惟一二重者從脈十當八九此脈之關係非淺也雖曰脈有真假而實由人見之不真耳脈亦何從假哉逆順十共五條凡內出不足之證忌見陽脈如浮洪緊數之類是也外人有餘之病忌見陰脈如沉細微弱之類是也如此之脈最不易治一凡有餘之病脈宜有力有神如微澀細弱而不應手者逆之兆也凡不足之病脈宜和緩柔軟若洪大搏擊者亦為逆也一凡暴病脈來浮洪數實者為順久病脈來微緩軟弱者為順若新病而沉微細弱久病而浮洪數實者皆為逆也凡脈證貴乎相合設若證有餘而脈不足脈有餘而證不足輕者亦必延綿重者即危亡之兆一經曰脈小以澀謂之久病脈浮而滑謂之新病故有餘之病忌見陰脈不足之病忌見陽脈久病忌見數脈新暴之病而見形脫脈脫者死一凡元氣虛敗之證脈有微極欲絶者若用回陽救本等藥脈氣徐徐漸出漸復者乃為佳兆若陡然暴出忽如復元者此假復也必於周日之後復脫如故是必不治之證若全無漸復生意者自不必治若各部皆脫而惟胃脈獨存者猶可冀其萬一脈要歌十一從權輿改正脈有三部部有三候逐部先尋次宜總究左寸心經火位脈宜流利洪強左關肝膽弦而且長尺部膀胱沉靜彌良右寸肺金之主輕浮充暢為宗脾胃居於關部和緩胃氣常充右尺三焦連命沉滑而實則隆四時相代脈狀靡同秋微毛而冬石春則弦而夏洪滑而微浮者肺恙弦中兼細者脾殃心病則血衰脈小肝證則脈弦且長大而兼緊腎疾奚康寸口多弦頭面何曾舒泰關前若緊胸中定是症殃急則風上攻而頭痛緩則皮頑痹而不昌微是厥逆之陰數為虧損之陽滑則痰涎而胸膈氣壅澀緣血少而背膊疼傷沉是背心之氣洪乃胸脅之妨若夫關中緩則飲食必少滑實胃火煎熬小弱胃寒逆冷細微食少膨脹衛之虛者澀候氣之滯者沉當左關微澀兮血少右關弦急兮過勞洪實者血結之瘀遲緊者脾冷之殃至如尺內洪大則陰虛可憑或微或澀便濁遺精弦者腹痛伏者食停滑兮小腹急脹婦則病在月經澀兮嘔逆翻胃弦強陰疝血崩緊兮小腹作痛沉微必主腰疼緊促形於寸此氣滿於心胸緊弦見於關斯痛攻乎腹脅兩寸滑數兮嘔逆上奔兩關滑數兮蛔蟲內齧心胸留飲寸口沉潛臍腹成癥關中促結左關弦緊兮緣筋脈之拘攣右關沉滑兮因食積之作孽脈有浮沉遲數診有提綱大端浮而無力為虛有力為邪所搏浮大傷風兮浮緊傷寒浮數虛熱兮浮緩風涎沉緩滑大兮多熱沉遲緊細兮多寒沉健須知積滯沉弦氣病淹淹沉遲有力疼痛使然遲弦數弦兮瘧寒瘧熱之辨遲滑洪滑兮胃冷胃溫之愆數而有痛恐發瘡瘍若兼洪滑熱甚宜涼陰數陰虛必發熱陽數陽強多汗黃脈有七情之傷而為九氣之列怒傷於肝者其脈促而氣上衝驚傷於膽者其氣亂而脈動掣過於喜者傷於心故脈散而氣緩過於思者傷於脾故脈短而氣結憂傷於肺兮脈必澀而氣沉恐傷於腎兮脈當沉而氣怯若脈促而人氣消因悲傷而心系挈傷於寒者脈遲其為人也氣收傷於熱者脈數其為人也氣泄脈體須明脈證須徹浮為虛而表顯沉乃實而里決滑是多痰芤因失血濡散總因虛而冷汗弦緊其為寒而痛切洪則躁煩遲為冷別緩則風而頑木實則脹而祕結澀兮血少而寒長兮癇而又熱短小元陽必病堅強患乎滿急伏因痛痹伏藏細弱真元內傷結促惟虛斷續代云變易不常緊急或緣瀉痢緊弦癥痞相妨數則心煩大則病進上盛則氣高下盛則氣脹大是血虛之候細為氣少之恙浮洪則外證推測沉弦為內疾斟量陽芤兮吐衄立至陰芤兮下血須防盛滑則外疼可別實緊則內痛多傷弱小澀弦為久病滑浮數疾是新殃沉而弦緊痃癖內痛脈來緩滑胃熱宜涼長而滑大者酒病浮而緩豁者濕傷堅而疾者為癲遲而伏者必厥洪大而疾則發狂緊滑而細為嘔噦脈洪而疾兮因熱結以成癰脈微而澀兮必崩中而脫血陰陽皆澀數知溲屎之艱難尺寸俱虛微曉精血之耗竭脈見危機者死只因指下無神不問何候有力為神按之則隱可見無根蓋元氣之來力和而緩邪氣之至力強而峻彈石硬來即去解索散亂無緒屋漏半日而落雀啄三五而住魚翔似有如無蝦遊進退難遇更有鬼賊雖如平類土敗於木真弦可畏是亦危機因無胃氣諸逢此者見幾當避宜忌歌十二傷寒病熱兮洪大易治而沉細難醫傷風咳嗽兮浮濡可攻而沉牢當避腫脹宜浮大顛狂忌虛細下血下痢兮浮洪可惡消渴消中兮實大者利霍亂喜浮大而畏微遲頭疼愛浮滑而嫌短澀腸澼臟毒兮不怕沉微風痹足痿兮偏嫌數急身體中風緩滑則生腹心作痛沉細則良喘急浮洪者危咳血沉弱者康脈細軟而不弦洪知不死於中惡脈微小而不數急料無憂於金瘡吐血鼻衄兮吾不喜其實大跌撲損傷兮吾則畏其堅強痢疾身熱而脈洪其災可惡濕病體煩而脈細此患難當水瀉脈大者可怪亡血脈實者不祥病在中兮脈虛為害病在外兮脈澀為殃腹中積久而脈虛者死身表熱甚而脈靜者亡死脈歌十三出權輿雀啄連來三五啄屋漏半日一點落魚翔似有又如無蝦遊靜中忽一躍彈石硬來尋即散搭指散亂為解索寄語醫家仔細看六脈一見休下藥
