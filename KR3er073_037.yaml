body:
  text: 卷之三十七天集雜證謨死生經義壽夭一上古天真論黃帝問於天師曰余聞上古之人春秋皆度百歲而動作不衰今時之人年半百而動作皆衰者時熱異耶人將失之耶岐伯曰上古之人其知道者法於陰陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也陰陽應象大論曰是以聖人為無為之事樂恬憺之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也天年篇帝曰願聞人之始生何氣築為基何立而為楯何失而死何得而生岐伯曰以母為基以父為楯失神者死得神者生也帝曰人之壽夭各不同或卒死或病久願聞其道岐伯曰五臟堅固血脈和調肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度行六腑化谷津液布揚各如其常故能久長帝曰人之壽百歲而死何以致之岐伯曰使道隧以長基牆高以方通調營衛三部三里起骨高肉滿百歲乃得終帝曰其不能終壽而死者何如岐伯曰其五臟皆不堅使道不長空外以張喘息暴疾又卑基牆薄脈少血其肉不石數中風寒血氣虛脈不通真邪相攻亂而相引故中壽而盡也五閱五使篇曰脈出於氣口色見於明堂詳面病門五色篇曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲詳面病門壽夭剛柔篇曰形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭血氣經絡勝形則壽不勝形則夭形充而皮膚緩者則壽形充而皮膚急者則夭形充而而脈堅大者順也形充而脈小以弱者氣衰氣衰則危矣形充而顴不起者骨小骨小則夭矣形充而大肉䐃堅而有分者肉堅肉堅則壽矣形充而大肉無分理不堅者肉脆肉脆則夭矣牆基卑高不及其地者不滿三十而死其有因加疾者不滿二十而死平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣五常政大論曰陰精所奉其人壽陽精所降其人夭帝曰一州之氣生化壽夭不同其故何也岐伯曰高下之理地勢使然也崇高則陰氣治之汙下則陽氣治之陽勝者先天陰勝者後天此地理之常生化之道也帝曰其有壽夭乎曰高者其氣壽下者其氣夭地之小大異也小者小異大者大異故治病者必明天道地理陰陽更勝氣之先後人之壽夭生化之期乃可以知人之形氣矣神氣死證二五常政大論曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絕移精變氣論帝曰余欲臨病人觀死生決嫌疑欲知其要如日月光可得聞乎岐伯曰色脈者上帝之所貴也先師之所傳也色以應日脈以應月常求其要則其要也治之要極無失色脈用之不惑治之大則得神者昌失神者亡帝曰善邪客篇曰心者五臟六腑之大主也精神之所舍也其臟堅固邪弗能容也容之則心傷心傷則神去神去則死矣營衛生會篇曰營衛者精氣也血者神氣也血之與氣異名同類焉故奪血者無汗奪汗者無血故人生有兩死而無兩生疏五過論曰故貴脫勢雖不中邪精神內傷身必敗亡湯液髎體論帝曰形弊血盡而功不立者何岐伯曰神不使也帝曰何謂神不使曰針石道也精神不進志意不治故病不可愈今精壞神去營衛不可復收何者嗜欲無窮而憂患不止精神弛壞營澀衛除故神去之而病不愈也病成名曰逆則針石不能治良藥不能及也逆調論曰人生與志不相有曰死陰陽死證三四氣調神論曰夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根故與萬物浮沉於生長之門逆其根則伐其本壞其真矣故陰陽四時者萬物之終始也死生之本也逆之則災害生從之則苛疾不起是謂得道道者聖人行之愚者佩之從陰陽則生逆之則死從之則治逆之則亂反順為逆是謂內格陰陽應象大論曰陽勝則身熱腠理閉喘粗為之俯仰汗不出齒乾以煩冤腹滿死能冬不能夏陰勝則身寒汗出身常清數慄而寒寒則厥厥則腹滿死能夏不能冬壽夭剛柔篇曰陰陽俱動乍有形乍無形加以煩心命曰陰勝其陽此謂不表不里其形不久陰陽別論曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治通天篇曰太陽之人多陽而少陰必謹調之無脫其陰而瀉其陽陽重脫者易狂陰陽皆脫者暴死不知人也陰陽二十五人篇曰火形之人似於赤帝好顏急心不壽暴死能春夏不能秋冬水形之人似於黑帝善欺紿人戮死能秋冬不能春夏至真要大論帝曰六氣之復何如岐伯曰厥陰之復甚則入脾衝陽絕死不治少陰之復甚則入肺咳而鼻淵天府絕死不治太陰之復甚則入腎竅瀉無度太谿絕死不治少陽之復甚則入肺咳而血泄尺澤絕死不治陽明之復甚則入肝驚駭筋攣太衝絕死不治太陽之復甚則入心善忘善悲神門絕死不治陽明司天清復內余咳不止而白血出者死乘年之虛則邪甚也失時之和亦邪甚也遇月之空亦邪甚也重感於邪則病危矣至而和則平至而甚則病至而反者病至而不至者病未至而至者病陰陽易者危反者死五運行大論曰從其氣則和違其氣則病不當其位者病迭移其位者病失守其位者危尺寸反者死陰陽交者死先立其年以知其氣左右應見然後乃可以言死生之逆順脈色死證四平人氣象論曰人一呼脈四動以上曰死脈絕不至曰死乍疏乍數曰死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死人以水穀為本故人絕水穀則死脈無胃氣亦死上二條詳四卷脈神章死心脈來前曲後居如操帶鉤曰心死死肺脈來如物之浮如風吹毛曰肺死死肝脈來急益勁如新張弓弦曰肝死死脾脈來銳堅如鳥之喙如鳥之距如屋之漏如水之流曰脾死死腎脈來發如奪索辟辟如彈石曰腎死三部九候論曰五臟已敗其色必夭夭必死矣形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死參伍不調者病三部九候皆相失者死上下左右相失不可數者死中部之候雖獨調與眾臟相失者死中部之候相減者死目內陷者死脫肉身不去者死中部乍疏乍數者死真臟脈見者勝死足太陽氣絕者其足不可屈伸死必戴眼九候之脈皆沉細懸絕者為陰主冬故以夜半死躁盛喘數者為陽主夏故以日中死其脈乍數乍疏乍遲乍疾者日乘四季死形肉已脫九候雖調猶死若有七診之病其脈候亦敗者死矣必發噦噫脈不往來者死皮膚著者死瞳子高者太陽不足戴眼者太陽已絕此決死生之要不可不察也方盛衰論曰形弱氣虛死形氣有餘脈氣不足死脈氣有餘形氣不足生玉機真藏論曰形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時為不可治所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絕沉澀者命曰逆四時大奇論曰胃脈沉鼓澀胃外鼓大心脈小堅急皆鬲偏枯男子發左女子發右不喑舌轉可治三十日起其從者喑三歲起年不滿二十者三歲死脈至而搏血衄身熱者死脈至浮合浮合如數一息十至以上是經氣予不足也微見九十日死脈至如火薪然是心精之予奪也草乾而死脈至如散葉是肝氣予虛也木葉落而死脈至如省客省客者脈塞而鼓是腎氣予不足也懸去棗華而死脈至如丸泥是胃精予不足也榆莢落而死脈至如橫格是膽氣予不足也禾熟而死脈至如弦縷是胞精予不足也病善言下霜而死不言可治脈至如交漆交漆者左右傍至也微見三十日死脈至如湧泉浮鼓肌中太陽氣予不足也少氣味韭英而死脈至如頹土之狀按之不得是肌氣予不足也五色先見黑白壘發死脈至如懸雍懸雍者浮揣切之益大是十二俞之予不足也水凝而死脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熱寒熱獨並於腎也如此其人不得坐立春而死脈至如丸滑不直手不直手者按之不可得也是大腸氣予不足也棗葉生而死脈至如華者令人善恐不欲坐臥行立常聽是小腸氣予不足也季秋而死宣明五氣篇曰五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰陰出之陽病善怒不治是謂五邪皆同命死不治玉版論要篇曰色夭面脫不治百日盡已脈短氣絕死病溫虛甚死女子右為逆左為從男子左為逆右為從易重陽死重陰死通評虛實論曰氣虛者肺虛也氣逆者足寒也非其時則生當其時則死帝曰何謂重虛岐伯曰脈氣上虛尺虛是謂重虛帝曰何以治之曰所謂氣虛者言無常也尺虛者行步恇然脈虛者不象陰也如此者滑則生澀則死也帝曰寒氣暴上脈滿而實何如曰實而滑則生實而逆則死帝曰脈實滿手足寒頭熱何如曰春秋則生冬夏則死脈浮而澀澀而身有熱者死帝曰其形盡滿何如曰其形盡滿者脈急大堅尺澀而不應也如是者從則生逆則死所謂從者手足溫也所謂逆者手足寒也陰陽別論曰所謂陰者真臟也見則為敗敗必死也所謂陽者胃脘之陽也別於陽者知病處也別於陰者知死生之期三陰俱搏二十日夜半死二陰俱搏十三日夕時死一陰俱搏十日平旦死三陽俱搏且鼓三日死三陰三陽俱搏心腹滿發盡不得隱曲五日死二陽俱搏其病溫死不治不過十日死凡持真脈之臟脈者肝至懸絕急十八日死心至懸絕九日死肺至懸絕十二日死腎至懸絕七日死脾至懸絕四日死玉機真藏論曰真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死五臟脈詳脈神章真藏條終始篇曰脈口四盛且大且數者名曰溢陰溢陰為內關內關不通死不治諸脈俱詳關格門五臟生成篇曰凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也故色見青如草茲者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也論疾診尺篇曰診寒熱赤脈上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死病傳死期五玉機真藏論曰五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死此言氣之逆行也故死肝受氣於心傳之於脾氣舍於腎至肺而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以言死生之旦暮也帝曰五臟相通移皆有次五臟有病則各傳其所勝不治法三月若六月若三日若六日傳五臟而當死是順傳所勝之次也故曰別於陽者知病從來別於陰者知死生之期言知至其所困而死風者百病之長也腎傳之心病筋脈相引而急病名曰瘛當此之時可灸可藥弗治滿十日法當死腎因傳之心心即復反傳而行之肺發寒熱法當三歲死標本病傳論曰夫病傳者心病先心痛一日而咳三日脅支痛五日閉塞不通身痛體重三日不已死冬夜半夏日中肺病喘咳三日而脅支滿痛一日身重體痛五日而脹十日不已死冬日入夏日出肝病頭目眩脅支滿三日體重身痛五日而脹三日腰脊少腹痛脛酸三日不已死冬日入夏早食脾病身痛體重一日而脹二日少腹腰脊痛脛酸三日背𦛗筋痛小便閉十日不已死冬人定夏晏食腎病少腹腰脊痛胻酸三日背𦛗筋痛小便閉三日腹脹三日兩脅支痛三日不已死冬大晨夏晏晡胃病脹滿五日少腹腰脊痛胻酸三日背𦛗筋痛小便閉五日身體重六日不已死冬夜半後夏日昳膀胱病小便閉五日少腹脹腰脊痛胻酸一日腹脹一日身體痛二日不已死冬難鳴夏下晡諸病以次相傳如是者皆有死期不可刺間一臟止及至三四臟者乃可刺也病傳篇曰大氣入臟腹痛下淫可以致死不可以致生帝曰大氣入臟奈何岐伯曰病先發於心一日而之肺五日而之脾三日不已死冬夜半夏日中病先發於肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出病先發於肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏早食病先發於脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食病先發於胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昳病先發於腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏晏晡病先發膀胱五日而之腎一日而之小腸一日而之心二日不已死冬難鳴夏下晡氣厥論曰心移寒於肺肺消肺消者飲一溲二死不治肝移熱於心則死腎移熱於脾傳為虛腸澼死不可治陰陽別論曰死陰之屬不過三日而死生陽之屬不過四日而死所謂生陽死陰者肝之心謂之生陽心之肺謂之死陰肺之腎謂之重陰腎之肝謂之闢陰死不治歲時死證六九宮八風篇曰太一移日天必應之以風雨以其日風雨則吉歲美民安少病矣因視風所從來而占之風從其所居之鄉來為實風主生長養萬物從其沖後來為虛風主殺主害者謹候虛風而避之故聖人日避虛邪之道如避矢石然邪弗能害此之謂也風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絕則溢脈閉則結不通善暴死三虛相搏則為暴病卒死歲露論帝曰其有卒然暴病暴死者何也少師曰三虛者其死暴疾也得三實者邪不能傷人也帝曰願聞三虛曰乘年之衰逢月之空失時之和因為賊風所傷是為三虛故論不知三虛工反為粗帝曰願聞三實曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也故諸逢其風雨遇其雨者命曰遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和則民多病而死矣帝曰虛邪之風其所傷貴賤何如候之奈何曰正月朔日太一居天留之宮其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日平旦北風行民病多者十有三也正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來髮屋揚沙石國有大災也正月朔日風從東南方行春有死亡正月朔日天和溫不風糴賤民不病天寒而風糴貴民多病此所以候歲之風殘傷人者也二月醜不風民多心腹病三月戍不溫民多寒熱四月巳不暑民多癉病十月申不寒民多暴死諸所謂風者皆髮屋折樹木揚砂石起毫毛發腠理者也本神篇曰心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬脾憂愁而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏恐懼而不解則傷精精傷則骨酸痿厥精時自下是故五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣是故用針者察觀病人之態以知精神魂魄之存亡得失之意五者以傷針不可以治之也玉機真藏論曰大骨枯槁大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟脈見乃予之期日大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟脈見乃予之期日大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十月之內死大骨枯槁大肉陷下肩髓內消動作益衰真臟來見期一歲死見其真臟乃予之期日大骨枯槁大肉陷下胸中氣滿腹內痛心中不便肩項痛身熱破䐃脫肉目眶陷真臟見目不見人立死其見人者至其所不勝之時則死急虛身中卒至五臟絕閉脈道不通氣不往來譬於墮溺不可為期其脈絕不來若人一息五六至其形肉不脫真臟雖不見猶死也三部九候論曰寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死平人氣象論曰肝見庚辛死心見壬癸死脾見甲乙死肺見丙丁死腎見戊己死是謂真臟見皆死氣交變大論曰歲木太過風氣流行脾土受邪上應歲星沖陰絕者死不治歲火太過炎暑流行肺金受邪上應熒惑星太淵絕者死不治歲土太過雨濕流行上應鎮星太谿絕者死不治歲金太過燥氣流行肝木受邪上應太白星太衝絕者死不治歲水太過寒氣流行邪害心火上應辰星神門絕者死不治六元正紀大論帝曰六位之氣盈虛何如岐伯曰太少異也太者之至徐而常少者暴而亡木鬱之發甚則耳鳴眩轉目不識人善暴僵仆火鬱之發甚則瞀悶懊憹善暴死六微旨大論曰天符為執法歲位為行令太一天符為貴人帝曰邪之中也奈何岐伯曰中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死帝曰位之易也何如曰君位臣則順臣位君則逆逆則其病近其害速順則其病遠其害微所謂二火也本病論帝曰人氣不足天氣如虛人神失守神光不聚邪鬼外干致有夭亡可得聞乎岐伯曰人之五臟一臟不足又會天虛感邪之至也人憂愁思慮即傷心又或遇少陰司天天數不及此即天氣人氣同虛也又遇驚而奪精汗出於心因而三虛神明失守卻遇火不及之歲有黑屍鬼犯之令人暴亡人飲食勞倦即傷脾又或遇太陰司天天數不及此即人虛而天虛也又遇飲食飽甚汗出於胃醉飽行房汗出於脾因而三虛脾神失守卻遇土不及之年即有青屍鬼犯之令人卒亡人久坐濕地強力入水即傷腎因而三虛腎神失守卻遇水不及之年有黃屍鬼見之令人暴亡人或恚怒氣逆上而不下即傷肝又遇厥陰司天天數不及此謂天虛人虛也又遇疾走恐懼汗出於肝神位失守神光不聚又遇木不及之年有白屍鬼犯之令人暴亡也以上五失守者天虛而人虛也神遊失守其位即有五屍鬼幹人令人暴亡也謂之曰屍厥此謂得守者生失守者死得神者昌失神者亡諸經死證七經脈篇曰手太陰氣絕則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節則爪枯毛折毛折者則毛先死丙篤丁死火勝金也手少陰氣絕則脈不通脈不通則血不流血不流則髦色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也足太陰氣絕者則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也足少陰氣絕則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢發無澤發無澤者骨先死戊篤己死土勝水也足厥陰氣絕則筋絕厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也五陰氣俱絕則目系轉轉則目運目運者為志先死志先死則遠一日半死矣六陽氣絕則陰與陽相離離則腠理發泄絕汗乃出故旦占夕死夕占旦死診要經終論帝曰願聞十二經脈之終奈何岐伯曰太陽之脈其終也戴眼反折瘛瘲其色白絕汗乃出出則死矣少陽終者耳聾百節皆縱目睘絕系絕系一日半死其死也色先青白乃死矣陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣少陰終者面黑齒長而垢腹脹閉上下不通而終矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣此十二經之所敗也諸病死證八脈要精微論曰五臟者中之守也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也倉廩不藏者是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死夫五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩垂府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死玉版篇帝曰諸病皆有逆順可得聞乎岐伯曰腹脹身熱脈大是一逆也腹鳴而滿四肢清泄其脈大是二逆也衄而不止脈大是三逆也咳且溲血脫形其脈小勁是四逆也咳脫形身熱脈小以疾是五逆也如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脈大時絕是二逆也咳溲血形肉脫脈搏是三逆也嘔血胸滿引背脈小而疾是四逆也咳嘔腹脹且飧泄其脈絕是五逆也如是者不過一時而死矣五禁篇帝曰何謂五逆岐伯曰熱病脈靜汗已出脈躁盛是一逆也病泄脈洪大是二逆也著痹不移䐃肉破身熱脈偏絕是三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重是四逆也寒熱奪形脈堅搏是謂五逆也玉機真藏論曰五實死五虛死帝曰願聞五實五虛岐伯曰脈盛皮熱腹脹前後不通悶瞀此謂五實脈細皮寒氣少泄利前後飲食不入此謂五虛帝曰其時有生者何也岐伯曰漿粥入胃注泄止則虛者活身汗得後利則實者活此其候也寶命全形論曰夫鹽之味鹹者其氣令器津泄弦絕者其音嘶敗木敷者其葉發病深者其聲噦人有此三者是謂壞府毒藥無治短針無取五色篇雷公曰人不病卒死何以知之帝曰大氣入於臟腑者不病而卒死矣雷公曰病小愈而卒死者何以知之帝曰赤色出兩顴大如母指者病雖小愈必卒死黑色出於庭大如母指者必不病而卒死奇病論帝曰有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈細微如發者此不足也其病安在名為何病岐伯曰病在太陰其盛在胃頗在肺病名曰厥死不治此所謂五有餘二不足也帝曰何謂五有餘二不足曰所謂五有餘者五病之氣有餘也二不足者亦病氣之不足也今外得五有餘內得二不足此其身不表不里亦正死明矣陽明脈解篇曰陽明厥則喘而惋惋則惡人帝曰或喘而死者或喘而生者何也岐伯曰厥逆連臟則死連經則生厥論曰三陰俱逆不得前後使人手足寒三日死少陽厥逆機關不利腰不可以行項不可以顧發腸癰不可治驚者死手心主少陰厥逆心痛引喉身熱死不可治詳厥逆門通評虛實論帝曰消癉虛實何如岐伯曰脈實大病久可治脈懸小堅病久不可治帝曰癲疾何如曰脈搏大滑久自已脈小堅急死不治帝曰癲疾之脈虛實何如曰虛則可治實則死帝曰腸澼便血何如曰身熱則死寒則生腸澼下白沫何如曰脈沉則生脈浮則死帝曰腸澼下膿血何如曰脈懸絕則死滑大則生癲狂篇曰癲疾者癲發如狂者死不治厥病篇曰風痹淫濼病不可已者足如履冰時如入湯中股脛淫濼煩心頭痛時嘔時悗眩已汗出久則目眩悲以喜恐短氣不樂不出三年死也真心痛手足清至節心痛甚旦發夕死夕發旦死真頭痛頭痛甚腦盡痛手足寒至節死不治痹論帝曰痹其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已傷寒死證九俱詳列傷寒瘟疫二門熱論篇曰三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣誤治死證十六元正紀大論曰大積大聚其可犯也衰其大半而止過者死診要經終論曰凡刺胸腹者必避五臟中心者環死中脾者五日死中腎者七日死中肺者五日死中膈者皆為傷中其病雖愈不過一歲死刺禁論曰臟有要害不可不察肝生於左肺藏於右心部於表腎治於裡脾為之使胃為之市膈盲之上中有父母七節之傍中有小心從之有福逆之有咎刺中心一日死其動為噫刺中肝五日死其動為語刺中腎六日死其動為嚏刺中肺三日死其動為咳刺中脾十日死其動為吞刺中膽一日半死其動為嘔刺跗上中大脈血出不止死刺面中溜脈不幸為盲刺頭中腦戶入腦立死刺陰股中大脈血出不止死刺臂太陰脈出血多立死小針解曰取五脈者死言病在中氣不足但用針盡大瀉其諸陰之脈也取三陽之脈者唯言盡瀉三陽之氣令病人恇然不復也奪陰者死言取尺之五里五往者也奪陽者狂正言也所謂五臟之氣已絕於內者脈口氣內絕不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則內重竭重竭則死矣其死也無氣以動故靜所謂五臟之氣已絕於外者脈口氣外絕不至反取其四末之輸有留針以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁玉版篇曰夫針之與五兵其孰小乎能殺生人不能起死者也帝曰願卒聞之岐伯曰經隧者五臟六腑之大絡也迎而奪之而已矣帝曰上下有數乎曰迎之五里中道而止五至而已五往而藏之氣盡矣故五五二十五而竭其輸矣此所謂奪其天氣者也帝曰願卒聞之曰窺門而刺之者死於家中入門而刺之者死於堂上癰疽死證十一癰疽篇玉版篇等義俱詳列外科絕谷死證十二平人絕谷篇帝曰願聞人之不食七日而死何也伯高曰神者水穀之精氣也故腸胃之中常留谷二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水穀盡矣故平人不食飲七日而死者水穀精氣津液皆盡故也乳子死證十三通評虛實論帝曰乳子而病熱脈懸小者何如岐伯曰手足溫則生寒則死帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死論疾診尺篇曰嬰兒病其頭毛皆逆上者必死熱病篇曰老人嬰兒熱而腹滿者死述古十四華元化曰不病而五行絕者死不病而性變者死不病而暴語妄者死不病而暴不語者死不病而喘息者死不病而強中者死不病而暴目盲者死不病而暴腫滿者死不病而大便結者死不病而暴無脈者死不病而暴昏冒如醉者死此內外先盡故也逆者即死順者二年無有生者也
