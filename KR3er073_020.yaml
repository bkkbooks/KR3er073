湯主之若生冷寒勝者宜加炮薑肉桂吳茱萸之類元戎曰太陰證霍亂者理中加橘紅名治中湯若吐下心腹作痛手足逆冷理中去白朮加熟附子名四順湯若吐痢後轉筋者理中加火煅石膏一兩一轉筋腹痛者因胃氣暴傷以致陽明厥陰血燥筋攣而然法當養血溫經乃為正治若邪滯未清者或先宜和胃飲加肉桂木瓜主之若氣虛者宜四君子湯加當歸肉桂厚朴木瓜之類陰虛少血者宜理陰煎加肉桂木瓜主之又治轉筋法男子以手挽其陰女子以手揪兩乳此千金法也一乾霍亂證最為危候其證則上欲吐而不能出下欲瀉而不能行胸腹攪痛脹急悶亂此必內有飲食停阻外有寒邪閉遏蓋邪淺者易於行動故即見吐痢邪深者陰陽格拒氣道不通故為此證若不速治多致暴死宜先用鹽湯探而吐之一以去其滯隔一以通其清氣但使清氣得升然後濁氣得降從瀉而出斯不致害藥以溫中散滯破氣等劑庶乎胃氣可舒而邪隨以散宜排氣飲加減主之或神香散或局方七氣湯亦可酌用向余荊人患此幾致不救有治按在腹痛門一霍亂之後多有煩渴者此以吐痢亡津腎水乾涸故渴飲欲水勢所必然但宜溫暖調脾以止吐瀉脾氣得和渴將自止或以獨參湯徐徐與之最妙法也其有本以陽臟而因瀉亡陰或見火盛喜冷內熱脈洪者宜益元散或竹葉石膏湯之類甘涼以濟之亦無不可述古共三條仲景曰霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不欲水者理中丸主之若臍上築者腎氣動也去朮加桂四兩此下即理中湯加減法吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被吐痢止而身痛不休者當消息和解其外宜桂枝湯小和之吐痢汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之既吐且痢小便復痢而大汗出下痢清穀內寒外熱脈微欲絶者四逆湯主之吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之吐痢發汗脈平小煩者以新虛不勝穀氣故也巢氏病源曰霍亂吐瀉皆由溫涼不調陰陽淆混二氣相干致脾胃受傷變為霍亂寒氣客於脾則瀉客於胃則吐亦由飲酒食肉腥膾生冷過度或因坐臥濕地當風取涼使風冷之氣歸於三焦傳於脾胃脾胃得冷水穀不消皆成霍亂陳無擇曰霍亂者心腹卒痛嘔吐下痢憎寒壯熱頭痛眩運先心痛則先吐先腹痛則先瀉心腹俱痛則吐痢並作甚至轉筋入腹霍亂惡證無越於斯蓋陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞膈上下奔逸治之惟宜溫暖更詳別三因以調之外因諸風則惡風有汗傷寒則惡寒無汗冒濕則重著傷暑則熱煩內因九氣所致郁聚痰涎痞膈不通遂致滿悶隨其勝復必作吐痢不內外因或諸飽食膾炙恣飲乳酪冰脯寒漿旨酒胃既䐜脹脾臟停凝內郁必發遂成吐痢當從不內外因也針灸法刺委中穴出血或刺十指頭出血皆是良法今西北人凡病傷寒熱入血分而不解者悉刺兩手膕中出血謂之打寒蓋寒隨血去亦即紅汗之類也故凡病以寒霍亂者亦宜此法治之今東南人有括痧之法以治心腹急痛蓋使寒隨血聚則邪達於外而臟氣始安此亦出血之意也霍亂吐瀉不止灸天樞氣海中脘四穴立愈霍亂危急將死用鹽填臍中灸二七壯立愈轉筋十指拘攣不能屈伸灸足外踝骨尖上七壯霍亂論列方四君子湯補一五君子煎新熱六六君子湯補五大和中飲新和七小和中飲新和八二陳湯和一神香散新和二十平胃散和十七和胃飲新和五溫胃飲新熱五胃苓湯和百九十五苓散和一八二四逆湯熱十四理中湯熱一理陰煎新熱三獨參湯補三五六和湯和一二七排氣飲新和六益元散寒百十二理中丸熱一桂枝湯散九五味異功散補四苓朮二陳煎新和四局方七氣湯和五十竹葉石膏湯寒五四逆加豬膽汁湯熱十六論外備用方人參散和一二六胃寒縮脾飲和一七三暑毒藿香正氣散和二十風寒丁香散和一二八氣逆治中湯熱十中氣不和吳茱萸湯熱一三八陰暑木瓜湯熱八二轉筋大順散熱七七寒濕薑附湯熱三二厥冷轉筋冷香湯熱八一生冷滯霍亂三方熱八四乾霍亂二方熱八六養正丹熱一八八氣壅滯訶子散熱八三老幼皆宜四順附子湯熱九六陰寒冷香飲子熱八十陰暑千金霍亂方熱八五附子粳米湯熱七九四逆乾嘔噁心噯氣經義宣明五氣篇曰五氣所病心為噫脈解篇曰太陰所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也經脈篇曰足太陰病則舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰口問篇曰人之噫者何氣使然曰寒氣客於胃厥逆從下上散復出於胃故為噫陰陽別論曰二陽一陰發病主驚駭背痛善噫善欠名曰風厥痹論曰心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫三部九候論曰若有七診之病其脈候亦敗者死矣必發噦噫至真要大論曰歲厥陰在泉風淫所勝民病膈咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重太陽司天寒淫所勝民病胸脅胃脘不安面赤目黃善噫嗌乾甚則色炲渴而欲飲病本於心少陰之復燠熱內作外為浮腫為噦噫四時刺逆從論曰刺五臟中心一日死其動為噫診要經終論曰太陰終者腹脹閉不得息善噫善嘔噁心證治內經無噁心之説凡嘔吐證即其類也經義詳見本門共三條噁心證胃口泛逆兀兀不寧之病凡噁心欲吐口必流涎咽之不下愈咽愈惡而嘔吐繼之亦有不嘔吐而時見噁心者然此雖曰噁心而實胃口之病非心病也此證之因則有寒有食有痰飲有穢氣有火邪有陰濕傷胃或傷寒瘧痢諸邪之在胃口者皆得有之若欲察之但當察其虛實寒熱則盡之矣蓋實邪惡心者邪去則止其來速其去亦速虛邪惡心者必得胃氣大復其病方愈且此證惟虛寒者十居八九即有實邪嘔惡者亦必其脾氣不健不能運化而然此所以凡治噁心者必當知其實中有虛勿得妄行攻擊而胃氣不可不顧也一虛寒噁心其證最多若非猝暴而常見或形氣不足之輩悉以胃氣弱也故凡治此者多宜以溫補為主若脾胃微虛生痰或兼吞酸噯腐咳嗽噁心者宜六君子湯若脾腎虛寒痰滯咳嗽而噁心者金水六君煎若脾胃虛寒或太陰自利腹痛嘔吐噁心者溫胃飲或理中湯聖朮煎若脾腎虛寒上下不能運行或脹滿或嘔吐或傷寒陰證寒邪深入三陰而噁心嘔吐不止者理陰煎或溫胃飲一實邪惡心以一時邪滯犯胃得吐則滯去滯去則噁心自解若有餘邪如法治之若噁心多痰及風寒咳嗽或傷生冷或飲酒過多脾胃不和者二陳湯或橘皮半夏湯若脾胃多滯或寒濕傷脾噁心者平胃散若胃寒多滯或傷生冷或寒痰不清吞酸脹滿噁心者和胃飲或和胃二陳煎若受穢濁寒邪脹滿腹痛惡心者調氣平胃散若感冒暑熱火盛煩躁噁心者仲景竹葉石膏湯若中藥毒或諸毒而噁心者速宜於諸毒門求法治之噯氣證治共三條噯氣者即內經之所謂噫也此實脾胃之氣滯起自中焦而出於上焦故經曰上走心為噫也據丹溪曰噯氣以胃中有痰有火愚謂此説未必皆然蓋噯氣多由滯逆滯逆多由氣不行氣逆不行者多寒少熱可皆謂之火耶故凡人之飲食太飽者多有此證及飲食不易消化者亦有此證但太飽作噯者此係實滯治宜行氣化食食不消化時多虛悶作噯者此係胃氣虛寒治宜溫補若痰火作噯者亦或有之但停痰必以胃弱胃弱多因無火此當詳辨脈證而酌治之也一治噯之法凡胃虛兼滯而作噯者宜十味保和湯或枳殼散若胃寒氣滯作噯者和胃煎若胃寒生痰嘔惡噯氣者宜和胃二陳煎若胃氣虛寒飲食難化時常虛飽噯氣者宜溫胃飲或養中煎理中湯若脾腎虛寒命門不暖陰邪不降則寒滯上焦而痞滿噯氣者理陰煎加減治之一丹溪曰噯氣以胃中有痰有火宜用半夏南星香附軟石膏梔子或湯或丸服按此治必真有火邪者乃可用否則恐滯於中而噯愈甚噁心論列方理中湯熱一溫胃飲新熱五金水六君煎新和一聖朮煎新熱二五理陰煎新熱三養中煎新熱四和胃二陳煎新和三二陳湯和一和胃飲新和五橘皮半夏湯和十三枳殼散和一四六平胃散和十七十味保和湯和一四八六君子湯補五調氣平胃散和十八竹葉石膏湯寒六論外備用方胃愛散熱七一祛痰丸和百三香砂六君子湯補七
