body:
  text: 卷之二十明集雜證謨嘔吐經義至真要大論曰諸痿喘嘔皆屬於上諸逆衝上皆屬於火諸嘔吐酸暴注下迫皆屬於熱脈解篇曰太陰所謂食則嘔者物盛滿而上溢故嘔也少陰所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也經脈篇曰足太陰之脈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫足厥陰肝所生病者胸滿嘔逆舉痛論曰寒氣客於腸胃厥逆上出故痛而嘔也六元正紀大論曰少陽所至為嘔湧厥陰所至為脅痛嘔泄邪氣臟腑病形篇曰膽病者善太息口苦嘔宿汁肝脈緩甚為善嘔腎脈微緩為洞洞者食不化下嗌還出四時氣篇曰善嘔嘔有苦長太息心中憺憺恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽刺禁論曰刺中膽一日半死其動為嘔診要經終論曰太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤五味論曰苦走骨多食之令人變嘔論證共四條嘔吐一證最當詳辨虛實實者有邪去其邪則愈虛者無邪則全由胃氣之虛也所謂邪者或暴傷寒涼或暴傷飲食或因胃火上衝或因肝氣內逆或以痰飲水氣聚於胸中或以表邪傳裡聚於少陽陽明之間皆有嘔證此皆嘔之實邪也所謂虛者或其本無內傷又無外感而常為嘔吐者此既無邪必胃虛也或遇微寒或遇微勞或遇飲食少有不調或肝氣微逆即為嘔吐者總胃虛也凡嘔家虛實皆以胃氣為言使果胃強脾健則凡遇食飲必皆運化保至嘔吐故雖以寒熱飢飽大有所傷亦不能動而茲略有所觸便不能勝使非胃氣虛弱何以若此此虛實之原所當先察庶不致誤治之害一凡胃氣本虛而或停滯不行者是又虛中有實不得不暫從清理然後可以培補又或雖有停滯而中氣虛困不支者是又所急在虛不得不先顧元氣而略兼清理此中本末先後自有確然之理所以貴知權也一嘔家雖有火證詳列後條然凡病嘔吐者多以寒氣犯胃故胃寒者十居八九內熱者十止一二而外感之嘔則尤多寒邪不宜妄用寒涼等藥使非真有火證而誤用之胃強者猶或可支胃弱者必遭其瘧觀劉河間曰胃膈甚則為嘔火氣炎上之象也此言過矣若執而用之其害不小又孫真人曰嘔家聖藥是生薑此的確之見也勝於河間遠矣一仲景曰傷寒嘔多雖有陽明證不可攻之此但以傷寒為言也然以余之見則不但傷寒而諸證皆然何也蓋雜證嘔吐尤非傷寒之比其在傷寒則猶有熱邪但以熱在上焦未全入府則下之為逆故不可下也若雜證之嘔吐非胃寒不能化則脾虛不能運耳脾胃既虛其可攻乎且上下之病氣或無涉而上下之元氣實相依此嘔吐之所以不可攻者正恐病在上而攻其下下愈虛則上愈困耳虛嘔證治共三條凡胃虛作嘔者其證不一當知所辨若胃脘不脹者非實邪也胸膈不痛者非氣逆也內無熱躁者非火證也外無寒熱者非表邪也無食無火而忽為嘔吐者胃虛也嘔吐無常而時作時止者胃虛也食無所停而聞食則嘔者胃虛也氣無所逆而聞氣則嘔者胃虛也或身背或食飲微寒即嘔者胃虛也或吞酸或噯腐時苦噁心兀兀然泛泛然冷咽靡寧者胃虛也或因病誤治妄用克伐寒涼本無嘔而致嘔者胃虛也或朝食暮吐暮食朝吐食入中焦而不化者胃虛也食入下焦而不化者土母無陽命門虛也凡此虛證必皆宜補是固然矣然胃本屬土非火不生非暖不化是土寒者即土虛也土虛者即火虛也故曰脾喜暖而惡寒土惡濕而喜燥所以東垣脾胃論特著溫補之法蓋特為胃氣而設也庸可忽哉第在河間則言嘔因胃火是火多實也茲余言嘔因胃寒是寒多虛也一熱一寒若皆失中和之論不知嘔因火者余非言其必無但因火而嘔者少因寒而嘔者多耳因胃實而嘔者少因胃虛而嘔者多耳故不得不有此辨一虛嘔之治但當以溫胃補脾為主宜人參理中湯為正治或溫胃飲聖朮煎參薑飲之類亦可酌用或黃芽丸尤為最妙若胃口寒甚者宜附子理中湯或四味回陽飲或一氣丹主之若虛在陰分水泛為痰而嘔吐者宜金水六君煎虛甚者宜理陰煎或六味回陽飲若久病胃虛不能納穀者俱當以前法酌治之若胃氣微虛而兼痰者宜六君子湯主之一凡中毒而吐者當察其所中者何物蓋中熱毒而吐者宜解以苦寒之劑中陰寒之毒而吐瀉不止者宜解以溫熱之劑若因吐瀉而脾胃致虛者非大加溫補不可此證有中寒毒吐瀉治按在後當並閲之實嘔證治共九條凡實邪在胃而作嘔者必有所因必有見證若因寒滯者必多疼痛因食滯者必多脹滿因氣逆者必痛脹連於脅肋因火鬱者必煩熱燥渴脈洪而滑因外感者必頭身發熱脈數而緊如無實證實脈而見嘔吐者切不可以實邪論治一寒邪犯胃而作嘔者其證有三一以食飲寒涼或誤食性寒生冷等物致傷胃氣因而作嘔若果寒滯未散而兼脹兼痛者宜溫中行滯以大小和中飲神香散或二陳湯加薑桂之類主之或和胃飲亦佳一以陰寒氣令或雨水沙氣及水土寒濕之邪犯胃因而作嘔作泄若寒滯未散而或脹或痛者宜溫中散寒以平胃散神香散加減二陳湯除濕湯局方四七湯大七香丸之類主之一以風寒外感或傷寒或咳瘧凡邪在少陽表邪未解而漸次入里所以外為寒熱內為作嘔蓋少陽之經下胸中貫膈而然此半表半裡證也治宜解表散寒以柴陳煎小柴胡湯正柴胡飲之類主之若微嘔微吐者邪在少陽若大嘔大吐者此又邪在陽明胃家病也宜二陳湯或不換金正氣散藿香正氣散之類主之若胃虛兼寒者惟理中湯溫胃飲之類為宜一飲食傷胃而作嘔者如果留滯未消而兼脹痛等證宜大和中飲排氣飲神香散之類主之或啓脾丸亦可酌用如食已消而嘔未止者宜溫胃飲主之一火在中焦而作嘔者必有火證火脈或為熱渴或為燥煩脈必洪數吐必湧猛形氣聲色必皆壯麗若察其真有火邪但降其火嘔必自止火微兼虛者宜外臺黃芩湯或半夏瀉心湯火甚者宜抽薪飲或大小分清飲若暑熱犯胃多渴多嘔氣虛煩躁而火有不清者竹葉石膏湯若熱甚嘔吐不止而火在陽明兼頭痛者白虎湯或太清飲或六一散若冒暑嘔吐而火不甚者宜香薷飲或五物香薷飲此有胃火治按在後一痰飲留於胸中或寒濕在胃水停中脘而作嘔吐者宜和胃二陳煎苓朮二陳煎或小半夏加茯苓湯橘皮半夏湯之類皆可酌用一氣逆作嘔者多因鬱怒致動肝氣胃受肝邪所以作嘔然胃強者未必易動而易動者多因胃虛故凡治此者必當兼顧胃氣宜六君子湯或理中湯主之若逆氣未散或多脹滿者宜二陳湯或橘皮半夏湯之類主之或神香散亦佳一瘧痢作嘔者其在瘧疾則以表邪內陷凡邪在少陽陽明太陰者皆能作嘔但解去表邪嘔必自止其在痢疾之嘔則多因胃氣虛寒蓋表非寒邪無以成瘧里非寒邪無以成痢而病不知本尚何醫云二證方論具載本門一朝食午吐午食晚吐或朝食暮吐詳後反胃門一方治嘔吐之極或反胃粥湯入胃即吐垂死者用人參二兩水一升煮四合熱服日再進兼以人參煮粥食之即不吐吐蛔凡吐蛔者必因病而吐蛔非因蛔而致吐也故不必治其蛔而但治其所以吐則蛔自止矣有因胃火而吐蛔者以內熱之甚蛔無所容而出也但清其火火清而蛔自靜輕者抽薪飲甚者萬應丸之屬是也有因胃寒而吐蛔者以內寒之甚蛔不能存而出也但溫其胃胃暖而蛔自安仲景烏梅丸之屬是也有因胃虛無食而吐蛔者以倉廩空虛蛔因求食而上出也此胃氣大虛之候速宜補胃溫中以防根本之敗如溫胃飲理中湯聖朮煎之屬也以上三者固皆治蛔之法然蛔有死者有活者若吐死蛔則但治嘔如前可也若活蛔上出不已則不得不有以逐之蓋蛔性畏酸畏苦但加烏梅為佐使則蛔自伏也若胃實火盛者可加苦楝根或黃連亦善其有未盡者俱詳列諸蟲本門及後條吐蛔治按中治嘔氣味論凡治胃虛嘔吐最須詳審氣味蓋邪實胃強者能勝毒藥故無論氣味優劣皆可容受惟胃虛氣弱者則有宜否之辨而胃虛之甚者則於氣味之間關係尤重蓋氣虛者最畏不堪之氣此不但腥臊耗散之氣不能受即微香微郁並飲食之氣亦不能受而其他可知矣胃弱者最畏不堪之味此非惟至苦極劣之味不能受即微咸微苦並五穀正味亦不能受而其他可知矣此胃虛之嘔所以最重氣味使或略有不投則入口便吐終無益也故凡治陽虛嘔吐等證則一切香散鹹酸辛味不堪等物悉當以已意相測測有不妥切不可用但補其陽陽回則嘔必自止此最確之法不可忽也余嘗見一沈姓者素業醫極多勞碌且年及四旬因患㿗疝下墜欲提使上升自用鹽湯吐法不知胃虛畏咸遂致吐不能止湯水皆嘔如此者一日一夜忽又大便下黑血一二碗而脈則微渺如毛幾如將絶此蓋吐傷胃氣脾虛之極兼以鹽湯走血故血不能攝從便而下余令其速用人參薑附等劑以回垂絶之陽庶乎可療忽又一醫至曰諸逆衝上皆屬火也大便下血亦因火也尚堪用參附乎宜速飲童便則嘔可愈而血亦止矣其人以為有理及童便下咽即嘔極不堪名狀嘔不止而命隨繼之矣嗚呼夫以胃強之人亦且聞尿欲嘔況嘔不能止而復可加以尿乎此不惟死者堪憐而妄用若此者尚敢稱醫誠可惡可恨也故筆之於此並以徵氣味之證又別有氣味治按在小兒門嘔吐條中所當參酌述古共五條王太僕曰內格嘔逆食不得入是有火也病嘔而吐食入反出是無火也金匱要略曰先嘔卻渴者此為欲解先渴卻嘔者為水停心下此屬飲家嘔家本渴今反不渴者以心下有支飲故也此屬支飲問曰病人脈數數為熱當消穀引食而反吐者何也曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛病人欲吐者不可下之嘔而胸滿者茱萸湯主之嘔而吐涎沫頭痛者茱萸湯主之嘔而腸鳴心下痞者半夏瀉心湯主之乾嘔而痢者黃芩半夏生薑湯主之諸嘔吐谷不得下者小半夏湯主之嘔吐而病在膈上後思水者解急與之思水者豬苓散主之嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之嘔而發熱者小柴胡湯主之胃反嘔吐者大半夏湯主之食已即吐者大黃甘草湯主之胃反吐而渴欲飲水者茯苓澤瀉湯主之乾嘔吐逆吐涎沫者半夏乾薑散主之病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之乾嘔噦若手足厥者橘皮湯主之朱丹溪曰胃中有熱膈上有痰者二陳湯加炒山梔黃連生薑有久病嘔者胃虛不納穀也用人參生薑黃耆白朮香附之類嘔吐朱奉議以半夏橘皮生薑為主劉河間謂嘔者火氣炎上此特一端耳有痰膈中焦食不得下者有氣逆者有寒氣鬱於胃口者有食滯心肺之分新食不得下而反出者有胃中有火與痰而嘔者嘔吐藥忌栝蔞杏仁桃仁蘿蔔子山梔皆能作吐肝火出胃逆上嘔吐者抑青丸夏月嘔吐不止五苓散加薑汁吐蟲用炒錫灰檳榔末米飲服胃中有熱者二陳湯加薑苓連噁心有熱有痰有虛皆用生薑入藥薛立齋曰若脾胃氣虛而胸膈不利者用六君子湯壯脾土生元氣若過服辛熱之劑而嘔吐噎膈者用六君子加芎歸益脾土以抑陰火胃火內格而飲食不入者用六君子加苓連清熱養胃若病嘔吐食入而反出者用六君子加木香炮薑溫中補脾若服耗氣之劑血無所生而大便燥結者用四君子加芎歸補脾生血若火逆衝上食不得入者用四君子加山梔黃連清熱養血若痰飲阻滯而食不得入者用六君子加木香山梔補脾化痰若脾胃虛寒飲食不入或入而不化者用六君子加木香炮薑溫補脾胃更非慎房勞節厚味調飲食者不治年高無血者亦不治徐東皋曰胃虛嘔吐惡食不思食兼寒者惡寒或食久還吐或朝食暮吐暮食朝吐脈遲而微澀此皆虛寒者也宜藿香安胃散理中湯甚者丁香煮散溫補胃中鬱熱飲食積滯而嘔者則惡食惡寒煩悶膈滿或渴喜涼聞食則吐服藥亦吐脈洪大而數此皆實熱者也宜竹茹湯麥門冬湯清之若食積多者用二陳加神麯麥芽黃連保和丸之類消導之中寒毒吐瀉脹滿新按凡胃寒者多為嘔吐而中寒毒者又必吐而兼瀉余在燕都嘗治一吳參軍者因見鮮蘑菰肥嫩可愛令庖人貿而羹之以致大吐大瀉延彼鄉醫治之咸謂速宜解毒乃以黃連黑豆桔梗甘草枳實之屬連進之而病益甚遂至胸腹大脹氣喘水飲皆不能受危窘已甚延救於余投以人參白朮甘草乾薑附子茯苓之類彼疑不敢用曰腹脹氣急口乾如此安敢再服此藥乃停一日而病愈劇若朝露矣因而再懇與藥如前彼且疑且畏而決別於內閫曰必若如此則活我者此也殺我者亦此也余之生死在此一舉矣遂不得已含淚吞之一劑而嘔少止再劑而脹少殺隨大加熟地黃以兼救其瀉亡之陰前後凡二十餘劑復元如故彼因問曰餘本中毒致病鄉人以解毒而反劇先生以不解毒而反愈者何也余曰毒有不同豈必如黃連甘桔之類乃可解耶即如蘑菰一物必産於深坑枯井或沉寒極陰之處乃有之此其得陰氣之最盛故肥白最嫩也公中此陰寒之毒而復解以黃連之寒其謂之何茲用薑附非所以解寒毒乎用人參熟地非所以解毒傷元氣乎然則彼所謂解毒者適所以助毒也余所謂不解毒者正所以解毒也理本甚明而人弗能辨凡諸病之誤治者無非皆此類耳公頓首愀然嘆曰信哉使非吾丈幾為含冤之魄矣祈壽諸梓以為後人之鑑云胃火上衝嘔吐新按一金宅少婦宦門女也素任性每多胸脅痛及嘔吐等證隨調隨愈後於秋盡時前證復作而嘔吐更甚病及兩日甚至厥脫不省如垂絶者再後延豫至見數醫環視僉云湯飲諸藥皆不能受入口即吐無策可施一醫云惟用獨參湯庶幾可望其生耳余因診之見其脈亂數甚而且煩熱躁擾莫堪名狀意非陽明之火何以急劇若此乃問其欲冷水否彼即點首遂與以半鍾惟此不吐且猶有不足之狀乃復與一鍾稍覺安靜余因以太清飲投之而猶有謂此非傷寒又值秋盡能堪此乎余不與辨及藥下咽即酣睡半日不復嘔矣然後以滋陰輕清等劑調理而愈大都嘔吐多屬胃寒而復有火證若此者經曰諸逆衝上皆屬於火即此是也自後凡見嘔吐其有聲勢湧猛脈見洪數證多煩熱者皆以此法愈之是又不可不知也吐蛔新按一胡宅小兒年甫三歲偶因飲食不調延幼科診治所用之藥無非清火化滯等劑因而更損胃氣反致嘔吐溏泄復加清利遂致吐蛔初止數條漸至數十條細如燈草甚至成團攪結而出早晚不絶所下者亦如之羸困至極求治於豫因與溫胃飲二三劑其蟲朝夕不止其多如故初不識其何所從來而神化之速一至如此乃翁切懇曰止此一兒死生在公矣萬望先逐此蟲蟲不盡則病日甚其能生乎豫弗之聽但以前藥倍加人參仍加附子二三劑而嘔吐漸稀瀉亦隨止瀉止後乃以理陰煎溫胃飲出入間用十餘日而蟲漸少一月餘而飲食進肌肉生復元如故矣其翁積誠稱謝因問曰小豚之病誠然危矣令何以不治蟲不治嘔瀉而三者俱愈可聞教乎豫曰公之所畏者蟲也豫之所畏者胃氣也且凡逐蟲之藥無有不傷胃氣者向使胃氣再傷非惟不能逐蟲而命必隨之矣其害孰甚故保生之權全在知本知末但使脾胃日強則拔去化蟲之源而三病同歸一得矣尚何蟲瀉之敢橫哉聞者歎服因附著按於此又一王宅少婦年未二旬素喜瓜果生冷因常病心腹疼痛每發必數日不食後及二旬之外則每發必至吐蛔初吐尚少自後日甚日多每吐必一二十條每發必旬日不食所經諸醫但知攻蟲旋去旋生百藥不效豫為診視脈證並察病因知其傷於生冷以致脾胃虛寒陰濕氣聚故為此證使不溫養脾胃以杜寒濕化生之源而但事攻蟲蟲去復生終無濟也因制溫臟丸與之藥未完而病隨愈矣後因病愈而少年任意仍耽生果舊病復作再製丸服乃得全愈觀此二證如前之小兒乃因涼藥傷脾所以生蟲後之女人乃因生果傷胃所以生蟲可見陰濕內淫而脾胃虛寒是即生蟲之由也故凡治蟲之法但察其別無疳熱等證者悉當以溫補脾胃為主嘔吐論列方二陳湯和一理中湯熱一附子理中湯熱二理陰煎新熱三四君子湯補一加減二陳湯和二溫胃飲新熱五六君子湯補五金水六君煎新和一聖朮煎新熱二五神香散新和二十四逆湯熱十四黃邪丸新熱二一四味回陽飲新熱一參薑飲新熱八啓脾丸和八六和胃飲新和五平胃散和十七六味回陽飲新熱二五苓散和一八二橘皮湯和十一熱五六和胃二陳煎新和三一氣丹新熱二二除濕湯和一七七苓朮二陳煎新和四排氣飲新和六茱萸湯熱一三七生薑半夏湯熱五二豬苓散和一二五竹茹湯和一二一半夏乾薑散熱五三保和丸小三五萬應丸攻九九茯苓澤瀉湯熱七四六一散寒百十二香藿飲和一六九五物香薷飲和百七十白虎湯寒二太清飲新寒十三藿香安胃散熱七一抽薪飲新寒三黃芩湯和一九八藿香正氣散和二十柴陳煎新散九抑青丸寒一四九橘皮半夏湯和十三大半夏湯和十小半夏湯和八半夏瀉心湯寒二八大分清飲新寒五小分清飲新和十局方四七湯和九七大和中飲新和七小和中飲新和八竹葉石膏湯寒五小柴胡湯散十九正柴胡飲新散六仲景烏梅丸和三二三麥門冬湯寒四四丁香煮散熱六一大黃甘草湯攻十三大七香丸和一三一不換金正氣