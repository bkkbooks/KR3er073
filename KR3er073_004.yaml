body:
  text: 卷之四道集脈神章上內經脈義部位一部位解見後章脈要精微論曰尺內兩傍則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛中事也脈度二五十營篇曰天周二十八宿人經二十八脈周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺二百七十息氣行十六丈二尺一周於身五百四十息氣行再周於身二千七百息氣行十周於身一萬三千五百息氣行五十周於身水下百刻日行二十八宿漏水皆盡脈終矣故五十營備得盡天地之壽凡行八百一十丈也三部九候三三部九候論帝曰願聞天地之至數合於人形血氣通決死生為之奈何岐伯曰天地之至數始於一終於九焉一者天二者地三者人因而三之三三為九以應九野故人有三部部有三候以決死生以處百病以調虛實而除邪疾帝曰何謂二部曰有下部有中部有上部部各有三候三候者有天有地有人也上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手太陰也中部地手陽明也中部人手少陰也下部天足厥陰也下部地足少陰也下部人足太陰也故下部之候天以候肝地以候腎人以候脾胃之氣中部之候天以候肺地以候胸中之氣人以候心上部之候天以候頭角之氣地以候口齒之氣人以候耳目之氣帝曰以候奈何岐伯曰必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之按寸口脈亦有三部九候三部者寸關尺也九候者三部中各有浮中沉也察三部可知病之高下如寸為陽為上部主頭項以至心胸之分也關為陰陽之中為中部主臍腹胠脅之分也尺為陰為下部主腰足脛股之分也三部中各有三候三而三之是為九候如浮主皮膚候表及府中主肌肉以候胃氣沉主筋骨候里及臟此皆診家之樞要當與本篇互相求察也七診四三部九候論帝曰何以知病之所在岐伯曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病詳此獨字即醫中精一之義診家綱領莫切於此今見諸家言脈悉以六部浮沉鑿分虛實顧不知病本何在既無獨見焉得確真故寶命全形論曰衆脈不見衆凶弗聞外內相得無以形先是誠察病之祕旨必知此義方可言診外有獨論在後中卷當參閲之六經脈體五平人氣象論曰太陽脈至洪大以長少陽脈至乍疏乍數乍短乍長陽明脈至浮大而短至真要大論曰厥陰之至其脈鉤少陰之至其脈鈞太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長按此二篇之論蓋前言陰陽之盛衰後分六氣之專主辭若稍異義實相符詳具類經脈色類第十四篇所當兼閲四時脈體六玉機真藏論岐伯曰春脈如弦春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長故曰弦反此者病帝曰何如而反岐伯曰其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中夏脈如鉤夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病何如而反曰其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中秋脈如浮秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病何如而反曰其氣來毛而中央堅兩傍虛此謂太過病在外其氣來毛而微此謂不及病在中冬脈如營冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營反此者病何如而反曰其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中帝曰四時之序脾脈獨何主岐伯曰脾脈者土也孤藏以灌四傍者也帝曰脾之善惡可得見乎曰善者不可得見惡者可見其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中按本篇中外二字乃指邪正為言也蓋邪氣來於外元氣見於中邪氣之來皆有餘故太過則病在外元氣之傷惟不足故不及則病在中也又凡脾家有病必有形見故惡者可見若其無病則陰行灌濡五臟攸賴而莫知其然故善者不可得見是即所謂胃氣也玉機真臟論曰所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈甚至皆懸絶沉澀者命曰逆四時未有藏形於春夏而脈沉澀秋冬而脈浮大名曰逆四時也宣明五氣篇曰春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈是謂五邪皆同命死不治胃氣七玉機真藏論曰脈弱以滑是有胃氣命曰易治終始篇曰邪氣來也緊而疾穀氣來也徐而和平人氣象論曰平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有石曰冬病毛甚曰今病臟真散於肝肝藏筋膜之氣也夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有毛曰秋病石甚曰今病臟真通於心心臟血脈之氣也長夏胃微軟弱曰平弱多胃少曰脾病但代無胃曰死軟弱有石曰冬病弱甚曰今病臟真濡於脾脾藏肌肉之氣也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病臟真高於肺以行營衛陰陽也冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病臟真下於腎腎藏骨髓之氣也胃之大絡名曰虛里貫膈絡肺出於左乳下其動應長脈宗氣也盛喘數絶者則病在中結而橫有積矣絶不至曰死乳之下其動應衣宗氣泄也詳代脈之義本以更代為言如宣明五氣篇曰脾脈代者謂胃氣隨時而更此四時之代也根結篇曰五十動而不一代者謂五臟受氣之盛衰此至數之代也本篇曰但代無胃曰死者謂代無真臟不死也由此觀之則凡見忽大忽小乍遲乍數倏而更變不常者均謂之代自王叔和云代脈來數中止不能自還脈代者死自後以此相傳遂失代之真義平人氣象論曰人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也凡肝脈但弦腎脈但石名為真臟者以其無胃氣也若肝當弦而不弦腎當石而不石總由穀氣不至亦以其無胃氣也此舉肝腎而言則五臟皆然六變八邪氣臟腑病形篇曰諸急者多寒緩者多熱大者多氣少血小者氣血皆少滑者陽氣盛微有熱澀者少血少氣微有寒諸小者陰陽形氣俱不足勿取以針而調以甘藥也按本篇正文曰澀者多血少氣微有寒多血二字乃傳寫之誤也觀本篇下文曰刺澀者無令其血出其為少血可知仲景曰澀者營氣不足是亦少血之謂內外上下九脈要精微論曰推而外之內而不外有心腹積也推而內之外而不內身有熱也推而上之上而不下腰足清也推而下之下而不上頭項痛也脈色十邪氣臟腑病形篇曰見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工夫色脈與尺之相應也如桴鼓影響之不得相失也此亦本末根葉之出候也根死則葉枯矣故知一則為工知二則為神知三則神且明矣色青者其脈弦也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣人迎氣口十一五色篇雷公曰病之益甚與其方衰如何黃帝曰外內皆在焉切其脈口滑小緊以沉者病益甚在中人迎氣大緊以浮者其病益甚在外其脈口浮滑者病日進人迎沉而滑者病日損其脈口滑以沉者病日進在內其人迎脈滑盛以浮者其病日進在外人迎盛堅者傷於寒氣口盛堅者傷於食詳人迎本足陽明之經脈在結喉兩傍氣口乃手太陰之經脈在兩手寸口人迎為腑脈所以候表氣口為臟脈所以候里故曰氣口獨為五臟主此內經之旨也所以後世但診氣口不診人迎蓋以脈氣流經經氣歸於肺而肺朝百脈故寸口為脈之大會可決死生而凡在表在裡之病但於寸口諸部皆可察也自王叔和誤以左手為人迎右手為氣口且云左以候表右以候里豈左無里而右無表乎訛傳至今其誤甚矣詳義見後十六卷勞倦內傷門及類經臟象類第十一篇脈從病反十二至真要大論帝曰脈從而病反者其診何如岐伯曰脈至而從按之不鼓諸陽皆然帝曰諸陰之反其脈何如曰脈至而從按之鼓甚而盛也脈至而從者如陽證見陽脈陰證見陰脈是皆謂之從也若陽證雖見陽脈但按之不鼓而指下無力則脈雖浮大便非真陽之候不可誤認為陽證凡諸脈之似陽非陽者皆然也或陰證雖見陰脈但按之鼓甚而盛者亦不得認為陰證搏堅軟散十三脈要精微論曰心脈搏堅而長當病舌卷不能言其軟而散者當消環自已肺脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其軟而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也胃脈搏堅而長其色赤當病折髀其軟而散者當病食痹脾脈搏堅而長其色黃當病少氣其軟而散色不澤者當病足胻腫若水狀也腎脈搏堅而長其色黃而赤者當病折腰其軟而散者當病少血至令不復也帝曰診得心脈而急此為何病岐伯曰病名心疝心為牡臟小腸為之使故少腹當有形也帝曰診得胃脈何如曰胃脈實則脹虛則泄寸口諸脈十四平人氣象論曰寸口之脈中手短者曰頭痛寸口脈中手長者曰足脛痛寸口脈中手促上擊者曰肩背痛寸口脈沉而堅者曰病在中寸口脈浮而盛者曰病在外寸口脈沉而弱曰寒熱及疝瘕少腹痛寸口脈沉而橫曰脅下有積腹中有橫積痛寸口脈沉而喘曰寒熱脈盛滑堅者病在外脈小實而堅者病在內脈小弱以澀謂之久病脈滑浮而疾者謂之新病脈急者曰疝瘕少腹痛脈滑曰風脈澀曰痹緩而滑曰熱中盛而緊曰脹臂多青脈曰脫血尺脈緩澀謂之解㑊安臥脈盛謂之脫血尺澀脈滑謂之多汗尺寒脈細謂之後泄脈尺粗常熱者謂之熱中諸脈證十五脈要精微論曰夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶者死粗大者陰不足陽有餘為熱中也來疾去徐上實下虛為厥巔疾來徐去疾上虛下實為惡風也故中惡風者陽受氣也有脈俱沉細數者少陰厥也沉細數散者寒熱也浮而散者為眴僕諸浮不躁者皆在陽則為熱其有躁者在手諸細而沉者皆在陰則為骨痛其有靜者在足數動一代者病在陽之脈也泄及便膿血澀者陽氣有餘也滑者陰氣有餘也陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒按之至骨脈氣少者腰脊痛而身有痹也陰陽別論曰陰陽虛腸闢死陽加於陰謂之汗陰虛陽搏謂之崩病治易難十六平人氣象論曰風熱而脈靜泄而脫血脈實病在中脈虛病在外脈澀堅者皆難治命曰反四時也玉機真藏論曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣命曰易治形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時為不可治必察四難而明告之病熱脈靜泄而脈大脫血而脈實病在中脈實堅病在外脈不實堅者皆難治按此二篇之義如前篇言病在中脈虛者為難治後篇言病在中脈實堅者為難治前言病在外脈澀堅者為難治後言病在外脈不實堅者為難治前後若乎相反何也蓋實邪在中者脈不宜虛虛邪在中者脈不宜實也陽邪在表者宜滑而軟不宜澀而堅外邪方盛者宜實而大不宜虛而小也此中各有精義或者以其為誤是不達耳真臟脈十七陰陽別論曰脈有陰陽知陽者知陰知陰者知陽凡陽有五五五二十五陽所謂陰者真藏也見則為敗敗必死也所謂陽者胃脘之陽也別於陽者知病處也別於陰者知死生之期玉機真藏論曰真肝脈至中外堅如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死諸真臟脈見者皆死不治也黃帝問曰見真臟者死何也岐伯曰五臟者皆稟氣於胃胃者五臟之本也藏氣者不能自致於手太陰必因於胃氣乃至於手太陰也故邪氣勝者精氣衰也病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死按此胃氣即人之陽氣陽氣衰則胃氣弱陽氣敗則胃氣絶矣此即死生之大本也所謂凡陽有五者即五臟之陽也凡五臟之氣必互相灌濡故五臟之中必各兼五氣此所謂二十五陽也是可見無往而非陽氣亦無往而非胃氣無胃氣即真臟獨見也故曰死關格十八六節藏家論曰人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰人迎與寸口俱盛四倍以上為關格關格之脈羸不能極於天地之精氣則死矣本篇脈證具載關格門當詳察之孕脈十九平人氣象論曰婦人手少陰脈動甚者任子也陰陽別論曰陰搏陽別謂之有子腹中論帝曰何以知懷子之且生也岐伯曰身有病而無邪脈也本篇諸義具詳婦人門胎孕條中乳子脈二十通評虛實論帝曰乳子而病熱脈懸小者何如岐伯曰手足溫則生寒則死帝曰乳子中風熱喘鳴肩息者脈何如曰喘鳴肩息者脈實大也緩則生急則死此條詳義具載小兒本門
