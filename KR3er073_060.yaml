body:
  text: 卷之六十宙集古方八陳因陳以下眼目方原機當歸補血湯治男婦亡血過多以致睛珠疼痛不能視物羞明酸澀眼光無力眉骨太陽痠痛當歸熟地黃各二錢白芍藥牛膝白朮生地黃天門冬各一錢川芎防風炙甘草各五分水二鍾煎八分稍熱服如噁心不進食者加生薑煎益氣聰明湯治目中內障初起視覺昏花神水淡緑色或淡白色久則不睹漸變純白或視物成二等證並治耳聾耳鳴人參黃耆各五錢升麻葛根炙甘草各三錢芍藥黃柏各二錢蔓荊子錢半上每服四五錢水二鍾煎一鍾臨睡熱服五更再服東垣蔓荊子湯治勞倦飲食不節內障眼病此方如神蔓荊子二錢半人參黃耆各一兩炙甘草八錢黃柏酒拌炒四遍白芍藥各三錢上㕮咀每服四五錢水二盞煎一盞去柤臨臥溫服益陰腎氣丸治足三陰虧損虛火上炎致目睛散大視物不的或昏花緊澀作痛羞明或卒見非常等證其功與六味還少丹同類熟地二兩酒洗生地歸尾酒洗丹皮五味山藥山茱萸柴胡茯苓澤瀉各二錢半煉蜜丸桐子大水飛硃砂為衣每服五七十丸空心淡鹽湯下濟陰地黃丸治證同上熟地倍用山藥山茱萸當歸枸杞巴戟肉麥冬肉蓯蓉五味子甘菊花各等分煉蜜丸桐子大每服七八十丸空心白湯下神效黃耆湯方在補陳治目緊縮小及羞明畏日視物不明局方明目地黃丸治男婦肝腎俱虛風邪所乘熱氣上攻翳障目澀多淚熟地黃生地黃各一斤牛膝三兩石斛枳殼杏仁去皮尖炒防風各四兩煉蜜丸桐子大每服七八十丸食前鹽湯下簡易加減駐景丸治肝腎氣虛兩目昏暗視物不明熟地當歸各五兩菟絲子酒煮八兩枸杞車前子炒五味子各二兩楮實子川椒炒各一兩上為末煉蜜丸桐子大每服七八十丸食前溫酒下東垣滋陰地黃丸治足三陰虧損虛火上炎致目睛散大視物不的或昏花緊澀作痛羞明兼眵多燥熱赤爛者一名干熟地黃丸熟地一兩歸身酒製黃芩各半兩天冬焙甘草炙枳殼柴胡五味子各三錢人參地骨各二錢黃連三錢生地酒洗一兩半煉蜜丸桐子大每服百丸食前茶湯下日三服謙甫還睛散治翳膜遮睛昏澀淚出瘀血胬肉攀睛川芎龍膽草草決明石決明荊芥穗甘菊花茺蔚子楮實子白茯苓各一兩白蒺藜炒木賊甘草各七錢川椒炒出汗一錢上為細末每服二錢食後茶清調下日三服忌一切雞魚厚味及蕎麥麵熱物八味還睛散治肝肺停留風熱翳膜遮睛痛澀眵淚白蒺藜炒去刺防風甘草木賊山梔仁各七錢草決明一兩炒青葙子二錢半炒蟬蛻二錢上為細末每服二錢食後麥門冬湯調服還睛丸治男婦風毒上攻眼目腫痛怕日羞明多眵陷澀難開瞼眥紅爛瘀肉攀睛或暴赤痛甚又治偏正頭風頭痛皆有奇效白朮菟絲子制青葙子防風羌活白蒺藜炒去刺密蒙花木賊炙甘草等分煉蜜丸彈子大每服一丸細嚼白湯送下空心食前日二服正傳祖傳固本還睛丸治遠年一切目疾內外翳膜遮睛風弦爛眼及老弱人目眵多糊迎風冷淚視物昏花等症悉皆治之天門冬酒浸一宿另研如泥麥門冬生地黃酒浸焙熟地黃酒洗各三兩人參白茯苓乾山藥枸杞各兩半川牛膝酒洗石斛酒洗草決明微炒杏仁去皮另研枳殼麵炒黃菟絲子酒浸煮甘菊花用小金錢各一兩羚羊角細銼取淨末烏犀角銼用青葙子微炒防風去蘆各八錢五味子焙乾炙甘草黃連去須白蒺藜取仁川芎各七錢上為末蜜丸梧子大每服五七十丸鹽湯下定志丸方在補陳治陽氣不足眼目不能近視地芝丸治目不能遠視但可近視或並不能乃陰氣不足也宜用此方生地黃四兩天冬枳殼麵炒甘菊花各一兩煉蜜丸桐子大每服百丸茶清或溫酒下東垣助陽和血湯治眼發之後猶有上熱白睛赤色隱澀難開而多眵淚等證黃耆當歸酒洗柴胡炙甘草防風各五分升麻七分白芷三分蔓荊子二分水煎熱服東垣芎辛散治兩眼風熱晝夜隱澀難開羞明惡日視物昏暗赤腫而痛細辛二分芎藭蔓荊子各五分甘草白芷各一錢防風一錢半上㕮咀水二盞煎一盞臨臥溫服東垣明目細辛湯治兩目發赤微痛羞明畏日怯風惡燈火多眵隱澀鼻塞流涕津唾稠黏大便微硬細辛麻黃羌活蔓荊子防風藁本川芎荊芥穗白茯苓各四分生地黃歸尾各八分花椒七粒水二鍾煎八分食後臨臥稍熱服決明夜光散治眼目夜昏雖有燈月亦不能視石決明夜明砂各二錢豬肝一兩上以藥為末乃將竹刀切肝為二片鋪藥於內合定用麻皮縛之以米泔水一碗用砂鍋煮至半碗臨臥連肝連汁俱服之石斛夜光丸治神水散大昏如霧露眼前黑花睹物成二久而光不收斂及內障瞳人淡白緑色石斛酒洗五錢人參生地熟地酒洗麥門冬天門冬白茯苓防風草決明黃連酒炒各一兩羚羊角鎊犀角鎊川芎炙甘草枳殼麵炒青葙子微炒五味子炒肉蓯蓉酒洗去鱗炙各五錢牛膝酒洗白蒺藜炒去刺菟絲子制家菊花山藥杏仁枸杞各七錢上為末煉蜜丸梧子大每服三五十丸溫酒鹽湯任下東垣瀉熱黃連湯亦名黃連飲子治眼暴發赤痛黃連酒炒黃芩酒炒龍膽草生地柴胡各一錢升麻五分水煎於午前或飯後熱服東垣黃芩黃連湯治兩眼血熱赤痛黃芩黃連草龍膽俱各酒洗炒生地酒洗上等分㕮咀每用五錢水二盞煎一盞去柤熱服東垣當歸龍膽湯治眼中白翳歸身龍膽草酒洗黃芩酒炒黃柏酒炒芍藥各八分黃耆黃連甘草各五分防風羌活升麻柴胡五味子石膏各五分水二盞煎一盞去柤入酒少許臨臥熱服忌言語芍藥清肝散方在寒陳治赤脈貫晴眵多眊燥緊澀羞明臟腑祕結蟬花散治肝經風熱毒氣上攻眼目赤痛及一切內外翳障蟬蛻甘菊花穀精草羌活甘草炒白蒺藜炒草決明梔子炒防風密蒙花荊芥穗木賊川芎蔓荊子黃芩各等分上為末每服二錢食後茶清調下五味瀉白散治風熱翳膜血筋一切肺熱外障當歸生地芍藥梔子黃芩各等分每服三五錢為散為湯任服明目羊肝丸治肝虛風熱冷淚赤澀內外障眼黃連三兩家菊花龍膽草石決明煅人參當歸熟地枸杞麥冬牛膝青鹽黃柏柴胡防風羌活各八錢肉桂四錢羯羊肝一具烙干為末上為末煉蜜丸桐子大每服三四十丸溫湯下黃連羊肝丸治前證單用黃連一味同羊肝俱為末煉蜜丸服濟生方用生羊肝去筋膜同黃連搗丸桐子大每服五六十丸溫水下黃連天花粉丸治兩眼赤痛眵多眊燥緊澀羞明赤脈貫睛臟腑祕結黃連酒炒天花粉家菊花川芎薄荷葉連翹各一兩黃芩梔子各四兩黃柏酒炒六兩上為細末滴水丸梧子大或用蜜丸每服五七十丸或百丸食後臨睡茶湯下局方密蒙花散治風氣攻注兩眼昏暗眵淚羞明並暴赤腫翳障密蒙花羌活白蒺藜炒木賊石決明各一兩甘菊三兩上為末每服二錢食後茶清調下春雪膏點赤眼朴硝置豆腐上蒸之待流下者瓦器盛點之玄明春雪膏治時氣熱眼玄明粉半兩月石三錢冰片三分上乳無聲瓷罐密收用時點二大眥內龍腦黃連膏點赤熱眼龍腦一錢黃連去毛淨酒炒八兩先銼黃連令碎以水四碗貯砂鍋內入連煮至一大碗濾去滓入薄瓷碗內重湯煮成膏半盞許以龍腦為引或用時旋入尤妙立消膏治浮翳宿障霧膜遮晴雪白鹽淨器中生研如塵上以大燈草蘸鹽少許輕手指定浮翳點上凡三次即沒亦不疼痛黃連甘石散治眼眶破爛畏日羞明爐甘石制一斤黃連四兩龍腦量加先以黃連研極細同甘石再研俱用細皺紗篩過收貯用時取一二兩加入龍腦用井花水調如稠糊臨睡抹敷破爛處不破爛者點眼內眥勿使入眼珠內為妙黃連人參膏治目赤癢痛宣黃連人參各五分或一錢上切碎用水一小鐘同浸飯鍋蒸少頃取出冷定頻點眼角自愈或於臨用時研入冰片少許更妙一方但用人乳浸黃連頻點眥中抱朴子云治目中百病一方用黃連少加生白礬以人乳浸蒸點抹眼角大效丹砂散點治諸眼皆妙此李時珍方也硼砂海螵蛸去殼爐甘石上好者煅淬童便七次飛各一兩硃砂五錢用此則不黏上為極細末瓷瓶收貯臨用少加冰片研點極妙清涼膏治眼目赤腫不能開痛悶熱淚如雨生南星腦荷葉各半兩荊芥百藥煎如無即用文蛤上各三錢為末井水調成膏點眼角上自然清涼正傳光明丹治一切風熱上壅兩目赤腫澀痛爛弦風眼及內外翳障制甘石一兩硃砂一錢硼砂二錢輕粉五分冰片三分麝香一分以上用乳鉢研極細收貯為君如眼赤腫痛加乳香沒藥各五分內外翳障加珍珠五分膽礬二分爛弦風眼加銅緑五分黃丹五分或以諸藥合一以治諸般眼疾上各研為細末並一處再研二日用瓷器密收勿令泄氣點服絶妙青火金針治頭風牙痛赤眼火硝一兩青黛一錢腦荷川芎各五分上為細末口噙冷水勿咽用此藥吹鼻赤火金針治赤眼頭風冷淚鼻塞耳鳴牙疼火硝一兩川芎雄黃乳香沒藥石膏各一錢上為細末每服一二分如前吹鼻三次愈吹鼻六神散治眼目暴發赤腫熱淚昏澀及頭腦疼痛焰硝提淨五錢白芷雄黃乳香制沒藥制腦荷葉各一錢上為細末瓷罐收貯左吹左右吹右先令病人口含水吹之其氣上行須臾覺效頭痛吹法亦然或兩鼻皆吹之若久患眼疾者不可吹東垣點鹽法明目去昏翳大利老眼得補法之良用海鹽二斤揀淨以百沸湯泡濾取清汁於銀石器內熬取雪花白鹽瓷器盛貯每早用一錢擦牙以水漱口用左右手指互以口內鹽津細洗兩眼大小眥內閉目良久卻用水洗面能洞視千里明目堅齒極妙之法蘇東坡手録目赤不明昏花老眼惟宜此法大效洗爛弦風赤眼方一名萬金膏此藥之效如神人家所不可少無目病則以施人價廉功倍濟人甚大文蛤黃連去毛淨防風荊芥穗各五錢苦參四錢銅緑五分上為極細末外以薄荷煎湯丸彈子大臨用時以熱水化開乘熱洗眼日三次立愈神效一方有當歸川芎各四錢傅爛絃歌爛弦百藥煎為奇研細湯澄柤去之熬作稀膏入輕粉鹽湯洗了敷之宜搜風散箍風熱眼及腫痛黃連大黃朴硝黃丹等分上為末以苦參煎湯少加煉過白蜜同調敷眼四弦甚妙拜堂散敷風赤熱眼倒睫爛弦五倍子不拘多少為末蜜水調敷患處湯泡散治肝虛風熱攻眼赤腫羞明漸生翳膜杏仁防風黃連去須赤芍藥歸尾各半兩銅青二錢薄荷葉三錢上銼散每用三四錢沸湯泡乘熱先熏後洗冷則再暖又洗每日三兩次一方加白鹽少許閉目沃洗尤能散血收淚散治風淚不止海螵蛸五分冰片少許緑爐甘石一錢上乳極細末點大眥角淚即收上二藥以燥濕片腦以辛散去星凡胡椒韭菜根橘葉菊葉之類皆可杵爛為丸用棉裹塞鼻中觸之過夜則星自下眼目打傷青腫以生半夏為末水調塗之即愈明目第一方此方始於上陽子以授魯東門左丘明杜子夏左太衝凡此諸賢皆有目疾得此皆愈夜省看書一減思慮二專內視三簡外視四晨興遲五夜眠早六凡此六事熬以神火下以氣飲蘊於胸中納諸方寸修之一時長服不已非但明目亦可延年以下耳病方桂星散治風閉耳聾官桂川芎當歸石菖蒲細辛木通木香白蒺藜炒去刺麻黃去節甘草炙各一錢白芷梢天南星煨裂各錢半水二鍾蔥白二根紫蘇五葉薑五片煎八分食後服一方加全蠍去毒一錢類方復元通氣散治諸氣閉澀耳聾及腹癰便癰瘡疽無頭者能止痛消腫青皮橘紅各四兩甘草炙三寸連翹一兩上為末熱酒調服一二錢補腎丸治腎虛耳聾巴戟去心乾薑炮白芍藥山茱萸人參黃耆當歸熟地黃遠志制肉蓯蓉酒浸菟絲子制蛇床子牡丹皮附子炮石斛細辛澤瀉桂心甘草各二兩石菖蒲一兩茯苓半兩防風一兩半羊腎二枚上為末將羊腎用酒煮研爛仍加酒煮