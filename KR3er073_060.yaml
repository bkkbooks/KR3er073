自然汁調輕粉敷破處無痕止鼻衄方龍骨為細末吹入鼻中少許即止凡九竅出血者用此皆能治之止鼻衄歌石榴花瓣可以塞蘿蔔藕汁可以滴火煅龍骨可以吹水煎茅花可以吃又牆頭苔蘚可以塞車前草汁可以滴火燒蓮房可以吹水調鍋煤可以吃鼻衄蒸法治衄如湧泉不止者用草紙摺十餘層井花水濕透分發貼頂心中以熱尉斗尉之微熱不妨久之即止鼻塞不通蔥尉法但用蔥頭以繩束成一把去根頭實處切成寸長一餅先以尉斗烙蔥一面令熱置頂心囟會穴處乃以尉斗或火從上尉之俟鼻內作蔥氣方住未通再作餅尉之其有嬰兒傷風鼻塞不能吮乳者但用大南星為末以生薑自然汁和作薄餅用兩掌合暖置囟上片時即通硝石散治風邪犯腦患頭痛不可忍不問年歲硝石人中白等分冰片少許上為末用一字吹入鼻中良方通關散治卒然牙關緊急腰背反張藥不能咽或時毒癰腫鼻塞氣閉等證細辛如無真者不用亦可薄荷葉牙皂角等分上為細末以紙捻少許入鼻內候得噴嚏口開隨進湯藥聖惠搐鼻法止用二味無薄荷陳氏通關散方在痘疹通心經降心火利小便良方擦牙通關散方在小兒治風搐關竅不通痰塞中脘留滯百節以下口舌方良方玄參散治滿口並舌生瘡連齒齦爛痛玄參黃芩黃柏梔子仁大黃前胡獨活犀角屑麥冬升麻炙甘草各等分上為咀每服五錢水一鍾半煎七分不拘時溫服玄參升麻湯方在外科治口舌生瘡重舌木舌腮頰咽喉腫痛斑疹瘡瘍清涼飲子治上焦積熱口舌咽鼻乾燥黃芩黃連各二錢薄荷玄參當歸芍藥各錢半甘草一錢水二鍾煎八分不拘時服大便祕結加大黃二錢清熱化痰湯治上焦有熱痰盛作渴口舌腫痛貝母天花枳實桔梗各一錢黃芩黃連各錢二分玄參升麻各七分甘草五分水煎服甘露飲方在寒陳治口舌生瘡咽喉腫痛牙齦潰爛龍膽瀉肝湯方在寒陳治肝火內炎上為喉口熱瘡下為小便澀痛等症五福化毒丹方在外科治咽喉牙口瘡毒癰腫良方冰柏丸治舌瘡口瘡薄荷葉蘇州者黃柏等分硼砂半之冰片一分上為末生蜜丸彈子大每服一丸噙化上清丸治口舌生瘡咽喉腫痛止嗽清音寬膈化痰極效砂仁桔梗各一錢月石二錢冰片一分甘草玄明粉訶子各一錢百藥煎八錢蘇州薄荷葉一兩六錢為極細末煉蜜丸芡實大臨睡含化一丸或為小丸茶清送下硼砂丸治口瘡舌瘡寒水石一兩牙硝四錢硼砂二錢冰片麝香各一分甘草膏和丸麻子大不時含化一丸津咽良方聖金散治舌上出血不止黃藥子一兩青黛一錢上為細末每服一錢食後新汲水調下日二服金花煎治舌上出血如簪孔黃柏三兩黃連五錢梔子二十枚上咀以水二升浸一宿煮三沸去滓頓服一方用酒浸煮飛礬散治木舌漸腫大滿口若不急治即殺人白礬飛百草霜等分上為細末捻糟茄自然汁調服若口噤灌之妙寸金散治心經煩熱動血妄行舌上出血不止新蒲黃三錢新白麵三錢牛黃五分研腦荷五分研上研勻每服一錢生藕汁調服食後亦可摻舌上黃柏散治舌出血不止名曰舌衄黃柏不拘多少塗蜜慢火炙焦為末上每服二錢溫米飲調下舌上出血重出升麻黃連丸治多食肥甘口臭穢惡升麻半兩黃連黃芩酒炒生薑檀香甘草各二錢青皮半兩上為細末湯泡蒸餅丸彈子大每服一丸不拘時細嚼白湯下丁香丸治口臭穢丁香二錢川芎二錢白芷五分炙甘草一錢上為末煉蜜丸彈子大綿裹一丸噙化應手散治傷寒舌出寸余連日不收梅花冰片為末搽舌上應手而收重者須用一錢方收陰陽散亦名赴筵散治口瘡效黃連一兩乾薑炒黑三錢為細末乾摻口瘡上涎出即愈外科陰陽散方在外科治瘡屬半陰半陽者緑雲散治口瘡爛臭久不愈黃柏蜜炙青黛等分上為細末臨臥用少許摻舌咽津妙細辛黃柏散治口舌瘡黃柏細辛等分上為末敷之或摻舌上吐涎水再敷須旋合之白蠶黃柏散治口糜黃柏蜜炙白殭蠶直者新瓦上烙乾斷絲上為細末用少許敷瘡上吐涎硼砂散治口瘡硼砂青黛龍腦薄荷石膏煅各等分上為極細末每用少許臨臥敷口中黃蓮朴硝散治口瘡絶妙黃連朴硝白礬各五錢薄荷葉一兩上為粗末用臘月黃牛膽將藥入膽內風前挂兩月取下如遇口瘡旋將藥研細敷之去其熱涎即愈柳華散治熱毒口瘡黃柏炒蒲黃青黛真者人中白煅上等分為末敷之摻口瘡天竺黃月石等分冰片少許為末摻之碧雪治一切熱壅口舌生瘡舌強腮腫咽喉腫痛等症蒲黃青黛硼砂焰硝甘草等分上為細末每用少許摻舌上細細咽下或飲涼水送下頻用之效或用砂糖丸芡實大每服一丸噙化下咽妙絳雪治口瘡舌瘡咽喉腫痛硼砂一錢硃砂三錢馬牙硝寒水石飛各二錢冰片半字上為細末每用一字摻舌上咽亦不妨喉痛者吹入咽中孫真人口瘡方單用朴硝含之甚良皂角散治重舌喉痹皂角不蛀者四五挺去皮核炙焦荊芥穗二錢上為細末以米醋調塗腫處千金口臭方亦治舌上出血如簪孔用香薷一把以水一斗煮取三升稍稍含漱咽之聖惠口齒方治口臭穢及齒慝腫痛用北細辛一兩煮取濃汁熱漱冷即吐之立效以下齒牙方東垣神功丸治多食肉人口臭不可近牙齒疳蝕牙齦肉脫血出並治血崩血痢腸風下血及逆氣上行等證黃連酒洗砂仁各五錢生地甘草各三錢當歸木香藿香葉升麻蘭葉各一錢無亦可上為末以湯浸蒸餅和丸緑豆大每服百丸或二百丸白湯食遠服東垣清胃散方在寒陳治齒齦潰爛喜冷惡熱祕驗清胃飲方在寒陳治一切風熱牙床腫痛出血動搖三因安腎丸治腎虛牙齒腫痛此與局方安腎丸同但少肉桂茯苓二味方在熱陳直指立效散治牙痛不可忍痛連頭腦項背微惡寒飲大惡熱飲防風一錢升麻七分炙甘草細辛葉各三分草龍膽酒洗四分上用水一鍾煎五分去滓以匙抄在口中煠痛處少時立止如多惡熱飲更加草龍膽一錢此法不定宜隨寒熱多少臨時加減若惡風作痛須去草龍膽加草豆蔻黃連各五分纍用得效細辛煎治牙齒腫痛不可忍及口氣臭用北細辛一味煎濃汁乘熱噙漱良久吐之極妙驅毒飲治熱毒上攻宣露出血牙齦腫痛不可忍屋遊此即瓦上青苔不拘多少洗淨上用水煎湯澄清入鹽一撮頻頻漱之御藥丁香散治牙齒痛丁香蓽茇蠍梢大椒上等分為末每用少許擦於患處選要芫花散治風蟲諸牙痛芫花細辛川椒蘄艾小麥細茶等分上咀水一鍾煎七分溫漱之日三四次吐涎出即愈如神散治風牙蟲牙攻蛀疼痛牙齒動搖連頰浮腫川椒炒出汗蜂房炙上等分為細末每用二錢水煎數沸熱漱即止赴筵散治風蟲牙痛良薑草烏細辛荊芥穗上等分為末擦牙有涎吐之蟾酥膏治風蛀諸牙疼痛蟾酥少許巴豆去油研如泥杏仁燒焦上共研如泥以綿裹如粟米大若蛀牙塞入蛀處風牙塞牙縫中吐涎盡愈蟲牙痛蒼耳艾小麥花椒芫花黑豆煎熬屢漱之即愈韭子湯治蟲牙用韭菜子一撮以碗足盛之用火燒煙外用小竹梗將下截劈為四開以紙糊如喇叭樣引煙燻其蛀齒如下牙蛀者以韭子煎濃湯漱之蟲自出瑞竹堂方治蟲牙疼痛不已用天仙子不拘多少燒煙以竹筒抵牙引煙燻之其蟲即死巴豆丸治蟲牙疼痛蝕孔空虛巴豆一枚花椒五十粒細研上為極細末飯丸黍米大綿包塞蛀孔藜蘆散治蟲牙疼痛用藜蘆為末塞牙孔中勿令咽汁有涎吐之大有神效北棗丹治走馬牙疳用北棗去核每個內入信一釐燒存性研細每以些小敷患處青金散治走馬牙疳蝕損唇舌腐臭牙落其效如神銅緑砒霜等分上為細末每用些少敷患處三仙散治走馬牙疳一時腐爛即死銅緑三分麝香一分婦人溺桶中垢白者火煅一錢上為極細末敷齒上不可太多麝礬散治走馬牙疳危惡證候麝香少許膽礬一錢銅緑半兩白礬生用五分上為細末敷牙患處神授丹治牙疳枯礬七分白毯灰三分麝香一分為末以竹管吹瘡上黃連散治齒齦間出血吃食不得黃連白龍骨馬牙硝各一錢枯礬五分冰片半分上為細末每用少許敷牙根下雄黃麝香散治牙齦腫爛出血雄黃一錢半銅緑輕粉黃連黃丹炒各一錢血竭枯礬各五分麝香一分上為細末研勻每用些少敷患處齒縫出血上用紙紝子蘸乾蟾酥少許於血出處按之立止固齒雄鼠骨散治腎水不足牙齒浮動脫落或縫中痛而出血或但動不痛者雄鼠骨當歸沒石子熟地榆皮青鹽細辛等分上為細末用綿紙裹倏扱牙床上縫中則永固不落矣祕方雄鼠骨散治牙落可以重生雄鼠骨一具生打活雄鼠一個剝去皮雜用鹽水浸一時炭火上炙肉自脫落取骨炙燥入衆藥內同研為末香附白芷川芎桑葉曬乾地骨皮川椒蒲公英青鹽川槿皮旱蓮草上為末擦牙百日復出固齒無不效良方荊槐散治牙宣出血疼痛不止荊芥穗槐花上等分為末擦牙患處石膏升麻散治陽明風熱流注齒牙腫痛出血化為膿汁等證石膏羊脛骨灰地骨皮升麻上等分為末每用少許擦牙齒根上或加麝香少許更妙薑黃散治牙疼不可忍薑黃白芷細辛等分上為粗末擦患處須臾吐涎以鹽湯漱口面赤腫者去薑黃加川芎其腫立消濟生香鹽散牢牙去風大香附炒焦黑三兩青鹽一兩半上為末如常擦牙乃鐵甕先生良方子和牙宣散良薑胡椒蓽茇細辛乳香麝香雄黃青鹽下四味各另研上等分為細末先以溫水漱淨牙後以藥末擦患處追出涎沫吐之漱十餘次痛立止忌油鹽二日槐鹽散治食甘甜過多牙痛食鹽青鹽槐枝一斤切斷用水五碗煎一碗聽用上將二鹽先炒乾乃入槐枝湯煮乾取起為末用鉛盒盛擦牙固齒最妙椒鹽散治牙痛用清涼藥不效或反甚者宜從此以治川椒青鹽蓽茇薄荷荊芥穗細辛朝腦上為末擦痛牙處或煎湯漱之亦可宣風牢牙散駐顏補腎牢牙固齒細辛青鹽各七錢當歸酒洗川芎各一兩上為末每用少許清晨擦牙滿口漱良久連藥咽下或先以溫水漱口淨然後擦而咽之亦可萬氏青白散治一切牙疼固齒青鹽二兩食鹽川椒煎汁各四兩上以椒汁拌鹽炒乾為末擦牙永無齒疾以漱水洗面目亦無疾此藥極妙御前白牙散石膏四兩另研大香附一兩白芷七錢半甘松三奈藿香沉香川芎零陵香各三錢半細辛防風各半兩上為細末先以溫水漱口次擦之妙東垣白牙散升麻一錢羊脛骨灰二錢軟石膏三錢白芷七分麝香少許上為細末先以溫水漱口次擦之妙道藏經方治牙齒動搖血出不止用白蒺藜不拘多少搗為細末每日擦牙及患處最妙取牙不犯手草烏蓽茇各錢半川椒細辛各三錢上為細末每用少許點在患牙內外一時其牙自落以下咽喉方局方甘桔湯治一切風熱上壅咽喉腫痛錢氏方用甘草二錢苦梗一錢甘草二錢桔梗四錢水二鍾煎八分食後服此方加荊芥穗二三錢三因方即名荊芥湯尤效拔萃甘桔湯治熱腫喉痹甘草桔梗薄荷連翹黃芩各等分水二鍾加竹葉煎服一方有山梔子加味甘桔湯方在痘疹治咽喉腫痛醫林訶子甘桔湯治火盛失音訶子四個半生半煨桔梗一兩五錢半生半炒甘草二寸半生半炙上咀分二服每服水二鍾童便一鍾煎八分食後溫服清咽利膈散治咽喉腫痛痰涎壅盛防風金銀花荊芥薄荷桔梗黃芩黃連各一錢半山梔連翹玄參大黃朴硝牛蒡子炒研甘草各七分水二鍾煎一鍾食遠服消梨飲治喉痹單用消梨汁頻頻飲之或將梨削浸涼水中頻頻飲之尤妙此物大解熱毒或南方少梨之處但擇好蘿蔔杵汁加玄明粉徐飲大效醫林透天一塊冰治一切風熱喉痹口舌生瘡頭目不清痰涎壅盛黃連二錢腦荷月石檳榔蒲黃甘草各一錢荊芥穗黃柏各五分冰片半分或一分白砂糖半兩上為細末煉蜜為丸芡實大每服一丸噙化靛花丸治纏喉風聲不出靛花薄荷葉蘇州者上等分為細末煉蜜丸彈子大每服一丸臨睡噙化醫林杏仁煎治咳嗽暴重聲音不出杏仁泡去皮尖研如泥冬蜜薑汁砂糖各一小盞木通桑白皮去赤皮炒貝母紫菀茸北五味各一兩石菖蒲款冬蕊各半兩上將後七味為咀用水五升煎半去滓入杏蜜薑糖四味合和微火煎取一升半每服三合兩日夜服之三因蜜附子治隔陽咽閉吞吐不通及臟寒閉塞等證用大附子一枚去皮臍切作大片用蜜塗炙令黃含口中咽津甘味盡再塗蜜炙用或易之或用炮附子以唾津調塗腳心一方用肉桂含之牛黃益金散治虛火炎上傷肺咽喉生瘡破爛黃柏為末用蜜炙數次以熱為度另研為極細末白硼砂白殭蠶淨各錢半牛黃三分上用蜜調如稀糊塗敷患處或丸如龍眼大含化咽之按此方必加冰片半分方妙祕方三黃丸治喉痹極佳大黃黃連黃芩各一兩黃藥子白藥子各七錢半黃柏山豆根苦參各三錢月石京墨各錢半麝香少許冰片五分上為末豬膽調甑內蒸三次臨後入片麝硼砂為丸豆大噙化一丸津咽日夜常噙勿脫藥味方妙人參平補湯治腎虛聲啞不出人參川芎當歸熟地黃白芍藥白茯苓菟絲子制杜仲制北五味子白朮巴戟去心半夏曲橘紅各半兩牛膝酒洗破故紙炒益智仁葫蘆巴炒炙甘草各二錢半石菖蒲一錢半上咀每服五錢薑五片棗二枚煎七分吞山藥丸百餘粒凡五鼓後腎氣開時不得咳唾言語再進上藥則功效勝常百合丸治肺燥失聲不語百合百藥煎杏仁去皮尖訶子薏苡仁等分上為末雞子清和丸彈子大臨臥噙化或用蜜丸亦妙祕方竹衣麥門冬湯治一切勞瘵痰嗽聲啞不出難治者服之神效竹衣取金竹內衣膜鮮者一錢竹茹彈子大一丸即金竹青皮也刮取之竹瀝即取金竹者麥冬三錢甘草橘紅各五分白茯苓桔梗各一錢杏仁七粒去皮尖研上咀水一鍾半加竹葉十四片煎七分入竹瀝一杯和勻服射干丸治懸壅腫痛咽喉不利射干炙甘草各半兩川升麻川大黃木鱉仁各二錢半杏仁去皮尖雙仁麩炒微黃半兩上為細末煉蜜丸小彈子大常含一丸津咽醫林鐵笛丸治謳歌動火失音不語者神效薄荷葉四兩連翹桔梗甘草各二兩半訶子煨大黃酒蒸砂仁各一兩川芎一兩半百藥煎二兩上為細末雞子清和丸彈子大臨臥噙化一丸或煉蜜丸亦可三因雄黃解毒丸治急喉風雙蛾腫痛湯藥不下雄黃飛鬱金各一兩巴霜十四枚上為末醋糊丸緑豆大熱茶清下七丸吐出頑涎即蘇未吐再服大效如口噤以物斡開灌之下咽無有不活者如小兒驚熱痰涎壅塞或二丸三丸量大小與之一法以此丸三粒用醋磨化灌之其痰立出尤妙三因玉鑰匙治風熱喉痹及纏喉風月石五錢牙硝一兩半白殭蠶一錢冰片一字上為細末每用五分以竹管吹入喉中立愈此方加雄黃二錢即名金鑰匙濟生二聖散治纏喉風急喉痹膽礬二錢半白殭蠶炒半兩為細末用少許吹入喉中祕方奪命散治急喉風白礬枯殭蠶炒月石皂角炙煙盡各等分為細末每用少許吹喉中痰出即愈馬牙硝散治喉癰及傷寒熱後咽痛閉塞不通毒氣上衝馬牙硝細研每服一錢綿裹含咽津以通為度燒鹽散治喉中懸壅垂長咽中妨礙燒鹽枯礬各等分上和勻研細以箸頭蘸點即消寶鑑開關散治喉風氣息不通白殭蠶炒去絲嘴枯白礬等分上為細末每服二三錢生薑蜜水調下細細飲之七寶散治喉閉及纏喉風殭蠶直者十個硼砂雄黃全蠍十個全者去毒明礬牙皂一挺去皮弦各一錢膽礬五分上為細末每用一字吹入喉中即愈破關丹治乳蛾喉閉纏喉風等證硼砂末五錢霜梅肉一兩搗爛上二味和勻丸芡實大每服一丸噙化咽下內服荊防敗毒散通氣散方在外科治時毒腫甚咽喉不利取嚏以泄其毒以下諸毒方紫金錠一名神仙太乙丹一名玉樞丹一名萬病解毒丹解除一切中毒積毒蟲毒蠱毒茵菌砒石死牛死馬河豚等毒及時行瘟疫山嵐瘴氣喉閉喉風癲邪鬼氣狂亂迷死牙關緊急小兒急驚等證凡行兵興役之處尤不可無文蛤捶破洗焙淨末三兩山茨菰去皮淨末二兩千金子去油取霜一兩紅芽大戟去蘆焙乾為末一兩五錢麝香另研三錢上用糯米煮濃飲為丸分作四十錠每服半錠用井花水或薄荷湯磨服利一二次用粥止之若治癰疽惡毒湯火蛇蟲犬獸所傷以東流水磨服並敷患處如治癲邪鬼氣鬼胎攣急疼痛須暖酒磨服凡修合時日須用端午七夕重陽或天德月德日於淨室焚香修制凡奇怪之病屢用如神效驗不可盡述醫家大家皆不可一日無之三因解毒丸治誤食毒草或中蠱毒並百物毒救人於必死板藍根洗淨曬乾四兩貫衆去毛青黛研生甘草各一兩上為末煉蜜丸桐子大另以青黛為衣如稍覺精神恍惚即是誤中諸毒急取十五丸嚼爛用新汲水送下即解或用水浸蒸餅丸尤佳藍根散解毒藥熱藥諸毒藍根銼一握蘆根銼一握緑豆三錢研澱腳一合研上先將二根以水一碗煎至七分去滓次入後藥和勻分三服或一二服利下惡物不用再服白扁豆散解諸毒入腹及砒毒用白扁豆不拘多少為細末入青黛等分細研再入甘草末少許巴豆一枚去殼不去油別研為細末取一半入藥內外以砂糖一大塊用水化開和藥共成一大盞飲之毒隨利去後卻服五苓散之類八毒赤丸方在攻陳治一切邪崇鬼疰等毒飲食中毒凡中飲食毒而覺煩熱脹滿者急用苦參三兩苦酒一升半煮半沸陸續飲之吐食出即瘥或以水煮亦得或用犀角湯亦可解中酒毒飲酒中毒者經日不醒是也謂之中酒黑豆一升煮汁溫服一盞不過三盞即愈解面毒只以蘿蔔生啖之或搗汁服之麥面大熱蘿蔔能解其性或用大蒜嚼食之亦善解面毒解一切食毒解一切飲食之毒及飲酒不知中何毒卒急無藥可解者薺苨生甘草各二兩上銼細以水五盞同煎取二盞停冷去滓分三服一方加蜜少許同煎服之解一切毒食魚中毒凡食魚後中毒物煩亂者用陳皮濃煎汁服之即解河豚毒五倍子白礬等分上為細末水調服之一方凡中河豚魚毒一時困殆倉卒無藥急以清油多灌之使毒盡吐出即愈解河豚魚膾及食狗肉不消脹滿毒蘆柴根鮮者搗汁飲之乾者煎汁溫飲之解食鱔魚龜鱉蝦蟆自死禽獸等毒豆豉一合新汲水煎濃頓溫服之可解中蟹毒凡食蟹中毒用紫蘇葉濃煮汁飲之或用紫蘇子搗汁飲之亦良或搗藕汁或搗蒜汁飲之俱可解或用冬瓜汁或食冬瓜亦可食牛馬肉中毒粉草擂無灰酒服當吐瀉若渴者不可飲水飲水必死一方淡豆豉擂入乳服之即解食雞子毒好醋飲之即愈未愈再服食斑鳩毒葛粉二合水調服可解薑湯調服亦解解花椒毒有服川椒氣閉欲絶者冷水飲之解地漿水更妙解諸菜毒食後多腹脹者是毒也以醋解之解菌毒忍冬葉生啖之愈或煎濃汁飲之崇寧間蘇州天平山白雲寺僧五人行山間得菌一叢甚大摘而食之發吐三人急採怨鴦草生啖之即愈二人不甚吐至死此即忍冬藤亦名金銀花亦名鷺鷥藤也解巴豆毒其證口乾兩臉赤五心熱下利不止乾薑炮黃連微炒各等分上為細末每服二錢水調下如人行五里許再服又方煮緑豆湯冷服之即愈一方黃連甘草煎汁涼飲之一方芭蕉根葉搗汁飲之利止而安解砒毒凡中砒毒者其人煩躁如狂心腹絞痛頭眩嘔吐面色青黑四肢逆冷六脈洪數飲食中得者為易愈若空心酒醋服者難救以地漿水頓服若吐出又服所謂洗淨腹中毒全憑地上漿是也其法掘地成坑以水灌注攪成混水飲之謂之地漿又方解砒毒最良此為第一用生緑豆半升擂粉入新汲水攪和去柤取汁飲之又方用新鮮羊血鴨血飲之皆可解一方用甘草汁同藍汁飲之即愈鉤吻毒鉤吻生池旁與芹菜相似無他異惟莖有毛以此別之誤食殺人解之之法用薺苨八兩水六升煮取二升分溫二服此即甜桔梗也一方用桂湯效解附子等藥毒凡服附子酒多而覺頭重唇裂血流或見內熱諸證急用緑豆黑豆嚼服或搗汁飲之或濃煎二豆湯常飲食之凡服散風藥過多以致悶亂不省以醋灌之或濃煎甘草同生薑自然汁頓飲之一方大豆汁餳糖棗湯並能解附子毒一方用田螺搗碎調水飲之解烏頭草烏毒甘草煎濃湯服之或米醋調沙糖俱可解解半夏毒生薑搗汁飲之有中此毒口不能言倒地將死者速用薑汁灌之須臾自蘇解斑蝥芫青毒豬脂油和大豆汁飲之解藜蘆毒雄黃為末溫酒調服一錢一方煮蔥汁服解雄黃毒漢防己煎湯飲之有用雄黃擦瘡或熏陰囊瘡受毒者防己煎湯洗數次愈解杏仁毒藍子研水服則解解服丹毒地漿服之為上一方用蚌肉食之良解中藥箭毒交廣黎人以焦銅作箭中人破皮即死糞清飲之立解患處以糞塗洗之解鹽滷毒凡婦女有服鹽滷垂危者急取活鴨或雞斬去頭將頸塞口中以熱血灌之可解若滷多者必數只方足盡收其咸毒解漆毒一州牧以生漆塗囚眼囚即盲適一村叟見而憐之語之曰汝急尋蟹搗碎取汁滴眼內漆當隨汁流散瘡亦愈矣如其言覓得一小蟹用之目睛果愈略無損或成紅斑爛瘡取生蟹黃塗之不數次即愈一方用杉木煎汁洗之以下蟲毒方解虎傷毒麻油一碗飲之即無妨仍用葛根湯洗傷處綿試干香油塗之再以青布作條燃火入竹筒中放煙熏傷處口渴者沙糖調水飲之蛇毒凡被蛇傷即用針刺傷處出血用雄黃等藥敷之仍須中留一孔使毒氣得泄乃內服解毒等藥凡傷處兩頭俱用繩扎縛庶不致毒氣內攻流布經絡一方治毒蛇咬傷急取三七搗爛罨之毒即消散神妙無比一方治蛇蟲傷毒用五靈脂雄黃等分為末每服二錢酒調服仍敷瘡留口如干燥須以油潤之凡居山野陰濕之處每用雄黃如桐子大一丸燒煙以薰衣袍被褥之類則毒不敢侵百邪皆遠避矣一凡蛇入七竅急以艾灸蛇尾又法以刀破蛇尾少許入川椒數粒以紙封之蛇自出即用雄黃硃砂末煎人參湯調灌之或食蒜飲酒內毒即解一山居人被蛇傷急用溺洗咬處拭乾以艾灸之立效又方用獨頭大蒜切片置患處以艾於蒜上灸之每三壯換蒜多灸為妙凡被毒蛇所傷皆效肘後方用小蒜搗汁服滓敷傷處雄黃闢蛇毒南海地多蛇而廣府尤甚某侍郎為帥聞雄黃能禁制此毒乃賣數百兩分貯絹囊挂於寢室四隅經月餘一日臥榻外常有黑汁從上滴下臭甚使人穿承塵窺之則巨蟒橫其上死腐矣於是盡令撤去障蔽蛇死者長丈許大如柱旁又得十數條皆蟠虯成窠並他屋內所驅放者合數百自是官舍清寧瘋犬傷人急於無風處吮出瘡口惡血如或無血則以針刺出血用小便洗淨外用香油調雄黃少加麝香敷之一凡遇惡犬咬傷如倉卒無藥即以百草霜麻油調敷或用蔥搗爛貼之牛糞敷之或蚯蚓糞敷之或口嚼杏仁爛敷之皆能救急如少延緩恐毒氣入經為害一方拔去頂上紅髮急令人吮去惡血以艾灸傷處五七壯甚者灸百壯神效一方用米泔水洗淨沙糖敷之一方用杏仁炒黑搗成膏貼之避犬法瑣碎録云凡行道遇惡犬即以左手大拇指掐寅上吹氣一口輪至戌上掐之犬即退伏糯米散治瘋犬傷毒大斑蝥二十一個去頭足翅上用糯米一撮先將斑蝥七個入米內慢火炒勿令焦去蝥又入七個炒令焦色變又去之再入七個炒米赤煙為度去蝥不用只將米研為末分三分冷水入香油少許空心調下一服須臾又進一服以二便利下惡物為度若腹痛急以青靛調冷水解之或先用黃連甘草煎湯待冷服之不可食熱物或用冷水調益元散解之甚妙甚者終身禁食犬肉每見食犬肉而復作者不救又見單服斑蝥而死者亦有之蓋斑蝥毒之尤者雖曰以毒攻毒惟少用之茲用糯米以奪其氣尤宜預備青靛黃連以解其毒而況單服斑蝥者豈有不死寶鑑定風散治諸犬傷毒南星生用防風等分上為末凡被犬咬先以口含漿水吮洗傷處或小便鹽湯俱可洗淨用綿拭乾方上藥末即不發或用制過南星一二錢為末以童便調下亦可治破傷風諸犬咬蟲傷灸法凡狼犬蛇蠍蜈蚣諸傷痛極危急或因傷受風而牙關緊急腰背反脹不省人事者速切蒜片或搗爛罨傷處隔蒜灸之或二三十壯或四五十壯無不應手而愈取效多矣故本草謂蒜療瘡毒有回生之功夫積在腸胃尚為難療況四肢受患則經絡遠絶藥不易及故古人有淋洗灸刺等法正為通經逐邪導引氣血而設也解毒散一名國老飲治蠱毒及一切蛇蟲惡獸所傷重者毒氣入腹則眼黑口噤手足強直此藥平易不傷元氣大有神效不可以易而忽之也明礬甘草各一兩上為末每服二錢不拘時冷水調下亦可敷患處治馬咬傷毒氣入心則危馬齒莧搗爛煎湯服外以栗子嚼敷患處蜈蚣毒以鹽擦咬處或鹽湯洗傷處痛即止用後蠍螫方最妙已試一方用吳茱萸嚼爛擦之或取井底泥敷之解誤吞蜈蚣方昔有婢用火筒吹火不知內有蜈蚣向火一吹蜈蚣驚竄入口不覺下喉求救人無措手適有人云取小雞一隻斷喉取血頓飲之復灌以香油取吐蜈蚣隨出蠍螫毒用生半夏白礬等分為末以醋和敷傷處亦治蜈蚣傷無白礬亦可又蠍怕膽礬蛇性雄黃徐春甫云親見蠍螫腫痛用膽礬擦之立消可見南方人家不可無雄黃北方人家不可無膽礬此制蠍第一藥也解蜂螫毒以小便洗擦拭乾以香油塗之或以雄黃末擦之或以蠍螫方治之治鼠咬毒貓毛燒存性入麝香少許香油調敷傷處則不害治誤吞水蛭昔一人夜間飲水誤吞水蛭入腹經停日久復生水蛭食人肝血腹痛不可忍面目黃瘦全不進食不治必死方用田中泥一塊小死魚三枚同豬膏溶搗勻再用巴豆十粒去油同魚膏四味搗勻丸如緑豆大用田中冷水吞下大人五七丸小兒三丸須臾瀉下水蛭盡卻用八珍湯調理中蚯蚓毒石灰泡熱水涼洗患處久浸之則愈小兒多受蚯蚓毒則陰莖及囊俱腫如水泡用鴨血塗之或以鴨口含少時則消一方用鹽湯溫洗之即效治蠶咬毒蠶咬人毒入肉中令人發寒熱苧葉搗敷之汁塗之今治蠶家以苧近蠶則蠶不生髮也解蜘蛛咬毒薑汁調胡粉敷瘡口或用清油擦之內飲羊乳本草云蜘蛛咬人令人一身生絲惟羊乳飲之可解貞元十年崔員外從質云目擊有人被蜘蛛咬腹大如孕其家棄之乞食於道一僧遇之教飲羊乳未幾日而平青囊神授散治傳尸勞瘵血氣末甚虛損者不必多方只以此藥早服則蟲自不能為患無有不愈者此方得之河南郡王府濟世之功不可盡述川椒二升去合口者略炒出汗上為細末空心米飲調服二錢或酒煮米粉糊為丸桐子大每服三十丸以漸增至五六十丸或用酒送解射工溪毒蔥白散治溪澗中射工蟲專射行人形影人中其毒則病如瘧狀或若傷寒俗云沙發中之深者死急用後方治之蔥白一握切豉半升葛根二兩升麻七錢半上銼如豆大每服四錢匕水二盞煎一盞去滓不拘時溫服移時再服千金雄黃兌散治時氣病𧈟下部生蟲雄黃半兩桃仁一兩青葙子黃連苦參各三兩上五味為末綿裹如棗核大納下部亦可用棗汁服方寸匕日三千金治大孔蟲癢方用大棗蒸爛為膏以水銀和捻長二三寸許綿裹納大孔中過宿明旦蟲皆出但水銀損腸宜慎之愚按此方水銀不必生用但如治頭蝨法燒煙以棗肉拌之用必更妙頭髮生蝨方在新因雄麝散治五種蠱毒明雄黃麝香各一字另研用生羊肺一指大以刀切開安藥在內吞下醫林丹砂丸治蠱毒雄黃硃砂各另研藜蘆略炒鬼臼巴豆霜各二錢半上為末煉蜜丸桐子大每服二丸空心薑湯下當利惡物並蠱毒如煩悶以鴨血為羹食之良方七寶丸治蠱毒敗鼓皮蠶蛻紙刺蝟皮各燒存性五倍子炒續隨子硃砂另研雄黃另研等分上為細末糯米粥丸小豆大每服七丸空心白水下蜜髓煎治中蠱令人腹內堅痛面目青黃病變無常真蜜一碗豬骨髓五兩研上同煎熟分作十服日三服即瘥歸魂散凡初中蠱毒在膈上者當用此藥吐之白礬建茶各一兩上二味為細末每服五錢新汲水調下頓服之一時久當吐毒出若此藥入口其味甘甜並不覺苦味者即其證也麥面散治中蠱毒吐血用小麥面二合分為三服以冷水調下半日服盡當下蠱即瘥挑生蠱毒簡易方一方明礬芽茶等分為末涼水調三錢一方青藍汁頻頻服半合則解一方石榴皮煎汁飲之當吐出活蟲而愈以下雜方嗽煙筒治一切犯寒咳嗽遇冬便作款冬蕊鵝管石雄黃艾葉各等分上為末鋪艾上用紙捲筒燒煙吸入口內吞下即咽茶水一口壓之自效一方有佛耳草無艾葉用紙捲成條每切一節約長三五分許焚爐中吸煙咽之靈寶煙筒治一切寒喘咳嗽黃蠟雄黃各三錢佛耳草款冬蕊各一錢艾葉三分先將蠟溶化塗紙上次以艾鋪之將三味細研勻摻捲成筒用火點一頭吸煙吞之清茶送下七寶美髯丹補腎元烏鬚髮延年益壽何首烏赤白各一斤川牛膝半斤將何首烏先用米泔水浸一日以竹刀刮去粗皮切作大片用黑豆鋪甑中一層卻鋪何首烏一層再鋪豆一層卻鋪牛膝一層又豆一層重重相間面上鋪豆蓋之蒸以豆熟為度取起曬乾次日如前換豆再蒸如此七次去豆用破故紙半斤洗淨用黑芝麻同炒無聲為度去芝麻白茯苓半斤用人乳浸透曬乾蒸熟赤茯苓半斤用黑牛乳浸透曬乾蒸熟當歸身半斤酒洗枸杞子半斤去枯蒂者上共為末煉蜜丸龍眼大每日空心嚼二三丸溫酒米湯鹽湯俱可送下製藥勿犯鐵器按此即七珍至寶丹少菟絲子一味北京烏須方兩京各處烏須者惟此方頗好用之雖未至簡妙然不壞須傷肉制用得法者可黑一月五倍子擇川中之大者打作碎粒分粗細為二先將粗者於鍋內用文火炒成糊次入細者同炒初時大黑煙起取出不住手炒將冷又上火炒則黃煙起叉取出炒將冷再上火炒則青黃白煙間出即可住火先以真青布一大片浸濕將倍子傾在布上包成一團用腳踏成餅上用濕泥一擔盦一夜色如烏羽為妙瓷器收貯聽用紅銅花用細紅銅絲炭火煅醋中淬之不拘遍數以化盡為度去醋取銅花曬乾皂礬明礬各三分沒石子食鹽各二分硼砂淨一分上每次染時旋配旋用以制倍子二錢為則加銅花四分余皆一二分和勻作一服研細以濃茶汁或燒酒用瓷鐘調如稀糊坐湯中煮之看鐘內緑氣生面為佳先用皂角湯洗須淨拭乾以抿柄塗上用皮紙搭濕包之或以青布囊囊之過夜次早溫水洗之如不潤用胡桃油捻指潤之一連染二夜其黑如漆亦妙擦牙烏須方先期而擦者永久不白青鹽一斤嫩槐枝葉五斤切黑鉛四兩沒石子尖者七錢上將黑鉛青鹽入鍋內槐枝攪炒俱成灰炭取起將沒石子研細末和入用瓷罐盛之每日早晚以藥擦牙漱水吐掌上擦須鬢久久自然潤黑便易擦牙方用五倍子大者一百個裝食鹽一斤鋪在鍋內大火燒過存性為末每日擦之久則鬚髯皆黑丹溪疝氣神方其病甚至氣上衝如有物築塞心臟欲死手足冷者二三服除根陳皮荔枝核為末炒焦黃硫黃火中溶化即投水中去毒研細各等分上為末飯丸桐子大每服十四五丸酒下其疼立止若疼甚不能支持略加五六丸再不可多也神仙六子丸男子三十歲後服此藥一歲二單制服不息永不白鬚發四十以上或見微白及少年發黃不潤者服此百日自然漆黑其效如神菟絲子制金鈴子覆盆子五味子枸杞子蛇床子炒各一兩何首烏酒浸蒸極熟焙牛膝酒浸蒸熟地酒蒸搗地骨皮各三兩舶上茴香鹽炒川木瓜各二兩上十二味為細末用浸菟絲酒作糊為丸梧子大每服五七十丸食前溫酒或白湯送下一方加人參白朮白茯苓各一兩尤有神效服此大忌三白疝氣方重四制川楝子丸治疝氣一切下部之病悉皆治之凡腫痛縮小雖多年亦可除根川楝子淨肉一斤分四分內一分用鹽一兩茴香一合同炒黃色去鹽香不用外三分一分用巴豆四十九個一分用斑蝥四十九個一分用巴戟一兩仍各加麥面一合同炒黃色俱去面藥不用木香一兩破故紙一兩炒上為末酒糊丸梧子大每服五七十丸鹽湯送下甚者日進二三服或空心或食前木香導氣丸治男子小腸氣肚疼一切氣積下元虛冷脾胃不和並宜服之有效木香丁香乳香香附川楝子肉大茴香破故紙葫蘆巴炒甘草炙三稜各一兩杜仲炒半兩上為細末酒糊丸梧子大每服三五十丸加至七八十丸用溫酒或鹽湯食前送下日進二三服去鈴丸治疝消鈴用大茴香一升以老生薑二斤取自然汁浸茴香一宿以薑汁滲盡為度入好青鹽二兩同炒赤取出焙乾為末用無灰酒浸蒸餅為丸梧子大空心食前酒下二三十丸或米飲亦可此方實脾疏肝所以治疝多效非如常法之克伐故為妙也事後中寒腹痛方凡房事後中寒厥冷嘔惡腹痛者用蔥薑搗爛沖熱酒服之睡少頃出汗即愈如腹痛甚者以蔥白頭搗爛攤臍上以艾灸之或尉之亦可解鼻尖有汗其痛痛即止濕疝陰丸作痛蘄艾紫蘇葉烘乾熱川椒炒熱各三兩上三味拌勻乘熱用絹袋盛夾囊下勿令走氣冷即易之熏尉脫肛方治氣痔脫肛枳殼麵炒防風去叉各一兩枯礬二錢半上咀用水三碗煎至二碗乘熱熏之仍以軟帛蘸湯尉之通手即淋洗熏洗脫肛法用赤皮蔥韭菜二味各帶根者煎湯入大楓子防風末各數錢乘熱熏洗立收上一方用五倍子煎湯洗以赤石脂末摻上托入或脫長者以兩床相併中空尺許以瓷瓶盛湯令病人仰臥浸瓶中逐日易之收盡為度又澀腸散方在小兒五四參朮芎歸湯治瀉痢産育氣虛脫肛脈濡而弦者人參白朮川芎當歸黃耆酒炒山藥炒白芍藥白茯苓升麻炙甘草上生薑水煎服按此方若治泄痢虛滑脫肛仍須加製附子肉豆蔻方效涼血清腸散治大腸血熱脫肛生地黃當歸芍藥各錢半黃芩黃連防風荊芥升麻各一錢香附川芎甘草各五分水一鍾半煎服縮砂散治大腸伏熱脫肛紅腫縮砂仁黃連木賊等分上為細末每服二錢空心米飲調下訶子人參湯治證同前訶子煨去核人參白茯苓白朮炙甘草蓮肉升麻柴胡等分水一鍾半加生薑煎服澀腸散治久痢火腸滑脫訶子赤石脂龍骨等分上為末以臘茶少許和藥摻腸頭上用絹帛揉入又方用鱉頭煅存性入枯礬少許如上揉入蟠龍散治陽證脫肛腫痛地龍曬乾一兩風化硝二兩上為末每用一二錢肛門濕則乾摻燥則清油調擦先以見腫消荊芥生蔥煮水候溫洗輕輕拭乾然後敷藥伏龍肝散治陰症脫肛伏龍肝一兩鱉頭骨五錢百藥煎二錢半上為末每用一二錢濃煎紫蘇湯候溫洗過以清麻油調藥敷如前法獨蒜通便方治小便不通獨蒜一枚梔子三七枚鹽花少許上搗爛攤紙上貼臍良久即通未通塗陰囊上立通小便不通經驗方以朴硝為末每服二錢空心煎茴香湯下又方用蚯蚓杵以涼水攄過濃服半碗立通大解熱疾不知人事欲死服之甚效小水不通蔥尉法用蔥三斤慢火炒香熟以絹帕裹更替尉臍下即通或用鹽炒熱尉之冷則再易須臾即通雞內金散治氣虛溺尿用雄雞䏶胵並腸燒為末溫酒調服狐腋氣五方治陰汗鴉臭兩腋下臭不可與人同行枯白礬密陀僧黃丹各二錢半麝香五分上於乳鉢內研細以醋於手心內調藥擦腋下經兩時許即以香白芷煎湯洗之一日用一次又治腋氣神效方密陀僧四兩枯白礬二兩輕粉三錢上為細末頻擦兩腋擦至半月見效半年全愈又腋氣方用熱蒸餅一枚擘作兩片摻密陀僧細末一錢許急挾在腋下略睡少時候冷棄之如一腋有病只用一半葉元方平生苦此疾來紹興偶得此方用一次遂絶根本又腋氣方單用枯礬為極細末以絹袋盛之常以撲於腋下不過十度即愈一方以唾調塗之又腋氣方先剃去腋毛令淨用白定粉水調擦敷患處至六七日後清晨看腋下有一黑點如針孔大者以筆點定即用小艾炷灸七壯灸過或有濁氣攻心作痛者當用後藥下之丁香青木香檳榔檀香麝香大黃上煎服以下為度腳汗牡蠣散治腳汗除穢氣牡蠣煅枯白礬密陀僧黃丹等分上為細末每用少許乾摻腳指縫中即收燥囊牡蠣散治陰囊濕癢搔之則汁水流珠用此極效牡蠣醋煅一兩雄黃一錢枯礬硫黃苦參蛇床子各二錢上為細末先用蒼朮椒鹽煎湯洗濕處後用此藥摻之蒸洗陰囊法治一切陰囊濕癢陳茶一撮蒼朮二錢花椒蛇床子白礬各一錢蒼耳草量入炒鹽半兩朴硝三錢上用水四碗先將前五味煎湯去柤乃入後三味泡化先熏後洗三四次絶癢梅蘇丸龍腦薄荷粉草冰糖各四兩烏梅肉三兩白檀香紫蘇葉各二兩上為極細末以熟棗肉搗丸芡實大勿用鐵器冰梅丸龍腦薄荷二兩白糖柿霜各四兩烏梅肉桔梗各五錢兒茶三錢甘草一錢冰片一分上為極細末煉蜜丸龍眼核大龍腦上清丸烏梅肉腦荷各四兩白檀香蘇葉兒茶硼砂沙糖各二兩冰糖柿霜各八兩乾葛粉草各一兩冰片三分上為極細末蜜丸櫻桃大上清丸佳方腦荷二兩雨茶白硼砂七錢烏梅肉貝母訶子各三錢冰片三分煉蜜丸辟邪丹方在痘疹闢一切穢寒邪氣福建香茶餅能闢一切瘴氣時疫傷寒穢氣不時噙口中邪氣不入沉香白檀各一兩兒茶二兩粉草五錢麝香五分冰片三分上為極細末糯米調飲湯為丸黍米大噙化香發木稚油採桂花半開者去莖蒂令淨每花二升用真麻油一斤輕手拌勻納瓷瓶中用油紙緊封器口坐釜中湯煮一餉持起頓燥處十日後掀出用麻布濾絞清油封閉緊密收之愈久愈香或用菜子油亦可玉容散治面生黑鼾雀斑甘松三奈茅香各半兩白芷白芨白蘞白殭蠶白附子天花粉緑豆粉各一兩防風零陵香藁本各二錢肥皂二錢去皮弦上為細末每早晚蘸末洗面硫黃膏治面部生瘡或鼻赤風刺粉刺硫黃白芷天花粉水粉各五分全蠍一枚蟬蛻五個芫青七個去頭足上為細末用麻油黃蠟約多寡如合面油熬勻離火方入前末藥和勻每於臨臥時洗面淨以少許塗面勿近眼數日間腫處自平赤鼻亦消如退風刺一夕見效
