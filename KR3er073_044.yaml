body:
  text: 卷之四十四烈集痘疹詮痘瘡中總論治法二十二共十九條痘瘡一證順者不必治逆者不能治所當治者惟險證耳何為險證如根窠順而部位險部位順而日期險日期順而多寡險多寡順而顏色險顏色順而飲食險飲食順而雜證險雜證順而治療險治療順而觸穢險然猶有最險者則在元氣與邪氣邪氣雖強元氣亦強者無害只恐元氣一餒邪氣雖微者亦危設或犯之而不為速治則順者不順而吉變為凶矣凡此數者皆痘中之要領所當詳察詳辨也故凡欲治痘必須先識死生辨虛實審寒熱明此六者則盡之矣一治痘之要惟邪氣正氣二者而已凡邪氣盛而無制者殺人正氣虛而不支者殺人及其危也總歸元氣之敗耳使元氣不盡則未必至死凡治此者但知補瀉二字而用之無差則盡善矣故補瀉難容苟且毫釐皆有權衡必不可使藥過於病亦不可使藥不及病是以善用攻者必不致伐人元氣善用補者必不致助人邪氣務使正氣無損而邪氣得釋能執中和斯為高手然執中之妙當識因人因證之辨蓋人者本也證者標也證隨人見成敗所由故當以因人為先因證次之若形氣本實則始終皆可治標若形質原虛則開手便當顧本若謂用補太早則補住邪氣此愚陋之見也不知補中即能托毒灌根即能發苗萬無補住之理是以發源之初最當著力若不有初鮮克有終矣此可與智者言不可與庸人道也一治痘不宜遲凡痘疹之有不同者無過寒熱虛實四證大都寒則虛熱則實虛寒則宜溫補實熱則宜清解然其挽回之力當於三五日前治之過此則恐無及若七日之後毒發於外外不足則外剝而死若毒發不盡則又內傳內不足則內攻而死故治痘有時時之不可失也有如此倘初時不慎則後來之禍從此伏矣一解毒當知表裡所謂毒者火毒也所謂解毒者求其所在而逐之也蓋痘瘡之發內則本於淫火外則成於風邪內外相觸其毒乃發故其發也不甚於內則甚於外甚於內者以火邪內盛而熾焰於外也甚於外者以寒邪外閉而鬱火於內也故但察其無汗外熱而邪在表者則當疏之散之使熱邪從外而去則毒亦從外而解矣若察其多汗內熱而邪在裡者則當清之利之使熱邪從內而泄則毒亦從內而解矣其有內熱既甚而表邪仍在者則當表裡相參酌輕重而兼解之則邪必皆散矣若邪不在表則必不可妄兼發散以致表氣愈虛而痘必終敗其證則身有汗而外不甚熱者是也若毒不在裡則必不可兼用寒涼以致中寒脾敗而瑟必反陷其證則口不渴而二便不祕者是也知斯五者則蟹毒治實之法無餘蘊矣此外有虛邪虛火等證則當先酌元氣次察邪氣無使失楫中流顧本不及則尤為切戒凡云痘毒者痘必自內而達外但得出盡則內無毒但得化盡則外無毒既出既化而不使復陷則毒盡去矣故或宜散表或宜托送或宜清解或宜固中而治法盡之矣一補虛當辨陰陽凡痘瘡血氣各有所屬已見則氣血條中然痘之所主尤惟陰分為重何也蓋痘從形化本乎精血凡其見點起脹灌漿結痂無非精血所為此雖曰氣為之帥而實血為之主且痘以陽邪陽盛必傷陰所以凡治痘者最當重在陰分宜滋潤不宜剛燥故曰補脾不若補腎養陰所以濟陽此祕法也然血氣本自互根原不可分為兩如參耆白朮之類雖雲氣分之藥若用從血藥則何嘗不補血歸芎地黃之類雖云血分之藥若用從氣藥則何嘗不補氣故凡見氣虛者以保元湯為主而佐以歸地血虛者以四物湯為主而佐以參耆蓋氣血本不相離但主輔輕重各有所宜而用之當不則明拙自有差耳一治痘有要方茲表而出之以便擇用其有未盡當於各條求之凡解表諸方乃初熱時所必用者諸家皆以升麻葛根湯為首程氏則用蘇葛湯似為更妥余則常用柴歸飲以兼營衛似為尤妥此當隨宜擇用營虛表不解者五柴胡飲陽氣虛寒表不解者柴葛桂枝湯元氣本壯而表不解者疏邪飲或加減參蘇飲寒氣勝而表不解者五積散或麻黃甘草湯凡清火解毒諸方所以解實熱也如欲解毒清火而兼養氣者惟四味消毒飲為妙鼠黏子湯亦佳熱毒兩盛而不化者宜搜毒煎煩熱作渴小水不利者導赤散六一散血熱赤斑煩躁多渴者犀角散熱在陰分而失血者玄參地黃湯內熱不清者東垣涼膈散二便供不利而火甚於內者通關散熱毒內蓄小水不利而為丹為癰者大連翹飲煩熱多驚而神不安者七味安神丸熱毒內甚而狂妄者退火丹凡表裡兼解諸方如內外俱有熱邪者宜柴葛煎或柴胡麥門冬散里邪甚而表邪微者解毒防風湯表裡俱有邪而元氣兼虛者實表解毒湯表裡俱實熱者雙解散凡托裡諸方有宜專補元氣者有宜兼解毒者如氣血俱虛不起者六物煎或托裡散虛寒不達兼托兼表者參耆內托散或十宣散氣分虛寒不透者六氣煎氣血俱虛微熱不起者紫草快斑湯凡諸補劑皆痘中元氣根本祛邪托毒者之所必賴但見虛邪必當以此諸方為主氣分不足者調元湯氣虛宜溫者保元湯六氣煎氣虛微熱宜兼涼解者參耆四聖散血虛者四物湯芎歸湯血分虛寒宜溫者五物煎血虛血滯者養血化斑湯血虛血熱宜兼解毒者涼血養營煎氣血俱虛者六物煎八珍湯十全大補湯氣血虛寒大宜溫補者無如九味異功煎六味回陽飲即陳氏十一味木香散十二味異功散但虛寒而兼氣滯者宜用之欲賴補虛大有不及凡攻下諸方亦痘中所不可無惟必不得已然後用之勿得視以為常也血虛祕結大便不通者四順清涼飲裡實多滯祕結者前胡枳殼湯表裡俱實大便不通者柴胡飲子血熱便結毒盛者當歸丸一凡痘已出盡內無不虛蓋隨痘而為托送者背元氣也使於此時不知培補化源則何以灌漿何以結痂何以收靨倘內虛無主將恐毒母氣復陷無不危矣若痘之稀疏者氣血之耗猶為有限若痘之多而甚者其氣血內虧必更甚矣此不可不預為之防也一平順之痘毒原不甚既出之後內本無邪此輩原不必治無奈父母愛子之切且不識病之輕重故必延醫診視既延醫至無不用藥既已用藥無匪寒涼在彼立意不過曰但解其毒自亦何妨不知無熱遭寒何從消受生陽一拔胃氣必傷多致中寒泄瀉猶云協熱下利更益芩連最可恨也又如痘瘡初見發熱每多不審虛實止云速當解毒凡於十日之外多有泄瀉而致斃者皆此輩之殺之也冤哉冤哉余見者多矣故筆諸此以為孟浪者戒一痘在肌肉陽明主之故自出齊以後最不宜吐瀉與其救治於倒陷之後孰若保脾土於未壞之先故凡生果茶水之類皆宜慎用而寒涼之藥尤不可不慎也一治痘須辨其證大部濕多則泡血熱則斑氣不足則頂陷血不足則漿毒不附裡實大補則生癰毒表實大補則不結痂裡虛不補則內攻而陷表虛不補則外剝而枯但使周身氣血活潑無礙則雖密亦不難治故惟貴得中勿使偏勝則寒熱虛實自無太過不及之患斯足云盡善矣一祕傳治痘之法首尾當以四物湯為主隨證加減用之惟肚腹不實者須遠當歸但將全劑通炒微焦則用自無礙且復有溫中暖脾之妙一首尾皆忌汗下此先哲治痘之心法蓋妄汗者必傷陽氣陽氣傷則凡起發灌漿收靨之力皆失所賴此表虛之為害也妄下者必傷陰氣陰氣傷則凡臟腑化源精神鎖鑰飲食倉廩皆為所敗此裡虛之為害也然表虛者猶賴裡氣完足可以充之裡虛則根本內潰衛氣亦從而陷無策可施矣故古人深以汗下為戒誠至要之旨也然此以常道為言非所以應變者設遇外感寒邪腠理閉密其出不快其發不透者若不用辛甘發散之劑以通達肌表則痘有壅遏之患矣又若有大小便祕結而毒有留伏不達者不與苦寒泄利之藥以疏通臟腑則有脹滿煩躁焦紫黑陷等患矣故當察其虛實審其常變當汗則汗當下則下中病則已無過其制若無汗下之證則必不可妄用汗下以賊人之命也務得其宜然後謂之明醫而福自有歸矣萬氏曰解其火毒恐郁遏而乾枯養其血氣欲流行而舒暢按此說誠善然所謂火毒者以實熱為言若火有虛實真假則不得概認為火毒程氏曰痘瘡出自六腑先動陽分而後歸陰經其本屬陽故多發熱而陰血虛耗者多也首尾當滋陰補血為主不可一毫動氣貴從緩治所以白朮半夏之燥悍升麻之提氣上衝皆不可輕用也且痘瘡多有血熱者故宜用四物湯加芩連之屬以養其陰而退其陽也程氏曰痘毒根於淫火必因歲氣傳流而發故多兼表證則內外交攻此時若不用輕揚之劑祛風散邪淡滲解毒之藥利便退熱則外邪內火何由得解邪既不解則痘何由得善此治之不容已也然治之之法必須審兒形色察兒虛實因證用藥庶幾神效世之醫者多宗錢氏清涼解毒之論或按陳氏辛溫發敬之方主見不同致誤多矣殊不知痘疹色灰白不起發根窠不紅活此皆虛寒必宜陳氏方救之荀非理明於心無不眩惑故必熱則涼之寒則溫之虛則補之實則瀉之何患乎疾之不愈耶程氏曰治痘之要始出之前宜開和解之門既出之後當塞走泄之路落痂之後清涼漸進毒去已盡補益宜疏程氏曰凡治痘前後須加木通以瀉熱邪自小便中出不使攻胃令無變黑之證七日之後熱退者少用之凡痘瘡前後總有危證萬勿用天靈蓋腦麝之屬攻之蓋毒出一步財內虛一步血氣運一日則內耗一日豈可夏用辛香耗氣之劑雖僥幸偶中後必有餘害也是可見王霸之珠相去遠矣程氏曰凡婦人有孕而出痘者以安胎為主氣虛者保元湯血虛者四物湯或加白朮黃芩砂仁陳皮必使胎氣無損為主程氏曰桂岩鄭先生云痘者象其形而名之也愚謂不獨象形而名而治之之法亦猶農家之種豆也豆之為物上實則難出土瘠則難長故實者鋤擾之瘠者灌沃之不實不瘠惟順其性不使物害之而已知此則可以語醫矣今人於痘初起不察虛實寒熱或過用木香散異功散之類則以火濟火致變紫黑倒陷癰毒吐衄者有之或妄用芩連梔檗寒涼之藥則大傷脾胃為吐為瀉為寒戰內陷者有之故凡治痘之法六日之前不宜溫補亦不宜妄用寒涼師云凡解毒之內略加溫補溫補之中略加解毒此不傳不刻之祕訣也若六日以後毒已盡出於表當溫補而不溫補者膿不得壯而癢𤹀寒戰之患必所不能兔矣熱證論治二十三共十一條古云痘疹之病皆由父母胎毒伏於命門相火之中故每遇二火之令或主客溫熱之氣即觸發而動此痘疹屬陽固無疑矣然陽毒陽邪無熱不成亦無熱不散所以非熱不能出現非熱不能起發非熱不能化漿非熱不能幹漿此痘瘡之終始不能無熱亦不可無熱也但熱貴其微不宜其甚蓋熱甚者毒必甚而痘亦必重熱微者毒亦微而痘出必輕無熱則不成不化此熱固痘之常也所以凡治痘瘡不可盡除其熱若必欲盡去之則未有不成陰證而敗者矣一痘有三火蓋痘疹二證皆言為火者是矣然軒岐之火義有三曰太過曰平氣曰不及也太過之火是謂赫曦炎烈之氣也其毒盛治宜清解平氣之火是謂升明蕃茂之氣也其毒平不必治之不及之火是謂伏明屈伏之氣也其毒陷治宜培補此陰中有陽陽中有陰之大義而亦痘疹萬病之法旨使不知此尚敢云醫一治熱當知微甚及有毒無毒斯無謬誤蓋痘疹屬陽無不發熱若外雖發熱而內則不渴或飲食二便如常此蒸痘之熱耳熱雖在表而內則無病萬萬不可妄治其有熱之甚者痘毒必甚此不得不為調理若甚於發熱之初必為之表散若甚於見點之後必為之清解錢氏曰熱甚而大小便閉則利之如果有熱毒實邪則不得驟用補陽之劑致令毒氣壅盛則熱終不退反為害矣一假熱非熱假寒非寒見有不真誤治則死如文中主溫補仲陽主涼瀉雖若各有所主然無非因病而藥各有所宜是以二者皆不可偏用但得中和斯為貴耳余見近日幼科多不知陳氏之心法但見痘瘡則無論是虛是實開口止知解毒動手只是寒涼百證千家若同一轍豈必盡皆實熱乎如實熱果真白非涼瀉不可然必內外俱熱方是熱證內外俱實方是實證但其中有似實非實似熱非熱者最多此不可不察之真而審之確也故凡見外證雖若實熱而內察則無如口不甚渴二便通利或見微溏或稟賦素弱或脈息不強或聲色不振或臟氣多陰或飲食不化或脹滿嘔惡或吐蛔或倦睡或畏寒或作癢或多驚恐或筋惕肉瞤之輩雖見有熱此皆熱在表而不在裡總屬無根之火非真熱證也最忌寒涼若墊而妄用則必致敗脾無一免矣一痘瘡熱甚者毒之盛也其痘必多熱微者毒亦微其痘必少痘既出而熱不減者痘必日增見點後而熱漸退者痘必疏矣或有微熱而痘反密其內熱必甚而或見煩躁或二便熱燥此毒深熱亦深也宜清其內而兼解其表或有熱甚而痘反稀者以外雖熱而內則不熱此毒淺熱亦淺也一痘瘡初熱之治法詳發熱三朝治法條中一治陽邪實熱之法表裡挾邪俱熱者柴葛煎連翹升麻湯表熱不解而里無熱者疏邪飲蘇葛湯柴歸飲表裡俱熱而邪實者雙解散內熱毒盛者東垣涼膈散或解毒防風湯熱毒熾盛痘瘡紫赤煩躁者搜毒煎或大連翹飲或犀角地黃湯陰虛血少燥熱神昏者四物湯或二陰煎陰虛血熱而大便不通者四順清涼飲大便不通實熱內壅而胸膈脹悶者前胡枳殼湯或三黃丸二便俱不利而實熱內滯者通關散小水赤澀而邪熱內蓄者導赤散六一散心火盛而驚搐多痰者萬氏牛黃清心丸或七味安神丸痘瘡稠密身熱毒盛養營退熱解毒者鼠黏子湯柴胡麥門冬散一純陽無陰之證凡發熱譫語狂妄躁亂大渴大煩如見鬼祟大便祕結小便赤澀六脈滑數急疾是皆火毒內熾之證當用前法酌而治之陳氏曰凡痘疹壯熱經曰不除如無他證只用六味柴胡麥門冬散治之如不愈服七味白朮散凡身壯熱大便堅實或口舌生瘡咽喉腫痛皆瘡毒未盡也用射干鼠黏子湯如不應用七味人參白朮散程氏曰痘瘡前後凡有燒熱不退並屬血虛血熱只宜四物湯按證加減渴加麥門冬犀角汁嗽加栝蔞霜有痰加貝母橘紅切忌人參白朮半夏之屬倘誤用之為害不小蓋痘瘡屬陽血多虛耗今但滋陰補血其熱自退此即養陰退陽之義也一痘後餘熱發熱證治俱詳痘後餘毒條中發熱三朝治款二十四痘疹一證雖原於有生之初然必因時氣相觸內外挾邪而後作凡痘之輕重已兆於發熱之微甚而吉凶於此亦可判矣毒輕者易出易靨固不必治毒甚者險證百出故不得不治凡治此者於初熱時急宜用輕揚之劑汗以散之但使外感之邪臟腑之毒皆作穢汗盡從毛竅中出則毒氣已減其半而重者可輕危者可活矣即如痘中一切變證亦無非毒氣欲出不能之所為一經表散則毒從汗去而諸證亦必自退然又當察表裡之輕重或宜解表或宜清裡或宜托助元氣孰者宜急孰者宜緩有不可執一也故胡氏曰表熱壅盛非微汗則熱不解裡熱壅盛非微利則里不解失此不治則毒氣漸盛而逆證隨見矣一散表之法當知邪之淺深毒之微甚表邪甚者微散之則表不能解無益於事表邪微者妄汗之則表氣必虛痘不起發而反為大害故惟以得中為貴亦以微汗為貴不可過傷衛氣也其有大熱不退肌膚祕密或氣令寒凝之時則不得不大為表散一散未應或至於再必令身熱由汗而退則毒氣自解可無患矣此散之微甚有權宜也故凡是痘證最畏內外之寒氣務使表裡溫暖但得毛竅中常見津津潤澤亦猶庖人炊籠之法但欲其松則皮膚通暢氣無不達痘必易出易收無不善矣一痘瘡發熱之候宜乍熱乍涼者為常若遍身如火晝夜不休為失常也此當察其表裡酌宜施治一痘瘡初見發熱若無虛寒等證固不得驟用溫補以助火邪恐致鼓扇痘毒則反資大害若無實火大熱等證切不可因其發熱妄用寒涼必致敗脾泄瀉則為害尤甚此時醫之通弊也大宜戒之一既經表散之後須謹避風寒若使外邪再感則皮毛閉塞熱毒必將復熾汗而再汗必不能堪又須切戒生冷水果若誤犯之恐寒濕傷脾而為泄瀉不食則無不致害一表散之劑凡初見發熱狀類傷寒未知是痘非痘即當先用汗散此時欲散表邪即當兼調營氣宜以柴歸飲為第一惟大便不實者勿用之以其性多潤也其次則蘇葛湯再次則升麻葛根湯或只用加減參蘇飲亦佳若冬月寒勝之時或氣體壯實表不宜解者須加麻黃必要表出一身臭汗為佳但使熱退身涼苗則輕矣若初發熱有惡寒身振如瘧之狀者陽氣虛也宜柴葛桂枝湯加黃耆主之痘出即愈一清解之劑用治表裡而兼清兼散也凡熱之甚者毒必甚若身常有汗而大熱不退或兼煩躁熱渴者此其內火熏蒸而表裡俱熱也須兩解之宜連翹升麻湯或如聖湯若身熱烙手而目赤口乾二便熱祕煩悶不安者此表裡俱實也宜柴胡飲子甚者大連翹飲雙解散或調益元散以利之一表汗已透者不得再汗恐外亡陽而內傷氣也一發熱之時有腹痛脹滿者必外邪與毒氣相併未得外達而然宜參蘇飲加砂仁溫而散之一初熱時有驚搐譫語者是為痘搐微見而隨止者不必治若元氣強壯而搐之甚者宜羌活散調製過硃砂以表之若痰涎壅盛喉內作聲者宜烈生薑湯調化痰丸服之或抱龍丸亦可一此時渴欲茶水只宜少與蔥白湯既可止渴亦可疏表一痘瘡首尾皆畏泄瀉宜檢本條速為治之否則內潰脫陷之禍不可勝言也徐氏曰凡解表之藥必在紅點未見之前如熱之甚者邪毒必甚宜敗毒散或參蘇飲調三酥餅張冀之曰凡痘瘡一見紅點便不可用升麻葛根湯恐發得表虛也程晨峰曰治痘者不可輕用升麻恐提氣上衝引動肺氣也按此二家之說是皆治痘之大要甚屬有理但其中亦有宜否之辨如陽氣下陷不能透達肌表者則暫用升麻固其所宜又或雖見紅點而表有熱邪未解者則仍宜解散亦不可緩些二說者雖不可堅執實不可不知也吳東園曰初熱時只有二事惟去邪扶正而已邪熱盛則去邪而正氣自旺正氣衰則扶正而邪熱自退正氣盛而痘自發熱為痘用則不為害矣邪氣退而正氣不受爍血脈充裕則痘自泰矣須於此時看明下手遲則無濟於事矣報痘三朝治款二十五痘之形色初見吉凶攸分而寒熱虛實亦已可辨凡調攝挽回之力惟在此時尤為緊要且痘出三日內毒在半表半裡之間關係最重故妄汗則成斑爛妄下則成陷伏寒涼過用必傷正氣燥熱過用則助邪氣虛寒不補則陷伏癢𤹀實熱不解則變黑歸腎倘有一瘥死生立判醫者於此不可不為之慎一痘瘡見點後身熱稍退別無內熱等證或色不甚紅頂不甚突者便有虛象雖在三五日內亦切不可用寒掠之藥恐傷脾胃為害不小須以保元湯或六物煎之類為主因證加減以培養之一痘瘡必因熱而出因熱而起若熱甚則血躁血枯其出反難故於未見點之先必須察其寒熱預為調理若有熱證勿得過用辛熱氣分等藥恐助火邪致滋多變一此時最畏泄瀉宜按本條急治之一見點太早者有吉凶虛實之辨凡發熱一日或才熱便見必血熱毒盛之所致其證多凶但得痘稀而飲食如常別無他證則亦無害若其形氣本弱而痘現速者此營熱衛虛不能約束於外故出現太驟須兼實表庶可免癢𤹀潰爛之患宜實表解毒湯主之如發熱一日便出而密者其證最凶其毒必甚此證最忌溫補宜搜毒煎加柴胡主之或羌活散加牛蒡子紫草蟬蛻或調保嬰丹熱甚者調退火丹或雙解散急治之可保一二其有痘雖出早而色不紅紫熱不甚者此全屬表虛之證如保元湯六物煎之類亦所當用一痘出不快者有數證須審其有無外感內傷而辨治其所病如冬月嚴寒或非時陰邪外閉寒勝而出遲者宜五物煎加生薑麻黃細辛之類主之或五積散亦佳如夏月火熱熏蒸以致血熱氣虛煩渴發躁而出遲者宜人參白虎湯加木通乾葛主之有因時氣不正為風寒外邪所襲以致皮腠閉密發熱無汗而出遲者其證必頭痛鼻塞四體拘急痠痛宜疏邪飲參蘇飲惺惺散之類主之若本無諸邪而出不快者此氣血內虛不能驅毒托送而留連於內宜十宣散或托裡消毒散若氣分大虛而出不快者宜保元湯六氣煎血分大虛者宜五物煎或六物煎加減主之若內有所傷氣滯而出不快者宜勻氣散橘皮湯加減主之頭面出不快當用川芎荊芥羌活防風天麻之類為引使胸腹出不快當用藁本升麻紫蘇及紫草木通湯四肢出不快當用桂枝乾葛甘草連須紫草蔥白各加生薑為佐連進二服出自快矣一痘不起發者雖證有不同然卒由血氣內虛不能托送者居多此中或宜兼解散或專補元氣當辨而治之凡出齊之後或被風寒所閉而發熱頭痛陷伏不起者宜羌活散參蘇飲加內托等藥治之若紅點初出暗昧乾燥不起發者凶宜四物湯加紫草紅花丁香蟬蛻官桂或調無價散量兒大小與之若便實內熱隱隱肌肉間不起發者宜紫草飲子若血分微熱而毒不能達者宜托裡消毒散若氣虛氣陷不起者保元湯或蟬蛻膏加黃耆若血虛不起者芎歸湯四物湯若血分虛寒不起者五物煎若氣分虛寒不起者保元湯六氣煎若氣血俱虛不起者六物煎托裡散凡以上補助氣血等劑須加好酒人乳糯米更妙凡發痘之藥用本不同有以毒攻毒而發痘者如用山甲人牙蟾酥蟬蛻之屬是也有解毒清毒而發痘者如草車紅花牛蒡子犀角木通連翹金銀花之屬是也有升提氣血而發痘者如川芎白芷荊芥升麻蔓荊子之屬是也有解散寒邪而發痘者如麻黃桂枝柴胡乾葛防風紫蘇蔥白之屬是也有行氣行滯以通壅塞而發痘者如丁香木香陳皮厚朴山楂大黃之屬是也有益火回陽健脾止瀉而發痘者如附子肉桂乾薑肉豆蔻之屬是也凡此者孰非托裡起痘之法然但可以此為佐而必以血氣為主則在乎四君四物十全大補之類庶乎隨手而應無不善矣一虛證見於報痘之時即當速為培補失此不治必不能灌漿結痂十日後必致不救蓋痘瘡實熱者毒盛可畏虛寒者內敗可畏但實熱證顯虛寒證隱人多誤認故為害反甚且痘瘡之所賴者惟飲食血氣飲食之本在脾胃血氣之本在肝腎但使脾胃氣強則滋灌有力而無內虛陷伏之憂氣血充暢則毒皆生化而無表虛癢𤹀之患此其在氣在血或微或甚所當早辨而治也凡痘出灰白不紅綻或灰黑頂陷或身無大熱皮嫩色光溶溶如淫濕之狀或口不渴飲食少腹膨溏泄二便清涼皆表裡虛寒證也若氣虛者宜調元湯四君子湯氣虛微滯者五味異功散氣虛宜溫者保元湯六氣煎脾氣虛寒者養中煎溫胃飲或理中湯血虛者四物湯血虛宜溫者五物煎氣血俱虛者六物煎五福飲或八珍湯氣血俱虛而寒者十全大補湯脾腎血氣大虛大寒者九味異功煎六味回陽飲脾胃虛寒氣滯者陳氏十二味異功散凡痘瘡色灰白不起發者氣虛也候出齊以保元湯和木通川芎最穩一火證熱毒在見點之後宜速為清解若不早治則日甚一日必致不救凡見點太赤根下皮色通紅此血熱氣有不能管束也後必起發太驟皮嫩易破或癢𤹀不可救宜急清血分之熱用涼血養營煎或鼠黏子湯或用六味消毒飲加芍藥治之或四味消毒飲益元散俱佳凡痘瘡已現毒泄則熱當自解若瘡已出而壯熱不減此毒蘊於內其勢方張其瘡必密宜解其毒用柴葛煎或鼠黏子湯凡見點之後壯熱不退或三四點相連色紅帶紫或根窠焦色紅紫成片或口唇熱燥煩渴喜冷舌上有胎或二便燥澀此表裡皆熱毒盛之重候急須清熱解毒如表熱甚者宜柴葛煎裡熱甚者宜搜毒煎加柴胡或用六味消毒飲加酒芩木通梔子黃連山楂蟬蛻歸芍紅花之類或調退火丹加減用之如熱毒內甚而發驚狂譫語者宜用紫草煎湯磨犀角汁調硃砂益元散或退火丹解之以上凡解毒之後紅紫退二便調能食不渴此表裡皆清也切勿再為解毒須急以保元湯四物湯六物煎之類調補氣血以助灌漿收靨否則恐變癢𤹀而不能善其後矣如痘瘡內熱之甚大便硬結不通大渴煩躁腹脹滿脈見洪數而痘出不快者此熱毒壅伏於內須遍利之以祛其熱毒宜柴胡飲子或三黃丸甚則承氣湯或用豬膽導之然此惟熱毒在裡痘形未見不得已而微下之可也若斑點隱隱見於皮膚中者此已發越在表乃痘瘡正發之時切不可妄用下藥凡痘瘡初出但見紅點稠密急用纏豆藤燒存性加制過硃砂連進二三服或用薄荷牛莠子煎湯調退火丹服之另用吳茱萸為末以水調攤足心引下熱毒亦可解散其勢一痘出變黑乃危證也蓋痘瘡乃血氣滋灌血足氣充則痘自紅活若熱毒熏爍則成焦黑若陽氣不充則成灰黑且黑為水色其虧在腎以陰犯陽最為惡候當辨而治之若熱毒凝聚大便祕結或煩躁熱渴而為焦紫黑陷者須通其便先以解里之急宜柴胡飲子或當歸丸得利後宜即以紫草飲或加味四聖散以化表之毒仍用胭脂汁以塗之若大便不結別無大熱等證而痘色黯黑者總由脾虛不能制水故見黑色宜速用五物煎或保元湯加紫草紅花服之外點以四聖丹胭脂汁若漸見紅活則吉若更乾黑則凶心鑑云凡治黑痘常用保元湯加芎桂補提其氣氣旺則諸毒自散黑者轉黃屢試屢驗一夾疹夾斑證本非痘中吉兆然亦有輕重之辨宜酌而治之外有本條仍宜參閲凡發熱二三日之間痘形未見忽然偏身發出紅點一層密如蚊蚤所咬者決非痘也此乃斑疹之屬多為風寒所遏不能發越而斑先見也宜疏邪飲柴葛煎或敗毒散之屬微散而解之但得身涼斑必自退再越一日痘出必輕矣凡痘夾斑疹齊出者亦宜辨其寒熱若表裡俱熱而邪不解者宜柴葛煎加減主之若熱邪不甚而表邪甚者宜疏邪飲或柴歸飲加羌活防風乾葛之類主之或敗毒散亦可用若痘夾紅斑如錦紋者宜涼血化毒湯加柴胡黃芩玄參犀角之屬主之若痘出夾斑夾疹而眼紅唇裂者表熱也煩躁大渴妄言妄見者裡熱也表裡俱熱最為凶證若不表里兼治何由得解宜雙解散主之若加悶亂氣喘者必不治一賊痘者於出齊之後其中有獨紅獨赤獨大摸之皮軟而不礙手者此賊痘也過三日之外必變成水泡甚至紫黑泡皆危證也急用保元湯或六氣煎加紫草紅花蟬蛻解之或用燈草木遍煎湯調下益元散利去心經之熱而紅自退如已成水泡宜用保元湯倍加四苓散利之此祕法也不然則遍身擦破臭爛而死一病於未出之先倘有濕瘡膿水流注者用附石末敷之以防其漏氣或真正緑豆粉亦可起發三朝治款二十六痘瘡放標之後漸漸起脹但肥胖一分是胎毒發出一分胖盡而毒出盡也有不起者或因元氣之弱不能送毒或有雜證阻滯不能升發皆痘前之失調理也此時當速治之否則後難為矣一痘宜漸發者吉若一齊湧出皮肉虛腫者此表虛不能收攝故奔潰而出後必癢瘍或成潰爛急宜人參固肌湯或芎歸湯若血熱者宜涼血養營煎虛甚者宜六物煎毒盛者宜六味消毒飲或四味消毒飲出入用之一痘不起發或起而不透者多由元氣內虛不能托送故毒氣留伏不出也毒不盡出則變證莫測凡見此者速當救里以托其毒然當察其氣分血分辨而治之蓋痘之壯突由乎氣肥澤由乎血氣主詬之血主濡之也若形雖壯而色見枯者此氣至而血不榮也宜四物湯加人參麥門冬之類主之若痘色紅潤而形平陷者此血至而氣不充也宜保元湯或六氣煎加川芎主之若形色俱弱而不起發者此氣血俱不足也宜六物煎加減主之或保元湯十全大補湯調無價散或獨聖散與之若冬春之間為寒氣所抑不能起發者宜麻黃甘草湯加歸耆或十宣散主之若夏秋火盛不起而煩渴祕結內熱者宜人參白虎湯若痘瘡起脹遲延不紅活者宜保元湯或六物煎加丁香山楂糯米人乳好酒主之或用無價散量兒大小以好酒調服凡痘瘡起發通身皆欲其透惟四肢稍遠難齊若脾胃素強能食者勿慮惟脾胃素弱食少者四肢多有不透以脾主四肢津液不能灌溉故也宜以補脾為主用快斑越婢湯加當歸或黃耆建中湯加人參防風若因誤服涼藥而致白𤹀不起者宜理中湯或胃愛散一痘雖起發若灰白色或頂陷者氣虛也切不可用寒涼之藥須六氣煎加丁香川芎人乳好酒主之或保元湯倍加酒炒黃耆當歸亦佳一痘雖起發紅活若頂平色嫩皮薄不能堅厚者此氣虛也必恐變為癢𤹀宜六氣煎或六物煎加減主之或十全大補湯十宣散俱可擇用一地紅血散不附者保元湯加芍藥當歸稍以收斂歸附氣位一根窠淡紅線暈枯燥者血虛也宜保元湯加當歸川芎酒洗紅花再加山楂以行參耆之滯少加木香以行氣而血自活也一痘雖起發而乾枯無水或青紫黯色不久必變黑陷乃血虛之甚也宜四物湯加人參麥門冬紫草紅花或調服無價散外用水楊湯浴之兼用胭脂塗法一痘瘡紅甚而引飲渴不止者名曰燥痘宜犀角地黃湯之屬一痘色紅紫滿頂或焮腫者血熱毒盛也宜涼血養營煎加丹皮木通牛蒡子之屬主之然痘出六日以後有此證者多死一痘已出齊而熱尚不退或煩躁發渴引飲或二火司氣之令可少與冷水數口無妨蓋水性下流不滯上膈亦能使毒從小便而出但不可用生果之類恐傷脾氣也痘瘡貴顆粒分明如彼此相串皮腫肉浮或於本痘四旁旋出小痘攢聚胖長漸成一塊此候最險宜用快斑湯合六味消毒飲以解其毒一出齊後痘有小孔自頂宣下至腳不白不黑與痘色相同者名為蛀痘此因表虛腠理不密而為此證失之不治則大泄元氣不起不發速人之禍也宜保元湯或六氣煎大加糯米川芎丁香提氣灌膿內補其孔甚為捷徑連進二三服必孔滿而痘自起若至黑色則為疔矣一口唇為脾之外候人以脾胃為本不宜受傷如初發熱即見口唇焦裂此毒氣攻脾乃惡侯也宜用瀉黃散之類以速解之若不早治則毒聚於唇及衆痘起發而唇瘡必已先熟內帶黃漿及諸痘成漿而此瘡已靨唇皮揭脫漸變嘔惡嗆水昏沉不可為矣灌膿三朝治款二十七膿者血之變也痘瘡初出一點血耳漸起漸長則由血成漿由漿成膿始成實矣故有血則有膿無血則無膿也痘至灌膿大勢已成此時必以有膿為主有膿則生無膿則死乃必然之理也故六日以前有熱則宜解毒無熱則宜調養血氣至此自然灌膿若痘至七日以後頂陷不能灌膿者必由先失調治故也所以治不可緩必俟漿足斯可回生若頂陷灰白漿膿不至此氣血俱離無生意矣一痘瘡灌膿專以脾胃為主脾胃強則氣血充實膿漿成而飽滿堅厚不須服藥脾胃弱則血氣衰少所以不能周灌故雖見漿而漿亦不滿或清淡灰白不能作膿即所蓄微漿仍是初時之血水而漿薄無以化膿者總屬血氣大虛之候若不速治必成內攻外剝之證宜急用六物煎或六氣煎加減治之或保元湯或十全大補湯加人乳好酒與服亦妙欲辨脾胃強弱當於飲食二便察之飲食雖少而大便堅者脾胃之氣猶可也但微加調補以能食為貴若大便不實或見溏瀉則最為可畏蓋一瀉則漿停瀉止則灌滿矣速宜用溫胃飲甚者用陳氏十二味異功散主之如痘當作膿之時猶是空殼此血不附氣也血既不至則毒何由化宜五物煎或四物湯或紫草散加蟬蛻主之如頂陷膿少或服內托藥而暫起復陷者血氣大虛故也宜十全大補湯倍加參耆當歸糯米煎成和人乳好酒服之此助灌之妙法也一灌膿三朝之內若身涼而痘色灰白或不進飲食或寒氣逆上而為嘔吐或腹脹或泄瀉而手足逆冷此皆純陰無陽之證也急宜用保元湯加二仙散連進數服甚者必須九味異功煎或陳氏十二味異功散皆可擇用若寒戰咬牙泄瀉等證俱同此治一手足灌膿飽滿者方見脾胃之強氣血之足也若色見灰白漿水清薄或癟𤹀不起者此必脾胃之弱也或灌漿已完而四肢猶有不灌者恐終變癢𤹀之證宜快斑越婢湯或六氣煎加防風白芷以達之庶無陷伏之患若毒有未透亦恐關節之處靨後致生癰毒一癢𤹀不止者雖曰氣血俱虛然亦由火力不足故不作痛而作癢也宜六氣煎或五物煎加防風白芷木香蟬蛻主之心鑑曰氣愈虛則愈癢當用保元湯倍黃耆以助表少加芍藥以制血其癢自止若將靨發癢此毒退血活新肉和暢自然之理也不必治之一灌膿痛楚不止者氣滯也少下保元湯加山楂木香以行滯氣如膿色盛滿大下四苓散利之而痛自止一痘瘡起發之後不作膿有四證有內虛而不灌者專宜托補氣血治法如前有感風寒邪居膚腠而不灌者宜溫散之以柴葛桂枝湯加黃耆白芷有熱毒熾盛身壯熱津液乾涸小便赤熱而不灌者宜托裡解毒利小便以紫草飲子或用辰砂六一散解之俟熱退後方可用保元湯熱甚者大連翹飲若大便堅熱數日不通而不灌者宜豬膽導之使氣得疏通則營衛和暢不然恐成黑陷也有觸穢氣而不灌者外宜熏解用胡荽酒或辟邪丹內服紫草木香湯或紫草快斑湯程氏曰凡頂陷無膿者為逆但得根窠紅潤血猶不散急用保元湯和芎歸白芍丁香糯米煎熟加人乳好酒溫服若色白如水晶內無膿者治亦同但得膿痘相間者猶可治若純是水晶色者決死若地紅血散有熱者去丁香加白芍地骨皮以斂血退熱若寒戰咬牙宜以木香散異功散選用程氏曰凡正壯之時有痘雖起壯而皮膚無力按之水漿就出雖肉色不暗此乃名為假壯至十一二日決不能回漿結靨內攻而死可急用保元湯加丁香川芎糯米提氣灌膿自愈此即名內托也凡內托之法即保元湯加川芎丁香便是不必千金內托也但按本方佐使用之一痘將灌膿之時忽面上有干靨者即倒陷證也宜速用八珍湯或六物煎加金銀花牛蒡子連翹麻黃之屬水煎熟調獨聖散服之服藥後若干者復起作膿未乾者即壯而飽滿或空地處再出補空小痘者上也若痘不作膿空處或發癰毒者次也若連進三服而乾者不腫未乾者不飽滿補痘不多則最險證也宜以十全大補湯加金銀花調治之一灌膿時發白泡如彈子者用棗針刺去其水外以滑石末敷之內服保元湯加石榴皮茯苓以利皮膚之水如發紫泡乃毒溢皮膚之上也此證必危一瘡爛成片膿水不幹者用滑石末敷之或收草散敷之加珍珠尤妙一痘瘡有重出者凡痘瘡破損潰爛處但得復腫復灌不致乾枯或於原無痘處復出一層如初用之狀亦以漸起發灌膿者此皆餘毒未盡賴裡氣充實毒不得入故猶出於表而不成倒陷是皆逆中之順證也但痘瘡重出一番必其人能食而大便堅乃足以勝其再作之毒自無足慮也如食少而大便潤者宜用十全大補湯之類補而調之若自利者宜陳氏十二味異功散肉以蔻丸主之蓋病久氣虛惟利溫補不可再解毒也結靨三朝治款二十八痘瘡灌膿之後肥澤堅實以手摸之瘡頭硬而微焦此欲靨也靨時乾淨無突陷淫濕破綻色蒼蠟皮堅厚外明內暗尖利礙指者此為正靨若痘雖似干而痂薄如紙或有內證未除此痘之極險時也急宜調補庶不致害一痘瘡自出起至十日十一二日當從口唇頭面以漸收靨但自上而下者為順自下而上者為逆察有他證速宜治之一將收靨時而一向身溫忽然發熱者名為干漿是亦常候此時不可輕用汗下若有風寒外感及飲食所傷乃當隨證治之一痘瘡收靨太遲或當靨不靨者證有數種當詳辨治之大部當靨不靨之證惟脾胃弱中氣虛者居多蓋中氣虛則不能營養肌肉使之成實亦或致潰爛也但察其別無他證而形色氣血俱虛者宜內用十全大補湯外用敗草散襯之若當靨不靨微熱脈大而別無他證者此陰分之不足也宜四物湯倍加芍藥何首烏若血虛熱毒未清者宜四物湯加牛蒡子木通山楂若因食少脾胃氣虛而不收者宜六氣煎或六物煎加減主之若頻見泄瀉脾胃弱肌肉虛成腹脹煩渴而不收者宜陳氏十二味異功散或木香散外用敗草散敷之若當靨不靨之際忽見頭面溫足指冷身不熱或泄瀉腹脹氣促煩渴急與陳氏十二味異功散或九味異功煎遲則不救凡痘瘡將靨之時而見泄瀉煩渴腹脹咬牙等證多有難救若與蜜水生冷等物必煩躁轉加而死有因飲水過多或觸於濕氣以致脾胃肌肉濕淫不收難靨者宜五苓散或四苓散加山楂利之有因熱毒未退膚腠鬱蒸陰不能斂而當靨不靨者若不速解則毒必內攻為害不淺宜犀角散加芍藥牛蒡子有內外俱熱陽毒散漫以致大便祕結陰氣不行而當靨不靨者宜內用四順清涼飲或三黃丸以通其便外用敗草散豬膽導法有天寒失於蓋覆瘡受寒凝而不收者宜服五積散外用乳香或藝香於被內熏之有天熱過暖痘被熱蒸不收者宜內服人參白虎湯或五苓散四苓散以利濕熱外用天水散撲之有為邪穢陰寒所觸致傷元氣而不靨者宜保元湯或十二味異功散外以辟邪丹熏之豬髓膏塗之即愈一痘瘡內熱毒邪未盡化而干靨太疾者後必為目疾成為癰毒及諸怪證宜涼血養營煎少清其火若大便過於乾結者宜微利之以解其毒當歸丸主之一痘瘡有膿結靨則為善無膿結靨則為凶此治之不可緩也若痘已膿成不能結靨而反致潰爛或和皮脫去者此名倒靨乃毒氣入內也急須大補中氣以托其里宜六氣煎倍加芍藥及紫草防風白芷主之若兼濕熱者宜六氣煎加芍藥合四苓散主之如頭面瘡破服補藥後但得復腫復灌或遍身無瘡處又出一層謂之補空雖過期延日而飲食不減不為大害若服藥後不起不補此毒已入深最凶候也一痘瘡無論已潰未潰於十二日之後但得結靨便為佳兆若痂皮不結則必成倒靨其有回之未盡或遍身俱靨而但有數顆不靨者終致作癢抓破亦難必其生也速宜治之一靨時色白如梅花片者此為假回十二日後當死此不治之證也如不泄瀉可速用六氣煎或六物煎合二仙散大進救之一痘瘡成膿不靨以致潰爛膿汁淋漓黏著疼痛不可著席者用敗草散或蕎麥散以絹袋盛撲之更多布席上襯臥尤佳或用祕傳茶葉方亦佳若欲面上不成瘢者用救苦滅瘢散以密水調敷之一痘瘡潰爛先傷於面者凶兆也如飲食無阻二便如常更無他證者宜內用十全大補湯如毒盛內熱者宜以解毒防風湯加當歸蟬蛻相間服之外以救苦滅瘢散敷之一痘瘡於未灌之先或會傷犯破爛成瘡及諸痘收靨此獨不靨膿汁不幹更多痛楚若不急治漸成疳蝕損傷筋骨以致橫夭宜服十全大補湯外敷救苦滅瘢散或白龍散一痘瘡抓破去皮而猶有血水者急用六氣煎或六物煎主之外以白龍散敷之一痘有臭氣凡當收靨之時臭而帶腥者此痘瘡成熟之氣邪氣自內而出也為吉若臭如爛肉濁惡不可近者此雖似結痂未可為真急須清熱滋血宜涼血養營煎或解毒防風湯若於養漿之時便見臭者此毒火熏蒸之氣積於中而見於外也大凶速宜清熱以解其毒若痘瘡潰爛不靨而臭不可聞者名為爛痘間亦有收靨無事者只要胃氣不衰飲食如故不作煩躁則為可治宜用八珍湯或四味消毒飲外用敗草散敷之一痘瘡靨後而有生瘡潰爛成坑者須用托裡消毒散或解毒內托散主之如氣血俱虛而不斂者必用十全大補湯如遍身瘡多潰爛深而無氣血者必死靨後落痂治款二十九痘瘡結痂自當依期脫落其有應落下落及延綿日久者此亦不可不察而治之以防他變也一結痂至半月一月黏肉不落或發癢者此必表散太過傷其津液以致腠理虛澀無力脫卸故也宜用人參固肌湯或以真酥油麻油潤之如久而不脫宜六物煎加黃耆肉桂蟬蛻主之切不可勉強剝去恐傷皮膚一時難愈一遍身結痂雖完若餘熱未退蘊蓄肌表或身熱或煩渴而痂不落者宜涼血養營煎或解毒防風湯酌宜用之如熱甚者宜大連翹飲加地骨皮主之外宜用滑石為末以蜂蜜調勻雞翎掃潤痂上即落一痘瘢突起作癢不止者此熱毒未盡也宜解毒防風湯主之一痘瘢發癢剝去痂皮或血出或後成膿如瘡疥者此血熱氣虛也宜四君子湯或四物湯加紅花紫草牛蒡子治之一收靨遲而痂不落昏昏欲睡此邪氣已退正氣未復脾胃虛弱也宜五福飲或調元湯緩緩調治之若餘火未清者宜酸棗仁湯一痘痂既落中氣暴虛多有不能食者宜五味異功散或養中煎以調之一收靨落痂之後若餘熱不退譫語昏沉者用辰砂六一散以小柴胡湯調服之若大便祕脹者宜當歸丸利之熱甚者用大連翹飲最妙一原痘不灌膿干如豆殼雖痂落而疤白或有餘熱不退者雖過一日亦要死宜速用八珍十全之類調補之或毒盛者仍須先用消毒飲一痘痂既落之後血氣未復極當調護切不宜澡浴及食飲生冷傷飢過飽損傷臟氣致生他病為終生之患也慎之慎之痘後餘毒發熱三十瘡痘無論疏密只要毒出得盡而無留伏其發以漸而透其收以期而淨豈尚有餘毒哉若出不能盡發不能透收不能齊其人自有餘熱或渴而腹痛吐瀉或小便赤澀大便祕結精神昏慣四體倦怠飲食減少坐臥不安是皆餘毒未淨之證凡出之淨者作三四次出大小不一至成漿收靨之時於瘡空中猶有補出者此皆出之盡也若只始出一層後無補空之痘此必尚有伏也又發之透者必於手足候之蓋手足部遠氣不易達若能充拓飽滿漿氣頗足可謂發之透也若只平𤹀不能成膿此毒雖出而未能旁達四肢必有留而伏者又收之齊者自面而下痂皮潔淨中無潰爛可謂之齊若收之太早或不成痂此必有內陷之毒也凡若此者皆有餘毒須察部位經絡寒熱虛實或補或利或解或散以平為期若治之不應不已者此壞證也不必妄行攻擊一盡後發熱不減者此有虛實二證如能食而煩渴小便赤大便祕者實也宜四順清涼飲三黃丸之類主之若痘後餘毒未淨有諸熱證者惟大連翹飲為最佳如大便不祕小便不赤坐臥振搖飲食少進者虛也宜調元湯或五福飲加芍藥之類主之心鑑云痘後餘熱者虛熱也虛熱多發於午後臉赤唇紅或妄言譫語切不可作實熱治當用調元湯或保元湯加黃連熱甚者宜大連翹飲若妄用攻下使胃氣一虛則變生他患致成壞證不可治矣徐氏曰痘後餘熱不除者當量其輕重而治之大熱則利小便小熱則宜解毒蓋利其小水使心火有所導引雖不用涼藥而餘熱自無容留矣小熱宜解毒者蓋小熱不解恐大熱漸至矣利水者宜導赤散解毒者宜犀角地黃湯若但身表發熱而別無他證者止宜柴胡麥門冬散禁忌三十一一痘瘡起發之初全要避風寒遠人物節飲食守禁忌若到養漿之時尤宜謹慎如天氣大熱則去衣被當令清涼但謹門窗帷帳勿使邪氣透入如天寒則宜厚添蓋護房中勿絶燈火如或作癢須為撫摩勿使搔破以致難灌最當慎也一痘瘡房中凡諸臭穢腥香之氣及僧道師巫之人或罵詈呼怒震驚歌樂掃地對面搔癢對面梳頭之類皆不可不避一房中欲闢臭穢惟燒避邪丹或紅干棗或黃熟香皆佳若蒼朮之氣則太峻也一飲食最宜調和無使太過不及或好食何物有不宜者但少與之以順其意苦禁固太嚴使之忿怒恐反助火邪但不可縱耳至若助火生風及蔥蒜泄氣等物皆所當慎一痘瘡前後大忌豬肉魚酒之類恐惹終身痰咳一痘瘡平復之後勿與雞鴨蛋食之則傷神一痘疹退後須避風寒戒水濕如犯其邪則終身咳嗽患瘡無有休日東垣曰痘瘡宜避一切穢惡氣及外人入房遠行勞汗氣腋下狐臭氣房中淫液氣麝香臊膻氣婦人經候諸血腥臭氣硫黃蚊煙氣廁缸便桶氣誤燒頭髮氣吹滅燈燭氣雞毛魚骨氣蔥蒜韭薤氣以上皆不可犯須要時常燒乳香之類甘香之氣使之漸聞則營衛氣暢可無倒靨陷伏等患陳氏曰凡痘疹熱渴切不可與瓜柿蜜水等冷物及清涼飲消毒散等藥恐損脾胃則腹脹喘悶寒戰咬牙而難治輕變重者犯房室不忌口先曾瀉飲冷水餌涼藥也重變輕者避風寒常和暖大便調也薛氏曰前證苦兼吐瀉手足指冷屬內虛寒而外假熱也最忌寒涼苦大便不通渴欲飲水則蜜水之類又當用也但當審其熱之虛實可也今北方出痘多有用水無不愈者蓋化方多睡熱炕故也出不快三十二陳氏曰凡痘瘡出不快者多屬於虛若誤謂實熱壅盛妄用宣利之藥致臟腑受冷營衛澀滯不能運達肌膚則不能起發充滿亦不能結實成痂後必癢𤹀煩躁喘渴而死薛氏曰前證亦有各經熱盛壅遏而出不快者亦有毒盛痘疔而不能起發者亦有餘毒而潰癢者當細審其因而藥之景嶽曰接此二子之說皆為有理但此出遲不起之證總是氣血內虛不能速達者為最多若風寒外閉及痘疔留毒而不出不起者雖亦有之但不多耳再若各經熱盛而壅遏不出者則尤為最少何也蓋熱盛者毒必盛毒盛者勢必疾速而或密或早無能緩也故凡治此者必當察其熱之微甚以辨虛實再察外邪之有無以辨表裡如無外邪亦無痘疔而火邪不甚者則盡屬虛證宜從溫補不得雜亂以遺後患也諸治法詳報痘三朝治款中陷伏三十三凡看痘之法其出欲盡出不盡者伏也其發欲透發不透者倒陷也其收欲淨收不淨者倒靨也伏惟一證陷有數種凡毒之伏者患在未壯之先其人瘡雖出而熱不少減或煩渴或躁悶此必有伏毒未得全出也陷則患於既壯之後其血漸干而變黑者謂之黑陷漿膿未成而為癢𤹀或破損者謂之倒陷漿膿既成而復濕爛皮破不肯結靨收不乾淨者謂之倒靨亦陷類也是皆惡候凡治此者使非猛峻之劑安能望其回生時醫欲以尋常之藥救此危病其猶放雀搏鸇驅羊敵虎耳故其輕者宜奪命丹重者宜神應奪命丹則其庶幾耳倘服藥後而反增黑色者為必不治之證一痘之留伏毒不盡出者證有不同當辨治之有元氣不足而托送無力者此必稟賦素弱飲食素少身無大熱而出有不透即不足之證也宜十宣散蟬蛻膏之類加獨聖散主之若虛而有熱者宜人參透肌散有毒盛氣滯留伏經絡而出不透者必其人氣體厚濁身有大熱而汗不易出即皆有餘之證宜荊防敗毒散主之若表裡俱實外有大熱內有祕結煩滿而留伏不透者宜雙解散一乾黑不起而倒陷者當分五證一則內虛而陽氣不能外達故致出而覆沒或斑點白色或見灰黑倒陷者必其人不能乳食或腹脹內寒或手足冷或吐瀉或寒戰咬於皆內虛也速宜溫中輕則十宣散六氣煎甚則陳氏十二味異功散或九味異功煎外用胡荽酒噴之或更用十全大補湯但得冷者暖陷者起黑音紅活便是佳兆若服藥後而反加煩躁昏亂者死二則毒氣太盛內外熏灼不能盡達於表因而復陷於裡乃致熱煩躁擾氣喘妄言或大小便不利渴而腹脹是皆毒氣之倒陷也輕者利小便宜大連翹飲通關散或四順清涼飲甚者通大便宜承氣湯並外用水楊湯浴之得利後瘡出則佳更用加味四聖散調治之凡治此者但得陽氣不敗脾胃溫暖身溫欲飲水者生苦加寒戰身冷汗出耳尻反熱者死三則外感風寒肌竅閉塞血脈不行必身痛或四肢微厥斑點不長或變紫黑如癮疹者此倒伏也宜溫肌散表用桂枝葛根湯加麻黃蟬蛻或紫草飲外用胡荽酒噴之但令溫散寒邪使熱氣得行則痘自長矣四則或因誤下毒氣入里而黑陷者先宜六氣煎或溫胃飲以培養胃氣如表有未解者後宜柴葛桂枝湯以疏散於外甚者再加麻黃五則以房室不潔或為穢惡所觸而黑陷者宜內服紫草飲子外用胡荽酒噴之或用茵陳熏法並用辟邪丹一將起發時雖有漿水但色見黑黯者最為可畏急宜六氣煎加川芍以香血氣血氣旺則毒自散而色自活矣或以十全大補湯合無價散主之一凡倒靨之證亦須看大便何如苦大便祕結而內熱者宜利之以四順清涼飲或三黃丸主之若大便不實而內不熱者宜補之以六氣煎或十全大補湯加防風白芷甚而泄瀉者宜陳氏十二味異功散有雖不泄瀉而虛寒甚者宜九味異功煎並外用敗草散一治陷伏證有三驗法凡服藥之後但得陷者復腫漸以成膿乃一驗也苦原瘡已干而別於空處另出一層起發成膿漸以收靨者二驗也亦有不腫不出只變自利下去膿血而飲食精神如故者三驗也有驗者吉無則凶癢𤹀抓破三十四訣云虛則癢實則痛又曰諸癢為虛此固其辨矣然實即兼熱也虛印兼寒也蓋如瘡瘍之痛必由乎熱今不作痛而作癢此其無熱可知無熱由乎陽虛陽虛便是寒證諸有以初起作癢為火者皆謬也且凡痘瘡發癢則多為不起不灌而𤹀陷繼之最可慮也故凡治癢之法雖云當補然尤不可不溫惟溫補則營衛和氣血行而痘自起矣痘毒既起而透則多有作痛尚何癢哉故痘於起發之時則宜痛不宜癢也然癢有數證亦當辨治如下一痘瘡初見點便作癢者此邪在半表半裡之間而進退遲疑總由元氣無力欲達不能也速當溫補陽氣兼以疏散但使腠理通暢則痘自起而癢自止矣宜六氣煎加川芍白芷防風荊芥之屬若虛在血分而色白者宜六物煎或五物煎加減主之一痘瘡出齊之後但是作癢俱宜保元湯或六氣煎加川芎當歸防風荊芥治之或用十全大補湯或用蟬蛻膏一血滲肌膚咸蜇皮肉而作癢者亦以氣虛而然宜保元湯加芍藥當歸以制血或加丁香以治里官桂以治表表裡俱實自不作癢程氏曰凡前後癢𤹀宜保元湯加何首鳥牛蒡子白芍藥何首鳥須赤白兼用一痘瘡干而作癢者宜養血潤燥以五物煎加防風荊芥外用茵陳熏法一痘瘡濕而作癢者宜補氣去濕以四君子湯加防風荊芥桂枝以解之外用菌陳熏法一頭面為諸陽之會若癢而抓破則泄氣最甚速宜六氣煎或十全大補湯加防風荊芥何首烏之屬以培補之但得復腫復灌而飲食如常則無害若癢不止而滿面抓破者必死一遍身發癢抓破膿血淋漓者宜參耆內托散倍加當歸及白芷荊芥木香使氣和血行其癢自止外以敗草散敷之一瘡癢潰爛黏衣連席難任者內服十全大補湯加防風荊芥外用敗草散一痘瘡見形而皮肉紅豔起發而皮嫩多水者其後多致癢𤹀也急須先期調補之一痘瘡將收而癢者其膿已成其瘡已回邪散而正復營衛和暢故癢也不須服藥但謹護之勿令抓破以致損傷成瘡一漿膿初化膿未成而混身瘙癢不寧者此惡候也速當溫補氣血用六氣煎六物煎之類加以防風白芷荊芥之屬必令癢去方保無慮若癢甚不休瘡壞皮脫其毒復陷謂之癢𤹀必不能活矣活幼心書云凡作癢不止用荊芥穗以紙束之用刺癢處以散郁邪其癢自止此屢驗之法內服消風化毒湯加參歸以解之作痛三十五痘瘡作痛有實有虛雖曰諸痛為實然此言亦不可執若身有大熱而大便祕結煩躁不寧喘脹作渴而為痛者此實痛也若無大熱而二便清利脾氣不健衛氣不充營失所養而作痛者此虛痛也實者宜解毒清火當用解毒湯或四味消毒飲之類主之虛者宜補香血氣當用保元湯或六物煎之類主之頭面腫三十六經曰熱甚則腫大抵毒盛者必腫毒微者不腫故亦可以腫與不腫察毒之甚與不甚也然痘瘡應期起發毒必以漸盡出故頭面亦必以漸浮腫此毒火聚於三陽之分欲化膿漿其宜然也然止宜微腫而甚腫者大作所宜若當起發之時頭面全然不腫必其痘稀磊落毒氣輕淺者然此最吉兆也一痘以漸起面以漸腫及灌膿收靨而腫以漸消此常候也如應腫不腫者必其元氣不足應消不消者必其毒氣有餘須急治之一有痘未起發而頭面預腫皮光色嫩如瓠瓜之狀此惡毒上衝之候也又有痘點已見但隱隱於皮膚之中肉目腫而痘不起者決死汪氏理辨曰痘起五六日之際有面目先腫而光亮者是陽乘陰分毒不能發也何也血乃氣之本氣乃血之標血有不足則根本之力已虧故致虛陽動作其氣妄行肉分區區不足之血何能載毒而出七日之後傳經已足則氣退毒陷陰陽各失其正尚何可治之有凡值此者不可不預調氣血若待臨期無能為矣一痘正起發頭面腫脹時正面之瘡切防瘙癢不可使之抓破少有損傷以致真氣外泄邪氣內蝕則腫消毒陷多致死矣但得破者復灌消者復腫飲食二便如常則變凶為吉矣宜十全大補湯或合苦參丸治之一頭面腫脹而眼目咽喉痛閉者急宜解毒眼與咽喉相兼治之宜消毒化斑湯去升麻或大連翹飲主之一兼疫毒之氣而頭項腮頜預腫者此必大頭風及蝦蟆瘟之屬宜以疫氣治之如大連翹飲及普濟消毒飲之類主之但兼此者亦多凶少吉也痘疔黑陷三十七痘有紫黑枯硬而獨大針撥不動手捻有核者是為痘疔若不去之則一身之痘皆不能起發或皆變黑色必致死矣其有黑大而軟者此名黑痘慎不可作痘疔治也痘疔者以熱毒蓄積氣血凝敗而成也然其類亦有數種最為惡候宜謹察之有初出紅點漸變黑色其硬如石者此肌肉已敗氣血中虛不能化毒反致陷伏也有肌肉微腫狀如堆粟不分顆粒者此氣滯血凝毒氣結聚不散也有中心黑陷四畔突起戴漿者此血隨毒走氣不能充也有中心戴漿自破潰爛者此氣血俱虛皮膚敗壞也有為水泡溶溶易破者此脾虛不能制濕氣虛不能約束也有為血泡色紫易破者此血熱妄行而氣虛不能完固也有瘡頭針孔漿水自出者此衛氣已敗其液外脫也以上數證雖與痘疔不同而危險無異但於五六日間候之若見一證多不可治一凡痘疔及黑陷者宜內服六氣煎加川芎紫草紅花木通之類以補血涼血而疔自退疔退後宜大進六氣煎或六物煎外用四聖丹以胭脂汁調點之疔若大者用銀針挑破瘡口吸出惡血入後藥末即轉紅活大抵黑陷而疔多或餘毒不起者多死苦痘疔挑去黑血搽藥不變仍是黑色者必死心鑑曰痘疔見於四肢不近臟腑者易治若穿筋骨者亦難治但有見於頭面腹背逼近於內者其勢必攻穿臟腑矣如未穿者急須治之用飛過雄黃以真蟾酥拌勾為丸如麻子大挑疔點入立效又成用巴豆一粒去皮膜合硃砂一分研爛點入一時突出即愈內服無價散汲井水加豬尾血三五點調下一痘瘡黑陷者必氣不足血不活也急宜托裡散或六物煎加川芍肉桂紅花蟬蛻調無價散或獨聖散甚者宜九味異功煎或十全大補湯調無價散仍外用四聖丹點之若見焦紫而黑混身皆是及身有大熱或大便祕結內熱煩渴者此亦有火毒之證宜四順清涼飲或承氣湯合萬氏奪命丹以解其毒俟火邪略退即宜用六氣煎調無價散以托其內亦可望其生也一痘瘡起發之時但見乾燥其根焦黑即當速治之如火邪不甚證無大熱者惟五物煎或六物煎為最宜也如有火證火脈血熱毒盛而焦黑者輕則涼血養營煎或鼠黏子湯甚則以萬氏奪命丹合而服之一原有瘡疥未愈至痘出之時其破處痘有攢聚而形色黑潰者急以銀針挑破吮去毒血吐於水中其血紅者可治黑者難治須內服加味四聖散或萬氏奪命丹外用萬氏四聖散塗之一靨後痘疔潰爛成坑內見筋骨者宜托裡消毒散或荊防敗毒散加穿山甲蟬蛻殭蠶外用神效當歸膏或太乙膏貼之或以白龍散敷之飲食三十八痘瘡終始皆以脾胃為主但能飲食則氣血充實而凡起發灌漿收靨無不賴之故能食者雖痘瘡稠密亦自無害不能食者雖痘瘡稀少亦為可虞此脾胃之調所當先也然證有不同最須詳審施治一痘有毒氣正盛而不食者當痘瘡正出之時雖不欲食但得痘色真正不為害也蓋熱毒未解於將出未出之際多有不欲食者待毒氣盡出自能食矣其有痘已盡出而仍不欲食者當徐用四物湯加神麯砂仁陳皮一二劑必能食矣一痘見灰白別無大熱停滯等證而食少或不食者必脾胃虛也宜五味異功散或四君子湯若胃中陽氣不足不能運化而食少者此處而且寒也宜溫胃飲養中煎或六氣煎主之一凡命門元暢不足則中焦胃氣不暖故多痞滿不食下焦腎氣不化故多二陰不調此必用理陰煎加減治之自見神效勿謂小兒無陰虛證也一凡泄瀉或見噁心或嘔吐而不食者尤屬胃氣虛寒也輕則理中湯六氣煎甚則陳氏十二味異功散或用六氣煎合二仙散主之一凡脾氣不虛但胃口寒滯或痛或嘔而不食者宜益黃散一凡停食多食而不食者宜大小和中飲以清宿滯或五味異功散加山查麥茅神麯砂仁或合勻氣散治之一凡口瘡不能進食或咽喉疼痛而不能食者但清其咽痛止自會矣宜草桔湯或加味甘桔湯一凡外感風寒邪入胃口則不能食須表散寒邪邪散自能食矣宜加減參蘇飲或柴陳煎或五味異功散加柴胡一痘後別無他證而飲食不進者此惟脾氣不足宜五味異功散或溫胃飲養中煎之類主之程氏曰凡水穀不能運化而飲食不進者只用保元湯加陳皮麥茅神麯砂仁扁豆生薑嘔者加真藿香徐氏曰痘瘡不乳食者有虛實二證或吐或利面目青白或青黑色者為虛寒宜溫之補之若大小二便乾澀面赤而氣壅或渴或熱或目睛黃赤氣粗中滿者為實熱宜清之利之咽喉口齒三十九咽喉司呼吸之升降乃一身之橐籥也毒氣不能舒散則壅聚於此腫痛閉塞水漿難入則死生系之深可畏也首尾俱宜甘桔湯加麥門冬牛蒡子玄參杏仁或加味甘桔湯及拔萃甘桔湯俱可用熱甚痛甚者宜東垣涼膈散加牛蒡子或以甘桔湯合黃連解毒湯加石膏木通牛蒡子山豆根射干並外用玉鑰匙點之咽痛便祕者宜四順清涼飲下之以上證治必其能食肉熱者方可用此寒涼之劑若上焦雖熱而下焦不熱或不喜飲食者只用加味甘桔湯徐徐咽服不必用牛蒡子恐其性涼傷脾也一咽喉腫痛凡痘瘡多有是證但七日前見者為逆七日後見者無慮蓋起發灌膿之時內外之痘俱大以致氣道壅腫而然此痘也非喉痹之毒也待外痘既靨則內證自除矣不必治之徐氏曰凡咽喉腫痛不能飲食者內服加味甘桔湯外看身上有痘之最大者此其毒氣相連宜用香油燈草燃而淬之一淬即愈或用手捻破以痘疔散塗之陳氏曰凡身壯熱大便堅實或口舌生瘡咽喉腫痛皆瘡毒未盡宜用四味射干鼠黏子湯如不應宜七味白朮散一痘瘡弄舌吐舌者脾之熱也輕者導赤散甚者瀉黃散一唇口與五內相通故熱毒內發口舌必先受傷毒甚則口舌或紫或白或黑舌或腫大此皆實熱之證宜內服黃連解毒湯加石膏牛蒡子木通生地或東垣涼膈散若大便乾結者宜局方涼膈散外用玉鑰匙點之若口舌生疳者以吹口丹或陰陽散敷之一牙齦腫爛成疳者此陽明熱毒內攻也殺人甚速宜甘露飲主之外用老茶葉菲菜根煎濃湯洗之仍用翎毛刷去腐肉洗見鮮血乃以神授丹或搽牙散敷之日三次或綿繭散亦可若爛至喉中者用小竹管將綿繭散吹入雖遍口牙齒爛落口唇穿破者皆可敷藥而愈然必有黃白膿水者方可治若色如干醬其肉臭爛日爛一分者俱不治一牙疳臭爛氣粗熱甚舌白至唇口臭如爛肉大便瀉膿血肚腹脹痛此胃虛毒氣內攻胃爛之證苦山根發紅點者此疳毒內攻故見於山根亦胃爛之證俱不治一痘疹退後若有牙齦腐爛鼻血橫流者併為失血之證宜局方犀角地黃湯加山梔木通玄參黃芩之類以利小便使熱毒下行外用神授丹治之不可緩也若疳瘡色白者為胃爛此不治之證痘瘡中論列方四十保元湯痘一調元湯痘二五味異功散補四四君子湯補一五福飲新補六九味異功煎因二三四物湯補八五物煎新因二十二味異功散痘二二二陰煎新補十六物煎新因二十十一味木香散痘二一二仙散痘二十六氣煎痘二五八十全大補湯補二十十宣散痘十四八珍湯補十九六味回陽飲新熱二溫胃飲新熱五理中湯熱一七味白朮散小七養中煎新熱四理陰煎新熱三七味安神丸小七三益黃散和十九胃愛散痘十九莫能助黃耆建中湯補二七芎歸湯痘十五托裡散痘四參耆內托散痘七惺惺散小二三酸棗仁湯補八四人參固肌湯痘十二柴陳煎新散九柴葛煎新因十八人參透肌散痘十三柴歸飲新因十五蘇葛湯痘二七升麻葛根湯痘二六疏邪飲新因十六小柴胡湯散十九柴葛桂枝湯痘三六參蘇飲散三四柴胡飲子痘四二加減參蘇飲痘三四五積散散三九五柴胡欲新散五桂枝葛銀渴痘三七雙解散痘四一羌活散痘三八麻黃甘草湯痘三五益元散寒百十二搜毒煎新因十九柴胡麥門冬散痘二四天水散寒百十二敗毒散痘三一又三二荊防敗毒散痘三一六一散寒百十二解毒湯痘五一黃連解毒湯寒一甘露飲寒十消毒散痘四七托裡消毒散痘六五苓散和一八二瀉黃散寒五七解毒內托散痘五四苓散和一八七退火丹痘八四實表解毒湯痘五四導赤散寒一二二苦參丸痘九九四味消毒欲痘四八當歸丸痘九五大和中飲新和七六味消毒飲痘四九三黃丸攻六八小和中飲新和八毒防風湯痘五六承氣湯攻一肉豆蔻丸小五六消風化毒湯痘五八通關散痘八五橘皮湯痘九二涼血化毒湯痘五九獨聖散痘七八勻氣散痘九三普濟消毒飲寒十三蟬退膏痘四六化痰丸小九九消毒化斑湯痘五十無價散痘七九三酥餅痘八十養血化斑湯痘十八敗草散痘一二六抱能丸小八五涼血養營煎新因十七胡荽酒痘百十八保嬰丹痘百五玄參地黃湯痘八六水楊湯痘百二十大連翹飲寒七八速翹升麻湯痘二八胭脂汁痘一二五犀角散痘六三犀角地黃湯寒七九豬髓膏痘一二二快斑湯痘七三快斑越婢湯痘七四蕎麥散痘一二四鼠黏子湯痘七六射干鼠黏子湯痘七七茶葉方痘一二一紫草欲子痘六七柴草木通湯痘七十白龍粉痘一二七紫草飲痘六六紫草木香湯痘六九神授丸因一五六紫草散痘六五柴草快斑湯痘六八綿繭散痘一三四如聖湯痘十一加味甘桔湯痘九十痘疔散痘百十四甘桔湯因一七五拔萃甘桔湯因一七六陰陽散外一三三四聖丹痘百十五參耆四聖散痘八吹口丹痘一三六玉鑰匙因一九三加味四聖散痘十搽牙散痘一三五辟邪丹痘百三十萬氏四聖散痘百十六茵陳薰法痘百十九人參白虎湯寒三四順清涼飲攻二五局方涼隔散痘十九東垣涼膈散痘八三前胡枳殼湯痘九四萬氏奪命丹痘八二神應奪命丹痘八一救苦滅瘢散痘一二八萬氏牛黃清心丸小九四神效當歸膏外三一四太乙膏外三百八
