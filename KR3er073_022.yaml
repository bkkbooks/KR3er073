body:
  text: 卷之二十二心集雜證謨腫脹經義腹中論帝曰有病心腹滿旦食則不能暮食此為何病岐伯曰名為鼓脹治之以雞矢醴一劑知二劑已帝曰其病有復發者何也曰此飲食不節故時有病也雖然其病且已時故當病氣聚於腹也經脈篇曰足太陰虛則鼓脹胃中寒則脹滿水脹篇曰膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也帝曰鼓脹何如岐伯曰腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也脹論帝曰脈之應於寸口如何而脹岐伯曰其脈大堅以澀者脹也帝曰何以知臟腑之脹也曰陰為臟陽為腑帝曰夫氣之令人脹也在於血脈之中耶臟腑之內乎曰三者皆存焉然非脹之舍也夫脹者皆在於臟腑之外排臟腑而郭胸脅脹皮膚故命曰脹五臟六腑者各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛六腑脹胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息岐伯曰衛氣之在身也常然並脈循分肉行有逆順陰陽相隨乃得天和五臟更始四時循序五穀乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也此下針治之法具詳本經陰陽應象大論曰濁氣在上則生䐜脹生氣通天論曰因於氣為腫四維相代陽氣乃竭五臟生成篇曰腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明本神篇曰脾氣實則腹脹腎氣實則脹六元正紀大論曰太陰所至為中滿霍亂吐下太陰所至為重胕腫土鬱之發民病心腹脹胕腫身重至真要大論曰諸濕腫滿皆屬於脾諸脹腹大皆屬於熱按以上諸脹皆言氣之為病也水熱穴論帝曰少陰何以主腎腎何以主水岐伯曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也帝曰腎何以能聚水而生病曰腎者胃之關也關門不利故聚水而從其類也故水病下為胕腫大腹上為喘呼不得臥者標本俱病水脹篇曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如囊裹水之狀此其候也五癃津液別篇曰陰陽氣道不通四海閉塞三焦不瀉津液不化留於下焦不得滲膀胱則下焦脹水溢則為水脹評熱病論曰諸有水氣者微腫先見於目下也水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也經脈篇曰胃病則大腹水腫邪氣臟腑病形篇曰胃病者腹䐜脹胃脘當心而痛上支兩脅隔咽不通食飲不下三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹腎脈微大為石水起臍已下至小腹腄腄然上至胃脘死不治宣明五氣篇曰下焦溢為水逆調論曰不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水藏主津液主臥與喘也陰陽別論曰陰陽結斜多陰少陽曰石水少腹腫三陰結謂之水湯液醪醴論帝曰其有不從毫毛生而五臟陽已竭也津液充郭其魄獨居孤精於內氣耗於外形不可與衣相保此四極急而動中是氣拒於內而形施於外治之奈何岐伯曰平治於權衡去宛陳莝是以微動四極溫衣繆刺其處以復其形開鬼門潔淨府精以時復五陽已布疏滌五臟故精自生形自盛骨肉相保巨氣乃平按以上諸脹皆言水之為病也太陰陽明論曰食飲不節起居不時者陰受之陰受之則入五臟則䐜滿閉塞異法方宜論曰北方者其民樂野處而乳食臟寒生滿病按以上二條乃言飲食之為脹也論證共四條腫脹之病原有內外之分蓋中滿者謂之脹而肌膚之脹者亦謂之脹若以腫言則單言肌表此其所以當辨也但脹於內者本由臟病而腫於外者亦無不由乎臟病第臟氣之病各有不同雖方書所載有濕熱寒暑血氣水食之辨然余察之經旨驗之病情則惟在氣水二字足以盡之故凡治此證者不在氣分則在水分能辨此二者而知其虛實無餘蘊矣病在氣分則當以治氣為主病在水分則當以治水為主然水氣本為同類故治水者當兼理氣蓋氣化水自化也治氣者亦當兼水以水行氣亦行也此中玄妙難以盡言茲雖條列如左然運用之法貴在因機通變也一病在氣分者因氣之滯如氣血之逆食飲之逆寒熱風濕之逆氣虛不能運化之逆但治節有不行者悉由氣分皆能作脹凡氣分之病其色蒼其內堅其脹或連胸脅其痛或及臟腑或倏而浮腫者陽性急速也或自上及下者陽本乎上也或通身盡腫者氣無不至也有隨按而起者如按氣囊也然此雖皆氣分而氣病有不同故有氣熱而脹者曰諸脹腹大皆屬於熱也有氣寒而脹者曰胃中寒則䐜脹曰臟寒生滿病也有氣濕而脹者曰諸濕腫滿皆屬於脾也有氣虛而脹者元氣虛也曰足太陰虛則鼓脹也有氣實而脹者邪氣實也曰腎氣實則脹曰脾氣實則腹脹曰胃氣實則脹也凡此雖皆脹病而治之之要則全在察其虛實大都陽證多熱熱證多實陰證多寒寒證多虛先滯於內而後及於外者多實先腫於表而漸及於內或外雖脹而內不脹者多虛小便紅赤大便祕結者多實小便清白大便稀溏者多虛脈滑有力者多實弦浮微細者多虛形色紅黃氣息粗長者多實形容憔悴聲音短促者多虛年青少壯氣道壅滯者多實中衰積勞神疲氣怯者多虛虛實之治反如冰炭若誤用之必致害矣一病在水分者以陰勝於陽而肌膚皆腫此與氣證本有不同凡水之為病其色明潤其皮光薄其腫不速每自下而上按肉如泥腫有分界蓋陰本於下而浸漬有漸皆水病之證也觀水脹篇言寒氣之脹按其腹窅而不起水腫之病以手按其腹隨手而起如囊裹水之狀此其候也然以愚見乃察之證驗則若與此論相反蓋凡是水證必按之窅而不起此其水在肉中如糟如泥按而散之猝不能聚未必如水囊之此凡隨按隨起者亦惟虛無之氣其速乃然故辨當若此也凡欲辨水氣之異者在欲辨其陰陽耳若病在氣分則陽證陰證皆有之若病在水分則多為陰證何也蓋水之與氣雖為同類但陽王則氣化而水即為精陽衰則氣不化而精即為水故凡病水者本即身中之血氣但其為邪為正總在化與不化耳水不能化因氣之虛豈非陰中無陽乎此水腫之病所以多屬陽虛也然水主於腎氣主於肺水漬於下而氣竭於上所以下為腫滿上為喘急標本俱病危斯亟矣此當速救本源庶保萬一倘以虛喘作實邪而猶然泄肺無不敗矣一少年縱酒無節多成水鼓蓋酒為水穀之液血亦水穀之液酒入中焦必求同類故直走血分經曰飲酒者衛氣先行皮膚先充絡脈此之謂也然血者神氣也血屬陰而性和酒者淫氣也酒屬陽而性悍凡酒入血分血欲靜而酒動之血欲藏而酒逐之故飲酒者身面皆赤此入血之徵亦散血之徵也擾亂一番而血氣能無耗損者未之有也第年當少壯則旋耗旋生固無所覺及乎血氣漸衰則所生不償所耗而且積傷並至病斯見矣故或致血不養筋則為中風或致傷脾則為痰飲瀉痢或濕熱上浮則為喘汗鼻淵或流於筋骨則為瘈瘲疼痛或致動血傷精則為勞損吐衄或致傷肌腐肉則為爛瘡痔漏其有積漸日久而成水鼓者則尤多也蓋酒性本濕壯者氣行則已酒即血也怯者著而成病酒即水也不惟酒為水而血氣既衰亦皆隨酒而悉為水矣所以凡治水鼓者必當以血氣為主而養陰利濕是誠善矣然奈無知少年初不知畏而惟酒是耽此其浸漬已非一日致令血氣天真敗極至此又豈能以旦夕挽回者哉故於諸鼓之中則尤以酒鼓為最危難治之證嘗有一杜康之徒不信余說云公為此言其亦過矣茲見有某人者以酒為生自朝繼暮今年已若干未聞其病豈酒果傷人者耶是不知若人者惟千百中之一二而天稟之特出者也不然何善飲者如此其多而壽於飲者僅見其人則其他之困於此者從可知矣使不有斯人之稟而有斯人之嗜吾恐其不免於斯矣腫脹危候大凡水腫先起於腹而後散四肢者可治先起於四肢而後歸於腹者難治掌腫無紋者死大便滑泄水腫不消者死唇黑唇腫齒焦者死臍腫突出者死缺盆平者死陰囊及莖俱腫者死脈絶口張足腫者死足胕腫膝如斗者死肚上青筋見瀉後腹腫者死男從身下腫上女從身上腫下皆難治氣分諸脹論治凡八條凡脹滿由於氣分者宜察氣之虛實若脹滿在中而不在外者其病多實經曰中滿者瀉之於內此之謂也若果因酒食厚味氣滯脈滑而大滿大實者宜廓清飲主之兼脹兼痛諸藥不效者宜神香散主之若臟腑脹實而堅痛者宜承氣湯或百順丸下之然必年壯力強素無損傷虛弱等證而暴見脹滿者方可峻攻否則只宜緩治如果氣實於中而表裡俱脹者宜用蒜瓣以滾湯煮微熟留性少蘸鹽醋常以佐食大能破氣消滯亦佳法也若氣脹而兼小水不利者宜用四苓散以半熟蒜搗膏丸服極妙一飲食停滯而致胃口中焦脹滿者宜大小和中飲酌用之兼痛者宜排氣飲主之一怒氣逆於中焦或脹或痛者宜排氣飲解肝煎之類主之兼喘脹者宜四磨飲或神香散一大人小兒素無脾虛泄瀉等證而忽爾通身浮腫或小水不利者多以飲食失節或濕熱所致宜廓清飲加減主之或四苓散胃苓湯之類皆可用或濕勝者宜平胃散之類主之一脾胃虛寒中氣不健而三焦脹滿者是為氣虛中滿其為證也必多吞酸噯腐惡食惡寒或常為溏泄而別無火證火脈者必屬臟寒此所謂臟寒生滿病也惟宜溫補寒在中焦者宜溫胃飲理中湯寒在下焦者宜理陰煎八味地黃湯之類主之一單腹脹者名為鼓脹以外雖堅滿而中空無物其象如鼓故名鼓脹又或以血氣結聚不可解散其毒如蠱亦名蠱脹且肢體無恙脹惟在腹故又名為單腹脹此實脾胃病也夫脾胃為中土之臟為倉廩之官其臟受水穀則有坤順之德其化生血氣則有干健之功使果脾胃強健則隨食隨化何脹之有此惟不善調攝而凡七情勞倦飲食房闈一有過傷皆能戕賊臟氣以致脾土受虧轉輸失職正氣不行清濁相混乃成此證凡治此者若察其病由中焦則當以脾胃為主宜參耆白朮乾薑甘草之屬主之若察其病由下焦則當以命門母氣為主宜人參熟地當歸山藥附子肉桂之屬主之如果氣有痞塞難於純補則宜少佐辛香如陳皮厚朴砂仁香附丁香白芥子之屬如或水道不利濕氣不行則當助脾行濕而佐以淡滲如豬苓澤瀉茯苓之屬若諸藥未效仍當灸治如後法以上諸法大略如此然病成單鼓終非吉兆必其傷敗有漸然後至此使非盡掃塵務加意調理則未有或免者矣一治脹當辨虛實若察其果由飲食所停者當專去食積因氣而致者當專理其氣因血逆不通而致者當專清其血其於熱者寒之結者散之清濁混者分利之或升降其氣或消導其邪是皆治實之法也第凡病腫脹者最多虛證若在中年之後及素多勞傷或大便溏滑或脈息弦虛或聲色憔悴或因病後或因攻擊太過而反致脹滿等證則皆虛損之易見者也諸如此類使非培補元氣速救根本則輕者必重重者必危矣若虛在脾肺者宜四君子湯歸脾湯之類主之若脾虛兼寒者宜理中湯溫胃飲五君子煎若脾虛兼痰者宜六君子煎若腎虛兼痰者宜金水六君煎若虛在肝腎者宜六味地黃湯若腎虛兼寒者宜理陰煎或八味地黃丸甚者加減金匱腎氣湯主之若以虛證而妄行消伐則百不活一矣其有果以少壯停滯或肝強氣逆或時氣亢害為邪者方可直攻其病但辨之宜詳不可忽也一凡外感毒風邪留膚腠則亦能忽然浮腫如東垣所謂八益之邪自外而入者是也然其來必速其證則必有脈緊及頭疼骨痛等證方是外感之候先宜解散其邪如正柴胡飲小柴胡湯敗毒散參蘇飲葛根蔥白湯之類隨宜用之若風因火熾而表裡俱熱者宜芍藥清肝散或龍膽瀉肝湯之類主之若邪傳入里太陽陽明並病而胃實熱甚必日晡潮熱大渴引飲者白虎湯主之若大實大滿而熱結不退者大承氣湯或百順丸下之若少陽陽明並病寒熱往來滿而實者宜大柴胡湯下之五常政大論曰下之則脹已此之類也水腫論治凡七條凡水腫等證乃脾肺腎三臟相干之病蓋水為至陰故其本在腎水化於氣故其標在肺水惟畏土故其制在脾今肺虛則氣不化精而化水脾虛則土不制水而反克腎虛則水無所主而妄行水不歸經則逆而上泛故傳入於脾而肌肉浮腫傳入於肺則氣息喘急雖分而言之而三臟各有所主然合而言之則總由陰勝之害而病本皆歸於腎內經曰腎為胃關關門不利故聚水而從其類也然關門何以不利也經曰膀胱者州都之官津液藏焉氣化則能出矣夫所謂氣化者即腎中之氣也即陰中之火也陰中無陽則氣不能化所以水道不通溢而為腫故凡治腫者必先治水治水者必先治氣若氣不能化則水必不利惟下焦之真氣得行始能傳化惟下焦之真水得位始能分清求古治法惟薛立齊先生加減金匱腎氣湯誠對證之方也余屢用之無不見效此雖壯水之劑而實即脾肺腎三臟之正治也何也蓋腎為先天生氣之源若先天元氣虧於下則後天胃氣失其本而由脾及肺治節所以不行是以水積於下則氣壅於上而喘脹由生但宜峻補命門使氣復元則三臟必皆安矣今論其方如所用桂附以化陰中之陽也熟地山藥牛膝以養陰中之水也茯苓澤瀉車前子以利陰中之滯也此能使氣化於精即所以治肺也補火生土即所以治脾也壯水通竅即所以治腎也此方補而不滯利而不伐凡病水腫於中年之後及氣體本弱者但能隨證加減用之其應如響誠諸方之第一更無出其上者一證有全由脾肺不足而為腫脹者治宜以四君歸脾之屬為主固是正治之法然亦須兼補命門蓋脾土非命門之火不能生肺氣非命門之水不能化人知土能制水而不知陽實制陰人知氣化為精而不知精化為氣也虛則補母正此之謂一凡素稟陽盛三焦多火而病為水腫者其證必煩渴喜冷或面赤便結或熱而喘嗽或頭面皆腫或脈見滑實此濕熱相因陰虛之證也凡辛香燥熱等劑必所不堪宜用六味地黃湯加牛膝車前麥冬之類大劑與之其有熱甚者宜加減一陰煎加茯苓澤瀉車前牛膝之類主之其有虛中挾實胸膈不清宜加陳皮白芥子之類佐之其有生平不宜熟地者則單用生地亦可但此等壯水等劑必十餘服後方可望效若先因克伐致虛者其效尤遲慎毋欲速自求伊戚也一凡年少縱酒致為濕熱所乘元氣尚強脈實有力而不便於溫補者此當逐去濕熱亦能速效宜禹功散導水丸浚川散三花神佑丸之類皆可擇用瀉後宜薄滋味戒飲酒久之方可復元古法治腫大都不用補劑而多用去水等藥微則分利甚則推逐如五苓散五淋散五皮散導水茯苓湯之類皆所以利水也如舟車神佑丸浚川散禹功散十棗湯之類皆所以逐水也再如巴豆朴硝針砂滑石三稜蓬朮麝香琥珀土狗地龍田螺水蛭鯉魚鯽魚蘿匐子蘇子商陸葶藶杏仁防已秦艽木瓜瞿麥通草厚朴赤小豆豬苓海金砂五加皮大腹皮羌活獨活之類無非逐水利水之劑但察其果系實邪則此等治法誠不可廢但必須審證的確用當詳慎也凡今方士所用則悉皆此類故能晚服而早通朝用而暮瀉去水斗許腫脹頓消效誠速也但彼不顧人之虛實不慮人之死生惟以見效索謝而去不知隨消隨脹不數日而復脹必愈甚苟以年衰積損之證而復遭此劫則百無一生矣一水腫證以精血皆化為水多屬虛敗治宜溫脾補腎此正法也然有一等不能受補者則不得不從半補有並半補亦不能受者則不得不全用分消然以消治腫惟少年之暫病則可若氣血既衰而復不能受補則大危之候也故凡遇此輩必須千方百計務救根本庶可保全嘗見有專用消伐而退腫定喘者於腫消之後必尫羸骨立略似人形多則半年少則旬日終無免者故余之治此凡屬中年積損者必以溫補而愈皆終身絶無後患蓋氣虛者不可復行氣腎虛者不可復利水且溫補即所以化氣氣化而全愈者愈出自然消伐所以逐邪逐邪而暫愈者愈由勉強此其一為真愈一為假愈亦豈有假愈而果愈者哉一無論氣鼓水鼓凡氣實可下者宜用赤金豆或百順丸以漸利之新按二條腫脹之治凡脾腎虛證如前論所列薛氏腎氣湯者誠然善矣然用之之法猶當因此廓充不宜執也向余嘗治一陶姓之友年逾四旬因患傷寒為醫誤治危在呼吸乃以大劑參附熟地之類幸得挽回愈後喜飲未及兩月忽病足股盡腫脹及於腹按之如鼓堅而且硬因其前次之病中氣本傷近日之病又因酒濕度非加減腎氣湯不可治遂連進數服雖無所礙然終不見效人皆料其必不可治余熟計其前後病因本屬脾腎大虛而今兼以滲利未免減去補力亦與實漏卮者何異元氣不能復病必不能退遂悉去利水等藥而專用參附理陰煎仍加白朮大劑與之三劑而足脛漸消二十餘劑而腹脹盡退愈後人皆歎服曰此證本無生理以此之脹而以此之治何其見之神也自後凡治全虛者悉用此法無一不效可見妙法之中更有妙焉顧在用者之何如耳塞因塞用斯其最也學者當切識此意一因食滯氣痛脹余嘗治一姻家子年力正壯素日飲酒亦多失飢傷飽一日偶因飯後脅肋大痛自服行氣化滯等藥復用吐法盡出飲食吐後逆氣上升脅痛雖止而上壅胸膈脹痛更甚且加嘔吐余用行滯破氣等藥嘔痛漸止而左乳胸肋之下結聚一塊脹實拒按臍腹隔閉不能下達每於戌亥子醜之時則脹不可當因其嘔吐既止已可用下凡大黃芒硝稜莪巴豆等藥及蘿蔔子朴硝大蒜橘葉搗罨等法無所不盡毫不能效而愈攻愈脹因疑為脾氣受傷用補尤覺不便湯水不入者凡二十餘日無計可施窘劇待斃只得用手揉按其處彼云肋下一點按著則痛連胸腹及細為揣摸則正在章門穴也章門為脾之募為臟之會且乳下肋間正屬虛里大絡乃胃氣所出之道路而氣實通於章門余因悟其日輕夜重本非有形之積而按此連彼則病在氣分無疑也但用湯藥以治氣病本非不善然經火則氣散而力有不及矣乃制神香散使日服三四次兼用艾火灸章門十四壯以逐散其結滯之胃氣不三日脹果漸平食乃漸進始得保全此其證治俱奇誠所難測本年春間一鄰人陡患痛脹隔食全與此同群醫極盡攻擊竟以致斃是真不得其法耳故録此以為後人之式述古共五條仲景曰腹滿不減減不足言當下之腹滿時減復如故此為寒當與溫藥華元化曰人中百病難療者莫出於水也水者腎之制也腎者人之本也腎氣壯則水還於腎腎氣虛則水散於皮又三焦壅塞營衛閉格血氣不從虛實交變水隨氣流故為水病丹溪曰水腫脈多沉病陽水兼陽證脈必沉數病陰水兼陰證脈必沉遲若遍身腫煩渴小便赤澀大便閉結此屬陽水先以五皮散或四磨飲添磨生枳殼重則疏鑿飲若遍身腫不煩渴大便溏小便少不澀赤此屬陰水宜實脾散或流氣飲主之徐東皋曰經云臟寒生滿病脈經云胃中寒則脹滿脾為陰中之至陰故經曰太陰所至為蓄滿大抵脾濕有餘無陽不能施化如土之久於雨水則為泥矣豈能生化萬物必待和風暖日濕去陽生自然生長也故凡若此者宜以辛熱藥治之又曰經云下之則脹已此以濕熱飲食有餘脾胃充實者言也如仲景治傷寒邪入於裡而成腹滿堅實大便祕而不利者宜以三承氣湯下之可也若因脾虛內寒不足而氣不能運化精微以成腹滿者故宜以甘溫補脾為主少佐辛熱以行壅滯之氣庶使脾土旺健脹滿運行斯可愈矣即經所謂塞因塞用從治之法耳醫者不察乎此惟執下之脹已急於獲效病者苦於脹滿喜行利藥以求通快不知暫快一時則真氣愈傷腹脹愈甚去死不遠矣俗謂氣無補法者以其痞塞似難於補不思正氣虛而不能運行為病經曰壯者氣行則愈是也又曰水腫本因脾虛不能制水水漬妄行當以參術補脾使脾氣得實則自健運而水自行大抵只宜補中行濕利小便切不可下但用二陳加人參蒼白朮為主或佐以黃芩麥冬炒梔子以制肝木若腹脹少佐厚朴氣不運加木香木通氣若陷下加升麻柴胡提之必須補中行濕加升提之藥能使大便潤小便長又曰諸家治水腫只知導濕利小便執此一途用諸去水之藥往往多死又用導水丸舟車丸神佑丸之類大下之此速死之兆蓋脾氣虛極而腫愈下愈虛雖劫目前之快而陰損正氣禍不旋踵大法只宜補中宮為主看所挾加減不爾則死當以嚴氏實脾散加減要知從治塞因塞用之理然後可以語水腫之治耳孫一奎曰豫在吳下時有吳生諱震者博邪士也一日偶談及鼓脹乃詰豫曰鼓有蟲否乎豫卒不敢應俯思久之對曰或有之本事方云臍腹四肢悉腫者為水只腹脹而四肢不腫者為蠱注曰蠱即鼓脹也由是參之古人曾以蠱鼓同名矣且蠱以三蟲為首豈無旨哉愚謂鼓脹即今雲氣虛中滿是也以其外堅中空有似於鼓故以名之彼蠱證者中實有物積聚既久理或有之吳生曰子誠敏也豫堂嫂病鼓三載腹大如箕時或脹痛四肢瘦削三吳名劑歷嘗不瘳吳俗死者多用火葬燒至腹忽響聲如炮人皆駭然乃見蟲從腹中爆出高二三丈許燒所之天為昏俄而墜地細視之皆蛔也不下千萬數大者長尺余蟲腹中復生小蟲多者十五六條或十數條或五六條蟲在人腹中蕃息如此曷不令人脹而死哉惜乎諸書未有言及者豫聞之恍然如夢始覺然猶未親見其異也歲萬曆癸巳至淮陰有王鄉官者其子年十六新娶後腹脹大按之有塊形如稍瓜四肢瘦削發熱晝夜不退已年半矣醫惟以退熱消脹之劑投之其脹愈甚其熱愈熾喉中兩耳俱瘡余診視之脈滑數望其唇則紅其腹則疼又多嗜肥甘余思諸凡腹痛者唇色必淡不嗜飲食今其若此得非蟲乎遂投以阿魏積塊丸服之果下蟲數十大者二一紅一黑長尺余蟲身紅線自首貫尾蟲腹中復有蟲大者數條小者亦三四條蟲下則熱漸減脹漸消三下而愈亦信前聞之不虛也針灸法脾俞治脹隨年壯灸之肝俞治脹灸百壯三焦俞治心腹脹滿飲食減少小便不利羸瘦少氣分水治腹脹繞臍結痛不能食若是水病尤宜灸之神闕主水腫膨脹腸鳴如水之聲極效石門主水腫水行皮中小便黃足三里主水腫腹脹水溝主一切水腫按水腫證惟得針水溝若針余穴水盡即死此明堂銅人所戒也庸醫多為人針分水誤人多矣若其他穴或有因針得瘥者特幸焉耳大抵水腫禁針不可為法腫脹論列方廓清飲新和十三四苓散和一八七四君子湯補一神香散新和二十平胃散和十七五苓散和一八二五君子煎新熱六胃苓湯和百九十二陳湯和一六君子湯補五五淋散寒百十七五皮散和六八正柴胡飲新散六參蘇飲散三四排氣飲新和六小柴胡湯散十九理中湯熱一理陰煎新熱三大和中飲新和七歸脾湯補三二溫胃飲新熱五小和中飲新和八解肝煎新和十一實脾散熱百四嚴氏實脾散熱百五六味湯補百二十八味湯補一二一金匱腎氣湯補一二四四磨飲和五二流氣飲和四六金水六君煎新和一敗毒散散三六疏鑿飲和五三加減一陰煎新補九白虎湯寒二十棗湯攻二八葛根蔥白湯散三二禹功散攻四一浚川散攻四二導水茯苓湯和六二神佑丸攻四八導水丸攻七一芍藥清肝散寒六一舟車丸攻七十赤金豆新攻二龍膽瀉肝湯寒六三大柴胡湯攻七百順丸新攻六大承氣湯攻一論外備用方三和湯和六十脾濕腫健脾散和六三和中快氣參朮健脾湯和六四補脾行滯當歸散和六五水氣腫四磨飲和五二行氣麻黃附子甘草湯散五風濕百合湯熱一三四腫喘越婢湯散八九風水悉腫麻黃甘草湯散六水腫取汗調胃白朮散和三三和胃蘇子降氣湯和四一順氣人參養胃湯和二三四和胃調氣平胃散和十八七氣湯和五一積脹半夏丁香丸和百十三氣滯厚朴湯和五四氣滯曲糵枳朮丸和八一食腫香砂枳朮丸和八十氣脹木香寬中散和五五行氣沉香琥珀丸和六九利便消導寬中湯和五八食氣滯人參木香散和五七利水養胃進食丸和八九健脾化滯調中湯和五九食滯導水茯苓湯和六二利水導滯通經湯和六一脾濕木香分氣飲和五六氣濕當歸活血散和六六瘀血檳榔煎和二三六瘴氣大正氣散和二四寬濕中滿溫胃湯熱十二胃寒中滿養胃湯熱六九虛寒滯厚朴丸熱百六十寒滯中滿腹脹方熱百六紅丸子熱百九十消食脹胡椒理中湯熱六虛寒強中湯熱九二生冷傷脾復元丹熱百二寒滯沉香桂附丸熱百十一中寒感應丸攻五四積聚脹痛透膈湯攻三十逐滯消脹厚朴溫中湯熱九十寒滯枳實導滯丸攻五七清火攻滯
