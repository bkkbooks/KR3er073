body:
  text: 卷之三十四天集雜證謨癲狂癡呆經義宣明五氣篇曰邪入於陽則狂邪入於陰則痹搏陽則癲疾搏陰則為喑生氣通天論曰陰不勝其陽則脈流薄疾並乃狂陽不勝其陰則五臟氣爭九竅不通調經論曰血並於陰氣並於陽故為驚狂通天篇曰太陽之人多陽而少陰必謹調之無脫其陰而瀉其陽陽重脫者易狂陰陽皆脫者暴死不知人也本神篇曰肝悲哀動中則傷魂魂傷則狂忘不精肺喜樂無極則傷魄魄傷則狂狂者意不存人脈解篇曰太陽所謂甚則狂癲疾者陽盡在上而陰氣從下下虛上實故狂癲疾也陽明所謂病至則欲乘高而歌棄衣而走者陰陽復爭而外並於陽故棄衣而走也陽明脈解篇帝曰足陽明之脈病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也熱盛於身故棄衣欲走也陽盛則使人妄言罵詈不避親疏而不欲食故妄走也病能論帝曰有病怒狂者此病安生岐伯曰生於陽也陽氣者因暴折而難決故善怒也病名曰陽厥帝曰何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也帝曰治之奈何曰奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵洛為飲夫生鐵洛者下氣疾也通評虛實論帝曰癲疾何如岐伯曰脈搏大滑久自已脈小堅急死不治帝曰癲疾之脈虛實何如岐伯曰虛則可治實則死大奇論曰心脈滿大癇瘛筋攣肝脈小急癇瘛筋攣二陰急為癇厥邪氣臟腑病形篇曰心脈緩甚為狂笑微澀為癲疾肺脈急甚為癲疾腎脈急甚為骨癲疾奇病論曰帝曰人生而有病癲疾者病名曰何安所得之岐伯曰病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為癲疾也寒熱病篇曰暴攣癇眩足不任身取天柱癲狂篇曰癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之於顏取手太陽陽明太陰血變而止癲疾始作先反僵因而脊痛候之足太陽陽明太陰手太陽血變而止癲疾始作而引口啼呼喘悸者候之手陽明太陽左強者攻其右右強者攻其左血變而止治癲疾者常與之居察其所當取之處病至視之有過者瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治筋癲疾者身倦攣急大刺項大經之大杼脈嘔多沃沫氣下泄者不治脈癲疾者暴僕四肢脈皆脹而縱脈滿盡刺之出血不滿灸之挾項太陽灸帶脈於腰相去三寸諸分肉本輸嘔多沃沫氣下泄者不治癲疾者疾發如狂者死不治以上俱言癲疾狂始生先自悲也喜忘苦怒善恐者得之憂飢治之取手太陰陽明血變而止及取足太陰陽明狂始生少臥不飢自高賢也自辯智也自尊貴也善罵詈日夜不休治之取手陽明太陽太陰舌下少陰視之盛者皆取之不盛釋之也狂言驚善笑好歌樂妄行不休者得之大恐治之取手陽明太陽太陰狂目妄見耳妄聞善呼者少氣之所生也治之取手太陽太陰陽明足太陰頭兩顑狂者多食善見鬼神善笑而不發於外者得之有所大喜治之取足太陰太陽陽明後取手太陰太陽陽明狂而新發未應如此者先取曲泉左右動脈及盛者見血有頃已不已以法取之灸骨骶二十壯以上俱言狂證長刺節論曰病在諸陽脈且寒且熱諸分且寒且熱名曰狂刺之虛脈視分盡熱病已止病初發歲一發不治月一發不治月四五發名曰癲病刺諸分諸脈其無寒者以針調之病已止二十難曰重陽者狂重陰者癲脫陽者見鬼脫陰者目盲五十九難曰狂癲之病何以別之然狂疾之始發少臥而不飢自高賢也自辯智也自倨貴也妄笑好歌樂妄行不休是也癲疾始發意不樂僵仆直視其脈三部俱盛是也論證共二條癲狂之病病本不同狂病之來狂妄之漸而經久難已癲病之至忽然僵仆而時作時止狂病常醒多怒而暴癲病常昏多倦而靜由此觀之則其陰陽寒熱自有冰炭之異故難經曰重陽者狂重陰者癲義可知也後世諸家有謂癲狂之病大概是熱此則未必然也此其形氣脈氣自亦有據不可不辨察陰陽分而治之一癲即癇也觀內經所言癲證甚詳而癇則無辨即此可知後世有癲癇風癇風癲等名所指不一則徒滋惑亂不必然也又如別錄所載五癇曰馬癇牛癇豬癇羊癇雞癇者即今人之謂羊癇豬癇也此不過因其聲之相似遂立此名可見癲癇無二而諸家於癲證之外又有癇證誠屬牽強無足憑也又千金方有風癇驚癇食癇及陰癇陽癇之說皆所當辨並列後條論治共五條凡狂病多因於火此或以謀為失志或以思慮鬱結屈無所伸怒無所泄以致肝膽氣逆木火合邪是誠東方實證也此其邪乘於心則為神魂不守邪乘於胃則為暴橫剛強故治此者當以治火為先而或痰或氣察其甚而兼治之若止因火邪而無脹閉熱結者但當清火宜抽薪飲黃連解毒湯三補丸之類主之若水不制火而兼心腎微虛者宜硃砂安神丸或服蠻煎二陰煎主之若陽明火盛者宜白虎湯玉泉散之類主之若心脾受熱叫罵失常而微兼閉結者宜清心湯涼膈散三黃丸當歸龍薈丸之類主之若因火致痰者宜清膈飲抱龍丸生鐵落飲主之甚者宜滾痰丸若三焦邪實熱甚者宜大承氣湯下之若痰飲壅閉氣道不通者必須先用吐法並當清其飲食此治狂之要也一癲病多由痰氣凡氣有所逆痰有所滯皆能壅閉經絡格塞心竅故發則旋暈僵仆口眼相引目睛上視手足搐搦腰脊強直食頃乃蘇此其倏病倏已者正由氣之倏逆倏順也故治此者當察痰察氣因其甚者而先之至若火之有無又當審其脈證而兼為之治也氣滯者宜排氣飲大和中飲四磨飲或牛黃丸蘇合丸集成潤下丸之類主之痰盛者宜清膈飲六安煎二陳湯橘皮半夏湯或抱龍丸硃砂滾涎丸之類主之兼痰兼火者宜清膈飲硃砂安神丸丹溪潤下丸之類主之痰逆氣滯之甚者必用吐法吐後隨證調理之一癲癇證無火者多若無火邪不得妄用涼藥恐傷脾氣以致變生他證且復有陰盛陽衰及氣血暴脫而絕無痰火氣逆等病者則凡四君四物八珍十全大補等湯或乾薑桂附之類皆所必用不得謂癲癇盡屬實邪而概禁補劑也若真陰大損氣不歸根而時作時止昏沉難愈者必用紫河車丸方可奏效其有虛中挾實微兼痰火不清而病久不愈者集驗龍腦安神丸最得其宜隨證增減可為法也一癡呆證凡平素無痰而或以鬱結或以不遂或以思慮或以疑貳或以驚恐而漸致癡呆言辭顛倒舉動不經或多汗或善愁其證則千奇萬怪無所不至脈必或弦或數或大或小變易不常此其逆氣在心或肝膽二經氣有不清而然但察其形體強壯飲食不減別無虛脫等證則悉宜服蠻煎治之最穩最妙然此證有可愈者有不可愈者亦在乎胃氣元氣之強弱待時而復非可急也凡此諸證若以大驚猝恐一時偶傷心膽而致失神昏亂者此當以速扶正氣為主宜七福飲或大補元煎主之一小兒無狂證惟病癲者常有之凡小兒之病有從胎氣而得者有從生後受驚而得者蓋小兒神氣尚弱驚則肝膽奪氣而神不守舍舍空則正氣不能主而痰邪足以亂之故凡治小兒之驚癇必須先審正氣然後察其病邪酌宜治之諸法俱載小兒門所當詳究述古共四條千金方云小兒之癇有三風癇驚癇食癇也風癇緣衣暖汗出風因入也初時先屈指如數乃作驚癇起於驚悸大啼乃作食癇其先不哺乳而變熱後發或先寒後熱者皆食癇也又云病先身熱掣縱驚啼叫喚而後發癇脈浮者為陽癇病在六腑外在肌肉猶易治也病先身冷不驚掣不啼叫而病發時脈沉者為陰癇病在五臟內在骨髓難治也陳無擇云夫癲癇病皆由驚動使臟氣不平鬱而生涎閉塞諸經厥而乃成或在母胎中受驚或幼小感風寒暑濕或飲食不節逆於臟氣而成蓋忤氣得之外驚恐得之內飲食屬不內外三因不同忤氣則一愚謂此二家之說雖若切當然風寒外感自有表證飲食內傷是有里證俱未必亂神若此而癲癇為病則忽爾昏厥此其病則專在心經以及肝膽二臟又非風寒飲食所能頓病若此者且風癇之義本以木邪所屬為言亦非外感之謂即有外感或有飲食亦無非因驚因恐相兼為病耳若以三因並列之則有未必然也張子和曰肝屢謀膽屢不決屈無所伸怒無所泄肝木膽火隨炎入心心火熾亢神不守舍久逆而成癲狂一因也有思慮過多脾傷失職心之官亦主思甚則火熾心血日涸脾液不行痰迷心竅以致癲狂二因也丹溪曰大法行痰為主黃連南星栝蔞半夏尋火尋痰分多少而治無不愈有熱者以涼藥清其心有痰者必用吐法吐後用東垣安神丸及平肝之藥青黛柴胡川芎之類簡易方一方治狂邪觸發無時披頭大叫但欲殺人不避水火者用苦參為末蜜丸桐子大每服五七十丸白滾湯或清茶送下灸法間使五壯人中用小炷灸之骨骶二十壯兩手足大拇指以二指並縛一處灸爪甲角七壯須於甲肉之半令其四處著火癲狂論列方抽薪飲新寒三白虎湯寒二四君子湯補一清心湯寒三四清膈煎新寒九大補元煎新補一排氣飲新和六六安煎新和二大和中飲新和七抱龍丸小八五滾痰丸攻七七紫河車丸小百七二陳湯和一三黃丸攻六八十全大補湯補二十蘇合丸和三七一牛黃丸和三六五當歸龍薈丸寒一六七八珍湯補十九四物湯補八硃砂安神丸寒一四二七福飲新補七玉泉散新寒十五硃砂滾涎丸攻七八二陰煎新補十涼膈散攻十九橘皮半夏湯和十三三補丸寒一六二四磨飲和五二丹溪潤下丸和百十六服蠻煎新寒十九吐法新攻一集成潤下丸和百十七生鐵落飲寒七七大承氣湯攻一黃連解毒湯寒一集驗龍腦安神丸和一四七論外備用方正心湯補八一心虛主熱寧心丸補百十四養心神辰砂妙香散固十五抱膽丸和三五七驚氣結寧志丸和三百六十心風養神人參琥珀丸和三六一養心安神歸神丸和三五九神不守舍神應丹和三六三鎮驚痰五癇神應丸和三六四秘方半夏丸和三六二風痰辰砂丸和三五八痰氣結琥珀壽星丸和百十三痰癇五生丸熱九六寒痰犀角丸攻九一風痰牛黃清心丸攻三五實熱癃閉經義靈蘭秘典論曰小腸者受盛之官化物出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣宣明五氣篇曰膀胱不利為癃不約為遺溺生氣通天論曰陽不勝其陰則五臟氣爭九竅不通口問篇曰中氣不足溲便為之變本輸篇曰三焦者足少陽太陰之所將太陽之別也並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺奇病論曰有癃者一日數十溲此不足也詳死生門八玉機真藏論帝曰夫子言脾為孤臟中央土以灌四傍其太過與不及其病皆何如岐伯曰太過則令人四肢不舉其不及則令人九竅不通名曰重強氣厥論曰胞移熱於膀胱則癃溺血膀胱移熱於小腸鬲腸不便上為口糜經脈篇曰肝所生病者遺溺閉癃足少陰之別實則閉癃骨空論曰督脈為病癃痔遺溺厥論曰厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫胻內熱邪氣臟腑病形篇曰腎脈微急為沉厥奔豚足不收不得前後痹論曰腸痹者數飲而出不得中氣喘爭時發飧泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕經脈篇曰足少陰之別名曰大鐘實則閉癃虛則腰痛陰陽類論曰二陰一陽病出於腎陰氣客遊於心脘下空竅堤閉塞不通四肢別離至真要大論曰太陽之勝隱曲不利互引陰股歲太陰在泉少腹痛腫不得小便五常政大論曰涸流之紀其病癃閉邪傷腎也六元正紀大論曰陽明司天之政民病癃閉標本病傳曰大小不利者治其標熱病篇曰癃取之陰蹺及三毛上及血絡出血癲狂篇曰內閉不得溲刺足少陰太陽與骶上以長針論證共三條小水不通是為癃閉此最危最急證也水道不通則上侵脾胃而為脹外侵肌肉而為腫泛及中焦則為嘔再及上焦則為喘數日不通則奔迫難堪必致危殆今人一見此證但知利水或用田螺罨臍之法而不辨其所致之本無怪其多不治也凡癃閉之證其因有四最當辨其虛實有因火邪結聚小腸膀胱者此以水泉乾涸而氣門熱閉不通也有因熱居肝腎者則或以敗精或以槁血阻塞水道而不通也若此者本非無水之證不過壅閉而然病因有餘可清可利或用法以通之是皆癃閉之輕證也惟是氣閉之證則尤為危候然氣閉之義有二焉有氣實而閉者有氣虛而閉者夫膀胱為藏水之腑而水之入也由氣以化水故有氣斯有水水之出也由水以達氣故有水始有溺經曰氣化則能出矣蓋有化而入而後有化而出無化而出必其無化而入是以其入其出皆由氣化此即本經氣化之義非單以出者言氣化也然則水中有氣氣即水也氣中有水水即氣也今凡病氣虛而閉者必以真陽下竭元海無根水火不交陰陽痞隔所以氣自氣而氣不化水水自水而水蓄不行氣不化水則水腑枯竭者有之水蓄不行則浸漬腐敗者有之氣既不能化而欲強為通利果能行乎陰中已無陽而再用苦寒之劑能無甚乎理本甚明何知之者之不多見也至若氣實而閉者不過肝強氣逆移礙膀胱或破其氣或通其滯或提其陷而壅者自無不去此治實者無難而治虛者必得其化為不易也故凡臨此證不可不詳辨其虛實一仲景曰在尺為關在寸為格關則不得小便格則吐逆此誤認關格之義也詳見關格門論治共七條一火在下焦而膀胱熱閉不通者必有火證火脈及溺管疼痛等證宜大分清飲抽薪飲益元散玉泉散及綠豆飲之類以利之若肝腎實火不清或遺濁或見血者大都清去其火水必自通前法俱可通用一氣閉證當分虛實寒熱而治之凡氣實者氣結於小腸膀胱之間而壅閉不通多屬肝強氣逆之證惟暴怒鬱結者多有之宜以破氣行氣為主如香附枳殼烏藥沉香茴香之屬兼四苓散而用之若氣陷於下藥力不能驟及者當即以此藥多服探吐以提其氣使氣升則水自降也有痰氣逆滯不通者即以二陳湯六安煎之類探吐之有熱閉氣逆者及以大分清飲探吐之有氣實血虛而閉者用四物湯探吐之凡氣實等證無如吐之妙者譬之滴水之器閉其上竅則下竅不通開其上竅則下竅必利蓋有升則有降無升則無降此理勢之使然也凡氣虛而小便閉者必以素多斫喪或年衰氣竭者方有此證正以氣有不化最為危候不易治也然凡病此者必其有漸但覺小便短少或便時費力便當留心速治若待其劇恐無及也但治此者亦當辨其臟氣之寒熱若素無內熱之氣者是必陽虛無疑也或病未至甚須常用左歸右歸六味八味等湯丸或壯水以分清或益火以化氣隨宜用之自可漸杜其原若病已至甚則必用八味丸料或加減金匱腎氣湯大劑煎服庶可挽回或疑桂附辛熱不敢輕用豈知下元陽氣虧甚得寒則凝得熱則行舍此二者更有何物可以直達膀胱而使水因氣化也若氣虛下陷升降不利者宜補中益氣湯主之或即用此湯探吐之最妙若素稟陽臟內熱不堪溫補而小便閉絕者此必真陰敗絕無陰則陽無以化水虧證也治宜補陰抑陽以化陰煎之類主之或偏於陽亢而水不制火者如東垣之用滋腎丸亦可但此即火證之屬耳一大小便俱不通者必先通其大便則小便自通矣宜八正散之類主之一久服桂附之屬以致水虧陽亢而小便不通者宜解毒壯水以化陰煎之類主之甚者以黃連解毒湯加分利滋陰等藥亦可然尤惟綠豆飲為解毒之神劑其有因久服陽藥作用過多火本不盛單由水虧者非六味地黃湯大劑滋之不可也一服分利既多而小水愈不通者此必下竭之證察其水虧者必須大補真陰火虛者必須峻補陽氣氣達水行其便自調不可見其假實恣意疏通此與榨乾汁泲枯油者何異致令竭者愈竭鮮不危矣一膀胱無水等證有因泄瀉水歸大腸而小水不通者此當但治泄瀉泄瀉止而水自利也有因大汗多汗氣從汗泄而小水不利者此當調治營衛表氣收而小便自利也有虛勞亡血傷精水隨液去五內枯燥而小水不利者此當調補真陰血氣漸充而小水漸利也凡此數者皆膀胱無水枯涸之證水泉既涸故不可再加分利內惟泄瀉證亦有可分利者然亦不過十之三耳諸如此者當於各門詳察治之皆非有水不通而為癃閉之類也一懷妊之婦每有小便不通者此以胎氣下陷溺孔被壓而然多以氣虛不能舉胎所致宜八珍湯補中益氣湯之類主之若臨盆之際胎壓膀胱而小便不通者宜以手指托起其胎則小水自出通閉方法凡治小水閉塞不通危急之甚諸藥不效者速尋白菊花根搗爛用生白酒沖和取酒汁溫而飲之神效按此方或白花者一時難得即不拘何色但以家菊根代之亦必無不效一法治膀胱有溺或因氣閉或因結滯阻塞不能通達諸藥不效危困將死者用豬溲胞一個穿一底竅兩頭俱用鵝翎筒穿透以線扎定並縛住下口根下出氣者一頭乃將溲胞吹滿縛住上竅卻將鵝翎尖插入馬口解去根下所縛手捻其胞使氣從尿管透入膀胱氣透則塞開塞開則小水自出大妙法也一通塞法凡敗精幹血或溺孔結垢阻塞水道小便脹急不能出者令病人仰臥亦用鵝翎筒插入馬口乃以水銀一二錢徐徐灌入以手逐段輕輕導之則諸塞皆通路通而水自出水出則水銀亦從而噴出毫無傷礙亦最妙法也一熏洗通便法凡偶有氣閉小水不通脹急危困之極者速用皂角蔥頭王不留行各數兩煎湯一盆令病者坐浸其中熏洗小腹下體久之熱氣內達壅塞自開便即通矣若系婦人亦可用蔥數莖塞陰戶中外加熏洗其通尤速述古共三條易老云寒在胞中遏塞不入熱在下焦填塞不便須用感北方寒水之化氣味俱陰之藥以除其熱泄其閉塞東垣治一人病小便不利目睛突出腹脹如鼓膝以上堅硬皮膚欲裂飲食不下服甘淡滲利之藥皆不效予曰疾急矣非精思不能處思至半夜曰吾得之矣經曰膀胱者津液之腑必氣化而能出焉多服滲利之藥而痛益甚是氣不化也啟玄子云無陽則陰無以生無陰則陽無以化甘淡氣薄者皆陽藥獨陽無陰欲化得乎遂以滋腎丸群陰之劑投之再服愈丹溪曰小便不通有氣虛有血虛有實熱有痰有濕有氣結下焦血氣乾者死癃閉論列方抽薪飲新寒三四苓散和一八七八正散寒百十五益元散寒百十二玉泉散新寒十五大分清飲新寒五化陰煎新寒七滋腎丸寒一六三二陳湯和一六味湯補百二十八味湯補一二一補中益氣湯補三十左歸飲新補二右歸飲新補三黃連解毒湯寒一六安煎新和二四物湯補八金匱腎氣湯補一二四綠豆飲新寒十四八味丸補一二一論外備用方地髓湯和三四五閉痛疏鑿飲和五三水閉人參固本丸補百六陰虛五苓散和一八二蔥白湯和三百五十氣閉欲死萬全木通湯和三四九利便導赤散寒一二二七正散寒百十六火閉導水茯苓湯和六二閉而腫蔥熨法因二九一清肺飲子寒四十氣分熱黃芩清肺飲寒三八氣熱葵子湯寒一二四膀胱熱赤茯苓湯寒一二三膀胱熱直指黃芩湯寒百七心肺熱豬苓湯和一八八傷寒下後小便不通獨蒜通便方因二八九龍膽瀉肝湯寒六三肝火十全大補湯補二十三味牛膝湯寒一二六莖痛閉加味龍膽瀉肝湯寒六四加味逍遙散補九三虛熱加味通心飲寒三三疝閉良方龍膽瀉肝湯寒六二大連翹飲寒七八風熱小便不通方因二百九十秘結經義金匱真言論曰北方黑色入通於腎開竅於二陰氣厥論曰膀胱移熱於小腸膈腸不便脈解篇曰太陰所謂病脹者得後與氣則快然如衰也邪氣臟腑病形篇曰腎脈微急為不得前後小腸病者小腹痛腰脊控睪而痛時窘之後五常政大論曰涸流之紀其病痿厥堅下其病癃閉邪傷腎也六元政紀大論曰不遠熱則熱至淋閟之病生矣太陽所至為流泄禁止燥勝則乾至真要大論曰太陰司天病陰痹大便難陰氣不用病本於腎太陽之勝隱曲不利互引陰股少陰之復隔腸不便宣明五氣篇曰腎惡燥臟氣法時論曰腎苦燥急食辛以潤之開腠理致津液通氣也雜病篇曰厥氣走喉而不能言手足清大便不利取足少陰論證共二條秘結一證在古方書有虛秘風秘氣秘熱秘寒秘濕秘等說而東垣又有熱燥風燥陽結陰結之說此其立名太煩又無確據不得其要而徒滋疑惑不無為臨證之害也不知此證之當辨者惟二則曰陰結陽結而盡之矣蓋陽結者邪有餘宜攻宜瀉者也陰結者正不足宜補宜滋者也知斯二者即知秘結之綱領矣若或疑余之說而欲必究其詳則凡云風秘者蓋風未必秘但風勝則燥而燥必由火熱則生風即陽結也豈謂因風而宜散乎有云氣秘者蓋氣有虛實氣實者陽有餘陽結也氣虛者陽不足陰結也豈謂氣結而盡宜破散乎至若熱秘寒秘亦不過陰陽之別名耳再若濕秘之說則濕豈能秘但濕之不化由氣之不行耳氣之不行即虛秘也亦陰結也總之有火者便是陽結無火者便是陰結以此辨之豈不了然余故曰凡斯二者即秘結之綱領也一秘結之由除陽明熱結之外則悉由乎腎蓋腎主二陰而司開闔故大小便不禁者其責在腎然則不通者獨非腎乎故腎熱者宜涼而滋之腎寒者宜溫而滋之腎虛者宜補而滋之腎乾燥者宜潤而滋之經曰腎苦燥急食辛以潤之開腠理致津液通氣也正此之謂論治共七條一陽結證必因邪火有餘以致津液乾燥此或以飲食之火起於脾或以酒色之火熾於腎或以時令之火蓄於臟凡因暴病或以年壯氣實之人方有此證然必有火證火脈內外相符者方是陽結治此者又當察其微甚邪結甚者非攻不可宜諸承氣湯神佑丸百順丸之類主之邪結微者宜清涼飲子元戎四物湯或黃龍湯玉燭散之類主之火盛不解者宜涼膈散大黃硝石湯八正散大分清飲大金花丸之類主之火盛水虧陰虛而燥者宜丹溪補陰丸人參固本丸或六味地黃加黃柏知母麻仁之類主之一陰結證但察其既無火證又無火脈或其人喜熱惡冷則非陽證可知然既無邪何以便結不通蓋此證有二則一以陽虛一以陰虛也凡下焦陽虛則陽氣不行陽氣不行則不能傳送而陰凝於下此陽虛而陰結也下焦陰虛則精血枯燥精血枯燥則津液不到而腸臟乾槁此陰虛而陰結也故治陽虛而陰結者但益其火則陰凝自化宜右歸飲大補元煎大營煎之類主之或以人參當歸數錢煎湯送右歸八味等丸俱妙治陰虛而陰結者但壯其水則涇渭自通宜左歸飲左歸丸當歸地黃飲五福飲六味地黃丸之類主之二者欲其速行宜於前法中各加肉蓯蓉二三錢以酒洗去咸同煎服之其效尤速然此等證候其來有漸但初覺時便當加意調理自無不愈若待氣血俱敗則最難為力而徒歸罪於藥之不效亦何其不智也以上陰結一證雖氣血之分自當如此然血虛者亦必氣有不行氣虛者豈曰血本無恙大都虛而兼熱者當責其血分虛而兼寒者當責其氣分此要法也第今之世人但知有熱秘而不知有冷秘所以局方有半硫丸海藏有已寒丸之類皆治此之良劑所當察也若欲兼溫兼補似不若八味地黃丸及理陰煎之屬為更妙一大便本無結燥但連日或旬日欲解不解或解止些須而不能通暢及其既解則仍無干硬凡此數者皆非火證總由七情勞倦色欲以致陽氣內虧不能化行亦陰結之屬也此當詳察脾腎辨而治之病在脾者宜治中焦以理中湯溫胃飲五君子煎歸脾湯補中益氣湯之類主之病在腎者宜治下焦以右歸飲大補元煎八味地黃湯之類主之一老人便結大都皆屬血燥蓋人年四十而陰氣自半則陰虛之漸也此外則愈老愈衰精血日耗故多有乾結之證治此之法無他惟虛者補之燥者潤之而盡之矣然亦當辨其虛實微甚及有火無火因其人而調理之可也凡潤燥等劑如導滯通幽湯蓯蓉潤腸丸搜風順氣丸東垣潤腸丸衛生潤腸丸元戎四物湯三仁丸百順丸之類皆可選用又豕膏為潤燥之神劑最當隨宜用之其有大虛大熱者宜用前陰陽結治法許學士治年老虛人便秘只用火麻仁蘇子仁各半研取汁服之更煮粥食之不必服藥而秘愈一便閉有不得不通者凡傷寒雜證等病但屬陽明實熱可攻之類皆宜以熱結治法通而去之若察其元氣已虛既不可瀉而下焦脹閉又通不宜緩者但用濟川煎主之則無有不達一元氣薄弱之人凡患傷寒雜證病氣不足等病而有大便不行者但察其胸腹下焦若絕無脹實痞塞急墜欲解等患此其中本無實邪即雖十日二十日不解亦自無妨切不可因其不便強為疏導蓋其胃口未開食飲未進則全賴中氣以為捍禦之本但俟邪氣漸退胃氣漸和則自然通達無足慮也若腸臟本無滯礙而強為通利以泄胃氣遂至主不勝客者有之邪因而陷者亦有之此其害受於冥冥之中而人多不知也識之慎之一秘結證凡屬老人虛人陰臟人及產後病後多汗後或小水過多或亡血失血大吐大瀉之後多有病為燥結者蓋此非氣血之虧即津液之耗凡此之類皆須詳察虛實不可輕用芒硝大黃巴豆牽牛芫花大戟等藥及承氣神芎等劑雖今日暫得通快而重虛其虛以致根本日竭則明日之結必將更甚愈無可用之藥矣況虛弱之輩幸得後門堅固最是壽徵雖有澀滯亦須緩治但以養陰等劑漸加調理則無有不潤故病家醫家凡遇此類切不可性急欲速以自取其敗而致悔無及也述古共四條東垣曰金匱真言論云北方黑色入通於腎開竅於二陰又云大便難者取足少陰夫腎主五液津液潤則大便如常若飢飽失節勞役過度損傷胃氣及食辛熱味厚之物而助火邪耗散真陰津液虧少故大便結燥然結燥之病不一有熱燥有風燥有陽結有陰結又有老年氣虛津液不足而結燥者治法云腎惡燥急食辛以潤之結者散之如少陰不得大便以辛潤之太陰不得大便以苦泄之陽結者散之陰結者溫之仲景曰小便利而大便硬不可攻下以脾約丸潤之食傷太陰腹滿而食不化腹響然不能大便者以苦藥泄之如血燥而不能大便者以桃仁酒製大黃通之風結燥而大便不行者以麻子仁加大黃利之如氣澀而大便不通者以郁李仁枳實皂角仁潤之大抵治病必究其源不可一概用巴豆牽牛之類下之損其津液燥結愈甚復下復結極則以致導引於下而不通遂成不救噫可不慎哉又曰凡臟腑之秘不可一例治有虛秘有實秘實秘者能飲食小便赤麻仁丸七宣丸之類主之胃虛而秘者不能飲食小便清厚朴湯主之蓋實秘者物也虛秘者氣也予觀此東垣之法多從治標雖末有虛實之辨而用厚朴湯者此但以有物無物言虛實謂有物者當下之無物者當行其氣耳而於真陰虧損邪正之虛實則所未及此其法固不可廢亦不可泥也丹溪曰古方有脾約證制脾約丸謂胃強脾弱約束津液不得四布但輸膀胱故小便數而大便難者曰脾約與此丸以下脾之結燥腸潤結化津液入胃而愈然既曰脾約必陰血枯槁內火燔灼熱傷元氣故肺受火邪而津竭必竊母氣以自救金耗則土受木傷脾失轉輸肺失傳送宜大便秘而難小便數而無藏蓄也理宜滋養陰血使陽火不熾金行清化脾土清健津液入胃則腸潤而通矣今此丸用之熱甚而氣實與西北方人稟之壯實者無有不安若用之東南方人與熱雖盛而氣血不實者雖得暫通將見脾愈弱而腸愈燥矣須知在西北以開結為主在東南以潤燥為主王節齋曰若年高人脾虛血燥易飢易飽大便燥難用白芍藥當歸各一兩人參七錢升麻炙甘草各四錢山楂大麥芽桃仁去皮尖另研各五錢此老人常服藥也薛立齋曰前證屬形氣病氣俱不足脾胃虛弱津血枯涸而大便難耳法當滋補化源又有脾約證成無己曰胃強脾弱約束津液不得四布但輸膀胱小便數而大便難者是也宜用脾約丸陰血枯槁內火燔灼肺金受邪土受木克脾肺失傳大便秘而小便數者宜用潤腸丸此乃病氣有餘之治法也經云脾為至陰己土而主陰然老弱之人當補中益氣以生陰血又曰腎開竅於二陰大小便也若腎經津涸者用六味丸脾肺氣虛者補中益氣湯脾經鬱結者加味歸脾湯氣血虛者八珍湯若發熱作渴飲冷用竹葉黃耆湯若膏粱厚味積熱者加味清胃散陽結新按余嘗治一少年素好火酒適於夏月醉則露臥不畏風寒此其食性臟氣皆有大過人者因致熱結三焦二便俱閉余先以大承氣湯用大黃五七錢如石投水又用神佑丸及導法俱不能通且前後俱閉危劇益甚遂仍以大承氣湯加生黃二兩芒硝三錢加牙皂二錢煎服黃昏進藥四鼓始通大便通而後小便漸利此所謂盤根錯節有非斧斤不可者即此之類若優柔不斷鮮不害矣陰結新按朱翰林太夫人年近七旬於五月時偶因一跌即致寒熱群醫為之滋陰清火用生地芍藥丹皮黃芩知母之屬其勢日甚及余診之見其六脈無力雖頭面上身有熱而口則不渴且足冷至股余曰此陰虛受邪非跌之為病實陰證也遂以理陰煎加人參柴胡二劑而熱退日進粥食二三碗而大便以半月不通腹且漸脹咸以為慮群議燥結為火復欲用清涼等劑余堅執不從謂其如此之脈如此之年如此之足冷若再一清火其原必敗不可為矣經曰腎惡燥急食辛以潤之正此謂也乃以前藥更加薑附倍用人參當歸數劑而便即通脹即退日漸復原矣病起之後眾始服其定見秘結論列方承氣湯攻一黃龍湯攻二一五君子煎新熱六厚朴湯和三三六八正散寒百十五大補元煎新補一涼膈散攻十九大營煎新補十四補中益氣湯補三十理中湯熱一理陰煎新熱三當歸地黃飲新補二十溫胃飲新熱五歸脾湯補三二加味歸脾湯補三三左歸飲新補二右歸飲新補三加味清胃飲寒五五左歸丸新補四五福飲新補六人參固本丸補百六濟川煎新補二一豕膏新因二九元戎四物湯攻二六六味丸補百二十八味丸補一二一丹溪補陰丸寒百六十麻仁丸攻九二玉燭散攻二四竹葉黃耆湯寒七脾約丸攻九三八珍湯補十九東垣潤腸丸和三百四十三仁丸和三三八百順丸新攻六大分清飲新寒五衛生潤腸湯和三三三七宣丸攻九四清涼飲子攻二五蓯蓉潤腸丸和三四一神佑丸攻四八大金花丸攻五五導滯通幽湯和三三五大黃硝石湯攻十四搜風順氣丸和三四三論外備用方三和散和百五十氣秘益血丹補一五七亡血久虛人參固本丸補百六陰虛潤腸湯和三三三血燥通幽湯和三三四燥結痛半硫丸熱一八七虛冷秘皂角散和三三七通秘當歸承氣湯攻六十全大補湯補二十虛秘犀角丸攻九十痰火秘益血潤腸湯和三四二老人便秘調營活絡飲和二八三大已寒丸熱一七一寒秘木香檳榔丸攻五十積熱秘芍藥清肝散寒六一當歸龍薈丸寒一六七桃仁承氣湯攻四聖惠搜風順氣丸和三四四血燥熱詐病論證夫病非人之所好而何以有詐病蓋或以爭訟或以鬥毆或以妻妾相妒或以名利相關則人情詐偽出乎其間使不有以燭之則未有不為其欺者其治之之法亦惟借其欺而反欺之則真情自露而假病自瘳矣此亦醫家所必不可少者仲景曰病者向壁臥聞師到不驚起而盻視若三言三止脈之嚥唾者此詐病也設見脈自和處或師持其脈病人欠者皆無病也但言此病大重當須服吐下藥針灸數十百處乃愈新按共三條予向同數友遊寓榆關客邸內一友素耽風月忽於仲冬一日譙鼓初聞其友急叩予戶啟而問之則張皇求救云所狎之妓忽得急證勢在垂危倘遭其厄禍不可解予隨往視之見其口吐白沫僵仆於地以手摸之則口鼻四肢俱冷氣息如絕陡見其狀殊為驚駭因拽手診之則氣口和平脈不應證予意其脈和如此而何以證危如是第以初未經識猶不知其為詐也然沉思久之則將信將疑而復診其脈則安然如故如豁然省悟豈即仲景之說也遂大聲於病妓之傍曰此病危矣使非火攻必不可活非用如棗如慄之艾亦不可活又非連灸眉心人中小腹數處亦不可活余寓有艾宜速取來灸之然火灸尚遲姑先與一藥使其能咽咽後少有聲息則生意已復即不灸亦可若口不能咽或咽後無聲當速灸可也即與一藥囑其服後即來報我彼狡奴聞予之言竊已驚怖惟恐大艾著身藥到即咽咽後少頃即哼聲出而徐動徐起矣予次日問其所以乃知為吃醢而發也予聞之大笑始知姊妹行中奸狡之況有如此又予在都中時一相契金吾公蓄二妾其一則燕姬也有母隨之一日二妾相競燕妾理屈其母助惡叫跳撒賴遂至氣厥若死乃令一婢抱持而坐自暮及旦絕無蘇意清晨延予療之予初入室見其肉厚色黑面青目瞑手撒息微及診其脈則伏渺如脫亦意其真危也斯時也欲施溫補則慮其大怒之後逆氣或有未散欲加開導則慮其脈之似絕虛極有不能勝躊躇未決乃請復診及入室再見則不若前次之撒手而十指交叉抱腹仰坦於婢者之懷因疑其前番撒手今既能叉手豈他人之所為乎及著手再診則似有相嫌不容之意而拽之不能動此更可疑也因出其不意卒猛一扯則頓脫有聲力強且勁由是前疑始釋謂其將死之人豈猶力有如是乎乃思其脈之若此者或以肉厚氣滯此北人稟賦多有之也或以兩腋夾緊此奸人狡詐亦有之也若其面青息微則怒氣使然自不足怪識見既定因聲言其危使聞灸法以恐勝之遂先投一劑到咽即活次日會公因詢予曰日昨之病固料其勢必危矣然謂其為真邪則何以藥甫其唇而效之峻速有如此謂其為假耶則何以能終夜做作而形證之肖似有如此昨公所用之藥果亦有何玄秘否是皆不能無疑也予曰予之玄秘秘在言耳但使彼懼敢不速活經曰憂可勝怒正此謂也是可見人情之巧其有最難測者皆如此使昨非再診而再察之則予亦幾為所誑矣是以凡遇此類不可不加之詳審又一姻戚士子為宦家所毆遂臥病旬日吐血盈盆因喧傳人命連及多人延醫數輩見其危劇之狀皆束手遠避防為所累也最後予往視之察其色則絕無窘苦之意診其脈則總皆和緩如常予始疑之而繼則悟之因潛語之曰他可欺也予亦可欺耶此爾之血也抑家禽之血耶其人愕然浼予無言遂為調和而相銜感而散又一鄰婦以妒妾作鬧詬夫反目因而病劇則咬牙瞪眼僵厥不蘇若命在呼吸間者其夫驚惶無措其妾連遭不堪凂予救之則脈非其病遂用前法治之愈後其夫感謝而不知為其所愚也若此二人則又人事中之常態使不有懸朗之鑑則此中變幻有以假病而延成真病者有以小忿而延成大禍者茲予拂之若振埃但為人造福而且可防人之欺故亦紀之以資倉卒之急用癘風經義風論曰風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不行也癘者有營氣熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風或名曰寒熱長刺節論曰病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止針癘風者素刺其腫上已刺以銳針針其處按出其惡氣腫盡乃止常食方食無食他食脈要精微論曰脈風成為癘論證癘風即大風也又謂之癩風俗又名為大麻風此病雖名為風而實非外感之風也實以天地間陰厲濁惡之邪或受風木之化而風熱化蟲或受濕毒於皮毛而後及營衛或犯不潔或因傳染皆得生蟲蓋蟲者厥陰主之厥陰為風木主生五蟲也蟲之生也初不為意而漸久漸多遂致不可解救誠最惡最危最醜證也又千金云自作不仁極惡之業也所以最為難治觀孫真人云嘗治數百人終無一人免於死者蓋無一人能守禁忌故耳惟一婦人病愈後又服加減四物湯百餘劑半年之上方得經行十分全愈又丹溪治五人亦惟一婦人得免以貧甚且寡無物可吃也外三四人者越二三年皆復作而死由此觀之可見此證非得出奇秘方鮮能取效故予逢此證不敢強以為知而妄施治療亦不敢強言治法以惑後人至若古人論治之法亦甚詳悉用之得宜雖病根未必可拔而延保餘年夭枉自亦可免由是遍求諸說則惟薛立齋癘瘍機要論列已全今擇其要並諸論之得理者詳述於下以為證治之綱領云述古論共三條立齋曰大抵此證多由勞傷氣血腠理不密或醉後房勞沐浴或登山涉水外邪所乘衛氣相搏濕熱相火血隨火化而致故淮揚閩廣間多患之近代先哲云感天地肅殺惡氣所致其上體先見或多者毒在上也下體先見或多者毒在下也蓋氣分受邪則上多血分受邪則下多氣血俱受則上下齋見凡眉毛先落者毒在肺面發紫泡者毒在肝腳底先痛或穿者毒在腎遍身如癬者毒在脾目先損者毒在心此五臟受病之重者也又一曰皮死麻木不仁二曰肉死針刺不痛三曰血死潰爛四曰筋死指脫五曰骨死鼻柱壞此五臟受傷之不可治者也若聲啞目盲尤為難治又治法當辨本證兼證變證類證陰陽虛實而斟酌焉若妄投燥熱之劑膿水淋漓則肝血愈燥腎水愈枯相火愈旺反成敗證矣一癘瘍所患非止一臟然其氣血無有弗傷兼證無有弗見況積歲而發見於外須分經絡之上下病勢之虛實不可概施攻毒之藥當先助胃壯氣使根本堅固而後治其瘡可也經云真氣奪則虛邪氣勝則實凡云病屬有餘者當察其元氣不足耆婆惡病論曰疾風有四百四種總而言之不出五種即是五風一曰黃風二曰青風三曰白風四曰赤風五曰黑風其風合五臟故曰五風五風生五蟲黃風生黃蟲青風生青蟲白風生白蟲赤風生赤蟲黑風生黑蟲食人五臟若食人脾語變聲散食人肝眉睫墮落食人心遍身生瘡食人肺鼻柱崩倒鼻中生瘜肉食人腎耳鳴啾啾或如車行雷鼓之聲若食人皮皮膚頑痹食人筋肢節墮落五風合五臟蟲生致多入於骨髓往來無礙壞於人身名曰疾風疾風者是癘風之根本也病之初起或如針錐所刺名曰刺風或如蟲走名曰遊風遍身掣動名曰瞤風不覺痛癢名曰頑風肉起如桃李小棗核從頭面起者名曰順風從兩腳起者名曰逆風如連錢團圓赤白青烏斑駁名曰𤻪風或遍體生瘡或如疥癬或如魚鱗或如榆莢或癢或痛黃汁流出肢節壞爛為膿為血或不癢不痛或起或滅青黃赤白黑變易不定病起之由皆因冷熱不調流於五臟通徹骨髓用力過度飲食雜穢房室不節虛勞動極汗流遍體因茲積熱於五臟致生多蟲食人五臟骨髓皮肉筋節久久敗壞名曰癘風惟見黑蟲者最為難治人得此疾速宜棄家室財物離妻妾入山靜養療治無有不瘥述古治法共八條薛立齋曰凡癘瘍當知有變有類之不同而治法有汗有下有砭刺攻補之不一蓋兼證當審輕重變證當察先後類證當詳真偽而汗下砭刺攻補之法又當量其人之虛實究其病之原委而施治之蓋虛者形氣虛也實者病氣實而形氣未必實也一癘瘍砭刺之法子和張先生謂一汗抵千針蓋以砭血不如發汗之周遍也然發汗即出血出血即發汗二者一律若惡血凝滯在肌表經絡者宜刺宜汗取委中出血則效若惡毒蘊結於臟腑非盪滌其內則不能痊若毒在外者非砭刺遍身患處及兩臂腿腕兩手足指縫各出血其毒必不能散若表裡俱受毒者非外砭內泄其毒決不能退若上體多宜用醉仙散取其內蓄惡血從齒縫中出乃刺手指縫並臂腕以去肌表毒血若下體多宜用再造散令惡血陳蟲從穀道中出仍針指足縫並腿腕隔一二日更刺之以血赤為度如有寒熱頭痛等證當大補氣血為主一癘瘍服輕粉之劑若腹痛去後兼有膿穢之物不可用藥止之若口舌腫痛穢水時流作渴發熱喜冷此為上焦熱毒宜用瀉黃散若寒熱往來宜用小柴胡湯加知母若口齒縫出血發熱而大便秘結此為熱毒內淫宜用黃連解毒湯若大便調和用局方犀角地黃湯若穢水雖盡口舌不愈或發熱作渴而不飲冷此虛熱也宜七味白朮散一癘瘍手足腿臂或各指拳攣者由陰火熾盛虧損氣血當用加味逍遙散加生地黃及換肌散兼服一癘瘍生蟲者以五方風邪翕合相火制金金衰不能平木所以化蟲內食五臟而證則見於外也宜用升麻湯送瀉清丸或樺皮散以清肺肝之邪外灸承漿以疏陽明任脈則風熱息而蟲不生矣若肝經虛熱者佐以加味逍遙散六味地黃丸徐東皋曰經云汗之則瘡已況癩之為風尤瘡之最惡者故曰癘風諸瘡熱久熱則生風且癘風尤染肅殺之氣而成者若非汗法何以去其毒風所以汗之一法乃治癘之最要者其餘諸方次第用之可也凡患人身上癢甚蓋以風邪氣鬱血不榮敷而然宜四物湯加黃芩白芷調浮萍末服發汗而愈一癘風灸法先服樺皮散自少至多服五七日灸承漿穴七壯灸瘡愈後再灸之凡三灸之後服二聖散泄熱祛血中之風邪時更以升麻湯送下瀉清丸為佳倘年深日久即以愈風丹換骨丹等方詳而用之一凡大風初起頭面搔癢更有紅紫疹塊起者即可服防風通聖散加苦參天麻蟬蛻數十帖外用七珍湯浴洗發汗則易愈大忌五辛葷腥厚味半年必不再發述古變證治法共三條立齋曰一身起疙瘩搔破膿水淋漓若寒熱往來者肝經氣血虛而有火也用八珍湯加丹皮柴胡寒熱內熱者血氣弱而虛熱也八珍湯倍加參術若惡寒形寒者陽氣虛寒也用十全大補湯若肌膚搔如帛隔者氣血不能外榮也人參養營湯若面部抓之麻木氣血不能上榮也補中益氣湯若痿弱筋攣者血氣不能滋養也補中益氣湯佐以六味地黃丸一遍身疙瘩或隱疹搔癢此風熱傷血用羌活當歸散氣虛者佐以補中益氣湯加山梔鉤藤鉤血虛者佐以加味逍遙散加鉤藤鉤若手足皴裂不問黯白或於手足腿腕搔起白皮此風熱燥澀也用清胃散加芍藥一面赤搔癢或眉毛脫落此屬肺經風熱用人參消風散樺皮散氣虛用補中益氣湯加天麻殭蠶血虛用加味逍遙散加鉤藤鉤若面發紫泡或成塊或眉毛脫落屬肝經風熱先用小柴胡湯加山梔丹皮鉤藤鉤後用加味逍遙散凡證屬肝經血燥生風者但宜滋腎水生肝血則火自息風自定癢自止兼證治法一癘瘍之有兼證變證凡如表裡臟腑諸病無不有之其各治法亦已具悉各門但有所值即宜隨證參用之左右逢源無弗善也重錄資繁茲不贅及解諸毒一敷砒霜患處作痛或腐潰者用濕泥頻塗換之若毒氣入腹胸膈苦楚或作吐瀉飲冷米醋一二杯即止多亦不妨生綠豆末芝麻油俱可敷貼雄黃藥悶亂或吐瀉用防己煎湯解之服辛熱藥而眉發脫落者乃肝經血傷而火動非風也用四物湯六味丸以滋肝血生腎水服川烏草烏等藥悶亂流涎或昏憒嘔吐或出血吐血用大豆遠志防風甘草任用一味煎湯解之大凡服風藥過多皆宜用之如未應急用甘草生薑汁敷貼巴豆之藥患處作痛肌肉潰爛以生黃連為末水調敷之若毒入內吐瀉等證更以水調服一二錢或大小豆菖蒲汁皆可敷貼藜蘆毒入內煎蔥湯解之服祛風克伐之藥嘔吐少食胸膈不利或形氣倦怠等證用六君子湯以補陽氣若煩熱作渴飲食不思或晡熱內熱面赤發熱用四物湯加參術以生陰血余從各門治之禁忌人之患斯疾者多由嗜欲不謹所致治斯疾者速當斷戒葷腥鹽醬一切厚味只宜清心寡慾絕色忘慮幽陷林泉屏棄世務早早救療庶幾可活稍不守禁每見愈而復作及致危劇莫能再救總以其不守禁忌也癘風論列方醉仙散外二百七十再造散外二七三黃連解毒湯寒一換肌散外二七二換骨丹和二七九七味白朮散小七七珍湯外二八三八珍湯補十九六味地黃丸補百二十四物湯補八二聖散外二六七十全大補湯補二十愈風丹外二六六瀉黃散寒五七補中益氣湯補三十樺皮散外二六八六君子湯補五人參消風散散四七清胃散寒五四小柴胡湯散十九人參養營湯補二一瀉清丸寒一五一防風通聖散攻十六加味逍遙散補九四三局方犀角地黃湯寒七九論外備用方升麻湯外二六九浮萍散外二七一白花蛇丸外二七四皂角散外二七八雷丸散外二七九白花蛇膏外二七五行藥方外二七七硫黃酒外二八二防風天麻丸外二七六苦參酒外二八一烏頭湯外二八四洗癘方外二八六敷癘方外二八五黑虎丹外二百八十
