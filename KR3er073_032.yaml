body:
  text: 卷之三十二貫集雜證謨腳氣經義太陰陽明論曰陽受風氣陰受濕氣傷於風者上先受之傷於濕者下先受之清濕襲虛則病起於下風雨襲虛則病起於上邪氣臟腑病形篇曰身半以上者邪中之也身半以下者濕中之也陰陽應象大論曰地之濕氣感則害人皮肉筋脈通評虛實論曰跖跛寒風濕之病也臟氣法時論曰脾苦濕急食苦以燥之禁濕地濡衣調經論曰寒濕之中人也皮膚不收肌肉堅緊營血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛五常政大論曰太陰司天濕氣下臨六元正紀大論曰太陽司天之政民病寒濕發肌肉萎足萎不收太陰司天之政民病寒濕腹滿身䐜憤胕腫太陰所致為重胕腫生氣通天論曰因於氣為腫四維相代陽氣乃竭經脈篇曰胃病則大腹水腫膝臏腫痛足陽明實則狂顛虛則足不收脛枯平人氣象論曰足脛腫曰水論證共五條腳氣之說古所無也自晉蘇敬始有此名然其腫痛麻頑即經之所謂痹也其縱緩不收即經之所謂痿也其甚而上衝即經之所謂厥逆也逮夫後世則有類傷寒四證而以腳氣居其一謂凡頭痛發熱身痛便閉而但見腳膝屈弱無力者便是腳氣此說太混豫不然之夫腳氣本水濕下壅之病而實非陽邪外感證也若諸證之兼見者則或有之若以外感之腳軟者便認作腳氣則淆亂意見大不通也茲豫刪諸繁瑣述其節要法既無遺庶便理會一腳氣之證其初甚微飲食動作無不如故或無他疾而忽得之或因病後而漸得之及其病也則自膝至足或見麻痹或見冷痛或見痿弱或見攣急或腫或不腫或日漸枯細或蒸蒸惡熱或灑灑惡寒或如冰冷或如火熱或到底能食或不能食或有物如指發自腨腸而氣上衝心是皆腳氣之正病也其有為發熱頭痛寒熱往來或腹內作痛或見飲食則嘔吐或惡聞食氣或不欲見明或語言錯亂精神昏憒是皆腳氣之兼證也大抵此證有緩急緩者其來漸或二三月而日甚急者其來速或一二日而即起治之若緩恐其氣上衝心亦能殺人一腳氣之因有二一則自外而感一則自內而致也自外而感者以陰寒水濕雨霧之氣或坐臥濕地致令濕邪襲人皮肉筋脈而凡清濕襲虛則病始於下致為腿足之病此外因也自內而致者以肥甘過度酒醴無節或多食乳酪濕熱等物致令熱壅下焦走注足脛而日漸腫痛或上連手節者此內因也然在古人謂南方卑濕病多外因北方嗜酒酪病多內因此固一說然北方亦有寒濕南方豈少酒濕此固不必分南北其或內或外凡受邪氣有病始於足而漸致他證者即腳氣之謂也必察其因而治之則自無失矣一方書以腫為濕腳氣不腫者為乾腳氣濕者宜除濕乾者宜行氣一陳無擇曰腳氣不專主一氣亦不專在一經兼有雜生諸病未易分別須尋經絡之陰陽再察脈息之虛實以為治也凡自汗走注者為風勝無汗攣急掣痛者為寒勝腫滿重著為濕勝煩渴燥熱為暑勝若四氣兼中者但察其多者為勝分其表裡以施治也論治共八條腳氣之病實三氣之所為也然亦有虛實之異又腳氣本為壅疾古云忌用補劑然必下元不足及陽明之氣有虧者而後邪氣得以犯之此其中亦有虛證總之凡治此者只因證施治則萬全也但察其因於表者以發散為主因於里者以疏利為主外因者多寒濕宜用溫熱內因者多濕熱宜用清涼若元氣本虛及病久致虛者必當培補下元不得以忌補之說為拘也一腳氣初起無非濕滯如無他證兼見而身體重著者單宜治濕以分利為主凡腳膝中濕或腰腿痠疼重著腫痛者宜除濕湯不問久近乾溼並可用若腳膝痠軟重著而胃氣不清或見噫氣吞酸脹滿者平胃散若腳氣浮腫而兼泄瀉者宜五苓散或胃苓湯一寒濕外侵致成腳氣者十居六七其證疼痛拘攣惡寒清厥脈多弦細治宜以溫經除濕為主是以古人治此之法大抵熱藥多寒藥少故每用麻黃川烏桂附乾薑之屬內經曰濕淫於內治以苦熱正以烏附麻黃走而不守故能通行經絡乾薑官桂辛甘大熱故能助陽退陰清濕既除病無不愈凡感寒濕雨水或四氣流注致成腳氣腫痛不可忍者宜雞鳴散如神若寒濕內侵陽虛陰盛胃氣不強經氣不行頑木浮腫或疼痛不用者獨活湯若寒邪入腹喘急疼痛或筋急上衝悶亂危急欲絶者茱萸丸或茱萸木瓜湯若寒濕在經血脈不和腰腳筋骨痠軟無力或拘攣疼痛脈弱而澀者酒浸牛膝丸若寒濕壅腫氣滯不行或冷或痛者立效散若寒濕兼風者如五積散小續命湯皆宜用詳具後條一濕熱內蒸致成腳氣者多因酒食不節其證必煩熱多渴脈見滑數二便或多不利治宜利濕清火為主若濕熱下壅足脛腫痛不消者防己飲加減治之或蒼朮黃柏丸或二妙散或加味二妙丸俱妙若濕熱氣壅上衝胸腹煩渴悶亂頭痛口乾者活人犀角散若濕熱流注經絡肢節煩痛肩背沉重手足遍身疼痛熱腫者當歸拈痛湯若感冒暑濕肢節疼痛身熱口渴小便赤澀氣虛氣促者清暑益氣湯若肝腎陰虛血熱腳瘠疼痛行止艱難小水不利者續斷丸一腳氣有壅滯氣逆者其證必喘滿氣急上攻心腹甚至危急可畏治宜行滯降氣為主凡腳氣上衝心腹喘急不得眠臥者紫蘇散檳榔湯或加減檳榔湯甚者四磨飲若腳氣喘急腹滿腳腫者桑白皮散或木通散若腳氣臍下氣升衝心煩悶者木香散或檳榔散若腳氣心胸壅悶嘔逆多痰不食者半夏散或紫蘇湯若浮腫心腹痞悶小水不利大腹皮散一風濕合邪而為腳氣者其證必兼外感而或為寒熱往來或為喘咳氣急或流走無常或筋骨疼痛治宜以散風除濕通行經絡為主若感四時風疫風濕或處陰濕之地致為腳氣痿弱筋骨疼痛或寒熱往來者敗毒散若寒熱如瘧赤腫疼痛者加味敗毒散若腳氣以風寒濕邪客於經絡而骨髓痠痛不可忍或遍身疼痛惡寒嘔逆者五積散一法加全蠍三個入酒煎服若腳氣以風濕留滯而陰寒外閉表邪不解或咳嗽喘滿寒熱者小青龍湯若風濕留滯肢節煩痛心神壅閉者大腹子散千金云若腳氣脈大而緩宜服小續命湯二劑立瘥活人云腳氣屬冷者以小續命湯煎成入生薑自然汁服之最快若腳氣風濕勝而兼發熱咳嗽肢體疼痛者芎芷香蘇散若腳氣風濕流注憎寒發熱無汗惡寒者麻黃左經湯一腳氣有虛證凡脾胃肝腎之脈皆出於足邪之易入多有乘虛故肝虛則筋病腎虛則骨病脾虛則肌肉病胃虛則宗筋病或以勞欲不節或以酒濕太過或以病後失調凡內有虧損而外有腳氣者無非虛證此當以調補為主而兼察四氣以治之若肝腎陰虛感觸四氣而癱瘓頑木半身不遂腳膝無力遍體疼痛者神應養真丹或三因四斤丸或虎骨酒或八味地黃湯若脾胃大虛陰寒在下陽氣不行而病腳氣者獨活湯附子八味湯若精血不足陰虛於下氣不歸精而腳氣上逆衝心者地黃湯若脾胃虛寒兼風濕外邪而成腳氣者風引獨活湯或追毒湯若腳氣以脾腎虛寒而兼咳嗽氣逆嘔吐者兼補厚朴湯一腳氣有實邪凡壅盛腫痛而或為閉結或為脹滿者治宜以疏導通利為主若風濕壅盛腳氣腫痛便結腹滿者羌活導滯湯或枳實大黃湯若四氣流注陽明風熱腰腳腫痛大小便祕喘滿腹痛者大黃左經湯若腳氣飲食不消心下痞悶腿腳腫痛者開結導飲丸敷尉淋洗凡腳氣腫痛之甚者可用敷藥以散之或用椒艾囊以溫之或用香散之藥煎湯以洗之如百草煎及防風荊芥威靈仙艾葉蒼朮蛇床子當歸烏藥之類皆可用或單用紫蘇或忍冬藤煎湯淋洗之俱妙禁忌共三條觀活人等書云凡腳氣服補藥及用湯淋洗者皆醫之所禁也此亦一偏之說耳蓋補有宜禁者以邪壅氣實者也淋洗有宜禁者以水濕湯氣之宜避者也如果下部虛寒或以病後或以克伐太過而腳氣不愈者豈尚堪禁補乎又若寒邪濕熱壅結不散而為腫為痛者最宜以辛香疏散之藥煎湯蒸洗則退邪極速豈禁洗乎惟是濕熱氣逆而上衝心腹者不可驟洗恐助濕氣上升也此必先降其氣俟其毒止在腳再行熏洗自無不利蓋補以補其弱也洗以逐其滯也夫何禁之有有當禁於未發之先者如外臺祕要云第一忌嗔嗔則心煩煩則腳氣發又禁大語大語則傷氣氣傷病亦發又不得露足當風入水以冷水洗足兩足脛尤不宜冷雖暑月當著帛袴至冬寒加綿常令兩脛及腿溫暖微汗尤佳依此將息腳氣自消而無邪氣留連之患夏月腠理開不宜當風取涼涼處坐臥須得勞動關節令其氣暢此拒邪之法養生之要也每食後宜行三五百步疲倦便止則腳中惡氣隨即下散雖有浮腫氣亦不上也孫真人云古人少有此疾自永嘉南渡衣冠之人多有之此皆濕鬱於內所致也故凡四時之中皆不得久坐久立濕冷之地亦不得因酒醉汗出脫衣洗足當風取涼皆成腳氣暑月久坐久立濕地則濕熱之氣蒸人經絡病發必熱而四肢痠疼煩悶胕腫寒熱此又山野農夫多有之以久濕傷於外也述古楊大受曰腳氣是壅疾當用宣通之劑使氣不能成壅也如羌活導滯湯之類所宜通用又如蒼白朮防己南星以去濕羌活獨活木瓜檳榔行氣利關節以去壅佐木通牛膝以引經當歸生黃地以和血此必用之藥也又如東垣拈痛湯之類亦甚捷余因證之虛實而辨治之此即通變活法也附按薛氏治一男子素有腳氣脅下作痛發熱頭暈嘔吐腿痹不仁服消毒護心等藥不應左關脈緊右關脈弦此亦腳氣也以半夏左經湯治之而愈一男子腳軟腫痛發熱飲冷大小便祕右關脈數乃足陽明經濕熱流注也以大黃左經湯治之而愈一婦人肢節腫痛脛足尤甚時或自汗或頭痛此太陽經濕熱所致用麻黃左經湯二劑而愈一男子兩腿腫痛脈滑而數此濕痰所致也先以五苓散加蒼朮黃柏二劑少愈更以二陳二朮檳榔紫蘇羌活獨活牛膝黃柏而瘥夫濕痰之證必先以行氣利濕健中為主若中氣和則痰自消而濕亦無所容矣一男子右腿赤腫焮痛脈沉數用當歸拈痛湯四肢反痛乃濕毒壅遏又況下部藥不易達非藥不對證也遂砭患處去毒血仍用前藥一劑頓減又四劑而消一婦人患腳氣或時腿腫筋攣腹作痛諸藥不應漸至危篤諸書云八味丸治足少陰腳氣入腹疼痛上氣喘促欲死者遂投一服頓退又服而愈凡腎經虛寒之人多有此患乃腎乘心水剋火之證少緩則死不旋踵宜急服之一婦人患腿痛不能伸屈遇風寒痛益甚諸藥不應甚苦先以活絡丹一丸頓退又服而瘳次年復痛仍服一丸亦退大半更以獨活寄生湯四劑而愈一男子素有腳氣又患附骨癰作痛服活絡丹一丸二證並瘥上舍俞魯月素有疝不能愈因患腿痛亦用活絡丹一丸不惟腿患有效而疝亦得愈矣留都金二守女患驚風甚危諸醫皆不能救遂自用活絡丹一丸即愈且不再作夫病邪深伏在內非此藥莫能通達但近代有云此藥引風入骨如油麵之說故後人多不肯服大抵有是病宜用是藥豈可泥於此言致病難瘥針灸凡腳氣初覺即灸患處二三十壯或用雷火針以導引濕氣外出及飲醪醴以通經散邪其要法也若壅既成而邪盛者必腫痛熱甚一時藥餌難散宜砭去惡血以消熱腫砭刺之後以藥繼之腳氣論列方平胃散和十七五苓散和一八二當歸拈痛散寒百三十立效散和二八七茱萸丸和三百九茱萸木瓜湯和二八六雞鳴散和二八五二妙散寒一三四加味二妙丸寒一三五除濕湯和一七七胃苓湯和百九十蒼朮黃柏丸寒一三六五積散散三九敗毒散散三六加味敗毒散外四一紫蘇湯和二百九十清暑益氣湯和一六八紫蘇散和二八九半夏散和二九九橘皮湯和二九八人參散和二九七芎芷香蘇散散八八檳榔散和二九三檳榔湯和二九一防己飲和二八八加減檳榔湯和二九二酒浸牛膝丸和三百八續斷丸和三百六活絡丹和二七七地黃湯和三百二八味丸補一二一活人犀角散寒一三一四磨飲和五二獨活寄生湯和二百七十風引獨活湯散百二獨活湯散八三小青龍湯散八虎骨酒和三一五木通散和二九六木香散和二九五三因四斤丸補一六一小續命湯散五二神應養真丹和三一三追毒湯散百四大腹皮散和三百附子八味湯熱三七椒艾囊和三一七大腹子散和三百一兼補厚朴湯散百一百草煎新因三七桑白皮散和二九四麻黃左經湯散九六開結導飲丸和二七八羌活導滯湯攻三四半夏左經湯散九七枳實大黃湯攻三三大黃左經湯散九八論外備用方鹿茸丸補一三一生瘡豨蘞丸和二五六加味四斤丸補百六十陰氣不足活絡飲和二五六風濕愈風丹和二七四養血去風加減四斤丸補一六一腎虛薏仁酒和三一六補陰去濕換腿丸和二百八十風濕虎骨四斤丸補一五九滋陰勝駿丸和三一二養氣去邪降椒酒和二三八風濕易老天麻丸和二七五血虛受邪續斷丸和三百六涼血去風沉香湯和三百四腳氣攻心神應養真丹和三一三滋陰行經木瓜湯和三百三行氣檳蘇散外一八八風濕流注史國公浸酒方和二八一透骨散和三一四行經敷腳氣方和三一八羌活勝濕湯和一七八風濕調元健步丸和三一一陰虛濕熱濟生檳榔湯和二九一疏壅第一麻黃湯散九九惡風第二獨活湯散百散風六物附子湯外三五四氣流注痿證經義痿論帝曰五臟使人痿何也岐伯曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虛弱急薄著則生痿躄也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而變發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿帝曰何以得之曰肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也故本病曰大經空虛發為肌痹傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿者生於肝使內也有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得之濕地也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也帝曰何以別之曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁帝曰論言治痿者獨取陽明何也曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也帝曰治之奈何曰各補其榮而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已矣帝曰善生氣通天論曰因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿本神篇曰精傷則骨酸痿厥精時自下根結篇曰陽明為闔闔折則氣無所止息而痿疾起矣故痿疾者取之陽明視有餘不足無所止息者真氣稽留邪氣居之也邪氣臟腑病形篇曰肺脈微緩為痿瘻偏風脾脈緩甚為痿厥微緩為風痿四肢不用心慧然若無病腎脈微滑為骨痿坐不能起起則目無所見論證共二條痿證之義內經言之詳矣觀所列五臟之證皆言為熱而五臟之證又總於肺熱葉焦以致金燥水虧乃成痿證如丹溪之論治誠得之矣然細察經文又曰悲哀太甚則胞絡絶傳為脈痿思想無窮所願不得發為筋痿有漸於濕以水為事發為肉痿之類則又非盡為火證此其有餘不盡之意猶有可知故因此而生火者有之因此而敗傷元氣者亦有之元氣敗傷則精虛不能灌溉血虛不能營養者亦不少矣若概從火論則恐真陽虧敗及土衰水涸者有不能堪故當酌寒熱之淺深審虛實之緩急以施治療庶得治痿之全矣經曰濕熱不攘則大筋緛短小筋弛長緛短為拘弛長為痿此內經言筋病之概乃舉隅之談以啓人之自反耳非謂大筋必無弛長小筋必無緛短也即如痿弱必由於弛長豈大筋果無涉乎此經言之意從可知矣故於痿證之外凡遇瘛瘲等病當知拘攣者必由緛短癱弱者必由弛長斯得內經之意而於寒熱燥濕之辨亦可得其據矣論治共二條一凡痿由濕熱脈洪滑而證多煩熱者必當先去其火宜二妙散隨證加減用之若陰虛兼熱者宜正傳加味四物湯虎脛骨丸或丹溪補陰丹滋陰八味丸之類主之若絶無火證而止因水虧於腎血虧於肝者則不宜兼用涼藥以伐生氣惟鹿角膠丸為最善或加味四斤丸八味地黃丸金剛丸之類俱可擇用若陰虛無濕或多汗者俱不宜輕用蒼朮蓋痿證最忌散表亦恐傷陰也一東垣取黃柏為君黃耆等補藥輔佐以治諸痿無一定之方有兼痰積者有濕多熱多者有濕熱相半者有挾氣者臨病制方其亦治痿之良法也述古共四條丹溪曰內經謂諸痿起於肺熱又謂治痿獨取陽明蓋肺金體燥居上而主氣畏火者也脾土性濕居中而主四肢畏木者也火能炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣木性剛急肺受熱則不能管攝一身脾傷則四肢不能為用而諸痿作矣瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此雖然天産作陽厚味發熱凡病痿者若不淡薄食味必不能保其全安也纂要云濕熱東垣健步丸加燥濕降火之劑黃柏黃芩蒼朮濕痰二陳湯加蒼朮白朮黃芩黃柏之類入竹瀝薑汁血虛四物加蒼朮黃柏下補陰丸氣虛四君子加蒼朮黃芩黃柏黃柏蒼朮治痿要藥也以上方治雖所主有不同而降火清金所謂治法之大要無不同也薛立齊曰痿證多因足三陰虛損若脾腎不足而無力者用還少丹肝腎虛熱而足無力者六味丸如不應急用八味丸陳無擇曰人身有皮毛血脈筋膜肌肉骨髓以成其形內則有肝心脾肺腎以主之若隨情妄用喜怒勞佚以致內臟精血虛耗使血脈筋骨肌肉痿弱無力以運動故致痿躄狀與柔風腳氣相類柔風腳氣皆外因風寒正氣與邪氣相搏故作腫苦痛為邪實痿由內臟不足之所致但不任用亦無痛楚此血氣之虛也痿證論列方二妙散寒一三四四物湯補八東垣健步丸和三百十二陳湯和一金剛丸補一六二加味四物湯補十還少丹補一三五四君子湯補一加味四斤丸補百六十鹿角膠丸補百三十虎脛骨丸寒一三七八味地黃丸補一二一丹溪補陰丸寒百六十滋陰八味丸新寒十七六味地黃丸補百二十論外備用方煨腎丸補一四六骨痿敗毒散散三六風濕地黃飲子補九九鹿茸丸補一三一陰虛弱清燥湯寒一三二濕熱加減四斤丸補一六一勝駿丸和三一二養陰祛邪虎骨酒和三一五強筋骨滋陰大補丸補一二五陰虛續斷丸和三百六涼血強筋牛膝丸和三百七肝腎虛虎骨四斤丸補一五九強陰小續命湯散五二風濕追毒湯散百四風濕酒浸牛膝丸和三百八壯筋骨小安腎丸熱一六七痿弱大防風湯補九八風濕加味二妙丸寒一三五濕熱石刻安腎丸熱一六八痿弱加味四君湯補二調元健步丸和三一一陽痿經義陰陽別論曰二陽之病發心脾有不得隱曲女子不月厥論曰厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫痿論曰思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫陽明虛則宗筋縱邪氣臟腑病形篇曰腎脈大甚為陰痿微澀為不月沉痔經筋篇曰足太陰之筋病陰器紐痛下引臍足厥陰之筋病陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收經脈篇曰足厥陰結於莖氣逆則睪腫卒疝實則挺長虛則暴癢至真要大論曰太陽之勝隱曲不利互引陰股本神篇曰肝悲哀動中則傷魂魂傷則狂忘不精當人陰縮而攣筋兩脅骨不舉恐懼而不解則傷精精傷則骨酸痿厥精時自下生氣通天論曰濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿疏五過論帝曰凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精身體日減氣虛無精病深無氣灑灑然時驚病深者以其外耗於衛內奪於營良工所失不知病情此治之一過也凡欲診病者必問飲食居處暴樂暴苦始樂後苦皆傷精氣精氣竭絶形體毀沮暴怒傷陰暴喜傷陽厥氣上行滿脈去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也陰陽應象大論曰北方生寒在志為恐恐傷腎思勝恐宣明五氣篇曰精氣並於腎則恐調經論曰血有餘則怒不足則恐論證共三條凡男子陽痿不起多由命門火衰精氣虛冷或以七情勞倦損傷生陽之氣多致此證亦有濕熱熾盛以致宗筋弛緩而為痿弱者譬以暑熱之極則諸物綿萎經云壯火食氣亦此謂也然有火無火脈證可別但火衰者十居七八而火盛者僅有之耳一凡思慮焦勞憂鬱太過者多致陽痿蓋陰陽總宗筋之會會於氣街而陽明為之長此宗筋為精血之孔道而精血實宗筋之化源若以憂思太過抑損心脾則病及陽明衝脈而水穀氣血之海必有所虧氣血虧而陽道斯不振矣經曰二陽之病發心脾有不得隱曲及女子不月者即此之謂一凡驚恐不釋者亦致陽痿經曰恐傷腎即此謂也故凡遇大驚卒恐能令人遺失小便即傷腎之驗又或於陽旺之時忽有驚恐則陽道立痿亦其驗也余嘗治一強壯少年遭酷吏之恐病似脹非脹似熱非熱絶食而困衆謂痰火宜清中焦余診之曰此恐懼內傷少陽氣索而病及心腎大虧證也遂峻加溫補兼治心脾一月而起愈後形氣雖健如初而陽寂不舉余告之曰根蒂若斯腎傷已甚非少壯所宜之兆速宜培養心腎庶免他虞彼反以恐嚇為疑全不知信未及半載竟復病而歿可見恐懼之害其不小者如此新按論治共三條一命門火衰精氣虛寒而陽痿者宜右歸丸贊育丹石刻安腎丸之類主之若火不甚衰而止因血氣薄弱者宜左歸丸斑龍丸全鹿丸之類主之一凡因思慮驚恐以致脾腎虧損而陽道痿者必須培養心脾使胃氣漸充則衝任始振而元可復也宜七福飲歸脾湯之類主之然必大釋懷抱以舒神氣庶能奏效否則徒資藥力無益也其有憂思恐懼太過者每多損抑陽氣若不益火終無生意宜七福飲加桂附枸杞之類主之一凡肝腎濕熱以致宗筋弛縱者亦為陽痿治宜清火以堅腎然必有火證火脈內外相符者方是其證宜滋陰八味丸或丹溪大補陰丸虎潛丸之類主之火之甚者如滋腎丸大補丸之類俱可用述古薛立齊曰按陰莖屬肝之經絡蓋肝者木也如木得湛露則森立遇酷暑則萎悴若因肝經濕熱而患者用龍膽瀉肝湯以清肝火導濕熱若因肝經燥熱而患者用六味丸以滋腎水養肝血而自安又曰瓊玉膏固本丸坎離丸此輩俱是沉寒瀉火之劑非腸胃有燥熱者不宜服若足三陰經陰虛發熱者久而服之令人無子蓋損其陽氣則陰血無所生故也屢驗簡易方一方治陽事不起用蛇床子五味子菟絲子等分為末蜜丸梧子大每服三五十丸溫酒下日三服陽痿論列方左歸丸新補四右歸丸新補五金鹿丸補一二七贊育丹新因十四七福飲新補七歸脾湯補三二石刻安腎丸熱一六八虎潛丸寒一六四瓊玉膏補六十滋陰八味丸新寒十七固本丸補百六六味丸補百二十龍膽瀉肝湯寒六三坎離丸寒一六五滋腎丸寒一六三丹溪大補陰丸寒一五七斑龍丸補一二八大補丸寒一五五
