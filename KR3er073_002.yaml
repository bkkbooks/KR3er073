body:
  text: 卷之二入集傳忠錄中神氣存亡論十二經曰得神者昌失神者亡善乎神之為義此死生之本不可不察也以脈言之則脈貴有神脈法曰脈中有力即為有神夫有力者非強健之謂謂中和之力也大抵有力中不失和緩柔軟中不失有力此方是脈中之神若其不及即微弱脫絕之無力也若其太過即弦強真藏之有力也二者均屬無神皆危兆也以形證言之則目光精彩言語清亮神思不亂肌肉不削氣息如常大小便不脫若此者雖其脈有可疑尚無足慮以其形之神在也若目暗睛迷形羸色敗喘急異常泄瀉不止或通身大肉已脫或兩手尋衣摸床或無邪而言語失倫或無病而虛空見鬼或病脹滿而補瀉皆不可施或病寒熱而溫涼皆不可用或忽然暴病即沉迷煩躁昏不知人或一時卒倒即眼閉口開手撒遺尿若此者雖其脈無凶候必死無疑以其形之神去也再以治法言之凡藥食入胃所以能勝邪者必賴胃氣施布藥力始能溫吐汗下以逐其邪若邪氣勝胃氣竭者湯藥縱下胃氣不能施化雖有神丹其將奈之何哉所以有用寒不寒用熱不熱者有發其汗而表不應行其滯而里不應者有虛不受補實不可攻者有藥食不能下咽或下咽即嘔者若此者呼之不應遣之不動此以臟氣元神盡去無可得而使也是又在脈證之外亦死無疑者雖然脈證之神若盡乎此然有脈重證輕而知其可生者有脈輕證重而知其必死者此取證不取脈也有證重脈輕而必其可生者有證輕脈重而謂其必死者此取脈不取證也取捨疑似之間自有一種玄妙甚矣神之難言也能知神之緩急者其即醫之神者乎君火相火論十三余向釋內經於君火以明相火以位之義說固詳矣而似猶有未盡者及見東垣云相火者下焦包絡之火元氣之賊也丹溪亦述而證之予聞此說嘗掩口而笑而覺其不察之甚也由此興感因再繹之夫內經發明火義而以君相明位四字為目此四字者個個著實是誠至道之綱領有不可不闡揚其精義者亦何以見之蓋君道惟神其用在虛相道惟力其用在實故君之能神者以其明也相之能力者以其位也明者明於上為化育之元主位者位於下為神明之洪基此君相相成之大道而有此天不可無此地有此君不可無此相也明矣君相之義豈泛言哉至若五運之分各職其一惟於火字獨言君相而他則不及者何也蓋兩間生氣總曰元氣元氣惟陽為主陽氣惟火而已第火之為用其道最微請以火象證之如輕清而光焰於上者火之明也重實而溫蓄於下者火之位也明即位之神無明則神用無由以著位即明之本無位則光焰何從以生故君火之變化於無窮總賴此相火之栽根於有地雖分之則一而二而總之則二而一者也此君火相火之辨凡其為生化為盛衰為本末重輕攸系從可知矣人生所賴者惟此故內經特以為言然在內經則但表其大義原無分屬之條惟刺禁論曰七節之傍中有小心此固隱然有相火所居之意故後世諸家咸謂相火寄在命門是固然矣然以予之見則見君相之義無藏不有又何以辨之蓋總言大體則相火當在命門謂根荄在下為枝葉之本也析言職守則臟腑各有君相謂志意所出無不從乎形質也故凡以心之神肺之氣脾胃之倉廩肝膽之謀勇兩腎之伎巧變化亦總皆發見之神奇使無其地何以生此使地有不厚何以蕃此此皆從位字發生而五臟各有位則五臟亦各有相相強則君強此相道之關係從可知矣故聖人特命此名誠重之也而後人指之為賊抑何異耶此萬世之疑竇故予不得不辨或曰是若謬矣第彼之指為賊者亦有深意蓋謂人之情欲多有妄動動則俱能起火火盛致傷元氣即所謂元氣之賊亦何不可予曰此固邪正之歧最當明辨者也夫情欲之動邪念也邪念之火為邪氣君相之火正氣也正氣之蓄為元氣其在身家譬之產業賢者能守之不肖者能蕩之罪與不罪在子孫之廢與不廢鎡基何與焉相火之義亦猶此耳夫既以相稱之而竟以賊名之其失聖人之意也遠矣且凡火之賊傷人者非君相之真火無論在內在外皆邪火耳邪火可言賊相火不可言賊也矧六賊之中火惟居一何二子獨知畏火其甚如是而並昧邪正之大義亦何謂耶予聞其言固知其錯認面目矣不覺因而失笑先天后天論十四人生於地懸命於天此人之制命於天也栽者培之傾者覆之此天之制命於人也天本無二而以此觀之則有天之天者謂生我之天生於無而由乎天也有人之天者謂成我之天成於有而由乎我也生者在前成者在後而先天后天之義於斯見矣故以人之稟賦言則先天強厚者多壽先天薄弱者多夭後天培養者壽者更壽後天斫削者夭者更夭若夫骨骼者先天也肌肉者後天也精神者先天也容貌者後天也顏色之有辨也蒼者壽而妖者夭嫩中有蒼者吉蒼中有嫩者凶聲音之有辨也充者壽而怯者夭雖細而長者吉雖洪而促者凶形體之有辨也堅者壽而脆者夭身雖羸瘦而動作能耐者吉體雖強盛而精神易困者凶動靜有辨也靜者壽而躁者夭性雖若急而急中有和者吉陽雖若厚而陰中蘊薄者凶至若少長之辨初雖綿弱而漸長漸堅者晚成之徵也氣質之辨少年華麗而易盈易滿者早凋之兆也是故兩天俱得其全者耆艾無疑也先後俱失其守者夭促弗卜也若以人之作用言則先天之強者不可恃恃則並失其強矣後天之弱者當知慎慎則人能勝天矣所謂慎者慎情志可以保心神慎寒暑可以保肺氣慎酒色可以保肝腎慎勞倦飲食可以保脾胃惟樂可以養生欲樂者莫如為善惟福可以保生祈福者切勿欺天但使表裡無虧則邪疾何由而犯而兩天之權不在我乎故廣成子曰毋勞爾形毋搖爾精乃可以長生至矣哉兩言盡之矣勿以此為易而忽之標本論十五病有標本者本為病之源標為病之變病本惟一隱而難明病變甚多顯而易見故今之治病者多有不知本末而惟據目前則最為斯道之大病且近聞時醫有云急則治其標緩則治其本互相傳誦奉為格言以為得其要矣予聞此說而詳察之則本屬不經而亦有可取所謂不經者謂其以治標治本對待為言則或此或彼乃可相參為用矣若然則內經曰治病必求其本亦何謂耶又經曰夫陰陽逆從標本之為道也小而大淺而博可以言一而知百病之害也以淺而知深察近而知遠言標與本易而勿及又曰先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先病而後生熱者治其本先病而後泄者治其本先泄而後生他病者治其本先熱而後生中滿者治其標先病而後生中滿者治其標先中滿而後生煩心者治其本小大不利治其標小大利治其本先小大不利而後生病者治其本由此觀之則諸病皆當治本而惟中滿與小大不利兩證當治標耳蓋中滿則上焦不通小大不利則下焦不通此不得不為治標以開通道路而為升降之所由是則雖曰治標而實亦所以治本也自此以外若以標本對待為言則治標治本當相半矣故予謂其為不經者此也然亦謂其可取者則在緩急二字誠所當辨然即中滿及小大不利二證亦各有緩急蓋急者不可從緩緩者不可從急此中亦自有標本之辨萬不可以誤認而一概論也今見時情非但不知標本而且不知緩急不知標本則但見其形不見其情不知緩急則所急在病而不知所急在命故每致認標作本認緩作急而顛倒錯亂全失四者之大義重命君子不可不慎察於此求本論十六萬事皆有本而治病之法尤惟求本為首務所謂本者惟一而無兩也蓋或因外感者本於表也或因內傷者本於裡也或病熱者本於火也或病冷者本於寒也邪有餘者本於實也正不足者本於虛也但察其因何而起起病之因便是病本萬病之本只此表裡寒熱虛實六者而已知此六者則表有表證里有里證寒熱虛實無不皆然六者相為對待則冰炭不同辨之亦異凡初病不即治及有誤治不愈者必致病變日多無不皆從病本生出最不可逐件猜摸短覷目前經曰眾脈不見眾凶弗聞外內相得無以形先是誠求本之至要也苟不知此必庸流耳故明者獨知所因而直取其本則所生諸病無不隨本皆退矣至若六者之中多有兼見而病者則其中亦自有源有流無弗可察然惟於虛實二字總貫乎前之四者尤為緊要當辨也蓋虛者本乎元氣實者由乎邪氣元氣若虛則雖有邪氣不可攻而邪不能解則又有不得不攻者此處最難下手但當察其能勝攻與不能勝攻或宜以攻為補或宜以補為攻而得其補瀉於微甚可否之間斯盡善矣且常見有偶感微疾者病原不甚斯時也但知拔本則一藥可愈而庸者值之非痰曰痰非火曰火四路兜拿茫無真見而反遺其本多致輕者日重重者日危而殃人禍人總在不知本末耳甚矣醫之貴神神奚遠哉予故曰醫有慧眼眼在局外醫有慧心心在兆前使果能洞能燭知幾知微此而曰醫醫云乎哉他無所謂大醫王矣治形論十七老子曰吾所以有大患者為吾有身使吾無身吾有何患余則曰吾所以有大樂者為吾有形使吾無形吾有何樂是可見人之所有者唯吾吾之所賴者唯形耳無形則無吾矣謂非人身之首務哉第形之為義其義甚微如言動視聽非此形乎俊醜美惡非此形乎勇怯愚智非此形乎死生安否非此形乎人事之交以形交也功業之建以形建也此形之為義從可知也奈人昧養形之道不以情志傷其府舍之形則以勞役傷其筋骨之形內形傷則神氣為之消靡外形傷則肢體為之偏廢甚至肌肉盡削其形可知其形既敗其命可知然則善養生者可不先養此形以為神明之宅善治病者可不先治此形以為興復之基乎雖治形之法非止一端而形以陰言實惟精血二字足以盡之所以欲祛外邪非從精血不能利而達欲固中氣非從精血不能蓄而強水中有真氣火中有真液不從精血何以使之降升脾為五臟之根本腎為五臟之化源不從精血何以使之灌溉然則精血即形也形即精血也天一生水水即形之祖也故凡欲治病者必以形體為主欲治形者必以精血為先此實醫家之大門路也使能知此則變化可以無方神明自有莫測然用此之法無逾藥餌而藥餌之最切於此者不過數味之間其他如性有偏用者惟堪佐使而已亦猶飲食於人凡可口者孰無資益求其純正無損而最宜於胃氣者則惟穀食類可見矣或問余以所宜者果屬何物余則難以顯言之蓋善吾言者必如醴如飴而不善吾言者必反藉此為射的以資口吻之基矣余故不能顯言之姑發明此義以俟有心者之自悟臟象別論十八臟象之義余所類於經文者不啻詳矣然經有所未及而同中有不同及有先同後異者俱不可以不辨也夫人身之用止此血氣雖五臟皆有氣血而其綱領則肺出氣也腎納氣也故肺為氣之主腎為氣之本也血者水穀之精也源源而來而實生化於脾總統於心臟受於肝宣布於肺施泄於腎而灌溉一身所謂氣主噓之血主濡之而血氣為人之橐籥是皆人之所同也若其同中之不同者則臟氣各有強弱稟賦各有陰陽臟有強弱則神志有辨也顏色有辨也聲音有辨也性情有辨也筋骨有辨也飲食有辨也勞役有辨也精血有辨也勇怯有辨也剛柔有辨也強中強者病其太過弱中弱者病其不及因其外而察其內無弗可知也稟有陰陽則或以陰臟喜溫暖而宜薑桂之辛熱或以陽臟喜生冷而宜芩連之苦寒或以平臟熱之則可陽寒之則可陰也有宜肥膩者非潤滑不可也有宜清素者惟膻腥是畏也有氣實不宜滯有氣虛不宜破者有血實不宜澀有血虛不宜泄者有飲食之偏忌有藥餌之獨礙者有一臟之偏強常致欺凌他臟者有一臟之偏弱每因受制多虞者有素挾風邪者必因多燥多燥由於血也有善病濕邪者必因多寒多寒由於氣也此固人人之有不同也其有以一人之稟而先後之不同者如以素稟陽剛而恃強無畏縱嗜寒涼及其久也而陽氣受傷則陽變為陰矣或以陰柔而素耽辛熱久之則陰日以涸而陰變為陽矣不惟飲食情欲皆然病有出入朝暮變遷滿而更滿無不覆矣損而又損無不破矣故曰久而增氣物化之常也氣增而久夭之由也此在經文固已明言之矣夫不變者常也不常者變也人之氣質有常變醫之病治有常變欲知常變非明四診之全者不可也設欲以一隙之偏見而應無窮之變機吾知其遺害於人者多矣故於此篇之義尤不可以不深察天年論十九夫人之所受於天而得生者本有全局是即所謂天年也余嘗聞之岐伯曰上古之人其知道者法於陰陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去又嘗聞之老子曰生之徒十有三死之徒十有三民之生動之死地亦十有三余因此言乃知失天之畀而不得盡其全者有如是然則後天之養其為在人可以養生家而不以此為首務乎故常深慨於斯而直窮其境則若老氏所云十中之三者蓋亦言其約耳而三之倍倍則尤有不忍言者茲請得而悉之夫人生於地懸命於天可由此而生亦可由此而死故凡天亦殺人有如寒暑不時災荒薦至或妖祥之橫加或百六之難避是皆天刑之謂也地亦殺人則如旱潦無方水火突至或陰毒最以賊人或危險多能困斃是皆地殺之謂也人亦殺人如爭鬥傷殘刀兵屠戮或嫁禍陰謀或明欺強劫是皆人禍之謂也凡此三者十中約去其幾再若三者之外則凡孽由自作而致不可活者猶有六焉何以見之則如酒色財氣及功名之累庸醫之害皆是也故有困於酒者但知米汁之味甘安思曲糵之性烈能潛移禍福而人難避也能大損壽元而人不知也及其病也或血敗為水而肌肉為其浸漬則鼓脹是也或濕邪侵土而清濁苦於不分則瀉痢是也或血不養筋而弛縱拘攣甚至眩暈卒倒則中風是也或水泛為涎而滿悶不食甚至脾敗嘔喘則痰飲是也耽而不節則精髓胡堪久醉陰血日以散亡未及中年多見病變百出而危於此者不知其幾何人矣有困於色者但圖嬌豔可愛而不知傾國之說為何伐命之說為何故有因色而病者則或成勞損或染穢惡或相思之失心或鬱結之盡命有因色而死者則或以竊窺或以爭奪或以蕩敗無蹤或以驚嚇喪膽總之好色之人必多淫溺樂而忘返安顧身家孰知實少花多豈成瑞物德為色勝非薄則邪未有貪之戀之而不招殃致敗凡受色中之害者吾又不知其幾何人矣有困於財者止知財能養命豈識財能殺人故鄙吝者每以招尤慢藏者因多誨盜奔波不已者多竭其力貪得無厭者常忘其身顧利不顧義骨肉為之相殘聚斂盡膏血賈怨所以致敗蓋財本通神不容脧剝積則金精崇作爭則罄囊禍生凡受利中之害者又不知其幾何人矣有困於氣者每恃血氣之強只喜人不負我非驕矜則好勝人心不平爭端遂起事無大小怨恨醉心豈虞忿怒最損肝脾而隔食氣蠱疼痛泄瀉厥逆暴脫等疾犯者即危又或爭競相傾公庭遘訟寧趨勢利以卑汙甘受醜凌於奴隸及被他人之苛辱既不敢相抗於後何若親識之小忿即涵容少遜於前終身讓路不失一步孰得孰失孰知孰愚甚至破家蕩產骨肉分離之害纖須不忍悔時遲矣夫氣本無形有何涯際相諒則無偏執則有歷觀往事誰直誰非使不能達觀自策則未免以我之軀陰受人無申無訴之蝕而自愚自斃者又不知其幾何人矣有困於功名者誰不有飛騰之念誰不有功業之期第既達者或多鼎足之虞未濟者每遭監車之厄受燈窗寒苦之負望眼徒穿者有之憶榮枯今昔之異熱腸為裂者有之甚至焦思切心奔趨竭力榮華杳然泉壤遽及者有之慨古傷今凡受斯枉而湮沒無聞浩氣受抑者又不知其幾何人矣有困於醫者凡疾苦之望醫猶凶荒之望歲其懇其切其念何如第此中神理微妙難言使不有天人之學絕倫之聰則何以能聞於無聲見於無跡直窺乎窈冥之鄉而必得其情乎使必得其人而後可以言醫則醫不易談蓋可徵矣既難其人則次乎此者雖未知神猶知形跡此即今之上醫也然此醫亦不易得而舍此之外則昧者居其八九庸醫多則殺人亦多每見其寒熱倒施虛實謬認一匕之訛吉凶隨應困者莫知其然雖死不覺明公鑑其多誤能無惻心顧造化大權本非凡庸所可窺弄而性命重託又豈淺輩所宜輕付耶第彼非無自蓋自原病式以來祖述相傳日以滋甚醉者不醒逝者無詞而黎元陰受此害者蓋不知若干若干人矣而聞者未知其詳猶或未之信也由是乘除則既有前三又有後六凡此淘汰之餘而得盡其天年者果剩其幾吾故曰老氏言十之三者蓋亦言其約耳興言及此誠可為人生之痛哭者也然徒悲何益曷亦為人之計乎則惟上知者有可曉也雖前之三者或多出於莫測則有可避者有不可避者即聽之天無不可也然知者見於未然而得天者天庇之得地者地庇之得人者人庇之得此三庇即得生之道也失此三庇則失生之道也人道於此豈曰盡無其權乎至於六殺之防則全由乎我矣酒殺可避吾能不醉也色殺可避吾能不迷也財殺可避吾能不貪也氣殺可避吾能看破不認真也功名之殺可避吾能素其行藏也庸醫之殺可避吾能相知以豫也夫如是而培以為善存以無欺守以不行險戒以毋僥倖則可全收其效矣孔子曰毋意毋必毋固毋我蓋示人以無勉強也廣成子曰毋勞爾形毋搖爾精乃可以長生蓋形言其外精言其內內外俱全盡乎道矣是皆古聖人垂念蒼生至真至極之良方也可不佩乎或曰子言雖是而實亦近迂獨不見有不識不知而偏躋上壽者又何人力之足恃耶余曰此正所謂其知可及也其愚不可及也然予論誠迂矣倘亦蒙知者之相顧而咀之識之或亦可為天年之一助否中興論又十九試觀天地之道有盈有虛有消有長是以日中則昃月盈則蝕此即天運之循環而天亦不能違者故有先天之說也先天有定數君子知命固當聽乎天也若後天之道則參贊有權人力居多矣何以見之第就國家之否泰可證人身之壽夭雖曰天步多艱無成不敗然如商周漢晉唐宋相傳國運皆有中興人道豈無再振消長一理小大皆然嘗聞之康節先生云一萬里區宇四千年興亡五百主肇位七十國開疆則此中人事不為不多也而何以興復僅見止此數代是亦由知道者少而不知道者之多耳彼知道者既以得人又以得天得人即所以得天也不知道者既不知本又不知末既以失之而終不知其所以失也至若身命之謀則舉世之人孰不愛命而每多耽誤者其不知道者亦猶是耳欲明其道可無言乎然言而無證則人多不信故藉此國運之徵用效遒人之鐸試論國家之衰也或以人心之離或以財用之匱或以兵戈之殘傷或以優柔之曠廢而人之亨否無非一理夫在國曰人心在人曰神志故曰事其神者神去之休其神者神居之知生氣之主在乎心此元神之不可不養也又在國曰財用在人曰血氣氣為陽陽主神也血為陰陰主形也血氣若衰則形神俱敗此營衛之毫釐當惜也又在國曰兵戈在人曰克伐夫兵者凶器也克伐者危事也未有日加剝削而不致殘傷元氣者此消耗之不可不慎也又在國曰優柔在人曰疑貳今日云姑且明日云將就豈不僉云穩當然致坐失機宜變生倏忽又焉知耽擱之大害此當機之不可不斷也凡此數者姑亦言其大約至若人之大數則猶有先天后天之體用而興亡之應變則來培來覆亦莫匪人之自為耳何謂先天如內經曰人生十歲血氣始通其氣在下故好走二十氣血方盛肌肉方長故好趨三十五臟大定血脈盛滿故好步四十臟腑經脈其盛已定腠理始疏故好坐五十肝氣衰故目不明六十心氣衰故好臥七十脾氣衰八十肺氣虛故言善誤九十腎氣竭百歲五臟六腑皆虛神氣皆去故形骸獨居而終矣此即先天之常度是即所謂天年也天畀之常人人有之其奈今時之人自有知覺以來恃其少壯何所不為人生之常度有限而情欲無窮精氣之生息有限而耗損無窮因致戕此先天而得全我之常度者百中果見其幾殘損有因惟人自作是即所謂後天也然而所喪由人而挽回之道有不仍由人者乎且此非逆天以強求亦不過復吾之固有得之則國運人運皆可中興不有明哲誠難語此失之則落花流水逝而罔覺一衰即已良可寒心所以易重來復正為此也然求復之道其道何居蓋在天在人總在元氣但使元氣無傷何虞衰敗元氣既損貴在復之而已常見今人之病亦惟元氣有傷而後邪氣得以犯之故曰邪之所湊其氣必虛此客主相持之理從可知矣凡虛邪之辨如情志之消索神主於心也治節之不行氣主於肺也筋力之疲睏血主於肝也精髓之耗減骨主於腎也四肢之軟弱肌肉主於脾也損其一淺猶膚腠也損其二深猶經絡也損其三四則連及臟腑矣當其微也使不知徙薪牖戶則將為江河將尋斧柯恐無及於事矣故人於中年左右當大為修理一番則再振根基尚餘強半敢云心得歷驗已多是固然矣然而修理之說亦豈易言修國家良臣不易修身命良醫亦難第觀從古至今數千年來凡得醫之全量者為誰而今則曰此醫也彼亦醫也又何良醫之多也醫難言矣其毋為良醫之所惑逆數論二十予嘗讀易而聞諸夫子曰數往者順知來者逆是故易逆數也由是默會其理而知天人之道得以無窮無息者無非賴此逆數耳何也蓋自太極初分兩儀以判一動一靜陰陽見矣陰陽之體為乾坤陰陽之用為水火乾坤定對待之交易故一在上而一在下水火蕩流行之變易故一主降而一主升夫如是斯得循環無已總之而為天道散之而為人道而大易之義所以無微不在也姑無論其他而但以性理明之則總由變易之數夫變易之數即升降之數也變易之所以無窮者降以升為主是即所謂逆數也若無此逆則有降無升流而不返而大道如環何所賴乎由是逆順交變則陽與陰對熱與寒對升與降對長與消對進與退對成與敗對勤與惰對勞與逸對善與惡對生與死對凡此一逆一順其變無窮惟從逆者從陽得生從順者從陰得死君如不信第詳考伏羲卦氣之圓圖其義昭然可見也觀其陽盛之極自夏至一陰初姤由五六七八歷巽坎艮坤天道從西右行則陽氣日降萬物日消者此皆順數也順則氣去即從陰得死之道也幸而陰剝之極自冬至一陽得復由四三二一歷震離兌乾天道從東左旋則陽氣日升萬物日盛者此皆逆數也逆則氣來即從陽得生之道也此天道之徵固如是也若以人道言之則人道本乎天道天心即是人心第天有陰霾能蒙日月人有愚昧能勝聰明故每多從順者喜其易也喜其逸也每多避逆者畏其難也畏其勞也彼大人之見則不然如尊貴莫若帝王可以逸矣可以縱矣而堯舜之惟微惟危顧何必諄諄乎在唸智慧莫若聖人可無勞矣可無畏矣而孔子之戒慎恐懼又何必卷卷乎在心此無他惟其代天功主人極總知夫順不可從從順則流逆不可舍舍逆則退也由此觀之乃知士而舍逆則有屈而無伸農而舍逆則有種而無獲工而舍逆則有粗而無精商而舍逆則有散而無聚再由此而推廣之則凡曰修身齊家凡曰治國平天下進一步則日以就成退一步則日以就敗有源有流其可任其長逝而不思砥柱之良圖乎此人道之攸系又如是矣然言天言人總言乎生道也而保生之道莫先於醫醫欲保生其堪違陽道乎其堪倍逆數乎然醫貴圓通安容執滯非曰盡不從陰也從陰正以衛陽也非曰盡不用順也用順亦以成逆也性命玄關此為第一獨念有醫名丕著之輩猶然昧此而妄言左道留傳至今因致傷生遺害非淺者謂非軒岐之魔不可也嗟嗟有心哉其誰乎苟得其人可與談還悟道矣儻亦以吾言為然不反佐論二十一用藥處方有反佐之道者此軒岐之法旨治病之微權有不可不明者奈何後世醫家每多假借以亂經常不惟悖理於前抑且遺害於後是不可不辨也觀內經之論治曰奇之不去則偶之偶之不去則反佐以取之所謂寒熱溫涼反從其病也此其義蓋言病有微甚亦有真假先從奇偶以正治正治不愈然後用反佐以取之此不得不然而然也又經曰微者逆之甚者從之又曰逆者正治從者反治此謂以寒治熱以熱治寒逆其病者謂之正治以寒治寒以熱治熱從其病者謂之反治如以熱治寒而寒拒熱則反佐以寒而入之以寒治熱而熱拒寒則反佐以熱而入之是皆反佐之義亦不得不然而然也又經曰熱因寒用寒因熱用王太僕注曰熱因寒用者如大寒內結當治以熱然寒甚格熱熱不得前則以熱藥冷服下嗌之後冷體既消熱性便發情且不違而致大益此熱因寒用之法也寒因熱用者如大熱在中以寒攻治則不入以熱攻治則病增乃以寒藥熱服入腹之後熱氣既消寒性遂行情且協和而病以減此寒因熱用之法也凡此數者皆內經反佐之義此外如仲景治少陰之利初用白通湯正治也繼因有煩而用白通加豬膽汁湯反佐也其治霍亂吐痢脈微欲絕者初用四逆湯正治也繼因汗出小煩而用通脈四逆加豬膽汁湯反佐也又如薛立齋治韓州同之勞熱余嘗治王蓬雀之喉痹皆其法也若今諸家之所謂反佐者則不然姑即時尚者道其一二以見之如近代之所宗所法者謂非丹溪之書乎觀丹溪之治吞酸證必以炒黃連為君而以吳茱萸佐之其治心腹痛證謂宜倍加山梔子而以炒乾姜佐之凡此之類余不解也夫既謂其熱寒之可也而何以復用乾薑茱萸既謂其寒熱之可也而何以復用黃連梔子使其病輕而藉以行散即或見效豈曰盡無使其病重人則但見何以日甚而不知犯寒犯熱自相矛盾一左一右動皆掣肘能無誤乎矧作用如此則其效與不效必其莫知所因而宜熱宜寒亦必從違奚辨此其見有不真故持兩可最是醫家大病所當自反而切戒者也或曰以熱導寒以寒導熱此正得內經反佐之法人服其善子言其非何其左也余曰此法最微此用最妙子亦願聞其詳乎當為再悉之夫反佐之法即病治之權也儒者有經權醫者亦有經權經者日用之常經用經者理之正也權者制宜之權變用權者事之暫也此經權之用各有所宜誠於理勢有不得不然而難容假借者也藥中反佐之法其亦用權之道必於正經之外方有權宜亦因不得不然而但宜於暫耳豈果隨病處方即宜用乎然則何者宜反何者不宜反蓋正治不效者宜反也病能格藥者宜反也火極似水者宜反也寒極反熱者宜反也真以應真假以應假正反之道妙用有如此也設無格拒假證自當正治何以反為不當權而用權則悖理反常不當反而佐反則致邪失正是烏可以混用耶常觀軒岐之反佐為創經權之道也後世之反佐徒開雜亂之門也至其變也則涇渭不分者以之模糊疑似者以之寒熱並用者以之攻補兼施者以之甚至廣絡妄投十寒一暴無所不謬皆相藉口此而不辨醫乎難矣於戲斯道失真其來已久安得願聞精一者與談求本之道哉是不能無望於後人也因筆識其愚昧以上仲景治法載傷寒論薛立齋治韓州同按在虛損門余治王蓬雀按在喉痹門升陽散火辨二十二凡治火之法有曰升陽散火者有曰滋陰降火者夫火一也而曰升曰降皆堪治火然升則從陽降則從陰而升降混用能無悖乎抑何者宜升何者宜降而用有辨乎此千古之疑竇亦千古之兩端而未聞有達之者夫火之為病有發於陰者有發於陽者發於陰者火自內生者也發於陽者火自外致者也自內生者為五內之火宜清宜降者也自外致者為風熱之火宜散宜升者也今人凡見火證無分表裡必曰木火同氣動輒稱為風熱多用升陽散火之法嗚呼此似近理孰得非之而不知至理所在無容混也夫風熱之義其說有二有因風而生熱者有因熱而生風者因風生熱者以風寒外閉而火鬱於中此外感陽分之火風為本而火為標也因熱生風者以熱極傷陰而火達於外此內傷陰分之火火為本而風為標也經曰治病必求其本可見外感之火當先治風風散而火自息宜升散不宜清降內生之火當先治火火滅而風自清宜清降不宜升散若反而為之則外感之邪得清降而閉固愈甚內生之火得升散而燔燎何當此其內因外因自有脈證可詳辨也余閱方書所見頭目口齒咽喉臟腑陰火等證悉云風熱多以升降並用從逆兼施獨不慮升者礙降降者礙升乎從者忌逆逆者忌從乎經曰高者抑之下者舉之寒者熱之熱者寒之又曰病生於內者先治其陰後治其陽反者益甚病生於陽者先治其外後治其內反者益甚此自不易之正理故余之立方處治宜抑者則直從乎降宜舉者則直從乎升所以見效速而絕無耽延之患亦不過見之真而取之捷耳若今人之輕病致重重病致危而經年累月日深日甚以致不救者謂非兩端之誤之也乎明者於此最當辨也夏月伏陰續論二十三夏月伏陰在內此本天地間陰陽消長之正理顧丹溪特為此論而反乖其義因以致疑於人其謂何也觀其所論曰人與天地同一橐籥子月一陽生陽初動也寅月三陽生陽初出於地也此氣之升也巳月六陽生陽盡出於上矣此氣之浮也人之腹屬地氣於此時浮於肌表散於皮毛腹中虛矣世言夏月伏陰在內此陰字有虛之義若作陰涼看其誤甚矣且其時陽浮地上燔灼焚燎流金爍石何陰冷之有若於夏月火令之時妄投溫熱寧免實實虛虛之患乎此丹溪之言虛是固然矣若以陰冷二字為誤而夏月禁用溫熱此則余所不服也何以見之夫天地之道惟此陰陽陰陽之變惟此消長故一來則一往一升則一降而造化之機正互藏為用者也經曰陰主寒陽主熱又曰氣實者熱也氣虛者寒也此本陰陽之常性也今既云夏月之陽盡浮於外則陰伏於內矣陰盛則陽衰也非寒而何陽浮於外則氣虛於中矣氣虛即陽虛也非寒而何此固不易之理也然而尤有顯然者則在井泉之水當三冬之寒冽而井泉則溫盛夏之炎蒸而泉源則冷此非外寒內熱外熱內寒之明驗乎此又歲歲皆然主氣之常候也至若主氣之外又有客氣而天以五周地以六備寒暄遞遷氣更應異如伏明之紀寒清數舉卑監之紀風寒並興堅成之紀陽氣隨陰治化流衍之紀寒司物化天地嚴凝太陽司天寒氣下臨寒清時舉太陰司天地乃藏陰大寒且至等義是無論冬夏皆有非時之氣以動為民病者也又豈因夏月之火令遂可謂之無寒而禁用溫熱乎且伏陰之義本以陰陽對待寒熱為言若但以陰字為虛則夏月伏陰宜多虛證冬月伏陽即無虛矣豈其然乎又若夏月宜禁溫熱則冬月宜禁寒涼無待言也今見四時之病盛夏每多吐瀉深冬偏見瘡疹諸如此類豈非冬多內熱夏多中寒乎總之夏有熱證亦有寒證冬有實證亦有虛證雖從時從證貴乎因病制宜然夏月伏陰之義此實天人之同氣疾病之玄機有必不可不察而忽之者也今若丹溪之論則於理反悖而何切於用即無此論亦何不可近見徐東皋亦述丹溪之說云夏月無寒世人不察而用溫熱為世通弊若謂夏月伏陰宜服溫熱則冬月伏夏宜服寒涼然則孟子冬日飲湯夏日飲水亦不足信歟噫此公都子之言也不過借喻內外原非用析陰陽而徐氏曲引為證獨不思經文易義儻相背乎內經曰陰中有陽陽中有陰曰寒極生熱熱極生寒曰重陰必陽重陽必陰曰相火之下水氣承之君火之下陰精承之曰此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也又如周易之兩儀有陰必有陽也兩儀而四象陰陽之中復有陰陽也在泰之義則曰內陽而外陰君子道長小人道消也在否之義則曰內陰而外陽小人道長君子道消也由此觀之則丹溪之論東皋之引證皆吾之所不信也故復為此續論陽不足再辨二十四原天地陰陽之化生實生民性命之根本善把握補救之妙用誠吾道代天之大權使我於此而見理不真則加冰用湯反成戕賊害有不可勝言者予自初年嘗讀朱丹溪陽有餘陰不足論未嘗不服其高見自吾漸立以來則疑信相半矣又自不惑以來則始知其大謬矣故予於類經求正錄中附有大寶論一篇正所以救其謬也然常恐見淺言偏遺殃後世每懷疑懼而望正高明者久矣不意付梓數載斧削無聞見信明賢庶竊自慰茲於丙子之夏始得神交一友傳訓數言詢其姓氏知為三吳之李氏也誦其指南則曰陽常有餘陰常不足此自丹溪之確論而茲張子乃反謂陽常不足陰常有餘何至相反若此而自是其是豈矯強以自衒歟抑別有所本歟姑無勞口吻以辨其孰是孰非第以人事證之則是非立見矣如人自有生以來男必十六而精始通女必十四而經始至及其衰也男精竭於八八女血淨於七七凡精血既去而人猶賴以不死者惟此氣耳夫氣為陽精血陰也精血之來既遲在氣後精血之去又早在氣先可見精已無而氣猶在此非陰常不足陽常有餘之明驗乎以是知先賢之金石本非謬而後學之輕妄何容易也予聞此說益增悲嘆悲之者悲此言之易動人聽而無不擊節稱善也紫可亂朱莫此為甚使不辨明將令人長夢不醒而性命所繫非渺小是可悲也悲已而喜喜之者喜至道之精微不經駁正終不昭明幸因其說得啟此端而得解此惑是可喜也今即李子之言以辨之如其以精為陰以氣為陽本非誣也第其所覷在眉睫則未免錯認面目而呼張作李矣不知精即水也水即陽也若以水火言則水誠陰也火誠陽也若以化生言則萬物之生其初皆水先天后天皆本於是而水即陽之化也何以見之如水在五行則生於一天水在六氣則屬乎太陽此水之為陰否又若精在人身精盛則陽強精衰則陽痿此精之為陰否再若養生家所重者惟曰純陽純陽之陽以精言也精若滲漏何陽之有此又精之為陰否又丹書云分陽未盡則不死分陰未盡則不仙亦言仙必純陽也若據李子之說則但盡泄其精便成純陽學仙之法豈不易乎誠可哂也蓋李子之見但見陰陽之一竅未見陰陽之全體夫陰陽之道以綱言之則位育天地以目言之則縷析秋毫至大至小無往而非其化也若以清濁對待言則氣為陽精為陰此亦陰陽之一目也若以死生聚散言則凡精血之生皆為陽氣得陽則生失陽則死此實性命之化源陰陽之大綱也人之生也譬諸草木草木之初其生苗也繼而生枝葉再而生花實及其衰也花實落而枝葉存以漸而凋也此草木之盛衰有時故曰生長化收藏而候有不同也人之生也亦猶是耳初而生嬰孩繼而生精血再而生子女及其衰也精血去而形猶存以漸而終也此人生之盛衰亦有其時故曰生長壯老已而年有不同也然則自幼至老凡在生者無非生氣為之主而一生之生氣何莫非陽氣為之主而但有初中之異耳若以人之精至為陰至豈花果之成亦草木之陰至耶而枝葉未凋即草木之陽在耶且陽氣在人即人人百歲亦不過得分內之天年而今見百人之中凡盡天年而終者果得其幾此其夭而不及者皆非生氣之不及耶而何以見陽之有餘也陽強則壽陽衰則夭又何以見陽之有餘也難得而易失者惟此陽氣既失而難復者亦惟此陽氣又何以見陽之有餘也觀天年篇曰人生百歲五臟皆虛神氣皆去形骸獨居而終矣夫形陰也神氣陽也神氣去而形猶存此正陽常不足之結局也而可謂陽常有餘乎至若精氣之陰陽有可分言者有不可分言者可分者如前云清濁對待之謂也不可分者如修煉家以精氣神為三寶蓋先天之氣由神以化氣化精後天之氣由精以化氣化神是三者之化生互以為根本同一氣此所以為不可分也故有善治精者能使精中生氣善治氣者能使氣中生精此自有可分不可分之妙用也再若寒熱之陰陽則不可不分蓋寒性如冰熱性如炭冰炭不謀奚堪妄用予故曰精氣之陰陽有不可離寒熱之陰陽有不可混此醫家最切之法言也且精血之陰陽言稟賦之元氣也寒熱之陰陽言病治之藥餌也今欲以不足之元陽認作有餘而云火則相習以苦寒之劣物用為補劑以滋陰嗟嗟牛山有限之生氣果能堪此無窮之陰剝否啞子吃黃連無容伸訴者四百年於茲矣夫以有望之丹溪言且若此而矧其他乎古人云非聖之書不可讀此其尤甚者也然天地陰陽之道本自和平一有不平則災害至矣而余謂陽常不足豈亦非一偏之見乎蓋以丹溪補陰之說謬故不得不為此反言以救萬世之生氣夫人之所重者惟此有生而何以能生惟此陽氣無陽則無生矣然則欲有生者可不以此陽氣為寶即日慮其虧亦非過也而余謂陽常不足者蓋亦惜春之杞人耳苟誠見下仍望明賢再駁小兒補腎論二十五觀王節齊曰小兒無補腎法蓋小兒稟父精而生男至十六而腎始充滿既滿之後妄用虧損則可用藥補之若受胎之時稟之不足則無可補稟之原足又何待於補耶嗚呼此言之謬謬亦甚矣夫二五之精妙合而凝精合而形始成此形即精也精即形也治精即所以治形治形即所以治精也第時有初中則精有衰盛故小兒於初生之時形體雖成而精氣未裕所以女必十四男必十六而後天癸至天癸既至精之將盛也天癸未至精之未盛也茲以其未盛而遽謂其無精也可乎且精以至陰之液本於十二臟之生化不過藏之於腎原非獨出於腎也觀上古天真論曰腎者主水受五臟六腑之精而藏之此精之所源其不止於腎也可知矣王節齋止知在腎而不知在五臟若謂腎精未泄不必補腎則五臟之精其有稟賦之虧人事之傷者豈因其未泄而總皆不必補耶夫小兒之精氣未盛後天之陰不足也父母之多欲水虧先天之陰不足也陰虛不知治本又何藉於人為以調其元贊其化乎此本原之理有當深察者如此再以小兒之病氣論之凡小兒之病最多者惟驚風之屬而驚風之作則必見反張戴眼斜視抽搐等證此其為故總由筋急而然蓋血不養筋所以筋急真陰虧損所以血虛此非水衰之明驗乎夫腎主五液而謂血不屬腎吾不信也肝腎之病同一治今筋病如此而欲舍腎水以滋肝木吾亦不信也且太陽少陰相為表裡其經行於脊背而為目之上網今以反折戴眼之證偏多見於小兒而謂非水臟陰虛之病吾更不信也矧以陽邪亢極陰竭則危臟氣受傷腎窮則死此天根生息之基尤於小兒為最切然則小兒之病其所關於腎氣者非眇而顧可謂小兒無補腎法耶決不信決不信
