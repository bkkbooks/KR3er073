body:
  text: 全書紀略先外祖張景嶽公名介賓字會卿先世居四川綿竹縣明初以軍功世授紹興衛指揮卜室郡城會稽之東生穎異讀書不屑章句韜鈐軒岐之學尤所淹貫壯歲遊燕冀間從戎幕府出榆關履碣石經鳳城渡鴨緑居數年無所就親益老家益貧翻然而歸功名壯志消磨殆盡盡棄所學而肆力於軒岐探隱研神醫日進名日彰時人比之仲景東垣云苦志編輯內經窮年縷析匯成類經若干卷問世世奉為金匱玉函者久矣全書者博採前人之精義考驗心得之玄微以自成一家之書首傳忠録統論陰陽六氣先賢可否凡三卷次脈神章擇諸家珍要精髓以測病情凡二卷著傷寒為典雜症為謨婦人為規小兒為則痘疹為詮外科為鈐凡四十卷採藥味三百種人參附子熟地大黃為藥中四維更推參地為良相黃附為良將凡二卷創藥方分八陳曰補曰和曰寒曰熱曰固曰因曰攻曰散名新方八陳凡四十卷集古方分八陳名古方八陳凡八卷別輯婦人小兒痘疹外科方總皆出入古方八陳以神其用凡四卷共六十四卷名景嶽全書是書也繼往開來功豈小補哉以兵法部署方略者古人用藥如用兵也或云公生平善韜鈐不得遂其幼學壯行之志而寓意於醫以發泄其五花八門之奇余曰此蓋有天焉特老其才救世而接醫統之精傳造物之意夫豈其微歟是編成於晚年力不能梓授先君先君復授日蔚余何人斯而能繼先人之遺志哉歲庚辰攜走粵東告方伯魯公公曰此濟世慈航也天下之寶當與天下共之捐俸付剞劂閲數月工竣不肖得慰籍先人以慰先外祖於九原先外祖可不朽矣外孫林日蔚跋
