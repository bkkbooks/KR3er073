front:
  text: 賈序人情莫不欲壽恆諱疾而忌醫孰知延壽之方匪藥石不為功得病之由多半服食不審致庸醫之誤人曰藥之不如其勿藥是由因噎廢食也原夫天地生物以好生為心草木金石飛潛溲渤之類皆可已病聽其人之自取古之聖人又以天地之心為己心著為素問難經定為君臣佐使方旨待其人善用之用之善出為良醫藥石方旨惟吾所使壽夭榮謝之數自我操之如執左券皆稽古之力也庸醫反是執古方泥古法罔然不知病所自起為表為里為虛為實一旦殺人不知自反反歸咎於食忌洗其恥於方冊此不善學者之過也故曰肱三折而成良醫言有所試也不三世不服其藥言有所受之也假試之知而不行受之傳而不習己先病矣己之不暇何暇於已人之病是無怪乎忌醫者之紛紛也越人張景嶽豪傑士也先世以軍功起家食祿千戶結髮讀書不呫呫章句初學萬人敵得魚腹八陳不傳之祕仗策遊俠往來燕冀間慨然有封狼胥勒燕然之想榆林碣石鳳城鴨江足跡幾遍投筆棄繻絶塞失其天險談兵說劍壯士遜其顏色所遇數奇未嘗浼首求合也由是落落難偶浩然歸里肆力於軒岐之學以養其親遇有危證世醫拱手得其一匕矍然起矣常出其平生之技著為醫學全書凡六十有四卷語其徒曰醫之用藥猶用兵也治病如治寇攘知寇所在精兵攻之兵不血刃矣故所著書倣佛八陳遺意古方經也新方權也經權互用天下無難事矣書既成限於資未及流傳而歿遺草屬諸外孫林君日蔚蔚載與南遊初見賞於方伯魯公捐資付梓板成北去得其書者視為肘後之珍世罕見之豫生平頗好稽古猶專意於養生家言是書誠養生之祕笈也惜其流傳不廣出俸翻刻公諸宇內善讀其書者庶免庸醫誤人之咎諱疾忌醫者毋因噎而廢食也可時康熙五十年歲次辛卯孟春兩廣運使瀛海賈棠題於羊城官舍之退思堂範序我皇上御極五十年惠政頻施仁風洋溢民盡雍熙物無夭札固無藉於靈樞素問之書而後臻斯世於壽域也雖然先文正公有言不為良相當為良醫乃知有聖君不可無良相而良醫之權又與良相等醫之一道又豈可忽乎哉自軒轅岐伯而下代有奇人惟長沙張仲景為最著厥後或劉或李或朱並能以良醫名然其得力處不能不各循一己之見猶儒者尊陸尊朱異同之論紛紛莫一越人張景嶽蓋醫而良者也天分既高師古復細是能融會乎百家而貫通乎諸子者名其書曰全其自負亦可知矣他不具論觀其逆數一篇逆者得陽順者得陰降以升為主此開陰陽之祕蓋醫而仙者也世有以仙為醫而尚不得謂之良哉而或者曰醫生道也兵殺機也醫以陳名毋乃不倫乎不知元氣盛而外邪不能攻亦由壁壘固而侵劫不能犯也況兵之虛實成敗其機在於俄頃而醫之寒熱攻補其差不容於毫髮孰謂醫與兵之不相通哉若將不得人是以兵與敵也醫不得人是以人試藥也此又景嶽以陳名篇之微意也是書為謙庵魯方伯任粵時所刻紙貴五都求者不易轉運使賈君明於順逆之道精於升降之理濟世情殷重登梨棗豫於庚寅孟冬奉天子命帶星就道未獲觀其告竣閲兩月賈君以札見示景嶽全書重刻已成命豫作序余雖不敏然以先文正公良醫良相之意廣之安知昔日之張君足為良醫而異日之賈君不為良相以佐我皇上萬壽無疆之歷服耶故為數語以辨卷首閩浙制使瀋陽範時崇撰查序天地之道不過曰陰與陽二氣之相宣而萬物於以發育人固一物耳皆秉是氣以生賦以成形不能無所疵癘而況物情之相感物欲之相攻此疾疚之所由興往往至於夭札而莫之拯有古聖人者起為斯民憂調健順之所宜酌剛柔之所濟分疏暑寒燥濕之治理而著之為經至今讀靈樞素問諸篇未嘗不嘆聖人之衛民生者遠也及覽漢史方技傳若倉公扁鵲之流多傳其治疾之神奇而其方不著洎仲景立齊丹溪東垣輩出多采其精微勒為成書以嬗後世及諸家踵接各祖所傳同途異趨且致抵牾即有高識之士覽之茫無津涯欲求其會歸卒未易得也越人張景嶽者少負經世才晚專於醫能決諸家之旨要乃著集六十有四卷以集斯道之大成其甥林汝暉攜之至嶺外為魯謙庵方伯所賞識始為之梓行凡言醫之家莫不奉為法守後其板浸失賈青南都運復刊之尋挾以北歸其行未廣余族子禮南客粵以其才鳴於時而尚義強仁有古烈士之概慨是書之不廣暨也毅然倡其同志諸君醵金以授梓人鋟板摹發會余奉命典試事竟禮南從余遊出其書視余請為辨首余讀其集分八陳陳列諸科科次以方方徵諸治其義簡其法該其功用正而神是為百氏之正軌而其究盈虛之理數析順逆之經權則又與大易相參而陰陽之道備是矣學者苟得其體用隨宜而措施則足以利濟群黎可無夭札之患且今聖天子方臻仁壽保合太和至澤之涵濡使天下咸登壽域更得是書而廣其術行之四方其於天地生物之心聖人仁民之化贊襄補益厥用良多而禮南諸君樂善之功亦將與是集共傳不朽癸巳科廣東典試正主考翰林院編修查嗣瑮撰魯序人身一小天地也天地之氣不越陰陽陰陽和而後覆載得其清寧淵嶽得其渟峙以至草木鳥獸咸若易有之山澤通氣水火不相射是謂陰陽和之之謂也所以易與天地准故能彌綸天地之道向余亦謂醫與易准故能神明闔闢之原人之一身五臟六腑四肢百骸備矣非氣不生非血不行氣血者陰陽之屬也而醫則陰中求陽陽中求陰循環無已從逆得順從消得長從虛得盈分先後之天審燥濕之宜察剛柔之用二氣之說明則表裡虛實無不洞然於中斯酌古可以劑今所謂神而明之存乎其人善易者未有不善醫者也夫榮衛調而後經絡順陰陽錯而後疾病生軒岐具挽回造化之神功而靈樞素問一書猶日月經天江河行地後之人雖窮幽極渺尚恐理解未明用違其術唯仲景張氏立齊薛氏丹溪朱氏東垣李氏諸君朗悟通神能窺其奧皆有著述為醫家指南以名于越人淳于之後而醫宗醫録醫統拔萃寶鏡諸篇亦足以羽翼內經者猶之六經而外諸子百家不可廢也但浩博泛濫童年習之皓首而不得其源倘能採掇精華不支不漏燦若雲漢明若列星俾人披其集而漱滌五臟練精易形有所宗旨斯亦窺易簡之奧而具參贊之功者矣吾郡張會卿先生名介賓自號通一子於書無所不窺壯年好談兵擊劍思有所用於世筮易得天山之遁遂決意石隱避世壺中精軒岐之道而於生死疑難之際審呼吸於毫芒辨浮沉於影響君臣佐使無不析其源流問切望聞無不窮其窔奧匯成景嶽全書一集列為八陳中為九宮前分門後方劑去陳言之糟粕闡前哲之心思合者參之疑者剖之略者補之誠度世之津梁衛生之丹訣也是書膾炙海內已久余以不得一見為悵適林汝暉侄倩攜之來粵如獲拱璧因謂兒輩曰茲編宏濟之仁不在良相下豈一身一家之所敢私哉特付剞劂以公諸世庶不沒作者之苦心而同於長桑禁方之授也夫會稽魯超序
