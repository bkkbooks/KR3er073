知此方或蟲尤所傷溶化熱塗患處更以熱酒調末服皆效五福化毒丹七六治咽喉牙口瘡毒腫痛並小兒一切熱毒瘡癤驚惕煩躁口舌生瘡夜臥不寧等證玄參桔梗各二兩半茯苓三兩半人參牙硝青黛各一兩甘草七錢半麝香少許金箔二十片上為末煉蜜丸芡實大每服一丸薄荷湯化下若痘毒上攻口齒生瘡以生地黃汁化服及用雞翎掃敷患處奪命丹七七治疔瘡發背等證或麻木或嘔吐重者昏憒此藥服之不起者即起不痛者即痛痛甚者即止昏憒者即蘇嘔吐者即解未成者即消已成者即潰有奪命之功乃惡證中之至寶也蟾酥酒化輕粉麝香各五分枯礬寒水石煅銅緑乳香沒藥各一錢硃砂三錢蝸牛二十個另研無亦可上為末用蝸牛或酒糊搗丸緑豆大每服二三丸溫酒蔥湯下或用蔥白三四寸病者自嚼爛吐於手心包藥在內用熱酒和蔥送下如人行五七里汗出為效重者再服一二丸或外用一丸入瘡孔內以膏藥貼之飛龍奪命丹七八治一切疔瘡毒瘡出汗則愈神效乾蟾酥二錢乳化沒藥硼砂寒水石煅雄黃各三錢乳香硃砂血竭嚼成餅者真枯礬各一錢輕粉冰片各五分蜈蚣一條去頭酒浸焙乾蝸牛四十九個研為膏或無亦可上各研為細末取蝸牛蟾酥研勻入諸末熟杵丸緑豆大硃砂為衣每服四五丸嚼蔥白一口吐在手心將藥包蔥內用溫酒吞下須臾汗出或少吐瀉毒即解立齊曰前回生丹乃慓悍攻毒之劑也蓋無經不至無氣不動者後奪命丹尚緩若食一切禽畜毒物及瘡脈浮緊細數毒蓄在內並惡毒證凡宜汗吐者當用前丹有神效若老弱之人或瘡毒稍輕者宜用後丹或更以隔蒜灸之為良回生丹七九李頤顏先生口授非泛常之藥萬寶之祕專治一切疔毒並有神效金腳信明硇砂明乳香半夏上紅丹各五分巴豆肉不去油明雄黃大南星南硼砂各一錢大斑蝥十五個去頭足翅上為細末旋取蟾酥和丸麻子大硃砂為衣每服十五丸好酒下看瘡生上下食前後服能飲者至醉為佳凡腫毒失治毒氣入腹用此藥能起死回生服藥後吐瀉俱作乃蘇通氣散八十治時毒腫甚咽喉不利取嚏以泄其毒玄參一錢半牙皂川芎各一錢藜蘆五分一方無此羊躑躅花二錢半上為末用紙捻蘸少許入鼻內取嚏為度按此方止用皂角川芎北細辛三味即可亦不必藜蘆躑躅之毒品也總不若通關散為妙方在因陳九十八梔子仁湯八一方在寒陳十九治發熱狂躁咽喉腫痛六味梔子仁湯八二治時毒腫痛大便祕結脈沉數山梔炒枳殼大黃煨升麻牛蒡子炒鬱金等分上水煎服或為細末每服三錢蜜水調下清肝益營湯八三治肝膽小腸經風熱血燥筋攣結核或耳項胸乳脅肋作痛並一切肝火之證山梔當歸木瓜不犯鐵茯苓各一錢柴胡芍藥炒川芎各七分龍膽草八分白朮二錢熟地一錢半炙甘草五分上薑水煎服清心湯八四治瘡瘍腫痛發熱飲冷脈沉實睡語不寧上方即防風通聖散每料加黃連五錢每劑用一兩水煎服方在攻陳十六濟陰湯八五治瘍毒純陽腫痛發熱連翹二錢山梔炒黃芩炒黃連炒甘草各一錢芍藥一錢半牡丹皮一錢二分金銀花三錢水煎服大便若祕量加大黃地骨皮散八六治瘡瘍氣虛內熱煩渴不寧人參黃耆生地黃地骨皮柴胡各一錢半白茯苓石膏煅知母各一錢水薑煎服一味苦參丸八七治一切癰疽毒瘡焮腫作痛或煩躁苦參不拘多少為末上用水糊丸桐子大每服二三錢溫酒下陳氏苦參丸八八治遍身瘙癢癬疥瘡瘍苦參四兩玄參黃連大黃獨活枳殼防風各二兩黃芩梔子菊花各一兩上為末煉蜜丸桐子大食後茶酒任下三四十丸日三服五利大黃湯八九治時毒焮腫赤痛煩渴便祕脈實而數大黃煨黃芩升麻各二錢芒硝梔子各一錢半水一鍾半煎六分空心熱服清涼飲九十治癰瘍熱毒熾盛大便祕結此即前連翹消毒散連翹一兩大黃山梔子薄葉黃芩各五錢甘草一兩半朴硝二錢半上每服一兩水煎服宣毒散九一治一切癰毒其功不可盡述大黃煨白芷各五錢水二鍾煎一鍾食前服立齊曰此方乃宣通攻毒之劑若脈沉實便祕者毒在臟也宜服之其功甚大若臟腑調和脈不實者不可用醫林集要方用大黃一斤白芷六兩為末每服三錢熱酒調下更用茶清調搽患處名曰萬金散蓋因其功而珍之也或用水跌為丸以便於服亦可吳江申僉憲兄患背疽堅硬脈沉實乃毒在內用一服大小便下汙物再服而消恐患者忽此二藥故以此嘗驗者告之拔毒散九二治一切癰疽腫毒其功不可盡述乳香沒藥當歸穿山甲炮木鱉子連翹各一錢甘草炙五分栝蔞仁八分牙皂炒貝母各七分忍冬藤二錢大黃生熟各一錢半上水酒各一鍾煎一鍾食前服此方攻毒止痛化膿之良劑也屢用屢驗若膿成或已潰者大黃可不用恐泄其真氣則膿者難潰潰者難斂也亦有膿雖潰脈仍洪數或沉實喜冷者火邪尚在又所宜用內疏黃連湯九三治瘡瘍發熱而嘔大便祕結脈洪而實黃連芍藥當歸檳榔木香黃芩梔子薄荷桔梗甘草各一錢連翹大黃各一錢半薑水煎仍量虛實治之桃仁湯九四逐瘀血桃仁蘇木各一兩生地黃五錢虻蟲去足翅炒水蛭炒各三十個上每服三錢水一盞煎六分空心服漏蘆湯九五治腦疽癰疽毒盛實者漏蘆黃耆甘草連翹沉香各五錢大黃一兩微炒上每服四五錢薑棗水煎服千金漏蘆湯九六治癰疽發背丹疹時行熱毒赤腫焮痛漏蘆黃芩白蘞連翹枳殼麩炒升麻粉草麻黃去節大黃濕紙裹煨朴硝各一兩上每服五六錢薑水煎去柤空心服下惡物為妙漏蘆升麻湯九七治時毒頭面紅腫咽嗌堵塞水藥不下若臟腑素有積熱發為腫毒疙瘩一切紅腫惡毒漏蘆二錢升麻一錢半黃芩酒洗生甘草玄參牛蒡子炒研苦梗連翹各一錢藍葉如無用青黛大黃酒浸量輕重用之水煎服大利之結者加芒硝潤腸丸九八治脾胃伏火大腸乾燥或風熱血結宜用此丸通之若結在直腸宜用豬膽汁導之蓋腎主五液開竅於二陰若津液滋潤則大便通調若津液不足脾氣虧損必當培補乃忌此藥桃仁去皮尖麻子仁各一兩羌活歸尾大黃煨皂刺秦艽各五錢上各另研為末煉蜜或豬膽汁丸桐子大每服三四十丸白湯下若用豬膽汁導而糞不結燥者須急補元氣沒藥丸九九善逐滯血當歸一兩桂心芍藥各半兩桃仁去皮尖研沒藥各三錢虻蟲去足翅水蛭炒各三十個上為末醋糊丸桐子大每服三五丸空心醋湯下當歸丸百行血利水通大便當歸半兩大黃桂心各三錢赤芍藥葶藶各二錢人參甘遂麵裹煨半錢煉蜜丸如彈子大空心米飲化下一丸破棺丹百一治瘡瘍熱極汗多大渴便祕譫語發狂大黃二兩半半生半熟芒硝甘草各二兩上為末煉蜜丸彈子大每服一丸童便酒化下白湯亦可忍冬酒百二解諸癰毒忍冬藤鮮者四五兩若干者止用一兩搗大甘草節一兩生用二味入砂鍋內以水二鍾煎至一鍾再入無灰酒一鍾又煎數沸去柤分三服病重者晝夜兩劑至大小便通利為度另用忍冬藤研爛入酒少許罨患處金銀花酒百三治一切癰疽發背疔瘡喉痹等證用金銀花藤葉搗爛取汁半鍾和熱酒半鍾溫服甚者不過三五服可保無虞槐花酒百四治癰瘍熱毒最妙用槐花四五兩炒微黃乘熱入酒二鍾煎十餘滾去柤熱服未成者二三服已成者一二服但察其有熱毒未清者皆可用槐花治濕熱之功最為神速惟胃寒者不宜服大抵腫毒非用蒜炙及槐花酒先去其勢雖用托裡諸藥其效未必甚速蒲公英酒百五治乳癰吹乳不問已成未成皆可用用蒲公英一握搗爛入酒半鍾取酒溫服柤貼患處甚者不過三五服即愈遠志酒百六能托散諸毒治女人乳癰尤效遠志不拘多少用米泔浸洗捶去心上為末每服三錢用好酒一鐘調遲少頃澄清飲之以滓敷患處牛膝酒百七治楊梅風毒腰痛牛膝川芎羌活五加皮杜仲甘草地骨皮薏仁各一兩生地黃十兩海桐皮二兩上㕮咀用帛裹入無灰酒浸二七日夏月三五月每服一杯日三五次消癭酒百八昆布三錢海藻五錢沉香雄黃各一錢研末海螵蛸二錢上為咀用好酒一升湯煮任意每服一二鍾或浸十餘日亦可飲桑枝煎百九大治口渴取嫩桑枝細切一升炒以水三升煎一升日服三五劑更多尤妙抱朴子云療風痹乾燥臂痛腳氣四肢拘攣上氣眩暈久服補肺消食利小便輕身耳目聰明令人光澤其功不能盡述神仙截法百十治癰疽發背一切惡瘡預服則毒氣不入內真麻油一斤銀器內熬十數沸候冷上用酒兩碗入油五盞通口熱服一日用盡緩則數日服之吳安世云吾家三世用之無有不效又聞獵者云凡中藥箭急飲麻油藥毒即消屢用甚驗按上方凡大便祕結而毒蓄於內者最宜用之以疏通其毒若陰毒及大便不實者乃非所宜砭法百十一治丹毒疔瘡紅絲走散或時毒瘀血壅盛用細瓷器擊碎取有鋒鋩者一塊以箸一根劈開頭尖夾之用線縛定兩手指輕撮筋尾令瓷鋩正對患處約懸寸許再另用箸一根頻擊箸頭令毒血遇刺皆出毒自減退若毒氣入腹膨脹者難治刺少商穴百十二治咽喉急痛穴在手大指內側去瓜甲角如韭葉刺入二分許以手自臂勒至刺處出血即消若重而膿成者必須針患處否則難治洪丞相蜞針法百十三凡癰瘍勢焮毒盛血凝不散者宜用此法以殺其勢治癰初作先以筆管一個入大螞蝗一條以管口對瘡頭使蜞吮惡血得去其毒即散如瘡大須換三四條若吮正穴蜞必死矣屢試屢效若血不止以藕節上泥塗之即止若瘡頭未明以井邊泥塗上先干處即是騎竹馬灸法百十四治一切瘡瘍無有不愈其法令病人以手肘憑几而坐男左女右將手臂豎起要直乃用竹篾一條自臂腕中曲處橫紋間量起貼肉直上至中指尖盡處截斷為則不量指甲另用竹扛一條令病人脫衣正身騎定前後用兩人扛起令病者腳不著地仍使人扶定勿令傴僂卻將前量臂篾從竹扛上尾骶骨坐處直貼脊背量至蔑盡處記之此取中之處非灸穴也又用薄篾量男左女右手中指節兩橫絞處截為同身寸法將此寸蔑即安前脊中點記處兩邊各開一寸盡處即是灸穴各灸五七壯疽發於左則灸右疽發於右則灸左兩邊俱甚則左右皆灸蓋此穴乃心脈所過之處凡癰疽皆心火之留滯灸此則心火流通而毒自散矣有起死回生之功屢試屢驗神仙隔蒜灸法百十五治一切癰疽瘡毒大痛或不痛或麻木及治痘疔毒氣熾盛使諸痘不能起發已起發者不能灌膿已灌膿者不能收靨等證如痛者灸至不痛不痛者灸至痛其毒隨火而散此攻散郁毒從治之法也大有回生之功其法用大蒜頭去皮切三分厚按瘡頭上用艾炷於蒜上灸之五壯換蒜復灸或三十壯或一二百壯愈多愈妙未成者即消已成者亦殺其大勢不能為害如瘡大用蒜搗爛攤患處將艾鋪上燒之蒜敗再換或陰毒紫白色不起發不痛不作膿者尤宜多灸仍服托裡之劑如灸後仍不痛或不作膿不起發者不治此氣血虛極也附子餅百十六治潰瘍氣血俱虛不能收斂或風寒襲之以致血氣不能運行皆令不斂用炮附子去皮臍研末以唾津和為餅置瘡口上將艾炷於餅上灸之每日灸數壯但令微熱勿令痛如餅乾再用唾津調和務以瘡口活潤為度豆豉餅百十七治瘡瘍腫毒硬而不潰及潰而不斂並一切頑瘡惡瘡用江西豆豉餅為末唾津和作餅子如錢大厚如三文錢置患處以艾炷於餅上灸之干則再易如灸背瘡用漱口水調餅覆患處以艾鋪餅上灸之如未成者即消已成者亦殺其大毒如有不效必氣血虛敗也木香餅百十八治一切氣滯結腫或痛或閃肭及風寒所傷作痛並效木香五錢生地黃一兩上以木香為末生地黃杵膏和勻量患處大小作餅置腫處以熱尉斗尉之香附餅百十九治瘰癧流注腫塊或風寒襲於經絡結腫或痛用香附為末酒和量瘡毒大小作餅覆患處以熱尉斗尉之未成者內消已成者自潰若風寒濕毒宜用薑汁作餅神效桑枝灸百二十治發背不起或瘀肉不潰此陽氣虛弱用桑枝燃著吹熄其焰用火灸患處片時日三五次以助腫潰若腐肉已去新肉生遲宜灸四畔其陰瘡瘰癧流注臁瘡惡瘡久不愈者亦宜用之大抵此法未潰則解熱毒止疼痛消瘀腫已潰則補陽氣散餘毒生肌肉若陽證腫痛甚或重如負石初起用此法出毒水即內消其日久者用之雖潰亦淺且無苦楚惜患者不知有此治者亦不肯用此也神效蔥尉法一二一治流注結核骨癰鶴膝肢體腫塊或痛或不痛或風寒襲於經鉻流注肢體筋攣骨痛或跌撲損傷止痛散血消腫之良法或先用隔蒜灸法而余腫未消最宜用尉以助氣血而行壅滯其功甚大用蔥頭鈿切杵爛炒熱敷患處冷即易之再或熱尉數次腫痛即止其效如神或用蔥煎湯熏洗傷處亦妙或用蔥一大把束其數節切為薄餅置患處用熱物尉之或鋪艾灸之亦可必易餅多尉為妙神仙熏照方一二二雄黃硃砂血竭真者沒藥各一錢麝二分上五味研細末用棉紙卷為粗捻約長尺許每捻中入藥三分裹定以真麻油潤透點灼瘡上須離瘡半寸許自紅暈外圈周圍徐徐照之以漸將捻收入瘡口上所謂自外而內也更須將捻猛向外提以引毒氣此是手法此藥氣從火頭上出內透瘡中則毒隨氣散自不內侵臟腑初用三條漸加至五七條瘡勢漸消可漸減之熏罷隨用後敷藥廣陵李杜云背瘡所患惟內攻與外潰耳證屬火毒醞釀斯成不能外散勢必內攻不能中出勢必旁潰醫者往往以涼藥圍解多罹此二患又陰瘡不起發者止有隔蒜灸一法然亦未見鑿鑿取效此方初用藥捻熏照以火引火毒氣外散後用藥敷圍追膿止痛毒從孔竅及瘡頂中出可免旁潰矣陰瘡一照即起紅暈狀如蒸餅變為陽證可保無虞此其奇中大略也照法日每一次初次用捻三根或四根次日用四根或五根再次漸至六七根止大率看瘡輕重酌捻多寡重者不過六七日腐肉盡化為膿從瘡口中陸續湧出新肉如石榴子纍纍而生此時不必再照圍藥終始如一隨瘡勢大小漸漸收入照圍後不可聽醫用膏藥貼蓋以致毒氣怫鬱止剖蔥葉量瘡口貼之凡照時先須用豬蹄煎湯澄清洗去圍藥如法熏照待瘡勢大愈肉生將滿始可用生肌散或護以太乙膏平復後膏藥猶不可離此其始末細微也內服者大要不出十宣散護心散等方最忌寒涼恐傷胃氣此瘡由惱怒鬱結厚味所致受病以年計愈久則愈甚也調攝之法非懲忿窒欲清散托裡治以前方即盧扁復生有望而走耳又前方初止治背疽其後一切腫毒無不牧功蓋法無定則醫貴變通神而明之存乎其人耳余不佞善病故留心方術然未經纍驗不輕授人此一方初驗於化南再驗於陳大參景山及範中翰舍初其他證亦曾用以推廣皆應手取效輒贅其詳於此其傳則道人孫氏今大播廣陵余先慈賴以保安者草年云池陽來陽伯云王孝廉良甫為余言廣陵人有善神燈照者療渠發背神良已求得其禁方矣余識之已西歲余客廣陵偶胻腫比於股招所謂善療者照之不膿得愈又館友胡含素患發背大如覆盂神懵懵憒矣延瘍醫至束手待肉腐糜方可用膏徐長肌肉問其術曰至此問其候曰百日果如其說則含素將成烏有矣遂急同弟輩求得前方刻本按法治之一日痛止二三日神清如脫桎梏釋重負肉腫如盂者日縮而小並未嘗腐糜也不月餘膿盡爽然起矣奇矣哉不表而汗不針而潰不灸而陷舉不補而實不下而毒盡凡醫人之針刺不必用也至理歸於易簡大道本在目前所謂不可不思議者也古今道術入妙者皆如此類茲重刻之故為此敘曲梁聶云翰云戊戌春暮余病疽京邸疽據背中前與心對初發微若黍粒搔之痛癢關心寒熱交作甫十日大若升再十日大若鬥食逆便結匝月目不一瞬醫方所載諸死候業已十犯八九兩絶復蘇自分無生手條後事偶從楊楚璞得李肖衡所傳異人指授仙方如法熏敷越二日毒漸解乃有起色不易方而竟就痊距初發浹草旬歸家出以試人經僅逾月重亦不出百日靡不起者蓋余所感毒極重勢極大又治極遲即二三內外科名家皆束手失色以為從所未聞未見及試人則取驗更捷蓋感有輕重治有遲早也顧念非此異方不能起余必死異證非余起死回生不能白此方之神異余以此方活安忍天下人以此證危因慮此方莫獲廣沛於天下又慮天下忽視此方而不加篤信或亂於恥功不已出之醫口疑似轉盼間致誤大事而悔無及也因贅數語以為此方之引咸林王維英云丙午端陽日余左臂患疽其大如拳用騎竹馬法灸之百十壯疱起如銅錢四圍腫覺退筍中蓄此仙方命製藥料欲俟破後熏之不識其初亦可熏也客有備言可熏者因於當日即熏十條瘡頂高收四圍色自夜間毒肉從邊化為稠膿徐徐內潰黏同膠鰾每日如法熏照洗貼五六日中尖毒肉脫落一條共有十三孔瘡外一指許旁串三孔且痛且癢即極力照之初出黃水次出稠膿後流清漿瞬息口牧並未再串其原載敷藥長安中若不産豨蘞五龍二草止用金銀花三色敷之干則覺痛即去之不敷並未用生肌散惟護以太乙膏月餘盡痊當此瘡將愈左臂又患一疽正對無二即照捻十條敷以麩炒醋調文蛤膏一日數更次日五條三日頂破膿出不痛不癢其毒盡散同時有患別瘡者余付此藥熏之隨熏即散並未成形乃知是方也真仙方哉真仙方哉持此療瘡天下無瘡矣余恐世人但知瘡破後可照不識照初發者尤易散又恐因敷藥不全並棄前方不識敷藥不用亦可也故備述終始以神此方之用洗藥神效散一二三洗陰濕諸瘡蛇床子二兩朴硝一兩上每用一兩水一一碗煎數沸洗瘡拭乾摻生肌藥雄黃解毒散一二四治一切癰腫潰爛毒勢甚者先用此藥二三次以後用豬蹄湯雄黃一兩白礬四兩寒水石煅一兩半上俱為末用滾湯二三碗乘熱入藥末一兩洗患處以太乙膏或神異膏貼之豬蹄湯一二五治一切癰疽杖瘡潰爛去惡肉潤瘡口止痛白芷黃芩當歸赤芍藥獨活生甘草露蜂房連子者佳各五錢用豬蹄一隻水四五碗煮熟去油柤取清湯入前藥一兩許煎十數沸去柤溫洗惡肉隨洗而下隨用膏藥貼之按此湯不必用黃芩或以白礬易之更佳集香散一二六洗癰疽潰爛白芷藿香茅香香附防風各三錢木香甘草各錢上用水三碗煎數沸去柤淋洗患處立齊曰此乃馨香之劑也血氣聞香則行得臭則逆也凡瘡毒將盡未盡宜用之若有瘀肉宜先用雄黃解毒散解之後用此方洗後須即用膏藥貼護勿使風入肌肉易生直至收口為度最忌用生肌之藥敷藥方一二七車前草豨蘞草金銀花五爪龍草上四味鮮草一處搗爛加多年陳米粉即常用糨衣者初起時仍加飛鹽少許共調為稠糊敷瘡上中留一頂拔膿出若冬時無鮮者用干葉為末陳醋調敷亦可或五龍草一時難得即單用四味亦能奏功不必拘執也陽伯曰瘡毒初起毒盛者須內服敗毒藥數劑其有氣血薄弱者亦須用托裡藥數劑則萬全之計耳祕傳圍藥鐵井欄一二八敷一切惡毒即收斂消腫神效牛糞灰曬乾燒灰用新瓷罐盛之干處加倍用鐵線草草烏文蛤白芨白蘞貝母心陳小粉炒極黃色各等分上為末用高醋熬熱調藥如糊敷瘡四圍中留錢孔以出毒氣干則易之瘡勢惡甚者用飛龍奪命丹等藥出汗無不效大黃揭毒散一二九敷熱壅腫毒大黃一兩半白芨一兩朴硝二兩上為末井水調搽干則潤之草烏揭毒散百三十治一切癰疽腫毒草烏貝母天花粉南星芙蓉葉等分上為末用醋調搽四圍中留頭出毒如干用醋潤之抑陰散一三一治瘡瘍元氣虛寒焮腫不消或不潰斂或筋攣骨痛一切冷證草烏二兩南星煨赤芍藥炒白芷各一兩肉桂五錢上為末蔥湯調塗熱酒亦可抑陽散一三二一名洪寶丹治瘡屬純陽腫痛發熱天花粉三兩薑黃白芷赤芍藥各一兩上為末茶湯調搽患處陰陽散一三三治瘡屬半陰半陽紫荊皮炒五兩獨活去節炒一兩赤芍藥炒白芷石菖蒲各二兩上為末蔥酒調搽神功散一三四諸發背癰疽及諸瘡不問腫潰皆效黃柏炒草烏炒各一兩上為末用漱口水調入香油少許搽患處如干仍用水潤之清涼救苦散一三五治大頭瘟腫甚者以此藥敷之芙蓉葉霜桑葉白蘞白芨大黃黃連黃柏白芷雄黃芒硝山茨茹赤小豆南星金線重樓上等分為末蜜水調敷腫處以翎頻掃之二黃膏一三六敷一切腫毒熱浮在外或時氣熱壅者黃柏大黃各等分上為末用醋調敷如干用水潤之回陽玉龍膏一三七治陰疽發背寒邪流注風濕冷痹諸腳氣冷痛無紅赤者及跌撲所傷為敷涼藥或人元氣虛寒腫不消散或不潰斂及癰腫堅硬肉色不變久而不潰潰而不斂或鼓椎風筋攣骨痛一切陰寒冷證第一藥也草烏肉桂各五錢薑黃炒南星煨白芷赤芍藥炒各一兩上為末蔥湯或熱酒調塗沖和膏一三八治一切瘡腫不甚焮熱積日不消紫荊皮炒五兩獨活去節炒三兩赤芍藥炒二兩白芷菖蒲各一兩上為末蔥頭煎湯調搽麥飯石膏一三九治瘡疽初起先以麥飯石膏塗之俟瘡根漸收即敷神異膏斂之但麥飯石膏難於修合用神異膏亦效白麥飯石炭火煅醋淬數次研極細二兩據本草所載凡石如飯糰粒粒黏結成塊者即是皆可用也鹿角生取帶腦骨者斷之用炭火燒煙盡研極細四兩上用米醋調和入砂器煎以竹片不住手攪熬成膏先用豬蹄湯洗患處以鵝翎拂塗四圍干則以醋潤之若腐爛者用布帛攤貼之李氏曰麥飯石膏治發背癰疽神妙惜世罕知有患癰不潰而危者全用此膏一夕頓潰凡疽得膿其毒始解或有不潰者須用此膏故録之俾精擇修合以取十全之功也嘗見世間醫者每有妙方祕而不傳或更改以惑人誠可惡也余思西華麥飯石膏守死不傳其立心私刻君子鄙之矣黑末子百四十治癤毒用羊角連內骨燒存性為末酒調三錢分上下服之瘡可散立齊曰此方未嘗用蓋祕方也嘗治面上或身卒得赤斑或癢或瘭毒此而不治亦乃殺人以羖羊角燒存性研為極細末以雞子清調塗之甚效本草亦云然乳香定痛散一四一治瘡瘍潰爛疼痛不可忍諸藥不效者乳香沒藥各二錢寒水石煅滑石各四錢冰片一分為細末搽敷患處痛即止此方乳沒性溫佐以寒劑制之故寒熱之痛皆妙烏金膏一四一治發背中央肉死塗之即腐未死塗之即生若初起腫痛用點數處則解毒頓消若瘀肉腐黑塗之即潰若惡瘡頑瘡元氣無虧久不收斂者內有毒根以紙捻醮絍其內有等發背因元氣虛弱或因克伐元氣虧損毒氣散漫中黯外赤不腐不潰須服大補之劑中塗三四寸許至五六日間赤黯之界自有裂紋如刀劃之狀中央漸潰漸脫內用純陽之藥以接其元氣庶能收斂若妄用刀針去肉出血則陽隨陰散元氣愈傷或塗涼藥則毒氣不解氣血愈虛非徒無益適以害之矣其方用巴豆去殼炒黑研為膏點腫處或塗瘀肉上則自消化或加乳香少許亦可如塗瘡內或加香油少許調稀可用若餘毒不斂者以此絍之不致成痛透骨丹一四三此潰膿藥外科不可缺蟾酥硼砂輕粉巴豆各五錢蝸牛二個麝香一分上先將巴豆研如泥次入蝸牛麝香再研後入各藥研極細以小瓷瓶收藏每用少許以乳汁化開先用鐵輕輕撥破毒頭挑藥米粒許納於瘡口外用清涼膏貼之針頭散一四四治一切頑瘡內有膿管瘀肉或瘰癧結核不化瘡口不合宜此藥追蝕腐之赤石脂五錢輕粉麝香各五分乳香白丁香各三錢生砒黃丹各一錢蜈蚣一條炙乾上為末搽瘀肉上其肉自化若瘡口小或痔瘡用糯米糊和作細條陰乾絍入外以膏藥貼之凡瘡口久不合者內有膿管必須用此腐之內服托裡之藥代針膏一四五治瘡瘍膿熟不潰乳香二分白丁香真者是巴豆炒焦鹼各五分上為末熱水調點瘡頭上常以鹼水潤之勿令其干替針丸一四六治膿成不潰者白丁香硇砂另研真沒藥乳香各一匙糯米四十粒先以礦灰拳大一塊置瓷碗內量入井水待熱氣將息以米排入灰中良久候米如水晶狀取出用之如米未就再用灰制上各另為末然後和勻收貯用時以飯丸麥粒大每用一粒水濕黏瘡頭上其膿自出凡瘡瘍血氣壯實膿成不潰者宜用此藥以泄其毒則肌肉易生瘡口易斂若氣血虧損者須用甘溫之劑以培根本否則不惟不潰且難收斂若附骨疽及緊要之地當及時針砭出之為善三合散一四七治癰疽不肯作膿新巴豆肉明砒斑蝥等分上為細末絍瘡內惡肉自化立齊曰此方藥性太毒果有惡毒之證宜用腐之取其以毒攻毒也若以陽氣虛不能腐化成膿者宜用大補之劑及桑木灸之丹溪云氣血壯實膿自湧出大抵瘡之潰斂遲速總由血氣之盛衰使然也藜蘆膏一四八治一切瘡疽胬肉突出不問大小長短用藜蘆一味為末以生豬脂和研如膏塗患處周日易之生肌散一四九治瘡口不合木香輕粉各二錢黃丹枯礬各五錢上為細末用豬膽汁拌勻曬乾再研細摻患處立齊曰此方乃解毒去腐搜膿之劑非竟自生肌藥也蓋毒盡則肉自生常見患者往往用龍骨血竭之類以求生肌殊不知餘毒未盡肌肉何以得生及增腐爛耳若此方誠有見也收口摻藥百五十李氏云龍游有患背疽者大潰五臟僅隔膜耳自謂必死用鯽魚去腸實以羯羊糞烘燥為末乾摻之瘡口自收此出洪氏方屢用有效故附於此須候膿少欲生肌肉時用之桔梗湯一五一治咳嗽吐膿痰中有血胸膈兩脅作痛煩悶作渴或出臭濁已成肺癰證桔梗炒貝母當歸酒浸栝蔞仁枳殼麩炒薏仁桑白皮炒百合蒸各一錢五分五味子炒知母炒地骨皮甜葶藶炒甘草節防己黃耆杏仁各五分水二鍾煎服濟生桔梗湯一五二治肺癰咳嗽膿血咽乾多渴大小便赤澀方如前但少五味葶藶知母地骨皮四味用水二鍾姜五片煎八分食遠服大便祕者加大黃人參五味子湯一五三治氣血勞傷咳膿咯血寒熱往來夜出盜汗羸瘦困乏一切虛損肺痿之證並治人參五味子炒搗熟地黃當歸酒炒白朮炒白茯苓炙甘草陳皮桔梗炒前胡各一錢黃耆炙地骨皮桑白皮炒枳殼炒柴胡各七分水一鍾半生薑三片煎八分食後服四順散一五四治肺癰吐膿五心煩熱壅悶咳嗽貝母去心紫苑去苗桔梗炒各一錢半甘草七分水一鍾半煎七分食遠服如咳嗽加杏仁亦可為末白湯調服合歡飲一五五治肺癰久不斂口用合歡皮白蘞二味同煎服合歡皮即槿樹皮也亦名夜合紫菀茸湯一五六治飲食過度或煎爆傷肺咳嗽咽乾吐痰唾血喘急脅痛不得安臥肺痿等證紫菀茸去苗桑葉經霜者款冬花百合蒸焙杏仁去皮尖阿膠蛤粉炒貝母去心半夏制蒲黃炒各一錢人參犀角鎊末甘草炙各五分水一鍾半生薑三片煎七分入犀角末食後服升麻湯一五七治肺癰胸乳間皆痛吐膿腥臭川升麻桔梗炒薏苡仁地榆黃芩炒赤芍藥炒牡丹皮生甘草各一錢水二鍾煎八分食遠服如金解毒散一五八治肺癰桔梗一錢甘草一錢半黃連炒黃芩炒黃柏炒山梔炒各七分水二鍾煎八分徐徐陸續飲之不可急服按此方乃降火解毒之劑也凡發熱煩渴脈洪大者用之即效若脈數咳痰腥臭或唾膿瘀者宜用桔梗湯如聖柘黃丸一五九治肺癰咳而腥臭或唾膿瘀不問膿之成否並效肺家之病雖有方惟此方功效甚捷不可忽之柘黃一兩為末百齒霜即梳垢二錢用糊為丸如桐子大每服三五十丸米飲下柘黃乃柘樹所生者其色黃狀如靈芝江南最多北方鮮有葶藶散百六十治過食煎煿或飲酒過度致肺壅喘不能臥及肺癰濁唾腥臭甜葶藶桔梗炒栝蔞仁川升麻薏苡仁桑白皮炒葛根各一錢甘草炙五分水一鍾半生薑三片煎八分食後服知母茯苓湯一六一治肺痿喘嗽不已往來寒熱自汗知母炒茯苓炙甘草人參白朮五味子炒搗麥門冬半夏制薄荷桔梗柴胡款年花各一錢阿膠蛤粉炒黃芩炒各二錢川芎五分水二鍾姜三片煎一鍾食遠服四味排膿散一六二治肺癰吐膿五心煩熱壅悶咳嗽嫩黃耆鹽水炒白芷五味子研炒人參等分上為細末每服三錢食後蜜湯調下八味排膿散一六三治腸癰少腹脹痛裡急後重脈滑數或時時下膿黃耆炒當歸酒拌金銀花穿山甲蛤粉炒白芷防風連翹栝蔞各三錢水二鍾煎八分食前服或為末每服三錢食後蜜湯調下如膿將盡去穿山甲連翹倍當歸加川芎薏苡仁湯一六四一名瓜子仁湯治腸癰腹中㽲痛或脹滿不食小便短澀婦人産後多有此證縱非癰服之尤效薏苡仁炒五錢栝蔞仁三錢牡丹皮桃仁去皮尖各二錢上水煎空心服牡丹皮散一六五治腸癰腹濡而痛時時下膿牡丹皮人參黃耆炒白茯苓天麻白芷桃仁去皮尖薏苡仁當歸川芎各一錢官桂甘草各五分木香三分上水煎服梅仁湯一六六治腸癰壅痛大便祕澀梅仁九個去皮尖大黃炒牡丹皮芒硝犀角鎊各一錢冬瓜仁三錢研上水煎入犀角末服大黃湯一六七一名牡丹皮湯專治腸癰小腹堅腫而熱按之則痛肉色如故或焮赤微腫小便頻數汗出憎寒其脈沉緊膿未成者急服之牡丹皮栝蔞仁各三錢桃仁去皮尖大黃煨芒硝各二錢水二鍾煎一鍾食前服本方去栝樓即名大黃牡丹湯立齊曰此方乃行血破血之劑也如發熱自汗惡寒小腹作痛小便如淋脈未數者有效丹溪曰小腹腫痞按之痛小便如淋或自調發熱身無汗復惡寒其脈遲緊者膿未成宜下之當有血此結熱所成也故金匱用大黃利之即此方也若無前證恐不宜用其有脈滑數腹內脹痛或時時後重而膿已下宜用八味排膿散蠟礬丸及托裡之藥射干湯一六八治胃脘癰吐膿血射干去毛山梔仁赤茯苓升麻各一錢白朮五分赤芍藥一錢半上水煎服槐花散一六九治腸風臟毒下血槐花炒熟地黃青皮白朮炒荊芥穗當歸身酒拌升麻各一錢川芎四分上為末每服三錢空心米飲調下水煎服亦可除濕和血湯百七十方在和陳二一九治陽明虛陷濕熱便血腹痛夏枯草湯一七一治瘰癧馬刀已潰未潰或日久漏者夏枯草六兩水二鍾煎七分去柤食遠服此生血治瘰癧之聖藥虛甚者當煎濃膏服並塗患處多服益善兼十全大補湯加香附貝母遠志尤善必效膏一七二治瘰癧氣血尚無虧損癧核不愈內服此藥外以針頭散腐之若氣血虛者先服益氣養營湯數劑後服此藥服後癧毒盡下再服煎湯數劑南硼砂二錢半輕粉一錢麝香五分巴豆五個去膜白檳榔一個斑蝥四十個去頭翅同糯米炒上同為極細末取雞子二個去黃用清調藥仍入殼內以濕紙數重糊口入飯甑蒸熟取出曝乾研末虛者每服半錢實者一錢用炒生薑酒或滾湯於五更調服如覺小腹痛用益元散一服其毒俱從小便出胎婦勿餌瘡毒去後多服益氣養營湯瘡口自合此藥斑蝥巴豆似為峻利然巴豆能解斑蝥之毒用者勿畏豫於京師遇一富商項有癧痕一片頗大詢其由彼云因怒而致困苦二年百法不應忽有方士與藥一服即退二三再服頓退四服而平旬日而痊以重禮求之乃是必效散因修合濟入無有不效丹溪亦云必效與神效栝蔞散相兼服之自有神效常以二劑兼補劑用之甚效故録之但此藥雖云峻利然癧毒之深者非此不能解故宜用之惟血氣虛者不可用恐其有誤也又一道人治此證用雞子七個每個入斑蝥一枚飯上蒸熟每日空心食一個求者甚多考之各書瘰癧門及本草亦有之然氣血虛者恐不能治也射干連翹散一七三治寒熱瘰癧射干連翹玄參赤芍藥木香升麻前胡梔子仁當歸甘草各一錢大黃二錢水煎食後服如神散一七四治瘰癧已潰瘀肉不去瘡口不合松香末一兩白礬三錢為末麻油調搽乾摻亦可遇仙無比丸一七五治瘰癧未成膿其人氣體如常宜服此丸形氣覺虛者宜先服益氣養營湯待血氣少充方服此丸核消後仍服前湯如潰後有瘀肉者宜用針頭散更不斂亦宜服此丸斂後再服前湯白朮炒檳榔防風黑醜半生半炒取頭末密陀僧郁李仁炮去皮斑蝥去足翅用糯米同炒去米不用甘草各五錢為細末水糊丸梧子大每服二十丸早晚煎甘草檳榔湯下服至月許覺腹中微痛自小便中取下癧毒如魚目狀已破者自合未膿者自消肘後治癭方一七六凡項下卒結囊欲成癭者用海藻一斤洗去咸浸酒飲之不可間斷須要時時飲二三杯有酒氣方妙神效開結散一七七消癭塊甚效橘紅四兩沉香木香各二錢珍珠四十九粒入砂罐內以鹽泥封因煅赤取出去火毒用豬靨肉子四十九枚用豚豬生項間如棗子者上為末每服一錢臨臥酒調徐徐咽下患小者三五服大者一劑可愈切忌酸鹹油膩滯氣之物須用除日於靜室修合生地黃丸一七八治師足寡婦室女乍寒乍熱而患瘡瘍及頸間結核肝脈弦長而出魚際外無寒邪內多鬱火者宜此治之生地一兩酒拌杵膏秦艽黃芩硬柴胡各半兩赤芍藥一兩上為末入地黃膏加煉蜜為丸桐子大每服三五十丸烏梅湯日進二服外臺昆布丸一七九治項下結囊欲成癭者昆布酒洗海藻酒洗各等分上為末煉蜜丸彈子大含化咽之濟生玉壺散百八十治三種毒癭海藻海帶昆布雷丸各一兩廣朮青鹽各半兩上為細末老米飲為丸桐子大不拘時噙化四五丸神效栝蔞散一八一治乳癰及一切癰疽初起腫痛即消膿成即潰膿出即愈治癰之方甚多獨此方神效瘰癧瘡毒尤效凡一切癰疽餘毒皆宜用之栝蔞一個爛研當歸酒洗生粉草各半兩乳香沒藥各一錢上用酒煎服良久再服如不能飲以酒水各半煎之如數劑不效宜以補氣血之藥兼服之若肝經血虛結核不消佐以四物柴胡升麻白朮茯苓若肝脾氣血虛弱佐以四君芎歸柴胡升麻若憂鬱傷脾氣血虧損佐以歸脾湯海藻散堅丸一八二治肝經癭瘤海藻昆布龍膽草酒拌炒焦各二兩小麥醋煮炒乾四兩上為末煉蜜丸桐子大每服二三十丸臨臥白湯送下或噙化咽之尤好凡患瘰癧服調治之藥未應宜佐以此上二方一方有柴胡二兩連翹飲子一八三治乳內結核服數劑如不消宜兼服八珍湯初起有表證者宜先解散連翹川芎栝蔞仁研皂刺炒橘葉青皮甘草節桃仁各一錢半上水煎食遠服清肝解鬱湯一八四治肝經血虛風熱或鬱火傷血乳內結核或為腫潰不愈凡肝膽經血氣不和之病皆宜用此藥人參熟地黃芍藥炒茯苓山梔炒貝母各一錢柴胡牡丹皮川芎陳皮各五分當歸白朮各一錢半甘草五分上水煎服羌活白芷散一八五治風熱血燥手掌皺裂或頭面生瘡或遍身腫塊或膿水淋漓羌活白芷荊芥軟柴胡蔓荊子防風甘草牙皂黃芩酒炒黃連酒炒各一錢上水煎服胡麻散一八六治風熱癮疹瘙癢胡麻子一兩二錢苦參荊芥穗何首烏各八錢威靈仙防風石菖蒲牛蒡子炒甘菊花蔓荊子白蒺藜炒炙甘草各六錢上為末每服二錢食後薄荷湯調服茶清亦可四生散一八七治臁腿瘡淫不愈或眼目昏花名腎臟風並治風癬疥癩血風瘡證黃耆獨活白附子真者白蒺藜等分上為末每服二錢用豬腰子一枚批開入藥濕紙包裹煨熟空心連腰子細嚼鹽湯送下檳蘇散一八八治風濕流注腳脛痠痛或嘔吐不食檳榔木瓜陳皮炙甘草各一錢香附紫蘇各五分水一鍾半生薑三片蔥白三莖煎一鍾空心服升麻和氣飲一八九治風癬瘡疥熱結大便不通當歸陳皮各一錢半枳殼麩炒芍藥酒炒半夏制桔梗炒白芷蒼朮米泔浸炒乾葛白茯苓甘草炙各一錢乾薑炒大黃各五分升麻三分上水煎服當歸飲百九十治風濕血熱癮疹癢痛膿水淋漓瘡疥發熱等證當歸川芎生地黃白芍藥白蒺藜炒黃耆何首烏不見鐵各錢半防風荊芥甘草各一錢上水煎服羌活當歸散一九一治風毒血熱頭面生瘡或赤腫或成塊或癮疹瘙癢膿水淋漓羌活當歸川芎升麻防風白芷荊芥鼠黏子蒸黃連酒炒黃芩酒炒連翹甘草上用酒拌曬乾酒煎服一掃散一九二治癬疥防風荊芥苦參地骨皮薄荷等分甘草減半上為末蜜水調服三錢不過三五服可淨或煉蜜丸桐子大每服五七十丸食遠茶清送下烏金散一九三敷腎囊破爛下疳等證麩炭紫蘇葉上等分為末香油調搽用紫蘇葉包裹之蛇床子散一九四治一切風癬疥癩瘙癢膿水淋漓蛇床子獨活苦參防風荊芥各三錢枯礬銅緑各一兩二味另為末上為末麻油調搽金黃散一九五敷天泡濕熱等瘡滑石粉甘草此當半用為是上等分為末搽敷此方或加緑豆末以治濕熱肥瘡更妙當以此方加枯礬少半用治肥瘡大效白粉散一九六治諸疳瘡海螵蛸三分白芨一分輕粉一分上為末先用漿水洗拭干敷滑石散一九七治小兒天泡瘡好滑石黃柏上共為末敷之仍內服荊防敗毒散或金銀花散熱甚者宜服大連翹飲一方名碧玉散以青靛調前二味如泥用皂刺挑破泡水次敷藥神效祕方仙遺糧湯一九八治一切楊梅瘡不拘始終虛實皆可取效土茯苓即名仙遺根用鮮者二兩洗淨以木石臼捶碎用水三碗煎兩碗去柤入後藥煎服當歸生地防風木通薏仁各八分金銀花黃連連翹各一錢白朮白鮮皮各七分皂刺六分甘草四分加燈心二十根用遺糧湯二碗煎一碗食遠服土萆薢湯一九九治楊梅瘡及瘰癧咽喉惡瘡癰漏潰爛筋骨拘攣疼痛皆妙用土萆薢即土茯苓二三兩以水三鍾煎二鍾不拘時徐徐服之若患久或服攻擊之劑致傷脾胃氣血等證以此一味為主外加對證之藥無不神效五加皮飲二百治楊梅綿花瘡百發百中亦可煮酒以治結毒當歸木瓜生地黃熟地黃羌活薏仁各一錢防風荊芥赤芍苦參大楓藤各七分五加皮二錢甘草殭蠶各五分上每服入土茯苓四兩豬肉四兩用水二大碗煎一碗食前溫服渣再煎連肉食之忌生冷魚腥沙氣牛肉茶酒醋所用土茯苓忌鐵器若治風毒口服此藥外以此藥煎膏或丹收或粉收貼之換肌消毒散二百一一名萆薢湯治時瘡不拘初起潰爛土茯苓五錢或一二兩當歸白芷皂刺薏仁各一錢半木瓜不犯鐵器白鮮皮木通金銀花各一錢甘草五分上水煎服甚者土茯苓用至四五兩更妙蠲痹消毒散二百二治時瘡肢節筋攣薑黃土茯苓獨活各五錢白朮當歸各錢半芍藥一錢白芷五分上水煎服七貼方二百三治楊梅綿花瘡防風忍冬皂刺蟬蛻去頭足連翹白鮮皮五加皮荊芥穿山甲炒各一錢生地木瓜去心忌鐵殭蠶炒各一錢半皂子七個薏仁三錢土茯苓四兩上用水四碗煎二碗食遠分二次服之忌牛羊茶酒醋房事茯苓膏二百四治楊梅瘡並治風毒當歸白蒺藜羌活生地熟地甘草去皮連翹木通各三錢土茯苓半斤上為粗末用水五六碗熬將半用絹濾去滓再熬成膏晾冷每服一大酒鍾日三服輕者五六料重者十料全愈熬藥須用砂鍋忌房事雞魚牛肉椒醋等發物五寶丹二百五治九種楊梅結毒並及兒女者琥珀透明血色者用甘草水煮過三分半珍珠炒過三分半一方用豆腐包蒸硃砂透明者三分半鐘乳石用木香甘草各一錢同煮乾用三分半飛羅面炒過三分半冰片半分臨時加上俱為極細末瓷罐收貯聽用服法每日用土茯苓成塊者一斤洗淨用石敲碎先入水二升煮取汁四碗收瓷器內將前柤再入水四五碗煮汁二碗併入前汁內為一日之用若病在上者加木香二錢病在下者加牛膝一兩與土茯苓同煎病者不得另飲茶湯但將土茯苓湯時時飲之若飲湯半鍾加五寶丹二釐飲一鍾加四釐體厚者加六七釐一日內服盡此湯為度在上飽服在下飢服忌茶酒並一切發風動氣之物其毒貼清涼膏或加摻藥收口若舊有輕粉等毒服藥後當盡發出無則不發也大忌房事輕者十服重者二七服全愈醫統楊梅癰湯方二百六不問年深者並效土茯苓五兩金銀花一兩皂刺花椒牛蒡鬱金當歸各五分黑鉛三兩熔化入水銀五錢乘熱擂為粉分五分聽臨後另入煎藥用上咀分作五帖用水二鍾入蔥一根煎至一鍾去柤再入鉛粉一分煎至八分食遠服上鉛粉煎後仍可取起蓋楊梅癰漏多因服輕粉積毒而成此以水銀花椒黑鉛仍收引輕粉之毒從類而出也此藥每以五帖為一料初服一帖要取微汁取汗法先以金銀花一兩或忍冬藤葉尤妙防風荊芥花椒各半兩煎湯二斗於不透風處先熏後洗自然汗出即患二三十年者只用此四料四汗之無不全愈忌牛肉燒酒真妙方也世人珍祕不傳徐春甫得之用以治人一一獲效故詳載之以濟人也會膿散二百七治惡毒便毒初起之妙方也白芷殭蠶炒穿山甲煨各二錢大黃四錢乳香沒藥各一錢上為末以當歸四錢用酒水各一鍾煎一鍾去柤量人強弱或全用或一半調服之此藥若嫌太多則㕮咀為飲大黃生加煎服之尤妙牡蠣散二百八治便毒亦名血疝當歸酒拌甘草節滑石煅各一錢半牡蠣二錢大黃三錢木鱉子五個杵非有大熱者此味不可用當去之亦不必用水二鍾煎一鍾露一宿五更頓服冬月火溫服無論已未潰膿血俱從大便出此方乃鹹寒導滯之劑若久曠房室大小便祕發熱焮痛或交感時強固精氣以致交錯壅滯而結為腫痛便祕者最宜用之若勞倦虛弱之人不甚焮痛大小便無熱祕者不宜輕用牛黃雙解散二百九治便癰內蘊熱毒外挾風邪或交感強忍精氣以致淫精交錯壅結腫痛或大小便祕先用此藥通解更用調補之劑肉桂大黃炒芍藥牽牛杵炒澤瀉桃仁去皮尖炒各二錢半炙甘草乾薑各一錢上分二劑水煎空心食前服內托羌活湯二百十治臀癰腫痛兩尺脈緊按之無力者羌活黃柏各二錢黃耆鹽水炒防風當歸尾藁本肉桂連翹各一錢炙甘草蒼朮陳皮各半錢上水酒煎服加味瀉肝湯二一一治肝經濕熱不利陰囊腫痛或潰爛皮脫睪丸懸掛或便毒及下疳腫痛或潰爛皆治之龍瞻草酒炒當歸梢車前子炒生地黃芍藥炒澤瀉黃連炒黃柏酒炒知母酒炒防風各一錢甘草梢五分水二鍾煎八分食前服外敷烏金散加味托裡散二一二治懸癰不消不潰人參黃耆鹽水炒當歸川芎麥門冬芍藥炒黃柏酒炒知母酒炒金銀花制甘草柴胡各一錢水二鍾煎八分食前服加味十全大補湯二一三治懸癰潰而不斂或發熱飲食少思人參黃耆鹽水炒白朮炒熟地黃當歸川芎芍藥炒茯苓各一錢甘草炙肉桂五味子搗炒麥門冬各五分水二鍾煎一鍾食前服莖腫加青皮小便赤加酒炒黃柏知母小便澀加車前子山梔子俱炒用五味當歸散二一四治婦人陰中突出一物長五六寸名陰挺當歸黃芩各二兩牡蠣煅一兩半蝟皮炙一兩赤芍藥五錢上為末每服二錢食前溫酒調下滾湯亦可如不應須以補中益氣湯倍加柴胡升麻兼服之又方用當歸穿山甲炒蒲黃炒各半兩辰砂一錢麝香少許俱為末每服三錢酒調下尤效婦人陰瘡二一五治婦人陰戶生瘡作癢杏仁炒雄黃白礬各五錢麝香二分上為末敷入患處搨腫湯二一六治婦人陰戶生瘡或癢痛或膿水淋漓甘草乾漆各三錢生地黃當歸黃芩川芎各二錢鱉甲五錢炙上用水數碗煎數沸去柤當洗患處白芷升麻湯二一七治婦人陰內膿水淋漓或癢或痛白芷升麻黃連木通當歸川芎白朮茯苓上水煎服更用搨腫湯浴洗之痔漏腸紅方二一八其效無比黃連去蘆毛淨一兩好酒浸一宿撈起陰乾為末百草霜用草茅燒者松柴者不用一兩研細烏梅肉一兩蒸軟即用前浸黃連酒蒸爛上以三味同搗一處為丸桐子大如太乾仍如前酒搗丸之每空心用酒送下四五十丸三日見效十日全愈地榆散二一九治血痔上用地榆為細末每服二錢匕食前米飲調下日三服臭樗皮散二百二十治痔漏下血及膿不止臭樗皮微炒酸石榴皮黃連去須地榆阿膠炒珠各一兩艾葉三錢微炒上為細末每服二錢食前粥飲調下秦艽防風湯二二一治痔漏結燥大便作痛秦艽防風當歸酒拌白朮黃柏陳皮柴胡大黃煨澤瀉各一錢桃仁去皮尖紅花升麻甘草各五分上水煎空心服豬臟丸二二一治大便痔漏下血豬大臟一條控干以槐花炒為末填入臟內兩頭札定瓦器內米醋煮爛上搗和再加糕糊為丸桐子大每服五七十丸食前米飲或當歸酒下此方用黃連豬臟二味亦名豬臟丸尤效一方先用海螵蛸炙黃去殼為末以木賊草煎湯調下三日即效或後服黃連豬臟丸痔瘡方二二三雄黃五分五靈脂燒斷煙五倍子炒過各一錢沒藥三錢半明者白礬半生半熟三錢上為極細末用紙托貼瘡口上三品錠子二二四上品去十八種痔白明礬二兩白砒一兩零五分乳香沒藥各三錢半牛黃三錢中品去五漏及翻花瘤氣核白明礬二兩白砒一兩三錢乳香沒藥各三錢半牛黃二錢下品治瘰癧氣核疔瘡發背腦疽諸惡證白明礬二兩白砒一兩半乳香沒藥各二錢半牛黃三分上將砒末入紫泥罐內次用礬末蓋之以炭火煅令煙盡取出並各藥俱研極細末用糯米糊和為挺子狀如線香陰乾絍瘡內三四次年深者五六次其根自腐如瘡露在外更用蜜水調搽幹上亦可嘗有一老媼用此治瘰癧索重價始肯為治其方法乃是中品錠子絍瘡內以膏藥貼之其根自腐未盡再用去盡更搽生肌藥數日即愈人多異之凡見其治氣血不虛者果驗惟氣血虛者雖潰去亦不能愈蓋此與必效散相為表裡皆攻毒去邪之藥也羊膽膏二二五治痔漏下疳瘡臘月取羊膽一枚入片腦末一分置風處掛干用時以涼水化開頰敷患處內服槐子酒或加味瀉肝湯若得熊膽更佳如眼痛者點之尤效水銀棗子膏二二六治蟲痔癢不止水銀一兩棗肉二兩上和研水銀不見星捻如棗核狀薄綿裹納肛門中明日蟲出若痛加韶粉三分丸納之熊膽膏二二七治痔痛極效熊膽五分冰片一分上研細用井花水調雞翎掃痔上蝸牛膏二二八敷痔痛極效蝸牛一枚負殼有角者冰片麝香各少許上同研爛以瓷器盛次早取汁敷痔上芫花線二二九系痔漏瘤核用芫花一握洗淨入木臼搗爛加少水絞汁於石器中熳火煎成膏將絲線於膏內度過晾乾以線系痔當微痛候痔乾落以紙捻蘸膏納竅內去根當永除根也一方只搗汁浸線一夜用不得使水枯痔水澄膏二百三十治痔護肉鬱金白芨各一兩一方加黃連上二味為細末如患內痔候登廁時翻出在外用溫湯洗淨側臥於床其痔即出用蜜水調藥得中以篦篾塗穀道四邊好肉上留痔在外以紙蓋藥上良久然後用後枯藥搽痔上仍用筆醮溫水於紙上潤之勿令藥干及四散好白礬四兩生信石二錢半硃砂一錢研極細上各研為細末先將砒入紫泥罐底次將礬末蓋之用火煅令煙盡其砒盡從煙去止借砒氣於礬內耳將礬為極細末看痔頭大小置礬末於掌中乃入硃砂少許以唾調稀用萆篾塗痔上周遍一日三上看痔頭顏色焦黑為效至夜有黃水出切勿他疑水盡為妙至中夜上藥一遍來夜依然上藥三次有小痛不妨換藥時以碗盛溫湯用筆輕洗去舊藥更上新藥仍用護肉藥間用荊芥湯洗之三兩日之後黃水出將盡可於藥中堵硃砂減白礬則藥力即緩三兩日即可增減漸漸取之庶不驚人全在看色增減敷藥厚薄方是合法此藥只是借砒信之氣又有硃砂能以解之一方士將此二方在京治人多效致富一富商以百金求得之録於豫豫雖未用傳人無不言效但枯藥則趙宜真鍊師已刊於青囊雜纂如神千金方則未見刊傳大抵今人言能取痔者皆此方也其有氣血虛或挾內邪者還當兼治其內庶不有失如神千金方治痔無有不效好信石黃明者三錢打如豆粒明白礬一兩為末好黃丹飛砂五錢蠍梢七個洗淨瓦上焙乾為末草烏光實者去皮生研五錢上用紫泥罐先將炭火煅紅放冷拭淨先下明礬燒令沸次下信入礬內拌勻文武火煅候沸再攪勻次看罐通紅煙起為度將罐掇下待冷取研為末方入黃丹草烏蠍梢三味再同研極細以瓷罐收貯如欲敷藥先煎甘草湯或蔥椒湯洗淨患處然後用生麻油調前藥以鵝毛掃藥痔上每日敷藥三次必去黃水如膠汁則痔頭漸消其年遠者不出十日可取盡日近者俱化為黃水連根去淨更搽生肌之藥凡五痔皆可去之此乃臨安曹五方為高宗取痔得效後封曹官至察使祕傳正骨丹二三二治跌打損傷骨折血瘀而傷之重者用此可續筋骨降真香乳香沒藥蘇木松節自然銅醋煅七次川烏炮真血竭各一兩地龍去土酒浸烘乾生龍骨各一錢土狗十個浸油內死烘乾上十二味共重八兩八錢同為末每服五錢隨病上下酒調服覺藥自頂門而至遍身搜至病所則颯颯有聲而筋骨漸愈病人自知之服藥後仍服人參白朮黃耆當歸川芎肉桂甘草白芷厚朴以調補元氣本事接骨方治打折損傷接骨木半兩乳香半兩當歸赤芍藥川芎自然銅炒醋粹各一兩上為末用黃蠟四兩溶化入前藥攪勻衆手丸龍眼大如打傷筋骨及閃痛不堪忍者用一丸熱酒浸開乘熱飲之痛即上沒藥降聖丹二三四治趺打損傷接續筋骨當歸酒炒白芍藥川芎生地黃蘇木川烏頭炮去臍骨碎補炙乳香另研沒藥另研自然銅火煅醋淬十次為末各一兩上為末生薑汁共蜜和丸每一兩作四丸每服一丸用水酒各半盞煎至八分空心熱服立齊曰脾主肉肝主筋若肝脾氣血虧損或血虛有熱而不愈者當求其本而治之十味沒藥丸二三五治打撲損傷筋骨疼痛或氣逆血暈或瘀血內停肚腹作痛或胸脹悶沒藥乳香川芎川椒當歸芍藥紅花桃仁血竭各一兩自然銅四錢火煅七次醋淬上為末同黃蠟四兩溶化入前末速攪勻衆手丸彈子大每服一丸酒化下立齊曰按接骨散沒藥丸惟元氣無虧者宜用若腎氣素怯或高年虛弱者必用地黃丸或補中益氣湯以固根本為善花蕊石散二三六治打撲損傷腹中瘀血脹痛欲死服之血化為水其功不能盡述硫黃明者四兩花蕊石一兩上為末和勻先用紙筋和鹽泥固劑瓦罐一個候乾入藥再用泥封口安在磚上虛書八卦方位用炭三十斤煅之候罐冷取出每服一錢童便調下立齊曰前方若被傷已甚元氣虧損內有瘀血不勝疏導者用前藥一服其血內化又不動臟腑甚妙甚妙黑丸子二三七一名和血定痛散治跌打損傷筋骨疼痛或瘀血壅腫或外感風寒肢體作痛或手足緩弱行步不前若流注膝風初結服之自消若潰後氣虛發熱與補藥兼服自斂百草霜白芍藥各一兩川烏炮南星各三錢赤小豆兩半白蘞一兩六錢白芨骨碎補當歸各八錢牛膝六錢上各另為末酒糊丸桐子大每服三四十丸鹽湯溫酒任下孕婦忌服封口藥二三八凡損傷皮肉破裂者以此封之牡蠣煅赤石脂生研紅丹上好者等分上為細末香油調塗瘡口若欲消腫散血合口加血竭乾摻之當歸導滯散二三九治跌撲瘀血在內胸腹脹滿或大便不通或喘咳吐血大黃當歸等分上為末每服三錢溫酒下陽氣虛者須加肉桂復元活血湯二百四十治跌打損傷瘀血流於脅下作痛或小腹作痛或痞悶及便毒初起腫痛柴胡一錢半天花粉穿川甲炒各一錢當歸酒拌大黃酒炒各一錢紅花甘草各七分桃仁二十個去皮尖研上水一鍾半加酒半鍾煎八分食前服之以利為度金瘡方二四一凡金瘡出血不止用牛膽石灰摻之即止其方以臘月牛膽入風化石灰懸當風候乾用一方單用三七搗爛敷之神效又方金瘡出血不止以五倍子生為末干貼之如不止而血熱者宜用犀角地黃湯之類大凡金瘡出血不止若素本怯弱者當補其氣若陰虛或有熱者當補其血若因怒者當平肝若煩熱作渴昏潰者當補脾氣若筋攣搐搦者當養肝血不應用地黃丸以滋腎水金瘡降真散二四二降真香用節佳松香文蛤三味等分為末無論諸傷血出斷折摻破處夾縛定神效金瘡灰蛋散二四三治金瘡出血不止及久年惡瘡石灰細研雞蛋清以和灰成餅為度上將灰蛋餅子煅過候冷研鈿遇金瘡摻之若多年惡瘡以薑汁調敷一方單以石灰摻傷處裹定亦血止而愈龍骨散二四四治金瘡龍骨赤石脂五棓子黃丹海螵蛸各等分上各研入麝香少許共研勻摻上如干先以鹽水洗挹乾摻之桃花散二四五治金瘡並一切惡瘡黃丹軟石膏煅過等分和研勻如桃花色摻傷處甚妙刀傷跌打經驗方二四六凡刀傷磕損跌撲腫痛或出血用蔥白細切杵爛炒熱敷患處蔥冷再易神效一方以三七搗爛罨之神效立齊曰醫學綱目稱前方有神效余嘗以治前證青腫不散死肉不潰佐以健脾胃之藥其功尤捷此內外所以合一也損傷敷夾法二四七凡損傷骨折者先須整骨使正隨用川烏草烏等分為末以生薑汁調貼之夾定然後服藥無有不效罨跌閃腫痛二四八用生薑蔥白同搗爛和麵炒熱罨之如熱服而痛者用梔子加麵炒熱罨之洗損傷方二四九凡傷重者用此淋洗然後敷藥荊芥土當歸生蔥切斷一方用生薑上同煎湯溫洗或止用蔥一味煎洗亦可箭鏇竹木刺方二百五十百一方治竹刺在肉以蠐螬蟲研敷立效衍義方治竹木刺入肉嚼牛膝根罨之即出肘後方治箭鏃入骨以巴豆肉微炒同蜣螂研勻塗傷處俟癢極拔出之孫真人治箭鏃針刺杵螻敷塗患處自出罨跌打夾棍傷二五一生薑陳酒糟各一斤同搗爛炒熱罨傷處治拶傷二五二凡拶傷手指者用皂礬二兩水四五碗砂鍋內熬滾將手熏洗良久即血活疼止不致潰爛熬水忌銅鐵器其洗手水過夜即臭惡不可聞杖瘡四方二五三用川大黃一兩加上好冰片二分另研俱為末和勻涼水調如糊攤杖處即時止痛一日後換膏藥貼之又方加甘草一兩又方攤藥大黃白芷生半夏各七錢上為末以鮮薑汁調敷干即再敷以黑處血紅為度即換貼膏藥神效又方生半夏松香各一兩上研一處蜜水調成膏貼之勿令見風如干再換一個即愈諸骨諸物鯁二五四一治諸骨鯁用苧麻根杵爛丸彈子大將所鯁物煎湯化下一治魚骨鯁用細茶五倍子等分為末吹入咽喉立愈一治稻芒糠谷鯁喉將鵝吊一足取涎徐徐咽之即消一治吞釘鐵金銀銅錢等物但多食肥羊脂及諸般肥肉等味必隨大便而下一治吞鐵或針用餳糖半斤濃煎艾汁調和服之一治吞發繞喉不出者取自己亂髮燒灰白湯調服一錢破傷風敷藥二五五治打撲損傷傷風腫痛者南星半夏地龍等分上為末用生薑薄荷汁調搽患處豨蘞酒二五六治破傷風外邪初入或風入於臟者神效凡頭面身體因破損傷風者頃刻發脹遲則不救速用豨蘞草一二兩酒水各半煎服被蓋暖臥少頃即可消散能飲者純用酒煎尤妙防風湯二五七治破傷風表證未傳入里急服此防風羌活獨活川芎等分上每服五錢水煎調蜈蚣散服方在後二六四白朮防風湯二五八治破傷風服表藥過多自汗者白朮黃耆各一兩防風二兩上每服五七錢水煎服臟腑已和而自汗出者可服此藥若臟腑祕小便赤而自汗者急以後大芎黃湯下之羌活湯二五九治破傷風在半里半表間宜和解之急服此湯稍緩則邪入於裡不可用矣羌活麻黃菊花川芎防風細辛前胡蔓荊子黃芩石膏白茯苓枳殼甘草各一錢薄荷白芷各五分上每服五錢薑水煎日二三服羌活防風湯二百六十治破傷風初傳在表脈浮緊羌活防風藁本當歸芍藥甘草各四錢地榆細辛各二錢上㕮咀每服五七錢水一鍾半煎八分熱服量緊慢加減用之熱盛加黃連黃芩各二錢大便祕加大黃二錢自汗加防風白朮各五分大芎黃湯二六一治破傷風邪傳於裡舌強口噤項背反張筋惕搐搦痰涎壅盛宜疏導者急服之川芎羌活黃芩大黃各一兩上每服五七錢水煎服本事玉真散二六二一名定風散亦名奪命丹治打撲金刃破傷風重者牙關緊急腰背反張並蛇犬所傷天南星湯泡七次如急用以濕紙裹煨防風等分上為末每服二錢溫酒調服若牙關緊急腰背反張者每服三錢用童便調服雖內有瘀血亦愈至於昏死心腹尚溫者速進二服亦可保全若破傷風瘡口及瘋犬咬傷須用漱口水或熱童便洗淨隨用生南星為末摻之或以水調塗之出水為妙養血當歸地黃湯二六三治破傷風氣血俱虛發熱頭痛服此以養氣血祛風邪不拘新舊並可治之當歸酒拌熟地各二錢芍藥川芎藁本防風白芷北細辛各一錢水二鍾煎一鍾食遠服甚者加酒助之蝦蚣散二六四蜈蚣一對炙鰾膠三錢煅上為末用防風白朮煎湯調下破傷風灸法二六五治跌打損傷或蟲獸傷破皮膚以致風邪入內牙關緊急腰背反張或遍體麻木甚者不知人事急用蒜搗爛塗傷處將艾壯於蒜上灸之多灸為善仍用膏藥護貼內服玉真散如毒蛇瘋犬咬傷先刺患處去毒血如前法治之海藏愈風丹二六六治癘病手足麻木眉毛脫落遍身生瘡及癩風癮疹皮膚瘙癢搔破成瘡並皆治之皂角一斤銼寸許無灰酒浸一宿以水一碗挪成汁去渣用砂罐文武火熬熱苦參一斤取末四兩烏梢蛇白花蛇土花蛇各一條去腸陰乾酒浸取淨肉曬乾為末上為末入前二味和丸桐子大每服六七十丸空心煎通聖散送下乾物壓之日三服間日浴之汗出為度二聖散二六七疏風和血去癘毒皂魚刺燒存性為末大黃半兩上用大黃半兩煎湯調下皂刺末二錢早服樺皮散午以升麻湯下瀉青丸晚服二聖散局方樺皮散二六八治肺壅風毒遍身癮疹瘙癢樺皮枳殼去穰各四兩俱燒存性荊芥穗一兩炙甘草半兩杏仁二兩去皮尖用水一碗煮令減半取出晾乾為研上共為末瓷器收貯每服二錢食後溫酒調服升麻湯二六九治諸風熱癩肌肉極熱身如蟲行或唇反綻裂升麻三分人參茯神防風羌活犀角鎊羚羊角鎊各一錢肉桂五分水二鍾姜三片入竹瀝少許煎八分不拘時服或用下瀉青丸寶鑑醉仙丹二百七十治癘風遍身麻木胡麻子炒牛蒡子炒枸杞子蔓荊子炒各一兩白蒺藜苦參天花粉防風各半兩上為細末每一兩五錢入輕粉二錢拌勻每服一錢茶清調晨午各一服至五七日於牙縫中出臭涎令人如醉或下膿血病根乃去仍量人輕重虛實以用之病重者須先以再造散下之候元氣將復方用此藥忌一切鹽醋炙煿厚味止可食淡粥時菜及諸蛇肉以淡酒蒸熟食之亦可以助藥力子活浮萍散二七一治風癬疥癩浮萍四錢荊芥川芎麻黃去節當歸赤芍藥甘草各二錢水二鍾蔥二莖豆豉一撮煎服汗出為度寶鑑換肌散二七二治癘風久不愈或眉毛脫落鼻梁崩壞其效如神白花蛇黑花蛇各三兩酒浸地龍去土當歸川芎赤芍藥天門冬去心甘草何首烏不犯鐵沙參胡麻子炒天麻紫參苦參白蒺藜炒細辛白芷蔓荊子威靈仙荊芥穗菊花木賊草不灰木石菖蒲定風草即草烏莖草烏炮去皮臍蒼朮木鱉各一兩上各另為末和勻每服四五錢食後溫酒調服加飲數杯尤妙通天再造散二七三治大風實熱內壅宜此攻之鬱金半兩大黃炮皂刺炒各一兩白醜頭末半生半炒六錢上為細末每服五錢日未出時面東以無灰酒