硫黃五分麝半分浴後姜蘸擦二三日勿洗又方硫黃一兩用醋煮半白海螵蛸三個共為末浴後以生薑蘸擦患處須避風少時數度即愈漆瘡方二九五用香油調鐵鏽塗之胃氣實者內服黃連解毒湯胃氣弱者以漆毒侵犯中氣致虛多有作嘔不能飲食者宜用六君加砂仁藿香酒炒芍藥之類又解漆毒法見因陳二三五手足甲疽二九六凡手足間或因修甲傷肉或因損足成瘡潰爛上腳用緑礬置鐵板上煅沸色赤如熔金色者為真沸定取起研末以鹽湯洗搽坐板瘡二九七腫痛多膿者密陀僧生礬大黃等分為極細末敷之臁瘡神效膏二九八治臁瘡腳瘡先看瘡形大小用棉紙裁成四方塊十二張四角用小捻釘住聽用外以好香油二兩用銅杓以文武火熬之先下花椒四十九粒煎黑取起次下槐枝長一寸者四十九節煎黑又取起再次下黃占一兩輕粉二分枯礬一分溶清卻入前紙浸油內令透不可令焦取起聽用凡貼瘡時先將槐枝蔥椒煎湯洗瘡令透拭乾乃以此膏紙貼上外面再以油單紙蓋護乃用軟帛縛定一日取下揭去一層復用湯藥洗淨又貼之盡十二張無有不愈者隔紙膏二九九治臁瘡神效黃耆末五錢輕粉乳香沒藥各一錢銀硃一錢血竭五分銅緑二分上為細末真香油調成膏攤油紙上再用油單紙一層以針刺孔數十掩膏藥上貼之一日一易其膏二味隔紙膏三百治臁瘡濕毒瘡石膏煅枯礬等分上為末用桐油調成膏作隔紙膏貼之更服荊防敗毒散如數劑不愈再服黃耆人參湯爛腿瘡久不愈方三百一用米糖即膠飴也以碗盛於飯鍋內蒸化先用花椒荊芥防風等藥煎湯洗瘡淨乃將膠飴薄攤瘡上外以軟竹箬蓋定用絹縛之數日即愈神效凍瘡方三百二瀝青末黃蠟各一兩麻油一兩上三味溶化搽患處湯火六方三百三凡初被湯火所傷速用冷灶柴草灰一二升入鹽少許以涼水調如稀糊嘗味微咸為度用以厚攤傷處覺熱則易之連易數次則火毒皆拔於灰中必腫痛隨散結痂而愈誠神妙方也又方治潰爛腫痛者用生桐油調人中白敷之即愈亦妙方也又方用皂礬研細和以冷水澆傷處其疼立止其腫即消又方用大黃芒硝等分為末雞子清調貼之神效又方用石膏末香油調敷即愈又赤石脂散治湯火傷肉爛赤痛赤石脂寒水石大黃等分上為末新汲水調塗湯火至聖膏三百四治湯火傷瘡用雞子黃置銀石器內熬油調胡粉敷之錦衣楊永興廚下夜間回祿凡睡此房已死將死者灌以生蘿蔔汁良久悉愈凡遇此患者以此治之其應如響湯火止痛散三百五止痛生肌大黃末微炒當歸末等分上用麻油調搽或乾摻亦可小兒丹毒三百六此毒多生頭面四肢色赤或腫遊走不定甚者宜用前瓷鋒砭法使毒血遇刺皆出更以神功散敷之內服荊防敗毒散或五福化毒丹若使毒氣入腹則不治或愈而復發皆因母食辛辣炙煿以致肉熱宜於母藥中加漏蘆煎服或令自服亦愈小兒鵝口三百七凡小兒口內白屑滿口者為鵝口瘡則不能飲乳用發或軟絹纏指醮井水拭舌上使淨如屑不能脫濃煮栗木湯以綿纏箸頭拭洗卻用飛過黃丹搽之加味太乙膏三百八一切瘡瘍並宜貼之先用隔蒜炙更服活命飲以收全功當歸生地黃芍藥玄參大黃各二兩加甘草四兩用麻油二斤煎丹收景嶽會通膏三百九凡諸癰毒痞塊風氣骨節疼痛無所不治大黃木鱉仁當歸川芎芍藥生地麻黃細辛白芷防風荊芥蒼朮羌活川烏甘草烏藥南星半夏香附官桂蒼耳骨碎補草烏艾葉皂角枳殼三稜蓬朮蘿蔔子水紅花子巴豆五倍獨活桃仁蘇木紅花續斷連翹梔子苦參槐花皂刺乾薑萆麻子透骨草曬乾穿山甲全蠍殭蠶蜂房各一兩蛇蛻一大條蜈蚣十四根蝦蟆三隻血餘一團獨蒜四頭上五十四味用麻油五斤浸三日先煎血餘萆麻木鱉桃仁巴豆蝦蟆獨蒜待半枯然後人余藥煎黑去滓丹收後下細藥十味阿魏二兩乳香制沒藥制各一兩木香丁香雄黃硃砂血竭兒茶各五錢麝香不拘一二錢上麝香丁香木香三味宜最後下之以上收油法凡熬成熟油一斤下飛淨好紅丹八兩若欲微嫩則止下七兩五錢神異膏三百十治癰疽瘡毒及收口甚效此瘡瘍中第一方也麻油二斤黃丹十二兩黃耆杏仁玄參名一兩蛇蛻半兩男發如雞子團蜂房子多者佳一兩上先以黃耆杏仁玄參入油煎至將黑乃入蛇蛻蜂房亂髮再煎至黑去柤徐徐下丹慢火煎收黃丹不必拘數但以得中為度凡膏藥用久必至老硬煎時預留嫩膏少許如硬量和之清涼膏三一一治一切瘡瘍潰後宜用之當歸二兩白芷白芨木鱉子黃柏白蘞乳香白膠香各五錢黃丹五兩淨淨麻油十二兩上用油煎前六味以槐柳枝順攪油熟丹收然後下乳香等二味阿魏膏三一二治一切痞塊更服胡連丸羌活獨活玄參官桂赤芍藥穿山甲生地黃兩頭尖大黃白芷天麻紅花各半兩木鱉十枚去殼亂髮一團槐柳桃枝各半兩上用麻油二斤四兩煎藥黑去柤入發再煎發化仍去柤入上好真正黃丹煎收軟硬得中入後細藥即成膏矣阿魏芒硝蘇合油乳香沒藥各五錢麝香三錢上凡貼膏藥須先用朴硝隨患處鋪半指厚以紙蓋用熱尉斗尉良久如硝耗再加尉之二時許方貼膏藥若是肝積加蘆薈末同尉之硃砂膏三一三治一切頑瘡破瘡杖瘡癰疽發背破傷者最妙最佳麻油一斤飛母六兩水銀一兩硃砂佳者一兩半飛好黃蠟四兩先下油熬數沸下雞子二枚敲開連殼投之熬焦撈去子退火俟油定下水銀五錢再加微火攪熬飯頃即入丹漸收成膏後下黃占再攪候大溫下極細好硃砂一兩五錢攪勻瓷罐收貯神效當歸膏三一四治一切發背瘡瘍湯火疼痛等證去腐肉生新肉其效如神凡洗拭換膏必須預備即貼之新肉畏風故也如用白蠟尤好此藥生肌止痛補血續筋故與新肉相宜當歸生地黃黃蠟各二兩白蠟當減半麻油六兩上先將當歸地黃各一兩入油煎黑去柤又將二味各入一兩煎至微焦復去滓乃入蠟溶化候冷攪勻即成膏矣用塗患處以紙蓋之如有死肉須用利刀剪去則生肌尤速攻堅敗毒膏三一五亦名乾坤一氣膏專攻痞塊諸瘡毒痔漏當歸熟地生地白芍藥赤芍藥南星半夏三稜蓬朮木鱉兩頭尖穿山甲巴豆仁肉桂五靈脂桃仁續斷玄參玄胡索萆麻子仁白芷羌活獨活大黃紅花川烏草烏蘇木川芎防風杏仁各一兩上用麻油四十兩浸諸藥三日桑柴火煎成丹收後下細藥乳香制沒藥制各一兩真阿魏一兩半麝香三錢上方於細藥中加蘆薈木香各一兩蟾酥三錢即名消痞大成膏消痞膏三一六三稜蓬朮穿山甲木鱉仁杏仁水紅花子蘿蔔子透骨草曬乾大黃各一兩獨頭蒜四個上用香油一斤入前藥十味煎油成以飛丹收之後下細藥真阿魏乳香沒藥各一兩麝香三錢上先下乳沒阿魏三味後下麝香攪勻待冷傾水中浸數日用瓷瓶收貯勿使泄氣用時以白布或堅白紙攤貼八九日一換或見大便去膿血勿以為異亦有不去膿血而自愈者若治瀉痢可貼臍腹忌房事生冷凡貼症積痞塊先用蕎麥麵和作一圈圍住患處四邊其塊上放皮硝二三兩蓋厚紙以尉斗尉令熱氣內達然後去硝用膏藥貼之上原方用白花菜同透骨草另煎膏二兩攪入膏內收用但白花菜惟西北方間有之求覓不易故余用獨蒜蘿蔔子代之其功亦不減也琥珀膏三一七治頸項瘰癧及腋下初結小核漸加連珠不消不潰或潰而膿水不絶經久不瘥或成漏證琥珀白芷防風當歸木鱉子木通各一兩丁香桂心硃砂木香松香各半兩麻油二斤上先將琥珀等六味為末其餘藥入油煎黑濾去柤徐入黃丹再煎軟硬得中入前藥成膏貼之貼痞琥珀膏三一八貼症積痞塊大黃朴硝各一兩為末以大蒜同搗膏貼之水紅花膏三一九貼痞塊用水紅花或子每一碗以水三碗用桑柴文武火熬成膏量痞大小用紙攤貼以無方為度仍將膏用酒調服忌葷腥油膩不飲酒者白湯下火龍膏三百二十治風寒濕毒所襲筋骨攣痛及濕痰流注經絡壅痛不能行步並治歷節風鶴膝風其效如神生薑八兩取汁乳香為末沒藥為末各五錢麝香一錢真牛皮廣膠二兩上先將薑汁並膠熔化方下乳香沒藥調勻待少溫下麝香即成膏矣攤貼患處更服五積散如鶴膝風須服大防風湯趙府膏三二一專貼疼痛腫毒干蝦蟆三個全蠍殭蠶各一兩蜈蚣四條斑蝥四十個商陸根一兩六錢花椒一錢童子發六分雞內金二個槐枝三寸長者各四十根細藥兒茶乳香沒藥血竭龍骨黃占白占各五錢麝香一錢上用麻油二斤煎飛丹收密陀膏三二二此膏治臁濕諸瘡風漏等證神效凡治疼痛先以蔥姜擦患處然後貼之先用密陀僧一二斤打碎將童便煮之覺其濁性去而童便氣清乃可止矣用便煮過則貼瘡不痛晾乾研極細如面候用用桐油不拘幾斤熬至將黑為度每熟油一斤用陀僧六兩收之於將成膏之頃取起離火候稍涼量膏多少入冷水數碗徐攪之恐其泛出俟少定即逼去其水再上火熬化復入水數碗攪逼如前或三次更妙然後熬淨其水每油一斤再入官粉二兩熬收其色方黑凡熬此者銅鍋須大方可用八仙紅玉膏三二三治諸瘡龍骨赤石脂兒茶血竭沒藥乳香各一錢輕粉五分或一錢冰片二分上用麻油二兩入當歸五錢煎枯去滓入龍石茶蠍四味再煎一二沸次入乳沒略煎勻後入黃占五錢溶化冷定入輕冰攤貼碧油膏三二四止痛排膿灸後宜用之桃枝柳枝桑枝槐枝各二兩乳香另研血竭各五錢黃丹四兩淨上用麻油十兩煎膏成後下乳香血竭長肉膏三二五人參黃耆當歸夜合樹皮玄參各一兩血餘三兩老鼠一個細藥血竭龍骨赤石脂白臘各五錢上用麻油一斤煎飛丹收保養元氣膏三二六此膏助元陽補精髓通血脈鎮玉池養龜存精百戰百勝待婦人經淨之時去膏而泄則可成孕並治腰膝疼痛五勞七傷諸虛百損半身不遂膀胱疝氣帶濁淫淋陰痿不舉無不效者此邵真人進御方也麻油一斤四兩入甘草二兩先熬六七滾然後下諸藥生地黃熟地黃俱酒洗麥門冬肉蓯蓉酒洗遠志肉蛇床子酒浸菟絲子酒浸牛膝酒洗鹿茸川續斷虎骨紫梢花木鱉仁穀精草大附子肉桂各五錢上熬成以煮過鬆香四兩飛丹半斤收之次下細藥次下龍骨倭硫黃赤石脂各二錢又次下乳香沉香丁香木香各一錢又次下陽起石三錢麝香五分蟾酥鴉片各一錢又次下黃占五兩上煎成入井中浸三四日每用膏七八錢紅絹攤貼臍上或腰眼間每帖五六十日再換藥煮松香法三二七凡用松香收膏藥者必用水多煮一二遍去其澀燥之性方可貼瘡不痛若用貼症痞血塊則當加藥如後法煮過用之方妙大都松香三斤用皮硝一碗水紅花四兩大黃當歸生地各二兩三稜蓬朮各一兩上藥七味用水一桶先熬汁去滓淨用煮松香徐徐添入以汁完為度收用之極佳一收油之法凡煮過鬆香一斤入熬熟藥油五兩即成膏矣以下通用方四君子湯三二八方在補陳一治瘡瘍脾胄虛弱或因克伐腫痛不散潰斂不能宜用此以補脾胃諸證自愈若誤用攻毒則七惡隨至脾胃虛弱飲食少思或食而難化或欲作嘔或大便不實若脾胄氣虛瘡口出血吐血便血尤其用之蓋氣能攝血故也凡氣血俱虛之證宜於此湯但加當歸脾胄既旺飲食自進陰血自生若用沉陰之劑脾胃復傷諸症蜂起六君子湯三二九方在補陳五治脾胃虛弱或寒涼克伐腫痛不潰斂宜服此湯以壯營氣則諸證自愈加味四君子湯三百三十方在補陳二治痔漏下血面色痿黃凡諸氣虛脾虛不能攝血等證四物湯三三一方在補陳八治瘡瘍血虛發熱或因失血或因克伐或因潰後致晡熱內熱煩躁不安皆宜服之蓋血生於脾脾虛不能生血者宜用四君子加當歸酒炒白朮以補脾八珍湯三三二方在補陳十九治瘡瘍脾胄損傷惡寒發熱煩躁作渴或瘡瘍潰後氣血虧損膿水清稀久不能愈十全大補湯三三三方在補陳二十治瘡瘍氣血虛弱腫痛不愈或潰瘍膿清寒熱自汗盜汗食少體倦發熱作渴頭痛眩暈似中風狀者補中益氣湯三三四方在補陳三十治瘡瘍元氣虧損惡寒發熱或因克伐肢體倦怠飲食少思或不能起發消散生肌收斂或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或微細軟弱歸脾湯三三五方在補陳三十二治瘡瘍憂思傷脾血虛發熱食少體倦或脾不攝血以致妄行或健忘怔忡驚悸少寐或心脾作痛自汗盜汗或肢體腫痛大便不調或婦人經候不調晡熱內熱或唇瘡流注及不能消散潰斂等症獨參湯三三六方在補陳三十七治瘡瘍一切失血或膿水出多氣血俱虛惡寒發熱作渴煩躁蓋血生於氣故血脫者宜補氣陽生陰長之理也用人參一兩棗十枚姜十片水煎徐徐服人參養營湯三三七方在補陳二十一治瘡瘍脾胃虧損發熱惡寒血氣俱虛四體倦怠肌肉消瘦面色痿黃汲汲短氣食少作渴凡大病後最宜用此五味異功散三三八方在補陳四治脾胃虛弱飲食少思即四君子湯加陳皮生脈散三三九方在補陳五六治瘡瘍胃氣虧損陰火上衝口乾喘促或肢體倦怠肌肉消瘦面色痿黃汲汲短氣汗出不止食少作渴或膿水出多氣血俱虛煩躁不安睡臥不寧或濕熱大行火土合病脾胃虛弱身重氣短或金為火制絶寒水生化之源肢體痿軟腳欹眼黑等證當歸補血湯三百四十方在補陳四四治瘡瘍脾胃虛損或服峻劑致血氣俱虛肌熱大渴引飲目赤而紅晝夜不息其脈洪大而虛重按全無此病多得於飢飽勞役者若誤服白虎湯必死黃耆六一湯三四一方在補陳四九治瘡瘍陰陽俱虛盜汗不止參朮膏三四二方在補陳三九治瘡瘍中氣虛弱諸藥不應或因用藥失宜耗傷元氣虛症蜂起但用此藥補其中氣諸症自愈東垣聖愈湯三四三方在補陳九十治脾胃虧損膿水不止或金瘡出血心煩不安眠睡不寧五心煩熱飲食少思錢氏七味白朮散三四四方在小兒七治瘡瘍胃氣虛弱或因克伐或因吐瀉口乾作渴飲食少思陳氏五味子湯三四五方在補陳五八治瘡瘍腎水枯涸口燥咽乾喘促虛煩參附湯三四六方在補陳三十七治瘡瘍失血過多或膿瘀大泄或寒涼汗下真陽脫陷上氣喘急自汗盜汗氣短頭暈等證急服此湯以救元氣緩則不治人參理中湯三四七方在熱陳一治瘡瘍脾胃虛寒嘔吐泄瀉飲食少思肚腹作脹或痛或胸膈虛痞飲食不入六味丸三四八方在補陳百二十此壯水之劑夫人之生以腎為主凡病皆由腎虛而致此方乃天一生水之劑無有不可用者若腎虛發熱作渴小便淋祕痰氣壅盛咳嗽吐血頭目眩暈小便短少眼花耳聾咽喉燥痛口舌瘡裂齒不堅固腰腿痿軟五臟齊損肝經不足等症尤多用之水能生木故也若腎虛發熱自汗盜汗便血諸血失喑此水泛為痰之聖藥血虛發熱之神劑也八味丸三四九方在補陳百二一治命門火衰不能生土以致脾胄虛寒而患流注鶴膝等症不能消潰收斂或飲食少思或食而不化臍腹疼痛夜多漩溺陳氏加減八味丸三百五十方在古補百二二治腎水不足虛火上炎發熱作渴咽喉疼痛口舌生瘡寢汗憔悴等證還少丹三五一方在補陳一三五治足三陰經虛損致患鶴膝風等證又補脾腎進飲食之良劑也大防風湯三五二方在補陳九八治足三陰虧損外邪乘虛內患鶴膝風或附骨疽腫痛或腫而不痛不問已潰未潰用三五劑後更全用調補之劑十宣散三五三方在痘疹十四治瘡瘍脈緩澀體倦惡寒或脈浮緊細用之以散風助陽也薛氏四神丸三五四方在熱陳一五一治瘡瘍脾腎虛弱大便不實飲食少思或小腹作痛或産後泄瀉肚腹作痛不思飲食五積散三五五方在散陳三九治風寒濕毒客於經絡致筋攣骨痛或腰腳痠疼或拘急或身重並皆治之二陳湯三五六方在和陳一治瘍癰中脘停痰嘔吐噁心或頭目不清飲食少思等症小柴胡湯三五七方在散陳十九治肝膽經風熱瘰癧結核或腫痛色赤或寒熱往來或日晡發熱或潮熱身熱默默不欲飲食或怒火口苦耳聾咳嗽皆用此藥小青龍湯三五八方在散陳八治肝肺受寒咳嗽喘急宜服此發散表邪人參敗毒散三五九方在散陳三六治瘡瘍外有表邪焮痛寒熱或拘急頭痛脈緊有力不換金正氣散三百六十方在和陳二二治瘡瘍脾氣虛弱寒邪相搏痰停胸膈致發寒熱服此以正脾氣則痰氣自消寒熱不作加味道遙散三六一方在補陳九三治瘡瘍肝脾血虛內熱發熱或遍身瘙癢寒熱或肢體作痛頭目昏重或怔忡頰赤口燥咽乾或發熱盜汗食少不寐或口舌生瘡耳內作痛或胸乳腹脹小便缺利防風通聖散三六二方在攻陳十六治時毒熱毒便祕熱燥邪實等症若非大滿大實者不可服用此藥消風散三六三方在散陳四七四九治風熱癮疹瘙癢及婦人血風瘙癢或頭皮腫癢或諸風上攻頭目昏眩項背拘急鼻出清水噴嚏聲重耳作蟬鳴犀角散三六四方在痘疹六三治時毒癰瘍熱盛煩躁多渴赤斑等症黃連解毒湯三六五方在寒陳一治瘡瘍焮痛煩躁飲冷脈洪數或發狂言普濟消毒飲三六六方在寒陳十三治天行時毒頭面腫痛或咽喉不利若饑饉之後患此者最宜用之仍當兼固胃氣梔子清肝散三六七方在寒陳六十治三焦足少陽風熱耳內作癢生瘡或出水疼痛或胸乳間作痛或寒熱往來柴胡清肝散三六八方在寒陳五九治鬢疽及肝膽三焦風熱怒火之症或頭胸作痛或瘡毒發熱加味龍膽瀉肝湯三六九方在寒陳六四治肝經濕熱或囊癰便毒下疳懸癰焮腫作痛或潰爛不愈或睪丸懸掛小便澀滯或婦人陰瘡癢痛或男子陰挺痔漏腫痛或出膿水清心蓮子飲三百七十方在寒陳三二治膀胱陰虛濕熱玉莖腫痛或莖竅澀滯口苦咽乾小便色赤或白濁夜安靜而晝發熱黃芩清肺飲三七一方在寒陳三八治瘡瘍肺經陰虛火燥而小便不通東垣清胃散三七二方在寒陳五四治膏粱積熱唇口腫痛齒齦潰爛焮痛上連頭面或惡寒發熱竹葉石膏湯三七三方在寒陳五治癰疽胃火盛腫痛作渴竹葉黃耆湯三七四方在寒陳七治癰疽氣血虛胃火盛而作渴滋腎丸三七五方在寒陳一六三治瘡瘍腎經陰虛發熱作渴便赤足熱腿軟等證凡不渴而小便祕熱在下焦血分也最宜此藥經云無陰則陽無以化若脾肺燥熱所移此當清其化源瀉青丸三七六方在寒陳百五一治肝經實熱瘰癧腫痛寒熱或脅乳作痛大便祕結大蘆薈丸三七七方在小兒百十五治肝火下疳潰爛或焮腫作痛或治小兒疳膨食積口鼻生瘡牙齦蝕爛等瘡並蟲蝕肛門癢痛五苓散三七八方在和陳一八二治瘡毒下部濕熱小便短少五淋散三七九方在寒陳百十七治膀胱有熱水道不通或尿如豆汁或如砂石或如膏油或熱沸便血八正散三百八十方在寒陳百十五治下疳便毒小便淋漓脈證俱實者清肺飲三月八一方在和陳三五一治瘡瘍渴而小便不利乃肺經有熱是絶寒水生化之源宜用此藥以清化源其水自生而便自利益元散三八二方在寒陳百十二治瘡瘍小水不利內生煩熱作渴四順清涼飲三八二方在攻陳二五治瘡瘍煩躁飲冷焮痛脈實大便祕結小便赤澀玉燭散三八四方在攻陳二四治便癰初起腫痛發熱大小便祕宜用此行散之若邪實毒甚者宜桃仁承氣湯人參平肺散三八五方在寒陳三七治火克肺金傳為疽痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利葶藶大棗瀉肺湯三八六方在和陳百四十治肺證胸膈脹痛上氣喘急或身面浮腫鼻塞聲重枳殼散三八七方在寒陳百一治煩熱便血失笑散三八八方在婦人百四治跌撲産後心腹絞痛或不知人事或經行瘀血作痛成癃槐角丸三八九方在寒陳一七五治痔漏腫痛便血脫肛紫金錠三百九十方在因陳二百二治癰疽諸毒良方通關散三九一方在古因九八搐鼻開牙關
