body:
  text: 卷之六十四春集外科鈐古方外科仙方活命飲一治一切瘡瘍不成膿者內消已成膿者即潰此止痛消毒之聖藥也穿山甲蛤粉炒黃白芷防風天花粉赤芍藥歸尾乳香沒藥貝母皂刺甘草各二錢金銀花陳皮各三錢酒一碗煎數沸溫服托裡消毒散二治瘡疽元氣虛弱或行攻伐不能潰散服之未成即消已成即潰腐肉即去新肉即生若腐肉既潰而新肉不能收斂屬氣虛者四君子湯為主屬血虛者四物湯為主氣血俱虛者十全大補湯為主並忌寒涼消毒之劑人參隨證增減黃耆鹽水拌炒當歸川芎芍藥炒白朮炒茯苓各一錢金銀花白芷各七分甘草連翹各五分上水煎服陳氏托裡消毒散內多陳皮方在痘瘡祕方托裡散三治一切瘡毒始終常服不致內陷栝蔞大者一個杵當歸酒拌黃耆鹽水炒白芍藥甘草各一兩半熟地天花粉金銀花皂刺炒各一兩上每用藥五兩以無灰酒五茶鍾入瓷器內厚紙封口再用油紙重封置湯鍋內蓋煮至藥香取出分服直至瘡愈立齊曰此方藥品平易消毒之功甚大且不動臟腑不傷血氣不問陰陽腫潰屢用屢效真仙方也常治發背腦疽勢盛者更用隔蒜灸之若脈沉實大小便祕者先用疏通而後用此其功甚捷若火毒已退不作膿或不潰者更宜托裡潰而不斂及膿清者用峻補神功托裡散四一名金銀花散治癰疽發背腸癰乳癰及一切腫毒或焮痛憎寒壯熱金銀花黃耆當歸甘草等分上用酒水各一鍾煎至一鍾分病上下食前食後服之少頃再服一劑柤敷息處不問老少虛實皆可服若為末酒調服尢妙參耆托裡散五治瘡瘍氣血俱虛不能起發或腐潰不能收斂及惡寒發熱者人參氣虛多用之黃耆炒白朮炒當歸熟地芍藥酒炒茯苓陳皮各一錢上水煎服參耆內托散六方在痘疹七治癰疽膿毒不化及潰後作痛托裡養營湯七治瘰癧流注及一切癰疽不足之證不作膿或不潰或潰後發熱或惡寒肌肉消瘦飲食不思睡臥不寧盜汗不止人參黃耆炙當歸酒拌川芎芍藥炒白朮炒各一錢熟地二錢五味子炒研麥冬甘草各二分水二鍾姜三片棗一枚煎七分食遠服托裡黃耆湯八治癰疽氣虛作渴甚效黃耆蜜炒六錢甘草天花粉各一錢水二鍾煎八分頻服之加人參一錢亦可若氣血俱虛膿血大泄而作渴或兼發熱者宜用托裡養營湯內補黃耆湯九治癰毒內虛毒不起化及潰後諸虛迭見黃耆炙麥冬各一兩人參熟地茯苓甘草炙各七分白芍藥當歸川芎遠志官桂各五分上每服一兩薑棗水煎服托裡當歸湯十治潰瘍氣血俱虛或晡熱內熱寒熱往來或婦人諸瘡經候不調小便頻數大便不實等證但瘡瘍氣血虛而發熱者皆宜服之久服亦收斂瘡口人參黃耆當歸熟地川芎芍藥各一錢柴胡甘草各五分上水煎服托裡健中湯十二治瘡瘍元氣素虛或因涼藥傷胃飲食少思或作嘔瀉等證人參白朮茯苓各二錢半夏炮姜各一錢黃耆一錢半炙甘草五分肉桂三分上薑棗水煎服托裡溫中湯十二治瘡瘍膿潰元氣虛寒或因克伐胃氣脫陷腸鳴腹痛大便溏泄神思昏憒此寒變內陷緩則不治附子炮去皮臍二錢乾薑炒三錢益志丁香羌活沉香木香茴香陳皮各一錢炙甘草二錢上薑水煎服托裡益中湯十三治中氣虛弱飲食少思或瘡不消散或潰而不斂人參白朮茯苓炮姜陳皮半夏各一錢木香炙甘草各五分上薑棗水煎服托裡溫經湯十四治瘡瘍寒覆皮毛郁遏經絡不得伸越熱伏營中聚結赤腫作痛惡寒發熱或痛引肢體若頭面腫痛焮甚仍宜砭之麻黃升麻防風乾葛白芷人參當歸芍藥甘草蒼朮各一錢上水二鍾煎一鍾服臥暖處得汗乃散或加柴胡托裡益黃湯十五治脾土虛寒水反侮土以致飲食少思或嘔吐泄瀉等證人參白朮茯苓陳皮半夏各一錢炮姜丁香炙甘草各五分上薑棗水煎服托裡清中湯十六治脾胃虛弱痰氣不清飲食少思等證人參白朮茯苓陳皮各一錢半夏八分桔梗七分甘草五分上薑棗水煎服托裡抑青湯十七治肝木侮脾脾土虛弱以致飲食少思或胸膈不利等證人參白朮茯苓半夏陳皮各一錢芍藥柴胡甘草各五分上薑棗水煎服托裡營衛湯十八治瘡瘍外無焮腫內便調和乃邪在經鉻也宜用此藥人參黃耆當歸甘草炙紅花柴胡連翹蒼朮米泔浸炒羌活防風黃芩各一錢桂枝七分上酒水煎服托裡越鞠湯十九治六郁所傷脾胄虛弱飲食少思等證人參白朮各二錢陳皮半夏各一錢山梔川芎香附蒼朮各七分炙甘草五分上薑棗水煎服定痛托裡散二十治瘡瘍血虛疼痛之聖藥也粟殼去蒂炒二錢當歸酒拌白芍藥炒川芎各一錢半乳香沒藥肉桂各一錢上薑棗水煎服內托復煎散二一治瘡瘍焮腫在外其脈多浮邪勝必侵於內宜用此托之人參白朮炒當歸黃耆鹽水炒芍藥炒茯苓甘草炙地骨皮肉桂防己酒炒黃芩各一錢防風二錢上先以蒼朮一升水五升煎去朮入藥再煎至二升終日飲之內托羌活湯二二治臀癰堅硬腫痛兩尺脈緊無力羌活黃柏各一錢防風當歸尾藁本肉桂各一錢連翹蒼朮米泔浸炒陳皮各五分黃耆鹽水炒一錢半上水酒各一鍾煎八分食前服內塞散二三治陰虛陽邪湊襲患腫或潰而不斂或風寒襲於患處血氣不能運行久不能愈遂成漏證附子童便浸炮肉桂去皮赤小豆甘草炙黃耆鹽水炒當歸酒拌茯苓白芷桔梗炒川芎人參遠志去骨厚朴制各一兩防風四錢上為末每服二錢空心溫酒下或酒糊丸鹽湯下或煉蜜為丸亦可沖和湯二四治瘡屬半陰半陽似潰非潰似腫非腫此因元氣虛弱失於補托所致人參陳皮各二錢黃耆白朮當歸白芷各一錢半茯苓川芎皂角刺炒乳香沒藥金銀花甘草節各一錢上水酒各半煎服神效酒煎散二五治一切瘡瘍能托毒散毒其效如神人參沒藥另研當歸尾各一兩甘草三錢栝蔞一個半生半炒上以酒三碗煎二碗分四服或以為末酒糊丸桐子大每服五十丸用酒下善消毒活血人參黃耆湯二六治潰瘍飲食少思無睡發熱人參白朮蒼朮麥冬陳皮當歸升麻各五分黃耆一錢黃柏炒四分上水煎服黃耆人參湯二七治潰瘍虛熱無睡少食或穢氣所觸作痛黃耆鹽水炒二錢人參白朮蒼朮米泔浸炒當歸酒拌麥門冬五味子炒敲各一錢甘草炙升麻神麯炒陳皮各五分黃柏酒炒三分水兩鍾姜三片棗一枚煎服黃耆建中湯二八內托癰疽諸毒黃耆蜜炙肉桂各三兩甘草炙二兩白芍藥六兩上每服一兩薑棗水煎服參朮補脾湯二九治肺疽脾氣虧損久咳吐膿或中滿不食必服此藥補脾土以生肺金否則不治人參白朮各二錢黃耆二錢半茯苓當歸陳皮各一錢麥冬七分北五味四分桔梗六分炙甘草五分上薑棗水煎服參耆補肺湯三十治肺證咳喘短氣或腎水不足虛火上炎痰涎壅盛或吐膿血發熱作渴小便短澀人參黃耆白朮當歸陳皮茯苓各一錢山藥山茱萸各二錢五味子炙甘草各五分熟地黃一錢半麥門冬牡丹皮各八分上薑棗水煎服益氣養營湯三一治懷抱抑鬱或氣血損傷四肢頸項等處患腫不問軟硬赤白腫痛或日晡發熱或潰而不斂人參黃耆鹽水炒當歸川芎熟地芍藥炒貝母香附茯苓陳皮各一錢白朮二錢柴胡六分甘草桔梗各五分上薑水煎服口乾加五味子麥門冬往來寒熱加軟柴胡地骨皮膿清加人參黃耆膿多加川芎當歸膿不止加人參黃耆當歸肌肉遲生加白蘞官桂補陰八珍湯三二治瘰癧等瘡足三陰虛者人參白朮茯苓甘草當歸川芎熟地芍藥黃柏酒炒知母酒炒各七分上水煎服參朮姜附湯三三治瘡瘍真陽虧損或誤行汗下或膿血出多失於補托以致上氣喘急自汗盜汗氣短頭暈泄瀉人參附子炮去皮臍各一兩乾薑白朮各五錢上作二劑水煎服附子理中湯三四治瘡瘍脾胃虛寒或誤行攻伐手足厥冷飲食不入或腸鳴腹痛嘔逆吐瀉附子人參白茯苓白芍藥各三錢白朮四錢上水煎服六物附子湯三五治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利或手足浮腫附子制防己桂枝各四錢炙甘草二錢白朮茯苓各三錢上作二劑水一鍾半姜三片煎一鍾食遠服附子八物湯三六治瘡瘍陽氣脫陷嘔吐畏寒泄瀉厥逆附子炮乾薑炮芍藥炒人參炙甘草茯苓各一錢肉桂一錢白朮二錢上水煎食遠服回陽湯三七治脾腎虛寒瘡屬純陰或藥損元氣不腫痛不腐潰或腹痛泄瀉嘔吐厥逆及陽氣脫陷等證人參白朮黃耆各三錢乾薑炮附子炮甘草炙陳皮當歸各二錢柴胡升麻各五分上酒水煎服如不應倍加薑附薛氏加減八味丸三八治瘡瘍痊後及將痊口乾渴甚或舌上生黃或未患先渴此皆腎水枯竭不能上潤以致心火上炎水火不能相濟故煩躁作渴小便頻數或白濁陰痿飲食不多肌膚漸消或腿腫腳先瘦服此以降心火滋腎水則諸證頓止及治口舌生瘡不絶熟地八兩酒蒸搗膏山茱萸酒浸杵膏山藥各四兩澤瀉蒸焙白茯苓牡丹皮各三兩桂心一兩北五味四兩半炒上為細末入二膏加煉蜜少許丸桐子大每服六七十丸五更初言語前或空心用鹽湯送下此即陳氏加減八味丸也方在補陳一二三加味地黃丸三九治肝腎陰虛瘡毒或耳內癢痛出水或眼昏痰氣喘嗽或作渴發熱小便赤澀等證熟地山藥山茱萸白茯苓澤瀉牡丹皮柴胡北五味各為末等分上將地黃掐碎酒拌濕蒸爛杵膏入諸藥和勻加煉蜜為丸桐子大每服百丸空心白湯送下如不應用加減八味丸當歸川芎散四十治手足少陽經血虛瘡證或風熱耳內癢痛生瘡出水或頭目不情寒熱少食或婦女經水不調胸膈不利脅腹痞痛當歸川芎柴胡白朮芍藥各一錢山梔炒一錢二分牡丹皮茯苓各八分蔓荊子甘草各五分上水煎服加味敗毒散四一治足二陽經熱毒流於腳根焮赤腫痛寒熱如瘧自汗短氣大小便不利或無汗惡寒表裡邪實者宜之羌活獨活前胡柴胡桔梗人參茯苓枳殼甘草川芎大黃蒼朮各一錢水二鍾姜三片煎服九味羌活湯四二方在散陳四四治瘡瘍風熱鬱遏焮腫作痛或遍身作痛或拘急不利及頭痛惡寒脊強脈浮緊加味羌活湯四三即前湯加金銀花連翹用解瘡毒白芷胃風湯四四治手足陽明經氣虛風熱面目麻木或牙關緊急眼目瞤動白芷升麻各二錢半葛根蒼朮米泔炒各八分炙甘草當歸各一錢半草豆蔻黃柏炒柴胡藁本羌活麻黃去節各四分蔓荊子殭蠶各三分上水煎服葛根牛蒡湯四五治時毒腫痛而便利調和者葛根管仲甘草豆豉牛蒡子半生半炒各二錢上水煎服犀角地黃湯四六治胃火血熱妄行吐衄或大便下血犀角鎊為末生地牡丹皮芍藥各一錢半黃芩炒升麻各一錢上水煎熟入犀角末服犀角升麻湯四七治時毒或風熱頭面瘇痛或咽喉不利或鬢疽痄腮等證犀角鎊升麻防風羌活各錢半白芷白附子黃芩各一錢甘草六分上水煎服入犀角末服玄參升麻湯四八治心脾壅熱舌上生瘡或木舌重舌或連頰兩邊腫痛或咽痛發斑並治之元參升麻赤芍藥犀角鎊末桔梗炒管仲黃芩各一錢甘草五分水二鍾煎八分入犀角末食後服升麻黃連湯四九治胃經熱毒腮腫作痛或發寒熱升麻川芎當歸各一錢半連翹黃連牛蒡子白芷各一錢上水煎服若腫連太陽加羌活連耳後加山梔柴胡祕傳連翹湯五十治癰疽時毒腫痛焮腫連翹升麻朴硝各一兩玄參芍藥白蘞防風射干各三錢大黃一兩二錢甘草炙五錢杏仁八十個去皮尖麵炒黃另研上每服五七錢水煎服下惡物後服內托之類五香連翹湯五一治腦疽癰疽時毒邪氣鬱滯不行者乳香木香沉香丁香香附黃耆射干連翹升麻木通獨活桑寄生甘草各一錢上水煎服復元遙氣散五二治乳癰便毒腫