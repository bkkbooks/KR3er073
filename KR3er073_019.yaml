body:
  text: 卷之十九明集雜證謨咳嗽經義咳論黃帝問曰肺之令人咳何也岐伯對曰五臟六腑皆令人咳非獨肺也帝曰願聞其狀岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之人與天地相參故五臟各以治時感於寒則受病微則為咳甚則為泄為痛乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之肺咳之狀咳而喘息有音甚則唾血心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右脅下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎帝曰六腑之咳奈何安所受病岐伯曰五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺矢心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也帝曰治之奈何岐伯曰治臟者治其俞治腑者治其合浮腫者治其經帝曰善生氣通天論曰秋傷於濕上逆而咳陰陽應象大論曰秋傷於濕冬生咳嗽示從容論曰咳嗽煩冤者是腎氣之逆也喘咳者是水氣並陽明也脈解篇曰少陰所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也陰陽別論曰一陽發病少氣善咳善泄五臟生成篇曰咳嗽上氣厥在胸中過在手陽明太陰玉機真藏論曰秋脈不及則令人喘呼吸少氣而咳上氣見血下聞病音刺禁論曰刺中肺三日死其動為咳評熱病論曰勞風法在肺下詳後論證條中氣交變大論凡歲火太過歲金太過歲水太過歲木不及等年俱有咳證五常政大論凡審平之紀從革之紀堅成之紀少陽司天等年俱有咳證至真要大論凡少陰司天太陰司天少陽司天陽明司天陽明之勝少陰之復太陰之復少陽之復陽明之復厥陽司天客勝少陽司天主勝太陽司天客勝等年俱有咳證五邪篇曰邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩背繆刺論曰邪客於足少陽之絡令人脅痛不得息咳而汗出論證共四條咳嗽一證竊見諸家立論太繁皆不得其要多致後人臨證莫知所從所以治難得效以余觀之則咳嗽之要止惟二證何為二證一曰外感一曰內傷而盡之矣夫外感之咳必由皮毛而入蓋皮毛為肺之合而凡外邪襲之則必先入於肺久而不愈則必自肺而傳於五臟也內傷之嗽必起於陰分蓋肺屬燥金為水之母陰損於下則陽孤於上水涸金枯肺苦於燥肺躁則癢癢則咳不能已也總之咳證雖多無非肺病而肺之為病亦無非此二者而已但於二者之中當辨陰陽當分虛實耳蓋外感之咳陽邪也陽邪自外而入故治宜辛溫邪得溫而自散也內傷之咳陰病也陰氣受傷於內故治宜甘平養陰陰氣復而嗽自愈也然外感之邪多有餘若實中有虛則宜兼補以散之內傷之病多不足若虛中挾實亦當兼清以潤之大都咳嗽之因無出於此於此求之自得其本得其本則治之無不應手又何有巢氏之十咳證陳氏之三因證徒致亂人心目而不得其際也留心者其熟味此意一經云肺之令人咳又曰五臟六腑皆令人咳非獨肺也又曰皮毛先受邪氣邪氣以從其合也又曰五臟各以其時受病非其時各傳以與之然則五臟之咳由肺所傳則肺為主臟而五臟其兼者也故五臟六腑各有其證正以辨其兼證耳既有兼證則亦當有兼治雖有兼治然無非以肺為主也是固然矣然愚則猶有說焉則謂外感之咳與內傷之咳其所本不同而所治亦異蓋外感之咳其來在肺故必由肺以及臟此肺為本而臟為標也內傷之咳先因傷臟故必由臟以及肺此臟為本而肺為標也凡治內傷者使不知治臟而單治肺則真陰何由以復陰不復則咳終不愈治外感者使不知治陽而妄治陰則邪氣何由以解邪不解則嗽終不寧經曰治病必求其本何今人之不能察也一勞風證內經評熱病論曰勞風法在肺下其為病使人強上冥視唾出若涕惡風而振寒此為勞風之病巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死矣賓按此勞風之證即勞力傷風證也蓋人之勞者必毛竅開而汗液泄所以風邪易入凡今人之患傷風者多有此證故輕者惟三四日重者五七日必咳出濁痰如涕而愈者此即勞風之屬也但以外感之法治之自無不愈其有勞之甚者或內搖其精或外勞其形勞傷既甚精血必虧故邪不能散而痰不能出此即勞損干嗽之類也所以多不可治一外感有嗽內傷亦有嗽此一實一虛治當有辨也蓋外感之嗽必因偶受風寒故或為寒熱或為氣急或為鼻塞聲重頭痛吐痰邪輕者脈亦和緩邪甚者脈或弦洪微數但其素無積勞虛損等證而陡病咳嗽者即外感證也若內傷之嗽則其病來有漸或因酒色或因勞傷必先有微嗽而日漸以甚其證則或為夜熱潮熱或為形容瘦減或兩顴常赤或氣短喉干其脈輕者亦必微數重者必細數弦緊蓋外感之嗽其來暴內傷之嗽其來徐外感之嗽因於寒邪內傷之嗽因於陰虛外感之嗽可溫可散其治易內傷之嗽宜補宜和其治難此固其辨也然或其脈證素弱而忽病外感者有之或其形體素強而病致內傷者亦有之此中疑似但於病因脈色中細加權察自有聲應可證若或認之不真而互謬其治則吉凶攸系不淺也最宜慎之外感嗽證治共五條一外感之嗽無論四時必皆因於寒邪蓋寒隨時氣入客肺中所以致嗽但治以辛溫其邪自散惟六安煎加生薑為最妙凡屬外感悉宜先以此湯加減主之若肺脘燥澀痰氣不利或年老血衰咳嗽費力者於本方加當歸二三錢若寒氣太盛或中寒肺氣不溫邪不能解者於此方加北細辛七八分或一錢若冬月寒盛氣閉邪不易散者即麻黃桂枝俱可加用或用小青龍湯若傷風見寒或傷寒見風而往來寒熱咳嗽不止者宜柴陳煎主之若寒邪不甚痰氣不多者但以二陳湯加減主之則無有不愈一外感之嗽凡屬陰虛少血或脾肺虛寒之輩則最易感邪但察其脈體稍弱胸膈無滯或腎氣不足水泛為痰或心𩞄嘔惡飢不欲食或年及中衰血氣漸弱而咳嗽不能愈者悉宜金水六君煎加減主之足稱神劑若兼陽分氣虛而脈微神困懶言多汗者必加人參勿疑也若但以脾胃土虛不能生金而邪不能解宜六君子湯以補脾肺或脾虛不能制水泛而為痰宜理中湯或理陰煎八味丸之類以補土母皆良法也一外感咳嗽而兼火者必有內熱喜冷脈滑等證亦但以二陳六安等湯酌加涼藥佐之熱微者可加黃芩一二錢熱甚者再加知母梔子之屬若火在陽明而兼頭痛熱渴者惟加石膏為宜一外感之證春多升浮之氣治宜兼降如澤瀉前胡海石栝蔞之屬是也夏多炎熱之氣治宜兼涼如芩連知柏之屬是也秋多陰濕之氣治宜兼燥如蒼朮白朮乾薑細辛之屬是也冬多風寒之氣治宜兼散如防風紫蘇桂枝麻黃之屬是也經言歲氣天和即此之類然時氣固不可不知而病氣尤不可不察若當其時而非其病及時證有不相合者又當舍時從證也至於各臟之氣證有兼見者又當隨宜兼治故不可任膠柱之見一咳嗽凡遇秋冬即發者此寒包熱也但解其寒其熱自散宜六安煎二陳湯金水六君煎三方察其虛實壯老隨宜用之如果內熱甚者不妨佐以黃芩知母之類內傷嗽證治共七條一凡內傷之嗽必皆本於陰分何為陰分五臟之精氣是也然五臟皆有精氣而又惟腎為元精之本肺為元氣之主故五臟之氣分受傷則病必自上而下由肺由脾以及於腎五臟之精分受傷則病必自下而上由腎由脾以極於肺肺腎俱病則他臟不免矣所以勞損之嗽最為難治正以其病在根本而不易為力也病在根本尚堪治不求本乎故欲治上者不在乎上而在乎下欲治下者不在乎下而在乎上知氣中有精精中有氣斯可以言虛勞之嗽矣一肺屬金為清虛之臟凡金被火刑則為嗽金寒水冷亦為嗽此咳嗽所當治肺也然內傷之嗽則不獨在肺蓋五臟之精皆藏於腎而少陰腎脈從腎上貫肝膈入肺中循喉嚨挾舌本所以肺金之虛多由腎水之涸正以子令母虛也故凡治勞損咳嗽必當以壯水滋陰為主庶肺氣得充嗽可漸愈宜一陰煎左歸飲瓊玉膏左歸丸六味地黃丸之類擇而用之其有元陽下虧生氣不布以致脾困於中肺困於上而為喘促為痞滿為痰涎嘔惡為泄瀉畏寒凡脈見細弱證見虛寒而咳嗽不已者此等證候皆不必治嗽但補其陽而嗽自止如右歸飲右歸丸八味地黃丸大補元煎六味回陽飲理中湯劫勞散之類皆當隨宜速用不得因循以致汲深無及也一內傷咳嗽凡水虧於下火炎於上以致火爍肺金而為乾渴煩熱喉痛口瘡潮熱便結喜冷尺寸滑數等證則不得不兼清火以存其水宜四陰煎或加減一陰煎人參固本丸主之此當與咳血證參酌其治詳見血證門一咳嗽聲啞者以肺本屬金蓋金實則不鳴金破亦不鳴金實者以肺中有邪非寒邪即火邪也金破者以真陰受損非氣虛即精虛也寒邪者宜辛宜溫火邪者宜甘宜清氣虛者宜補陽精虛者宜補陰大都此證邪實者其來暴其治亦易虛損者其來徐其治亦難治損之法當與後乾咳證參酌用之一內傷虛損之嗽多不宜用燥藥及辛香動氣等劑如六安二陳之類皆不可輕用惟甘潤養陰如乳酥蜂蜜百合地黃阿膠麥冬去皮胡桃肉之類皆所宜也一外邪證多有誤認為勞傷而遂成真勞者此必其人氣體柔弱而醫家望之已有成心故見其發熱遂認為火見其咳嗽遂認為勞不明表裡率用滋陰降火等劑不知寒邪既已在表涼藥不宜妄投若外既有寒而內又得寒則表裡合邪必致邪留不解延綿日甚俗云傷風不愈變成勞夫傷風豈能變勞特以庸醫誤治而日加清削則柔弱之人能堪幾多清理久而不愈不至成勞不已也此實醫之所誤耳故醫於此證最當詳察在表在裡及新邪久病等因脈色形氣等辨辨得其真則但以六安煎金水六君煎或柴陳煎之類不數劑而可愈矣醫之不精此其一也一乾咳嗽證在丹溪云火鬱之證乃痰鬱火邪在肺中用苦梗以開之下用補陰降火不已則成勞須用倒倉法此證多是不得志者有之愚謂丹溪此說殊不其然夫既云不得志則其憂思內傷豈痰火病也又豈苦梗倒倉所宜攻也蓋乾咳嗽者以肺中津液不足枯涸而然此明系內傷虧損肺腎不交氣不生精精不化氣所以乾澀如此但其有火無火亦當辨治若臟平無火者止因肺虛故必先補氣自能生精宜五福飲之類主之若臟氣微寒者非辛不潤故必先補陽自可生陰宜理陰煎或六君子湯之類主之若兼內熱有火者須保真陰故必先壯水自能制火宜一陰煎或加減一陰煎兼貝母丸之類主之若以此證而但知消痰開鬱將見氣愈耗水愈虧未免為涸轍之鮒矣辨古河間曰咳謂無痰而有聲肺氣傷而不清也嗽是無聲而有痰脾濕動而為痰也咳嗽謂有痰而有聲蓋因傷於肺氣動於脾濕咳而為嗽也脾濕者秋傷於濕積於脾也故經曰秋傷於濕冬必咳嗽大抵素秋之氣宜清肅而反動之氣必上衝為咳嗽甚則動於濕而為痰也假令濕在肝經謂之風痰濕在心經謂之熱痰濕在脾經謂之濕痰濕在腎經謂之寒痰宜隨證而治之若咳而無痰者以辛甘潤其肺如蜜煎生薑湯蜜煎橘皮湯之屬是也若咳而嗽者當以治痰為先治痰者必以順氣為主是以南星半夏勝其痰而咳嗽自愈枳殼陳皮利其氣而痰自下痰而能食者大承氣湯微下之痰而不能食者厚朴湯疏導之此治法之大體也愚觀河間此說謂治嗽當先治痰因以南星半夏之屬為主似得治嗽之法矣此其意謂嗽必因痰故勝其痰而嗽自愈則理有不然也蓋外感之嗽必因風寒風寒在肺則肺氣不清所以動嗽動嗽然後動痰此風邪痰嗽之本本於外感非外感本於痰也又如內傷之嗽必因陰虛陰虛則水涸金枯所以動嗽脾虛腎敗所以化痰此陰虛痰嗽之本本於內傷非內傷本於痰也今曰治嗽當先治痰豈求本之道乎然治外感之嗽者誠惟二陳之屬為最效又何故也蓋南星半夏生薑陳皮枳殼之類其味皆辛辛能入肺辛能散寒寒邪散則痰嗽自愈此正所以治本而實非所以治痰也若內傷陰虛之嗽則大忌辛燥此輩豈堪輕用哉經曰肺欲辛以辛瀉之此肺實者之宜辛也又曰辛走氣氣病無多食辛此肺虛者之忌辛也氣味宜否之理內經妙用如此河間何以不察而謂南星半夏之屬但能治痰豈果治痰之標便能治嗽之本乎述古共六條楊仁齋曰肺出氣也腎內氣也肺為氣之主腎為氣之本凡咳嗽引動百骸自覺氣從臍下奔逆而上者此腎虛不能收氣歸原當以地黃丸安腎丸主之毋徒從事於肺此虛則補子之義也衍義云有暴嗽服諸藥不效或教之進生料鹿茸丸大菟絲子丸方愈有本有標卻不可因其暴嗽而疑驟補之非所以易愈者亦覺之早故也丹溪曰咳嗽有風有寒有痰有火有虛有勞有郁有肺脹王節齋曰因嗽而有痰者咳為重主治在肺因痰而致咳者痰為重主治在脾但是食積成痰痰氣上升以致咳嗽只治其痰消其積而咳自止亦不必用肺藥以治咳也薛立齋曰春月若因風寒所傷咳嗽聲重頭痛用金沸草散咳嗽聲重身熱頭痛用局方消風散蓋肺主皮毛肺氣虛則腠理不密風邪易入治法當解表兼實肺氣肺有火則腠理不閉風邪外乘治宜解表兼清肺火邪退即止若數行解散則重亡津液邪蘊而為肺疽肺痿矣故凡肺受邪不能輸化而小便短少皮膚漸腫咳嗽日增者宜用六君子湯以補脾肺六味丸以滋腎水夏月火熱炎上喘急而嗽面赤潮熱脈洪大者用黃連解毒湯熱燥而咳用梔子仁湯咳唾有血用麥門冬湯俱兼以六味丸夏月尤當用此壯腎水以保肺金夏月心火乘肺輕則用麥門冬湯重則用人參平肺散若上焦實熱用涼膈散虛熱用六君子湯中焦實熱用竹葉石膏湯虛熱用竹葉黃耆湯下焦虛熱用六味丸秋月濕熱傷肺若咳而身熱自汗口乾便赤脈虛而洪者用白虎湯身熱而煩氣高而短心下痞滿四肢困倦精神短少者香薷飲若病邪既去宜用補中益氣加乾山藥五味子以養元氣柴胡升麻各二分以升生氣冬月風寒外感形氣病氣俱實者宜用麻黃湯之類所謂自表而入自表而出若形氣病氣俱虛者宜補其元氣而佐以解表之藥若專於解表則肺氣益虛腠理益疏外邪乘虛易入病愈難愈矣若病日久或誤服表散之劑以致元氣虛而邪氣實者急宜補脾土為主則肺金有所養而諸病自愈若人老弱或勞傷元氣而患前證誤服麻黃枳殼紫蘇之類而汗出亡陽者多患肺癰肺痿治失其宜多致不起午後嗽者屬腎氣虧損火炎水涸或津液湧而為痰者乃真臟為患也須用六味地黃丸壯腎水滋化源為主以補中益氣湯養脾土生肺腎為佐設用清氣化痰則誤矣徐東皋曰凡咳嗽之人氣體虛弱者用瀉氣藥多不效間有效者亦必復作若此者並宜補益而嗽自愈氣體厚者或系外感俱宜發散邪氣破滯氣而嗽自寧新咳嗽者亦宜從實治之也久咳嗽者宜從虛治之也或用澀藥以擊其惰歸九仙散之屬也凡治咳嗽當先求病根伐去邪氣而後可以烏梅訶子五味罌粟殼款冬花之類此輩性味燥澀有收斂劫奪之功亦在所必用可一服而愈然須權其先後而用之灸法肺俞俞府天突風門各七壯列缺三壯乳根三壯咳嗽論列方二陳湯和一六安煎新和二理中湯熱一麻黃湯散一厚朴湯和五四理陰煎新熱三柴陳煎新散九香薷飲和一六九白虎湯寒二一陰煎新補八四陰煎新補十二金水六君煎新和一五福飲新補六瓊玉膏補六十補中益氣湯補三十左歸飲新補二右歸飲新補三加減一陰煎新補九左歸丸新補四右歸丸新補五六味回陽飲新熱二六味丸補百二十八味丸補一二一人參固本丸補百六人參平肺散寒三七地黃丸補百二十安腎丸熱一六七竹葉石膏湯寒五劫勞散婦一二四九仙散固十涼膈散攻十九竹葉黃耆湯寒七小青龍湯散八六君子湯補五生料鹿茸丸補一三一大補元煎新補一麥門冬湯寒四四大菟絲子丸固三六金沸草散散八一梔子仁湯寒十九局方消風散散四七大承氣湯攻一黃連解毒湯寒一貝母丸新和十八論外備用方四君子湯補一生脈散補五六十全大補湯補二十寧肺湯補六二熱嗽蜜酥煎補六五鳳髓湯補六四潤肺五味異功散補四鹿茸丸補一三一補肺湯補六一勞嗽杏仁煎和一四二喘嗽杏仁膏和一四三咳唾血橘皮半夏湯和十三星香丸和百二痰嗽蘇子煎和一四一潤肺杏仁蘿蔔子丸和百十九痰嗽杏仁丸和百八老人咳嗽白朮湯和二七濕痰嗽人參定喘湯和一三四寒喘嗽前胡散和一四四煩熱嗽百花膏和一四五嗽血阿膠散和二百七唾血玉液丸和百六消痰火玉粉丸和百七痰嗽桑皮散散八四風熱嗽參蘇飲散三四風寒十神湯散四十外感旋覆花湯散八二風入肺二母散寒四九肺熱紫菀散寒五三肺痿血黃芩知母湯寒五一火嗽團魚丸寒九五痰熱勞嗽五味子丸固十二劫嗽人參清肺湯寒三六肺虛熱三妙湯固九久嗽安眠散固七久嗽加味理中湯熱五虛寒潤肺丸固十四百藥煎固八劫嗽靈寶煙筒固二六七嗽煙筒因二六六喘促經義至真要大論曰諸氣膹郁皆屬於肺諸痿喘嘔皆屬於上諸逆衝上皆屬於火脈解篇曰陽明所謂上喘而為水者陰氣下而復上上則邪客於臟腑間故為水也少陰所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也陰陽別論曰二陽之病發心脾其傳為息賁者不治陰爭於內陽擾於外魄汗未藏四逆而起起則熏肺使人喘鳴大奇論曰肺之雍喘而兩胠滿太陰陽明論曰犯賊風虛邪者陽受之陽受之則入六腑入六腑則身熱不時臥上為喘呼痹論曰心痹者脈不通煩則心下鼓暴上氣而喘肺痹者煩滿喘而嘔淫氣喘息痹聚在肺腸痹者數飲而不得出中氣喘爭陽明脈解篇曰陽明厥則喘而惋惋則惡人帝曰或喘而死者或喘而生者何也岐伯曰厥逆連臟則死連經則生脈要精微論曰肝脈若搏因血在脅下令人喘逆逆調論曰夫不得臥臥則喘者是水氣之客也夫水者循精液而流也腎者水臟主津液主臥與喘也示從容論曰喘咳者是水氣並陽明也玉機真藏論曰秋脈不及則令人喘呼吸少氣而咳上氣見血下聞病音舉痛論曰勞則喘息汗出外內皆越故氣耗矣寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣刺禁論曰刺缺盆中內陷氣泄令人喘咳逆五邪篇曰邪在肺則病皮膚痛寒熱上氣喘咳動肩背繆刺論曰邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱經脈別論曰夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨當是之時勇者氣行則已怯者則著而為病也太陽臟獨至厥喘虛氣逆是陰不足陽有餘也平人氣象論曰頸脈動喘疾咳曰水經脈篇曰肺手太陰也是動則病肺脹滿膨膨而喘咳腎足少陰也是動則病飢不欲食咳唾則有血喝喝而喘藏氣法時論曰肺病者喘咳逆氣肩背痛汗出腎病者腹大脛腫喘咳身重調經論曰氣有餘則喘咳上氣不足則息利少氣水熱穴論曰故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥熱病篇曰熱病已得汗出而脈尚躁喘且復熱喘甚者死論證氣喘之病最為危候治失其要鮮不誤人欲辨之者亦惟二證而已所謂二證者一曰實喘一曰虛喘也此二證相反不可混也然則何以辨之蓋實喘者有邪邪氣實也虛喘者無邪元氣虛也實喘者氣長而有餘虛喘者氣短而不續實喘者胸脹氣粗聲高息湧膨膨然若不能容惟呼出為快也虛喘者慌張氣怯聲低息短惶惶然若氣欲斷提之若不能升吞之若不相及勞動則甚而惟急促似喘但得引長一息為快也此其一為真喘一為似喘真喘者其責在肺似喘者其責在腎何也蓋肺為氣之主腎為氣之根肺主皮毛而居上焦故邪氣犯之則上焦氣壅而為喘氣之壅滯者宜清宜破也腎主精髓而在下焦若真陰虧損精不化氣則下不上交而為促促者斷之基也氣既短促而再加消散如壓卵矣且氣盛有邪之脈必滑數有力而氣虛無邪之脈必微弱無神此脈候之有不同也其有外見浮洪或芤大至極而稍按即無者此正無根之脈也或往來弦甚而極大極數全無和緩者此正胃氣之敗也俱為大虛之候但脈之微弱者其真虛易知而脈之浮空弦搏者其假實難辨然而輕重之分亦惟於此而可察矣蓋其微弱者猶順而易醫浮空者最險而多變若弦強之甚則為真藏真藏已見不可為也虛喘證治共七條凡虛喘之證無非由氣虛耳氣虛之喘十居七八但察其外無風邪內無實熱而喘者即皆虛喘之證若脾肺氣虛者不過在中上二焦化源未虧其病猶淺若肝腎氣虛則病出下焦而本末俱病其病則深此當速救其根以接助真氣庶可回生也其有病久而加以喘者或久服消痰散氣等劑而反加喘者或上為喘咳而下為泄瀉者或婦人產後亡血過多則營氣暴竭孤陽無依而為喘者此名孤陽絕陰剝極之候已為難治更毋蹈剝廬之戒也一虛喘證其人別無風寒咳嗽等疾而忽見氣短似喘或但經微勞或飢時即見喘促或於精泄之後或於大汗之後或於大小便之後或大病之後或婦人月期之後而喘促愈甚或氣道噎塞上下若不相續勢劇垂危者但察其表裡無邪脈息微弱無力而諸病若此悉宜以貞元飲主之加減如本方其效如神此外如小營煎大營煎大補元煎之類俱可擇用經曰肝苦急急食甘以緩之即此之類若大便溏泄兼下寒者宜右歸飲右歸丸聖朮煎之類主之一脾肺氣虛上焦微熱微渴而作喘者宜生脈散主之或但以氣虛而無熱者惟獨參湯為宜若火爍肺金上焦熱甚煩渴多汗氣虛作喘者宜人參白虎湯主之若火在陰分宜玉女煎主之然惟夏月或有此證若陰虛自小腹火氣上衝而喘者宜補陰降火以六味地黃湯加黃柏知母之類主之一水病為喘者以腎邪干肺也然水不能化而子病及母使非精氣之敗何以至此此其虛者十九而間乎虛中挾實則或有之耳故凡治水喘者不宜妄用攻擊之藥當求腫脹門諸法治之腫退而喘自定矣古法治心下有水氣上乘於肺喘而不得臥者以直指神秘湯主之但此湯性用多主氣分若水因氣滯者用之則可若水因氣虛者必當以加減金匱腎氣湯之類主之一老弱人久病氣虛發喘者但當以養肺為主凡陰勝者宜溫養之如人參當歸薑桂甘草或加以耆術之屬陽勝者宜滋養之如人參熟地麥冬阿膠五味子梨漿牛乳之屬一關格之證為喘者如六節藏象論曰人迎四盛已上為格陽寸口四盛已上為關陰人迎與寸口俱盛四倍已上為關格此關格之證以脈言不以病言也今人之患此者頗多而人多不知且近時察脈者不論人迎惟在寸口但其兩手之脈浮弦至極大至四倍已上者便是此證其病必虛里跳動而氣喘不已此之喘狀多無咳嗽但覺胸膈舂舂似脹非脹似短非短微勞則喘甚多言亦喘甚甚至通身振振慌張不寧此必情欲傷陰以致元氣無根孤陽離劇之候也多不可治方論詳關格門一凡病喘促但察其脈息微弱細澀者必陰中之陽虛也或浮大弦芤按之空虛者必陽中之陰虛也大凡喘急不得臥而脈見如此者皆元氣大虛去死不遠之候若妄加消伐必增劇而危若用苦寒或攻下之無不即死實喘證治共七條一實喘之證以邪實在肺也肺之實邪非風寒則火邪耳蓋風寒之邪必受自皮毛所以入肺而為喘火之熾盛金必受傷故亦以病肺而為喘治風寒之實喘宜以溫散治火熱之實喘治以寒涼又有痰喘之說前人皆曰治痰不知痰豈能喘而必有所以生痰者此當求其本而治之一凡風寒外感邪實於肺而咳喘並行者宜六安煎加細辛或蘇葉主之若冬月風寒感甚者於本方加麻黃亦可或用小青龍湯華蓋散三拗湯之類主之一外有風寒內兼微火而喘者宜黃芩半夏湯主之若兼陽明火盛而以寒包熱者宜涼而兼散以大青龍湯或五虎湯越婢加半夏湯之類主之一外無風寒而惟火盛作喘或雖有微寒而所重在火者宜桑白皮湯或抽薪飲之類主之一痰盛作喘者雖宜治痰如二陳湯六安煎導痰湯千緡湯滾痰丸抱龍丸之類皆可治實痰之喘也六君子湯金水六君煎之類皆可治虛痰之喘也然痰之為病亦惟為病之標耳猶必有生痰之本故凡痰因火動者必須先治其火痰因寒生者必須先治其寒至於或因氣逆或因風邪或因濕滯或因脾腎虛弱有一於此皆能生痰使欲治痰而不治其所以痰則痰終不能治而喘何以愈哉一氣分受邪上焦氣實作喘或怒氣鬱結傷肝而人壯力強脹滿脈實者但破其氣而喘自愈宜廓清飲四磨飲四七湯蘿蔔子湯蘇子降氣湯之類主之或陽明氣秘不通而脹滿者可微利之一喘有夙根遇寒即發或遇勞即發者亦名哮喘未發時以扶正氣為主既發時以攻邪氣為主扶正氣者須辨陰陽陰虛者補其陰陽虛者補其陽攻邪氣者須分微甚或散其風或溫其寒或清其痰火然發久者氣無不虛故於消散中宜酌加溫補或於溫補中宜量加消散此等證候當惓惓以元氣為念必使元氣漸充庶可望其漸愈若攻之太過未有不致日甚而危者述古共二條東垣曰華佗云盛而為喘減而為枯故活人亦云發喘者氣有餘也凡看文字須要會得本意盛而為喘者非肺氣盛也喘為肺氣有餘者亦非氣有餘也氣盛當認作氣衰有餘當認作不足肺氣果盛又為有餘則當清肅下行而不喘以其火入於肺衰與不足而為喘焉故言盛者非言肺氣盛也言肺中之火盛也言有餘者非言肺氣有餘也言肺中之火有餘也故瀉肺以苦寒之劑非瀉肺也瀉肺中之火實補肺氣也用者不可不知丹溪曰喘急者氣為火所鬱而為痰在肺胃間也有痰者有火炎者有陰虛自小腹下起而上逆者有氣虛而致氣短者有水氣乘肺者有肺虛挾寒而喘者有肺實挾熱而喘者有驚憂氣鬱肺脹而喘者有胃絡不和而喘者有腎氣虛損而喘者雖然未有不由痰火內郁風寒外束而致之者也灸法璇璣氣海膻中期門背中骨節第七椎下穴灸三壯喘氣立已神效喘促論列方貞元飲新補十九六安煎新和二大補元煎新補一大營煎新補十四小營煎新補十五六君子湯補五右歸飲新補三右歸丸新補五大青龍湯散七獨參湯補三五神秘湯和一三八小青龍湯散八聖朮煎新熱二五生脈散補五六玉女煎新寒十二蘿蔔子湯和一三九二陳湯和一千緡湯和九五桑白皮湯寒五二六味地黃湯補百二十抱龍丸小八五導痰湯和九一廓清飲新和十三金水六君煎新和一四七湯和九七四磨飲和五二金匱腎氣丸補一二四五虎湯和一三六三拗湯散七八人參白虎湯寒三華蓋散散七九滾痰丸攻七七蘇子降氣湯和四一黃芩半夏湯散五十越婢加半夏湯散九十論外備用方參附湯補三七五味子湯補五七喘渴十全大補湯補二十虛喘蜜酥煎補六五百合湯和一三五浮腫作喘人參胡桃湯補五九喘不得臥蘇子煎和一四一潤肺喘定喘湯和一三三風寒喘人參定喘湯和一三四寒邪咳喘黃栝蔞丸和百十八痰喘神秘湯和一三八水氣喘蘇陳九寶湯散八五哮喘瀉白散寒四二肺火雙玉散寒七一火喘安眠散固七喘不止葶藶大棗瀉肺湯和百四十浮腫喘呃逆經義口問篇帝曰人之噦者何氣使然岐伯曰谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦肺主為噦取手太陰足少陰宣明五氣篇曰胃為氣逆為噦為恐雜病篇曰噦以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可已至真要大論曰陽明之復嘔吐咳噦太陽之復唾出清水及為噦噫諸逆衝上皆屬於火寶命全形論曰病深者其聲噦邪氣臟腑病形篇曰心脈小甚為善噦三部九候論曰若有七診之病其脈候亦敗者死矣必發噦噫論證共三條呃逆一證古無是名其在內經本謂之噦因其呃呃連聲故今以呃逆名之於義亦妥觀內經治噦之法以草刺鼻嚏及氣息迎引大驚之類是皆治呃之法此噦本呃逆無待辨也自孫真人云遍尋方論無此名遂以咳逆為噦因致後世訛傳乃以咳逆乾嘔噫氣之類互相餚亂自唐迄今矣此名之不可不察亦不可不正也一咳逆之名原出內經本以咳嗽氣逆者為言如氣交變大論曰歲金太過甚則喘咳逆氣此因喘咳以致氣逆故云咳逆氣也又曰咳逆甚而血溢正以咳逆不止而血隨氣溢則病之常也未聞以呃逆而見血者也即如六元正紀大論云金鬱之發民病咳逆者亦是此意此咳逆之非呃逆亦甚明矣而今後世諸公乃悉以噦為咳逆豈皆未之詳察耶及觀丹溪之言在纂要則曰孫真人誤以噦為咳逆是謂噦非咳逆也在心法附錄則曰咳逆為病古謂之噦近謂之呃此又謂噦即咳逆也在嘔吐門則又曰有聲有物謂之嘔吐有聲無物謂之噦此又以乾嘔為噦也前後不一何其自謬若此再如海藏河間諸公有以噦為乾嘔者有以咳逆為噫者總皆謬矣蓋嘔即吐之類但吐而無物者曰嘔嘔而有物者曰吐腹脹噯氣者曰噫逆氣自下而上者亦曰噫此四者之辨自有正名顧可紛紛若是乎茲余析而判之曰噦者呃逆也非咳逆也咳逆者咳嗽之甚者也非呃逆也乾嘔者無物之吐即嘔也非噦也噫者飽食之息即噯氣也非咳逆也後人但以此為鑑則異說之疑可盡釋矣一呃逆證有傷寒之呃逆有雜證之呃逆其在古人則悉以虛寒為言惟丹溪引內經之言曰諸逆衝上皆屬於火病人見此似為死證然亦有實者不可不知余向見此說疑其與古人相左不以為然蓋亦謂此證必屬虛寒何有實熱茲及晚年曆驗始有定見乃知丹溪此言為不誣也雖其中寒熱虛實亦有不同然致呃之由總由氣逆氣逆於下則直衝於上無氣則無呃無陽亦無呃此病呃之源所以必由氣也欲得其象不見雨中之雷水中之浡乎夫陽為陰蔽所以為雷而轟轟不已者此火為雷之本而火即氣也氣為水覆所以為浡而汩汩不已者此氣為浡之本而氣即陽也然病在氣分非本一端而呃之大要亦惟三者而已則一曰寒呃二曰熱呃三曰虛脫之呃寒呃可溫可散寒去則氣自舒也熱呃可降可清火靜而氣自平也惟虛脫之呃則誠危殆之證其或免者亦萬幸矣凡諸治法當辨如下論治共九條凡雜證之呃雖由氣逆然有兼寒者有兼熱者有因食滯而逆者有因氣滯而逆者有因中氣虛而逆者有因陰氣竭而逆者但察其因而治其氣自無不愈若輕易之呃或偶然之呃氣順則已本不必治惟屢呃為患及呃之甚者必其氣有大逆或脾腎元氣大有虧竭而然然實呃不難治而惟元氣敗竭者乃最危之候也一寒滯為呃者或以風寒或以生冷或其臟氣本寒偶有所逆皆能致呃但去其蔽抑之寒而呃自止宜橘皮湯三因丁香散或二陳湯加生薑五七片或佐關煎或甘草乾薑湯橘皮乾薑湯之類皆可酌用若寒之甚者漿水散或四逆湯一胃火為呃者其證極多但察其脈見滑實而形氣不虛胸膈有滯或大便堅實或不行者皆其胃中有火所以上衝為呃但降其火其呃自止惟安胃飲為最妙余嘗治愈多人皆此證也一氣逆為噦而兼脹悶者宜加減二陳湯加烏藥或寶鑑丁香柿蒂散或羌活附子湯或神香散一食滯而呃者宜加減二陳加山楂白芥子烏藥之屬或用大和中飲加乾薑木香一中焦脾胃虛寒氣逆為呃者宜理中加丁香湯或溫胃飲加丁香若因勞倦內傷而致呃逆者宜補中益氣湯加丁香凡中焦寒甚者多由脾胃氣虛而然蓋脾胃不虛則寒亦不甚故治寒者當以脾氣為主若吐痢後胃氣微虛或兼膈熱而呃者宜橘皮竹茹湯無熱者宜生薑半夏丁香柿蒂白朮肉桂之類皆可酌用一下焦虛寒者其肝腎生氣之原不能暢達故凡虛弱之人多見呃逆正以元陽無力易為抑遏而然此呃逆之本多在腎中故余制歸氣飲主之甚效或用理陰煎加丁香以疏氣妙亦如之一凡以大病之後或以虛羸之極或以虛損誤攻而致呃逆者此最危之證察其中虛速宜補脾察其陰虛速宜補腎如前二條固其法矣然猶恐不及則惟大補元煎及右歸飲之類斯其庶幾者也一呃逆證凡聲強氣盛而脈見滑實者多宜清降若聲小息微而脈見微弱者多宜溫補傷寒呃逆共六條凡傷寒之呃亦無非氣逆之病其有與雜證不同者如仲景所言則其類也然猶有未悉及治有未備者謹略如下一傷寒胃中虛冷等證大約與前雜證相似悉宜如前以溫中等劑治之或如仲景所言胃中虛冷及飲水則噦等證當以後條仲景法治之一傷寒邪在表者與里無涉故無噦證惟少陽證邪在半表半裡之間則寒熱往來氣為邪抑而噦逆者有之矣宜柴陳煎主之有寒者加丁香有火者加黃芩或小柴胡湯亦可一傷寒失下邪入正陽明內熱之極三焦乾格陰道不行而上衝作呃者必宜去火去閉斯逆氣得降而噦乃可愈然必察邪之微甚如無堅實脹滿等證而但以乾涸燥熱者宜白虎湯或竹葉石膏湯或瀉心湯涼解之若果有燥糞大便閉結脹滿實堅俱全者宜三承氣湯下之一傷寒邪有未解而用溫補太過者則其中焦氣逆最能為噦惟安胃飲為最妙若氣逆無火者宜橘皮湯若兼表邪未解者宜柴陳煎一傷寒誤攻或吐或下或誤用寒涼以致脾腎胃氣大虛大寒而發噦者大為危候速當以前雜證溫胃理陰等法調治之恐遲則無濟於事也述古共三條仲景曰陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中虛冷故也陽明病不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦若胃中虛冷不能食者飲水則噦按以上四條皆言胃之虛寒也虛寒者既不可攻亦不可與水則寒涼之藥亦當忌用可知論曰傷寒噦而腹滿視其前後知何部不利利之則愈按此一條即言噦之實邪也蓋便有不利則氣有不達下不達則上逆而出故小便不利者當利其水大便不通者當通其便要略曰病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之乾嘔噦手足厥者橘皮湯主之噦逆者橘皮竹茹湯主之張子和吐式篇云凡病在上者皆宜吐然自胸以上大滿大實痰如膠漆微湯微散皆兒戲耳若非吐法病安能除曾見病之在上者諸醫用藥盡其技而不效余以湧劑少少用之輒獲微效可見吐法必可用於上宜乎其效之速也按此吐法亦可治噦者以其氣得伸而鬱得散也故凡氣實而鬱者在子和之法亦所宜用簡易方一方治呃逆久不愈連連四五十聲者用生薑搗汁一合加蜜一匙溫熱服一嗅法治呃逆服藥不效者用硫黃乳香等分以酒煎令患人以鼻嗅之效一方用雄黃一味煎酒嗅灸法兩乳穴治呃逆立止取穴法婦人以乳間垂下到處是穴男子不可垂者以乳頭下一指為率與乳頭相直骨間陷中是穴男左女右灸一處艾炷如小麥大著火即止灸三壯不止者不可治膻中中脘氣海三里呃逆論列方二陳湯和一橘皮湯熱五六四逆湯熱十四安胃飲新寒十一溫胃飲新熱五歸氣飲新熱十四理陰煎新熱三右歸飲新補三佐關煎新熱十漿水散熱一四七柴陳煎新散九白虎湯寒二神香散新和二十大補元煎新補一瀉心湯寒二七大和中飲新和七小和中飲新和八小柴胡湯散十九大承氣湯攻一小承氣湯攻二加減二陳湯和二橘皮乾薑湯熱五五甘草乾薑湯熱五四生薑半夏湯熱五二橘皮竹茹湯熱五八三因丁香散熱六十補中益氣湯補三十羌活附子湯熱三五理中加丁香湯熱四竹葉石膏湯寒五寶鑑丁香柿蒂散熱六五論外備用方參附湯補三七柿蒂湯熱六六丁香溫中湯熱十一和胃養正丹熱一八八氣逆丁香柿蒂散熱六四胃寒郁證經義六元正紀大論帝曰五運之氣亦復歲乎岐伯曰鬱極乃發待時而作也帝曰郁之甚者治之奈何岐伯曰木鬱達之火鬱發之土鬱達之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂泄之王太僕曰木鬱達之謂吐之令其調達火鬱發之謂汗之令其疏散土鬱奪之謂下之令無壅礙金鬱泄之謂滲泄解表利小便也水鬱折之謂抑之制其沖逆也滑氏曰木性本條達火性本發揚土性本沖和金性本肅清水性本流通五者一有所郁斯失其性矣達發奪泄折將以治其鬱而遂其性也王安道釋此曰凡病之起多由於郁郁者滯而不通之義或因所乘而為郁或不因所乘本氣自病而鬱者皆郁也豈惟五運之變能使然哉郁既非五運之變可拘則達發奪泄折等法固可擴而充之可擴而充其應變不窮之理也歟且夫達者通暢之也如肝性急怒氣逆胠脅或脹火時上炎治以苦寒辛散而不愈者則用升發之藥加以厥陰報使而從治之又如久風入中為飧泄及不因外風之入而清氣在下為飧泄則以輕揚之劑舉而散之凡此之類皆達之之法也王氏以吐訓達不能使人無疑以其肺金盛而抑制肝木歟則瀉肺氣舉肝氣可矣不必吐也以為脾胃濁氣下流而少陽清氣不升歟則益胃升陽可矣不必吐也雖然木鬱固有吐之之理今以吐字總該達字則凡木鬱皆當用吐矣其可乎哉至於東垣所謂食塞肺分為金與土旺於上而剋木夫金之剋木乃五行之常道固不待物傷而後能也且為物所傷豈有反旺之理若曰吐去其物以伸木氣乃是反為木鬱而施治非為食傷而施治矣夫食塞胸中而用吐正內經所謂其高者因而越之之義耳不勞引木鬱之說以及之也四郁皆然又曰夫五郁為病故有法以治之然邪氣久實正氣必損今邪氣雖去正氣豈能遽平乎苟不平調正氣使各安其位復其常於治郁之餘則猶未足以盡治法之妙故又曰然調其氣苟調之氣猶未服而或過則當益其所不勝以制之如木過者當益金金能制木則木斯服矣所不勝者所畏者也故曰過者折之以其畏也夫制物者物之所欲也制於物者物之所不欲也順其欲則喜逆其欲則惡今逆之以所惡故曰所謂泄之陰陽應象大論曰東方生風在志為怒怒傷肝悲勝怒南方生熱在志為喜喜傷心恐勝喜中央生濕在志為思思傷脾怒勝思西方生燥在志為憂憂傷肺喜勝憂北方生寒在志為恐恐傷腎思勝恐舉痛論曰怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結怒則氣逆甚則嘔血及飧泄故氣上矣喜則氣和志達營衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通營衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還還在下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣炅則腠理開營衛通汗大泄故氣泄矣驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘息汗出外內皆越故氣耗矣思則心有所存神有所歸正氣留而不行故氣結矣宣明五氣篇曰胃為氣逆為噦為恐膽為怒精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐陽入之陰則靜陰出之陽則怒玉機真藏論曰憂恐悲喜怒令不得以其次故令人有大病矣因而喜大虛則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣憂則心氣乘矣本神篇曰怵惕思慮者則傷神神傷則恐懼流淫而不止悲哀動中者竭絕而失生喜樂者神憚散而不藏憂愁者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬脾憂愁而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂妄不精當人陰縮而筋攣兩脅骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂皮革焦毛悴色夭死於夏腎盛怒不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏恐懼而不解則傷精精傷則骨酸痿厥精時自下壽夭剛柔篇曰憂恐忿怒傷氣氣傷臟乃病臟本病篇曰憂愁思慮即傷心恚怒氣逆上而不下即傷肝邪氣臟腑病形篇曰愁憂恐懼則傷心形寒寒飲則傷肺痿論曰悲哀太甚則胞絡絕胞絡絕則陽氣內動發則心下崩數溲血也思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫口問篇曰悲哀愁憂則心動心動則五臟六腑皆搖行針篇曰多陽者多喜多陰者多怒調經論曰神有餘則笑不休神不足則悲血有餘則怒不足則恐本神篇曰肝氣虛則恐實則怒心氣虛則悲實則笑不休疏五過論曰嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所並暴樂暴苦始樂後苦皆傷精氣精氣竭絕形體毀沮暴怒傷陰暴喜傷陽厥逆上行脈滿去形故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋屈痿躄為攣通評虛實論曰膈塞閉絕上下不通則暴憂之病也五變篇曰目堅固以深者長沖直揚其心剛剛則多怒怒則氣上逆論內經五郁之治經言五郁者言五行之化也氣運有乖和則五郁之病生矣其在於人則凡氣血一有不調而致病者皆得謂之郁證亦無非五氣之化耳故以人之臟腑則木應肝膽木主風邪畏其滯抑故宜達之或表或里但使經絡通行則木鬱自散是即謂之達也火應心與小腸火主熱邪畏其陷伏故宜發之或虛或實但使氣得升揚則火鬱自解是即謂之發也土應脾胃土主濕邪畏其壅淤故宜奪之或上或下但使濁穢得淨則土鬱可平是即謂之奪也金應肺與大腸金主燥邪畏其秘塞故宜泄之或清或濁但使氣液得行則金鬱可除是即謂之泄也水應腎與膀胱水主寒邪畏其凝溢故宜折之或陰或陽但使精從氣化則水鬱可清是即謂之折也雖然夫論治之法固當辨此五者而不知經語之玄本非鑿也亦非專治實邪而虛邪不在是也即如木鬱之治宜於達矣若氣陷不舉者發即達也氣壅不開者奪即達也氣秘不行者泄亦達也氣亂不調者折亦達也又如火鬱之治當用發矣若元陽被抑則達非發乎臟腑留結則奪非發乎膚竅閉塞則泄非發乎津液不化則折非發乎且奪者挽回之謂大實非大攻不足以蕩邪大虛非大補不足以奪命是皆所謂奪也折者折中之謂火實則陽亢陰虛火虛則氣不化水製作隨宜是皆所謂折也由是觀之可見五者之中皆有通融圓活之道第內經欲言五法不得不借五氣以發明其用但使人知此義則五行之中各具五法而用有無窮之妙矣安得鑿訓其說以隘人神思耶學者於此當默會其意勿使膠柱則心靈智慧而無有不通矣論脈凡郁證之脈在古人皆以結促止節為郁脈使必待結促止節而後為郁則鬱證不多見矣故凡診郁證但見血氣不順而脈不和平者其中皆有郁也惟情志之郁則如弦緊沉澀遲細短數之類皆能為之至若結促之脈雖為郁病所常有然病郁者未必皆結促也惟血氣內虧則脈多間斷若平素不結而因病忽結者此以不相接續尤屬內虛故凡辨結促者又當以有神無神辨之其或來去有力猶可以郁證論若以無力之結促而悉認為氣逆痰滯妄行消散則十誤其九矣論情志三郁證治共四條凡五氣之郁則諸病皆有此因病而鬱也至若情志之郁則總由乎心此因鬱而病也第自古言郁者但知解鬱順氣通作實邪論治不無失矣茲予辨其三證庶可無誤蓋一曰怒郁二曰思郁三曰憂鬱如怒郁者方其大怒氣逆之時則實邪在肝多見氣滿腹脹所當平也及其怒後而逆氣已去惟中氣受傷矣既無脹滿疼痛等證而或為倦怠或為少食此以木邪剋土損在脾矣是可不知培養而仍在消伐則所伐者其誰乎此怒郁之有先後亦有虛實所當辨治者如此又若思郁者則惟曠女嫠婦及燈窗困厄積疑任怨者皆有之思則氣結結於心而傷於脾也及其既甚則上連肺胃而為咳喘為失血為膈噎為嘔吐下連肝腎則為帶濁為崩淋為不月為勞損若初病而氣結為滯者宜順宜開久病而損及中氣者宜修宜補然以情病者非情不解其在女子必得願遂而後可釋或以怒勝思亦可暫解其在男子使非有能屈能伸達觀上智者終不易卻也若病已既成損傷必甚而再行消伐其不明也亦甚矣又若憂鬱病者則全屬大虛本無邪實此多以衣食之累利害之牽及悲憂驚恐而致郁者總皆受郁之類蓋悲則氣消憂則氣沉必傷脾肺驚則氣亂恐則氣下必傷肝腎此其慼慼悠悠精氣但有消索神志不振心脾日以耗傷凡此之輩皆陽消證也尚何實邪使不知培養真元而再加解散真與鷺鷥腳上割股者何異是不可不詳加審察以濟人之危也一怒郁之治若暴怒傷肝逆氣未解而為脹滿或疼痛者宜解肝煎神香散或六郁湯或越鞠丸若怒氣傷肝因而動火以致煩熱脅痛脹滿或動血者宜化肝煎若怒郁不解或生痰者宜溫膽湯若怒後逆氣既散肝脾受傷而致倦怠食少者宜五味異功散或五君子煎或大營煎歸脾湯之類調養之一思郁之治若初有鬱結滯逆不開者宜和胃煎加減主之或二陳湯或沉香降氣散或啟脾丸皆可擇用凡婦人思郁不解致傷衝任之源而血氣日虧漸至經脈不調或短少漸閉者宜逍遙飲或大營煎若思憶不遂以致遺精帶濁病在心肺不攝者宜秘元煎若思慮過度以致遺精滑泄及經脈錯亂病在肝腎不固者宜固陰煎若思郁動火以致崩淋失血赤帶內熱經脈錯亂者宜保陰煎若思郁動火陰虛肺熱煩渴咳嗽見血或骨蒸夜熱者宜四陰煎或一陰煎酌宜用之若生儒蹇厄思結枯腸及任勞任怨心脾受傷以致怔忡健忘倦怠食少漸至消瘦或為膈噎嘔吐者宜壽脾煎或七福飲若心膈氣有不順或微見疼痛者宜歸脾湯或加砂仁白豆蔻丁香之類以微順之一憂鬱內傷之治若初郁不開未至內傷而胸膈痞悶者宜二陳湯平胃散或和胃煎或調氣平胃散或神香散或六君子湯之類以調之若憂鬱傷脾而吞酸嘔惡者宜溫胃飲或神香散若憂鬱傷脾肺而困倦怔忡倦怠食少者宜歸脾湯或壽脾煎若憂思傷心脾以致氣血日消飲食日減肌肉日削者宜五福飲七福飲甚者大補元煎諸鬱滯治法凡諸鬱滯如氣血食痰風濕寒熱或表或里或臟或腑一有滯逆皆為之郁當各求其屬分微甚而開之自無不愈氣鬱者宜木香沉香香附烏藥藿香丁香青皮枳殼茴香厚朴撫芎檳榔砂仁皂角之類血鬱者宜桃仁紅花蘇木肉桂延胡五靈脂牡丹皮川芎當歸大黃朴硝之類食鬱者宜山楂麥芽神麯枳實三稜蓬朮大蒜蘿蔔或生韭飲之類痰鬱者宜半夏南星海石栝蔞前胡貝母陳皮白芥子玄明粉海藻皂角牛黃天竺黃竹瀝之類風鬱者宜麻黃桂枝柴胡升麻乾葛紫蘇細辛防風荊芥薄荷生薑之類濕鬱者宜蒼朮白朮茯苓澤瀉豬苓羌活獨活之類寒鬱者宜乾薑肉桂附子吳茱萸蓽茇胡椒花椒之類熱鬱者宜黃連黃柏黃芩梔子石膏知母龍膽草地骨皮石斛連翹天花粉玄參犀角童便綠豆之類以上諸郁治法皆所以治實邪也若陽虛則氣不能行陰虛則血不能行氣血不行無非郁證若用前法則愈虛愈郁矣當知所辨而參以三法如前庶無誤也述古共二條丹溪曰郁病大率有六曰氣鬱者胸脅疼痛脈沉而澀濕鬱者周身走痛或關節疼痛遇陰則發脈沉而細熱鬱者瞀悶煩心尿赤脈沉而數痰鬱者動則喘息脈沉而滑血鬱者四肢無力能食便血脈沉而芤食鬱者噯酸腹飽不喜飲食或七情之邪郁或寒熱之交侵或九氣之怫鬱或兩濕之侵凌或酒漿之積聚故為留飲濕鬱之疾又如熱鬱而成痰痰鬱而成癖血鬱而成瘕食鬱而成痞滿此必然之理也戴氏曰郁者結聚不得發越也當升不升當降不降當變化不得變化故傳化失常而鬱病作矣大抵諸病多有兼郁者或郁久而生病或病久而生郁或用藥雜亂而成郁故凡病必參郁治附按丹溪治一室女因事忤意鬱結在脾半年不食但日食熟菱棗數枚遇喜食饅頭彈子大深惡粥飯予意脾氣實非枳實不能散以溫膽湯去竹茹與之數十帖而愈一女許婚後夫經商二年不歸因不食困臥如癡無他病多向里床坐此思想氣結也藥難獨治得喜可解不然令其怒使其木氣升發而脾氣自開木能制土故也因自往激之大怒而哭良久令解之與藥一帖即求食矣予曰病雖愈必得喜方已乃紿以夫回既而果然病遂不舉郁證論列方六郁湯和一四九解肝煎新和十一化肝煎新寒十越鞠丸和一五四二陳湯和一異功散補四和胃飲新和五溫胃飲新熱五逍遙飲新因一溫膽湯和一五二歸脾湯補三二五君子煎新熱六五福飲新補六七福飲新補七六君子湯補五一陰煎新補八四陰煎新補十二大補元煎新補一固陰煎新固二秘元煎新固一啟脾丸和八六生韭飲和一五一平胃散和十七調氣平胃散和十八壽脾煎新熱十六保陰煎新寒一沉香降氣散和四十大營煎新補十四神香散新和二十論外備用方逍遙散補九二三和散和六十氣鬱加味二陳湯和三郁七氣湯和四七傷氣加味四七湯和九八局方七氣湯和五十七情郁
