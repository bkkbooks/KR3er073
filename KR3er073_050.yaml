body:
  text: 卷之五十德集新方八陣新方八略引藥不執方合宜而用此方之不必有也方以立法法以制宜此方之不可無也夫方之善者得其宜也得其宜者可為法也方之不善者失其宜也失其宜者可為鑑也第法有善不善人有知不知必善於知方者斯可以執方亦可以不執方能執方能不執方者非隨時之人不能也此方之所不可廢者正欲以啟發其人耳余因選古方之得宜者共若干首列為八陣已不為不多矣第以余觀之若夫猶有未盡因複製新方八陣此其中有心得焉有經驗焉有補古之未備焉凡各方之下多附加減等法及分兩之數俱有出入不一者正以見方之不可執也八陣之中如攻方寒方之不多及者以古法既多不必更為添足也大都方宜從簡而余復冗之不尤鄙乎正意在冗中求簡耳此制方之意也然用方之意則猶有說焉夫意貴圓通用嫌執滯則其要也若但圓無主則雜亂生而無不可矣不知疑似間自有一定不易之道此圓通中不可無執持也若執一不反則偏抝生而動相左矣不知倏忽間每多三因難測之變此執持中不可無圓活也圓活宜從三思執持須有定見既能執持又能圓活其能方能圓之人乎而人其為誰哉一補略一補方之制補其虛也凡氣虛者宜補其上人參黃耆之屬是也精虛者宜補其下熟地枸杞之屬是也陽虛者宜補而兼暖桂附乾薑之屬是也陰虛者宜補而兼清門冬芍藥生地之屬是也此固陰陽之治辨也其有氣因精而虛者自當補精以化氣精因氣而虛者自當補氣以生精又有陽失陰而離者不補陰何以收散亡之氣水失火而敗者不補火何以蘇垂寂之陰此又陰陽相濟之妙用也故善補陽者必於陰中求陽則陽得陰助而生化無窮善補陰者必於陽中求陰則陰得陽升而源泉不竭余故曰以精氣分陰陽則陰陽不可離以寒熱分陰陽則陰陽不可混此又陰陽邪正之離合也故凡陽虛多寒者宜補以甘溫而清潤之品非所宜陰虛多熱者宜補以甘涼而辛燥之類不可用知宜知避則不惟用補而八方之制皆可得而貫通矣二和略一和方之制和其不和者也凡病兼虛者補而和之兼滯者行而和之兼寒者溫而和之兼熱者涼而和之和之為義廣矣亦猶土兼四氣其於補瀉溫涼之用無所不及務在調平元氣不失中和之為貴也故凡陰虛於下而精血虧損者忌利小水如四苓通草湯之屬是也陰虛於上而肺熱乾咳者忌用辛燥如半夏蒼朮細辛香附芎歸白朮之屬是也陽虛於上忌消耗如陳皮砂仁木香檳榔之屬是也陽虛於下者忌沉寒如黃柏知母梔子木通之屬是也大便溏泄者忌滑利如二冬牛膝蓯蓉當歸柴胡童便之屬是也表邪未解者忌收斂如五味棗仁地榆文蛤之屬是也氣滯者忌閉塞如黃耆白朮薯蕷甘草之屬是也經滯者忌寒凝如門冬生地石斛芩連之屬是也凡邪火在上者不宜升火得升而愈熾矣沉寒在下者不宜降陰被降而愈亡矣諸動者不宜再動如火動者忌溫暖血動者忌辛香汗動者忌蘇散神動者忌耗傷凡性味之不靜者皆所當慎其於剛暴更甚者則又在不言可知也諸靜者不宜再靜如沉微細弱者脈之靜也神昏氣怯者陽之靜也肌體清寒者表之靜也口腹畏寒者里之靜也凡性味之陰柔者皆所當慎其於沉寒更甚者又在不言可知也夫陽主動以動濟動火上添油也不焦爛乎陰主靜以靜益靜雪上加霜也不寂滅乎凡前所論論其略耳而書不盡言言不盡意能因類而廣之則存夫其人矣不知此義又何和劑之足云三攻略一攻方之制攻其實也凡攻氣者攻其聚聚可散也攻血者攻其瘀瘀可通也攻積者攻其堅在臟者可破可培在經者可針可灸也攻痰者攻其急真實者暫宜解標多虛者只宜求本也但諸病之實有微甚用攻之法分重輕大實者攻之未及可以再加微實者攻之太過每因致害所當慎也凡病在陽者不可攻陰病在胸者不可攻臟若此者邪必乘虛內陷所謂引賊入寇也病在陰者勿攻其陽病在裡者勿攻其表若此者病必因誤而甚所謂自撤藩蔽也大都治宜用攻必其邪之甚者也其若實邪果甚自與攻藥相宜不必雜之補劑蓋實不嫌攻若但略加甘滯便相牽制虛不嫌補若但略加消耗偏覺相妨所以寒實者最不喜清熱實者最不喜暖然實而誤補不過增病病增者可解虛而誤攻必先脫元元脫者無治矣是皆攻法之要也其或虛中有實實中有虛此又當酌其權宜不在急宜攻急宜補者之例雖然凡用攻之法所以除凶剪暴也亦猶亂世之兵必不可無然惟必不得已乃可用之若或有疑寧加詳慎蓋攻雖去邪無弗傷氣受益者四受損者六故攻之一法實自古仁人所深忌者正恐其成之難敗之易耳倘任意不思此其人可知矣四散略一用散者散表證也觀仲景太陽證用麻黃湯陽明證用升麻葛根湯少陽證用小柴胡湯此散表之準繩也後世宗之而復不能用之在不得其意耳蓋麻黃之氣峻利而勇凡太陽經陰邪在表者寒毒既深非此不達故制用此方非謂太陽經藥必須麻黃也設以麻黃治陽明少陽之證亦寒無不散第恐性力太過必反傷其氣豈謂某經某藥必不可移易亦不過分其輕重耳故如陽明之升麻乾葛未有不走太陽少陽者少陽之柴胡亦未有不入太陽陽明者但用散之法當知性力緩急及氣味寒溫之辨用得其宜諸經無不妙也如麻黃桂枝峻散者也防風荊芥紫蘇平散者也細辛白芷生薑溫散者也柴胡乾葛薄荷涼散者也羌活蒼朮能走經去濕而散者也升麻川芎能舉陷上行而散者也第邪淺者忌峻利之屬氣弱者忌雄悍之屬熱多者忌溫燥之屬寒多者忌清涼之屬凡熱渴煩躁者喜乾葛而嘔惡者忌之寒熱往來者宜柴胡而泄瀉者忌之寒邪在上者宜升麻川芎而內熱炎升者忌之此性用之宜忌所當辨也至於相配之法則尤當知要凡以平兼清自成涼散以平兼暖亦可溫經宜大溫者以熱濟熱宜大涼者以寒濟寒此其運用之權則毫釐進退自有伸縮之妙又何必膠柱刻舟以限無窮之病變哉此無他在不知仲景之意耳五寒略一寒方之制為清火也為除熱也夫火有陰陽熱分上下據古方書咸謂黃連清心黃芩清肺石斛芍藥清脾龍膽清肝黃柏清腎今之用者多守此法是亦膠柱法也大凡寒涼之物皆能瀉火豈有涼此而不涼彼者但當分其輕清重濁性力微甚用得其宜則善矣夫輕清者宜以清上如黃芩石斛連翹天花之屬是也重濁者宜於清下如梔子黃柏龍膽滑石之屬也性力之厚者能清大熱如石膏黃連蘆薈苦參山豆根之屬也性力之緩者能清微熱如地骨皮玄參貝母石斛童便之屬也以攻而用者去實郁之熱如大黃芒硝之屬也以利而用者去癃閉之熱如木通茵陳豬苓澤瀉之屬也以補而用者去陰虛枯燥之熱如生地二冬芍藥梨漿細甘草之屬也方書之分經用藥者意正在此但不能明言其意耳然火之甚者在上亦宜重濁火之微者在下亦可輕清夫宜涼之熱皆實熱也實熱在下自宜清利實熱在上不可升提蓋火本屬陽宜從陰治從陰者宜降升則反從其陽矣經曰高者抑之義可知也外如東垣有升陽散火之法此以表邪生熱者設不得與伏火內炎者並論六熱略一熱方之制為除寒也夫寒之為病有寒邪犯於肌表者有生冷傷於脾胃者有陰寒中於臟腑者此皆外來之寒去所從來則其治也是皆人所易知者至於本來之寒生於無形無響之間初無所感莫測其因人之病此者最多人之知此者最少果何謂哉觀丹溪曰氣有餘便是火余續之曰氣不足便是寒夫今人之氣有餘者能十中之幾其有或因稟受或因喪敗以致陽氣不足者多見寒從中生而陽衰之病無所不致第其由來者漸形見者微當其未覺也孰為之意及其既甚也始知治難矧庸醫多有不識每以假熱為真火因復斃於無形無響者又不知其幾許也故惟高明見道之士常以陽衰根本為憂此熱方之不可不預也凡用熱之法如乾薑能溫中亦能散表嘔惡無汗者宜之肉桂能行血善達四肢血滯多痛者宜之吳茱萸善暖下焦腹痛泄瀉者極妙肉豆蔻可溫脾腎飧泄滑利者最奇胡椒溫胃和中其類近於蓽撥丁香止嘔行氣其暖過於豆仁補骨脂性降而散閉故能納氣定喘止帶濁泄瀉製附子性行如酒故無處不到能救急回陽至若半夏南星細辛烏藥良薑香附木香茴香仙茅巴戟之屬皆性溫之當辨者然用熱之法尚有其要以散兼溫者散寒邪也以行兼溫者行寒滯也以補兼溫者補虛寒也第多汗者忌姜姜能散也失血者忌桂桂動血也氣短氣怯者忌故紙故紙降氣也大凡氣香者皆不利於氣虛證味辛者多不利於見血證所當慎也是用熱之概也至於附子之辨凡今之用者必待勢不可為不得已然後用之不知回陽之功當用於陽氣將去之際便當漸用以望挽回若用於既去之後死灰不可復然矣尚何益於事哉但附子性悍獨任為難必得大甘之品如人參熟地炙甘草之類皆足以制其剛而濟其勇以補倍之無往不利矣此壺天中大將軍也可置之無用之地乎但知之真而用之善斯足稱將將之手矣七固略一固方之制固其泄也如久嗽為喘而氣泄於上者宜固其肺久遺成淋而精脫於下者宜固其腎小水不禁者宜固其膀胱大便不禁者宜固其腸臟汗泄不止者宜固其皮毛血泄不止者宜固其營衛凡因寒而泄者當固之以熱因熱而泄者當固之以寒總之在上者在表者皆宜固氣氣主在肺也在下者在裡者皆宜固精精主在腎也然虛者可固實者不可固久者可固暴者不可固當固不固則滄海亦將竭不當固而固則閉門延寇也二者俱當詳酌之八因略一因方之制因其可因者也凡病有相同者皆可按證而用之是謂因方如癰毒之起腫可敷也蛇蟲之患毒可解也湯火傷其肌膚熱可散也跌打傷其筋骨斷可續也凡此之類皆因證而可藥者也然因中有不可因者又在乎證同而因不同耳蓋人之虛實寒熱各有不齊表裡陰陽治當分類故有宜於此而不宜於彼者有同於表而不同於里者所以病雖相類而但涉內傷者便當於血氣中酌其可否之因不可謂因方之類儘可因之而用也因之為用有因標者有因本者勿因此因字而誤認因方之義
