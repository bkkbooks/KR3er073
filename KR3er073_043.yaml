body:
  text: 卷之四十三烈集痘疹詮痘瘡上總論一痘瘡一證俗曰天瘡原其所由實由胎毒內藏而復因時氣外觸其毒乃發故傳染相似是亦天行疫癘證也但考之內經則止言瘍疹即今斑疹之屬也故自越人仲景元化叔和諸公皆無一言及痘可見上古本無是證而今則何以有之愚謂近代之毒必以醉酒五味造作太過較古人之恬淡相去遠矣或者未信余言第觀藜藿膏粱之家即有不同今之北虜亦不出痘原其所由實由是耳豈果彼無胎毒耶故凡多遭此害者當以余言熟味之一痘瘡變紀百出虛中有實實中有虛要非曲學偏見者可以窺其堂室若目力心思一有不到則害不小矣設或知證而不知形則無以洞其外知形而不知脈則無以側其內知脈而不知本則無以探其源知本而不知囚則無以窮其其變知因而不知藥則無以神其治只此數事今醫果能全之否設有不能而強以為能則致害於人獲非於天能無畏乎故餘十痘疹一門留心既久積驗已多因搜採先哲之最精於此者如文中陳氏仲陽錢氏立齋薛氏羅田萬氏晨峰程氏東皋徐氏改齋友氏並其他雜録等書有述其舊者有發其未發者有剖其疑似者有因涉歷而吐其心得者盡我愚衷集而成帙痘疹玄祕似無出此初辨痘證二痘疹發熱大抵初時與傷寒相似然傷寒之邪從表入里故見各經之證痘疹之毒則從里出表故見五臟之證如呵欠悶頓肝證也乍涼乍熱手足稍冷多睡脾證也面燥腮赤咳嗽噴嚏肺證也驚悸心證也骩涼耳冷腎證也又觀心窩有紅色耳後有紅筋目中含淚成身熱手指皆熱惟中指獨冷乃知是痘證也便當察其虛實隨證治之辨痘歌五指稍頭冷驚來不可當若逢中指熱必定是傷寒中指獨自冷麻痘證相傳女右男分左分明好細看看耳歌兩耳紅筋痘必輕紫筋起處重沉沉急須用藥相攻治十個難求三五生看痘法凡初看痘法以紙捻蘸油照其顆粒次以手摸面頰如紅色隨手轉白隨白轉紅謂之血活生意在矣若揩下不白舉之不紅是謂血枯縱疏亦危又看目睛神光口唇舌尖紅活如常無燥白之色乃為吉兆自可無憂此觀痘疹之大治察脈法凡看痘之法一見發熱即當先察其脈蓋凡痘瘡將出者未見形迹必先發熱既見發熱脈必滑數但微見滑數有神而不失和緩之氣者其痘必輕而少若滑數加倍而猶帶和緩者其痘必多而重尚亦無害若滑數之甚義兼弦躁或芤急無神而全無和緩之氣者其痘必甚而危故余於初熟時便能斷其吉凶人多驚服而不知所窺在脈也凡診此之法但全握小兒之手而單以拇指診之亦最易也看疹之法此為第一而今醫多不知之亦以古人之未之及耳認痘法凡痘瘡緊小充實者名曰珍珠痘此則易壯易靨高大飽滿者名曰大痘此則早壯而遲收四圍起而中心陷者名茱萸痘平扁不突者名曰蒸餅痘此則有凶有吉稀者輕密者重論脈三痘自發熱以至起脹毒從內出陽之候也脈宜浮大而數不宜沉細而遲自灌膿收靨以後毒已外解陰之候也脈宜和緩不宜洪數又曰痘瘡之脈中和為貴不可過於躁疾或見微小故曰脈靜身涼者生脈躁身熱者死又陽病得陰脈者死大抵四時以胃氣為本胃氣者以四時之脈而皆兼和緩即胃氣也蓋滑數浮洪為太過太過為實實者邪氣實也弦遲微弱為不及不及為虛虛者正氣虛也設以太過不及之脈而中無和緩之氣是皆死候之脈故曰人無胃氣則死形色情性四凡天行痘疹之時有於未出之先察其形色情性可以預知吉凶也一觀其色如面顏紅白明潤與平日同而無變者吉如忽見紅赤而太嬌或㿠白而無彩頓然改變異於平時者凶又如額有青紋目有赤脈口有黑氣耳有塵痕者皆大凶之兆二觀其形凡精神暢爽動止便利語言清亮者無病而吉也如精神衰弱動止遲留言語低微異如平時者凶又原具壽相者吉如有天相則兒頭破顱解項小腳細聲微目無精彩或睛光露神啼聲斷續無喜無情而自語自笑聰意太早肉浮骨嫩者皆不吉之兆三觀情性幾未發熱時忽生喜心若與父母愛戀不忍舍者及聞見怪異言語妄誕者皆凶兆也日期五痘瘡大約之數發熱三日報痘三日起脹三日灌膿三日結靨三日共十五日乃大率常數此其正也惟痘密毒甚者常過其期痘疏毒微者常不及期固有不可一例拘者但得痘色明潤根窠紅活飲食二便如常又無表裡雜證雖遲數日不妨設有當出不出當起不起當膿不膿當靨不靨者須詳察其證或為元氣虛弱不能運行則補其元氣成為雜證攻剝不能通灌則去其雜證又六日以前毒發未盡有雜證者常也六日以後毒該盡出雜證當除而不出者為逆須詳辨而急治之五臟證六痘疹二證古人有云痘自里而出於臟其毒深故久熱而難出為重疹自表而出於腑其毒淺故暴熱而易出為輕余謂此説未必然也蓋痘疹皆出於臟腑未有表裡不相通者但出於腑者在痘亦輕出於臟者在疹亦重所以凡是疹子必發熱至五六日而後出不可言易且疹子多屬肺經豈肺經非臟耶一心經痘證心主火兒紅赤煩渴或上竄咬牙者心臟熱也心熱者導赤散心虛者人參麥門冬生地黃當歸之類煩渴邪盛者葛根解毒湯脾經痘證多有吐瀉腹痛者訣云發熱肚中痛斑瘡腹內攻發多防未透發少更防癰可見瘡疹腹痛乃為惡候當察腹痛吐瀉各條治之肺經痘證凡發熱之時喘息氣逆喉中涎響此肺經惡候也蓋毒火內蒸刑肺而然當察本條治之肝經之痘兒發熱之初多有驚搐等證蓋痘毒多熱熱則生風風熱相搏故發驚搐然有當速治者有不必治者詳見本條腎經痘證初發熱時便覺腰痛蓋腎與膀胱為表裡今毒由太陽傳入少陰所以腰痛此其毒陷陰分最非佳兆宜察本條治之一毒歸五臟證有不同當詳辨也毒歸於心則為斑疹為驚悸為壯熱為咽乾為痛為渴為汗為丹瘤為癰瘍潰爛毒歸於肺則為咳為喘為癢為衄血為瘡乾燥皺揭為肩臂痛毒歸於脾則為吐為瀉為腫為脹為腹痛為唇瘡破裂為舌本強為手足痛為不食毒歸於肝則為悶亂為水疱為目病為卵腫為乾嘔為筋急拘攣為吐蛔為寒戰咬牙毒歸於腎為腰痛為黑陷為失音為手足逆冷為咽乾痛為飢不欲食為多唾毒歸於腸胃為泄瀉為痢膿血為腹鳴矢氣為大便不通毒歸於膀胱為小腹滿痛為溺血為遺溺為小水不通為頭頂腫痛為反張為目上視以上五臟之證舉其概耳凡諸證治俱備雜證各條之中宜詳究之分氣血七一氣血各有所主凡痘之終始無非藉賴血氣但得血氣充暢則易出易收血氣不足則變證百出故治痘者必當先顧血氣然氣屬陽無形者也血屬陰有形者也故無形之屬皆氣主之有形之屬皆血主之是以氣主標血主本氣主發血主肥氣主形血主色氣主橐籥血主根基故氣能起脹以主乳郭血能灌漿以成飽滿至其為病則凡為白為陷為灰色為不起發為頂有孔為出水為痛為癢為浮腫為豆殼為不靨不落為飢表不固為膚腠不通等證皆氣之為病也又如為紫黑為乾枯為無血為無膿為黑陷黑靨為胛痛牙疳為疔癰斑疹為津液不達為痘後餘毒皆血之為病也此氣血之分固有如是然血無氣不行氣無血不止氣至而血不隨雖起發而灌必不周血至而氣不至雖潤浮而毒終不透故治此者有不可不兼顧也辨虛質寒熱八一察痘之要惟在虛實二字蓋實者邪氣實也邪實者宜清宜瀉虛者血氣虛也血氣虛者宜溫宜補且痘本胎毒非藉元氣不能達非藉元氣不能收故凡欲解毒清火亦須憑藉元氣使元氣無力則清亦不能清解亦不能解設有不支尚能堪此清解不此痘瘡之終始皆當斟酌元氣為主一痘瘡表實裡虛者必易出難靨表虛里實者必難出易靨若表裡之氣俱充實其瘡必易出易靨故兒自始出以至十日之外外則渾身壯熱內則飲食二便俱如常此即表裡俱實者也其瘡必光澤起發且易收易靨也一表裡各有虛實凡表虛者或惡寒成身不大熱或寒熱往來四肢厥冷或面青色白多汗惡風或怠惰嗜臥或痘色灰白頂陷不起發不光澤或色嫩皮薄癢𤹀或如水泡摸不礙手或根窠不紅或倒靨不能結痂脈必浮細而弱是皆表虛之證治宜溫補陽分裡虛者凡痘瘡已出未出之間有為吐瀉嘔惡或喜熱飲食或為少食不思飲食或食亦不化或為二便清利為溏瀉為不渴為氣促聲微為神昏多睡為腹膨噯氣為吞酸為脈弱無力是皆裡虛之證治宜溫補陰分表實者為身體壯熱無汗為面赤唇紫頭疼身痛眼紅鼻塞皮焦膚赤手足熱甚為痘色紅紫焮腫疼痛為皮厚而硬為癰腫斑疔為脈浮洪滑大是皆表實之證治宜清解表邪裡實者為二便祕結胸膈脹滿為唇燥咽乾口瘡舌黑為大渴咳嗽痰涎喘粗為煩躁驚狂聲高譫語為脈沉數洪滑是皆裡實之證治宜清解里邪張翼之曰吐瀉少食為裡虛陷伏倒靨灰白為表虛二者俱見為表裡俱虛用異功散救之甚至桂附靈砂亦可用若能食便祕而陷伏倒靨者為裡實輕則射干鼠黏子湯重則前胡枳殼湯下痢多血能食者為裡實若實其里則結癰毒紅活綻突為表實若補其表則潰爛不結痂一痘瘡表裡皆有寒熱熱則陽證寒則陰證寒則血氣凝澀而不章熱則血氣淖澤而不斂然熱證多實最忌耆朮桂附及諸熱燥之物若元氣虛弱者即有熱證總不可執為實熱寒證多虛最忌芩連梔檗及諸苦寒之物雖形體強盛但見虛脈虛證總不可認作有餘表寒者不起發不紅活根窠淡白身涼癢𤹀倒陷乾枯皆肌表無陽之證治宜補陽溫表裡寒者為吐瀉為嘔惡為腹脹為腹痛為吞酸為不欲食為寒戰咬牙氣寒喜暖為二便清利完穀不化皆臟腑無陽之證治宜溫中補陽表熱者為肌膚大熱根窠紅紫頂赤發斑頭面紅腫紫黑焦枯癰腫疔毒甚皆火在肌表之證治宜散邪解毒里執者為煩躁狂言口乾大渴咽腫喉痛內熱自汗小便赤澀大便祕結衄血溺血皆火在臟腑之證治宜清熱解毒虛實寒熱等證雖表裡之分各有如此然表之虛實表之寒熱孰不由中氣之所使故惟善治中氣則未有表不和調者也是即必求其本之道一純陰無陽之證凡痘瘡發熱手足卻宜和暖若手足厥冷必其人曾有吐瀉脾臟氣虛也脾主四肢所以冷為惡候即有外證亦不可單用發散反損脾胃之氣此當溫中兼表宜黃耆建中湯或六氣煎五物煎加防風羌活生薑荊芥之類以補養脾胃血氣而助痘疹之成就也部位吉凶九一五臟之屬皆見於於面故但察部位可知吉凶蓋人之面部左頰為肝右頰為肺額上為心頦下為腎鼻為脾土又目為肝之竅鼻為肺之竅口為脾之竅耳為腎之竅舌為心之苗若痘疹未出之先但得面中諸部明潤者吉燥暗者凶又山根為命宮年壽為疾厄宮此二宮紅黃光明者吉青黑昏暗者凶三陽之脈皆會於面正額為太陽脈之所會唇頦為陽明脈之所居兩耳前後為少陽脈之所過痘為陽毒故隨陽氣而先見於面惟陽明經乃胃與大腸積陳受腐血氣俱多之處故痘疹初發但於本經口鼻兩旁人中上下腮頦年壽之間先出現者為吉如太陽經則水火交戰之處少陽經則木火相併之鄉若於其位先現者凶凡起漿收靨亦皆如是一遍身部位皆有所辨如頭為諸陽聚會之處兩頤兩頰為五臟精華之腑咽為水穀之道路喉為呼吸之關門胸腹乃諸陽受氣之海為心肺之所居脊背乃諸陽之統會為十二經藏氣之所繫兒此五處稀少者吉若頭額多者謂之矇頭頸項多者謂之鎖項胸前多者謂之瞞胸矇頭則陽毒亢真陰竭鎖項則出入廢氣化絶瞞胸則心腹近神失守兩頰兩頤多至成片或如塗朱則肝盛克脾凡此者至八九日間多見滑泄瀉青或不能食最為險候故皆不宜多也惟四肢雖諸陽之本然乃身所役使卒伍卑賤之屬故雖多亦不至害凡起發成漿收靨俱如此也又心窩手足心謂之五心痘俱多者必重若頭面胸項手足細碎稠密一樣者恐氣血衰微脾胃虛弱不能周流灌注則無不危矣痘形痘色吉凶十萬氏曰形乃氣之充色乃血之華凡看痘者舍此更無他法是故形貴尖圓起發若瘡皮厚硬而平𤹀者凶色貴光明潤澤根窠紅活而慘黯昏黑者凶然形有起發而或致變者由色不明潤根不紅活故耳若痘色光澤根窠紅活雖平𤹀亦為可治然色以紅活為貴而猶有圈紅噀紅鋪紅之別圈紅者一線淡紅緊附於根下而無敗走之勢吉之兆也噀紅者血雖以附而腳跟血色隱然不聚險之兆也鋪紅者痘色與肉不分平鋪散漫凶之兆也以此察之則死生可預決矣根窠者血之基膿者血之成故六日以前專看根窠若無根窠必不灌膿六日以後專看膿色若無膿必不結痂此必然之勢也吉證十一一看口唇舌尖紅活無燥白之色者吉二看根窠紅潤圓活地白分明者吉三看心窩額上稀少者最為順候四看痘頂出來不焦不紫者吉五看顏色無黑陷痘頂內暗而黃如蒼蠟色外潤而黃如油色者吉一凡看痘之法須察部位並察多寡大抵痘少者毒少而吉痘多者毒甚而凶如上而頭面次而咽喉前而胸腹後而腰背下而四肢凡此五處但得二三處稀少而頭面別無危證即吉候也若五處通身皆密即雖顆粒分明恐氣血不能周給必難盡灌或既灌而不能收或既收而不能脫客強主弱而外盛內虛小舟重載而力不勝任鮮不覆矣此多寡之宜察勿謂雖多亦吉也凶證十二痘未出而聲啞嗾喉者不治已出五日內見者亦不治痘未壯而先抓破無氣血者不治痰涎壅盛氣急者不治痘未出已出而神昏氣促躁亂不寧者不治腹痛而瀉膿血者不治肌肉黎黑如被杖者不治漿水米粒不入口或飲食嗆喉者不治眼中神光不明珠色轉緑轉赤者不治閉目昏睡舌卷囊縮者不治頭溫足冷悶亂飲水者不治吐瀉不止藥食不停不化直下及肛門如竹筒者不治胃熱發黃身如橘色下利者不治痘初出即青晦焦黑者不治密如蠶種全不起發平片花搭者不治痘瘡癢𤹀寒戰不止者不治舊有瘡瘍走漏氣血而敷藥不效者不治故曰不怕五心有痘只怕原瘡泄漏原瘡即是未痘之先有瘡泄去膿血最為凶也若果五心稀少而飲食如常者亦不妨事痘後傷風傷食肌肉瘦脫者不治上除此之外雖有雜證險證及痘之稠密但略有潤澤興起之意須仗醫之高妙患家之心托弗惑細心調理自有可收全功者怪痘形證十三怪痘者乃逆痘中之尤甚者形證不一不可不辨一痘初出時面胸手足已見紅點卻不起發不成膿漿隨即收斂若加氣促聲啞悶亂者即死此名內陷證也此證若無煩喘悶亂等候者名曰試痘過五七日後必復發熱而痘出者其痘必重一痘瘡初出如蚊蚤所咬三日後反不見者名反關痘五日死一痘子出現三兩成叢根腳堅硬成塊者此名痘母六七日死一痘子將出身上有紅腫結硬處似瘤非瘤似癰非癰者亦名痘母三五日死以上二證俱宜真人解毒湯救之一痘初出便成血泡或水泡隨即破壞者此名爛痘二三日死一痘出後遍身都是空殼不作膿水者此名空痘八九日死一痘當出現起發之時中有乾黑者此名鬼痘宜用胭脂水塗之勿使蔓延若不能急治則乍起乍𤹀當靨不靨或多作番次而出綿延日久而死一痘出起發之時中有痛甚如刀剜叫哭不停者此名痘疔五六日死一痘當起發之時枯燥不潤𤹀伏不起皮膚皺揭者此名干痘五六日加煩滿喘急而死一痘於起發之時皮嫩易破摸之溫手者此名溫痘六七日癢𤹀而死一痘起發之時瘡色嬌豔皮薄光潤鮮紅可愛者此名嫩痘八九日後不能成痂必癢𤹀而死一痘於起發養漿之時瘡頭有孔漿水漏者此名漏瘡五六日後癢𤹀而死一賊痘者是諸痘未漿而此痘先熟也又名假云泛多在太陽喉口心胸等處三日見者六日死四日見者七日死五六日見者十一二日必死也一痘出雖稀根窠全白無血色三四日後雖亦起脹然按之虛突此亦名為賊痘氣血太虛至灌漿時必變成水泡大如葡萄皮薄若紙抓破即死一膿水將成之時其瘡自破有孔而深者此名倒陷一將靨之時不能成痂皮脫骨黑者此亦名倒陷俱不治一痘於收靨之時不能成痂皮肉潰爛膿水淋漓者此名痘癩能食則生不能食則死凡以上者皆不治之證死證日數歌十四初出頂陷連肉紅過至九日一場空又如血點帶紅紫斑證只在六日中發斑黑者在朝夕斑青頃刻去匆匆無膿癢𤹀期二日不冶腰疼及挺胸報痕似痱如蠶種舌卷囊縮命不充紫泡刺出黑血者飲食嗾喉證俱凶難療面腫痘不腫青色黑陷及無膿二便流利下腸垢更加吐瀉出蛔蟲頭溫足冷好飲水痘先驚後藥難攻氣促泄瀉渴不止目無神者數當窮聲啞失音叫與哭痘色縱好也難終有種氣急亦難治庶幾灌好是傷風見此宜服參蘇飲起死回生須見功發熱三朝辨吉凶十五一初發熱時身無大熱或熱或退神清氣爽唇鼻滋潤腰腹不疼自始至終皆飲食如常大便稠實小便清利而無雜證者吉不必服藥一初熱時先發驚搐一二次而隨止者此痘出心經也乃為吉兆不必治之若甚驚不止日發三五次或連日不止痘出多而密者乃凶兆也一初發熱時吐瀉不甚而隨止者吉一正發熱時或得大汗一身汗隨止而脈見稍平者吉一初發熱時用紅紙倏蘸麻油點照之如心窩或遍身有成瑰紅者八九日後決死一發熱一日即遍身齊出或稠密如蠶種摸之不礙手者決死一發熱時腹中大痛腰如被仗乃至報痘而痛猶不止者決死一發熱時頭面上有一片紅如胭脂者八九日以後決死一發熱時口鼻或大小便俱失血者快死一發熱時妄見妄語昏不知人者死一發熱時腹脹而痛大叫不止者死一正發熱三日之內其熱勿退而反煩躁悶亂坐臥不安此外雖清涼內卻熱也若見手足冷腹脹氣喘者即死以上諸證俱不必治報痘三朝辨吉凶十六一見點之時頭面稀少胸前背上皆無根窠紅潤頂突礙手如珠光澤此為上吉不必服藥一發熱三日或四五日熱稍退乃於口鼻腮頤地閣頸項之間或四肢先放數點大小不一淡紅潤色痘與肉色紅白分明者吉一痘作二三次出三日後手足心方才出齊出齊後頭面胸背稀少尖圓緊實飲食二便如常者吉如無他證不宜妄行用藥一痘之初出三五相連者必密單見者必稀一痘瘡上身多下身少者吉反是者險一發熱至五六日痘應出不出以燈照之只在皮膚中有紅點但其色脈和平別無逆證忽然眩冒大汗出者毒氣痘瘡一齊從汗而出者此名冒痘再無壅遏之患乃吉兆也一痘瘡變化莫測有等身無大熱亦見報痘但不灌膿結痂或出而覆沒者此名試痘不可誤作輕看再過數日忽然大熱必然復出宜審治之一發熱一日便出者凶或一齊湧出如蠶種密布者決死一大熱未退而見紅點數粒先見於太陽額角髮際天庭或山根以上等處此陽毒乘虛上侵陽位也大非吉兆再加目紅唇裂痰鳴色紫或白者尤甚又或有三五粒聚於一塊者此名銅錢痘皆不吉之兆急宜涼血解毒以防其危一痘瘡初出紫色紅片者名紫雲痘四日死一痘瘡初出當頂紅者六七日死蓋痘欲淡紅如線附於根下不欲當頂紅也一痘已出一遍又出一遍心腹疼痛不止口氣臭色紫黑者決死一痘瘡皮薄色白而光根窠全無紅色或根帶一點紅三五日後乃如緑豆樣此痘決不能成膿只成一胞清水擦破即死一色紅帶豔皮肉盡紅者必不成膿癢𤹀而死一報痘之時全不起頂有如湯泡及燈草火燒者十餘日後必癢𤹀而死一報痘之時有黑斑如痣狀或肌肉有成塊黑者即死一報痘時若口鼻及耳有紫紅色或血出不止者決死一報痘之時應出不出或起紅斑如蚊迹者六日後必死一報痘之時腰腹痛或狂言煩躁大渴吐瀉不食者俱不治一報痘之後痘已齊而身熱不退反甚者死一痘齊之後毒已外達則內當安靜而反見煩躁悶亂譫妄不止者此邪氣盛極神機無主也必死起發三朝辨吉凶十七自報痘三朝之後不疾不徐先出者先起後出者後起大小分明不相連串尖圓堅實紅活肥滿面目漸腫依期灌漿飲食二便如常而無他證者此表裡無病大吉之兆不必服藥一痘雖起發而色見灰白腫如錫餅者看其人臟氣何如如能食便調無他證者吉若不能食或吐利或瘙癢者凶一痘起一分則毒出一分至五六日不盡起發又色不紅活者大無生理一起脹三日已足痘皆滿頂紅紫者凶面目腫甚者亦凶一痘當起脹之時遍身雖起而頭面全然不起或痘不脹而肉脹頭面皮肉紅腫如瓠瓜之狀而痘反不起者決死一起脹之時遍身痘頂有眼如針孔紫黑色者決死一痘色乾燥不潤慘黑不明或灰白漸至倒陷或發紫泡者皆死一起脹時凡腰腹大痛或腹脹不能飲食或氣促神昏或悶亂不寧或泄瀉煩渴或唇白痰鳴或狂言妄語啼哭呻吟如見鬼神者皆死一起脹時吐利不止乳食不化或二便下血者死一手足間見而復隱起而後𤹀或通身隨脹隨沒躁而發喘者死一痘已起脹內有六七粒細而成塊於中有一大痘扁闊歪斜者凶一痘起紫色刺出黑血如屋漏水者死一痘於起發時瘡頭便戴白漿者不分何處並非佳兆不特唇口然也灌膿三朝辨吉凶十八一痘自起發之後小者漸大平者漸高陷者漸起外帶微紅內涵清漿以至灌膿之時卻要個個成膿根腳紅活其形圓滿光澤此時毒化成漿山緑色而漸變蒼蠟以手按之其皮堅硬膿漿厚濁約束完固無少破損飲食二便如常此上吉候也不必服藥一痘密者自起至漿漸至壯大未有不相串者雖相連屬只要根腳分明陷者盡起無處不透則毒從漿化膿成而毒自解無伏留者矣此亦吉候一痘之初出或頂平或中心陷下或白色只要其人能食二便如常治無乖謬以及灌膿之時陷者微起平者微尖淡白者紅活窠中血水盡化為膿但得如此毒已解矣又表無痛癢之證里無吐瀉之證是表裡俱無病也如此者坐待收靨不可妄投湯劑一灌膿時紅紫黑色外剝聲啞者死一灌時純是清水皮薄而白如水泡者三四日必抓破而死一膿不能灌而乾枯焦黑或全無血水𤹀陷者即死一頭面腫大瘡盡搔破臭不可近而足冷者決死一灌膿之時吐利不止或二便下血乳食不化痘爛無膿者決死一灌膿之時二便不通腹脹肉黑髮斑譫妄氣喘或寒戰咬牙者決死一回漿之時漸當蒼黑收斂而反光嫩不斂者此氣血兩虛漿不能幹必發癢搔破而死一膿漿未成忽然干收或青紫焦黑者死一忽然作癢正面抓破皮脫肉乾者死一諸痘有漿而天庭不起或額上如沸湯澆破臭連兩頰水去而干似靨非靨者死結靨三朝辨吉凶十九一痘至十日之外血化毒解膿必漸干如蒼蠟色或如葡萄色從口鼻兩旁面部收起以至胸腹而下然後額上與腳背一齊結靨而落別無內證飲食二便如常或從手足心手指尖或陰上先收者俱吉候也一痘既蒼蠟收靨而身有微熱者乃燒瘢之證但飲食如常供不必治一痘當靨時遍身臭爛目無神氣者決死一當靨之時遍身發癢搔破無膿皮卷如豆殼而乾者死一當靨之時無膿而氣急聲啞或手足顫掉或寒戰咬牙或腹脹痰響或足冷過膝或小便少而大便頻者皆死一當靨時兩臉乾硬按之如石者死一痘至收靨飲食不進口中常如食物動而不止者決死一面部胸腹未靨而腳先靨者危陰勝陽也一遍身俱靨內遺數粒獨不靨者尚能殺人如蛇之退皮中有一節被傷不能全退者終死其有靨至項下或至胸住定而服藥不效者亦死一痘瘡未該靨而卒然焦紫者死一痘當靨時遍身未見膿成而口唇上下痘先黃熟者毒氣內攻於脾也凶一痘瘡有膿結靨者則為吉證若無膿收靨則立見其危一痘未收靨而口唇腐爛及口白到舌者危一收靨時前後有紅紫泡者不治落痂後辨吉凶二十一痘瘡收後其痂先後自脫痂厚落遲離肉不黏者吉一自食痘痂者雖有他證不死一疽痂雖落而痘瘢雪白略無血色者氣血脫盡也若不急培元氣則過後必死一痂落後每發驚而神無所依者心氣絶也危一痂落後手足顫掉咬牙噤口目閉腹脹足冷過膝者不治一原痘乾燥膿少不灌雖結靨落痂而疤白者或有餘熱不退者雖過一月亦要死痘瘡上論列方二十一真人解毒湯痘五二
