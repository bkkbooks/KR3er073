body:
  text: 卷之五十二圖集古方八陣古方總目以下總列共一十三卷附古方條序愚按古方之散列於諸家者既多且雜或互見於各門或彼此之重複欲通其用涉獵固難欲盡收之徒資莠亂今余採其要者類為八陣曰補和攻散寒熱固因八陣之外複列有婦人小兒痘疹外科之四方且於諸方之中仍以類聚庶乎奇正羅列緩急並陳或舍短可以就長或因此可以校彼慧眼所及朗如日星引而伸之觸類而長之因古人之繩墨得資我之變通醫中之能事斯亦先幾一著也凡我同志其加省焉一曰補陣存亡之幾幾在根本元氣既虧不補將何以復故方有補陣二曰和陣病有在虛實氣血之間補之不可攻之又不可者欲得其平須從緩治故方有和陣三曰攻陣邪固疾深勢如強寇速宜伐之不可緩也故方有攻陣四曰散陣邪在肌表當逐於外拒之不早病必日深故方有散陣五曰寒陣陽亢傷陰陰竭則死或去其火或壯其水故方有寒陣六曰熱陣陰極亡陽陽盡則斃或祛其寒或助其火故方有熱陣七曰固陣元氣既傷虛而且滑漏泄日甚不盡不已故方有固陣八曰因陣病有相同治有相類因證用方亦有不必移易者故方有因陣附列四方古方於八陣之外其有未盡者如婦人有經脈胎產之異小兒有養育驚疳之異痘疹有出沒變化之異外科有經臟表裡之異隨幾應變治有不同故並列方目於下
