body:
  text: 卷之二十七必集雜證謨眼目經義共三十一條五臟生成篇曰諸脈者皆屬於目肝受血而能視五閲五使篇曰目者肝之官也肝病者眥青金匱真言論曰東方青色入通於肝開竅於目邪氣臟腑病形篇曰十二經脈三百六十五路其血氣皆上於面而走空竊其精陽氣上走於目而為睛大惑論曰五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比也則精散精散則視岐視歧見兩物目者五臟六腑之精也營衛魂魄之所常營神氣之所常生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽也故陰陽合傳而精明也目者心使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也脈度篇曰蹺脈氣不榮則目不合肝氣通於目肝和則目能辨五色矣寒熱病篇曰足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃別陰蹺陽蹺陰陽相交陽入陰陰出陽交於目鋭眥陽氣盛則䐜目陰氣盛則瞑目衛氣行篇曰平旦陰盡陽氣出於目目張則氣上行於頭夜則氣行於陰而復合於目口問篇曰心者五臟六腑之主也目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故泣涕出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精解精微論曰夫心者五臟之專精也目者其竅也華色者其榮也是以人有德也則氣和於目有亡憂知於色是以悲哀則泣下泣下水所由生夫水之精為志火之精為神水火相感神志俱悲是以目之水生也厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也夫一水不勝五火故目眥盲是以衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也有以比之夫火疾風生乃能雨此之類也決氣篇曰氣脫者目不明癲狂篇曰狂目妄見耳妄聞善呼者少氣之所生也藏氣法時論曰肝病者虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽熱病篇曰目中赤痛從內眥始取之陰蹺目不明熱不已者死繆刺篇曰邪客於足陽蹺之絡令人目痛從內眥始刺外踝之下半寸所各二痏左刺右右刺左如行十里頃而已論疾診尺篇曰目赤色病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病經筋篇曰足太陽之筋支者為目上綱足陽明之筋上合於太陽為目下綱足少陽之筋支者結於目眥為外維足陽明之筋引缺盆及頰卒口僻急者目不合熱則筋縱目不開癲狂篇曰目眥外決於面者為鋭眥在內近鼻者為內眥上為外眥下為內眥評熱病論曰水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也脈要精微論曰夫精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色精微象見矣其壽不久也夫精明者所以視萬物別黑白審長短以長為短以白為黑如是則精衰矣五常政大論曰赫曦之紀其病瘡瘍血流狂妄目赤陽明司天燥氣下臨肝氣上從脅痛目赤六元正紀大論曰少陽司天之政初之氣候乃大溫其病血溢目赤三之氣炎暑至民病熱中喉痹目赤少陰司天之政民病目赤眥瘍二之氣陽氣布風乃行其病淋目冥目赤氣鬱於上而熱三之氣大火行民病目赤火鬱之發民病目赤心熱甚則瞀悶懊憹善暴死木鬱之發甚則耳鳴眩轉目不識人至真要大論曰少陽之勝目赤欲嘔太陽司天面赤目黃善噫氣交變大論曰歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛眥瘍師傳篇曰肝者主為將使之候外欲知堅固視目小大目下果大其膽乃橫五臟生成篇曰徇蒙招尤目冥耳聾下實上虛過在足少陽厥陰甚則入肝凡相五色之奇脈詳前面病門海論曰髓海不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥風論曰風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣循風府而上則為腦風風入系頭則為目風眼寒經脈篇曰五陰氣俱絶則目系轉轉則目運目運者為志先死志先死則遠一日半死矣診要經終論曰太陽之脈其終也戴眼反折詳三十七卷死生門三部九候論曰目內陷者死瞳子高者太陽不足戴眼者太陽已絶此決死生之要不可不察也論證共四條眼目一證雖古有五輪八廓及七十二證之辨余嘗細察之似皆非切當之論徒資惑亂不足憑也以愚論之則凡病目者非火有餘則陰不足耳但辨以虛實二字可盡之矣蓋凡病紅腫赤痛及少壯暫得之病或因積熱而發者皆屬之有餘其有既無紅腫又無熱痛而但或昏或澀或眩運或無光或年及中衰或酒色過度以致羞明黑暗瞪視無力珠痛如摳等證則無非水之不足也虛者當補實者當瀉此固其辨矣然而實中亦有兼虛者此於腫痛中亦當察其不足虛中亦有兼實者又於衰弱內亦當辨其有餘總之虛實殊途自有形氣脈色可診可辨也知斯二者則目證雖多無餘義矣一眼科有風熱之説今醫家凡見火證無論有風無風無不稱為風熱多從散治而不知風之為義最當辨析夫風本陽邪然必有外感方是真風因風生熱者風去火自息此宜散之風也若本無外感止因內火上炎而為癢為痛者人亦稱為風熱蓋木屬肝肝主風因熱極而生風者熱去風自息此不宜散者也如果風由外感必見頭痛鼻塞或為寒熱或多涕淚或筋骨痠疼而脈見緊數方可兼散如無表證而陰火熾於上者則凡防風荊芥升麻白芷細辛川芎薄荷羌活之類皆不宜用雖曰亦有芩連梔柏自能清火然宜升者不宜降用散者是也宜降者不宜升用清者是也若用藥不精未免自相掣肘多致可速者反遲病輕者反重耽視日久而翳障損明無所不致又孰能辨其由然哉此不可不察其陰陽升降之道也外有升陽散火辨在二卷中亦宜參閲一眼目之證當察色以辨虛實經曰黃赤者多熱氣青白者少熱氣故凡治黃赤者宜清肝瀉火治青白者宜壯腎扶陽此固不易之法也至於目黃一證尤宜辨其虛實不可謂黃者必由熱也蓋有實熱而黃者有虛寒而黃者實熱之黃如造麴者然此以濕熱內蓄鬱蒸而成熱去則黃自退非清利不可也若虛寒之黃則猶草木之凋此以元陽日剝津液消索而然其為病也既無有餘之形氣又無煩熱之脈證惟因乾涸所以枯黃凡此類者其衰已甚使非大加溫補何以回生切不可因其色黃概執為熱而再加清利鮮不危矣一翳障當分虛實大都外障者多由赤痛而成赤痛不已則或為胬肉或為瘢𥀬此皆有餘之證治當內清其火外磨其障若內障者外無雲翳而內有矇蔽綱目謂其有翳在黑睛內遮瞳子而然龍木論又云腦脂流下作翳者足太陽之邪也肝風衝上作翳者足厥陰之邪也故治法以針言之則當取三經之俞如天柱風府大沖通里等穴是也又聞有巧手妙心能用金針於黑眼內拔去雲翳取效最捷者此雖聞之而實未見其人也又有所謂內障者察其瞳子則本無遮隔惟其珠色青藍或微兼緑色或瞳人散大別無熱壅等證而病目視不明或多見黑花等證此悉由腎氣不足故致瞳子無光若有所障而實無障也治當專補腎水氣虛者尤當兼補其氣又有七情不節肝氣上逆或挾火邪而為矇昧不明若有所障者雖其外無赤痛然必睛珠脹悶或口鼻如煙此亦有餘之證氣逆者先當順氣多火者兼宜清火若氣不甚滯火不甚盛必當滋養肝血然有餘者多暴至若因循日積者多不足也又當以此辨之論治共六條一火證眼目赤痛或腫或澀或羞明脹悶凡暴病而火之甚者宜抽薪飲加減主之火之微者宜徙薪飲黃芩黃連湯之類主之若陰虛而火盛者宜加減一陰煎瀉白散滋陰地黃丸之類主之若久病不已或屢發而多火者宜黃連羊肝丸明目羊肝丸或固本還睛丸之類主之一真陰不足本無火證而但目視無光及昏黑倦視等證悉由水虧血少而然宜濟陰地黃丸左歸丸之類主之或兼微火者宜明目地黃丸固本還睛丸之類主之若陰中之陽虛者宜大補元煎左歸飲人參養營湯十全大補湯之類主之一風熱腫痛之證察其果有外感方可從散宜芎辛散明目細辛湯助陽和血湯之類擇而用之若風熱相兼者宜芍藥清肝散當歸龍膽湯蟬花散之類主之一翳障遮睛凡火有未清者宜蟬花散八味還睛散之類主之凡退翳諸藥如白蒺藜木賊蜜蒙花蛇蛻蟬蛻青葙子草決明石決明夜明砂之類皆所宜用然欲退翳於已成終屬費力不若早杜其源也一點眼諸方載者固多然皆不若金露散之為妥也或用丹砂散亦妙若火連五臟熱毒深遠而凡過用寒涼點洗者多致留邪大非良法若火邪不甚而暴為赤痛者用雞子黃連膏其效甚捷或黃連膏一目眶歲久赤爛俗呼為赤瞎是也當以三稜針刺目眶外出血以瀉濕熱而愈或用洗爛弦風赤眼方亦妙述古共七條龍木禪師論曰人有雙眸如天之有兩曜乃一身之至寶聚五臟之精華其五輪者應五行八廓者應八卦凡所患者或因過食五辛多啖炙爆熱餐麵食飲酒不已房室無節極目遠視數看日月頻撓心火夜讀細字月下觀書抄寫多能雕鏤細作博奕不休久被煙火泣淚過多刺頭出血太甚若此者俱散明之本復有馳騁田獵沖冒塵沙日夜不息者亦傷目之由又有少壯之時不自保惜逮自四旬以漸昏蒙故善衛養者才至中年無事常須冥目勿使他視非有要事不宜輒開則雖老而視不衰大抵營衛順則斯疾無由而生營衛衰則致病多矣且傷風冷則淚出虛煩則昏蒙勞力則眥赤白腫則肺家受毒生瘡則風熱侵肺黃乃酒傷於脾血灌瞳人及赤色俱是心家有熱羞明見紅花為肝邪黑花則腎虛青花膽有寒五色花是腎虛有熱不可一概為治若虛不補而實不瀉亦難收救然上虛乃肝虛下虛乃腎虛肝虛則頭暈耳聾目眩腎虛則虛壅生花耳作蟬鳴大宜補肝益腎其有熱淚交流兩瞼赤痛乃肝之熱極迎風有淚為腎虛客熱涼肝瀉腎必得其宜至於五臟各以類推虛則生寒實則生熱補瀉之用須在參詳毫釐之差千里之謬余則無非有所觸動或大病之後所患不一至於暴赤一證多因泛熱衝上或眠食失時飽食近火得之加以勞役失於調攝過食毒物變成惡證醫者不源本始但知暴赤屬陽或以散血之劑或以涼心之藥縱使退散遂致脾經受寒飲食不進頭目虛煩五臟既虛因成內障亦有見其不進飲食俾更服熱藥遂致暴燥熱氣上攻昏澀眵淚或犯盛怒辛苦重勞遂生胬肉心氣不寧風熱交併變為攀睛證狀不一是為外障又加讀書博奕算勞過度名曰肝勞不可但投以治肝之劑及作他證治之終於罔效惟須閉目珍護不及遠視庶乎疾瘳若乎患風疹者必多眼暗先攻其風則暗自去婦人胎前産後用藥亦須避忌小兒所患切宜善治惟略加淋洗若披鐮針灸斷不可施猶戒用手頻揉或因茲睛壞至於莫救以上諸證專是科者宜留意焉楊仁齋曰眼者五臟六腑之精華如日月麗天而不可掩者也其大眥屬心其白睛屬肺其烏珠屬肝其上下瞼胞屬脾而中之瞳仁屬腎是雖五臟各有證應然論其所主則瞳子之關係重焉何以言之夫目者肝之外候也肝屬木腎屬水水能生木子肝母腎也焉有子母而能相離者哉故肝腎之氣充則精彩光明肝腎之氣乏則昏蒙眩暈若烏輪赤暈刺痛浮漿此肝熱也燥澀清淚枯黃繞睛此肝虛也瞳人開大淡白偏斜此腎虛也瞳人集小或帶微黃此腎熱也一虛一實以此驗之然肝腎之氣相依而行孰知心者神之舍又所以為肝腎之副焉所謂一而二二而一者也何則心主血肝藏血凡血熱沖發於目者皆當清心涼肝又不可固執水生木之説夫眼以輕膜裹水照徹四方溯源反本非天一生水又孰為之主宰乎析而論之則拘急牽颼瞳青胞白癢而清淚不赤不痛是謂之風眼烏輪突起胞硬紅腫眵淚濕漿裹熱刺痛是謂之熱眼眼渾而淚胞腫而軟上壅朦朧酸澀微赤是謂之氣眼其或風與熱並則癢而浮赤風與氣搏則癢澀昏沉血熱交聚故生淫膚粟肉紅縷偷針之類氣血不至故有眇視胞垂雀眼盲障之形淡紫而隱紅者為虛熱鮮紅而妒赤者為實熱兩眥呈露生胬肉者此心熱血旺白睛紅膜如傘紙者此氣滯血凝熱證瞳人內湧白睛帶赤冷證瞳人青緑白睛枯稿眼熱經久復為風冷所乘則赤爛眼中不赤但為痰飲所注則作疼肝氣不順而挾熱所以羞明熱氣蓄聚而傷飽所以飽合籲此外證之大概然爾然五臟不可闕一脾與肺獨無預何也曰白睛帶赤或紅筋者其熱在肺上胞下胞或目唇間如疥點者其熱在脾脾主味也五味之秀養諸中則精華髮見於其外肺主氣也水火升降營衛流轉非氣孰能使之前所謂五臟各有五證應者於此又可推矣雖然眼之為患多生於熱其間用藥大抵以清心涼肝調血順氣為先有如腎家惡燥設遇虛證亦不過以當歸地黃輩潤養之則輕用溫藥不可也況夫肺能發燥肝亦好潤古方率用杏仁柿干飴糖沙蜜為佐果非潤益之意乎至於退翳一節尤關利害凡翳起於肺家受熱輕則朦朧重則生翳珍珠翳狀如碎米者易散梅花翳狀如梅花瓣者難消雖翳自熱生然治法先退翳而後退熱者去之猶易若先去赤熱則血為之冰而翳不能去其有赤眼與之涼藥過多又且滌之以水不反掌而冰凝眼特一團水耳水性清澄尤不可規規於點洗喜怒失節嗜欲無度窮役目力泣涕過傷衝風凌霧當暑冒日不避煙火飲啖熱多此皆患生於臟腑者也專恃點洗可乎哉惟有靜坐澄神愛護目力放懷息慮心逸日休調和飲食以養之斟酌藥餌以平之明察秋毫斷可必矣張子和曰聖人雖言目得血而能視然血亦有太過不及也太過則壅閉而發痛不及則目耗竭而失明故年少之人多太過年老之人多不及但年少之人則無不及年老之人間猶有太過者不可不察也夫目之內眥太陽經之所起血多氣少目之鋭眥少陽經也血少氣多目之上綱太陽經也亦血多氣少目之下綱陽明經也血氣俱多然陽明經起於目兩旁交頞之中與太陽少陽俱會於目惟足厥陰經連於目系而已故血太過者太陽陽明之實也血不及者厥陰之虛也故出血者宜太陽陽明蓋此二經血多故也少陽一經不宜出血血少故也刺太陽陽明出血則愈明刺少陽出血則愈昏要知無使太過不及以血養目而已凡血之為物太多則溢太少則枯人熱則血行疾而多寒則血行遲而少此常理也目者肝之外候也肝主目在五行屬木木之為物太茂則蔽密太衰則枯瘁矣夫目之五輪乃五臟六腑之精華宗脈之所聚其氣輪屬肺金肉輪屬脾土赤脈屬心火黑水神光屬腎水兼屬肝木此世俗皆知之矣及有目疾則不知病之理豈知目不因火則不病何以言之氣輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火自甚也能治火者一句可了故內經曰熱勝則腫凡目暴赤腫起羞明隱澀淚出不止暴寒目瞞皆大熱之所為也治火之法在藥則鹹寒吐之下之在針則神庭上星囟會前頂百會血之翳者可使立退痛者可使立已昧者可使立明腫者可使立消惟小兒不可刺囟會為肉分淺薄恐傷其骨然小兒水在上火在下故目明老人火在上水不足故目昏內經曰血實者宜決之又曰虛者補之實者瀉之如雀目不能夜視及內障暴怒大憂之所致也皆肝主目血少禁出血止宜補肝養腎至於暴赤腫痛皆宜以扉針刺前五穴出血而已次調鹽油以塗髮根甚者雖至於再至於三可也量其病勢以平為期子和嘗自病目赤或腫或翳羞明隱澀百餘日不愈眼科張仲安云宜刺上星百會攢竹絲空諸穴上出血又以草莖納兩鼻中出血約升許來日愈大半三日平復如故此則血實破之之法也李東垣曰五臟六腑之精氣皆稟受於脾上貫於目脾者諸陰之首也目者血脈之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火代行其令相火者胞絡也主百脈皆榮於目既勞役運動勢乃妄行又因邪氣所並而損血脈故諸病生焉凡醫者不理脾胃乃養血安神治標不治本是不明正理也若概用辛涼苦寒之劑損傷真氣促成內障之證矣又東垣曰能遠視不能近視者陽氣不足陰氣有餘也乃氣虛而血盛也血盛者陰火有餘氣虛者氣弱也此老人桑榆之象也能近視不能遠視者陽氣有餘陰氣不足也乃血虛氣盛也血虛氣盛者皆火有餘元氣不足也火者元氣之賊也王海藏曰目能遠視責其有火不能近視責其無水宜東垣地黃丸主之目能近視責其有水不能遠視責其無火東垣定志丸主之愚謂此二子之説在東垣以不能近視為陽不足不能遠視為陰不足在海藏以能遠視不能近視責其有火無水能近視不能遠視責其有水無火何二子之言相反也豈無是非之辨哉觀劉宗厚曰陽氣者猶日火也陰氣者金水也先儒謂金水內明而外暗日火外明而內暗此自不易之理也然則內明者利於近外明者利於遠故凡不能遠視者必陰勝陽也不能近視者必陽勝陰也由此言之則海藏是而東垣非矣若以愚見評之則但當言其不足不必言其有餘故曰不能遠視者陽氣不足也不能近視者陰氣不足也豈不甚為明顯若東垣以陰氣有餘陽氣有餘皆謂之火則能視者皆火病也海藏云能近視責其有水能遠視責其有火則當責者亦是病也此等議論余則未敢服膺王節齋曰眼赤腫痛古方用藥內外不同在內湯散則用苦寒辛涼之藥以瀉其火在外點洗則用辛熱辛涼之藥以散其邪故點藥莫要於冰片而冰片大辛熱以其性辛甚故藉以拔出火邪而散其熱氣古方用燒酒洗眼或用乾薑末生薑汁點眼者皆此意也蓋赤眼是火邪內炎上攻於目故內治用苦寒之藥是治其本如鍋底之去薪也然火邪既客於目從內出外若外用寒涼以阻逆之則火鬱內攻不得散矣故點藥用辛熱而洗眼用熱湯是火鬱則發因而散之從治法也世人不知冰片為劫藥而誤認為寒常用點眼遂致積熱入目而昏暗障翳故云眼不點不瞎者也又不知外治忌寒涼而妄將冷水冷物冷藥挹洗致昏瞎者有之愚按節齋之論其屬有理然寒涼點眼之法亦非盡不可用但用之有宜否耳蓋點以寒涼用治火也若火之微者其勢輕其邪淺或偶觸煙火風熱或素有標病邪在膚腠之間而熱不深者即用黃連膏之類暫為清解亦可去熱浮熱去而目自愈無不可也若火之甚者本於五臟而熾及三陽欲以一星之寒涼濟此炎炎之盛勢其果能否此其解熱之功毫無所及而閉熱之害惟目受之矣故凡病火眼之甚者點以寒涼痛必連珠正由火鬱而然耳所以久點寒涼而不效者未有不致於壞目此王節齋之論有不可不察而凡治癰疽外證者亦當並識此義薛立齋曰前證若體倦少食視物昏花或飲食勞倦益甚者脾胃虛也用補中益氣湯眵多緊澀赤脈貫睛或臟腑祕結者用芍藥清肝散若赤翳布白畏日羞明或痛如刺者上焦風熱也用黃連飲子若久視生花畏日遠視如霧者神氣傷也用神效黃耆湯大凡午前甚而作痛者東垣助陽和血湯午後甚而作痛者黃連天花粉丸午後甚而不痛者東垣益陰腎氣丸主之針灸法睛明風池太陽神庭上星囟會百會前頂攢竹絲竹空承泣目窗客主人承光以上諸穴皆可用針或以三稜針出血凡近目之穴皆禁灸大骨空穴在手大指第二節尖灸九壯以口吹火滅小骨空穴在手小指第二節尖灸七壯以口吹火滅上二穴能治迎風冷淚風眼爛弦等證合谷治陽明熱鬱赤腫翳障或迎風流淚灸七壯大抵目疾多宜灸此永不再發也亦可針翳風灸七壯治赤白翳膜目不明肝俞灸七壯治肝風客熱迎風流淚雀目足三里灸之可令火氣下降明目二間灸命門灸水溝可針可灸治目睛直視手三里灸右取左左取右八關大刺治眼痛欲出不可忍者須刺十指縫中出血愈眼目論列方抽薪飲新寒三大補元煎新補一明目羊肝丸因二七徙薪飲新寒四黃連飲子因二一黃連羊肝丸因二八瀉白散寒四二十全大補湯補二十補中益氣湯補三十芎辛散因十七人參養營湯補二一神效黃耆湯補四八左歸丸新補四固本還精丸因十三濟陰地黃丸因五右歸飲新補三八味還睛散因十一滋陰地黃丸因九蟬花散因二五加減一陰煎新補九益陰腎氣丸因四金露散新因四四助陽和血湯因十六明目地黃丸因七丹砂散因三七當歸龍膽湯因二三明目細辛湯因十八黃連膏因三三三六芍藥清肝散寒六一洗爛眼赤眼方因四四黃連天花粉丸因二七黃芩蘇連湯因二二雞子黃連膏新因四三論外備用方逍遙散補九二目暗羌活勝風湯散六一風熱定志丸補百十六不能近視上清散散六九搐鼻諸眼目方共五十二方俱在因陳耳證經義陰陽應象大論曰北方生寒在臟為腎在竅為耳五閲五使篇曰耳者腎之官也金匱真言論曰南方赤色入通於心開竅於耳生氣通天論曰故聖人傳精神服天氣而通神明失之則內閉九竅外壅肌肉衛氣解散陽不勝其陰則五臟氣爭九竅不通玉機真藏論曰脾不及則令人九竅不通名曰重強脈度篇曰五臟不和則七竅不通腎氣通於耳腎和則耳能聞五音矣口問篇黃帝曰人之耳中鳴者何氣使然岐伯曰耳者宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴補客主人手大指爪甲上與肉交者也上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩決氣篇曰精脫者耳聾液脫者耳數鳴海論曰髓海不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥師傳篇曰腎者主為外使之遠聽視耳好惡以知其性癲狂篇曰狂目妄見耳妄聞善呼者少氣之所生也臟氣法時論曰肝病者虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽氣逆則頭痛耳聾不聰頰腫取血者肺病者虛則少氣不能報息耳聾嗌乾取其經太陰足太陽之外厥陰內血者通評虛實論曰暴厥而聾偏塞閉不通內氣暴薄也頭痛耳鳴九竅不利腸胃之所生也五臟生成篇曰徇蒙招尤目冥耳聾下實上虛過在足少陽厥陰甚則入肝經脈篇曰小腸手太陽也是主液所生病耳聾目黃頰腫手陽明實則齲聾三焦手少陽也是動則病耳聾渾渾焞焞嗌腫喉痹脈解篇曰太陽所謂耳鳴者陽氣萬物盛上而躍故耳鳴也所謂浮為聾者皆在氣也熱論篇曰傷寒三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾兩感者三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死本藏篇曰黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也氣交變大論曰歲火太過耳聾中熱歲金太過目赤痛耳無所聞至真要大論曰歲太陰在泉民病耳聾渾渾焞焞嗌腫喉痹少陰司天客勝則耳聾目冥厥陰司天客勝則耳鳴掉眩少陽司天客勝則嗌腫耳聾六元正紀大論曰少陽所至為喉痹耳鳴木鬱之發為耳鳴眩轉目不識人診要經終論曰少陽終者耳聾百節皆縱目睘絶系絶系一日半死邪氣臟腑病形篇曰十二經脈三百六十五絡其血氣皆上於面而走空竅其彆氣走於耳而為聽衛氣篇曰足少陽之標在窗籠之前窗籠者耳也寒熱病篇曰暴聾氣蒙耳目不明取天牖雜病篇曰聾而不痛者取足少陽聾而痛者取手陽明繆刺論曰邪客於手陽明之絡令人耳聾時不聞音刺手大指次指爪甲上去端如韭葉各一痏立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也耳中生風者亦刺之如此數左刺右右刺左耳聾刺手陽明不已刺其通脈出耳前者邪客於手足少陰太陰足陽明之絡此五絡者皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥刺其足大指內側爪甲上去端如韭葉後刺足心後刺足中指爪甲上各一痏後刺手大指內側去端如韭葉後刺手心主少陰鋭骨之端各一痏立已不已以竹管吹其兩耳鬄其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已厥病篇曰耳聾無聞取耳中聽宮也手太陽穴耳痛不可刺者耳中有膿若有干盯聹耳無聞也耳聾取小指次指爪甲上與肉交者先取手後取足耳鳴取手中指爪甲上左取右右取左先取手後取足刺熱篇曰熱病先身重骨痛耳聾好瞑刺足少陰病甚為五十九刺熱病篇曰熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不治論疾診尺篇曰嬰兒病耳間青脈起者掣痛論證共三條耳聾證諸家所論雖悉然以余之見大都其證有五曰火閉曰氣閉曰邪閉曰竅閉曰虛閉凡火閉者因諸經之火壅塞清道其證必哄哄熇熇或脹或悶或煩或熱或兼頭面紅赤者是也此證治宜清火火清而閉自開也氣閉者多因肝膽氣逆其證非虛非火或因恚怒或因憂鬱氣有所結而然治宜順氣氣順心舒而閉自開也邪閉者因風寒外感亂其營衛而然解其邪而閉自開也竅閉者必因損傷或挖傷者或雷炮之震傷者或患聤耳潰膿不止而壞其竅者是宜用開通之法以治之也虛閉者或以年衰或以病後或以勞倦過度因致精脫腎虧漸至聾閉是非大培根本必不可也凡此數者有從外不能達者其病在經有從內不能通者其病在臟當各隨其宜而治之自無不愈者然暴聾者多易治久聾者最難為力也一耳聾證總因氣閉不通耳蓋凡火邪風邪皆令氣壅壅則閉也怒則氣逆逆則閉也竅傷則氣窒窒則閉也虛則氣不充不充則閉也凡邪盛氣逆而閉者實閉也氣有不及而閉者虛閉也然實閉者少而虛閉者多且凡屬實邪固令耳竅不通使果正氣強盛斷不至此惟經氣不足然後邪氣得以奪之此正邪之所湊其氣必虛之謂也故即系實邪而病至聾閉者亦無不有挾虛之象所以凡治此證不宜峻攻如古法之用通聖散神芎丸涼膈散木香檳榔丸之屬皆不可輕用蓋恐攻之未必能愈耳而反傷脾胃則他變踵至矣至若治此之法凡火壅於上者自宜清降兼陰虛者亦宜補陰此陽證之治也若無火邪止由氣閉則或補或開必兼辛溫之劑方可通行此陰證之治也然此二者皆當以漸調理但無欲速庶乎盡善一耳鳴當辨虛實凡暴鳴而聲大者多實漸鳴而聲細者多虛少壯熱盛者多實中衰無火者多虛飲酒味厚素多痰火者多實質清脈細素多勞倦者多虛且耳為腎竅乃宗脈之所聚若精氣調和腎氣充足則耳目聰明若勞傷血氣精脫腎憊必至聾瞶故人於中年之後每多耳鳴如風雨如蟬鳴如潮聲者是皆陰衰腎虧而然經曰人年四十而陰氣自半半即衰之謂也又以易義參之其象尤切易曰坎為耳蓋坎之陽居中耳之聰在內此其所以相應也今老人之耳多見聰不內居而聲聞於外此正腎元不固陽氣漸渙之徵耳欲求來復其勢誠難但得稍緩即已幸矣其惟調養得宜而日培根本乎論治共五條一火盛而耳鳴耳閉者當察火之微甚及體質之強弱而清之降之火之甚者宜抽薪飲大分清飲當歸龍薈丸之類主之火之微者宜徙薪飲主之兼陰虛者宜加減一陰煎清化飲之類主之兼痰者宜清膈飲主之一氣逆而閉者宜六安煎加香附丹皮厚朴枳殼之類主之氣逆兼火者宜加山梔龍膽草天花粉之類主之氣逆兼風寒者加川芎細辛蘇葉菖蒲蔓荊子柴胡之類主之一傷寒外感發熱頭痛不解而聾者當於傷寒門察證治之邪解而耳自愈也但傷寒耳聾雖屬少陽之證然必因虛所以有之故仲景亦以為陽氣虛也是以凡遇此證必當專顧元氣有邪者兼以散邪且可因耳之輕重以察病之進退若因治而聾漸輕者其病將愈聾漸甚者病必日甚也其有聾閉至極而絲毫無聞者此其腎氣已絶最是大凶之兆一虛閉證凡十二經脈皆有所主而又惟肝腎為最若老年衰弱及素稟陰虛之人皆宜以大補元煎或左歸右歸丸肉蓯蓉丸或十全大補湯之類主之若憂愁思慮太過而聾者宜平補鎮心丹辰砂妙香散之類主之若陽虛於上者宜補中益氣湯歸脾湯之類主之凡諸補劑中或以川芎石菖蒲遠志細辛升麻柴胡之類皆可隨宜加用但因虛而閉或已久者終不易愈耳一竅閉證非因氣血之咎而病在竅也當用法以通之外臺祕要治聾法用芥菜子搗碎以人乳調和綿裹塞耳數易之即聞千金方治耳聾久不效用大蒜一瓣中剜一孔以巴豆一粒去皮膜慢火炮極熟入蒜內用新綿包定塞耳中三次效又方用骨碎補削作條火炮乘熱塞耳中又方治耳聾用巴豆一粒去心皮斑蝥一枚去翅足二物合搗膏綿裹塞耳中再易甚驗經驗方用巴豆一粒蠟裹以針刺孔令透塞耳中又古法以酒浸針砂一日至晚去砂將酒含口中用活磁石一塊綿裹塞耳左聾塞左右聾塞右此導氣通閉法也凡耳竅或損或塞或震傷以致暴聾或鳴不止者即宜以手中指於耳竅中輕輕按捺隨捺隨放隨放隨捺或輕輕搖動以引其氣捺之數次其氣必至氣至則竅自通矣凡值此者若不速為引導恐因而漸閉而竟至不開耳述古薛立齋曰按前證若血虛有火用四物加山梔柴胡若中氣虛弱用補中益氣湯若血氣俱虛用八珍湯加柴胡若怒便聾而或鳴者屬肝膽經氣實用小柴胡加芎歸山梔虛用八珍加山梔若午前甚者陽氣實熱也小柴胡加黃連山梔陽氣虛用補中益氣湯加柴胡山梔午後甚者陰血虛也四物加白朮茯苓若腎虛火動或痰盛作渴者必用地黃丸經云頭痛耳鳴九竅不利腸胃之所生也脾胃一虛耳目九竅皆為之病簡易方一聤耳膿出明郁散因五八紅玉散因五八流膿方因五九一百蟲入耳方因六一灸法上星灸二七壯治風聾翳風灸七壯治耳聾痛合谷灸七壯治耳聾外關聽宮偏歷腎愈耳證論列方抽薪飲新寒三徙薪飲新寒四十全大補湯補二十清化飲新因十三清膈煎新寒九補中益氣湯補三十地黃丸補百二十歸脾湯補三二大分清飲新寒五加減一陰煎新補九左歸丸新補四大補元煎新補一平補鎮心丹補百十四物湯補八右歸丸新補五肉蓯蓉丸補一五三辰砂妙香散固十五八珍湯十丸六安煎新和二小柴胡湯散十九當歸龍薈丸寒一六七論外備用方柴胡清肝散寒五九肝膽火逆梔子清肝散寒六十肝膽風熱耳病諸方詳因陳五三至六八止鼻證經義金匱真言論曰西方白色入通於肺開竅於鼻脈度篇曰肺氣通於鼻肺和則鼻能知臭香矣五閲五使篇曰鼻者肺之官也以候五臟故肺病者喘息鼻脹邪氣臟腑病形篇曰十二經脈三百六十五絡其血氣皆上於面而走空竅其宗氣上出於鼻而為臭本神篇曰肺藏氣氣舍魄肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息五臟別論曰五氣入鼻藏於心肺心肺有病而鼻為之不利也經脈篇曰足太陽實則鼽窒虛則鼽衄氣厥論曰膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄衊瞑目憂恚無言論曰人之鼻洞涕出不收者頏顙不開分氣失也五色篇曰明堂者鼻也雷公曰官五色奈何黃帝曰青黑為痛黃赤為熱白為寒是為五官面王以上者小腸也面王以下者膀胱子處也鼻準為面王詳前面病門解精微論曰泣涕者腦也腦者陰也髓者骨之充也故腦滲為涕刺熱篇曰脾熱病者鼻先赤口問篇曰人之嚏者何氣使然岐伯曰陽氣和利滿於心出於鼻故為嚏補足太陽榮眉本一曰眉上也口鼻者氣之門戶也熱論篇曰傷寒二日陽明受之陽明主肉其脈俠鼻絡於目故身熱目疼而鼻乾不得臥也遺篇刺法論帝曰余聞五疫之至皆相染易天牝從來復得其往氣出於腦即不幹邪天牝鼻也鼻受天之氣故曰天牝詳十三卷瘟疫門五常政大論曰審平之紀其主鼻少陽司天咳嚏鼽衄鼻窒瘡瘍太陽司天鼽嚏喜悲少陰司天嚏鼽衄鼻窒六元正紀大論曰陽明所至為鼽嚏至真要大論曰少陰司天民病鼽衄嚏嘔少陽司天甚則鼽衄太陽司天鼽衄善悲少陰之復煩躁鼽嚏甚則入肺咳而鼻淵論證鼻為肺竅又曰天牝乃宗氣之道而實心肺之門戶故經曰心肺有病而鼻為之不利也然其經絡所至專屬陽明自山根以上則連太陽督脈以通於腦故此數經之病皆能及之若其為病易窒塞者謂之鼽時流濁涕而或多臭氣者謂之鼻淵又曰腦漏或生瘜肉而阻塞氣道者謂之鼻齆及有噴嚏鼻衄酒皶赤鼻之類各當辨而治之然總之鼻病無他也非風寒外感則內火上炎耳外感者治宜辛散內熱者治宜清涼知斯二者則治鼻大綱盡乎是矣論治共六條一鼻塞證有二凡由風寒而鼻塞者以寒閉腠理則經絡壅塞而多鼽嚏此證多在太陽經宜用辛散解表自愈如川芎散神愈散及麻黃紫蘇荊芥蔥白之類皆可擇用若由火邪上炎而鼻塞者單宜清火火之微者多近上焦出自心肺宜清化飲黃芩知母湯之類主之火之甚者多出陽明或微兼頭痛宜竹葉石膏湯涼膈散之類主之若風寒兼火者即防風通聖散之類亦可用大都常塞者多火暴塞者多風寒當以此辨之一鼻涕多者多由於火故曰肺熱甚則鼻涕出由此觀之則凡無故多淚及多口涎者亦多屬肝脾之火皆其類耳一鼻淵證總由太陽督脈之火甚者上連於腦而津津不已故又名為腦漏此證多因酒醴肥甘或久用熱物或火由寒鬱以致濕熱上熏津汁溶溢而下離經腐敗有作臭者有大臭不堪聞者河間用防風通聖散一兩加薄荷黃連各二錢以治之古法有用蒼耳散治之者然以余之見謂此炎上之火而治兼辛散有所不宜故多不見效莫若但清陰火而兼以滋陰久之自寧此即高者抑之之法故常以清化飲加白蒺藜五錢或一兩蒼耳子二三錢若火之甚者再以清涼等劑加減用之每獲全愈或用宣明防風湯之意亦可但此證一見即宜節戒早治久則甚難為力也凡鼻淵腦漏雖為熱證然流滲既久者即火邪已去流亦不止以液道不能扃固也故新病者多由於熱久病者未必盡為熱證此當審察治之若執用寒涼未免別生他病其有漏泄既多傷其髓海則氣虛於上多見頭腦隱痛及眩運不寧等證此非補陽不可宜十全大補湯補中益氣湯之類主之又醫學正傳有腦漏祕方亦可檢用一鼻齆瘜肉阻塞清道雖鼻為肺竅而其壅塞為患者乃經絡肌肉之病此實陽明熱滯留結而然故內治之法宜以清火清氣為主外治之法宜以黃白散及千金瘜肉方雄黃散或簡易瘜肉方之類主之一酒皶赤鼻多以好酒之人濕熱乘肺熏蒸面鼻血熱而然或以肺經素多風熱色為紅黑而生皶癤者亦有之內宜涼血清火外宜硫磺散白礬散之類主之一鼻衄證詳見血證門灸法囟會灸七壯治鼻齆鼻痔上星三壯七壯治濁涕通天灸七壯灸後鼻出鼻積方愈迎香治鼻塞多涕人中風府百會風池大椎曲差合谷並治鼻流臭穢鼻證論列方川芎散因六九雄黃散因八四宣明防風湯因七七涼膈散攻十九痘八三硫黃散因八九防風通聖散攻十六蒼耳散因七三清化飲新因十三補中益氣湯補三十神愈散因七四正傳腦漏祕方因七九十全大補湯補二十黃白散因八十千金瘜肉方因八五竹葉石膏湯寒五六白礬散因八七簡易瘜肉方因八六黃芩知母湯寒五一論外備用方川芎茶調散散四六傷風鼻塞羌活勝風湯散六一風熱鼻塞面鼻諸方詳因陳六九至一百止
